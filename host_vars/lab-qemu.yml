# Test-only overlay applied via -e on top of inventory-loaded
# host_vars/lab.yml. Activated by test/machine.py when --machine lab
# is requested -- push CI doesn't fan out to lab, but nightly
# and on-demand `testrole.py --machine lab` go through here.
qemu_test: true

# Podman container store on an mdadm raid5 (/dev/md/podman) across a per-disk
# ext4 partition on each of the 3 rpool disks (packer provision.sh + chroot.sh),
# not an rpool zvol -- bypassing the ZFS COW/checksum/ZIL write amplification the
# reconstructible image/overlay data doesn't need, with one disk of redundancy
# at (N-1)/N usable. stride/stripe-width match mdadm's default 512K chunk over
# 3-1 data disks (512K / 4K = 128; 128 * 2 = 256). The fixture array is small
# (provision.sh podman_size=4G/disk => 8G usable) -- it only proves the
# assemble+mkfs+mount path; prod lab sizes its own at rebuild
# (notes/runbooks/podman_partition_rebuild.md). This overlay is fixture-only:
# prod lab keeps the rpool/podman zvol (host_vars/lab.yml default) until that
# rebuild moves this setting into lab.yml.
podman_storage_backend: partition
podman_storage_device: /dev/md/podman
podman_partition_mkfs_opts: "-E stride=128,stripe-width=256"

# Swap on an mdadm raid1 (/dev/md/swap) across the per-disk p3 partitions
# (provision.sh + chroot.sh), not the rpool/swap zvol -- the unified mirror
# layout (notes/unified_disk_layout.md). swap_zvol: null disables the prod zvol
# that lab.yml declares (the swap role treats a null backend as unconfigured),
# so the fixture exercises the partition path; zram stays primary. Fixture-only:
# prod lab.yml keeps the zvol until its noble rebuild carves the swap partition.
swap_zvol: null
swap_partition:
  device: /dev/md/swap

# Same block formula as host_vars/lab.yml; only `parent` differs (the
# QEMU NIC isn't named eth0 and isn't VLAN-trunked, so all macvlan
# children sit on the single en* user-net iface). The harness pins
# qemu's user-net to the gsub'd test supernet (10.234.0.0/18 — see
# test/machine.py's qemu_user_net_args) and test/inventory.ini puts
# lab in [test] so `network.*` is also gsub'd to 10.234 — the parent
# NIC's subnet then contains every per-host /28 the topology emits.
macvlan_blocks:
  - name: mac_mgmt
    parent: "{{ ansible_facts.interfaces | select('match', '^en') | sort | first }}"
    vlan: management

has_transcoding_acceleration: false

# Override prod's lab.yml netplan: it matches by physical NIC MAC, but
# the QEMU VM ships a single virtio-net with a different MAC, so on
# noble `netplan apply` brings the only interface down (jammy was
# lenient and silently no-op'd). Match the QEMU NIC by name like box
# does.
netplan:
  ethernets:
    en:
      match:
        name: "en*"
      link-local: [] # do not setup random link local address when no dhcp is present
      wakeonlan: true
      dhcp4: true
      dhcp6: false
