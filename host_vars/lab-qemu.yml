# Test-only overlay applied via -e on top of inventory-loaded
# host_vars/lab.yml. Activated by test/machine.py when --machine lab
# is requested -- push CI doesn't fan out to lab, but nightly
# and on-demand `testrole.py --machine lab` go through here.
qemu_test: true

zfs_has_services_mount: false
zfs_has_scratch_mount: false
zfs_has_ci_scratch_mount: false
zfs_has_media_mount: false
zfs_has_data_mount: false
zfs_has_brumath_mount: false
zfs_has_eckwersheim_mount: false
zfs_has_minio_mount: false

# Same block formula as host_vars/lab.yml; only `parent` differs (the
# QEMU NIC isn't named eth0 and isn't VLAN-trunked, so all macvlan
# children sit on the single en* user-net iface). The harness pins
# qemu's user-net to the gsub'd test supernet (10.234.0.0/18 — see
# test/machine.py's qemu_user_net_args) and test/inventory.ini puts
# lab in [test] so `network.*` is also gsub'd to 10.234 — the parent
# NIC's subnet then contains every per-host /28 the topology emits.
macvlan_blocks:
  - name: mac_mgmt
    parent: "{{ ansible_facts.interfaces | select('match', '^en') | sort | first }}"
    block: "{{ network.sites.home.vlans.management.cidr | ansible.utils.ipsubnet(28, 8 + network.hosts[inventory_hostname].slot) }}"

has_transcoding_acceleration: false

# Override prod's lab.yml netplan: it matches by physical NIC MAC, but
# the QEMU VM ships a single virtio-net with a different MAC, so on
# noble `netplan apply` brings the only interface down (jammy was
# lenient and silently no-op'd). Match the QEMU NIC by name like box
# does.
netplan:
  ethernets:
    en:
      match:
        name: "en*"
      link-local: [] # do not setup random link local address when no dhcp is present
      wakeonlan: true
      dhcp4: true
      dhcp6: false
