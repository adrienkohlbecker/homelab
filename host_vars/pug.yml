zfs_root: true
journald_storage: persistent
grub_bootloader: false
nut_monitor_enabled: false

zfs_arc_min: 1073741824
zfs_arc_max: 4294967296
zfs_trim_pools:
  - rpool
zfs_mount_cache_datasets: # must list one dataset per pool. canmount must be set to "on" on this dataset
  - rpool/ROOT/jammy
zfs_has_bpool: false

libvirt_default_network: 10.123.49.0/24

sensor_modules:
  - drivetemp
  - coretemp
  - nct6775

macvlan_enable_podman: false
macvlan_parent: eth0
macvlan_subnet: 10.123.1.32/27

swap_partition:
  device: /dev/disk/by-uuid/00b9e215-aaea-459d-a535-40d47007095b
  opts: discard

netplan:
  ethernets:
    # match.driver pins the block to the physical PCIe NIC. Without it
    # netplan's apply-time matcher walks /sys using the *current* MAC
    # (not PermanentMACAddress like the generated .network files), so
    # any virtual link that inherits the parent's MAC would also be
    # caught. r8169 is the Realtek driver pug's onboard NIC uses;
    # virtual links don't match.
    nic0:
      match:
        macaddress: "{{ mac_addresses.pug }}"
        driver: r8169
      set-name: eth0
      link-local: [] # do not setup random link local address when no dhcp is present
      wakeonlan: true
      dhcp4: true
      dhcp6: false

hdparm_settings: {}

rand_order: 1

zfs_autobackup_source_host: lab
zfs_autobackup_dest_dataset: apoc/lab
zfs_autobackup_ssh_public_key: ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAINqTc8cI1r7PWtSMam2CXSsq+FSr7DGKXRvuIP2aVEHT root@lab

fancontrol_settings:
  fans:
    - name: CHA_FAN_2
      pwm: nct6798/pwm3
      temp: nct6798/temp1_input
      fan: nct6798/fan3_input
      mintemp: 40
      maxtemp: 60
      minstart: 40
      minstop: 10
      minpwm: 10
    - name: CHA_FAN_1 (HDD temp)
      pwm: nct6798/pwm2
      temp: drivetemp/temp1_input
      fan: nct6798/fan2_input
      mintemp: 40
      maxtemp: 55
      minstart: 120
      minstop: 90
      minpwm: 90

pihole_keepalived_role: BACKUP
pihole_keepalived_priority: 10

netdata_contexts:
  conntrack:       netfilter.conntrack_sockets
  containers:      cgroup.cpu_limit
  diskspace:       disk.space
  diskstatistics:  disk.io
  entropy:         system.entropy
  extfrag:         mem.fragmentation_index_dma
  idlejitter:      system.idlejitter
  interrupts:      system.interrupts
  ipc:             system.ipc_semaphores
  loadavg:         system.load
  meminfo:         system.ram
  netdev:          system.net
  netstat:         system.ip
  postfix:         postfix.qsize
  powercap:        cpu.powercap_intel_rapl_zone
  pressure:        system.cpu_some_pressure
  procstat:        system.cpu
  softirqs:        system.softirqs
  systemd_service: systemd.service.cpu.utilization
  uptime:          system.uptime
  vmstat:          mem.swapio
  zfs:             zfs.arc_size
netdata_collectors:
  - go.d:collector:chrony:local
  - go.d:collector:docker:local
  - go.d:collector:fail2ban:fail2ban
  - go.d:collector:intelgpu:intelgpu
  - go.d:collector:logind:logind
  - go.d:collector:nginx:local
  - go.d:collector:nvme:nvme
  # - go.d:collector:pihole:local
  - go.d:collector:prometheus:journald
  - go.d:collector:prometheus:keepalived_exporter_local
  - go.d:collector:sensors:sensors
  - go.d:collector:smartctl:smartctl
  - go.d:collector:systemdunits:service-units
  - go.d:collector:upsd:local
  # - go.d:collector:web_log:nginx # is down when no http requests have been made recently, let's skip alerting on this
  - go.d:collector:wireguard:wireguard
  # No apex (https://{{ domain }}/) site to monitor -- nginx only serves
  # subdomain hosts. The certbot role's x509check.conf.j2 ships only the
  # host_cert job; this list intentionally mirrors that.
  - go.d:collector:x509check:host_cert
  - go.d:collector:zfspool:zfspool
netdata_zfspool_thresholds:
  rpool: [ 85, 90, 95 ] #  464GiB => 70GiB, 47GiB, 24GiB
  apoc: [ 85, 90, 95 ] # 9,312GiB => 464GiB => 1,397GiB, 932GiB, 467GiB
netdata_diskspace_blocklist:
  - /
  - /boot
  - /mnt/old_bionic
  - /mnt/old_services
  - /mnt/services

smb_shares: []
subid_users: []

has_transcoding_acceleration: true
z2m_start_service: false
