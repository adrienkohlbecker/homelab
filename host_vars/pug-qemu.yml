# Test-only overlay applied via -e on top of inventory-loaded
# host_vars/pug.yml. Activated by test/machine.py when --machine pug
# is requested -- push CI doesn't fan out to pug, but nightly
# and on-demand `testrole.py --machine pug` go through here.
qemu_test: true

zfs_has_services_mount: false
zfs_has_scratch_mount: false
zfs_has_ci_scratch_mount: false
zfs_has_media_mount: false
zfs_has_data_mount: false
zfs_has_brumath_mount: false
zfs_has_eckwersheim_mount: false
zfs_has_minio_mount: false

# Same block formula as host_vars/pug.yml; only `parent` differs (the
# QEMU NIC isn't named eth0). See host_vars/lab-qemu.yml for the
# rationale around qemu's user-net being pinned to the topology
# supernet by test/machine.py.
macvlan_blocks:
  - name: mac_mgmt
    parent: "{{ ansible_facts.interfaces | select('match', '^en') | sort | first }}"
    block: "{{ network.sites.home.vlans.management.cidr | ansible.utils.ipsubnet(28, 8 + network.hosts[inventory_hostname].slot) }}"

# Override prod pug's swap_partition (by-uuid, points at the physical disk's
# partition UUID). The packer pug image bakes a single-disk swap partition
# with GPT label "swap" (provision.sh: sgdisk -c3:swap), so by-partlabel
# resolves to the same block device the packer mkswap'd. _setup.yml cleans
# the packer-baked fstab entry to avoid a duplicate.
swap_partition:
  device: /dev/disk/by-partlabel/swap

has_transcoding_acceleration: false

# Override prod's pug.yml netplan: it matches by physical NIC MAC + r8169
# driver, but the QEMU VM ships a single virtio-net with a different MAC,
# so `netplan apply` finds no matching interface and brings the only link
# down. Match the QEMU NIC by name like box/lab-qemu do.
netplan:
  ethernets:
    en:
      match:
        name: "en*"
      link-local: [] # do not setup random link local address when no dhcp is present
      wakeonlan: true
      dhcp4: true
      dhcp6: false
      # Lease-preservation, mirroring prod (lab/pug): keeps the harness's
      # SSH lease through the converge's own `netplan apply`. The _verify
      # broken-config fixture is written directly and stays non-critical,
      # so the rollback path is still exercised.
      critical: true
