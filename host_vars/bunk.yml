ansible_python_interpreter: /usr/local/bin/python3.9
# DSM's sftp subsystem is the restricted internal-sftp (-u 000, no arbitrary
# paths) and its scp is an older OpenSSH the modern control node can't negotiate
# with, so the default "smart" transfer method logs sftp+scp failures before
# falling back. Force piped (dd over the ssh session) to skip both and silence
# the warnings.
ansible_ssh_transfer_method: piped
ansible_become_pass: !vault |
          $ANSIBLE_VAULT;1.2;AES256;prod
          31323465343565656262643331303439656635393061343335356135373164326565653339326238
          6234393638356233313535336533303136313935643561640a346261643134626237346132663137
          31626639373564353665643035333033663161636632336131626239376130383962626565656133
          6536346630343466330a613962646132343064616666353961373064366238306637633265653431
          39373839306164653938393333326531336134333430623131363937306232383132

# Backup-rsync keys layered on top of the fleet login key (ssh_public_keys) by
# the authorized_keys task in bunk.yml. The nightly zfs_autobackup offsite step
# on each source host pushes its bak-tagged datasets here as root over wg0. Each
# key carries a forced command= running ~ak/bin/rrsync (the Python rrsync, which
# bunk.yml installs) with -wo and a per-host restricted root, so a source can
# only WRITE into its own /volume1/Backup/<host> -- it can't read another host's
# backups, escape the dir, or open a shell. Keep each entry in sync with that
# host's actual root key (roles/ssh_root generates root@<host>); the restricted
# root must match the source's offsite target in zfs_backup_offsite.sh.
ssh_public_keys_additional: |
  command="/var/services/homes/ak/bin/rrsync -wo /volume1/Backup/lab",no-agent-forwarding,no-port-forwarding,no-pty,no-user-rc,no-X11-forwarding ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAINqTc8cI1r7PWtSMam2CXSsq+FSr7DGKXRvuIP2aVEHT root@lab
  command="/var/services/homes/ak/bin/rrsync -wo /volume1/Backup/pug",no-agent-forwarding,no-port-forwarding,no-pty,no-user-rc,no-X11-forwarding ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIDp277oY86WuDWYdU4Xr8eBUMAZ7L089F5SjBhmZzRS8 root@pug
  command="/var/services/homes/ak/bin/rrsync -wo /volume1/Backup/fox",no-agent-forwarding,no-port-forwarding,no-pty,no-user-rc,no-X11-forwarding ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIIy+WyCjsDKf9oee1U/WIJSvDGdKir6mjI/uXO7c6mGB root@fox

# Tailscale mesh: bunk is the Bonniers subnet router + exit node, enrolled into
# headscale by the standalone bunk.yml playbook (`mise run ansible:bunk --tags
# tailscale`), NOT site.yml -- bunk is DSM (no apt), so the tailscale role's
# install half doesn't apply; the DSM Tailscale package is installed via Package
# Center (operator runbook) and bunk.yml only registers/advertises/approves. The
# control-plane constants (tailscale_login_server / _headscale_host /
# _headscale_user) live in group_vars/prod.yml; these are bunk-specific.
tailscale_advertise_routes: "10.123.57.0/24"
tailscale_advertise_exit_node: true
# DSM package binary path (vs lab/pug's apt-installed `tailscale` on PATH).
tailscale_bin: /var/packages/Tailscale/target/bin/tailscale
# Stage the pre-auth key under /tmp: DSM has no guaranteed /run tmpfs (the role
# default). Root-only, single-use, removed right after `tailscale up` consumes it.
tailscale_authkey_file: /tmp/tailscale_authkey
# Pin a distinct underlay port so bunk has a stable public endpoint at Bonniers:
# roaming clients then reach the Bonniers subnet router / exit node DIRECTLY
# (1:1 router forward) instead of relaying through fox's DERP. Continues the
# fleet sequence (lab 41641, pug 41642 -- see notes/headscale_mesh_redesign.md).
# DSM hardcodes the port in the package launcher (not /etc/default/tailscaled as
# the apt unit does), so bunk.yml patches the start-stop-status script rather
# than the role's lineinfile path. Requires a manual udp/41643 1:1 forward on the
# Bonniers router (+ DSM firewall allow if enabled) -- off-fleet, see runbook.
tailscale_port: 41643
