# minimal: the vanilla Ubuntu cloud image test fixture. ext4, no
# ZFS, snapd + cloud-init preinstalled. Push CI fans out to this
# variant for roles that list `minimal:` in their machines: dict
# in meta/test.yml — exercises GRUB paths (vs ZBM on box), cloud-init
# cleanup, non-ZFS compression toggles, and snap removal.
qemu_test: true
qemu_test_minimal: true

zfs_root: false
# Volatile: VM is ephemeral; persistent journals on the ext4 root would
# stick around across throwaway test runs for no benefit.
journald_storage: volatile
# No macvlan_blocks: minimal doesn't trunk any VLANs and doesn't need
# an L2-on-LAN presence for containers. The macvlan role no-ops on
# missing macvlan_blocks.
grub_bootloader: true
netplan:
  ethernets:
    en:
      match:
        name: "en*"
      link-local: [] # do not setup random link local address when no dhcp is present
      wakeonlan: true
      dhcp4: true
      dhcp6: false

# zram-only swap (no zvol, no partition on ext4). 2G deliberately differs
# from the generator's default so _verify proves the config drove the size.
swap_zram:
  size: 2G

has_transcoding_acceleration: false

ssh_public_keys: |
  ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIN1YdxBpNlzxDqfJyw/QKow1F+wvG9hXGoqiysfJOn5Y vagrant insecure public key
