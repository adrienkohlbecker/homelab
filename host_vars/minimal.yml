# minimal: the vanilla Ubuntu cloud image test fixture. ext4, no
# ZFS, snapd + cloud-init preinstalled. Push CI fans out to this
# variant for roles in .github/ci-minimal-roles.txt (currently just
# `cleanup`, which exercises the snap-removal path only when snapd
# is actually present).
qemu_test: true
qemu_test_minimal: true

zfs_root: false
home_subnet: 10.0.2.0/24
# No macvlan_blocks: minimal doesn't trunk any VLANs and doesn't need
# an L2-on-LAN presence for containers. The macvlan role no-ops on
# missing macvlan_blocks.
grub_bootloader: true
netplan:
  ethernets:
    en:
      match:
        name: "en*"
      link-local: [] # do not setup random link local address when no dhcp is present
      wakeonlan: true
      dhcp4: true
      dhcp6: false

has_transcoding_acceleration: false
