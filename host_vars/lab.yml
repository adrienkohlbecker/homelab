zfs_arc_min: 1073741824   # 1 GiB — let ARC shrink under pressure so libvirt VMs can wire
zfs_arc_max: 8589934592   # 8 GiB — ARC can refill when the VM is off; c_max isn't the blocker
zfs_trim_pools:
  - rpool
  - dozer
  - tank
zfs_mount_cache_datasets: # must list one dataset per pool. canmount must be set to "on" on this dataset
  - rpool/ROOT/jammy
  - dozer/minio
  - tank/data
zfs_has_bpool: false
zfs_dozer_filesystem: dozer
zfs_tank_filesystem: tank

