  - coretemp
  - nct6775

macvlan_enable_podman: false
macvlan_parent: eth0
macvlan_subnet: 10.123.1.0/27

netplan:
  ethernets:
    # match.driver pins each block to a physical PCIe NIC. Without it
    # netplan's apply-time matcher walks /sys using the *current* MAC
    # (not PermanentMACAddress like the generated .network files), so
    # a VLAN sub-interface that inherits the parent's MAC — `iot` on
    # nic0 here — gets caught by the match too. Result: the warning
    # `Cannot find unique matching interface for nic0`. `igb` covers
    # the i210, `igc` the i225; neither matches virtual links.
    nic0:
      match:
        macaddress: "{{ mac_addresses.lab_i210 }}"
        driver: igb
      set-name: eth0
      link-local: [] # do not setup random link local address when no dhcp is present
      wakeonlan: true
      dhcp4: true
      dhcp6: false
    nic1:
      match:
        macaddress: "{{ mac_addresses.lab_i225p1 }}"
        driver: igc
      set-name: eth1
      activation-mode: 'off' # do not enable interface
      link-local: [] # do not setup random link local address when no dhcp is present
      wakeonlan: true
      # dhcp4 must be off — when the i225 link briefly comes up (cable
      # bounce / WoL keep-alive) networkd otherwise grabs an IoT-VLAN
      # lease and spends the up-window logging martians for every frame
      # it can't route. activation-mode:off only stops the initial
      # bringup, not transient carrier events. (As of 2026-05 the i225
      # is BIOS-disabled and absent from lspci, but keep the block as
      # defensive config in case the BIOS toggle is reverted.)
      dhcp4: false
      dhcp6: false
    nic2:
      match:
        macaddress: "{{ mac_addresses.lab_i225p2 }}"
        driver: igc
      set-name: eth2
      activation-mode: 'off' # do not enable interface
      link-local: [] # do not setup random link local address when no dhcp is present
      wakeonlan: true
      dhcp4: false
      dhcp6: false
  vlans:
    iot:
      id: 4
      link: nic0
      addresses: [ "10.123.4.102/24" ]

hdparm_settings: {}

rand_order: 2

zfs_autobackup_source_host: pug
zfs_autobackup_dest_dataset: tank/pug
