ssh_x11_forwarding: true
zfsbootmenu_artifact_override:
  version: v3.0.1-linux6.1-upstream-x86_64
  url: "{{ zfsbootmenu_repository_url }}/v3.0.1-linux6.1-upstream-x86_64/zfsbootmenu-v3.0.1-linux6.1-upstream-x86_64.tar.gz"
  sha256_url: "{{ zfsbootmenu_repository_url }}/v3.0.1-linux6.1-upstream-x86_64/zfsbootmenu-v3.0.1-linux6.1-upstream-x86_64.tar.gz.sha256sum"

ssh_public_keys_additional: |
  command="rrsync /mnt/data/MacbookPro/",no-agent-forwarding,no-port-forwarding,no-pty,no-user-rc,no-x11-forwarding ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIGoV1GKxsIUqLzdCBrFsNDNJomw8NF3d8EwcJACkm1Qk rsync_to_lab

zfs_arc_min: 1073741824   # 1 GiB — let ARC shrink under pressure so qemu VMs can wire
zfs_arc_max: 4294967296   # 4 GiB — halved from 8 to free headroom for 6 concurrent CI VMs
zfs_trim_pools:
  - rpool
  - dozer
  - tank
# autotrim=on on rpool/dozer/tank mirrors the live pool state on lab (rpool +
# dozer from creation, tank set on the host after the fact). mouse stays at the
# autotrim=off default and is left unmanaged. tank also gets scheduled trim via
# the zfs_trim timer above; the two are independent.
zfs_pool_properties:
  - { pool: rpool, name: autotrim, value: "on" }
  - { pool: dozer, name: autotrim, value: "on" }
  - { pool: tank, name: autotrim, value: "on" }
zfs_mount_cache_datasets: # must list one dataset per pool. canmount must be set to "on" on this dataset
  - rpool/ROOT/{{ ansible_distribution_release }}
  - dozer/minio
  - tank/data
zfs_dozer_filesystem: dozer
zfs_tank_filesystem: tank

swap_zvol:
  dataset: rpool/swap
  size: 16G

# zram is the primary swap; the 16G zvol above is the deadlock-free-by-
# coldness overflow (notes/swap_strategy.md).
swap_zram:
  size: 8G

# Host-native CI fallback runner. It deliberately uses its own token variable so
# lab cannot accidentally clone fox's project runner token and inherit the wrong
# server-side tags.
gitlab_runner_enabled: true
gitlab_runner_executor: shell
gitlab_runner_name_suffix: shell-qemu
gitlab_runner_token: "{{ gitlab_runner_lab_token | default('') }}"
gitlab_runner_concurrent: 6
gitlab_runner_limit: 6
gitlab_runner_extra_groups:
  - kvm
  - homelab_ci

# Derived from `sudo sensors-detect` on the host; re-run after hardware changes.
lm_sensors_modules:
  - drivetemp
  - coretemp
  - nct6775

# nct6798 AUXTIN0/2/4 (temp3/5/7) are unconnected board pins: they rail at
# -128/+127 C and oscillate across their crit threshold, so netdata's
# debugfs.plugin logs a state transition for each flap (~tens of thousands of
# journal lines/day). temp4/temp6 (AUXTIN1/3) read plausible values and stay
# quiet, so they are left charted. Feature names per `sensors -u nct6798-isa-0290`.
lm_sensors_ignore:
  - chip: nct6798-isa-0290
    features:
      - temp3
      - temp5
      - temp7

# Each entry names a VLAN; the macvlan role derives this host's slot-indexed
# /28 from data/network_topology.yml. host_ip defaults to that block's first IP.
# lab is slot 0, so both blocks resolve to .128/28.
macvlan_blocks:
  - name: mac_mgmt
    parent: eth0
    # No podman_network: nothing on lab attaches containers via the
    # mgmt-VLAN macvlan today.
    vlan: management
  - name: mac_iot
    parent: iot              # netplan-named eth0.4 subif (see vlans.iot below)
    vlan: iot
    # The podman network (also named mac_iot) takes the upper /29
    # (.136/29 = 8 container slots); homeassistant attaches via
    # --network=mac_iot.
    podman_network: true

macos_vm_name: base
macos_vm_zvol_dataset: dozer/vms/macos/base
macos_vm_zvol_size: "128000000000"
# First SMT sibling of four P-cores. CPUs 12-19 are E-cores on this i5-13500.
macos_vm_cpu_pinset: "0,2,4,6"
macos_vm_install_mode: true
macos_vm_autostart: false

netplan:
  ethernets:
    # match.driver pins each block to a physical PCIe NIC. Without it
    # netplan's apply-time matcher walks /sys using the *current* MAC
    # (not PermanentMACAddress like the generated .network files), so
    # a VLAN sub-interface that inherits the parent's MAC — `iot` on
    # nic0 here — gets caught by the match too. Result: the warning
    # `Cannot find unique matching interface for nic0`. `igb` covers
    # the i210, `igc` the i225; neither matches virtual links.
    nic0:
      match:
        macaddress: "{{ mac_addresses.lab_i210 }}"
        driver: igb
      set-name: eth0
      link-local: [] # do not setup random link local address when no dhcp is present
      wakeonlan: true
      dhcp4: true
      dhcp6: false
      # Keep the DHCP lease through a networkd restart so a netplan
      # apply can't momentarily drop eth0 and sever in-flight SSH (the
      # 2026-05-10 lockout). Upstream's lease-preservation fix; the
      # timer-armed rollback in roles/netplan is the backstop for what
      # it can't cover.
      critical: true
    nic1:
      match:
        macaddress: "{{ mac_addresses.lab_i225p1 }}"
        driver: igc
      set-name: eth1
      activation-mode: 'off' # do not enable interface
      link-local: [] # do not setup random link local address when no dhcp is present
      wakeonlan: true
      # dhcp4 must be off — when the i225 link briefly comes up (cable
      # bounce / WoL keep-alive) networkd otherwise grabs an IoT-VLAN
      # lease and spends the up-window logging martians for every frame
      # it can't route. activation-mode:off only stops the initial
      # bringup, not transient carrier events. (As of 2026-05 the i225
      # is BIOS-disabled and absent from lspci, but keep the block as
      # defensive config in case the BIOS toggle is reverted.)
      dhcp4: false
      dhcp6: false
    nic2:
      match:
        macaddress: "{{ mac_addresses.lab_i225p2 }}"
        driver: igc
      set-name: eth2
      activation-mode: 'off' # do not enable interface
      link-local: [] # do not setup random link local address when no dhcp is present
      wakeonlan: true
      dhcp4: false
      dhcp6: false
  vlans:
    iot:
      id: 4
      link: nic0
      addresses: [ "10.123.4.2/24" ]

# Onsite pulls lab runs nightly: pug (LAN) plus fox (the Hetzner VPS, reached
# over wg0 at external_ips.fox). zfs_autobackup_ssh_public_key below is the
# reverse direction -- the key pug uses to pull lab.
zfs_autobackup_sources:
  - host: pug
    dest_dataset: tank/pug
  - host: fox
    dest_dataset: tank/fox
zfs_autobackup_ssh_public_key: ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIDp277oY86WuDWYdU4Xr8eBUMAZ7L089F5SjBhmZzRS8 root@pug

fan2go_enabled: true

dns_reboot_guard_enabled: true
dns_keepalived_priority: 100
netdata_keepalived_vrrp_enabled: true
netdata_keepalived_lost_master_alert: true

minio_enabled: true
minio_buckets:
  - arq-adrien
  - arq-{{ spouse_firstname }}
  - arq-game
  - terraform
  - test
netdata_contexts:
  aer:             pci.rootport_aer_correctable
  conntrack:       netfilter.conntrack_sockets
  containers:      cgroup.cpu_limit
  diskspace:       disk.space
  diskstatistics:  disk.io
  entropy:         system.entropy
  extfrag:         mem.numa_node_zone_fragmentation_index
  idlejitter:      system.idlejitter
  interrupts:      system.interrupts
  ipc:             system.ipc_semaphores
  keepalived_vrrp: keepalived_vrrp.state
  loadavg:         system.load
  md:              md.health
  meminfo:         system.ram
  netdev:          system.net
  netstat:         system.ip
  postfix:         postfix.qsize
  powercap:        cpu.powercap_intel_rapl_zone
  pressure:        system.cpu_some_pressure
  procstat:        system.cpu
  softirqs:        system.softirqs
  systemd_service: systemd.service.cpu.utilization
  uptime:          system.uptime
  vmstat:          mem.swapio
  zfs:             zfs.arc_size
netdata_collectors:
  # No chrony: ntp cmdport=0 blocks go.d UDP-only collector (timex alarm covers clock-sync).
  - go.d:collector:docker:local
  - go.d:collector:intelgpu:intelgpu
  - go.d:collector:logind:logind
  - go.d:collector:nginx:local
  - go.d:collector:nvme:nvme
  - go.d:collector:prometheus:fluentbit
  - go.d:collector:prometheus:kuma
  - go.d:collector:prometheus:minio
  - go.d:collector:sensors:sensors
  - go.d:collector:smartctl:smartctl
  - go.d:collector:systemdunits:service-units
  - go.d:collector:upsd:local
  # - go.d:collector:web_log:nginx # is down when no http requests have been made recently, let's skip alerting on this
  - go.d:collector:wireguard:wireguard
  # No apex (https://{{ domain }}/) site to monitor -- nginx only serves
  # subdomain hosts. The certbot role's x509check.conf.j2 ships only the
  # host_cert job; this list intentionally mirrors that.
  - go.d:collector:x509check:host_cert
  - go.d:collector:zfspool:zfspool
netdata_zfspool_thresholds:
  rpool: [ 85, 90, 95 ] # 318 GiB => 48GiB, 32GiB, 16GiB
  # tank is the zfs-replication destination for pug + lab autobackup
  # snapshots. The retention plan (--keep-target 10,1d1w,1w1m,1m10y)
  # silently truncates if the next nightly send can't fit, so 85% on
  # a 17.4 TiB pool (~2.6 TiB free) is too tight -- one large dataset
  # bump can close the gap before the operator reacts. 75% is ~4.5
  # TiB free, gives a week+ of lead time.
  tank:  [ 75, 85, 95 ] # 17,400 GiB => 4,350GiB, 2,610GiB, 870GiB
  mouse: [ 85, 90, 95 ] # 3712 GiB => 557GiB, 372GiB, 186GiB
  dozer: [ 85, 90, 95 ] # 3712 GiB => 557GiB, 372GiB, 186GiB
netdata_diskspace_blocklist:
  - /
  - /mnt/brumath
  - /mnt/data
  - /mnt/eckwersheim
  - /mnt/media
  - /mnt/minio
  - /mnt/old_bionic
  - /mnt/old_bionic_boot
  - /mnt/old_bionic_grub
  - /mnt/old_services
  - /mnt/old_vms
  - /mnt/scratch
  - /mnt/services
  - /var/lib/libvirt/images

# Netdata hosts the homepage_alerts sidecar polls. The current converge
# host short-circuits via loopback; other hosts get queried via their
# public FQDN. Consumed by roles/homepage.
homepage_netdata_hosts:
  - lab
  - pug
  - fox

samba_shares:
  # media is deliberately readable+writable by every authenticated SMB user
  # (ak + spouse): a household media library, group-owned via the media group.
  # The absent `valid users` is intentional -- don't add one without revisiting
  # who should reach the library. Inline keys (not an `opts` block) to match the
  # other shares.
  - name: media
    path: /mnt/media
    force group: media
    force create mode: "0664"
    force directory mode: "0775"
  - name: data
    path: /mnt/data
    valid users: ak
  - name: brumath
    path: /mnt/brumath
    valid users: ak
  - name: eckwersheim
    path: /mnt/eckwersheim
    valid users: ak

has_transcoding_acceleration: true
z2m_start_service: true

# Extra read-only library roots Plex mounts beyond /mnt/media. These exact
# /mnt/data paths exist only on lab; the role gates them on zfs_has_data_mount.
plex_extra_library_binds:
  - { src: "/mnt/data/MacbookPro/Music/iTunes/iTunes Media/Music", dest: /itunes }
  - { src: /mnt/data/Musique/Records, dest: /records }

# auth.{{ domain }} is an apex-zone CNAME → lab.{{ domain }} (public DNS), with a
# local DNS override resolving the LAN clients to lab's internal IP. The
# per-host wildcard cert covers `*.lab.{{ domain }}` but NOT apex names, so
# the Authelia portal needs auth.{{ domain }} on its SAN list. Adding entries
# here trips the SAN-drift detector in roles/certbot and force-renews.
certbot_extra_sans:
  - auth.{{ domain }}
  # dns.{{ domain }} is the DoT (Private DNS) name: it resolves to the DNS
  # VIP via an adguard rewrite, so whichever DNS peer holds the VIP must
  # present a cert covering it. Mirrored in host_vars/pug.yml.
  - dns.{{ domain }}

# Tailscale home exit node (mesh client registering against the fox headscale
# control plane -- see notes/headscale_mesh_redesign.md §C). HA pair with pug.
# Advertise the physical partition. On Trusted WiFi, DHCP's more-specific
# 10.123.0.0/21 option-121 route wins and the DNS VIP stays local; off-home,
# this /18 reaches the physical sites without selecting an exit node.
tailscale_advertise_routes: "10.123.0.0/18"
tailscale_advertise_exit_node: true
# Direct public endpoint for roaming clients (symmetric/CGNAT mobile) so home-exit
# and subnet traffic lands directly instead of relaying through fox's DERP. lab
# and pug share the home WAN, so each pins a DISTINCT underlay port with its own
# 1:1 UniFi forward: lab keeps tailscaled's default 41641 (pug uses 41642). The
# firewall role opens WAN ingress on this port. MANUAL operator step: add the
# UniFi port-forward WAN:41641 -> lab:41641 (udp).
tailscale_port: 41641
tailscale_wan_direct: true

nginx_static_proxies:
  - marantz
  - printer
  - siglent
  - ups
  - tubeszb
  - unifi
