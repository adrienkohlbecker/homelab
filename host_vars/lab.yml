zfs_root: true
journald_storage: persistent
grub_bootloader: false
nut_monitor_enabled: false
fluentbit_otlp_local: true  # hyperdx receiver runs here

ssh_public_keys_additional: |
  command="rrsync /mnt/data/MacbookPro/",no-agent-forwarding,no-port-forwarding,no-pty,no-user-rc,no-x11-forwarding ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIGoV1GKxsIUqLzdCBrFsNDNJomw8NF3d8EwcJACkm1Qk rsync_to_lab

zfs_arc_min: 1073741824   # 1 GiB — let ARC shrink under pressure so libvirt VMs can wire
zfs_arc_max: 8589934592   # 8 GiB — ARC can refill when the VM is off; c_max isn't the blocker
zfs_trim_pools:
  - rpool
  - dozer
  - tank
zfs_mount_cache_datasets: # must list one dataset per pool. canmount must be set to "on" on this dataset
  - rpool/ROOT/jammy
  - dozer/minio
  - tank/data
zfs_has_bpool: false
zfs_dozer_filesystem: dozer
zfs_tank_filesystem: tank

swap_zvol:
  dataset: rpool/swap
  size: 16G

sensor_modules:
  - drivetemp
  - coretemp
  - nct6775

macvlan_blocks:
  - name: mac0
    parent: eth0
    block: 10.123.0.128/28   # mgmt VLAN's macvlan_block (slot 0). host_ip
                             # defaults to block + 0 = 10.123.0.128.
  - name: mac0_iot
    parent: iot              # netplan-named eth0.4 subif (see vlans.iot below)
    block: 10.123.4.128/28   # IoT VLAN's macvlan_block (slot 0). host_ip
                             # defaults to block + 0 = 10.123.4.128. Sits
                             # peer-to-peer with homeassistant's macvlan
                             # container at 10.123.4.136/29.
macvlan_enable_podman: false

netplan:
  ethernets:
    # match.driver pins each block to a physical PCIe NIC. Without it
    # netplan's apply-time matcher walks /sys using the *current* MAC
    # (not PermanentMACAddress like the generated .network files), so
    # a VLAN sub-interface that inherits the parent's MAC — `iot` on
    # nic0 here — gets caught by the match too. Result: the warning
    # `Cannot find unique matching interface for nic0`. `igb` covers
    # the i210, `igc` the i225; neither matches virtual links.
    nic0:
      match:
        macaddress: "{{ mac_addresses.lab_i210 }}"
        driver: igb
      set-name: eth0
      link-local: [] # do not setup random link local address when no dhcp is present
      wakeonlan: true
      dhcp4: true
      dhcp6: false
    nic1:
      match:
        macaddress: "{{ mac_addresses.lab_i225p1 }}"
        driver: igc
      set-name: eth1
      activation-mode: 'off' # do not enable interface
      link-local: [] # do not setup random link local address when no dhcp is present
      wakeonlan: true
      # dhcp4 must be off — when the i225 link briefly comes up (cable
      # bounce / WoL keep-alive) networkd otherwise grabs an IoT-VLAN
      # lease and spends the up-window logging martians for every frame
      # it can't route. activation-mode:off only stops the initial
      # bringup, not transient carrier events. (As of 2026-05 the i225
      # is BIOS-disabled and absent from lspci, but keep the block as
      # defensive config in case the BIOS toggle is reverted.)
      dhcp4: false
      dhcp6: false
    nic2:
      match:
        macaddress: "{{ mac_addresses.lab_i225p2 }}"
        driver: igc
      set-name: eth2
      activation-mode: 'off' # do not enable interface
      link-local: [] # do not setup random link local address when no dhcp is present
      wakeonlan: true
      dhcp4: false
      dhcp6: false
  vlans:
    iot:
      id: 4
      link: nic0
      addresses: [ "10.123.4.2/24" ]

hdparm_settings: {}

rand_order: 2

zfs_autobackup_source_host: pug
zfs_autobackup_dest_dataset: tank/pug
zfs_autobackup_ssh_public_key: ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIDp277oY86WuDWYdU4Xr8eBUMAZ7L089F5SjBhmZzRS8 root@pug

fan2go_enabled: true

pihole_keepalived_role: MASTER
pihole_keepalived_priority: 100

prometheus_enabled: true

minio_enabled: true
minio_buckets:
  - arq-adrien
  - arq-spouse
  - arq-game
  - terraform
  - test
netdata_contexts:
  aer:             pci.rootport_aer_correctable
  conntrack:       netfilter.conntrack_sockets
  containers:      cgroup.cpu_limit
  diskspace:       disk.space
  diskstatistics:  disk.io
  entropy:         system.entropy
  extfrag:         mem.fragmentation_index_dma
  idlejitter:      system.idlejitter
  interrupts:      system.interrupts
  ipc:             system.ipc_semaphores
  loadavg:         system.load
  md:              md.health
  meminfo:         system.ram
  netdev:          system.net
  netstat:         system.ip
  postfix:         postfix.qsize
  powercap:        cpu.powercap_intel_rapl_zone
  pressure:        system.cpu_some_pressure
  procstat:        system.cpu
  softirqs:        system.softirqs
  systemd_service: systemd.service.cpu.utilization
  uptime:          system.uptime
  vmstat:          mem.swapio
  zfs:             zfs.arc_size
netdata_collectors:
  - go.d:collector:chrony:local
  - go.d:collector:docker:local
  - go.d:collector:fail2ban:fail2ban
  - go.d:collector:intelgpu:intelgpu
  - go.d:collector:logind:logind
  - go.d:collector:nginx:local
  - go.d:collector:nvme:nvme
  # - go.d:collector:pihole:local
  - go.d:collector:prometheus:fluentbit
  - go.d:collector:prometheus:gitea_runner
  - go.d:collector:prometheus:journald
  - go.d:collector:prometheus:keepalived_exporter_local
  - go.d:collector:prometheus:minio
  - go.d:collector:prometheus:prometheus
  - go.d:collector:redis:local
  - go.d:collector:sensors:sensors
  - go.d:collector:smartctl:smartctl
  - go.d:collector:systemdunits:service-units
  - go.d:collector:upsd:local
  # - go.d:collector:web_log:nginx # is down when no http requests have been made recently, let's skip alerting on this
  - go.d:collector:wireguard:wireguard
  # No apex (https://{{ domain }}/) site to monitor -- nginx only serves
  # subdomain hosts. The certbot role's x509check.conf.j2 ships only the
  # host_cert job; this list intentionally mirrors that.
  - go.d:collector:x509check:host_cert
  - go.d:collector:zfspool:zfspool
netdata_zfspool_thresholds:
  rpool: [ 85, 90, 95 ] # 318 GiB => 48GiB, 32GiB, 16GiB
  # tank is the zfs-replication destination for pug + lab autobackup
  # snapshots. The retention plan (--keep-target 10,1d1w,1w1m,1m10y)
  # silently truncates if the next nightly send can't fit, so 85% on
  # a 17.4 TiB pool (~2.6 TiB free) is too tight -- one large dataset
  # bump can close the gap before the operator reacts. 75% is ~4.5
  # TiB free, gives a week+ of lead time.
  tank:  [ 75, 85, 95 ] # 17,400 GiB => 4,350GiB, 2,610GiB, 870GiB
  mouse: [ 85, 90, 95 ] # 3712 GiB => 557GiB, 372GiB, 186GiB
  dozer: [ 85, 90, 95 ] # 3712 GiB => 557GiB, 372GiB, 186GiB
netdata_diskspace_blocklist:
  - /
  - /mnt/brumath
  - /mnt/data
  - /mnt/eckwersheim
  - /mnt/media
  - /mnt/minio
  - /mnt/old_bionic
  - /mnt/old_bionic_boot
  - /mnt/old_bionic_grub
  - /mnt/old_services
  - /mnt/old_vms
  - /mnt/scratch
  - /mnt/services
  - /var/lib/libvirt/images

# Netdata hosts the homepage_alerts sidecar polls. The current converge
# host short-circuits via loopback; other hosts get queried via their
# public FQDN. Consumed by roles/homepage.
homepage_netdata_hosts:
  - lab
  - pug

smb_shares:
  - name: media
    path: /mnt/media
    opts: |
      force group = media
      force create mode = 0664
      force directory mode = 0775
  - name: data
    path: /mnt/data
    valid users: ak
  - name: brumath
    path: /mnt/brumath
    valid users: ak
  - name: eckwersheim
    path: /mnt/eckwersheim
    valid users: ak

# Order is load-bearing: each entry gets a /etc/subuid+/etc/subgid range
# allocated by index, so inserting in the middle shifts every later
# user's ranges and invalidates their existing rootless podman storage.
# Append new entries at the end; don't sort.
subid_users:
  - gitea_runner
  - spouse
  - github_runner

# Expose the host kvm gid inside github_runner's rootless userns so
# `--group-add <kvm-gid>` on a podman-spawned container (test workflows
# running qemu) actually grants /dev/kvm access. Without this, the gid
# isn't in the user's subgidmap and the --group-add is silently ignored
# and qemu fails with "Could not access KVM kernel module: Permission
# denied". The subid role looks up the kvm gid via getent so we don't
# hardcode it here.
subid_extra_subgid_groups:
  - user: github_runner
    group: kvm

has_transcoding_acceleration: true
z2m_start_service: true

# Pool partitioning for the CI concurrency rework: lab-vm runners take
# packer-build + test-role jobs (capped at 4 concurrent VMs by pool
# size); lab runners take everything else (lint, ci-image, detect,
# notify, wait-for-*). Pools are disjoint -- a `runs-on: [self-hosted,
# lab]` job won't land on a lab-vm runner and vice versa, so VM jobs
# can never starve non-VM jobs of slots. See notes/concurrency_rework.md.
github_runner_instances:
  - { repo: homelab, suffix: vm1,  owner: adrienkohlbecker, labels: "self-hosted,lab-vm" }
  - { repo: homelab, suffix: vm2,  owner: adrienkohlbecker, labels: "self-hosted,lab-vm" }
  - { repo: homelab, suffix: vm3,  owner: adrienkohlbecker, labels: "self-hosted,lab-vm" }
  - { repo: homelab, suffix: vm4,  owner: adrienkohlbecker, labels: "self-hosted,lab-vm" }
  - { repo: homelab, suffix: gen1, owner: adrienkohlbecker, labels: "self-hosted,lab" }
  - { repo: homelab, suffix: gen2, owner: adrienkohlbecker, labels: "self-hosted,lab" }
  - { repo: compta,  suffix: gen1, owner: adrienkohlbecker, labels: "self-hosted,lab" }

# auth.{{ domain }} is an apex-zone CNAME → lab.{{ domain }} (public DNS), with a
# pihole override resolving the LAN clients to lab's internal IP. The
# per-host wildcard cert covers `*.lab.{{ domain }}` but NOT apex names, so
# the Authelia portal needs auth.{{ domain }} on its SAN list. Adding entries
# here trips the SAN-drift detector in roles/certbot and force-renews.
certbot_extra_sans:
  - auth.{{ domain }}
