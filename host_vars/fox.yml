# fox: off-home Hetzner Cloud CX23 VPS (x86_64, Ubuntu 22.04/jammy) running
# the Headscale control plane + embedded DERP for the Tailscale mesh. It is
# the ONLY internet-facing host; the home hosts dial outbound to it.
#
# fox is NOT a home host -- no home LAN/VLANs (it sits on its own
# Hetzner private net, the `hetzner` topology site, at 10.123.55.2) -- so it
# runs a curated minimal role set (the dedicated `fox` play in site.yml),
# excluded from the all:!bunk base plays. It DOES join the wg0 backbone (scoped:
# peer host /32s only: each server peer's wg /32 plus the physical /32 for
# cross-site peers), which lets fox reach lab/pug services at their LAN IPs
# without routing whole home subnets. Provisioned by terraform/hetzner.tf;
# reached at fox.fahm.fr (public A -> reserved primary IP).

# Networking is ansible-managed (not Hetzner cloud-init). The stock
# 50-cloud-init.yaml matched both NICs by MAC, and the private-net NIC's MAC no
# longer matched the live interface -- Hetzner reassigns the private-net MAC on
# detach/reattach -- so networkd left enp7s0 off/unmanaged and 10.123.55.2 (the
# `hetzner` topology IP, assigned via terraform/hetzner.tf hcloud_server_network)
# never came up. The netplan role renders this and deletes the cloud-init file.
#
# Neither NIC is matched by MAC. Both are virtio_net, so match.driver can't
# disambiguate the way lab/pug do; instead each is matched by its predictable
# PCI name, which is stable for the VM and immune to the MAC reshuffle.
#   - eth0 (public, pci-0000:01:00.0 -> enp1s0): matched by name enp1s0 and
#     renamed to eth0 via set-name, keeping the familiar interface name. The
#     generated .network targets eth0, so the live link (already named eth0
#     from cloud-init) stays managed straight through `netplan apply` with no
#     unmanaged window, while the enp1s0->eth0 rename bootstraps from the
#     predictable name on the next boot. DHCP4 for the v4 lease + on-link
#     default; static v6 with the Hetzner resolvers and the fe80::1 on-link
#     default route (fox is a dual-stack DERP relay). critical: preserve the
#     lease across the networkd restart (remote-apply safety; cf. lab/pug).
#   - enp7s0 (private, pci-0000:07:00.0): already named enp7s0, so keyed
#     directly -- no set-name needed. dhcp4 pulls 10.123.55.2 from the Hetzner
#     private-net DHCP. optional: a private-net DHCP hiccup must never block
#     boot (eth0 is the only boot-critical link); use-dns keeps fox's resolvers
#     off the private net.
netplan:
  ethernets:
    eth0:
      match:
        name: "enp1s0"
      set-name: eth0
      dhcp4: true
      critical: true
      addresses:
        - "2a01:4f8:1c19:c5d9::1/64"
      nameservers:
        addresses:
          - 2a01:4ff:ff00::add:2
          - 2a01:4ff:ff00::add:1
      routes:
        - to: default
          via: "fe80::1"
          on-link: true
    enp7s0:
      dhcp4: true
      dhcp4-overrides:
        use-dns: false
      optional: true

zfs_arc_min: 0
zfs_arc_max: 536870912
# rpool carries autoexpand=on (chroot.sh sets it so the 20G image grows into
# cpx22's larger disk on first boot) + autotrim=on; both are set live, the zfs
# role asserts them.
zfs_pool_properties:
  - { pool: rpool, name: autotrim, value: "on" }
  - { pool: rpool, name: autoexpand, value: "on" }
# fox runs no onsite pull of its own (empty sources) -- it is a leaf source
# that lab pulls (lab's zfs_autobackup_sources lists fox -> tank/fox). It still
# snapshots locally and rsyncs its bak-tagged datasets offsite to bunk: fox
# reaches bunk's rsync endpoint (external_ips.bunk) over wg0 because wg.conf
# grants cross-site peers the physical /32, same path lab/pug use. The key
# below authorizes root@lab on fox's zfs_autobackup user so lab's pull works.
zfs_autobackup_sources: []
zfs_autobackup_ssh_public_key: ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAINqTc8cI1r7PWtSMam2CXSsq+FSr7DGKXRvuIP2aVEHT root@lab

# Hetzner is resetting this to 0
boot_efi_timeout: 0

# zram-only swap on this 4G VM: compression roughly doubles usable memory
# and gives an OOM backstop the stock image lacks. No disk overflow yet --
# the deadlock-free 8200 partition lands with the ZFS-root cutover (it needs
# the new image's partition table). Higher swappiness than the fleet default
# because this is the only RAM-constrained host: lean on cheap compressed swap
# to keep the working set resident (the local NVMe disk is fast, so this is a
# small-RAM call, not a slow-disk one). See notes/swap_strategy.md.
#
# algorithm=lz4 (the fleet default is zstd): under a full-universe CI fan-out
# this 2-vCPU host is CPU-bound (CPU PSI ~96%) while it pages hard at
# swappiness 150, so zstd's per-page compression cost shows up directly in
# system time. lz4 is ~5-10x cheaper to (de)compress for a lower ratio (~2.5x
# vs ~4x here) -- the right trade when CPU, not RAM, is the binding constraint
# during builds; the disk-overflow partition backstops the lost headroom.
swap_zram:
  size: 4G
  algorithm: lz4
swap_swappiness: 150

# Hetzner VPS has a standard 8250 UART at 0x3f8 (Hetzner serial console).
boot_serial_console: "earlycon=uart8250,io,0x3f8 console=ttyS0,115200"

# Firewall: fox relies on the Hetzner Cloud firewall (terraform) rather than
# the home `firewall` role (whose nftables template is built around the home
# WAN/VLANs/wireguard and isn't run here).

# fox is a dual-stack DERP relay: it carries a public AAAA (terraform) and the
# Hetzner firewall opens 443/3478 to ::/0, so IPv6-only tailnet clients reach
# the relay without NAT64. Unlike the home fleet (IPv6 killed at the kernel by
# roles/firewall), fox keeps its IPv6 stack up, so nginx must add [::] listeners
# to actually answer on v6. The embedded DERP STUN gets the same treatment via a
# dual-stack podman network (roles/headscale).
nginx_ipv6: true

# Public addresses the embedded DERP advertises in the DERPMap, pinned to the
# terraform-reserved primary IPs (terraform/hetzner.tf hcloud_primary_ip.fox /
# .fox_v6, auto_delete=false so they survive rebuilds; these are the same
# addresses fox.fahm.fr A/AAAA resolve to). headscale can't auto-detect them:
# behind nginx + the dual-stack podman bridge it would advertise the container's
# bridge/ULA address, and ansible_default_ipv6 is itself hijacked by podman's ULA
# gateway. So hardcode them -- update here if the reserved IPs ever change.
headscale_derp_ipv4: "46.225.182.74"
headscale_derp_ipv6: "2a01:4f8:1c19:c5d9::"

# The control plane is published at the apex-level headscale.fahm.fr (terraform
# dns_fahm_fr.tf, real public IPs), decoupled from fox.fahm.fr -- which now
# resolves to fox's Tailscale CGNAT IP, unreachable by a client not yet enrolled.
# The headscale template's <service>.<host>.<domain> default (headscale.fox.fahm.fr)
# would ride the *.fox.fahm.fr CNAME onto that CGNAT address, so override it here.
# nginx already serves this name (the nginx_site vhost server_name carries the
# <subdomain>.<domain> form alongside <subdomain>.<host>.<domain>); the cert SAN
# below makes its TLS cert cover it.
headscale_server_url: "https://headscale.{{ domain }}"

# fox's issued cert covers fox.fahm.fr + *.fox.fahm.fr; the wildcard does NOT
# cover the apex-level headscale.fahm.fr control-plane vhost, so add it explicitly.
certbot_extra_sans:
  - headscale.{{ domain }}

# Headscale OIDC (user-device enrollment via Authelia), ENABLED. Headless hosts
# (lab/pug) still enroll via pre-auth keys regardless; this is for the Apple-app
# enrollment flow. The operator prerequisites (notes/headscale_mesh_redesign.md
# §E) are in place: the prod authelia_oidc_clients[headscale] row + the vaulted
# headscale_oidc_client_secret. headscale validates this issuer via OIDC
# discovery at startup, so it needs auth.fahm.fr reachable over wg0 when it boots
# -- the headscale unit orders After=wg-quick@wg0 for exactly that. To disable,
# flip this to false: the config's oidc block and the podman_secret task both
# gate on it, so fox then converges without the secret present.
headscale_oidc_enabled: true
headscale_oidc_issuer: "https://auth.{{ domain }}"

# fox is the only internet-facing host, so it runs fail2ban (the home hosts
# have zero inbound). Drives netdata's fail2ban collector + alert here.
fail2ban_enabled: true
headscale_oidc_client_id: headscale

# fox is a Tailscale node (2026-06-13, reversing the original control-plane-only
# decision -- see notes/headscale_mesh_redesign.md "fox joins the tailnet"). It
# advertises a Hetzner exit node (a DE egress alongside the home lab/pug and
# Bonniers bunk exits) plus its private net 10.123.55.0/24. It registers against
# its OWN headscale (tailscale_headscale_host: fox in group_vars/prod.yml), the
# same co-located pattern the box harness already exercises.
#
# accept-routes stays OFF (role default): fox reaches lab/pug over wg0, never the
# mesh, so the tailnet never sits on fox's path home -- the coordination-
# independent lifeline the redesign note insists on. accept-dns stays OFF too:
# fox keeps its own resolv.conf and does not consume MagicDNS.
tailscale_advertise_routes: "10.123.55.0/24"
tailscale_advertise_exit_node: true

# Pin the lab-hosted dependencies fox consumes to lab's physical IP over wg0.
# Public DNS for *.lab.fahm.fr now resolves to lab's Tailscale CGNAT address,
# which fox does NOT route (accept-routes/accept-dns off). More fundamentally,
# headscale's OIDC discovery runs at startup -- before the tailnet exists, since
# headscale itself hasn't started yet -- so this dependency CANNOT be served over
# the mesh and must ride wg0's cross-site host /32:
#   - auth.fahm.fr: Headscale OIDC discovery at startup.
etc_hosts_entries:
  auth.fahm.fr: "{{ network.hosts.lab.physical }}"

# Trimmed from the pug-derived list to what a Hetzner cloud VM actually
# exposes. Dropped contexts: powercap (no Intel RAPL in a VM), zfs (no ZFS
# module), vmstat/mem.swapio (no swap configured). Dropped collectors:
# intelgpu/nvme/sensors/smartctl/upsd/zfspool (no such hardware) and the
# keepalived prometheus job (no keepalived here). These would fire
# netdata_presence on any netdata version -- they're real absences, not the
# 1.46-vs-2.x context rename that the extfrag entry hit.
netdata_contexts:
  conntrack:       netfilter.conntrack_sockets
  containers:      cgroup.cpu_limit
  diskspace:       disk.space
  diskstatistics:  disk.io
  entropy:         system.entropy
  extfrag:         mem.numa_node_zone_fragmentation_index
  idlejitter:      system.idlejitter
  interrupts:      system.interrupts
  ipc:             system.ipc_semaphores
  loadavg:         system.load
  meminfo:         system.ram
  netdev:          system.net
  netstat:         system.ip
  postfix:         postfix.qsize
  pressure:        system.cpu_some_pressure
  procstat:        system.cpu
  softirqs:        system.softirqs
  systemd_service: systemd.service.cpu.utilization
  uptime:          system.uptime
netdata_collectors:
  # No chrony: ntp cmdport=0 blocks go.d UDP-only collector (timex alarm covers clock-sync).
  - go.d:collector:docker:local
  - go.d:collector:fail2ban:fail2ban
  - go.d:collector:logind:logind
  - go.d:collector:nginx:local
  - go.d:collector:prometheus:fluentbit
  - go.d:collector:systemdunits:service-units
  # - go.d:collector:web_log:nginx # is down when no http requests have been made recently, let's skip alerting on this
  - go.d:collector:wireguard:wireguard
  - go.d:collector:x509check:host_cert
  - go.d:collector:prometheus:headscale
  # Doubles as a runner liveness signal: the presence alert fires if the
  # gitlab_runner scrape goes missing (its config.toml metrics endpoint dies).
  - go.d:collector:prometheus:gitlab_runner
netdata_zfspool_thresholds: {}
netdata_diskspace_blocklist: []

# gitlab_runner's rootless podman (the Docker executor socket) needs a
# subordinate-id range; the subid role runs just before gitlab_runner in the
# fox play (site.yml).
subid_users:
  - gitlab_runner

# The rpool/podman zvol here is pure CI scratch -- only container images and
# the cells' ephemeral overlay layers. Every persistent service (headscale,
# socket_proxy) keeps its state on /mnt/services bind-mounts, not the zvol, so
# dropping fsync durability on it just trades a ~5s crash-loss window of
# rebuildable layers for far less storage-layer CPU under a wide fan-out.
podman_zvol_sync_disabled: true

# Global job ceiling across BOTH runner blocks (config.toml is process-wide) --
# the fleet umbrella, NOT the per-runner knob. Set to the sum of the two
# runners' per-runner `limit`s (16 docker + 60 coordinator) so each is bounded
# by its own limit and neither starves the other: the coordinator fleet can fan
# out to its full 60 while a small on-fox job still has slots.
gitlab_runner_concurrent: 76

# Per-runner cap on the Docker-on-podman runner: bounds jobs run directly on fox
# (restores the old on-fox ceiling now that the global `concurrent` is raised for
# the coordinator fleet). The 60-wide cell fan-out runs on the cloned
# coordinator, off fox; this only governs small jobs run here. The user-slice
# memory cap below is the hard RAM guardrail under it.
gitlab_runner_docker_limit: 16

# Cap the rootless runner's user slice (all job containers + podman) so a wide
# matrix can't push the 3.7 GiB host into swap and OOM-threaten the co-tenant
# headscale control plane + its nginx front. MemoryHigh throttles + reclaims
# ~2/3 in before the MemoryMax kill ceiling, leaving ~700 MiB headroom for
# headscale/nginx/tailscaled/OS. Still load-bearing under the coordinator: it
# bounds any small jobs run on the Docker-on-podman runner directly on fox (the
# cell fan-out itself now runs on the cloned coordinator, off fox). See
# notes/ci_aws_test_cells.md "Fox host protection".
gitlab_runner_memory_high: 2.5G
gitlab_runner_memory_max: 3G

# Turn on the second runner block: the docker-autoscaler / fleeting coordinator
# that clones an ephemeral CX53 per pipeline and scales to zero. The required
# secrets (gitlab_runner_coordinator_token + gitlab_runner_hcloud_token) are
# vaulted in group_vars/prod.yml; the converge resolves the role=ci-coordinator
# snapshot id from the hcloud API. See notes/ci_aws_test_cells.md "Phase 2".
gitlab_runner_coordinator_enabled: true

