# box: the canonical homelab test fixture. Box is purely a test-only
# inventory host (see hosts.ini -- it lives in [test], never in [prod])
# so this file IS the fixture; there's no prod-box to keep in sync
# with. Single-disk rpool only (no apoc/dozer/tank/mouse) -- producer
# roles still run but their datasets land flat under the global rpool
# defaults. Lab-prod's multi-pool shape is exercised by --machine lab/pug
# nightly. Machine-shape qemu values live here directly; role-specific qemu
# behavior belongs in the roles behind qemu_test gates.
qemu_test: true

# Volatile: VM is ephemeral and persistent journals would write to rpool
# during throwaway test runs for no benefit.
journald_storage: volatile

ssh_public_keys: |
  ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIN1YdxBpNlzxDqfJyw/QKow1F+wvG9hXGoqiysfJOn5Y vagrant insecure public key

# ARC sizing: test VMs run large containers (HA alone peaks at ~1 GiB
# RSS during startup) so every MiB freed from ARC is headroom for
# podman. 256/512 MiB is enough for ZFS to not thrash on a test workload.
zfs_arc_min: 268435456
zfs_arc_max: 536870912
# Box does not exercise trim timers or mount-cache generation; lab/pug cover
# those on the prod-shaped machine fixtures.
zfs_trim_pools: []
zfs_mount_cache_datasets: [] # must list one dataset per pool. canmount must be set to "on" on this dataset
# Box ships single-disk rpool only (no apoc/dozer/tank/mouse), so it inherits
# the global rpool defaults for dozer/tank-keyed producer-role paths.

swap_zvol:
  dataset: rpool/swap
  size: 1G

# Exercises the zram-primary path in CI (zram + the zvol overflow below).
# 3G is deliberately not the generator's 2G default on this 4G VM, so the
# _verify size assertion actually proves the config drove the size.
swap_zram:
  size: 3G

# Consumer-side bind-mounts are gated off for test fixtures: the
# producer datasets exist (and pools.sh seeded the pools) but the
# datasets carry no real homelab data, so consumers that bind-mount
# /mnt/<x>:/<x>:ro into containers (samba, the service units, etc.)
# would map an empty path. Flip any of these to true only when the
# consumer role's _verify writes matching fixture content.
zfs_has_services_mount: false
zfs_has_scratch_mount: false
zfs_has_ci_scratch_mount: false
zfs_has_media_mount: false
zfs_has_data_mount: false
zfs_has_brumath_mount: false
zfs_has_eckwersheim_mount: false
zfs_has_minio_mount: false

# Two blocks on the same en* parent: exercises the multi-block iteration
# in main.yml's loop, distinct MAC seeds across sibling blocks, and two
# podman macvlan networks coexisting on one parent NIC. Prod-shape uses
# distinct parents (eth0 for mgmt, VLAN subifs for others); box collapses
# them onto en* because the QEMU NIC isn't trunked. Lab/pug exercise the
# distinct-parent path via host_vars/{lab,pug}-qemu.yml.
#
# Block addresses come from data/network_topology.yml — same formula as
# host_vars/lab.yml. Works under qemu because test/machine.py pins
# slirp's user-net to the test-view supernet (10.234.0.0/18) via
# `qemu_user_net_args`, so the parent en* iface lands on a subnet that
# contains every per-host /28 the topology emits.
macvlan_blocks:
  - name: mac_mgmt
    parent: "{{ ansible_facts.interfaces | select('match', '^en') | sort | first }}"
    block: "{{ network.sites.home.vlans.management.cidr | ansible.utils.ipsubnet(28, 8 + network.hosts[inventory_hostname].slot) }}"
    # No podman_network: covers the iface-only path (lab's mac_mgmt shape);
    # mac_iot below still exercises the podman macvlan path.
    podman_network: false
  - name: mac_iot
    parent: "{{ ansible_facts.interfaces | select('match', '^en') | sort | first }}"
    block: "{{ network.sites.home.vlans.iot.cidr | ansible.utils.ipsubnet(28, 8 + network.hosts[inventory_hostname].slot) }}"
    podman_network: true

# Override prod-style MAC-matching netplan: the QEMU VM ships a single
# virtio-net with a fresh MAC, so match by name like everything in
# host_vars/{lab,pug}-qemu.yml does.
netplan:
  ethernets:
    en:
      match:
        name: "en*"
      link-local: [] # do not setup random link local address when no dhcp is present
      wakeonlan: true
      dhcp4: true
      dhcp6: false
      # Lease-preservation, mirroring prod (lab/pug): keeps the harness's
      # SSH lease through the converge's own `netplan apply`. The _verify
      # broken-config fixture is written directly and stays non-critical,
      # so the rollback path is still exercised.
      critical: true

# Self-referential single source: exercises the onsite-pull render path under
# the harness (external_ips lookup + the loop). The pull never runs -- the
# qemu fixture has no second host and dest_dataset is empty.
zfs_autobackup_sources:
  - host: box
    dest_dataset: ""
zfs_autobackup_ssh_public_key: ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIFyjxLhHELJkvSWbVs696fArHKeBM6k6EvmqDckAic5Z root@box

dns_keepalived_priority: 5

# box runs fail2ban (it's in the box,fox play as the test fixture for fox);
# this flag tells netdata to deploy the fail2ban collector + alert here, and
# keeps retired_services from purging it.
fail2ban_enabled: true

minio_enabled: true
minio_buckets:
  - test
netdata_contexts:
  system_cpu: system.cpu              # always-live chart, baseline
  ghost: foo.does_not_exist           # never-existed chart, probes the "missing-chart" gap
netdata_collectors:
  # Real, always-live collector (the role configures go.d/systemdunits.conf); mirrors prod and exercises the present=1 instanced-prefix path
  - go.d:collector:systemdunits:service-units
  - go.d:collector:fake_plugin:fake_job  # never-existed collector; exercises the netdata_collector_missing alert path
# Empty fixture values for zfs_alerts_override.conf.j2 (box has no ZFS pools
# and blocklists no mounts from the diskspace alert); real hosts set these in
# host_vars. Without them the unconditional alerts task fails undefined.
netdata_zfspool_thresholds: {}
netdata_diskspace_blocklist: []

# Consumed by roles/homepage. Box is unreachable to the (uninstalled)
# netdata so the sidecar populates a per-host error entry -- _verify
# asserts the JSON shape and host enumeration regardless. Listing box
# itself also exercises the inventory_hostname loopback short-circuit
# the unit template builds for the converging host.
homepage_netdata_hosts:
  - box

# Test shares so samba's smb.conf.j2 renders actual [share] blocks and the
# smbd_zfs_mounts_override.conf.j2 template exercises its loop. Paths don't
# need to exist for smbd to start (it just can't serve files). The override
# template gates on zfs_has_*_mount (all false on box), so it renders an
# empty [Unit] section regardless of paths used here.
samba_shares:
  - name: smbtest
    path: /srv/smbtest
    valid users: "{{ ansible_user_id }}"
    time_machine: true
    time_machine_max_size: 1T

subid_users:
  # gitlab_runner's rootless podman (Docker executor socket).
  - gitlab_runner

# Exercise the extra-subgid-groups loop in the subid role (getent lookup +
# template rendering). On a prod rootless runner this maps the kvm gid into
# the runner's userns; here we map the disk group into gitlab_runner's userns
# as a harmless equivalent. Without this, the loop body never fires.
subid_extra_subgid_groups:
  - user: gitlab_runner
    group: disk

# Exercise the extra-subuid-users loop in the subid role (getent lookup +
# template rendering). On prod this path has no consumers yet; here we
# map root's uid into gitlab_runner's userns as a harmless equivalent.
subid_extra_subuid_users:
  - user: gitlab_runner
    source_user: root

# Flipped to true so jellyfin + plex tests exercise the HW-transcoding
# code path (device passthrough, --group-add wiring, getent lookup) via
# the fake render group + phantom /dev/dri/renderD128 created by
# roles/test/tasks/fake_render_device.yml. No real GPU in QEMU — the
# runtime VAAPI probe inside the container falls back to software, but
# the ansible-side machinery and container's view of /dev get covered.
has_transcoding_acceleration: true
# roles/gitlab_runner CI fixture. Enabled so the role exercises its full
# host-side path under the harness (binary download, config.toml render +
# TOML validate, rootless podman socket bringup, unit install + _verify's
# start/metrics/stop smoke). The smoke DOES start the runner, which retries
# registration against gitlab.com with this token -- the safety property is
# that it is a non-functional placeholder (registration just fails async),
# NOT that nothing ever runs. No blast radius as long as it stays obviously
# fake.
gitlab_runner_enabled: true
gitlab_runner_token: glrt-TEST_PLACEHOLDER_DO_NOT_USE

# roles/tailscale test config. The control-plane pointers (login_server,
# headscale_host, headscale_user) are environment constants in group_vars/test.yml;
# the pre-auth key is minted on-the-fly by main.yml at registration. Only the
# advertised routes/exit are box-specific -- a throwaway subnet so _verify can
# assert the advertise + approve round-trip without colliding with the test topology.
tailscale_advertise_routes: "10.99.99.0/24"
tailscale_advertise_exit_node: true
# Exercise the --accept-routes=true path under the harness (harmless on the
# single-node test tailnet; the throwaway subnet isn't on box's real interfaces).
tailscale_accept_routes: true

# roles/headscale OIDC boot test. Enable headscale's OIDC path under the harness
# ONLY when headscale is the role under test, pointed at the local mockoidc that
# roles/headscale/tasks/_setup.yml stands up (static 10.166.0.10:8090 on the
# headscale podman net). Keyed on _role_under_test (a single-expression template,
# so ansible preserves the bool) so the tailscale role's headscale-on-box stays
# OIDC-free -- it doesn't run mockoidc. It must live in host_vars (not a _setup
# set_fact) to survive the harness's separate converge/idempotence/_verify
# ansible invocations. only_start_if_oidc_is_available makes headscale's boot the
# OIDC-discovery assertion (see _verify). The secret is a throwaway matching
# mockoidc's MOCKOIDC_CLIENT_SECRET -- no blast radius.
headscale_oidc_enabled: "{{ (_role_under_test | default('')) == 'headscale' }}"
headscale_oidc_issuer: http://10.166.0.10:8090/oidc
headscale_oidc_client_id: headscale
headscale_oidc_client_secret: test-oidc-client-secret
