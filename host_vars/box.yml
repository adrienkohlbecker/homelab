# box: the canonical homelab test fixture. Box is purely a test-only
# inventory host (see hosts.ini -- it lives in [test], never in [prod])
# so this file IS the fixture; there's no prod-box to keep in sync
# with. Single-disk rpool only (no apoc/dozer/tank/mouse) -- producer
# roles still run but their datasets land flat under rpool/ via the
# pool-var remap below. Lab-prod's multi-pool shape is exercised by
# --machine lab/pug nightly. host_vars/box-qemu.yml used to overlay
# this file via the harness's -e injection -- that pattern retired
# when [test] became a real inventory group; everything qemu-only
# lives here directly.
qemu_test: true

zfs_root: true
# Volatile: VM is ephemeral and persistent journals would write to rpool
# during throwaway test runs for no benefit.
journald_storage: volatile
# ZBM + rEFInd, not grub. Same as every prod host.
grub_bootloader: false
# No UPS on the VM; without this gate the nut_monitor unit loops on
# upsd connection-refused after nut 2.8 (resolute) stopped tolerating
# an absent upsd at startup.
nut_monitor_enabled: false

fluentbit_otlp_local: true  # hyperdx receiver runs here

ssh_public_keys: |
  ssh-rsa  vagrant insecure public key
  ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIN1YdxBpNlzxDqfJyw/QKow1F+wvG9hXGoqiysfJOn5Y vagrant insecure public key

# ARC sizing stays modest -- the test VM only has 4 GiB RAM, so the
# lab-prod 8 GiB cap would be a no-op anyway. Production sizing is in
# lab.yml; this is just enough headroom for ZFS to not thrash.
zfs_arc_min: 536870912
zfs_arc_max: 1073741824
zfs_trim_pools: []
zfs_mount_cache_datasets: [] # must list one dataset per pool. canmount must be set to "on" on this dataset
zfs_has_bpool: false
# Box ships single-disk rpool only (no apoc/dozer/tank/mouse). Repoint
# the producer-role pool vars at rpool so dozer/tank-keyed dataset paths
# (roles/scratch, roles/minio, roles/media, roles/data, plus the
# `^tank/` rewrite in roles/zfs/tasks/dataset.yml) all land flat under
# rpool/<name>. Producer-role coverage against the real prod pool shape
# moves to lab/pug nightly.
zfs_dozer_filesystem: rpool
zfs_tank_filesystem: rpool

swap_zvol:
  dataset: rpool/swap
  size: 1G

# Consumer-side bind-mounts are gated off for test fixtures: the
# producer datasets exist (and pools.sh seeded the pools) but the
# datasets carry no real homelab data, so consumers that bind-mount
# /mnt/<x>:/<x>:ro into containers (samba, the service units, etc.)
# would map an empty path. Flip any of these to true only when the
# consumer role's _verify writes matching fixture content.
zfs_has_services_mount: false
zfs_has_scratch_mount: false
zfs_has_media_mount: false
zfs_has_data_mount: false
zfs_has_brumath_mount: false
zfs_has_eckwersheim_mount: false
zfs_has_minio_mount: false

sensor_modules: []

# Two blocks on the same en* parent: exercises the multi-block iteration
# in main.yml's loop, distinct MAC seeds across sibling blocks, and two
# podman macvlan networks coexisting on one parent NIC. Prod-shape uses
# distinct parents (eth0 for mgmt, VLAN subifs for others); box collapses
# them onto en* because the QEMU NIC isn't trunked. Lab/pug exercise the
# distinct-parent path via host_vars/{lab,pug}-qemu.yml.
#
# Block addresses come from data/network_topology.yml — same formula as
# host_vars/lab.yml. Works under qemu because test/machine.py pins
# slirp's user-net to the test-view supernet (10.234.0.0/18) via
# `qemu_user_net_args`, so the parent en* iface lands on a subnet that
# contains every per-host /28 the topology emits.
macvlan_blocks:
  - name: mac_mgmt
    parent: "{{ ansible_facts.interfaces | select('match', '^en') | sort | first }}"
    block: "{{ network.sites.home.vlans.management.cidr | ansible.utils.ipsubnet(28, 8 + network.hosts[inventory_hostname].slot) }}"
    podman_network: true   # test fixture exercises the podman macvlan path
  - name: mac_iot
    parent: "{{ ansible_facts.interfaces | select('match', '^en') | sort | first }}"
    block: "{{ network.sites.home.vlans.iot.cidr | ansible.utils.ipsubnet(28, 8 + network.hosts[inventory_hostname].slot) }}"
    podman_network: true

# macos_vm test fixture: matches the symlink _setup.yml fabricates over
# a loopback file. install_mode=false skips the 700 MB BaseSystem.dmg
# download so the test stays under a couple of minutes.
macos_vm_disk_id: ata-MACOS_VM_TEST_DISK
macos_vm_macvtap_parent: "{{ ansible_facts.interfaces | select('match', '^en') | sort | first }}"
macos_vm_install_mode: false
macos_vm_autostart: false
# TCG (software) emulation lets libvirt define + validate the x86_64
# domain XML on aarch64 hosts where /dev/kvm doesn't fit (or doesn't exist).
macos_vm_domain_type: qemu

# Override prod-style MAC-matching netplan: the QEMU VM ships a single
# virtio-net with a fresh MAC, so match by name like everything in
# host_vars/{lab,pug}-qemu.yml does.
netplan:
  ethernets:
    en:
      match:
        name: "en*"
      link-local: [] # do not setup random link local address when no dhcp is present
      wakeonlan: true
      dhcp4: true
      dhcp6: false

hdparm_settings: {}

rand_order: 3

zfs_autobackup_source_host: box
zfs_autobackup_dest_dataset:
zfs_autobackup_ssh_public_key: ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIFyjxLhHELJkvSWbVs696fArHKeBM6k6EvmqDckAic5Z root@box

# fancontrol_settings stays unset (defaults to fans: []) and
# fan2go_enabled stays false (default). Box is the qemu-harness test
# machine and qemu exposes no PWM hardware -- a stub config would fail
# PWM probing regardless of how we shape it. _verify.yml exercises the
# disabled/empty branch here; the active branch runs on real hardware
# (lab, pug) at apply time.

pihole_keepalived_role: BACKUP
pihole_keepalived_priority: 5

prometheus_enabled: true

minio_enabled: true
minio_buckets:
  - test
netdata_contexts:
  system_cpu: system.cpu              # always-live chart, baseline
  ghost: foo.does_not_exist           # never-existed chart, probes the "missing-chart" gap
netdata_collectors:
  - go.d:collector:fake_plugin:fake_job  # never-existed collector; exercises the netdata_collector_missing alert path
netdata_zfspool_thresholds: {}
netdata_diskspace_blocklist: []

# Consumed by roles/homepage. Box is unreachable to the (uninstalled)
# netdata so the sidecar populates a per-host error entry -- _verify
# asserts the JSON shape and host enumeration regardless. Listing box
# itself also exercises the inventory_hostname loopback short-circuit
# the unit template builds for the converging host.
homepage_netdata_hosts:
  - box

smb_shares: []

subid_users:
  - gitea_runner

# Override gitea_runner_labels (group_vars/all.yml defaults to the
# docker-based runner-images) to a `:host` runner so the _verify
# smoke can execute a workflow directly on the VM host -- no ~1GB
# image pull on first run. The DooD path is still covered by the
# daemon's own require_docker + /healthz checks.
gitea_runner_labels:
  - "test-host:host"

# Flipped to true so jellyfin + plex tests exercise the HW-transcoding
# code path (device passthrough, --group-add wiring, getent lookup) via
# the fake render group + phantom /dev/dri/renderD128 created by
# roles/_test/tasks/fake_render_device.yml. No real GPU in QEMU — the
# runtime VAAPI probe inside the container falls back to software, but
# the ansible-side machinery and container's view of /dev get covered.
has_transcoding_acceleration: true
z2m_start_service: false

# Stub instance so the github_runner role exercises its per-
# instance code path under qemu_test (host-level PAT secret creation,
# per-instance env file write + workdir create, templated unit loads
# under the instantiated name). The role's qemu_test gate skips the
# systemd start, so the entrypoint's curl POST to GitHub never fires --
# this is a static-shape check, not a live runner.
github_runner_instances:
  - { repo: homelab, suffix: test1, owner: adrienkohlbecker, labels: "self-hosted,test" }
