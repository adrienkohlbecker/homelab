zfs_root: true
zfs_has_services_mount: false
zfs_has_scratch_mount: false
zfs_has_media_mount: false
zfs_has_data_mount: false
zfs_has_brumath_mount: false
zfs_has_eckwersheim_mount: false
zfs_has_minio_mount: false
home_subnet: 10.0.2.0/24
macvlan_parent: "{{ ansible_facts.interfaces | select('match', '^en') | sort | first }}"

# macos_vm test fixture: matches the symlink _setup.yml fabricates over
# a loopback file. install_mode=false skips the 700 MB BaseSystem.dmg
# download so the test stays under a couple of minutes.
macos_vm_disk_id: ata-MACOS_VM_TEST_DISK
macos_vm_macvtap_parent: "{{ ansible_facts.interfaces | select('match', '^en') | sort | first }}"
macos_vm_install_mode: false
macos_vm_autostart: false
# TCG (software) emulation lets libvirt define + validate the x86_64
# domain XML on aarch64 hosts where /dev/kvm doesn't fit (or doesn't exist).
macos_vm_domain_type: qemu

grub_bootloader: false
netplan:
  ethernets:
    en:
      match:
        name: "en*"
      link-local: [] # do not setup random link local address when no dhcp is present
      wakeonlan: true
      dhcp4: true
      dhcp6: false

has_transcoding_acceleration: false

# box.yml has nut_monitor_enabled=true for the prod box (which has a
# real UPS); the qemu test fixture has no UPS, so disable. With the
# gate in roles/nut_monitor/tasks/main.yml the unit is skipped on
# this host -- avoids upsmon's "connection refused" loop after nut
# 2.8 (resolute) stopped tolerating an absent upsd at startup.
nut_monitor_enabled: false
