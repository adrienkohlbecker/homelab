[defaults]
interpreter_python = /usr/bin/python3
display_ok_hosts = false
display_skipped_hosts = false
callback_result_format = yaml
check_mode_markers = true
# callbacks_enabled = profile_tasks, profile_roles

# mitogen reuses a Python interpreter on each target across tasks; on
# healthchecks (container/jammy) this knocks ~12s (~20%) off a full
# testrole.py run. Active for both test/testrole.py and direct
# `uv run ansible-playbook ...` invocations from the repo root.
#
# .ansible-mitogen-strategy is a symlink into the venv's ansible_mitogen
# plugin dir, refreshed at machine.py import time so it survives Python
# bumps. If the symlink is missing or dangling (e.g. fresh checkout, no
# tests yet, or venv torn down), ansible fails loudly with
# "Invalid play strategy specified: mitogen_linear" -- repair with
# `uv run python test/setup_mitogen.py`.
strategy_plugins = .ansible-mitogen-strategy
strategy = mitogen_linear

host_key_checking = False
verbosity = 1
force_color = True

vault_identity_list = prod@vault-client.sh, test@vault-client.sh
vault_id_match = True
inventory = hosts.ini

inject_facts_as_vars = True

[ssh_connection]
ssh_args = -o ControlMaster=auto -o ControlPersist=600s -o UserKnownHostsFile=/dev/null -o ForwardAgent=yes
pipelining = True

[persistent_connection]
connect_timeout = 900

[diff]
always = True
