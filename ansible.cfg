[defaults]
interpreter_python = /usr/bin/python3
display_ok_hosts = false
display_skipped_hosts = false
# digest = the stock default callback with the systemd `status` firehose and
# large `ansible_facts` gather blobs collapsed to a summary (callback_plugins/
# digest.py); keeps -v output (command stdout/stderr, diffs) under GitLab's job
# log cap. Relative path resolves from cwd, which is the repo root for both
# `mise run ansible` and the test harness (test/inventory.ini is cwd-relative).
callback_plugins = callback_plugins
stdout_callback = digest
callback_result_format = yaml
check_mode_markers = true
# callbacks_enabled = profile_tasks, profile_roles

# mitogen reuses a Python interpreter on each target across tasks; on a
# container role (jammy) this knocks ~12s (~20%) off a full
# testrole.py run. Active for both test/testrole.py and direct
# `uv run ansible-playbook ...` invocations from the repo root.
#
# .ansible-mitogen-strategy is a symlink into the venv's ansible_mitogen
# plugin dir, refreshed at machine.py import time so it survives Python
# bumps. If the symlink is missing or dangling (e.g. fresh checkout, no
# tests yet, or venv torn down), ansible fails loudly with
# "Invalid play strategy specified: mitogen_linear" -- repair with
# `uv run python test/setup_mitogen.py`.
strategy_plugins = .ansible-mitogen-strategy
strategy = mitogen_linear

host_key_checking = False
verbosity = 1
force_color = True

vault_identity_list = prod@vault-client.sh, test@vault-client.sh
vault_id_match = True
inventory = hosts.ini

# Gather a host's facts once per run, not once per play. site.yml puts each
# base host in ~4 plays; the default (implicit) re-runs the setup module every
# time. The test harness already forces this (ANSIBLE_GATHERING=smart in
# test/machine.py), so the full converge path runs under smart in CI -- this
# brings prod converges in line. Roles that reboot a host and then depend on
# fresh post-reboot facts must re-gather explicitly (setup: / gather_facts).
gathering = smart

inject_facts_as_vars = True

[ssh_connection]
ssh_args = -o ControlMaster=auto -o ControlPersist=600s -o UserKnownHostsFile=/dev/null -o ForwardAgent=yes
pipelining = True

[persistent_connection]
connect_timeout = 900

[diff]
always = True
