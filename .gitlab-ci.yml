# GitLab CI pipeline (notes/ci_aws_test_cells.md).
#
# Two runner pools:
#   - gitlab.com hosted runners take the cheap stateless jobs (lint, unit
#     tests): no qemu, no boxes, and a public project's compute cost factor
#     makes the minutes effectively free. They can't reach the home network
#     (so no nexus); they run in the project-registry ci image published by
#     the ci_image job below.
#   - fox's Docker-executor runner (roles/gitlab_runner) takes the AWS-cell
#     jobs: each runs in a CI-image container on fox and drives single-use
#     EC2 spot instances over the aws CLI + SSH. The runner is tag-only —
#     cell jobs carry `tags: [fox-docker-aws]`. First aboard: ami_images
#     below; still to come: the role-test matrix as a dynamic child
#     pipeline, site test.
#
# Migration in progress: the heavy jobs still run on GitHub Actions
# (.github/workflows/).
#
# Required project CI/CD variable: HOMELAB_VAULT_PASSWORD_TEST — the `test`
# vault identity's password (masked, same value as the GitHub repo secret).
# The prod identity's password is never available to CI by design (CLAUDE.md:
# Vault ids).

default:
  # Only the latest commit's status matters for these jobs — pairs with the
  # project's auto-cancel-redundant-pipelines setting so a rapid follow-up
  # push cancels the in-flight run instead of queueing behind it.
  interruptible: true

# Shared scaffolding for hosted-runner jobs: the ci image from this project's
# registry (Dockerfile; rebuilt manually via the ci_image job below). The
# image bakes the mise tool tree at /opt/mise and a warm uv wheel cache at
# /opt/uv-cache, so jobs only rebuild .venv against the checkout's lockfile.
# `mise install` stays in each script as the drift self-heal: a no-op while
# the image is current, and when mise.toml has moved past the published image
# it installs just the delta (slower job, loud in the log — the cue to rerun
# ci_image). mise auto-trusts the checkout's mise.toml under CI=true; the
# op:// refs in its [env] resolve to literal strings without `op run`, which
# nothing here reads.
.hosted:
  image: $CI_REGISTRY_IMAGE/ci:latest

lint:
  extends: .hosted
  # The default (small) hosted runner is 2 vCPU; lint fans its linters out in
  # parallel, so the 4-vCPU medium tier roughly halves the wall-clock.
  tags:
    - saas-linux-medium-amd64
  # ~5 min on a current image; a stale one adds the delta `mise install`.
  # Bound well under the project-level 1h default so a wedged run fails fast.
  timeout: 30m
  variables:
    # ansible-lint runs `ansible-playbook --syntax-check`, which loads
    # vault-encrypted group_vars/host_vars. Restrict ansible to the `test`
    # identity so the prod identity — undecryptable here — isn't attempted;
    # without this, syntax-check of prod playbooks errors out.
    ANSIBLE_VAULT_IDENTITY_LIST: test@vault-client.sh
    # /builds is world-writable on hosted runners, which makes ansible skip
    # ansible.cfg discovery from the cwd; pinning the path bypasses that
    # check so syntax-check runs with the repo config (inventory, vault ids).
    ANSIBLE_CONFIG: $CI_PROJECT_DIR/ansible.cfg
  script:
    - mise install
    - uv sync --locked
    - mise run lint

# Hermetic pytest suite (testpaths=unit_tests). Installs the full tool tree
# even though it only needs python + uv: `mise run` auto-installs whatever is
# missing anyway, so a partial install would just move the rest to task time
# (with noisy resolution warnings).
unit_tests:
  extends: .hosted
  timeout: 15m
  script:
    - mise install
    - uv sync --locked
    - mise run test

# Rebuild of the CI container image (the repo Dockerfile), pushed to this
# project's registry as $CI_REGISTRY_IMAGE/ci:<sha> (+ :latest from master).
# Manual-only, mirroring the GitHub ci-image workflow's policy: jobs pin the
# currently published :latest, refreshed deliberately when the toolchain
# changes — not rebuilt under every pipeline. Builds docker-in-docker on a
# hosted runner, so apt resolves upstream (USE_NEXUS_MIRRORS=0) — the nexus
# mirror redirect is only reachable from the lab network.
#
# Optional CI/CD variable: MISE_GITHUB_TOKEN (a no-scope PAT) raises mise's
# GitHub API rate limit during the in-image `mise install`; without it the
# build still works, mounted only as a BuildKit secret either way.
ci_image:
  rules:
    - when: manual
      # A skipped manual job must not hold the pipeline in "blocked".
      allow_failure: true
  image: docker:28.3.3
  services:
    - docker:28.3.3-dind
  tags:
    - saas-linux-medium-amd64
  # Serialize builds across pipelines (the GH workflow's concurrency group):
  # two concurrent runs would race on the floating :latest push. Don't let
  # auto-cancel kill a build mid-push either — a half-pushed manifest is
  # strictly worse than a delayed run.
  resource_group: ci_image
  interruptible: false
  timeout: 45m
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
    # Warm the layer cache from the published image; BUILDKIT_INLINE_CACHE
    # embeds cache metadata in the pushed image so the next rebuild can do
    # the same. First-ever build has nothing to pull — that's fine.
    - docker pull "$CI_REGISTRY_IMAGE/ci:latest" || true
    - |
      secret_args=""
      if [ -n "${MISE_GITHUB_TOKEN:-}" ]; then
        secret_args="--secret id=mise_github_token,env=MISE_GITHUB_TOKEN"
      fi
      docker build $secret_args \
        --build-arg USE_NEXUS_MIRRORS=0 \
        --build-arg BUILDKIT_INLINE_CACHE=1 \
        --cache-from "$CI_REGISTRY_IMAGE/ci:latest" \
        --tag "$CI_REGISTRY_IMAGE/ci:$CI_COMMIT_SHA" .
    - docker push "$CI_REGISTRY_IMAGE/ci:$CI_COMMIT_SHA"
    # :latest moves only from master, so a branch dispatch can't retarget
    # what other pipelines pin.
    - |
      if [ "$CI_COMMIT_BRANCH" = "$CI_DEFAULT_BRANCH" ]; then
        docker tag "$CI_REGISTRY_IMAGE/ci:$CI_COMMIT_SHA" "$CI_REGISTRY_IMAGE/ci:latest"
        docker push "$CI_REGISTRY_IMAGE/ci:latest"
      fi

# Rebake of the pre-baked Hetzner Cloud CI worker snapshot (`mise run
# packer:worker`: packer/hcloud_worker.pkr.hcl + provision_worker.sh, with
# location fallback and old-snapshot pruning). Manual- and master-only:
# packer only drives the Hetzner API and SSHes into the build VM's public
# address, so a hosted runner orchestrates it fine. Nothing consumes the
# snapshot since the fleeting fleet was retired for the AWS cells
# (roles/gitlab_runner is a Docker executor now); this job is kept as the
# fleet rollback path until gate D of notes/ci_aws_test_cells.md
# decommissions the Hetzner CI project wholesale.
#
# Required CI/CD variable: HCLOUD_TOKEN — the DEDICATED homelab-ci project's
# read/write token (terraform/hetzner_ci.tf), never the homelab project's:
# a leak from CI must stop at the disposable CI project.
worker_image:
  extends: .hosted
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: manual
      # A skipped manual job must not hold the pipeline in "blocked".
      allow_failure: true
  # One bake at a time across pipelines, and never auto-cancelled: a killed
  # run can orphan the packer build server on Hetzner.
  resource_group: worker_image
  interruptible: false
  timeout: 30m
  script:
    # Fail with a clear message rather than letting the task fall back to
    # its 1Password path (op is not in the ci image).
    - test -n "${HCLOUD_TOKEN:-}" || { echo "HCLOUD_TOKEN CI/CD variable is not set" >&2; exit 1; }
    - uv sync --locked
    - mise run packer:worker

# Bake + promote the EC2 test-cell AMIs (notes/ci_aws_test_cells.md): one
# parallel job per (machine, release) cell via the amazon-ebssurrogate
# builder — no KVM anywhere, so this runs on fox's Docker-executor runner
# (the job is an aws-CLI/packer orchestration loop; the build VM is an EC2
# instance). Manual and protected-ref only: AWS auth is GitLab OIDC into the
# bake role (terraform/aws_ci.tf), whose trust policy only accepts master —
# branch pipelines cannot publish AMIs. The promote step moves the
# /homelab-ci/ami/<machine>/<ubuntu> SSM parameter the harness resolves;
# rollback is re-putting the previous value (ssm get-parameter-history).
#
# packer:ami pre-stages the ZBM tarball from nexus.lab.fahm.fr, so this job
# needs nexus reachability from inside the runner container (fox pins the
# name to lab's wg0 IP in /etc/hosts, but job containers don't inherit it —
# wire extra_hosts in the runner's config.toml when first exercising this).
ami_images:
  rules:
    - if: $CI_COMMIT_REF_PROTECTED == "true"
      when: manual
      # A skipped manual job must not hold the pipeline in "blocked".
      allow_failure: true
  tags:
    - fox-docker-aws
  id_tokens:
    GITLAB_OIDC_TOKEN:
      aud: sts.amazonaws.com
  parallel:
    matrix:
      - MACHINE: [ box, pug, lab ]
        UBUNTU: [ jammy, noble, resolute ]
  # One bake per cell across pipelines, serializing the candidate smoke +
  # SSM promotion so two manual jobs cannot race the same parameter; never
  # auto-cancelled — a killed run can orphan the EC2 build instance.
  resource_group: ami-$MACHINE-$UBUNTU
  interruptible: false
  timeout: 60m
  script:
    # Same drift self-heal as .hosted, against the image's /opt/mise tree.
    - mise install
    - uv sync --locked
    # GitLab's id_tokens deliver the OIDC JWT in an env var; the AWS CLI's
    # AssumeRoleWithWebIdentity provider wants a file path.
    - export AWS_WEB_IDENTITY_TOKEN_FILE="$CI_PROJECT_DIR/.aws_web_identity_token"
    - echo "$GITLAB_OIDC_TOKEN" > "$AWS_WEB_IDENTITY_TOKEN_FILE"
    - export AWS_ROLE_ARN=arn:aws:iam::000390721279:role/homelab-ci-bake
    - export AWS_ROLE_SESSION_NAME="ami-images-$CI_JOB_ID"
    # Smoke the OIDC chain before spending 20+ min on a bake.
    - aws --region eu-central-1 sts get-caller-identity
    - mise run packer:ami "$MACHINE" --ubuntu "$UBUNTU" --promote
