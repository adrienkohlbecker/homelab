# GitLab CI pipeline (notes/ci_aws_nested_qemu_cells.md).
#
# Runner pools:
#   - gitlab.com hosted runners take the cheap stateless jobs (lint, unit
#     tests): no qemu, no boxes, and a public project's compute cost factor
#     makes the minutes effectively free. They can't reach the home network
#     (so no nexus); they run in the project-registry ci image published by
#     the ci_image job below.
#   - fox's always-on Docker-executor runner (`fox-docker-aws`) takes the
#     rare/manual AWS/Hetzner orchestration jobs (image bakes, the qemu image
#     reaper). Each runs in a CI-image container on fox and drives AWS / Hetzner
#     over the aws CLI + SSH.
#   - the AWS `aws-shell-qemu` fleeting pool (fleeting-plugin-aws + ASG) is the
#     default test-cell target and also runs `detect`: the `test_cells` child
#     matrix runs the nested qemu harness on autoscaled runner hosts, off fox so
#     a wide fan-out can't threaten fox's headscale/nginx co-tenants. detect
#     renders the child pipeline on the first host it boots, leaving it warm for
#     the cells. Each host hydrates promoted qemu images from S3 and runs the
#     same harness path as lab.
#   - lab's shell runner (`lab-shell-qemu`) is the manual/fallback qemu target:
#     a manual pipeline with HOMELAB_CI_TARGET=lab renders the same matrix and
#     drives the local qemu harness directly on lab.
#
# This is the sole CI: the former GitHub Actions setup (.github/workflows/) has
# been retired.
#
# Required project CI/CD variable: HOMELAB_VAULT_PASSWORD_TEST — the `test`
# vault identity's password (masked).
# The prod identity's password is never available to CI by design (CLAUDE.md:
# Vault ids).
#
# Qemu targets: HOMELAB_CI_TARGET=aws_qemu (default) runs the cells on the AWS
# `aws-shell-qemu` fleeting pool; set HOMELAB_CI_TARGET=lab on a manual/web
# pipeline to render the same matrix for the `lab-shell-qemu` runner instead.

# `detect` runs first and generates the role-test child pipeline; everything
# else (lint, unit tests, the test_cells trigger, manual builders) runs in
# `test`. Jobs without an explicit stage default to `test`.
stages:
  - prepare
  - test

default:
  # Only the latest commit's status matters for these jobs — pairs with the
  # project's auto-cancel-redundant-pipelines setting so a rapid follow-up
  # push cancels the in-flight run instead of queueing behind it.
  interruptible: true

variables:
  HOMELAB_CI_TARGET: aws_qemu
  # Skip the qemu role-test matrix (detect + test_cells) for this pipeline,
  # leaving lint/unit_tests and the manual image builders. Lets an image-only
  # push (an AMI / fox / zbm bake) skip the expensive cell fan-out:
  #   git push -o ci.variable=SKIP_TEST_CELLS=true
  # A push option overrides this default. Empty = run the matrix as usual.
  SKIP_TEST_CELLS: ""

# Shared scaffolding for hosted-runner jobs: the ci image from this project's
# registry (Dockerfile; rebuilt manually via the ci_image job below). The
# image bakes the mise tool tree at /opt/mise and a warm uv wheel cache at
# /opt/uv-cache, so jobs only rebuild .venv against the checkout's lockfile.
# `mise install` stays in each script as the drift self-heal: a no-op while
# the image is current, and when mise.toml has moved past the published image
# it installs just the delta (slower job, loud in the log — the cue to rerun
# ci_image). mise auto-trusts the checkout's mise.toml under CI=true; the
# op:// refs in its [env] resolve to literal strings without `op run`, which
# nothing here reads.
.hosted:
  image: $CI_REGISTRY_IMAGE/ci:latest

# Change detection + dynamic child pipeline (notes/ci_aws_nested_qemu_cells.md). The
# GitHub `detect` -> per-bucket `test` workflows collapse to this single pair:
# `detect` runs the same classification core (mise-tasks/ci/detect.py) and
# writes a generated child pipeline — one job per `role:variant[:ubuntu]` cell,
# each running a role/machine/release cell on the selected qemu target: the
# default `aws_qemu` pool and the `lab` runner both hydrate promoted images from
# S3 (resp. lab's local store) and run the qemu backend directly.
#
# The diff base is the newest fully-green pipeline ancestor, resolved via the
# GitLab pipelines API (detect.py: resolve_green_base_gitlab) — so a red-push ->
# fix sequence retests everything changed since the last green commit, not just
# the fix's own diff. It falls back to the previous branch tip
# (CI_COMMIT_BEFORE_SHA) when no green base resolves. A full-universe trigger
# fires on a cross-cutting path change, a new branch, or a schedule/ROLES=ALL
# dispatch.
#
# Optional CI/CD variable: GITLAB_API_TOKEN (a read_api project access token).
# detect uses the automatic CI_JOB_TOKEN for the pipelines query by default;
# set GITLAB_API_TOKEN only if that token can't list pipelines (the job log
# says "pipelines query failed" / "using previous-tip base"). Either way a
# failure degrades to the previous-tip base, never to a hard error.
detect:
  stage: prepare
  # Runs on the qemu shell pool selected by HOMELAB_CI_TARGET: aws-shell-qemu
  # (the AWS fleeting pool) by default, lab-shell-qemu for a manual lab-target
  # pipeline. It only renders the child YAML -- no qemu, no AWS creds -- but
  # running it on the cell pool boots the first fleeting host here, and the
  # runner's idle_time keeps it warm for the cell matrix that dispatches right
  # after, so detect's render overlaps the cold boot the cells would pay anyway.
  # The tag follows the target via $DETECT_RUNNER_TAG (set per-branch in rules:),
  # so the lab fallback still lands detect on lab's own runner.
  tags:
    - $DETECT_RUNNER_TAG
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
      when: never
    # Image-only push opts out of the qemu matrix; detect only exists to feed
    # test_cells, so skip it too (and don't boot a fleeting host for nothing).
    - if: $SKIP_TEST_CELLS == "true"
      when: never
    # lab target: the manual fallback runs detect on lab's own shell runner,
    # whose mise/uv are the host's own -- so no baked /opt caches here.
    - if: $CI_PIPELINE_SOURCE == "web" && $HOMELAB_CI_TARGET == "lab"
      variables:
        DETECT_RUNNER_TAG: lab-shell-qemu
    - if: $CI_PIPELINE_SOURCE == "web"
      variables:
        DETECT_RUNNER_TAG: aws-shell-qemu
        MISE_DATA_DIR: /opt/mise
        UV_CACHE_DIR: /opt/uv-cache
    - if: $CI_PIPELINE_SOURCE == "push"
      variables:
        DETECT_RUNNER_TAG: aws-shell-qemu
        MISE_DATA_DIR: /opt/mise
        UV_CACHE_DIR: /opt/uv-cache
  variables:
    # detect diffs HEAD against the resolved green base; 50 is deep enough for
    # any realistic push, with a fetch-on-demand fallback in detect.py for a
    # base (green ancestor or previous tip) outside the shallow checkout.
    GIT_DEPTH: "50"
    # Safety-net default; rules: set the per-target tag above.
    DETECT_RUNNER_TAG: aws-shell-qemu
    # The qemu-host AMI bakes the mise tool tree + uv cache at /opt (matching the
    # cell before_script); the aws-target rules point mise/uv there. UV_LINK_MODE
    # copy is needed for that cross-fs cache and harmless on lab.
    # UV_PROJECT_ENVIRONMENT is intentionally omitted so detect builds a per-job
    # .venv from the warm cache on the shell runner.
    UV_LINK_MODE: copy
  timeout: 15m
  script:
    - |
      echo "== detect job environment =="
      printf 'user=%s\n' "$(id)"
      printf 'pwd=%s\n' "$PWD"
      printf 'ci_project_dir=%s\n' "${CI_PROJECT_DIR:-<unset>}"
      printf 'shell=%s\n' "${SHELL:-<unset>}"
      printf 'home=%s\n' "${HOME:-<unset>}"
      printf 'path=%s\n' "${PATH:-<unset>}"
      printf 'runner=%s %s\n' "${CI_RUNNER_DESCRIPTION:-<unset>}" "${CI_RUNNER_EXECUTABLE_ARCH:-<unset>}"
      printf 'homelab_target=%s\n' "${HOMELAB_CI_TARGET:-<unset>}"
      for tool in gitlab-runner mise uv python python3 bash sh; do
        printf '%s=' "$tool"
        command -v "$tool" || true
      done
      gitlab-runner --version || true
      mise --version || true
      uv --version || true
      python --version || python3 --version || true
    - mise install
    # Shell runners do not activate mise shims; `mise exec` exposes the tool
    # tree consistently there while staying harmless inside the CI image.
    - mise exec -- uv sync --locked
    - mise exec -- uv run python mise-tasks/ci/detect.py gitlab --target "$HOMELAB_CI_TARGET"
  artifacts:
    paths:
      - test-child.yml

# Run the generated child pipeline. `strategy: depend` mirrors the child's
# status onto this job, so a failed cell fails the parent pipeline. Always
# runs — GitLab evaluates `rules` at pipeline-creation time, so the runtime
# "are there cells?" decision can't gate it here; instead detect writes a
# single no-op job into the child when nothing is role-relevant (a near-instant
# child pipeline rather than a skipped trigger).
test_cells:
  stage: test
  needs:
    - job: detect
      artifacts: true
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
      when: never
    - if: $SKIP_TEST_CELLS == "true"
      when: never
    - if: $CI_PIPELINE_SOURCE == "web"
    - if: $CI_PIPELINE_SOURCE == "push"
  trigger:
    include:
      - artifact: test-child.yml
        job: detect
    strategy: depend

lint:
  stage: prepare
  extends: .hosted
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
      when: never
    - if: $CI_PIPELINE_SOURCE == "web"
    - if: $CI_PIPELINE_SOURCE == "push"
  # The default (small) hosted runner is 2 vCPU; lint fans its linters out in
  # parallel, so the 4-vCPU medium tier roughly halves the wall-clock.
  tags:
    - saas-linux-medium-amd64
  # ~5 min on a current image; a stale one adds the delta `mise install`.
  # Bound well under the project-level 1h default so a wedged run fails fast.
  timeout: 30m
  variables:
    # ansible-lint runs `ansible-playbook --syntax-check`, which loads
    # vault-encrypted group_vars/host_vars. Restrict ansible to the `test`
    # identity so the prod identity — undecryptable here — isn't attempted;
    # without this, syntax-check of prod playbooks errors out.
    ANSIBLE_VAULT_IDENTITY_LIST: test@vault-client.sh
    # /builds is world-writable on hosted runners, which makes ansible skip
    # ansible.cfg discovery from the cwd; pinning the path bypasses that
    # check so syntax-check runs with the repo config (inventory, vault ids).
    ANSIBLE_CONFIG: $CI_PROJECT_DIR/ansible.cfg
  script:
    - mise install
    - uv sync --locked
    - mise run lint

# Hermetic pytest suite (testpaths=unit_tests). Installs the full tool tree
# even though it only needs python + uv: `mise run` auto-installs whatever is
# missing anyway, so a partial install would just move the rest to task time
# (with noisy resolution warnings).
unit_tests:
  stage: prepare
  extends: .hosted
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
      when: never
    - if: $CI_PIPELINE_SOURCE == "web"
    - if: $CI_PIPELINE_SOURCE == "push"
  timeout: 15m
  script:
    - mise install
    - uv sync --locked
    - mise run test

# Rebuild of the CI container image (the repo Dockerfile), pushed to this
# project's registry as $CI_REGISTRY_IMAGE/ci:<sha> (+ :latest from master).
# Manual-only, mirroring the GitHub ci-image workflow's policy: jobs pin the
# currently published :latest, refreshed deliberately when the toolchain
# changes — not rebuilt under every pipeline. Builds docker-in-docker on a
# hosted runner, so apt resolves upstream (USE_NEXUS_MIRRORS=0) — the nexus
# mirror redirect is only reachable from the lab network.
#
# Optional CI/CD variable: MISE_GITHUB_TOKEN (a no-scope PAT) raises mise's
# GitHub API rate limit during the in-image `mise install`; without it the
# build still works, mounted only as a BuildKit secret either way.
ci_image:
  stage: prepare
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
      when: never
    - when: manual
      # A skipped manual job must not hold the pipeline in "blocked".
      allow_failure: true
  image: docker:28.3.3
  services:
    - docker:28.3.3-dind
  tags:
    - saas-linux-medium-amd64
  # Serialize builds across pipelines (the GH workflow's concurrency group):
  # two concurrent runs would race on the floating :latest push. Don't let
  # auto-cancel kill a build mid-push either — a half-pushed manifest is
  # strictly worse than a delayed run.
  resource_group: ci_image
  interruptible: false
  timeout: 45m
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
    # Warm the layer cache from the published image; BUILDKIT_INLINE_CACHE
    # embeds cache metadata in the pushed image so the next rebuild can do
    # the same. First-ever build has nothing to pull — that's fine.
    - docker pull "$CI_REGISTRY_IMAGE/ci:latest" || true
    - |
      secret_args=""
      if [ -n "${MISE_GITHUB_TOKEN:-}" ]; then
        secret_args="--secret id=mise_github_token,env=MISE_GITHUB_TOKEN"
      fi
      docker build $secret_args \
        --build-arg USE_NEXUS_MIRRORS=0 \
        --build-arg BUILDKIT_INLINE_CACHE=1 \
        --cache-from "$CI_REGISTRY_IMAGE/ci:latest" \
        --tag "$CI_REGISTRY_IMAGE/ci:$CI_COMMIT_SHA" .
    - docker push "$CI_REGISTRY_IMAGE/ci:$CI_COMMIT_SHA"
    # :latest moves only from master, so a branch dispatch can't retarget
    # what other pipelines pin.
    - |
      if [ "$CI_COMMIT_BRANCH" = "$CI_DEFAULT_BRANCH" ]; then
        docker tag "$CI_REGISTRY_IMAGE/ci:$CI_COMMIT_SHA" "$CI_REGISTRY_IMAGE/ci:latest"
        docker push "$CI_REGISTRY_IMAGE/ci:latest"
      fi

# Bake + promote the AWS nested-qemu runner-host AMI. This is the instance
# executor target host, not a guest fixture: it carries gitlab-runner, qemu/KVM
# tooling, the mise/uv tool tree, and readiness scripts. Terraform's ASG launch
# template resolves /homelab-ci/ami/qemu-host/noble.
qemu_host_ami:
  stage: prepare
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
      when: never
    - if: $CI_COMMIT_REF_PROTECTED == "true"
      when: manual
      # A skipped manual job must not hold the pipeline in "blocked".
      allow_failure: true
  tags:
    - fox-docker-aws
  id_tokens:
    GITLAB_OIDC_TOKEN:
      aud: sts.amazonaws.com
  resource_group: ami-qemu-host-noble
  interruptible: false
  timeout: 60m
  script:
    - mise install
    - uv sync --locked
    - mise run packer:init
    - export AWS_WEB_IDENTITY_TOKEN_FILE="$(pwd -P)/.aws_web_identity_token"
    - echo "$GITLAB_OIDC_TOKEN" > "$AWS_WEB_IDENTITY_TOKEN_FILE"
    - export AWS_ROLE_ARN=arn:aws:iam::000390721279:role/homelab-ci-bake
    - export AWS_ROLE_SESSION_NAME="qemu-host-ami-$CI_JOB_ID"
    - mise exec -- aws --region eu-central-1 sts get-caller-identity
    - mise run packer:qemu-host-ami --promote

# Build + promote the box / box_deps nested-qemu guest images the test cells
# boot, one manual job per (image, release). Unlike qemu_host_ami (an EC2 AMI
# bake on fox) these are qemu fixtures that only build under nested KVM, so they
# run on lab's shell runner: packer:build box boots a qemu VM and installs the
# platform; box_deps additionally layers seed_deps.yml (podman/nginx/backports)
# via packer:seed-deps; upload-s3 --promote publishes each bundle to
# s3://homelab-ci-images and writes the promoted.json pointer object the aws_qemu
# cells hydrate. Without these the S3 bundles only refresh from a manual local
# build, so promoted images drift behind role code.
#
# Manual + protected-ref: the bake role trusts master only, and a promote is
# fleet-global the instant it lands -- mitigated because the build verify-boots
# (packer) and converges seed_deps (launch.py) before promoting, S3 versioning
# retains the prior bundle, and upload-s3 prints the rollback line. The
# resource_group is per (machine, release) -- `qemu_image_<machine>_<UBUNTU>`,
# set in each machine template below -- so distinct builds run concurrently:
# every release writes a disjoint HOMELAB_CI_DIR path (${HOMELAB_CI_DIR}/<rel>)
# and writes a disjoint promoted.json object key per (machine, release), so
# there is nothing to race. box_deps:<rel> still lands after box:<rel> via its
# needs edge; the per-(machine,release) group only blocks a re-dispatch of the
# *same* cell from overlapping its own in-flight publish.
.qemu_image:
  stage: prepare
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
      when: never
    - if: $CI_COMMIT_REF_PROTECTED == "true"
      when: manual
      # A skipped manual job must not hold the pipeline in "blocked".
      allow_failure: true
  # lab's shell runner is the KVM builder (the same host the lab qemu target
  # tests on). The build writes HOMELAB_CI_DIR, which doubles as lab's local
  # image store, so a run also refreshes the lab target's images in passing.
  tags:
    - lab-shell-qemu
  id_tokens:
    GITLAB_OIDC_TOKEN:
      aud: sts.amazonaws.com
  # Never auto-cancel mid-build -- a killed run can leave a half-published bundle.
  interruptible: false
  # box ~15m; box_deps adds the seed converge + reboot. Bounded well above a
  # normal run so a wedged qemu boot fails the job rather than riding a default.
  timeout: 90m
  before_script:
    - mise install
    - mise exec -- uv sync --locked
    - mise run packer:init
    # GitLab's id_tokens deliver the OIDC JWT in an env var; the AWS CLI's
    # AssumeRoleWithWebIdentity provider wants a file path. The bake role (master
    # trust) grants the S3 write + promoted.json publish upload-s3 needs.
    - export AWS_WEB_IDENTITY_TOKEN_FILE="$(pwd -P)/.aws_web_identity_token"
    - echo "$GITLAB_OIDC_TOKEN" > "$AWS_WEB_IDENTITY_TOKEN_FILE"
    - export AWS_ROLE_ARN=arn:aws:iam::000390721279:role/homelab-ci-bake
    - export AWS_ROLE_SESSION_NAME="qemu-image-$CI_JOB_ID"
    - mise exec -- aws --region eu-central-1 sts get-caller-identity
    # The build runs on lab and dual-publishes: S3 (for the aws_qemu cells) AND
    # lab's local MinIO mirror (for the lab cells). upload-s3 picks up these env
    # vars and pushes the mirror first, then S3, rolling the mirror back if the S3
    # write fails -- so the two stores never disagree on the promoted build.
    - test -n "${HOMELAB_CI_MINIO_ACCESS_KEY:-}" || { echo "HOMELAB_CI_MINIO_ACCESS_KEY CI/CD variable is not set" >&2; exit 1; }
    - test -n "${HOMELAB_CI_MINIO_SECRET_KEY:-}" || { echo "HOMELAB_CI_MINIO_SECRET_KEY CI/CD variable is not set" >&2; exit 1; }
    - export HOMELAB_CI_MIRROR_ENDPOINT=https://minio-api.lab.fahm.fr
    - export HOMELAB_CI_MIRROR_BUCKET=homelab-ci-images
    - export HOMELAB_CI_MIRROR_ACCESS_KEY="$HOMELAB_CI_MINIO_ACCESS_KEY"
    - export HOMELAB_CI_MIRROR_SECRET_KEY="$HOMELAB_CI_MINIO_SECRET_KEY"

# box: the bare OS + zfs + networking platform every cell needs.
.qemu_image_box:
  extends: .qemu_image
  resource_group: qemu_image_box_$UBUNTU
  script:
    - mise run packer:build box --ubuntu "$UBUNTU"
    - mise run packer:upload-s3 box --ubuntu "$UBUNTU" --promote

# box_deps: box with podman/nginx/backports pre-baked. Layers seed_deps.yml onto
# the box bake from the same pipeline -- each box_deps:<rel> `needs:` its matching
# box:<rel> job and seeds off the artifact box just published to HOMELAB_CI_DIR
# (both jobs land on the one lab-shell-qemu host, where that dir persists). So a
# box_deps run must be preceded by its box job; seed-deps errors loudly with the
# build-box-first hint if the artifact is absent.
.qemu_image_box_deps:
  extends: .qemu_image
  resource_group: qemu_image_box_deps_$UBUNTU
  script:
    - mise run packer:seed-deps --ubuntu "$UBUNTU"
    - mise run packer:upload-s3 box_deps --ubuntu "$UBUNTU" --promote

"qemu_image:box:jammy":
  extends: .qemu_image_box
  variables:
    UBUNTU: jammy

"qemu_image:box:noble":
  extends: .qemu_image_box
  variables:
    UBUNTU: noble

"qemu_image:box:resolute":
  extends: .qemu_image_box
  variables:
    UBUNTU: resolute

# needs the box bake from this pipeline (artifacts ride lab's HOMELAB_CI_DIR, not
# GitLab artifacts -- so artifacts: false). The edge is what orders box_deps after
# box: they now sit in distinct per-(machine,release) resource groups, so the
# needs edge -- not a shared group -- is the sole guarantee box has published
# before seed-deps reads it.
"qemu_image:box_deps:jammy":
  extends: .qemu_image_box_deps
  needs:
    - job: "qemu_image:box:jammy"
      artifacts: false
  variables:
    UBUNTU: jammy

"qemu_image:box_deps:noble":
  extends: .qemu_image_box_deps
  needs:
    - job: "qemu_image:box:noble"
      artifacts: false
  variables:
    UBUNTU: noble

"qemu_image:box_deps:resolute":
  extends: .qemu_image_box_deps
  needs:
    - job: "qemu_image:box:resolute"
      artifacts: false
  variables:
    UBUNTU: resolute

# Semantic cleanup for nested-qemu image bundles in S3. Bucket lifecycle handles
# multipart leftovers and noncurrent versions; this job reads the promoted.json
# pointer object and deletes old immutable build prefixes without touching promoted
# builds. Manual runs are dry-run unless QEMU_IMAGE_REAPER_APPLY=true; schedules
# apply automatically on protected refs.
qemu_image_reaper:
  stage: prepare
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule" && $CI_COMMIT_REF_PROTECTED == "true"
    - if: $CI_COMMIT_REF_PROTECTED == "true"
      when: manual
      # A skipped manual job must not hold the pipeline in "blocked".
      allow_failure: true
  tags:
    - fox-docker-aws
  id_tokens:
    GITLAB_OIDC_TOKEN:
      aud: sts.amazonaws.com
  resource_group: qemu-image-reaper
  interruptible: false
  timeout: 15m
  script:
    - mise install
    - uv sync --locked
    # GitLab's id_tokens deliver the OIDC JWT in an env var; the AWS CLI's
    # AssumeRoleWithWebIdentity provider wants a file path.
    - export AWS_WEB_IDENTITY_TOKEN_FILE="$(pwd -P)/.aws_web_identity_token"
    - echo "$GITLAB_OIDC_TOKEN" > "$AWS_WEB_IDENTITY_TOKEN_FILE"
    - export AWS_ROLE_ARN=arn:aws:iam::000390721279:role/homelab-ci-bake
    - export AWS_ROLE_SESSION_NAME="qemu-image-reaper-$CI_JOB_ID"
    - mise exec -- aws --region eu-central-1 sts get-caller-identity
    - |
      reaper_args=""
      if [ "$CI_PIPELINE_SOURCE" = "schedule" ] || [ "${QEMU_IMAGE_REAPER_APPLY:-}" = "true" ]; then
        reaper_args="--apply"
      fi
      mise run ci:reap-qemu-images $reaper_args

# Same semantic cleanup as qemu_image_reaper, but for the lab MinIO mirror (the
# AWS S3 bucket is reaped by qemu_image_reaper on the fox runner). Runs on lab so
# it can reach minio-api.lab.fahm.fr with static MinIO creds (no OIDC); reap-qemu-
# images targets the mirror via HOMELAB_CI_S3_ENDPOINT and reads the same
# promoted.json pointer both stores carry.
qemu_image_reaper_minio:
  stage: prepare
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule" && $CI_COMMIT_REF_PROTECTED == "true"
    - if: $CI_COMMIT_REF_PROTECTED == "true"
      when: manual
      # A skipped manual job must not hold the pipeline in "blocked".
      allow_failure: true
  tags:
    - lab-shell-qemu
  resource_group: qemu-image-reaper-minio
  interruptible: false
  timeout: 15m
  before_script:
    - mise install
    - mise exec -- uv sync --locked
    - test -n "${HOMELAB_CI_MINIO_ACCESS_KEY:-}" || { echo "HOMELAB_CI_MINIO_ACCESS_KEY CI/CD variable is not set" >&2; exit 1; }
    - test -n "${HOMELAB_CI_MINIO_SECRET_KEY:-}" || { echo "HOMELAB_CI_MINIO_SECRET_KEY CI/CD variable is not set" >&2; exit 1; }
    # MinIO uses static creds, not OIDC; reap-qemu-images reads ambient AWS creds
    # and targets the mirror via HOMELAB_CI_S3_ENDPOINT.
    - export AWS_ACCESS_KEY_ID="$HOMELAB_CI_MINIO_ACCESS_KEY"
    - export AWS_SECRET_ACCESS_KEY="$HOMELAB_CI_MINIO_SECRET_KEY"
    - export AWS_DEFAULT_REGION=eu-central-1
    - export HOMELAB_CI_S3_ENDPOINT=https://minio-api.lab.fahm.fr
  script:
    - |
      reaper_args=""
      if [ "$CI_PIPELINE_SOURCE" = "schedule" ] || [ "${QEMU_IMAGE_REAPER_APPLY:-}" = "true" ]; then
        reaper_args="--apply"
      fi
      mise run ci:reap-qemu-images $reaper_args

# Bake + publish fox's Hetzner Cloud boot image (mechanic 2, qemu/KVM, no AWS).
# `packer:build hetzner` builds the ZFS-root rpool disk in qemu on lab's shell
# runner -- the same KVM host the lab qemu cells test on -- writing the raw image
# into HOMELAB_CI_DIR; `packer:hetzner` then streams that image onto a throwaway
# Hetzner server in rescue mode and snapshots it (pruning all but the 2 newest).
# Both steps land on the one lab-shell-qemu host, so the build dir the upload
# reads persists between them. Manual and protected-ref only; the published
# snapshot is project-global -- terraform's data.hcloud_image selects by
# most_recent, so it silently becomes fox's next boot image on rebuild.
#
# Required CI/CD variable: HCLOUD_TOKEN (masked + protected) — the homelab
# Hetzner project's read/write token: the snapshot must land in the project
# fox lives in (the only Hetzner project since the homelab-ci teardown).
# Exposure is scoped to this protected-ref manual job. No AWS auth: the build is
# local qemu and the publish authenticates to Hetzner with HCLOUD_TOKEN alone.
fox_image:
  stage: prepare
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
      when: never
    - if: $CI_COMMIT_REF_PROTECTED == "true"
      when: manual
      # A skipped manual job must not hold the pipeline in "blocked".
      allow_failure: true
  # lab's shell runner is the KVM builder (the same host the lab qemu cells test
  # on). The qemu build writes HOMELAB_CI_DIR, which packer:hetzner then reads to
  # stream onto the rescue server -- both steps must land on this one host.
  tags:
    - lab-shell-qemu
  # One image pipeline at a time: two runs would race the snapshot family
  # (create_image + prune-to-2-newest) and the shared HOMELAB_CI_DIR build dir;
  # never auto-cancelled — a killed run can orphan the temp Hetzner server.
  resource_group: fox_image
  interruptible: false
  timeout: 90m
  script:
    # Fail before the build, not after it, when the token is missing.
    - test -n "${HCLOUD_TOKEN:-}" || { echo "HCLOUD_TOKEN CI/CD variable is not set" >&2; exit 1; }
    # Same drift self-heal as the qemu image jobs, against the image's /opt/mise.
    - mise install
    - mise exec -- uv sync --locked
    - mise run packer:init
    # fox runs a noble root in prod; the bake stays noble-only. Build the rpool
    # disk in qemu, then stream it onto a Hetzner rescue server and snapshot. The
    # build pulls through lab's Nexus (reachable here); the shipped image points
    # at upstream Ubuntu mirrors regardless, so no --upstream is needed.
    - mise run packer:build hetzner --ubuntu noble
    - mise run packer:hetzner

# Manual rebuild of the custom ZFSBootMenu recovery image (zbm/,
# mise-tasks/zbm/). Heavy (clones ZBM, xbps-installs a Void toolchain, runs
# buildx), so never part of the regular pipeline: dispatch it after bumping
# ZBM_VERSION / the zbm/ overlay, verify the artifacts, then pin the new
# tarball version in roles/zfsbootmenu/vars/main.yml +
# packer/scripts/chroot.sh.
#
# Runs docker-in-docker on a hosted runner: buildx with a docker-container
# builder against the dind service (the upstream Dockerfile needs real
# BuildKit for heredoc RUN blocks); the zbm scripts drive the docker CLI
# throughout — here against dind, on workstations against the podman
# socket's docker-compatible API. The builder layer cache lives in this
# project's container registry (zbm-builder:v<version>-<arch>), pushed back
# under the job token; the tarball publishes to the generic package registry
# from master only (branch dispatches keep the job artifacts).
zbm_build:
  stage: prepare
  extends: .hosted
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
      when: never
    - when: manual
      # A skipped manual job must not hold the pipeline in "blocked".
      allow_failure: true
  services:
    - docker:28.3.3-dind
  # xbps-install + dracut parallelize poorly but the buildx layer pulls and
  # the ~1.5 GB --load benefit from the medium tier's extra cores and IO.
  tags:
    - saas-linux-medium-amd64
  # Serialize across pipelines: concurrent builds would race on the shared
  # registry cache ref; never auto-cancel a build mid cache-push/publish.
  resource_group: zbm_build
  interruptible: false
  timeout: 60m
  variables:
    # The ci image is plain ubuntu — not the docker: image whose entrypoint
    # autodetects dind TLS — so point the CLI at the service explicitly.
    # /certs/client is the volume hosted runners share between the job and
    # service containers.
    DOCKER_TLS_CERTDIR: "/certs"
    DOCKER_HOST: tcp://docker:2376
    DOCKER_TLS_VERIFY: "1"
    DOCKER_CERT_PATH: "/certs/client"
  artifacts:
    expire_in: 30 days
    paths:
      - zbm-build/**/*-bootmenu
      - zbm-build/**/*-bootmenu.img
      - zbm-build/**/zfsbootmenu.EFI
      - zbm-build/**/ssh_host_ed25519_key.pub
      - zbm-build/**/*.tar.gz
      - zbm-build/**/*.sha256sum
  script:
    - mise install
    - uv sync --locked
    # Bounded wait for dind to finish generating its TLS certs and serve.
    - timeout 60 bash -c 'until docker info >/dev/null 2>&1; do sleep 1; done'
    # The default docker driver can't export cache to a registry; a
    # docker-container builder can, and --load imports the result into the
    # dind daemon where the scripts' post-build container runs read it.
    # buildx refuses to create a builder from TLS env vars alone, so wrap
    # the dind endpoint in a named context; plain docker commands keep
    # reading the env.
    - docker context create dind --docker "host=${DOCKER_HOST},ca=${DOCKER_CERT_PATH}/ca.pem,cert=${DOCKER_CERT_PATH}/cert.pem,key=${DOCKER_CERT_PATH}/key.pem"
    - docker buildx create dind --name zbm --driver docker-container --use
    - docker buildx inspect --bootstrap zbm
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
    - |
      set -euo pipefail
      # Resolve through mise, not by parsing mise.toml: these vars are tera
      # conditionals (`{% if arch() == "arm64" %}…`) whose embedded double-quoted
      # arch literals defeat a naive awk -F'"' extraction (it grabs `arm64`).
      eval "$(mise env)"
      [ -n "${ZBM_VERSION:-}" ] && [ -n "${ZBM_KERNEL_VERSION:-}" ] || { echo "ZBM_VERSION/ZBM_KERNEL_VERSION not set in mise env" >&2; exit 1; }
      ARCH="$(uname -m)"
      export ZBM_BUILD_SUFFIX="-ci.${CI_PIPELINE_ID}.${CI_JOB_ID}"
      export ZBM_BUILDER_CACHE_REF="${CI_REGISTRY_IMAGE}/zbm-builder:v${ZBM_VERSION}-${ARCH}"
      echo "Building ZFSBootMenu v${ZBM_VERSION}${ZBM_BUILD_SUFFIX} for ${ARCH}"
      mise run zbm:builder-image
      mise run zbm:build
      # Turn "it ran" into an assertion: the tarball exists and carries the
      # components kernel + initrd and the renamed unified EFI.
      tarball="zbm-build/${ARCH}/zfsbootmenu-v${ZBM_VERSION}-linux${ZBM_KERNEL_VERSION}${ZBM_BUILD_SUFFIX}-${ARCH}.tar.gz"
      test -f "$tarball" || { echo "tarball not produced: $tarball" >&2; exit 1; }
      members="$(tar tzf "$tarball")"
      echo "$members"
      for f in initramfs-bootmenu.img zfsbootmenu.EFI ssh_host_ed25519_key.pub; do
        grep -qxF "$f" <<<"$members" || { echo "missing $f in tarball" >&2; exit 1; }
      done
      grep -qE '^vmlin.*-bootmenu$' <<<"$members" || { echo "missing vmlin*-bootmenu kernel in tarball" >&2; exit 1; }
      echo "ZBM tarball OK: $tarball"
      # Publish via the job token (upload.sh prefers CI_JOB_TOKEN); master
      # only, so a branch dispatch cannot ship a pinnable version.
      if [ "$CI_COMMIT_BRANCH" = "$CI_DEFAULT_BRANCH" ]; then
        mise run zbm:upload
      fi
