[default.extend-words]
# Eclipse Mosquitto (MQTT broker) — project name, not "mosquito"
mosquitto = "mosquitto"
# Samba smb.conf option spellings
browseable = "browseable"
writeable = "writeable"
# bazarr config key (Italian "serie" = series)
serie = "serie"
# Netdata PCI Advanced Error Reporting module name
aer = "aer"
# nftables interface-match keywords (iif/iifname, oif/oifname) — pervasive
# in the firewall role's rules, comments, and verify probes.
iif = "iif"
oif = "oif"
# "mis-" English prefix (mis-issue, mis-classify, mis-read, mis-named, ...)
mis = "mis"
# valid -able variant; appears in fluentbit comments ("unparseable POSTs")
unparseable = "unparseable"
# sabnzbd state file extension (queue.sav)
sav = "sav"
# DMARC failure-reporting tag (fo=1) in the Cloudflare DNS TXT records
fo = "fo"

[default.extend-identifiers]
# Netdata PCI Advanced Error Reporting context
rootport_aer_correctable = "rootport_aer_correctable"
# Hetzner Cloud datacenter location code (Helsinki) for the fox VPS
hel1 = "hel1"
# UPnP — protocol name in the firewall SSDP/M-SEARCH comment
UPnP = "UPnP"

[files]
extend-exclude = [
  # Upstream / vendor config files we ship verbatim
  "roles/sabnzbd/templates/autoProcessMedia.cfg.j2",
  "roles/sabnzbd/templates/sabnzbd.ini.j2",
  "roles/hd_idle/templates/hd-idle.j2",
  "roles/dnscrypt_proxy/files/dnscrypt-proxy.toml",
  "roles/unattended_upgrades/files/50unattended-upgrades",
  "roles/nut_monitor/templates/upsmon.conf.j2",
  "roles/nut_server/files/upsd.conf",
  "roles/nut_server/templates/ups.conf.j2",
  "roles/hdparm/templates/hdparm.conf.j2",
  "roles/refind/files/refind.conf",
  # Files whose only "typos" are substrings of base64/hex secrets, keys, or
  # vendor identifiers the spell-checker has no business tokenizing.
  "roles/user/files/xterm-ghostty.terminfo",            # terminfo capability names (kHOM, kend, ...)
  "group_vars/test.yml",                                # pbkdf2 client_secret hashes
  "group_vars/prod.yml",                                # argon2 password hashes
  "terraform/dns_adrienkohlbecker_com.tf",              # keybase-site-verification TXT token
  "roles/dnscrypt_proxy/templates/dnscrypt-proxy.toml.j2",  # minisign public key
  "roles/macos_vm/tasks/artifacts.yml",                 # Apple Mac board-id (Mac-7BA5...)
]
