# zbm-kcl
install_optional_items+=" /zbm/bin/zbm-kcl "

install_optional_items+=" /etc/zbm-commit-hash "

# French keymap for the early-setup.d/loadkeys-fr.sh hook.
# kbd is installed in the builder image (Dockerfile). Pull loadkeys
# into the initramfs so the ZBM recovery shell is usable on AZERTY
# keyboards. The keymap files are pulled via recovery.conf (they only
# matter when you need the shell interactively).
install_optional_items+=" /usr/bin/loadkeys "

omit_dracutmodules+=" crypt-ssh nfs lunmask "

# kernel modules to allow mounting an ESP
add_drivers+=" fat vfat nls_iso8859_1 nls_cp437 "

# mdadm raid1: lab's ESP is an md/efi RAID1 across 3 NVMe partition-1s.
# Without these, `mdadm --assemble` in the recovery shell fails with
# "module not found". (Individual members are mountable directly since
# metadata=1.0 stores the superblock at the end, but assembling the
# array is needed for writes that must land on all mirrors.)
add_drivers+=" md_mod raid1 "
add_drivers+=" virtio_gpu efifb simplefb "

# qemu drivers
omit_dracutmodules+=" qemu "

# filesystem and other related bits
omit_dracutmodules+=" nvdimm fs-lib rootfs-block dm dmraid crypt "

embedded_kcl="rd.hostonly=0"
zfsbootmenu_release_build=1
