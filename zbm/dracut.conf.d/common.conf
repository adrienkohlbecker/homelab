# zbm-kcl
install_optional_items+=" /zbm/bin/zbm-kcl "

install_optional_items+=" /etc/zbm-commit-hash "

# crypt-ssh is NOT omitted here (upstream omits it): recovery.conf re-adds it
# for the recovery SSH server, and omit takes precedence over add in dracut.
omit_dracutmodules+=" nfs lunmask "

# ZFS kernel modules — force_drivers bypasses the upstream's
# omit_dracutmodules+=" zfs " (which omits the 90zfs dracut module, not the
# .ko) and sidesteps dracut 109 silently skipping instmods without hostonly=''
# in the zfsbootmenu module's installkernel() when building cross-kernel.
force_drivers+=" zfs spl "

# kernel modules to allow mounting an ESP
add_drivers+=" fat vfat nls_iso8859_1 nls_cp437 "
add_drivers+=" virtio_gpu efifb simplefb "

# qemu drivers
omit_dracutmodules+=" qemu "

# filesystem and other related bits
omit_dracutmodules+=" nvdimm fs-lib rootfs-block dm dmraid crypt "

embedded_kcl="rd.hostonly=0"
zfsbootmenu_release_build=1

# Drop device/inode nondeterminism from the initramfs cpio so rebuilds of a
# pinned ZBM_VERSION diff cleanly. This dracut doesn't consult SOURCE_DATE_EPOCH,
# so mtimes still vary — improves determinism but isn't byte-identical.
reproducible=yes

compress=zstd
