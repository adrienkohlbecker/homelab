# --- Dropbear SSH server ---
# Headless recovery: SSH to port 222, then run `zfsbootmenu`. Provided by the
# dracut-crypt-ssh package (installed into the builder image). The crypt-ssh
# module's depends() pulls in the dracut `network` module; we name it
# explicitly for clarity.
#
# Deliberately always-on: dracut brings up the network (rd.neednet, below) and
# crypt-ssh starts dropbear during the unencrypted pre-unlock window of EVERY
# boot, before ZBM decides skip-vs-menu — not only deliberate recovery. That is
# what makes a host whose default (zbm.skip) boot fails recoverable headlessly,
# without console access to pick the menu entry. On a healthy boot the window is
# brief (ZBM kexecs within ~1-2s). Auth is pubkey-only (no password), and a
# missing/empty ACL denies all logins, so the operator's pubkey ACL below is the
# sole access barrier on the LAN segment.
omit_dracutmodules=" ${omit_dracutmodules} "
omit_dracutmodules="${omit_dracutmodules// crypt-ssh / }"
add_dracutmodules+=" crypt-ssh network "
# Match upstream recovery artifacts: include generic hardware support instead
# of pruning modules to the builder container's detected devices.
hostonly=no
dropbear_port=222

# Login is gated on the operator's PUBLIC key (not a secret). The build dir is
# mounted into the upstream source tree used by make-binary.sh. Mirrors ssh_public_keys in
# group_vars/all/main.yml.
dropbear_acl=/zbm/homelab/dropbear/authorized_keys

# Fresh ed25519 host key generated per build — no stable key to pin.
# build.sh generates it into the temporary source tree; crypt-ssh converts the provided
# OpenSSH key to dropbear format via dropbearconvert (which handles ed25519).
dropbear_keytypes="ed25519"
dropbear_ed25519_key=/zbm/homelab/dropbear/ssh_host_ed25519_key

# The kernel cmdline in config.yaml brings up networking so the EFI bundle and
# split components behave the same way under upstream make-binary.sh.

# mdadm raid1: lab's ESP is an md/efi RAID1 across 3 NVMe partition-1s.
# force_drivers (not add_drivers) auto-loads these at boot so `mdadm
# --assemble --scan` works without manual modprobe. We avoid the mdraid
# dracut module because it depends on rootfs-block, which upstream omits.
force_drivers+=" md_mod raid1 "
install_items+=" /usr/bin/mdadm "

# NVMe diagnostics (both hosts boot from NVMe)
install_items+=" /usr/bin/nvme "

# Disk enumeration (util-linux, already in the builder image)
install_items+=" /usr/bin/lsblk /usr/bin/blkid "

# French keymap for the early-setup.d/loadkeys-fr.sh hook.
# kbd ships in upstream's base builder image (provides loadkeys + the keymaps).
install_optional_items+=" /usr/bin/loadkeys "
install_optional_items+=" /usr/share/kbd/keymaps/i386/azerty/fr.map.gz "
