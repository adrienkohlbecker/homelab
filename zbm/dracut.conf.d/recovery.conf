# Headless recovery: SSH to port 222, then run `zfsbootmenu`. This is
# deliberately always-on before ZBM decides skip-vs-menu, so a broken default
# boot remains recoverable without console access. Healthy boots expose
# pubkey-only SSH only briefly before ZBM kexecs.
omit_dracutmodules=" ${omit_dracutmodules} "
omit_dracutmodules="${omit_dracutmodules// crypt-ssh / }"
add_dracutmodules+=" crypt-ssh network "

# Keep generic hardware support instead of pruning to the builder container.
hostonly=no
dropbear_port=222

# Public-key ACL only; missing or empty means no recovery SSH login.
# Mirrors ssh_public_keys in group_vars/all/main.yml.
dropbear_acl=/zbm/homelab/dropbear/authorized_keys

# build.sh generates a fresh ed25519 host key per artifact.
dropbear_keytypes="ed25519"
dropbear_ed25519_key=/zbm/homelab/dropbear/ssh_host_ed25519_key

# lab's ESP is md RAID1 across NVMe disks; force_drivers auto-loads these
# without adding dracut's mdraid module, which depends on omitted rootfs-block.
force_drivers+=" md_mod raid1 "
install_items+=" /usr/bin/mdadm /usr/bin/nvme /usr/bin/lsblk /usr/bin/blkid "

# French keymap for the early-setup.d/loadkeys-fr.sh hook.
install_optional_items+=" /usr/bin/loadkeys /usr/share/kbd/keymaps/i386/azerty/fr.map.gz "
