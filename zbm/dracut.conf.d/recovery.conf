# Disk manipulation
install_optional_items+=" /bin/gdisk /bin/parted /bin/wipefs /bin/kpartx /bin/sgdisk"

# Filesystem creation
install_optional_items+=" /bin/mkfs.vfat /bin/mkfs.ext4 "

# Boot manipulation
install_optional_items+=" /bin/efibootmgr "

# Networking
install_optional_items+=" /bin/ip /bin/curl /bin/dhclient /sbin/dhclient-script /bin/ssh "
add_dracutmodules+=" kernel-network-modules qemu-net "

# SSL bundle for cURL
install_optional_items+=" /etc/ssl/certs/ca-certificates.crt "

# mdadm: lab's ESP is an mdadm RAID1; recovery may need to assemble it.
# Void Linux puts mdadm at /usr/bin/mdadm; cover all common paths.
install_optional_items+=" /usr/bin/mdadm /usr/sbin/mdadm /sbin/mdadm "

# French keymaps for the early-setup.d/loadkeys-fr.sh hook (loadkeys
# binary pulled via common.conf). fr.map.gz is self-contained (no
# includes), but pull the azerty dir for other FR variants too.
install_optional_items+=" /usr/share/kbd/keymaps/i386/azerty/fr.map.gz "
