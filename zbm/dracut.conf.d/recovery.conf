# --- Dropbear SSH server ---
# Headless recovery: SSH to port 222, then run `zfsbootmenu`. Provided by the
# dracut-crypt-ssh package (installed into the builder image). The crypt-ssh
# module's depends() pulls in the dracut `network` module; we name it
# explicitly for clarity.
#
# Deliberately always-on: dracut brings up the network (rd.neednet, below) and
# crypt-ssh starts dropbear during the unencrypted pre-unlock window of EVERY
# boot, before ZBM decides skip-vs-menu — not only deliberate recovery. That is
# what makes a host whose default (zbm.skip) boot fails recoverable headlessly,
# without console access to pick the menu entry. On a healthy boot the window is
# brief (ZBM kexecs within ~1-2s). Auth is pubkey-only (no password), and a
# missing/empty ACL denies all logins, so the operator's pubkey ACL below is the
# sole access barrier on the LAN segment.
add_dracutmodules+=" crypt-ssh network "
dropbear_port=222

# Login is gated on the operator's PUBLIC key (not a secret). The build dir is
# mounted at /build in the container. Mirrors ssh_public_keys in
# group_vars/all/main.yml.
dropbear_acl=/build/dropbear/authorized_keys

# A single stable ed25519 host key, so the recovery server can be pinned in
# known_hosts (real MITM detection) instead of blindly accept-new'd every time.
# build.sh stages the private half from 1Password (op://) at /build/dropbear/
# (gitignored, removed after the build); the public half is committed at
# dropbear/ssh_host_ed25519_key.pub for pinning. crypt-ssh converts the provided
# OpenSSH key to dropbear format via dropbearconvert (which handles ed25519).
dropbear_keytypes="ed25519"
dropbear_ed25519_key=/build/dropbear/ssh_host_ed25519_key

# Bring up the network at boot via DHCP. rd.neednet=1 forces the network module
# to run. This MUST live in /etc/cmdline.d (written by rc.d/10-dropbear-network.sh)
# rather than the EFI bundle's embedded cmdline: a duplicate ip= there makes
# dracut-network fail catastrophically (upstream remote-access docs). install_items
# (not optional): a missing fragment silently leaves the SSH server with no network.
install_items+=" /etc/cmdline.d/dracut-network.conf "

# --- Recovery tools ---
#
# Recovery-critical files use install_items: dracut hard-fails the build if any
# is absent, so a missing tool surfaces on the workstation, not at 11pm on a
# dead host. Paths follow Void's usrmerged layout (/bin,/sbin -> /usr/bin). Tools
# with a graceful fallback (loadkeys -> QWERTY; curl -> -k without the CA bundle)
# stay install_optional_items.

# Disk manipulation
install_items+=" /bin/gdisk /bin/parted /bin/wipefs /bin/kpartx /bin/sgdisk"

# Filesystem creation
install_items+=" /bin/mkfs.vfat /bin/mkfs.ext4 "

# Boot manipulation
install_items+=" /bin/efibootmgr "

# Networking
install_items+=" /bin/ip /bin/curl /bin/dhclient /sbin/dhclient-script /bin/ssh "
add_dracutmodules+=" kernel-network-modules qemu-net "

# SSL bundle for cURL (optional: curl can fall back to -k)
install_optional_items+=" /etc/ssl/certs/ca-certificates.crt "

# mdadm raid1: lab's ESP is an md/efi RAID1 across 3 NVMe partition-1s.
# force_drivers (not add_drivers) auto-loads these at boot so `mdadm
# --assemble --scan` works without manual modprobe. We avoid the mdraid
# dracut module because it depends on rootfs-block (omitted in common.conf).
force_drivers+=" md_mod raid1 "
install_items+=" /usr/bin/mdadm "

# NVMe diagnostics (both hosts boot from NVMe)
install_items+=" /usr/bin/nvme "

# Disk enumeration (util-linux, already in the builder image)
install_items+=" /usr/bin/lsblk /usr/bin/blkid "

# French keymap for the early-setup.d/loadkeys-fr.sh hook.
# kbd ships in upstream's base builder image (provides loadkeys + the keymaps).
install_optional_items+=" /usr/bin/loadkeys "
install_optional_items+=" /usr/share/kbd/keymaps/i386/azerty/fr.map.gz "
