# Dropbear SSH server in the ZBM recovery initramfs, for headless recovery
# when a host won't boot (SSH to port 222, then run `zfsbootmenu`). Provided
# by the dracut-crypt-ssh package (installed into the builder image). The
# crypt-ssh module's depends() pulls in the dracut `network` module; we name
# it explicitly for clarity. dropbear-keygen is our custom module (shipped in
# dracut-modules/, installed by rc.d/20-install-keygen-module.sh) that moves
# host-key generation from build time to boot time.
add_dracutmodules+=" crypt-ssh network dropbear-keygen "

# Login is gated on the operator's PUBLIC key (not a secret). The build dir is
# mounted at /build in the container. Mirrors ssh_public_keys in
# group_vars/all/main.yml.
dropbear_acl=/build/dropbear/authorized_keys

# crypt-ssh still GENERATEs host keys at build (it can't be told not to), but the
# dropbear-keygen module deletes those baked keys and regenerates fresh ones in
# the initramfs at boot — so no host private key ever ships in the image. The
# cost is an SSH host-key-changed warning each boot, fine for a rarely-used
# recovery path (connect with StrictHostKeyChecking=accept-new).
#
# Restrict to rsa+ecdsa: the module builds each host key via
# `ssh-keygen -m PEM`, but ed25519 has no PEM encoding, so its keygen fails and
# the module's install() aborts *after* writing the rsa/ecdsa keys — leaving a
# half-installed module (host keys but no dropbear binary, ACL, or hooks). The
# boot-time regeneration (regen-keys.sh) is constrained to the same key types.
dropbear_keytypes="rsa ecdsa"

# Bring up the network at boot via DHCP. rd.neednet=1 forces the network module
# to run. This MUST live in /etc/cmdline.d (written by rc.d/10-dropbear-network.sh)
# rather than the EFI bundle's embedded cmdline: a duplicate ip=dhcp there makes
# dracut-network fail catastrophically (upstream remote-access docs).
install_optional_items+=" /etc/cmdline.d/dracut-network.conf "
