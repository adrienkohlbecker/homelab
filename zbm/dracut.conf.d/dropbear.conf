# Dropbear SSH server in the ZBM recovery initramfs, for headless recovery
# when a host won't boot (SSH to port 222, then run `zfsbootmenu`). Provided
# by the dracut-crypt-ssh package (installed into the builder image). The
# crypt-ssh module's depends() pulls in the dracut `network` module; we name
# it explicitly for clarity.
add_dracutmodules+=" crypt-ssh network "

# Login is gated on the operator's PUBLIC key (not a secret). The build dir is
# mounted at /build in the container. Mirrors ssh_public_keys in
# group_vars/all/main.yml.
dropbear_acl=/build/dropbear/authorized_keys

# A single stable ed25519 host key, so the recovery server can be pinned in
# known_hosts (real MITM detection) instead of blindly accept-new'd every time.
# build.sh stages the private half from 1Password (op://) at /build/dropbear/
# (gitignored, shredded after the build); the public half is committed at
# dropbear/ssh_host_ed25519_key.pub for pinning. crypt-ssh converts the provided
# OpenSSH key to dropbear format via dropbearconvert (which handles ed25519 fine
# — the earlier ed25519 failures were ssh-keygen's PEM path, not conversion).
dropbear_keytypes="ed25519"
dropbear_ed25519_key=/build/dropbear/ssh_host_ed25519_key

# Bring up the network at boot via DHCP. rd.neednet=1 forces the network module
# to run. This MUST live in /etc/cmdline.d (written by rc.d/10-dropbear-network.sh)
# rather than the EFI bundle's embedded cmdline: a duplicate ip=dhcp there makes
# dracut-network fail catastrophically (upstream remote-access docs).
install_optional_items+=" /etc/cmdline.d/dracut-network.conf "
