---
# selene std for the fluent-bit Lua filter environment (extends lua51).
# Declares the four filter entry-point functions as globals so selene doesn't
# flag them as unused (fluent-bit invokes them by name from C via the `call`
# config key) and so the dofile()-based unit tests can reference them.
# Referenced by lint/selene.toml as `std = "lua51+fluentbit"`.
base: lua51
name: fluentbit
globals:
  # Signature: (tag, timestamp, group, metadata, record). All `any` -- selene
  # only needs to know the names exist and are callable.
  set_priority:
    args:
      - type: any
      - type: any
      - type: any
      - type: any
      - type: any
  shape_otlp:
    args:
      - type: any
      - type: any
      - type: any
      - type: any
      - type: any
  flatten_csp:
    args:
      - type: any
      - type: any
      - type: any
      - type: any
      - type: any
