# Bake the heavy cross-cutting test deps (podman + noble backports,
# nginx + snakeoil certs) into the box_deps variant image so role
# tests that opt in via roles/<role>/meta/test.yml skip the ~140s of
# backports-upgrade + ~50s of podman+nginx install every _setup.yml
# hook pays today. Invoked by qemu.pkr.hcl's seed-deps post-processor,
# which boots the freshly-built image, runs this playbook against it,
# and shuts it down cleanly so the shipped artifacts carry the deps.
- name: Bake homelab test deps into the box_deps variant image
  hosts: all
  become: true
  tasks:
    # On jammy the HWE meta pulls noble's 6.8 kernel + matching modules.
    # 6.8 supports native idmapped overlay mounts, which the +0:N:1
    # fake-root uidmap pattern (healthchecks/openproject/…) needs; jammy's
    # stock 5.15 lacks it. Noble+ ships a 6.x GA already, so the
    # linux-generic-hwe-24.04 etc. metas don't exist and `when:` keeps
    # apt from failing on them. The role also creates an empty `power`
    # group to silence thermald's dbus policy warnings.
    - name: Install HWE kernel (jammy only)
      import_role:
        name: hwe_kernel
      when: ansible_distribution_release == "jammy"

    # Boot into the freshly-installed 6.8 BEFORE podman touches storage.
    # Initializing the overlay store on 5.15 (no native idmapped mounts)
    # makes the podman role write mount_program=fuse-overlayfs and bakes a
    # `.has-mount-program=true` marker + fuse-laid layers into the ext4
    # graphroot. That state rides the image into every box_deps test boot
    # (now on 6.8), where podman can no longer use native idmapped mounts
    # and falls back to storage-chown-by-maps -- which EIOs lchowning the
    # device nodes (dev/console) baked into linuxserver/* layers, failing
    # the container start with status 125. Booting 6.8 first lets the store
    # initialize natively (.has-mount-program=false), exactly as prod
    # (lab/pug) does. ZBM selects the new 6.8 (newest) on the reboot; the
    # qemu hostfwd survives a guest reboot so ansible reconnects.
    - name: Reboot into the HWE kernel before initializing podman storage
      reboot:
      when: ansible_distribution_release == "jammy"

    # The reboot module doesn't refresh facts, so ansible_facts.kernel
    # would still read 5.15 and the podman role's storage.conf gate
    # (mount_program when kernel < 5.19) would re-add fuse. Re-gather so it
    # sees 6.8 and renders the native, prod-equivalent storage.conf.
    - name: Re-gather facts so the kernel version reflects the HWE reboot
      setup:
      when: ansible_distribution_release == "jammy"

    - name: Install podman + noble-backported runtime
      import_role:
        name: podman
        tasks_from: install

    - name: Install nginx + snakeoil cert at letsencrypt paths
      import_role:
        name: _test
        tasks_from: nginx
