# Bake the heavy cross-cutting test deps (podman + noble backports,
# nginx + snakeoil certs) into the box_deps variant image so role
# tests that opt in via roles/<role>/meta/test.yml skip the ~140s of
# backports-upgrade + ~50s of podman+nginx install every _setup.yml
# hook pays today. Invoked by qemu.pkr.hcl's seed-deps post-processor,
# which boots the freshly-built image, runs this playbook against it,
# and shuts it down cleanly so the shipped artifacts carry the deps.
- name: Bake homelab test deps into the box_deps variant image
  hosts: all
  become: true
  tasks:
    # This seed runs outside site.yml, so it never gets the apt role's
    # mirror rewrite that every normal converge does first. The packer
    # image ships /etc/apt/sources.list pointing at upstream
    # archive.ubuntu.com; the build VM reaches that on a fresh boot, but
    # loses external egress through its nested SLIRP-over-slirp4netns NAT
    # after the in-guest reboot below (lab-internal Nexus stays reachable).
    # Point apt at the Nexus mirror up front so neither the HWE install nor
    # the post-reboot podman/backports step depends on external
    # connectivity. The qemu image has no cloud-init, so the rewritten
    # sources.list survives the reboot.
    - name: Configure apt to use the Nexus mirror
      import_role:
        name: apt

    # On jammy the HWE meta pulls noble's 6.8 kernel + matching modules.
    # 6.8 supports native idmapped overlay mounts, which the +0:N:1
    # fake-root uidmap pattern (authelia/openproject/…) needs and
    # jammy's stock 5.15 lacks. Noble+ ships a 6.x GA already, so the
    # linux-generic-hwe-24.04 etc. metas don't exist and `when:` keeps
    # apt from failing on them. The role also creates an empty `power`
    # group to silence thermald's dbus policy warnings.
    - name: Install HWE kernel (jammy only)
      import_role:
        name: hwe_kernel
      when: ansible_distribution_release == "jammy"

    - name: Install podman + noble-backported runtime
      import_role:
        name: podman
        tasks_from: install

    - name: Install nginx + snakeoil cert at letsencrypt paths
      import_role:
        name: test
        tasks_from: nginx

    # Everything above wrote its apt sources through the lab Nexus: test
    # hosts set nexus_url, and the bake needs Nexus because external egress
    # dies after the in-guest reboot. That bakes lab-only URLs
    # (nexus.lab.fahm.fr -> 10.123.0.2) into the shipped fixture, which the
    # AWS nested-qemu cells can't route to -- so a cell's first strict
    # `apt-get update --error-on=any` fails before any converge can rewrite
    # them. Reset every apt source back to plain upstream here so box_deps
    # matches the portable `box` baseline; the first converge re-points them
    # at Nexus-or-regional as the running backend dictates. nexus_url='' +
    # test_in_aws=false force ubuntu_mirror's upstream archive.ubuntu.com
    # branch, and apt_skip_refresh keeps the rewrite network-free (no egress
    # left). roles/apt handles the per-release shape (jammy legacy
    # sources.list vs noble deb822); the noble-on-jammy backports sources
    # are owned by the backports helper, so re-render that file too.
    - name: Reset baked apt sources to upstream (portable box_deps fixture)
      vars:
        nexus_url: ""
        test_in_aws: false
      block:
        - name: Re-render apt sources at upstream (network-free)
          import_role:
            name: apt
          vars:
            apt_skip_refresh: true

        - name: Re-render noble backports sources at upstream (jammy)
          import_role:
            name: backports
            tasks_from: reset_sources
