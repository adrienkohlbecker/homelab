# Bake the heavy cross-cutting test deps (podman + noble backports,
# nginx + snakeoil certs) into the box_deps variant image so role
# tests that opt in via roles/<role>/meta/test.yml skip the ~140s of
# backports-upgrade + ~50s of podman+nginx install every _setup.yml
# hook pays today. Invoked by qemu.pkr.hcl's seed-deps post-processor,
# which boots the freshly-built image, runs this playbook against it,
# and shuts it down cleanly so the shipped artifacts carry the deps.
- name: Bake homelab test deps into the box_deps variant image
  hosts: all
  become: true
  tasks:
    # On jammy the HWE meta pulls noble's 6.8 kernel + matching modules.
    # box_deps test boots pick that 6.8 (newest); 6.8 supports native
    # idmapped overlay mounts, which the +0:N:1 fake-root uidmap pattern
    # (healthchecks/openproject/…) needs and jammy's stock 5.15 lacks.
    # Noble+ ships a 6.x GA already, so the linux-generic-hwe-24.04 etc.
    # metas don't exist and `when:` keeps apt from failing on them. The
    # role also creates an empty `power` group to silence thermald's dbus
    # policy warnings.
    - name: Install HWE kernel (jammy only)
      import_role:
        name: hwe_kernel
      when: ansible_distribution_release == "jammy"

    - name: Install podman + noble-backported runtime
      import_role:
        name: podman
        tasks_from: install

    - name: Install nginx + snakeoil cert at letsencrypt paths
      import_role:
        name: _test
        tasks_from: nginx

    # This seed runs on jammy's stock 5.15 (HWE 6.8 is installed above but
    # only takes effect on the next boot). podman's `install` therefore
    # initialized the overlay store under 5.15 -- no native idmapped mounts,
    # so it wrote mount_program=fuse-overlayfs and baked a
    # `.has-mount-program=true` marker plus fuse-laid layers into the ext4
    # graphroot. That state would ride the image into every box_deps test
    # boot (which comes up on 6.8), where podman can no longer use native
    # idmapped mounts on a fuse-initialized store and falls back to
    # storage-chown-by-maps -- which EIOs lchowning the device nodes
    # (dev/console) baked into linuxserver/* layers, failing the container
    # start with status 125. Wipe the store so the box_deps test boot
    # re-initializes it natively on 6.8 (.has-mount-program=false), exactly
    # as prod (lab/pug) does. The podman package + config stay baked (the
    # install time box_deps exists to save); only the empty graphroot is
    # reset. A reboot-into-6.8-first approach is cleaner in theory but
    # cloud-init rewrites /etc/apt/sources.list off the Nexus mirror on the
    # reboot, breaking the next apt step.
    - name: Reset the podman store initialized under the stock 5.15 kernel (jammy)
      command: podman system reset --force
      changed_when: true
      when: ansible_distribution_release == "jammy"
