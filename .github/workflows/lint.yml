name: lint
# Reusable + directly dispatchable; ci.yml calls this via `uses:` so it
# runs nested in the one per-push run (in parallel with detect/packer).
# No `push:` trigger -- ci.yml owns the push path.
#
# Also the home for the pytest unit suite (`mise run test`): it's a cheap,
# stateless, container-only check just like lint -- no qemu, so it has no
# place in test.yml's role/VM matrix -- and folding it in here reuses the
# warm `uv sync` and a single self-hosted runner slot.
on:
  workflow_call:
  workflow_dispatch:

# Lint is cheap, stateless, and only the latest commit's status matters --
# cancel-in-progress on pushes to the same ref so a rapid follow-up push
# doesn't leave the older lint queued. Kept as the callee's own group so
# lint self-cancels per-ref even though the ci.yml caller isn't grouped
# (and so a rapid push can't cancel an in-flight packer build).
concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  lint:
    runs-on: [ self-hosted, lab ]
    container:
      image: nexus.lab.fahm.fr/homelab/ci:latest
    env:
      # ansible-lint runs `ansible-playbook --syntax-check`, which loads
      # vault-encrypted group_vars/host_vars. Restrict ansible to the
      # `test` identity (its password is a CI-available repo secret) so
      # the prod identity -- whose password is never in CI by design --
      # isn't attempted; without this, syntax-check of prod playbooks
      # (bunk.yml, site.yml's prod hosts) errors on undecryptable vars.
      # Mirrors the test-role job's vault env.
      HOMELAB_VAULT_PASSWORD_TEST: ${{ secrets.HOMELAB_VAULT_PASSWORD_TEST }}
      ANSIBLE_VAULT_IDENTITY_LIST: test@vault-client.sh
    steps:
      - uses: actions/checkout@v6
      # mise + uv + the resolved tool dir (ansible-lint, black, ruff,
      # tflint, shellcheck, shfmt, ...) are baked into the ci image.
      # `uv sync` rebuilds .venv against this checkout's lockfile (fast --
      # uv's wheel cache is pre-warmed in the image).
      - run: uv sync --locked
      - run: mise run lint
      # Hermetic git/passlib unit tests (testpaths=test/unit). pytest is a
      # locked project dep, so `uv sync` above already installed it.
      - run: mise run test
