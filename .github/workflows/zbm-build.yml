name: zbm-build
# Build the custom ZFSBootMenu recovery image. ci.yml calls this via `uses:`
# gated on detect's zbm_changed (any push touching zbm/ or mise-tasks/zbm/);
# it's also workflow_dispatch-able.
#
# Every build gets a version suffix with the run ID (e.g. v3.1.0-ci.12345)
# embedded in both the initramfs and the tarball filename. Artifacts always go
# to GitHub; Nexus upload is master-only.
on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

# Heavy build (clones ZBM, xbps-installs a Void toolchain, runs buildx); serialize
# per ref so rapid pushes don't race on podman's image store / the buildx builder.
# cancel-in-progress=false: a half-built image is worse than a delayed run.
concurrency:
  group: lab-zbm-${{ github.ref }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    # Bare on the lab runner (no `container:`) like ci-image: the build needs
    # `docker buildx` talking to the runner's rootless podman, which only exists
    # on the host. The github_runner service exports DOCKER_HOST=<rootless podman
    # socket> and the docker_client role installs docker-ce-cli + the buildx
    # plugin fleet-wide, so the CLI and socket are already in place here.
    runs-on: [ self-hosted, lab ]
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
        with:
          # Shallow: the scripts read the working tree only. persist-credentials
          # =false keeps GITHUB_TOKEN out of .git/config on the shared runner.
          fetch-depth: 1
          persist-credentials: false

      # builder-image.sh runs `docker buildx build` against the upstream
      # Dockerfile (BuildKit heredocs buildah can't parse natively). BuildKit
      # can't run as a container nested in the runner's rootless podman, so the
      # github_runner role runs a standalone rootless buildkitd (rootlesskit) as
      # a user service; point a buildx `remote` builder at its socket. The build
      # runs in that buildkitd (executor works, not nested); `--load` still
      # targets DOCKER_HOST (the runner's rootless podman) -- the same store
      # build.sh's `podman run` reads. Drop any stale builders from earlier
      # docker-container attempts so they can't be reused.
      - name: Use the rootless buildkitd builder
        run: |
          set -euo pipefail
          echo "DOCKER_HOST=${DOCKER_HOST:-<unset>}"
          sock="unix:///run/user/$(id -u)/buildkit/buildkitd.sock"
          docker buildx rm zbm >/dev/null 2>&1 || true
          docker buildx rm zbm-rootless >/dev/null 2>&1 || true
          docker buildx inspect zbm-remote >/dev/null 2>&1 \
            || docker buildx create --name zbm-remote --driver remote "$sock"
          docker buildx use zbm-remote
          docker buildx inspect zbm-remote

      # No mise on the bare runner (it lives in the CI container, which has no
      # podman socket). The two scripts are plain bash needing only MISE_CONFIG_ROOT
      # + ZBM_VERSION exported and otherwise system tools (git/docker/tar/...),
      # so invoke them directly. ZBM_VERSION is mise.toml's single source of truth.
      # ZBM_BUILD_SUFFIX embeds the run ID in the initramfs version string and
      # tarball filename so CI artifacts are distinguishable.
      - name: Build the ZBM image + tarball
        env:
          NEXUS_USERNAME: ${{ secrets.NEXUS_USERNAME }}
          NEXUS_PASSWORD: ${{ secrets.NEXUS_PASSWORD }}
          # Per-run auth file (not the shared ~/.config auth.json) so a sibling
          # job on this runner can't read the creds mid-push.
          REGISTRY_AUTH_FILE: ${{ runner.temp }}/zbm-nexus-auth.json
        run: |
          set -euo pipefail
          trap 'rm -f "$REGISTRY_AUTH_FILE"' EXIT
          MISE_CONFIG_ROOT="$GITHUB_WORKSPACE"
          ZBM_VERSION="$(awk -F'"' '/^ZBM_VERSION/{print $2; exit}' mise.toml)"
          [ -n "$ZBM_VERSION" ] || { echo "could not read ZBM_VERSION from mise.toml" >&2; exit 1; }
          arch="$(uname -m | sed -e s/arm64/aarch64/ -e s/amd64/x86_64/)"
          ZBM_BUILD_SUFFIX="-ci.${{ github.run_id }}"
          export MISE_CONFIG_ROOT ZBM_VERSION ZBM_BUILD_SUFFIX
          echo "Building ZFSBootMenu v${ZBM_VERSION}${ZBM_BUILD_SUFFIX} for ${arch}"
          # Registry-backed build cache in the on-lab Nexus homelab docker repo.
          # builder-image.sh defaults the cache ref (its --cache-from pull is
          # best-effort, so it always runs); we only have to authorize the
          # push-back. Log in (per-run auth file) and set ZBM_BUILDER_CACHE_PUSH
          # so the freshly built image seeds the cache. Without creds (e.g.
          # before the secret is provisioned) we skip the push but still benefit
          # from any cached layers.
          if [ -n "${NEXUS_USERNAME:-}" ] && [ -n "${NEXUS_PASSWORD:-}" ]; then
            rm -f "$REGISTRY_AUTH_FILE"
            printf '%s' "$NEXUS_PASSWORD" | podman login nexus.lab.fahm.fr --username "$NEXUS_USERNAME" --password-stdin
            unset NEXUS_PASSWORD
            export ZBM_BUILDER_CACHE_PUSH=1
          else
            echo "NEXUS_USERNAME/PASSWORD not set; building without pushing to the registry cache"
          fi
          ./mise-tasks/zbm/builder-image.sh
          ./mise-tasks/zbm/build.sh

      # Turn "it ran" into an assertion: the tarball exists and carries the
      # Components kernel + initrd and the renamed unified EFI.
      - name: Verify the tarball contents
        run: |
          set -euo pipefail
          arch="$(uname -m | sed -e s/arm64/aarch64/ -e s/amd64/x86_64/)"
          ZBM_VERSION="$(awk -F'"' '/^ZBM_VERSION/{print $2; exit}' mise.toml)"
          ZBM_BUILD_SUFFIX="-ci.${{ github.run_id }}"
          tarball="${GITHUB_WORKSPACE}/zbm-build/${arch}/zfsbootmenu-v${ZBM_VERSION}${ZBM_BUILD_SUFFIX}-${arch}.tar.gz"
          test -f "$tarball" || { echo "tarball not produced: $tarball" >&2; exit 1; }
          members="$(tar tzf "$tarball")"
          echo "$members"
          for f in initramfs-bootmenu.img zfsbootmenu.EFI; do
            grep -qxF "$f" <<<"$members" || { echo "missing $f in tarball" >&2; exit 1; }
          done
          grep -qE '^vmlin.*-bootmenu$' <<<"$members" || { echo "missing vmlin*-bootmenu kernel in tarball" >&2; exit 1; }
          echo "ZBM tarball OK: $tarball"

      - name: Upload artifacts to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: zfsbootmenu-${{ github.run_id }}
          path: |
            zbm-build/**/zfsbootmenu-v*.tar.gz
            zbm-build/**/zfsbootmenu-v*.tar.gz.sha256sum

      # Push the CI build to the private on-lab Nexus raw repo (zbm). Stable
      # per-(version,arch) path, overwritten each run (repo write_policy=ALLOW).
      # Only on master — branch builds go to GitHub artifacts only. Skips
      # gracefully if the NEXUS_ZBM_* secrets aren't provisioned yet (terraform
      # apply pending) so the build still passes.
      - name: Upload the built tarball to Nexus
        if: github.ref == 'refs/heads/master'
        env:
          NEXUS_ZBM_USERNAME: ${{ secrets.NEXUS_ZBM_USERNAME }}
          NEXUS_ZBM_PASSWORD: ${{ secrets.NEXUS_ZBM_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${NEXUS_ZBM_USERNAME:-}" ]; then
            echo "NEXUS_ZBM_* not set; skipping Nexus upload (run 'mise run tf apply' to provision the zbm repo + creds)"
            exit 0
          fi
          arch="$(uname -m | sed -e s/arm64/aarch64/ -e s/amd64/x86_64/)"
          ZBM_VERSION="$(awk -F'"' '/^ZBM_VERSION/{print $2; exit}' mise.toml)"
          ZBM_BUILD_SUFFIX="-ci.${{ github.run_id }}"
          tarball="${GITHUB_WORKSPACE}/zbm-build/${arch}/zfsbootmenu-v${ZBM_VERSION}${ZBM_BUILD_SUFFIX}-${arch}.tar.gz"
          sha256sum="${tarball}.sha256sum"
          dest_base="https://nexus.lab.fahm.fr/repository/zbm"
          for file in "$tarball" "$sha256sum"; do
            name="$(basename "$file")"
            curl --fail-with-body -sS --user "${NEXUS_ZBM_USERNAME}:${NEXUS_ZBM_PASSWORD}" \
              --upload-file "$file" "${dest_base}/${name}"
            echo "uploaded ${name}"
          done
