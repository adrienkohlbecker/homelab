name: zbm-build
# Manual build of the custom ZFSBootMenu recovery image.
#
# Every build gets a version suffix with the run ID (e.g. v3.0.1-ci.12345.1)
# embedded in both the initramfs and the tarball filename. Artifacts always go
# to GitHub; Nexus upload is master-only.
on:
  workflow_dispatch:

permissions:
  contents: read

# Heavy build (clones ZBM, xbps-installs a Void toolchain, runs buildx); serialize
# per ref so rapid pushes don't race on podman's image store / the buildx builder.
# cancel-in-progress=false: a half-built image is worse than a delayed run.
concurrency:
  group: lab-zbm-${{ github.ref }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    # Bare on the lab runner (no `container:`) like ci-image: the build needs
    # `docker buildx` talking to the runner's rootless podman, which only exists
    # on the host. The github_runner service exports DOCKER_HOST=<rootless podman
    # socket> and the docker_client role installs docker-ce-cli + the buildx
    # plugin fleet-wide, so the CLI and socket are already in place here.
    runs-on: [ self-hosted, lab ]
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
        with:
          # Shallow: the scripts read the working tree only. persist-credentials
          # =false keeps GITHUB_TOKEN out of .git/config on the shared runner.
          fetch-depth: 1
          persist-credentials: false
      - run: mise exec -- uv sync --locked

      - name: Set build variables
        run: |
          set -euo pipefail
          ZBM_VERSION="$(awk -F'"' '/^ZBM_VERSION/{print $2; exit}' mise.toml)"
          [ -n "$ZBM_VERSION" ] || { echo "could not read ZBM_VERSION from mise.toml" >&2; exit 1; }
          ZBM_KERNEL_VERSION="$(awk -F'"' '/^ZBM_KERNEL_VERSION/{print $2; exit}' mise.toml)"
          [ -n "$ZBM_KERNEL_VERSION" ] || { echo "could not read ZBM_KERNEL_VERSION from mise.toml" >&2; exit 1; }
          {
            echo "ZBM_VERSION=${ZBM_VERSION}"
            echo "ZBM_KERNEL_VERSION=${ZBM_KERNEL_VERSION}"
            echo "ZBM_BUILD_SUFFIX=-ci.${{ github.run_id }}.${{ github.run_attempt }}"
            echo "ARCH=$(uname -m | sed -e s/arm64/aarch64/ -e s/amd64/x86_64/)"
          } >> "$GITHUB_ENV"

      # builder-image.sh runs `docker buildx build` against the upstream
      # Dockerfile (BuildKit heredocs buildah can't parse natively). BuildKit
      # can't run as a container nested in the runner's rootless podman, so the
      # github_runner role runs a standalone rootless buildkitd (rootlesskit) as
      # a user service; point a buildx `remote` builder at its socket. The build
      # runs in that buildkitd (executor works, not nested); `--load` still
      # targets DOCKER_HOST (the runner's rootless podman) -- the same store
      # build.sh's `podman run` reads. Drop any stale builders from earlier
      # docker-container attempts so they can't be reused.
      - name: Set up per-run Docker config dir
        run: |
          set -euo pipefail
          # Isolate all docker/buildx state (builder registration, docker login
          # credentials) in a per-run temp dir so concurrent jobs on the same
          # runner don't share ~/.docker/. Must be created before the buildx and
          # build steps so both write and read the same DOCKER_CONFIG.
          DOCKER_CONFIG=$(mktemp -d -p "${RUNNER_TEMP:-/tmp}" zbm-docker-config.XXXXXX)
          echo "DOCKER_CONFIG=$DOCKER_CONFIG" >> "$GITHUB_ENV"

      - name: Use the rootless buildkitd builder
        run: |
          set -euo pipefail
          echo "DOCKER_HOST=${DOCKER_HOST:-<unset>}"
          sock="unix:///run/user/$(id -u)/buildkit/buildkitd.sock"
          # Scope the builder name to the run ID so concurrent pushes to different
          # branches don't race on the shared lab runner: the concurrency group only
          # serializes per-ref, but two refs can run simultaneously. Without a
          # run-scoped name, A rm-then-creates "zbm-remote" while B does the same
          # -- A's builder is deleted mid-build. Each job manages its own instance.
          builder_name="zbm-remote-${{ github.run_id }}"
          docker buildx rm zbm >/dev/null 2>&1 || true
          docker buildx rm zbm-rootless >/dev/null 2>&1 || true
          # Unconditional rm + create: if zbm-remote exists but buildkitd is
          # temporarily down (e.g. right after a runner reboot), inspect
          # --bootstrap exits non-zero and the || create fails because the name
          # already exists. rm-then-create is simpler and equally safe -- the
          # buildx config is just a pointer to the socket; build cache lives in
          # buildkitd storage and is unaffected.
          docker buildx rm zbm-remote >/dev/null 2>&1 || true
          docker buildx rm "$builder_name" >/dev/null 2>&1 || true
          docker buildx create --name "$builder_name" --driver remote "$sock"
          docker buildx use "$builder_name"
          # --bootstrap dials the remote socket to verify buildkitd is actually
          # serving before the 30-min build starts; without it, inspect only reads
          # local config and a down daemon surfaces as a confusing error 30 minutes
          # into the builder-image step.
          docker buildx inspect --bootstrap "$builder_name"
          echo "BUILDX_BUILDER=$builder_name" >> "$GITHUB_ENV"

      # mise is installed on the bare runner (github_runner role). ZBM_VERSION and
      # ZBM_BUILD_SUFFIX come from the "Set build variables" step above; MISE_CONFIG_ROOT
      # is set automatically by mise to the repo root (location of mise.toml).
      - name: Build the ZBM image + tarball
        env:
          NEXUS_USERNAME: ${{ secrets.NEXUS_USERNAME }}
          NEXUS_PASSWORD: ${{ secrets.NEXUS_PASSWORD }}
        run: |
          set -euo pipefail
          # Explicit cache ref so the workstation default (empty) doesn't
          # accidentally inherit a LAN-only Nexus URL in a future mis-invoke.
          export ZBM_BUILDER_CACHE_REF="nexus.lab.fahm.fr/homelab/zbm-builder:v${ZBM_VERSION}-${ARCH}"
          echo "Building ZFSBootMenu v${ZBM_VERSION}${ZBM_BUILD_SUFFIX} for ${ARCH}"
          # Registry-backed build cache in the on-lab Nexus homelab docker repo.
          # builder-image.sh uses ZBM_BUILDER_CACHE_REF (--cache-from pull is
          # best-effort, so it always runs); we only have to authorize the
          # push-back. builder-image.sh gates the --cache-to on $CI.
          # Without creds (e.g. before the secret is provisioned) we skip the
          # push but still benefit from any cached layers.
          if [ -n "${NEXUS_USERNAME:-}" ] && [ -n "${NEXUS_PASSWORD:-}" ]; then
            printf '%s' "$NEXUS_PASSWORD" | docker login nexus.lab.fahm.fr --username "$NEXUS_USERNAME" --password-stdin
            unset NEXUS_PASSWORD
          else
            echo "NEXUS_USERNAME/PASSWORD not set; building without pushing to the registry cache"
          fi
          mise run zbm:builder-image
          mise run zbm:build

      - name: Upload artifacts to GitHub
        uses: actions/upload-artifact@v7
        with:
          name: zfsbootmenu-${{ github.run_id }}-${{ github.run_attempt }}
          if-no-files-found: error
          retention-days: 30
          path: |
            zbm-build/**/*-bootmenu
            zbm-build/**/*-bootmenu.img
            zbm-build/**/zfsbootmenu.EFI
            zbm-build/**/ssh_host_ed25519_key.pub
            zbm-build/**/*.tar.gz
            zbm-build/**/*.sha256sum

      # Turn "it ran" into an assertion: the tarball exists and carries the
      # Components kernel + initrd and the renamed unified EFI.
      - name: Verify the tarball contents
        run: |
          set -euo pipefail
          tarball="${GITHUB_WORKSPACE}/zbm-build/${ARCH}/zfsbootmenu-v${ZBM_VERSION}-linux${ZBM_KERNEL_VERSION}${ZBM_BUILD_SUFFIX}-${ARCH}.tar.gz"
          test -f "$tarball" || { echo "tarball not produced: $tarball" >&2; exit 1; }
          members="$(tar tzf "$tarball")"
          echo "$members"
          for f in initramfs-bootmenu.img zfsbootmenu.EFI ssh_host_ed25519_key.pub; do
            grep -qxF "$f" <<<"$members" || { echo "missing $f in tarball" >&2; exit 1; }
          done
          grep -qE '^vmlin.*-bootmenu$' <<<"$members" || { echo "missing vmlin*-bootmenu kernel in tarball" >&2; exit 1; }
          echo "ZBM tarball OK: $tarball"

      # Push the CI build to the private on-lab Nexus raw repo (zbm). Each run
      # creates a new per-(version,suffix,arch) file (write_policy=ALLOW).
      # Only on master — branch builds go to GitHub artifacts only. upload.sh
      # skips gracefully if NEXUS_ZBM_* aren't provisioned yet (terraform apply
      # pending) so the build still passes.
      - name: Upload the built tarball to Nexus
        if: github.ref == 'refs/heads/master'
        env:
          NEXUS_ZBM_USERNAME: ${{ secrets.NEXUS_ZBM_USERNAME }}
          NEXUS_ZBM_PASSWORD: ${{ secrets.NEXUS_ZBM_PASSWORD }}
        run: mise run zbm:upload

      - name: Remove buildx builder
        if: always()
        run: |
          docker buildx rm "${BUILDX_BUILDER:-zbm-remote}" >/dev/null 2>&1 || true
          rm -rf "${DOCKER_CONFIG:-}"
