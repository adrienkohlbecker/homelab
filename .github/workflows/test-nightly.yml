name: test-nightly
on:
  schedule:
    # 02:00 UTC daily. Activity-gated below: skips when no commits landed
    # in the last 25h (25, not 24, so a same-second cron jitter doesn't
    # mis-fire a false-negative skip).
    - cron: '0 2 * * *'
  workflow_dispatch:

# The full-universe test matrix runs through the SAME reusable test.yml
# the push pipeline (ci.yml) calls -- the test-role job, vault env, scratch
# mount, artifact upload and failure-mail all live there once. This
# workflow only owns what's nightly-specific: the schedule trigger and the
# `gate` job (25h-activity skip + a --all detect). Concurrency, the lab-vm
# pool VM cap and the packer-vs-test flock are documented in test.yml.

defaults:
  run:
    shell: bash

jobs:
  gate:
    runs-on: [ self-hosted, lab ]
    container:
      image: nexus.lab.fahm.fr/homelab/ci:latest
    outputs:
      matrix: ${{ steps.gate.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6
        # Full history so `git log --since='25 hours ago'` actually has
        # the timestamps to walk; the default fetch-depth of 1 only has
        # HEAD's commit metadata.
        with: { fetch-depth: 0 }
      - run: uv sync --locked
      - id: gate
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "schedule" ]; then
            count=$(git log --since='25 hours ago' --oneline | wc -l)
            if [ "$count" -eq 0 ]; then
              echo "no commits in the last 25h -- skipping nightly"
              echo "matrix=[]" >>"$GITHUB_OUTPUT"
              exit 0
            fi
          fi
          mise run ci:detect-roles --all

  test:
    # The same reusable test.yml the push pipeline calls, just fed the
    # full-universe matrix instead of a git-diff one. Nothing nightly-
    # specific to pass: concurrent VMs are pool-capped and failures surface
    # via GitHub's Actions failure email. The `if` short-circuits the no-op
    # run (empty matrix from a quiet 25h) so test.yml's jobs never spin up.
    needs: gate
    if: needs.gate.outputs.matrix != '[]' && needs.gate.outputs.matrix != ''
    uses: ./.github/workflows/test.yml
    secrets: inherit
    with:
      matrix: ${{ needs.gate.outputs.matrix }}
