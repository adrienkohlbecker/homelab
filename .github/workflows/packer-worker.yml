name: packer-worker
# Reusable implementation for the manual hetzner-worker workflow. Rebuilds the
# pre-baked CI worker snapshot on Hetzner Cloud.
on:
  workflow_call:

defaults:
  run:
    shell: bash

jobs:
  build:
    if: github.ref == 'refs/heads/master'
    runs-on: [ self-hosted, lab ]
    container:
      image: nexus.lab.fahm.fr/homelab/ci:latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - run: uv sync --locked
      - name: Build CI worker snapshot
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
          MISE_GITHUB_TOKEN: ${{ secrets.MISE_GITHUB_TOKEN }}
        run: mise run packer:worker
