name: ci
# Single per-push pipeline. Replaces the old split where a push fanned out
# to separate lint / ci-image / packer-build / test workflow runs, two of
# them coordinated by filesystem sentinels. Here detect decides what runs,
# lint / ci-image / packer-build / test are all called (uses:) so they
# render as ONE run with nested jobs (GitLab-style), and `needs:` ordering
# replaces both sentinel polls (test runs after packer + ci-image).
#
# Serialised per branch (concurrency below, cancel-in-progress: false): a
# push touching a shared/cross-cutting path runs the FULL universe, which is
# expensive, so we queue rather than fan out N concurrent wide runs. At most
# one run executes + one queues per ref; an older *pending* run is superseded
# (it never started, so no wasted work), while an in-flight run is NEVER
# cancelled. Serialising also keeps the diff base maximally fresh -- when the
# next run's detect fires, the prior run has already finished, so it diffs
# from that run's commit (tightest matrix). Callees keep their own groups
# (packer-build `lab-qemu-artifacts`, ci-image `ci-image`, lint `lint-<ref>`).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: false
on:
  push:
  workflow_dispatch:
    inputs:
      roles:
        description: 'Comma-separated role names (or role:variant). `ALL` = every role. Empty = use git diff.'
        required: false
        default: ''
      sources:
        description: 'packer sources to rebuild (e.g. "box pug"). Empty = all (only runs when packer changed).'
        required: false
        default: ''
      ubuntu:
        description: 'Ubuntu codename to pin the packer build to. Empty = box builds every supported release (jammy/noble/resolute), pug/lab/hetzner build jammy.'
        required: false
        default: ''

defaults:
  run:
    shell: bash

jobs:
  detect:
    # Single detection pass for the whole pipeline. Emits the role test
    # matrix (passed down to test) and the packer_changed / ci_image_changed
    # gates (consumed by the packer / ci-image calls). test.yml no longer
    # detects -- it takes the matrix as an input.
    runs-on: [ self-hosted, lab ]
    # actions:read lets detect-roles query the Actions API for the last
    # entirely-successful push run of this workflow on the branch (its diff
    # base). contents:read is the checkout default -- listed explicitly
    # because a permissions block replaces the default set, it doesn't merge.
    permissions:
      contents: read
      actions: read
    container:
      image: nexus.lab.fahm.fr/homelab/ci:latest
    outputs:
      matrix: ${{ steps.detect.outputs.matrix }}
      packer_changed: ${{ steps.detect.outputs.packer_changed }}
      ci_image_changed: ${{ steps.detect.outputs.ci_image_changed }}
      # The packer source matrix, folded in from packer-build's old `prepare`
      # job. Split into box vs the rest so packer_box / packer_extra can build
      # box on its own and gate `test` on it alone (see those jobs).
      packer_sources: ${{ steps.detect.outputs.packer_sources }}
      packer_sources_box: ${{ steps.detect.outputs.packer_sources_box }}
      packer_sources_extra: ${{ steps.detect.outputs.packer_sources_extra }}
      # The Ubuntu release matrix each packer call crosses its source matrix
      # with. box spans every supported release (per-release build validation);
      # extra (pug/lab/hetzner) stays jammy. A dispatch `ubuntu` pins both.
      packer_ubuntu_box: ${{ steps.detect.outputs.packer_ubuntu_box }}
      packer_ubuntu_extra: ${{ steps.detect.outputs.packer_ubuntu_extra }}
    steps:
      - uses: actions/checkout@v6
        with: { fetch-depth: 50 }
      - run: uv sync --locked
      - id: detect
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          INPUTS_ROLES: ${{ inputs.roles }}
          # The `sources` dispatch input. On a push it's empty (-> full set);
          # a dispatch that sets it (and not roles) is a packer-only rebuild.
          INPUTS_SOURCES: ${{ inputs.sources }}
          # The `ubuntu` dispatch input. Empty on a push (and by default) ->
          # box builds every supported release; a dispatch that pins it rebuilds
          # just that release. detect folds it into packer_ubuntu_box/extra.
          INPUTS_UBUNTU: ${{ inputs.ubuntu }}
          # detect-roles queries the Actions API for the last green push run
          # as its diff base; GITHUB_TOKEN is not auto-exported to steps.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: mise run ci:detect-roles

  lint:
    # Runs in the ci container, so it waits on ci-image whenever that's being
    # rebuilt -- a stale :latest would lint against the wrong toolchain.
    # always() + (success || skipped) lets it run when ci-image is NOT needed
    # (skipped) and gates it behind a genuine ci-image failure; needs detect
    # only so ci-image's skip/success is decided first. Keeps its own
    # ref-cancel concurrency group (in lint.yml).
    needs: [ detect, ci-image ]
    if: |
      always()
      && needs.detect.result == 'success'
      && (needs.ci-image.result == 'success' || needs.ci-image.result == 'skipped')
    uses: ./.github/workflows/lint.yml
    secrets: inherit

  ci-image:
    # Rebuild + republish the ci :latest image only when a build input
    # changed on master (detect's ci_image_changed enforces that triple
    # gate). Ordered before lint / packer / test so they all resolve the
    # new :latest.
    needs: detect
    if: needs.detect.outputs.ci_image_changed == 'true'
    uses: ./.github/workflows/ci-image.yml
    secrets: inherit

  packer_box:
    # Build box (and seed box_deps off it) on its own so `test` can depend on
    # box alone: box + box_deps are the only images push-CI test cells consume,
    # so a pug/lab/hetzner failure -- notably the master-only Hetzner snapshot
    # publish -- must not block the role matrix. Builds in the ci container, so
    # (like test) it waits on ci-image when that's being rebuilt -- e.g. a
    # packer/qemu.pkr.hcl change is BOTH a packer input and a ci-image input,
    # and the build needs the image with the matching pre-installed plugins.
    # Skipped when box isn't in the source set (a dispatch with sources=lab pug).
    needs: [ detect, ci-image ]
    if: |
      always()
      && needs.detect.result == 'success'
      && needs.detect.outputs.packer_changed == 'true'
      && needs.detect.outputs.packer_sources_box != '[]'
      && (needs.ci-image.result == 'success' || needs.ci-image.result == 'skipped')
    uses: ./.github/workflows/packer-build.yml
    secrets: inherit
    with:
      sources_matrix: ${{ needs.detect.outputs.packer_sources_box }}
      # box crosses its source matrix with every supported release (or the
      # single pinned one): a packer change is validated per-release via each
      # build's verify-boot. box_deps is still seeded only off jammy box.
      ubuntu_matrix: ${{ needs.detect.outputs.packer_ubuntu_box }}

  packer_extra:
    # Rebuild the non-box images (pug / lab / hetzner). `needs: packer_box`
    # only orders it -- packer-build's lab-qemu-artifacts concurrency group
    # serialises the two calls anyway, so running box first lets test start as
    # soon as box is done while these build in parallel with it. always() so a
    # box failure doesn't skip the other images. Its result (incl. the Hetzner
    # publish) gates the overall run conclusion but never `test`.
    needs: [ detect, ci-image, packer_box ]
    if: |
      always()
      && needs.detect.result == 'success'
      && needs.detect.outputs.packer_changed == 'true'
      && needs.detect.outputs.packer_sources_extra != '[]'
      && (needs.ci-image.result == 'success' || needs.ci-image.result == 'skipped')
    uses: ./.github/workflows/packer-build.yml
    secrets: inherit
    with:
      sources_matrix: ${{ needs.detect.outputs.packer_sources_extra }}
      # pug/lab/hetzner track prod (jammy) -- single release (or the pinned one).
      ubuntu_matrix: ${{ needs.detect.outputs.packer_ubuntu_extra }}

  test:
    # Runs after packer_box and ci-image so test cells read a freshly-published
    # box/box_deps tree and the new :latest image (the ordering the old
    # wait-for-packer-build / wait-for-ci-image sentinels faked). Deliberately
    # does NOT need packer_extra -- pug/lab/hetzner are unused by push test
    # cells, so their build (or the Hetzner publish) failing can't block test.
    # always() + (success || skipped) lets it run whether or not box or
    # ci-image was needed; a genuine failure (not skip) of either blocks it.
    needs: [ detect, packer_box, ci-image ]
    if: |
      always()
      && needs.detect.result == 'success'
      && (needs.packer_box.result == 'success' || needs.packer_box.result == 'skipped')
      && (needs.ci-image.result == 'success' || needs.ci-image.result == 'skipped')
    uses: ./.github/workflows/test.yml
    secrets: inherit
    with:
      matrix: ${{ needs.detect.outputs.matrix }}
