name: ci
# Single per-push pipeline. Replaces the old split where a push fanned out
# to separate lint / ci-image / packer-build / test workflow runs, two of
# them coordinated by filesystem sentinels. Here detect decides what runs,
# lint / ci-image / packer-build / test are all called (uses:) so they
# render as ONE run with nested jobs (GitLab-style), and `needs:` ordering
# replaces both sentinel polls (test runs after packer + ci-image).
#
# No workflow-level concurrency: per-push runs are capped only by the
# runner pool. Each callee keeps its OWN concurrency group -- packer-build
# `lab-qemu-artifacts` (serialise rebuilds), ci-image `ci-image`
# (serialise pushes), lint `lint-<ref>` (ref-cancel) -- so they self-
# govern without one caller-level knob serialising everything. Whether a
# called reusable workflow's concurrency is honoured independently is the
# main thing this spike verifies.
on:
  push:
  workflow_dispatch:
    inputs:
      roles:
        description: 'Comma-separated role names (or role:variant). `ALL` = every role. Empty = use git diff.'
        required: false
        default: ''
      sources:
        description: 'packer sources to rebuild (e.g. "box pug"). Empty = all (only runs when packer changed).'
        required: false
        default: ''
      ubuntu:
        description: 'Ubuntu codename'
        required: false
        default: jammy

defaults:
  run:
    shell: bash

jobs:
  detect:
    # Single detection pass for the whole pipeline. Emits the role test
    # matrix + cross_cut (passed down to test) and the packer_changed /
    # ci_image_changed gates (consumed by the packer / ci-image calls).
    # test.yml no longer detects -- it takes the matrix as an input.
    runs-on: [ self-hosted, lab ]
    # actions:read lets detect-roles query the Actions API for the last
    # entirely-successful push run of this workflow on the branch (its diff
    # base). contents:read is the checkout default -- listed explicitly
    # because a permissions block replaces the default set, it doesn't merge.
    permissions:
      contents: read
      actions: read
    container:
      image: nexus.lab.fahm.fr/homelab/ci:latest
    outputs:
      matrix: ${{ steps.detect.outputs.matrix }}
      cross_cut: ${{ steps.detect.outputs.cross_cut }}
      packer_changed: ${{ steps.detect.outputs.packer_changed }}
      ci_image_changed: ${{ steps.detect.outputs.ci_image_changed }}
    steps:
      - uses: actions/checkout@v6
        with: { fetch-depth: 50 }
      - run: uv sync --locked
      - id: detect
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          INPUTS_ROLES: ${{ inputs.roles }}
          # detect-roles queries the Actions API for the last green push run
          # as its diff base; GITHUB_TOKEN is not auto-exported to steps.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: mise run ci:detect-roles

  lint:
    # Independent of detect/packer/test -- runs in parallel. Keeps its own
    # ref-cancel concurrency group (in lint.yml).
    uses: ./.github/workflows/lint.yml
    secrets: inherit

  ci-image:
    # Rebuild + republish the ci :latest image only when a build input
    # changed on master (detect's ci_image_changed enforces that triple
    # gate). Ordered before test so test-role resolves the new :latest.
    needs: detect
    if: needs.detect.outputs.ci_image_changed == 'true'
    uses: ./.github/workflows/ci-image.yml
    secrets: inherit

  packer:
    # Rebuild + republish the qcow2 tree only when packer inputs changed.
    # Nested under this run; self-serialises via its own concurrency group.
    needs: detect
    if: needs.detect.outputs.packer_changed == 'true'
    uses: ./.github/workflows/packer-build.yml
    secrets: inherit
    with:
      sources: ${{ inputs.sources }}
      ubuntu: ${{ inputs.ubuntu }}

  test:
    # Runs after packer and ci-image so test cells read a freshly-published
    # qcow2 tree and the new :latest image (the ordering the old
    # wait-for-packer-build / wait-for-ci-image sentinels faked). always() +
    # (success || skipped) lets it run whether or not either was needed; a
    # genuine failure (not skip) of either blocks it.
    needs: [ detect, packer, ci-image ]
    if: |
      always()
      && needs.detect.result == 'success'
      && (needs.packer.result == 'success' || needs.packer.result == 'skipped')
      && (needs.ci-image.result == 'success' || needs.ci-image.result == 'skipped')
    uses: ./.github/workflows/test.yml
    secrets: inherit
    with:
      matrix: ${{ needs.detect.outputs.matrix }}
      cross_cut: ${{ needs.detect.outputs.cross_cut }}
