name: ci
# Unified pipeline for push, nightly schedule, and manual test dispatch.
# detect.yml decides which role tests run: pushes diff against the last green
# ancestor, schedule events force the full test matrix, and dispatch accepts
# explicit roles. Heavy artifact builders live in dedicated manual workflows.
#
# Serialised per branch (concurrency below, cancel-in-progress: false): a
# push touching a shared/cross-cutting path runs the FULL test universe, which
# is expensive, so we queue rather than fan out N concurrent wide runs. At most
# one run executes + one queues per ref; an older *pending* run is superseded
# (it never started, so no wasted work), while an in-flight run is NEVER
# cancelled. Serialising also keeps the diff base maximally fresh — when the
# next run's detect fires, the prior run has already finished, so it diffs
# from that run's commit (tightest matrix). Callees keep their own groups
# (lint `lint-<ref>`).
#
# A green schedule run becomes the diff base for subsequent pushes
# (newest_green_ancestor accepts both push and schedule events from this
# workflow). The 25h activity gate inside detect.yml suppresses quiet days.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: false
on:
  push:
  schedule:
    # 02:00 UTC daily. detect.yml's gate job skips when no commits landed
    # in the last 25h. A manual dispatch bypasses the gate.
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      roles:
        description: 'Comma-separated role names (or role:variant). `ALL` = every role. Empty = use git diff.'
        required: false
        default: ''

defaults:
  run:
    shell: bash

jobs:
  detect:
    # Change detection + 25h nightly gate. detect.yml encapsulates both:
    # its internal gate job skips on non-schedule events; its detect job
    # emits the role matrix. When the 25h gate suppresses the nightly,
    # detect's outputs are empty and the `skip` output is 'true' — all
    # downstream jobs auto-skip via their output checks.
    uses: ./.github/workflows/detect.yml
    secrets: inherit
    with:
      event_name: ${{ github.event_name }}
      roles: ${{ inputs.roles }}

  lint:
    # Runs in the published ci container. Rebuilding that image is a manual
    # workflow now, so CI intentionally uses the currently published :latest.
    needs: detect
    if: |
      needs.detect.result == 'success'
      && needs.detect.outputs.skip != 'true'
    uses: ./.github/workflows/lint.yml
    secrets: inherit

  # --- test: per-release/variant groups -------------------------------------
  # CI no longer builds QEMU images inline. Test cells consume the images already
  # published under /mnt/scratch/homelab_ci by the manual packer workflows.

  test_jammy:
    needs: detect
    if: |
      needs.detect.result == 'success'
      && needs.detect.outputs.matrix_jammy != '[]'
      && needs.detect.outputs.matrix_jammy != ''
    uses: ./.github/workflows/test.yml
    secrets: inherit
    with:
      matrix: ${{ needs.detect.outputs.matrix_jammy }}

  test_noble:
    needs: detect
    if: |
      needs.detect.result == 'success'
      && needs.detect.outputs.matrix_noble != '[]'
      && needs.detect.outputs.matrix_noble != ''
    uses: ./.github/workflows/test.yml
    secrets: inherit
    with:
      matrix: ${{ needs.detect.outputs.matrix_noble }}

  test_resolute:
    needs: detect
    if: |
      needs.detect.result == 'success'
      && needs.detect.outputs.matrix_resolute != '[]'
      && needs.detect.outputs.matrix_resolute != ''
    uses: ./.github/workflows/test.yml
    secrets: inherit
    with:
      matrix: ${{ needs.detect.outputs.matrix_resolute }}

  test_minimal:
    needs: detect
    if: |
      needs.detect.result == 'success'
      && needs.detect.outputs.matrix_minimal != '[]'
      && needs.detect.outputs.matrix_minimal != ''
    uses: ./.github/workflows/test.yml
    secrets: inherit
    with:
      matrix: ${{ needs.detect.outputs.matrix_minimal }}

  test_lab:
    needs: detect
    if: |
      needs.detect.result == 'success'
      && needs.detect.outputs.matrix_lab != '[]'
      && needs.detect.outputs.matrix_lab != ''
    uses: ./.github/workflows/test.yml
    secrets: inherit
    with:
      matrix: ${{ needs.detect.outputs.matrix_lab }}

  test_pug:
    needs: detect
    if: |
      needs.detect.result == 'success'
      && needs.detect.outputs.matrix_pug != '[]'
      && needs.detect.outputs.matrix_pug != ''
    uses: ./.github/workflows/test.yml
    secrets: inherit
    with:
      matrix: ${{ needs.detect.outputs.matrix_pug }}

  # --- site test: full site.yml converge on box --------------------------------
  # Catches role-ordering and cross-role interaction bugs that per-role tests
  # miss. Runs the real site.yml (not the single-role test harness stub)
  # against the currently published box image with --limit box.

  site_test:
    needs: detect
    if: |
      needs.detect.result == 'success'
      && needs.detect.outputs.site_test == 'true'
    uses: ./.github/workflows/site-test.yml
    secrets: inherit
