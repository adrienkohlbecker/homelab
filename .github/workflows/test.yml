name: test
on:
  push:
  workflow_dispatch:
    inputs:
      roles:
        description: 'Comma-separated role names (or role:variant). `ALL` = every role. Empty = use git diff.'
        required: false
        default: ''

# Concurrency: no workflow- or job-level group on test-role any more.
# The cap on concurrent VMs comes from the runner pool (4 lab-vm
# runners on lab; see host_vars/lab.yml's github_runner_instances), and
# the packer-vs-test mutex is enforced by a brief flock around packer's
# install post-processor + the harness's overlay-create/qemu-launch
# (see notes/concurrency_rework.md). The previous static
# `lab-qemu-artifacts` on test-role made every matrix cell compete for
# one slot and cancel all but one. Detect / wait-for-* / notify run on
# the lab pool (disjoint from lab-vm) so they never compete with VM
# jobs for capacity.

defaults:
  run:
    shell: bash

jobs:
  detect:
    runs-on: [ self-hosted, lab ]
    container:
      image: nexus.lab.fahm.fr/homelab/ci:latest
    outputs:
      matrix: ${{ steps.detect.outputs.matrix }}
      cross_cut: ${{ steps.detect.outputs.cross_cut }}
      packer_changed: ${{ steps.detect.outputs.packer_changed }}
      ci_image_changed: ${{ steps.detect.outputs.ci_image_changed }}
    steps:
      - uses: actions/checkout@v6
        # 50 commits is enough for HEAD~1 plus a typical session of pushes;
        # detect-roles only ever looks at HEAD..HEAD~1 anyway.
        with: { fetch-depth: 50 }
      # detect-roles parses roles/*/meta/test.yml (and shells out to
      # role-deps.py) with `import yaml`, resolved against the project
      # venv. mise's uv_venv_auto creates+sources a fresh .venv per
      # checkout but doesn't populate it, so without this the import
      # fails (PyYAML arrives transitively via ansible). Same uv sync
      # the lint / test-role jobs run; fast off the image's warm cache.
      - run: uv sync --frozen
      - id: detect
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          INPUTS_ROLES: ${{ inputs.roles }}
        run: mise run ci:detect-roles

  notify-cross-cut:
    needs: detect
    if: needs.detect.outputs.cross_cut == 'true'
    runs-on: [ self-hosted, lab ]
    container:
      image: nexus.lab.fahm.fr/homelab/ci:latest
    steps:
      - uses: actions/checkout@v6
        with: { fetch-depth: 50 }
      - run: mise run ci:mail-cross-cut
        env:
          MAILGUN_API_KEY: ${{ secrets.MAILGUN_API_KEY }}
          MAILGUN_DOMAIN: ${{ secrets.MAILGUN_DOMAIN }}

  wait-for-packer-build:
    # When this push touched packer/** or mise-tasks/packer/** (the
    # paths that trigger packer-build.yml), detect emits
    # packer_changed=true and this job blocks test-role on packer-build
    # finishing. Otherwise the _packer matrix cell could win the
    # concurrency-queue race and read the qcow2 tree mid-rewrite.
    # detect-roles emits packer_changed independently from
    # _packer-in-matrix so edits to roles/_packer/ alone (no qcow2
    # rebuild) don't trigger an 85-min wait for a packer-build that
    # was never dispatched.
    needs: detect
    if: needs.detect.outputs.packer_changed == 'true'
    runs-on: [ self-hosted, lab ]
    container:
      image: nexus.lab.fahm.fr/homelab/ci:latest
      options: --volume /mnt/scratch/qemu:/mnt/scratch/qemu:ro
    timeout-minutes: 90
    steps:
      - name: Wait for packer-build sentinel for this SHA
        env:
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          target=/mnt/scratch/qemu/_sentinels/complete-$SHA
          deadline=$(( $(date +%s) + 85 * 60 ))
          while [ ! -f "$target" ]; do
            if [ "$(date +%s)" -gt "$deadline" ]; then
              echo >&2 "Timed out waiting for $target after 85min --"
              echo >&2 "packer-build for this SHA likely failed or wasn't dispatched."
              exit 1
            fi
            sleep 15
          done
          echo "Found $target -- releasing test-role."

  wait-for-ci-image:
    # When this push touched a ci-image.yml input (Dockerfile / mise.toml
    # / pyproject.toml / uv.lock / packer/qemu.pkr.hcl) on master, detect
    # emits ci_image_changed=true and this job blocks test-role on
    # ci-image.yml finishing its push to :latest. Without this, test-role's
    # container: block can resolve the OLD :latest while the new image is
    # mid-build, and tests run against a stale toolchain. The triple gate
    # in detect-roles (event=push + ref=master + input-diff) ensures
    # workflow_dispatch / feature-branch / unrelated-paths cases land here
    # as false -- the wait never blocks on a build that won't happen.
    needs: detect
    if: needs.detect.outputs.ci_image_changed == 'true'
    runs-on: [ self-hosted, lab ]
    container:
      image: nexus.lab.fahm.fr/homelab/ci:latest
      options: --volume /mnt/scratch/qemu:/mnt/scratch/qemu:ro
    timeout-minutes: 30
    steps:
      - name: Wait for ci-image sentinel for this SHA
        env:
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          target=/mnt/scratch/qemu/_sentinels/ci-image-$SHA
          deadline=$(( $(date +%s) + 25 * 60 ))
          while [ ! -f "$target" ]; do
            if [ "$(date +%s)" -gt "$deadline" ]; then
              echo >&2 "Timed out waiting for $target after 25min --"
              echo >&2 "ci-image build for this SHA likely failed or wasn't dispatched."
              exit 1
            fi
            sleep 15
          done
          echo "Found $target -- releasing test-role."

  test-role:
    # Lands on the lab-vm pool (4 runners) -- the cap on concurrent
    # qemu VMs is exactly the pool size. Packer-build and test-role
    # share the pool; packer-build's qcow2 publish is brief-flock'd
    # against test-role's overlay-create + qemu launch (see step 4 of
    # the concurrency rework), so a publish-window race that lands in
    # parallel doesn't tear file reads. No job-level concurrency group:
    # the previous shape used a static `lab-qemu-artifacts` here, which
    # made every matrix cell compete for one slot and cancel all but
    # one -- see notes/concurrency_rework.md for the symptom.
    needs:
      - detect
      - wait-for-packer-build
      - wait-for-ci-image
    # always() lets this evaluate even when wait-for-packer-build or
    # wait-for-ci-image was skipped (their default when packer_changed /
    # ci_image_changed is false); the (success || skipped) clauses filter
    # out the genuine failure cases (sentinel timeout) so test-role doesn't
    # read against a stale or half-rebuilt qcow2 tree, nor against a
    # mid-rebuild :latest. The matrix-not-empty guard short-circuits the
    # no-op case (cross-cut push, empty matrix) without spinning a runner.
    if: |
      always()
      && needs.detect.result == 'success'
      && (needs.wait-for-packer-build.result == 'success'
          || needs.wait-for-packer-build.result == 'skipped')
      && (needs.wait-for-ci-image.result == 'success'
          || needs.wait-for-ci-image.result == 'skipped')
      && needs.detect.outputs.matrix != '[]'
      && needs.detect.outputs.matrix != ''
    runs-on: [ self-hosted, lab-vm ]
    container:
      image: nexus.lab.fahm.fr/homelab/ci:latest
      # /dev/kvm via --device for qemu acceleration. --group-add 1 is
      # the container-side gid that maps to host kvm via /etc/subgid +
      # the rootless gidmap (see roles/github_runner/templates/
      # github_runner.service.j2's sibling note). Not a system-wide
      # constant: brittle to /etc/subgid range ordering -- re-verify if
      # you add another single-id range to subid_extra_subgid_groups
      # for github_runner.
      #
      # scratch is bind-mounted per-cell. The host path
      # embeds run_id + job-index so two concurrent test cells never
      # share a workdir parent -- without this, a sibling cell's startup
      # sweep (or any other reaper running in its container, where ps
      # can't see this cell's qemu) could reap files mid-run. Cleanup
      # of old per-cell dirs lives in the github_runner role's
      # tmpfiles.d entry (Age=1d).
      options: >-
        --device /dev/kvm
        --group-add 1
        --volume /mnt/scratch/qemu:/mnt/scratch/qemu:ro
        --volume /mnt/scratch/github_runner/scratch/${{ github.run_id }}-${{ strategy.job-index }}:/scratch:rw
    strategy:
      fail-fast: false
      max-parallel: 2
      # Dynamic matrix populated by the detect job. GitHub evaluates
      # fromJSON against needs.<job>.outputs at job-resolve time, so
      # each cell in the emitted JSON array becomes its own UI row with
      # its own log and re-run button.
      matrix:
        spec: ${{ fromJSON(needs.detect.outputs.matrix) }}
    name: ${{ matrix.spec }}
    timeout-minutes: 30
    env:
      # vault-client.sh picks this up for vault-id `test` and skips the
      # keychain/file lookup. Prod vault entries can't be decrypted in
      # CI by design -- the test harness only loads test vars.
      HOMELAB_VAULT_PASSWORD_TEST: ${{ secrets.HOMELAB_VAULT_PASSWORD_TEST }}
      # Restrict ansible to the test identity only; without this ansible
      # would still invoke vault-client.sh for prod per ansible.cfg's
      # vault_identity_list, log a benign warning, and continue -- but
      # the noise is confusing. This also makes prod-encrypted entries
      # fail loudly (not silently) if they're ever loaded.
      ANSIBLE_VAULT_IDENTITY_LIST: test@vault-client.sh
    steps:
      - uses: actions/checkout@v6
      - run: uv sync --frozen
      - name: Run test cell
        env:
          SPEC: ${{ matrix.spec }}
        run: |
          set -euo pipefail
          role=${SPEC%%:*}
          variant=${SPEC##*:}
          # Persist for the on-failure artifact step. $GITHUB_ENV is
          # read between steps regardless of this step's exit status,
          # so a test failure still gives the artifact step a name.
          {
            echo "ROLE=$role"
            echo "VARIANT=$variant"
          } >>"$GITHUB_ENV"
          test/testrole.py "$role" --machine "$variant" --timeout 1500 --workdir-parent /scratch
      - name: Upload harness output on failure
        if: failure()
        uses: actions/upload-artifact@v7
        # actions/upload-artifact@v7 requires unique artifact names per
        # run; ROLE + VARIANT come from the parsed SPEC so the name is
        # plain alnum/underscores/hyphens and unique per matrix cell.
        with:
          name: testout-${{ env.ROLE }}-${{ env.VARIANT }}
          path: |
            test/out/${{ env.VARIANT }}.${{ env.ROLE }}.*
            /scratch/**
          retention-days: 14
          if-no-files-found: warn
