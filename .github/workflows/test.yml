name: test
# Reusable, call-only. ci.yml runs a single detect pass and passes the
# resolved role matrix in as an input, so this workflow does no detection
# of its own. ci.yml calls it once per release/variant group (test_jammy,
# test_noble, test_resolute, test_minimal), each depending on its own
# packer build (packer_jammy, packer_noble, packer_resolute; test_minimal
# has no packer dep). Ad-hoc role runs go through dispatching ci.yml
# (with roles=...), not this workflow directly -- without its own detect
# it can't compute a matrix from a bare dispatch.
#
# ci.yml is the sole caller — it calls this workflow once per
# release/variant group (test_jammy, test_noble, test_resolute,
# test_minimal, test_lab, test_pug). On push, detect diffs against the
# last green run and passes only changed-role cells. On schedule (nightly),
# detect forces the full universe matrix with all component flags (ci-image,
# packer, worker). A green schedule run becomes the diff base for
# subsequent pushes. Concurrent VMs are capped by the lab-vm runner pool,
# not a per-call knob. Failures surface via GitHub's Actions failure email.
on:
  workflow_call:
    inputs:
      matrix:
        description: 'JSON array of "role:variant" specs to test, from ci.yml''s detect.'
        type: string
        required: true

# Concurrency: no workflow- or job-level group on test-role any more.
# The cap on concurrent VMs comes from the runner pool (6 lab-vm
# runners on lab; see host_vars/lab.yml's github_runner_instances), and
# the packer-vs-test mutex is enforced by a brief flock around packer's
# install post-processor + the harness's overlay-create/qemu-launch
# (see notes/concurrency_rework.md). The previous static
# `lab-qemu-artifacts` on test-role made every matrix cell compete for
# one slot and cancel all but one.

defaults:
  run:
    shell: bash

jobs:
  # NOTE: the old wait-for-packer-build AND wait-for-ci-image sentinel-poll
  # jobs lived here. Both are gone -- ci.yml calls this workflow per
  # release/variant group (test_jammy/noble/resolute/minimal), each ordered
  # after its own packer build via `needs`. The cross-workflow ordering
  # those filesystem sentinels faked is now native job dependencies one
  # level up. (A schedule-triggered run reads the tree concurrently with a
  # packer publish from a queued push, so packer's publish flock stays --
  # see notes/concurrency_rework.md.)

  test-role:
    # Lands on the lab-vm pool (6 runners) -- the cap on concurrent
    # qemu VMs is exactly the pool size. Packer-build and test-role
    # share the pool; packer-build's qcow2 publish is brief-flock'd
    # against test-role's overlay-create + qemu launch (see step 4 of
    # the concurrency rework), so a publish-window race that lands in
    # parallel doesn't tear file reads. No job-level concurrency group:
    # the previous shape used a static `lab-qemu-artifacts` here, which
    # made every matrix cell compete for one slot and cancel all but
    # one -- see notes/concurrency_rework.md for the symptom.
    # The matrix and packer/ci-image ordering come from ci.yml (one detect
    # pass; each test_* group needs its own packer build), so this job has
    # no needs and only gates on a non-empty matrix -- short-circuiting the
    # no-op case (empty matrix: no role-relevant changes) without spinning
    # a runner.
    if: |
      inputs.matrix != '[]'
      && inputs.matrix != ''
    runs-on: [ self-hosted, lab-vm ]
    container:
      image: nexus.lab.fahm.fr/homelab/ci:latest
      # /dev/kvm via --device for qemu acceleration. --group-add 1 is
      # the container-side gid that maps to host kvm via /etc/subgid +
      # the rootless gidmap (see roles/github_runner/templates/
      # github_runner.service.j2's sibling note). Not a system-wide
      # constant: brittle to /etc/subgid range ordering -- re-verify if
      # you add another single-id range to subid_extra_subgid_groups
      # for github_runner.
      #
      # scratch is bind-mounted per-cell. The host path
      # embeds run_id + job-index so two concurrent test cells never
      # share a workdir parent -- without this, a sibling cell's startup
      # sweep (or any other reaper running in its container, where ps
      # can't see this cell's qemu) could reap files mid-run. Cleanup
      # of old per-cell dirs lives in the github_runner role's
      # tmpfiles.d entry (Age=1d).
      #
      # qemu is ro (packer is the sole writer of the qcow2 tree), but the
      # `minimal` variant downloads its vanilla cloud image to a shared cache
      # under it (machine.py _ensure_minimal_cloudimg -> qemu/cloud-images),
      # so that one subdir is overlaid rw. podman auto-creates the host dir as
      # the runner user (same as it did for qemu/ itself on packer's first rw
      # mount). Only cleanup:minimal uses it, so no concurrent-writer race.
      options: >-
        --device /dev/kvm
        --group-add 1
        --volume /mnt/scratch/qemu:/mnt/scratch/qemu:ro
        --volume /mnt/scratch/qemu/cloud-images:/mnt/scratch/qemu/cloud-images:rw
        --volume /mnt/ci_scratch/${{ github.run_id }}-${{ strategy.job-index }}:/scratch:rw
    strategy:
      fail-fast: false
      # No max-parallel: the lab-vm pool (6 runners on lab; see
      # host_vars/lab.yml) is the sole cap on concurrent VMs, for both the
      # push and nightly callers. A single run may use the whole pool; a
      # second concurrent run just queues behind it -- fine for one
      # operator, and it means a push runs full-width instead of throttled.
      # Dynamic matrix passed in from the caller's detect. GitHub evaluates
      # fromJSON against the input at job-resolve time, so each cell in
      # the JSON array becomes its own UI row with its own log and re-run
      # button.
      matrix:
        spec: ${{ fromJSON(inputs.matrix) }}
    name: ${{ matrix.spec }}
    timeout-minutes: 30
    env:
      # vault-client.sh picks this up for vault-id `test` and skips the
      # keychain/file lookup. Prod vault entries can't be decrypted in
      # CI by design -- the test harness only loads test vars.
      HOMELAB_VAULT_PASSWORD_TEST: ${{ secrets.HOMELAB_VAULT_PASSWORD_TEST }}
      # Restrict ansible to the test identity only; without this ansible
      # would still invoke vault-client.sh for prod per ansible.cfg's
      # vault_identity_list, log a benign warning, and continue -- but
      # the noise is confusing. This also makes prod-encrypted entries
      # fail loudly (not silently) if they're ever loaded.
      ANSIBLE_VAULT_IDENTITY_LIST: test@vault-client.sh
      # Authenticate the guest's `mise install` against api.github.com so
      # aqua uses GitHub's 5000/hr authenticated limit, not the 60/hr anon
      # one. A full-universe matrix runs ~110 cells from lab's single NAT'd
      # IP; the anon budget is exhausted partway through and late cells
      # (user:box and any other mise consumer) 403. MISE_GITHUB_TOKEN is the
      # existing no-scope PAT repo secret (terraform/github.tf), already used
      # by ci-image.yml. run_command merges os.environ into the playbook
      # subprocess env, so roles/user reads it via lookup('env', ...) and
      # injects it into the mise shell -- never in argv.
      GITHUB_TOKEN: ${{ secrets.MISE_GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6
      - run: uv sync --locked
      - name: Run test cell
        env:
          SPEC: ${{ matrix.spec }}
        run: |
          set -euo pipefail
          # SPEC is "role:variant" (release defaults to jammy) or
          # "role:variant:ubuntu" for a release cell (detect emits
          # "<role>:<machine>:<codename>" for release-gated roles). Splitting
          # on ":" into three fields handles both -- the third is empty for
          # the two-segment form, so default it to jammy.
          IFS=: read -r role variant ubuntu <<<"$SPEC"
          ubuntu=${ubuntu:-jammy}
          # Persist for the on-failure artifact step. $GITHUB_ENV is
          # read between steps regardless of this step's exit status,
          # so a test failure still gives the artifact step a name.
          {
            echo "ROLE=$role"
            echo "VARIANT=$variant"
            echo "UBUNTU=$ubuntu"
          } >>"$GITHUB_ENV"
          test/testrole.py "$role" --machine "$variant" --ubuntu "$ubuntu" --timeout 1500 --workdir-parent /scratch
      - name: Upload harness output on failure
        if: failure()
        uses: actions/upload-artifact@v7
        # actions/upload-artifact@v7 requires unique artifact names per
        # run; ROLE + VARIANT + UBUNTU come from the parsed SPEC so the name
        # is plain alnum/underscores/hyphens and unique per matrix cell --
        # including two release cells that share a variant (role:box:noble
        # and role:box:resolute would otherwise both be testout-role-box).
        with:
          name: testout-${{ env.ROLE }}-${{ env.VARIANT }}-${{ env.UBUNTU }}
          # The harness names files <machine>.<ubuntu>.<role>.<kind>.ansi
          # (machine.py: prefix = f"{machine}.{ubuntu_name}.{role}"), so the
          # glob pins all three segments.
          path: |
            test/out/${{ env.VARIANT }}.${{ env.UBUNTU }}.${{ env.ROLE }}.*
            /scratch/**
          retention-days: 30
          if-no-files-found: warn
