name: packer-images
# Manual QEMU fixture image rebuilds for test machines. This intentionally
# excludes the hetzner source, which is the fox boot image and bakes on
# GitLab CI (the fox_image job in .gitlab-ci.yml) because it publishes a
# project-global Hetzner Cloud snapshot.
on:
  workflow_dispatch:
    inputs:
      source:
        description: 'Packer source to rebuild.'
        required: true
        default: all
        type: choice
        options:
          - all
          - box
          - lab
          - pug
      ubuntu:
        description: 'Ubuntu codename to rebuild.'
        required: true
        default: all
        type: choice
        options:
          - all
          - jammy
          - noble
          - resolute

jobs:
  box:
    if: inputs.source == 'all' || inputs.source == 'box'
    uses: ./.github/workflows/packer-build.yml
    secrets: inherit
    with:
      sources_matrix: '["box"]'
      ubuntu_matrix: ${{ inputs.ubuntu == 'all' && '["jammy","noble","resolute"]' || format('["{0}"]', inputs.ubuntu) }}

  lab:
    if: inputs.source == 'all' || inputs.source == 'lab'
    uses: ./.github/workflows/packer-build.yml
    secrets: inherit
    with:
      sources_matrix: '["lab"]'
      ubuntu_matrix: ${{ inputs.ubuntu == 'all' && '["jammy","noble","resolute"]' || format('["{0}"]', inputs.ubuntu) }}

  pug:
    if: inputs.source == 'all' || inputs.source == 'pug'
    uses: ./.github/workflows/packer-build.yml
    secrets: inherit
    with:
      sources_matrix: '["pug"]'
      ubuntu_matrix: ${{ inputs.ubuntu == 'all' && '["jammy","noble","resolute"]' || format('["{0}"]', inputs.ubuntu) }}
