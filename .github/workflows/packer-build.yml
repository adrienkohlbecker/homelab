name: packer-build
# Reusable, call-only. ci.yml calls this via `uses:` (gated on detect's
# packer_changed), passing the source matrix detect computed in `sources_matrix`
# -- the build matrix below reads that directly, which is why this workflow no
# longer has its own matrix-compute `prepare` job (folded into detect). No
# `push:` trigger (ci.yml owns the push path) and no `workflow_dispatch`: a
# standalone rebuild of just `lab`/`pug` now goes through dispatching ci.yml
# with `sources=lab pug`, which detect turns into a packer-only run (empty test
# matrix). Without its own detect this workflow can't compute a matrix from a
# bare dispatch anyway.
on:
  workflow_call:
    inputs:
      sources_matrix:
        description: 'JSON array of packer sources to build, from ci.yml''s detect (e.g. ["box","pug"]).'
        type: string
        required: true
      ubuntu_matrix:
        description: 'JSON array of Ubuntu codenames to build each source for, crossed with sources_matrix (e.g. ["jammy","noble","resolute"] for box, ["jammy"] for pug/lab/hetzner).'
        type: string
        required: false
        default: '["jammy"]'

# No workflow-level concurrency group: serialisation is per-cell at
# the job level (see the concurrency block on `build` below). This
# lets cells from different callers (packer_box, packer_extra) and
# different releases (noble, resolute) run in parallel while still
# preventing two CI runs from building the same (source, ubuntu) pair
# simultaneously.

defaults:
  run:
    shell: bash

jobs:
  build:
    # One job per (source, ubuntu) cell, from the two JSON matrices detect
    # computed (folded in from the old `prepare` job). Packer spawns one qemu VM
    # per cell -- lands on the lab-vm pool. See notes/concurrency_rework.md for
    # the pool model: lab-vm = 6 runners that take VM workloads (packer-build +
    # test-role); lab = 4 runners that take everything else.
    #
    # `hetzner` builds the rpool disk image (its verify-boot post-processor is
    # excepted -- the cloud-init-only image has no harness machine spec), then
    # on a master push the build cell publishes it as a Hetzner Cloud snapshot
    # via `mise run packer:hetzner` (HCLOUD_TOKEN from a repo secret). Feature
    # branches build the disk but skip the publish -- see that step below.
    #
    # Why one job per cell instead of packer's internal parallel builds in a
    # single job: each build VM then occupies one lab-vm runner slot, and
    # fail-fast:false keeps one cell's failure from cancelling its siblings
    # (the old single-invocation model tore them all down).
    #
    # No max-parallel: cells run concurrently, capped only by the lab-vm
    # runner pool (6 slots shared with test-role). Each build VM uses 4GB
    # (packer/qemu.pkr.hcl); with ARC at 4 GiB and Nexus at 1G the host
    # has enough headroom for 2-3 concurrent builds without swapping.
    # ci.yml's needs: graph gates packer_extra behind packer_jammy so the
    # box images (used by test cells) finish first. timeout is per-cell
    # (90 min).
    strategy:
      fail-fast: false
      # source x ubuntu. box is called with all supported releases so a packer
      # change is build-validated per-release (each cell's verify-boot boots the
      # image); pug/lab/hetzner are called with just jammy (prod's release). The
      # cross is shaped entirely by the two input arrays detect computed -- box's
      # call carries one source and N releases, extra's carries M sources and one
      # release, so neither produces a cell the other shouldn't build.
      matrix:
        source: ${{ fromJSON(inputs.sources_matrix) }}
        ubuntu: ${{ fromJSON(inputs.ubuntu_matrix) }}
    concurrency:
      group: lab-qemu-artifacts-${{ matrix.source }}-${{ matrix.ubuntu }}
      cancel-in-progress: false
    runs-on: [ self-hosted, lab-vm ]
    container:
      image: nexus.lab.fahm.fr/homelab/ci:latest
      # --group-add 1 maps to host kvm gid via /etc/subgid (see
      # roles/github_runner notes). rw mount because packer-build is
      # the only writer of the qcow2 tree.
      options: >-
        --device /dev/kvm
        --group-add 1
        --volume /mnt/scratch/qemu:/mnt/scratch/qemu:rw
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v6
      - run: uv sync --locked
      - name: Packer init
        # Plugins are pre-installed into /opt/packer/plugins by the
        # ci Dockerfile, so this is a no-op on the steady
        # state. It's here as a safety net for the case where a
        # commit bumps the required_plugins constraints in
        # packer/qemu.pkr.hcl before the github_runner role has been
        # re-applied to rebuild the image -- otherwise `packer build`
        # would fail with a plugin-version mismatch.
        run: mise run packer:init
      - name: Build
        # Pass the matrix source + ubuntu codename through env vars rather
        # than substituting them straight into the shell command -- a
        # misbehaving input could otherwise break out of the args list.
        #
        # Feature branches pass --no-publish so verify-boot validates the
        # packer change without overwriting master's published artifacts.
        # Only master publishes to the shared /mnt/scratch/qemu tree.
        env:
          PACKER_SOURCE: ${{ matrix.source }}
          PACKER_UBUNTU: ${{ matrix.ubuntu }}
        run: |
          set -euo pipefail
          args=("$PACKER_SOURCE")
          if [ -n "$PACKER_UBUNTU" ]; then
            args+=(--ubuntu "$PACKER_UBUNTU")
          fi
          if [ "$GITHUB_REF" != "refs/heads/master" ]; then
            args+=(--no-publish)
          fi
          mise run packer:build "${args[@]}"
      - name: Publish Hetzner snapshot
        # Turn the rpool disk this cell just built into a Hetzner Cloud snapshot
        # (mise run packer:hetzner: temp cpx22 -> rescue -> dd onto /dev/sda ->
        # create_image, then prune all but the 2 newest). Master + jammy only: a
        # snapshot is a project-global resource that terraform's
        # data.hcloud_image selects by most_recent, so a feature-branch -- or
        # off-release -- publish could silently become fox's next boot image
        # (fox runs a jammy root). HCLOUD_TOKEN is a repo secret set manually via
        # `gh secret set` (kept out of terraform state -- see terraform/github.tf);
        # hetzner.sh skips its op re-exec when the token is already resolved.
        # Reads the disk built by the step above from the shared qemu volume.
        if: matrix.source == 'hetzner' && matrix.ubuntu == 'jammy' && github.ref == 'refs/heads/master'
        env:
          PACKER_UBUNTU: ${{ matrix.ubuntu }}
          # Handed to hetzner.sh as HCLOUD_TOKEN_CI, not HCLOUD_TOKEN: mise.toml's
          # [env] re-injects the op:// ref over a plain HCLOUD_TOKEN before the
          # script runs, which would clobber this resolved secret and send the
          # script down the `op run` re-exec path (op absent in CI -> exit 127).
          HCLOUD_TOKEN_CI: ${{ secrets.HCLOUD_TOKEN }}
        run: |
          set -euo pipefail
          args=()
          if [ -n "$PACKER_UBUNTU" ]; then
            args+=(--ubuntu "$PACKER_UBUNTU")
          fi
          mise run packer:hetzner "${args[@]}"
      - name: Seed box_deps on top of box
        # box_deps is a derivation: mise-tasks/packer/seed-deps.sh stages a
        # reflink-copy of box's artifacts, boots them via launch.py
        # --commit, applies packer/seed_deps.yml (podman + nginx +
        # backports), then atomically publishes the result. ~5 min on
        # top of the 15-30 min box build. Seeded for every release so
        # box_deps roles with release cells (github_runner, jellyfin,
        # netdata) test on the right substrate.
        #
        # Master-only: seed-deps publishes to /mnt/scratch/qemu, so
        # feature branches skip it for the same reason they skip the
        # build publish (--no-publish above).
        if: matrix.source == 'box' && github.ref == 'refs/heads/master'
        env:
          PACKER_UBUNTU: ${{ matrix.ubuntu }}
          # seed-deps boots box and runs `ansible-playbook --limit box`,
          # which loads the test-vaulted host_vars/box.yml -- so it needs
          # the test vault password (same as test.yml's test-role). Without
          # it vault-client.sh returns non-zero for vault-id=test and the
          # play aborts before its first task. ANSIBLE_VAULT_IDENTITY_LIST
          # restricts to the test identity so the absent prod password
          # doesn't also error.
          HOMELAB_VAULT_PASSWORD_TEST: ${{ secrets.HOMELAB_VAULT_PASSWORD_TEST }}
          ANSIBLE_VAULT_IDENTITY_LIST: test@vault-client.sh
        run: |
          set -euo pipefail
          args=()
          if [ -n "$PACKER_UBUNTU" ]; then
            args+=(--ubuntu "$PACKER_UBUNTU")
          fi
          mise run packer:seed-deps "${args[@]}"
      # The old "Mark build complete for waiters" step (touch
      # _sentinels/complete-<sha>) is gone -- ci.yml orders this workflow
      # before test via `needs: packer`, so there's no cross-workflow
      # poll left to satisfy. (ci-image keeps its own ci-image-<sha>
      # sentinel; that path is unchanged.)
