name: packer-build
# Reusable, call-only. ci.yml calls this via `uses:` (gated on detect's
# packer_changed), passing the source matrix detect computed in `sources_matrix`
# -- the build matrix below reads that directly, which is why this workflow no
# longer has its own matrix-compute `prepare` job (folded into detect). No
# `push:` trigger (ci.yml owns the push path) and no `workflow_dispatch`: a
# standalone rebuild of just `lab`/`pug` now goes through dispatching ci.yml
# with `sources=lab pug`, which detect turns into a packer-only run (empty test
# matrix). Without its own detect this workflow can't compute a matrix from a
# bare dispatch anyway.
on:
  workflow_call:
    inputs:
      sources_matrix:
        description: 'JSON array of packer sources to build, from ci.yml''s detect (e.g. ["box","pug"]).'
        type: string
        required: true
      ubuntu:
        description: 'Ubuntu codename'
        type: string
        required: false
        default: jammy

# Shared with test-nightly.yml (and any concurrent test read) so packer
# can't rewrite the qcow2 tree mid-test. Packer-build is the ONLY
# workflow that mounts the qemu volume rw. A reusable workflow keeps its
# own concurrency group when called, so packer self-serialises across
# ci.yml runs even though ci.yml itself isn't grouped -- the whole call
# (every build matrix cell) holds one slot, so the matrix below isn't
# self-cancelling; the group only serialises distinct packer builds.
concurrency:
  group: lab-qemu-artifacts
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    # One job per source, from the JSON matrix detect computed (folded in from
    # the old `prepare` job). Packer spawns one qemu VM per cell -- lands on the
    # lab-vm pool. See notes/concurrency_rework.md for the pool model: lab-vm =
    # 4 runners that take VM workloads (packer-build + test-role); lab = 2
    # runners that take everything else.
    #
    # `hetzner` builds the rpool disk image (its verify-boot post-processor is
    # excepted -- the cloud-init-only image has no harness machine spec), then
    # on a master push the build cell publishes it as a Hetzner Cloud snapshot
    # via `mise run packer:hetzner` (HCLOUD_TOKEN from a repo secret). Feature
    # branches build the disk but skip the publish -- see that step below.
    #
    # Why one job per source instead of packer's internal parallel builds in a
    # single job: each build VM then occupies one lab-vm runner slot, so the
    # 4-VM pool cap (host_vars/lab.yml: vm1..vm4, all containers on the one lab
    # host) actually governs concurrent packer VMs. A single job hid 3 VMs
    # behind one slot and blew past the RAM budget. fail-fast:false keeps one
    # source's failure from cancelling its siblings (the old single-invocation
    # model tore them all down).
    strategy:
      fail-fast: false
      matrix:
        source: ${{ fromJSON(inputs.sources_matrix) }}
    runs-on: [ self-hosted, lab-vm ]
    container:
      image: nexus.lab.fahm.fr/homelab/ci:latest
      # --group-add 1 maps to host kvm gid via /etc/subgid (see
      # roles/github_runner notes). rw mount because packer-build is
      # the only writer of the qcow2 tree.
      options: >-
        --device /dev/kvm
        --group-add 1
        --volume /mnt/scratch/qemu:/mnt/scratch/qemu:rw
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v6
      - run: uv sync --locked
      - name: Packer init
        # Plugins are pre-installed into /opt/packer/plugins by the
        # ci Dockerfile, so this is a no-op on the steady
        # state. It's here as a safety net for the case where a
        # commit bumps the required_plugins constraints in
        # packer/qemu.pkr.hcl before the github_runner role has been
        # re-applied to rebuild the image -- otherwise `packer build`
        # would fail with a plugin-version mismatch.
        run: mise run packer:init
      - name: Build
        # Pass the matrix source + ubuntu input through env vars rather
        # than substituting them straight into the shell command -- a
        # misbehaving input could otherwise break out of the args list.
        env:
          PACKER_SOURCE: ${{ matrix.source }}
          PACKER_UBUNTU: ${{ inputs.ubuntu }}
        run: |
          set -euo pipefail
          args=("$PACKER_SOURCE")
          if [ -n "$PACKER_UBUNTU" ]; then
            args+=(--ubuntu "$PACKER_UBUNTU")
          fi
          mise run packer:build "${args[@]}"
      - name: Publish Hetzner snapshot
        # Turn the rpool disk this cell just built into a Hetzner Cloud snapshot
        # (mise run packer:hetzner: temp cpx22 -> rescue -> dd onto /dev/sda ->
        # create_image, then prune all but the 2 newest). Master only: a
        # snapshot is a project-global resource that terraform's
        # data.hcloud_image selects by most_recent, so a feature-branch publish
        # could silently become fox's next boot image. HCLOUD_TOKEN is a repo
        # secret set manually via `gh secret set` (kept out of terraform state --
        # see terraform/github.tf); hetzner.sh skips its op re-exec when the
        # token is already resolved.
        # Reads the disk built by the step above from the shared qemu volume.
        if: matrix.source == 'hetzner' && github.ref == 'refs/heads/master'
        env:
          PACKER_UBUNTU: ${{ inputs.ubuntu }}
          # Handed to hetzner.sh as HCLOUD_TOKEN_CI, not HCLOUD_TOKEN: mise.toml's
          # [env] re-injects the op:// ref over a plain HCLOUD_TOKEN before the
          # script runs, which would clobber this resolved secret and send the
          # script down the `op run` re-exec path (op absent in CI -> exit 127).
          HCLOUD_TOKEN_CI: ${{ secrets.HCLOUD_TOKEN }}
        run: |
          set -euo pipefail
          args=()
          if [ -n "$PACKER_UBUNTU" ]; then
            args+=(--ubuntu "$PACKER_UBUNTU")
          fi
          mise run packer:hetzner "${args[@]}"
      - name: Seed box_deps on top of box
        # box_deps is a derivation: mise-tasks/packer/seed-deps.sh stages a
        # reflink-copy of box's artifacts, boots them via launch.py
        # --commit, applies packer/seed_deps.yml (podman + nginx +
        # backports), then atomically publishes the result. ~5 min on
        # top of the 15-30 min box build. Only the box cell seeds it --
        # the other sources leave box's existing artifact untouched.
        if: matrix.source == 'box'
        env:
          PACKER_UBUNTU: ${{ inputs.ubuntu }}
          # seed-deps boots box and runs `ansible-playbook --limit box`,
          # which loads the test-vaulted host_vars/box.yml -- so it needs
          # the test vault password (same as test.yml's test-role). Without
          # it vault-client.sh returns non-zero for vault-id=test and the
          # play aborts before its first task. ANSIBLE_VAULT_IDENTITY_LIST
          # restricts to the test identity so the absent prod password
          # doesn't also error.
          HOMELAB_VAULT_PASSWORD_TEST: ${{ secrets.HOMELAB_VAULT_PASSWORD_TEST }}
          ANSIBLE_VAULT_IDENTITY_LIST: test@vault-client.sh
        run: |
          set -euo pipefail
          args=()
          if [ -n "$PACKER_UBUNTU" ]; then
            args+=(--ubuntu "$PACKER_UBUNTU")
          fi
          mise run packer:seed-deps "${args[@]}"
      # The old "Mark build complete for waiters" step (touch
      # _sentinels/complete-<sha>) is gone -- ci.yml orders this workflow
      # before test via `needs: packer`, so there's no cross-workflow
      # poll left to satisfy. (ci-image keeps its own ci-image-<sha>
      # sentinel; that path is unchanged.)
