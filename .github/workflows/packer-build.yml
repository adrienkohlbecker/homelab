name: packer-build
on:
  workflow_dispatch:
    inputs:
      sources:
        description: 'packer sources to build (e.g. "box pug"). Empty = all.'
        required: false
        default: ''
      ubuntu:
        description: 'Ubuntu codename'
        required: false
        default: jammy
  push:
    paths:
      - 'packer/**'
      - 'mise-tasks/packer/**'

# Shared with test.yml and test-nightly.yml so packer can't rewrite the
# qcow2 tree mid-test. Packer-build is the ONLY workflow that mounts the
# qemu volume rw.
concurrency:
  group: lab-qemu-artifacts
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    # Packer spawns qemu VMs (one per source, in parallel) -- lands on
    # the lab-vm pool. See notes/concurrency_rework.md for the pool
    # model: lab-vm = 4 runners that take VM workloads (packer-build +
    # test-role); lab = 2 runners that take everything else.
    runs-on: [ self-hosted, lab-vm ]
    container:
      image: nexus.lab.fahm.fr/homelab/ci:latest
      # --group-add 1 maps to host kvm gid via /etc/subgid (see
      # roles/github_runner notes). rw mount because packer-build is
      # the only writer of the qcow2 tree.
      options: >-
        --device /dev/kvm
        --group-add 1
        --volume /mnt/scratch/qemu:/mnt/scratch/qemu:rw
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - run: uv sync
      - name: Packer init
        # Plugins are pre-installed into /opt/packer/plugins by the
        # ci Dockerfile, so this is a no-op on the steady
        # state. It's here as a safety net for the case where a
        # commit bumps the required_plugins constraints in
        # packer/qemu.pkr.hcl before the github_runner role has been
        # re-applied to rebuild the image -- otherwise `packer build`
        # would fail with a plugin-version mismatch.
        run: mise run packer:init
      - name: Build
        # Pass dispatch inputs through env vars rather than substituting
        # them straight into the shell command -- otherwise a misbehaving
        # input could break out of the args list. Single-quoting in the
        # mise run line keeps shell word-splitting predictable.
        env:
          PACKER_SOURCES: ${{ inputs.sources }}
          PACKER_UBUNTU: ${{ inputs.ubuntu }}
        run: |
          set -euo pipefail
          args=()
          if [ -n "$PACKER_SOURCES" ]; then
            # shellcheck disable=SC2206  # sources is whitespace-separated, intentional
            args+=($PACKER_SOURCES)
          fi
          if [ -n "$PACKER_UBUNTU" ]; then
            args+=(--ubuntu "$PACKER_UBUNTU")
          fi
          mise run packer:build "${args[@]}"
      - name: Seed box_deps on top of box
        # box_deps is a derivation: mise-tasks/packer/seed-deps.sh stages a
        # reflink-copy of box's artifacts, boots them via launch.py
        # --commit, applies packer/seed_deps.yml (podman + nginx +
        # backports), then atomically publishes the result. ~5 min on
        # top of the 15-30 min box build. Gated on box having actually
        # been built in this run: empty inputs.sources => full build
        # (every push lands here); a dispatch limited to pug/lab/etc
        # skips this step since box's existing artifact is untouched.
        if: inputs.sources == '' || contains(inputs.sources, 'box')
        env:
          PACKER_UBUNTU: ${{ inputs.ubuntu }}
        run: |
          set -euo pipefail
          args=()
          if [ -n "$PACKER_UBUNTU" ]; then
            args+=(--ubuntu "$PACKER_UBUNTU")
          fi
          mise run packer:seed-deps "${args[@]}"
      - name: Mark build complete for waiters
        # test.yml's wait-for-packer-build job polls this sentinel before
        # letting the _packer test cell read the qcow2s. Sentinels live
        # in a dedicated subdir (not next to the qcow2s) so the
        # tmpfiles.d age-out rule in roles/github_runner doesn't mistakenly
        # walk the artifact tree. Only fires on a green Build step: a
        # failed build leaves no sentinel, the waiter times out, the
        # _packer cell skips rather than asserting against half-rebuilt
        # artifacts.
        run: |
          mkdir -p /mnt/scratch/qemu/_sentinels
          touch "/mnt/scratch/qemu/_sentinels/complete-${{ github.sha }}"
