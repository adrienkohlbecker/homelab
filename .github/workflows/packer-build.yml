name: packer-build
# Reusable implementation for manual packer image workflows. Callers pass the
# source and Ubuntu matrices explicitly; this file owns the actual build cells.
# No direct workflow_dispatch: use packer-images for test fixtures. The fox
# Hetzner Cloud boot image bakes on GitLab CI (fox_image in .gitlab-ci.yml).
on:
  workflow_call:
    inputs:
      sources_matrix:
        description: 'JSON array of packer sources to build (e.g. ["box","pug"]).'
        type: string
        required: true
      ubuntu_matrix:
        description: 'JSON array of Ubuntu codenames to build each source for, crossed with sources_matrix (e.g. ["jammy","noble","resolute"] for box, ["jammy"] for pug/lab).'
        type: string
        required: false
        default: '["jammy"]'

# No workflow-level concurrency group: serialisation is per-cell at
# the job level (see the concurrency block on `build` below). This
# lets cells from different callers and
# different releases (noble, resolute) run in parallel while still
# preventing two CI runs from building the same (source, ubuntu) pair
# simultaneously.

defaults:
  run:
    shell: bash

jobs:
  build:
    # One job per (source, ubuntu) cell, from the two JSON matrices passed by
    # the manual caller. Packer spawns one qemu VM
    # per cell -- lands on the lab-vm pool. See notes/concurrency_rework.md for
    # the pool model: lab-vm = 6 runners that take VM workloads (packer-build +
    # test-role); lab = 4 runners that take everything else.
    #
    # Why one job per cell instead of packer's internal parallel builds in a
    # single job: each build VM then occupies one lab-vm runner slot, and
    # fail-fast:false keeps one cell's failure from cancelling its siblings
    # (the old single-invocation model tore them all down).
    #
    # No max-parallel: cells run concurrently, capped only by the lab-vm
    # runner pool (6 slots shared with test-role). Each build VM uses 4GB
    # (packer/qemu.pkr.hcl); with ARC at 4 GiB and Nexus at 1G the host
    # has enough headroom for 2-3 concurrent builds without swapping.
    # timeout is per-cell (90 min).
    strategy:
      fail-fast: false
      # source x ubuntu. box can build all supported releases; pug/lab stay
      # jammy-only. The cross is shaped entirely by the two input arrays from
      # the caller.
      matrix:
        source: ${{ fromJSON(inputs.sources_matrix) }}
        ubuntu: ${{ fromJSON(inputs.ubuntu_matrix) }}
    concurrency:
      group: lab-qemu-artifacts-${{ matrix.source }}-${{ matrix.ubuntu }}
      cancel-in-progress: false
    runs-on: [ self-hosted, lab-vm ]
    container:
      image: nexus.lab.fahm.fr/homelab/ci:latest
      # --group-add 1 maps to host kvm gid via /etc/subgid (see
      # roles/github_runner notes). rw mount because packer-build is
      # the only writer of the qcow2 tree.
      options: >-
        --device /dev/kvm
        --group-add 1
        --volume /mnt/scratch/homelab_ci:/mnt/scratch/homelab_ci:rw
    timeout-minutes: 90
    steps:
      - name: Reap stale .build-* dirs from prior failed builds
        # packer/build.sh creates a .build-XXXXXX tmpdir per run and
        # rmdir's it on success. On failure it's left for inspection,
        # but nothing ever cleans it up — test containers mount qemu
        # read-only so machine.py's sweep silently fails. This step
        # has rw access and runs before the build, so it reaps dirs
        # older than 120 minutes (well past the 90-min job timeout).
        # Cross-source cells run in parallel and share /mnt/scratch/homelab_ci,
        # so the grace must exceed the longest possible build to avoid
        # deleting a sibling cell's active build dir.
        run: |
          set -euo pipefail
          find /mnt/scratch/homelab_ci -maxdepth 1 -name '.build-*' -type d -mmin +120 -print0 \
            | xargs -0 --no-run-if-empty rm -rf --
      - uses: actions/checkout@v6
      - run: uv sync --locked
      - name: Packer init
        # Plugins are pre-installed into /opt/packer/plugins by the
        # ci Dockerfile, so this is a no-op on the steady
        # state. It's here as a safety net for the case where a
        # commit bumps the required_plugins constraints in
        # packer/qemu.pkr.hcl before the github_runner role has been
        # re-applied to rebuild the image -- otherwise `packer build`
        # would fail with a plugin-version mismatch.
        run: mise run packer:init
      - name: Build
        # Pass the matrix source + ubuntu codename through env vars rather
        # than substituting them straight into the shell command -- a
        # misbehaving input could otherwise break out of the args list.
        #
        # Feature branches pass --no-publish so verify-boot validates the
        # packer change without overwriting master's published artifacts.
        # Only master publishes to the shared /mnt/scratch/homelab_ci tree.
        env:
          PACKER_SOURCE: ${{ matrix.source }}
          PACKER_UBUNTU: ${{ matrix.ubuntu }}
        run: |
          set -euo pipefail
          args=("$PACKER_SOURCE")
          if [ -n "$PACKER_UBUNTU" ]; then
            args+=(--ubuntu "$PACKER_UBUNTU")
          fi
          if [ "$GITHUB_REF" != "refs/heads/master" ]; then
            args+=(--no-publish)
          fi
          mise run packer:build "${args[@]}"
      - name: Seed box_deps on top of box
        # box_deps is a derivation: mise-tasks/packer/seed-deps.sh stages a
        # reflink-copy of box's artifacts, boots them via launch.py
        # --commit, applies packer/seed_deps.yml (podman + nginx +
        # backports), then atomically publishes the result. ~5 min on
        # top of the 15-30 min box build. Seeded for every release so
        # box_deps roles with release cells (github_runner, jellyfin,
        # netdata) test on the right substrate.
        #
        # Master-only: seed-deps publishes to /mnt/scratch/homelab_ci, so
        # feature branches skip it for the same reason they skip the
        # build publish (--no-publish above).
        if: matrix.source == 'box' && github.ref == 'refs/heads/master'
        env:
          PACKER_UBUNTU: ${{ matrix.ubuntu }}
          # seed-deps boots box and runs `ansible-playbook --limit box`,
          # which loads the test-vaulted host_vars/box.yml -- so it needs
          # the test vault password (same as test.yml's test-role). Without
          # it vault-client.sh returns non-zero for vault-id=test and the
          # play aborts before its first task. ANSIBLE_VAULT_IDENTITY_LIST
          # restricts to the test identity so the absent prod password
          # doesn't also error.
          HOMELAB_VAULT_PASSWORD_TEST: ${{ secrets.HOMELAB_VAULT_PASSWORD_TEST }}
          ANSIBLE_VAULT_IDENTITY_LIST: test@vault-client.sh
        run: |
          set -euo pipefail
          args=()
          if [ -n "$PACKER_UBUNTU" ]; then
            args+=(--ubuntu "$PACKER_UBUNTU")
          fi
          mise run packer:seed-deps "${args[@]}"
      # No sentinel step: packer images are rebuilt manually and CI consumes the
      # currently published artifacts.
