qemu_test: false
qemu_test_minimal: false

zfs_has_services_mount: true
zfs_has_scratch_mount: true
zfs_has_media_mount: true
zfs_has_data_mount: true
zfs_has_brumath_mount: true
zfs_has_eckwersheim_mount: true
zfs_has_minio_mount: true

# Auto-discovered /dev/disk/by-id stems for every rotational drive on
# the host. Consumed by roles/hdparm (charts.d collector) and
# roles/hd_idle (spindown timer config) -- both want the same set.
# Filter chain:
#   name prefix    excludes md/dm/loop/sr/ram/zd kernel pseudo block
#                  devices, which can report rotational=1 but have
#                  nothing to spin (observed on box's mdadm-EFI/swap).
#                  ansible_devices' `virtual` field looks like it
#                  should discriminate this, but on modern kernels
#                  /sys/block/<x> is always a symlink and ansible's
#                  detection logic sets virtual=1 for every disk --
#                  unusable as a real-vs-pseudo filter, so we fall
#                  back to the name prefix.
#   rotational=1   skip SSDs / NVMe (spindown is harmful + nonsensical;
#                  hdparm -C is also nonsensical on them).
#   removable=0    skip USB-attached HDDs -- they tend to be backup
#                  targets where mid-write spindown is harmful and
#                  spin-up during use is expected.
#   links.ids      skip drives udev didn't surface a /dev/disk/by-id/
#                  link for (no stable identifier surfaced; the gap is
#                  surfaced at apply time by roles/hdparm/tasks/netdata.yml).
# Per-drive ID:    `links.ids | sort | first` so the chosen ID is
#                  stable even if udev returns the symlink list in a
#                  different order between reboots.
# Final sort:      orders the per-host list for stable rendering.
rotational_disks_by_id: "{{ ansible_devices | dict2items | rejectattr('key', 'match', '^(md|dm-|loop|sr|ram|zd)') | selectattr('value.rotational', 'equalto', '1') | selectattr('value.removable', 'equalto', '0') | selectattr('value.links.ids') | map(attribute='value.links.ids') | map('sort') | map('first') | sort }}"

ssh_public_keys: |
  ssh-rsa  laptop
  ssh-rsa  ipad

nginx_csp_default: "data: blob: 'unsafe-inline' 'unsafe-eval' 'self'"

root_email: adrien.kohlbecker@gmail.com
smtp_host: smtp.eu.mailgun.org
smtp_port: 587
# SMTPS on 465: TLS from connect. STARTTLS on 587-ish: cleartext
# then upgrade. Plain on 25: no encryption at all. Override the
# pair per-host if you need a non-standard combination.
smtp_use_ssl: "{{ smtp_port | int == 465 }}"
smtp_use_tls: "{{ smtp_port | int not in [25, 465] }}"
email_domain: noreply.{{ domain }}

# User-facing timezone for podman service containers. Host clock
# stays UTC (see roles/timezone/) so journald/syslog correlate with
# external timestamps; containers render user-visible times in local.
system_timezone: Europe/Paris

# GitHub owner under which the repos listed in github_runner_instances
# live. Personal-account constraint -- no org, so all repos share one
# owner.
github_runner_owner: "adrienkohlbecker"

# Labels written into roles/gitea_runner's config.yml. The daemon's
# Declare RPC pushes them to gitea on each start, and SaveRegistration
# writes them back to .runner -- so editing this list and restarting
# the service updates the gitea-side runner row without re-registration.
# See internal/app/cmd/daemon.go in gitea/runner v1.0.3. Override
# per-host via gitea_runner_labels in host_vars if a workflow needs
# something more specific.
gitea_runner_labels:
  - "ubuntu-latest:docker://gitea/runner-images:ubuntu-latest"
  - "ubuntu-22.04:docker://gitea/runner-images:ubuntu-22.04"
  - "ubuntu-24.04:docker://gitea/runner-images:ubuntu-24.04"

# Ports each host-level service publishes. Single source of truth for unit
# templates (--publish for loopback-bound podman services, ListenStream= for
# native daemons), nginx proxy_pass, firewall rules, and cross-role consumers
# (pihole's dnscrypt upstream, etc.). Migrate roles to consume from here as
# they get touched; for collisions, this is the place to grep.
service_ports:
  # Authelia's upstream default is 9091 but that collides with
  # Transmission's well-known default on the same host. The
  # container's internal listener stays on 9091 (see
  # roles/authelia/templates/configuration.yml.j2 server.address);
  # only the host-side --publish maps to this port.
  authelia: 9092
  bazarr: 6767
  compta: 4567
  csp_ingest: 9880
  dnscrypt_proxy: 5053
  eaton_ipp: 4680
  # fan2go's upstream default is 9001 but that collides with the
  # minio console on the same hosts. fan2go's API + the fan2go-tui
  # config both pull from this single value.
  fan2go_api: 9919
  fluentbit: 2020
  gitea: 3000
  # gitea-runner's built-in cache server. Pinned (not random) so jobs
  # mid-flight at restart can still resolve ACTIONS_CACHE_URL after the
  # daemon comes back. See roles/gitea_runner/templates/config.yml.j2.
  gitea_runner_cache: 8088
  # gitea-runner Prometheus endpoint (loopback-only). 9101 matches
  # upstream's documented default.
  gitea_runner_metrics: 9101
  healthchecks: 8000
  homeassistant: 8123
  # Sonos S2 event-subscription callback + HomeKit pairing. Published on
  # 0.0.0.0 so iOS/Sonos controllers on the home LAN can reach them; see
  # the comment in homeassistant.service.j2 for the trust-scope rationale.
  homeassistant_sonos: 1400
  homeassistant_homekit: 3722
  homepage: 3003
  homepage_alerts: 8765
  hyperdx: 5085
  hyperdx_otlp_http: 4318
  lidarr: 8686
  nut: 3493
  transmission_bt: 51413
  wireguard: 51820

# URL nginx's auth_request subrequest hits for forward-auth on sites
# that opt in via `nginx_site_args.auth`. Default targets the
# loopback-published Authelia on the host's own nginx; non-lab hosts
# that ever want to gate any of their services with `auth: required`
# need to override this in host_vars/<host>.yml with the wireguard IP
# of the host running Authelia (e.g.
# http://10.123.0.2:9092/api/authz/auth-request). Cookie domain and
# portal subdomain are per-group (see prod.yml / test.yml) but this
# loopback URL is identical everywhere Authelia runs, so it lives at
# group_vars/all.
authelia_internal_url: "http://127.0.0.1:{{ service_ports.authelia }}/api/authz/auth-request"

# mDNS device-info model -- drives the Finder sidebar icon for the host.
# Maps to an .icns under /System/Library/CoreServices/CoreTypes.bundle/Contents/Resources/
# on macOS clients. Override per host (e.g. `avahi_device_model: Macmini8,1`).
avahi_device_model: RackMac3,1

# Sonatype Nexus pull-through cache. Empty = use upstream URLs directly.
# Overridden in group_vars/test.yml to route fetches through nexus.lab.fahm.fr.
nexus_url: ""

mirror_apt_ubuntu_archive: 'http://{{ nexus_url ~ "/repository/ubuntu-archive" if nexus_url else "archive.ubuntu.com/ubuntu" }}'
mirror_apt_ubuntu_security: 'http://{{ nexus_url ~ "/repository/ubuntu-security" if nexus_url else "security.ubuntu.com/ubuntu" }}'
mirror_apt_ubuntu_ports: 'http://{{ nexus_url ~ "/repository/ubuntu-ports" if nexus_url else "ports.ubuntu.com/ubuntu-ports" }}'
mirror_apt_azlux: 'https://{{ nexus_url ~ "/repository/azlux-debian" if nexus_url else "packages.azlux.fr/debian" }}'
mirror_apt_nodesource: 'https://{{ nexus_url ~ "/repository/nodesource-node22" if nexus_url else "deb.nodesource.com/node_22.x" }}'
mirror_apt_netdata: 'https://{{ nexus_url ~ "/repository/netdata" if nexus_url else "repo.netdata.cloud/repos/stable/ubuntu" }}'
mirror_apt_fluentbit: 'https://{{ nexus_url ~ "/repository/fluentbit" if nexus_url else "packages.fluentbit.io/ubuntu" }}'
mirror_apt_docker: 'https://{{ nexus_url ~ "/repository/docker-ce" if nexus_url else "download.docker.com/linux/ubuntu" }}'
# 1password apt proxy targets amd64; aarch64 falls back to upstream.
mirror_apt_1password: 'https://{{ nexus_url ~ "/repository/1password" if (nexus_url and ansible_architecture != "aarch64") else "downloads.1password.com/linux/debian/" ~ ((ansible_architecture == "aarch64") | ternary("arm64", "amd64")) }}'

mirror_github: 'https://{{ nexus_url ~ "/repository/github" if nexus_url else "github.com" }}'
mirror_raw_githubusercontent: 'https://{{ nexus_url ~ "/repository/raw-githubusercontent" if nexus_url else "raw.githubusercontent.com" }}'
mirror_minio: 'https://{{ nexus_url ~ "/repository/minio" if nexus_url else "dl.min.io" }}'
mirror_gitea_dl: 'https://{{ nexus_url ~ "/repository/gitea-dl" if nexus_url else "dl.gitea.com" }}'
mirror_gitea_com: 'https://{{ nexus_url ~ "/repository/gitea-com" if nexus_url else "gitea.com" }}'
mirror_gitea_lab: 'https://{{ nexus_url ~ "/repository/gitea-lab" if nexus_url else "gitea.lab.fahm.fr" }}'
mirror_pypi: 'https://{{ nexus_url ~ "/repository/pypi" if nexus_url else "pypi.org" }}'

ubuntu_mirror: '{{ (ansible_architecture == "aarch64") | ternary(mirror_apt_ubuntu_ports ~ "/", mirror_apt_ubuntu_archive ~ "/") }}'
ubuntu_mirror_security: '{{ (ansible_architecture == "aarch64") | ternary(mirror_apt_ubuntu_ports ~ "/", mirror_apt_ubuntu_security ~ "/") }}'

# Primary uplink iface. `| mandatory` fails the play loud at use-site
# if facts caught no default route (default-via-wg0/tun0 host, or no
# default at fact-gather) instead of silently rendering empty in
# nft/avahi/smb configs.
default_interface: "{{ ansible_default_ipv4.interface | mandatory }}"

macvlan_parent_gateway: "{{ ansible_facts[macvlan_parent].ipv4.network | ansible.utils.ipmath(1) }}"
macvlan_parent_subnet: "{{ ansible_facts[macvlan_parent].ipv4.network }}/{{ ansible_facts[macvlan_parent].ipv4.prefix }}"
macvlan_host_ip: "{{ macvlan_subnet | ansible.utils.ipmath(1) }}"
macvlan_host_mac: "{{ '82:48:10' | random_mac(seed=inventory_hostname) }}"

# wireguard-vanity-keygen -c $NAME/
wireguard_peers:
  - name: lab
    address: 10.123.64.2
    endpoint:
      local: "{{ external_ips.lab }}:51820"
      remote: "home.{{ domain }}:51821"
    is_server: true
    dns_address: "{{ external_ips.pihole }}"
    site_subnet: "{{ site_subnets.home }}"
    public_key: "{{ wireguard_keys.lab.public_key }}"
    private_key: "{{ wireguard_keys.lab.private_key }}"
  - name: pug
    address: 10.123.64.3
    endpoint:
      local: "{{ external_ips.pug }}:51820"
      remote: "home.{{ domain }}:51822"
    is_server: true
    dns_address: "{{ external_ips.pihole }}"
    site_subnet: "{{ site_subnets.home }}"
    public_key: "{{ wireguard_keys.pug.public_key }}"
    private_key: "{{ wireguard_keys.pug.private_key }}"
  - name: box
    address: 10.123.64.5
    endpoint:
      local: "{{ external_ips.box }}:51820"
      remote: home.{{ domain }}:51823
    is_server: true
    dns_address: "{{ external_ips.pihole }}"
    site_subnet: "{{ site_subnets.home }}"
    public_key: "{{ wireguard_keys.box.public_key }}"
    private_key: "{{ wireguard_keys.box.private_key }}"
  - name: laptop
    address: 10.123.66.128
    is_server: false
    public_key: "{{ wireguard_keys.laptop.public_key }}"
    private_key: "{{ wireguard_keys.laptop.private_key }}"
  - name: phone
    address: 10.123.66.129
    is_server: false
    public_key: "{{ wireguard_keys.phone.public_key }}"
    private_key: "{{ wireguard_keys.phone.private_key }}"
  - name: ipad
    address: 10.123.66.130
    is_server: false
    public_key: "{{ wireguard_keys.ipad.public_key }}"
    private_key: "{{ wireguard_keys.ipad.private_key }}"
  - name: spouse_laptop
    address: 10.123.66.131
    is_server: false
    public_key: "{{ wireguard_keys.spouse_laptop.public_key }}"
    private_key: "{{ wireguard_keys.spouse_laptop.private_key }}"
  - name: spouse_phone
    address: 10.123.66.132
    is_server: false
    public_key: "{{ wireguard_keys.spouse_phone.public_key }}"
    private_key: "{{ wireguard_keys.spouse_phone.private_key }}"
  - name: bunk
    address: 10.123.121.3
    endpoint:
      local: "{{ external_ips.bunk }}:51820"
      remote: "{{ synology_endpoint }}:51820"
    post_up: iptables -A FORWARD -i %i -j ACCEPT; iptables -t nat -A POSTROUTING -o ovs_eth0 -j MASQUERADE
    post_down: iptables -D FORWARD -i %i -j ACCEPT; iptables -t nat -D POSTROUTING -o ovs_eth0 -j MASQUERADE
    is_server: true
    site_subnet: "{{ site_subnets.bonniers }}"
    allowed_ips: [ "{{ site_subnets.bonniers }}" ]
    # Lab and pug are the always-on consumers of the bunk offsite link
    # (nightly zfs autobackup replication). Having them send a 25s
    # PersistentKeepalive keeps lab/pug's view of bunk's handshake_ago
    # under ~30s so the netdata wireguard_peer_handshake_stale alarm
    # has a usable signal -- without keepalive, bunk only handshakes
    # during nightly sends and the alarm fires all day. Per-pair (not
    # per-peer) so battery-sensitive mobile peers don't get a forced
    # heartbeat they don't need.
    keepalive_from: [lab, pug]
    dns_address: 10.123.57.1
    public_key: "{{ wireguard_keys.bunk.public_key }}"
    private_key: "{{ wireguard_keys.bunk.private_key }}"

podman_default_network: 10.88.0.0/16
# First range of netavark's default_subnet_pools — every named bridge
# (mosquitto, redis, …) is auto-allocated a /24 from here. Consumed by
# the firewall INPUT accept for aardvark-dns:5333 and homeassistant's
# trusted_proxies (the published-port DNAT lands on a mosquitto-bridge
# IP and SNAT rewrites the source to that bridge's gateway).
podman_bridge_pool: 10.89.0.0/16

# True on hosts that co-locate the HyperDX OTLP receiver. fluentbit
# ships to 127.0.0.1 instead of TLS-through-nginx; the ingest token
# still authenticates (loopback HTTP).
fluentbit_otlp_local: false

pihole_keepalived_peers:
  - lab
  - pug
  - box
pihole_keepalived_vrid: 1
pihole_adlists:
  - https://v.firebog.net/hosts/lists.php?type=tick
pihole_whitelists:
  - "{{ mirror_raw_githubusercontent }}/anudeepND/whitelist/master/domains/whitelist.txt"
  - "{{ mirror_raw_githubusercontent }}/cedwards4038/pihole-whitelist/main/whitelist.txt"
  - "{{ mirror_raw_githubusercontent }}/anudeepND/whitelist/master/domains/optional-list.txt"
