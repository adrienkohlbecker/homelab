qemu_test: false
qemu_test_minimal: false

# Serial console fragment — arch-specific QEMU UART on test VMs, host_vars
# boot_serial_console on real hardware (empty on lab/pug which have no UART).
# Mirrors the boot role's _boot_serial derivation so refind and other roles
# can consume the same value without re-implementing the logic.
_console_serial: >-
  {% if qemu_test %}
  {{ (ansible_architecture == 'aarch64')
     | ternary('earlycon=pl011,0x9000000,115200 console=ttyAMA0,115200',
               'earlycon=uart8250,io,0x3f8 console=ttyS0,115200') }}
  {% else %}
  {{ boot_serial_console | default('') }}
  {% endif %}
_console_cmdline: "console=tty0{{ (' ' ~ (_console_serial | trim)) if (_console_serial | trim | length > 0) else '' }}"

zfs_has_services_mount: true
zfs_has_scratch_mount: true
zfs_has_ci_scratch_mount: true
zfs_has_media_mount: true
zfs_has_data_mount: true
zfs_has_brumath_mount: true
zfs_has_eckwersheim_mount: true
zfs_has_minio_mount: true
zfs_has_bpool: false
zfs_root: true
grub_bootloader: false
zfs_dozer_filesystem: rpool
zfs_tank_filesystem: rpool
zfs_trim_pools:
  - rpool
zfs_pool_properties:
  - { pool: rpool, name: autotrim, value: "on" }
zfs_mount_cache_datasets:
  - rpool/ROOT/jammy

macvlan_blocks: []
etc_hosts_entries:
  # auth.fahm.fr is a pihole custom DNS entry (→ lab's LAN IP). When pihole
  # is under load, Go-runtime DNS lookups (gitea OIDC, headscale) time out
  # waiting for a UDP response. Pinning it here bypasses pihole entirely.
  auth.fahm.fr: "{{ network.hosts.lab.physical }}"
fail2ban_enabled: false
has_transcoding_acceleration: false
minio_enabled: false
ssh_public_keys_additional: ""

# Auto-discovered /dev/disk/by-id stems for every rotational drive on
# the host. Consumed by roles/hdparm (charts.d collector) and
# roles/hd_idle (spindown timer config) -- both want the same set.
# Filter chain:
#   name prefix    excludes md/dm/loop/sr/ram/zd kernel pseudo block
#                  devices, which can report rotational=1 but have
#                  nothing to spin (observed on box's mdadm-EFI/swap).
#                  ansible_devices' `virtual` field looks like it
#                  should discriminate this, but on modern kernels
#                  /sys/block/<x> is always a symlink and ansible's
#                  detection logic sets virtual=1 for every disk --
#                  unusable as a real-vs-pseudo filter, so we fall
#                  back to the name prefix.
#   rotational=1   skip SSDs / NVMe (spindown is harmful + nonsensical;
#                  hdparm -C is also nonsensical on them).
#   removable=0    skip USB-attached HDDs -- they tend to be backup
#                  targets where mid-write spindown is harmful and
#                  spin-up during use is expected.
#   links.ids      skip drives udev didn't surface a /dev/disk/by-id/
#                  link for (no stable identifier surfaced; the gap is
#                  surfaced at apply time by roles/hdparm/tasks/netdata.yml).
# Per-drive ID:    `links.ids | sort | first` so the chosen ID is
#                  stable even if udev returns the symlink list in a
#                  different order between reboots.
# Final sort:      orders the per-host list for stable rendering.
rotational_disks_by_id: "{{ ansible_devices | dict2items | rejectattr('key', 'match', '^(md|dm-|loop|sr|ram|zd)') | selectattr('value.rotational', 'equalto', '1') | selectattr('value.removable', 'equalto', '0') | selectattr('value.links.ids') | map(attribute='value.links.ids') | map('sort') | map('first') | sort }}"

ssh_public_keys: |
  ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIEFQDmZidqILmoI6o9f8KLz+0hJad+Xh4Lm5OLsYDZTa adrien.kohlbecker@gmail.com

nginx_csp_default: "data: blob: 'unsafe-inline' 'unsafe-eval' 'self'"

# Operator's personal login account on every host -- postfix aliases its local
# mail to root_email. Pinned here so the alias is host-identity-driven, matching
# the inventory's ansible_ssh_user rather than being connection-derived.
operator_user: ak
root_email: adrien.kohlbecker@gmail.com
smtp_host: smtp.eu.mailgun.org
smtp_port: 587
# SMTPS on 465: TLS from connect. STARTTLS on 587-ish: cleartext
# then upgrade. Plain on 25: no encryption at all. Override the
# pair per-host if you need a non-standard combination.
smtp_use_ssl: "{{ smtp_port | int == 465 }}"
smtp_use_tls: "{{ smtp_port | int not in [25, 465] }}"
email_domain: noreply.{{ domain }}

# User-facing timezone for podman service containers. Host clock
# stays UTC (see roles/timezone/) so journald/syslog correlate with
# external timestamps; containers render user-visible times in local.
system_timezone: Europe/Paris

# Public anycast resolver used to escape bootstrap dependency cycles --
# the pihole container's fallback nameserver, the list-update container's
# only resolver (host resolv.conf points at the DHCP-supplied pihole LAN
# address, a black hole from inside an unrelated container), and the qemu
# test fixture's
# bootstrap before pihole comes up.
bootstrap_dns_resolver: 1.1.1.1

# systemd-journald storage backend. persistent → /var/log/journal/<machine-id>/
# (rides ZFS snapshots/replication on prod). Override to volatile on transient
# test/CI machines so /run/log/journal/ is the only journal location.
journald_storage: persistent

# Org name the influxdb image's DOCKER_INFLUXDB_INIT_* entrypoint creates
# on first boot. Consumer roles (`homeassistant`, etc.) also provision
# tenants in this org via `import_role: name: influxdb, tasks_from: bucket`
# -- bucket.yml refuses any org that doesn't already exist, and this is
# the only one this role bootstraps.
influxdb_root_org: home

# Ports each host-level service publishes. Single source of truth for unit
# templates (--publish for loopback-bound podman services, ListenStream= for
# native daemons), nginx proxy_pass, firewall rules, and cross-role consumers
# (pihole's dnscrypt upstream, etc.). Migrate roles to consume from here as
# they get touched; for collisions, this is the place to grep.
service_ports:
  # Authelia's upstream default is 9091 but that collides with
  # Transmission's well-known default on the same host. The
  # container's internal listener stays on 9091 (see
  # roles/authelia/templates/configuration.yml.j2 server.address);
  # only the host-side --publish maps to this port.
  authelia: 9092
  bazarr: 6767
  dnscrypt_proxy: 5053
  eaton_ipp: 4680
  # fan2go's upstream default is 9001 but that collides with the
  # minio console on the same hosts. fan2go's API + the fan2go-tui
  # config both pull from this single value.
  fan2go_api: 9919
  fluentbit: 2020
  gitea: 3000
  # headscale control-plane HTTP (loopback-published on the fox VPS, nginx
  # fronts it on 443).
  headscale: 8080
  # headscale's prometheus metrics endpoint (container :9090), loopback-published
  # so fox's netdata scrapes it via the go.d prometheus collector.
  headscale_metrics: 9095
  # embedded DERP STUN -- published to the internet (udp/3478), NOT loopback.
  # Listed so the unit template + _verify share one literal; the Hetzner firewall
  # (terraform/hetzner.tf) also opens 3478 but can't read this var, so it keeps
  # its own copy -- the two must stay in sync.
  headscale_stun: 3478
  homeassistant: 8123
  # Sonos S2 event-subscription callback + HomeKit pairing. Published on
  # 0.0.0.0 so iOS/Sonos controllers on the home LAN can reach them; see
  # the comment in homeassistant.service.j2 for the trust-scope rationale.
  homeassistant_sonos: 1400
  homeassistant_homekit: 3722
  homepage: 3003
  influxdb: 8086
  jellyfin: 8096
  kuma: 3001
  lidarr: 8686
  # MinIO S3 API + console, both loopback-only (nginx fronts them on the
  # minio-api / minio subdomains). The console 9001 is the collision the
  # fan2go_api comment above refers to.
  minio_api: 9199
  minio_console: 9001
  # netdata's local HTTP API + dashboard, loopback-bound (netdata.conf
  # [web] bind to = 127.0.0.1); nginx fronts it on the netdata subdomain
  # behind Authelia. The netdata_presence collector and the readiness
  # probe also hit it. (The static files/ healthcheck drop-in keeps the
  # 19999 literal -- it's not templated; 19999 is netdata's fixed default.)
  netdata: 19999
  # Host-side loopback publish; Nexus's own listener is 8081 inside the
  # container.
  nexus: 8082
  nut: 3493
  # pihole admin UI (lighttpd in the container), loopback-only -- nginx
  # fronts it on the pihole subdomain behind authelia. The container's
  # internal listener is :80; only the host-side --publish maps to this.
  pihole: 8943
  # Plex's well-known port, published on 0.0.0.0 for direct native-client
  # connections (not loopback-only like its siblings); nginx also fronts it.
  plex: 32400
  # Profilarr (arr custom-format / quality-profile sync), loopback-published;
  # nginx fronts it on the profilarr subdomain behind authelia. The container
  # listens on 6868 internally.
  profilarr: 6868
  radarr: 7878
  # SABnzbd, loopback-published; nginx fronts it on the sabnzbd subdomain
  # behind authelia. Only the host-side --publish maps to this; the
  # container's internal listener stays on 8080 (sabnzbd.ini port), as does
  # the *arr leg at sabnzbd.dns.podman:8080.
  sabnzbd: 8080
  # SMB over TCP (microsoft-ds). Operator-reachable: macOS clients connect
  # here, and the avahi advert + firewall admin-scope rule consume it.
  samba: 445
  seerr: 5055
  # docker-socket-proxy: read-only Docker-API filter (loopback) that fronts
  # /run/podman/podman.sock so netdata's docker collector reads container
  # metrics without the rw (host-root-equivalent) podman-socket membership.
  socket_proxy: 2375
  sonarr: 8989
  speedtest: 2807
  tautulli: 8182
  transmission: 9091
  transmission_bt: 51413
  wireguard: 51820
  wolweb: 8089
  z2m: 8081

# URL nginx's auth_request subrequest hits for forward-auth on sites
# that opt in via `nginx_site_args.auth`. Cookie domain and portal
# subdomain are per-group (see prod.yml / test.yml).
#
# `authelia_host`: which inventory host runs the Authelia daemon. Other
# hosts route their nginx forward-auth subrequests to that host's
# wireguard IP (the auth.<domain> public URL would work too but the
# NAT-loopback + TLS overhead per subrequest is wasteful when peers
# already share a WG mesh). Set per-group in prod.yml / test.yml.
#
# `authelia_internal_url` resolves to the loopback URL on the authelia_host
# itself (caught by nginx's `iifname "lo"` accept rule, so no firewall hop)
# and to the WG IP on every other host. Authelia's `--publish` binds to
# 0.0.0.0:{{ service_ports.authelia }} so any interface on the host can
# reach it; access is gated by the firewall rule that accepts tcp
# {{ service_ports.authelia }} only from wg0 + WG_SUBNET on the
# authelia_host (see roles/firewall/templates/nftables.conf.j2). The
# lookup pulls authelia_host's wireguard_peers entry; if you add a new
# authelia_host, make sure it has a wireguard_peers entry first.
authelia_internal_url: "http://{% if inventory_hostname == authelia_host -%} 127.0.0.1{%- else -%} {{ (wireguard_peers | selectattr('name', 'eq', authelia_host) | first).address }}{%- endif -%} :{{ service_ports.authelia }}/api/authz/auth-request"

# mDNS device-info model -- drives the Finder sidebar icon for the host.
# Maps to an .icns under /System/Library/CoreServices/CoreTypes.bundle/Contents/Resources/
# on macOS clients. Override per host (e.g. `avahi_device_model: Macmini8,1`).
avahi_device_model: RackMac3,1

# Sonatype Nexus pull-through cache. Empty = use upstream URLs directly.
# Overridden in group_vars/test.yml to route fetches through nexus.lab.fahm.fr.
nexus_url: ""

mirror_apt_ubuntu_archive: 'http://{{ nexus_url ~ "/repository/ubuntu-archive" if nexus_url else "archive.ubuntu.com/ubuntu" }}'
mirror_apt_ubuntu_security: 'http://{{ nexus_url ~ "/repository/ubuntu-security" if nexus_url else "security.ubuntu.com/ubuntu" }}'
mirror_apt_ubuntu_ports: 'http://{{ nexus_url ~ "/repository/ubuntu-ports" if nexus_url else "ports.ubuntu.com/ubuntu-ports" }}'
mirror_apt_azlux: 'https://{{ nexus_url ~ "/repository/azlux-debian" if nexus_url else "packages.azlux.fr/debian" }}'
mirror_apt_netdata: 'https://{{ nexus_url ~ "/repository/netdata" if nexus_url else "repo.netdata.cloud/repos/stable/ubuntu" }}'
mirror_apt_fluentbit: 'https://{{ nexus_url ~ "/repository/fluentbit" if nexus_url else "packages.fluentbit.io/ubuntu" }}'
mirror_apt_docker: 'https://{{ nexus_url ~ "/repository/docker-ce" if nexus_url else "download.docker.com/linux/ubuntu" }}'
mirror_apt_tailscale: 'https://{{ nexus_url ~ "/repository/tailscale" if nexus_url else "pkgs.tailscale.com/stable/ubuntu" }}'
mirror_apt_mise: 'https://{{ nexus_url ~ "/repository/mise" if nexus_url else "mise.en.dev/deb" }}'
# 1password apt proxy targets amd64; aarch64 falls back to upstream.
mirror_apt_1password: 'https://{{ nexus_url ~ "/repository/1password" if (nexus_url and ansible_architecture != "aarch64") else "downloads.1password.com/linux/debian/" ~ ((ansible_architecture == "aarch64") | ternary("arm64", "amd64")) }}'

mirror_github: 'https://{{ nexus_url ~ "/repository/github" if nexus_url else "github.com" }}'
mirror_raw_githubusercontent: 'https://{{ nexus_url ~ "/repository/raw-githubusercontent" if nexus_url else "raw.githubusercontent.com" }}'
mirror_minio: 'https://{{ nexus_url ~ "/repository/minio" if nexus_url else "dl.min.io" }}'
mirror_gitea_dl: 'https://{{ nexus_url ~ "/repository/gitea-dl" if nexus_url else "dl.gitea.com" }}'
mirror_gitea_com: 'https://{{ nexus_url ~ "/repository/gitea-com" if nexus_url else "gitea.com" }}'
mirror_gitea_lab: 'https://{{ nexus_url ~ "/repository/gitea-lab" if nexus_url else "gitea.lab.fahm.fr" }}'
mirror_pypi: 'https://{{ nexus_url ~ "/repository/pypi" if nexus_url else "pypi.org" }}'

ubuntu_mirror: '{{ (ansible_architecture == "aarch64") | ternary(mirror_apt_ubuntu_ports ~ "/", mirror_apt_ubuntu_archive ~ "/") }}'
ubuntu_mirror_security: '{{ (ansible_architecture == "aarch64") | ternary(mirror_apt_ubuntu_ports ~ "/", mirror_apt_ubuntu_security ~ "/") }}'

# Primary uplink iface. `| mandatory` fails the play loud at use-site
# if facts caught no default route (default-via-wg0/tun0 host, or no
# default at fact-gather) instead of silently rendering empty in
# nft/avahi/smb configs.
default_interface: "{{ ansible_default_ipv4.interface | mandatory }}"

# wireguard-vanity-keygen -c $NAME/
# Peer addresses derive from `network.*` (see group_vars/all/network.yml
# and data/network_topology.yml); endpoints and keys stay literal since
# they live outside the topology's scope.
wireguard_peers:
  - name: lab
    address: "{{ network.hosts.lab.wireguard }}"
    endpoint:
      local: "{{ external_ips.lab }}:51820"
      remote: "home.{{ domain }}:51821"
    is_server: true
    public_key: "{{ wireguard_keys.lab.public_key }}"
    private_key: "{{ wireguard_keys.lab.private_key }}"
  - name: pug
    address: "{{ network.hosts.pug.wireguard }}"
    endpoint:
      local: "{{ external_ips.pug }}:51820"
      remote: "home.{{ domain }}:51822"
    is_server: true
    public_key: "{{ wireguard_keys.pug.public_key }}"
    private_key: "{{ wireguard_keys.pug.private_key }}"
  - name: box
    address: "{{ network.hosts.box.wireguard }}"
    endpoint:
      local: "{{ external_ips.box }}:51820"
      remote: home.{{ domain }}:51823
    is_server: true
    public_key: "{{ wireguard_keys.box.public_key }}"
    private_key: "{{ wireguard_keys.box.private_key }}"
  - name: laptop
    address: "{{ network.wireguard.roaming.laptop }}"
    is_server: false
    public_key: "{{ wireguard_keys.laptop.public_key }}"
    private_key: "{{ wireguard_keys.laptop.private_key }}"
  - name: phone
    address: "{{ network.wireguard.roaming.phone }}"
    is_server: false
    public_key: "{{ wireguard_keys.phone.public_key }}"
    private_key: "{{ wireguard_keys.phone.private_key }}"
  - name: bunk
    address: "{{ network.hosts.bunk.wireguard }}"
    endpoint:
      local: "{{ external_ips.bunk }}:51820"
      remote: "{{ synology_endpoint }}:51820"
    is_server: true
    # Lab and pug are the always-on consumers of the bunk offsite link
    # (nightly zfs autobackup replication). Having them send a 25s
    # PersistentKeepalive keeps lab/pug's view of bunk's handshake_ago
    # under ~30s so the netdata wireguard_peer_handshake_stale alarm
    # has a usable signal -- without keepalive, bunk only handshakes
    # during nightly sends and the alarm fires all day. Per-pair (not
    # per-peer) so battery-sensitive mobile peers don't get a forced
    # heartbeat they don't need.
    keepalive_from: [ lab, pug ]
    public_key: "{{ wireguard_keys.bunk.public_key }}"
    private_key: "{{ wireguard_keys.bunk.private_key }}"
  - name: fox
    # External Hetzner Cloud VPS (Headscale control plane) joined to the wg0
    # backbone as a listener: lab/pug dial OUT to it (keepalive_from below) so
    # no inbound is reintroduced at home. fox is a topology host in the
    # `hetzner` site (physical 10.123.55.2 on the Hetzner private net), so its
    # wg address is the +64.0.0 mirror 10.123.119.2 derived in the topology.
    # wg.conf.j2 adds only host routes: peer wg /32s and, for cross-site peers,
    # physical /32s. That lets fox reach lab/pug host services without routing
    # whole home subnets. fox's `hetzner` site (network.hosts.fox.site) differs
    # from home/bonniers, so endpoint-selection never treats fox as same-site
    # and always dials the remote FQDN.
    address: "{{ network.hosts.fox.wireguard }}"
    endpoint:
      remote: "fox.{{ domain }}:51820"
    is_server: true
    keepalive_from: [ lab, pug ]
    public_key: "{{ wireguard_keys.fox.public_key }}"
    private_key: "{{ wireguard_keys.fox.private_key }}"

podman_default_network: 10.88.0.0/16
# First range of netavark's default_subnet_pools — every named bridge
# (mosquitto, …) is auto-allocated a /24 from here. Consumed by
# the firewall INPUT accept for aardvark-dns:5333 and homeassistant's
# trusted_proxies (the published-port DNAT lands on a mosquitto-bridge
# IP and SNAT rewrites the source to that bridge's gateway).
podman_bridge_pool: 10.89.0.0/16

# The VRRP HA pair. box is a qemu test fixture, not a peer: keeping it
# here made lab/pug continuously unicast adverts at the test VM's IP and
# (if box ever ran this role on the LAN at vrid 1) let it join the prod
# election. box still renders its own fragment fine -- it just excludes
# itself, same as the prod hosts do.
pihole_keepalived_peers:
  - lab
  - pug
  - udm
pihole_keepalived_vrid: 1
pihole_adlists:
  - https://v.firebog.net/hosts/lists.php?type=tick
pihole_whitelists:
  - "{{ mirror_raw_githubusercontent }}/anudeepND/whitelist/master/domains/whitelist.txt"
  - "{{ mirror_raw_githubusercontent }}/cedwards4038/pihole-whitelist/main/whitelist.txt"
  - "{{ mirror_raw_githubusercontent }}/anudeepND/whitelist/master/domains/optional-list.txt"
