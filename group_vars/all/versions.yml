# Single source of truth for every pinned upstream version in the fleet:
# container image tags, downloadable binaries/tarballs/debs, and package-
# manager pins. Each entry is consumed by its role's tasks/templates by var
# name -- ansible resolves vars globally, so a role need not redefine the pin
# it uses. A version bump is one edit here.
#
# Conventions:
#   - Container image refs use canonical upstream names (docker.io/..., ghcr.io/...);
#     mirror redirection to Nexus lives in registries.conf, not here.
#   - Downloadable artifacts keep the full URL ADJACENT to its sha256, keyed by
#     ansible_architecture (x86_64 / aarch64) when upstream ships per-arch
#     assets, so a human auditing a checksum sees exactly which URL it pins.
#
# Test-scaffolding images (busybox/alpine probes, the influxdb _setup fixture)
# are deliberately NOT centralized here -- they pin throwaway test tooling, not
# the versions we run in production.

# === Container images ========================================================

adguard_image:       docker.io/adguard/adguardhome:v0.107.77  # 2026-06-02
authelia_image:      docker.io/authelia/authelia:4.39.19  # 2026-04-12
bazarr_image:        docker.io/linuxserver/bazarr:1.5.2  # 2026-05-11

# headscale image, referenced by BOTH the service unit
# (templates/headscale.service.j2) and the mockoidc OIDC boot-test fixture
# (tasks/_setup.yml -- mockoidc is a subcommand of this same binary). A single
# constant so a version bump moves both together; a one-sided bump would
# silently test the OIDC boot path against a stale mockoidc binary.
headscale_image:     docker.io/headscale/headscale:0.26.1  # 2026-06-06

homeassistant_image: ghcr.io/home-assistant/home-assistant:2026.6.3  # 2026-06-12
homepage_image:      ghcr.io/gethomepage/homepage:v1.13  # 2026-05-08 (v1.13.0)
# Stays on the InfluxDB 2.x line. 3.x is a ground-up Rust rewrite (TSM ->
# columnar Arrow/Parquet/DataFusion) on a separate track, NOT a version bump:
# it drops Flux entirely (only SQL/InfluxQL), has no in-place upgrade (TSM data
# is unreadable -- migration means dual-write + line-protocol backfill), and 3
# Core regresses on what we use (no built-in UI, ~72h single-query range cap, 5
# database / 2000 table caps, admin-tokens-only). The 2.x line is maintained
# (not EOL'd) and keeps Flux, the UI, and scoped tokens, so we ride it.
# NB: the unsuffixed/`latest` Docker tag now resolves to 3 Core -- keep an
# explicit 2.x tag pinned here. 2.8.0 did a one-way BoltDB schema upgrade, so
# back up /mnt/services/influxdb before applying a bump that crosses it.
influxdb_image:      docker.io/influxdb:2.9.1  # 2026-05-11
jellyfin_image:      docker.io/jellyfin/jellyfin:10.11.11  # 2026-06-06
kuma_image:          docker.io/louislam/uptime-kuma:2.3.2  # 2025-05-03
lidarr_image:        docker.io/linuxserver/lidarr:3.1.0  # 2025-11-16
mosquitto_image:     docker.io/eclipse-mosquitto:2.0.21  # 2025-03-06
nexus_image:         docker.io/sonatype/nexus3:3.91.1  # 2026-04-18
plex_image:          docker.io/plexinc/pms-docker:1.43.2.10687-563d026ea  # 2026-05-19
profilarr_image:     docker.io/santiagosayshey/profilarr:v1.1.3  # 2024-08-26
radarr_image:        docker.io/linuxserver/radarr:5.26.2  # 2025-06-11
sabnzbd_image:       docker.io/linuxserver/sabnzbd:5.0.0  # 2025-05-01
seerr_image:         ghcr.io/seerr-team/seerr:v3.2.0  # 2026-04-15

# Tecnativa's docker-socket-proxy: a minimal HAProxy that filters the Docker
# API by method/section. Pinned to a release tag; the image is multi-arch
# (amd64 + arm64). Canonical upstream ref -- registries.conf rewrites it to
# the Nexus mirror, so don't hard-code a mirror prefix here.
socket_proxy_image:  ghcr.io/tecnativa/docker-socket-proxy:v0.4.2  # 2025-12-16

sonarr_image:        docker.io/linuxserver/sonarr:4.0.15  # 2025-06-20
speedtest_image:     ghcr.io/librespeed/speedtest:5.3.3  # 2024-05-24
tautulli_image:      docker.io/linuxserver/tautulli:2.14.2  # 2024-05-18
transmission_image:  docker.io/linuxserver/transmission:4.1.1  # 2026-02-20
wolweb_image:        ghcr.io/sameerdhoot/wolweb:alpine@sha256:4dacd33d9d1d747efa4018a7fcf07c62e3a4afd348c0ef45ca31fe4ecd51c36a  # 2025-08-04 (image build; rolling :alpine)
z2m_image:           ghcr.io/koenkk/zigbee2mqtt:2.12.0  # 2026-06-09

# === Downloadable artifacts (binaries, tarballs, debs) =======================
# Alphabetical by role. URL adjacent to its sha256; per-arch maps keyed by
# ansible_architecture where upstream ships per-arch assets.

# Eaton Intelligent Power Protector -- proprietary UPS shutdown agent.
# Eaton ships the binary out of band via their customer portal (no
# public apt repo), and the operator uploads it into a personal Gitea
# generic-package registry. URL and sha256 are kept adjacent here so
# an auditor can verify the pin without recomposing the URL from the
# version constant.
eaton_ipp_version: "1.75.183"
eaton_ipp_release:
  x86_64:
    url: "{{ mirror_gitea_lab }}/api/packages/adrienkohlbecker/generic/eaton_ipp/1.75/ipp-linux_1.75.183-1_amd64.deb"
    sha256: 16eb1df27bff587203ed7e3b44c7bff1eb6220acac7bbc269b2cff47978346ac

# fan2go fan controller. Upstream ships only linux-amd64; fan2go-tui ships
# no binaries at all, so both arches always build it from source. That
# forces the Go toolchain onto every fan2go_enabled host regardless of arch
# -- documented in roles/fan2go/tasks/main.yml's phase comment.
fan2go_version: "0.13.0"
fan2go_artifacts:
  # No-nvml flavor: smaller, no NVIDIA dependency (lab/pug have no GPUs).
  x86_64:
    url: "https://github.com/markusressel/fan2go/releases/download/{{ fan2go_version }}/fan2go-linux-amd64-no-nvml"
    sha256: "7cc9ee0c67ccefa0c5c2e693902f41133c075498360258266a24b7d8886ff155"
  # No upstream prebuilt -- only repo + git ref. fan2go's go.mod
  # requires Go >= 1.25, newer than apt's golang-go, so the build path
  # uses the pinned Go toolchain below.
  aarch64:
    repo: "https://github.com/markusressel/fan2go.git"
    git_ref: "{{ fan2go_version }}"

# Official TUI for fan2go. Connects to the daemon's HTTP API over
# loopback (api: enabled: true required in the per-host fan2go.yaml).
# No upstream binaries on any arch; pin to the tag's commit SHA so the
# git fetch is reproducible even if the tag is later moved.
fan2go_tui_version: "0.2.1"
fan2go_tui_artifacts:
  repo: "https://github.com/markusressel/fan2go-tui.git"
  git_ref: "30de59be623559e82900472323d0300dad2fab00"

# Pinned Go toolchain for the source-build paths. Bumping this is
# decoupled from fan2go_version / fan2go_tui_version: bump Go only when
# upstream's go.mod raises the floor (fan2go @ 0.13.0 is 1.25;
# fan2go-tui @ 0.2.1 is 1.24) or to pick up Go security fixes.
fan2go_go_version: "1.26.3"
fan2go_go_artifacts:
  x86_64:
    url: "https://go.dev/dl/go{{ fan2go_go_version }}.linux-amd64.tar.gz"
    sha256: "2b2cfc7148493da5e73981bffbf3353af381d5f93e789c82c79aff64962eb556"
  aarch64:
    url: "https://go.dev/dl/go{{ fan2go_go_version }}.linux-arm64.tar.gz"
    sha256: "9d89a3ea57d141c2b22d70083f2c8459ba3890f2d9e818e7e933b75614936565"

