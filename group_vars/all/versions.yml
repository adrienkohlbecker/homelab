# gitlab-runner: a single static Go executable installed straight into
# /usr/local/bin (no apt repo, no container). Bumping = edit the version
# constant plus the URL and sha256 for every arch in lockstep, then re-apply;
# the unit's next restart picks up the new binary. ansible_architecture
# (x86_64 / aarch64) keys map onto upstream's amd64 / arm64 asset names. The
