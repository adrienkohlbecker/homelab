# Container image references for every production service, single source of
# truth. Each `<svc>_image` is consumed by that role's `*.service.j2` ExecStart
# (and, where a role's `_verify.yml`/`_setup.yml` runs the same image, by those
# too -- so a version bump moves the service and its test in lockstep).
#
# Use canonical upstream image names here (docker.io/..., ghcr.io/...); mirror
# redirection to Nexus lives in registries.conf, not in these refs.
#
# Test-scaffolding images (busybox/alpine probes, the influxdb _setup fixture)
# are deliberately NOT centralized here -- they pin throwaway test tooling, not
# the versions we run in production.

adguard_image:       docker.io/adguard/adguardhome:v0.107.77  # 2026-06-02
authelia_image:      docker.io/authelia/authelia:4.39.19  # 2026-04-12
bazarr_image:        docker.io/linuxserver/bazarr:1.5.2  # 2026-05-11

# headscale image, referenced by BOTH the service unit
# (templates/headscale.service.j2) and the mockoidc OIDC boot-test fixture
# (tasks/_setup.yml -- mockoidc is a subcommand of this same binary). A single
# constant so a version bump moves both together; a one-sided bump would
# silently test the OIDC boot path against a stale mockoidc binary.
headscale_image:     docker.io/headscale/headscale:0.26.1  # 2026-06-06

homeassistant_image: ghcr.io/home-assistant/home-assistant:2026.6.3  # 2026-06-12
homepage_image:      ghcr.io/gethomepage/homepage:v1.13  # 2026-05-08 (v1.13.0)
influxdb_image:      docker.io/influxdb:2.7.11  # 2024-11-26
jellyfin_image:      docker.io/jellyfin/jellyfin:10.11.11  # 2026-06-06
kuma_image:          docker.io/louislam/uptime-kuma:2.3.2  # 2025-05-03
lidarr_image:        docker.io/linuxserver/lidarr:3.1.0  # 2025-11-16
mosquitto_image:     docker.io/eclipse-mosquitto:2.0.21  # 2025-03-06
nexus_image:         docker.io/sonatype/nexus3:3.91.1  # 2026-04-18
plex_image:          docker.io/plexinc/pms-docker:1.43.2.10687-563d026ea  # 2026-05-19
profilarr_image:     docker.io/santiagosayshey/profilarr:v1.1.3  # 2024-08-26
radarr_image:        docker.io/linuxserver/radarr:5.26.2  # 2025-06-11
sabnzbd_image:       docker.io/linuxserver/sabnzbd:5.0.0  # 2025-05-01
seerr_image:         ghcr.io/seerr-team/seerr:v3.2.0  # 2026-04-15

# Tecnativa's docker-socket-proxy: a minimal HAProxy that filters the Docker
# API by method/section. Pinned to a release tag; the image is multi-arch
# (amd64 + arm64). Canonical upstream ref -- registries.conf rewrites it to
# the Nexus mirror, so don't hard-code a mirror prefix here.
socket_proxy_image:  ghcr.io/tecnativa/docker-socket-proxy:v0.4.2  # 2025-12-16

sonarr_image:        docker.io/linuxserver/sonarr:4.0.15  # 2025-06-20
speedtest_image:     ghcr.io/librespeed/speedtest:5.3.3  # 2024-05-24
tautulli_image:      docker.io/linuxserver/tautulli:2.14.2  # 2024-05-18
transmission_image:  docker.io/linuxserver/transmission:4.1.1  # 2026-02-20
wolweb_image:        ghcr.io/sameerdhoot/wolweb:alpine@sha256:4dacd33d9d1d747efa4018a7fcf07c62e3a4afd348c0ef45ca31fe4ecd51c36a  # 2025-08-04 (image build; rolling :alpine)
z2m_image:           ghcr.io/koenkk/zigbee2mqtt:2.12.0  # 2026-06-09
