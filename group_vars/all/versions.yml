# macos_vm: pinned upstream artifacts from kholia/OSX-KVM.
#
# To bump:
#   1. Pick a new commit on master (review the diff first; OpenCore config
#      changes can break NVRAM/iCloud).
#   2. Compute sha256 of OpenCore/OpenCore.qcow2 and fetch-macOS-v2.py at
#      that commit, e.g.:
#        curl -sSL "https://raw.githubusercontent.com/kholia/OSX-KVM/<sha>/OpenCore/OpenCore.qcow2" | sha256sum
#        curl -sSL "https://raw.githubusercontent.com/kholia/OSX-KVM/<sha>/fetch-macOS-v2.py" | sha256sum
#   3. Update both fields below in lockstep.
#
# Bumping OpenCore.qcow2 in-place will reset OpenCore NVRAM, which kicks
# the guest out of iCloud -- only do it during a planned re-install.
# (The macOS release itself -- Sequoia "15" -- is host-overridable and lives
# in roles/macos_vm/defaults/main.yml, not here.)
macos_vm_osx_kvm_commit: 4c378a4b5e0b219783683012bec680325eb40719
macos_vm_opencore_qcow2_url: "{{ mirror_raw_githubusercontent }}/kholia/OSX-KVM/{{ macos_vm_osx_kvm_commit }}/OpenCore/OpenCore.qcow2"
macos_vm_opencore_qcow2_sha256: "6ed36c0c2a4206ccc695f6b1a734a1cc6f94d288b0517c705d351c63cb92a6f3"
macos_vm_fetch_macos_url: "{{ mirror_raw_githubusercontent }}/kholia/OSX-KVM/{{ macos_vm_osx_kvm_commit }}/fetch-macOS-v2.py"
macos_vm_fetch_macos_sha256: "39ac6d26bd265f5d32198062f515ad15ef93afb7a74e702be2b008090d5bd5f3"

