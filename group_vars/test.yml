  ghcr.io: github
  registry.gitlab.com: gitlab
  quay.io: quay

# Test-only placeholder for lab's GitLab shell runner. Prod supplies the real
# lab token via the prod vault.
gitlab_runner_lab_token: glrt-TEST_PLACEHOLDER_DO_NOT_USE
gitlab_runner_aws_qemu_token: glrt-TEST_PLACEHOLDER_DO_NOT_USE

# Static name → IP overrides for the test environment. Two consumers share
# this map:
#   1. roles/hostname/templates/hosts.j2 renders them into /etc/hosts on
#      every test box, so apt / podman / get_url resolve lab-internal
#      hostnames to reachable LAN IPs instead of the WAN IP that public
#      DNS returns (the WAN IP isn't routable from inside qemu user-mode
#      networking).
#   2. roles/adguard/templates/adguard.service.j2 plumbs them as podman
#      --add-host flags, bypassing adguard's own split-horizon rewrites
#      (which resolve *.lab.fahm.fr to the fake test external_ips.lab).
# Production keeps the map empty, so both consumers render no overrides.
# Values reference `prod_network` (not `network`) because these hostnames
# MUST point at the live LAN, not the gsub'd test subnet.
etc_hosts_entries:
  nexus.lab.fahm.fr: "{{ prod_network.hosts.lab.physical }}"
  gitea.lab.fahm.fr: "{{ prod_network.hosts.lab.physical }}"

# Test overrides `network` (from group_vars/all/network.yml's
# `prod_network` default) with a gsub'd 10.234.x view: same shape as
# prod, disjoint subnet. Consumers read `network` directly, so they
# automatically pick up the gsub.
network: "{{ prod_network | to_yaml | replace('10.123', '10.234') | from_yaml }}"

