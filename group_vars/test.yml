# Authelia portal sits at auth.<inventory_hostname>.<domain> in test
# (auth.box.mhaf.fr for the box fixture), not the apex auth.<domain>
# that prod uses. Cloudflare's *.box.mhaf.fr wildcard makes the
# longer name resolvable; auth.mhaf.fr at apex is not. Session
# cookie scope follows: .box.mhaf.fr covers every protected service
# on box (jellyfin.box.mhaf.fr, paperless.box.mhaf.fr, etc.).
# Templated against inventory_hostname so the same value works for
# any future test host.
authelia_cookie_domain: "{{ inventory_hostname }}.{{ domain }}"

# Each test host runs its own Authelia (real role on `authelia` testrole,
# the stub on every other testrole that needs the listener), so the
# authelia_host is the host itself. Net effect: authelia_internal_url
# resolves to 127.0.0.1 on the test fixture, no cross-host hop.
authelia_host: "{{ inventory_hostname }}"

