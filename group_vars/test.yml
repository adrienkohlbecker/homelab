# hash of "changeme" (Authelia's required format); the matching
# plaintext lives next to the consumer role's other test vars
# (minio_oidc_client_secret below). The redirect_uri is templated
# against inventory_hostname so the same value works for any
# future test host.
authelia_oidc_clients:
  - client_id: minio
    client_name: MinIO
    client_secret: '$pbkdf2-sha512$310000$JURoTanVWouRkvJ.Tyml1A$B4DZyqy25cNbFfwFiPMyAdWcuxiELOBAlH0NfQSxB9jgDTQXiyBIMsFY2Z5I3XO5ItLH1pP5C5ujKja71Bqoww'
    authorization_policy: one_factor
    redirect_uris:
      - 'https://minio.{{ inventory_hostname }}.{{ domain }}/oauth_callback'
  - client_id: paperless
    client_name: Paperless
    # Same "changeme" pbkdf2 hash as the minio test client. Sharing
    # the plaintext across test clients is fine -- the box VM is
    # ephemeral and _verify never completes a real handshake.
    client_secret: '$pbkdf2-sha512$310000$JURoTanVWouRkvJ.Tyml1A$B4DZyqy25cNbFfwFiPMyAdWcuxiELOBAlH0NfQSxB9jgDTQXiyBIMsFY2Z5I3XO5ItLH1pP5C5ujKja71Bqoww'
    authorization_policy: one_factor
    redirect_uris:
      - 'https://paperless.{{ inventory_hostname }}.{{ domain }}/accounts/oidc/authelia/login/callback/'
  - client_id: gitea
    client_name: Gitea
    # Same "changeme" pbkdf2 hash. Gitea's CLI provisioning is gated
    # off in qemu_test (gitea admin auth add-oauth validates the
    # discovery URL at registration time, which would need real
    # Authelia + multi-SAN snakeoil + DNS host entry on box -- same
    # trade minio explicitly declined). The client row stays here so
    # the authelia _verify still parses a stable shape.
    client_secret: '$pbkdf2-sha512$310000$JURoTanVWouRkvJ.Tyml1A$B4DZyqy25cNbFfwFiPMyAdWcuxiELOBAlH0NfQSxB9jgDTQXiyBIMsFY2Z5I3XO5ItLH1pP5C5ujKja71Bqoww'
    authorization_policy: one_factor
    redirect_uris:
      - 'https://gitea.{{ inventory_hostname }}.{{ domain }}/user/oauth2/authelia/callback'
  - client_id: jellyfin
    client_name: Jellyfin
    # Same "changeme" pbkdf2 hash. Jellyfin's SSO provider is provisioned
    # via the plugin API (POST /sso/OID/Add), gated not qemu_test like
    # gitea -- the box fixture has no Jellyfin admin/token and no Authelia,
    # so no provider is registered there. This row keeps the authelia
    # _verify's clients list a stable shape. Prod uses two_factor;
    # one_factor here matches the other test clients (no 2FA on box).
    client_secret: '$pbkdf2-sha512$310000$JURoTanVWouRkvJ.Tyml1A$B4DZyqy25cNbFfwFiPMyAdWcuxiELOBAlH0NfQSxB9jgDTQXiyBIMsFY2Z5I3XO5ItLH1pP5C5ujKja71Bqoww'
    authorization_policy: one_factor
    # The SSO plugin's IdentityModel OidcClient authenticates at the token
    # endpoint with client_secret_post (creds in the body), not Authelia's
    # default client_secret_basic -- so the client must register post or
    # Authelia rejects the code exchange.
    token_endpoint_auth_method: client_secret_post
    redirect_uris:
      - 'https://jellyfin.{{ inventory_hostname }}.{{ domain }}/sso/OID/redirect/authelia'

# Plaintext OIDC client secrets handed to consumer roles.
# Pairs with the pbkdf2 hash above; rotate both halves together.
minio_oidc_client_secret: changeme
paperless_oidc_client_secret: changeme
gitea_oidc_client_secret: changeme

# Test-fixture user. Hash is for the password "authelia" -- the
# canonical example hash from Authelia's docs. Tracked plaintext
# here because (1) box is ephemeral, (2) _verify.yml only exercises
# unauthenticated probes, (3) Authelia's file backend needs at
# least one entry to start. Prod users live vaulted in prod.yml.
authelia_users:
  testuser:
    displayname: Test User
    password_hash: "$argon2id$v=19$m=65536,t=3,p=4$BpLnfgDsc2WD8F2q$o/vzA4myCqZZ36WUPneNS5x4MaDXFGYrYqOnjvKK4Cw"
    email: testuser@{{ inventory_hostname }}.{{ domain }}
    groups:
      - admins

# roles/tailscale mesh-client test config. The control plane is the local
# headscale its _setup stands up, addressed over the plain-http loopback (no TLS
# trust needed); route-approval delegates back to the converging host itself.
# The pre-auth key is self-minted in main.yml's qemu_test branch (not here),
# since the harness can't carry a runtime fact across its per-phase processes.
tailscale_login_server: "http://localhost:{{ service_ports.headscale }}"
tailscale_headscale_host: "{{ inventory_hostname }}"
