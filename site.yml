- name: Base installation
  hosts: box,lab,pug,fox
  roles:
    - hwe_kernel
    - bash
    - user
    - cleanup
    - hostname
    - apt
    - apt_upgrade
    - swap
    - netplan
    - wireguard
    - locale
    - console
    - timezone
    - unattended_upgrades
    - logrotate
    - journald
    - fail2ban
    - ssh
    - ntp
    - postfix
    - zfs
    - zfs_autobackup
    - zfs_mount
    - zfsbootmenu
    - refind
    - podman
    - services
    - certbot
    - nginx
    - csplogger
    - netdata
    - fluentbit

- name: External VPS (fox)
  hosts: box,fox
  roles:
    - headscale

- name: Lab and Pug
  hosts: box,lab,pug
  roles:
    - firewall
    - hdparm
    - hd_idle
    - smart
    - lm_sensors
    - fancontrol
    - fan2go
    - powertop
    - ssh_root
    - macvlan
    - avahi
    - samba
    - static_curl
    - kdump
    - eaton_ipp
    - wolweb
    - keepalived
    - keepalived_exporter
    - nut_server
    - nut_monitor
    - resolved
    - dnscrypt_proxy
    - pihole
    - docker_client
    - subid
    - tailscale

- name: Lab roles
  hosts: box,lab
  roles:
    - libvirt
    - prometheus
    - minio
    - influxdb
    - scratch
    - data
    - media
    - jellyfin
    - sort_ini
    - sabnzbd
    - sonarr
    - radarr
    - bazarr
    - lidarr
    - seerr
    - plex
    - tautulli
    - gitea
    - nodejs
    - gitea_runner
    - github_runner
    - transmission
    - getmail
    - webmail
    - compta
    - speedtest
    - filebrowser
    - mosquitto
    - z2m
    - homeassistant
    - kuma
    - authelia
    - healthchecks
    - hyperdx
    - spouse
    - redis
    - paperless
    - profilarr
    - openproject
    - nexus
    - homepage

- name: Reboot check
  hosts: box,lab,pug,fox
  tasks:
    - name: Check if a reboot is required
      stat:
        path: /var/run/reboot-required
      register: reboot_required
      tags:
        - always

    - name: Restart machine
      reboot:
      throttle: 1
      become: true
      when: reboot_required.stat.exists
      tags:
        - always
