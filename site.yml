# Roles are ordered as a layer ladder: each section builds on the guarantees
# of the ones above it. "Base machine install" (host base -> storage -> service
# platform -> observability) runs on every managed host; the service plays below
# are host-scoped and assume the full platform is already in place. See CLAUDE.md
# "Role layering" for the rule on where a new role belongs.
- name: Base machine install
  hosts: box,lab,pug,fox
  roles:
    # Host base -- OS, networking, remote access, system services. These roles
    # are mutually independent, so the order within this band is immaterial.
    - hwe_kernel
    - bash
    - user
    - cleanup
    - hostname
    - apt
    - apt_upgrade
    - swap
    - netplan
    - wireguard
    - locale
    - console
    - timezone
    - unattended_upgrades
    - logrotate
    - journald
    - fail2ban
    - ssh
    - ssh_root
    - ntp
    - postfix
    # Storage & boot substrate -- ZFS datasets/snapshots and the bootloader.
    - zfs
    - zfs_mount
    - zfs_autobackup
    - boot
    - zfsbootmenu
    - refind
    # Service platform -- container runtime, /mnt/services, web/TLS front door.
    - podman
    - services
    - certbot
    - nginx
    # Observability.
    - csplogger
    - socket_proxy
    - netdata
    - fluentbit

# Services -- host-scoped, built on the platform above. A role belongs here
# (not in Base machine install) when only a subset of hosts run it.
- name: External VPS (fox)
  hosts: box,fox
  roles:
    - headscale

- name: Lab and Pug
  hosts: box,lab,pug
  roles:
    - firewall
    - hdparm
    - hd_idle
    - smart
    - lm_sensors
    - fancontrol
    - fan2go
    - powertop
    - macvlan
    - avahi
    - samba
    - static_curl
    - kdump
    - eaton_ipp
    - wolweb
    - keepalived
    - keepalived_exporter
    - nut_server
    - nut_monitor
    - resolved
    - dnscrypt_proxy
    - pihole
    - docker_client
    - subid
    - tailscale

- name: Lab roles
  hosts: box,lab
  roles:
    - libvirt
    # Storage dataset producers -- placed before the apps that mount
    # /mnt/{scratch,data,media}.
    - scratch
    - data
    - media
    - prometheus
    - minio
    - influxdb
    - jellyfin
    - sort_ini
    - sabnzbd
    - sonarr
    - radarr
    - bazarr
    - lidarr
    - seerr
    - plex
    - tautulli
    - gitea
    - nodejs
    - gitea_runner
    - github_runner
    - transmission
    - getmail
    - webmail
    - compta
    - speedtest
    - filebrowser
    - mosquitto
    - z2m
    - homeassistant
    - kuma
    - authelia
    - healthchecks
    - hyperdx
    - spouse
    - redis
    - paperless
    - profilarr
    - openproject
    - nexus
    - homepage

- name: UDM DNS failover
  hosts: udm
  roles:
    - udm_dns_failover

- name: Reboot check
  hosts: box,lab,pug,fox
  # serial: 1 reboots the fleet one host at a time. The reboot helper
  # fires the reboot async (so throttle alone would only serialize the
  # wait phase, not the reboots themselves); play-level serial keeps a
  # whole host down-and-back before the next one cycles.
  serial: 1
  tasks:
    - name: Check if a reboot is required
      stat:
        path: /var/run/reboot-required
      register: reboot_required
      tags:
        - always

    # DNS safety gate: refuse to reboot the last DNS-serving host.
    # Two concurrent playbooks (--limit lab / --limit pug) can race past
    # the probe before either actually reboots. Keepalived priority breaks
    # the tie: the lower-priority host yields 30s, letting the higher-
    # priority host reboot first; the post-yield re-probe detects the
    # peer's absence and waits for it to recover before proceeding.
    - name: DNS safety gate
      when:
        - not ansible_check_mode
        - reboot_required.stat.exists
        - inventory_hostname in pihole_keepalived_peers
      vars:
        _reboot_dns_peers: "{{ pihole_keepalived_peers | reject('eq', inventory_hostname) | list }}"
        _reboot_dns_ips: "{{ _reboot_dns_peers | map('extract', external_ips) | list }}"
        _reboot_is_lowest_priority: >-
          {{ pihole_keepalived_priority <
             (_reboot_dns_peers | map('extract', hostvars, 'pihole_keepalived_priority') | max) }}
      tags:
        - always
      block:
        - name: Assert pihole keepalived priorities are distinct
          assert:
            that:
              - (pihole_keepalived_peers | map('extract', hostvars, 'pihole_keepalived_priority') | unique | list | length)
                == (pihole_keepalived_peers | length)
            fail_msg: >-
              pihole_keepalived_priority must be distinct across all peers
              ({{ pihole_keepalived_peers | map('extract', hostvars, 'pihole_keepalived_priority') | list }}).
              Equal priorities defeat the yield-based race protection.

        - name: Probe peer pihole before reboot
          command: dig +short +timeout=3 +tries=2 @{{ item }} pi.hole
          loop: "{{ _reboot_dns_ips }}"
          register: _reboot_dns_probe
          changed_when: false
          failed_when: false

        - name: Refuse to reboot — no peer is serving DNS
          when: _reboot_dns_probe.results | selectattr('rc', 'eq', 0) | list | length == 0
          fail:
            msg: >-
              No pihole peer is answering DNS — refusing to reboot to preserve
              DNS availability. Recover a peer first, or rm /var/run/reboot-required.

        - name: Yield to higher-priority DNS peer (race protection)
          when: _reboot_is_lowest_priority | bool
          pause:
            seconds: 30
            prompt: >-
              Lower keepalived priority — yielding 30s in case a higher-priority
              peer is rebooting concurrently

        - name: Re-probe peer pihole after yield
          when: _reboot_is_lowest_priority | bool
          command: dig +short +timeout=3 +tries=2 @{{ item }} pi.hole
          loop: "{{ _reboot_dns_ips }}"
          register: _reboot_dns_reprobe
          changed_when: false
          failed_when: false

        - name: Wait for peer to finish rebooting
          when:
            - _reboot_is_lowest_priority | bool
            - _reboot_dns_reprobe.results | selectattr('rc', 'eq', 0) | list | length == 0
          command: dig +short +timeout=3 +tries=2 @{{ item }} pi.hole
          loop: "{{ _reboot_dns_ips }}"
          register: _reboot_dns_wait
          until: _reboot_dns_wait.rc == 0
          retries: 30
          delay: 10
          changed_when: false
          failed_when: false

        - name: Refuse to reboot — peer did not recover
          when:
            - _reboot_is_lowest_priority | bool
            - _reboot_dns_reprobe.results | selectattr('rc', 'eq', 0) | list | length == 0
            - _reboot_dns_wait.results | default([]) | selectattr('rc', 'eq', 0) | list | length == 0
          fail:
            msg: >-
              No pihole peer recovered DNS after 5 min — refusing to reboot.
              Investigate the peers manually.

    # Graceful VIP drain: stop keepalived before the reboot so the peer
    # claims the VIP via the priority-0 VRRP advertisement *before* pihole
    # shuts down. Without this, systemd stops both concurrently — pihole
    # can die first, leaving the VIP on a host with no DNS for the ~2s
    # until the healthcheck FAULT triggers failover.
    #
    # Wrapped in block/rescue so keepalived is restarted if any task
    # between the stop and the actual reboot fails — otherwise a
    # transient ansible error leaves keepalived down on a running host.
    - name: Drain keepalived VIP before reboot
      when:
        - not ansible_check_mode
        - reboot_required.stat.exists
        - inventory_hostname in pihole_keepalived_peers
      tags:
        - always
      block:
        - name: Stop keepalived to release the VIP
          systemd:
            name: keepalived.service
            state: stopped
          become: true

        - name: Verify peer claimed the VIP
          command: dig +short +timeout=5 +tries=3 @{{ pihole_keepalived_ip }} pi.hole
          register: _reboot_vip_check
          until: _reboot_vip_check.rc == 0
          retries: 6
          delay: 2
          changed_when: false
          failed_when: false

        - name: Refuse to reboot — VIP did not migrate
          when: _reboot_vip_check.rc | default(1) != 0
          fail:
            msg: >-
              Pihole VIP {{ pihole_keepalived_ip }} is not answering DNS after
              keepalived stop — peer may not have claimed it. Keepalived will
              be restarted by the rescue block. Investigate the peer manually.
      rescue:
        - name: Restart keepalived after failed VIP drain
          systemd:
            name: keepalived.service
            state: started
          become: true

        - name: Fail after restoring keepalived
          fail:
            msg: >-
              VIP drain failed — keepalived has been restarted on this host.
              Investigate the peer before retrying the reboot.

    - name: Restart machine
      import_role:
        name: reboot
        tasks_from: reboot
      vars:
        reboot_args:
          condition: "{{ reboot_required.stat.exists }}"
          timeout: 240
      tags:
        - always

    # serial: 1 means this runs per host; pause 2 min after a host is
    # back before the next one goes down, so services resettle before
    # we take another host out of the fleet. Skip when we didn't reboot,
    # and skip for a single-host run (e.g. --limit foo) — there's no
    # next host to settle ahead of, so the pause would just stall.
    - name: Settle before cycling the next host
      pause:
        minutes: 2
        prompt: "Waiting 2 min for services to resettle before cycling the next host (Ctrl+C then C to skip)"
      when:
        - reboot_required.stat.exists
        - ansible_play_hosts_all | length > 1
      tags:
        - always
