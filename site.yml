# Roles are ordered as a layer ladder: each section builds on the guarantees
# of the ones above it. "Base machine install" (host base -> storage -> service
# platform -> observability) runs on every managed host; the service plays below
# are host-scoped and assume the full platform is already in place. See CLAUDE.md
# "Role layering" for the rule on where a new role belongs.
- name: Base machine install
  hosts: box,lab,pug,fox
  roles:
    # Host base -- OS, networking, remote access, system services. These roles
    # are mutually independent, so the order within this band is immaterial.
    - hwe_kernel
    - bash
    - lnav
    - mise
    - user
    - cleanup
    - hostname
    - apt
    - apt_upgrade
    # swap's zvol leg calls community.general.zfs but runs here in the host-base
    # band (above the zfs role) -- safe because every host boots a ZFS-root image
    # that already ships zfsutils; the zfs role only manages datasets/snapshots.
    - swap
    - netplan
    - wireguard
    - locale
    - console
    - timezone
    - unattended_upgrades
    - logrotate
    - journald
    - ssh
    - ssh_root
    - ntp
    - postfix
    # Storage & boot substrate -- ZFS datasets/snapshots and the bootloader.
    - zfs
    - zfs_mount
    - zfs_autobackup
    - boot
    - zfsbootmenu
    - refind
    # Service platform -- container runtime, /mnt/services, web/TLS front door.
    - podman
    - services
    - certbot
    - nginx
    # Observability.
    - socket_proxy
    - netdata
    - fluentbit

# Services -- host-scoped, built on the platform above. A role belongs here
# (not in Base machine install) when only a subset of hosts run it.
- name: External VPS (fox)
  # fail2ban only earns its keep on the public-facing host fox (zero inbound
  # at home); box keeps it as the test fixture.
  hosts: box,fox
  roles:
    - headscale
    # fox is itself a tailnet node (exit node + subnet router; see
    # host_vars/fox.yml and notes/headscale_mesh_redesign.md). It registers by
    # delegating to its OWN headscale, so tailscale must come after it. box gets
    # tailscale again in the Lab and Pug play below — idempotent, same host_vars
    # source, same as subid.
    - tailscale
    - fail2ban
    # subid before gitlab_runner: the runner's rootless podman (Docker
    # executor socket) needs gitlab_runner's subordinate-id range rendered
    # first. box gets subid again in the Lab and Pug play below — idempotent,
    # same host_vars source.
    - subid
    - gitlab_runner

- name: Lab and Pug
  hosts: box,lab,pug
  roles:
    - firewall
    - hdparm
    - hd_idle
    - smart
    - lm_sensors
    - fan2go
    - powertop
    - macvlan
    - avahi
    - samba
    - kdump
    - eaton_ipp
    - wolweb
    - keepalived
    - nut_server
    - resolved
    - adguard
    - docker_client
    - subid
    - tailscale

- name: Lab roles
  hosts: box,lab
  roles:
    - libvirt
    # Storage dataset producers -- placed before the apps that mount
    # /mnt/{scratch,data,media}.
    - scratch
    - data
    - media
    - minio
    - influxdb
    - jellyfin
    - sort_ini
    - sabnzbd
    - sonarr
    - radarr
    - bazarr
    - lidarr
    - seerr
    - plex
    - tautulli
    - gitea
    - homelab_ci
    - transmission
    - getmail
    - mutt
    - speedtest
    - filebrowser
    - mosquitto
    - z2m
    - homeassistant
    - kuma
    - authelia
    - spouse
    - profilarr
    - nexus
    - homepage

- name: Lab CI runner
  hosts: lab
  roles:
    - gitlab_runner

- name: MacOS VM
  hosts: lab
  roles:
    - macos_vm

- name: UDM DNS failover
  hosts: udm
  roles:
    - udm_dns_failover

- name: Decomission services
  hosts: box,lab,pug,fox
  roles:
    # Tear down decommissioned service state (drop once prod has re-converged).
    - retired_services

- name: Reboot check
  hosts: box,lab,pug,fox
  tags:
    - always
  # serial: 1 reboots the fleet one host at a time. The reboot helper
  # fires the reboot async (so throttle alone would only serialize the
  # wait phase, not the reboots themselves); play-level serial keeps a
  # whole host down-and-back before the next one cycles.
  serial: 1
  tasks:
    - name: Check if a reboot is required
      stat:
        path: /var/run/reboot-required
      register: reboot_required

    # DNS safety gate: refuse to reboot the last DNS-serving host.
    # Two concurrent playbooks (--limit lab / --limit pug) can race past
    # the probe before either actually reboots. Keepalived priority breaks
    # the tie: the lower-priority host yields 30s, letting the higher-
    # priority host reboot first; the post-yield re-probe detects the
    # peer's absence and waits for it to recover before proceeding.
    - name: DNS safety gate
      when:
        - not ansible_check_mode
        - reboot_required.stat.exists
        - dns_reboot_guard_enabled | default(false)
      vars:
        _reboot_dns_peers: "{{ dns_keepalived_peers | reject('eq', inventory_hostname) | list }}"
        _reboot_dns_ips: "{{ _reboot_dns_peers | map('extract', external_ips) | list }}"
        _reboot_is_lowest_priority: >-
          {{ dns_keepalived_priority <
             (_reboot_dns_peers | map('extract', hostvars, 'dns_keepalived_priority') | max) }}
      block:
        - name: Assert DNS keepalived priorities are distinct
          assert:
            that:
              - (dns_keepalived_peers | map('extract', hostvars, 'dns_keepalived_priority') | unique | list | length)
                == (dns_keepalived_peers | length)
            fail_msg: >-
              DNS keepalived priorities must be distinct across all peers
              ({{ dns_keepalived_peers | map('extract', hostvars, 'dns_keepalived_priority') | list }}).
              Equal priorities defeat the yield-based race protection.

        - name: Probe peer DNS before reboot
          command: dig +short +timeout=3 +tries=2 @{{ item }} adguard.home
          loop: "{{ _reboot_dns_ips }}"
          register: _reboot_dns_probe
          changed_when: false
          failed_when: false

        - name: Refuse to reboot — no peer is serving DNS
          when: _reboot_dns_probe.results | selectattr('rc', 'eq', 0) | selectattr('stdout') | list | length == 0
          fail:
            msg: >-
              No DNS peer is answering — refusing to reboot to preserve
              DNS availability. Recover a peer first, or rm /var/run/reboot-required.

        - name: Yield to higher-priority DNS peer (race protection)
          when: _reboot_is_lowest_priority | bool
          pause:
            seconds: 30
            prompt: >-
              Lower keepalived priority — yielding 30s in case a higher-priority
              peer is rebooting concurrently

        - name: Re-probe peer DNS after yield
          when: _reboot_is_lowest_priority | bool
          command: dig +short +timeout=3 +tries=2 @{{ item }} adguard.home
          loop: "{{ _reboot_dns_ips }}"
          register: _reboot_dns_reprobe
          changed_when: false
          failed_when: false

        - name: Wait for peer to finish rebooting
          when:
            - _reboot_is_lowest_priority | bool
            - _reboot_dns_reprobe.results | selectattr('rc', 'eq', 0) | selectattr('stdout') | list | length == 0
          command: dig +short +timeout=3 +tries=2 @{{ item }} adguard.home
          loop: "{{ _reboot_dns_ips }}"
          register: _reboot_dns_wait
          until: _reboot_dns_wait.rc == 0 and _reboot_dns_wait.stdout | default('') | length > 0
          retries: 30
          delay: 10
          changed_when: false
          failed_when: false

        - name: Refuse to reboot — peer did not recover
          when:
            - _reboot_is_lowest_priority | bool
            - _reboot_dns_reprobe.results | selectattr('rc', 'eq', 0) | selectattr('stdout') | list | length == 0
            - _reboot_dns_wait.results | default([]) | selectattr('rc', 'eq', 0) | selectattr('stdout') | list | length == 0
          fail:
            msg: >-
              No DNS peer recovered after 5 min — refusing to reboot.
              Investigate the peers manually.

    # Graceful VIP drain: stop keepalived before the reboot so the peer
    # claims the VIP via the priority-0 VRRP advertisement before DNS
    # shuts down. Without this, systemd stops both concurrently; DNS
    # can die first, leaving the VIP on a host with no DNS for the ~2s
    # until the healthcheck FAULT triggers failover.
    #
    # Wrapped in block/rescue so keepalived is restarted if any task
    # between the stop and the actual reboot fails — otherwise a
    # transient ansible error leaves keepalived down on a running host.
    - name: Drain keepalived VIP before reboot
      when:
        - not ansible_check_mode
        - reboot_required.stat.exists
        - dns_reboot_guard_enabled | default(false)
      block:
        - name: Stop keepalived to release the VIP
          systemd:
            name: keepalived.service
            state: stopped
          become: true

        - name: Verify peer claimed the VIP
          command: dig +short +timeout=5 +tries=3 @{{ network.virtual_ips.dns }} adguard.home
          register: _reboot_vip_check
          until: _reboot_vip_check.rc == 0 and _reboot_vip_check.stdout | default('') | length > 0
          retries: 6
          delay: 2
          changed_when: false
          failed_when: false

        - name: Refuse to reboot — VIP did not migrate
          when: (_reboot_vip_check.rc | default(1) != 0) or (_reboot_vip_check.stdout | default('') | length == 0)
          fail:
            msg: >-
              DNS VIP {{ network.virtual_ips.dns }} is not answering after
              keepalived stop — peer may not have claimed it. Keepalived will
              be restarted by the rescue block. Investigate the peer manually.
      rescue:
        - name: Restart keepalived after failed VIP drain
          systemd:
            name: keepalived.service
            state: started
          become: true

        - name: Fail after restoring keepalived
          fail:
            msg: >-
              VIP drain failed — keepalived has been restarted on this host.
              Investigate the peer before retrying the reboot.

    - name: Restart machine
      import_role:
        name: reboot
        tasks_from: reboot
      vars:
        reboot_args:
          condition: "{{ reboot_required.stat.exists }}"
          timeout: 240

    # serial: 1 means this runs per host; pause 2 min after a host is
    # back before the next one goes down, so services resettle before
    # we take another host out of the fleet. Skip when we didn't reboot,
    # and skip for a single-host run (e.g. --limit foo) — there's no
    # next host to settle ahead of, so the pause would just stall.
    - name: Settle before cycling the next host
      pause:
        minutes: 2
        prompt: "Waiting 2 min for services to resettle before cycling the next host (Ctrl+C then C to skip)"
      when:
        - reboot_required.stat.exists
        - ansible_play_hosts_all | length > 1
