# Roles are ordered as a layer ladder: each section builds on the guarantees
# of the ones above it. "Base machine install" (host base -> storage -> service
# platform -> observability) runs on every managed host; the service plays below
# are host-scoped and assume the full platform is already in place. See CLAUDE.md
# "Role layering" for the rule on where a new role belongs.
- name: Base machine install
  hosts: box,lab,pug,fox
  roles:
    # Host base -- OS, networking, remote access, system services. These roles
    # are mutually independent, so the order within this band is immaterial.
    - hwe_kernel
    - bash
    - user
    - cleanup
    - hostname
    - apt
    - apt_upgrade
    - swap
    - netplan
    - wireguard
    - locale
    - console
    - timezone
    - unattended_upgrades
    - logrotate
    - journald
    - fail2ban
    - ssh
    - ntp
    - postfix
    # Storage & boot substrate -- ZFS datasets/snapshots and the bootloader.
    - zfs
    - zfs_mount
    - zfs_autobackup
    - zfsbootmenu
    - refind
    # Service platform -- container runtime, /mnt/services, web/TLS front door.
    - podman
    - services
    - certbot
    - nginx
    # Observability.
    - csplogger
    - socket_proxy
    - netdata
    - fluentbit

# Services -- host-scoped, built on the platform above. A role belongs here
# (not in Base machine install) when only a subset of hosts run it.
- name: External VPS (fox)
  hosts: box,fox
  roles:
    - headscale

- name: Lab and Pug
  hosts: box,lab,pug
  roles:
    - firewall
    - hdparm
    - hd_idle
    - smart
    - lm_sensors
    - fancontrol
    - fan2go
    - powertop
    - ssh_root
    - macvlan
    - avahi
    - samba
    - static_curl
    - kdump
    - eaton_ipp
    - wolweb
    - keepalived
    - keepalived_exporter
    - nut_server
    - nut_monitor
    - resolved
    - dnscrypt_proxy
    - pihole
    - docker_client
    - subid
    - tailscale

- name: Lab roles
  hosts: box,lab
  roles:
    - libvirt
    # Storage dataset producers -- placed before the apps that mount
    # /mnt/{scratch,data,media}.
    - scratch
    - data
    - media
    - prometheus
    - minio
    - influxdb
    - jellyfin
    - sort_ini
    - sabnzbd
    - sonarr
    - radarr
    - bazarr
    - lidarr
    - seerr
    - plex
    - tautulli
    - gitea
    - nodejs
    - gitea_runner
    - github_runner
    - transmission
    - getmail
    - webmail
    - compta
    - speedtest
    - filebrowser
    - mosquitto
    - z2m
    - homeassistant
    - kuma
    - authelia
    - healthchecks
    - hyperdx
    - spouse
    - redis
    - paperless
    - profilarr
    - openproject
    - nexus
    - homepage

- name: Reboot check
  hosts: box,lab,pug,fox
  tasks:
    - name: Check if a reboot is required
      stat:
        path: /var/run/reboot-required
      register: reboot_required
      tags:
        - always

    - name: Restart machine
      reboot:
      throttle: 1
      become: true
      when: reboot_required.stat.exists
      tags:
        - always
