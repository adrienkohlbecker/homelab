- name: Configure bunk
  hosts: bunk
  strategy: linear
  tasks:
    # bunk is DSM, so roles/user (which manages this fleet-wide) doesn't run
    # here. Mirror its authorized_keys task: the fleet login key (ssh_public_keys)
    # plus bunk's backup-rsync keys (ssh_public_keys_additional in host_vars).
    # exclusive so a key removed from the vars is actually revoked -- this is the
    # single source of truth for who can log in as ak. Runs as ak (no become):
    # it manages ak's own ~/.ssh/authorized_keys.
    - name: Manage ak's authorized keys
      authorized_key:
        user: "{{ ansible_user_id }}"
        key: "{{ (ssh_public_keys + '\n' + (ssh_public_keys_additional | default(''))) | trim }}"
        exclusive: true
      tags:
        - authorized_keys

    - name: Copy wireguard configuration
      template:
        src: "{{ playbook_dir }}/roles/wireguard/templates/wg.conf.j2"
        dest: /etc/wireguard/wg0.conf
        owner: root
        group: root
        mode: "0600"
        backup: true
      vars:
        own_peer_name: "{{ inventory_hostname }}"
      become: true
      register: wg_conf
      tags:
        - wireguard

    - name: Restart wireguard
      when: wg_conf.changed
      systemd:
        name: pkg-wg-quick@wg0
        state: restarted
      become: true
      tags:
        - wireguard

    # --- Tailscale mesh enrollment (Bonniers subnet router + exit node) -------
    # bunk is DSM, so roles/tailscale's apt + systemd install half doesn't apply
    # and the Ubuntu box harness can't exercise this path. The Tailscale package
    # is installed out-of-band via Package Center (operator runbook). What's left
    # -- the register -> advertise -> approve orchestration -- is identical to
    # lab/pug, so it's imported from roles/tailscale/tasks/register.yml rather than
    # duplicated here; only the DSM permission grant below is bunk-specific. The
    # shared module reads tailscale_bin + tailscale_authkey_file (set in
    # host_vars/bunk.yml: the DSM binary path + /tmp, since DSM has no guaranteed
    # /run tmpfs) and the control-plane constants from group_vars/prod.yml.
    - name: Assert the DSM Tailscale package is installed
      stat:
        path: "{{ tailscale_bin }}"
      register: bunk_ts_bin
      failed_when: not bunk_ts_bin.stat.exists
      tags:
        - tailscale

    # Synology confines packages: tailscaled needs DSM to grant routing +
    # outbound-connection permissions before it can act as a subnet router / exit
    # node. `tailscale configure synology` writes conf/resource.own (the marker
    # gated on here); the grant only takes effect after a package-service restart.
    # Both are run-once via creates: and re-fire after a package reinstall/update
    # (which wipes resource.own and resets the perms) -- exactly when they should.
    - name: Grant the Synology routing permissions for Tailscale (once)
      command: "{{ tailscale_bin }} configure synology"
      args:
        creates: /var/packages/Tailscale/conf/resource.own
      register: bunk_ts_configure
      become: true
      tags:
        - tailscale

    # synosystemctl isn't on the non-login PATH (unlike the wireguard unit, this
    # is a DSM *package* controller service, managed via synosystemctl per the
    # `tailscale configure` hint), so use its absolute path. Only restart when the
    # configure above actually ran -- bouncing the package drops the tunnel.
    - name: Restart the Tailscale package to apply the new permissions
      command: /usr/syno/bin/synosystemctl restart pkgctl-Tailscale.service
      when: bunk_ts_configure is changed
      changed_when: true
      become: true
      tags:
        - tailscale

    # The DSM perms are in place; hand off to the shared register -> advertise ->
    # approve sequence (same code lab/pug run). import_role (not import_tasks) so
    # roles/tailscale/defaults/main.yml loads -- the module reads tailscale_bin,
    # tailscale_authkey_file, tailscale_accept_dns/_routes from there.
    - name: Register bunk against the headscale control plane
      import_role:
        name: tailscale
        tasks_from: register
      tags:
        - tailscale

    # --- Ghostty terminfo --------------------------------------------------
    # bunk is DSM with no tic/ncurses-bin, so it can't compile xterm-ghostty
    # itself; Ghostty's ssh-terminfo auto-install bails ("Failed to install
    # terminfo") and the session falls back to TERM=xterm-256color. Ship the
    # entry *precompiled* (the only option without a remote tic) into the user's
    # ~/.terminfo. The session only actually uses it once the operator's Ghostty
    # ssh-cache is primed client-side -- `ghostty +ssh-cache --add=ak@<ssh -G
    # hostname>` -- which isn't an ansible-on-bunk action. The source lives at
    # roles/user/files/xterm-ghostty.terminfo (compiled there by the user role on
    # Ubuntu hosts); regenerate the binary alongside it:
    #   tic -x -o <dir> roles/user/files/xterm-ghostty.terminfo
    #   cp <dir>/*/xterm-ghostty roles/user/files/xterm-ghostty.compiled
    - name: Create the per-user terminfo directory
      file:
        path: "{{ ansible_user_dir }}/.terminfo/x"
        state: directory
        mode: "0755"
      tags:
        - terminfo

    # No validate: a compiled terminfo has no parser, and bunk lacks infocmp.
    - name: Install the xterm-ghostty terminfo entry
      copy:
        src: "{{ playbook_dir }}/roles/user/files/xterm-ghostty.compiled"
        dest: "{{ ansible_user_dir }}/.terminfo/x/xterm-ghostty"
        mode: "0644"
        backup: true
      tags:
        - terminfo
