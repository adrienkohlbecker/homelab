- name: Configure bunk
  hosts: bunk
  strategy: linear
  tasks:
    - name: Configure offsite backup rsync
      tags:
        - offsite_rrsync
      block:
        # Source hosts push bak-tagged datasets through forced-command rrsync
        # keys, confined write-only to /volume1/Backup/<host>.
        - name: Create ak's bin directory
          file:
            path: "{{ ansible_user_dir }}/bin"
            state: directory
            mode: "0755"

        - name: Install the rrsync wrapper
          copy:
            src: "{{ playbook_dir }}/roles/zfs_autobackup/files/rrsync"
            dest: "{{ ansible_user_dir }}/bin/rrsync"
            mode: "0755"
            backup: true
            validate: /usr/bin/python3 -m py_compile %s

        # rrsync refuses to run if its restricted root is missing.
        - name: Create the per-source offsite backup roots
          file:
            path: "/volume1/Backup/{{ item }}"
            state: directory
            mode: "0755"
          loop:
            - lab
            - pug
            - fox

    # bunk is DSM, so roles/user (which manages this fleet-wide) doesn't run
    # here. Mirror its authorized_keys task: the fleet login key (ssh_public_keys)
    # plus bunk's backup-rsync keys (ssh_public_keys_additional in host_vars).
    # exclusive so a key removed from the vars is actually revoked -- this is the
    # single source of truth for who can log in as ak. Runs as ak (no become):
    # it manages ak's own ~/.ssh/authorized_keys.
    - name: Manage ak's authorized keys
      authorized_key:
        user: "{{ ansible_user_id }}"
        key: "{{ (ssh_public_keys + '\n' + (ssh_public_keys_additional | default(''))) | trim }}"
        exclusive: true
      tags:
        - authorized_keys

    - name: Configure wireguard
      tags:
        - wireguard
      block:
        - name: Copy wireguard configuration
          template:
            src: "{{ playbook_dir }}/roles/wireguard/templates/wg.conf.j2"
            dest: /etc/wireguard/wg0.conf
            owner: root
            group: root
            mode: "0600"
            backup: true
            validate: grep -qE '^\[(Interface|Peer)\]$' %s
          vars:
            own_peer_name: "{{ inventory_hostname }}"
          become: true
          register: wg_conf

        - name: Restart wireguard
          when: wg_conf.changed
          systemd:
            name: pkg-wg-quick@wg0
            state: restarted
          become: true

    - name: Configure Tailscale
      tags:
        - tailscale
      block:
        # DSM package install is out-of-band; this play owns the bunk-specific
        # permission/port setup, then reuses the shared headscale registration.
        - name: Assert the DSM Tailscale package is installed
          stat:
            path: "{{ tailscale_bin }}"
          register: bunk_ts_bin
          failed_when: not bunk_ts_bin.stat.exists

        - name: Grant the Synology routing permissions for Tailscale (once)
          command: "{{ tailscale_bin }} configure synology"
          args:
            creates: /var/packages/Tailscale/conf/resource.own
          register: bunk_ts_configure
          become: true

        # DSM hardcodes tailscaled's underlay port in its package launcher.
        - name: Pin tailscaled underlay port in the DSM package launcher
          lineinfile:
            path: /var/packages/Tailscale/scripts/start-stop-status
            regexp: '^PORT='
            line: 'PORT="{{ tailscale_port }}"'
            backup: true
          register: bunk_ts_port
          become: true

        - name: Restart the Tailscale package to apply permissions or port change
          command: /usr/syno/bin/synosystemctl restart pkgctl-Tailscale.service
          when: bunk_ts_configure is changed or bunk_ts_port is changed
          changed_when: true
          become: true

        - name: Register bunk against the headscale control plane
          import_role:
            name: tailscale
            tasks_from: register

    - name: Configure Ghostty terminfo
      tags:
        - terminfo
      block:
        # bunk lacks tic/infocmp, so ship the precompiled entry built beside the
        # source terminfo in roles/user/files/.
        - name: Create the per-user terminfo directory
          file:
            path: "{{ ansible_user_dir }}/.terminfo/x"
            state: directory
            mode: "0755"

        - name: Install the xterm-ghostty terminfo entry
          copy:
            src: "{{ playbook_dir }}/roles/user/files/xterm-ghostty.compiled"
            dest: "{{ ansible_user_dir }}/.terminfo/x/xterm-ghostty"
            mode: "0644"
            backup: true
