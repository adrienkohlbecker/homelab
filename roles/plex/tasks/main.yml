- name: Add media group
  import_role:
    name: media
    tasks_from: group
  tags:
    - plex

- name: Lookup render group gid (HW transcoding hosts only)
  import_role:
    name: media
    tasks_from: render_group
  when: has_transcoding_acceleration
  become: true
  tags:
    - plex

- name: Set up plex system user, group, and config dir
  import_role:
    name: service_user
    tasks_from: user
  vars:
    service_user_args:
      name: plex
      extra_groups: [ media ]
      config_dir_group: media
      # Preferences.xml under /config holds the server token; keep it out
      # of reach of other media-group co-tenants.
      config_dir_mode: "0750"
  tags:
    - plex

# Plex's Databases/ subdir is a dedicated SQLite directory (live DBs +
# Plex's own dated full-DB backups). Bind the 4K sqlite dataset over it
# so SQLite resolves WAL/SHM onto the same dataset. Static-space cost:
# the dated backups (com.plexapp.plugins.library.{db,blobs.db}-YYYY-MM-DD)
# lose ~30% compression at 4K, but they're full-file rewrites so their
# snapshot footprint doesn't depend on recordsize — net win. Plex binds the
# directory directly (no per-DB symlinks), so no links: are passed.
- name: Pre-create the plex sqlite dataset directory
  import_role:
    name: sqlite_dataset
    tasks_from: dataset
  vars:
    sqlite_dataset_args:
      name: plex
      owner: plex
      group: media
      mode: "0750"
      condition: "{{ not (ansible_check_mode and plex_user.changed) }}"
  tags:
    - plex

- name: Install plex service
  import_role:
    name: systemd_unit
    tasks_from: install
  vars:
    systemd_unit_args:
      src: plex.service.j2
      condition: "{{ not (ansible_check_mode and plex_user.changed) }}"
  tags:
    - plex

- name: Enable plex service
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: plex
      condition: "{{ not (ansible_check_mode and (plex_service_result.changed or plex_user.changed)) }}"
      restart: "{{ plex_service_result.changed or media_group.changed }}"
      start: "{{ ansible_architecture == 'x86_64' }}"
  tags:
    - plex

- name: Configure nginx
  import_role:
    name: nginx
    tasks_from: site
  vars:
    nginx_site_args:
      subdomain: plex
      proxy_pass: http://127.0.0.1:32400/
      csp_default_src: "plex.tv *.plex.tv *.plex.direct:32400"
  tags:
    - plex
