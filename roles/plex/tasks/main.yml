- name: Add plex group
  group:
    name: plex
    system: true
  become: true
  tags:
    - plex

- name: Add media group
  group:
    name: media
    system: true
  become: true
  register: media_group
  tags:
    - plex

- name: Add render group
  group:
    name: render
    system: true
  become: true
  register: render_group
  tags:
    - plex

- name: Add plex user
  user:
    name: plex
    group: plex
    groups: media
    createhome: false
    system: true
    shell: /usr/sbin/nologin
    home: /nonexistent
  become: true
  register: plex_user
  tags:
    - plex

- name: Create configuration directory
  when: not (ansible_check_mode and plex_user.changed)
  file:
    dest: /mnt/services/plex
    state: directory
    owner: plex
    group: media
    mode: "0755"
  become: true
  tags:
    - plex

# Plex's Databases/ subdir is a dedicated SQLite directory (live DBs +
# Plex's own dated full-DB backups). Bind the 4K sqlite dataset over it
# so SQLite resolves WAL/SHM onto the same dataset. Static-space cost:
# the dated backups (com.plexapp.plugins.library.{db,blobs.db}-YYYY-MM-DD)
# lose ~30% compression at 4K, but they're full-file rewrites so their
# snapshot footprint doesn't depend on recordsize — net win.
- name: Create sqlite directory
  when: not (ansible_check_mode and plex_user.changed)
  file:
    dest: /mnt/services/sqlite/plex
    state: directory
    owner: plex
    group: media
    mode: "0755"
  become: true
  tags:
    - plex

- name: Create scratch directory
  when: not (ansible_check_mode and plex_user.changed)
  file:
    dest: /mnt/scratch/plex
    state: directory
    owner: plex
    group: media
    mode: "0755"
  become: true
  tags:
    - plex

- name: Install plex service
  import_role:
    name: systemd_unit
    tasks_from: install
  vars:
    systemd_unit_src: plex.service.j2
    systemd_unit_condition: "{{ not (ansible_check_mode and plex_user.changed) }}"
  tags:
    - plex

- name: Enable plex service
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_src: plex
    systemd_unit_condition: "{{ not (ansible_check_mode and (systemd_unit.changed or plex_user.changed)) }}"
    systemd_unit_restart: "{{ systemd_unit.changed }}"
    systemd_unit_start: "{{ ansible_architecture == 'x86_64' }}"
  tags:
    - plex

- name: Configure nginx
  import_role:
    name: nginx
    tasks_from: site
  vars:
    nginx_subdomain: plex
    nginx_proxy_pass: http://localhost:32400/
    nginx_csp_default_src: "plex.tv *.plex.tv *.plex.direct:32400"
  tags:
    - plex
