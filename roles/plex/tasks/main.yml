- name: Assert this host is registered in external_ips
  assert:
    that: inventory_hostname in external_ips
    fail_msg: >-
      plex renders ADVERTISE_IP from external_ips[{{ inventory_hostname }}];
      register this host in group_vars/all/network.yml before converging.
  tags:
    - plex

- name: Add media group
  import_role:
    name: media
    tasks_from: group
  tags:
    - plex

- name: Lookup render group gid (HW transcoding hosts only)
  import_role:
    name: media
    tasks_from: render_group
  when: has_transcoding_acceleration
  become: true
  tags:
    - plex

- name: Set up plex system user, group, and config dir
  import_role:
    name: service_user
    tasks_from: user
  vars:
    service_user_args:
      name: plex
      extra_groups: [ media ]
      config_dir_group: media
      # Preferences.xml under /config holds the server token; 0700 keeps it
      # out of reach of the media-group co-tenants (transmission, the arr
      # stack) that 0750 would let traverse the dir. Plex runs as the owning
      # plex uid, so owner-only access is all the container needs.
      config_dir_mode: "0700"
  tags:
    - plex

# Plex's Databases/ subdir is a dedicated SQLite directory (live DBs +
# Plex's own dated full-DB backups). Bind the 4K sqlite dataset over it
# so SQLite resolves WAL/SHM onto the same dataset. Static-space cost:
# the dated backups (com.plexapp.plugins.library.{db,blobs.db}-YYYY-MM-DD)
# lose ~30% compression at 4K, but they're full-file rewrites so their
# snapshot footprint doesn't depend on recordsize — net win. Plex binds the
# directory directly (no per-DB symlinks), so no links: are passed.
- name: Pre-create the plex sqlite dataset directory
  import_role:
    name: sqlite_dataset
    tasks_from: dataset
  vars:
    sqlite_dataset_args:
      name: plex
      # The library DB here holds the same server/account tokens as
      # Preferences.xml under /config, so it gets the same owner-only 0700
      # (group plex, not media): nothing in the media group reads Plex's DB,
      # and 0750 group=media would let the co-tenants the /config 0700 locks
      # out (transmission, the arr stack) traverse here and lift a token.
      owner: plex
      group: plex
      mode: "0700"
      condition: "{{ not (ansible_check_mode and plex_user.changed) }}"
  tags:
    - plex

# Plex reads its transcode scratch path from Preferences.xml
# (TranscoderTempDirectory); left unset it transcodes under /config on the
# snapshotted services dataset rather than the dedicated /transcode tmpfs the
# unit mounts. pms-docker exposes no env for it and Plex rewrites
# Preferences.xml at runtime, so seed the file before first boot only: Plex
# reads it, fills in the rest, and preserves the attribute on every later
# rewrite. Gated on the file's absence (plus force: false) so an already-
# initialised server is never touched and Plex's own writes are never raced.
- name: Check whether Plex has initialised its Preferences yet
  stat:
    path: /mnt/services/plex/Library/Application Support/Plex Media Server/Preferences.xml
  register: plex_prefs
  become: true
  tags:
    - plex

- name: Create the Plex data dir tree for the Preferences seed
  file:
    path: "{{ item }}"
    state: directory
    owner: plex
    group: media
    mode: "0755"
  loop:
    - /mnt/services/plex/Library
    - /mnt/services/plex/Library/Application Support
    - /mnt/services/plex/Library/Application Support/Plex Media Server
  when:
    - not plex_prefs.stat.exists
    - not (ansible_check_mode and plex_user.changed)
  become: true
  tags:
    - plex

- name: Seed Preferences.xml so Plex transcodes onto the tmpfs
  copy:
    content: |
      <?xml version="1.0" encoding="utf-8"?>
      <Preferences TranscoderTempDirectory="/transcode" />
    dest: /mnt/services/plex/Library/Application Support/Plex Media Server/Preferences.xml
    owner: plex
    group: media
    mode: "0600"
    force: false
    backup: true
    validate: python3 -c 'import xml.dom.minidom,sys; xml.dom.minidom.parse(sys.argv[1])' "%s"
  when:
    - not plex_prefs.stat.exists
    - not (ansible_check_mode and plex_user.changed)
  become: true
  tags:
    - plex

- name: Install plex service
  import_role:
    name: systemd_unit
    tasks_from: install
  vars:
    systemd_unit_args:
      src: plex.service.j2
      condition: "{{ not (ansible_check_mode and (plex_user.changed or media_group.changed)) }}"
  tags:
    - plex

- name: Enable plex service
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: plex
      condition: "{{ not (ansible_check_mode and (plex_service_result.changed or plex_user.changed or media_group.changed)) }}"
      restart: "{{ plex_service_result.changed or plex_user.changed or media_group.changed }}"
  tags:
    - plex

- name: Configure nginx
  import_role:
    name: nginx
    tasks_from: site
  vars:
    nginx_site_args:
      subdomain: plex
      proxy_pass: http://127.0.0.1:{{ service_ports.plex }}/
      csp_default_src: "plex.tv *.plex.tv *.plex.direct:32400"
  tags:
    - plex
