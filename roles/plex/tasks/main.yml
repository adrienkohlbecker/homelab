- name: Add plex group
  group:
    name: plex
    system: true
  become: true
  tags:
    - plex

- name: Add media group
  import_role:
    name: media
    tasks_from: group
  tags:
    - plex

# Read the render gid from /etc/group on transcoding hosts rather than
# creating it ourselves with `group:`. udev/mesa ship sysusers.d entries
# that own the canonical gid; a dynamic group-create can drift if a
# package later installs a different fixed gid, silently de-aligning
# the container's --group-add from /dev/dri/'s actual owner.
- name: Lookup render group gid (HW transcoding hosts only)
  when: has_transcoding_acceleration
  become: true
  block:
    - name: getent render group
      getent:
        database: group
        key: render
        fail_key: false
    - name: Assert render group present
      assert:
        that:
          - getent_group.render is defined
        fail_msg: >-
          /etc/group has no 'render' entry. On a host with
          has_transcoding_acceleration=true, install one of the
          transcoding driver packages (mesa-va-drivers,
          intel-media-va-driver) — they ship a sysusers.d that owns
          this group — and re-run.
  tags:
    - plex

- name: Add plex user
  user:
    name: plex
    group: plex
    groups: media
    createhome: false
    system: true
    shell: /usr/sbin/nologin
    home: /nonexistent
  become: true
  register: plex_user
  tags:
    - plex

- name: Create configuration directory
  when: not (ansible_check_mode and plex_user.changed)
  file:
    dest: /mnt/services/plex
    state: directory
    owner: plex
    group: media
    mode: "0755"
  become: true
  tags:
    - plex

# Plex's Databases/ subdir is a dedicated SQLite directory (live DBs +
# Plex's own dated full-DB backups). Bind the 4K sqlite dataset over it
# so SQLite resolves WAL/SHM onto the same dataset. Static-space cost:
# the dated backups (com.plexapp.plugins.library.{db,blobs.db}-YYYY-MM-DD)
# lose ~30% compression at 4K, but they're full-file rewrites so their
# snapshot footprint doesn't depend on recordsize — net win.
- name: Create sqlite directory
  when: not (ansible_check_mode and plex_user.changed)
  file:
    dest: /mnt/services/sqlite/plex
    state: directory
    owner: plex
    group: media
    mode: "0750"
  become: true
  tags:
    - plex

- name: Create scratch directory
  when: not (ansible_check_mode and plex_user.changed)
  file:
    dest: /mnt/scratch/plex
    state: directory
    owner: plex
    group: media
    mode: "0755"
  become: true
  tags:
    - plex

- name: Install plex service
  import_role:
    name: systemd_unit
    tasks_from: install
  vars:
    systemd_unit_args:
      src: plex.service.j2
      condition: "{{ not (ansible_check_mode and plex_user.changed) }}"
  tags:
    - plex

- name: Enable plex service
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: plex
      condition: "{{ not (ansible_check_mode and (plex_service_result.changed or plex_user.changed)) }}"
      restart: "{{ plex_service_result.changed or media_group.changed }}"
      start: "{{ ansible_architecture == 'x86_64' }}"
  tags:
    - plex

- name: Configure nginx
  import_role:
    name: nginx
    tasks_from: site
  vars:
    nginx_site_args:
      subdomain: plex
      proxy_pass: http://127.0.0.1:32400/
      csp_default_src: "plex.tv *.plex.tv *.plex.direct:32400"
  tags:
    - plex
