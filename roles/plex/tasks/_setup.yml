- name: _setup | Install podman
  import_role:
    name: podman
    tasks_from: install

- name: _setup | Create media podman network
  import_role:
    name: media
    tasks_from: network

- name: _test | Install nginx
  import_role:
    name: _test
    tasks_from: nginx

- name: _test | Setup dependencies
  file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - /mnt/services
    - /mnt/scratch
    - /mnt/media
    - /mnt/data
    - "/mnt/data/MacbookPro/Music/iTunes/iTunes Media/Music"
    - /mnt/data/Musique/Records
  become: true
