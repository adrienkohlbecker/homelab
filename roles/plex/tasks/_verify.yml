# Functional probes against the running container. The pinned pms-docker
# tag is multi-arch, so Plex starts on both prod x86_64 and the local arm64
# box (cf. the unit having no start: arch gate) — these run everywhere, no
# stat-only fallback needed.

# Loopback probe through the published port — /identity returns the
# server's machineIdentifier as XML without auth, proving Plex is up
# beyond the container's own --sdnotify=healthy gate.
- name: _verify | Plex /identity over loopback
  uri:
    url: http://localhost:{{ service_ports.plex }}/identity
    status_code: 200
    return_content: true
  register: _verify_http
  retries: 30
  delay: 2
  until: _verify_http.status == 200
  failed_when: not (_verify_http.content is search('machineIdentifier'))

# Exercise the nginx-proxied path — catches a typo'd subdomain or
# proxy_pass regression the loopback probe would miss.
- name: _verify | Plex /identity via nginx vhost
  uri:
    url: https://localhost/identity
    headers:
      Host: "plex.{{ inventory_hostname }}.{{ domain }}"
    validate_certs: false
    status_code: 200
    return_content: true
  register: _verify_http_nginx
  retries: 30
  delay: 2
  until: _verify_http_nginx.status == 200
  failed_when: not (_verify_http_nginx.content is search('machineIdentifier'))

# A port answering proves Plex is up, but the unit reaching `active` is the
# stronger claim: with Type=notify + --sdnotify=healthy, `active` means the
# container's --health-cmd passed and podman propagated readiness. A broken
# health-cmd leaves the unit stuck `activating` until TimeoutSec even while
# the port answers, so assert the gate actually fired.
- name: _verify | Plex unit reached active via the sdnotify=healthy gate
  systemd:
    name: plex.service
  register: _verify_active
  failed_when: _verify_active.status.ActiveState != "active"
  become: true

# CHANGE_CONFIG_DIR_OWNERSHIP=false skips the entrypoint's recursive chown,
# relying on the host already owning /config as the plex uid. Exec a write as
# that uid (not the container's root, which could write regardless) to prove
# the invariant end-to-end. Facts don't cross the _verify invocation, so
# re-look-up the uid the same way the HW section re-looks-up the render gid.
- name: _verify | Re-lookup plex uid for the /config write probe
  getent:
    database: passwd
    key: plex
  become: true

- name: _verify | Plex can write /config as its own uid
  command:
    argv:
      - podman
      - exec
      - --user
      - "{{ getent_passwd.plex[1] }}"
      - plex
      - touch
      - /config/.verify_write_probe
  changed_when: false
  become: true

# The seeded Preferences.xml points Plex's transcoder at the /transcode
# tmpfs. Plex rewrites Preferences.xml on first boot, so this proves the
# seeded attribute survived that rewrite — i.e. transcoding lands on the
# tmpfs and not on the snapshotted /config dataset.
- name: _verify | Plex transcodes onto the /transcode tmpfs
  command:
    argv:
      - podman
      - exec
      - plex
      - grep
      - -q
      - TranscoderTempDirectory="/transcode"
      - /config/Library/Application Support/Plex Media Server/Preferences.xml
  changed_when: false
  become: true

# Content mounts: the library plus any host-specific read-only source trees
# (plex_extra_library_binds) must surface inside the container, and the
# read-only binds must actually reject writes — a dropped :ro would let Plex
# mutate the source library silently. A :ro bind is read-only even to the
# exec's root, so the touch fails at the mount layer regardless of
# in-container uid. The extra dests are empty on a host without the data
# mount (box), so this degrades to checking /media there.
- name: _verify | Content mounts are present in the container
  command:
    argv:
      - podman
      - exec
      - plex
      - test
      - -d
      - "{{ item }}"
  loop: "{{ ['/media'] + (plex_extra_library_binds | map(attribute='dest') | list) }}"
  changed_when: false
  become: true

- name: _verify | Read-only content mounts reject writes
  command:
    argv:
      - podman
      - exec
      - plex
      - touch
      - "{{ item }}/.verify_ro_probe"
  loop: "{{ ['/media'] + (plex_extra_library_binds | map(attribute='dest') | list) }}"
  register: _verify_ro
  changed_when: false
  failed_when: _verify_ro.rc == 0
  become: true

# SQLite bind round-trip: a host-side sentinel under the dedicated 4K
# dataset must surface inside the container at Plex's Databases dir,
# proving the --volume landed (a path typo would silently route DB writes
# back onto the services dataset). _verify is test-only, so the sentinel
# write is safe.
- name: _verify | Drop a sentinel on the host sqlite dataset
  copy:
    content: ""
    dest: /mnt/services/sqlite/plex/.verify_sentinel
    owner: plex
    group: media
    mode: "0640"
  become: true

- name: _verify | Confirm the sentinel is visible in the container Databases dir
  command:
    argv:
      - podman
      - exec
      - plex
      - stat
      - -c
      - "%n"
      - "/config/Library/Application Support/Plex Media Server/Plug-in Support/Databases/.verify_sentinel"
  changed_when: false
  become: true

# HW transcoding wiring smoke. On box the device is a phantom from
# _test/fake_render_device.yml, so this proves the template's --device
# and --group-add reached the container, not that VAAPI works.
# _verify runs as a separate playbook, so re-lookup the render gid.
- name: _verify | Re-lookup render gid for assertions
  when: has_transcoding_acceleration
  getent:
    database: group
    key: render
  become: true

- name: _verify | Confirm /dev/dri/renderD128 inside container
  when: has_transcoding_acceleration
  command: podman exec plex stat -c %n /dev/dri/renderD128
  register: _verify_dri_in_container
  changed_when: false
  failed_when: _verify_dri_in_container.stdout != '/dev/dri/renderD128'
  become: true

- name: _verify | Confirm render gid in container supplementary groups
  when: has_transcoding_acceleration
  command: podman exec plex id -G
  register: _verify_container_groups
  changed_when: false
  failed_when: getent_group.render[1] not in _verify_container_groups.stdout.split()
  become: true
