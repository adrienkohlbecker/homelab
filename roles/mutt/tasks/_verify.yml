- name: _verify | Neomutt binary runs
  command: neomutt -v
  changed_when: false

- name: _verify | W3m runs
  command: w3m -version
  changed_when: false

# Hard read-only guard: neomutt browses the archive through a ro bind mount, so
# a write physically cannot reach the Maildir. Prove the mount is actually
# mounted read-only...
- name: _verify | Archive is exposed through a read-only bind mount
  command: findmnt --mountpoint /mnt/services/mutt/archive --noheadings --output OPTIONS
  register: _mutt_mount_opts
  changed_when: false
  failed_when: >-
    _mutt_mount_opts.rc != 0
    or 'ro' not in (_mutt_mount_opts.stdout | trim).split(',')
  become: true

# ...and that a write through it is denied even for root (a forgotten -R or a
# fat-finger can't mutate the archive).
- name: _verify | Write through the read-only mount is denied
  command: touch /mnt/services/mutt/archive/_mutt_ro_probe
  register: _mutt_ro_write
  changed_when: false
  failed_when: _mutt_ro_write.rc == 0
  become: true

# Plant a known HTML message into the archive Maildir's new/ (operator-owned),
# the same way the getmail fetcher delivers. The viewer must render it inline
# through w3m (auto_view) and serve it without migrating it out of new/ (both
# asserted below). HTML-only — no text/plain alternative — so auto_view must
# fire rather than alternative_order preferring a plain part.
- name: _verify | Plant a test HTML message in the archive Maildir
  copy:
    dest: /mnt/services/getmail/new/1700000000.muttverify.box
    owner: "{{ ansible_user_id }}"
    group: "{{ ansible_user_id }}"
    mode: "0600"
    content: |
      From: Test Sender <sender@example.com>
      To: {{ root_email }}
      Subject: Mutt Verify
      Date: Tue, 14 Nov 2023 22:13:20 +0000
      Message-ID: <muttverify@example.com>
      MIME-Version: 1.0
      Content-Type: text/html; charset=us-ascii

      <html><body><p>MUTTVERIFYHTML
      <a href="http://muttverify.invalid/">a link</a></p></body></html>
  become: true

- name: _verify | Notmuch indexes the planted archive message
  command: /usr/bin/notmuch --config /opt/mutt/notmuch-config new
  changed_when: false

- name: _verify | Notmuch finds the planted archive message
  command:
    argv:
      - /usr/bin/notmuch
      - --config
      - /opt/mutt/notmuch-config
      - count
      - subject:"Mutt Verify"
  register: _mutt_notmuch_count
  changed_when: false
  failed_when: (_mutt_notmuch_count.stdout | trim) != '1'

# Functional probe: open the archive through the real operator entry point —
# the mail-archive wrapper (which adds -R + the curated config), display the
# planted message, and quit. This drives the full read path: index build +
# header cache (asserted below) + auto_view piping the HTML body through w3m,
# captured in the pty typescript for the render checks below.
#
# The open is pushed (<display-message>) but the two quit keys (qq: pager back
# to index, then quit neomutt) arrive via stdin, NOT the push buffer. neomutt
# only paints the pager once its push buffer drains and it blocks polling for
# input; quitting from within the push buffer skips that paint, so the rendered
# body would never reach the typescript. The stdin keys land after the paint.
#
# Runs under a pty (script) because neomutt needs a terminal; TERM is set so it
# can initialise curses headlessly. Runs as the connection user (the operator
# who owns the 0700 Maildir), so no become.
- name: _verify | The mail-archive wrapper opens and displays a message read-only
  command:
    argv:
      - script
      - -qec
      - mail-archive -e "push <display-message>"
      - /tmp/mutt_verify_typescript
    stdin: qq
  environment:
    TERM: xterm
  changed_when: false

# The pushed <display-message> rendered the HTML part inline: the body marker
# must appear in the captured output, and the raw href= attribute must not —
# proving w3m parsed the HTML rather than neomutt showing it raw. grep -a so the
# binary pty escape codes in the typescript don't trip up the text match.
- name: _verify | W3m rendered the HTML body inline (marker present)
  command: grep -qa MUTTVERIFYHTML /tmp/mutt_verify_typescript
  changed_when: false

- name: _verify | The HTML was parsed by w3m, not shown raw (no href= attribute)
  command: grep -qa href= /tmp/mutt_verify_typescript
  register: _mutt_raw_html
  changed_when: false
  failed_when: _mutt_raw_html.rc != 1

# neomutt populates its header cache while reading the Maildir, even read-only.
# A cache file appearing proves it actually parsed the archive (not just
# started and bailed).
- name: _verify | Neomutt populated its header cache from the archive
  find:
    paths: /mnt/services/mutt/headers
    file_type: file
  register: _mutt_hcache
  failed_when: _mutt_hcache.matched == 0
  become: true

# Read-only guarantee: -R must not migrate the planted message out of new/ or
# rewrite it with Maildir flags. The archive is irreplaceable; prove browsing
# never mutated it.
- name: _verify | Planted message stays in new/ (archive never mutated)
  stat:
    path: /mnt/services/getmail/new/1700000000.muttverify.box
  register: _mutt_newfile
  failed_when: not _mutt_newfile.stat.exists
  become: true

- name: _verify | No Maildir cur/ migration happened
  find:
    paths: /mnt/services/getmail/cur
    file_type: file
  register: _mutt_cur
  failed_when: _mutt_cur.matched > 0
  become: true

# The teardown removed the former webmail state directories (stood up in
# _setup to mimic a converged host).
- name: _verify | Former webmail state directories are gone
  stat:
    path: "{{ item }}"
  register: _mutt_webmail_state
  failed_when: _mutt_webmail_state.stat.exists
  loop:
    - /mnt/services/webmail
    - /mnt/services/sqlite/roundcube
  become: true
