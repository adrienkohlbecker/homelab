global_defs {
  enable_script_security
  # Deliberate global cap. Inert today because every vrrp_instance sets an
  # explicit `priority`, but kept so a future instance that omits priority
  # gets CPU-scored auto-priority capped at 99 instead of the default 255.
  max_auto_priority 99
  vrrp_startup_delay 10
}

include /etc/keepalived/conf.d/*.conf
