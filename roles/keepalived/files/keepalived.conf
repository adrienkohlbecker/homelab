global_defs {
  # Required for tenants that run vrrp_script blocks under a specific
  # user. Without it, keepalived demotes scripts to `keepalived_script`
  # (not created by the .deb on Ubuntu) and they silently fail to run.
  # Tenants must declare `user <name>` on each vrrp_script.
  enable_script_security
  # Least-privilege default for vrrp_script blocks that don't override:
  # scripts run as `nobody` unless a tenant explicitly opts up with
  # `user <name>`. Root is a per-script, audited opt-in — not silent
  # inheritance. The only current tenant (pihole) needs root to poke the
  # container's DNS port and declares `user root` on its healthcheck, so
  # this default is inert for it.
  script_user nobody
  # NB: editing either directive above changes script-execution semantics;
  # SIGHUP-reload of global_defs is flaky in 2.2.x, so a change here needs
  # a manual `systemctl restart keepalived` to take effect (the role only
  # reloads on a base-conf edit). See roles/keepalived/tasks/main.yml.
}

include /etc/keepalived/conf.d/*.conf
