# Drop-in: gate the unit on conf.d having ≥1 fragment.
#
# keepalived.service is Type=notify and wedges for ~90s before failing
# when there are no vrrp_instance blocks to manage (the daemon never
# sends READY=1). The role's converge-time logic does the same gate at
# ansible-time + an explicit stop+disable when the last tenant leaves —
# this drop-in is the belt-and-braces version that catches the case
# where the unit was left enabled but conf.d emptied out between
# converges (e.g. host reboot after a tenant retirement). Systemd
# silently skips the unit when the Condition fails and re-evaluates
# on every subsequent start attempt.
[Unit]
ConditionPathExistsGlob=/etc/keepalived/conf.d/*.conf
