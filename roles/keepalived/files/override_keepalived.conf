# Drop-in: gate the unit on conf.d having ≥1 fragment.
#
# keepalived.service is Type=notify and wedges for ~90s before failing
# when there are no vrrp_instance blocks to manage (the daemon never
# sends READY=1). This Condition is NOT a redundant copy of the role's
# converge-time gate — it covers a disjoint trigger: an out-of-band or
# boot-time start where conf.d emptied between converges but the unit was
# left enabled (e.g. host reboot after a tenant retirement). The role's
# ansible-time logic isn't running then; systemd silently skips the unit
# when the Condition fails and re-evaluates on every subsequent start.
# Conversely this Condition never validates the config or stops a running
# daemon — that's the converge-time logic's job (see
# roles/keepalived/tasks/main.yml).
#
# Asymmetry to know: the ansible gate counts only ≥1-byte fragments
# (find size: '1'), but systemd has no "non-empty glob" condition, so a
# zero-byte conf.d/*.conf would satisfy this Condition and let keepalived
# start and then wedge on the empty include. A zero-byte fragment is a
# tenant bug (fragments are self-contained vrrp_instance blocks); we
# don't defend it at boot.
[Unit]
ConditionPathExistsGlob=/etc/keepalived/conf.d/*.conf
