# _verify is test-only by contract (runs only under test/testrole.py).
# It exercises the role's load-bearing invariants — documented in
# tasks/main.yml's head comment — against the live unit on the box VM:
#
#   * conf.d perms + the gating drop-in (incl. its ExecReload validate).
#   * Populated conf.d  -> unit active+enabled, and re-running the role
#     is idempotent (no spurious restart). The harness idempotence pass
#     only sees box's empty conf.d, so the populated path is checked here.
#   * A base-conf change reloads hitlessly (SIGHUP), never restarts, so
#     the VIP does not flap.
#   * A malformed fragment is NEVER pushed onto the live daemon: a direct
#     `systemctl reload` aborts on the ExecReload validate, and a role
#     converge aborts on its own keepalived -t gate — both leaving the
#     daemon running the previous good config.
#   * Empty conf.d  -> unit stopped+disabled.
#
# The sentinel uses the box default interface (keepalived refuses lo and
# dummy interfaces — no multicast) and a TEST-NET-1 VIP, so no VRRP
# traffic of consequence leaves the closed VM bridge. The restart probe
# throughout is status.ActiveEnterTimestampMonotonic: a reload leaves it
# unchanged, a restart bumps it.

- name: _verify | Stat conf.d directory
  stat:
    path: /etc/keepalived/conf.d
  register: _keepalived_confd_stat
  become: true

- name: _verify | Conf.d dir is 0750 root:root
  assert:
    that:
      - _keepalived_confd_stat.stat.exists
      - _keepalived_confd_stat.stat.isdir
      - _keepalived_confd_stat.stat.mode == '0750'
      - _keepalived_confd_stat.stat.pw_name == 'root'
      - _keepalived_confd_stat.stat.gr_name == 'root'

- name: _verify | Slurp override.conf drop-in
  slurp:
    src: /etc/systemd/system/keepalived.service.d/override.conf
  register: _keepalived_dropin
  become: true

- name: _verify | Drop-in carries the conf.d gate and the validate hooks
  vars:
    _dropin: "{{ _keepalived_dropin.content | b64decode }}"
  assert:
    that:
      - "'ConditionPathExistsGlob=/etc/keepalived/conf.d/*.conf' in _dropin"
      # The start path validates before launch; the reload path runs
      # keepalived -t before the SIGHUP.
      - "'ExecStartPre=/usr/sbin/keepalived -t -f /etc/keepalived/keepalived.conf' in _dropin"
      - "'ExecReload=/usr/sbin/keepalived -t -f /etc/keepalived/keepalived.conf' in _dropin"

# Branch A: drop a self-contained sentinel fragment and re-run the role.
# TEST-NET-1 VIP guarantees no collision with prod; the GARPs keepalived
# emits as it transitions go onto the harness closed VM bridge — harmless.
- name: _verify | Drop sentinel conf.d fragment
  copy:
    content: |
      vrrp_instance _verify_sentinel {
        state BACKUP
        interface {{ ansible_default_ipv4.interface }}
        virtual_router_id 250
        priority 1
        advert_int 1
        virtual_ipaddress {
          192.0.2.250/32
        }
      }
    dest: /etc/keepalived/conf.d/_verify_sentinel.conf
    owner: root
    group: root
    mode: "0640"
  become: true

- name: _verify | Re-run keepalived role to enable+start
  import_role:
    name: keepalived

- name: _verify | Populated-conf.d branch — query unit state
  systemd:
    name: keepalived
  register: _keepalived_unit_pop
  become: true

- name: _verify | Populated-conf.d branch — assert active + enabled
  assert:
    that:
      - _keepalived_unit_pop.status.ActiveState == 'active'
      - _keepalived_unit_pop.status.UnitFileState == 'enabled'

# Pin the active-enter timestamp; every later branch asserts it is
# unchanged (no restart -> no VIP flap).
- name: _verify | Capture the active-enter timestamp (restart probe)
  set_fact:
    _keepalived_ts_active: "{{ _keepalived_unit_pop.status.ActiveEnterTimestampMonotonic }}"

# Branch B: re-run the role with conf.d unchanged. The harness
# idempotence pass runs against box's empty conf.d (no tenant), so the
# populated path — the one most likely to churn (Enable/Start/Reload
# firing every converge) — is only ever idempotence-checked here.
- name: _verify | Idempotence — re-run the role with no change
  import_role:
    name: keepalived

- name: _verify | Idempotence — query unit state
  systemd:
    name: keepalived
  register: _keepalived_unit_idem
  become: true

- name: _verify | Idempotence — still active+enabled, no spurious restart
  assert:
    that:
      - _keepalived_unit_idem.status.ActiveState == 'active'
      - _keepalived_unit_idem.status.UnitFileState == 'enabled'
      - _keepalived_unit_idem.status.ActiveEnterTimestampMonotonic == _keepalived_ts_active

# Branch C: a base-conf change must reload hitlessly (SIGHUP), not
# restart. Perturb the on-disk base conf so the role's `copy` detects
# drift and rewrites it (changed -> the role's reload trigger fires),
# then assert the unit was reloaded (a fresh reload line in the journal)
# without re-entering the active state (timestamp unchanged).
- name: _verify | Snapshot keepalived journal before the base-conf reload
  command: journalctl -u keepalived --no-pager
  register: _keepalived_journal_pre
  changed_when: false
  become: true

- name: _verify | Record the pre-reload SIGHUP line count
  set_fact:
    _keepalived_reload_pre: "{{ _keepalived_journal_pre.stdout_lines | select('search', '(?i)reload') | list | length }}"

- name: _verify | Perturb the base conf on disk to force a reload next run
  lineinfile:
    path: /etc/keepalived/keepalived.conf
    line: "# _verify reload perturbation"
    insertafter: EOF
  become: true

- name: _verify | Re-run keepalived role to exercise the reload path
  import_role:
    name: keepalived

- name: _verify | Reload branch — query unit state
  systemd:
    name: keepalived
  register: _keepalived_unit_reloaded
  become: true

- name: _verify | Snapshot keepalived journal after the base-conf reload
  command: journalctl -u keepalived --no-pager
  register: _keepalived_journal_post
  changed_when: false
  become: true

- name: _verify | A SIGHUP reload fired and the unit was not restarted
  assert:
    that:
      - _keepalived_unit_reloaded.status.ActiveState == 'active'
      # Active-enter timestamp unchanged => reloaded in place, not restarted.
      - _keepalived_unit_reloaded.status.ActiveEnterTimestampMonotonic == _keepalived_ts_active
      # A new reload line appeared => the role actually reloaded (vs a no-op).
      - (_keepalived_journal_post.stdout_lines | select('search', '(?i)reload') | list | length) > (_keepalived_reload_pre | int)

# Branch D: a malformed fragment must never reach
# the live daemon. First a direct `systemctl reload` must abort on the
# drop-in ExecReload validate (keepalived -t), then a full role converge
# must abort on its own validate gate — both leaving keepalived running
# the previous good config.
# A bogus *top-level* keyword makes keepalived -t exit non-zero (rc=5,
# "Unknown keyword") — the same hard failure the include_check revert
# (b47e09536) hit. Unknown keywords *inside* a block are often only
# warned about, so keep this at the fragment top level to be deterministic.
- name: _verify | Drop a malformed sentinel fragment
  copy:
    content: |
      _verify_bogus_top_level_keyword
    dest: /etc/keepalived/conf.d/_verify_bad.conf
    owner: root
    group: root
    mode: "0640"
  become: true

- name: _verify | Direct systemctl reload aborts on the ExecReload validate  # noqa: command-instead-of-module -- must capture the reload's non-zero rc (it is expected to fail on the ExecReload validate); the systemd module would just fail the task
  command: systemctl reload keepalived
  register: _keepalived_bad_reload
  changed_when: false
  failed_when: false
  become: true

- name: _verify | Reload failed and the daemon kept the good config
  systemd:
    name: keepalived
  register: _keepalived_unit_after_bad_reload
  become: true

- name: _verify | Assert reload rejected, unit untouched
  assert:
    that:
      - _keepalived_bad_reload.rc != 0
      - _keepalived_unit_after_bad_reload.status.ActiveState == 'active'
      - _keepalived_unit_after_bad_reload.status.ActiveEnterTimestampMonotonic == _keepalived_ts_active

- name: _verify | A converge with a malformed fragment must fail
  block:
    - name: _verify | Re-run keepalived role expecting a validation failure
      import_role:
        name: keepalived
    - name: _verify | Role unexpectedly succeeded on a malformed fragment
      fail:
        msg: >-
          keepalived role converged with a malformed conf.d fragment present;
          the keepalived -t gate did not fail the run as it must.
  rescue:
    - name: _verify | Role aborted on the malformed fragment as expected
      debug:
        msg: keepalived role failed validation as expected — daemon left untouched.

- name: _verify | Query unit state after the failed converge
  systemd:
    name: keepalived
  register: _keepalived_unit_after_bad_converge
  become: true

- name: _verify | Daemon still active on the good config, never reloaded
  assert:
    that:
      - _keepalived_unit_after_bad_converge.status.ActiveState == 'active'
      - _keepalived_unit_after_bad_converge.status.ActiveEnterTimestampMonotonic == _keepalived_ts_active

- name: _verify | Remove the malformed fragment
  file:
    path: /etc/keepalived/conf.d/_verify_bad.conf
    state: absent
  become: true

# Branch D2 (base-conf rollback): the rescue's restore + backup-removal
# arms (main.yml) only fire when the BASE conf changed AND the assembled
# config then fails validation. Branch D's bad fragment leaves the base
# conf untouched, so the restore is a skipped no-op there. Force it:
# perturb the base conf (so the role's `copy` rewrites it from files/ and
# leaves a backup of the perturbed version) WITH a malformed fragment
# present (so `keepalived -t` fails after the good base is written). The
# rescue must then restore the pre-copy base from its backup and delete
# that backup, leaving the live daemon on the previous good config.
- name: _verify | Count base-conf backups before the rollback probe
  find:
    paths: /etc/keepalived
    patterns: 'keepalived.conf.*'
  register: _keepalived_backups_pre
  become: true

- name: _verify | Perturb the base conf so the next copy leaves a backup
  lineinfile:
    path: /etc/keepalived/keepalived.conf
    line: "# _verify rollback perturbation"
    insertafter: EOF
  become: true

- name: _verify | Drop a malformed fragment to fail validation after the copy
  copy:
    content: |
      _verify_rollback_bogus_keyword
    dest: /etc/keepalived/conf.d/_verify_rollback_bad.conf
    owner: root
    group: root
    mode: "0640"
  become: true

- name: _verify | Re-run the role expecting the base-conf rescue to fire
  block:
    - name: _verify | Converge with a perturbed base conf and a bad fragment
      import_role:
        name: keepalived
    - name: _verify | Role unexpectedly succeeded on the rollback probe
      fail:
        msg: >-
          keepalived role converged with a malformed fragment present; the
          keepalived -t gate did not fail the run as it must.
  rescue:
    - name: _verify | Role aborted and the base-conf rescue ran as expected
      debug:
        msg: keepalived role failed validation as expected — base conf restored from backup.

- name: _verify | Rollback probe — query unit state
  systemd:
    name: keepalived
  register: _keepalived_unit_after_rollback
  become: true

- name: _verify | Slurp the base conf after the rollback
  slurp:
    src: /etc/keepalived/keepalived.conf
  register: _keepalived_base_after_rollback
  become: true

- name: _verify | Count base-conf backups after the rollback probe
  find:
    paths: /etc/keepalived
    patterns: 'keepalived.conf.*'
  register: _keepalived_backups_post
  become: true

- name: _verify | Rollback restored the pre-copy base conf and cleaned its backup
  vars:
    _base: "{{ _keepalived_base_after_rollback.content | b64decode }}"
  assert:
    that:
      # Daemon untouched: the bad config never reached it.
      - _keepalived_unit_after_rollback.status.ActiveState == 'active'
      - _keepalived_unit_after_rollback.status.ActiveEnterTimestampMonotonic == _keepalived_ts_active
      # Restore arm ran: the perturbation we appended (i.e. the backed-up
      # pre-copy version) is back on disk — the freshly-copied clean base
      # was reverted to the backup.
      - "'# _verify rollback perturbation' in _base"
      # Remove-backup arm ran: the rescue deleted the backup it created, so
      # the count is unchanged vs before the probe.
      - _keepalived_backups_post.matched == _keepalived_backups_pre.matched

- name: _verify | Remove the rollback probe fragment
  file:
    path: /etc/keepalived/conf.d/_verify_rollback_bad.conf
    state: absent
  become: true

# Branch E: remove the good sentinel and re-run; the disable branch
# should return the unit to stopped+disabled (last tenant left).
- name: _verify | Remove sentinel fragment
  file:
    path: /etc/keepalived/conf.d/_verify_sentinel.conf
    state: absent
  become: true

- name: _verify | Re-run keepalived role to exercise stop branch
  import_role:
    name: keepalived

- name: _verify | Post-removal — query unit state
  systemd:
    name: keepalived
  register: _keepalived_unit_after
  become: true

- name: _verify | Post-removal — assert inactive + disabled
  assert:
    that:
      - _keepalived_unit_after.status.ActiveState == 'inactive'
      - _keepalived_unit_after.status.UnitFileState in ['disabled', 'masked']

# Branch F: the vrrp martian-logging udev rule. The box sentinel runs without
# use_vmac so no vmac iface exists here; create a vrrp-named macvlan (dotted, to
# mirror the real "vrrp.1" and exercise the /proc path) and assert udev drives
# log_martians to 0 on creation. block/always so the throwaway iface is always
# torn down even if the assertion fails.
- name: _verify | Exercise the vrrp martian udev rule end-to-end
  become: true
  block:
    - name: _verify | Create a vrrp-named macvlan to trigger the udev rule
      command: ip link add vrrp.99 link {{ ansible_default_ipv4.interface }} type macvlan mode private
      changed_when: false

    - name: _verify | Settle udev so the rule's RUN completes
      command: udevadm settle
      changed_when: false

    - name: _verify | Read log_martians on the vrrp iface
      command: cat /proc/sys/net/ipv4/conf/vrrp.99/log_martians
      register: _keepalived_vrrp_martians
      changed_when: false

    - name: _verify | Assert martian logging disabled on the vrrp iface
      assert:
        that:
          - _keepalived_vrrp_martians.stdout == '0'
  always:
    - name: _verify | Remove the throwaway vrrp iface
      command: ip link del vrrp.99
      changed_when: false
      failed_when: false
