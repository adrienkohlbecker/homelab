# Multi-tenant keepalived runtime — tenant contract:
#
# 1. Tenants drop a self-contained config fragment at
#    /etc/keepalived/conf.d/<tenant>.conf and own its lifecycle.
# 2. Tenants own their own reload: after rendering the fragment, reload
#    keepalived with `throttle: 1` so peers reload one at a time and the
#    VIP doesn't flap on both nodes at once. Copy the "Reload keepalived"
#    task from roles/pihole/tasks/main.yml verbatim:
#
#        - name: Reload keepalived
#          when: <tenant>_keepalived_cfg.changed
#          systemd:
#            name: keepalived
#            state: reloaded
#          become: true
#          throttle: 1
#
#    The throttle is per-task: a base-conf edit (reloaded by THIS role)
#    and a tenant-fragment edit in the same converge serialize
#    independently, so the rolling guarantee holds within each task, not
#    across the pair. Structural changes (interface, VRID, vmac) need a
#    manual restart — reload won't pick those up.
# 3. Retiring a tenant: drop a `file: state=absent` task targeting
#    its conf.d/<tenant>.conf and KEEP it as a tombstone in the role
#    until you're sure every host has converged. This role does not
#    GC stale fragments — without the tombstone, an old tenant config
#    silently keeps running. Retire on the BACKUP node first: stopping
#    keepalived while it holds the VIP as MASTER can strand the VIP on
#    the interface until a peer/kernel notices, so converge the
#    non-MASTER host before the one currently holding the VIP.
# 4. This role gates `keepalived.service` on conf.d having ≥1
#    fragment (Type=notify wedges for ~90s on empty conf), and
#    explicitly stops the unit when the last tenant leaves.
# 5. Base-conf edits to `files/keepalived.conf` trigger a `reload`;
#    edits that affect script execution semantics (global_defs
#    toggles like `enable_script_security` / `script_user`) may
#    need a manual `systemctl restart keepalived` — SIGHUP-reload
#    semantics for global_defs are flaky in 2.2.x.
# 6. site.yml runs `keepalived` BEFORE its tenants (see site.yml:58),
#    so on a fresh host the base conf + conf.d dir + sysctl are in
#    place by the time tenant roles render fragments. Keep that order:
#    the gate snapshots the conf.d count once per converge, so a tenant
#    that renders its fragment AFTER keepalived has counted (wrong
#    site.yml order, or a tags-limited run) leaves the unit gated-off
#    until the next converge.
#
# Current tenants: roles/pihole. Adding a new tenant (e.g. the
# wireguard-VIP follow-up): mirror roles/pihole/tasks/main.yml:238
# and roles/pihole/templates/keepalived.conf.j2 — the conf.d
# fragment format is unconstrained by this role.
- name: Install keepalived
  apt:
    pkg:
      - keepalived
    policy_rc_d: 101
    cache_valid_time: 3600
  register: keepalived_apt
  become: true
  tags:
    - keepalived

# Without ip_nonlocal_bind=1 a service can only bind on IPs present
# on a local interface, so on the keepalived secondary (where the
# VIP isn't currently held) the bind fails with "cannot assign
# requested address". Setting this once globally lets services
# (e.g. pihole on the keepalived VIP) bind regardless of who owns
# the VIP at any given moment.
- name: Install ip_nonlocal_bind sysctl
  ansible.posix.sysctl:
    name: net.ipv4.ip_nonlocal_bind
    value: '1'
    sysctl_file: /etc/sysctl.d/30-keepalived.conf
    sysctl_set: true
  become: true
  tags:
    - keepalived

- name: Create configuration directory
  file:
    dest: /etc/keepalived/conf.d
    state: directory
    owner: root
    group: root
    mode: "0750"
  become: true
  tags:
    - keepalived

- name: Copy the configuration
  copy:
    src: keepalived.conf
    dest: /etc/keepalived/keepalived.conf
    mode: "0640"
    owner: root
    group: root
    backup: true
  register: keepalived_base_conf
  become: true
  tags:
    - keepalived

# keepalived.service is Type=notify and only sends READY=1 once it has at
# least one vrrp_instance to manage. With empty conf.d the unit wedges
# until TimeoutStartSec (~90s) and then fails — at first start AND at
# every reboot if it's left enabled. So we gate the whole systemd_unit
# invocation on conf.d having a tenant, and explicitly tear down when
# the last tenant leaves so the unit doesn't auto-start broken.
#
# The override_keepalived.conf drop-in below is NOT a redundant copy of
# this gate — the two cover disjoint triggers, so don't delete either as
# "belt-and-braces". This converge-time logic validates (keepalived -t)
# and, on tenant retirement, explicitly stops + disables the running
# unit — the drop-in does neither. The drop-in's ConditionPathExistsGlob
# is the only gate at an out-of-band / boot-time start (conf.d emptied
# between converges, unit still enabled), where this ansible logic isn't
# running; systemd then silently skips the start instead of wedging.
- name: Install conf.d-gating drop-in for keepalived.service
  import_role:
    name: systemd_unit
    tasks_from: dropin
  vars:
    systemd_unit_args:
      src: override_keepalived.conf
      for: keepalived.service
  tags:
    - keepalived

# size: '1' so a zero-byte placeholder doesn't trip the gate — plain
# `include` still loads it and then wedges, since `include` neither
# validates nor skips empty matches. The `.*` exclude skips editor/dot
# tempfiles; `*.conf` already ignores the `.bak~`-style backups ansible
# leaves on a fragment edit.
- name: Count number of configurations
  find:
    paths: /etc/keepalived/conf.d
    patterns: '*.conf'
    excludes: [ '.*' ]
    size: '1'
  register: keepalived_confs
  become: true
  tags:
    - keepalived

# Catches base-conf typos and stale tenant fragments before they
# propagate to the running daemon via SIGHUP-reload. Skipped when conf.d
# is empty (matched == 0): the unit isn't started then, so there's
# nothing to validate, and on a fresh host the keepalived binary may not
# exist yet. Also skipped in check-mode when apt would have installed the
# package this run (binary doesn't exist yet).
- name: Validate assembled keepalived config
  when:
    - keepalived_confs.matched > 0
    - not (ansible_check_mode and keepalived_apt.changed)
  tags:
    - keepalived
  block:
    - name: Run keepalived -t on the assembled config
      command: keepalived -t -f /etc/keepalived/keepalived.conf
      changed_when: false
      become: true
  rescue:
    # keepalived -t reads the assembled config in place, so a bad base
    # conf is already on disk; restore the previous version from the
    # backup the copy above made (mirrors roles/nginx/tasks/conf_d.yml)
    # so the next SIGHUP-reload can't pick up the broken file. A bad
    # *tenant* fragment trips the same validate but isn't ours to roll
    # back (restore is a no-op then) — the fail still aborts the run.
    - name: Restore previous base configuration after failed validation
      when: '"backup_file" in keepalived_base_conf'
      copy:
        remote_src: true
        src: "{{ keepalived_base_conf.backup_file }}"
        dest: /etc/keepalived/keepalived.conf
        mode: "0640"
        owner: root
        group: root
      become: true
    - name: Remove the base configuration backup
      when: '"backup_file" in keepalived_base_conf'
      file:
        path: "{{ keepalived_base_conf.backup_file }}"
        state: absent
      become: true
    # First-ever write on a fresh host has no backup to restore; drop the
    # broken file so a SIGHUP-reload / boot-time start can't pick it up.
    # (A committed-bad base conf is a CI failure, but this completes the
    # nginx mirror rather than leaving a half-rescue.)
    - name: Remove the freshly-added base configuration
      when: keepalived_base_conf.changed and "backup_file" not in keepalived_base_conf
      file:
        path: /etc/keepalived/keepalived.conf
        state: absent
      become: true
    - name: Fail after restoring base configuration
      fail:
        msg: >-
          keepalived -t failed on the assembled config; the previous base
          conf was restored. Inspect the validate output above — a tenant
          fragment in /etc/keepalived/conf.d/ or files/keepalived.conf is
          malformed.

- name: Enable keepalived service
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: keepalived
      condition: "{{ not (ansible_check_mode and keepalived_apt.changed) and keepalived_confs.matched > 0 }}"
      reload: "{{ keepalived_base_conf.changed }}"
  tags:
    - keepalived

- name: Disable keepalived service when no tenants
  import_role:
    name: systemd_unit
    tasks_from: remove
  vars:
    systemd_unit_args:
      dest: keepalived.service
      condition: "{{ keepalived_confs.matched == 0 and not (ansible_check_mode and keepalived_apt.changed) }}"
  tags:
    - keepalived
