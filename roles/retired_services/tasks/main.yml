# ---- nut_monitor (was box,lab,pug; nut_server is KEPT) ----
# nut-monitor.service ships in the nut-client package, which nut_server still
# needs for `upsc` -- so disable+stop the unit rather than purging the package
# or deleting the package-owned unit file. Only the upsmon config + notify
# script were nut_monitor's own; nut_server owns the rest of /etc/nut.
- name: Disable and stop nut_monitor (upsmon) service
  systemd:
    name: nut-monitor.service
    enabled: false
    state: stopped
  become: true
  register: retired_services_nut_monitor_stop
  failed_when: >-
    retired_services_nut_monitor_stop.failed | default(false)
    and 'could not find' not in (retired_services_nut_monitor_stop.msg | default('') | lower)

- name: Remove nut_monitor config and notify script
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/nut/upsmon.conf
    - /etc/nut/upssched.conf
    - /usr/local/bin/nut-notify
  become: true

# ---- prometheus (was box,lab) ----
- name: Retire prometheus service override drop-in
  import_role:
    name: systemd_unit
    tasks_from: remove
  vars:
    systemd_unit_args:
      for: prometheus.service

- name: Purge prometheus package
  apt:
    name: prometheus
    state: absent
    purge: true
    autoremove: true
  become: true

- name: Retire prometheus nginx site
  import_role:
    name: nginx
    tasks_from: site
  vars:
    nginx_site_args:
      subdomain: prometheus
      state: absent

- name: Remove prometheus state and leftover config
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - /mnt/services/prometheus
    - /etc/prometheus
    - /etc/default/prometheus
  become: true

# ---- fail2ban (dropped where fail2ban_enabled is false; KEPT on fox + box) ----
# fail2ban now runs only on hosts with fail2ban_enabled (fox + the test box),
# so tear it down everywhere that flag is absent/false.
- name: Purge fail2ban where it no longer runs
  when: not fail2ban_enabled
  apt:
    name: fail2ban
    state: absent
    purge: true
    autoremove: true
  become: true

- name: Remove fail2ban local overrides where it no longer runs
  when: not fail2ban_enabled
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/fail2ban/jail.local
    - /etc/fail2ban/fail2ban.local
    - /etc/fail2ban/jail.d/sshd.local
    - /etc/fail2ban/action.d/sendmail-whois-lines.local
  become: true

# ---- netdata: drop the now-orphaned collector configs AND health alerts ----
# The netdata role stopped *deploying* these (redis + keepalived everywhere;
# fail2ban where fail2ban_enabled is false) but does not remove the go.d/
# collector configs and health.d/ alert files it already wrote. The redis
# collector + keepalived alert drops are host-agnostic (no-op where they never
# landed); the fail2ban pair is gated on fail2ban_enabled so fox + the test box
# keep their live fail2ban collector and alert.
- name: Remove orphaned netdata configs for removed collectors (all hosts)
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/netdata/go.d/redis.conf
    - /etc/netdata/health.d/keepalived.conf
  become: true
  register: retired_services_netdata_common

- name: Remove orphaned netdata fail2ban collector and alert where it no longer runs
  when: not fail2ban_enabled
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/netdata/go.d/fail2ban.conf
    - /etc/netdata/health.d/fail2ban.conf
  become: true
  register: retired_services_netdata_fail2ban

- name: Probe for netdata
  stat:
    path: /usr/sbin/netdata
  register: retired_services_netdata_bin
  become: true

# go.d.plugin re-reads job configs and health re-reads alert files only on a
# reload/restart, so removing the files above leaves the dead jobs/alarms
# loaded until netdata is poked. Restart only when something was actually
# removed and netdata is installed (it isn't on the box_deps test fixture).
- name: Restart netdata to drop the removed collectors and alerts
  when:
    - retired_services_netdata_bin.stat.exists
    - retired_services_netdata_common.changed or (retired_services_netdata_fail2ban.changed | default(false))
  systemd:
    name: netdata.service
    state: restarted
  become: true

# ---- nodejs (was box,lab) ----
# Host-level node had no consumer: CI runs in containers whose image ships its
# own node, the actions/runner bundles node for JS actions, and nothing else on
# the host called node/npm. Gate the purge on the NodeSource keyring (the role's
# fingerprint) so a node installed by some other means elsewhere is left alone;
# the source/keyring/pin removals are role-specific filenames, safe anywhere.
- name: Probe for the retired NodeSource apt source
  stat:
    path: /usr/share/keyrings/nodesource.gpg
  register: retired_services_nodesource
  become: true

- name: Purge host-level nodejs where the NodeSource source was present
  when: retired_services_nodesource.stat.exists
  apt:
    name: nodejs
    state: absent
    purge: true
    autoremove: true
  become: true

- name: Remove the NodeSource apt source, keyring, and pin
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - /usr/share/keyrings/nodesource.gpg
    - /etc/apt/sources.list.d/nodesource.list
    - /etc/apt/sources.list.d/nodesource.sources
    - /etc/apt/preferences.d/nodesource
  become: true

# ---- static_curl (was box,lab,pug) ----
# The role installed a statically-linked curl at /usr/local/bin/curl_static for
# distroless-image healthchecks, but no service ever bind-mounted it. Remove the
# binary and the versioned download cache it left under /var/cache.
- name: Find cached static-curl tarballs
  find:
    paths: /var/cache
    patterns: "curl_static-*.tar.xz"
  register: retired_services_static_curl_cache
  become: true

- name: Remove the static curl binary and cached tarballs
  file:
    path: "{{ item }}"
    state: absent
  loop: "{{ ['/usr/local/bin/curl_static'] + (retired_services_static_curl_cache.files | map(attribute='path') | list) }}"
  become: true

# ---- gitea_runner (was lab; the fleet's only rootless gitea CI runner) ----
# Unlike the other tombstones, gitea_runner ran rootless under a *lingering* user
# manager: the daemon itself was a system-scope unit (User=gitea_runner), but its
# podman.socket and podman_prune.timer lived in that user's manager. So teardown
# has two scopes. The system unit + on-disk artifacts come down everywhere
# (idempotent no-op where the runner never ran). The user-scope prune timer and
# the linger that keeps the manager alive are torn down only where the linger
# marker proves the manager was set up: on pug/fox it never ran, and systemd_timer
# remove asserts a live linger marker for user-scope units, so it must be skipped
# there. The gitea_runner system user is LEFT in place (uid/subid-range reuse
# risk, as with the other tombstones and lab.yml's retained subid slot); only its
# linger, units, binary, and on-disk state go.
- name: Stat gitea_runner linger marker
  stat:
    path: /var/lib/systemd/linger/gitea_runner
  register: retired_services_gitea_runner_linger
  become: true

# System-scope daemon first, so it stops before its rootless podman.socket does.
- name: Retire gitea_runner service
  import_role:
    name: systemd_unit
    tasks_from: remove
  vars:
    systemd_unit_args:
      dest: gitea_runner.service

# User-scope prune timer (files under /etc/systemd/user, not in the home, so the
# home removal below won't reach them). Acts on the live user manager — gated on
# the linger marker so it no-ops where gitea_runner never ran.
- name: Retire gitea_runner rootless podman prune timer
  when: retired_services_gitea_runner_linger.stat.exists
  import_role:
    name: systemd_timer
    tasks_from: remove
  vars:
    systemd_timer_args:
      name: podman_prune
      user: gitea_runner

# Turn off linger once the user-scope unit is gone, stopping the now-idle user
# manager. removes: makes it idempotent; gated on the marker so it no-ops where
# gitea_runner never lingered. The podman.socket's per-user enable symlink lives
# in the home and goes with the scratch removal below.
- name: Turn off linger for gitea_runner
  when: retired_services_gitea_runner_linger.stat.exists
  command:
    argv:
      - loginctl
      - --no-ask-password
      - disable-linger
      - gitea_runner
    removes: /var/lib/systemd/linger/gitea_runner
  become: true

- name: Remove gitea_runner binary
  file:
    path: /usr/local/bin/gitea-runner
    state: absent
  become: true

# DESTRUCTIVE: /mnt/services/gitea_runner holds config.yml + the .runner
# credential (rides ZFS snapshots); /mnt/scratch/gitea_runner is the rootless
# podman storage + job cache/workdir (scratch, never backed up).
- name: Remove gitea_runner state and scratch directories
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - /mnt/services/gitea_runner
    - /mnt/scratch/gitea_runner
  become: true

# ---- github_runner (was box,lab; the self-hosted GitHub Actions runner fleet,
# retired together with GitHub Actions in favour of GitLab CI) ----
# Same two-scope shape as gitea_runner, but the runners were *instantiated*
# system-scope units (github_runner@<inst>.service, User=github_runner -- up to
# ten on lab) backed by a lingering user manager that held the rootless
# podman.socket + podman_prune.timer. The host_vars list that named the instances
# is gone, so they're discovered from their multi-user.target.wants symlinks and
# stopped+disabled; then the template unit, user-scope timer, linger, launcher,
# tmpfiles rule, docker.sock shim, runner tree, and scratch state come down. The
# github_runner system user is LEFT in place (uid/subid-range reuse, matching the
# retained subid slot in lab.yml). The GitHub-side registration is NOT removed
# here -- config.sh remove needs a fresh removal token, so delete the now-offline
# runners from the repo settings by hand. Idempotent no-op where it never ran
# (box/pug/fox).
- name: Stat github_runner linger marker
  stat:
    path: /var/lib/systemd/linger/github_runner
  register: retired_services_github_runner_linger
  become: true

- name: Find enabled github_runner instance units
  find:
    paths: /etc/systemd/system/multi-user.target.wants
    patterns: github_runner@*.service
    file_type: any
  register: retired_services_github_runner_instances
  become: true

# System daemons first, so each stops before its rootless podman socket does.
- name: Stop and disable github_runner instances
  systemd:
    name: "{{ item }}"
    state: stopped
    enabled: false
  loop: "{{ retired_services_github_runner_instances.files | map(attribute='path') | map('basename') | list }}"
  become: true

- name: Retire the github_runner@.service template unit
  import_role:
    name: systemd_unit
    tasks_from: remove
  vars:
    systemd_unit_args:
      dest: github_runner@.service

# User-scope prune timer (files under /etc/systemd/user); gated on the linger
# marker so it no-ops where the user manager never ran (box/pug/fox).
- name: Retire github_runner rootless podman prune timer
  when: retired_services_github_runner_linger.stat.exists
  import_role:
    name: systemd_timer
    tasks_from: remove
  vars:
    systemd_timer_args:
      name: podman_prune
      user: github_runner

- name: Turn off linger for github_runner
  when: retired_services_github_runner_linger.stat.exists
  command:
    argv:
      - loginctl
      - --no-ask-password
      - disable-linger
      - github_runner
    removes: /var/lib/systemd/linger/github_runner
  become: true

- name: Remove github_runner tmpfiles rule, docker.sock shim, and launcher
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/tmpfiles.d/github_runner.conf
    - /var/run/docker.sock
    - /usr/local/bin/github_runner_run
  become: true

- name: Remove the actions-runner tree
  file:
    path: /opt/actions-runner
    state: absent
  become: true

# DESTRUCTIVE: /mnt/scratch/github_runner is the system user's home -- rootless
# podman storage, per-instance workdirs, and runner job caches (scratch, never
# backed up). /mnt/ci_scratch is a ZFS dataset and is left to zfs_mount.
- name: Remove github_runner scratch state
  file:
    path: /mnt/scratch/github_runner
    state: absent
  become: true

# ---- dnscrypt_proxy (was box,lab,pug; adguard now resolves via DoH directly) ----
- name: Retire dnscrypt-proxy socket override drop-in
  import_role:
    name: systemd_unit
    tasks_from: remove
  vars:
    systemd_unit_args:
      for: dnscrypt-proxy.socket

- name: Purge dnscrypt-proxy package
  apt:
    name: dnscrypt-proxy
    state: absent
    purge: true
    autoremove: true
  become: true

- name: Remove dnscrypt-proxy query log directory
  file:
    path: /var/log/dnscrypt-proxy
    state: absent
  become: true

# ---- pihole (was lab,pug; replaced by adguard on the same DNS VIP) ----
# Ordering contract for the cutover converge: this play (base) runs before
# the lab/pug service play, so pihole's :53 publish and its keepalived
# fragment are gone before roles/adguard binds the same sockets and renders
# its own fragment. Between the two, the UDM's dnsmasq failover holds the
# VIP -- converge one host at a time (--limit lab, then pug) so the peer
# keeps serving full DNS through the gap.
- name: Retire pihole service
  import_role:
    name: systemd_unit
    tasks_from: remove
  vars:
    systemd_unit_args:
      dest: pihole.service

# No keepalived reload here: roles/keepalived (which runs after this role)
# stops the unit if this was the only fragment, and roles/adguard's own
# render+reload picks the removal up when it drops the successor fragment
# the same converge.
- name: Remove pihole keepalived fragment
  file:
    path: /etc/keepalived/conf.d/pihole.conf
    state: absent
  become: true

- name: Retire pihole nginx site
  import_role:
    name: nginx
    tasks_from: site
  vars:
    nginx_site_args:
      subdomain: pihole
      state: absent

- name: Remove pihole podman secret
  containers.podman.podman_secret:
    name: pihole_password
    state: absent
  become: true

- name: Retire pihole reboot guard service
  import_role:
    name: systemd_unit
    tasks_from: remove
  vars:
    systemd_unit_args:
      dest: pihole_reboot_guard.service

- name: Remove pihole scripts and drop-ins
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - /usr/local/bin/pihole_healthcheck
    - /usr/local/sbin/pihole_reboot_guard
    - /etc/systemd/logind.conf.d/pihole_reboot_guard.conf
  become: true

# The netdata go.d job config written by the retired role, plus the module
# enable that went with it. `pihole: no` (rather than deleting the line)
# keeps go.d from autodetect-probing the dead loopback port on every start.
# netdata picks both up on its next restart; no forced restart here.
- name: Remove netdata pihole collector job
  file:
    path: /etc/netdata/go.d/pihole.conf
    state: absent
  become: true

- name: Probe for go.d.conf
  stat:
    path: /etc/netdata/go.d.conf
  register: retired_services_godconf
  become: true

- name: Disable pihole collector in go.d.conf
  when: retired_services_godconf.stat.exists
  lineinfile:
    path: /etc/netdata/go.d.conf
    regexp: '^[#\s]*pihole:\s+'
    line: '  pihole: no'
    backup: true
    validate: python3 -c 'import yaml,sys; yaml.safe_load(open(sys.argv[1]))' "%s"
  become: true

# fluentbit re-renders its conf without the pihole tails earlier in this
# play; these are the orphaned parser file and tail-cursor DBs.
- name: Remove fluentbit pihole parser and cursors
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/fluent-bit/parsers_pihole.conf
    - /var/lib/fluent-bit/pihole_ftl.db
    - /var/lib/fluent-bit/pihole_webserver.db
    - /var/lib/fluent-bit/pihole_gravity.db
  become: true

# DESTRUCTIVE: /mnt/services/pihole holds the updatelists sentinel,
# /mnt/services/sqlite/pihole the FTL gravity/history DBs, /var/log/pihole
# the FTL and lighttpd logs. Recovery rides the daily ZFS snapshots.
- name: Remove pihole state directories
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - /mnt/services/pihole
    - /mnt/services/sqlite/pihole
    - /var/log/pihole
  become: true
