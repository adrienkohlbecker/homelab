# Decommission tombstones. Each block tears down what a now-deleted service
# role left on already-converged hosts: systemd units, nginx vhosts, podman
# secrets/networks, on-disk state, apt packages. Every task is idempotent and
# no-ops on a host that never ran the service, so this single role can run on
# the whole base-host group (box,lab,pug,fox) regardless of which host had what.
#
# Placed last in the "Base machine install" play so podman + nginx (and netdata)
# are already up when these removals reference them. Drop this whole role once
# every prod host has converged past this commit -- it carries no steady-state
# behaviour, only one-time cleanup.
#
# DESTRUCTIVE: the /mnt/services/* removals below delete service data (the
# openproject Postgres DB, paperless documents, the prometheus TSDB, redis
# dump.rdb). Recovery rides the daily ZFS snapshots. The service system users
# are deliberately LEFT in place (uid reuse risk outweighs the tidiness), as
# with the vscode_ha tombstone in roles/homeassistant.
#
# In the base play this role runs after podman + nginx are installed, so those
# tools are present on every real host. Probe for them anyway and gate the
# podman/nginx removals on presence: a teardown should degrade to a no-op rather
# than hard-fail when run somewhere they're absent (e.g. an isolated role test
# on a bare fixture). apt/systemd/file removals need no such guard.
- name: Probe for podman and nginx
  stat:
    path: "{{ item }}"
  loop:
    - /usr/bin/podman
    - /usr/sbin/nginx
  register: retired_services_tools
  become: true

- name: Resolve tool presence
  set_fact:
    retired_services_have_podman: "{{ retired_services_tools.results[0].stat.exists }}"
    retired_services_have_nginx: "{{ retired_services_tools.results[1].stat.exists }}"

# ---- openproject (was lab) ----
- name: Retire openproject service
  import_role:
    name: systemd_unit
    tasks_from: remove
  vars:
    systemd_unit_args:
      dest: openproject.service

- name: Retire openproject nginx site
  when: retired_services_have_nginx
  import_role:
    name: nginx
    tasks_from: site
  vars:
    nginx_site_args:
      subdomain: openproject
      state: absent

- name: Remove openproject podman secrets
  when: retired_services_have_podman
  containers.podman.podman_secret:
    name: "{{ item }}"
    state: absent
  loop:
    - openproject_secret_key
    - openproject_admin_password
    - openproject_smtp_password
  become: true

- name: Remove openproject state directory
  file:
    path: /mnt/services/openproject
    state: absent
  become: true

# ---- paperless (was lab) ----
# Remove paperless before redis: paperless joins the `redis` podman network,
# which can only be torn down once no container references it.
- name: Retire paperless service
  import_role:
    name: systemd_unit
    tasks_from: remove
  vars:
    systemd_unit_args:
      dest: paperless.service

- name: Retire paperless nginx site
  when: retired_services_have_nginx
  import_role:
    name: nginx
    tasks_from: site
  vars:
    nginx_site_args:
      subdomain: paperless
      state: absent

- name: Remove paperless podman secrets
  when: retired_services_have_podman
  containers.podman.podman_secret:
    name: "{{ item }}"
    state: absent
  loop:
    - paperless_secret_key
    - paperless_socialaccount_providers
  become: true

- name: Remove paperless state directories
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - /mnt/services/paperless
    - /mnt/services/sqlite/paperless
  become: true

# ---- redis (was box, lab) ----
- name: Retire redis service
  import_role:
    name: systemd_unit
    tasks_from: remove
  vars:
    systemd_unit_args:
      dest: redis.service

- name: Remove redis podman secret
  when: retired_services_have_podman
  containers.podman.podman_secret:
    name: redis_password
    state: absent
  become: true

# Both redis (producer) and paperless (consumer) created this network; both
# units are gone by now, so the bridge has no remaining references.
- name: Remove redis podman network
  when: retired_services_have_podman
  containers.podman.podman_network:
    name: redis
    state: absent
  become: true

- name: Remove redis state directory and sysctl drop-in
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - /mnt/services/redis
    - /etc/sysctl.d/30-redis.conf
  become: true

# ---- compta (was lab) ----
