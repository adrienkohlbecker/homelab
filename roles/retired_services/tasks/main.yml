# ---- csplogger (was box,lab,pug,fox) ----
# No unit/secret/dir -- just the nginx vhost plus the http-scope rate-limit
# conf.d drop the role installed.
- name: Retire csplogger nginx site
  when: retired_services_have_nginx
  import_role:
    name: nginx
    tasks_from: site
  vars:
    nginx_site_args:
      subdomain: csplogger
      state: absent

- name: Retire csplogger rate-limit conf.d drop
  when: retired_services_have_nginx
  import_role:
    name: nginx
    tasks_from: conf_d
  vars:
    nginx_conf_d_args:
      name: csp_ratelimit.conf
      state: absent

# ---- fancontrol (was box,lab,pug; fan2go owns fan control now) ----
- name: Retire fancontrol service and restart drop-in
  import_role:
    name: systemd_unit
    tasks_from: remove
  vars:
    systemd_unit_args:
      for: fancontrol.service

- name: Purge fancontrol package
  apt:
    name: fancontrol
    state: absent
    purge: true
    autoremove: true
  become: true

- name: Remove fancontrol on-disk state
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/fancontrol
    - /etc/fancontrol.template
    - /usr/local/sbin/fancontrol_remap
  become: true

# ---- keepalived_exporter (was box,lab,pug) ----
- name: Retire keepalived_exporter service
  import_role:
    name: systemd_unit
    tasks_from: remove
  vars:
    systemd_unit_args:
      dest: keepalived_exporter.service

- name: Retire keepalived_exporter nginx site
  when: retired_services_have_nginx
  import_role:
    name: nginx
    tasks_from: site
  vars:
    nginx_site_args:
      subdomain: keepalived-exporter
      state: absent

- name: Remove keepalived_exporter binary
  file:
    path: /usr/local/bin/keepalived_exporter
    state: absent
  become: true

# ---- nut_monitor (was box,lab,pug; nut_server is KEPT) ----
# nut-monitor.service ships in the nut-client package, which nut_server still
# needs for `upsc` -- so disable+stop the unit rather than purging the package
# or deleting the package-owned unit file. Only the upsmon config + notify
# script were nut_monitor's own; nut_server owns the rest of /etc/nut.
- name: Disable and stop nut_monitor (upsmon) service
  systemd:
    name: nut-monitor.service
    enabled: false
    state: stopped
  become: true
  register: retired_services_nut_monitor_stop
  failed_when: >-
    retired_services_nut_monitor_stop.failed | default(false)
    and 'could not find' not in (retired_services_nut_monitor_stop.msg | default('') | lower)

- name: Remove nut_monitor config and notify script
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/nut/upsmon.conf
    - /etc/nut/upssched.conf
    - /usr/local/bin/nut-notify
  become: true

# ---- prometheus (was box,lab) ----
- name: Retire prometheus service override drop-in
  import_role:
    name: systemd_unit
    tasks_from: remove
  vars:
    systemd_unit_args:
      for: prometheus.service

- name: Purge prometheus package
  apt:
    name: prometheus
    state: absent
    purge: true
    autoremove: true
  become: true

- name: Retire prometheus nginx site
  when: retired_services_have_nginx
  import_role:
    name: nginx
    tasks_from: site
  vars:
    nginx_site_args:
      subdomain: prometheus
      state: absent

- name: Remove prometheus state and leftover config
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - /mnt/services/prometheus
    - /etc/prometheus
    - /etc/default/prometheus
  become: true

# ---- fail2ban (dropped where fail2ban_enabled is unset; KEPT on fox + box) ----
# fail2ban now runs only on hosts with fail2ban_enabled (fox + the test box),
# so tear it down everywhere that flag is absent/false.
- name: Purge fail2ban where it no longer runs
  when: not (fail2ban_enabled | default(false))
  apt:
    name: fail2ban
    state: absent
    purge: true
    autoremove: true
  become: true

- name: Remove fail2ban local overrides where it no longer runs
  when: not (fail2ban_enabled | default(false))
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/fail2ban/jail.local
    - /etc/fail2ban/fail2ban.local
    - /etc/fail2ban/jail.d/sshd.local
    - /etc/fail2ban/action.d/sendmail-whois-lines.local
  become: true

# ---- netdata: drop the now-orphaned collector configs AND health alerts ----
# The netdata role stopped *deploying* these (redis + keepalived everywhere;
# fail2ban where fail2ban_enabled is unset) but does not remove the go.d/
# collector configs and health.d/ alert files it already wrote. The redis
# collector + keepalived alert drops are host-agnostic (no-op where they never
# landed); the fail2ban pair is gated on fail2ban_enabled so fox + the test box
# keep their live fail2ban collector and alert.
- name: Remove orphaned netdata configs for removed collectors (all hosts)
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/netdata/go.d/redis.conf
    - /etc/netdata/health.d/keepalived.conf
  become: true
  register: retired_services_netdata_common

- name: Remove orphaned netdata fail2ban collector and alert where it no longer runs
  when: not (fail2ban_enabled | default(false))
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/netdata/go.d/fail2ban.conf
    - /etc/netdata/health.d/fail2ban.conf
  become: true
  register: retired_services_netdata_fail2ban

- name: Probe for netdata
  stat:
    path: /usr/sbin/netdata
  register: retired_services_netdata_bin
  become: true

# go.d.plugin re-reads job configs and health re-reads alert files only on a
# reload/restart, so removing the files above leaves the dead jobs/alarms
# loaded until netdata is poked. Restart only when something was actually
# removed and netdata is installed (it isn't on the box_deps test fixture).
- name: Restart netdata to drop the removed collectors and alerts
  when:
    - retired_services_netdata_bin.stat.exists
    - retired_services_netdata_common.changed or (retired_services_netdata_fail2ban.changed | default(false))
  systemd:
    name: netdata.service
    state: restarted
  become: true
