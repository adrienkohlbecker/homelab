# _setup planted a representative artifact for each removal mechanism; assert
# the converge removed every one. This exercises the destructive path the role
# exists for, not just fresh-host absence.
- name: _verify | Decommissioned unit files are absent
  stat:
    path: "/etc/systemd/system/{{ item }}"
  loop:
    - openproject.service
    - paperless.service
    - redis.service
    - compta.service
    - keepalived_exporter.service
    - hyperdx.service
    - gitea_runner.service
    # github_runner: the template unit and its enabled instance's
    # multi-user.target.wants symlink (the find -> stop -> template-remove path).
    - github_runner@.service
    - multi-user.target.wants/github_runner@1.service
  register: retired_services_units
  failed_when: retired_services_units.stat.exists

- name: _verify | Decommissioned github_runner launcher, tmpfiles rule, and trees are absent
  stat:
    path: "{{ item }}"
  loop:
    - /etc/tmpfiles.d/github_runner.conf
    - /usr/local/bin/github_runner_run
    - /opt/actions-runner
    - /mnt/scratch/github_runner
  register: retired_services_github_runner_files
  failed_when: retired_services_github_runner_files.stat.exists

- name: _verify | Decommissioned state directories are absent
  stat:
    path: "{{ item }}"
  loop:
    - /mnt/services/openproject
    - /mnt/services/paperless
    - /mnt/services/redis
    - /mnt/services/prometheus
    - /mnt/services/hyperdx
    - /mnt/services/gitea_runner
    - /mnt/scratch/gitea_runner
  register: retired_services_dirs
  failed_when: retired_services_dirs.stat.exists

- name: _verify | Redis sysctl drop-in and host-agnostic netdata files are absent
  stat:
    path: "{{ item }}"
  loop:
    - /etc/sysctl.d/30-redis.conf
    - /etc/netdata/go.d/redis.conf
    - /etc/netdata/health.d/keepalived.conf
  register: retired_services_files
  failed_when: retired_services_files.stat.exists

# fox + box keep fail2ban, so its netdata files are removed (and thus asserted
# absent) only where fail2ban_enabled is false and the teardown drops them.
- name: _verify | Netdata fail2ban files are absent (where fail2ban no longer runs)
  when: not fail2ban_enabled
  stat:
    path: "{{ item }}"
  loop:
    - /etc/netdata/go.d/fail2ban.conf
    - /etc/netdata/health.d/fail2ban.conf
  register: retired_services_fail2ban_files
  failed_when: retired_services_fail2ban_files.stat.exists

- name: _verify | Retired nginx vhost is gone (sites-available + sites-enabled)
  stat:
    path: "{{ item }}"
  loop:
    - /etc/nginx/sites-available/openproject
    - /etc/nginx/sites-enabled/openproject
    - /etc/nginx/sites-available/hyperdx
    - /etc/nginx/sites-enabled/hyperdx
  register: retired_services_vhost
  failed_when: retired_services_vhost.stat.exists

- name: _verify | Retired nginx conf.d drops are gone
  stat:
    path: "{{ item }}"
  loop:
    - /etc/nginx/conf.d/hyperdx_otlp.conf
  register: retired_services_conf_d
  failed_when: retired_services_conf_d.stat.exists

# podman checks only on fixtures that have podman (box_deps); on the default
# box fixture _setup skipped the podman planting, so there's nothing to assert.
- name: _verify | Probe for podman
  stat:
    path: /usr/bin/podman
  register: retired_services_verify_podman

- name: _verify | Capture remaining podman secrets and networks
  when: retired_services_verify_podman.stat.exists
  command: "podman {{ item }} ls --format {{ '{{.Name}}' }}"
  loop:
    - secret
    - network
  register: retired_services_podman_ls
  changed_when: false
  become: true

- name: _verify | Retired podman secrets and network are gone
  when: retired_services_verify_podman.stat.exists
  assert:
    that:
      - "'redis_password' not in retired_services_podman_ls.results[0].stdout_lines"
      - "'openproject_secret_key' not in retired_services_podman_ls.results[0].stdout_lines"
      - "'redis' not in retired_services_podman_ls.results[1].stdout_lines"
      - "'mosquitto' not in retired_services_podman_ls.results[1].stdout_lines"
    fail_msg: >-
      teardown left a podman secret/network behind.
      secrets={{ retired_services_podman_ls.results[0].stdout_lines }}
      networks={{ retired_services_podman_ls.results[1].stdout_lines }}

- name: _verify | NodeSource apt source, keyring, and pin are absent
  stat:
    path: "{{ item }}"
  loop:
    - /usr/share/keyrings/nodesource.gpg
    - /etc/apt/sources.list.d/nodesource.list
    - /etc/apt/preferences.d/nodesource
  register: retired_services_nodesource_files
  failed_when: retired_services_nodesource_files.stat.exists

- name: _verify | Static curl binary and cached tarball are absent
  stat:
    path: "{{ item }}"
  loop:
    - /usr/local/bin/curl_static
    - /var/cache/curl_static-8.20.0.{{ ansible_architecture }}.tar.xz
  register: retired_services_static_curl_files
  failed_when: retired_services_static_curl_files.stat.exists

# gitea_runner rootless teardown: the binary, the linger marker (manager turned
# off), and the user-scope podman_prune units (files under /etc/systemd/user) are
# all gone. _setup planted every one, so this exercises the destructive path, not
# fresh-host absence.
- name: _verify | Retired gitea_runner binary, linger marker, and user-scope units are absent
  stat:
    path: "{{ item }}"
  loop:
    - /usr/local/bin/gitea-runner
    - /var/lib/systemd/linger/gitea_runner
    - /etc/systemd/user/podman_prune.timer
    - /etc/systemd/user/podman_prune.service
  register: retired_services_gitea_runner_files
  failed_when: retired_services_gitea_runner_files.stat.exists

# The system user is deliberately left in place (uid/subid-range reuse risk),
# matching the role's policy and lab.yml's retained subid slot.
- name: _verify | Retained gitea_runner system user is still present
  getent:
    database: passwd
    key: gitea_runner
  register: retired_services_gitea_runner_user
  failed_when: retired_services_gitea_runner_user is failed
