# Upstream rejects non-hex keys outright (installation.md: "must be pure
# hexadecimal"). Asserting up front turns a confusing "metrics return
# 401" into a clear "your vault value is malformed" before anything
# touches disk. 32-byte (64-hex-char) minimum matches `openssl rand -hex
# 32`, the upstream-recommended generator.
- name: Require well-formed journald_exporter_key
  assert:
    that:
      - journald_exporter_key is string
      - journald_exporter_key | trim is match('^[0-9a-fA-F]{64,}$')
    fail_msg: "journald_exporter_key must be a hex string of at least 64 chars (vaulted in group_vars/<env>.yml)"
  tags:
    - journald_exporter

# Idempotence shortcut: ask the installed binary its version before
# falling through to get_url's sha256 verify. get_url is already
# idempotent when the checksum matches, but the probe also catches
# the "binary on disk but won't exec" failure mode that get_url's
# sha-only check wouldn't notice (e.g. an interrupted prior download).
# --version exits 1 and prints to stderr (src/cli/main.rs:eprintln),
# hence the failed_when:false / stderr lookup.
- name: Check installed journald-exporter version
  command: /usr/local/bin/journald-exporter --version
  register: _jexp_existing
  changed_when: false
  failed_when: false
  check_mode: false
  become: true
  tags:
    - journald_exporter

# Literal .x86_64 access (not [ansible_architecture]) because ansible-core
# finalizes task args even when `when:` skips the task -- an aarch64 host
# would trip "no attribute 'aarch64'" at check-mode rendering before the
# gate can short-circuit. Same pattern as roles/fan2go.
- name: Download journald-exporter
  when: >-
    ansible_architecture == 'x86_64'
    and journald_exporter_version not in (_jexp_existing.stderr | default(''))
  get_url:
    url: "{{ journald_exporter_artifacts.x86_64.url }}"
    checksum: "sha256:{{ journald_exporter_artifacts.x86_64.sha256 }}"
    dest: /usr/local/bin/journald-exporter
    mode: "0755"
    owner: root
    group: root
  become: true
  tags:
    - journald_exporter

# The binary insists on a host user literally named `journald-exporter`
# (hardcoded in upstream's src/parent/start.rs) and internally setuids
# the HTTP-serving child to it; the daemon itself stays root because it
# needs to read /var/log/journal/. config_dir: false because upstream
# mandates /etc/journald-exporter (not /mnt/services/...), created below.
- name: Add journald-exporter user
  import_role:
    name: service_user
    tasks_from: user
  vars:
    service_user_args:
      name: journald-exporter
      config_dir: false
  tags:
    - journald_exporter

- name: Create /etc/journald-exporter
  file:
    dest: /etc/journald-exporter
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true
  tags:
    - journald_exporter

- name: Create keys directory
  file:
    dest: /etc/journald-exporter/keys
    state: directory
    owner: root
    group: root
    mode: "0700"
  become: true
  tags:
    - journald_exporter

- name: Create key
  copy:
    content: "{{ (journald_exporter_key | trim) + '\n' }}"
    dest: /etc/journald-exporter/keys/netdata
    owner: root
    group: root
    mode: "0600"
  become: true
  tags:
    - journald_exporter

# Gated on x86_64 because the install step runs `systemd-analyze verify`
# against the on-disk unit, which dereferences ExecStart= and fails when
# the upstream's x86_64-only binary isn't present (aarch64 hosts, mostly
# Mac-host HVF test fixtures). The nginx site and key file above stay
# arch-agnostic since they don't depend on the binary.
- name: Install journald-exporter service
  when: ansible_architecture == 'x86_64'
  import_role:
    name: systemd_unit
    tasks_from: install
  vars:
    systemd_unit_args:
      src: journald-exporter.service.j2
  tags:
    - journald_exporter

# Restart trigger does NOT include the key file: upstream's
# --key-dir is inotify-watched (installation.md "The key directory
# is watched, so new API keys can be added and removed without
# having to restart the server"), so a rotation propagates in <1s
# without dropping the netdata scrape. Only unit-template diffs
# need a real restart.
- name: Enable journald_exporter service
  when: ansible_architecture == 'x86_64'
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: journald-exporter
      condition: "{{ not (ansible_check_mode and journald_exporter_service_result.changed) }}"
      restart: "{{ journald_exporter_service_result.changed }}"
  tags:
    - journald_exporter

- name: Configure nginx
  import_role:
    name: nginx
    tasks_from: site
  vars:
    nginx_site_args:
      subdomain: journald-exporter
      # auth: required gates browser access through Authelia. The
      # netdata scrape doesn't traverse nginx -- it hits the loopback
      # port directly with basic auth -- so the gate has no effect on
      # the machine path.
      auth: required
      proxy_pass: http://localhost:{{ service_ports.journald_exporter }}/
      server_conf: |
        location = / {
          return 301 /metrics;
        }
      location_conf: |
        # Bypass http auth: netdata scrapes 127.0.0.1:<port> directly
        # with creds, but this subdomain exists so an operator can
        # browse /metrics; the injection presents the upstream's
        # expected basic-auth so the browser visit needs no creds.
        # Username MUST be literally "metrics" (upstream-hardcoded); the
        # keyfile basename (/etc/journald-exporter/keys/netdata) is a
        # free-form label and not part of the protocol.
        proxy_set_header Authorization "Basic {{ ("metrics:" + journald_exporter_key) | b64encode }}";
        # override content type so metrics can be viewed in a browser
        proxy_hide_header Content-Type;
        add_header Content-Type "text/plain; charset=UTF-8";
      permissions: "0600"
  tags:
    - journald_exporter
