# Upstream rejects non-hex keys outright (installation.md: "must be pure
# hexadecimal"). Asserting up front turns a confusing "metrics return
# 401" into a clear "your vault value is malformed" before anything
# touches disk. 32-byte (64-hex-char) minimum matches `openssl rand -hex
# 32`, the upstream-recommended generator.
- name: Require well-formed journald_exporter_key
  assert:
    that:
      - journald_exporter_key is string
      - journald_exporter_key | trim is match('^[0-9a-fA-F]{64,}$')
    fail_msg: "journald_exporter_key must be a hex string of at least 64 chars (vaulted in group_vars/<env>.yml)"
  tags:
    - journald_exporter

- name: Download journald-exporter
  get_url:
    url: "{{ journald_exporter_artifacts[ansible_architecture].url }}"
    checksum: "sha256:{{ journald_exporter_artifacts[ansible_architecture].sha256 }}"
    dest: /usr/local/bin/journald-exporter
    mode: "0755"
    owner: root
    group: root
  become: true
  tags:
    - journald_exporter

# The binary insists on a host user literally named `journald-exporter`
# (hardcoded in upstream's src/parent/start.rs) and internally setuids
# the HTTP-serving child to it; the daemon itself stays root because it
# needs to read /var/log/journal/. config_dir: false because upstream
# mandates /etc/journald-exporter (not /mnt/services/...), created below.
- name: Add journald-exporter user
  import_role:
    name: service_user
    tasks_from: user
  vars:
    service_user_args:
      name: journald-exporter
      config_dir: false
  tags:
    - journald_exporter

- name: Create keys directory
  file:
    dest: /etc/journald-exporter/keys
    state: directory
    owner: root
    group: root
    mode: "0700"
  become: true
  tags:
    - journald_exporter

- name: Create key
  copy:
    content: "{{ journald_exporter_key }}"
    dest: /etc/journald-exporter/keys/netdata
    owner: root
    group: root
    mode: "0600"
  become: true
  register: journald_exporter_key_written
  tags:
    - journald_exporter

- name: Install journald-exporter service
  import_role:
    name: systemd_unit
    tasks_from: install
  vars:
    systemd_unit_args:
      src: journald-exporter.service.j2
  tags:
    - journald_exporter

- name: Enable journald_exporter service
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: journald-exporter
      condition: "{{ not (ansible_check_mode and journald_exporter_service_result.changed) }}"
      start: "{{ ansible_architecture == 'x86_64' }}"
      restart: "{{ journald_exporter_service_result.changed or journald_exporter_key_written.changed }}"
  tags:
    - journald_exporter

- name: Configure nginx
  import_role:
    name: nginx
    tasks_from: site
  vars:
    nginx_site_args:
      subdomain: journald-exporter
      proxy_pass: http://localhost:{{ service_ports.journald_exporter }}/
      server_conf: |
        location = / {
          return 301 /metrics;
        }
      location_conf: |
        # Bypass http auth: netdata scrapes 127.0.0.1:<port> directly
        # with creds, but this subdomain exists so an operator can
        # browse /metrics; the injection presents the upstream's
        # expected basic-auth so the browser visit needs no creds.
        # Username MUST be literally "metrics" (upstream-hardcoded); the
        # keyfile basename (/etc/journald-exporter/keys/netdata) is a
        # free-form label and not part of the protocol.
        proxy_set_header Authorization "Basic {{ ("metrics:" + journald_exporter_key) | b64encode }}";
        # override content type so metrics can be viewed in a browser
        proxy_hide_header Content-Type;
        add_header Content-Type "text/plain; charset=UTF-8";
      permissions: "0600"
  tags:
    - journald_exporter
