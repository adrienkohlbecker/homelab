- name: Download journald-exporter
  get_url:
    url: "{{ journald_exporter_artifacts[ansible_architecture].url }}"
    checksum: "sha256:{{ journald_exporter_artifacts[ansible_architecture].sha256 }}"
    dest: /usr/local/bin/journald-exporter
    mode: "0755"
    owner: root
    group: root
    backup: true
  become: true
  tags:
    - journald_exporter

- name: Add journald-exporter user
  user:
    name: journald-exporter
    createhome: false
    system: true
    shell: /usr/sbin/nologin
    home: /nonexistent
  become: true
  tags:
    - journald_exporter

- name: Create configuration directory
  file:
    dest: /etc/journald-exporter
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true
  tags:
    - journald_exporter

- name: Create keys directory
  file:
    dest: /etc/journald-exporter/keys
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true
  tags:
    - journald_exporter

- name: Create key
  copy:
    content: "{{ journald_exporter_key }}"
    dest: /etc/journald-exporter/keys/netdata
    owner: root
    group: root
    mode: "0600"
  become: true
  tags:
    - journald_exporter

- name: Install journald-exporter service
  import_role:
    name: systemd_unit
    tasks_from: install
  vars:
    systemd_unit_args:
      src: journald-exporter.service.j2
  tags:
    - journald_exporter

- name: Enable journald_exporter service
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: journald-exporter
      condition: "{{ not (ansible_check_mode and journald_exporter_service_result.changed) }}"
      start: "{{ ansible_architecture == 'x86_64' }}"
      restart: "{{ journald_exporter_service_result.changed }}"
  tags:
    - journald_exporter

- name: Configure nginx
  import_role:
    name: nginx
    tasks_from: site
  vars:
    nginx_site_args:
      subdomain: journald-exporter
      proxy_pass: http://localhost:{{ service_ports.journald_exporter }}/
      server_conf: |
        location = / {
          return 301 /metrics;
        }
      location_conf: |
        # bypass http auth
        proxy_set_header Authorization "Basic {{ ("metrics:" + journald_exporter_key) | b64encode }}";
        # override content type so metrics can be viewed in a browser
        proxy_hide_header Content-Type;
        add_header Content-Type "text/plain; charset=UTF-8";
      permissions: "0600"
  tags:
    - journald_exporter
