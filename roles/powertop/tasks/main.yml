- name: Install powertop
  when: powertop_enabled
  apt:
    pkg:
      - powertop
    policy_rc_d: 101
    cache_valid_time: 3600
  become: true
  register: powertop_apt
  tags:
    - powertop

- name: Install powertop service
  when: powertop_enabled
  import_role:
    name: systemd_unit
    tasks_from: install
  vars:
    systemd_unit_args:
      src: powertop.service
  tags:
    - powertop

- name: Enable powertop service
  when: powertop_enabled
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: powertop
      # In check mode on a fresh host the apt + install tasks only *report*
      # they would run: powertop isn't installed and the unit file isn't on
      # disk, so enable/start would fail. Skip them in that case. Same guard
      # as smart/hd_idle.
      condition: "{{ not (ansible_check_mode and (powertop_apt.changed or powertop_service_result.changed)) }}"
      # Re-tune when the unit file changes or the powertop package
      # upgrades (a new version may pick different tunables).
      restart: "{{ powertop_service_result.changed or powertop_apt.changed }}"
  tags:
    - powertop

# ---- disabled-host cleanup ----
# Only acts on a host that previously had powertop enabled and is now opted
# out: without this the stale unit keeps re-running --auto-tune every boot,
# defeating the opt-out on exactly the host where a tunable misbehaves. Stat
# first to avoid systemctl ENOENT noise where it was never installed. Mirrors
# the fan2go teardown.
- name: Stat powertop service unit (disabled)
  when: not powertop_enabled
  stat:
    path: /etc/systemd/system/powertop.service
  register: powertop_unit_stat
  tags:
    - powertop

- name: Stop and disable powertop service (disabled, previously installed)
  when:
    - not powertop_enabled
    - powertop_unit_stat.stat.exists
  systemd:
    name: powertop
    state: stopped
    enabled: false
  become: true
  tags:
    - powertop

- name: Remove powertop service unit (disabled)
  when: not powertop_enabled
  file:
    path: /etc/systemd/system/powertop.service
    state: absent
  become: true
  tags:
    - powertop
