- name: Install powertop
  apt:
    pkg:
      - powertop
    cache_valid_time: 3600
  become: true
  register: powertop_apt
  tags:
    - powertop

- name: Install powertop service
  import_role:
    name: systemd_unit
    tasks_from: install
  vars:
    systemd_unit_args:
      src: powertop.service
  tags:
    - powertop

- name: Enable powertop service
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: powertop
      condition: "{{ not (ansible_check_mode and (powertop_apt.changed or powertop_service_result.changed)) }}"
      restart: "{{ powertop_service_result.changed }}"
  tags:
    - powertop
