# Functional check: the oneshot actually ran and stuck. powertop is a
# Type=oneshot + RemainAfterExit unit, so "systemctl start returned 0" is
# a tautology -- a tune that errored could still leave the unit looking
# handled. Assert it's active (RemainAfterExit held) AND that ExecStart
# exited cleanly (Result=success, ExecMainStatus=0). powertop --auto-tune
# returns 0 unless it was denied root, so this proves the process started
# and didn't crash -- not that every tunable applied (a sysfs write the
# kernel rejects doesn't fail the process).
#
# We don't assert a specific sysfs knob landed -- --auto-tune's choices
# depend on the (virtual) hardware the qemu fixture presents, so any fixed
# tunable would be brittle. Result=success is the portable contract.

# Reboot first so the assertions below test post-reboot reality: the unit is
# WantedBy=multi-user.target, so a clean boot must re-run --auto-tune and (via
# RemainAfterExit) leave it active. Without the reboot we'd only prove the
# converge-time start worked, not that the boot wiring fires. Skipped on
# aarch64: EDK2 on the arm test image has a known reboot bug (refind crashes
# loading an X64 image after a kernel-triggered reset), same carve-out as
# roles/console; the converge-time start already exercised the unit there.
- name: _verify | Reboot so assertions test post-reboot reality
  when: ansible_architecture != 'aarch64'
  reboot:
    reboot_timeout: 120
  become: true

- name: _verify | Confirm powertop unit is active  # noqa: command-instead-of-module
  command: systemctl is-active powertop
  changed_when: false
  become: true

- name: _verify | Read powertop unit result properties  # noqa: command-instead-of-module
  command: systemctl show powertop --property=Result,ExecMainStatus
  register: powertop_show
  changed_when: false
  become: true

- name: _verify | Assert --auto-tune ran to completion
  assert:
    that:
      - "'Result=success' in powertop_show.stdout"
      - "'ExecMainStatus=0' in powertop_show.stdout"
    fail_msg: >-
      powertop.service did not complete cleanly; --auto-tune may have
      errored. systemctl show output: {{ powertop_show.stdout }}

# Opt-out path: re-run the role with powertop_enabled=false and confirm it
# tears the unit down. Exercising the real teardown (not a flag-gated state
# check that never runs on the default-true fixture) is what keeps the opt-out
# honest. Destructive, which is fine -- the test VM is discarded after _verify.
- name: _verify | Exercise the powertop_enabled=false teardown
  import_role:
    name: powertop
  vars:
    powertop_enabled: false

- name: _verify | Assert the unit was removed by the opt-out
  stat:
    path: /etc/systemd/system/powertop.service
  register: powertop_unit_after
  failed_when: powertop_unit_after.stat.exists
  become: true

- name: _verify | Confirm powertop is no longer active after opt-out  # noqa: command-instead-of-module
  command: systemctl is-active powertop
  register: powertop_after_active
  changed_when: false
  failed_when: (powertop_after_active.stdout | trim) == 'active'
  become: true
