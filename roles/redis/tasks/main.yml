# Per-service podman network with DNS enabled, so consumers (paperless)
# can reach redis by container name on the same named bridge. Avoids
# the resolute-broken "publish on bridge gateway" pattern: netavark
# tears down the default bridge between containers, so binding
# --publish 10.88.0.1:6379 fails when no other container is up.
- name: Create redis podman network
  when: not ansible_check_mode
  containers.podman.podman_network:
    name: redis
    # Explicit so paperless resolves `redis` via aardvark-dns. With
    # netavark as the network backend (see roles/podman) the flag
    # actually wires up DNS; on CNI it's a no-op without the dnsname
    # plugin and we'd have to install that separately.
    disable_dns: false
    state: present
  become: true
  tags:
    - redis

- name: Add redis group
  group:
    name: redis
    system: true
  become: true
  tags:
    - redis

- name: Add redis user
  user:
    name: redis
    group: redis
    createhome: false
    system: true
    shell: /usr/sbin/nologin
    home: /nonexistent
  become: true
  register: redis_user
  tags:
    - redis

- name: Enable memory overcommit
  ansible.posix.sysctl:
    name: vm.overcommit_memory
    value: '1'
  become: true
  tags:
    - redis

- name: Create configuration directory
  when: not (ansible_check_mode and redis_user.changed)
  file:
    dest: /mnt/services/redis
    state: directory
    owner: redis
    group: redis
    mode: "0700"
  become: true
  tags:
    - redis

- name: Install redis service
  import_role:
    name: systemd_unit
    tasks_from: install
  vars:
    systemd_unit_src: redis.service.j2
    systemd_unit_condition: "{{ not (ansible_check_mode and redis_user.changed) }}"
  tags:
    - redis

- name: Enable redis service
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_src: redis
    systemd_unit_condition: "{{ not (ansible_check_mode and (systemd_unit.changed or redis_user.changed)) }}"
    systemd_unit_restart: "{{ systemd_unit.changed }}"
  tags:
    - redis
