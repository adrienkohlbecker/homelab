- name: Assert redis password is provided
  assert:
    that:
      - redis_password is defined
      - redis_password | length > 0
    fail_msg: >-
      redis_password must be set in host_vars/group_vars (it is a required
      input; role vars sit above host_vars and must not default it).
  tags:
    - redis

# Per-service podman network with DNS enabled, so consumers (paperless)
# can reach redis at `redis.dns.podman` on the same named bridge. Avoids
# the resolute-broken "publish on bridge gateway" pattern: netavark
# tears down the default bridge between containers, so binding
# --publish 10.88.0.1:6379 fails when no other container is up.
- name: Create redis podman network
  when: not ansible_check_mode
  containers.podman.podman_network:
    name: redis
    # Explicit so paperless resolves `redis.dns.podman` via aardvark-dns. With
    # netavark as the network backend (see roles/podman) the flag
    # actually wires up DNS; on CNI it's a no-op without the dnsname
    # plugin and we'd have to install that separately.
    disable_dns: false
    state: present
  become: true
  tags:
    - redis

- name: Create redis service user
  import_role:
    name: service_user
    tasks_from: user
  vars:
    service_user_args:
      name: redis
      # Tighten the config dir: it holds dump.rdb. Helper default is 0755.
      config_dir_mode: "0700"
  tags:
    - redis

- name: Create redis password secret
  import_role:
    name: podman_secret
    tasks_from: secret
  vars:
    podman_secret_args:
      name: redis_password
      data: "{{ redis_password }}"
  tags:
    - redis

# Redis forks for RDB/BGSAVE (copy-on-write); with overcommit_memory=0 the
# kernel can refuse that fork under pressure (Redis warns at startup). This
# is a host-global sysctl, but it's the recommended setting on any Redis host.
- name: Enable memory overcommit
  ansible.posix.sysctl:
    name: vm.overcommit_memory
    value: '1'
  become: true
  tags:
    - redis

- name: Install redis service
  import_role:
    name: systemd_unit
    tasks_from: install
  vars:
    systemd_unit_args:
      src: redis.service.j2
      condition: "{{ not (ansible_check_mode and redis_user.changed) }}"
  tags:
    - redis

- name: Enable redis service
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: redis
      condition: "{{ not (ansible_check_mode and (redis_service_result.changed or redis_user.changed)) }}"
      restart: "{{ redis_service_result.changed or redis_password_rotated }}"
  tags:
    - redis
