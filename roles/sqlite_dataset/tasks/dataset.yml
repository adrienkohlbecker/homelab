# Pre-create /mnt/services/sqlite/<name>/ and symlink each links[i] to its
# /mnt/services/sqlite/<name>/<basename(dest)> sibling. The "no force:" on
# state=link is load-bearing: state=link refuses to convert a regular file
# into a symlink, which is the safety we want on snapshot-restore /
# downgrade where a real DB might already sit at the dest. Resolve by
# moving the offending file under /mnt/services/sqlite/<name>/ and re-run.
#
# Caller passes one dict `sqlite_dataset_args`:
#   name        directory under /mnt/services/sqlite/
#   owner       owner of the dir and the symlinks (lchown for the latter)
#   group       group of the dir and the symlinks
#   mode        sqlite dir mode (e.g. "0750"); default "0750"
#   condition   optional bool; gates the dir/pre_create/symlink tasks
#               (default true). The arg validation runs regardless.
#   links       optional list of dest paths; src derived as
#               /mnt/services/sqlite/<name>/<basename(dest)>. Parent dir
#               of each dest is the caller's responsibility.
#   pre_create  optional bool (default false); when true, create an empty
#               src file for each link before symlinking. Needed by
#               consumers whose app creates its SQLite DB on first boot
#               (jellyfin): without an existing src, state=link refuses to
#               plant the dangling symlink and the converge dies before the
#               app ever starts. force=false on the create keeps the
#               snapshot-restore safety -- a real DB already at the src is
#               never clobbered -- and the dest-clobber safety (state=link
#               without force) is unaffected.
#   force       optional bool (default false); when true, plants the symlink
#               over a dangling (not-yet-created) target -- for apps that
#               create the DB themselves on first boot (kuma, sabnzbd,
#               tautulli). It only relaxes the dangling-target refusal: a
#               pre-stat guard below still refuses to replace a *real* file
#               already at a dest, keeping the snapshot-restore safety the
#               no-force default gives. Mutually exclusive with pre_create.
#
# The dict form prevents inter-call leakage: each import_role pass
# replaces the whole sqlite_dataset_args value at play-vars scope.

- name: Validate sqlite_dataset_args
  assert:
    quiet: true
    that:
      - sqlite_dataset_args.name is defined
      # is string before is match: a non-string name raises an opaque
      # templating error instead of this role's fail_msg (same guard as
      # roles/service_user, roles/podman_secret).
      - sqlite_dataset_args.name is string
      - sqlite_dataset_args.name is match('^[a-z_][a-z0-9_-]*$')
      - sqlite_dataset_args.owner is defined
      - sqlite_dataset_args.group is defined
      # pre_create acts only inside the links loop, so it silently no-ops
      # without links -- reject the incoherent combination loudly.
      - >-
        not (sqlite_dataset_args.pre_create | default(false) | bool)
        or sqlite_dataset_args.links is defined
      # force re-introduces the dest-clobber on a target pre_create would
      # have created, so the two contradict -- a caller wants one or the other.
      - >-
        not (sqlite_dataset_args.force | default(false) | bool)
        or not (sqlite_dataset_args.pre_create | default(false) | bool)
      - >-
        sqlite_dataset_args.links is not defined
        or (sqlite_dataset_args.links | map('basename') | select('eq', '') | list | length == 0)
      # case_sensitive: basenames become files on a case-sensitive fs, so
      # Foo.db and foo.db are distinct; the default case-insensitive unique
      # would wrongly reject them as a collision.
      - >-
        sqlite_dataset_args.links is not defined
        or (sqlite_dataset_args.links | map('basename') | list | unique(case_sensitive=true) | length
            == sqlite_dataset_args.links | length)
    fail_msg: >-
      sqlite_dataset_args requires name (a valid identifier matching
      [a-z_][a-z0-9_-]*), owner, group; links basenames must be non-empty
      and unique; pre_create requires links and excludes force.

- name: Pre-create /mnt/services/sqlite/{{ sqlite_dataset_args.name }}
  when: sqlite_dataset_args.condition | default(true)
  file:
    path: "/mnt/services/sqlite/{{ sqlite_dataset_args.name }}"
    state: directory
    owner: "{{ sqlite_dataset_args.owner }}"
    group: "{{ sqlite_dataset_args.group }}"
    mode: "{{ sqlite_dataset_args.mode | default('0750') }}"
  become: true

# state=touch with preserve timestamps is idempotent: creates the file if
# absent, leaves an existing DB untouched (no truncation, no mtime bump).
- name: Pre-create SQLite DB src files for {{ sqlite_dataset_args.name }}
  when:
    - sqlite_dataset_args.condition | default(true)
    - sqlite_dataset_args.pre_create | default(false)
    - sqlite_dataset_args.links is defined
  file:
    path: "/mnt/services/sqlite/{{ sqlite_dataset_args.name }}/{{ sqlite_dataset_link | basename }}"
    state: touch
    owner: "{{ sqlite_dataset_args.owner }}"
    group: "{{ sqlite_dataset_args.group }}"
    mode: "{{ sqlite_dataset_args.file_mode | default('0640') }}"
    modification_time: preserve
    access_time: preserve
  become: true
  loop: "{{ sqlite_dataset_args.links }}"
  loop_control:
    label: "{{ sqlite_dataset_link }}"
    loop_var: sqlite_dataset_link

# force relaxes only the dangling-target refusal, not the real-file one:
# stat each dest first and fail loud if a regular file (not a symlink) is
# there, so a snapshot-restored real DB is never silently replaced. Gated on
# force -- the no-force path gets this refusal from the file module itself.
- name: Stat force dests for {{ sqlite_dataset_args.name }}
  when:
    - sqlite_dataset_args.condition | default(true)
    - sqlite_dataset_args.force | default(false)
    - sqlite_dataset_args.links is defined
  stat:
    path: "{{ sqlite_dataset_link }}"
    follow: false
  become: true
  register: sqlite_dataset_force_stat
  loop: "{{ sqlite_dataset_args.links }}"
  loop_control:
    label: "{{ sqlite_dataset_link }}"
    loop_var: sqlite_dataset_link

# selectattr keeps only real stat results. When the stat above was skipped
# (force false, condition false, or no links) its register still carries
# per-item skip entries that lack .stat; filter them out so the loop empties
# and nothing is asserted. A plain `when:` gate wouldn't help -- ansible
# templates the loop and the `that:`/label args (which dereference .stat)
# before it evaluates when, so a skip entry in the loop errors regardless.
- name: Refuse to clobber a real file at a force dest for {{ sqlite_dataset_args.name }}
  assert:
    quiet: true
    that:
      - not (sqlite_dataset_force_item.stat.exists and not sqlite_dataset_force_item.stat.islnk)
    fail_msg: >-
      {{ sqlite_dataset_force_item.sqlite_dataset_link }} exists as a regular
      file; force would replace it with a symlink and lose the DB. Move it
      under /mnt/services/sqlite/{{ sqlite_dataset_args.name }}/ first.
  # stat results key the looped item under the stat task's loop_var
  # (sqlite_dataset_link), not .item; selectattr drops skipped entries (no .stat).
  loop: "{{ sqlite_dataset_force_stat.results | default([]) | selectattr('stat', 'defined') | list }}"
  loop_control:
    label: "{{ sqlite_dataset_force_item.sqlite_dataset_link }}"
    loop_var: sqlite_dataset_force_item

- name: Symlink DBs onto sqlite dataset for {{ sqlite_dataset_args.name }}
  when:
    - sqlite_dataset_args.condition | default(true)
    - sqlite_dataset_args.links is defined
  file:
    src: "/mnt/services/sqlite/{{ sqlite_dataset_args.name }}/{{ sqlite_dataset_link | basename }}"
    dest: "{{ sqlite_dataset_link }}"
    state: link
    owner: "{{ sqlite_dataset_args.owner }}"
    group: "{{ sqlite_dataset_args.group }}"
    follow: false
    force: "{{ sqlite_dataset_args.force | default(false) }}"
  become: true
  loop: "{{ sqlite_dataset_args.links }}"
  loop_control:
    label: "{{ sqlite_dataset_link }}"
    loop_var: sqlite_dataset_link
