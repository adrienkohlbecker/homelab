# Helper writes /etc/systemd/resolved.conf.d/10-custom.conf via the
# absolute-mode dropin path (sibling of resolved.conf, not under
# systemd-resolved.service.d/). Helper does: dir creation, backup,
# write (copy — src has no .j2 suffix), systemd-analyze verify against
# systemd-resolved.service, daemon-reload. Restart gate downstream
# reads the per-unit result fact resolved_conf_d_10_custom_conf_result.
- name: Render resolved.conf.d/10-custom.conf
  import_role:
    name: systemd_unit
    tasks_from: dropin
  vars:
    systemd_unit_args:
      for: systemd-resolved.service
      dest_abs: /etc/systemd/resolved.conf.d/10-custom.conf
      src: 10-custom.conf
  tags:
    - resolved

# systemd-resolved writes the DHCP-supplied upstream servers into
# resolv.conf, not stub-resolv.conf (which is only 127.0.0.53 -- dead now
# that the stub listener is off). Pointing /etc/resolv.conf here hands the
# host those servers directly. No owner/group/mode: with follow: true
# (the file-module default) they'd chase the link to its transient
# /run target and re-chown it every run -- a symlink has no meaningful
# perms of its own.
- name: Update resolv conf symlink
  file:
    src: /run/systemd/resolve/resolv.conf
    dest: /etc/resolv.conf
    state: link
  become: true
  register: resolved_resolv_conf
  tags:
    - resolved

- name: Restart systemd-resolved
  when: (resolved_conf_d_10_custom_conf_result.changed or resolved_resolv_conf.changed)
  systemd:
    name: systemd-resolved
    state: restarted
  become: true
  tags:
    - resolved

# state=started is idempotent (no-op when active) and fails loudly if the
# unit can't start. Doubles as the post-conf liveness assertion: resolved
# manages /run/systemd/resolve/resolv.conf, so if it's down the host's
# entire DNS path goes stale. Mirrors roles/journald's closing task.
- name: Start systemd-resolved
  systemd:
    name: systemd-resolved
    state: started
  become: true
  tags:
    - resolved
