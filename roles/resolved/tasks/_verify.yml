# Post-converge functional checks for the resolved role. Invoked only by
# the test harness (test/testrole.py / testall.py) against a qemu VM,
# never by site.yml or --tags. Converge success only proves the unit
# started, and the helper's `systemd-analyze verify` validates the parent
# systemd-resolved.service, not the drop-in's keys (resolved silently
# ignores unknown/typo'd directives) -- these assert the drop-in's effects
# actually took hold at runtime. External-name resolution is deliberately
# NOT asserted: the qemu fixture egresses via SLIRP where UDP DNS is lossy
# under load, so a query timeout would be a flake, not a regression.

- name: _verify | The systemd-resolved unit is active  # noqa: command-instead-of-module -- is-active query, not a state change
  command: systemctl is-active systemd-resolved
  changed_when: false
  become: true

- name: _verify | Stat /etc/resolv.conf
  stat:
    path: /etc/resolv.conf
  register: resolved_verify_symlink
  become: true

- name: _verify | The resolv.conf symlink targets the upstream-servers file, not the dead stub
  assert:
    that:
      - resolved_verify_symlink.stat.islnk | default(false)
      - resolved_verify_symlink.stat.lnk_target == '/run/systemd/resolve/resolv.conf'
    fail_msg: >-
      /etc/resolv.conf is not a symlink to /run/systemd/resolve/resolv.conf
      (got {{ resolved_verify_symlink.stat.lnk_target | default('a regular file') }});
      with DNSStubListener=no, stub-resolv.conf (127.0.0.53) would be a black hole.

# The role's actual contract: the symlink must hand the host a real LAN
# resolver, not the dead 127.0.0.53 stub. A symlink pointing at a resolv.conf
# that still listed only 127.0.0.53 would pass the target check above yet
# black-hole DNS. Read the file on-host (no SLIRP-UDP query) and assert a
# present, non-stub nameserver.
- name: _verify | Read the resolved-managed resolv.conf
  slurp:
    src: /run/systemd/resolve/resolv.conf
  register: resolved_verify_resolv_conf
  become: true

- name: _verify | Isolate the nameserver lines
  set_fact:
    resolved_verify_nameservers: >-
      {{ (resolved_verify_resolv_conf.content | b64decode).splitlines()
         | select('match', '^nameserver ') | list }}

- name: _verify | The resolv.conf nameserver is a non-stub LAN upstream
  assert:
    that:
      - resolved_verify_nameservers | length > 0
      - >-
        resolved_verify_nameservers
        | select('search', '127\.0\.0\.53') | list | length == 0
    fail_msg: >-
      /run/systemd/resolve/resolv.conf has no usable upstream nameserver
      (or still lists the dead 127.0.0.53 stub): {{ resolved_verify_nameservers }}

# Wire-level proof DNSStubListener=no took effect: with the stub up,
# systemd-resolved binds 127.0.0.53:53 (TCP+UDP). ss listing it means the
# directive was ignored and the stub is still holding the loopback :53.
- name: _verify | List listening TCP/UDP sockets
  command: ss -Hlntu
  register: resolved_verify_listeners
  changed_when: false
  become: true

- name: _verify | The 127.0.0.53 stub listener is gone
  assert:
    that:
      - resolved_verify_listeners.stdout is not search('127\.0\.0\.53')
    fail_msg: >-
      systemd-resolved is still listening on 127.0.0.53
      (DNSStubListener=no did not take effect): {{ resolved_verify_listeners.stdout }}

# resolved cedes UDP 5353 (mDNS) and TCP+UDP 5355 (LLMNR) when
# MulticastDNS=no / LLMNR=no take effect; the same ss capture proves the
# sockets are gone -- wire-level corroboration of the resolvectl check
# below. avahi (which owns 5353 in prod) is not part of the resolved test
# fixture, so on this VM 5353 is simply free; a listener here means
# resolved ignored the drop-in.
- name: _verify | The mDNS (5353) and LLMNR (5355) sockets are gone
  assert:
    that:
      - "':5353' not in resolved_verify_listeners.stdout"
      - "':5355' not in resolved_verify_listeners.stdout"
    fail_msg: >-
      systemd-resolved is still bound to :5353 or :5355 (MulticastDNS=no /
      LLMNR=no did not take effect): {{ resolved_verify_listeners.stdout }}

# resolvectl status prints a Global block first (driven by resolved.conf.d/)
# then one block per link (driven by networkd). The drop-in controls the
# Global default, so scope the assertion to the FIRST "Protocols:" line --
# matching -mDNS/-LLMNR anywhere in the output would green even if the
# Global line showed +mDNS while some per-link line happened to read -mDNS,
# masking a drop-in resolved silently ignored.
- name: _verify | Read resolvectl global status
  command: resolvectl status
  register: resolved_verify_status
  changed_when: false
  become: true

- name: _verify | Isolate the Global Protocols line
  set_fact:
    resolved_verify_global_protocols: >-
      {{ resolved_verify_status.stdout_lines
         | select('search', 'Protocols:') | list | first | default('') }}

- name: _verify | Global mDNS and LLMNR are disabled
  assert:
    that:
      - "'-mDNS' in resolved_verify_global_protocols"
      - "'-LLMNR' in resolved_verify_global_protocols"
    fail_msg: >-
      resolvectl Global Protocols line does not report -mDNS/-LLMNR
      (MulticastDNS=no / LLMNR=no not live): {{ resolved_verify_global_protocols }}

# Prove the resolver path is live end-to-end, not merely that the unit is
# active: localhost resolves from resolved's built-in RFC 6761 synthesis,
# entirely on-host, so there's no SLIRP-UDP flake (external names stay
# deliberately unasserted per the header).
- name: _verify | Resolve localhost through resolved
  command: resolvectl query --cache=no localhost
  register: resolved_verify_query
  changed_when: false
  become: true

- name: _verify | The localhost query returns the loopback address
  assert:
    that:
      - "'127.0.0.1' in resolved_verify_query.stdout"
    fail_msg: >-
      resolvectl query localhost did not return 127.0.0.1 -- the resolver
      path is not answering: {{ resolved_verify_query.stdout }}
