[Resolve]
# Disable the 127.0.0.53 stub listener: the host resolves through
# /etc/resolv.conf -> /run/systemd/resolve/resolv.conf, whose nameserver
# is DHCP-supplied (pihole on the home LAN), not the local stub. See the
# paired symlink task in tasks/main.yml.
DNSStubListener=no
# Clear systemd-resolved's compiled-in fallback resolvers (Quad9 /
# Cloudflare / Google): everything on this host must resolve through the
# DHCP-supplied pihole, never leak off-LAN to a public resolver if link
# DNS is momentarily unknown. An empty value disables the built-in list.
FallbackDNS=
# pihole is the cache of record -- its query log is where blocks and
# allows are observed and tuned. Don't stack a second, invisible TTL cache
# in systemd-resolved in front of it: a domain unblocked on pihole would
# otherwise stay dead on this host until resolved's own entry expired.
Cache=no
# Refuse to serve mDNS via systemd-resolved; avahi-daemon owns
# UDP 5353. Without this, Ubuntu noble ships `MulticastDNS=resolve`
# by default and races avahi for the multicast socket on cold boot
# -- whichever wins gets the LAN. The avahi role's
# `disallow-other-stacks=yes` only catches the loss-of-race at
# avahi startup (loud, but the network's already half-broken until
# the next play). Pinning here removes the race deterministically.
MulticastDNS=no
# Disable the LLMNR (RFC 4795) responder and resolver on UDP/TCP 5355:
# unused on these Linux hosts (avahi owns local discovery) and a LAN
# name-spoofing surface. Parallel intent to MulticastDNS=no above.
LLMNR=no
