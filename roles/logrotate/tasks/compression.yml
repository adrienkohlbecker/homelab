# Inputs: caller passes a single dict `logrotate_args` with keys
#   item        required; path to the logrotate config file to edit
#   condition   optional bool, default true; gates the whole call
#
# The dict form prevents inter-call leakage at play-vars scope: each
# import_role pass replaces the whole `logrotate_args` value, so a
# previous caller's condition can't bleed into the next caller that
# doesn't explicitly override.
- name: compression | Assert inputs
  assert:
    that:
      - logrotate_args.item is defined
    fail_msg: logrotate_args.item is required (path to the config file to edit)

- name: compression | Configure logrotate compression {{ logrotate_args.item }}
  when: logrotate_args.condition | default(true)
  replace:
    # Match the bare `compress` directive only. The trailing group uses
    # [ \t] (not \s, which also matches \n and would swallow the next line)
    # so compresscmd/compressoptions/compressext aren't clobbered.
    regexp: ^(\s*)(# )?compress([ \t].*)?$
    replace: "{{ zfs_root | ternary(disable, enable) }}"
    path: "{{ logrotate_args.item }}"
    backup: true
  register: logrotate_conf
  become: true
  vars:
    disable: '\1# compress # zfs already compresses disk contents'
    enable: '\1compress'

- name: compression | Check apt source for {{ logrotate_args.item }}
  when: logrotate_conf.changed
  # argv form so a config path with spaces/quotes can't word-split into extra
  # dpkg args; LC_ALL=C pins the "no path found matching pattern" message the
  # failed_when / divert guards below grep for.
  command:
    argv:
      - dpkg
      - -S
      - "{{ logrotate_args.item }}"
  environment:
    LC_ALL: C
  check_mode: false
  changed_when: false
  failed_when:
    - logrotate_conf_dpkg.rc != 0
    - '"no path found matching pattern" not in logrotate_conf_dpkg.stderr'
  register: logrotate_conf_dpkg
  become: true

- name: compression | Divert {{ logrotate_args.item }}
  when: 'logrotate_conf.changed and "no path found matching pattern" not in logrotate_conf_dpkg.stderr'
  community.general.dpkg_divert:
    path: "{{ logrotate_args.item }}"
    divert: "{{ logrotate_args.item }}.dpkg-dist" # so it is not included by logrotate.conf
  become: true
