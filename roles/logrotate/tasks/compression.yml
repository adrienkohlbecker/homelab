# Inputs: caller passes a single dict `logrotate_args` with keys
#   item        required; path to the logrotate config file to edit
#   condition   optional bool, default true; gates the whole call
#
# The dict form prevents inter-call leakage at play-vars scope: each
# import_role pass replaces the whole `logrotate_args` value, so a
# previous caller's condition can't bleed into the next caller that
# doesn't explicitly override.
- name: compression | Assert inputs
  assert:
    that:
      - logrotate_args.item is defined
    fail_msg: logrotate_args.item is required (path to the config file to edit)

- name: compression | Configure logrotate compression {{ logrotate_args.item }}
  when: logrotate_args.condition | default(true)
  replace:
    # Disable matches a bare `compress` only; enable matches just the exact line
    # disable writes (disabled_line), so a stray prose comment that merely
    # mentions compress (e.g. "# compress: off here") on a non-ZFS host isn't
    # turned into a live directive. [ \t] (not \s, which also matches \n) keeps
    # compresscmd/compressoptions/compressext from being clobbered. Both stay
    # idempotent: disable's output `# compress …` no longer matches disable_rx,
    # and enable's output `compress` no longer matches enable_rx.
    regexp: "{{ zfs_root | ternary(disable_rx, enable_rx) }}"
    replace: "{{ zfs_root | ternary(disable_to, enable_to) }}"
    path: "{{ logrotate_args.item }}"
    backup: true
    # No validate: here. The edit is a surgical one-directive toggle (it can't
    # break config syntax), and `logrotate -d` over an arbitrary existing package
    # config fails on unrelated pre-existing issues — e.g. /etc/logrotate.d/
    # alternatives errors rc:1 because /var/log is group-writable and it has no
    # `su` directive. template.yml validates the files *it* renders, which is safe.
  register: logrotate_conf
  become: true
  vars:
    disabled_line: '# compress # zfs already compresses disk contents'
    disable_rx: ^(\s*)compress([ \t].*)?$
    enable_rx: '^(\s*){{ disabled_line }}[ \t]*$'
    disable_to: '\1{{ disabled_line }}'
    enable_to: '\1compress'

# Any file the toggle actually changed had a live, uncommented `compress` we just
# neutralized — by construction that's a package-shipped config, because our own
# drop-ins (zfs_autobackup, the template helper) render the final compress state
# directly and so never trigger a change here. That lets us divert without probing
# dpkg for ownership (no `dpkg -S` + locale-pinned stderr grep). On ZFS we add the
# diversion so a future apt upgrade writes the package's new config to
# <item>.dpkg-dist (a logrotate taboo extension, so it is ignored) instead of
# clobbering our edit; off ZFS we remove it so the package owns the file again.
# A manually-removed diversion isn't re-added until the next upgrade flips the file
# back to `compress` (re-disable + re-divert), which is an acceptable self-heal.
- name: compression | (Un)divert {{ logrotate_args.item }}
  when: logrotate_conf.changed
  community.general.dpkg_divert:
    path: "{{ logrotate_args.item }}"
    divert: "{{ logrotate_args.item }}.dpkg-dist"
    state: "{{ zfs_root | ternary('present', 'absent') }}"
  become: true
