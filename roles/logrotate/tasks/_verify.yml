# Test-only — the harness runs this against a qemu VM, never prod. Exercises:
#   1. compression.yml toggles the bare `compress` directive per zfs_root and
#      leaves compresscmd alone (regression for the once-too-broad regex).
#   2. compression.yml diverts a changed file so an apt upgrade can't re-add
#      compress (the divert branch, now reachable without a dpkg-owned file).
#   3. template.yml renders + validates a drop-in, which parses clean and
#      renders compress per zfs_root.
#   4. both helpers honor condition:false — they gate the call without
#      writing/editing (and without reading their target).
- name: _verify | Create a fixture logrotate config
  copy:
    dest: /etc/logrotate.d/_verify_logrotate
    mode: "0644"
    content: |
      /var/log/_verify_logrotate/*.log {
        weekly
        missingok
        rotate 4
        compress
        compresscmd /bin/true
        notifempty
      }
  become: true

- name: _verify | Run the compression toggle over the fixture
  import_tasks: compression.yml
  vars:
    logrotate_args:
      item: /etc/logrotate.d/_verify_logrotate

- name: _verify | Assert the toggle diverted the changed fixture
  # On box (zfs_root: true) the toggle changes the fixture, so the divert branch
  # adds a diversion to <path>.dpkg-dist. --list prints the registered diversion.
  command:
    argv:
      - dpkg-divert
      - --list
      - /etc/logrotate.d/_verify_logrotate
  changed_when: false
  register: logrotate_verify_divert
  become: true

- name: _verify | Divert must be registered
  assert:
    that:
      - "'/etc/logrotate.d/_verify_logrotate.dpkg-dist' in logrotate_verify_divert.stdout"
    fail_msg: compression toggle did not register the dpkg diversion

- name: _verify | Read back the toggled fixture
  slurp:
    src: /etc/logrotate.d/_verify_logrotate
  register: logrotate_verify_fixture
  become: true

- name: _verify | Assert compress matches zfs_root and compresscmd survived
  vars:
    fixture: "{{ logrotate_verify_fixture.content | b64decode }}"
  assert:
    that:
      - >-
        (zfs_root and fixture is search('(?m)^\s*# compress # zfs'))
        or (not zfs_root and fixture is search('(?m)^\s*compress\s*$'))
      - fixture is search('(?m)^\s*compresscmd /bin/true\s*$')
    fail_msg: compress not toggled per zfs_root, or compresscmd was clobbered

- name: _verify | Parse the toggled fixture with logrotate -d
  command:
    argv:
      - /usr/sbin/logrotate
      - -d
      - /etc/logrotate.d/_verify_logrotate
  changed_when: false
  become: true

- name: _verify | Exercise the template helper (renders + validates)
  import_role:
    name: logrotate
    tasks_from: template
  vars:
    logrotate_args:
      src: _verify_fixture.j2
      dest: /etc/logrotate.d/_verify_logrotate_tmpl

- name: _verify | Read back the templated drop-in
  slurp:
    src: /etc/logrotate.d/_verify_logrotate_tmpl
  register: logrotate_verify_tmpl
  become: true

- name: _verify | Templated drop-in rendered compress per zfs_root
  vars:
    tmpl: "{{ logrotate_verify_tmpl.content | b64decode }}"
  assert:
    that:
      # The slurp proves it exists; the content proves the ternary rendered
      # the right form for this host.
      - >-
        (zfs_root and tmpl is search('(?m)^\s*# compress\s*$'))
        or (not zfs_root and tmpl is search('(?m)^\s*compress\s*$'))
    fail_msg: templated drop-in did not render compress per zfs_root

- name: _verify | Template helper with condition:false
  # import_tasks (not a second import_role: tasks_from: template) so it can't be
  # deduped against the real template test above into a trivially-passing assert.
  import_tasks: template.yml
  vars:
    logrotate_args:
      src: _verify_fixture.j2
      dest: /etc/logrotate.d/_verify_logrotate_cond
      condition: false

- name: _verify | Stat the condition:false template dest
  stat:
    path: /etc/logrotate.d/_verify_logrotate_cond
  register: logrotate_verify_cond
  become: true

- name: _verify | Assert condition:false skipped the template
  assert:
    that:
      - not logrotate_verify_cond.stat.exists
    fail_msg: condition:false still wrote the drop-in

- name: _verify | Compression helper with condition:false over a bogus path
  # condition:false must skip the replace before it reads `item`, so a path that
  # doesn't exist must not error — and logrotate_conf is left skipped.
  import_tasks: compression.yml
  vars:
    logrotate_args:
      item: /etc/logrotate.d/_verify_does_not_exist
      condition: false

- name: _verify | Assert condition:false skipped the compression replace
  assert:
    that:
      - logrotate_conf is skipped
    fail_msg: condition:false did not skip the compression replace

- name: _verify | Remove the test diversion
  # Drop the diversion the toggle registered, so a --keep box isn't left with a
  # dangling diversion pointing at a path we're about to delete.
  community.general.dpkg_divert:
    path: /etc/logrotate.d/_verify_logrotate
    divert: /etc/logrotate.d/_verify_logrotate.dpkg-dist
    state: absent
  become: true

- name: _verify | Clean up fixtures
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/logrotate.d/_verify_logrotate
    - /etc/logrotate.d/_verify_logrotate_tmpl
  become: true
