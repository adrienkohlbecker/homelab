# Inputs: caller passes a single dict `logrotate_args` with keys
#   src         required; template file under the calling role's templates/
#   dest        required; on-disk path under /etc/logrotate.d/
#
# The dict form prevents inter-call leakage at play-vars scope (see
# compression.yml for the longer rationale; same shape).
- name: template | Configure logrotate
  template:
    src: "{{ logrotate_args.src }}"
    dest: "{{ logrotate_args.dest }}"
    owner: root
    group: root
    mode: "0644"
    backup: true
  register: logrotate_conf
  become: true

- name: template | Restart logrotate
  when: logrotate_conf.changed
  systemd:
    name: logrotate
    state: restarted
  become: true
