- name: Assert inputs
  assert:
    that:
      # zfs_root decides the compression direction (off on ZFS, which already
      # compresses on disk; on elsewhere). Catch missing inventory defaults here
      # rather than failing mid-loop with a cryptic "zfs_root is undefined".
      - zfs_root is defined
    fail_msg: zfs_root must be set in host/group vars (true on ZFS-root hosts, false elsewhere)
  tags:
    - logrotate

- name: Install logrotate
  apt:
    pkg:
      - logrotate
    policy_rc_d: 101
    update_cache: true
    cache_valid_time: 3600
  register: logrotate_apt
  become: true
  tags:
    - logrotate

- name: Gather list of config files
  find:
    paths:
      - /etc/logrotate.d
    excludes:
      - "*.dpkg-dist" # diverted files
      - "*~" # ansible backups
  register: logrotate_confs
  become: true
  tags:
    - logrotate

- name: Configure logrotate compression
  include_tasks:
    file: compression.yml
    apply:
      tags: logrotate
  # /etc/logrotate.conf lives outside logrotate.d, so append it to the file
  # list explicitly — except in check mode on a host where logrotate was just
  # (would-be) installed: nothing's on disk yet, so reading it would fail.
  # ternary([], [...]) drops it only in that one case.
  loop: >-
    {{
      (logrotate_confs.files | map(attribute='path') | list)
      + ((ansible_check_mode and logrotate_apt.changed) | ternary([], ['/etc/logrotate.conf']))
    }}
  loop_control:
    loop_var: logrotate_compression_path
  vars:
    logrotate_args:
      item: "{{ logrotate_compression_path }}"
  tags:
    - logrotate

# Tombstone cleanup for retired services that left log directories
# behind. Lives in roles/logrotate because there's no surviving role
# to own these otherwise; this role runs on every host so the cleanup
# is universal. Each entry is a no-op on hosts that never had the
# service (state: absent on a missing path is idempotent).
#
#  - /var/log/traefik/  -- traefik was the previous reverse proxy
#    (replaced by nginx). Last write 2024-04-30/05-01 per audit;
#    package + role removed long ago, /etc/logrotate.d/traefik gone
#    too, but the rotated access.log files (~115 MB across lab+pug)
#    kept sitting on disk.
#  - /var/log/unifi/    -- udm_syslog role (rsyslog UDP ingest from
#    UDM/APs) was dropped in favour of doing nothing (neither path,
#    rsyslog→file nor fluentbit UDP, was actually delivering logs to
#    HyperDX). Created by the role on lab only.
- name: Remove retired-service log directories
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - /var/log/traefik
    - /var/log/unifi
  become: true
  tags:
    - logrotate

#  /etc/logrotate.d/unifi was deployed by the udm_syslog role; remove
#  it so logrotate stops trying to rotate a non-existent log file.
- name: Remove retired udm_syslog logrotate config
  file:
    path: /etc/logrotate.d/unifi
    state: absent
  become: true
  tags:
    - logrotate

#  /etc/rsyslog.d/60-unifi.conf bound UDP 5140 for the udm_syslog role.
#  Removing it and reloading rsyslog frees the port without a full restart.
- name: Remove retired udm_syslog rsyslog drop-in
  file:
    path: /etc/rsyslog.d/60-unifi.conf
    state: absent
  become: true
  register: logrotate_rsyslog_unifi_dropin
  tags:
    - logrotate

- name: Reload rsyslog after drop-in removal
  systemd:
    name: rsyslog.service
    state: reloaded
  become: true
  when: logrotate_rsyslog_unifi_dropin.changed
  tags:
    - logrotate
