- name: Install logrotate
  apt:
    pkg:
      - logrotate
    policy_rc_d: 101
    cache_valid_time: 3600
  register: logrotate_apt
  become: true
  tags:
    - logrotate

- name: Gather list of config files
  find:
    paths:
      - /etc/logrotate.d
    excludes:
      - "*.dpkg-dist" # diverted files
      - "*~" # ansible backups
  register: logrotate_confs
  become: true
  tags:
    - logrotate

- name: Configure logrotate compression
  include_tasks:
    file: compression.yml
    apply:
      tags: logrotate
  loop: "{{ logrotate_confs.files | map(attribute='path') + (ansible_check_mode and logrotate_apt.changed)|ternary([],['/etc/logrotate.conf']) }}"
  loop_control:
    loop_var: logrotate_compression_path
  vars:
    logrotate_args:
      item: "{{ logrotate_compression_path }}"
  tags:
    - logrotate
