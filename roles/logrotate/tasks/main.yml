- name: Install logrotate
  import_role:
    name: apt_no_autostart
    tasks_from: apt
  vars:
    apt_no_autostart_pkg: logrotate
    apt_no_autostart_unit: logrotate.service
  tags:
    - logrotate

- name: Gather list of config files
  find:
    paths:
      - /etc/logrotate.d
    excludes:
      - "*.dpkg-dist" # diverted files
      - "*~" # ansible backups
  register: logrotate_confs
  become: true
  tags:
    - logrotate

- name: Configure logrotate compression
  include_tasks:
    file: compression.yml
    apply:
      tags: logrotate
  loop: "{{ logrotate_confs.files | map(attribute='path') + (ansible_check_mode and apt_no_autostart.changed)|ternary([],['/etc/logrotate.conf']) }}"
  loop_control:
    loop_var: logrotate_item
  tags:
    - logrotate
