- name: Validate wolweb device inputs
  assert:
    quiet: true
    that:
      - wolweb_devices is defined
      - wolweb_devices | length > 0
      - wolweb_devices | rejectattr('mac', 'match', '^([0-9a-fA-F]{2}:){5}[0-9a-fA-F]{2}$') | list | length == 0
    fail_msg: >-
      wolweb_devices must be a non-empty list of {name, mac} entries with
      valid MAC addresses (the mac values come from mac_addresses)
  tags:
    - wolweb

- name: Set up wolweb system user, group, and config dir
  import_role:
    name: service_user
    tasks_from: user
  vars:
    service_user_args:
      name: wolweb
  tags:
    - wolweb

- name: Compute broadcast ip
  set_fact:
    wolweb_broadcast_ip: "{{ (ansible_facts.default_ipv4.address + '/' + ansible_facts.default_ipv4.netmask) | ansible.utils.ipaddr('broadcast') }}"
  tags:
    - wolweb

- name: Validate computed broadcast ip
  assert:
    quiet: true
    that:
      - wolweb_broadcast_ip is match('^([0-9]{1,3}[.]){3}[0-9]{1,3}$')
    fail_msg: >-
      Computed wolweb_broadcast_ip ('{{ wolweb_broadcast_ip }}') is not a
      valid IPv4 address -- ansible_facts.default_ipv4 may be empty on this
      host, which would render an unusable WoL destination
  tags:
    - wolweb

- name: Configure wolweb settings
  when: not (ansible_check_mode and wolweb_user.changed)
  template:
    src: config.json.j2
    dest: /mnt/services/wolweb/config.json
    owner: wolweb
    group: wolweb
    mode: "0600"
    backup: true
    validate: python3 -c 'import json,sys; json.load(open(sys.argv[1]))' %s
  register: wolweb_conf
  become: true
  tags:
    - wolweb

- name: Configure wolweb devices
  when: not (ansible_check_mode and wolweb_user.changed)
  template:
    src: devices.json.j2
    dest: /mnt/services/wolweb/devices.json
    owner: wolweb
    group: wolweb
    mode: "0600"
    backup: true
    validate: python3 -c 'import json,sys; json.load(open(sys.argv[1]))' %s
  register: wolweb_devices
  become: true
  tags:
    - wolweb

- name: Install wolweb service
  import_role:
    name: systemd_unit
    tasks_from: install
  vars:
    systemd_unit_args:
      src: wolweb.service.j2
      condition: "{{ not (ansible_check_mode and wolweb_user.changed) }}"
  tags:
    - wolweb

- name: Enable wolweb service
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: wolweb
      condition: "{{ not (ansible_check_mode and (wolweb_user.changed or wolweb_service_result.changed)) }}"
      restart: "{{ wolweb_service_result.changed or wolweb_conf.changed or wolweb_devices.changed }}"
  tags:
    - wolweb

- name: Configure nginx
  import_role:
    name: nginx
    tasks_from: site
  vars:
    nginx_site_args:
      subdomain: wolweb
      proxy_pass: http://127.0.0.1:{{ service_ports.wolweb }}/
      auth: required
  tags:
    - wolweb
