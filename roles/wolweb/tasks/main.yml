- name: Validate mac_addresses inputs
  assert:
    quiet: true
    that:
      - mac_addresses is defined
      - mac_addresses.lab_i210 is defined
      - mac_addresses.lab_i210 is match('^([0-9a-fA-F]{2}:){5}[0-9a-fA-F]{2}$')
      - mac_addresses.pug is defined
      - mac_addresses.pug is match('^([0-9a-fA-F]{2}:){5}[0-9a-fA-F]{2}$')
      - mac_addresses.lab_i225p1 is defined
      - mac_addresses.lab_i225p1 is match('^([0-9a-fA-F]{2}:){5}[0-9a-fA-F]{2}$')
      - mac_addresses.lab_i225p2 is defined
      - mac_addresses.lab_i225p2 is match('^([0-9a-fA-F]{2}:){5}[0-9a-fA-F]{2}$')
    fail_msg: >-
      mac_addresses must be defined with valid MAC addresses for
      lab_i210, pug, lab_i225p1, lab_i225p2
  tags:
    - wolweb

- name: Set up wolweb system user, group, and config dir
  import_role:
    name: service_user
    tasks_from: user
  vars:
    service_user_args:
      name: wolweb
  tags:
    - wolweb

- name: Compute broadcast ip
  set_fact:
    wolweb_broadcast_ip: "{{ (ansible_facts.default_ipv4.address + '/' + ansible_facts.default_ipv4.netmask) | ansible.utils.ipaddr('broadcast') }}"
  tags:
    - wolweb

- name: Configure wolweb settings
  when: not (ansible_check_mode and wolweb_user.changed)
  template:
    src: config.json.j2
    dest: /mnt/services/wolweb/config.json
    owner: wolweb
    group: wolweb
    mode: "0600"
    backup: true
    validate: python3 -c 'import json,sys; json.load(open(sys.argv[1]))' %s
  register: wolweb_conf
  become: true
  tags:
    - wolweb

- name: Configure wolweb devices
  when: not (ansible_check_mode and wolweb_user.changed)
  template:
    src: devices.json.j2
    dest: /mnt/services/wolweb/devices.json
    owner: wolweb
    group: wolweb
    mode: "0600"
    backup: true
    validate: python3 -c 'import json,sys; json.load(open(sys.argv[1]))' %s
  register: wolweb_devices
  become: true
  tags:
    - wolweb

- name: Install wolweb service
  import_role:
    name: systemd_unit
    tasks_from: install
  vars:
    systemd_unit_args:
      src: wolweb.service.j2
      condition: "{{ not (ansible_check_mode and wolweb_user.changed) }}"
  tags:
    - wolweb

- name: Enable wolweb service
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: wolweb
      condition: "{{ not (ansible_check_mode and (wolweb_user.changed or wolweb_service_result.changed)) }}"
      restart: "{{ wolweb_service_result.changed or wolweb_conf.changed or wolweb_devices.changed }}"
  tags:
    - wolweb

- name: Configure nginx
  import_role:
    name: nginx
    tasks_from: site
  vars:
    nginx_site_args:
      subdomain: wolweb
      proxy_pass: http://127.0.0.1:{{ service_ports.wolweb }}/
      auth: required
  tags:
    - wolweb
