- name: _verify | Wolweb health endpoint answers on loopback port
  uri:
    url: http://localhost:{{ service_ports.wolweb }}/health
    status_code: 200
  register: _wolweb_health
  retries: 5
  delay: 1
  until: _wolweb_health.status == 200
  become: true

- name: _verify | Wolweb serves the templated device list
  uri:
    url: http://localhost:{{ service_ports.wolweb }}/data/get
    return_content: true
    status_code: 200
  register: _wolweb_data
  retries: 5
  delay: 1
  until: _wolweb_data.status == 200
  failed_when: >-
    _wolweb_data.status != 200
    or 'Lab' not in (_wolweb_data.content | default(''))
    or 'Pug' not in (_wolweb_data.content | default(''))
  become: true

# /wake actually transmits a magic packet, and a directed-broadcast send is
# environment-dependent (SO_BROADCAST / SLIRP on the qemu fixture), so assert
# the route + device-name matching deterministically instead: a known-absent
# device must 404, proving the wake handler is wired and reads the loaded
# device list without depending on a packet leaving the box.
- name: _verify | Wolweb wake route rejects an unknown device with 404
  uri:
    url: http://localhost:{{ service_ports.wolweb }}/wake/__nonexistent__
    status_code: 404
  become: true

- name: _verify | Map the wolweb vhost FQDN to loopback for SNI-correct probing
  lineinfile:
    path: /etc/hosts
    line: "127.0.0.1 wolweb.{{ inventory_hostname }}.{{ domain }}"
    state: present
  become: true

- name: _verify | Unauthenticated hit redirects to Authelia
  uri:
    url: https://wolweb.{{ inventory_hostname }}.{{ domain }}/
    validate_certs: false
    follow_redirects: none
    status_code: 302
  register: _wolweb_auth_gate
  retries: 10
  delay: 1
  until: _wolweb_auth_gate.status == 302
  failed_when: >-
    _wolweb_auth_gate.status != 302
    or 'https://auth.' not in (_wolweb_auth_gate.location | default(''))
  become: true
