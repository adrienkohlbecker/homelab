# With rpc-authentication-required on, transmission answers an unauthenticated
# request with 401 (Basic realm="Transmission") -- auth is checked before the
# CSRF handshake, so the 401 (not the 409 you'd see auth-off) proves the daemon
# is up, serving RPC over the host loopback publish, AND enforcing auth.
- name: _verify | Transmission RPC is listening on loopback and enforcing auth
  uri:
    url: http://127.0.0.1:{{ service_ports.transmission }}/transmission/rpc
    method: POST
    body: '{"method":"session-get"}'
    body_format: json
    status_code: 401
  register: _transmission_rpc
  retries: 30
  delay: 2
  until: _transmission_rpc.status == 401

# SNI follows the URL host, not the Host header, so probing https://localhost/
# with a Host: override trips TLSV1_UNRECOGNIZED_NAME on openssl 3.x
# (noble/resolute). Map the vhost FQDN to loopback and probe it directly so
# SNI and Host both carry transmission's server_name.
- name: _verify | Map the transmission vhost to loopback for SNI-correct probing
  lineinfile:
    path: /etc/hosts
    line: "127.0.0.1 transmission.{{ inventory_hostname }}.{{ domain }}"
    state: present
  become: true

# The vhost is `auth: required`, so the real browser path goes through
# Authelia. Assert a cookieless GET redirects to the portal -- this is the
# only probe that fails if `auth: required` is dropped from nginx_site_args.
# Asserting the returnUrl (rd=) echoes transmission's own URL proves the
# request routed to transmission's server_name, not the default vhost.
- name: _verify | Transmission UI gate redirects unauthenticated requests to Authelia
  uri:
    url: https://transmission.{{ inventory_hostname }}.{{ domain }}/
    validate_certs: false
    follow_redirects: none
    status_code: 302
  register: _transmission_nginx_gate
  failed_when: not (_transmission_nginx_gate | authelia_redirects_to('transmission', inventory_hostname, domain))

# The --network media join + transmission.dns.podman FQDN is how the *arr stack
# reaches transmission's RPC, bypassing nginx -- the loopback/nginx probes above
# don't exercise it, so a dropped `--network media` strands that path while
# leaving them green. transmission-remote completes the full CSRF handshake +
# login from a throwaway container on the media network, so this proves three
# things at once: aardvark resolves the FQDN, transmission listens on the podman
# network path, and the configured credential authenticates.
- name: _verify | Transmission RPC accepts the configured credential over the media network
  command: >-
    podman run --rm --network media --entrypoint /usr/bin/transmission-remote
    {{ transmission_image }}
    transmission.dns.podman:9091 --auth transmission:{{ transmission_rpc_password }} --session-info
  become: true
  register: _transmission_auth_ok
  until: _transmission_auth_ok.rc == 0
  retries: 15
  delay: 2
  changed_when: false

# config_dir_group: media (see main.yml) exists to stop ansible flapping
# /mnt/services/transmission's gid back to `transmission` against the
# linuxserver image's startup chown to PUID:PGID=transmission:media. Assert the
# dir landed group `media` so a regression in that setting surfaces here, not as
# a silent per-converge flap.
- name: _verify | Stat the transmission config dir
  stat:
    path: /mnt/services/transmission
  register: _transmission_config_dir
  become: true

- name: _verify | Transmission config dir is group media
  assert:
    that:
      - _transmission_config_dir.stat.gr_name == "media"
    fail_msg: "/mnt/services/transmission is not group media (gr_name={{ _transmission_config_dir.stat.gr_name }})"

# settings.json is the role's other fragile contract: transmission (and the
# linuxserver init) rewrite it on shutdown/start, so settings.json.j2 must match
# that writeback byte-for-byte or the next converge drifts and restart-churns
# forever. The idempotence pass can't catch this -- the harness never restarts
# transmission between converges. Force a clean shutdown+restart, read the
# rewritten rpc-password hash back (as main.yml does to stay idempotent), then
# assert our template still matches what was written.
- name: _verify | Restart transmission to force a settings.json writeback
  systemd:
    name: transmission
    state: restarted
  become: true

- name: _verify | Transmission RPC is back up after the restart
  uri:
    url: http://127.0.0.1:{{ service_ports.transmission }}/transmission/rpc
    method: POST
    body: '{"method":"session-get"}'
    body_format: json
    status_code: 401
  register: _transmission_rpc_postrestart
  retries: 60
  delay: 2
  until: _transmission_rpc_postrestart.status == 401

- name: _verify | Read the rewritten rpc-password hash back
  command: >-
    python3 -c 'import json,sys;
    print(json.load(open(sys.argv[1])).get("rpc-password",""))'
    /mnt/services/transmission/settings.json
  register: _transmission_postrestart_pw
  become: true
  changed_when: false

- name: _verify | Render the settings.json our template would write
  set_fact:
    _transmission_conf_expected: "{{ lookup('template', 'settings.json.j2') | rstrip_newlines }}"
  vars:
    transmission_rpc_password_hash: "{{ _transmission_postrestart_pw.stdout }}"

- name: _verify | Read settings.json back after the writeback
  slurp:
    src: /mnt/services/transmission/settings.json
  register: _transmission_conf_ondisk
  become: true

- name: _verify | Templated settings.json survives transmission's writeback without drift
  assert:
    that:
      - (_transmission_conf_ondisk | slurp_text(trim=false)) == _transmission_conf_expected
    fail_msg: >-
      transmission rewrote settings.json into a form settings.json.j2 no longer
      matches -- its key order/types drifted from the writeback, so deploying
      would restart-churn. Re-capture settings.json.j2 from a running instance.
