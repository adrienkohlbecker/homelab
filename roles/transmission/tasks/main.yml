- name: Assert required inputs
  assert:
    that:
      - transmission_rpc_password is defined
      - (transmission_rpc_password | default('')) | length > 0
    fail_msg: >-
      transmission_rpc_password is required (vaulted in
      group_vars/{prod,test}.yml).
    quiet: true
  tags:
    - transmission

- name: Add media group
  import_role:
    name: media
    tasks_from: group
  tags:
    - transmission

- name: Set up transmission system user, group, and config dir
  import_role:
    name: service_user
    tasks_from: user
  vars:
    service_user_args:
      name: transmission
      extra_groups: [ media ]
      config_dir_group: media
  tags:
    - transmission

- name: Create scratch directory
  when: not (ansible_check_mode and transmission_user.changed)
  file:
    dest: /mnt/scratch/transmission
    state: directory
    owner: transmission
    group: media
    mode: "0775"
  become: true
  tags:
    - transmission

- name: Create storage directory
  when: not (ansible_check_mode and transmission_user.changed)
  file:
    dest: /mnt/media/Torrents
    state: directory
    owner: transmission
    group: media
    mode: "0775"
  become: true
  tags:
    - transmission

# Transmission salts+hashes rpc-password on first read into `{<salt+sha1>}`
# form and writes it back on every shutdown. Reading any existing hash
# here and feeding it into the template (via transmission_rpc_password_hash)
# keeps the second converge idempotent without committing the random salt
# to the repo. Empty / non-hash content (first converge, or someone
# manually replacing with plaintext) falls through to the plaintext
# template var, which transmission then rehashes on next start.
- name: Read existing transmission rpc-password hash if present
  command: >-
    python3 -c 'import json,sys,os;
    f=sys.argv[1];
    print(json.load(open(f)).get("rpc-password","") if os.path.exists(f) else "")'
    /mnt/services/transmission/settings.json
  register: transmission_existing_pw
  become: true
  changed_when: false
  failed_when: false

- name: Configure transmission
  when: not (ansible_check_mode and transmission_user.changed)
  # Render via copy:content + regex_replace because transmission rewrites
  # settings.json on every shutdown without a trailing newline; a plain
  # template: leaves us drifting forever.
  vars:
    transmission_rpc_password_hash: >-
      {{ transmission_existing_pw.stdout
         if (transmission_existing_pw.stdout | default('')).startswith('{')
         else transmission_rpc_password }}
  copy:
    content: "{{ lookup('template', 'settings.json.j2') | regex_replace('\\n+$', '') }}"
    dest: /mnt/services/transmission/settings.json
    owner: transmission
    group: media
    # 0664 owner:transmission group:media -- not a choice: transmission
    # rewrites settings.json on shutdown/hash-persist under its own umask 002
    # (load-bearing so downloaded media stays group-accessible to the *arr
    # stack), landing it 0664 root-of-the-rewrite. Declaring anything tighter
    # just flaps idempotence; the rpc-password is only a salted hash here.
    mode: "0664"
    backup: true
    validate: python3 -c 'import json,sys; json.load(open(sys.argv[1]))' "%s"
  register: transmission_conf
  become: true
  tags:
    - transmission

- name: Create transmission rpc-password secret
  import_role:
    name: podman_secret
    tasks_from: secret
  vars:
    podman_secret_args:
      name: transmission_rpc_password
      data: "{{ transmission_rpc_password }}"
  tags:
    - transmission

- name: Install transmission service
  import_role:
    name: systemd_unit
    tasks_from: install
  vars:
    systemd_unit_args:
      src: transmission.service.j2
      condition: "{{ not (ansible_check_mode and transmission_user.changed) }}"
  tags:
    - transmission

- name: Enable transmission service
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: transmission
      condition: "{{ not (ansible_check_mode and (transmission_service_result.changed or transmission_user.changed)) }}"
      restart: "{{ transmission_service_result.changed or transmission_conf.changed or transmission_rpc_password_rotated or transmission_user.changed or media_group.changed }}"
  tags:
    - transmission

- name: Configure nginx
  import_role:
    name: nginx
    tasks_from: site
  vars:
    nginx_site_args:
      subdomain: transmission
      proxy_pass: http://127.0.0.1:{{ service_ports.transmission }}/
      # Authelia gates the browser UI. The *arr leg uses
      # transmission.dns.podman:9091 over the media podman network
      # with rpc-username/rpc-password, bypassing nginx entirely.
      auth: required
  tags:
    - transmission

- name: Create transmission code directory
  file:
    dest: /opt/transmission
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true
  tags:
    - transmission

- name: Install blocklist refresh script
  copy:
    src: blocklist_update.sh
    dest: /opt/transmission/blocklist_update.sh
    owner: root
    group: root
    mode: "0755"
    backup: true
  become: true
  tags:
    - transmission

# Transmission fetches blocklist-url only on an explicit --blocklist-update,
# never on a schedule or at startup -- without this the configured blocklist
# silently rots. Weekly is plenty for a peer blocklist.
- name: Schedule the weekly blocklist refresh timer
  import_role:
    name: systemd_timer
    tasks_from: install
  vars:
    systemd_timer_args:
      name: transmission_blocklist_update
      description: Refresh the transmission peer blocklist
      on_calendar: Sun *-*-* 04:30:00
      persistent: false
      exec_start: /opt/transmission/blocklist_update.sh
  tags:
    - transmission
