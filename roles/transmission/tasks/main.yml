- name: Install jq
  apt:
    pkg:
      - jq
    cache_valid_time: 3600
  become: true
  tags:
    - transmission

- name: Add transmission group
  group:
    name: transmission
    system: true
  become: true
  tags:
    - transmission

- name: Add media group
  import_role:
    name: media
    tasks_from: group
  tags:
    - transmission

- name: Add transmission user
  user:
    name: transmission
    group: transmission
    groups: media
    createhome: false
    system: true
    shell: /usr/sbin/nologin
    home: /nonexistent
  become: true
  register: transmission_user
  tags:
    - transmission

- name: Create configuration directory
  when: not (ansible_check_mode and transmission_user.changed)
  file:
    dest: /mnt/services/transmission
    state: directory
    owner: transmission
    group: media
    mode: "0755"
  become: true
  tags:
    - transmission

- name: Create scratch directory
  file:
    dest: /mnt/scratch/transmission
    state: directory
    owner: transmission
    group: media
    mode: "0775"
  become: true
  tags:
    - transmission

- name: Create storage directory
  file:
    dest: /mnt/media/Torrents
    state: directory
    owner: transmission
    group: media
    mode: "0775"
  become: true
  tags:
    - transmission

# Transmission salts+hashes rpc-password on first read into `{<salt+sha1>}`
# form and writes it back on every shutdown. Reading any existing hash
# here and feeding it into the template (via transmission_rpc_password_hash)
# keeps the second converge idempotent without committing the random salt
# to the repo. Empty / non-hash content (first converge, or someone
# manually replacing with plaintext) falls through to the plaintext
# template var, which transmission then rehashes on next start.
- name: Read existing transmission rpc-password hash if present
  command: jq -r '."rpc-password" // ""' /mnt/services/transmission/settings.json
  register: transmission_existing_pw
  changed_when: false
  failed_when: false

- name: Configure transmission
  # Render via copy:content + regex_replace because transmission rewrites
  # settings.json on every shutdown without a trailing newline; a plain
  # template: leaves us drifting forever.
  vars:
    transmission_rpc_password_hash: >-
      {{ transmission_existing_pw.stdout
         if (transmission_existing_pw.stdout | default('')).startswith('{')
         else transmission_rpc_password }}
  copy:
    content: "{{ lookup('template', 'settings.json.j2') | regex_replace('\\n+$', '') }}"
    dest: /mnt/services/transmission/settings.json
    owner: transmission
    group: media
    mode: "0640"
    backup: true
    validate: jq . %s
  register: transmission_conf
  become: true
  tags:
    - transmission

- name: Configure environment
  template:
    src: env.j2
    dest: /etc/default/transmission
    owner: root
    group: root
    mode: "0600"
    backup: true
  register: transmission_env
  become: true
  tags:
    - transmission

- name: Configure environment
  copy:
    src: transmission_healthcheck.sh
    dest: /usr/local/bin/transmission_healthcheck
    owner: root
    group: root
    mode: "0755"
    backup: true
  register: transmission_health
  become: true
  tags:
    - transmission

- name: Install transmission service
  import_role:
    name: systemd_unit
    tasks_from: install
  vars:
    systemd_unit_args:
      src: transmission.service.j2
      condition: "{{ not (ansible_check_mode and transmission_user.changed) }}"
  tags:
    - transmission

- name: Enable transmission service
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: transmission
      condition: "{{ not (ansible_check_mode and (transmission_service_result.changed or transmission_user.changed)) }}"
      restart: "{{ transmission_service_result.changed or transmission_conf.changed or transmission_env.changed or transmission_health.changed or media_group.changed }}"
  tags:
    - transmission

- name: Configure nginx
  import_role:
    name: nginx
    tasks_from: site
  vars:
    nginx_site_args:
      subdomain: transmission
      proxy_pass: http://127.0.0.1:9091/
      # Authelia gates the browser UI. The *arr leg uses
      # transmission.dns.podman:9091 over the media podman network
      # with rpc-username/rpc-password, bypassing nginx entirely.
      auth: required
  tags:
    - transmission
