# level_init builds and installs a small Go binary that acts as
# container PID 1 for podman --init. The binary forwards signals,
# reaps orphans, and prepends a BSD syslog priority prefix (<N>) to
# each line of the workload's stdout/stderr based on a level keyword
# scanned out of the first 120 bytes — so when paired with podman
# --log-driver=k8s-file the line lands in journald with PRIORITY set
# from the content rather than hardcoded by stream.
#
# DEFERRED — NOT WIRED INTO site.yml. The role is staged + tested
# (Go unit tests + _verify.yml exercise reaping in a real container)
# but has no production consumer yet. The first pilot was paperless,
# reverted in the same conversation. Why:
#
#   Putting level_init in front of a real container requires podman
#   --log-driver={k8s-file,none} + dropping --detach so podman keeps
#   the container's stdio attached to systemd's pipe — that's the
#   path that gets <N> prefixes into the journal. Combined with
#   Type=notify --sdnotify=healthy (which every service template in
#   this homelab uses to gate "active" on the healthcheck), the
#   non-detach codepath in libpod runs through an unlock/re-lock
#   sequence that crosses OS threads, panicking with EPERM on the
#   pthread_mutex_t in shared memory.
#
#   Fixed upstream in podman PR #22658, ships in 5.x. Lab is jammy
#   pinning noble's podman 4.9.3 — still buggy. Resolute (26.04)
#   ships 5.x but pinning across two LTS jumps drags too much of the
#   userspace forward to be casually safe.
#
# To revive when ready, in order of cost: (1) switch the pilot
# service to --sdnotify=conmon to bypass the buggy code path at the
# cost of losing healthy-gating on initial boot, (2) wait for lab to
# move to noble and pin resolute's podman (one LTS jump), (3) keep
# deferring until the next LTS ships podman 5.x natively.
#
# Build path: source is copied into /usr/local/src/level_init/ and
# compiled in place. This requires golang-go on the host (~300MB).
# When this role grows past one or two consumers it should migrate to
# the static_curl pattern — Gitea Actions build, sha256-pinned release
# artifact, downloaded straight to /usr/local/libexec/. For now the
# on-host build keeps the source auditable and avoids the release
# pipeline overhead while the design is still firming up.

- name: Install golang-go
  apt:
    pkg: golang-go
    cache_valid_time: 3600
  become: true
  register: level_init_apt
  tags:
    - level_init

- name: Create level_init source and install dirs
  file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - /usr/local/src/level_init
    - /usr/local/libexec
  become: true
  when: not (ansible_check_mode and level_init_apt.changed)
  tags:
    - level_init

- name: Copy level_init source
  copy:
    src: "{{ item }}"
    dest: "/usr/local/src/level_init/{{ item }}"
    owner: root
    group: root
    mode: "0644"
  loop:
    - level_init.go
    - go.mod
  become: true
  register: level_init_src
  when: not (ansible_check_mode and level_init_apt.changed)
  tags:
    - level_init

- name: Stat installed binary
  stat:
    path: /usr/local/libexec/level_init
  register: level_init_bin
  tags:
    - level_init

# Rebuild only on source change or first install. `go build` writes a
# fresh binary unconditionally when invoked, so guarding the task is
# what keeps idempotence happy on the harness's second-apply run.
- name: Build level_init binary
  command: go build -ldflags="-s -w" -trimpath -o /usr/local/libexec/level_init .
  args:
    chdir: /usr/local/src/level_init
  environment:
    # `go build` insists on a HOME for the module cache even though we
    # have no external deps; without it the build fails on the root
    # user when /root isn't already set as HOME (sudo's env-reset
    # behaviour). GOCACHE is similarly required.
    HOME: /root
    GOCACHE: /root/.cache/go-build
  become: true
  when:
    - level_init_src.changed or not level_init_bin.stat.exists
    - not ansible_check_mode
  # When the `when` clause above evaluates true the build does write
  # a fresh binary, so this is honest. Idempotence is preserved via
  # the gate, not via changed_when: false (which would lie).
  changed_when: true
  tags:
    - level_init
