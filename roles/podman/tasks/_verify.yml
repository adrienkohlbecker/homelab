# podman is the foundational base role -- it runs no service of its own --
# so this exercises the runtime config it installs by spinning up throwaway
# containers and reading `podman info`, rather than stat-checking the files
# it wrote. Two halves: rootful checks (become: true) cover the storage
# stack, netavark + aardvark-dns, the rendered containers.conf + seccomp
# profile, the podman-socket group, and the prune timer; a rootless pass as
# the box login user then proves the pasta network connector actually backs
# a container's egress. Only test/testrole.py invokes it, against the box VM
# (zfs_root, jammy 5.15 -> the fuse-overlayfs storage path), never prod --
# so the group-membership tweak and probe containers below are safe.

- name: _verify | Resolve a tiny probe image
  set_fact:
    podman_probe_image: docker.io/library/busybox

# A real container start proves the whole storage stack (driver, graphroot,
# and on box specifically the kernel<5.19 fuse-overlayfs shim) actually
# works -- not just that storage.conf parsed. First run pulls over the qemu
# SLIRP NAT (TCP), so retry a couple times for a transient registry hiccup.
- name: _verify | A container actually starts
  command: podman run --rm {{ podman_probe_image }} true
  become: true
  register: podman_run_probe
  until: podman_run_probe.rc == 0
  retries: 3
  delay: 5
  changed_when: false

- name: _verify | Read podman's effective runtime config
  command: podman info --format json
  become: true
  register: podman_info
  changed_when: false

- name: _verify | Podman info reflects the role's containers.conf/storage.conf
  vars:
    _info: "{{ podman_info.stdout | from_json }}"
  assert:
    that:
      - _info.host.networkBackend == 'netavark'
      - _info.store.graphDriverName == 'overlay'
      - _info.store.graphRoot == '/var/lib/containers/storage'
      # Prove podman is actually *serving* the augmented profile as its
      # default — not just that the file on disk allows fchmodat2 (asserted
      # below). A containers.conf regression dropping the seccomp_profile line
      # would silently revert to the stock profile and revive the fchmodat2 EPERM.
      - _info.host.security.seccompProfilePath == '/etc/containers/seccomp-fchmodat2.json'
    fail_msg: >-
      podman info disagrees with the role's containers.conf/storage.conf:
      backend={{ _info.host.networkBackend }},
      driver={{ _info.store.graphDriverName }},
      graphroot={{ _info.store.graphRoot }},
      seccomp={{ _info.host.security.seccompProfilePath }}.

# Confirm the rendered containers.conf carries every pinned key -- catches a
# template regression in the keys podman info doesn't surface (dns_bind_port,
# the default network *name*, the seccomp default path, the rootless pasta
# connector). Exact whole-line match via argv (no shell, so the embedded
# double-quotes don't need escaping).
- name: _verify | Rendered containers.conf carries the pinned keys
  command:
    argv: [ grep, -Fxq, "{{ item }}", /etc/containers/containers.conf ]
  become: true
  changed_when: false
  loop:
    - 'network_backend = "netavark"'
    - 'default_rootless_network_cmd = "pasta"'
    - 'default_network = "podman"'
    - 'default_subnet = "{{ podman_default_network }}"'
    - 'dns_bind_port = 5333'
    - 'seccomp_profile = "/etc/containers/seccomp-fchmodat2.json"'

# The seccomp augmentation is the role's reason for shipping a custom
# profile; box's 5.15 kernel predates fchmodat2/io_uring so they can't be
# exercised functionally here, but assert the rendered profile actually
# allows them -- a future stock-profile shape change that made the
# template's match no-op would otherwise revive the silent breakage.
- name: _verify | Read the rendered seccomp profile
  slurp:
    src: /etc/containers/seccomp-fchmodat2.json
  become: true
  register: podman_seccomp_rendered

- name: _verify | Default seccomp profile allows augmented syscalls
  vars:
    _profile: "{{ podman_seccomp_rendered.content | b64decode | from_json }}"
    _allowed: "{{ _profile.syscalls | selectattr('action', 'eq', 'SCMP_ACT_ALLOW') | map(attribute='names') | flatten }}"
  assert:
    that:
      - "'fchmodat2' in _allowed"
      - "'io_uring_setup' in _allowed"
      - "'io_uring_enter' in _allowed"
      - "'io_uring_register' in _allowed"
    fail_msg: >-
      /etc/containers/seccomp-fchmodat2.json is missing augmented syscalls --
      the template's match found nothing to extend.

# Inter-container DNS is the load-bearing reason netavark + dns_bind_port are
# pinned: a peer resolves another container by its <name>.dns.podman FQDN via
# aardvark-dns (the path every service role uses). A throwaway DNS-enabled
# network + a named server + a peer that resolves it by FQDN exercises the
# resolution chain end-to-end. (nslookup, not ping -- ICMP needs CAP_NET_RAW
# the probe container doesn't carry, and resolution is what we're testing.)
- name: _verify | Create a throwaway DNS-enabled network
  containers.podman.podman_network:
    name: podman_verify_dns
    disable_dns: false
  become: true

- name: _verify | Start a named server container on it
  command: >-
    podman run -d --name podman_verify_server
    --network podman_verify_dns {{ podman_probe_image }} sleep 300
  become: true
  changed_when: true

- name: _verify | A peer resolves it by <name>.dns.podman
  command: >-
    podman run --rm --network podman_verify_dns {{ podman_probe_image }}
    nslookup podman_verify_server.dns.podman
  become: true
  register: podman_dns_probe
  until: podman_dns_probe.rc == 0
  retries: 10
  delay: 2
  changed_when: false

- name: _verify | Tear down the DNS probe container + network
  command: "{{ item }}"
  become: true
  changed_when: true
  loop:
    - podman rm -f podman_verify_server
    - podman network rm podman_verify_dns

# pasta is a rootless-only network connector (default_rootless_network_cmd,
# set in install.yml), so this exercises it as the box fixture's
# rootless-capable login user. A successful rootless container start is
# itself proof the connector works -- podman errors out rather than silently
# falling back when the configured connector is missing or broken; the
# process check then pins that the connector is pasta specifically, not the
# slirp4netns it replaced.
- name: _verify | Resolve the connection user uid for XDG_RUNTIME_DIR
  getent:
    database: passwd
    key: "{{ ansible_user_id }}"

- name: _verify | Confirm the pasta connector binary runs
  command: pasta --version
  changed_when: false

- name: _verify | Prove pasta backs a rootless container with egress wired
  environment:
    XDG_RUNTIME_DIR: /run/user/{{ ansible_facts.getent_passwd[ansible_user_id][1] }}
  block:
    - name: _verify | Pull a tiny image through the Nexus mirror
      command: podman pull {{ podman_probe_image }}
      changed_when: false

    # Default network -> podman invokes the configured rootless connector.
    # Container named without "pasta"/"slirp" so the pgrep -f matches below
    # hit the connector process, never this container's conmon argv.
    - name: _verify | Start a rootless container on the default network
      command: podman run -d --replace --name net_verify {{ podman_probe_image }} sleep 60
      changed_when: true

    - name: _verify | Count the pasta connector helper
      command: pgrep -u {{ ansible_user_id }} -c -f pasta
      register: _podman_pasta_count
      changed_when: false
      # pgrep -c exits 1 (and prints 0) when there are no matches; the
      # assert below is the real gate, so don't fail on the empty count.
      failed_when: false

    - name: _verify | Count any leftover slirp4netns helper
      command: pgrep -u {{ ansible_user_id }} -c -f slirp4netns
      register: _podman_slirp_count
      changed_when: false
      failed_when: false

    - name: _verify | Read the container's routing table
      command: podman exec net_verify ip route
      register: _podman_container_route
      changed_when: false

    - name: _verify | Assert pasta (not slirp4netns) backs the container with egress wired
      assert:
        that:
          - _podman_pasta_count.stdout | int > 0
          - _podman_slirp_count.stdout | int == 0
          - '"default" in _podman_container_route.stdout'
        fail_msg: >-
          Expected pasta to back the rootless container with a default
          route. pasta procs={{ _podman_pasta_count.stdout }},
          slirp4netns procs={{ _podman_slirp_count.stdout }},
          container routes={{ _podman_container_route.stdout }}.
  always:
    - name: _verify | Remove the net-verify container
      environment:
        XDG_RUNTIME_DIR: /run/user/{{ ansible_facts.getent_passwd[ansible_user_id][1] }}
      command: podman rm -f net_verify
      changed_when: false
      failed_when: false

# The podman-socket group + the 0755 /run/podman traversal exist so a
# non-root member can drive the rootful API socket. Rather than stat the
# dir mode + socket group ownership (which only re-reads what the role
# wrote), prove the whole chain functionally: add the operator to the group
# and have it connect. A wrong mode, wrong group, or a non-traversable
# /run/podman all surface as a failed connect below.
- name: _verify | Add the operator to podman-socket (test-only)
  user:
    name: "{{ ansible_user_id }}"
    groups: podman-socket
    append: true
  become: true

# runuser (as root) re-reads the group list via initgroups, so the just-added
# podman-socket membership is effective for the probe -- unlike become_user to
# the connection user, which would reuse the login session's stale groups.
- name: _verify | A podman-socket member reaches the rootful API socket
  command: runuser -u {{ ansible_user_id }} -- podman --url unix:///run/podman/podman.sock info --format json
  become: true
  register: podman_socket_access
  changed_when: false

# The LOGGING drop-in (override_service.conf) only reaches the running daemon
# if podman.service was restarted after it was written -- assert the live unit
# actually carries it, guarding the socket-vs-service restart split in main.yml.
# (systemd module, not `systemctl show`, per command-instead-of-module.)
- name: _verify | The LOGGING drop-in reached the running podman.service
  systemd:
    name: podman.service
  become: true
  register: podman_service_unit
  changed_when: false
  failed_when: "'--log-level=warn' not in (podman_service_unit.status.Environment | default(''))"

# The root-scope daily prune timer must be enabled (the user-scope one lives
# in the operator's manager, which box's missing per-user D-Bus socket can't
# be queried over `systemctl --user` -- so only the system timer is checked).
- name: _verify | The root-scope prune timer is enabled
  systemd:
    name: podman_prune.timer
  become: true
  register: podman_prune_timer
  changed_when: false
  failed_when: podman_prune_timer.status.UnitFileState != 'enabled'
