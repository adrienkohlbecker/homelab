# Daily podman system-prune. Drops stopped containers, dangling images,
# unused networks, anonymous volumes, and build cache; named images stay
# cached so the next pull is a no-op.
#
# Caller passes `podman_prune_user`. Default `root` installs the rootful
# timer at /etc/systemd/system, pruning /var/lib/containers/storage. Pass
# a username to install at /etc/systemd/user and enable the timer in that
# user's manager so rootless podman prunes
# /var/lib/containers/rootless/$USER instead. The named user must already
# have linger on -- the user manager has to be alive when the timer ticks.
#
# include_role (not import_role) for the systemd_unit calls is
# load-bearing: ansible scopes vars: on import_role at play level (they
# persist for the rest of the play, including later systemd_unit calls
# from the parent role), but vars: on include_role are scoped to the
# include only. With import_role here, `systemd_unit_user: <svc>` would
# leak and flip a subsequent systemd_unit invocation in the calling
# role (e.g. act_runner / github_runner installing their own service
# unit) from system scope to user scope, with all the cascading
# linger-check failures that implies.

- name: Install podman-prune.service
  include_role:
    name: systemd_unit
    tasks_from: install
  vars:
    systemd_unit_src: podman-prune.service
    systemd_unit_user: "{{ podman_prune_user | default('root') }}"
    systemd_unit_condition: "{{ podman_prune_condition | default(true) }}"

- name: Install podman-prune.timer
  include_role:
    name: systemd_unit
    tasks_from: install
  vars:
    systemd_unit_src: podman-prune.timer
    systemd_unit_user: "{{ podman_prune_user | default('root') }}"
    systemd_unit_condition: "{{ podman_prune_condition | default(true) }}"

- name: Enable podman-prune.timer
  include_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_src: podman-prune.timer
    systemd_unit_user: "{{ podman_prune_user | default('root') }}"
    systemd_unit_condition: "{{ not (ansible_check_mode and (podman_prune_timer_result.changed or podman_prune_service_result.changed)) and podman_prune_condition | default(true) }}"
