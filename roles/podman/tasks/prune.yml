# Daily podman system-prune. Drops stopped containers, dangling images,
# unused networks, anonymous volumes, and build cache; named images stay
# cached so the next pull is a no-op.
#
# Caller passes `podman_prune_user`. Default `root` installs the rootful
# timer at /etc/systemd/system, pruning /var/lib/containers/storage. Pass
# a username to install at /etc/systemd/user and enable the timer in that
# user's manager so rootless podman prunes
# /var/lib/containers/rootless/$USER instead. The named user must already
# have linger on -- the user manager has to be alive when the timer ticks.

- name: Install podman-prune.service
  import_role:
    name: systemd_unit
    tasks_from: install
  vars:
    systemd_unit_args:
      src: podman-prune.service
      user: "{{ podman_prune_user | default('root') }}"
      condition: "{{ podman_prune_condition | default(true) }}"

- name: Install podman-prune.timer
  import_role:
    name: systemd_unit
    tasks_from: install
  vars:
    systemd_unit_args:
      src: podman-prune.timer
      user: "{{ podman_prune_user | default('root') }}"
      condition: "{{ podman_prune_condition | default(true) }}"

- name: Enable podman-prune.timer
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: podman-prune.timer
      user: "{{ podman_prune_user | default('root') }}"
      condition: "{{ not (ansible_check_mode and (podman_prune_timer_result.changed or podman_prune_service_result.changed)) and podman_prune_condition | default(true) }}"
