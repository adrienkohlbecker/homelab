# Daily podman system-prune. Drops stopped containers, dangling images,
# unused networks, and build cache; named images stay cached so the next
# pull is a no-op. Built on the systemd_timer helper so
# the root-scope timer gets netdata overdue-monitoring, a TimeoutStartSec
# kill-switch, and journal-priority routing for free.
#
# Inputs: caller passes a single dict `podman_prune_args` with keys
#   user        default 'root'. Root installs a system-scope timer pruning
#                /var/lib/containers/storage. Pass a username to install a
#                user-scope timer in that user's manager so rootless podman
#                prunes /var/lib/containers/rootless/$USER instead. The
#                named user must already have linger on — the user manager
#                has to be alive when the timer ticks.
#   condition   default true; gates the whole call (use this to skip the
#                install during check mode when the user was just created).
#
# The dict form prevents inter-call leakage at play-vars scope: each
# import_role pass replaces the whole `podman_prune_args` value, so a
# previous caller's user can't bleed into the next caller that doesn't
# explicitly override.

# Transitional: drop the hand-rolled podman-prune.{service,timer} this
# role shipped before the systemd_timer migration (the new units are
# podman_prune.*). No-op on fresh hosts; remove this task once every host
# has converged past the rename.
- name: prune | Remove the obsolete hand-rolled podman-prune units
  import_role:
    name: systemd_timer
    tasks_from: remove
  vars:
    systemd_timer_args:
      name: podman-prune
      user: "{{ podman_prune_args.user | default('root') }}"
  when: podman_prune_args.condition | default(true)

# prune flags: no -a so named (tagged) images stay warm for the next
# pull; until=48h spares anything created in the last two days so a recent
# stopped container or fresh dangling layer survives one daily pass.
#
# Deliberately no --volumes: podman's volume prune has no anonymous-only
# filter (only dangling / label / since), so --volumes would also reap any
# *named* volume that happens to be unattached at prune time -- silently
# destroying a service's data store if it were stopped for a maintenance
# window. The fleet bind-mounts all service state under /mnt/services, so
# anonymous-volume buildup is negligible and not worth that risk. A
# consumer that genuinely relies on a podman volume can prune its own
# anonymous ones explicitly (e.g. `podman volume prune --filter label=…`).
- name: prune | Install podman_prune timer
  import_role:
    name: systemd_timer
    tasks_from: install
  vars:
    systemd_timer_args:
      name: podman_prune
      description: Prune unused podman containers, images and networks
      exec_start: /usr/bin/podman system prune -f --filter until=48h
      # 01:00, not 00:00: the podman package's own podman-auto-update.timer fires
      # daily at 00:00 (+15m random) to pull and restart on :latest. Sharing that
      # base time raced it -- prune could fire before auto-update finished
      # swapping images. Starting an hour later lets auto-update settle first, so
      # prune reliably sweeps the images it obsoleted. The 30m spread keeps it
      # clear of zfs_autosnapshot at 02:00.
      on_calendar: "*-*-* 01:00:00"
      persistent: false
      randomized_delay_sec: 1800
      user: "{{ podman_prune_args.user | default('root') }}"
  when: podman_prune_args.condition | default(true)
