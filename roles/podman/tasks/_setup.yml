# The role installs a user-scope `podman-prune.timer` for the SSH
# user; under systemd_unit's install path that fail-closes in real
# apply when the user has no /var/lib/systemd/linger sentinel. In
# prod the `user` role enables linger for ansible_user_id earlier in
# site.yml; under testrole.py only this role runs, so set up linger
# explicitly here.
- name: _setup | Enable linger for vagrant SSH user
  import_role:
    name: linger
    tasks_from: linger
  vars:
    linger_args:
      name: "{{ ansible_user_id }}"
      uid: "{{ ansible_user_uid }}"
