- name: Install podman package
  import_role:
    name: podman
    tasks_from: install
  tags:
    - podman

- name: Add podman-socket group
  group:
    name: podman-socket
    system: true
  become: true
  tags:
    - podman

- name: Install podman socket override
  import_role:
    name: systemd_unit
    tasks_from: dropin
  vars:
    systemd_unit_args:
      src: override_socket.conf
      for: podman.socket
  tags:
    - podman

- name: Save return value
  set_fact:
    socket_systemd_unit: '{{ systemd_unit }}'
  tags:
    - podman

- name: Install podman service override
  import_role:
    name: systemd_unit
    tasks_from: dropin
  vars:
    systemd_unit_args:
      src: override_service.conf
      for: podman.service
  tags:
    - podman

- name: Divert configuration file
  community.general.dpkg_divert:
    path: /usr/lib/tmpfiles.d/podman.conf
  become: true
  tags:
    - podman

- name: Configure tmpfiles.d
  when: not (ansible_check_mode and podman_apt.changed)
  lineinfile:
    regexp: '^(# )?(.*) /run/podman (.*)$'
    line: '# \2 /run/podman \3'
    backrefs: true
    dest: /usr/lib/tmpfiles.d/podman.conf
    backup: true
    owner: root
    group: root
    mode: "0644"
  become: true
  tags:
    - podman

- name: Enable the service
  when: not (ansible_check_mode and podman_apt.changed)
  systemd:
    name: podman
    enabled: true
  become: true
  tags:
    - podman

- name: Enable podman.socket
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: podman.socket
      condition: "{{ not (ansible_check_mode and podman_apt.changed) }}"
    # podman_backports_updated forces a restart when the noble upgrade
    # flipped the binary under us — apt under policy_rc_d=101 leaves
    # the running 3.x daemon on disk, but the new socket on
    # /run/podman would be served by the stale process otherwise.
      restart: "{{ systemd_unit.changed or socket_systemd_unit.changed or (podman_backports_updated | default(false)) }}"
  tags:
    - podman

- name: Configure health script
  file:
    path: /usr/local/bin/wait_for_healthy_container
    state: absent
  become: true
  tags:
    - podman

- name: Install podman prune timer
  import_tasks: prune.yml
  vars:
    podman_prune_args: {}
  tags:
    - podman

- name: Install podman prune timer for {{ ansible_user }}
  import_tasks: prune.yml
  vars:
    podman_prune_args:
      user: "{{ ansible_user }}"
  tags:
    - podman

- name: Configure macvlan network
  import_role:
    name: macvlan
    tasks_from: podman
  tags:
    - podman
