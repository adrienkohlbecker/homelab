- name: Install podman package
  import_role:
    name: podman
    tasks_from: install
  tags:
    - podman

- name: Add podman-socket group
  group:
    name: podman-socket
    system: true
  become: true
  tags:
    - podman

- name: Create override directory
  file:
    dest: /etc/systemd/system/podman.socket.d
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true
  tags:
    - podman

- name: Install podman socket override
  import_role:
    name: systemd_unit
    tasks_from: copy
  vars:
    systemd_unit_src: override_socket.conf
    systemd_unit_dest: podman.socket.d/override.conf
    systemd_unit_verify: podman.socket
  tags:
    - podman

- name: Save return value
  set_fact:
    socket_systemd_unit: '{{ systemd_unit }}'
  tags:
    - podman

- name: Create override directory
  file:
    dest: /etc/systemd/system/podman.service.d
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true
  tags:
    - podman

- name: Install postman service override
  import_role:
    name: systemd_unit
    tasks_from: copy
  vars:
    systemd_unit_src: override_service.conf
    systemd_unit_dest: podman.service.d/override.conf
    systemd_unit_verify: podman.service
  tags:
    - podman

- name: Divert configuration file
  community.general.dpkg_divert:
    path: /usr/lib/tmpfiles.d/podman.conf
  become: true
  tags:
    - podman

- name: Configure tmpfiles.d
  when: not (ansible_check_mode and podman_apt.changed)
  lineinfile:
    regexp: '^(# )?(.*) /run/podman (.*)$'
    line: '# \2 /run/podman \3'
    backrefs: true
    dest: /usr/lib/tmpfiles.d/podman.conf
    backup: true
    owner: root
    group: root
    mode: "0644"
  become: true
  tags:
    - podman

# Rootless storage lives on the same zvol under /rootless/$USER. Sticky-bit
# 1777 (like /tmp) lets each user create and own their own subdir without
# being able to touch anyone else's.
- name: Create rootless storage parent
  when: zfs_root
  file:
    path: /var/lib/containers/rootless
    state: directory
    owner: root
    group: root
    mode: "1777"
  become: true
  tags:
    - podman

# Drop-ins under /etc/containers/storage.conf.d/ aren't loaded in rootless
# mode on podman 4.9, so we have to write the main file directly. The driver
# is set explicitly to silence the "A driver was picked automatically"
# warning when containers-common's default storage.conf is absent.
#
# runroot and graphroot must be set explicitly even though they match the
# upstream defaults: containers/storage's TOML loader unconditionally
# overwrites these fields from the parsed config, so leaving them blank
# clobbers the rootful defaults with empty strings and breaks rootful
# podman with "runroot must be set". Rootless ignores both — its codepath
# rebuilds a fresh options struct from XDG_RUNTIME_DIR and
# rootless_storage_path.
# mount_program forces fuse-overlayfs on kernels older than 5.19.
# Idmapped overlay layers landed in 5.19, so containers with `--uidmap`
# (e.g. homeassistant) on jammy GA's 5.15 fall back to a slow per-file
# chown copy that times out the systemd start. fuse-overlayfs supports
# idmap in userspace and bypasses the kernel limitation. Gate on the
# running kernel rather than distribution version because prod runs the
# linux-generic-hwe-22.04 stack on jammy (kernel 6.x), where native
# overlay idmap works and fuse-overlayfs would just add overhead.
- name: Configure podman storage
  when: zfs_root
  copy:
    dest: /etc/containers/storage.conf
    content: |
      [storage]
      driver = "overlay"
      runroot = "/run/containers/storage"
      graphroot = "/var/lib/containers/storage"
      rootless_storage_path = "/var/lib/containers/rootless/$USER"
      {% set kmajor = ansible_kernel.split('.')[0] | int %}
      {% set kminor = ansible_kernel.split('.')[1] | int %}
      {% if kmajor < 5 or (kmajor == 5 and kminor < 19) %}

      [storage.options.overlay]
      mount_program = "/usr/bin/fuse-overlayfs"
      {% endif %}
    owner: root
    group: root
    mode: "0644"
  become: true
  tags:
    - podman

- name: Remove obsolete storage.conf.d drop-in
  when: zfs_root
  file:
    path: /etc/containers/storage.conf.d/rootless-zvol.conf
    state: absent
  become: true
  tags:
    - podman

- name: Enable the service
  when: not (ansible_check_mode and podman_apt.changed)
  systemd:
    name: podman
    enabled: true
  become: true
  tags:
    - podman

- name: Enable podman.socket
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_src: podman.socket
    systemd_unit_condition: "{{ not (ansible_check_mode and podman_apt.changed) }}"
    systemd_unit_restart: "{{ systemd_unit.changed or socket_systemd_unit.changed }}"
  tags:
    - podman

- name: Configure health script
  file:
    path: /usr/local/bin/wait_for_healthy_container
    state: absent
  become: true
  tags:
    - podman

- name: Install podman prune timer
  import_tasks: prune.yml
  tags:
    - podman

- name: Install podman prune timer for {{ ansible_user }}
  import_tasks: prune.yml
  vars:
    podman_prune_user: "{{ ansible_user }}"
  tags:
    - podman

- name: Configure macvlan network
  import_role:
    name: macvlan
    tasks_from: podman
  tags:
    - podman
