- name: Install podman package
  import_role:
    name: podman
    tasks_from: install
  tags:
    - podman

- name: Add podman-socket group
  group:
    name: podman-socket
    system: true
  become: true
  tags:
    - podman

- name: Install podman socket override
  import_role:
    name: systemd_unit
    tasks_from: dropin
  vars:
    systemd_unit_args:
      src: override_socket.conf
      for: podman.socket
  tags:
    - podman

- name: Install podman service override
  import_role:
    name: systemd_unit
    tasks_from: dropin
  vars:
    systemd_unit_args:
      src: override_service.conf
      for: podman.service
  tags:
    - podman

# podman's packaged /usr/lib/tmpfiles.d/podman.conf carries a
# `D! /run/podman 0700 root root` line that recreates /run/podman as
# 0700 on every boot. That 0700 blocks podman-socket group members from
# traversing in to reach the 0660 API socket (SocketGroup, see
# files/override_socket.conf). So dpkg-divert redirects future package
# writes to a .distrib sidecar (an apt upgrade can't clobber our edit),
# and the lineinfile below comments out the /run/podman line so tmpfiles
# stops resetting it — systemd then auto-creates /run/podman at 0755
# (traversable) when it activates the socket. A RuntimeDirectory= drop-in
# can't replace this: the tmpfiles line would still need neutralizing,
# and RuntimeDirectory on a socket unit risks tearing /run/podman down on
# restart.
- name: Divert configuration file
  community.general.dpkg_divert:
    path: /usr/lib/tmpfiles.d/podman.conf
  become: true
  tags:
    - podman

- name: Configure tmpfiles.d
  when: not (ansible_check_mode and podman_apt.changed)
  lineinfile:
    regexp: '^(# )?(.*) /run/podman (.*)$'
    line: '# \2 /run/podman \3'
    backrefs: true
    dest: /usr/lib/tmpfiles.d/podman.conf
    backup: true
    owner: root
    group: root
    mode: "0644"
  become: true
  tags:
    - podman

- name: Enable the service
  when: not (ansible_check_mode and podman_apt.changed)
  systemd:
    name: podman
    enabled: true
  become: true
  tags:
    - podman

- name: Enable podman.socket
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      # podman.socket is shipped by the podman package; systemd_unit's
      # `service` task only enables/starts it -- it never installs `src`.
      src: podman.socket
      condition: "{{ not (ansible_check_mode and podman_apt.changed) }}"
    # Only the socket drop-in (SocketGroup) restarts the socket. The LOGGING
    # service drop-in and a binary swap change the daemon, not the socket, so
    # they restart podman.service instead — see the task below.
      restart: "{{ podman_socket_d_override_conf_result.changed | default(false) }}"
  tags:
    - podman

# override_service.conf (LOGGING) and a noble binary-swap change the running
# podman.service, not the socket — and podman.service is a long-lived active
# unit (netdata holds a persistent connection over the API socket), so the
# socket restart above never recycles it. Restart the daemon directly when
# its drop-in changed or backports swapped the binary under it: apt under
# policy_rc_d=101 leaves the running daemon on disk, so the new /run/podman
# socket would otherwise still be served by the stale process. Skipped on a
# fresh install (podman_apt.changed): the socket task above brings the daemon
# up with the correct env + binary already in place, nothing stale to recycle.
- name: Restart podman.service to pick up drop-in or binary changes
  when:
    - not ansible_check_mode
    - not podman_apt.changed
    - (podman_service_d_override_conf_result.changed | default(false)) or (podman_backports_updated | default(false))
  systemd:
    name: podman.service
    state: restarted
  become: true
  tags:
    - podman

- name: Install podman prune timer
  import_tasks: prune.yml
  vars:
    podman_prune_args: {}
  tags:
    - podman

# The per-user prune timer below is user-scope; systemd_unit's
# install fail-closes in real-apply when /var/lib/systemd/linger/<user>
# is missing. In site.yml's full run the `user` role enables linger
# for ansible_user_id earlier, so this is a no-op there; under
# testrole.py podman (and under any role that imports podman as a
# dep), the user role hasn't run yet, so enable linger here so
# podman is self-sufficient.
- name: Enable linger for the operator user (required by user-scope prune timer)
  import_role:
    name: linger
    tasks_from: linger
  vars:
    linger_args:
      name: "{{ ansible_user_id }}"
      uid: "{{ ansible_user_uid }}"
  tags:
    - podman

# No `condition:` here (unlike the github_runner caller that gates on a
# freshly-created user): the operator is the ansible connection
# user -- always pre-existing -- and linger was enabled for it one task
# above, so its user manager is guaranteed live when the timer ticks.
- name: Install user-scope podman prune timer for the operator user
  import_tasks: prune.yml
  vars:
    podman_prune_args:
      user: "{{ ansible_user_id }}"
  tags:
    - podman

# Podman macvlan networks are owned by the macvlan role now — each
# entry in host_vars.macvlan_blocks with `podman_network: true` gets
# its podman network created alongside its host-side iface. See
# roles/macvlan/tasks/install.yml.
