- name: Install packages
  apt:
    name:
      - man-db # to pass systemd-analyze verification
    cache_valid_time: 3600
  become: true
  tags:
    - podman

- name: Install podman
  import_role:
    name: apt_unit_masked
    tasks_from: apt
  vars:
    apt_unit_masked_pkg: podman
    apt_unit_masked_unit:
      - podman.service
      - podman.socket
  tags:
    - podman

- name: Install aardvark dns
  when: ansible_distribution_major_version == "24"
  apt:
    pkg:
      - aardvark-dns
    cache_valid_time: 3600
  become: true
  tags:
    - podman

- name: Add podman-socket group
  group:
    name: podman-socket
    system: true
  become: true
  tags:
    - podman

- name: Create override directory
  file:
    dest: /etc/systemd/system/podman.socket.d
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true
  tags:
    - podman

- name: Install podman socket override
  import_role:
    name: systemd_unit
    tasks_from: copy
  vars:
    systemd_unit_src: override_socket.conf
    systemd_unit_dest: podman.socket.d/override.conf
    systemd_unit_verify: podman.socket
  tags:
    - podman

- name: Save return value
  set_fact:
    socket_systemd_unit: '{{ systemd_unit }}'
  tags:
    - podman

- name: Create override directory
  file:
    dest: /etc/systemd/system/podman.service.d
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true
  tags:
    - podman

- name: Install postman service override
  import_role:
    name: systemd_unit
    tasks_from: copy
  vars:
    systemd_unit_src: override_service.conf
    systemd_unit_dest: podman.service.d/override.conf
    systemd_unit_verify: podman.service
  tags:
    - podman

- name: Divert configuration file
  community.general.dpkg_divert:
    path: /usr/lib/tmpfiles.d/podman.conf
  become: true
  tags:
    - podman

- name: Configure tmpfiles.d
  when: not (ansible_check_mode and apt_unit_masked.changed)
  lineinfile:
    regexp: '^(# )?(.*) /run/podman (.*)$'
    line: '# \2 /run/podman \3'
    backrefs: true
    dest: /usr/lib/tmpfiles.d/podman.conf
    backup: true
    owner: root
    group: root
    mode: "0644"
  become: true
  tags:
    - podman

- name: Update containers permissions for netdata disk space monitoring
  file:
    dest: /var/lib/containers
    state: directory
    owner: root
    group: root
    mode: "0755" # defaults to 0700
  become: true
  tags:
    - podman

- name: Create podman zvol
  when: zfs_root
  zfs:
    name: rpool/podman
    state: present
    extra_zfs_properties:
      volsize: '{{ "30GB" | human_to_bytes | string }}'
  register: zfs_zvol_podman
  become: true
  tags:
    - podman

- name: Create a ext4 filesystem on podman zvol
  when: not (ansible_check_mode and zfs_zvol_podman.changed) and zfs_root
  filesystem:
    fstype: ext4
    dev: /dev/zvol/rpool/podman
    resizefs: true
  become: true
  tags:
    - podman

# Older hosts mounted the zvol at /var/lib/containers/storage. We now mount
# it one level higher at /var/lib/containers so a sibling /rootless dir on
# the same volume can hold per-user rootless storage. On upgrade, sink the
# existing zvol contents into a storage/ subdir before remounting so podman
# still finds its graphroot at /var/lib/containers/storage.
- name: Detect existing zvol mount target
  when: zfs_root
  command: findmnt -no TARGET /dev/zvol/rpool/podman
  register: podman_zvol_mount
  changed_when: false
  failed_when: false
  check_mode: false
  become: true
  tags:
    - podman

- name: Migrate zvol layout to /var/lib/containers
  when:
    - zfs_root
    - podman_zvol_mount.rc == 0
    - podman_zvol_mount.stdout == "/var/lib/containers/storage"
  become: true
  block:
    - name: Stop podman.socket before remount
      systemd:
        name: podman.socket
        state: stopped

    # podman's overlay graph driver leaves a self-bind at
    # /var/lib/containers/storage/overlay (for metacopy). The mount module's
    # `state: unmounted` calls plain umount and would fail with EBUSY; -R
    # tears the bind down with the main mount.
    - name: Recursively unmount old location
      command: umount -R /var/lib/containers/storage

    - name: Move zvol root contents into storage/
      shell: |
        set -euo pipefail
        tmp=$(mktemp -d)
        mount /dev/zvol/rpool/podman "$tmp"
        cd "$tmp"
        mkdir -p storage
        shopt -s dotglob nullglob
        for f in *; do
          [ "$f" = "storage" ] && continue
          [ "$f" = "lost+found" ] && continue
          mv -- "$f" storage/
        done
        cd /
        umount "$tmp"
        rmdir "$tmp"
      args:
        executable: /bin/bash

    - name: Drop fstab entry for old mount
      mount:
        path: /var/lib/containers/storage
        state: absent
  tags:
    - podman

- name: Mount podman zvol
  when: zfs_root
  mount:
    path: /var/lib/containers
    src: /dev/zvol/rpool/podman
    fstype: ext4
    # x-systemd.requires=zfs-volumes.target gates the mount on ZFS
    # finishing pool import + zvol exposure. systemd-fstab-generator
    # already adds an implicit dep on the device unit, but the
    # explicit target dep removes any reliance on udev winning the
    # race against systemd's device-wait timeout.
    opts: defaults,noatime,x-systemd.requires=zfs-volumes.target
    state: mounted
    backup: true
  become: true
  tags:
    - podman

# Rootless storage lives on the same zvol under /rootless/$USER. Sticky-bit
# 1777 (like /tmp) lets each user create and own their own subdir without
# being able to touch anyone else's.
- name: Create rootless storage parent
  when: zfs_root
  file:
    path: /var/lib/containers/rootless
    state: directory
    owner: root
    group: root
    mode: "1777"
  become: true
  tags:
    - podman

# Drop-ins under /etc/containers/storage.conf.d/ aren't loaded in rootless
# mode on podman 4.9, so we have to write the main file directly. The driver
# is set explicitly to silence the "A driver was picked automatically"
# warning when containers-common's default storage.conf is absent.
#
# runroot and graphroot must be set explicitly even though they match the
# upstream defaults: containers/storage's TOML loader unconditionally
# overwrites these fields from the parsed config, so leaving them blank
# clobbers the rootful defaults with empty strings and breaks rootful
# podman with "runroot must be set". Rootless ignores both — its codepath
# rebuilds a fresh options struct from XDG_RUNTIME_DIR and
# rootless_storage_path.
- name: Configure podman storage
  when: zfs_root
  copy:
    dest: /etc/containers/storage.conf
    content: |
      [storage]
      driver = "overlay"
      runroot = "/run/containers/storage"
      graphroot = "/var/lib/containers/storage"
      rootless_storage_path = "/var/lib/containers/rootless/$USER"
    owner: root
    group: root
    mode: "0644"
  become: true
  tags:
    - podman

- name: Remove obsolete storage.conf.d drop-in
  when: zfs_root
  file:
    path: /etc/containers/storage.conf.d/rootless-zvol.conf
    state: absent
  become: true
  tags:
    - podman

- name: Enable the service
  when: not (ansible_check_mode and apt_unit_masked.changed)
  systemd:
    name: podman
    enabled: true
  become: true
  tags:
    - podman

- name: Enable podman.socket
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_src: podman.socket
    systemd_unit_condition: "{{ not (ansible_check_mode and apt_unit_masked.changed) }}"
    systemd_unit_restart: "{{ systemd_unit.changed or socket_systemd_unit.changed }}"
  tags:
    - podman

- name: Configure health script
  file:
    path: /usr/local/bin/wait_for_healthy_container
    state: absent
  become: true
  tags:
    - podman

- name: Install podman prune timer
  import_tasks: prune.yml
  tags:
    - podman

- name: Install podman prune timer for {{ ansible_user }}
  import_tasks: prune.yml
  vars:
    podman_prune_user: "{{ ansible_user }}"
  tags:
    - podman

- name: Configure macvlan network
  import_role:
    name: macvlan
    tasks_from: podman
  tags:
    - podman
