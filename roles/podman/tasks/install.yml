- name: install | Pin podman packages to noble (jammy)
  when: ansible_distribution_major_version == "22"
  template:
    src: backports-podman.j2
    dest: /etc/apt/preferences.d/backports-podman
    owner: root
    group: root
    mode: "0644"
    backup: true
  become: true
  register: podman_pin
  tags:
    - podman

- name: install | Add noble apt sources (jammy)
  when: ansible_distribution_major_version == "22"
  copy:
    dest: /etc/apt/sources.list.d/noble-podman.list
    owner: root
    group: root
    mode: "0644"
    backup: true
    content: |
      deb {{ ubuntu_mirror }} noble main restricted universe multiverse
      deb {{ ubuntu_mirror }} noble-updates main restricted universe multiverse
      deb {{ ubuntu_mirror }} noble-backports main restricted universe multiverse
      deb {{ ubuntu_mirror_security }} noble-security main restricted universe multiverse
  become: true
  register: podman_noble_sources
  tags:
    - podman

- name: install | Refresh apt cache after noble setup
  when: podman_pin.changed or podman_noble_sources.changed
  apt:
    update_cache: true
  become: true
  tags:
    - podman

- name: install | Install packages
  apt:
    name:
      - man-db # to pass systemd-analyze verification
    cache_valid_time: 3600
  become: true
  tags:
    - podman

- name: install | Install podman
  apt:
    pkg:
      - podman
      # podman only Suggests iptables, but netavark shells out to it to set up
      # --publish port forwarding. Without it, container start fails with the
      # misleading "Error: netavark: No such file or directory" (it's iptables
      # that's missing, not netavark).
      - iptables
      # fuse-overlayfs is a Recommends, but pinned via storage.conf's
      # mount_program on jammy (kernel 5.15 has no idmapped overlay
      # layers). Install explicitly so the install never depends on the
      # apt module's install_recommends default flipping under us.
      - fuse-overlayfs
    policy_rc_d: 101
    cache_valid_time: 3600
  register: podman_apt
  become: true
  tags:
    - podman

# state: latest across the full backports-podman pin list so every
# noble-pinned package actually rolls forward on hosts where any of
# these were already installed at jammy's version. The Install task
# above only forces the explicit short list — buildah, conmon,
# slirp4netns, etc. are separate packages (or weak deps of podman)
# that apt leaves at jammy's version under state: present even with
# the pin in place. Reading from podman_backport_packages keeps this
# list and templates/backports-podman.j2's `Package:` line in sync.
#
# The when-clause skips on check-mode runs that just added the noble
# pin/sources — apt's check resolves names against the live cache,
# CHECK MODE never actually pulled noble's metadata, so
# netavark/aardvark-dns (jammy-absent) would error with "No package
# matching". The real-mode play afterwards refreshes the cache and
# runs this task properly.
- name: install | Upgrade backports-pinned packages to noble (jammy)
  when:
    - ansible_distribution_major_version == "22"
    - not (ansible_check_mode and (podman_pin.changed or podman_noble_sources.changed))
  apt:
    pkg: '{{ podman_backport_packages }}'
    state: latest
    policy_rc_d: 101
    cache_valid_time: 3600
  become: true
  tags:
    - podman

- name: install | Install aardvark dns
  when: ansible_distribution_major_version != "22"
  apt:
    pkg:
      - aardvark-dns
    cache_valid_time: 3600
  become: true
  tags:
    - podman

- name: install | Update containers permissions for netdata disk space monitoring
  file:
    dest: /var/lib/containers
    state: directory
    owner: root
    group: root
    mode: "0755" # defaults to 0700
  become: true
  tags:
    - podman

- name: install | Create podman zvol
  when: zfs_root
  zfs:
    name: rpool/podman
    state: present
    extra_zfs_properties:
      volsize: '{{ "30GB" | human_to_bytes | string }}'
  register: zfs_zvol_podman
  become: true
  tags:
    - podman

- name: install | Create ext4 filesystem on podman zvol
  when: not (ansible_check_mode and zfs_zvol_podman.changed) and zfs_root
  filesystem:
    fstype: ext4
    dev: /dev/zvol/rpool/podman
    resizefs: true
  become: true
  tags:
    - podman

# Older hosts mounted the zvol at /var/lib/containers/storage. We now mount
# it one level higher at /var/lib/containers so a sibling /rootless dir on
# the same volume can hold per-user rootless storage. On upgrade, sink the
# existing zvol contents into a storage/ subdir before remounting so podman
# still finds its graphroot at /var/lib/containers/storage.
- name: install | Detect existing zvol mount target
  when: zfs_root
  command: findmnt -no TARGET /dev/zvol/rpool/podman
  register: podman_zvol_mount
  changed_when: false
  failed_when: false
  check_mode: false
  become: true
  tags:
    - podman

- name: install | Migrate zvol layout to /var/lib/containers
  when:
    - zfs_root
    - podman_zvol_mount.rc == 0
    - podman_zvol_mount.stdout == "/var/lib/containers/storage"
  become: true
  block:
    - name: install | Stop podman.socket before remount
      systemd:
        name: podman.socket
        state: stopped

    # podman's overlay graph driver leaves a self-bind at
    # /var/lib/containers/storage/overlay (for metacopy). The mount module's
    # `state: unmounted` calls plain umount and would fail with EBUSY; -R
    # tears the bind down with the main mount.
    - name: install | Recursively unmount old location
      command: umount -R /var/lib/containers/storage

    - name: install | Move zvol root contents into storage/
      shell: |
        set -euo pipefail
        tmp=$(mktemp -d)
        mount /dev/zvol/rpool/podman "$tmp"
        cd "$tmp"
        mkdir -p storage
        shopt -s dotglob nullglob
        for f in *; do
          [ "$f" = "storage" ] && continue
          [ "$f" = "lost+found" ] && continue
          mv -- "$f" storage/
        done
        cd /
        umount "$tmp"
        rmdir "$tmp"
      args:
        executable: /bin/bash

    - name: install | Drop fstab entry for old mount
      mount:
        path: /var/lib/containers/storage
        state: absent
  tags:
    - podman

- name: install | Mount podman zvol
  when: zfs_root
  mount:
    path: /var/lib/containers
    src: /dev/zvol/rpool/podman
    fstype: ext4
    # x-systemd.requires=zfs-volumes.target gates the mount on ZFS
    # finishing pool import + zvol exposure. systemd-fstab-generator
    # already adds an implicit dep on the device unit, but the
    # explicit target dep removes any reliance on udev winning the
    # race against systemd's device-wait timeout.
    opts: defaults,noatime,x-systemd.requires=zfs-volumes.target
    state: mounted
    backup: true
  become: true
  tags:
    - podman
