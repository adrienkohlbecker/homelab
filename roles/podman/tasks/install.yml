# Route podman + its userspace stack through noble on jammy. The
# full pin list lives in podman_backport_packages so the pin file's
# `Package:` line and the upgrade task share a single source of
# truth. The role exports podman_backports_updated (derived from
# backports_args.name), consumed by main.yml's `Enable podman.socket`
# task to force a restart when noble's binary replaced jammy's
# underneath the running daemon.
- name: install | Apply podman backports pin + upgrade (jammy)
  import_role:
    name: backports
    tasks_from: pin
  vars:
    backports_args:
      name: podman
      packages: '{{ podman_backport_packages }}'
  tags:
    - podman

# man-db is dragged in so systemd-analyze's man-page reference check
# passes when verifying our units; python3-tomli backs the TOML
# `validate:` on the storage.conf write below (jammy ships python 3.10,
# whose stdlib has no tomllib).
#
# Older releases need iptables: netavark's iptables firewall_driver
# shells out to /usr/sbin/iptables for --publish port forwarding, and
# the firewall role's cohabitation-cleanup task pokes `ip filter`
# policies via the same binary. Without it container start fails with
# the misleading "Error: netavark: No such file or directory" (it's
# iptables that's missing, not netavark). Resolute+ runs netavark on
# the native nftables driver and has no iptables-nft compat tables to
# clean up — drop the dependency so `iptables -L` doesn't silently
# resurrect empty `ip filter` chains. Drop releases from this list as
# they age out.
- name: install | Install podman
  apt:
    pkg: "{{ ['podman', 'aardvark-dns', 'netavark', 'passt', 'man-db', 'python3-tomli']
             + (['iptables'] if ansible_distribution_release in ['jammy', 'noble'] else []) }}"
    policy_rc_d: 101
    cache_valid_time: 3600
  register: podman_apt
  become: true
  tags:
    - podman

# /etc/containers/containers.conf is for user overrides; the package
# ships defaults at /usr/share/containers/containers.conf and won't
# create the /etc/ copy. ini_file (with create=true) materialises
# the [network] section as a small overlay file and merges its keys
# in below in idempotent fashion.
#
# - network_backend: force netavark. Otherwise podman auto-detects
#   and stays on CNI when any CNI network already exists; CNI
#   doesn't wire DNS without the dnsname plugin (deprecated). With
#   netavark + aardvark-dns container-name resolution Just Works on
#   user-created networks. Existing CNI hosts need a one-shot
#   manual `podman system reset --force` to drop leaked iptables
#   rules.
# - dns_bind_port: move aardvark-dns off port 53 so it doesn't fight
#   with services (pihole) that bind on the bridge-gateway interface.
#   netavark redirects container DNS queries to gateway:5333 via
#   iptables; nothing on the host changes from the container POV.
# - default_subnet_pools: shrink the upstream 5-range list to just
#   podman_bridge_pool. The firewall INPUT accept for aardvark-dns and
#   homeassistant's trusted_proxies are scoped to that prefix; if podman
#   ever auto-allocated a named bridge from the wider 10.90.0.0/15
#   (etc) ranges, container-name DNS would silently fail and HA would
#   reject X-Forwarded-For from a "stranger" gateway. Pinning to a
#   single range with size 24 gives us 256 named bridges before
#   exhaustion (vs. ~7 today) and turns "ran out of pool" into a loud
#   create-time error rather than a quiet drift into untrusted space.
# - default_subnet: pin the *default* podman network's subnet to
#   podman_default_network. Podman's compiled-in default happens to
#   equal it today, so the firewall's PODMAN_DEFAULT egress/DNS rules
#   and pihole's upstream line up by coincidence; pinning makes it
#   explicit so an upstream change to the built-in default can't
#   silently move the default network out from under those rules.
# - firewall_driver: native nftables, not iptables-nft compat. Lands
#   netavark's rules in `inet netavark` instead of `ip filter`/
#   `ip nat`. The driver was added in netavark 1.10 (Jun 2024). Ubuntu
#   has been frozen on netavark 1.4.0-4 across jammy and noble (the
#   backport pin doesn't help — noble itself shipped 1.4.0), so the
#   setting would be silently ignored on those releases. Gate to
#   resolute+, where the archive is expected to carry 1.10+. Drop
#   releases from the absent-list as they age out *and* their netavark
#   crosses 1.10.
# - default_rootless_network_cmd: back rootless egress with pasta
#   instead of the slirp4netns default. Rootless-only key (rootful
#   podman ignores it), so it's consulted just on the hosts that run
#   rootless podman -- the CI runners (github_runner / gitea_runner) --
#   and is inert everywhere else. pasta shares passt's robust UDP
#   datapath, so a rootless container's outbound DNS/UDP no longer drops
#   datagrams under load the way slirp4netns does. Needs podman >= 4.4
#   and the pasta binary: both hold fleet-wide (the backport pin routes
#   podman 4.9 + passt to jammy, noble ships them natively), so it's
#   ungated. Takes effect on the next container create -- the runners'
#   per-job containers pick it up without a daemon restart.
- name: install | Configure podman containers.conf [network]
  community.general.ini_file:
    path: /etc/containers/containers.conf
    section: network
    option: "{{ item.key }}"
    value: "{{ item.value }}"
    state: "{{ item.state | default('present') }}"
    create: true
    backup: true
    owner: root
    group: root
    mode: "0644"
  loop:
    - { key: network_backend,              value: '"netavark"' }
    - { key: default_rootless_network_cmd, value: '"pasta"' }
    - { key: dns_bind_port,                value: '5333' }
    - { key: default_subnet,               value: '"{{ podman_default_network }}"' }
    - { key: default_subnet_pools,         value: '[{"base" = "{{ podman_bridge_pool }}", "size" = 24}]' }
    - key: firewall_driver
      value: '"nftables"'
      state: "{{ 'absent' if ansible_distribution_release in ['jammy', 'noble'] else 'present' }}"
  register: podman_containers_conf_network
  become: true
  tags:
    - podman

# Re-create netavark's firewall rules and DNS resolver under the
# possibly-new firewall_driver / dns_bind_port. Aardvark-dns reads
# dns_bind_port once at launch and keeps the port for its lifetime;
# `podman network reload --all` tears down and respawns it with the
# new config. Same flow covers a flip from iptables-nft compat to
# native nft: NETAVARK_FORWARD / NETAVARK-HOSTPORT-* move out of
# `ip filter` and `ip nat` into the new `inet netavark` table.
# No-op on a fresh host with no networks.
#
# Ordering: site.yml runs this role before `firewall`, so a
# firewall_driver flip re-creates netavark's `inet netavark` table here
# and the firewall role re-establishes its own tables + policy later in
# the same converge. Don't run podman alone (`--tags podman`) across a
# driver flip without a firewall pass behind it, or the host is left
# mid-transition.
- name: install | Reload netavark firewall + dns after containers.conf change
  when: podman_containers_conf_network.changed and not ansible_check_mode
  command: podman network reload --all
  changed_when: true
  become: true
  tags:
    - podman

# Ubuntu's golang-github-containers-common (0.57.4 -- the newest in either
# jammy or noble, and already pinned forward by the backport list above)
# ships a default seccomp profile that predates the fchmodat2 syscall
# (added in kernel 6.6). On the HWE 6.x kernel, GNU tar 1.35+ routes
# directory chmods through fchmodat2; the profile's default SCMP_ACT_ERRNO
# then blocks it (EPERM), so any image whose entrypoint extracts+chmods its
# tree at boot breaks -- roundcube's webroot was the first casualty (every
# dir stayed 0700 -> apache 403). libseccomp 2.5.3 already resolves the
# name; only the profile's allow-list lacks it, so backporting libseccomp
# wouldn't help. Derive an augmented profile (live default + fchmodat2) and
# make it podman's default. Purely additive -- no existing container that
# already starts can regress. Picked up at the next container (re)create;
# no daemon reload needed. Full writeup: notes/podman_seccomp_fchmodat2.md.
#
# Gated on `not (ansible_check_mode and podman_apt.changed)`: the stock
# profile ships with golang-github-containers-common, pulled in by the
# `Install podman` apt task above. In check mode on a fresh host that apt
# only *reports*, so the file isn't there yet and the slurp would hard-fail;
# skip the trio in that case. Same guard on all three so the template never
# references an unset podman_seccomp_stock. On a converged host (apt no-op)
# or any real apply, they run normally.
- name: install | Read stock seccomp profile
  when: not (ansible_check_mode and podman_apt.changed)
  slurp:
    src: /usr/share/containers/seccomp.json
  register: podman_seccomp_stock
  become: true
  tags:
    - podman

- name: install | Install seccomp profile with fchmodat2 allowed
  when: not (ansible_check_mode and podman_apt.changed)
  template:
    src: seccomp.json.j2
    dest: /etc/containers/seccomp-fchmodat2.json
    owner: root
    group: root
    mode: "0644"
    backup: true
    validate: python3 -c 'import json,sys; json.load(open(sys.argv[1]))' "%s"
  become: true
  tags:
    - podman

- name: install | Set fchmodat2 seccomp profile as podman default
  when: not (ansible_check_mode and podman_apt.changed)
  community.general.ini_file:
    path: /etc/containers/containers.conf
    section: containers
    option: seccomp_profile
    value: '"/etc/containers/seccomp-fchmodat2.json"'
    create: true
    backup: true
    owner: root
    group: root
    mode: "0644"
  become: true
  tags:
    - podman

# 0755 (up from the 0700 the dir is first created with) lets netdata's
# disk-space collector traverse to the mountpoint. The value is
# load-bearing on zfs_root hosts: this task runs before the zvol mount,
# so on the second converge it sees the zvol's ext4 root, which mkfs
# makes 0755 — matching that keeps the task idempotent. Tightening it
# (e.g. 0711) fights the mkfs default and the task never converges.
- name: install | Update containers permissions for netdata disk space monitoring
  file:
    dest: /var/lib/containers
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true
  tags:
    - podman

# Required input — set per-host in group_vars (prod 50GB, test 15GB),
# not defaulted in vars/main.yml per the repo's required-input rule. An
# unset value would sail through the shrink-guard (`'' | int` == 0) and
# fail the zvol create below with an opaque empty-volsize error.
- name: install | Assert podman_zvol_size is set
  when: zfs_root
  assert:
    that:
      - podman_zvol_size is defined
      - (podman_zvol_size | int) > 0
    fail_msg: >-
      podman_zvol_size must be set (bytes) in group_vars/host_vars for
      zfs_root hosts; got {{ podman_zvol_size | default('<unset>') }}.
  tags:
    - podman

# community.general.filesystem with resizefs: true only grows ext4,
# never shrinks. The `zfs:` task below happily accepts any volsize as
# a property change -- including a shrink under a live, larger ext4,
# which silently leaves the fs writing past end-of-device until the
# next overlay mkdir trips ENOMEM. (Incident 2026-05-17: pihole list
# update failed with "cannot allocate memory" after the zvol had been
# shrunk from a manually-grown 50G back to the role's 30G.) Bail before
# the shrink lands; the only safe path is offline e2fsck + resize2fs +
# zfs set volsize, then commit the new size here.
- name: install | Read current podman zvol size
  when: zfs_root
  command: zfs get -Hp -o value volsize rpool/podman
  register: podman_zvol_current
  changed_when: false
  failed_when: false
  check_mode: false
  become: true
  tags:
    - podman

- name: install | Refuse to shrink podman zvol
  when:
    - zfs_root
    - podman_zvol_current.rc == 0
  assert:
    that: (podman_zvol_size | int) >= (podman_zvol_current.stdout | int)
    fail_msg: >-
      Refusing to shrink rpool/podman from {{ podman_zvol_current.stdout }}
      to {{ podman_zvol_size }} bytes -- would corrupt the ext4 inside. To
      shrink: stop podman services, umount /var/lib/containers, grow zvol
      back, e2fsck -fy, resize2fs to target, then shrink zvol.
  tags:
    - podman

- name: install | Create podman zvol
  when: zfs_root
  zfs:
    name: rpool/podman
    state: present
    extra_zfs_properties:
      volsize: '{{ podman_zvol_size }}'
  register: podman_zfs_zvol
  become: true
  tags:
    - podman

# In test envs the chown phase of `--uidmap=+0:N:1` image extraction
# (e.g. homeassistant's 1.2 GB image) is bottlenecked on per-file
# lchown -> ext4 journal -> zvol fsync. sync=disabled makes those
# writes async; safe because qemu_test storage is wiped between runs.
- name: install | (test) Disable sync on podman zvol for fast chown
  when: zfs_root and qemu_test
  zfs:
    name: rpool/podman
    state: present
    extra_zfs_properties:
      sync: disabled
  become: true
  tags:
    - podman

- name: install | Create ext4 filesystem on podman zvol
  when: not (ansible_check_mode and podman_zfs_zvol.changed) and zfs_root
  filesystem:
    fstype: ext4
    dev: /dev/zvol/rpool/podman
    resizefs: true
  become: true
  tags:
    - podman

- name: install | Mount podman zvol
  when: zfs_root
  mount:
    path: /var/lib/containers
    src: /dev/zvol/rpool/podman
    fstype: ext4
    # x-systemd.requires=zfs-volumes.target gates the mount on ZFS
    # finishing pool import + zvol exposure. systemd-fstab-generator
    # already adds an implicit dep on the device unit, but the
    # explicit target dep removes any reliance on udev winning the
    # race against systemd's device-wait timeout.
    opts: defaults,noatime,x-systemd.requires=zfs-volumes.target
    state: mounted
    backup: true
  become: true
  tags:
    - podman

# Rootless storage lives on the same zvol under /rootless/$USER. Sticky-bit
# 1777 (like /tmp) lets each user create and own their own subdir without
# being able to touch anyone else's. The mode is load-bearing — a user
# needs write+traverse on the parent to create its own store — so it can't
# be tightened. The residual first-touch risk (a hostile local account
# pre-creating another user's not-yet-existing subdir) is out of scope:
# every rootless consumer is an ansible-provisioned service user, on
# single-operator hosts with no untrusted local logins.
- name: install | Create rootless storage parent
  when: zfs_root
  file:
    path: /var/lib/containers/rootless
    state: directory
    owner: root
    group: root
    mode: "1777"
  become: true
  tags:
    - podman

# Drop-ins under /etc/containers/storage.conf.d/ aren't loaded in rootless
# mode on podman 4.9, so we have to write the main file directly. The driver
# is set explicitly to silence the "A driver was picked automatically"
# warning when containers-common's default storage.conf is absent.
#
# runroot and graphroot must be set explicitly even though they match the
# upstream defaults: containers/storage's TOML loader unconditionally
# overwrites these fields from the parsed config, so leaving them blank
# clobbers the rootful defaults with empty strings and breaks rootful
# podman with "runroot must be set". Rootless ignores both — its codepath
# rebuilds a fresh options struct from XDG_RUNTIME_DIR and
# rootless_storage_path.
# Lives in install.yml (not main.yml) so consumers that import only
# `tasks_from: install` (homeassistant/healthchecks/nexus _setup.yml)
# also get the storage config.
- name: install | Configure podman storage
  when: zfs_root
  vars:
    # Native overlay learned idmapped-mount support in kernel 5.19.
    # On older kernels (jammy stock = 5.15) a --uidmap container start
    # falls through to the storage-chown-by-maps copy-up — walk the
    # layer and lchown every file to the host uid — which EIOs on
    # device nodes baked into the layer (dev/console/dev/null in the
    # linuxserver/* base images) and aborts the start. fuse-overlayfs
    # implements idmap in userspace and skips the kernel chown-by-maps
    # path entirely, so it works under 5.15. Bare-metal lab/pug ride HWE
    # 6.x and the native idmapped-mount probe succeeds there, so they
    # don't need the userspace shim.
    _podman_storage_needs_fuse_overlayfs: "{{ ansible_facts.kernel is version('5.19', '<') }}"
  copy:
    dest: /etc/containers/storage.conf
    content: |
      [storage]
      driver = "overlay"
      runroot = "/run/containers/storage"
      graphroot = "/var/lib/containers/storage"
      rootless_storage_path = "/var/lib/containers/rootless/$USER"
      {% if _podman_storage_needs_fuse_overlayfs %}

      [storage.options.overlay]
      mount_program = "/usr/bin/fuse-overlayfs"
      {% endif %}
    owner: root
    group: root
    mode: "0644"
    backup: true
    # Parse as TOML so a jinja typo in the fuse-overlayfs branch fails
    # here; containers/storage otherwise accepts-then-defaults a broken
    # file and breaks rootful podman with "runroot must be set".
    validate: python3 -c 'import tomli, sys; tomli.load(open(sys.argv[1], "rb"))' %s
  become: true
  tags:
    - podman

- name: install | Remove obsolete storage.conf.d drop-in
  when: zfs_root
  file:
    path: /etc/containers/storage.conf.d/rootless-zvol.conf
    state: absent
  become: true
  tags:
    - podman
