# Route podman + its userspace stack through noble on jammy. The
# full pin list lives in podman_backport_packages so the pin file's
# `Package:` line and the upgrade task share a single source of
# truth. The role exports podman_backports_updated (derived from
# backports_name), consumed by main.yml's `Enable podman.socket`
# task to force a restart when noble's binary replaced jammy's
# underneath the running daemon.
- name: install | Apply podman backports pin + upgrade (jammy)
  import_role:
    name: backports
    tasks_from: pin
  vars:
    backports_name: podman
    backports_packages: '{{ podman_backport_packages }}'
  tags:
    - podman

- name: install | Install packages
  apt:
    name:
      - man-db # to pass systemd-analyze verification
    cache_valid_time: 3600
  become: true
  tags:
    - podman

- name: install | Install podman
  apt:
    pkg:
      - podman
      - aardvark-dns
      - netavark
      # podman only Suggests iptables, but netavark shells out to it to set up
      # --publish port forwarding. Without it, container start fails with the
      # misleading "Error: netavark: No such file or directory" (it's iptables
      # that's missing, not netavark).
      - iptables
    policy_rc_d: 101
    cache_valid_time: 3600
  register: podman_apt
  become: true
  tags:
    - podman

# /etc/containers/containers.conf is for user overrides; the package
# ships defaults at /usr/share/containers/containers.conf and won't
# create the /etc/ copy. ini_file (with create=true) materialises
# the [network] section as a small overlay file and merges its keys
# in below in idempotent fashion.
#
# - network_backend: force netavark. Otherwise podman auto-detects
#   and stays on CNI when any CNI network already exists; CNI
#   doesn't wire DNS without the dnsname plugin (deprecated). With
#   netavark + aardvark-dns container-name resolution Just Works on
#   user-created networks. Existing CNI hosts need a one-shot
#   manual `podman system reset --force` to drop leaked iptables
#   rules.
# - dns_bind_port: move aardvark-dns off port 53 so it doesn't fight
#   with services (pihole) that bind on the bridge-gateway interface.
#   netavark redirects container DNS queries to gateway:5333 via
#   iptables; nothing on the host changes from the container POV.
# - firewall_driver: native nftables, not iptables-nft compat. Lands
#   netavark's rules in `inet netavark` instead of `ip filter`/
#   `ip nat`. Our `ip homelab` table is independent either way; the
#   FORWARD `ct status dnat` rule matches on conntrack tagging, not
#   on which framework did the DNAT, so published-port reachability
#   is unchanged. Requires netavark 1.10+ (noble ships 1.12+, on
#   jammy we get it via the noble backport pin above).
- name: install | Configure podman containers.conf [network]
  community.general.ini_file:
    path: /etc/containers/containers.conf
    section: network
    option: "{{ item.key }}"
    value: "{{ item.value }}"
    create: true
    backup: true
    owner: root
    group: root
    mode: "0644"
  loop:
    - { key: network_backend,  value: '"netavark"' }
    - { key: dns_bind_port,    value: '5333' }
    - { key: firewall_driver,  value: '"nftables"' }
  register: containers_conf_network
  become: true
  tags:
    - podman

# aardvark-dns reads dns_bind_port at launch and keeps the port for
# its lifetime. netavark spawns it on first need and leaves it
# running, so a containers.conf change won't take effect until the
# process is killed; netavark respawns it with the new port on the
# next network operation. pkill is a no-op when aardvark isn't
# running yet (e.g. on a fresh install), so we don't gate beyond
# the config-change check.
- name: install | Restart aardvark-dns after containers.conf change
  when: containers_conf_network.changed and not ansible_check_mode
  command: pkill -9 aardvark-dns
  register: aardvark_kill
  failed_when: aardvark_kill.rc not in [0, 1]
  changed_when: aardvark_kill.rc == 0
  become: true
  tags:
    - podman

# Re-create netavark's firewall rules under the (possibly new)
# firewall_driver. On a flip from iptables-nft compat to native nft,
# this moves NETAVARK_FORWARD / NETAVARK-HOSTPORT-* out of `ip filter`
# and `ip nat` into the new `inet netavark` table. No-op on a fresh
# host with no networks, so the gate on the config change is enough.
- name: install | Reload netavark firewall rules after containers.conf change
  when: containers_conf_network.changed and not ansible_check_mode
  command: podman network reload --all
  changed_when: true
  become: true
  tags:
    - podman

- name: install | Update containers permissions for netdata disk space monitoring
  file:
    dest: /var/lib/containers
    state: directory
    owner: root
    group: root
    mode: "0755" # defaults to 0700
  become: true
  tags:
    - podman

- name: install | Create podman zvol
  when: zfs_root
  zfs:
    name: rpool/podman
    state: present
    extra_zfs_properties:
      volsize: '{{ podman_zvol_size }}'
  register: zfs_zvol_podman
  become: true
  tags:
    - podman

# In test envs the chown phase of `--uidmap=+0:N:1` image extraction
# (e.g. homeassistant's 1.2 GB image) is bottlenecked on per-file
# lchown -> ext4 journal -> zvol fsync. sync=disabled makes those
# writes async; safe because qemu_test storage is wiped between runs.
- name: install | (test) Disable sync on podman zvol for fast chown
  when: zfs_root and qemu_test
  zfs:
    name: rpool/podman
    state: present
    extra_zfs_properties:
      sync: disabled
  become: true
  tags:
    - podman

- name: install | Create ext4 filesystem on podman zvol
  when: not (ansible_check_mode and zfs_zvol_podman.changed) and zfs_root
  filesystem:
    fstype: ext4
    dev: /dev/zvol/rpool/podman
    resizefs: true
  become: true
  tags:
    - podman

# Older hosts mounted the zvol at /var/lib/containers/storage. We now mount
# it one level higher at /var/lib/containers so a sibling /rootless dir on
# the same volume can hold per-user rootless storage. On upgrade, sink the
# existing zvol contents into a storage/ subdir before remounting so podman
# still finds its graphroot at /var/lib/containers/storage.
- name: install | Detect existing zvol mount target
  when: zfs_root
  command: findmnt -no TARGET /dev/zvol/rpool/podman
  register: podman_zvol_mount
  changed_when: false
  failed_when: false
  check_mode: false
  become: true
  tags:
    - podman

- name: install | Migrate zvol layout to /var/lib/containers
  when:
    - zfs_root
    - podman_zvol_mount.rc == 0
    - podman_zvol_mount.stdout == "/var/lib/containers/storage"
  become: true
  block:
    - name: install | Stop podman.socket before remount
      systemd:
        name: podman.socket
        state: stopped

    # podman's overlay graph driver leaves a self-bind at
    # /var/lib/containers/storage/overlay (for metacopy). The mount module's
    # `state: unmounted` calls plain umount and would fail with EBUSY; -R
    # tears the bind down with the main mount.
    - name: install | Recursively unmount old location
      command: umount -R /var/lib/containers/storage

    - name: install | Move zvol root contents into storage/
      shell: |
        set -euo pipefail
        tmp=$(mktemp -d)
        mount /dev/zvol/rpool/podman "$tmp"
        cd "$tmp"
        mkdir -p storage
        shopt -s dotglob nullglob
        for f in *; do
          [ "$f" = "storage" ] && continue
          [ "$f" = "lost+found" ] && continue
          mv -- "$f" storage/
        done
        cd /
        umount "$tmp"
        rmdir "$tmp"
      args:
        executable: /bin/bash

    - name: install | Drop fstab entry for old mount
      mount:
        path: /var/lib/containers/storage
        state: absent
  tags:
    - podman

- name: install | Mount podman zvol
  when: zfs_root
  mount:
    path: /var/lib/containers
    src: /dev/zvol/rpool/podman
    fstype: ext4
    # x-systemd.requires=zfs-volumes.target gates the mount on ZFS
    # finishing pool import + zvol exposure. systemd-fstab-generator
    # already adds an implicit dep on the device unit, but the
    # explicit target dep removes any reliance on udev winning the
    # race against systemd's device-wait timeout.
    opts: defaults,noatime,x-systemd.requires=zfs-volumes.target
    state: mounted
    backup: true
  become: true
  tags:
    - podman

# Rootless storage lives on the same zvol under /rootless/$USER. Sticky-bit
# 1777 (like /tmp) lets each user create and own their own subdir without
# being able to touch anyone else's.
- name: install | Create rootless storage parent
  when: zfs_root
  file:
    path: /var/lib/containers/rootless
    state: directory
    owner: root
    group: root
    mode: "1777"
  become: true
  tags:
    - podman

# Drop-ins under /etc/containers/storage.conf.d/ aren't loaded in rootless
# mode on podman 4.9, so we have to write the main file directly. The driver
# is set explicitly to silence the "A driver was picked automatically"
# warning when containers-common's default storage.conf is absent.
#
# runroot and graphroot must be set explicitly even though they match the
# upstream defaults: containers/storage's TOML loader unconditionally
# overwrites these fields from the parsed config, so leaving them blank
# clobbers the rootful defaults with empty strings and breaks rootful
# podman with "runroot must be set". Rootless ignores both — its codepath
# rebuilds a fresh options struct from XDG_RUNTIME_DIR and
# rootless_storage_path.
# Lives in install.yml (not main.yml) so consumers that import only
# `tasks_from: install` (homeassistant/healthchecks/nexus _setup.yml)
# also get the storage config.
- name: install | Configure podman storage
  when: zfs_root
  copy:
    dest: /etc/containers/storage.conf
    content: |
      [storage]
      driver = "overlay"
      runroot = "/run/containers/storage"
      graphroot = "/var/lib/containers/storage"
      rootless_storage_path = "/var/lib/containers/rootless/$USER"
    owner: root
    group: root
    mode: "0644"
  become: true
  tags:
    - podman

- name: install | Remove obsolete storage.conf.d drop-in
  when: zfs_root
  file:
    path: /etc/containers/storage.conf.d/rootless-zvol.conf
    state: absent
  become: true
  tags:
    - podman
