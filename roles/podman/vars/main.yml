# Packages routed to noble on jammy via /etc/apt/preferences.d/backports-podman.
# Both files/backports-podman.j2 (the pin file) and tasks/install.yml's
# `Upgrade backports-pinned packages` task read from this list, so the pin
# and the explicit-upgrade can't drift out of sync. Binaries + their
# tightly-versioned libs; transitive deps come along through Depends.
podman_backport_packages:
  - podman
  - buildah
  - containernetworking-plugins
  - conmon
  - slirp4netns
  - libc6
  - libgpgme11t64
  - libsubid4
  - libc-bin
  - golang-github-containers-common
  - fuse-overlayfs
  - libglib2.0-0t64
  - locales
  - libfuse3-3
  - fuse3
  - netavark
  - aardvark-dns
