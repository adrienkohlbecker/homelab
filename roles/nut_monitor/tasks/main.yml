- name: Assert required inputs when monitoring is enabled
  when: nut_monitor_enabled | default(false)
  assert:
    that:
      - nut_upsmon_password | default('') | length > 0
      - nut_monitor_ups | default('') | length > 0
      - "'@' in (nut_monitor_ups | default(''))"
    fail_msg: nut_monitor_enabled requires a vaulted nut_upsmon_password and a nut_monitor_ups of the form <upsname>@<host> in host_vars/group_vars
  tags:
    - nut_monitor

# nut-notify delivers via the bare `mail` binary (mailutils, from the postfix
# role ordered before nut in site.yml). Fail loudly at converge if a host
# enables monitoring without it, rather than discovering the gap during a real
# outage when the notification silently never sends.
- name: Assert mail is available when monitoring is enabled
  when: nut_monitor_enabled | default(false)
  command: which mail
  changed_when: false
  tags:
    - nut_monitor

- name: Install nut
  apt:
    pkg:
      - nut-client
    cache_valid_time: 3600
  become: true
  register: nut_monitor_apt
  tags:
    - nut_monitor

# upsmon.conf/upssched.conf carry no validate: -- NUT ships no offline config
# checker (the daemons only parse at startup) and the whitespace-directive
# format isn't INI, so there's no real parser to invent. nut-notify below
# validates with `bash -n` since it is a script.
- name: Configure nut upsmon.conf
  when: not (ansible_check_mode and nut_monitor_apt.changed)
  template:
    src: upsmon.conf.j2
    dest: /etc/nut/upsmon.conf
    backup: true
    owner: root
    group: nut
    mode: "0640"
  become: true
  register: nut_monitor_upsmon_conf
  tags:
    - nut_monitor

- name: Configure nut upssched.conf
  when: not (ansible_check_mode and nut_monitor_apt.changed)
  copy:
    src: upssched.conf
    dest: /etc/nut/upssched.conf
    backup: true
    owner: root
    group: nut
    mode: "0640"
  become: true
  register: nut_monitor_upssched_conf
  tags:
    - nut_monitor

- name: Configure nut-notify
  template:
    src: nut-notify.sh.j2
    dest: /usr/local/bin/nut-notify
    owner: root
    group: root
    mode: "0755"
    backup: true
    validate: bash -n %s
  become: true
  tags:
    - nut_monitor

# Only start the unit on hosts that actually monitor a UPS. Without a
# MONITOR line in upsmon.conf, nut 2.8+ (resolute) bails with "Fatal
# error: insufficient power configured!" -- the daemon has nothing to
# do anyway. nut_monitor_enabled defaults to false (see upsmon.conf.j2);
# hosts that flip it true also get the MONITOR + MINSUPPLIES lines.
# start: gates on qemu_test so a fixture that enables monitoring still only
# enables (not starts) the unit -- the box has no real UPS to reach.
- name: Enable nut_client service
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      # nut-client.service is a symlink to nut-monitor.service (the upsmon
      # unit); unlike nut-driver, the name doesn't shift across releases, so no
      # version branch is needed here (cf. nut_server's nut-driver@eaton).
      src: nut-client
      condition: "{{ (nut_monitor_enabled | default(false)) and not (ansible_check_mode and nut_monitor_apt.changed) }}"
      start: "{{ not qemu_test }}"
      # reload (not restart) so a config change keeps any in-flight upssched
      # timer (ONBATT/COMMBAD debounce) alive. Requires nut 2.8: the 2.7.4
      # packaged unit ships no ExecReload (CanReload=no); 2.8's nut-monitor.service
      # does (ExecReload=/sbin/upsmon -c reload). nut-notify is never a trigger --
      # upssched exec's it fresh per event, so a script-only change needs nothing.
      reload: "{{ nut_monitor_upsmon_conf.changed or nut_monitor_upssched_conf.changed }}"
  tags:
    - nut_monitor
