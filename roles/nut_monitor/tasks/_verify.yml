# Functional check of the notify path: upsd -> upsc -> nut-notify -> mail.
# Test-only and destructive (starts upsd, writes /etc/nut, drops a mail
# shim) -- fine, the box is torn down afterwards. _setup installs nut-server
# + the bash functions.sh nut-notify sources; converge runs with
# nut_monitor_enabled false (box has no UPS), so this drives nut-notify
# directly rather than through a live upsmon.

# nut-notify calls bare `mail`; functions.sh pins PATH with /usr/local/bin
# ahead of /usr/bin, so this shim wins and lets us capture the message
# instead of needing a real MTA on the box.
- name: _verify | Install a capturing mail shim
  copy:
    dest: /usr/local/bin/mail
    mode: "0755"
    content: |
      #!/bin/bash
      { printf 'ARGS: %s\n' "$*"; cat; } >>/tmp/nut-mail.out
  become: true

# Installing nut-server may auto-start its packaged upsd; stop it so our
# own foreground upsd can bind 127.0.0.1:3493.
- name: _verify | Stop the packaged nut-server
  systemd:
    name: nut-server
    state: stopped
  failed_when: false
  become: true

- name: _verify | Start the dummy-ups driver and a fresh upsd
  shell: |
    upsdrvctl -u root stop 2>/dev/null || true
    pkill -x upsd 2>/dev/null || true
    upsdrvctl -u root start eaton
    upsd -u root
  args:
    executable: /bin/bash
  changed_when: false
  become: true

# Wait for the real published status, not just rc 0: a freshly-started
# dummy-ups answers immediately but can briefly report WAIT before its
# first poll lands.
- name: _verify | Wait for the dummy UPS to publish its status
  command: upsc {{ nut_monitor_ups }} ups.status
  register: nut_monitor_upsc_wait
  until: nut_monitor_upsc_wait.stdout == "OB DISCHRG"
  retries: 15
  delay: 1
  changed_when: false
  become: true

# Names upssched feeds to CMDSCRIPT: START-TIMER's timer name, EXECUTE's
# command, and CANCEL-TIMER's optional already-fired command. Every one must
# resolve to a case arm in nut-notify -- this is the guard that would have
# caught the SHUTDOWN/powerdown mismatch.
- name: _verify | Enumerate the events upssched dispatches to nut-notify
  command: >-
    awk '/^AT /{ if ($4 == "START-TIMER") print $5;
    else if ($4 == "CANCEL-TIMER") print $6;
    else if ($4 == "EXECUTE") print $5 }' /etc/nut/upssched.conf
  register: nut_monitor_dispatched
  changed_when: false
  become: true

- name: _verify | Reset the mail capture
  copy:
    dest: /tmp/nut-mail.out
    mode: "0644"
    content: ""
  become: true

- name: _verify | Every dispatched event is handled by nut-notify (exit 0, mail sent)
  command: /usr/local/bin/nut-notify {{ item }}
  loop: "{{ nut_monitor_dispatched.stdout_lines }}"
  changed_when: false
  become: true

- name: _verify | Live UPS status reached the mail (upsc dump + field extraction)
  command: grep -qF "{{ item }}" /tmp/nut-mail.out
  loop:
    - "Status: OB DISCHRG"
    - "Battery charge: 42"
  changed_when: false
  become: true

- name: _verify | Stop upsd to simulate an unreachable UPS
  command: pkill -x upsd
  register: nut_monitor_pkill
  failed_when: nut_monitor_pkill.rc not in [0, 1]
  changed_when: false
  become: true

- name: _verify | Clear the mail capture
  copy:
    dest: /tmp/nut-mail.out
    mode: "0644"
    content: ""
  become: true

# The errexit-tolerance fix: the events that fire when the UPS is gone must
# still mail, falling back to "unknown" rather than aborting before `mail`.
- name: _verify | Notification still mails when upsd is down
  command: /usr/local/bin/nut-notify commbad
  changed_when: false
  become: true

- name: _verify | Degraded notification falls back to unknown fields
  command: 'grep -qF "Status: unknown" /tmp/nut-mail.out'
  changed_when: false
  become: true

- name: _verify | Unknown events are rejected with a non-zero exit
  command: /usr/local/bin/nut-notify bogus
  register: nut_monitor_bogus
  failed_when: nut_monitor_bogus.rc != 1
  changed_when: false
  become: true
