# nut-notify sources /usr/local/lib/functions.sh from the bash role, which
# site.yml runs before nut_monitor. testrole.py runs only this role, so the
# _verify path that executes nut-notify needs the library deployed here.
- name: _setup | Install bash functions.sh
  import_role:
    name: bash

- name: _setup | Install dependencies
  apt:
    pkg:
      - nut-server
    install_recommends: false
    cache_valid_time: 3600
  become: true

- name: _setup | Configure a static dummy-ups
  shell: |
    set -euo pipefail

    echo "MODE=standalone" >/etc/nut/nut.conf

    cat <<EOF >/etc/nut/ups.conf
    [eaton]
        driver = dummy-ups
        port = eaton.dev
        desc = "static dummy-ups for tests"
    EOF

    # A .dev file (no TIMER) is served statically -- a .seq cycles through
    # frames and reports ups.status WAIT until the first poll lands, which
    # makes the published values non-deterministic at query time.
    cat <<EOF >/etc/nut/eaton.dev
    ups.status: OB DISCHRG
    battery.charge: 42
    battery.runtime: 900
    ups.mfr: dummy
    ups.model: evolution500
    EOF

    touch /tmp/done
  args:
    executable: /bin/bash
    creates: /tmp/done
  become: true
