# Entry point for the role's verification. The collector exercise is large,
# so it lives in _verify_collector.yml; this file just imports it.
#
# It runs on every arch: netdata installs from repo.netdata.cloud's multi-arch
# 2.x series (see roles/netdata), so netdata-plugin-chartsd resolves on arm64
# too, and the exercise is hardware-independent -- _verify_collector.yml
# overlays ghost devices plus an hdparm shim emitting canned power states, so
# it needs no real disk. The role's converge behavior (hdparm package,
# /etc/hdparm.conf, CAP_SYS_RAWIO, the udev re-apply) is exercised on every
# arch regardless.
- name: _verify | Exercise the hdparm charts.d collector
  import_tasks: _verify_collector.yml
