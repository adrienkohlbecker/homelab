- name: Install hdparm
  apt:
    pkg: hdparm
    cache_valid_time: 3600
  register: hdparm_apt
  become: true
  tags:
    - hdparm

# `hdparm -C` issues raw ATA pass-through ioctls (HDIO_DRIVE_CMD /
# SG_IO with ATA_OP_CHECKPOWERMODE1), which the kernel gates on
# CAP_SYS_RAWIO. The Debian package ships /sbin/hdparm 0755 with no
# setuid and no file capability, so non-root users would fail the
# ioctl with EPERM. The cap is reset by an apt upgrade of the hdparm
# package, so this task re-applies on every play.
#
# Note: CAP_SYS_RAWIO covers the ioctl but NOT the file open. Opening
# /dev/sdX (mode 660 root:disk) still requires the disk group, which
# netdata picks up via tasks/netdata.yml's user task.
- name: Grant hdparm CAP_SYS_RAWIO
  when: not (ansible_check_mode and hdparm_apt.changed)
  community.general.capabilities:
    path: /sbin/hdparm
    capability: cap_sys_rawio=ep
    state: present
  become: true
  tags:
    - hdparm

- name: Divert hdparm.conf
  community.general.dpkg_divert:
    path: /etc/hdparm.conf
  become: true
  tags:
    - hdparm

# Grammar (see /lib/udev/hdparm and hdparm.conf preamble): each line
# is a comment, blank, a directive (`key` / `key = value`), a device
# path opening a block (`/dev/... {`), or a closing brace -- "ANYTHING
# ELSE IS PARSED!!" per the file's own warning, with the failure mode
# being silent misconfig at next udev event. No hdparm-native parser
# exists, so this best-effort regex catches jinja-rendering accidents
# (stray quotes, uppercase setting names, etc.) by rejecting lines
# whose first non-whitespace char isn't # / lowercase / `/` / `{` /
# `}`.
- name: Copy hdparm.conf
  template:
    src: hdparm.conf.j2
    dest: /etc/hdparm.conf
    owner: root
    group: root
    mode: "0644"
    backup: true
    validate: 'grep -qvE "^[[:space:]]*[^#a-z_/{}[:space:]]" %s'
  register: hdparm_conf
  become: true
  tags:
    - hdparm

# `/etc/hdparm.conf` is re-read on every block-device udev event by
# /lib/udev/hdparm (and pm-utils' 95hdparm-apm), so triggering a
# change action on the block subsystem re-applies the config without
# a reboot. `--property-match=DEVTYPE=disk` narrows the event burst
# to whole disks -- partitions, loop, dm, md, ram are all block-
# subsystem devices the helper would early-exit on but the trigger
# still bash-forks for. The small subset of directives that aren't
# re-negotiable on a live device (`-X transfer_mode`, `-c
# io32_support`) still needs a reboot — operator's call today since
# hdparm_settings is empty on every host; revisit if anyone starts
# setting those.
- name: Re-apply hdparm.conf via udev
  when: hdparm_conf.changed
  command: udevadm trigger --action=change --subsystem-match=block --property-match=DEVTYPE=disk
  become: true
  changed_when: true
  tags:
    - hdparm
