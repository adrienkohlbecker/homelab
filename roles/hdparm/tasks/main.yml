- name: Install hdparm
  apt:
    pkg: hdparm
    cache_valid_time: 3600
  become: true
  tags:
    - hdparm

# `hdparm -C` issues raw ATA pass-through ioctls (HDIO_DRIVE_CMD /
# SG_IO with ATA_OP_CHECKPOWERMODE1), which the kernel gates on
# CAP_SYS_RAWIO. The Debian package ships /sbin/hdparm 0755 with no
# setuid and no file capability, so the netdata user (which runs the
# charts.d collector) cannot read power state — every drive reports
# `unknown=1` and hdparm_drive_unknown fires permanently. The
# capability is reset by an apt upgrade of the hdparm package, so this
# task re-applies on every play.
- name: Grant hdparm CAP_SYS_RAWIO
  community.general.capabilities:
    path: /sbin/hdparm
    capability: cap_sys_rawio+ep
    state: present
  become: true
  tags:
    - hdparm

- name: Divert hdparm.conf
  community.general.dpkg_divert:
    path: /etc/hdparm.conf
  become: true
  tags:
    - hdparm

- name: Copy hdparm.conf
  template:
    src: hdparm.conf.j2
    dest: /etc/hdparm.conf
    owner: root
    group: root
    mode: "0644"
    backup: true
  register: hdparm_conf
  become: true
  tags:
    - hdparm

# `/etc/hdparm.conf` is re-read on every block-device udev event by
# /lib/udev/hdparm (and pm-utils' 95hdparm-apm), so triggering a
# change action on the block subsystem re-applies the config without
# a reboot. The small subset of directives that aren't re-negotiable
# on a live device (`-X transfer_mode`, `-c io32_support`) still
# needs a reboot — operator's call today since hdparm_settings is
# empty on every host; revisit if anyone starts setting those.
- name: Re-apply hdparm.conf via udev
  when: hdparm_conf.changed
  command: udevadm trigger --action=change --subsystem-match=block
  become: true
  changed_when: true
  tags:
    - hdparm
