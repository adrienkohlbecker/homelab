# Health templates for hdparm.chart.sh. Bind on the shared context
# (`hdparm.power_state`) so a single template instantiates per-chart
# (per-drive); ${label:device} resolves from the CLABEL emitted in
# hdparm_create().
#
# Three templates cover the three failure modes the collector
# distinguishes:
#   hdparm_drive_active           drive spinning >8h with nothing
#                                 explaining it. Muted while any pool
#                                 on the host is scrubbing or
#                                 resilvering, via the zfs_scan chart
#                                 from roles/zfs/files/zfs_scan.chart.sh.
#                                 On hosts without zfs_scan the cross-
#                                 chart reference is NaN and the alert
#                                 is UNDEFINED -- non-issue today
#                                 because every host with rotational
#                                 drives also has zfs_root=true.
#   hdparm_drive_unknown          drive responded with a power-state
#                                 code outside the known set --
#                                 rare; SATA-link drift symptom.
#   hdparm_drive_collector_error  monitoring stack can't read this
#                                 drive at all -- missing by-id
#                                 symlink, hdparm exit non-zero, empty
#                                 output. Operationally distinct from
#                                 the drive itself reporting trouble.

template: hdparm_drive_active
      on: hdparm.power_state
   class: Utilization
    type: System
component: Disk
  lookup: min -28800s of active
    calc: $this * (1 - $zfs_scan.any_in_progress.active)
   units: bool
   every: 60s
    crit: $this == 1
   delay: down 1h
 summary: Drive ${label:device} spinning >8h
    info: Rotational drive ${label:device} has been spinning continuously for more than 8 hours without a ZFS scrub or resilver in progress -- something is keeping it from spinning down.
      to: sysadmin

template: hdparm_drive_unknown
      on: hdparm.power_state
   class: Errors
    type: System
component: Disk
  lookup: min -300s of unknown
   units: bool
   every: 60s
    crit: $this == 1
   delay: up 5m down 30m multiplier 1.5 max 2h
 summary: Drive ${label:device} reports unknown power state
    info: hdparm reports drive ${label:device} responded with a power-state code outside the known active/standby/sleeping set; often a pre-failure SATA-link symptom.
      to: sysadmin

template: hdparm_drive_collector_error
      on: hdparm.power_state
   class: Errors
    type: System
component: Disk
  lookup: min -300s of collector_error
   units: bool
   every: 60s
    crit: $this == 1
   delay: up 5m down 30m multiplier 1.5 max 2h
 summary: Drive ${label:device} unreadable by hdparm collector
    info: The netdata charts.d hdparm collector couldn't read power state for ${label:device} -- missing /dev/disk/by-id symlink, hdparm exit non-zero, or empty output. Distinct from the drive itself reporting trouble; this points at the monitoring stack.
      to: sysadmin
