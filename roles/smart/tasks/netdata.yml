- name: Configure smart metrics
  import_role:
    name: netdata
    tasks_from: config
  vars:
    netdata_args:
      src: smartctl.conf
      dest: go.d/smartctl.conf
      validate: python3 -c 'import yaml,sys; yaml.safe_load(open(sys.argv[1]))' "%s"
      condition: "{{ smart_netdata_condition | default(true) }}"
  tags:
    - smart
