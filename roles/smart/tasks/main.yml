---

- name: Install smartmontools
  import_role:
    name: apt_no_autostart
    tasks_from: apt
  vars:
    apt_no_autostart_pkg: smartmontools
    apt_no_autostart_unit: smartmontools.service
  tags:
    - smart

- name: Divert smartd.conf
  community.general.dpkg_divert:
    path: /etc/smartd.conf
  become: true
  tags:
    - smart

- name: Configure smartd
  template:
    src: smartd.conf.j2
    dest: /etc/smartd.conf
    owner: root
    group: root
    mode: "0644"
    backup: true
  register: smartd_cfg
  become: true
  tags:
    - smart

- name: Divert default smartmontools
  community.general.dpkg_divert:
    path: /etc/default/smartmontools
  become: true
  tags:
    - smart

- name: Configure smartmontools
  copy:
    src: smartmontools
    dest: /etc/default/smartmontools
    owner: root
    group: root
    mode: "0644"
    backup: true
  register: smartmontools_cfg
  become: true
  tags:
    - smart

- name: Enable smartmontools service
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_src: smartmontools
    systemd_unit_condition: "{{ not (ansible_check_mode and apt_no_autostart.changed) }}"
    systemd_unit_restart: "{{ smartd_cfg.changed or smartmontools_cfg.changed }}"
  tags:
    - smart
