---

- name: Install smartmontools
  apt:
    pkg:
      - smartmontools
    policy_rc_d: 101
    cache_valid_time: 3600
  register: smart_apt
  become: true
  tags:
    - smart

- name: Divert smartd.conf
  community.general.dpkg_divert:
    path: /etc/smartd.conf
  become: true
  tags:
    - smart

- name: Configure smartd
  template:
    src: smartd.conf.j2
    dest: /etc/smartd.conf
    owner: root
    group: root
    mode: "0644"
    backup: true
  register: smart_smartd_cfg
  become: true
  tags:
    - smart

- name: Divert default smartmontools
  community.general.dpkg_divert:
    path: /etc/default/smartmontools
  become: true
  tags:
    - smart

- name: Configure smartmontools
  copy:
    src: smartmontools
    dest: /etc/default/smartmontools
    owner: root
    group: root
    mode: "0644"
    backup: true
  register: smart_smartmontools_cfg
  become: true
  tags:
    - smart

- name: Enable smartmontools service
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: smartmontools
      condition: "{{ not (ansible_check_mode and smart_apt.changed) }}"
      restart: "{{ smart_smartd_cfg.changed or smart_smartmontools_cfg.changed }}"
  tags:
    - smart
