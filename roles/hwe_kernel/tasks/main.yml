- name: Install HWE kernel
  apt:
    pkg:
      - linux-generic-hwe-{{ ansible_distribution_version }}
    cache_valid_time: 3600
  register: kernel_apt
  become: true
  tags:
    - hwe_kernel

- name: Ask to reboot
  when: kernel_apt.changed
  file:
    path: /var/run/reboot-required
    state: touch
    owner: root
    group: root
    mode: "0644"
  become: true
  tags:
    - hwe_kernel
