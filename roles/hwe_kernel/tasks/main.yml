# Install Ubuntu's Hardware Enablement (HWE) kernel meta-package. On
# jammy this pulls noble's 6.8 kernel + matching linux-modules-*-generic,
# which is also the donor for the ZFS 2.2.x kmod paired with the
# noble-backports zfsutils userspace. See roles/zfs/tasks/main.yml (top
# docstring) for the HWE/ZFS pairing rationale. Must run before roles/zfs
# in site.yml.
- name: Install HWE kernel
  apt:
    pkg:
      - linux-generic-hwe-{{ ansible_distribution_version }}
    cache_valid_time: 3600
  register: hwe_kernel_apt
  become: true
  tags:
    - hwe_kernel

# Boot into the freshly-installed 6.8 BEFORE podman touches storage.
# Initializing the overlay store on 5.15 (no native idmapped mounts)
# makes the podman role write mount_program=fuse-overlayfs and bakes a
# `.has-mount-program=true` marker + fuse-laid layers into the ext4
# graphroot. That state would ride the image into every box_deps test
# boot (which comes up on 6.8), where podman can no longer use native
# idmapped mounts on a fuse-initialized store and falls back to
# storage-chown-by-maps -- which EIOs lchowning the device nodes
# (dev/console) baked into linuxserver/* layers, failing the container
# start with status 125. Booting 6.8 first lets the store initialize
# natively (.has-mount-program=false), exactly as prod (lab/pug) does.
# ZBM selects the new 6.8 (newest) on the reboot; the qemu hostfwd
# survives a guest reboot so ansible reconnects.
- name: Reboot machine under new kernel
  reboot:
  throttle: 1
  become: true
  when: hwe_kernel_apt.changed
  tags:
    - hwe_kernel

# The reboot module doesn't refresh facts, so ansible_facts.kernel
# would still read 5.15 and the podman role's storage.conf gate
# (mount_program when kernel < 5.19) would re-add fuse. Re-gather so it
# sees 6.8 and renders the native, prod-equivalent storage.conf.
- name: Re-gather facts so the kernel version reflects the HWE reboot
  setup:
  tags:
    - hwe_kernel

# thermald is a Recommends of linux-generic-hwe-* and ships an
# /etc/dbus-1/system.d/org.freedesktop.thermald.conf with a
# `<policy group="power">` rule. Ubuntu doesn't create the `power`
# group (it's a Debian convention), so dbus-daemon logs "Unknown group
# 'power' in message bus configuration file" 8× on every boot. Create
# the group empty -- thermald keeps its root-only access (no users in
# the group) and the warnings stop.
- name: Create power group (silence thermald dbus policy warning)
  group:
    name: power
    system: true
    state: present
  become: true
  tags:
    - hwe_kernel
