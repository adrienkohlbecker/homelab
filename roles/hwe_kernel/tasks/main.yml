# Ensure the host runs Ubuntu's 6.8 kernel -- the donor for the ZFS 2.2.x
# kmod paired with the 2.2.x zfsutils userspace. See roles/zfs/tasks/main.yml
# (top docstring) for the HWE/ZFS pairing rationale. Must run before
# roles/zfs in site.yml. The mechanism is release-dependent:
#
#   - jammy: GA is 5.15, so install the HWE meta (linux-generic-hwe-22.04)
#     to pull noble's 6.8 + matching linux-modules-*-generic.
#   - noble: GA *is* 6.8, so install nothing. There the matching HWE meta
#     (linux-generic-hwe-24.04) is the *rolling* edge that advances past GA
#     -- today 6.17, whose bundled zfs.ko 2.3.x outruns noble's 2.2.x
#     zfsutils userspace and trips roles/zfs's version-skew assert. So we
#     remove it and let the GA linux-generic carry 6.8.
- name: Install HWE kernel (jammy GA is 5.15; pull 6.8)
  apt:
    pkg:
      - linux-generic-hwe-{{ ansible_distribution_version }}
    cache_valid_time: 3600
  when: ansible_distribution_release == "jammy"
  register: hwe_kernel_apt
  become: true
  tags:
    - hwe_kernel

# noble+ ships 6.8 as GA, so the HWE meta only overshoots into the rolling
# edge. Strip it (and its image/headers metas) and let autoremove reclaim
# the orphaned rolling kernel. Ubuntu's apt never autoremoves the *running*
# kernel, so on a host currently booted into the rolling HWE (e.g. fox on
# 6.17) this drops the meta but leaves the live kernel in place -- demoting
# that running kernel needs an explicit purge + reboot done by hand, not an
# unattended converge that could reboot-loop. Once the host is back on 6.8,
# this task is a no-op.
- name: Remove rolling HWE kernel (noble+ GA is already 6.8)
  apt:
    pkg:
      - linux-generic-hwe-{{ ansible_distribution_version }}
      - linux-image-generic-hwe-{{ ansible_distribution_version }}
      - linux-headers-generic-hwe-{{ ansible_distribution_version }}
    state: absent
    autoremove: true
    purge: true
  when: ansible_distribution_release != "jammy"
  register: hwe_kernel_remove
  become: true
  tags:
    - hwe_kernel

# Boot into the freshly-installed 6.8 BEFORE podman touches storage.
# Initializing the overlay store on 5.15 (no native idmapped mounts)
# makes the podman role write mount_program=fuse-overlayfs and bakes a
# `.has-mount-program=true` marker + fuse-laid layers into the ext4
# graphroot. That state would ride the image into every box_deps test
# boot (which comes up on 6.8), where podman can no longer use native
# idmapped mounts on a fuse-initialized store and falls back to
# storage-chown-by-maps -- which EIOs lchowning the device nodes
# (dev/console) baked into linuxserver/* layers, failing the container
# start with status 125. Booting 6.8 first lets the store initialize
# natively (.has-mount-program=false), exactly as prod (lab/pug) does.
# ZBM selects the new 6.8 (newest) on the reboot; the qemu hostfwd
# survives a guest reboot so ansible reconnects. The reboot helper
# re-gathers facts on the way back, so the podman role's storage.conf
# gate (mount_program when kernel < 5.19) later reads 6.8 and renders
# the native, prod-equivalent store rather than re-adding fuse.
- name: Reboot machine under new kernel
  import_role:
    name: reboot
    tasks_from: reboot
  vars:
    reboot_args:
      # jammy-only: the noble branch removes the meta without auto-rebooting
      # (see "Remove rolling HWE kernel"), so this stays gated on the install.
      condition: "{{ hwe_kernel_apt.changed | default(false) }}"
      # The initramfs was already rebuilt by the apt postinst above, so
      # the first 6.8 boot does no extra work and this fixture reaches
      # SSH in seconds. Keep the wait short so a stuck reboot (e.g. the
      # aarch64 edk2 warm-reboot heap assert) fails fast instead of
      # burning minutes on a host that is never coming back.
      timeout: 60
  tags:
    - hwe_kernel

# thermald is a Recommends of linux-generic-hwe-* and ships an
# /etc/dbus-1/system.d/org.freedesktop.thermald.conf with a
# `<policy group="power">` rule. Ubuntu doesn't create the `power`
# group (it's a Debian convention), so dbus-daemon logs "Unknown group
# 'power' in message bus configuration file" 8× on every boot. Create
# the group empty -- thermald keeps its root-only access (no users in
# the group) and the warnings stop.
- name: Create power group (silence thermald dbus policy warning)
  group:
    name: power
    system: true
    state: present
  become: true
  tags:
    - hwe_kernel
