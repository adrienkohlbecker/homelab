# Functional verify. Pairs with _setup.yml: that file forces a
# "no HWE meta-package" starting state so the role's converge phase
# performs a real apt install. Here we assert (1) the role's
# reboot-required touch task fired during converge, (2) the HWE
# meta-package is installed (not a tautology -- _setup actively
# removed it), (3) the power group workaround for thermald's dbus
# policy is in place.
#
# No reboot-then-assert-uname check: on aarch64 the harness boots qemu
# with -kernel/-initrd extracted from the on-pool image (see CLAUDE.md
# "Test Environment Design"), which pins the running kernel for the
# lifetime of the VM regardless of what's in /boot. A "kernel flipped
# after reboot" assertion would always pass on x86_64 (ZBM scans /boot)
# but always fail on aarch64, violating the per-arch testing policy.

- name: _verify | Stat reboot-required sentinel
  stat:
    path: /var/run/reboot-required
  register: hwe_kernel_verify_sentinel

- name: _verify | Converge fired the reboot-required touch task
  assert:
    that:
      - hwe_kernel_verify_sentinel.stat.exists
    fail_msg: >-
      /var/run/reboot-required missing -- the role's apt task reported
      no changes (HWE wasn't actually absent before converge, so
      _setup.yml's remove didn't take) or the touch task's gate failed.

- name: _verify | HWE meta-package reinstalled by converge
  command: dpkg-query -W -f='${Status}' linux-generic-hwe-{{ ansible_distribution_version }}
  register: hwe_kernel_verify_dpkg
  changed_when: false
  failed_when: hwe_kernel_verify_dpkg.stdout != 'install ok installed'
  check_mode: false
  become: true

- name: _verify | Probe power group
  getent:
    database: group
    key: power

- name: _verify | Power group exists (for thermald dbus policy)
  assert:
    that:
      - getent_group is defined
      - "'power' in getent_group"
    fail_msg: >-
      power group missing --
      /etc/dbus-1/system.d/org.freedesktop.thermald.conf's
      <policy group="power"> rule will log "Unknown group 'power'"
      on every boot.
