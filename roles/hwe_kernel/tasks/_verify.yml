# Functional verify. Pairs with _setup.yml: that file forces the test
# machine into a "running GA kernel, HWE absent" state so the role's
# converge phase performs a real apt install. Here we assert (1) the
# role's reboot signal fired, (2) rebooting picks up an HWE-installed
# kernel different from the _setup baseline, (3) the power group
# workaround for thermald's dbus policy is in place.

- name: _verify | Stat reboot-required sentinel
  stat:
    path: /var/run/reboot-required
  register: hwe_kernel_verify_sentinel

- name: _verify | Converge fired the reboot-required touch task
  assert:
    that:
      - hwe_kernel_verify_sentinel.stat.exists
    fail_msg: >-
      /var/run/reboot-required missing -- the role's apt task reported
      no changes (HWE wasn't actually absent before converge, so
      _setup.yml's purge didn't take) or the touch task's gate failed.

- name: _verify | Read GA uname stashed by _setup
  slurp:
    path: /var/lib/hwe_kernel_setup_uname
  register: hwe_kernel_verify_setup_uname

- name: _verify | Reboot to pick up the HWE kernel
  reboot:
    reboot_timeout: 300
  become: true

- name: _verify | Capture running kernel after reboot
  command: uname -r
  changed_when: false
  register: hwe_kernel_verify_uname

- name: _verify | Boot chain landed on the HWE-installed kernel
  assert:
    that:
      - hwe_kernel_verify_uname.stdout != (hwe_kernel_verify_setup_uname.content | b64decode | trim)
    fail_msg: >-
      uname -r is still {{ hwe_kernel_verify_uname.stdout }} after
      reboot -- same as the pre-HWE _setup baseline, so the boot chain
      didn't pick the HWE-pulled kernel even though apt installed it.

- name: _verify | Probe power group
  getent:
    database: group
    key: power

- name: _verify | Power group exists (for thermald dbus policy)
  assert:
    that:
      - getent_group is defined
      - "'power' in getent_group"
    fail_msg: >-
      power group missing --
      /etc/dbus-1/system.d/org.freedesktop.thermald.conf's
      <policy group="power"> rule will log "Unknown group 'power'"
      on every boot.
