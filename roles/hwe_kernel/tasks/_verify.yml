# Functional verify. Pairs with _setup.yml: that file forces a
# "no HWE meta-package" starting state so the role's converge phase
# performs a real apt install. Here we assert (1) the HWE meta-package
# is installed (not a tautology -- _setup actively removed it), (2) the
# power group workaround for thermald's dbus policy is in place.
#
# No reboot-required sentinel check: converge's own "Reboot machine under
# new kernel" task fires (the HWE install is a change), and /var/run is
# tmpfs, so the reboot wipes /var/run/reboot-required before _verify runs.
# The reboot-surviving proof that converge did real work is the dpkg-query
# below -- _setup removed the meta-package, so its presence here means the
# converge install ran.
#
# No reboot-then-assert-uname check either: on aarch64 the harness boots
# qemu with -kernel/-initrd extracted from the on-pool image (see CLAUDE.md
# "Test Environment Design"), which pins the running kernel for the
# lifetime of the VM regardless of what's in /boot. A "kernel flipped
# after reboot" assertion would always pass on x86_64 (ZBM scans /boot)
# but always fail on aarch64, violating the per-arch testing policy.

- name: _verify | HWE meta-package reinstalled by converge
  command: dpkg-query -W -f='${Status}' linux-generic-hwe-{{ ansible_distribution_version }}
  register: hwe_kernel_verify_dpkg
  changed_when: false
  failed_when: hwe_kernel_verify_dpkg.stdout != 'install ok installed'
  check_mode: false
  become: true

- name: _verify | Probe power group
  getent:
    database: group
    key: power

- name: _verify | Power group exists (for thermald dbus policy)
  assert:
    that:
      - getent_group is defined
      - "'power' in getent_group"
    fail_msg: >-
      power group missing --
      /etc/dbus-1/system.d/org.freedesktop.thermald.conf's
      <policy group="power"> rule will log "Unknown group 'power'"
      on every boot.
