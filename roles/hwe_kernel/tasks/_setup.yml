# Force the starting state that makes converge do real work, so a broken
# apt task can't pass as a no-op against the packer-baked image (which ships
# linux-generic-hwe-* preinstalled per packer/scripts/chroot.sh:189-196):
#   - jammy: remove the HWE meta so converge's install registers changed.
#   - noble: (re)install the HWE meta so converge's removal registers changed.
#
# We touch only the meta-package -- dpkg refuses to purge the running kernel
# image, but the meta is what the role's apt task targets, so flipping it is
# what makes converge register `changed: true`.

- name: _setup | Remove HWE meta-package (jammy converge reinstalls it)
  apt:
    pkg:
      - linux-generic-hwe-{{ ansible_distribution_version }}
    state: absent
    autoremove: true
    purge: true
    update_cache: true
  when: ansible_distribution_release == "jammy"
  become: true

- name: _setup | Install HWE meta-package (noble converge removes it)
  apt:
    pkg:
      - linux-generic-hwe-{{ ansible_distribution_version }}
    state: present
    update_cache: true
  when: ansible_distribution_release != "jammy"
  become: true
