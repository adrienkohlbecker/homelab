persistence true
persistence_location /mosquitto/data/
# Flush the in-memory DB to persistence_location at most this often; the data
# dir is a ZFS-snapshotted dataset, so bound the state a snapshot can miss
# rather than relying on clean-shutdown writes alone (default is 1800s).
autosave_interval 300
log_dest stdout
connection_messages false

# Scopes allow_anonymous / password_file per listener so the public 1883
# listener can require auth while the loopback 1880 health listener stays
# anonymous. Load-bearing -- without it the global allow_anonymous wins.
per_listener_settings true

listener 1883 0.0.0.0
allow_anonymous false
password_file /mosquitto/config/pwfile

# Loopback-only listener for the in-container healthcheck; anonymous so the
# mosquitto_sub probe needs no credentials (see mosquitto.service.j2).
listener 1880 127.0.0.1
allow_anonymous true
