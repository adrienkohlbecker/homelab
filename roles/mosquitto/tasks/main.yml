# Per-service podman network with DNS enabled so consumers (z2m) can
# reach mosquitto by container name. See redis/tasks/main.yml for the
# full reasoning.
- name: Create mosquitto podman network
  when: not ansible_check_mode
  containers.podman.podman_network:
    name: mosquitto
    # See redis/tasks/main.yml -- explicit so z2m can resolve `mosquitto`.
    disable_dns: false
    state: present
  become: true
  tags:
    - mosquitto

- name: Add mosquitto group
  group:
    name: mosquitto
    system: true
  become: true
  tags:
    - mosquitto

- name: Add mosquitto user
  user:
    name: mosquitto
    group: mosquitto
    createhome: false
    system: true
    shell: /usr/sbin/nologin
    home: /nonexistent
  become: true
  register: mosquitto_user
  tags:
    - mosquitto

- name: Create configuration directory
  when: not (ansible_check_mode and mosquitto_user.changed)
  file:
    dest: "{{ item }}"
    state: directory
    owner: mosquitto
    group: mosquitto
    mode: "0755"
  become: true
  tags:
    - mosquitto
  loop:
    - /mnt/services/mosquitto
    - /mnt/services/mosquitto/config
    - /mnt/services/sqlite/mosquitto

- name: Configure mosquitto passwords
  template:
    src: pwfile.j2
    dest: /mnt/services/mosquitto/config/pwfile
    owner: mosquitto
    group: mosquitto
    mode: "0600"
    backup: true
  register: mosquitto_pwfile
  become: true
  tags:
    - mosquitto

- name: Configure mosquitto
  copy:
    src: mosquitto.conf
    dest: /mnt/services/mosquitto/config/mosquitto.conf
    owner: mosquitto
    group: mosquitto
    mode: "0644"
    backup: true
  register: mosquitto_conf
  become: true
  tags:
    - mosquitto

- name: Install mosquitto service
  import_role:
    name: systemd_unit
    tasks_from: install
  vars:
    systemd_unit_args:
      src: mosquitto.service.j2
      condition: "{{ not (ansible_check_mode and mosquitto_user.changed) }}"
  tags:
    - mosquitto

- name: Enable mosquitto service
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: mosquitto
      condition: "{{ not (ansible_check_mode and (mosquitto_service_result.changed or mosquitto_user.changed)) }}"
      restart: "{{ mosquitto_service_result.changed or mosquitto_conf.changed or mosquitto_pwfile.changed }}"
  tags:
    - mosquitto
