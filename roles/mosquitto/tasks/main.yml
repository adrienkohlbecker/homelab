- name: Assert mosquitto_accounts is provided
  assert:
    that:
      - mosquitto_accounts is defined
      - mosquitto_accounts is mapping
      - mosquitto_accounts | length > 0
      - mosquitto_accounts | dict2items | rejectattr('value.password', 'defined') | list | length == 0
      - mosquitto_accounts | dict2items | rejectattr('value.salt', 'defined') | list | length == 0
    fail_msg: >-
      mosquitto_accounts must be a non-empty mapping of username to a dict
      with password and salt; define it in group_vars / host_vars.
  tags:
    - mosquitto

# Shared HA-stack podman network with DNS enabled so HA and z2m can reach
# mosquitto at `mosquitto.dns.podman`, and HA can reach influxdb in the same
# aardvark-dns view. Each participating role creates it independently;
# containers.podman.podman_network is idempotent so whichever role converges
# first wins and the others are no-ops.
- name: Create homeassistant podman network
  when: not ansible_check_mode
  containers.podman.podman_network:
    name: homeassistant
    # Explicit so consumers can resolve `*.dns.podman` via aardvark-dns.
    disable_dns: false
    state: present
  become: true
  tags:
    - mosquitto

- name: Set up mosquitto system user, group, and config dir
  import_role:
    name: service_user
    tasks_from: user
  vars:
    service_user_args:
      name: mosquitto
  tags:
    - mosquitto

# /mnt/services/mosquitto/config holds mosquitto.conf + pwfile;
# /mnt/services/sqlite/mosquitto is the bind-mounted persistence dir where
# the broker writes mosquitto.db (its own format, no symlinks -- a plain dir
# like authelia's, not the symlink-oriented sqlite_dataset helper).
- name: Create mosquitto config and persistence directories
  when: not (ansible_check_mode and mosquitto_user.changed)
  file:
    dest: "{{ item }}"
    state: directory
    owner: mosquitto
    group: mosquitto
    mode: "0750"
  become: true
  tags:
    - mosquitto
  loop:
    - /mnt/services/mosquitto/config
    - /mnt/services/sqlite/mosquitto

- name: Configure mosquitto passwords
  template:
    src: pwfile.j2
    dest: /mnt/services/mosquitto/config/pwfile
    owner: mosquitto
    group: mosquitto
    mode: "0600"
    backup: true
  register: mosquitto_pwfile
  become: true
  tags:
    - mosquitto

# No validate: -- mosquitto only parses its config at full broker startup; the
# offline --test-config flag landed in broker 2.1 and the image pins 2.0.21, so
# there is no host-side parser. A startup parse failure is caught by the unit's
# Type=notify/--sdnotify=healthy gate instead.
- name: Configure mosquitto
  copy:
    src: mosquitto.conf
    dest: /mnt/services/mosquitto/config/mosquitto.conf
    owner: mosquitto
    group: mosquitto
    mode: "0640"
    backup: true
    validate: grep -qE '^(listener|persistence_location)[[:space:]]+' %s
  register: mosquitto_conf
  become: true
  tags:
    - mosquitto

- name: Install mosquitto service
  import_role:
    name: systemd_unit
    tasks_from: install
  vars:
    systemd_unit_args:
      src: mosquitto.service.j2
      condition: "{{ not (ansible_check_mode and mosquitto_user.changed) }}"
  tags:
    - mosquitto

- name: Pull mosquitto image
  containers.podman.podman_image:
    name: "{{ mosquitto_image }}"
  register: mosquitto_image_pull
  retries: 3
  delay: 10
  until: mosquitto_image_pull is not failed
  become: true
  tags:
    - mosquitto

- name: Enable mosquitto service
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: mosquitto
      condition: "{{ not (ansible_check_mode and (mosquitto_service_result.changed or mosquitto_user.changed)) }}"
      restart: "{{ mosquitto_service_result.changed or mosquitto_conf.changed or mosquitto_pwfile.changed }}"
  tags:
    - mosquitto
