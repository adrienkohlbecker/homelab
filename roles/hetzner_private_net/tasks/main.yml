# fox is attached to the Hetzner `hetzner` private network (terraform/hetzner.tf,
# hcloud_server_network.fox -> 10.123.55.2), but cloud-init froze its netplan
# (/etc/netplan/50-cloud-init.yaml) on first boot when only eth0 existed, so the
# private NIC comes up unmanaged/down and never requests its address. This role
# adds an additive drop-in to bring it up. Nothing at home routes to 10.123.55.x
# today (the fleet reaches fox over wg0); this just makes the OS match what
# terraform provisioned.
- name: Assert the configured private-network interface exists
  # A typo here, or PCI-slot churn on a Hetzner rebuild, would otherwise write a
  # drop-in for a non-existent NIC -- `netplan apply` then succeeds and the link
  # silently never comes up. Fail loud instead. enp7s0 is present in
  # ansible_interfaces even while down/unmanaged (it lists link-layer NICs
  # regardless of IP/up state).
  assert:
    that: hetzner_private_net_iface in ansible_interfaces
    fail_msg: >-
      hetzner_private_net_iface={{ hetzner_private_net_iface }} is not a NIC on
      this host (have: {{ ansible_interfaces | join(', ') }}). Check `ip link`.
  when: hetzner_private_net_iface | length > 0
  tags:
    - hetzner_private_net

- name: Configure the Hetzner private-network interface (additive netplan drop-in)
  # A SEPARATE 60-* file alongside cloud-init's 50-cloud-init.yaml (which owns
  # eth0 and is regenerated by cloud-init) -- netplan merges every file in the
  # directory. Owning a distinct file means a cloud-init refresh can't clobber
  # it, and since this stanza only adds a NIC (eth0 untouched), `netplan apply`
  # can't bounce the SSH path. Keyed by interface NAME (the PCI slot is stable
  # across Hetzner server rebuilds) rather than MAC, which churns on
  # re-creation and would silently go stale in this static file. Hetzner serves
  # the terraform-assigned address over DHCP on this link (which also hands out
  # the 1450 MTU as DHCP option 26, so we don't pin it here); use-dns:false
  # keeps the private DHCP from overriding resolv.conf.
  copy:
    dest: /etc/netplan/60-hetzner-private.yaml
    content: |
      # Managed by ansible role: hetzner_private_net. Do not edit by hand.
      network:
        version: 2
        ethernets:
          {{ hetzner_private_net_iface }}:
            dhcp4: true
            # Not boot-critical: if the private DHCP never leases, this stops
            # systemd-networkd-wait-online from blocking fox's boot on this NIC.
            optional: true
            dhcp4-overrides:
              use-dns: false
    owner: root
    group: root
    mode: "0600"
    backup: true
    validate: python3 -c 'import yaml,sys; yaml.safe_load(open(sys.argv[1]))' %s
  become: true
  register: hetzner_private_net_cfg
  when: hetzner_private_net_iface | length > 0
  tags:
    - hetzner_private_net

- name: Apply netplan to bring up the private interface
  # Additive-only (new NIC, eth0 untouched), so a plain apply won't sever SSH:
  # worst case the link fails to lease and stays down without disturbing eth0,
  # so the netplan role's rollback-timer machinery isn't warranted here. No
  # ansible module exists for `netplan apply`.
  command: netplan apply
  become: true
  changed_when: true
  when:
    - hetzner_private_net_iface | length > 0
    - hetzner_private_net_cfg.changed
    - not ansible_check_mode
  tags:
    - hetzner_private_net
