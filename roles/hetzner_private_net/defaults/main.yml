# Interface name of the Hetzner private-network NIC to bring up via an additive
# netplan drop-in. Empty by default so the role is a no-op on every host except
# the one that sets it (host_vars/fox.yml -> enp7s0). That gate keeps the
# harness's box/pug/lab fixtures -- which have no Hetzner private NIC -- from
# running `netplan apply` for an interface they don't have.
#
# In defaults/ (not vars/) so a host_var override wins: defaults sit *below*
# host_vars in ansible's precedence ladder, vars sit *above* and would mask it.
# See CLAUDE.md Hard Rules.
hetzner_private_net_iface: ""
