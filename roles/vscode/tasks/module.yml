- name: Create configuration directory
  when: not (ansible_check_mode and vscode_user.changed)
  file:
    dest: /mnt/services/{{ vscode_path }}
    state: directory
    owner: "{{ vscode_user.uid }}"
    group: "{{ vscode_user.group }}"
    mode: "0755"
  become: true
  tags:
    - vscode

- name: Configure workspace
  when: not (ansible_check_mode and vscode_user.changed)
  template:
    src: workspace.json.j2
    dest: /mnt/services/{{ vscode_path }}/{{ vscode_workspace }}.code-workspace
    owner: "{{ vscode_user.uid }}"
    group: "{{ vscode_user.group }}"
    mode: "0644"
    backup: true
  register: vscode_workspace_file
  become: true
  tags:
    - vscode

- name: Install vscode service
  import_role:
    name: systemd_unit
    tasks_from: install
  vars:
    systemd_unit_args:
      src: vscode.service.j2
      dest: "{{ vscode_name }}.service"
      condition: "{{ not (ansible_check_mode and vscode_user.changed) }}"
  tags:
    - vscode

- name: Enable vscode service
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: vscode
      dest: "{{ vscode_name }}"
      condition: "{{ not (ansible_check_mode and (systemd_unit.changed or vscode_user.changed)) }}"
      restart: "{{ systemd_unit.changed or vscode_workspace_file.changed }}"
  tags:
    - vscode

- name: Configure nginx
  import_role:
    name: nginx
    tasks_from: site
  vars:
    nginx_site_args:
      subdomain: "{{ vscode_subdomain }}"
      proxy_pass: http://localhost:3002/
      csp_frame_ancestors: "{{ vscode_csp_frame_ancestors | default(omit) }}"
      # code-server ships with no native auth (no PASSWORD/HASHED_PASSWORD
      # env), so before this it was relying on the network being internal.
      # Authelia is now the sole gate.
      auth: required
  tags:
    - vscode
