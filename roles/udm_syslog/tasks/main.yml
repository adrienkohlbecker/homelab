- name: Install rsyslog
  apt:
    pkg: rsyslog
    install_recommends: false
    cache_valid_time: 3600
  become: true
  register: udm_syslog_apt
  tags:
    - udm_syslog

- name: Assert udm syslog inputs
  assert:
    quiet: true
    that:
      - service_ports.udm_syslog is defined
      - service_ports.udm_syslog | int | string == service_ports.udm_syslog | string
      - service_ports.udm_syslog | int > 0
      - service_ports.udm_syslog | int <= 65535
      - udm_syslog_listen_address | ansible.utils.ipaddr != false
      - udm_syslog_allowed_sources | length > 0
      - udm_syslog_allowed_sources | map('ansible.utils.ipaddr') | select('ne', false) | list | length == udm_syslog_allowed_sources | length
    fail_msg: udm_syslog needs a valid UDP port, listen IPv4 address, and source allowlist
  tags:
    - udm_syslog

- name: Create /var/log/unifi directory
  file:
    path: /var/log/unifi
    state: directory
    owner: syslog
    group: adm
    mode: "0750"
  become: true
  when: not (ansible_check_mode and udm_syslog_apt.changed)
  tags:
    - udm_syslog

- name: Deploy rsyslog unifi drop-in
  template:
    src: rsyslog_unifi.conf.j2
    dest: /etc/rsyslog.d/60-unifi.conf
    owner: root
    group: root
    mode: "0644"
    backup: true
    validate: /usr/sbin/rsyslogd -N1 -f %s
  become: true
  register: udm_syslog_rsyslog_conf
  when: not (ansible_check_mode and udm_syslog_apt.changed)
  tags:
    - udm_syslog

- name: Start rsyslog
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: rsyslog.service
      condition: "{{ not (ansible_check_mode and udm_syslog_apt.changed) }}"
      restart: "{{ udm_syslog_rsyslog_conf.changed | default(false) }}"
  tags:
    - udm_syslog

- name: Deploy logrotate config for unifi syslog
  import_role:
    name: logrotate
    tasks_from: template
  vars:
    logrotate_args:
      src: logrotate_unifi.j2
      dest: /etc/logrotate.d/unifi
      condition: "{{ not (ansible_check_mode and udm_syslog_apt.changed) }}"
  tags:
    - udm_syslog
