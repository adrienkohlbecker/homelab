- name: Build per-run udm syslog marker
  set_fact:
    udm_syslog_verify_marker: "verify_udm_syslog_{{ ansible_date_time.iso8601_basic_short }}_{{ 99999 | random }}"
  tags:
    - udm_syslog

- name: Send marked UDP syslog packet to default-interface listener
  command:
    argv:
      - /usr/bin/logger
      - --udp
      - --server
      - "{{ udm_syslog_listen_address }}"
      - --port
      - "{{ service_ports.udm_syslog | int }}"
      - --priority
      - user.notice
      - --tag
      - udm_syslog_verify
      - --
      - "lab kernel: {{ udm_syslog_verify_marker }} default-interface delivery"
  changed_when: false
  tags:
    - udm_syslog

- name: Verify marked packet landed in unifi.log
  wait_for:
    path: /var/log/unifi/unifi.log
    search_regex: "{{ udm_syslog_verify_marker }}"
    timeout: 5
  become: true
  tags:
    - udm_syslog

- name: Build post-rotate udm syslog marker
  set_fact:
    udm_syslog_verify_rotated_marker: "verify_udm_syslog_rotated_{{ ansible_date_time.iso8601_basic_short }}_{{ 99999 | random }}"
  tags:
    - udm_syslog

- name: Force unifi syslog rotation
  command:
    argv:
      - /usr/sbin/logrotate
      - --force
      - /etc/logrotate.d/unifi
  changed_when: false
  become: true
  tags:
    - udm_syslog

- name: Send marked UDP syslog packet after rotation
  command:
    argv:
      - /usr/bin/logger
      - --udp
      - --server
      - "{{ udm_syslog_listen_address }}"
      - --port
      - "{{ service_ports.udm_syslog | int }}"
      - --priority
      - user.notice
      - --tag
      - udm_syslog_verify
      - --
      - "lab kernel: {{ udm_syslog_verify_rotated_marker }} post-rotation delivery"
  changed_when: false
  tags:
    - udm_syslog

- name: Verify post-rotation packet landed in active unifi.log
  wait_for:
    path: /var/log/unifi/unifi.log
    search_regex: "{{ udm_syslog_verify_rotated_marker }}"
    timeout: 5
  become: true
  tags:
    - udm_syslog
