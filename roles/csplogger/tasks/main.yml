- name: Set up csplogger system user, group, and config dir
  import_role:
    name: service_user
    tasks_from: user
  vars:
    service_user_args:
      name: csplogger
  tags:
    - csplogger

- name: Create sqlite directory
  when: not (ansible_check_mode and csplogger_user.changed)
  file:
    dest: /mnt/services/sqlite/csplogger
    state: directory
    owner: csplogger
    group: csplogger
    mode: "0755"
  become: true
  tags:
    - csplogger

- name: Install csplogger service
  import_role:
    name: systemd_unit
    tasks_from: install
  vars:
    systemd_unit_args:
      src: csplogger.service.j2
      condition: "{{ not (ansible_check_mode and csplogger_user.changed) }}"
  tags:
    - csplogger

# The upstream image (docker.io/giuliocomi/csplogger) ships an amd64-only
# manifest, so install the unit on every arch but only start it on x86_64
# hosts. CSP report-uri sinks are best-effort: prod hosts that run it
# (lab/pug) are amd64; arm64 hosts (e.g. bunk) collect no reports.
- name: Enable csplogger service
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: csplogger
      condition: "{{ not (ansible_check_mode and (csplogger_service_result.changed or csplogger_user.changed)) }}"
      start: "{{ ansible_architecture == 'x86_64' }}"
      restart: "{{ csplogger_service_result.changed }}"
  tags:
    - csplogger

- name: Configure nginx
  import_role:
    name: nginx
    tasks_from: site
  vars:
    nginx_site_args:
      subdomain: csplogger
      proxy_pass: http://localhost:{{ service_ports.csplogger }}/
      server_conf: |
        location = / {
          return 301 /dashboard;
        }
  tags:
    - csplogger
