- name: Add csplogger group
  group:
    name: csplogger
    system: true
  become: true
  tags:
    - csplogger

- name: Add csplogger user
  user:
    name: csplogger
    group: csplogger
    createhome: false
    system: true
    shell: /usr/sbin/nologin
    home: /nonexistent
  become: true
  register: csplogger_user
  tags:
    - csplogger

- name: Create configuration directory
  when: not (ansible_check_mode and csplogger_user.changed)
  file:
    dest: /mnt/services/csplogger
    state: directory
    owner: csplogger
    group: csplogger
    mode: "0755"
  become: true
  tags:
    - csplogger

- name: Create sqlite directory
  when: not (ansible_check_mode and csplogger_user.changed)
  file:
    dest: /mnt/services/sqlite/csplogger
    state: directory
    owner: csplogger
    group: csplogger
    mode: "0755"
  become: true
  tags:
    - csplogger

- name: Install csplogger service
  import_role:
    name: systemd_unit
    tasks_from: install
  vars:
    systemd_unit_args:
      src: csplogger.service.j2
      condition: "{{ not (ansible_check_mode and csplogger_user.changed) }}"
  tags:
    - csplogger

- name: Enable csplogger service
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: csplogger
      condition: "{{ not (ansible_check_mode and (systemd_unit.changed or csplogger_user.changed)) }}"
      start: "{{ ansible_architecture == 'x86_64' }}"
      restart: "{{ systemd_unit.changed }}"
  tags:
    - csplogger

- name: Configure nginx
  import_role:
    name: nginx
    tasks_from: site
  vars:
    nginx_subdomain: csplogger
    nginx_proxy_pass: http://localhost:8443/
    nginx_server_conf: |
      location = / {
        return 301 /dashboard;
      }
  tags:
    - csplogger
