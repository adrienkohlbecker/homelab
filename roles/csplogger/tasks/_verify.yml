# Stand up the upstream stub that takes fluent-bit's place. Listens on
# service_ports.csp_ingest, returns 204, and appends each accepted POST
# as one JSON record per line to /var/log/csplogger_upstream/log. Letting
# the stub replace fluent-bit keeps this role's _verify scope to "csplogger
# nginx config does its job"; the lua/OTLP pipeline lives in roles/fluentbit
# and is exercised there end-to-end.
- name: _verify | Copy upstream stub script
  copy:
    src: csplogger_upstream.py
    dest: /usr/local/bin/csplogger_upstream.py
    owner: root
    group: root
    mode: "0755"
    backup: true
  register: csplogger_upstream_source
  become: true

- name: _verify | Install upstream stub unit
  import_role:
    name: systemd_unit
    tasks_from: install
  vars:
    systemd_unit_args:
      src: csplogger_upstream.service.j2

- name: _verify | Enable upstream stub
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: csplogger_upstream
      restart: "{{ csplogger_upstream_source.changed or csplogger_upstream_service_result.changed }}"

- name: _verify | Wait for upstream stub to bind csp_ingest port
  wait_for:
    host: 127.0.0.1
    port: "{{ service_ports.csp_ingest }}"
    timeout: 15

# Drop any prior run's records so the count/shape assertions below
# only see this run. Must NOT recreate the file as root: the stub
# runs under DynamicUser= and would EACCES on the next append. The
# `file: state=absent` lets the parent dir (owned by the dynamic uid
# via LogsDirectory=) stay, while the stub's `open("a")` re-creates
# the file under that uid on the first POST. The delete is racing
# nothing -- the stub doesn't receive POSTs until the probes below.
- name: _verify | Drop prior upstream stub log
  file:
    path: /var/log/csplogger_upstream/log
    state: absent
  become: true

# Shared body fixtures. Each probe's status_code assertion runs against
# nginx's response; whether a probe ALSO reached the upstream stub is
# verified at the end by reading the stub's JSONL log and asserting the
# expected number of records landed with Content-Type rewritten to
# application/json. The shared Origin matches the production allowlist
# regex (host + domain) so through-nginx probes reach the proxied path.
- name: _verify | shared CSP body fixtures
  set_fact:
    csplogger_verify_host: "csplogger.{{ inventory_hostname }}.{{ domain }}"
    # Pick an origin under {{ domain }} that does NOT include the
    # inventory_hostname segment, so this probe would fail if the
    # allowlist regex ever regressed back to per-host scoping.
    csplogger_verify_origin: "https://verify.{{ domain }}"
    csp_legacy_body:
      csp-report:
        blocked-uri: "https://_verify.example/"
        document-uri: "https://_verify.example/"
        original-policy: "default-src 'self'"
        referrer: ""
        violated-directive: "script-src"
    csp_reporting_api_body:
      - type: "csp-violation"
        age: 0
        url: "https://_verify.example/"
        user_agent: "_verify/1.0"
        body:
          blockedURL: "https://_verify.example/"
          documentURL: "https://_verify.example/"
          effectiveDirective: "script-src-elem"
          originalPolicy: "default-src 'self'"
          disposition: "enforce"

# Browsers label CSP report POSTs with application/csp-report (legacy) or
# application/reports+json (Reporting API), not application/json; nginx
# rewrites Content-Type on the upstream request to make fluent-bit's
# application/json-only http input happy. The "should reach upstream"
# cases use the friendly Origin + an allowed Content-Type; the "should
# be blocked" cases change one axis each (Origin, Content-Type, size,
# method, path) to exercise one gate at a time. Host header substitutes
# for DNS (snakeoil certs in test mode -> validate_certs: false). The
# two standalone probes below (foreign Origin, OPTIONS preflight) carry
# bespoke failed_when on response headers that don't compose cleanly
# with the loop.
- name: _verify | per-case nginx probes
  uri:
    url: "{{ item.url | default('https://localhost/log') }}"
    method: "{{ item.method | default('POST') }}"
    headers: "{{ {'Host': csplogger_verify_host} | combine(item.headers | default({})) }}"
    validate_certs: false
    body_format: json
    body: "{{ item.body | default(omit) }}"
    status_code: "{{ item.status_code }}"
  loop_control:
    label: "{{ item.name }} -> {{ item.status_code }}"
  loop:
    - name: legacy report-uri Content-Type accepted
      headers:
        Origin: "{{ csplogger_verify_origin }}"
        Content-Type: application/csp-report
      body: "{{ csp_legacy_body }}"
      status_code: 204
    - name: Reporting-API Content-Type accepted
      headers:
        Origin: "{{ csplogger_verify_origin }}"
        Content-Type: application/reports+json
      body: "{{ csp_reporting_api_body }}"
      status_code: 204
    # Content-Type allowlist: friendly Origin but a non-CSP Content-Type
    # (e.g. application/json -- the value the upstream rewrite normalises
    # to) must be rejected with 415 before it reaches the upstream. Stops
    # a hostile poster from wedging fluent-bit's HTTP input with pathological
    # JSON-shaped bodies under the blanket rewrite.
    - name: disallowed Content-Type rejected with 415
      headers:
        Origin: "{{ csplogger_verify_origin }}"
        Content-Type: application/json
      body: "{{ csp_legacy_body }}"
      status_code: 415
    # Body-size cap. CSP reports are tiny; the cap stops a runaway site CSP
    # or hostile poster from chewing bandwidth. Needs friendly Origin +
    # allowed Content-Type so the body limit is actually what fires
    # (otherwise the request would 204 or 415 first). 40000 stays well
    # above the 32k cap (regression catches: cap inadvertently raised
    # past ~39k) and below asyncio's 64K-per-line stream-reader limit
    # in test/utils.py, which ansible's per-iteration loop-item echo
    # would otherwise blow when dumping `body:` on one line.
    - name: oversize body rejected with 413
      headers:
        Origin: "{{ csplogger_verify_origin }}"
        Content-Type: application/csp-report
      body:
        csp-report: "{{ csp_legacy_body['csp-report'] | combine({'script-sample': 'A' * 40000}) }}"
      status_code: 413
    - name: GET /log rejected with 405 (POST/OPTIONS only)
      method: GET
      status_code: 405
    - name: GET / on csplogger subdomain returns 404
      url: https://localhost/
      method: GET
      status_code: 404

# Origin allowlist: a POST from outside the domain must be silently 204'd
# with no ACAO. The silent-drop response shape keeps misconfigured
# legitimate browsers' report queues happy; the missing ACAO ensures
# attacker JS can't read the response for any probing-oracle signal. The
# stub log assertion below additionally verifies the request didn't
# forward upstream.
- name: _verify | POST /log with foreign Origin is silently dropped
  uri:
    url: https://localhost/log
    method: POST
    headers:
      Host: "{{ csplogger_verify_host }}"
      Origin: "https://attacker.example"
      Content-Type: application/csp-report
    validate_certs: false
    body_format: json
    body: "{{ csp_legacy_body }}"
    status_code: 204
  register: csplogger_verify_foreign
  failed_when: >-
    csplogger_verify_foreign.status != 204
    or csplogger_verify_foreign.access_control_allow_origin is defined

- name: _verify | OPTIONS preflight returns CORS allow-POST
  uri:
    url: https://localhost/log
    method: OPTIONS
    headers:
      Host: "{{ csplogger_verify_host }}"
      Origin: "{{ csplogger_verify_origin }}"
      Access-Control-Request-Method: POST
      Access-Control-Request-Headers: Content-Type
    validate_certs: false
    status_code: 204
  register: csplogger_verify_preflight
  failed_when: >-
    csplogger_verify_preflight.access_control_allow_methods | default('') != 'POST, OPTIONS'
    or csplogger_verify_preflight.access_control_allow_origin | default('') != '*'
    or 'Content-Type' not in (csplogger_verify_preflight.access_control_allow_headers | default(''))
    or (csplogger_verify_preflight.access_control_max_age | default('') | string) != '86400'

# Read what reached the upstream stub. Exactly the two friendly-Origin +
# allowed-Content-Type POSTs above should have landed; the six blocked
# probes (bad CT, oversize, GET /log, GET /, foreign Origin, OPTIONS
# preflight) wrote nothing. The Content-Type on each landed record must
# be the
# application/json value nginx rewrote to -- proves the rewrite at
# main.yml:126 fires after the allowlist check (a regression that lets
# the original Content-Type through would surface here).
- name: _verify | Read upstream stub log
  slurp:
    src: /var/log/csplogger_upstream/log
  register: csplogger_upstream_log
  become: true

- name: _verify | Parse upstream stub records
  set_fact:
    csplogger_upstream_records: >-
      {{ (csplogger_upstream_log.content | b64decode).splitlines()
         | reject('equalto', '') | map('from_json') | list }}

- name: _verify | Exactly the legitimate POSTs reached upstream
  assert:
    that:
      - csplogger_upstream_records | length == 2
      - csplogger_upstream_records | map(attribute='content_type') | unique | list == ['application/json']
    fail_msg: >-
      Expected exactly 2 POSTs (legacy CSP, Reporting API) to reach the
      upstream stub with Content-Type rewritten to application/json.
      Got {{ csplogger_upstream_records | length }} records:
      {{ csplogger_upstream_records | map(attribute='content_type') | list }}.
