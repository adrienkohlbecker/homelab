- name: _verify | fluent-bit listens on the CSP ingest port
  wait_for:
    host: 127.0.0.1
    port: "{{ service_ports.csp_ingest }}"
    timeout: 30

# Shared body fixtures so the legacy + reporting-api shapes are defined
# once and reused across the direct-to-fluent-bit POST, the through-nginx
# happy path, the Content-Type variant tests, and the oversize test (via
# combine). Each test asserts only on status_code (or response headers),
# never on the body content, so a fixed URI is fine — the per-task name
# is the diagnostic distinguisher.
- name: _verify | shared CSP body fixtures
  set_fact:
    csp_legacy_body:
      csp-report:
        blocked-uri: "https://_verify.example/"
        document-uri: "https://_verify.example/"
        original-policy: "default-src 'self'"
        referrer: ""
        violated-directive: "script-src"
    csp_reporting_api_body:
      - type: "csp-violation"
        age: 0
        url: "https://_verify.example/"
        user_agent: "_verify/1.0"
        body:
          blockedURL: "https://_verify.example/"
          documentURL: "https://_verify.example/"
          effectiveDirective: "script-src-elem"
          originalPolicy: "default-src 'self'"
          disposition: "enforce"

# Bypass nginx and POST straight at the fluent-bit HTTP input. Verifies
# the ingest side works in isolation — separates a fluent-bit config
# failure from an nginx routing failure when something breaks.
- name: _verify | POST a synthetic CSP report directly to fluent-bit (legacy)
  uri:
    url: http://127.0.0.1:{{ service_ports.csp_ingest }}/
    method: POST
    body_format: json
    body: "{{ csp_legacy_body }}"
    status_code: 204

# Reporting API shape: a JSON array of csp-violation reports. Distinct
# from the legacy POST above because fluent-bit's http input splits the
# array into per-record items and the flatten-csp lua filter takes a
# different branch (camelCase keys, body-nested fields). Exercising both
# branches catches a regression in either alias set.
- name: _verify | POST a synthetic CSP report directly to fluent-bit (reporting-api)
  uri:
    url: http://127.0.0.1:{{ service_ports.csp_ingest }}/
    method: POST
    body_format: json
    body: "{{ csp_reporting_api_body }}"
    status_code: 204

# Test through nginx using a Host header so the request hits the
# csplogger server block without needing DNS. Snakeoil certs in test
# mode → validate_certs: false. Origin set so the response carries any
# CORS headers (browser CSP reports come from arbitrary origins).
- name: _verify | POST /log through the public nginx shim
  uri:
    url: https://localhost/log
    method: POST
    headers:
      Host: "csplogger.{{ inventory_hostname }}.{{ domain }}"
      Origin: "https://_verify.example"
    validate_certs: false
    body_format: json
    body: "{{ csp_legacy_body }}"
    status_code: 204
  register: csplogger_verify_nginx_post
  failed_when: >-
    csplogger_verify_nginx_post.status != 204
    or '*' not in (csplogger_verify_nginx_post.access_control_allow_origin | default(''))

# Browsers label CSP report POSTs with application/csp-report (legacy)
# or application/reports+json (Reporting API), not application/json --
# fluent-bit's http input is application/json-only and the nginx site
# rewrites Content-Type on the upstream request to make this work.
# Ansible's uri module defaults to application/json with body_format:
# json; the explicit Content-Type in headers overrides that default, so
# the body still serialises as JSON while the request bears the real
# browser Content-Type that exercises the nginx rewrite.
- name: _verify | POST /log with legacy report-uri Content-Type
  uri:
    url: https://localhost/log
    method: POST
    headers:
      Host: "csplogger.{{ inventory_hostname }}.{{ domain }}"
      Origin: "https://_verify.example"
      Content-Type: application/csp-report
    validate_certs: false
    body_format: json
    body: "{{ csp_legacy_body }}"
    status_code: 204

- name: _verify | POST /log with Reporting-API Content-Type
  uri:
    url: https://localhost/log
    method: POST
    headers:
      Host: "csplogger.{{ inventory_hostname }}.{{ domain }}"
      Origin: "https://_verify.example"
      Content-Type: application/reports+json
    validate_certs: false
    body_format: json
    body: "{{ csp_reporting_api_body }}"
    status_code: 204

- name: _verify | OPTIONS preflight returns CORS allow-POST
  uri:
    url: https://localhost/log
    method: OPTIONS
    headers:
      Host: "csplogger.{{ inventory_hostname }}.{{ domain }}"
      Origin: "https://_verify.example"
      Access-Control-Request-Method: POST
      Access-Control-Request-Headers: Content-Type
    validate_certs: false
    status_code: 204
  register: csplogger_verify_preflight
  failed_when: >-
    csplogger_verify_preflight.access_control_allow_methods | default('') != 'POST, OPTIONS'
    or csplogger_verify_preflight.access_control_allow_origin | default('') != '*'
    or 'Content-Type' not in (csplogger_verify_preflight.access_control_allow_headers | default(''))
    or (csplogger_verify_preflight.access_control_max_age | default('') | string) != '86400'

# Exercise the body-size cap on /log. CSP reports are tiny; the cap
# stops a runaway site CSP or hostile poster from chewing bandwidth.
- name: _verify | /log rejects oversize bodies (>64K)
  uri:
    url: https://localhost/log
    method: POST
    headers:
      Host: "csplogger.{{ inventory_hostname }}.{{ domain }}"
    validate_certs: false
    body_format: json
    body:
      csp-report: "{{ csp_legacy_body['csp-report'] | combine({'script-sample': 'A' * 70000}) }}"
    status_code: 413

- name: _verify | GET /log is rejected (POST/OPTIONS only)
  uri:
    url: https://localhost/log
    method: GET
    headers:
      Host: "csplogger.{{ inventory_hostname }}.{{ domain }}"
    validate_certs: false
    status_code: 403

- name: _verify | GET / on csplogger subdomain returns 404
  uri:
    url: https://localhost/
    method: GET
    headers:
      Host: "csplogger.{{ inventory_hostname }}.{{ domain }}"
    validate_certs: false
    status_code: 404

# Runtime check on flatten-csp.lua: the dry-run validator in roles/fluentbit
# catches lua *load* errors at config time, but nil-deref / type-mismatch
# bugs only show up when a real record runs through the filter. After the
# legacy + reporting-api POSTs above, scan fluent-bit's journal for any
# [error] line mentioning either lua script and fail loudly. Failure mode
# is per-record (fluent-bit still returns 204), so without this the only
# symptom would be silently-dropped attributes in HyperDX.
- name: _verify | fluent-bit lua filters logged no runtime errors
  command: journalctl -u fluent-bit --since "5 minutes ago" --no-pager
  register: csplogger_verify_journal
  changed_when: false
  failed_when: csplogger_verify_journal.stdout is regex('\[error\].*(flatten-csp|otlp-shape|level-from-message)\.lua')
  become: true

# End-to-end shape assertion: POST a CSP report through the live
# pipeline (nginx -> fluent-bit -> flatten-csp.lua -> otlp-shape.lua ->
# OTLP HTTP -> hyperdx otel-collector -> ClickHouse) and query the
# landed otel_logs row to confirm every column ended up where the
# downstream UI expects:
#   ServiceName       = csplogger      (drives "Services" view; sourced
#                                       from Resource.service.name)
#   SeverityText      = "warn"         (flatten-csp pins; transform
#                                       processor's body-keyword
#                                       fallback only fires when
#                                       severity is unset)
#   SeverityNumber    = 13             (OTel SEVERITY_NUMBER_WARN)
#   Body              startswith "CSP" (flatten-csp synthesises)
#   LogAttributes contains csp_* + SYSLOG_IDENTIFIER + host
#   ResourceAttributes contains service.name + host.name
# csplogger's _setup imports hyperdx so the box test VM has the real
# OTLP receiver + ClickHouse stack stood up. Without that import,
# fluent-bit's OTLP output would retry against an unbound port and the
# query below would find nothing.
- name: _verify | OTLP-end-to-end | build per-run marker
  set_fact:
    csplogger_otlp_marker: "verify_otlp_{{ ansible_date_time.iso8601_basic_short }}_{{ 99999 | random }}"

- name: _verify | OTLP-end-to-end | POST marked CSP report through nginx
  uri:
    url: http://127.0.0.1:{{ service_ports.csp_ingest }}/
    method: POST
    body_format: json
    body:
      csp-report:
        blocked-uri: "https://_verify.example/{{ csplogger_otlp_marker }}"
        document-uri: "https://_verify.example/"
        violated-directive: "script-src"
        effective-directive: "script-src-elem"
        original-policy: "default-src 'self'"
    status_code: 204

# Wait for the row to land. fluent-bit's Flush=5s plus collector batch
# timeout (5s) means up to ~10s typical, with retries on initial cold
# start of the collector pipeline.
#
# Match on LogAttributes['csp_blocked_uri'] rather than Body LIKE: the
# query command itself ends up in ansible's own task-output journal
# entry (SYSLOG_IDENTIFIER=ansible-ansible.legacy.command), which
# fluent-bit's systemd input ships back to ClickHouse with the marker
# baked into its Body -- Body LIKE matches that decoy instead of the
# real CSP record. csp_blocked_uri is only populated by flatten-csp.lua.
- name: _verify | OTLP-end-to-end | wait for ClickHouse row matching marker
  command: >-
    podman exec hyperdx curl --fail -s --max-time 5
    "http://localhost:8123/?query=SELECT+count()+FROM+default.otel_logs+WHERE+LogAttributes%5B'csp_blocked_uri'%5D+LIKE+'%25{{ csplogger_otlp_marker }}%25'"
  register: csplogger_otlp_count
  changed_when: false
  failed_when: false
  retries: 30
  delay: 2
  until: csplogger_otlp_count.rc == 0 and (csplogger_otlp_count.stdout | trim | int) > 0
  become: true

- name: _verify | OTLP-end-to-end | fetch CSP row as JSON
  command: >-
    podman exec hyperdx curl --fail -s --max-time 5
    "http://localhost:8123/?query=SELECT+Body,SeverityText,toUInt32(SeverityNumber)+AS+SeverityNumber,ServiceName,LogAttributes%5B'csp_blocked_uri'%5D+AS+csp_blocked_uri,LogAttributes%5B'csp_format'%5D+AS+csp_format,LogAttributes%5B'csp_violated_directive'%5D+AS+csp_violated_directive,LogAttributes%5B'csp_effective_directive'%5D+AS+csp_effective_directive,LogAttributes%5B'host'%5D+AS+log_host,ResourceAttributes%5B'service.name'%5D+AS+resource_service_name,ResourceAttributes%5B'host.name'%5D+AS+resource_host_name+FROM+default.otel_logs+WHERE+LogAttributes%5B'csp_blocked_uri'%5D+LIKE+'%25{{ csplogger_otlp_marker }}%25'+ORDER+BY+Timestamp+DESC+LIMIT+1+FORMAT+JSONEachRow"
  register: csplogger_otlp_row
  changed_when: false
  become: true

- name: _verify | OTLP-end-to-end | assert landed row shape
  vars:
    row: "{{ csplogger_otlp_row.stdout | from_json }}"
  assert:
    that:
      # Body shape: "CSP <effective> blocked <uri> on <doc> {<json>}".
      # The JSON suffix populates LogAttributes via HyperDX collector's
      # ExtractPatterns + merge_maps, AND its first key "level":"warn"
      # is what the severity-keyword regex matches to set
      # SeverityText/Number. Each that-item is quoted as a string --
      # ansible 2.16+ rejects bare expressions.
      - "row.Body is match('^CSP ')"
      - "row.SeverityText == 'warn'"
      - "row.SeverityNumber | int == 13"
      - "row.ServiceName == 'csplogger'"
      - "row.csp_format == 'legacy'"
      - "row.csp_violated_directive == 'script-src'"
      - "row.csp_effective_directive == 'script-src-elem'"
      - "row.log_host == inventory_hostname"
      - "row.resource_service_name == 'csplogger'"
      - "row.resource_host_name == inventory_hostname"
      - "csplogger_otlp_marker in row.csp_blocked_uri"
    fail_msg: "CSP record landed in ClickHouse but with wrong shape: {{ row }}"
