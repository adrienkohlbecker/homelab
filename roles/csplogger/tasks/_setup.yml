- name: _setup | Install nginx
  import_role:
    name: _test
    tasks_from: nginx

# The csplogger nginx site is a thin proxy onto fluent-bit's HTTP input;
# without fluent-bit listening, /log POSTs would 502. Bring up the full
# fluentbit role so _verify can exercise the end-to-end path.
- name: _setup | Install fluentbit
  import_role:
    name: fluentbit
