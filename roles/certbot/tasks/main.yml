- name: Install certbot
  apt:
    pkg:
      - certbot
      - python3-certbot-dns-cloudflare
      - ssl-cert
    cache_valid_time: 3600
  register: certbot_apt
  become: true
  tags:
    - certbot

# Relax apt's default 0700 on live/ and archive/ to 0750 with group
# ssl-cert so non-root consumers (nginx as www-data, netdata) can
# traverse into <domain>/ to read fullchain.pem. Plain 0755 would
# expose directory traversal to every local UID and bind-mounted
# container; combined with the wildcard SAN on the per-host cert
# that's a forever-cert blast radius if any uid lands in a position
# to read privkey.pem. Consumer roles add their service user to
# ssl-cert in their own install.yml.
- name: Set permissions on storage directories
  file:
    dest: /etc/letsencrypt/{{ item }}
    state: directory
    owner: root
    group: ssl-cert
    mode: "0750"
  loop:
    - live
    - archive
  become: true
  when: not (ansible_check_mode and certbot_apt.changed)
  tags:
    - certbot

# Pin crypto posture, email, and creds path globally so a hand-run
# `certbot certonly` / `certbot renew` on the box gets the same shape
# as ansible's invocation. cli.ini values are defaults; per-cert
# renewal/<name>.conf (and explicit argv flags) still override.
- name: Write certbot cli.ini
  copy:
    dest: /etc/letsencrypt/cli.ini
    content: |
      agree-tos = true
      email = {{ root_email }}
      key-type = ecdsa
      elliptic-curve = secp384r1
      dns-cloudflare-credentials = /etc/letsencrypt/cloudflare.ini
    mode: "0644"
    owner: root
    group: root
    backup: true
  become: true
  when: not (ansible_check_mode and certbot_apt.changed)
  tags:
    - certbot

- name: Write cloudflare credentials
  copy:
    dest: /etc/letsencrypt/cloudflare.ini
    content: "dns_cloudflare_api_token = {{ cloudflare_api_token }}\n"
    mode: "0600"
    owner: root
    group: root
    backup: true
  become: true
  no_log: true
  when: not (ansible_check_mode and certbot_apt.changed)
  tags:
    - certbot

# Flag notes:
#   --cert-name pins the lineage path. Without it certbot derives it
#       from the first -d SAN, so reordering or adding a SAN later
#       silently rolls live/<name>-0001/ and breaks every consumer
#       (nginx, x509check.conf, services reading fullchain.pem).
#   Crypto posture (key-type=ecdsa, elliptic-curve=secp384r1), email,
#       agree-tos, and the cloudflare creds path are pinned in
#       /etc/letsencrypt/cli.ini above so they apply to hand-run
#       certbot too. Existing RSA-keyed hosts need a one-shot
#       migration: `sudo certbot certonly --force-renewal --cert-name X
#       --key-type ecdsa --elliptic-curve secp384r1 ...`.
#   We do NOT pass --reuse-key. Renewals rotate the SPKI every ~60d,
#       narrowing the blast radius if privkey.pem leaks through the
#       ssl-cert group. Hosts previously issued with --reuse-key keep
#       it baked into renewal/<name>.conf; rotate once with
#       `sudo certbot renew --cert-name X --force-renewal --no-reuse-key`.
#   --deploy-hook is persisted into renewal/<name>.conf so the
#       out-of-band certbot.timer renewal reloads nginx without a
#       separate /etc/letsencrypt/renewal-hooks/deploy/ script.
#       Migrate existing prod hosts with `sudo certbot reconfigure
#       --cert-name X --deploy-hook '<cmd>'`.
#
# Detect SAN drift so an inventory_hostname rename, domain change, or
# manual SAN addition triggers re-issuance instead of silently
# no-op'ing forever. A bare `creates:` gate on privkey.pem fires
# regardless of cert content.
#
# Snakeoils from roles/nginx/_setup.yml and roles/_test/nginx.yml write
# to /etc/letsencrypt/live/<dom>/privkey.pem; _setup.yml is test-only
# (never invoked by site.yml) so prod is unaffected, but a future
# composed harness fixture applying those snakeoils before this role
# on the same VM would have their SAN set inspected here and trigger
# a --force-renewal, which is the right behavior.
- name: Stat existing certificate
  stat:
    path: /etc/letsencrypt/live/{{ inventory_hostname }}.{{ domain }}/fullchain.pem
  register: certbot_cert_stat
  become: true
  tags:
    - certbot

- name: Read existing certificate SANs
  community.crypto.x509_certificate_info:
    path: /etc/letsencrypt/live/{{ inventory_hostname }}.{{ domain }}/fullchain.pem
  register: certbot_cert_info
  when: certbot_cert_stat.stat.exists
  become: true
  tags:
    - certbot

- name: Issue certificate  # noqa: no-changed-when -- when: gates execution, like creates: did
  command:
    argv: >-
      {{ ['certbot', 'certonly', '--noninteractive', '--dns-cloudflare',
          '--cert-name', inventory_hostname + '.' + domain,
          '--deploy-hook', certbot_deploy_hook,
          '-d', inventory_hostname + '.' + domain,
          '-d', '*.' + inventory_hostname + '.' + domain]
         + (certbot_sans_drifted | ternary(['--force-renewal'], []))
         + (certbot_production_certificates | ternary([], ['--test-cert'])) }}
  vars:
    certbot_deploy_hook: >-
      logger -t certbot-deploy "reloading nginx for ${RENEWED_LINEAGE:-?}";
      systemctl is-active --quiet nginx && systemctl reload nginx
    certbot_expected_sans:
      - "DNS:{{ inventory_hostname }}.{{ domain }}"
      - "DNS:*.{{ inventory_hostname }}.{{ domain }}"
    certbot_sans_drifted: >-
      {{ certbot_cert_stat.stat.exists
         and (certbot_cert_info.subject_alt_name | sort) != (certbot_expected_sans | sort) }}
  become: true
  no_log: true
  when:
    - not (ansible_check_mode and certbot_apt.changed)
    - (not certbot_cert_stat.stat.exists) or certbot_sans_drifted
  tags:
    - certbot
