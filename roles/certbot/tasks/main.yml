- name: Install certbot
  apt:
    pkg:
      - certbot
      - python3-certbot-dns-cloudflare
      - ssl-cert
    cache_valid_time: 3600
  register: certbot_apt
  become: true
  tags:
    - certbot

# Relax apt's default 0700 on live/ and archive/ to 0750 with group
# ssl-cert so non-root consumers (nginx as www-data, netdata) can
# traverse into <domain>/ to read fullchain.pem. Plain 0755 would
# expose directory traversal to every local UID and bind-mounted
# container; combined with the wildcard SAN on the per-host cert
# that's a forever-cert blast radius if any uid lands in a position
# to read privkey.pem. Consumer roles add their service user to
# ssl-cert in their own install.yml.
- name: Set permissions on storage directories
  file:
    dest: /etc/letsencrypt/{{ item }}
    state: directory
    owner: root
    group: ssl-cert
    mode: "0750"
  loop:
    - live
    - archive
  become: true
  when: not (ansible_check_mode and certbot_apt.changed)
  tags:
    - certbot

- name: Write cloudflare credentials
  copy:
    dest: /etc/letsencrypt/cloudflare.ini
    content: "dns_cloudflare_api_token = {{ cloudflare_api_token }}\n"
    mode: "0600"
    owner: root
    group: root
    backup: true
  become: true
  no_log: true
  when: not (ansible_check_mode and certbot_apt.changed)
  tags:
    - certbot

# Flag notes:
#   --cert-name pins the lineage path. Without it certbot derives it
#       from the first -d SAN, so reordering or adding a SAN later
#       silently rolls live/<name>-0001/ and breaks every consumer
#       (nginx, x509check.conf, services reading fullchain.pem).
#   --key-type/--elliptic-curve pin the crypto posture against future
#       certbot-default flips. Existing RSA-keyed certs aren't re-keyed
#       automatically (--reuse-key below); migrate an existing host
#       once with `sudo certbot certonly --force-renewal --cert-name X
#       --key-type ecdsa --elliptic-curve secp384r1 ...`.
#   --reuse-key keeps SPKI stable across renewals so monitoring
#       (netdata x509check, external pinning) doesn't churn every
#       60 days. A leaked key is mitigated by revoke-and-reissue.
#   --deploy-hook is persisted into renewal/<name>.conf so the
#       out-of-band certbot.timer renewal reloads nginx without a
#       separate /etc/letsencrypt/renewal-hooks/deploy/ script.
#       Migrate existing prod hosts with `sudo certbot reconfigure
#       --cert-name X --deploy-hook '<cmd>'`.
#
# Snakeoils from roles/nginx/_setup.yml and roles/_test/nginx.yml write
# to /etc/letsencrypt/live/<dom>/privkey.pem -- same path the `creates:`
# gate checks. _setup.yml is test-only (never invoked by site.yml) so
# prod is unaffected, but a future composed harness fixture applying
# those snakeoils before this role on the same VM would silently skip
# real issuance.
- name: Get certificate
  command:
    argv: >-
      {{ ['certbot', 'certonly', '--agree-tos', '-m', root_email,
          '--noninteractive', '--dns-cloudflare',
          '--dns-cloudflare-credentials', '/etc/letsencrypt/cloudflare.ini',
          '--cert-name', inventory_hostname + '.' + domain,
          '--key-type', 'ecdsa', '--elliptic-curve', 'secp384r1',
          '--reuse-key',
          '--deploy-hook', certbot_deploy_hook,
          '-d', inventory_hostname + '.' + domain,
          '-d', '*.' + inventory_hostname + '.' + domain]
         + (certbot_production_certificates | ternary([], ['--test-cert'])) }}
  vars:
    certbot_deploy_hook: >-
      logger -t certbot-deploy "reloading nginx for ${RENEWED_LINEAGE:-?}";
      systemctl is-active --quiet nginx && systemctl reload nginx
  args:
    creates: /etc/letsencrypt/live/{{ inventory_hostname }}.{{ domain }}/privkey.pem
  become: true
  no_log: true
  when: not (ansible_check_mode and certbot_apt.changed)
  tags:
    - certbot
