- name: Install certbot
  apt:
    pkg:
      - certbot
      - python3-certbot-dns-cloudflare
    cache_valid_time: 3600
  become: true
  register: certbot_apt
  tags:
    - certbot

# Relax apt's default 0700 on live/ and archive/ to 0755 so non-root
# services (e.g. www-data) can traverse into <domain>/ to read fullchain.
- name: Set permissions on storage directories
  file:
    dest: /etc/letsencrypt/{{ item }}
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - live
    - archive
  become: true
  tags:
    - certbot

# Renewal happens out-of-band via the certbot.timer that the apt package
# ships. Without this hook nginx would keep serving the pre-renewal cert
# until something else restarted it. The Ubuntu certbot package doesn't
# pre-create renewal-hooks/deploy, so we own it here.
- name: Create renewal-hooks deploy directory
  file:
    dest: /etc/letsencrypt/renewal-hooks/deploy
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true
  tags:
    - certbot

- name: Install nginx reload deploy-hook
  copy:
    src: reload_nginx.sh
    dest: /etc/letsencrypt/renewal-hooks/deploy/reload_nginx.sh
    owner: root
    group: root
    mode: "0755"
    backup: true
  become: true
  tags:
    - certbot

- name: Write cloudflare credentials
  copy:
    dest: /etc/letsencrypt/cloudflare.ini
    content: "dns_cloudflare_api_token = {{ cloudflare_api_token }}\n"
    mode: "0600"
    owner: root
    group: root
    backup: true
  become: true
  no_log: true
  tags:
    - certbot

- name: Get certificates
  command: certbot certonly --agree-tos -m {{ root_email }} --noninteractive {{ certbot_production_certificates|ternary('', '--test-cert') }} --dns-cloudflare --dns-cloudflare-credentials /etc/letsencrypt/cloudflare.ini --dns-cloudflare-propagation-seconds 30 -d "{{ item }}" -d "*.{{ item }}"
  args:
    creates: /etc/letsencrypt/live/{{ item }}/privkey.pem
  become: true
  loop:
    - "{{ domain }}"
    - "{{ inventory_hostname }}.{{ domain }}"
  tags:
    - certbot

# Renewal happens out-of-band via certbot.timer. The apt package's
# systemd preset enables it, but assert explicitly so a manual
# `systemctl disable` (or a future preset change) doesn't silently
# leave certs to expire. Gated so check mode against a host that
# doesn't have certbot installed yet doesn't fail on the missing unit.
- name: Ensure certbot.timer is enabled and running
  systemd:
    name: certbot.timer
    enabled: true
    state: started
  when: not (ansible_check_mode and certbot_apt.changed)
  become: true
  tags:
    - certbot
