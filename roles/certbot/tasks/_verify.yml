# Functional checks for the certbot role. The role's main.yml fails
# loudly if the certbot subprocess errors, but that doesn't catch
# regressions like "wrong SANs", "snakeoil left from a sibling _setup
# masquerading as the real cert", or "x509check.conf.j2 broke" --
# x509check.conf is rendered from roles/netdata/tasks/main.yml so a
# break only surfaces on the netdata test. The import_tasks: netdata.yml
# at the bottom pulls that path into certbot's own coverage.

- name: _verify | Stat cert files
  stat:
    path: "{{ item }}"
  loop:
    - /etc/letsencrypt/live/{{ inventory_hostname }}.{{ domain }}/privkey.pem
    - /etc/letsencrypt/live/{{ inventory_hostname }}.{{ domain }}/fullchain.pem
  register: _verify_certs
  become: true

- name: _verify | Cert files exist
  assert:
    that:
      - item.stat.exists
    fail_msg: "missing cert at {{ item.item }}"
  loop: "{{ _verify_certs.results }}"
  loop_control:
    label: "{{ item.item }}"

- name: _verify | Inspect issued certificate
  community.crypto.x509_certificate_info:
    path: /etc/letsencrypt/live/{{ inventory_hostname }}.{{ domain }}/fullchain.pem
  register: _verify_cert_info
  become: true

- name: _verify | Certificate SANs cover host + wildcard
  assert:
    that:
      - ("DNS:" + inventory_hostname + "." + domain) in _verify_cert_info.subject_alt_name
      - ("DNS:*." + inventory_hostname + "." + domain) in _verify_cert_info.subject_alt_name
    fail_msg: >-
      cert missing host+wildcard SANs
      (got {{ _verify_cert_info.subject_alt_name }})

# Distinguishes "real LE cert" from snakeoil/self-signed left in place
# by a sibling role's _setup at the same paths. Staging and prod have
# different issuer shapes; pick the marker that's stable in each.
- name: _verify | Certificate is from Let's Encrypt
  assert:
    that:
      - >-
        (not certbot_production_certificates and 'STAGING' in (_verify_cert_info.issuer.commonName | default('')))
        or (certbot_production_certificates and "Let's Encrypt" in (_verify_cert_info.issuer.organizationName | default('')))
    fail_msg: >-
      cert not issued by expected LE
      (issuer={{ _verify_cert_info.issuer }}, staging_expected={{ not certbot_production_certificates }})

# Renewals only happen if certbot.timer is enabled+active. Both
# commands exit non-zero on failure, so the task fails as its own
# functional assertion -- no separate `assert:` needed.
- name: _verify | certbot.timer is enabled
  command: systemctl is-enabled certbot.timer
  changed_when: false
  become: true

- name: _verify | certbot.timer is active
  command: systemctl is-active certbot.timer
  changed_when: false
  become: true

- name: _verify | Stat cloudflare credentials file
  stat:
    path: /etc/letsencrypt/cloudflare.ini
  register: _verify_cf
  become: true

- name: _verify | Cloudflare credentials are 0600 root:root
  assert:
    that:
      - _verify_cf.stat.exists
      - _verify_cf.stat.mode == "0600"
      - _verify_cf.stat.pw_name == "root"
      - _verify_cf.stat.gr_name == "root"
    fail_msg: "cloudflare.ini has wrong perms or owner ({{ _verify_cf.stat }})"

# Directory perms are load-bearing: wildcard SAN + lax dir mode = any
# local-uid read of privkey.pem grants forever-cert for the host's
# entire subdomain tree. 0750 root:ssl-cert restricts traversal to
# explicit consumers (www-data, netdata) added to ssl-cert by their
# own roles. A regression to 0755 / group:root would be silent
# without this assertion.
- name: _verify | Stat LE storage directories
  stat:
    path: /etc/letsencrypt/{{ item }}
  loop:
    - live
    - archive
  register: _verify_le_dirs
  become: true

- name: _verify | LE storage directories are 0750 root:ssl-cert
  assert:
    that:
      - item.stat.exists
      - item.stat.mode == "0750"
      - item.stat.pw_name == "root"
      - item.stat.gr_name == "ssl-cert"
    fail_msg: "{{ item.item }} has wrong perms or owner ({{ item.stat }})"
  loop: "{{ _verify_le_dirs.results }}"
  loop_control:
    label: "{{ item.item }}"

# Cover the cross-role coupling: roles/netdata/tasks/main.yml calls
# into roles/certbot/tasks/netdata.yml, so a break in x509check.conf.j2
# would otherwise only surface on the netdata test. netdata_restart is
# false because the harness installed netdata with policy_rc_d=101 in
# _setup.yml -- the unit isn't running, and restarting would be a no-op
# noise either way.
- name: _verify | Render netdata x509check config
  import_tasks: netdata.yml
  vars:
    netdata_restart: false

- name: _verify | Read rendered x509check config
  slurp:
    src: /etc/netdata/go.d/x509check.conf
  register: _verify_x509check
  become: true

- name: _verify | x509check references the host cert path
  assert:
    that:
      - "'/etc/letsencrypt/live/' + inventory_hostname + '.' + domain + '/fullchain.pem' in (_verify_x509check.content | b64decode)"
    fail_msg: x509check.conf didn't render the host cert path
