# Functional checks for the certbot role. The role's main.yml fails
# loudly if the certbot subprocess errors, but that doesn't catch
# regressions like "wrong SANs", "snakeoil left from a sibling _setup
# masquerading as the real cert", or "x509check.conf.j2 broke" --
# x509check.conf is rendered from roles/netdata/tasks/main.yml so a
# break only surfaces on the netdata test. The import_tasks: netdata.yml
# at the bottom pulls that path into certbot's own coverage.

- name: _verify | Stat cert files
  stat:
    path: "{{ item }}"
  loop:
    - /etc/letsencrypt/live/{{ inventory_hostname }}.{{ domain }}/privkey.pem
    - /etc/letsencrypt/live/{{ inventory_hostname }}.{{ domain }}/fullchain.pem
  register: _verify_certs
  become: true

- name: _verify | Cert files exist
  assert:
    that:
      - item.stat.exists
    fail_msg: "missing cert at {{ item.item }}"
  loop: "{{ _verify_certs.results }}"
  loop_control:
    label: "{{ item.item }}"

# valid_at: catches a stale-but-existing cert (certbot silently failed,
# old file still on disk) which the SAN+issuer asserts below would
# happily pass. Module evaluates the timestamps server-side so the
# assertion is just a boolean check.
- name: _verify | Inspect issued certificate
  community.crypto.x509_certificate_info:
    path: /etc/letsencrypt/live/{{ inventory_hostname }}.{{ domain }}/fullchain.pem
    valid_at:
      now: "+0s"
      week_out: "+7d"
  register: _verify_cert_info
  become: true

- name: _verify | Certificate SANs cover host + wildcard, valid for at least 7d
  assert:
    that:
      - ("DNS:" + inventory_hostname + "." + domain) in _verify_cert_info.subject_alt_name
      - ("DNS:*." + inventory_hostname + "." + domain) in _verify_cert_info.subject_alt_name
      - _verify_cert_info.valid_at.now
      - _verify_cert_info.valid_at.week_out
    fail_msg: >-
      cert missing host+wildcard SANs or expiring soon
      (SANs={{ _verify_cert_info.subject_alt_name }},
      not_after={{ _verify_cert_info.not_after }},
      valid_at={{ _verify_cert_info.valid_at }})

# Distinguishes "real LE cert" from snakeoil/self-signed left in place
# by a sibling role's _setup at the same paths. Staging and prod have
# different issuer shapes; pick the marker that's stable in each.
- name: _verify | Certificate is from Let's Encrypt
  assert:
    that:
      - >-
        (not certbot_production_certificates and 'STAGING' in (_verify_cert_info.issuer.commonName | default('')))
        or (certbot_production_certificates and "Let's Encrypt" in (_verify_cert_info.issuer.organizationName | default('')))
    fail_msg: >-
      cert not issued by expected LE
      (issuer={{ _verify_cert_info.issuer }}, staging_expected={{ not certbot_production_certificates }})

# Renewals only happen if certbot.timer is enabled+active. The
# systemd module returns the full unit status dict so a single
# inspect+assert replaces two `systemctl is-X` shell-outs.
- name: _verify | Inspect certbot.timer
  systemd:
    name: certbot.timer
  register: _verify_timer
  become: true

- name: _verify | certbot.timer is loaded, enabled, and active
  assert:
    that:
      - _verify_timer.status.LoadState == "loaded"
      - _verify_timer.status.UnitFileState == "enabled"
      - _verify_timer.status.ActiveState == "active"
    fail_msg: >-
      certbot.timer not in expected state
      (LoadState={{ _verify_timer.status.LoadState }},
      UnitFileState={{ _verify_timer.status.UnitFileState }},
      ActiveState={{ _verify_timer.status.ActiveState }})

- name: _verify | Stat cloudflare credentials file
  stat:
    path: /etc/letsencrypt/cloudflare.ini
  register: _verify_cf
  become: true

- name: _verify | Cloudflare credentials are 0600 root:root
  assert:
    that:
      - _verify_cf.stat.exists
      - _verify_cf.stat.mode == "0600"
      - _verify_cf.stat.pw_name == "root"
      - _verify_cf.stat.gr_name == "root"
    fail_msg: "cloudflare.ini has wrong perms or owner ({{ _verify_cf.stat }})"

# Directory perms are load-bearing: wildcard SAN + lax dir mode = any
# local-uid read of privkey.pem grants forever-cert for the host's
# entire subdomain tree. 0750 root:ssl-cert restricts traversal to
# explicit consumers (www-data, netdata) added to ssl-cert by their
# own roles. A regression to 0755 / group:root would be silent
# without this assertion.
- name: _verify | Stat LE storage directories
  stat:
    path: /etc/letsencrypt/{{ item }}
  loop:
    - live
    - archive
  register: _verify_le_dirs
  become: true

- name: _verify | LE storage directories are 0750 root:ssl-cert
  assert:
    that:
      - item.stat.exists
      - item.stat.mode == "0750"
      - item.stat.pw_name == "root"
      - item.stat.gr_name == "ssl-cert"
    fail_msg: "{{ item.item }} has wrong perms or owner ({{ item.stat }})"
  loop: "{{ _verify_le_dirs.results }}"
  loop_control:
    label: "{{ item.item }}"

# Cover the cross-role coupling: roles/netdata/tasks/main.yml calls
# into roles/certbot/tasks/netdata.yml, so a break in x509check.conf.j2
# would otherwise only surface on the netdata test. This is test
# scaffolding (netdata isn't a real certbot dependency), so the
# install lives here in _verify rather than _setup. netdata_restart
# is false because policy_rc_d=101 keeps the unit out of the running
# set under test -- restarting would be a no-op noise either way.
- name: _verify | Install netdata
  import_role:
    name: netdata
    tasks_from: install

- name: _verify | Render netdata x509check config
  import_tasks: netdata.yml
  vars:
    netdata_restart: false

- name: _verify | Read rendered x509check config
  slurp:
    src: /etc/netdata/go.d/x509check.conf
  register: _verify_x509check
  become: true

- name: _verify | x509check renders structurally-valid YAML pointing at the host cert
  vars:
    _x509check: "{{ _verify_x509check.content | b64decode | from_yaml }}"
    _expected_source: "file:///etc/letsencrypt/live/{{ inventory_hostname }}.{{ domain }}/fullchain.pem"
  assert:
    that:
      - _x509check.jobs | length == 1
      - _x509check.jobs[0].source == _expected_source
    fail_msg: >-
      x509check.conf didn't render the host cert path correctly
      (parsed={{ _x509check }}, expected source={{ _expected_source }})

# End-to-end functional check: --dry-run exercises the credentials
# file, the DNS-cloudflare plugin, and the persisted --deploy-hook in
# one shot. Always hits the LE staging endpoint regardless of
# certbot_production_certificates, so it doesn't burn prod rate-limit
# slots if a future change wires _verify into a non-test path. Catches
# regressions like "credentials file rotation didn't propagate",
# "renewal config lost --deploy-hook", or "DNS plugin failed" that the
# stat/SAN checks above would happily pass.
- name: _verify | certbot renew --dry-run exercises the renewal path
  command: certbot renew --dry-run
  changed_when: false
  become: true
