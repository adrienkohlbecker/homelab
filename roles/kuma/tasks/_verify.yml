# Loopback probe -- the unit's --sdnotify=healthy gates systemd `active`
# on kuma's in-container healthcheck, which itself probes HTTP, so by the
# time _verify runs HTTP is already up. The short retry covers the tiny
# race between active transition and this task firing; a real failure
# reports in seconds, not minutes.
- name: _verify | Kuma answers on its loopback port
  uri:
    url: http://localhost:{{ service_ports.kuma }}/
    status_code: 200
  register: _verify_loopback
  retries: 5
  delay: 1
  until: _verify_loopback.status == 200
  become: true

# nginx auth-gate probe -- the UI subdomain is `auth: required`, so a
# cookieless GET / has to land on Authelia's 302 redirect chain. Validates
# both the auth_request wiring and the proxy_pass port.
- name: _verify | Kuma UI gate redirects unauthenticated to Authelia
  uri:
    url: https://localhost/
    headers:
      Host: kuma.{{ inventory_hostname }}.{{ domain }}
    validate_certs: false
    follow_redirects: none
    status_code: 302
  register: _verify_nginx_gate
  failed_when: >-
    _verify_nginx_gate.status != 302
    or 'auth.' not in (_verify_nginx_gate.location | default(''))
  become: true

# /api/push/ bypass -- exercises the sibling location carved out for
# push-monitor heartbeats. An unknown token still proves the request
# reached kuma: it answers with JSON `{ok:false, msg:"Monitor not
# found or not active."}` (status 404 on 1.23.13; older builds 200).
# What we actually care about is that the response came from kuma,
# not from Authelia -- a 302 here means auth_request inside `location /`
# is still firing on this path.
- name: _verify | /api/push/<token> bypasses the Authelia gate
  uri:
    url: https://localhost/api/push/00000000
    headers:
      Host: kuma.{{ inventory_hostname }}.{{ domain }}
    validate_certs: false
    follow_redirects: none
    status_code: [ 200, 404 ]
  register: _verify_push_bypass
  failed_when: >-
    _verify_push_bypass.status == 302
    or (_verify_push_bypass.json | default({})).get('msg') != 'Monitor not found or not active.'
  become: true

# Symlink contract -- the role promises /mnt/services/kuma/kuma.db is a
# symlink onto the dedicated sqlite dataset. A snapshot-restore or a
# regression in sqlite_dataset could leave a real file at the dest; assert
# the symlink shape so the drift is loud, not silent.
- name: _verify | Kuma.db is a symlink onto the sqlite dataset
  stat:
    path: /mnt/services/kuma/kuma.db
    follow: false
  register: _verify_symlink
  failed_when: >-
    not _verify_symlink.stat.exists
    or not _verify_symlink.stat.islnk
    or _verify_symlink.stat.lnk_target != '/mnt/services/sqlite/kuma/kuma.db'
  become: true

# Uid regression detector -- kuma runs as the kuma host uid directly
# (tier-1 --user, no uidmap, entrypoint shell wrapper bypassed). kuma.db
# should land owned by that user. A regression that drops the --user
# flag or re-introduces uidmap could land the file as root or another
# uid silently; assert ownership so the regression is loud.
- name: _verify | Kuma sqlite DB is owned by kuma
  stat:
    path: /mnt/services/sqlite/kuma/kuma.db
  register: _verify_db_owner
  failed_when: >-
    not _verify_db_owner.stat.exists
    or _verify_db_owner.stat.pw_name != 'kuma'
  become: true

# disableAuth guard probe -- main.yml must never flip disableAuth on an
# instance with no user: kuma's auto-login derefs the first user row and
# crashes the socket handshake. A fresh test VM has an empty user table, so
# assert the row was left unset. The populated-user (prod) path can't be
# driven here without scripting kuma's socket.io setup wizard to mint a
# user, so only the safety-critical guard is exercised in-harness.
- name: _verify | DisableAuth stays unset while the user table is empty
  command: >-
    sqlite3 -readonly /mnt/services/sqlite/kuma/kuma.db
    "SELECT (SELECT count(*) FROM user),
            coalesce((SELECT value FROM setting WHERE key='disableAuth'), 'unset');"
  register: _verify_disableauth
  changed_when: false
  failed_when: >-
    (_verify_disableauth.stdout.split('|')[0] | int) == 0
    and _verify_disableauth.stdout.split('|')[1] | trim == 'true'
  become: true

# Functional WAL probe -- the entire point of the dedicated 4K-recordsize
# sqlite dataset is a WAL workload. A future regression (PRAGMA against
# a held DB silently no-ops; default journal=delete if WAL isn't forced)
# would land the file on the right dataset but with the wrong access
# pattern. Read-only probe, doesn't lock.
- name: _verify | Kuma sqlite is in WAL journal mode
  command: sqlite3 -readonly /mnt/services/sqlite/kuma/kuma.db 'PRAGMA journal_mode;'
  register: _verify_wal
  changed_when: false
  failed_when: _verify_wal.stdout | trim != 'wal'
  become: true

# Positive seed path -- the empty-table guard above proves the seed is
# SKIPPED with no user; this proves it FLIPS once a user exists, the
# prod-only branch unreachable against the harness's fresh kuma (which has
# an empty user table). Run against a synthetic kuma-shaped DB so we neither
# mutate the live instance nor depend on kuma's full user schema; the
# statement mirrors main.yml's seed -- keep the two in sync.
- name: _verify | DisableAuth seed flips once, then is idempotent
  block:
    - name: _verify | Build a synthetic kuma-shaped DB with one user
      command: >-
        sqlite3 /tmp/_verify_kuma_seed.db
        "CREATE TABLE user (id INTEGER PRIMARY KEY, username TEXT);
         CREATE TABLE setting (key TEXT PRIMARY KEY, value TEXT, type TEXT);
         INSERT INTO user (username) VALUES ('_verify');"
      changed_when: true
      become: true

    - name: _verify | First seed pass mutates (changes()=1)
      command: >-
        sqlite3 -cmd ".timeout 30000" /tmp/_verify_kuma_seed.db
        "INSERT INTO setting (key, value, type)
           SELECT 'disableAuth', 'true', 'general' WHERE EXISTS (SELECT 1 FROM user)
         ON CONFLICT(key) DO UPDATE SET value='true', type='general'
           WHERE setting.value != 'true';
         SELECT changes();"
      register: _verify_seed_first
      changed_when: false
      failed_when: (_verify_seed_first.stdout | trim) != '1'
      become: true

    - name: _verify | Second seed pass is a no-op (changes()=0)
      command: >-
        sqlite3 -cmd ".timeout 30000" /tmp/_verify_kuma_seed.db
        "INSERT INTO setting (key, value, type)
           SELECT 'disableAuth', 'true', 'general' WHERE EXISTS (SELECT 1 FROM user)
         ON CONFLICT(key) DO UPDATE SET value='true', type='general'
           WHERE setting.value != 'true';
         SELECT changes();"
      register: _verify_seed_second
      changed_when: false
      failed_when: (_verify_seed_second.stdout | trim) != '0'
      become: true
  always:
    - name: _verify | Drop the synthetic DB
      file:
        path: /tmp/_verify_kuma_seed.db
        state: absent
      become: true
