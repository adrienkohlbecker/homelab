- name: Set up kuma system user, group, and config dir
  import_role:
    name: service_user
    tasks_from: user
  vars:
    service_user_args:
      name: kuma
  tags:
    - kuma

- name: Install sqlite3 CLI
  # sqlite3 CLI is used (read-only) by the _verify journal_mode probe.
  # libsqlite3-0 is pulled transitively; the CLI isn't -- mirror
  # healthchecks/main.yml:5-9.
  apt:
    pkg: sqlite3
    cache_valid_time: 3600
  become: true
  tags:
    - kuma

- name: Create sqlite directory
  when: not (ansible_check_mode and kuma_user.changed)
  file:
    dest: /mnt/services/sqlite/kuma
    state: directory
    owner: kuma
    group: kuma
    mode: "0750"
  become: true
  tags:
    - kuma

# Uptime-Kuma writes kuma.db at /app/data root alongside upload assets.
# Symlink so SQLite resolves to the 4K sqlite dataset before placing WAL.
# `force: true` is needed on first deploy because the DB file doesn't
# exist yet (kuma creates it on first start); sqlite_dataset's
# state:link-without-force shape doesn't work for the cold-start case.
- name: Symlink kuma SQLite DB onto sqlite dataset
  when: not (ansible_check_mode and kuma_user.changed)
  file:
    src: /mnt/services/sqlite/kuma/kuma.db
    dest: /mnt/services/kuma/kuma.db
    state: link
    force: true
    owner: kuma
    group: kuma
    follow: false
  become: true
  tags:
    - kuma

- name: Install kuma service
  import_role:
    name: systemd_unit
    tasks_from: install
  vars:
    systemd_unit_args:
      src: kuma.service.j2
      condition: "{{ not (ansible_check_mode and kuma_user.changed) }}"
  tags:
    - kuma

- name: Enable kuma service
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: kuma
      condition: "{{ not (ansible_check_mode and (kuma_service_result.changed or kuma_user.changed)) }}"
      restart: "{{ kuma_service_result.changed }}"
  tags:
    - kuma

- name: Configure nginx
  import_role:
    name: nginx
    tasks_from: site
  vars:
    nginx_site_args:
      subdomain: kuma
      proxy_pass: http://localhost:{{ service_ports.kuma }}/
      # Kuma has its own admin login (UI-managed sqlite DB), so this
      # adds a second click. Worth it for defense-in-depth.
      auth: required
      # /api/push/<token> is kuma's push-monitor heartbeat endpoint;
      # the token in the URL is the secret. Off-host monitored systems
      # hit it without an Authelia session, so the sibling location
      # bypasses auth_request -- mirrors healthchecks' /ping/ carve-out.
      server_conf: |
        location ~ ^/api/push/ {
          proxy_pass http://localhost:{{ service_ports.kuma }};
          proxy_http_version 1.1;
          proxy_set_header Host              $host;
          proxy_set_header X-Real-IP         $remote_addr;
          proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
          proxy_set_header X-Forwarded-Host  $host;
        }
  tags:
    - kuma
