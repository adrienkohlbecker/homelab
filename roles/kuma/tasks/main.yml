- name: Set up kuma system user, group, and config dir
  import_role:
    name: service_user
    tasks_from: user
  vars:
    service_user_args:
      name: kuma
  tags:
    - kuma

# Uptime-Kuma writes kuma.db at /app/data root alongside upload assets.
# Route the DB onto the 4K-recordsize sqlite dataset via symlink so
# SQLite places WAL files there too.
- name: Set up kuma sqlite dataset
  import_role:
    name: sqlite_dataset
    tasks_from: dataset
  vars:
    sqlite_dataset_args:
      name: kuma
      owner: kuma
      group: kuma
      mode: "0755"
      condition: "{{ not (ansible_check_mode and kuma_user.changed) }}"
      links:
        - /mnt/services/kuma/kuma.db
  tags:
    - kuma

- name: Install kuma service
  import_role:
    name: systemd_unit
    tasks_from: install
  vars:
    systemd_unit_args:
      src: kuma.service.j2
      condition: "{{ not (ansible_check_mode and kuma_user.changed) }}"
  tags:
    - kuma

- name: Enable kuma service
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: kuma
      condition: "{{ not (ansible_check_mode and (kuma_service_result.changed or kuma_user.changed)) }}"
      restart: "{{ kuma_service_result.changed }}"
  tags:
    - kuma

- name: Configure nginx
  import_role:
    name: nginx
    tasks_from: site
  vars:
    nginx_site_args:
      subdomain: kuma
      proxy_pass: http://localhost:{{ service_ports.kuma }}/
      # Kuma has its own admin login (UI-managed sqlite DB), so this
      # adds a second click. Worth it for defense-in-depth.
      auth: required
  tags:
    - kuma
