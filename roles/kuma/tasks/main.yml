- name: Add kuma group
  group:
    name: kuma
    system: true
  become: true
  tags:
    - kuma

- name: Add kuma user
  user:
    name: kuma
    group: kuma
    createhome: false
    system: true
    shell: /usr/sbin/nologin
    home: /nonexistent
  become: true
  register: kuma_user
  tags:
    - kuma

- name: Create configuration directory
  when: not (ansible_check_mode and kuma_user.changed)
  file:
    dest: /mnt/services/kuma
    state: directory
    owner: kuma
    group: kuma
    mode: "0755"
  become: true
  tags:
    - kuma

- name: Create sqlite directory
  when: not (ansible_check_mode and kuma_user.changed)
  file:
    dest: /mnt/services/sqlite/kuma
    state: directory
    owner: kuma
    group: kuma
    mode: "0755"
  become: true
  tags:
    - kuma

# Uptime-Kuma writes kuma.db at /app/data root alongside upload assets.
# Symlink so SQLite resolves to the 4K sqlite dataset before placing WAL.
- name: Symlink kuma SQLite DB onto sqlite dataset
  when: not (ansible_check_mode and kuma_user.changed)
  file:
    src: /mnt/services/sqlite/kuma/kuma.db
    dest: /mnt/services/kuma/kuma.db
    state: link
    force: true
    owner: kuma
    group: kuma
    follow: false
  become: true
  tags:
    - kuma

- name: Install kuma service
  import_role:
    name: systemd_unit
    tasks_from: install
  vars:
    systemd_unit_args:
      src: kuma.service.j2
      condition: "{{ not (ansible_check_mode and kuma_user.changed) }}"
  tags:
    - kuma

- name: Enable kuma service
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: kuma
      condition: "{{ not (ansible_check_mode and (kuma_service_result.changed or kuma_user.changed)) }}"
      restart: "{{ kuma_service_result.changed }}"
  tags:
    - kuma

- name: Configure nginx
  import_role:
    name: nginx
    tasks_from: site
  vars:
    nginx_site_args:
      subdomain: kuma
      proxy_pass: http://localhost:3001/
      # Kuma has its own admin login (UI-managed sqlite DB), so this
      # adds a second click. Worth it for defense-in-depth.
      auth: required
  tags:
    - kuma
