- name: Set up kuma system user, group, and config dir
  import_role:
    name: service_user
    tasks_from: user
  vars:
    service_user_args:
      name: kuma
  tags:
    - kuma

- name: Install sqlite3 CLI
  # The disableAuth seed below drives the sqlite3 CLI against kuma's live DB
  # on prod (and the _verify probes use it too). libsqlite3-0 is pulled in
  # transitively by kuma; the CLI binary isn't -- install it like
  # healthchecks does.
  apt:
    pkg: sqlite3
    cache_valid_time: 3600
  become: true
  tags:
    - kuma

- name: Create sqlite directory
  when: not (ansible_check_mode and kuma_user.changed)
  file:
    dest: /mnt/services/sqlite/kuma
    state: directory
    owner: kuma
    group: kuma
    mode: "0750"
  become: true
  tags:
    - kuma

# Uptime-Kuma writes kuma.db at /app/data root alongside upload assets;
# symlink it onto the dedicated 4K-recordsize sqlite dataset so the WAL
# workload lands there.
#
# Hand-rolled rather than the sqlite_dataset helper, and force: true is
# load-bearing: kuma must create kuma.db ITSELF on first boot -- it runs the
# schema bootstrap only when the file is ABSENT. Both helper shapes break
# that: plain state:link refuses to plant a dangling symlink (cold-start
# errors), and pre_create plants an empty kuma.db that kuma then treats as
# an already-initialised DB, skips the bootstrap, and dies on `no such
# table: setting`. So plant the dangling symlink with force: true and let
# kuma create the real DB through it. (jellyfin uses pre_create because it
# migrates an empty DB; kuma cannot -- do not migrate this to the helper.)
- name: Symlink kuma SQLite DB onto sqlite dataset
  when: not (ansible_check_mode and kuma_user.changed)
  file:
    src: /mnt/services/sqlite/kuma/kuma.db
    dest: /mnt/services/kuma/kuma.db
    state: link
    force: true
    owner: kuma
    group: kuma
    follow: false
  become: true
  tags:
    - kuma

- name: Install kuma service
  import_role:
    name: systemd_unit
    tasks_from: install
  vars:
    systemd_unit_args:
      src: kuma.service.j2
      condition: "{{ not (ansible_check_mode and kuma_user.changed) }}"
  tags:
    - kuma

- name: Enable kuma service
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: kuma
      condition: "{{ not (ansible_check_mode and (kuma_service_result.changed or kuma_user.changed)) }}"
      restart: "{{ kuma_service_result.changed }}"
  tags:
    - kuma

# Uptime-Kuma has no env/config knob for disabling its built-in login
# (feature request louislam/uptime-kuma#6459, still open) -- the only
# control is the `disableAuth` row in its sqlite `setting` table, normally
# flipped via Settings > Security in the UI. Authelia already gates the
# nginx vhost below, so kuma's own login is a redundant second prompt;
# seed disableAuth=true so the Authelia session is the single gate.
#
# Hard precondition: with disableAuth set, kuma auto-logs-in as the first
# user row (server.js: afterLogin(R.findOne("user")) on socket connect).
# An empty user table dereferences null and crashes the handshake, so the
# statement self-gates on `WHERE EXISTS (SELECT 1 FROM user)` -- a brand-new
# instance (fresh host or test VM) keeps its own login until the operator
# runs the setup wizard and a later converge seeds it.
#
# One live statement against the WAL DB: `.timeout 30000` rides out any
# heartbeat write or WAL checkpoint kuma is mid-flight (the old 5s could
# expire during a checkpoint and abort the converge). value is the JSON
# literal `true` (Settings.get JSON.parses it); type='general' mirrors the
# UI's setSettings("general", ...) so the row also surfaces on the Security
# page. `changes()` reports whether the row actually moved, so changed_when
# is honest and the restart below fires only on a real flip -- kuma re-reads
# disableAuth on a fresh socket connection. A DB whose schema kuma hasn't
# created yet (no `user` table) is tolerated: the seed no-ops until first
# start has populated it.
- name: Disable kuma's built-in auth (Authelia fronts it)
  when: not ansible_check_mode
  command: >-
    sqlite3 -cmd ".timeout 30000" /mnt/services/sqlite/kuma/kuma.db
    "INSERT INTO setting (key, value, type)
       SELECT 'disableAuth', 'true', 'general' WHERE EXISTS (SELECT 1 FROM user)
     ON CONFLICT(key) DO UPDATE SET value='true', type='general'
       WHERE setting.value != 'true';
     SELECT changes();"
  register: kuma_disableauth_seed
  changed_when: (kuma_disableauth_seed.stdout | trim | int) > 0
  failed_when:
    - kuma_disableauth_seed.rc != 0
    - "'no such table' not in kuma_disableauth_seed.stderr"
  become: true
  tags:
    - kuma

- name: Restart kuma to load disableAuth
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: kuma
      condition: "{{ kuma_disableauth_seed.changed | default(false) }}"
      restart: true
  tags:
    - kuma

- name: Configure nginx
  import_role:
    name: nginx
    tasks_from: site
  vars:
    nginx_site_args:
      subdomain: kuma
      proxy_pass: http://127.0.0.1:{{ service_ports.kuma }}/
      # Authelia is the sole gate: kuma's own login is disabled via the
      # disableAuth seed above (no env knob exists for it), so this vhost
      # auth is what actually protects the dashboard.
      auth: required
      # /api/push/<token> is kuma's push-monitor heartbeat endpoint;
      # the token in the URL is the secret. Off-host monitored systems
      # hit it without an Authelia session, so the sibling location
      # bypasses auth_request -- mirrors healthchecks' /ping/ carve-out.
      server_conf: |
        # Token-shaped match only: the token in the URL is the secret, and
        # anchoring to /api/push/<token> stops a future kuma route under
        # /api/push/ from inheriting this unauthenticated bypass. nginx
        # matches the path only (query string excluded) and kuma push tokens
        # are [A-Za-z0-9_-]. proxy_pass carries no URI part because a regex
        # location forbids one -- do not add a trailing path.
        location ~ ^/api/push/[A-Za-z0-9_-]+/?$ {
          proxy_pass http://127.0.0.1:{{ service_ports.kuma }};
          proxy_http_version 1.1;
          proxy_set_header Host              $host;
          proxy_set_header X-Real-IP         $remote_addr;
          # Unauthenticated path: overwrite X-Forwarded-For with the peer
          # rather than appending a client-supplied header kuma may log.
          proxy_set_header X-Forwarded-For   $remote_addr;
          proxy_set_header X-Forwarded-Proto $scheme;
          proxy_set_header X-Forwarded-Host  $host;
        }
  tags:
    - kuma
