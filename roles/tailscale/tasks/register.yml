# Shared headscale registration: mint a single-use pre-auth key, register, then
# reconcile + approve advertised routes. Imported by both tasks/main.yml (lab/pug,
# apt-installed) and the standalone bunk.yml (DSM, Package-Center install) so the
# orchestration lives in one place; the two callers differ only in tailscale_bin
# (CLI path) and tailscale_authkey_file (key staging path -- /run vs /tmp), both
# resolved from vars. The control-plane pointers differ by environment (prod ->
# fox, test -> the local headscale box) but flow in identically through group_vars.
- name: register | Assert required tailscale inputs are set
  assert:
    that:
      - tailscale_login_server is defined
      - tailscale_headscale_host is defined
      - tailscale_headscale_user is defined
      - tailscale_advertise_routes is defined
      - tailscale_advertise_routes | length > 0
    fail_msg: >-
      tailscale registration needs tailscale_login_server, tailscale_headscale_host
      and tailscale_headscale_user (group_vars/{prod,test}) plus
      tailscale_advertise_routes (host_vars, e.g. "10.123.0.0/21"). The pre-auth
      key is minted on-the-fly from the control plane at registration time, so
      there's no vaulted long-lived key to set.
  tags:
    - tailscale

# Registration is gated on the backend not already being Running, so a converged
# node skips `tailscale up` and the harness idempotence check stays green. NB:
# the gate is liveness-only -- if the advertised routes change later, the reconcile
# task further down (`tailscale set`) applies them in place on a live node.
# check_mode: false so the read-only status probe runs during the harness's
# `--check` phase too (which precedes the apply); otherwise the register is
# skipped and the set_fact below has no .rc to read. Before the first login (or
# before the package is even installed, as in the check phase) status exits
# non-zero -- failed_when:false + the default guards turn that into "not
# running" rather than a task failure.
- name: register | Check whether tailscale is already registered and running
  command: "{{ tailscale_bin }} status --json"
  register: tailscale_status
  changed_when: false
  failed_when: false
  check_mode: false
  become: true
  tags:
    - tailscale

- name: register | Determine tailscale backend state
  # The startswith('{') guard is load-bearing: tailscaled can return rc==0 with
  # non-JSON on stdout (a warning banner mid-restart), and from_json would then
  # raise and fail the play. Jinja `and` short-circuits, so from_json only runs
  # once we know rc==0, stdout is non-empty, and it looks like a JSON object.
  set_fact:
    tailscale_running: >-
      {{ (tailscale_status.rc | default(1)) == 0
         and (tailscale_status.stdout | default('') | trim | length > 0)
         and (tailscale_status.stdout | default('') | trim).startswith('{')
         and ((tailscale_status.stdout | from_json).BackendState | default('')) == 'Running' }}
  tags:
    - tailscale

# No long-lived auth key. When the node isn't registered yet, mint a single-use,
# short-expiry pre-auth key directly from the control plane and consume it below
# in the same play -- the key never touches the vault or disk and is spent within
# seconds. Identical path for prod (delegated to fox) and the harness (delegated
# to the converging box, whose _setup stood up a local headscale): both delegate
# to tailscale_headscale_host and drive `podman exec headscale`. Gated on
# not-already-registered, so steady-state converges mint nothing and the harness
# idempotence check stays green; skipped in --check since minting is a
# control-plane mutation. NOT --ephemeral (subnet routers must survive going
# offline); single-use = omit --reusable. 0.26 CLI: --user takes the numeric ID,
# so resolve it from `users list` by name. delegate_to sits on the commands, not
# the set_fact -- the fact must land on this host (the registering node), not the
# delegate.
- name: register | Provision a single-use pre-auth key from the control plane
  when:
    - not ansible_check_mode
    - not (tailscale_running | bool)
  become: true
  tags:
    - tailscale
  block:
    # The registering node must create its own headscale user -- it can't assume
    # another node was registered first (which would have created it). Without
    # this, enrolling against a fresh control plane fails with a cryptic "first on
    # empty list" error at the user-id lookup below.
    - name: register | Ensure the headscale user for this node exists
      command: podman exec headscale headscale users create {{ tailscale_headscale_user }}
      delegate_to: "{{ tailscale_headscale_host }}"
      register: tailscale_user_create
      changed_when: false
      failed_when: false

    # This is also the control-plane reachability gate: it (and `users create`
    # above) delegate to tailscale_headscale_host, so if headscale isn't up there
    # -- the common case when lab/pug are converged via `--tags tailscale` before
    # fox -- the podman exec fails. failed_when:false + the assert below turn that
    # into a clear "converge fox first" message instead of an opaque podman error.
    - name: register | List headscale users to resolve the user id
      command: podman exec headscale headscale users list -o json
      delegate_to: "{{ tailscale_headscale_host }}"
      register: tailscale_users
      changed_when: false
      failed_when: false

    - name: register | Assert the headscale control plane is reachable
      assert:
        that:
          - tailscale_users.rc == 0
          - (tailscale_users.stdout | default('') | trim).startswith('[')
        fail_msg: >-
          headscale control plane on {{ tailscale_headscale_host }} is not
          answering (rc={{ tailscale_users.rc | default('n/a') }}). It must be
          converged and up before {{ inventory_hostname }} can register: this
          path mints its pre-auth key and approves routes by delegating to
          {{ tailscale_headscale_host }}. Converge fox/headscale there first.

    - name: register | Mint a single-use pre-auth key
      command: >-
        podman exec headscale headscale preauthkeys create
        --user {{ (tailscale_users.stdout | from_json | selectattr('name', 'equalto', tailscale_headscale_user) | list | first).id }}
        --expiration 5m -o json
      delegate_to: "{{ tailscale_headscale_host }}"
      register: tailscale_preauth
      changed_when: false

    - name: register | Set the pre-auth key fact
      set_fact:
        tailscale_preauth_key: "{{ (tailscale_preauth.stdout | from_json).key }}"

    # Hand the key to `tailscale up` via a file rather than --authkey <key> on the
    # command line, where it would be world-readable in /proc/<pid>/cmdline / ps
    # for the duration of the call. Root-only, removed right after registration;
    # the key is single-use and 5-min-lived regardless. tailscale_authkey_file is
    # tmpfs /run on lab/pug, /tmp on bunk (DSM has no guaranteed /run tmpfs).
    - name: register | Stage the pre-auth key in a root-only file
      copy:
        content: "{{ tailscale_preauth_key }}"
        dest: "{{ tailscale_authkey_file }}"
        owner: root
        group: root
        mode: "0600"

# --reset so the advertised set on first registration is exactly what we pass (no
# stale flags from a prior manual `tailscale up`). --authkey file: reads the key
# from the staged file so it never lands in argv/ps.
# --timeout bounds the call so a control-plane hiccup can't wedge the converge.
- name: register | Register with headscale and advertise routes / exit node
  command: >-
    {{ tailscale_bin }} up
    --login-server {{ tailscale_login_server }}
    --authkey file:{{ tailscale_authkey_file }}
    --advertise-routes={{ tailscale_advertise_routes }}
    {{ tailscale_advertise_exit_node | ternary('--advertise-exit-node', '') }}
    --accept-routes={{ tailscale_accept_routes | ternary('true', 'false') }}
    --accept-dns={{ tailscale_accept_dns | ternary('true', 'false') }}
    --timeout=60s
    --reset
  register: tailscale_up
  changed_when: tailscale_up.rc == 0
  # not ansible_check_mode: the pre-auth key is minted in the (check-skipped)
  # block above, so in --check tailscale_preauth_key is undefined -- skip the
  # whole task rather than let ansible template a `--authkey {{ undefined }}`
  # arg. Registration is a mutation anyway and never belongs in check mode.
  when:
    - not ansible_check_mode
    - not (tailscale_running | bool)
  become: true
  tags:
    - tailscale

# Drop the staged key immediately after registration consumes it. Same gate as
# the register task, so it only runs on a registration converge -- on the
# steady-state idempotence re-run (node already Running) the whole mint/register
# path is skipped, so this doesn't fire and idempotence holds. A failed register
# leaves the root-only file; the next converge re-mints and overwrites it.
- name: register | Remove the staged pre-auth key file
  file:
    path: "{{ tailscale_authkey_file }}"
    state: absent
  when:
    - not ansible_check_mode
    - not (tailscale_running | bool)
  become: true
  tags:
    - tailscale

# Desired approved set = the advertised subnet(s) + the exit-node default routes
# (advertising an exit node surfaces 0.0.0.0/0 + ::/0 for approval).
- name: register | Compute the desired approved-route set
  set_fact:
    tailscale_desired_routes: >-
      {{ (tailscale_advertise_routes.split(','))
         + (tailscale_advertise_exit_node | ternary(['0.0.0.0/0', '::/0'], [])) }}
  tags:
    - tailscale

# Reconcile advertised routes on an ALREADY-registered node. `tailscale up` is
# gated on not-Running, so editing tailscale_advertise_routes / the exit-node
# flag later would otherwise never take effect on a live node. `tailscale set`
# applies it in place. Gate on drift between desired and the node's own local
# prefs (`tailscale debug prefs` -> AdvertiseRoutes, which carries the exit-node
# 0.0.0.0/0 + ::/0 when advertised) so steady-state converges detect nothing and
# stay idempotent. Only meaningful once Running -- first registration is handled
# by `tailscale up` above.
- name: register | Read the node's locally-advertised routes
  command: "{{ tailscale_bin }} debug prefs"
  register: tailscale_prefs
  changed_when: false
  check_mode: false
  failed_when: false
  become: true
  tags:
    - tailscale

- name: register | Reconcile advertised routes / exit node on a registered node
  command: >-
    {{ tailscale_bin }} set
    --advertise-routes={{ tailscale_advertise_routes }}
    --advertise-exit-node={{ tailscale_advertise_exit_node | ternary('true', 'false') }}
  when:
    - not ansible_check_mode
    - tailscale_running | bool
    - (tailscale_prefs.stdout | default('') | trim).startswith('{')
    - (tailscale_desired_routes | sort)
      != ((tailscale_prefs.stdout | from_json).AdvertiseRoutes | default([]) | sort)
  changed_when: true
  become: true
  tags:
    - tailscale

# Route approval is a second opt-in on the control server, keyed by the node's
# headscale ID (assigned at registration). Look the node up by its given name
# (= this host's short hostname) on the headscale host.
# check_mode: false so the read-only node listing runs in the `--check` phase
# too (read-only `nodes list` is safe). Delegated to the headscale host because
# node IDs only exist on the control server.
# retries/until: a just-registered node can take a moment to surface in
# `nodes list` -- `tailscale up` returns once the client authenticates, but over
# a real prod link (lab/pug -> fox over wg, then a separate delegated query back
# to fox) the control-plane record can lag the client by a beat, so a single
# query races and the assert below fires spuriously. Poll until the node shows
# up. ansible_check_mode short-circuits the wait: in --check there's no
# registration, so the node legitimately never appears and we must not block.
- name: register | List headscale nodes (on the control server)
  command: podman exec headscale headscale nodes list -o json
  delegate_to: "{{ tailscale_headscale_host }}"
  register: tailscale_nodes
  changed_when: false
  check_mode: false
  retries: 15
  delay: 2
  until: >-
    ansible_check_mode
    or ((tailscale_nodes.stdout | default('[]') | from_json)
        | selectattr('given_name', 'equalto', ansible_hostname | lower) | list | length > 0)
  become: true
  tags:
    - tailscale

# default({}) so a fresh system (no node registered yet -- e.g. the --check
# phase, where `tailscale up` is skipped) yields an empty dict instead of an
# undefined-var error in the tasks below. ansible_hostname | lower: headscale
# sanitizes given_name to lowercase, so an exact-case match would miss a node on
# any mixed-case host (e.g. DSM reports bunk's host as "Bunk").
- name: register | Resolve this host's headscale node
  set_fact:
    tailscale_node: >-
      {{ (tailscale_nodes.stdout | from_json)
         | selectattr('given_name', 'equalto', ansible_hostname | lower)
         | list | first | default({}) }}
  tags:
    - tailscale

# Skipped in --check: registration (`tailscale up`) is a mutation that doesn't
# run in check mode, so the node legitimately won't exist yet then. On a real
# apply, a missing node means registration failed -- fail loudly.
- name: register | Fail if this host has no headscale node yet
  assert:
    that:
      - tailscale_node.id is defined
    fail_msg: >-
      No headscale node with given_name {{ ansible_hostname | lower }} on
      {{ tailscale_headscale_host }}. Either `tailscale up` registration did not
      complete (check tailscaled logs + login-server reachability), or this node
      is already Running but joined a DIFFERENT control plane -- the liveness-only
      gate then skips re-registration, so it never appears here. In that case
      `tailscale down` on {{ inventory_hostname }} and re-run to rebind.
  when: not ansible_check_mode
  tags:
    - tailscale

# approve-routes replaces the whole approved set, so only run it when the
# current set drifts from desired -- keeps the converge idempotent. Skipped in
# --check (no node to approve, and approve-routes is a mutation).
- name: register | Approve advertised routes + exit node on headscale
  command: >-
    podman exec headscale headscale nodes approve-routes
    --identifier {{ tailscale_node.id }}
    --routes {{ tailscale_desired_routes | join(',') }}
  delegate_to: "{{ tailscale_headscale_host }}"
  when:
    - not ansible_check_mode
    - (tailscale_desired_routes | sort) != ((tailscale_node.approved_routes | default([])) | sort)
  changed_when: true
  become: true
  tags:
    - tailscale
