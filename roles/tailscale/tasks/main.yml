# Test-only key provisioning. Prod gets tailscale_preauth_key from the vault
# (host_vars), but under the qemu harness there's no vault, and the harness runs
# each test phase (--check / apply / idempotence) as a SEPARATE ansible process,
# so _setup can't hand the role a fact. So when qemu_test, self-mint a throwaway
# reusable key from the local headscale that _setup stood up -- in the same
# process that consumes it, sidestepping the cross-phase boundary. 0.26 CLI:
# preauthkeys --user takes the numeric user ID. check_mode:false so the --check
# phase also gets a key for the assert below (the actual `tailscale up` stays
# check-skipped). Reusable + short expiry; minted fresh each converge (harmless:
# `tailscale up` is skipped once the node is already registered).
- name: Provision a throwaway pre-auth key from the local headscale (test only)
  when: qemu_test | default(false)
  check_mode: false
  become: true
  tags:
    - tailscale
  block:
    - name: Ensure a headscale user exists for the test node
      command: podman exec headscale headscale users create test-harness
      register: tailscale_test_user
      changed_when: false
      failed_when: false

    - name: Read the headscale user id
      command: podman exec headscale headscale users list -o json
      register: tailscale_test_users
      changed_when: false

    - name: Mint a reusable test pre-auth key
      command: >-
        podman exec headscale headscale preauthkeys create
        --user {{ (tailscale_test_users.stdout | from_json | selectattr('name', 'equalto', 'test-harness') | list | first).id }}
        --reusable --expiration 1h -o json
      register: tailscale_test_preauth
      changed_when: false

    - name: Set the test pre-auth key fact
      set_fact:
        tailscale_preauth_key: "{{ (tailscale_test_preauth.stdout | from_json).key }}"

- name: Assert required tailscale inputs are set
  assert:
    that:
      - tailscale_advertise_routes is defined
      - tailscale_advertise_routes | length > 0
      - tailscale_preauth_key is defined
      - tailscale_preauth_key | length > 0
    fail_msg: >-
      roles/tailscale needs tailscale_advertise_routes (host_vars, e.g.
      "10.123.0.0/21") and tailscale_preauth_key. The key is a reusable
      headscale pre-auth key: mint it once on fox after headscale is up
      (`podman exec headscale headscale preauthkeys create --user <id>
      --reusable --expiration 720h`), store it vaulted as
      vault_tailscale_preauth_key in group_vars/prod.yml, and map
      tailscale_preauth_key to it in the host's host_vars.
  tags:
    - tailscale

# Keyring at the modern /usr/share/keyrings path + signed-by in the apt source
# line. Unlike apt_key (removed on Ubuntu 26 -- see roles/docker_client's
# version fork), this single path works on jammy/noble/resolute alike, so no
# major-version branch is needed. Trust anchors on HTTPS to pkgs.tailscale.com,
# same posture as the docker repo key fetch.
- name: Install the tailscale apt signing key
  get_url:
    url: https://pkgs.tailscale.com/stable/ubuntu/{{ ansible_distribution_release }}.noarmor.gpg
    dest: /usr/share/keyrings/tailscale-archive-keyring.gpg
    mode: "0644"
    owner: root
    group: root
  become: true
  tags:
    - tailscale

- name: Add the tailscale apt repository
  apt_repository:
    repo: >-
      deb [signed-by=/usr/share/keyrings/tailscale-archive-keyring.gpg]
      https://pkgs.tailscale.com/stable/ubuntu {{ ansible_distribution_release }} main
    filename: tailscale
    state: present
  register: tailscale_repo
  become: true
  tags:
    - tailscale

# Gated like roles/docker_client's install: in --check on a system without the
# repo yet, apt_repository only *reports* it would add the source (nothing
# written, no cache refresh), so `apt install tailscale` would fail with "no
# package matching". Skip the install (and the tailscaled enable that needs the
# binary) in that case; once the repo is really present both run in check too.
- name: Install tailscale
  apt:
    pkg: tailscale
    update_cache: true
    cache_valid_time: 3600
  when: not (ansible_check_mode and tailscale_repo.changed)
  become: true
  tags:
    - tailscale

- name: Enable and start tailscaled
  systemd:
    name: tailscaled
    enabled: true
    state: started
  when: not (ansible_check_mode and tailscale_repo.changed)
  become: true
  tags:
    - tailscale

# Subnet router + exit node both need the kernel to forward between the tailnet
# interface and the LAN. lab/pug already get this from the wireguard role, but
# the role is self-sufficient (the box harness has no wireguard role applied).
- name: Enable IPv4 forwarding for subnet routing / exit node
  ansible.posix.sysctl:
    name: net.ipv4.ip_forward
    value: "1"
    sysctl_file: /etc/sysctl.d/99-tailscale.conf
  become: true
  tags:
    - tailscale

- name: Enable IPv6 forwarding for subnet routing / exit node
  ansible.posix.sysctl:
    name: net.ipv6.conf.all.forwarding
    value: "1"
    sysctl_file: /etc/sysctl.d/99-tailscale.conf
  become: true
  tags:
    - tailscale

# Registration is gated on the backend not already being Running, so a converged
# node skips `tailscale up` and the harness idempotence check stays green. NB:
# the gate is liveness-only -- if the advertised routes change later, re-running
# won't re-advertise on an already-up node; re-register by hand (or `tailscale
# down` first). status returns rc!=0 / empty before the first login, hence the
# defensive guards.
# check_mode: false so the read-only status probe runs during the harness's
# `--check` phase too (which precedes the apply); otherwise the register is
# skipped and the set_fact below has no .rc to read. Before the first login (or
# before the package is even installed, as in the check phase) status exits
# non-zero -- failed_when:false + the default guards turn that into "not
# running" rather than a task failure.
- name: Check whether tailscale is already registered and running
  command: tailscale status --json
  register: tailscale_status
  changed_when: false
  failed_when: false
  check_mode: false
  become: true
  tags:
    - tailscale

- name: Determine tailscale backend state
  set_fact:
    tailscale_running: >-
      {{ (tailscale_status.rc | default(1)) == 0
         and (tailscale_status.stdout | default('') | trim | length > 0)
         and ((tailscale_status.stdout | from_json).BackendState | default('')) == 'Running' }}
  tags:
    - tailscale

# --reset so the advertised set on first registration is exactly what we pass
# (no stale flags from a prior manual `tailscale up`). no_log: the authkey is a
# bearer credential. --timeout bounds the call so a control-plane hiccup can't
# wedge the converge.
- name: Register with headscale and advertise routes / exit node
  command: >-
    tailscale up
    --login-server {{ tailscale_login_server }}
    --authkey {{ tailscale_preauth_key }}
    --advertise-routes={{ tailscale_advertise_routes }}
    {{ tailscale_advertise_exit_node | ternary('--advertise-exit-node', '') }}
    --accept-dns={{ tailscale_accept_dns | ternary('true', 'false') }}
    --timeout=60s
    --reset
  register: tailscale_up
  changed_when: tailscale_up.rc == 0
  when: not (tailscale_running | bool)
  no_log: true
  become: true
  tags:
    - tailscale

# Desired approved set = the advertised subnet(s) + the exit-node default routes
# (advertising an exit node surfaces 0.0.0.0/0 + ::/0 for approval).
- name: Compute the desired approved-route set
  set_fact:
    tailscale_desired_routes: >-
      {{ (tailscale_advertise_routes.split(','))
         + (tailscale_advertise_exit_node | ternary(['0.0.0.0/0', '::/0'], [])) }}
  tags:
    - tailscale

# Route approval is a second opt-in on the control server, keyed by the node's
# headscale ID (assigned at registration). Look the node up by its given name
# (= this host's short hostname) on the headscale host.
# check_mode: false so the read-only node listing runs in the `--check` phase
# too (read-only `nodes list` is safe). Delegated to the headscale host because
# node IDs only exist on the control server.
- name: List headscale nodes (on the control server)
  command: podman exec headscale headscale nodes list -o json
  delegate_to: "{{ tailscale_headscale_host }}"
  register: tailscale_nodes
  changed_when: false
  check_mode: false
  become: true
  tags:
    - tailscale

# default({}) so a fresh system (no node registered yet -- e.g. the --check
# phase, where `tailscale up` is skipped) yields an empty dict instead of an
# undefined-var error in the tasks below.
- name: Resolve this host's headscale node
  set_fact:
    tailscale_node: >-
      {{ (tailscale_nodes.stdout | from_json)
         | selectattr('given_name', 'equalto', ansible_hostname)
         | list | first | default({}) }}
  tags:
    - tailscale

# Skipped in --check: registration (`tailscale up`) is a mutation that doesn't
# run in check mode, so the node legitimately won't exist yet then. On a real
# apply, a missing node means registration failed -- fail loudly.
- name: Fail if this host has no headscale node yet
  assert:
    that:
      - tailscale_node.id is defined
    fail_msg: >-
      No headscale node named '{{ ansible_hostname }}' found on
      {{ tailscale_headscale_host }} -- registration via `tailscale up` did not
      complete. Check tailscaled logs and the login-server reachability.
  when: not ansible_check_mode
  tags:
    - tailscale

# approve-routes replaces the whole approved set, so only run it when the
# current set drifts from desired -- keeps the converge idempotent. Skipped in
# --check (no node to approve, and approve-routes is a mutation).
- name: Approve advertised routes + exit node on headscale
  command: >-
    podman exec headscale headscale nodes approve-routes
    --identifier {{ tailscale_node.id }}
    --routes {{ tailscale_desired_routes | join(',') }}
  delegate_to: "{{ tailscale_headscale_host }}"
  when:
    - not ansible_check_mode
    - (tailscale_desired_routes | sort) != ((tailscale_node.approved_routes | default([])) | sort)
  changed_when: true
  become: true
  tags:
    - tailscale
