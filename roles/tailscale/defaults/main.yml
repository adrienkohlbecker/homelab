---
# Optional, host-overridable knobs (defaults/main.yml sits BELOW host_vars in
# ansible's precedence ladder, so these are safe defaults -- not the masked-
# input trap that vars/main.yml would be). The harness _setup flips
# login_server / headscale_host to a local plain-http headscale on box.

# Headscale control plane URL the client registers against. Prod: the fox VPS.
tailscale_login_server: "https://headscale.fox.{{ domain }}"

# Inventory host running the headscale container. The route-approval task
# delegates `headscale nodes approve-routes` here (node IDs only exist on the
# control server, and a node's advertised routes need a second opt-in there).
tailscale_headscale_host: fox

# Advertise a full-tunnel exit node alongside the subnet route. Off by default;
# lab/pug turn it on in host_vars (home exit), as does bunk (Bonniers exit).
tailscale_advertise_exit_node: false

# Roaming clients consume headscale MagicDNS; the server hosts keep their own
# resolv.conf (pihole/systemd-resolved), so don't let tailscale rewrite it.
tailscale_accept_dns: false
