# Run a one-shot ClickHouse query via the hyperdx container's curl.
# Used by observability roles' _verify tasks for marker-based assertions
# against the OTel logs table.
#
# Inputs (single dict, replaced wholesale per call):
#   _test_args.sql    SQL string. Passed via stdin so quotes / square
#                     brackets stay human-readable rather than URL-encoded.
#   _test_args.label  Short tag for the task name (default "query").
#
# Output:
#   _test_clickhouse_result.stdout: raw response body (caller parses).
#
# For wait-loops (poll until a row appears) use clickhouse_query_wait.yml
# instead -- splitting the wait variant out keeps the conditional shape
# literal in the role file, which Ansible 2.19's trust check requires
# (default-from-filter conditionals that reference a register'd module
# result fail with "Encountered untrusted template or expression").
- name: "_test | clickhouse_query | {{ _test_args.label | default('query') }}"
  command:
    cmd: podman exec -i hyperdx curl --fail -s --max-time 5 --data-binary @- "http://localhost:8123/"
    stdin: "{{ _test_args.sql }}"
  register: _test_clickhouse_result  # noqa: var-naming[no-role-prefix]
  changed_when: false
  become: true
