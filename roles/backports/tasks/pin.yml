# Routes the listed packages to noble on jammy via apt pin priority
# 991, adds noble's apt sources so the upgrade resolves, refreshes
# the cache, and forces state: latest across the full list. Designed
# for roles whose userspace stack ships too old in jammy (zfs 2.1.x,
# podman 3.x). On noble (or any non-22.04 release) every task is a
# no-op — the distro version is already current.
#
# Inputs:
#   backports_name: short label for the pin filename
#                   (/etc/apt/preferences.d/backports_<name>.pref) and
#                   the per-call output fact name.
#   backports_packages: list of package names. Becomes both the pin
#                       file's `Package:` line and the upgrade task's
#                       apt: pkg list, so they can't drift.
#
# Output fact: <backports_name>_backports_updated → true|false,
# reflecting whether the apt upgrade actually rolled the pin set
# forward. Consumers gate daemon restarts on this. The name is
# per-call so two imports in the same play (podman + zfs) don't
# clobber each other's signal — same pattern roles/systemd_unit
# uses for *_result facts.
#
# policy_rc_d=101 on the upgrade task is unconditional: apt under
# this pin almost always means a daemon-bearing package crossed a
# major version (jammy 3.x -> noble 4.x for podman, 2.1.x -> 2.2.x
# for zfs), and we'd rather drive the restart explicitly through
# the output fact than have apt half-restart things on its own.

# backports_name is used verbatim in the pin file path AND as the
# stem of the per-call set_fact name. Fail loud on anything that
# wouldn't be a valid Ansible identifier rather than silently
# translating ('foo-bar' would write /etc/apt/preferences.d/backports_
# foo-bar.pref but set foo_bar_backports_updated, an invisible split).
#
# backports_packages must be a non-empty list. A bare string would
# `join(' ')` per-character ("c h r o n y") and produce a pin file
# matching nothing; an empty list would render `Package: ` with the
# same effect. Both fail silently — the pin is "applied" but the apt
# resolver never picks a noble candidate.
- name: Validate backports inputs
  assert:
    that:
      - backports_name is match('^[A-Za-z0-9_]+$')
      - backports_packages is sequence
      - backports_packages is not string
      - backports_packages | length > 0
    fail_msg: >-
      backports_name must match [A-Za-z0-9_]+ (got {{ backports_name | to_json }})
      and backports_packages must be a non-empty list
      (got {{ backports_packages | to_json }})

- name: Pin packages to noble (jammy) — {{ backports_name }}
  when: ansible_distribution_major_version == "22"
  template:
    src: backports_pin.j2
    dest: /etc/apt/preferences.d/backports_{{ backports_name }}.pref
    owner: root
    group: root
    mode: "0644"
    backup: true
    # Structural sanity check: catches a template breakage that drops
    # the load-bearing 991 line entirely (apt silently ignores
    # malformed preferences files, so without this the only signal
    # would be silent loss of pinning).
    validate: "grep -qE '^Pin-Priority: 991$' %s"
  become: true
  register: backports_pin

# Remove the pre-rename pin filename if a previous version of this
# role wrote it. The hyphenated/extensionless form was renamed to
# backports_<name>.pref so the file matches apt_preferences(5)'s
# documented .pref extension and the repo's underscores convention.
- name: Clean up legacy pin file path (pre-rename to .pref)
  when: ansible_distribution_major_version == "22"
  file:
    path: /etc/apt/preferences.d/backports-{{ backports_name }}
    state: absent
  become: true
  register: backports_pin_legacy_removed

# Single deb822 sources file replaces the previous 4× apt_repository
# loop. Matches the format roles/apt uses for native noble hosts, lets
# us declare Signed-By explicitly rather than relying on the
# system-wide trusted keyring, and gives a deterministic file path so
# cleanup is unambiguous.
- name: Add noble apt sources (jammy)
  when: ansible_distribution_major_version == "22"
  template:
    src: backports_noble.sources.j2
    dest: /etc/apt/sources.list.d/backports_noble.sources
    owner: root
    group: root
    mode: "0644"
    backup: true
  become: true
  register: backports_noble_sources

# Find any legacy .list files left over from the pre-deb822 role
# (apt_repository derived filenames from the URI, so they look like
# archive_ubuntu_com_ubuntu_noble.list etc.). Match on the inline
# `# backports` marker the previous loop wrote on every line.
- name: Find legacy backports source files (pre-deb822 migration)
  when: ansible_distribution_major_version == "22"
  find:
    paths: /etc/apt/sources.list.d
    patterns: "*.list"
    contains: '^deb .* # backports$'
  register: backports_legacy_lists
  become: true

- name: Remove legacy backports source files (migrated to deb822)
  when:
    - ansible_distribution_major_version == "22"
    - backports_legacy_lists.files | length > 0
  file:
    path: "{{ item.path }}"
    state: absent
  loop: "{{ backports_legacy_lists.files }}"
  loop_control:
    label: "{{ item.path }}"
  become: true
  register: backports_legacy_removed

- name: Refresh apt cache after noble setup
  when:
    - ansible_distribution_major_version == "22"
    - backports_pin.changed
      or backports_noble_sources.changed
      or (backports_pin_legacy_removed.changed | default(false))
      or (backports_legacy_removed.changed | default(false))
  apt:
    update_cache: true
  become: true

# state: latest because apt with state: present leaves an installed
# package alone even when the pin would prefer noble — only a fresh
# install or an explicit upgrade re-evaluates the pin. Listing the
# whole pin set here also catches binaries (buildah, conmon, etc.)
# that aren't hard deps of the consumer's primary package. `| unique`
# defends against caller-side list concatenation accidentally
# duplicating an entry (e.g. libc6 appears in ntp's pin set and could
# easily land in zfs's too if the lists are ever computed).
#
# The when-clause skips on check-mode runs that just added the pin/
# sources — apt's check resolves names against the live cache, and
# CHECK MODE never actually pulled noble's metadata, so anything
# noble-only would error with "No package matching". The real-mode
# play afterwards refreshes the cache and runs this task properly.
# state: latest is intentional — the whole point of this task is to
# force the pin, so silence ansible-lint's package-latest warning.
#
# No cache_valid_time: the upgrade follows the conditional refresh
# above, and we want fresh metadata when an upgrade actually fires
# rather than risking a stale partial cache for the 1-hour window.
- name: Upgrade backports-pinned packages to noble (jammy)  # noqa: package-latest
  when:
    - ansible_distribution_major_version == "22"
    - not (ansible_check_mode and (backports_pin.changed or backports_noble_sources.changed))
  apt:
    pkg: '{{ backports_packages | unique }}'
    state: latest
    policy_rc_d: 101
  register: backports_upgrade
  become: true

# Surface what apt actually did so a security-relevant transitive bump
# is visible in the playbook log. Combined with policy_rc_d=101 the
# operator otherwise has no signal of "which daemons just got a new
# binary on disk" until the consumer's restart fires.
- name: Show upgrade summary for {{ backports_name }}
  when:
    - ansible_distribution_major_version == "22"
    - backports_upgrade.changed | default(false)
  debug:
    var: backports_upgrade.stdout_lines

# Stash .changed under a per-call fact name so consumers can wire it
# into systemd_unit_restart / state=restarted without colliding when
# multiple backports imports run in the same play (the register
# handle is reused on the next import). Mirrors systemd_unit's
# *_result pattern — derive the fact name from an existing input
# rather than taking another argument. The validate-shape assert
# above is what lets us use backports_name verbatim here without a
# regex_replace silently diverging from the pin file's path.
#
# On non-jammy releases every preceding task was skipped and
# backports_upgrade is a skipped-result; hardcode false rather than
# relying on Ansible's skipped-register .changed semantics so the
# noble-path contract is local to this task.
- name: Record upgrade outcome for {{ backports_name }}
  set_fact:
    "{{ backports_name }}_backports_updated": >-
      {{ (backports_upgrade.changed | default(false))
         if ansible_distribution_major_version == "22" else false }}
