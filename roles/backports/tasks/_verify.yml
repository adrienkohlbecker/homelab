# Exercises pin.yml end-to-end against ntp's production backport list
# (smallest real list that crosses the jammy/noble libc6+t64 transition
# without leaving apt with broken deps). A self-contained test package
# would need its own libc6/libc-bin/locales companion list to install,
# so we lean on a known-good real list instead. Trivially no-ops on
# noble. Asserts: (1) the pin file lands at the documented .pref
# path, (2) all four noble suites resolve on this host's architecture,
# (3) the apt resolver picks the noble candidate for every pinned
# package, (4) unpinned noble packages stay at the -10 catch-all band
# so a jammy host can't silently drift to noble, (5) the per-call
# output fact reports the upgrade outcome on both a fresh apply and
# an idempotent re-apply, and (6) a second import under a distinct
# name lands its own pin file and per-call fact without clobbering
# the first -- the multi-consumer guarantee the docstring's per-call
# fact naming exists to provide.
- name: _verify | load ntp's production backport list
  include_vars:
    file: roles/ntp/vars/main.yml

- name: _verify | apply pin.yml
  import_role:
    name: backports
    tasks_from: pin
  vars:
    backports_args:
      name: test_libc6_transition
      packages: "{{ ntp_backport_packages }}"

- name: _verify (jammy) | pin file lands at the documented path
  when: ansible_distribution_major_version == "22"
  stat:
    path: /etc/apt/preferences.d/backports_test_libc6_transition.pref
  register: backports_pin_stat
  failed_when: not backports_pin_stat.stat.exists

# Cross-arch mirror sanity: ask apt itself which sources it would
# fetch from, and require all four noble suites are present. amd64
# hits archive.ubuntu.com-class mirrors; aarch64 hits
# ports.ubuntu.com-class; either way `apt-get indextargets` enumerates
# them straight from apt's parsed sources tree, so a bad ternary in
# group_vars/all.yml's ubuntu_mirror or a typo in the deb822 template
# produces a missing suite here rather than a silent partial-mirror
# failure later. We parse the default RFC822 stanzas for `Suite:`
# lines (one per suite × component × arch target) rather than
# `--format '$(SUITE)'` — that placeholder is unsubstituted on
# jammy's apt 2.4 and lands in stdout as the literal "$(SUITE)".
- name: _verify (jammy) | all four noble suites are configured index targets
  when: ansible_distribution_major_version == "22"
  command:
    argv: [ apt-get, indextargets ]
  register: backports_noble_indextargets
  changed_when: false
  failed_when: >
    backports_noble_indextargets.rc != 0
    or (backports_noble_indextargets.stdout_lines
        | select('match', '^Suite:\s+noble(-updates|-backports|-security)?$')
        | map('regex_replace', '^Suite:\s+', '')
        | unique | list | length) < 4

# Functional check: the role's job is to make the apt resolver prefer
# noble candidates for the listed packages. We prove that by pairing
# dpkg's installed version (via package_facts) with apt-cache madison's
# pipe-separated `<pkg> | <ver> | <site> <suite>/<comp> <arch> Packages`
# output -- if the installed version appears on a noble* row, apt picked
# a noble candidate. madison's structured form replaces the prior
# approach of regex'ing apt-cache policy's priority column, which was
# sensitive to whitespace and the leading `***` marker. The pin is the
# only thing that could have made apt prefer noble over jammy, so a
# noble installed version implies the 991 band took effect.
- name: _verify (jammy) | gather installed package versions
  when: ansible_distribution_major_version == "22"
  package_facts:
    manager: apt

- name: _verify (jammy) | apt picks the noble candidate for every pinned package
  when: ansible_distribution_major_version == "22"
  command:
    argv: [ apt-cache, madison, "{{ item }}" ]
  register: backports_madison
  changed_when: false
  loop: "{{ ntp_backport_packages }}"
  failed_when: >
    backports_madison.rc != 0
    or (ansible_facts.packages[item] | default([{}]))[0].version | default('') == ''
    or backports_madison.stdout_lines
       | select('search', '\|\s*'
                ~ ((ansible_facts.packages[item] | default([{}]))[0].version | default('!UNINSTALLED!') | regex_escape)
                ~ '\s*\|.*\snoble(?:-(?:updates|backports|security))?/')
       | list | length == 0

# Negative pin band: the template's `Pin: release o=Ubuntu Pin-Priority: -10`
# catch-all must suppress any unpinned noble package. nano exists in
# both jammy and noble and is NOT in the pin set, so its noble entry
# in apt-cache policy should sit at priority -10. If the -10 band
# regresses (collapsed, removed, or rewritten with a wrong selector),
# the noble entry would default to 500 and the role would silently
# drift jammy hosts to noble on every `apt upgrade` -- this is the
# test that catches that regression.
- name: _verify (jammy) | unpinned noble packages stay below jammy priority
  when: ansible_distribution_major_version == "22"
  command: apt-cache policy nano
  register: backports_negative_policy
  changed_when: false
  failed_when: >
    backports_negative_policy.rc != 0
    or backports_negative_policy.stdout_lines
       | select('match', '^\s+500\s+.*noble')
       | list | length > 0

# Functional check: state=latest on a packer image that doesn't ship
# chrony forces a real install, so the per-call fact must report true.
# `is defined` would pass even on a no-op run -- assert the value.
- name: _verify (jammy) | first apply actually installed/upgraded the pin set
  when: ansible_distribution_major_version == "22"
  assert:
    that:
      - test_libc6_transition_backports_updated | bool
    fail_msg: "Expected pin to install/upgrade packages, got {{ test_libc6_transition_backports_updated }}"

# Re-import with the same name to verify idempotence: pin file
# unchanged, sources unchanged, apt has nothing to do, fact flips to
# false. The harness's idempotence phase re-runs main.yml (empty for
# this role) so it doesn't cover the same-name re-import case.
- name: _verify | re-apply pin.yml with the same name
  import_role:
    name: backports
    tasks_from: pin
  vars:
    backports_args:
      name: test_libc6_transition
      packages: "{{ ntp_backport_packages }}"

- name: _verify (jammy) | second apply is a no-op (fact flips to false)
  when: ansible_distribution_major_version == "22"
  assert:
    that:
      - not (test_libc6_transition_backports_updated | bool)
    fail_msg: "Expected idempotent re-apply to report no change, got {{ test_libc6_transition_backports_updated }}"

# Multi-consumer guarantee: a second import under a different name
# lands its own pin file and its own per-call fact, and doesn't
# disturb the first import's fact. libc6 is already noble after the
# first apply (it's in ntp_backport_packages), so this is a no-op
# install -- but the pin file is new, so we still get a fresh apt
# update and a fresh fact.
- name: _verify | apply pin.yml under a second distinct name
  import_role:
    name: backports
    tasks_from: pin
  vars:
    backports_args:
      name: test_second
      packages: [ libc6 ]

- name: _verify (jammy) | second import lands its own pin file
  when: ansible_distribution_major_version == "22"
  stat:
    path: /etc/apt/preferences.d/backports_test_second.pref
  register: backports_second_stat
  failed_when: not backports_second_stat.stat.exists

- name: _verify (jammy) | per-call facts are independent
  when: ansible_distribution_major_version == "22"
  assert:
    that:
      - test_libc6_transition_backports_updated is defined
      - test_second_backports_updated is defined
    fail_msg: "Expected both per-call facts to survive a second import"

# The Record-outcome task runs unconditionally (no major-version gate),
# so on noble both per-call facts should still land — populated from a
# skipped upgrade result and therefore false. Consumers wrap the lookup
# in `| default(false)` so a missing fact wouldn't fail loudly; verify
# the documented contract directly.
- name: _verify (noble) | per-call facts are defined and false
  when: ansible_distribution_major_version != "22"
  assert:
    that:
      - test_libc6_transition_backports_updated is defined
      - test_second_backports_updated is defined
      - not (test_libc6_transition_backports_updated | bool)
      - not (test_second_backports_updated | bool)
    fail_msg: "Expected both per-call facts to be set to false on noble"
