- name: Install locales
  apt:
    pkg:
      - locales
    cache_valid_time: 3600
  become: true
  register: locale_apt
  tags:
    - locale

- name: Set up locales
  when: not (ansible_check_mode and locale_apt.changed)
  community.general.locale_gen:
    name: en_US.UTF-8
  become: true
  tags:
    - locale

- name: Set default locale
  copy:
    # LANG alone is the system default -- it cascades to every unset LC_*
    # category. We deliberately set nothing else: LC_ALL is a transient
    # debugging override (system-wide it masks every per-shell/per-service
    # locale choice), and LANGUAGE is a gettext message-priority list, not
    # a locale. `_verify.yml` asserts neither creeps back in.
    content: "LANG=en_US.UTF-8\n"
    dest: /etc/default/locale
    validate: sh -n %s
    backup: true
    owner: root
    group: root
    mode: "0644"
  become: true
  register: locale_cfg
  tags:
    - locale

- name: Ask to reboot
  when: locale_cfg.changed
  file:
    path: /var/run/reboot-required
    state: touch
    owner: root
    group: root
    mode: "0644"
  become: true
  tags:
    - locale
