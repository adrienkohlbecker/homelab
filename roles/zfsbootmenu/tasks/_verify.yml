# Backup-promotion verification is suspended while ZBM is pinned to v3.0.1
# and backup promotion is not yet re-implemented — see notes/SOMEDAY.md.

- name: _verify | Stat ZBM recovery EFI binary
  when: ansible_architecture in zfsbootmenu_release
  stat:
    path: /boot/efi/EFI/ZBM/VMLINUZ.EFI
    checksum_algorithm: sha256
  become: true
  register: zfsbootmenu_efi_stat

- name: _verify | Assert ZBM binary exists with correct checksum
  when: ansible_architecture in zfsbootmenu_release
  assert:
    that:
      - zfsbootmenu_efi_stat.stat.exists
      - zfsbootmenu_efi_stat.stat.size > 0
      - zfsbootmenu_efi_stat.stat.checksum == zfsbootmenu_release[ansible_architecture].sha256
    fail_msg: >-
      ZBM binary missing or checksum mismatch:
      exists={{ zfsbootmenu_efi_stat.stat.exists | default(false) }},
      checksum={{ zfsbootmenu_efi_stat.stat.checksum | default('n/a') }},
      expected={{ zfsbootmenu_release[ansible_architecture].sha256 }}
