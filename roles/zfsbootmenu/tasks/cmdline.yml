- name: cmdline | Create zfsbootmenu etc directory
  file:
    dest: /etc/zfsbootmenu
    state: directory
    owner: root
    group: root
    mode: "0755"
  register: zfsbootmenu_cmdline_directory
  become: true

- name: cmdline | Write contents
  when: zfsbootmenu_cmdline_contents | length > 0
  copy:
    dest: /etc/zfsbootmenu/{{ zfsbootmenu_cmdline_file }}
    content: "{{ zfsbootmenu_cmdline_contents }}\n"
    mode: "0644"
    owner: root
    group: root
    backup: true
  register: zfsbootmenu_cmdline_writes_present
  become: true

- name: cmdline | Write contents
  when: zfsbootmenu_cmdline_contents | length == 0
  file:
    path: /etc/zfsbootmenu/{{ zfsbootmenu_cmdline_file }}
    state: absent
  register: zfsbootmenu_cmdline_writes_absent
  become: true

- name: cmdline | Get files
  find:
    paths: /etc/zfsbootmenu
    file_type: file
    excludes:
      - "*~" # ansible backups
  register: zfsbootmenu_cmdline_files
  become: true

- name: cmdline | Read files
  slurp:
    src: "{{ item }}"
  loop: "{{ zfsbootmenu_cmdline_files.files | map(attribute='path') }}"
  register: zfsbootmenu_cmdline_slurped
  become: true

- name: cmdline | Set commandline
  when: zfs_root
  zfs:
    name: rpool/ROOT
    state: present
    extra_zfs_properties:
      'org.zfsbootmenu:commandline': "{% for f in zfsbootmenu_cmdline_slurped.results %}{{ f['content'] | b64decode | replace('\n', ' ') | trim }}{% if not loop.last %} {% endif %}{% endfor %}"
  become: true
  register: zfsbootmenu_cmdline_properties

# community.general.zfs reports `changed: false` even when it actually
# runs `zfs set` because both pre/post property reads happen after the
# set has already applied (the function calls zfs get fresh both times,
# then compares "current" to "updated" and they're identical). Fall
# back to the file-write tasks' changed flag so a fresh
# /etc/zfsbootmenu/<file> still triggers the reboot ask.
- name: cmdline | Ask to reboot
  when: >-
    zfsbootmenu_cmdline_properties.changed
    or (zfsbootmenu_cmdline_writes_present is defined
        and zfsbootmenu_cmdline_writes_present.changed)
    or (zfsbootmenu_cmdline_writes_absent is defined
        and zfsbootmenu_cmdline_writes_absent.changed)
  file:
    path: /var/run/reboot-required
    state: touch
    owner: root
    group: root
    mode: "0644"
  become: true
