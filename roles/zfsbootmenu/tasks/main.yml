- name: Create ZBM directory
  file:
    dest: /boot/efi/EFI/ZBM/
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true
  register: zfsbootmenu_zbm_directory
  tags:
    - zfsbootmenu

- name: Download zfsbootmenu
  when: not (ansible_check_mode and zfsbootmenu_zbm_directory.changed)
  get_url:
    url: "{{ mirror_github }}/zbm-dev/zfsbootmenu/releases/download/v3.1.0/zfsbootmenu-recovery-x86_64-v3.1.0-linux6.12.EFI"
    checksum: sha256:9910458dfe7fc2895214922e22b6ae2513cd0f5a43d4d3c5526eee26e69a2198
    dest: /boot/efi/EFI/ZBM/VMLINUZ.EFI
    mode: "0755"
    owner: root
    group: root
  become: true
  register: zfsbootmenu_efi
  tags:
    - zfsbootmenu

- name: Check if backup exists
  stat:
    path: /boot/efi/EFI/ZBM/VMLINUZ-BACKUP.EFI
  register: zfsbootmenu_efi_backup
  become: true
  tags:
    - zfsbootmenu

- name: Create backup the first time only  # noqa: require-backup
  when: not (ansible_check_mode and (zfsbootmenu_zbm_directory.changed or zfsbootmenu_efi.changed)) and not zfsbootmenu_efi_backup.stat.exists and not qemu_test_minimal
  copy:
    src: /boot/efi/EFI/ZBM/VMLINUZ.EFI
    dest: /boot/efi/EFI/ZBM/VMLINUZ-BACKUP.EFI
    remote_src: true
    mode: "0755"
    owner: root
    group: root
  become: true
  tags:
    - zfsbootmenu

