- name: Create ZBM directory
  file:
    dest: /boot/efi/EFI/ZBM/
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true
  register: zfsbootmenu_zbm_directory
  tags:
    - zfsbootmenu

- name: Download zfsbootmenu
  when: not (ansible_check_mode and zfsbootmenu_zbm_directory.changed)
  get_url:
    url: "{{ mirror_github }}/zbm-dev/zfsbootmenu/releases/download/v3.0.1/zfsbootmenu-recovery-x86_64-v3.0.1-linux6.1.EFI"
    checksum: sha256:3d4c55147964fdbc2b0042535d9ee117dc51bee82af045040d26ae9dfb9bdf0d
    dest: /boot/efi/EFI/ZBM/VMLINUZ.EFI
    mode: "0755"
    owner: root
    group: root
  become: true
  register: zfsbootmenu_efi
  tags:
    - zfsbootmenu

- name: Stat the backup ZFSBootMenu image
  stat:
    path: /boot/efi/EFI/ZBM/VMLINUZ-BACKUP.EFI
    checksum_algorithm: sha256
  register: zfsbootmenu_efi_backup
  become: true
  tags:
    - zfsbootmenu

- name: Stat the running ZFSBootMenu image
  stat:
    path: /boot/efi/EFI/ZBM/VMLINUZ.EFI
    checksum_algorithm: sha256
  register: zfsbootmenu_efi_current
  become: true
  tags:
    - zfsbootmenu

- name: Stat the reboot-required breadcrumb
  stat:
    path: /var/run/reboot-required
  register: zfsbootmenu_reboot_pending
  become: true
  tags:
    - zfsbootmenu

# Promote the running ZBM to the backup loader, but only once it has actually
# booted. The gate: this run did not just re-download it (zfsbootmenu_efi) AND
# no reboot is pending — the download task below sets /var/run/reboot-required
# on a new image, and that tmpfs flag is cleared by the reboot, so its absence
# means the running system booted the current primary. A broken update never
# reaches that state, so VMLINUZ-BACKUP.EFI always holds a version that booted
# — the recovery target of refind's "(backup)" submenuentry. reboot-required is
# shared, so an unrelated pending reboot defers promotion one cycle, which is
# safe (the backup just stays known-good a little longer).
# - name: Promote the running ZBM to backup once it has booted  # noqa: require-backup
#   when:
#     - not (ansible_check_mode and (zfsbootmenu_zbm_directory.changed or zfsbootmenu_efi.changed))
#     - not qemu_test_minimal
#     - not zfsbootmenu_efi.changed
#     - not zfsbootmenu_reboot_pending.stat.exists
#     - zfsbootmenu_efi_current.stat.exists
#     - zfsbootmenu_efi_current.stat.checksum != (zfsbootmenu_efi_backup.stat.checksum | default(''))
#   copy:
#     src: /boot/efi/EFI/ZBM/VMLINUZ.EFI
#     dest: /boot/efi/EFI/ZBM/VMLINUZ-BACKUP.EFI
#     remote_src: true
#     mode: "0755"
#     owner: root
#     group: root
#   become: true
#   tags:
#     - zfsbootmenu

# TODO this is a zpool property
# - name: Set bootfs on rpool
#   zfs:
#     name: rpool
#     state: present
#     extra_zfs_properties:
#       'bootfs': 'rpool/ROOT/jammy'
#   become: true
#   tags:
#     - zfsbootmenu

- name: Ask to reboot
  when: zfsbootmenu_efi.changed
  file:
    path: /var/run/reboot-required
    state: touch
    owner: root
    group: root
    mode: "0644"
  become: true
  tags:
    - zfsbootmenu
