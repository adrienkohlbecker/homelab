- name: Create ZBM directory
  file:
    dest: /boot/efi/EFI/ZBM/
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true
  register: zfsbootmenu_zbm_directory
  tags:
    - zfsbootmenu

# No backup: true — /boot/efi is vfat; backup_local's chown fails on FAT.
- name: Download zfsbootmenu  # noqa: require-backup
  when:
    - not (ansible_check_mode and zfsbootmenu_zbm_directory.changed)
  get_url:
    url: "{{ zfsbootmenu_release[ansible_architecture].url }}"
    checksum: "sha256:{{ zfsbootmenu_release[ansible_architecture].sha256 }}"
    dest: /boot/efi/EFI/ZBM/VMLINUZ.EFI
    mode: "0755"
    owner: root
    group: root
    timeout: 120
  become: true
  register: zfsbootmenu_efi
  retries: 3
  delay: 5
  until: zfsbootmenu_efi is succeeded
  tags:
    - zfsbootmenu

# Seed the backup loader the refind fallback menuentry (VMLINUZ-BACKUP.EFI)
# boots. Copy-if-absent (force: false) so a later primary update never clobbers
# the last known-good backup; boot-success-gated promotion stays a SOMEDAY item.
# No backup: true — /boot/efi is vfat; backup_local's chown fails on FAT.
- name: Seed ZBM backup loader  # noqa: require-backup
  when:
    - not (ansible_check_mode and (zfsbootmenu_zbm_directory.changed or zfsbootmenu_efi.changed))
  copy:
    src: /boot/efi/EFI/ZBM/VMLINUZ.EFI
    dest: /boot/efi/EFI/ZBM/VMLINUZ-BACKUP.EFI
    remote_src: true
    force: false
    owner: root
    group: root
    mode: "0755"
  become: true
  tags:
    - zfsbootmenu

- name: Ask to reboot
  when:
    - zfsbootmenu_efi is changed
  file:
    path: /var/run/reboot-required
    state: touch
    owner: root
    group: root
    mode: "0644"
  become: true
  tags:
    - zfsbootmenu
