- name: Create ZBM directory
  file:
    dest: /boot/efi/EFI/ZBM/
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true
  register: zfsbootmenu_zbm_directory
  tags:
    - zfsbootmenu

- name: Download zfsbootmenu
  when: not (ansible_check_mode and zfsbootmenu_zbm_directory.changed)
  get_url:
    url: "{{ zfsbootmenu_artifact.url }}"
    checksum: "sha256:{{ zfsbootmenu_artifact.sha256 }}"
    dest: /boot/efi/EFI/ZBM/VMLINUZ.EFI
    mode: "0755"
    owner: root
    group: root
    backup: true
    timeout: 120
  become: true
  register: zfsbootmenu_efi
  tags:
    - zfsbootmenu

