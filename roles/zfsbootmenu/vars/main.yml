---
# ZFSBootMenu tarballs are built by mise-tasks/zbm/build.sh and uploaded to the
# Nexus zbm raw repository. Each tarball contains the unified EFI image,
# components-mode kernel/initrd, and the cmdline used by rEFInd on aarch64.
zfsbootmenu_repository_url: "https://{{ nexus_url if (nexus_url | length > 0) else 'nexus.lab.fahm.fr' }}/repository/zbm"
zfsbootmenu_release:
  x86_64:
    version: v3.1.0-linux6.18-ci.27033469422.1-x86_64
    url: "{{ zfsbootmenu_repository_url }}/zfsbootmenu-v3.1.0-linux6.18-ci.27033469422.1-x86_64.tar.gz"
    sha256_url: "{{ zfsbootmenu_repository_url }}/zfsbootmenu-v3.1.0-linux6.18-ci.27033469422.1-x86_64.tar.gz.sha256sum"
  aarch64:
    version: v3.1.0-linux6.18-local.20260605230757-aarch64
    url: "{{ zfsbootmenu_repository_url }}/zfsbootmenu-v3.1.0-linux6.18-local.20260605230757-aarch64.tar.gz"
    sha256_url: "{{ zfsbootmenu_repository_url }}/zfsbootmenu-v3.1.0-linux6.18-local.20260605230757-aarch64.tar.gz.sha256sum"

zfsbootmenu_artifact: "{{ zfsbootmenu_artifact_override | default(zfsbootmenu_release[ansible_architecture]) }}"
zfsbootmenu_cache_dir: "/var/cache/zfsbootmenu/{{ zfsbootmenu_artifact.version }}"
zfsbootmenu_tarball_path: "{{ zfsbootmenu_cache_dir }}/{{ zfsbootmenu_artifact.url | basename }}"
