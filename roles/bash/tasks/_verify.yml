- name: _verify | f_require_root succeeds as root
  shell: |
    source /usr/local/lib/functions.sh
    f_require_root
    echo "ok"
  args:
    executable: /bin/bash
  register: _verify_require_root_ok
  changed_when: false
  become: true

- name: _verify | f_require_root root assertions
  assert:
    that:
      - _verify_require_root_ok.rc == 0
      - "'ok' in _verify_require_root_ok.stdout"

- name: _verify | f_require_root fails as non-root
  shell: |
    runuser -u nobody -- bash -c '
      source /usr/local/lib/functions.sh
      f_require_root
      echo "should-not-run"
    '
  args:
    executable: /bin/bash
  register: _verify_require_root_fail
  changed_when: false
  failed_when: false
  become: true

- name: _verify | f_require_root non-root assertions
  assert:
    that:
      - _verify_require_root_fail.rc == 1
      - "'I require root' in _verify_require_root_fail.stderr"
      - "'should-not-run' not in _verify_require_root_fail.stdout"

- name: _verify | f_rescue continues past failures and records them in f_failed
  shell: |
    source /usr/local/lib/functions.sh
    f_rescue false
    f_rescue true
    f_rescue ls /nonexistent-path-for-verify
    echo "f_failed=$f_failed"
  args:
    executable: /bin/bash
  register: _verify_f_rescue
  changed_when: false

- name: _verify | f_rescue assertions
  assert:
    that:
      - _verify_f_rescue.rc == 0
      - "'f_failed=2' in _verify_f_rescue.stdout"
      - "'Error: false failed with exit 1' in _verify_f_rescue.stderr"
      - "'Error: ls /nonexistent-path-for-verify failed with exit' in _verify_f_rescue.stderr"

# f_rescue must not mutate the caller's errexit state. Caller disables -e,
# calls f_rescue, then inspects $- to confirm -e is still off. Catches a
# regression of the prior `set +e; ...; set -e` toggle that unconditionally
# re-enabled errexit regardless of the caller's prior state.
- name: _verify | f_rescue preserves caller's errexit state
  shell: |
    source /usr/local/lib/functions.sh
    set +e
    f_rescue false
    case $- in
      *e*) echo "errexit=on" ;;
      *)   echo "errexit=off" ;;
    esac
  args:
    executable: /bin/bash
  register: _verify_f_rescue_errexit
  changed_when: false

- name: _verify | f_rescue errexit-preservation assertion
  assert:
    that:
      - _verify_f_rescue_errexit.rc == 0
      - "'errexit=off' in _verify_f_rescue_errexit.stdout"

- name: _verify | f_trace echoes the shell-quoted command to stderr then runs it
  shell: |
    source /usr/local/lib/functions.sh
    f_trace echo hello "two words"
  args:
    executable: /bin/bash
  register: _verify_f_trace
  changed_when: false

- name: _verify | f_trace assertions
  assert:
    that:
      - _verify_f_trace.rc == 0
      - "'$ echo hello' in _verify_f_trace.stderr"
      - "'hello two words' in _verify_f_trace.stdout"

- name: _verify | ERR trap fires on errexit with file:line:func breadcrumb
  shell: |
    source /usr/local/lib/functions.sh
    false
    echo unreached
  args:
    executable: /bin/bash
  register: _verify_err_trap
  changed_when: false
  failed_when: false

- name: _verify | ERR trap fires assertions
  assert:
    that:
      - _verify_err_trap.rc == 1
      - "'unreached' not in _verify_err_trap.stdout"
      - "'ERR: ' in _verify_err_trap.stderr"
      - "'false (exit 1)' in _verify_err_trap.stderr"
      - "'in main' in _verify_err_trap.stderr"

# Regression check: f_rescue uses `if "$@"; then ... else ...`, and
# commands in if-conditions are exempt from ERR per bash semantics.
# A future refactor that switched f_rescue to a `set +e; ...; set -e`
# toggle would fire the trap, and this test would catch it.
- name: _verify | ERR trap does NOT fire for failures wrapped in f_rescue
  shell: |
    source /usr/local/lib/functions.sh
    f_rescue false
    echo "after-rescue"
  args:
    executable: /bin/bash
  register: _verify_err_trap_rescue
  changed_when: false

- name: _verify | ERR trap non-firing under f_rescue assertions
  assert:
    that:
      - _verify_err_trap_rescue.rc == 0
      - "'after-rescue' in _verify_err_trap_rescue.stdout"
      - "'ERR: ' not in _verify_err_trap_rescue.stderr"
      - "'Error: false failed' in _verify_err_trap_rescue.stderr"
