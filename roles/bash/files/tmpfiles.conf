# F_DEBUGME xtrace logs from /usr/local/lib/functions.sh (installed by
# roles/bash). The library rotates a fresh file per source-with-F_DEBUGME,
# so on a long-uptime host with debug enabled they'd accumulate. /tmp is
# typically tmpfs so reboots already clean these out -- this rule just
# bounds the worst case.
#
# Type Path             Mode UID GID Age Argument
e      /tmp/bash-*.log  -    -   -   7d  -
