# Pinned binaries. Both are single static Go executables installed straight
# into /usr/local/bin (no apt repo, no container). Bumping = edit the version
# constant plus the URL and sha256 for every arch in lockstep, then re-apply;
# the unit's next restart picks up the new binary.
#
# URL adjacent to its sha256 per arch (CLAUDE.md "Centralize downloadable
# artifact metadata") so a human auditing a checksum sees exactly which URL it
# pins. ansible_architecture (x86_64 / aarch64) keys map onto upstream's
# amd64 / arm64 asset names. The sha256s were computed from the published
# binaries on 2026-06-10.

# GitLab Runner manager. Drives the instance executor + fleeting autoscaler.
gitlab_runner_version: "19.0.1"
gitlab_runner_archive:
  x86_64:
    url: "https://gitlab-runner-downloads.s3.amazonaws.com/v19.0.1/binaries/gitlab-runner-linux-amd64"
    sha256: "972a2bebaf940a767ac022bfebbc9df077388a85fbf1b6cf3d19eb981d5a92b6"
  aarch64:
    url: "https://gitlab-runner-downloads.s3.amazonaws.com/v19.0.1/binaries/gitlab-runner-linux-arm64"
    sha256: "fd2d07bf3ee40b495cf0affa46257407dbba9c18e46d6a91001dee938d8b10ac"

# fleeting-plugin-hetzner: Hetzner-developed/-supported fleeting plugin the
