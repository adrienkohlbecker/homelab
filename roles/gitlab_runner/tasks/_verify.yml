# Functional host-side checks. The live runner can't register in the harness
# (no gitlab.com token, no Hetzner project), so the role enable-onlys under
# qemu_test and this exercises everything that genuinely runs on the host: the
# pinned binaries execute on this arch, and the unit starts, stays up, and
# serves its metrics listener. Live scale-from-zero is proven by the gate-1
# benchmark on a real instance, not CI.
- name: _verify | Pinned gitlab-runner binary runs on this arch
  command: /usr/local/bin/gitlab-runner --version
  register: _gitlab_runner_version
  changed_when: false
  failed_when: gitlab_runner_version not in _gitlab_runner_version.stdout

- name: _verify | Pinned fleeting-plugin-hetzner binary runs on this arch
  command: /usr/local/bin/fleeting-plugin-hetzner --version
  register: _gitlab_runner_plugin_version
  changed_when: false
  failed_when: >-
    gitlab_runner_fleeting_hetzner_version
    not in _gitlab_runner_plugin_version.stdout

# Functional unit-start smoke: the role enable-onlys under qemu_test, so start
# the manager by hand. gitlab-runner run stays up on a placeholder token
# (registration fails async, the loop keeps retrying), so Type=simple reaches
# active -- proving User=/Group=/WorkingDirectory=/HOME=/ExecStart all
# resolve, which a static parse cannot.
- name: _verify | Start the manager to drive the unit's ExecStart
  systemd:
    name: gitlab_runner.service
    state: started
    daemon_reload: true
  become: true

- name: _verify | Wait for gitlab_runner.service to reach active
  systemd:
    name: gitlab_runner.service
  register: _gitlab_runner_smoke
  until: _gitlab_runner_smoke.status.ActiveState == "active"
  retries: 10
  delay: 2
  failed_when: _gitlab_runner_smoke.status.ActiveState != "active"
  become: true

# Metrics probe -- the loopback listener is the role's only listener and the
# input to fox's netdata presence alert (go.d prometheus collector), so a
# broken listen_address must fail here, not silently on prod. Same URL netdata
# scrapes.
- name: _verify | Manager serves prometheus metrics on its loopback port
  uri:
    url: http://127.0.0.1:{{ service_ports.gitlab_runner }}/metrics
    status_code: 200
    return_content: true
  register: _gitlab_runner_metrics
  failed_when: "'gitlab_runner_' not in (_gitlab_runner_metrics.content | default(''))"
  retries: 5
  delay: 1
  until: _gitlab_runner_metrics.status | default(0) == 200

# Type=simple is `active` the instant ExecStart forks, so the wait above can
# catch the brief active window of a crash-looping manager; re-read after the
# metrics probe (several seconds of runtime) and assert it never restarted.
- name: _verify | Manager stayed up since the smoke start
  systemd:
    name: gitlab_runner.service
  register: _gitlab_runner_settled
  failed_when: >-
    _gitlab_runner_settled.status.ActiveState != "active"
    or _gitlab_runner_settled.status.NRestarts != "0"
  become: true

# SIGQUIT with zero in-flight jobs drains instantly, so stop won't hang on the
# unit's stop timeout. Leaves the manager stopped (qemu has no upstream to
# register against anyway).
- name: _verify | Stop the manager after smoke
  systemd:
    name: gitlab_runner.service
    state: stopped
  become: true
