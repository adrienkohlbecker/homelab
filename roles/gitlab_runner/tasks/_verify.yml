# Functional host-side checks. The live runner can't register in the harness
# (no gitlab.com token), so the role enable-onlys under qemu_test and this
# exercises everything that genuinely runs on the host: the pinned binary
# executes on this arch, Docker mode proves the rootless podman socket, and the
# unit starts, stays up, and serves its metrics listener. A real job dispatch
# needs gitlab.com and is proven by the gate-B/C runs on fox/lab, not CI.
- name: _verify | Pinned gitlab-runner binary runs on this arch
  command: /usr/local/bin/gitlab-runner --version
  register: _gitlab_runner_version
  changed_when: false
  failed_when: gitlab_runner_version not in _gitlab_runner_version.stdout

- name: _verify | Rendered config uses the requested executor
  command: grep -F 'executor = "{{ gitlab_runner_executor }}"' /mnt/services/gitlab_runner/config.toml
  changed_when: false
  become: true

- name: _verify | Resolve gitlab_runner uid
  command: id -u gitlab_runner
  register: _gitlab_runner_uid
  changed_when: false
  become: true

# In the shell-executor cell, _setup.yml seeds a stale Docker-executor state
# first: linger enabled and podman.socket active under gitlab_runner. These
# assertions therefore prove the role cleaned up a real executor transition,
# not merely that a fresh shell host never created Docker state.
- name: _verify | Shell executor does not leave gitlab_runner linger enabled
  when: gitlab_runner_executor != 'docker'
  stat:
    path: /var/lib/systemd/linger/gitlab_runner
  register: _gitlab_runner_shell_linger
  failed_when: _gitlab_runner_shell_linger.stat.exists
  become: true

- name: _verify | Shell executor does not leave rootless podman.socket enabled
  when: gitlab_runner_executor != 'docker'
  stat:
    path: /mnt/services/gitlab_runner/.config/systemd/user/sockets.target.wants/podman.socket
  register: _gitlab_runner_shell_podman_socket
  failed_when: _gitlab_runner_shell_podman_socket.stat.exists
  become: true

- name: _verify | Shell executor stopped gitlab_runner user manager  # noqa: command-instead-of-module -- is-active query, not a state change
  when: gitlab_runner_executor != 'docker'
  command: systemctl is-active user@{{ _gitlab_runner_uid.stdout }}.service
  register: _gitlab_runner_shell_user_manager
  changed_when: false
  failed_when: _gitlab_runner_shell_user_manager.stdout | trim == 'active'
  become: true

# Coordinator runner (docker-autoscaler / fleeting). Enabled on box with
# placeholder secrets, so the host-side artifacts get real coverage even though
# no coordinator ever boots in the harness. timeout-guards the binary call: a
# fleeting plugin with no go-plugin handshake env could otherwise block on
# stdin.
- name: _verify | Pinned fleeting-plugin-hetzner binary runs on this arch
  when: gitlab_runner_coordinator_enabled
  command: timeout 10 /usr/local/bin/fleeting-plugin-hetzner --version
  register: _gitlab_runner_fleeting_version
  changed_when: false
  failed_when: >-
    gitlab_runner_fleeting_hetzner_version
    not in _gitlab_runner_fleeting_version.stdout

- name: _verify | Rendered config carries the coordinator autoscaler block
  when: gitlab_runner_coordinator_enabled
  command: grep -F 'plugin = "fleeting-plugin-hetzner"' /mnt/services/gitlab_runner/config.toml
  changed_when: false
  become: true

- name: _verify | Coordinator reuses the detect-warmed CI image
  when: gitlab_runner_coordinator_enabled
  command: grep -F 'pull_policy = "if-not-present"' /mnt/services/gitlab_runner/config.toml
  changed_when: false
  become: true

- name: _verify | Coordinator allows detect to force-refresh the image
  when: gitlab_runner_coordinator_enabled
  command: grep -F 'allowed_pull_policies = ["always", "if-not-present"]' /mnt/services/gitlab_runner/config.toml
  changed_when: false
  become: true

- name: _verify | Coordinator connector keeps a 15 minute SSH timeout
  when: gitlab_runner_coordinator_enabled
  command: grep -F 'timeout = "15m0s"' /mnt/services/gitlab_runner/config.toml
  changed_when: false
  become: true

- name: _verify | Pinned fleeting-plugin-aws binary runs on this arch
  when: gitlab_runner_aws_qemu_enabled
  command: timeout 10 /usr/local/bin/fleeting-plugin-aws --version
  register: _gitlab_runner_fleeting_aws_version
  changed_when: false
  failed_when: >-
    gitlab_runner_fleeting_aws_version
    not in _gitlab_runner_fleeting_aws_version.stdout

- name: _verify | Rendered config carries the AWS qemu instance runner block
  when: gitlab_runner_aws_qemu_enabled
  command: grep -F 'plugin = "fleeting-plugin-aws"' /mnt/services/gitlab_runner/config.toml
  changed_when: false
  become: true

- name: _verify | AWS qemu runner points at the Terraform ASG
  when: gitlab_runner_aws_qemu_enabled
  command: grep -F 'name = "{{ gitlab_runner_aws_qemu_asg_name }}"' /mnt/services/gitlab_runner/config.toml
  changed_when: false
  become: true

- name: _verify | Rootless podman.socket is active under gitlab_runner
  when: gitlab_runner_executor == 'docker'
  systemd:
    name: podman.socket
    scope: user
  register: _gitlab_runner_podman_sock
  failed_when: _gitlab_runner_podman_sock.status.ActiveState != "active"
  become: true
  become_user: gitlab_runner

# Functional: drive the exact socket config.toml points the Docker executor
# at. `podman info` over the URL exercises socket activation, the user
# manager (linger), and the storage stack end-to-end -- an inert socket file
# would pass a stat but fail this.
- name: _verify | Docker-executor socket answers podman info
  when: gitlab_runner_executor == 'docker'
  command: >-
    podman --url unix:///run/user/{{ _gitlab_runner_uid.stdout }}/podman/podman.sock info
  register: _gitlab_runner_podman_info
  changed_when: false
  failed_when: "'graphRoot' not in _gitlab_runner_podman_info.stdout"
  become: true
  become_user: gitlab_runner

- name: _verify | Rendered config dials that same socket
  when: gitlab_runner_executor == 'docker'
  command: grep -F 'unix:///run/user/{{ _gitlab_runner_uid.stdout }}/podman/podman.sock' /mnt/services/gitlab_runner/config.toml
  changed_when: false
  become: true

# Functional unit-start smoke: the role enable-onlys under qemu_test, so start
# the runner by hand. gitlab-runner run stays up on a placeholder token
# (registration fails async, the loop keeps retrying), so Type=simple reaches
# active -- proving User=/Group=/WorkingDirectory=/HOME=/ExecStart all
# resolve, which a static parse cannot.
- name: _verify | Start the runner to drive the unit's ExecStart
  systemd:
    name: gitlab_runner.service
    state: started
    daemon_reload: true
  become: true

- name: _verify | Wait for gitlab_runner.service to reach active
  systemd:
    name: gitlab_runner.service
  register: _gitlab_runner_smoke
  until: _gitlab_runner_smoke.status.ActiveState == "active"
  retries: 10
  delay: 2
  failed_when: _gitlab_runner_smoke.status.ActiveState != "active"
  become: true

# Metrics probe -- the loopback listener is the role's only listener and the
# input to fox's netdata presence alert (go.d prometheus collector), so a
# broken listen_address must fail here, not silently on prod. Same URL netdata
# scrapes.
- name: _verify | Runner serves prometheus metrics on its loopback port
  uri:
    url: http://127.0.0.1:{{ service_ports.gitlab_runner }}/metrics
    status_code: 200
    return_content: true
  register: _gitlab_runner_metrics
  failed_when: "'gitlab_runner_' not in (_gitlab_runner_metrics.content | default(''))"
  retries: 5
  delay: 1
  until: _gitlab_runner_metrics.status | default(0) == 200

# Type=simple is `active` the instant ExecStart forks, so the wait above can
# catch the brief active window of a crash-looping runner; re-read after the
# metrics probe (several seconds of runtime) and assert it never restarted.
- name: _verify | Runner stayed up since the smoke start
  systemd:
    name: gitlab_runner.service
  register: _gitlab_runner_settled
  failed_when: >-
    _gitlab_runner_settled.status.ActiveState != "active"
    or _gitlab_runner_settled.status.NRestarts != "0"
  become: true

# SIGQUIT with zero in-flight jobs drains instantly, so stop won't hang on the
# unit's stop timeout. Leaves the runner stopped (qemu has no upstream to
# register against anyway).
- name: _verify | Stop the runner after smoke
  systemd:
    name: gitlab_runner.service
    state: stopped
  become: true

# The CI fan-out's job containers live under the runner's user-<uid>.slice
# (rootless podman), not under gitlab_runner.service. The role caps that slice
# so a wide matrix can't swap out a co-tenant control plane. Assert the cap
# actually landed on the live slice (box sets both High + Max in host_vars): a
# stat of the drop-in file would pass even if systemd never parsed the values.
- name: _verify | Runner user-slice carries a finite memory cap
  when: gitlab_runner_executor == 'docker'
  systemd:
    name: user-{{ _gitlab_runner_uid.stdout }}.slice
  register: _gitlab_runner_slice_cap
  failed_when: >-
    _gitlab_runner_slice_cap.status.MemoryMax == "infinity"
    or _gitlab_runner_slice_cap.status.MemoryHigh == "infinity"
  become: true
