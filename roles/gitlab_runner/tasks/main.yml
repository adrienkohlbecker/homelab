# GitLab Runner manager (host-native binary; instance executor + fleeting
# autoscaler -> Hetzner Cloud). Runs on fox (the only internet-facing host; the
# manager holds no job payloads, so a token-on-the-manager beats a
# token-on-the-worker) and on box as the CI fixture. Gated on
# gitlab_runner_enabled.
#
# No nginx vhost and no homepage bookmark on purpose: this service exposes no
# operator-facing HTTP surface. The runner UI is gitlab.com itself; the only
# local listener is the loopback Prometheus metrics endpoint (for netdata).
#
# Accepted risk: the fleeting SSH connector does no host-key verification
# (ssh.InsecureIgnoreHostKey upstream) and workers are reached over their
# public addresses, so an on-path attacker between this host and Hetzner could
# impersonate a fresh worker and harvest the job payload + CI tokens. On-path
# positioning is outside the homelab threat model; revisit (private network +
# use_external_addr=false) if that changes.
- name: GitLab Runner manager
  when: gitlab_runner_enabled | default(false)
  tags:
    - gitlab_runner
  block:
    # Required inputs live in host_vars and the role asserts them (CLAUDE.md).
    # Both render straight into config.toml, so an unset value would boot a
    # runner that silently fails to register / can't reach Hetzner -- catch it
    # loudly here instead. Non-empty, not just defined: a mistyped vault key
    # renders to "" which passes `is defined`.
    - name: Assert required gitlab_runner secrets are set
      assert:
        that:
          - gitlab_runner_token | default('') | length > 0
          - gitlab_runner_hcloud_token | default('') | length > 0
        fail_msg: >-
          gitlab_runner_enabled is true but gitlab_runner_token and/or
          gitlab_runner_hcloud_token is unset for {{ inventory_hostname }}.
          Create a project runner on gitlab.com (-> glrt- auth token) and a
          project-scoped Hetzner Cloud API token for the dedicated CI project,
          then vault both into host_vars/{{ inventory_hostname }}.yml.

    # The fleeting plugin resolves `image` by name or id only and Hetzner
    # snapshots have no name, so the rendered value must be a numeric snapshot
    # id -- which would go stale on every worker rebake if pinned by hand.
    # Resolve the newest matching snapshot here instead, so a converge always
    # renders the current bake; between converges the refresh timer below
    # adopts new bakes the same way. Skipped under qemu (no API, no fleet
    # ever boots): the template falls back to a stock image name there.
    # check_mode false: a read-only GET, and running it keeps a --check diff
    # faithful to what a real converge would render.
    - name: Resolve the newest CI worker snapshot from the Hetzner API
      when: not qemu_test
      check_mode: false
      uri:
        url: >-
          https://api.hetzner.cloud/v1/images?type=snapshot&status=available&label_selector={{
          gitlab_runner_image_selector | urlencode }}&sort=created:desc&per_page=1
        headers:
          Authorization: "Bearer {{ gitlab_runner_hcloud_token }}"
        return_content: true
      register: gitlab_runner_image_lookup

    - name: Assert the worker image selector matched a snapshot
      when: not qemu_test
      assert:
        that:
          - gitlab_runner_image_lookup.json.images | length > 0
        fail_msg: >-
          No available Hetzner snapshot matches
          {{ gitlab_runner_image_selector }} in the CI project. The instance
          executor runs each job as a shell ON the fleet VM, so the image must
          be a baked role=ci-worker snapshot -- build one with
          `mise run packer:worker`.

    - name: Pin the resolved worker image for this converge
      when: not qemu_test
      set_fact:
        gitlab_runner_resolved_image: "{{ gitlab_runner_image_lookup.json.images[0].id }}"

    - name: Set up gitlab_runner system user, group, and config dir
      import_role:
        name: service_user
        tasks_from: user
      vars:
        service_user_args:
          name: gitlab_runner

    # python3-tomli backs the config.toml validate below where stdlib tomllib is
    # absent (it landed in 3.11; jammy/22.04 ships 3.10). Gate on the Ubuntu
    # release < noble so noble/resolute and beyond skip the backport (they have
    # tomllib). apt-idempotent where already present.
    - name: Install host dependencies for gitlab_runner
      apt:
        pkg:
          - python3-tomli
        install_recommends: false
        cache_valid_time: 3600
      become: true
      when: ansible_distribution_version is version('24.04', '<')

    # checksum: drives re-download on a version bump (sha mismatch forces fetch)
    # and surfaces tampering on the plain-https URL.
    - name: Download gitlab-runner binary
      when: not (ansible_check_mode and gitlab_runner_user.changed)
      get_url:
        url: "{{ gitlab_runner_archive[ansible_architecture].url }}"
        dest: /usr/local/bin/gitlab-runner
        checksum: "sha256:{{ gitlab_runner_archive[ansible_architecture].sha256 }}"
        owner: root
        group: root
        mode: "0755"
        backup: true
      become: true
      register: gitlab_runner_binary

    - name: Download fleeting-plugin-hetzner binary
      when: not (ansible_check_mode and gitlab_runner_user.changed)
      get_url:
        url: "{{ gitlab_runner_fleeting_hetzner_archive[ansible_architecture].url }}"
        dest: /usr/local/bin/fleeting-plugin-hetzner
        checksum: "sha256:{{ gitlab_runner_fleeting_hetzner_archive[ansible_architecture].sha256 }}"
        owner: root
        group: root
        mode: "0755"
        backup: true
      become: true
      register: gitlab_runner_fleeting_binary

    # 0600 + owned by the runner: holds both the glrt- runner token and the
    # hcloud API token. validate parses the rendered TOML (gitlab-runner falls
    # back to defaults on a parse error, so catch typos here). A bare TOML
    # parse is the best validate available: `gitlab-runner verify` is a live
    # server check (dials gitlab.com with the configured token), not an
    # offline lint -- upstream ships none.
    - name: Render gitlab-runner config.toml
      when: not (ansible_check_mode and gitlab_runner_user.changed)
      template:
        src: config.toml.j2
        dest: /mnt/services/gitlab_runner/config.toml
        owner: gitlab_runner
        group: gitlab_runner
        mode: "0600"
        backup: true
        validate: python3 -c 'import {{ "tomllib" if ansible_distribution_version is version("24.04", ">=") else "tomli" }} as t, sys; t.load(open(sys.argv[1], "rb"))' %s
      become: true

    # Service code from the repo lives at /opt/<svc>; state stays under
    # /mnt/services/<svc> (CLAUDE.md).
    - name: Create /opt/gitlab_runner
      file:
        path: /opt/gitlab_runner
        state: directory
        owner: root
        group: root
        mode: "0755"
      become: true

    - name: Install the worker image refresh script
      copy:
        src: update_worker_image.py
        dest: /opt/gitlab_runner/update_worker_image.py
        owner: root
        group: root
        mode: "0755"
        backup: true
        validate: python3 -m py_compile %s
      become: true

    # Between converges, adopt freshly-baked worker snapshots with no commit
    # and no converge: the script resolves the newest snapshot matching
    # gitlab_runner_image_selector and rewrites config.toml's image line in
    # place; gitlab-runner hot-reloads the file within seconds. run_as the
    # service user: the config is 0600 gitlab_runner-owned and the script
    # needs nothing more. Under qemu the placeholder token makes every fire
    # fail loudly without touching the config -- harmless on a throwaway
    # fixture; _verify exercises the script end-to-end against a local API
    # stub instead.
    - name: Install gitlab_runner_image_refresh timer
      import_role:
        name: systemd_timer
        tasks_from: install
      vars:
        systemd_timer_args:
          name: gitlab_runner_image_refresh
          description: Adopt the newest CI worker snapshot into gitlab-runner config
          on_calendar: "*:0/15"
          exec_start: >-
            /usr/bin/python3 /opt/gitlab_runner/update_worker_image.py
            --config /mnt/services/gitlab_runner/config.toml
            --selector {{ gitlab_runner_image_selector }}
          run_as: gitlab_runner
          condition: "{{ not (ansible_check_mode and gitlab_runner_user.changed) }}"

    - name: Install gitlab_runner.service
      import_role:
        name: systemd_unit
        tasks_from: install
      vars:
        systemd_unit_args:
          src: gitlab_runner.service.j2
          condition: "{{ not (ansible_check_mode and gitlab_runner_user.changed) }}"

    # Live registration needs a real gitlab.com runner token and a real Hetzner
    # project token to init the fleeting plugin -- neither exists in the qemu
    # harness, so enable-only under qemu_test and let _verify exercise the
    # host-side artifacts. Prod (fox) starts the manager for real. restart
    # propagates a unit or binary change only -- NOT a config change:
    # gitlab-runner hot-reloads config.toml every 3s, and the one rendered
    # setting that genuinely needs a restart (listen_address) comes from the
    # stable service_ports map, so restarting on config would risk a 30-min
    # drain for changes the runner picks up live.
    - name: Enable and start gitlab_runner.service
      import_role:
        name: systemd_unit
        tasks_from: service
      vars:
        systemd_unit_args:
          src: gitlab_runner.service.j2
          start: "{{ not qemu_test }}"
          restart: >-
            {{ gitlab_runner_service_result.changed
               or gitlab_runner_binary.changed
               or gitlab_runner_fleeting_binary.changed }}
          condition: "{{ not (ansible_check_mode and (gitlab_runner_service_result.changed or gitlab_runner_user.changed)) }}"
