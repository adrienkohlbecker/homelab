# GitLab Runner (host-native binary; Docker executor against the runner
# user's rootless podman socket). Runs on fox — the orchestration point for
# the AWS test cells (notes/ci_aws_test_cells.md): jobs run
# `testrole.py <role> --backend aws` inside the project CI image and drive
# EC2 from there, so the heavy lifting never happens on fox itself. box is
# the CI fixture. Gated on gitlab_runner_enabled.
#
# The Docker executor keeps branch code inside a job container rather than
# running it directly as the runner user. The runner still holds podman
# socket access to start those containers, so this is not a
# hostile-multi-tenant boundary — the runner is locked to this project and
# every pipeline is operator-authored.
#
# No nginx vhost and no homepage bookmark on purpose: this service exposes no
# operator-facing HTTP surface. The runner UI is gitlab.com itself; the only
# local listener is the loopback Prometheus metrics endpoint (for netdata).
- name: GitLab Runner
  when: gitlab_runner_enabled | default(false)
  tags:
    - gitlab_runner
  block:
    # Required input lives in host_vars and the role asserts it (CLAUDE.md).
    # It renders straight into config.toml, so an unset value would boot a
    # runner that silently fails to register -- catch it loudly here instead.
    # Non-empty, not just defined: a mistyped vault key renders to "" which
    # passes `is defined`.
    - name: Assert the required gitlab_runner secret is set
      assert:
        that:
          - gitlab_runner_token | default('') | length > 0
        fail_msg: >-
          gitlab_runner_enabled is true but gitlab_runner_token is unset for
          {{ inventory_hostname }}. Create a project runner on gitlab.com
          (Settings -> CI/CD -> Runners -> New project runner) with the
          fox-docker-aws tag, run-untagged off, locked to the project, and
          protected; then vault the glrt- token into
          host_vars/{{ inventory_hostname }}.yml.

    # The coordinator runner needs its own glrt- project runner token (distinct
    # from the docker runner's) AND an hcloud API token to clone instances + read
    # the snapshot. Both render straight into config.toml / drive the snapshot
    # lookup below, so catch an unset value here. Non-empty, not just defined.
    - name: Assert the coordinator runner secrets are set
      when: gitlab_runner_coordinator_enabled
      assert:
        that:
          - gitlab_runner_coordinator_token | default('') | length > 0
          - gitlab_runner_hcloud_token | default('') | length > 0
        fail_msg: >-
          gitlab_runner_coordinator_enabled is true but
          gitlab_runner_coordinator_token and/or gitlab_runner_hcloud_token is
          unset for {{ inventory_hostname }}. Create a second project runner on
          gitlab.com for the docker-autoscaler executor, and mint an hcloud API
          token, then vault both into host_vars/{{ inventory_hostname }}.yml.

    - name: Set up gitlab_runner system user, group, and config dir
      import_role:
        name: service_user
        tasks_from: user
      vars:
        service_user_args:
          name: gitlab_runner
          # Real passwd home (the unit's Environment=HOME matches): the
          # user-scope `systemctl enable podman.socket` below writes
          # ~/.config/systemd/user/, which fails against the /nonexistent
          # sentinel. The config-dir task creates the directory; createhome
          # stays off so useradd doesn't race it.
          home: /mnt/services/gitlab_runner

    # python3-tomli backs the config.toml validate below where stdlib tomllib is
    # absent (it landed in 3.11; jammy/22.04 ships 3.10). Gate on the Ubuntu
    # release < noble so noble/resolute and beyond skip the backport (they have
    # tomllib). apt-idempotent where already present.
    - name: Install host dependencies for gitlab_runner
      apt:
        pkg:
          - python3-tomli
        install_recommends: false
        cache_valid_time: 3600
      become: true
      when: ansible_distribution_version is version('24.04', '<')

    # checksum: drives re-download on a version bump (sha mismatch forces fetch)
    # and surfaces tampering on the plain-https URL.
    - name: Download gitlab-runner binary
      when: not (ansible_check_mode and gitlab_runner_user.changed)
      get_url:
        url: "{{ gitlab_runner_archive[ansible_architecture].url }}"
        dest: /usr/local/bin/gitlab-runner
        checksum: "sha256:{{ gitlab_runner_archive[ansible_architecture].sha256 }}"
        owner: root
        group: root
        mode: "0755"
        backup: true
      become: true
      register: gitlab_runner_binary

    # The docker-autoscaler executor's instance plugin: a PATH-named binary
    # (config.toml plugin = "fleeting-plugin-hetzner"), not an OCI ref.
    # checksum drives re-download on a version bump and surfaces tampering.
    - name: Download fleeting-plugin-hetzner binary
      when:
        - gitlab_runner_coordinator_enabled
        - not (ansible_check_mode and gitlab_runner_user.changed)
      get_url:
        url: "{{ gitlab_runner_fleeting_hetzner_archive[ansible_architecture].url }}"
        dest: /usr/local/bin/fleeting-plugin-hetzner
        checksum: "sha256:{{ gitlab_runner_fleeting_hetzner_archive[ansible_architecture].sha256 }}"
        owner: root
        group: root
        mode: "0755"
        backup: true
      become: true
      register: gitlab_runner_fleeting_binary

    # docker-autoscaler's image must be a numeric snapshot id -- a snapshot has
    # no name for the plugin's GetForArchitecture to resolve. Look up the newest
    # available role=ci-coordinator snapshot at converge so a rebake is picked up
    # with no host_vars edit. check_mode:false so the lookup runs under --check
    # (the rendered config below needs the id either way). Skipped under qemu
    # (no hcloud reachability + the coordinator never boots there): the template
    # falls back to the ubuntu-24.04 placeholder.
    - name: Resolve the newest coordinator snapshot from the Hetzner API
      when:
        - gitlab_runner_coordinator_enabled
        - not qemu_test
      check_mode: false
      uri:
        url: >-
          https://api.hetzner.cloud/v1/images?type=snapshot&status=available&label_selector={{
          gitlab_runner_image_selector | urlencode }}&sort=created:desc&per_page=1
        headers:
          Authorization: "Bearer {{ gitlab_runner_hcloud_token }}"
        return_content: true
      register: gitlab_runner_image_lookup

    - name: Assert a coordinator snapshot exists and select its id
      when:
        - gitlab_runner_coordinator_enabled
        - not qemu_test
      vars:
        _images: "{{ gitlab_runner_image_lookup.json.images }}"
      block:
        - name: Assert at least one coordinator snapshot is available
          assert:
            that:
              - _images | length > 0
            fail_msg: >-
              No available Hetzner snapshot matches
              {{ gitlab_runner_image_selector }}. Bake one with `mise run
              packer:hetzner-coordinator` before enabling the coordinator runner.

        - name: Select the resolved coordinator snapshot id
          set_fact:
            gitlab_runner_resolved_image: "{{ _images[0].id }}"

    # Linger so rootless podman has a user systemd manager up at all times:
    # crun makes sd-bus calls when creating containers, which fail with
    # "Permission denied" without one. The helper enables linger and waits
    # for user@<uid>.service (which provides the dbus + cgroup hierarchy
    # crun expects) so the socket tasks below find a live bus. Rootless podman
    # is the one accepted user-scope exception (CLAUDE.md "Prefer system-scope
    # systemd units").
    #
    # Prerequisite: the subid role must have rendered a subordinate-id range
    # for gitlab_runner (site.yml orders it before this role; host_vars list
    # the user). Without it the first job container fails uid-mapping.
    - name: Turn on linger
      import_role:
        name: linger
        tasks_from: linger
      vars:
        linger_args:
          name: gitlab_runner
          uid: "{{ gitlab_runner_user.uid }}"

    # The Docker executor dials this socket (config.toml [runners.docker]
    # host); socket-activated, so the podman service itself only runs while
    # jobs do. Storage rides the podman role's system config
    # (rootless_storage_path on the /var/lib/containers zvol -- overlay on
    # ext4, not ZFS); no per-user storage.conf needed since jobs are plain
    # containers (no uidmapped siblings).
    - name: Enable rootless podman socket
      when: not (ansible_check_mode and (gitlab_runner_user.changed or gitlab_runner_lingered))
      systemd:
        name: podman.socket
        enabled: true
        scope: user
      become: true
      become_user: gitlab_runner

    - name: Start rootless podman socket
      when: not (ansible_check_mode and (gitlab_runner_user.changed or gitlab_runner_lingered))
      systemd:
        name: podman.socket
        state: started
        scope: user
      become: true
      become_user: gitlab_runner

    # 0600 + owned by the runner: holds the glrt- runner token. validate
    # parses the rendered TOML (gitlab-runner falls back to defaults on a
    # parse error, so catch typos here). A bare TOML parse is the best
    # validate available: `gitlab-runner verify` is a live server check
    # (dials gitlab.com with the configured token), not an offline lint --
    # upstream ships none.
    - name: Render gitlab-runner config.toml
      when: not (ansible_check_mode and gitlab_runner_user.changed)
      template:
        src: config.toml.j2
        dest: /mnt/services/gitlab_runner/config.toml
        owner: gitlab_runner
        group: gitlab_runner
        mode: "0600"
        backup: true
        validate: python3 -c 'import {{ "tomllib" if ansible_distribution_version is version("24.04", ">=") else "tomli" }} as t, sys; t.load(open(sys.argv[1], "rb"))' %s
      become: true

    - name: Install gitlab_runner.service
      import_role:
        name: systemd_unit
        tasks_from: install
      vars:
        systemd_unit_args:
          src: gitlab_runner.service.j2
          condition: "{{ not (ansible_check_mode and gitlab_runner_user.changed) }}"

    # Live registration needs a real gitlab.com runner token -- none exists in
    # the qemu harness, so enable-only under qemu_test and let _verify exercise
    # the host-side artifacts. Prod (fox) starts the runner for real. restart
    # propagates a unit or binary change only -- NOT a config change:
    # gitlab-runner hot-reloads config.toml every 3s, and the one rendered
    # setting that genuinely needs a restart (listen_address) comes from the
    # stable service_ports map, so restarting on config would risk a 30-min
    # drain for changes the runner picks up live.
    - name: Enable and start gitlab_runner.service
      import_role:
        name: systemd_unit
        tasks_from: service
      vars:
        systemd_unit_args:
          src: gitlab_runner.service.j2
          start: "{{ not qemu_test }}"
          restart: >-
            {{ gitlab_runner_service_result.changed
               or gitlab_runner_binary.changed
               or (gitlab_runner_fleeting_binary.changed | default(false)) }}
          condition: "{{ not (ansible_check_mode and (gitlab_runner_service_result.changed or gitlab_runner_user.changed)) }}"

    # Bound the rootless runner's user slice so a wide CI fan-out can't exhaust
    # host RAM and swap out a co-tenant control plane (fox: headscale + nginx).
    # The job containers live under user-<uid>.slice (rootless podman), not
    # under gitlab_runner.service in system.slice, so the cap goes on the slice.
    # Opt-in via host_vars (host-RAM-dependent); removed as a tombstone when
    # unconfigured. uid is service_user-allocated, so check-mode-gate the
    # fresh-user case where it only reports creation.
    - name: Cap the rootless runner user slice memory
      when: not (ansible_check_mode and gitlab_runner_user.changed)
      vars:
        _slice_dropin_dir: /etc/systemd/system/user-{{ gitlab_runner_user.uid }}.slice.d
      block:
        - name: Create the runner user-slice drop-in dir
          when: gitlab_runner_memory_max | default('') | length > 0
          file:
            path: "{{ _slice_dropin_dir }}"
            state: directory
            owner: root
            group: root
            mode: "0755"
          become: true

        # No validate: a drop-in can't be checked at the template's temp path
        # (systemd-analyze needs the parent unit on the live search path), and
        # unlike a malformed unit file a bad resource-control value doesn't
        # brick daemon-reload -- systemd logs-and-ignores it. _verify asserts
        # the cap actually landed finite on the live slice, which is the
        # stronger functional check.
        - name: Render the runner user-slice memory cap
          when: gitlab_runner_memory_max | default('') | length > 0
          template:
            src: slice-memory.conf.j2
            dest: "{{ _slice_dropin_dir }}/50-memory.conf"
            owner: root
            group: root
            mode: "0644"
            backup: true
          become: true
          register: gitlab_runner_slice_cap

        - name: Remove the runner user-slice memory cap when unconfigured
          when: gitlab_runner_memory_max | default('') | length == 0
          file:
            path: "{{ _slice_dropin_dir }}/50-memory.conf"
            state: absent
          become: true
          register: gitlab_runner_slice_cap_removed

        # daemon-reload re-reads the slice drop-in and applies (or lifts)
        # MemoryMax/MemoryHigh on the live cgroup -- no restart needed.
        - name: Apply the user-slice memory cap change
          when: >-
            gitlab_runner_slice_cap.changed
            or gitlab_runner_slice_cap_removed.changed
          systemd:
            daemon_reload: true
            scope: system
          become: true

    # Tombstones for the retired worker-image-refresh design (a timer that
    # periodically re-baked a Hetzner *worker* image + an /opt script it drove).
    # The current coordinator runner resolves its snapshot live at converge and
    # owns the fleeting binary directly, so neither artifact returns. Each
    # removal is idempotent (no-op once gone), so these stay as tombstones. The
    # timer remove also clears its netdata systemd_timers metadata -- a leftover
    # /etc/netdata/charts.d/systemd_timers.d/gitlab_runner_image_refresh.conf
    # would fire systemd_timer_overdue CRITICAL forever against a timer that no
    # longer exists.
    - name: Remove the retired gitlab_runner_image_refresh timer
      import_role:
        name: systemd_timer
        tasks_from: remove
      vars:
        systemd_timer_args:
          name: gitlab_runner_image_refresh

    - name: Remove the retired /opt/gitlab_runner dir
      file:
        path: /opt/gitlab_runner
        state: absent
      become: true
