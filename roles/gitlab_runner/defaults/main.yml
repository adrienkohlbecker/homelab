# Off by default; a host enabling the runner sets the two required secrets
# (gitlab_runner_token, gitlab_runner_hcloud_token -- asserted in
# tasks/main.yml) and a gitlab worker image, then flips this true.
#
# defaults/ (not vars/) per CLAUDE.md: role vars sit ABOVE host_vars and would
# mask host overrides; defaults sit below, so host_vars wins. Everything here is
# host-overridable deploy-tuning. Single-use constants that never vary
# (gitlab.com URL, the runner name, the idle policy) are inlined in
# config.toml.j2 rather than surfaced here.
gitlab_runner_enabled: false

# Hetzner image the ephemeral fleet boots. The instance executor runs each job
# as a shell ON the VM, so the image must already carry gitlab-runner plus the
# job toolchain (git; qemu/packer for the CI cells). The stock "ubuntu-24.04"
# base suits only trivial jobs and the role's assert rejects it on a real host:
# pin the NUMERIC SNAPSHOT ID of a role=ci-worker snapshot built by `mise run
# packer:worker` (it bakes in gitlab-runner + the qemu/packer toolchain). The
# fleeting plugin resolves an image by id/name and Hetzner snapshots have no
# name, so it must be the id -- re-pin after each worker rebuild.
gitlab_runner_image: "ubuntu-24.04"

# Single Hetzner location (the plugin's `location` is not a list). These are
# the real fleet values -- fox is by design the only host that ever enables
# this role, so its sizing lives here rather than as host_vars overrides of
# fictional defaults.
gitlab_runner_location: "nbg1"

# Single Hetzner server type for the fleet: dedicated-vCPU ccx33 (8 vCPU /
# 32 GiB). capacity_per_instance below is a static GitLab Runner value (the
# manager can't read a booted instance's RAM), so it's paired with one type
# here rather than a fallback list.
gitlab_runner_server_type: "ccx33"

# Concurrent jobs ONE instance runs: one per dedicated vCPU (ccx33 = 8).
# Nominally 8 * ~4 GiB qemu cells = all 32 GiB with nothing left for the
# worker OS, but cell guests rarely touch their full allocation -- the OS
# headroom comes from qemu memory overcommit slack, not a reserved margin.
gitlab_runner_capacity_per_instance: 8

# Number of fleet servers a burst may scale to ("one busy box, occasionally two"
# per the design note). Global `concurrent` = this * capacity_per_instance.
gitlab_runner_max_instances: 2
