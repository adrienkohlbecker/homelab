# Off by default; a host enabling the runner sets the required secret
# (gitlab_runner_token -- asserted in tasks/main.yml), then flips this true.
#
# defaults/ (not vars/) per CLAUDE.md: role vars sit ABOVE host_vars and would
# mask host overrides; defaults sit below, so host_vars wins. Everything here is
# host-overridable deploy-tuning. Single-use constants that never vary
# (gitlab.com URL, the runner name, the CI image) are inlined in
# config.toml.j2 rather than surfaced here.
gitlab_runner_enabled: false

# Primary runner executor. fox uses the Docker executor against rootless podman;
# lab can use a host-native shell executor for qemu CI fallback work.
gitlab_runner_executor: docker

# Suffix for the GitLab runner name in config.toml. The matching GitLab project
# runner tags are server-side, but using the same suffix keeps host config and
# UI names lined up.
gitlab_runner_name_suffix: "{{ 'shell-qemu' if gitlab_runner_executor == 'shell' else 'docker-aws' }}"

# Global job ceiling across ALL [[runners]] blocks (process-wide). With the
# coordinator runner enabled this is the fleet-wide umbrella, raised to cover
# its per-runner limit; per-runner bounds live in `limit` (below + per block),
# not here. The real test capacity is the EC2 spot vCPU quota, governed
# separately (notes/ci_aws_test_cells.md).
gitlab_runner_concurrent: 8

# Per-runner `limit` on the Docker-on-podman runner: caps jobs run directly on
# the host, independent of the global `concurrent`. 0 = no per-runner cap (the
# runner is bounded only by `concurrent` -- the single-runner default). A host
# also running the coordinator sets this to keep on-fox jobs bounded once
# `concurrent` is raised for the coordinator fleet.
gitlab_runner_docker_limit: 0

# Per-runner `limit` for non-Docker executors. Docker mode uses the historical
# gitlab_runner_docker_limit above; shell mode sets this explicitly per host.
gitlab_runner_limit: 0

# Supplementary groups for the gitlab_runner service user. lab's shell runner
# needs kvm for /dev/kvm and homelab_ci for /mnt/scratch/homelab_ci.
gitlab_runner_extra_groups: []

# Memory ceiling on the rootless runner's user slice (user-<uid>.slice). The
# Docker-executor job containers run under that slice via the rootless podman
# socket -- NOT under gitlab_runner.service (which sits in system.slice) -- so
# capping the slice bounds the entire CI footprint at once: the runner manager
# plus every concurrent job container. On a co-tenant host (fox runs the
# headscale control plane + its nginx front alongside the runner) this keeps a
# wide fan-out from pushing the host into swap and OOM-threatening the tunnel
# control plane. The cap is host-RAM-dependent with no sane universal value, so
# it's opt-in: the enabling host sets these in host_vars. Empty max = no cap
# (the slice drop-in is removed). MemoryHigh throttles + reclaims (soft) before
# MemoryMax hard-OOMs within the slice, so the CI tree self-limits under
# pressure rather than the kernel picking a global victim -- set High below Max.
# See notes/ci_aws_test_cells.md "Fox host protection".
gitlab_runner_memory_high: ""
gitlab_runner_memory_max: ""

# ── Coordinator runner (docker-autoscaler / fleeting) ────────────────────────
# Second [[runners]] block: a docker-autoscaler executor that clones an
# ephemeral Hetzner "coordinator" per pipeline via fleeting-plugin-hetzner,
# runs the AWS-cell fan-out from there, and scales back to zero. Off by default;
# a host enabling it sets the two required secrets (gitlab_runner_coordinator_token
# + gitlab_runner_hcloud_token -- asserted in tasks/main.yml), then flips this
# true. The Docker-on-podman runner above is independent and stays available for
# small jobs that run on the host directly. See notes/ci_aws_test_cells.md.
gitlab_runner_coordinator_enabled: false

# Label selector the converge resolves to the newest available coordinator
# snapshot id via the hcloud API (docker-autoscaler's image must be a numeric
# snapshot id -- snapshots have no name for GetForArchitecture to match). Bumped
# automatically on every `mise run packer:hetzner-coordinator` rebake, no
# host_vars edit. See tasks/main.yml "Resolve the newest coordinator snapshot".
gitlab_runner_image_selector: "role=ci-coordinator"

# One coordinator runs a whole pipeline's cell matrix: capacity_per_instance
# matches the AWS 60-spot-instances/region quota (the real fan-out ceiling), and
# max_instances 1 keeps a single coordinator per manager.
gitlab_runner_capacity_per_instance: 60
gitlab_runner_max_instances: 1

# idle_count 0 scales to zero between pipelines; idle_time is how long fleeting
# keeps an idle coordinator before deleting it. Hetzner bills per hour, rounded
# UP, anchored at server creation -- so a coordinator that ran a 5-min pipeline
# has already been billed a full hour the moment it booted. Deleting it early
# (the old 15m) saves nothing and forces the NEXT pipeline to boot a fresh box =
# a second billed hour. Holding it ~most of the hour instead lets a follow-up
# pipeline (rebase, retry, iterative push) reuse the already-paid box for free.
# fleeting exposes only a flat idle_time (measured from the last job, not from
# creation), so this is an approximation of "kill near the billing boundary if
# idle": 45m keeps a short pipeline's idle tail inside its first paid hour while
# tripling the warm-reuse window. A lone medium pipeline (~30m) whose idle tail
# then crosses into a 2nd hour with no follow-up is the accepted edge -- pennies
# on a cx43, and a creation-anchored reaper racing fleeting's lifecycle is not
# worth it. Dial up toward 55m for more reuse, down for less spillover.
gitlab_runner_idle_time: "45m"

# ── AWS qemu runner (instance / fleeting) ───────────────────────────────────
# Third [[runners]] block: an instance executor that asks fleeting-plugin-aws to
# scale a dedicated Auto Scaling Group from zero, then runs shell jobs directly
# on the AWS host. Those jobs hydrate S3 qemu images and run the same qemu
# harness as the lab fallback. Gate 1 deliberately starts at one job on one
# host; increase capacity only after the nested-qemu kill-switch benchmark
# passes.
gitlab_runner_aws_qemu_enabled: false
gitlab_runner_aws_qemu_token: ""

# AWS SDK profile rendered under /mnt/services/gitlab_runner/.aws when the
# runner is enabled. fox is not an EC2 instance, so the plugin needs a
# manager-side AWS identity rather than an instance profile.
gitlab_runner_aws_qemu_profile: homelab-ci-fleeting
gitlab_runner_aws_qemu_region: eu-central-1
gitlab_runner_aws_qemu_access_key_id: ""
gitlab_runner_aws_qemu_secret_access_key: ""

# Terraform owns the matching ASG. Keep the config values explicit here so the
# runner block can be enabled before it replaces the legacy direct-EC2 path.
gitlab_runner_aws_qemu_asg_name: homelab-ci-qemu-c8i-xlarge
gitlab_runner_aws_qemu_capacity_per_instance: 1
gitlab_runner_aws_qemu_max_instances: 1
gitlab_runner_aws_qemu_idle_time: "2m0s"
gitlab_runner_aws_qemu_username: ubuntu
