# box_deps exercises fox's Docker-executor shape: rootless podman socket,
# user-slice memory cap, AWS qemu instance block, and unit smoke. lab exercises
# the shell-executor fallback shape from host_vars/lab.yml,
# including the absence of stale rootless podman/linger state. The runner itself
# can't register in the harness (no gitlab.com token), so qemu hosts use
# placeholder tokens and _verify exercises the host-side artifacts.
machines:
  box_deps:
  # Shell-executor fallback path; qemu-only, selected by host_vars/lab.yml.
  lab:

# Release-divergent: the config.toml validate imports tomllib on >= 24.04 and
# the tomli backport below it (jammy ships python 3.10, no tomllib); the
# default cell is jammy, so a noble cell exercises the tomllib branch -- the
# one a noble-based prod host would take.
ubuntu:
  - noble

skip:
  lab:noble: noble TOML-validate coverage rides box_deps:noble; lab only covers shell executor wiring
