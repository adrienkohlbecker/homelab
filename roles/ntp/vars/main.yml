# Packages pinned to noble on jammy (priority 991, via the backports
# helper): chrony plus its full transitive closure. Full rationale (the
# t64 ABI rename, version floors, the locales/tzdata traps, the
# first-consumer libc6 flip, the unattended-upgrades interaction):
# notes/jammy_noble_backports.md. The terse per-package "why" below is
# the at-a-glance map; the helper reads this same list for pin + upgrade.
ntp_backport_packages:
  - chrony          # the target; jammy's 4.2-2 blocked by noble libc6's Breaks
  - adduser         # >= 3.130 -- chrony postinst uses flags jammy's 3.118 rejects
  - tzdata          # pinned with tzdata-legacy (jammy tzdata Conflicts noble's)
  - tzdata-legacy   # chrony Depends it; noble split the legacy zones out of tzdata
  - libgnutls30t64  # chrony NTS/TLS; t64 ABI rename of libgnutls30
  - libnettle8t64   # t64 rename of libnettle8 (GnuTLS stack)
  - libhogweed6t64  # t64 rename of libhogweed6 (GnuTLS stack)
  - libgmp10        # libgnutls30t64 >= 3.8.1 version floor (jammy's too old)
  - libp11-kit0     # libgnutls30t64 version floor (jammy's too old)
  - libunistring5   # libgnutls30t64 floor; replaces jammy's libunistring2
  - libc6           # pulled by the GnuTLS stack (needs >= 2.38; jammy 2.35)
  - libc6-dev       # libc6 companion
  - libc-bin        # jammy's Depends libc6 (< 2.36) forces it forward with libc6
  - libc-dev-bin    # libc6 companion
  - locales         # else apt removes it (jammy locales Conflicts noble libc6 2.39)
