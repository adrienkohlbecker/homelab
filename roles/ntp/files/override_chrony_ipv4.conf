[Service]
# fox has working IPv6 routing, but outbound NTS-KE TCP/4460 over IPv6 times
# out to all configured NTS providers. chronyd waits for repeated IPv6 failures
# before falling back to IPv4, which can delay authenticated time sync for over
# an hour after boot. Keep NTS required, but resolve and connect over IPv4.
#
# An Environment= override cannot carry the flag: the stock unit's
# EnvironmentFile=-/etc/default/chrony is applied after Environment= and its
# DAEMON_OPTS="-F 1" wins. Reset ExecStart and append -4 instead, keeping
# whatever DAEMON_OPTS the distro default file provides. The line must mirror
# the stock ExecStart exactly: the `!` prefix starts the wrapper as root while
# User=_chrony sandboxes the daemon — without it chronyd dies "Not superuser".
ExecStart=
ExecStart=!/usr/lib/systemd/scripts/chronyd-starter.sh $DAEMON_OPTS -4
