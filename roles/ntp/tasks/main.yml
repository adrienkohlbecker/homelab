# On jammy, pin chrony + its noble dependency closure to noble via the
# backports helper. This role is sequenced first among the backports
# consumers, so it performs the libc6 jammy→noble flip that zfs/podman
# then find done. Package list: vars/main.yml; full rationale:
# notes/jammy_noble_backports.md. No-op on noble (or any non-22.04).
- name: Apply chrony backports pin + upgrade (jammy)
  import_role:
    name: backports
    tasks_from: pin
  vars:
    backports_args:
      name: ntp
      packages: '{{ ntp_backport_packages }}'
  tags:
    - ntp

# policy_rc_d 101 suppresses the postinst auto-start so chronyd first
# comes up under the NTS config written below, never the stock
# unauthenticated-pool config. cache_valid_time is safe here: on jammy
# the backports upgrade above just refreshed the cache and already
# pulled chrony to noble (so this is a no-op), and on noble the native
# candidate is stable.
- name: Install chrony
  apt:
    pkg:
      - chrony
    cache_valid_time: 3600
    policy_rc_d: 101
  register: ntp_chrony_apt
  become: true
  tags:
    - ntp

# Keep systemd-timesyncd from fighting chrony for the clock. Stopping and
# masking are independent and both required: a unit can be masked yet still
# running (masking never stops an already-started instance — the jammy box's
# steady state), or active with its unit file already gone (the backports flip
# *removes* timesyncd under policy_rc_d 101, so it lingers active until reboot).
# noble may never have installed it at all. So query each state and act only
# where needed, which keeps the converge idempotent. The systemd module can't
# act on a removed-but-lingering unit ("Could not find the requested service"),
# so drive systemctl directly; gating on a file path is unreliable (a bare
# /etc/systemd/system/<unit> can pre-exist unmasked). check_mode: false lets
# the queries populate stdout under the harness's check-mode pass.
- name: Query systemd-timesyncd active state # noqa: command-instead-of-module -- is-active query, not a state change
  command: systemctl is-active systemd-timesyncd
  register: ntp_timesyncd_active
  changed_when: false
  failed_when: false
  check_mode: false
  become: true
  tags:
    - ntp

- name: Query systemd-timesyncd enablement state # noqa: command-instead-of-module -- is-enabled query, not a state change
  command: systemctl is-enabled systemd-timesyncd
  register: ntp_timesyncd_enabled
  changed_when: false
  failed_when: false
  check_mode: false
  become: true
  tags:
    - ntp

- name: Stop systemd-timesyncd (chrony owns the clock) # noqa: command-instead-of-module -- module fails on a removed-but-lingering unit
  command: systemctl stop systemd-timesyncd
  when: ntp_timesyncd_active.stdout == "active"
  changed_when: true
  become: true
  tags:
    - ntp

- name: Mask systemd-timesyncd (pin it off across reboots) # noqa: command-instead-of-module -- module fails on a removed-but-lingering unit
  command: systemctl mask systemd-timesyncd
  when: ntp_timesyncd_enabled.stdout != "masked"
  changed_when: true
  become: true
  tags:
    - ntp

# chronyd is AppArmor-confined to /etc/chrony/ (see
# /etc/apparmor.d/usr.sbin.chronyd), so its own parser can't read ansible's
# temp file. Validate the rendered NTS source stanza shape here; _verify's
# post-converge `chronyc tracking` confirms the live file parses.
- name: Configure chrony for NTS-only time sync
  when: not (ansible_check_mode and ntp_chrony_apt.changed)
  template:
    src: chrony.conf.j2
    dest: /etc/chrony/chrony.conf
    owner: root
    group: root
    mode: "0644"
    backup: true
    validate: grep -qE '^(pool|server)[[:space:]].*[[:space:]]nts([[:space:]]|$)' %s
  register: ntp_chrony_conf
  become: true
  tags:
    - ntp

# NTS-KE uses TCP/4460 before NTP packets can be authenticated. fox has
# repeatedly timed out on the IPv6 path to all configured NTS providers, then
# synchronized only after chronyd eventually replaced those addresses with
# IPv4. Force IPv4 at the daemon layer so the NTS-only policy still holds
# without waiting through broken IPv6 handshakes. The flag has to ride
# DAEMON_OPTS in /etc/default/chrony: the unit applies that EnvironmentFile
# after any Environment= directive, so a drop-in assignment loses, and an
# ExecStart= reset would couple us to the stock line's chronyd-starter.sh
# wrapper and `!` privilege prefix. Divert the conffile so chrony package
# upgrades never prompt over our copy.
- name: Divert chrony defaults
  community.general.dpkg_divert:
    path: /etc/default/chrony
  when: not (ansible_check_mode and ntp_chrony_apt.changed)
  become: true
  tags:
    - ntp

- name: Force chrony NTS to IPv4
  when: not (ansible_check_mode and ntp_chrony_apt.changed)
  copy:
    src: chrony.default
    dest: /etc/default/chrony
    owner: root
    group: root
    mode: "0644"
    backup: true
    validate: 'sh -c ''. "%s" && test -n "${DAEMON_OPTS:-}"'''
  register: ntp_chrony_default
  become: true
  tags:
    - ntp

# No chrony.service.d drop-in may exist: the IPv4 forcing lives in
# /etc/default/chrony above, and a leftover override would shadow or fight
# the unit definition. Converged hosts carry one from when the flag was
# (ineffectively) delivered via Environment=.
- name: Remove the chrony IPv4 drop-in
  import_role:
    name: systemd_unit
    tasks_from: remove
  vars:
    systemd_unit_args:
      for: chrony.service
      condition: "{{ not (ansible_check_mode and ntp_chrony_apt.changed) }}"
  tags:
    - ntp

# Enable + start chrony via the systemd_unit helper (chrony ships its own
# unit, so no install step). Restart -- not just start -- when the
# backports upgrade moved chrony to the noble binary, the NTS config or
# DAEMON_OPTS changed, or the stale drop-in was removed, so the running
# chronyd picks up the new binary/config; otherwise the helper leaves a
# healthy daemon undisturbed and clears any start-rate-limit a bare
# state=restarted would trip over. ntp_backports_updated is the bool the
# backports role records from backports_args.name: ntp.
- name: Enable and start chrony
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: chrony
      condition: "{{ not (ansible_check_mode and ntp_chrony_apt.changed) }}"
      restart: "{{ ntp_backports_updated or ntp_chrony_conf.changed or ntp_chrony_default.changed or (chrony_service_d_override_conf_result.changed | default(false)) }}"
  tags:
    - ntp
