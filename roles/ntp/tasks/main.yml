# On jammy, pin chrony and its noble dependency closure (libc6, the
# GnuTLS/locale stack, …) to noble via the backports helper: noble's
# libc6 Breaks jammy's chrony 4.2-2, and the fleet's zfs/podman roles
# need noble libc6 anyway. This role is sequenced first among the
# backports consumers, so it performs the libc6 jammy→noble flip;
# zfs/podman then find it done. Package list + full rationale:
# vars/main.yml and notes/jammy_noble_backports.md. On noble (or any
# non-22.04) every backports task is a no-op.
- name: Apply chrony backports pin + upgrade (jammy)
  import_role:
    name: backports
    tasks_from: pin
  vars:
    backports_args:
      name: ntp
      packages: '{{ ntp_backport_packages }}'
  tags:
    - ntp

# policy_rc_d 101 suppresses the postinst auto-start so chronyd first
# comes up under the NTS config written below, never the stock
# unauthenticated-pool config. cache_valid_time is safe here: on jammy
# the backports upgrade above just refreshed the cache and already
# pulled chrony to noble (so this is a no-op), and on noble the native
# candidate is stable.
- name: Install chrony
  apt:
    pkg:
      - chrony
    cache_valid_time: 3600
    policy_rc_d: 101
  register: ntp_chrony_apt
  become: true
  tags:
    - ntp

# Mask systemd-timesyncd rather than trusting chrony's packaging to
# displace it. On the jammy→noble flip apt *removes* timesyncd, but that
# runs under policy_rc_d 101 (the backports upgrade above), so invoke-rc.d
# never stops the already-running unit — it lingers active until reboot,
# fighting chrony for the clock. Masking stops it now and pins it off;
# idempotent where it's already masked (the steady state on noble).
- name: Mask systemd-timesyncd (chrony owns the clock)
  systemd:
    name: systemd-timesyncd
    state: stopped
    masked: true
  become: true
  tags:
    - ntp

# No validate: chronyd is AppArmor-confined to /etc/chrony/ (see
# /etc/apparmor.d/usr.sbin.chronyd), so `chronyd -p` can't read ansible's
# temp file and would fail every render. The template carries no jinja
# interpolation, so there's no syntax surface a parser would catch.
- name: Configure chrony for NTS-only time sync
  when: not (ansible_check_mode and ntp_chrony_apt.changed)
  template:
    src: chrony.conf.j2
    dest: /etc/chrony/chrony.conf
    owner: root
    group: root
    mode: "0644"
    backup: true
  register: ntp_chrony_conf
  become: true
  tags:
    - ntp

# Enable + start chrony via the systemd_unit helper (chrony ships its own
# unit, so no install step). Restart -- not just start -- when the
# backports upgrade moved chrony to the noble binary or the NTS config
# above changed, so the running chronyd picks up the new binary/config;
# otherwise the helper leaves a healthy daemon undisturbed and clears any
# start-rate-limit a bare state=restarted would trip over. ntp_backports_updated
# is the bool the backports role records from backports_args.name: ntp.
- name: Enable and start chrony
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: chrony
      condition: "{{ not (ansible_check_mode and ntp_chrony_apt.changed) }}"
      restart: "{{ ntp_backports_updated or ntp_chrony_conf.changed }}"
  tags:
    - ntp
