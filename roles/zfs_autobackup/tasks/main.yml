- name: Assert backup inputs are configured
  assert:
    that:
      - zfs_autobackup_sources is defined
      - zfs_autobackup_sources is iterable
      - zfs_autobackup_sources is not string
      - zfs_autobackup_sources is not mapping
      - zfs_autobackup_ssh_public_key is defined
      - zfs_autobackup_ssh_public_key is string
      - zfs_autobackup_ssh_public_key | length > 0
    fail_msg: >-
      zfs_autobackup_sources must be a list of { host, dest_dataset } dicts and
      zfs_autobackup_ssh_public_key must be a non-empty string, both in host_vars.
  tags:
    - zfs_autobackup

- name: Install zfs autobackup dependencies
  apt:
    package:
      - pipx
      - mbuffer
      - rsync
    cache_valid_time: 3600
  become: true
  register: _zfs_autobackup_apt
  tags:
    - zfs_autobackup

- name: Remove legacy virtualenv installation
  file:
    path: /opt/virtualenv/zfs_autobackup
    state: absent
  become: true
  tags:
    - zfs_autobackup

- name: Check zfs-autobackup version
  command: /usr/local/bin/zfs-autobackup --version
  register: _zfs_autobackup_version_check
  changed_when: false
  failed_when: false
  become: true
  tags:
    - zfs_autobackup

- name: Install zfs-autobackup via pipx
  when: >-
    not (ansible_check_mode and _zfs_autobackup_apt.changed)
    and zfs_autobackup_version not in (_zfs_autobackup_version_check.stdout | default(''))
  command: pipx install --force "zfs-autobackup=={{ zfs_autobackup_version }}"
  changed_when: true
  environment:
    PIPX_HOME: /opt/pipx
    PIPX_BIN_DIR: /usr/local/bin
  become: true
  tags:
    - zfs_autobackup

- name: Add zfs_autosnapshot.target systemd unit
  import_role:
    name: systemd_unit
    tasks_from: install
  vars:
    systemd_unit_args:
      src: zfs_autosnapshot.target
  tags:
    - zfs_autobackup

- name: Enable zfs_autosnapshot.target
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: zfs_autosnapshot.target
      condition: "{{ not (ansible_check_mode and zfs_autosnapshot_target_result.changed) }}"
      restart: "{{ zfs_autosnapshot_target_result.changed }}"
  tags:
    - zfs_autobackup

- name: Create log directory
  file:
    dest: /var/log/zfs_autobackup
    state: directory
    owner: root
    group: root
    mode: "0700"
  become: true
  tags:
    - zfs_autobackup

# Root-owned offsite change-gate state: one marker file per dataset recording
# the snapshot last confirmed on bunk (see zfs_backup_offsite.sh). Kept out of
# the zfs_autobackup user's home (/var/lib/zfs_autobackup) so the backup user
# can't tamper with the gate.
- name: Create offsite marker directory
  file:
    dest: /var/lib/zfs_backup_offsite
    state: directory
    owner: root
    group: root
    mode: "0700"
  become: true
  tags:
    - zfs_autobackup

- name: Copy the backup scripts
  copy:
    src: "{{ item }}.sh"
    dest: "/usr/local/bin/{{ item }}"
    mode: "0755"
    owner: root
    group: root
    backup: true
    validate: bash -n %s
  loop:
    - zfs_backup_local
    - zfs_backup_onsite
    - zfs_backup_offsite
  register: zfs_autobackup_scripts
  become: true
  tags:
    - zfs_autobackup

# The offsite change-gate skips rsync while a dataset's written@ stays 0, so a
# change to zfs_backup_offsite.sh -- the rsync excludes/flags or the gate logic
# itself -- would otherwise not take effect on unchanged datasets until their
# next write or the 30-day reconcile. (Most pointed for a future secret-spill
# exclude: already-shipped files would linger on bunk meanwhile.) Drop the
# markers whenever that script changes so the next run re-establishes every
# baseline under the new policy. The dir survives (recreated above and needed
# for the marker write); -delete on an empty dir is a no-op.
- name: Force an offsite reconcile when the offsite script changed
  command: find /var/lib/zfs_backup_offsite -mindepth 1 -delete
  changed_when: true
  when: >-
    zfs_autobackup_scripts.results
    | selectattr('item', 'equalto', 'zfs_backup_offsite')
    | selectattr('changed')
    | list | length > 0
  become: true
  tags:
    - zfs_autobackup

- name: Copy the snapshot script
  template:
    src: zfs_autosnapshot.sh.j2
    dest: /usr/local/bin/zfs_autosnapshot
    mode: "0755"
    owner: root
    group: root
    backup: true
    validate: bash -n %s
  become: true
  tags:
    - zfs_autobackup

- name: Schedule the zfs_autosnapshot timer
  import_role:
    name: systemd_timer
    tasks_from: install
  vars:
    systemd_timer_args:
      name: zfs_autosnapshot
      description: Daily ZFS autosnapshot
      on_calendar: "*-*-* 02:00:00"
      persistent: false
      # Keep all hosts' starts inside one hd-idle spindown window (-i 1200,
      # 20min, on lab/pug's HDDs). lab pulls from pug and pug from lab, each
      # peer-pull waking the other's disks early in the run -- so if the
      # starts drift apart by more than the spindown the disks wake twice a
      # night (own run + peer pull). A 5min spread « 20min keeps every host
      # to a single spin-up. fixed_random_delay pins each host's offset
      # stably within that 5min so the ordering is reproducible.
      randomized_delay_sec: 300
      fixed_random_delay: true
      exec_start: /usr/local/bin/zfs_autosnapshot
      # Override the helper's 1h default. Snapshotting hundreds of
      # datasets can legitimately take hours; 23h gives the script
      # nearly the whole day to finish and still leaves a buffer
      # before the next fire.
      timeout_start_sec: 23h
      # mbuffer reads ~/.mbuffer for defaults; without HOME set it
      # logs "mbuffer: warning: HOME environment variable not set --
      # unable to find defaults file" every snapshot. systemd
      # oneshot units don't inherit any HOME by default.
      environment:
        HOME: /root
  tags:
    - zfs_autobackup

- name: Configure logrotate
  import_role:
    name: logrotate
    tasks_from: template
  vars:
    logrotate_args:
      src: logrotate.j2
      dest: /etc/logrotate.d/zfs_autobackup
  tags:
    - zfs_autobackup

- name: Configure host as a source for backups
  import_tasks: source.yml
  tags:
    - zfs_autobackup

- name: Configure host as a destination for backups
  import_tasks: dest.yml
  tags:
    - zfs_autobackup
