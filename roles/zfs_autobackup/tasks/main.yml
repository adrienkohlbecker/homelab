- name: Assert backup sources are configured
  assert:
    that:
      - zfs_autobackup_sources is defined
      - zfs_autobackup_sources is iterable
      - zfs_autobackup_sources is not string
      - zfs_autobackup_sources is not mapping
    fail_msg: >-
      zfs_autobackup_sources must be a list of { host, dest_dataset } dicts in
      host_vars (the onsite pulls this host runs). Use [] for a source-only host.
  tags:
    - zfs_autobackup

- name: Install zfs autobackup dependencies
  apt:
    package:
      - python3-pip
      - python3-virtualenv
      - mbuffer
      - rsync
    cache_valid_time: 3600
  become: true
  register: zfs_autobackup_apt
  tags:
    - zfs_autobackup

# because https://www.reddit.com/r/learnpython/comments/uj3dhx/why_does_pip_keep_reinstalling_the_same_version/ marks it changed every time
- name: Check if zfs autobackup installed
  stat:
    path: /opt/virtualenv/zfs_autobackup/bin/zfs-autobackup
  become: true
  register: zfs_autobackup_installed
  tags:
    - zfs_autobackup

- name: Install zfs autobackup
  when: not zfs_autobackup_installed.stat.exists and not (ansible_check_mode and zfs_autobackup_apt.changed)
  pip:
    name: zfs-autobackup
    virtualenv: /opt/virtualenv/zfs_autobackup
  become: true
  register: zfs_autobackup_install
  tags:
    - zfs_autobackup

- name: Configure symlink
  when: not (ansible_check_mode and (zfs_autobackup_apt.changed or zfs_autobackup_install.changed))
  file:
    src: /opt/virtualenv/zfs_autobackup/bin/zfs-autobackup
    dest: /usr/local/bin/zfs-autobackup
    owner: root
    group: root
    mode: "0755"
    state: link
  become: true
  tags:
    - zfs_autobackup

- name: Add zfs_autosnapshot.target systemd unit
  import_role:
    name: systemd_unit
    tasks_from: install
  vars:
    systemd_unit_args:
      src: zfs_autosnapshot.target
  tags:
    - zfs_autobackup

- name: Enable zfs_autosnapshot.target
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: zfs_autosnapshot.target
      condition: "{{ not (ansible_check_mode and zfs_autosnapshot_target_result.changed) }}"
      restart: "{{ zfs_autosnapshot_target_result.changed }}"
  tags:
    - zfs_autobackup

- name: Create log directory
  file:
    dest: /var/log/zfs_autobackup
    state: directory
    owner: root
    group: root
    mode: "0700"
  become: true
  tags:
    - zfs_autobackup

- name: Copy the local backup script
  copy:
    src: zfs_backup_local.sh
    dest: /usr/local/bin/zfs_backup_local
    mode: "0755"
    owner: root
    group: root
    backup: true
    validate: bash -n %s
  become: true
  tags:
    - zfs_autobackup

- name: Copy the onsite backup script
  copy:
    src: zfs_backup_onsite.sh
    dest: /usr/local/bin/zfs_backup_onsite
    mode: "0755"
    owner: root
    group: root
    backup: true
    validate: bash -n %s
  become: true
  tags:
    - zfs_autobackup

- name: Copy the offsite backup script
  copy:
    src: zfs_backup_offsite.sh
    dest: /usr/local/bin/zfs_backup_offsite
    mode: "0755"
    owner: root
    group: root
    backup: true
    validate: bash -n %s
  become: true
  tags:
    - zfs_autobackup

- name: Copy the snapshot script
  template:
    src: zfs_autosnapshot.sh.j2
    dest: /usr/local/bin/zfs_autosnapshot
    mode: "0755"
    owner: root
    group: root
    backup: true
    validate: bash -n %s
  become: true
  tags:
    - zfs_autobackup

- name: Schedule the zfs_autosnapshot timer
  import_role:
    name: systemd_timer
    tasks_from: install
  vars:
    systemd_timer_args:
      name: zfs_autosnapshot
      description: Daily ZFS autosnapshot
      frequency: daily
      on_calendar: "*-*-* 02:00:00"
      randomized_delay_sec: 1800
      fixed_random_delay: true
      exec_start: /usr/local/bin/zfs_autosnapshot
      # Override the helper's 1h default. Snapshotting hundreds of
      # datasets can legitimately take hours; 23h gives the script
      # nearly the whole day to finish and still leaves a buffer
      # before the next fire.
      timeout_start_sec: 23h
      # mbuffer reads ~/.mbuffer for defaults; without HOME set it
      # logs "mbuffer: warning: HOME environment variable not set --
      # unable to find defaults file" every snapshot. systemd
      # oneshot units don't inherit any HOME by default.
      environment:
        HOME: /root
  tags:
    - zfs_autobackup

- name: Configure logrotate
  import_role:
    name: logrotate
    tasks_from: template
  vars:
    logrotate_args:
      src: logrotate.j2
      dest: /etc/logrotate.d/zfs_autobackup
  tags:
    - zfs_autobackup

- name: Configure host as a source for backups
  import_tasks: source.yml

- name: Configure host as a destination for backups
  import_tasks: dest.yml
