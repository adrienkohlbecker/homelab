- name: source | Create zfs_autobackup service user
  import_role:
    name: service_user
    tasks_from: user
  vars:
    service_user_args:
      name: zfs_autobackup
      shell: /bin/bash
      createhome: true
      home: /var/lib/zfs_autobackup
      config_dir: false
  tags:
    - zfs_autobackup

- name: source | Add authorized keys
  when: not (ansible_check_mode and zfs_autobackup_user.changed)
  ansible.posix.authorized_key:
    user: zfs_autobackup
    key: "{{ zfs_autobackup_ssh_public_key }}"
    key_options: "no-port-forwarding,no-agent-forwarding,no-pty,no-X11-forwarding,no-user-rc"
    exclusive: true
  become: true
  tags:
    - zfs_autobackup

- name: source | Get back up datasets
  when: not qemu_test
  shell: set -euo pipefail; zfs get 'autobackup:bak' -t filesystem -H -s local -o name,value | awk -v FS='\t' '$2=="true" {print $1}'
  args:
    executable: /bin/bash
  changed_when: false
  register: zfs_autobackup_datasets
  become: true
  tags:
    - zfs_autobackup

- name: source | Capture current permissions on backed up datasets
  when: not qemu_test
  command: zfs allow "{{ item }}"
  changed_when: false
  register: _zfs_autobackup_allow_before
  loop: "{{ zfs_autobackup_datasets.stdout_lines }}"
  loop_control:
    index_var: idx
  become: true
  tags:
    - zfs_autobackup

- name: source | Grant ZFS permissions on backed up datasets
  when: not qemu_test
  command: zfs allow zfs_autobackup send,hold,release "{{ item }}"
  changed_when: false
  loop: "{{ zfs_autobackup_datasets.stdout_lines }}"
  become: true
  tags:
    - zfs_autobackup

- name: source | Detect permission changes on backed up datasets
  when: not qemu_test
  command: zfs allow "{{ item }}"
  changed_when: _zfs_autobackup_allow_before.results[idx].stdout != _zfs_autobackup_allow_after.stdout
  register: _zfs_autobackup_allow_after
  loop: "{{ zfs_autobackup_datasets.stdout_lines }}"
  loop_control:
    index_var: idx
  become: true
  tags:
    - zfs_autobackup
