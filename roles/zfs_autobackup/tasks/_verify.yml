- name: _verify | Check zfs-autobackup binary exists
  stat:
    path: /usr/local/bin/zfs-autobackup
  register: zfs_autobackup_verify_bin

- name: _verify | Binary is present and executable
  assert:
    that:
      - zfs_autobackup_verify_bin.stat.exists
      - zfs_autobackup_verify_bin.stat.executable
    fail_msg: "zfs-autobackup binary missing or not executable"

- name: _verify | Run zfs-autobackup --version
  command: /usr/local/bin/zfs-autobackup --version
  changed_when: false
  failed_when: zfs_autobackup_verify_version.stdout is not defined or zfs_autobackup_verify_version.stdout | length == 0
  register: zfs_autobackup_verify_version

- name: _verify | Installed version matches pinned version
  assert:
    that:
      - zfs_autobackup_version in zfs_autobackup_verify_version.stdout
    fail_msg: >-
      installed={{ zfs_autobackup_verify_version.stdout | trim }},
      expected={{ zfs_autobackup_version }}

- name: _verify | Stat deployed scripts
  stat:
    path: "/usr/local/bin/{{ item }}"
  loop:
    - zfs_backup_local
    - zfs_backup_onsite
    - zfs_backup_offsite
    - zfs_autosnapshot
  register: zfs_autobackup_verify_scripts

- name: _verify | All backup scripts are present and executable
  assert:
    that:
      - item.stat.exists
      - item.stat.executable
    fail_msg: "missing or not executable: {{ item.item }}"
  loop: "{{ zfs_autobackup_verify_scripts.results }}"
  loop_control:
    label: "{{ item.item }}"

- name: _verify | Inspect zfs_autosnapshot.timer
  systemd:
    name: zfs_autosnapshot.timer
  register: zfs_autobackup_verify_timer
  become: true

- name: _verify | Timer is loaded, enabled, and active
  assert:
    that:
      - zfs_autobackup_verify_timer.status.LoadState == "loaded"
      - zfs_autobackup_verify_timer.status.UnitFileState == "enabled"
      - zfs_autobackup_verify_timer.status.ActiveState == "active"
    fail_msg: >-
      zfs_autosnapshot.timer not in expected state
      (LoadState={{ zfs_autobackup_verify_timer.status.LoadState }},
      UnitFileState={{ zfs_autobackup_verify_timer.status.UnitFileState }},
      ActiveState={{ zfs_autobackup_verify_timer.status.ActiveState }})

- name: _verify | User zfs_autobackup exists
  getent:
    database: passwd
    key: zfs_autobackup

- name: _verify | User has expected shell
  assert:
    that:
      - getent_passwd.zfs_autobackup is defined
      - getent_passwd.zfs_autobackup[5] == "/bin/bash"
    fail_msg: >-
      zfs_autobackup user missing or wrong shell
      ({{ getent_passwd.zfs_autobackup | default('not found') }})

# podman.service/podman.socket are masked in the backup user's scope so its
# login never spins up the rootless podman API socket (see source.yml). A unit
# symlinked to /dev/null is what systemd reads as masked, so assert exactly that
# target -- the functional "no podman on login" is impractical to drive here
# since the user has no linger and gets a fresh manager per session.
- name: _verify | Stat masked podman user units
  stat:
    path: "/var/lib/zfs_autobackup/.config/systemd/user/{{ item }}"
  register: zfs_autobackup_verify_mask
  loop:
    - podman.service
    - podman.socket
  become: true

- name: _verify | Podman user units are masked to /dev/null
  assert:
    that:
      - item.stat.exists
      - item.stat.islnk
      - item.stat.lnk_target == "/dev/null"
    fail_msg: >-
      {{ item.item }} not masked for zfs_autobackup
      ({{ item.stat.lnk_target | default('missing') }})
  loop: "{{ zfs_autobackup_verify_mask.results }}"
  loop_control:
    label: "{{ item.item }}"

- name: _verify | Stat log directory
  stat:
    path: /var/log/zfs_autobackup
  register: zfs_autobackup_verify_logdir
  become: true

- name: _verify | Log directory exists with correct permissions
  assert:
    that:
      - zfs_autobackup_verify_logdir.stat.exists
      - zfs_autobackup_verify_logdir.stat.isdir
      - zfs_autobackup_verify_logdir.stat.mode == "0700"
      - zfs_autobackup_verify_logdir.stat.pw_name == "root"
    fail_msg: >-
      /var/log/zfs_autobackup missing or wrong perms
      ({{ zfs_autobackup_verify_logdir.stat }})

- name: _verify | Stat logrotate config
  stat:
    path: /etc/logrotate.d/zfs_autobackup
  register: zfs_autobackup_verify_logrotate
  become: true

- name: _verify | Logrotate config exists
  assert:
    that:
      - zfs_autobackup_verify_logrotate.stat.exists
    fail_msg: "logrotate config missing at /etc/logrotate.d/zfs_autobackup"

# Functional check: converge granted zfs allow on the scratch dataset that
# _setup tagged; assert the grant landed, then drive a real local backup and
# confirm a @bak- snapshot appears -- exercising script discovery, the
# zfs-autobackup invocation, and the snapshot-target quiesce end to end.
- name: _verify | Read zfs allow on the scratch dataset
  command: zfs allow rpool/zfs_autobackup_test
  changed_when: false
  register: zfs_autobackup_verify_allow
  become: true

- name: _verify | User zfs_autobackup was granted send,hold,release
  assert:
    that:
      - "'user zfs_autobackup' in zfs_autobackup_verify_allow.stdout"
      - "'send' in zfs_autobackup_verify_allow.stdout"
      - "'hold' in zfs_autobackup_verify_allow.stdout"
      - "'release' in zfs_autobackup_verify_allow.stdout"
    fail_msg: >-
      zfs allow did not grant send,hold,release to zfs_autobackup
      ({{ zfs_autobackup_verify_allow.stdout }})

- name: _verify | Run a local backup against the scratch dataset
  command: /usr/local/bin/zfs_backup_local
  changed_when: false
  become: true

- name: _verify | List snapshots on the scratch dataset
  command: zfs list -t snapshot -H -o name -r rpool/zfs_autobackup_test
  changed_when: false
  register: zfs_autobackup_verify_snaps
  become: true

- name: _verify | A bak snapshot was created
  assert:
    that:
      - zfs_autobackup_verify_snaps.stdout is search('@bak-')
    fail_msg: >-
      zfs_backup_local created no @bak- snapshot on rpool/zfs_autobackup_test
      ({{ zfs_autobackup_verify_snaps.stdout }})

# Functional check for zfs_backup_offsite's change-gate. With a marker recording
# the latest snapshot and nothing written since, the script must skip before any
# rsync; once a write bumps written@, it must proceed to the transfer. bunk is
# unreachable from the fixture, so the no-skip path targets an unresolvable host
# and we assert it reached the rsync stage (the f_trace banner), not its outcome.
- name: _verify | Latest bak snapshot on the offsite-gate dataset
  shell: set -euo pipefail; zfs list -t snapshot -o name -s creation -r rpool/zfs_autobackup_offsite_test | awk -F@ '/@bak-/ {s=$2} END {print s}'
  args:
    executable: /bin/bash
  changed_when: false
  register: zfs_autobackup_verify_gate_snap
  become: true

- name: _verify | A bak snapshot exists to gate against
  assert:
    that:
      - zfs_autobackup_verify_gate_snap.stdout | length > 0
    fail_msg: "no @bak- snapshot on rpool/zfs_autobackup_offsite_test to seed the gate marker"

- name: _verify | Seed the offsite marker (simulate a prior successful sync)
  copy:
    dest: /var/lib/zfs_backup_offsite/rpool_zfs_autobackup_offsite_test
    content: "{{ zfs_autobackup_verify_gate_snap.stdout }}\n"
    owner: root
    group: root
    mode: "0644"
  become: true

- name: _verify | Offsite gate skips an unchanged dataset (written=0)
  command: /usr/local/bin/zfs_backup_offsite offsite.invalid rpool/zfs_autobackup_offsite_test
  changed_when: false
  register: zfs_autobackup_verify_gate_skip
  become: true

- name: _verify | Skip path exited cleanly without attempting rsync
  assert:
    that:
      - "'skipping offsite sync' in zfs_autobackup_verify_gate_skip.stdout"
      - "'rsync' not in zfs_autobackup_verify_gate_skip.stdout"
    fail_msg: >-
      offsite gate did not skip an unchanged dataset
      (stdout={{ zfs_autobackup_verify_gate_skip.stdout }})

# Monthly reconciliation: even with nothing written since the marker snapshot,
# a marker older than 30 days must fall through to a full rsync (re-verifying the
# tree against bunk). Age the marker's mtime past the threshold and confirm the
# gate no longer short-circuits. The dataset is still unchanged here, so reaching
# rsync can only be the mtime branch, not a real write.
- name: _verify | Age the marker past the 30-day reconciliation threshold
  command: touch -d "40 days ago" /var/lib/zfs_backup_offsite/rpool_zfs_autobackup_offsite_test
  changed_when: false
  become: true

- name: _verify | Offsite gate reconciles an unchanged dataset with a stale marker
  command: timeout 30 /usr/local/bin/zfs_backup_offsite offsite.invalid rpool/zfs_autobackup_offsite_test
  changed_when: false
  failed_when: false
  register: zfs_autobackup_verify_gate_reconcile
  become: true

- name: _verify | Stale-marker dataset reconciles to a full rsync
  assert:
    that:
      - "'skipping offsite sync' not in zfs_autobackup_verify_gate_reconcile.stdout"
      - "'rsync' in zfs_autobackup_verify_gate_reconcile.stdout"
    fail_msg: >-
      offsite gate failed to reconcile an unchanged dataset with a >30d marker
      (rc={{ zfs_autobackup_verify_gate_reconcile.rc }},
      stdout={{ zfs_autobackup_verify_gate_reconcile.stdout }})

# Restore a fresh-mtime marker so the change test below exercises the written@
# branch, not the stale-mtime fallthrough just aged above.
- name: _verify | Re-seed the offsite marker with a current mtime
  copy:
    dest: /var/lib/zfs_backup_offsite/rpool_zfs_autobackup_offsite_test
    content: "{{ zfs_autobackup_verify_gate_snap.stdout }}\n"
    owner: root
    group: root
    mode: "0644"
  become: true

- name: _verify | Change the dataset so written@ is no longer zero
  copy:
    dest: /mnt/zfs_autobackup_offsite_test/changed.txt
    content: "changed\n"
    mode: "0644"
  become: true

# written@ only reflects data once its txg commits (~5s cadence); the copy
# above lands in an open txg, so force a sync before checking. Test-only race:
# in prod the gate compares against a prior day's long-committed snapshot.
- name: _verify | Commit the write to a txg so written@ reflects it
  command: zpool sync rpool
  changed_when: false
  become: true

- name: _verify | Offsite gate does NOT skip after a change
  command: timeout 30 /usr/local/bin/zfs_backup_offsite offsite.invalid rpool/zfs_autobackup_offsite_test
  changed_when: false
  failed_when: false
  register: zfs_autobackup_verify_gate_nochange
  become: true

- name: _verify | Changed dataset passes the gate and reaches the rsync stage
  assert:
    that:
      - "'skipping offsite sync' not in zfs_autobackup_verify_gate_nochange.stdout"
      - "'rsync' in zfs_autobackup_verify_gate_nochange.stdout"
    fail_msg: >-
      offsite gate failed to proceed to rsync after a change
      (rc={{ zfs_autobackup_verify_gate_nochange.rc }},
      stdout={{ zfs_autobackup_verify_gate_nochange.stdout }})

# Regression guard for the gate/mount ordering: the change-gate must never
# short-circuit the mount check. Seed a marker that WOULD skip (a fresh snapshot
# with nothing written since, recent mtime), then unmount the dataset. A correct
# script validates the mount first and fails loudly; a gate-before-mount order
# would skip an unmounted dataset and report a phantom up-to-date backup.
- name: _verify | Snapshot the offsite-gate dataset for the unmount test
  command: zfs snapshot rpool/zfs_autobackup_offsite_test@bak-verify-unmount
  changed_when: true
  become: true

- name: _verify | Seed a would-skip marker (fresh snapshot, written=0, current mtime)
  copy:
    dest: /var/lib/zfs_backup_offsite/rpool_zfs_autobackup_offsite_test
    content: "bak-verify-unmount\n"
    owner: root
    group: root
    mode: "0644"
  become: true

- name: _verify | Unmount the offsite-gate dataset
  command: zfs unmount rpool/zfs_autobackup_offsite_test
  changed_when: true
  become: true

- name: _verify | Run the offsite script against the unmounted dataset
  command: timeout 30 /usr/local/bin/zfs_backup_offsite offsite.invalid rpool/zfs_autobackup_offsite_test
  changed_when: false
  failed_when: false
  register: zfs_autobackup_verify_gate_unmounted
  become: true

- name: _verify | Unmounted dataset fails the mount check instead of skipping
  assert:
    that:
      - zfs_autobackup_verify_gate_unmounted.rc != 0
      - "'skipping offsite sync' not in zfs_autobackup_verify_gate_unmounted.stdout"
    fail_msg: >-
      offsite gate did not fail on an unmounted dataset
      (rc={{ zfs_autobackup_verify_gate_unmounted.rc }},
      stdout={{ zfs_autobackup_verify_gate_unmounted.stdout }},
      stderr={{ zfs_autobackup_verify_gate_unmounted.stderr }})

# Second ordering guard, for the no-@bak- skip path: it too must not short-
# circuit the mount check. This dataset has no snapshot; unmounted, a correct
# script fails the mount check rather than exiting cleanly on "No @bak- snapshot".
- name: _verify | Unmount the snapshot-free dataset
  command: zfs unmount rpool/zfs_autobackup_offsite_nosnap_test
  changed_when: true
  become: true

- name: _verify | Run the offsite script against the unmounted snapshot-free dataset
  command: timeout 30 /usr/local/bin/zfs_backup_offsite offsite.invalid rpool/zfs_autobackup_offsite_nosnap_test
  changed_when: false
  failed_when: false
  register: zfs_autobackup_verify_gate_nosnap
  become: true

- name: _verify | Snapshot-free unmounted dataset fails the mount check, not the no-snapshot skip
  assert:
    that:
      - zfs_autobackup_verify_gate_nosnap.rc != 0
      - "'skipping offsite sync' not in zfs_autobackup_verify_gate_nosnap.stdout"
    fail_msg: >-
      offsite gate skipped a no-snapshot dataset ahead of the mount check
      (rc={{ zfs_autobackup_verify_gate_nosnap.rc }},
      stdout={{ zfs_autobackup_verify_gate_nosnap.stdout }},
      stderr={{ zfs_autobackup_verify_gate_nosnap.stderr }})
