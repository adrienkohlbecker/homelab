- name: _test | Install dependencies
  apt:
    pkg:
      - logrotate
    install_recommends: false
    cache_valid_time: 3600
  become: true

# zfs_autosnapshot timer ExecStart calls /usr/local/bin/run_job,
# installed by the cron role. In prod site.yml runs cron before
# zfs_autobackup; under the test harness only this role runs, so
# import the dep here.
- name: _setup | Install run_job wrapper
  import_role:
    name: cron
