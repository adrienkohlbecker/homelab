- name: dest | Copy the sync script
  file:
    path: /usr/local/bin/zfs_autosync
    state: absent
  become: true
  tags:
    - zfs_autobackup

# dest hosts never run the autosync timer; this removal is idempotent
# (no-op when never installed) and cleans up after older cron-based
# installs.
- name: dest | Remove the zfs_autosync timer
  import_role:
    name: systemd_timer
  vars:
    systemd_timer_args:
      name: zfs_autosync
      state: absent
  tags:
    - zfs_autobackup
