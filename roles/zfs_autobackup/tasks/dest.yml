# zfs-autobackup pulls each peer's snapshots into its dest_dataset but refuses
# to create the top-level target itself ("Target path '<ds>' does not exist.
# Please create this dataset first."), so a source added to host_vars without a
# hand-created target fails silently every night. Create the parent as a pure
# container (canmount=off/mountpoint=none, matching the existing receive roots);
# the received children carry their own readonly=on/mountpoint=none from the
# onsite pull's --set-properties.
#
# Gated on non-existence rather than letting community.general.zfs reconcile
# properties every run: an existing receive root is already populated and may
# carry properties set by zfs receive over time, so we create-if-missing and
# never touch it again. The empty-string dest_dataset is the skip sentinel
# (e.g. box's self-reference in the fixture).
- name: dest | List existing datasets
  command: zfs list -H -o name
  check_mode: false
  changed_when: false
  register: _zfs_autobackup_existing_datasets
  when: zfs_root
  become: true
  tags:
    - zfs_autobackup

- name: dest | Ensure backup receive-target datasets exist
  when:
    - zfs_root
    - item.dest_dataset | default('') | length > 0
    - item.dest_dataset not in (_zfs_autobackup_existing_datasets.stdout_lines | default([]))
  community.general.zfs:
    name: "{{ item.dest_dataset }}"
    state: present
    extra_zfs_properties:
      canmount: "off"
      mountpoint: none
  loop: "{{ zfs_autobackup_sources }}"
  loop_control:
    label: "{{ item.dest_dataset | default('(none)') }}"
  become: true
  tags:
    - zfs_autobackup

- name: dest | Build SSH target list for backup peers
  set_fact:
    _zfs_autobackup_ssh_targets: >-
      {{
        ((zfs_autobackup_sources | map(attribute='host') | map('extract', external_ips) | list)
        + [external_ips.bunk])
        | unique
      }}
  tags:
    - zfs_autobackup

# This three-step check/scan/register is load-bearing, not gratuitous:
# ssh-keyscan -H hashes each entry with a random per-entry salt, so a fresh
# scan never byte-matches an existing entry. The ssh-keygen -F pre-check
# gates the scan+register on the host being genuinely absent, which is what
# keeps this idempotent. Collapsing it (scan+register every run) would
# rewrite known_hosts on every converge. Hashing stays on so a compromised
# backup host can't enumerate its peers from /root/.ssh/known_hosts.
- name: dest | Check which backup peers are already in known_hosts
  when: not qemu_test
  command: ssh-keygen -F "{{ item }}" -f /root/.ssh/known_hosts
  loop: "{{ _zfs_autobackup_ssh_targets }}"
  changed_when: false
  failed_when: false
  register: _zfs_autobackup_known_check
  become: true
  tags:
    - zfs_autobackup

- name: dest | Scan SSH host keys from new backup peers
  when: not qemu_test and item.rc != 0
  command: ssh-keyscan -H -t ed25519 -T 5 "{{ item.item }}"
  loop: "{{ _zfs_autobackup_known_check.results | default([]) }}"
  loop_control:
    label: "{{ item.item }}"
  changed_when: false
  failed_when: false
  register: _zfs_autobackup_keyscan
  tags:
    - zfs_autobackup

- name: dest | Register SSH host keys for new backup peers
  when: not qemu_test and item.stdout | default('') | length > 0
  known_hosts:
    path: /root/.ssh/known_hosts
    name: "{{ item.item.item }}"
    key: "{{ item.stdout }}"
  loop: "{{ _zfs_autobackup_keyscan.results | default([]) }}"
  loop_control:
    label: "{{ item.item.item | default(item.item) }}"
  become: true
  tags:
    - zfs_autobackup

