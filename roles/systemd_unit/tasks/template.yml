# Note: with ubuntu 24.04, may be able to use `validate: systemd-analyze verify %s:foo.service`,
# although it won't fail for warnings like undefined keys?
#
# The rescue block below is rare-but-load-bearing. systemd-analyze verify
# catches most syntax problems before daemon-reload, but a parser bug or a
# malformed Jinja substitution that slips past validate would otherwise
# leave a broken unit on disk that breaks the next daemon-reload for the
# whole host. Restoring the .backup_file (or deleting the freshly-added
# unit) keeps the host in its previous-known-good state when the install
# fails. Don't trim this as "overengineering" — measure first.
- name: template | Systemd service
  block:
    - name: template | Template the unit file
      when: systemd_unit_condition | default(true)
      template:
        src: "{{ systemd_unit_src }}.j2"
        dest: /etc/systemd/system/{{ systemd_unit_dest | default(systemd_unit_src) }}
        owner: root
        group: root
        mode: "0644"
        backup: true
      become: true
      register: systemd_unit

    - name: template | Validate unit file
      when: systemd_unit.changed
      command: systemd-analyze verify /etc/systemd/system/{{ systemd_unit_verify | default(systemd_unit_dest) | default(systemd_unit_src) }}
      register: systemd_verify
      changed_when: false
      failed_when: systemd_verify.rc != 0 or systemd_verify.stderr != ''
      become: true

    - name: template | Reload daemon
      when: systemd_unit.changed
      systemd:
        daemon_reload: true
      become: true

    # Expose the install result under a per-unit fact so callers can avoid
    # the ambiguous shared `systemd_unit` register (which is also the role
    # name and would be clobbered by a second template/copy call in the
    # same play). New callers should reference <basename>_<type>_result —
    # e.g. healthchecks.service → healthchecks_service_result, and
    # podman.socket / podman.service yield distinct facts.
    - name: template | Record install result for {{ systemd_unit_src }}
      set_fact:
        "{{ (systemd_unit_dest | default(systemd_unit_src)) | regex_replace('[^A-Za-z0-9_]', '_') }}_result": "{{ systemd_unit }}"

  rescue:
    - name: template | Copy backup file to original
      when: '"backup_file" in systemd_unit'
      copy:
        remote_src: true
        dest: /etc/systemd/system/{{ systemd_unit_dest | default(systemd_unit_src) }}
        src: "{{ systemd_unit.backup_file }}"
        owner: root
        group: root
        mode: "0644"
      become: true

    - name: template | Delete backup file
      when: '"backup_file" in systemd_unit'
      file:
        path: "{{ systemd_unit.backup_file }}"
        state: absent
      become: true

    - name: template | Delete newly added file
      when: systemd_unit.changed and "backup_file" not in systemd_unit
      file:
        path: /etc/systemd/system/{{ systemd_unit_dest | default(systemd_unit_src) }}
        state: absent
      become: true

    - name: template | Record failure
      fail:
        msg: Unable to install systemd unit
