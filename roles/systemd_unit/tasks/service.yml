# Inputs: caller passes a single dict `systemd_unit_args` with keys
#   src               bare unit name (e.g. "mosquitto"), full unit filename
#                     (e.g. "mosquitto.service"), or template path
#                     (e.g. "mosquitto.service.j2"); used only for the name
#                     fallback and the task title
#   dest              optional override for the resolved unit name
#   user              default 'root'; non-root drives the named user's
#                     user manager (linger must already be on)
#   condition         default true; gates the whole call
#   start             default true; false → enable only, don't touch state
#   restart           default false; if true and the start didn't change
#                     state, force `state=restarted`. Drive from upstream
#                     changes (template/copy register, secret rotation) so
#                     config drift propagates.
#   reload            default false; hitless alternative to restart for
#                     daemons that pick up config via SIGHUP. Mutually
#                     exclusive with restart in practice.
#
# The dict form prevents inter-call leakage: each import_role pass replaces
# the whole `systemd_unit_args` value at play-vars scope, so a previous
# caller's user/start/etc. can't bleed into the next caller's call.
#
# `systemd_unit_args.user` (default 'root') selects scope: root acts on
# the system manager; any other value drives the named user's user
# manager (linger must already be enabled). For system-scope units the
# pre-pull store is decided by the unit file's own `[Service] User=`
# directive (which extract_podman_image returns): User=root (or unset)
# pulls to root's /var/lib/containers/storage; any other value pulls to
# that user's /var/lib/containers/rootless/<user>/ store — where the
# unit's ExecStart will actually look at runtime. Without that branch,
# a system-scope unit with User=github_runner would silently pre-pull
# into root's store and then bust TimeoutStartSec on a cold rootless
# pull inside systemctl start.
# Two set_fact tasks because ansible's templating engine resolves all
# keys in a single set_fact concurrently — a key can't read a sibling
# defined in the same task. Primitives (caller-var defaulting) first,
# derived facts (scope, is_service) second.
#
# _is_service: only `.service` units carry ExecStart properties; the
# extract_podman_image module silently returns [] for anything else
# after blindly appending `.service` to the name. Bare names (no
# extension) are treated as services by the role's convention.
- name: service | Resolve caller defaults for {{ systemd_unit_args.src }}
  set_fact:
    _systemd_unit_user: "{{ systemd_unit_args.user | default('root') }}"
    _systemd_unit_condition: "{{ systemd_unit_args.condition | default(true) }}"
    _systemd_unit_start: "{{ systemd_unit_args.start | default(true) }}"
    _systemd_unit_name: "{{ systemd_unit_args.dest | default(systemd_unit_args.src) }}"

- name: service | Derive scope and unit type for {{ systemd_unit_args.src }}
  set_fact:
    _systemd_unit_scope: "{{ 'system' if _systemd_unit_user == 'root' else 'user' }}"
    _systemd_unit_is_service: "{{ _systemd_unit_name.endswith('.service') or '.' not in _systemd_unit_name }}"

# Linger has to be on for user-scope lifecycle ops: without it the named
# user's systemd manager isn't running between logins, so `systemctl
# --user enable/start` may appear to succeed via the current session but
# the unit dies at logout. /var/lib/systemd/linger/<user> is the marker
# loginctl enable-linger creates -- see install.yml for the longer
# rationale.
- name: service | Verify user-scope linger marker exists for {{ _systemd_unit_user }}
  when:
    - _systemd_unit_condition
    - _systemd_unit_scope == 'user'
  stat:
    path: "/var/lib/systemd/linger/{{ _systemd_unit_user }}"
  register: _systemd_unit_linger
  failed_when: not _systemd_unit_linger.stat.exists

- name: Enable the service
  when: _systemd_unit_condition
  systemd:
    name: "{{ _systemd_unit_name }}"
    enabled: true
    scope: "{{ _systemd_unit_scope }}"
  become: true
  become_user: "{{ _systemd_unit_user }}"

# Each .service file is the single source of truth for its podman image;
# the extract_podman_image module asks systemd over D-Bus for the parsed
# ExecStart* and pulls the image out of any `podman run` invocation. Pre-
# pulling here moves a slow network fetch out of `systemctl start`'s
# TimeoutStartSec window and into a normal ansible task with no fixed
# deadline.
- name: Detect podman images referenced by the unit
  when:
    - _systemd_unit_condition
    - not ansible_check_mode
    - _systemd_unit_scope == 'system'
    - _systemd_unit_is_service
  extract_podman_image:
    name: "{{ _systemd_unit_name }}"
  register: systemd_unit_podman_images
  become: true

# Pull into the right podman store. extract_podman_image returns the
# unit's User=; treat "" and "root" as system-scope, anything else as
# that user's rootless store. become_user: root is the default ansible
# become target so the empty-string / "root" path matches the previous
# behavior exactly. For a non-root User= the role still needs root to
# `become` first (system-scope unit lives in /etc/systemd/system), then
# drops into the user via become_user; the user's linger + podman.sock
# are the caller's responsibility (see github_runner main.yml for the
# canonical setup).
- name: Pre-pull podman images referenced by the unit
  when:
    - _systemd_unit_condition
    - not ansible_check_mode
    - _systemd_unit_scope == 'system'
    - _systemd_unit_is_service
  containers.podman.podman_image:
    name: "{{ item }}"
  loop: "{{ systemd_unit_podman_images.images | default([]) }}"
  become: true
  become_user: "{{ systemd_unit_podman_images.user if (systemd_unit_podman_images.user | default('')) not in ['', 'root'] else 'root' }}"

# Clear any rate-limit / failed state before starting. A unit that has
# crashed StartLimitBurst times within StartLimitInterval gets stuck
# in "Start request repeated too quickly" -- ansible's systemd module
# would surface that as a fatal error on the next play even though
# the underlying cause has been fixed. reset-failed is a no-op on
# healthy units; failed_when=false tolerates the unit not existing
# yet (e.g. a config-only run that touches an as-yet-uninstalled
# unit).
- name: Reset failed state to clear any rate-limit
  when:
    - _systemd_unit_condition
    - _systemd_unit_start
    - not ansible_check_mode
  command: "systemctl{{ ' --user' if _systemd_unit_scope == 'user' else '' }} reset-failed {{ _systemd_unit_name }}"
  changed_when: false
  failed_when: false
  become: true
  become_user: "{{ _systemd_unit_user }}"

- name: Start the service
  when:
    - _systemd_unit_condition
    - _systemd_unit_start
  systemd:
    name: "{{ _systemd_unit_name }}"
    state: started
    scope: "{{ _systemd_unit_scope }}"
  register: systemd_started
  become: true
  become_user: "{{ _systemd_unit_user }}"

- name: Restart the service
  when:
    - _systemd_unit_condition
    - _systemd_unit_start
    - systemd_unit_args.restart | default(false)
    - not systemd_started.changed
  systemd:
    name: "{{ _systemd_unit_name }}"
    state: restarted
    scope: "{{ _systemd_unit_scope }}"
  become: true
  become_user: "{{ _systemd_unit_user }}"

# Hitless alternative to restart for daemons that pick up config via SIGHUP
# (keepalived, nginx, etc.). Mutually exclusive with systemd_unit_args.restart
# in practice — set one or the other. Skipped on the play that just started
# the unit (the started state already reflects current config).
- name: Reload the service
  when:
    - _systemd_unit_condition
    - _systemd_unit_start
    - systemd_unit_args.reload | default(false)
    - not systemd_started.changed
  systemd:
    name: "{{ _systemd_unit_name }}"
    state: reloaded
    scope: "{{ _systemd_unit_scope }}"
  become: true
  become_user: "{{ _systemd_unit_user }}"
