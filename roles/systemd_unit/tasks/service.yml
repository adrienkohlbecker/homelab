- name: Enable the service
  when: (systemd_unit_condition | default(true))
  systemd:
    name: "{{ systemd_unit_dest | default(systemd_unit_src) }}"
    enabled: true
  become: true

# Each .service file is the single source of truth for its podman image;
# the extract_podman_image module asks systemd over D-Bus for the parsed
# ExecStart* and pulls the image out of any `podman run` invocation. Pre-
# pulling here moves a slow network fetch out of `systemctl start`'s
# TimeoutStartSec window and into a normal ansible task with no fixed
# deadline.
- name: Detect podman images referenced by the unit
  when:
    - systemd_unit_condition | default(true)
    - not ansible_check_mode
  extract_podman_image:
    name: "{{ systemd_unit_dest | default(systemd_unit_src) }}"
  register: systemd_unit_podman_images
  become: true

- name: Pre-pull podman images referenced by the unit
  when:
    - systemd_unit_condition | default(true)
    - not ansible_check_mode
  containers.podman.podman_image:
    name: "{{ item }}"
  loop: "{{ systemd_unit_podman_images.images | default([]) }}"
  become: true

- name: Start the service
  when: (systemd_unit_condition | default(true)) and (systemd_unit_start | default(true))
  systemd:
    name: "{{ systemd_unit_dest | default(systemd_unit_src) }}"
    state: started
  register: systemd_started
  become: true

- name: Restart the service
  when: (systemd_unit_condition | default(true)) and (systemd_unit_start | default(true)) and (systemd_unit_restart | default(false) and not systemd_started.changed)
  systemd:
    name: "{{ systemd_unit_dest | default(systemd_unit_src) }}"
    state: restarted
  become: true
