- name: Enable the service
  when: (systemd_unit_condition | default(true))
  systemd:
    name: "{{ systemd_unit_dest | default(systemd_unit_src) }}"
    enabled: true
  become: true

# Read podman image refs straight from the unit's ExecStart* lines, so each
# .service file remains the single source of truth -- the playbook never
# restates the image. Pre-pulling here moves a slow network fetch out of
# `systemctl start`'s TimeoutStartSec window and into a normal ansible task
# with no fixed deadline. Parsing happens controller-side via the
# extract_podman_images Jinja filter so nothing is copied to the target host.
- name: Read unit file for image detection
  when:
    - systemd_unit_condition | default(true)
    - not ansible_check_mode
  slurp:
    src: /etc/systemd/system/{{ systemd_unit_dest | default(systemd_unit_src) }}
  register: systemd_unit_content
  become: true

- name: Pre-pull podman images referenced by the unit
  when:
    - systemd_unit_condition | default(true)
    - not ansible_check_mode
  containers.podman.podman_image:
    name: "{{ item }}"
  loop: "{{ (systemd_unit_content.content | b64decode) | extract_podman_images }}"
  become: true

- name: Start the service
  when: (systemd_unit_condition | default(true)) and (systemd_unit_start | default(true))
  systemd:
    name: "{{ systemd_unit_dest | default(systemd_unit_src) }}"
    state: started
  register: systemd_started
  become: true

- name: Restart the service
  when: (systemd_unit_condition | default(true)) and (systemd_unit_start | default(true)) and (systemd_unit_restart | default(false) and not systemd_started.changed)
  systemd:
    name: "{{ systemd_unit_dest | default(systemd_unit_src) }}"
    state: restarted
  become: true
