# `systemd_unit_user` (default `root`) selects scope: root acts on the
# system manager; any other value drives the named user's user manager
# (linger must already be enabled). The pre-pull step is rootful-only —
# extract_podman_image queries the system bus, and a rootless service
# pulls into its own /var/lib/containers/rootless/$USER store anyway.
- name: service | Resolve scope and unit name for {{ systemd_unit_src }}
  set_fact:
    _systemd_unit_scope: "{{ 'system' if (systemd_unit_user | default('root')) == 'root' else 'user' }}"
    _systemd_unit_name: "{{ systemd_unit_dest | default(systemd_unit_src) }}"

# Only `.service` units carry ExecStart properties; the module silently
# returns [] for anything else after blindly appending `.service` to the
# name. Skip the D-Bus round-trip for timers/sockets/targets/paths. Bare
# names (no extension) are treated as services by the role's convention.
- name: service | Classify unit type
  set_fact:
    _systemd_unit_is_service: "{{ _systemd_unit_name.endswith('.service') or '.' not in _systemd_unit_name }}"

- name: Enable the service
  when: (systemd_unit_condition | default(true))
  systemd:
    name: "{{ _systemd_unit_name }}"
    enabled: true
    scope: "{{ _systemd_unit_scope }}"
  become: true
  become_user: "{{ systemd_unit_user | default('root') }}"

# Each .service file is the single source of truth for its podman image;
# the extract_podman_image module asks systemd over D-Bus for the parsed
# ExecStart* and pulls the image out of any `podman run` invocation. Pre-
# pulling here moves a slow network fetch out of `systemctl start`'s
# TimeoutStartSec window and into a normal ansible task with no fixed
# deadline.
- name: Detect podman images referenced by the unit
  when:
    - systemd_unit_condition | default(true)
    - not ansible_check_mode
    - _systemd_unit_scope == 'system'
    - _systemd_unit_is_service
  extract_podman_image:
    name: "{{ _systemd_unit_name }}"
  register: systemd_unit_podman_images
  become: true

- name: Pre-pull podman images referenced by the unit
  when:
    - systemd_unit_condition | default(true)
    - not ansible_check_mode
    - _systemd_unit_scope == 'system'
    - _systemd_unit_is_service
  containers.podman.podman_image:
    name: "{{ item }}"
  loop: "{{ systemd_unit_podman_images.images | default([]) }}"
  become: true

# Clear any rate-limit / failed state before starting. A unit that has
# crashed StartLimitBurst times within StartLimitInterval gets stuck
# in "Start request repeated too quickly" -- ansible's systemd module
# would surface that as a fatal error on the next play even though
# the underlying cause has been fixed. reset-failed is a no-op on
# healthy units; failed_when=false tolerates the unit not existing
# yet (e.g. a config-only run that touches an as-yet-uninstalled
# unit).
- name: Reset failed state to clear any rate-limit
  when:
    - systemd_unit_condition | default(true)
    - systemd_unit_start | default(true)
    - not ansible_check_mode
  command: "systemctl{{ ' --user' if _systemd_unit_scope == 'user' else '' }} reset-failed {{ _systemd_unit_name }}"
  changed_when: false
  failed_when: false
  become: true
  become_user: "{{ systemd_unit_user | default('root') }}"

- name: Start the service
  when:
    - systemd_unit_condition | default(true)
    - systemd_unit_start | default(true)
  systemd:
    name: "{{ _systemd_unit_name }}"
    state: started
    scope: "{{ _systemd_unit_scope }}"
  register: systemd_started
  become: true
  become_user: "{{ systemd_unit_user | default('root') }}"

- name: Restart the service
  when:
    - systemd_unit_condition | default(true)
    - systemd_unit_start | default(true)
    - systemd_unit_restart | default(false)
    - not systemd_started.changed
  systemd:
    name: "{{ _systemd_unit_name }}"
    state: restarted
    scope: "{{ _systemd_unit_scope }}"
  become: true
  become_user: "{{ systemd_unit_user | default('root') }}"

# Hitless alternative to restart for daemons that pick up config via SIGHUP
# (keepalived, nginx, etc.). Mutually exclusive with systemd_unit_restart in
# practice — set one or the other. Skipped on the play that just started the
# unit (the started state already reflects current config).
- name: Reload the service
  when:
    - systemd_unit_condition | default(true)
    - systemd_unit_start | default(true)
    - systemd_unit_reload | default(false)
    - not systemd_started.changed
  systemd:
    name: "{{ _systemd_unit_name }}"
    state: reloaded
    scope: "{{ _systemd_unit_scope }}"
  become: true
  become_user: "{{ systemd_unit_user | default('root') }}"
