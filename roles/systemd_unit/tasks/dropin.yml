# Drop-in entrypoint: write <scope-dir>/<unit>.d/override.conf to extend
# or override a unit (usually one shipped by an OS package; can also
# layer over a unit installed by this role). Caller passes:
#   systemd_unit_for: <unit>             e.g. podman.socket
#   systemd_unit_src: <file>             under role files/ or templates/
#   systemd_unit_module: copy|template   optional, default copy
#   systemd_unit_user: <user>            optional, default root
#   systemd_unit_condition: <bool>       optional, default true
# install.yml does the write + systemd-analyze verify; verify is pointed
# at <unit> (not the override file) so the drop-in is validated as part
# of its composed unit. The drop-in name is fixed at override.conf —
# every current consumer uses that and a fancier API can wait for the
# first counterexample.
- name: dropin | Resolve user for {{ systemd_unit_for }}
  set_fact:
    _systemd_unit_user: "{{ systemd_unit_user | default('root') }}"

- name: dropin | Derive drop-in directory for {{ systemd_unit_for }}
  set_fact:
    _systemd_unit_dropin_dir: "{{ ('/etc/systemd/system' if _systemd_unit_user == 'root' else '/etc/systemd/user') ~ '/' ~ systemd_unit_for ~ '.d' }}"

- name: dropin | Create {{ _systemd_unit_dropin_dir }}
  when: systemd_unit_condition | default(true)
  file:
    path: "{{ _systemd_unit_dropin_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true

- import_tasks: install.yml
  vars:
    _systemd_unit_module: "{{ systemd_unit_module | default('copy') }}"
    systemd_unit_dest: "{{ systemd_unit_for }}.d/override.conf"
    systemd_unit_verify: "{{ systemd_unit_for }}"
