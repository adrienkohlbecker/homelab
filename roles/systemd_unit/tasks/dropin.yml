# Drop-in entrypoint: write <scope-dir>/<unit>.d/override.conf to extend
# or override a unit (usually one shipped by an OS package; can also
# layer over a unit installed by this role). Caller passes a single dict
# `systemd_unit_args` with keys:
#   for               parent unit  e.g. podman.socket
#   src               file under role files/ or templates/; suffix .j2
#                     picks the template path
#   user              optional, default root
#   condition         optional, default true
# install.yml does the write + systemd-analyze verify; when `for` is set
# it derives dest=<for>.d/override.conf and verify=<for> automatically,
# so the drop-in is validated as part of its composed unit. install.yml
# derives copy vs template from src's .j2 suffix — no dispatch flag here.
# The drop-in name is fixed at override.conf — every current consumer
# uses that and a fancier API can wait for the first counterexample.
- name: dropin | Resolve user for {{ systemd_unit_args.for }}
  set_fact:
    _systemd_unit_user: "{{ systemd_unit_args.user | default('root') }}"

- name: dropin | Derive drop-in directory for {{ systemd_unit_args.for }}
  set_fact:
    _systemd_unit_dropin_dir: "{{ ('/etc/systemd/system' if _systemd_unit_user == 'root' else '/etc/systemd/user') ~ '/' ~ systemd_unit_args.for ~ '.d' }}"

- name: dropin | Create {{ _systemd_unit_dropin_dir }}
  when: systemd_unit_args.condition | default(true)
  file:
    path: "{{ _systemd_unit_dropin_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true

- name: dropin | Install override.conf via install.yml
  import_tasks: install.yml
