# The validate task below uses `failed_when: rc != 0 or stderr != ''` —
# intentionally stricter than systemd-analyze's own exit code, so warnings
# (undefined keys, ordering cycles) also trigger rollback. Ansible's
# template/copy `validate:` arg would check *before* placing, but it
# passes the temp path which systemd-analyze can't resolve dependencies
# against, and on 24.04+ the `:unit` form still doesn't reject warnings.
#
# Inputs: caller passes a single dict `systemd_unit_args` with keys
#   src               file under role files/ (copy) or templates/ (.j2 → template)
#   dest              optional on-disk filename; defaults to src with .j2 stripped
#   dest_abs          optional absolute on-disk path; takes precedence over
#                     dest and the for-derived default. Used by dropin's
#                     absolute mode for daemon-config drop-ins.
#   for               drop-in only: parent unit (e.g. podman.socket); derives
#                     dest=<for>.d/override.conf and verify=<for>
#   user              default 'root'; non-root drives /etc/systemd/user
#   condition         default true; gates the whole call
#   verify            optional path for systemd-analyze verify (drop-ins
#                     validate the composed parent unit, not the override)
#
# The dict form prevents inter-call leakage: each import_role pass replaces
# the whole `systemd_unit_args` value at play-vars scope, so a previous
# caller's user/start/etc. can't bleed into the next caller's call.
#
# `systemd_unit_args.user` (default 'root') selects scope: root installs at
# /etc/systemd/system and reloads the system manager; any other value
# installs at /etc/systemd/user (host-wide user-default) and reloads the
# named user's user manager (which must already be lingered).
#
# Module dispatch: derived from src's suffix — *.j2 → template (loaded from
# the calling role's templates/), anything else → copy (from files/). The
# role strips .j2 for the on-disk dest. systemd_unit_args.dest overrides
# the dest path (used by drop-ins to land at <unit>.d/override.conf).
#
- name: install | Validate install args
  assert:
    quiet: true
    that:
      - systemd_unit_args is defined
      - systemd_unit_args is mapping
      - systemd_unit_args.src is defined
      - systemd_unit_args.src is string
    fail_msg: >-
      systemd_unit_args needs src (source filename);
      got {{ systemd_unit_args | default('<unset>') }}

# Two set_fact tasks because ansible's templating engine resolves all
# keys in a single set_fact concurrently — a key can't read a sibling
# defined in the same task. Primitives (caller-var defaulting) first,
# derived facts (scope/dir) second.
- name: install | Resolve caller defaults for {{ systemd_unit_args.src }}
  set_fact:
    _systemd_unit_user: "{{ systemd_unit_args.user | default('root') }}"
    _systemd_unit_condition: "{{ systemd_unit_args.condition | default(true) }}"
    _systemd_unit_src: "{{ systemd_unit_args.src }}"
    # For dest_abs mode, the identifier used in the per-unit result fact
    # is the last two path components — same shape relative-dest dropins
    # produce (journald.conf.d/99-custom.conf → journald_conf_d_99_custom_conf_result,
    # parallel to podman.socket.d/override.conf → podman_socket_d_override_conf_result).
    _systemd_unit_name: >-
      {{ ((systemd_unit_args.dest_abs | dirname | basename) ~ '/' ~ (systemd_unit_args.dest_abs | basename))
         if systemd_unit_args.dest_abs is defined
         else (systemd_unit_args.dest
               | default((systemd_unit_args.for ~ '.d/override.conf') if systemd_unit_args.for is defined
                         else (systemd_unit_args.src | regex_replace('\.j2$', '')))) }}
    _systemd_unit_verify: >-
      {{ systemd_unit_args.verify
         | default(systemd_unit_args.for if systemd_unit_args.for is defined
                   else (systemd_unit_args.dest
                         | default(systemd_unit_args.src | regex_replace('\.j2$', '')))) }}

- name: install | Derive install scope for {{ systemd_unit_args.src }}
  set_fact:
    _systemd_unit_scope: "{{ 'system' if _systemd_unit_user == 'root' else 'user' }}"
    _systemd_unit_dir: "{{ '/etc/systemd/system' if _systemd_unit_user == 'root' else '/etc/systemd/user' }}"

# Linger has to be on for user-scope installs: without it the named
# user's systemd manager isn't running between logins, so daemon-reload
# (and any later enable/start in service.yml) lands on a manager that
# vanishes at logout. /var/lib/systemd/linger/<user> is the marker
# `loginctl enable-linger` creates; a stat is enough and avoids a busctl
# dependency. Callers wire linger up at user-creation time (roles/user,
# roles/gitea_runner) — this check is the guardrail for the next consumer
# that forgets.
# Task name references the caller var (systemd_unit_args.user, set
# at import time via import_role.vars:) rather than the set_fact'd
# _systemd_unit_user, because import_tasks chains (e.g. dropin →
# install) eager-render task names before any of this file's
# set_fact tasks run -- a set_fact'd reference there fails with
# "undefined" before we ever get past the import. The caller var
# is always available because import_role.vars: are part of the
# import-time scope.
#
# Tolerate check mode: the upstream linger task may have reported
# "would have enabled" without actually creating the sentinel, so a
# false positive here would block check-mode runs on a fresh host.
# Real-apply still fail-closes.
- name: install | Verify user-scope linger marker exists for {{ systemd_unit_args.user | default('root') }}
  when:
    - _systemd_unit_condition
    - _systemd_unit_scope == 'user'
  stat:
    path: "/var/lib/systemd/linger/{{ _systemd_unit_user }}"
  register: _systemd_unit_linger
  failed_when: not _systemd_unit_linger.stat.exists and not ansible_check_mode

# Refuse to overwrite a masked unit. `systemctl mask` creates a /dev/null
# symlink at the unit's location — the standard "do not start this"
# lever during incident response. A naive write would clobber the
# symlink with a regular file and silently unmask, undoing operator
# intent. Check the same path the verify command targets so drop-ins
# whose parent unit is masked (dest = <unit>.d/override.conf, verify =
# the bare unit) are also caught.
- name: install | Stat unit path to detect a pre-existing mask
  when: _systemd_unit_condition
  stat:
    path: "{{ _systemd_unit_dir }}/{{ _systemd_unit_verify }}"
  register: _systemd_unit_mask
  become: true

- name: install | Refuse to overwrite masked unit
  when:
    - _systemd_unit_condition
    - _systemd_unit_mask.stat.islnk | default(false)
    - _systemd_unit_mask.stat.lnk_target | default('') == '/dev/null'
  fail:
    msg: >-
      Refusing to overwrite {{ _systemd_unit_dir }}/{{ _systemd_unit_verify }}:
      it is masked (symlink to /dev/null). Unmask with
      `systemctl{{ ' --user' if _systemd_unit_scope == 'user' else '' }} unmask {{ _systemd_unit_verify }}`
      before re-running, or --limit the play to skip this role.

# The check above guards the parent/verify unit. When dest_abs is set the
# write target is a different path (e.g. /etc/systemd/journald.conf.d/99-custom.conf),
# so we need a second mask check for that specific path.
- name: install | Stat dest_abs path for pre-existing mask
  when:
    - _systemd_unit_condition
    - systemd_unit_args.dest_abs is defined
  stat:
    path: "{{ systemd_unit_args.dest_abs }}"
  register: _systemd_unit_mask_abs
  become: true

- name: install | Refuse to overwrite masked dest_abs path
  when:
    - _systemd_unit_condition
    - systemd_unit_args.dest_abs is defined
    - _systemd_unit_mask_abs.stat.islnk | default(false)
    - _systemd_unit_mask_abs.stat.lnk_target | default('') == '/dev/null'
  fail:
    msg: >-
      Refusing to overwrite {{ systemd_unit_args.dest_abs }}:
      it is masked (symlink to /dev/null). Unmask with
      `systemctl{{ ' --user' if _systemd_unit_scope == 'user' else '' }} unmask {{ _systemd_unit_verify }}`
      before re-running, or --limit the play to skip this role.

- name: install | Install systemd unit
  vars:
    _systemd_unit_path: "{{ systemd_unit_args.dest_abs | default(_systemd_unit_dir ~ '/' ~ _systemd_unit_name) }}"
  block:
    # `action:` + `args:` dispatches to copy or template. _module is resolved
    # task-locally (not via set_fact, which would persist as a host fact and
    # poison the next call's dispatch). Keeping the install task here means
    # the validate + rescue logic below is a single source of truth. The
    # mapping form of `action:` is deprecated in ansible-core 2.23, so the
    # string form with a separate `args:` block is used.
    #
    # _module's expression references systemd_unit_args.src (caller var,
    # import-time scope) instead of _systemd_unit_src (set_fact'd at
    # runtime), so an import_tasks chain that eager-renders the task's
    # vars: block before set_facts run still resolves cleanly. Same
    # reason as the linger-task name above. Task body itself still uses
    # _systemd_unit_src because by execution time the set_fact has run.
    - name: install | Write the unit file ({{ _module }})
      when: _systemd_unit_condition
      vars:
        _module: "{{ 'template' if systemd_unit_args.src.endswith('.j2') else 'copy' }}"
      action: "{{ _module }}"
      args:
        src: "{{ _systemd_unit_src }}"
        dest: "{{ _systemd_unit_path }}"
        owner: root
        group: root
        mode: "0644"
        backup: true
      become: true
      register: systemd_unit_file

    # --man=no because Documentation=man:foo(8) refs trigger
    # `man <topic>` lookups that can fail on minimal images (e.g.
    # stock nftables.service ships `Documentation=man:nft(8)` and
    # the test image doesn't have nft's man page installed). The
    # man-page check is completeness fluff, not syntax/dependency
    # validation — drop it. `--man=no` works on systemd 249+; the
    # newer `--no-man` form is 254+ only.
    #
    # For user-scope installs (user: <non-root>, /etc/systemd/user) the unit
    # is verified by path against the default (system) manager context --
    # --user is intentionally not passed. The path-based load still catches
    # syntax and common dependency errors (github_runner's user units rely on
    # this), and skipping --user avoids surfacing user-manager-only
    # resolution differences that the strict `stderr != ''` check would turn
    # into a spurious rollback.
    - name: install | Validate unit file
      when: systemd_unit_file.changed
      command:
        argv:
          - systemd-analyze
          - verify
          - --no-pager
          - --man=no
          - "{{ _systemd_unit_dir }}/{{ _systemd_unit_verify }}"
      register: systemd_unit_verify
      changed_when: false
      failed_when: systemd_unit_verify.rc != 0 or systemd_unit_verify.stderr != ''
      become: true

    - name: install | Reload daemon
      when: systemd_unit_file.changed
      systemd:
        daemon_reload: true
        scope: "{{ _systemd_unit_scope }}"
      become: true
      become_user: "{{ _systemd_unit_user }}"

    # Expose the install result under a per-unit fact so callers can avoid
    # the ambiguous shared `systemd_unit` register (which is also the role
    # name and would be clobbered by a second template/copy call in the
    # same play). New callers should reference <basename>_<type>_result —
    # e.g. healthchecks.service → healthchecks_service_result, and
    # podman.socket / podman.service yield distinct facts.
    # Caller var in the name (same parse-time-vs-runtime reason as the
    # linger and Write tasks above); body still references the
    # set_fact'd _systemd_unit_name because by execution time it's set.
    - name: install | Record install result for {{ systemd_unit_args.src }}
      set_fact:
        "{{ _systemd_unit_name | regex_replace('[^A-Za-z0-9_]', '_') }}_result": "{{ systemd_unit_file }}"

  # systemd-analyze verify takes a file path, so the unit has to land at
  # its production location first and is then validated in place. If
  # validate fails, the broken unit is already on disk and would break
  # the next daemon-reload for the whole host. The rescue restores the
  # .backup_file (or deletes the freshly-added unit) to keep the host in
  # its previous-known-good state. Don't trim this — without it any typo
  # in a unit template bricks `daemon-reload` host-wide. (Ansible's
  # template/copy `validate:` arg would let us check before placing, but
  # it doesn't fail on warnings; see the comment at the top of this file.)
  rescue:
    - name: install | Copy backup file to original  # noqa: require-backup
      when: '"backup_file" in systemd_unit_file'
      copy:
        remote_src: true
        dest: "{{ _systemd_unit_path }}"
        src: "{{ systemd_unit_file.backup_file }}"
        owner: root
        group: root
        mode: "0644"
      become: true

    - name: install | Delete backup file
      when: '"backup_file" in systemd_unit_file'
      file:
        path: "{{ systemd_unit_file.backup_file }}"
        state: absent
      become: true

    - name: install | Delete newly added file
      when: systemd_unit_file.changed and "backup_file" not in systemd_unit_file
      file:
        path: "{{ _systemd_unit_path }}"
        state: absent
      become: true

    - name: install | Record failure
      fail:
        msg: >-
          Unable to install {{ _systemd_unit_path }}:
          {{ ansible_failed_result.stderr
             | default(ansible_failed_result.msg
             | default('unknown error')) }}
