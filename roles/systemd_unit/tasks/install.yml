# Note: with ubuntu 24.04, may be able to use `validate: systemd-analyze verify %s:foo.service`,
# although it won't fail for warnings like undefined keys?
#
# `systemd_unit_user` (default `root`) selects scope: root installs at
# /etc/systemd/system and reloads the system manager; any other value
# installs at /etc/systemd/user (host-wide user-default) and reloads the
# named user's user manager (which must already be lingered).
- name: Resolve install scope for {{ systemd_unit_src }}
  set_fact:
    _systemd_unit_scope: "{{ 'system' if (systemd_unit_user | default('root')) == 'root' else 'user' }}"
    _systemd_unit_dir: "{{ '/etc/systemd/system' if (systemd_unit_user | default('root')) == 'root' else '/etc/systemd/user' }}"

- name: Install systemd unit
  block:
    # `action: { module: "{{ var }}" }` dispatches to copy or template based on
    # which entry point (copy.yml / template.yml) the caller imported. Keeping
    # one install task here means the validate + rescue logic below is a single
    # source of truth — used to be ~90 lines duplicated across copy.yml and
    # template.yml.
    - name: Write the unit file ({{ _systemd_unit_module }})
      when: systemd_unit_condition | default(true)
      action:
        module: "{{ _systemd_unit_module }}"
        src: "{{ systemd_unit_src }}{{ '.j2' if _systemd_unit_module == 'template' else '' }}"
        dest: "{{ _systemd_unit_dir }}/{{ systemd_unit_dest | default(systemd_unit_src) }}"
        owner: root
        group: root
        mode: "0644"
        backup: true
      become: true
      register: systemd_unit

    # --man=no because Documentation=man:foo(8) refs trigger
    # `man <topic>` lookups that can fail on minimal images (e.g.
    # stock nftables.service ships `Documentation=man:nft(8)` and
    # the test image doesn't have nft's man page installed). The
    # man-page check is completeness fluff, not syntax/dependency
    # validation — drop it. `--man=no` works on systemd 249+; the
    # newer `--no-man` form is 254+ only.
    - name: Validate unit file
      when: systemd_unit.changed
      command: systemd-analyze verify --man=no {{ _systemd_unit_dir }}/{{ systemd_unit_verify | default(systemd_unit_dest) | default(systemd_unit_src) }}
      register: systemd_verify
      changed_when: false
      failed_when: systemd_verify.rc != 0 or systemd_verify.stderr != ''
      become: true

    - name: Reload daemon
      when: systemd_unit.changed
      systemd:
        daemon_reload: true
        scope: "{{ _systemd_unit_scope }}"
      become: true
      become_user: "{{ systemd_unit_user | default('root') }}"

    # Expose the install result under a per-unit fact so callers can avoid
    # the ambiguous shared `systemd_unit` register (which is also the role
    # name and would be clobbered by a second template/copy call in the
    # same play). New callers should reference <basename>_<type>_result —
    # e.g. healthchecks.service → healthchecks_service_result, and
    # podman.socket / podman.service yield distinct facts.
    - name: Record install result for {{ systemd_unit_src }}
      set_fact:
        "{{ (systemd_unit_dest | default(systemd_unit_src)) | regex_replace('[^A-Za-z0-9_]', '_') }}_result": "{{ systemd_unit }}"

  # systemd-analyze verify takes a file path, so the unit has to land at
  # its production location first and is then validated in place. If
  # validate fails, the broken unit is already on disk and would break
  # the next daemon-reload for the whole host. The rescue restores the
  # .backup_file (or deletes the freshly-added unit) to keep the host in
  # its previous-known-good state. Don't trim this — without it any typo
  # in a unit template bricks `daemon-reload` host-wide. (Ansible's
  # template/copy `validate:` arg would let us check before placing, but
  # it doesn't fail on warnings; see the comment at the top of this file.)
  rescue:
    - name: Copy backup file to original
      when: '"backup_file" in systemd_unit'
      copy:
        remote_src: true
        dest: "{{ _systemd_unit_dir }}/{{ systemd_unit_dest | default(systemd_unit_src) }}"
        src: "{{ systemd_unit.backup_file }}"
        owner: root
        group: root
        mode: "0644"
      become: true

    - name: Delete backup file
      when: '"backup_file" in systemd_unit'
      file:
        path: "{{ systemd_unit.backup_file }}"
        state: absent
      become: true

    - name: Delete newly added file
      when: systemd_unit.changed and "backup_file" not in systemd_unit
      file:
        path: "{{ _systemd_unit_dir }}/{{ systemd_unit_dest | default(systemd_unit_src) }}"
        state: absent
      become: true

    - name: Record failure
      fail:
        msg: Unable to install systemd unit
