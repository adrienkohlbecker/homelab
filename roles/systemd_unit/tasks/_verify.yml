# Tests for the extract_podman_image module. Each scenario installs a fake
# unit, runs the module, asserts, and cleans up. systemctl daemon-reload +
# systemctl show forces systemd to parse the unit so its ExecStart properties
# show up on the bus where the module can read them.

- name: _verify | Install unit with single podman ExecStart
  copy:
    dest: /etc/systemd/system/extract_podman_image_test.service
    content: |
      [Unit]
      Description=extract_podman_image_test
      [Service]
      Type=oneshot
      ExecStart=/usr/bin/podman run --rm docker.io/library/alpine:3.19 true
    owner: root
    group: root
    mode: "0644"
  become: true

- name: _verify | Reload systemd so the new unit lands on the bus
  systemd:
    daemon_reload: true
  become: true

- name: _verify | Force systemd to load the unit so ExecStart is queryable  # noqa: command-instead-of-module
  command: systemctl show extract_podman_image_test.service
  changed_when: false
  become: true

- name: _verify | Extract image from normal unit
  extract_podman_image:
    name: extract_podman_image_test
  register: _systemd_unit_normal
  become: true

- name: _verify | Normal unit yields the single image and no unresolved argvs
  assert:
    that:
      - _systemd_unit_normal.images == ["docker.io/library/alpine:3.19"]
      - _systemd_unit_normal.unresolved == []
      # No User= declared → systemd's bus reports the empty string. The
      # service.yml pre-pull task treats "" and "root" identically (root-
      # scoped pull into /var/lib/containers/storage), so the empty-string
      # case must round-trip cleanly.
      - _systemd_unit_normal.user == ""

- name: _verify | Replace with a non-podman unit
  copy:
    dest: /etc/systemd/system/extract_podman_image_test.service
    content: |
      [Unit]
      Description=extract_podman_image_test
      [Service]
      Type=oneshot
      ExecStart=/bin/true
    owner: root
    group: root
    mode: "0644"
  become: true

- name: _verify | Reload systemd
  systemd:
    daemon_reload: true
  become: true

- name: _verify | Force load  # noqa: command-instead-of-module
  command: systemctl show extract_podman_image_test.service
  changed_when: false
  become: true

- name: _verify | Non-podman unit returns empty images and no unresolved argvs
  extract_podman_image:
    name: extract_podman_image_test
  register: _systemd_unit_nonpodman
  become: true

- name: _verify | Non-podman unit yields empty result
  assert:
    that:
      - _systemd_unit_nonpodman.images == []
      - _systemd_unit_nonpodman.unresolved == []

- name: _verify | Replace with a podman argv that has no positional image
  copy:
    dest: /etc/systemd/system/extract_podman_image_test.service
    content: |
      [Unit]
      Description=extract_podman_image_test
      [Service]
      Type=oneshot
      ExecStart=/usr/bin/podman run --rm
    owner: root
    group: root
    mode: "0644"
  become: true

- name: _verify | Reload systemd
  systemd:
    daemon_reload: true
  become: true

- name: _verify | Force load  # noqa: command-instead-of-module
  command: systemctl show extract_podman_image_test.service
  changed_when: false
  become: true

- name: _verify | Unresolvable podman argv fails the play
  extract_podman_image:
    name: extract_podman_image_test
  register: _systemd_unit_unresolvable
  become: true
  ignore_errors: true

- name: _verify | Unresolvable case surfaces a fail with the expected msg
  assert:
    that:
      - _systemd_unit_unresolvable.failed
      - "'no resolvable image' in _systemd_unit_unresolvable.msg"
      - _systemd_unit_unresolvable.argvs | length == 1

# User= round-trip: a unit that declares User=<x> must surface that name
# via the module's `user` return so service.yml can route the pre-pull
# into the right podman store. nobody exists on every Ubuntu so the
# fixture installs cleanly without inventing a system user.
- name: _verify | Replace with a unit that declares User=nobody
  copy:
    dest: /etc/systemd/system/extract_podman_image_test.service
    content: |
      [Unit]
      Description=extract_podman_image_test
      [Service]
      Type=oneshot
      User=nobody
      ExecStart=/usr/bin/podman run --rm docker.io/library/alpine:3.19 true
    owner: root
    group: root
    mode: "0644"
  become: true

- name: _verify | Reload systemd
  systemd:
    daemon_reload: true
  become: true

- name: _verify | Force load  # noqa: command-instead-of-module
  command: systemctl show extract_podman_image_test.service
  changed_when: false
  become: true

- name: _verify | Extract from User=nobody unit
  extract_podman_image:
    name: extract_podman_image_test
  register: _systemd_unit_user
  become: true

- name: _verify | User= populated unit surfaces the username
  assert:
    that:
      - _systemd_unit_user.images == ["docker.io/library/alpine:3.19"]
      - _systemd_unit_user.user == "nobody"
      - _systemd_unit_user.unresolved == []

- name: _verify | Cleanup test unit file
  file:
    path: /etc/systemd/system/extract_podman_image_test.service
    state: absent
  become: true

- name: _verify | Final daemon_reload
  systemd:
    daemon_reload: true
  become: true

# Install-path coverage: the rescue block fires on any systemd-analyze
# verify failure (validate runs against the unit *after* it lands at its
# production path), but the regular test matrix ships valid units only,
# so the rescue is never exercised — a regression there would silently
# brick the host's recovery path. The fixtures below install a good
# unit, then deliberately install one verify rejects (`Bogus=` in [Unit]
# is a stable trip-wire across systemd versions), and assert both rescue
# branches: backup-restore and fresh-file-delete.

- name: _verify | Install valid template via tasks_from=install
  import_role:
    name: systemd_unit
    tasks_from: install
  vars:
    systemd_unit_args:
      src: systemd_unit_verify_ok.service.j2

- name: _verify | First install set the per-unit fact and put file on disk
  block:
    - name: _verify | Stat verify_ok service after first install
      stat:
        path: /etc/systemd/system/systemd_unit_verify_ok.service
      register: _systemd_unit_ok_stat
    - name: _verify | Assert verify_ok result and file exist after first install
      assert:
        that:
          - systemd_unit_verify_ok_service_result is defined
          - systemd_unit_verify_ok_service_result.changed
          - _systemd_unit_ok_stat.stat.exists

- name: _verify | Re-install same template is idempotent
  import_role:
    name: systemd_unit
    tasks_from: install
  vars:
    systemd_unit_args:
      src: systemd_unit_verify_ok.service.j2

- name: _verify | Second install reported no change
  assert:
    that: not systemd_unit_verify_ok_service_result.changed

- name: _verify | Rescue restores backup when validate fails over a prior unit
  block:
    - name: _verify | Install broken unit over the good one (expect failure)
      import_role:
        name: systemd_unit
        tasks_from: install
      vars:
        systemd_unit_args:
          src: systemd_unit_verify_bad.service.j2
          dest: systemd_unit_verify_ok.service
    - name: _verify | Sentinel fail if bad-over-good install succeeded
      fail:
        msg: broken install over the good unit should have failed but did not
  rescue:
    - name: _verify | On-disk content reverted to the good unit
      command: grep -qF Description=systemd_unit_verify_ok /etc/systemd/system/systemd_unit_verify_ok.service
      changed_when: false

- name: _verify | Rescue deletes new file on fresh-install validate failure
  block:
    - name: _verify | Install broken unit fresh (expect failure)
      import_role:
        name: systemd_unit
        tasks_from: install
      vars:
        systemd_unit_args:
          src: systemd_unit_verify_bad.service.j2
    - name: _verify | Sentinel fail if fresh bad install succeeded
      fail:
        msg: broken install should have failed but did not
  rescue:
    - name: _verify | Stat verify_bad path after expected rescue
      stat:
        path: /etc/systemd/system/systemd_unit_verify_bad.service
      register: _systemd_unit_bad_stat
    - name: _verify | Assert fresh bad unit was deleted by rescue
      assert:
        that: not _systemd_unit_bad_stat.stat.exists

# Mask guardrail: `systemctl mask` lives as a symlink to /dev/null at the
# unit path, and operator intent is "do not start this." The install
# preamble refuses to overwrite that. Fixture pre-creates the symlink
# (no daemon-reload needed -- we never call systemctl, we just check
# the on-disk shape), tries to install over it, asserts the play failed
# AND the symlink survived.
- name: _verify | Pre-mask a test unit path
  file:
    src: /dev/null
    dest: /etc/systemd/system/systemd_unit_mask_test.service
    state: link
    force: true
  become: true

- name: _verify | Install over a masked unit (expect failure)
  block:
    - name: _verify | Attempt install over masked unit (should raise)
      import_role:
        name: systemd_unit
        tasks_from: install
      vars:
        systemd_unit_args:
          src: systemd_unit_verify_ok.service.j2
          dest: systemd_unit_mask_test.service
    - name: _verify | Sentinel fail if masked-unit install succeeded
      fail:
        msg: install over masked unit should have refused but did not
  rescue:
    - name: _verify | Stat mask-test path after expected install refusal
      stat:
        path: /etc/systemd/system/systemd_unit_mask_test.service
      register: _systemd_unit_masked_stat
    - name: _verify | Assert mask symlink survived the install refusal
      assert:
        that:
          - _systemd_unit_masked_stat.stat.islnk
          - _systemd_unit_masked_stat.stat.lnk_target == '/dev/null'

- name: _verify | Unmask + remove mask-test fixture
  file:
    path: /etc/systemd/system/systemd_unit_mask_test.service
    state: absent
  become: true

- name: _verify | Cleanup install-path test units
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/systemd/system/systemd_unit_verify_ok.service
    - /etc/systemd/system/systemd_unit_verify_bad.service
  become: true

- name: _verify | Daemon-reload after install-path cleanup
  systemd:
    daemon_reload: true
  become: true

# Smoke the copy dispatch (extension-derived): src without .j2 picks the
# copy module so install.yml reads from files/ rather than templates/.
- name: _verify | Install valid unit via tasks_from=install (copy path)
  import_role:
    name: systemd_unit
    tasks_from: install
  vars:
    systemd_unit_args:
      src: systemd_unit_verify_copy_ok.service

- name: _verify | Copy-path install set the per-unit fact and put file on disk
  block:
    - name: _verify | Stat verify_copy_ok service after copy-path install
      stat:
        path: /etc/systemd/system/systemd_unit_verify_copy_ok.service
      register: _systemd_unit_copy_stat
    - name: _verify | Assert verify_copy_ok result and file exist after install
      assert:
        that:
          - systemd_unit_verify_copy_ok_service_result is defined
          - systemd_unit_verify_copy_ok_service_result.changed
          - _systemd_unit_copy_stat.stat.exists

# Drop-in entrypoint smoke test. dropin.yml derives dest as
# <unit>.d/override.conf and verify as the parent unit, so the override
# is validated as part of the composed unit. Layer over the still-installed
# copy-path fixture (cleanup is shared below).
- name: _verify | Install drop-in via tasks_from=dropin
  import_role:
    name: systemd_unit
    tasks_from: dropin
  vars:
    systemd_unit_args:
      src: systemd_unit_verify_dropin.conf
      for: systemd_unit_verify_copy_ok.service

- name: _verify | Drop-in landed under <unit>.d and carries the expected line
  block:
    - name: _verify | Stat drop-in override.conf path
      stat:
        path: /etc/systemd/system/systemd_unit_verify_copy_ok.service.d/override.conf
      register: _systemd_unit_dropin_stat
    - name: _verify | Assert drop-in carries the expected Environment line
      command: grep -qF Environment=DROPIN_TEST=1 /etc/systemd/system/systemd_unit_verify_copy_ok.service.d/override.conf
      changed_when: false
    - name: _verify | Assert drop-in is a regular file (not a symlink)
      assert:
        that:
          - _systemd_unit_dropin_stat.stat.exists
          - not _systemd_unit_dropin_stat.stat.islnk

# Absolute-path dropin mode: dest_abs lets callers place daemon-config
# drop-ins (journald.conf.d/, resolved.conf.d/) at arbitrary absolute
# paths. The path derivation and fact-name computation differ from the
# default mode, so exercise them separately.
- name: _verify | Install drop-in via dest_abs mode
  import_role:
    name: systemd_unit
    tasks_from: dropin
  vars:
    systemd_unit_args:
      src: systemd_unit_verify_dropin.conf
      for: systemd_unit_verify_copy_ok.service
      dest_abs: /etc/systemd/system/systemd_unit_verify_copy_ok.service.d/99-abs-test.conf

- name: _verify | Absolute-path drop-in landed at dest_abs path
  block:
    - name: _verify | Stat dest_abs drop-in path
      stat:
        path: /etc/systemd/system/systemd_unit_verify_copy_ok.service.d/99-abs-test.conf
      register: _systemd_unit_abs_dropin_stat
    - name: _verify | Assert dest_abs drop-in exists and carries the expected line
      assert:
        that:
          - _systemd_unit_abs_dropin_stat.stat.exists
          - not _systemd_unit_abs_dropin_stat.stat.islnk
    - name: _verify | Assert dest_abs drop-in content
      command: grep -qF Environment=DROPIN_TEST=1 /etc/systemd/system/systemd_unit_verify_copy_ok.service.d/99-abs-test.conf
      changed_when: false

- name: _verify | Cleanup drop-in directory
  file:
    path: /etc/systemd/system/systemd_unit_verify_copy_ok.service.d
    state: absent
  become: true

- name: _verify | Cleanup copy-path test unit
  file:
    path: /etc/systemd/system/systemd_unit_verify_copy_ok.service
    state: absent
  become: true

- name: _verify | Daemon-reload after copy-path cleanup
  systemd:
    daemon_reload: true
  become: true

# Remove-path coverage: parallels the install-path block above. Install a
# fresh fixture so this section is independent of state left by prior
# scenarios, then exercise the three observable behaviours of
# tasks_from=remove: deletes-on-first-call, idempotent on second call,
# refuses to delete a mask.
- name: _verify | Install fixture for remove-path tests
  import_role:
    name: systemd_unit
    tasks_from: install
  vars:
    systemd_unit_args:
      src: systemd_unit_verify_ok.service.j2

- name: _verify | Remove via tasks_from=remove
  import_role:
    name: systemd_unit
    tasks_from: remove
  vars:
    systemd_unit_args:
      dest: systemd_unit_verify_ok.service

- name: _verify | First remove deleted the file and reported changed
  block:
    - name: _verify | Stat verify_ok path after remove
      stat:
        path: /etc/systemd/system/systemd_unit_verify_ok.service
      register: _systemd_unit_removed_stat
    - name: _verify | Assert verify_ok result shows changed and file is gone
      assert:
        that:
          - systemd_unit_verify_ok_service_result is defined
          - systemd_unit_verify_ok_service_result.changed
          - not _systemd_unit_removed_stat.stat.exists

- name: _verify | Re-remove same unit is idempotent
  import_role:
    name: systemd_unit
    tasks_from: remove
  vars:
    systemd_unit_args:
      dest: systemd_unit_verify_ok.service

- name: _verify | Second remove reported no change
  assert:
    that: not systemd_unit_verify_ok_service_result.changed

# Mask guardrail (symmetric with the install-path mask test): a
# pre-existing symlink to /dev/null is operator intent that `rm`
# must not silently undo.
- name: _verify | Pre-mask a test unit path
  file:
    src: /dev/null
    dest: /etc/systemd/system/systemd_unit_remove_mask_test.service
    state: link
    force: true
  become: true

- name: _verify | Remove a masked unit (expect failure)
  block:
    - name: _verify | Attempt to remove a masked unit (should raise)
      import_role:
        name: systemd_unit
        tasks_from: remove
      vars:
        systemd_unit_args:
          dest: systemd_unit_remove_mask_test.service
    - name: _verify | Sentinel fail if remove succeeded (should not reach here)
      fail:
        msg: remove of a masked unit should have refused but did not
  rescue:
    - name: _verify | Stat mask-test path after expected refusal
      stat:
        path: /etc/systemd/system/systemd_unit_remove_mask_test.service
      register: _systemd_unit_remove_masked_stat
    - name: _verify | Assert mask is still intact after refusal
      assert:
        that:
          - _systemd_unit_remove_masked_stat.stat.islnk
          - _systemd_unit_remove_masked_stat.stat.lnk_target == '/dev/null'

- name: _verify | Unmask + remove the mask-test fixture
  file:
    path: /etc/systemd/system/systemd_unit_remove_mask_test.service
    state: absent
  become: true

# --- service.yml coverage ---
# The service entrypoint (enable, start, restart, reload, pre-pull) is
# the most-called path (~68 services) and has the most conditional logic.
# Exercise the core lifecycle: install → start → idempotent re-start →
# restart-on-change → cleanup.

- name: _verify | Install fixture for service-path tests
  import_role:
    name: systemd_unit
    tasks_from: install
  vars:
    systemd_unit_args:
      src: systemd_unit_verify_ok.service.j2

- name: _verify | Start the fixture via tasks_from=service
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: systemd_unit_verify_ok.service.j2

- name: _verify | Unit is active after first start  # noqa: command-instead-of-module
  command: systemctl is-active systemd_unit_verify_ok.service
  changed_when: false

- name: _verify | Re-run service (idempotent — already active, no restart)
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: systemd_unit_verify_ok.service.j2

- name: _verify | Restart fires when requested
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: systemd_unit_verify_ok.service.j2
      restart: true

- name: _verify | Unit is still active after restart  # noqa: command-instead-of-module
  command: systemctl is-active systemd_unit_verify_ok.service
  changed_when: false

# Reload path: verify_ok.service.j2 now carries ExecReload=/bin/true so
# CanReload=yes. Drive reload: true while the unit is active (started above)
# so systemd_unit_started.changed is false and the reload task fires.
- name: _verify | Reload fires when ExecReload is present
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: systemd_unit_verify_ok.service.j2
      reload: true

- name: _verify | Unit is still active after reload  # noqa: command-instead-of-module
  command: systemctl is-active systemd_unit_verify_ok.service
  changed_when: false

# Sad path: a unit with no ExecReload= must raise the actionable message.
# Install a fresh oneshot+RemainAfterExit fixture without ExecReload, start
# it (so it is active), then call service with reload: true and assert the
# play fails with the CanReload message.
- name: _verify | Install a non-reloadable fixture for the CanReload=no test
  copy:
    dest: /etc/systemd/system/systemd_unit_verify_noreload.service
    content: |
      [Unit]
      Description=systemd_unit_verify_noreload
      [Service]
      Type=oneshot
      RemainAfterExit=yes
      ExecStart=/bin/true
      [Install]
      WantedBy=multi-user.target
    owner: root
    group: root
    mode: "0644"
  become: true

- name: _verify | Reload systemd for non-reloadable fixture
  systemd:
    daemon_reload: true
  become: true

- name: _verify | Start the non-reloadable fixture so it is active
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      dest: systemd_unit_verify_noreload.service

- name: _verify | Reload on a non-reloadable unit must fail with CanReload message
  block:
    - name: _verify | Attempt reload on non-reloadable unit (should raise)
      import_role:
        name: systemd_unit
        tasks_from: service
      vars:
        systemd_unit_args:
          dest: systemd_unit_verify_noreload.service
          reload: true
    - name: _verify | Sentinel fail if reload on non-reloadable unit succeeded
      fail:
        msg: reload on a unit with no ExecReload= should have failed but did not
  rescue:
    - name: _verify | Assert the failure carried the CanReload message
      assert:
        that: "'CanReload' in ansible_failed_result.msg"

- name: _verify | Cleanup non-reloadable fixture
  import_role:
    name: systemd_unit
    tasks_from: remove
  vars:
    systemd_unit_args:
      dest: systemd_unit_verify_noreload.service

- name: _verify | Start=false skips lifecycle
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: systemd_unit_verify_ok.service.j2
      start: false

- name: _verify | Cleanup service-path fixture
  import_role:
    name: systemd_unit
    tasks_from: remove
  vars:
    systemd_unit_args:
      dest: systemd_unit_verify_ok.service

- name: _verify | Daemon-reload after service-path cleanup
  systemd:
    daemon_reload: true
  become: true

# Pre-pull integration: the service entrypoint's headline feature -- detect
# the unit's podman image over D-Bus, then pull it into the right store
# *before* systemctl start -- is otherwise exercised only as an isolated
# module (extract_podman_image, above), never wired through
# tasks_from: service. Drive a unit with a real `podman run` ExecStart
# through `service` with start: false, so only enable + detect + pre-pull
# run (the container never starts), then prove the image landed in the store
# by the pre-pull alone. busybox is the Nexus-mirrored probe image the
# podman role's own _verify uses, so the pull is reliable under qemu.
- name: _verify | Remove the probe image so the pre-pull is observable
  command: podman rmi -f docker.io/library/busybox
  changed_when: false
  failed_when: false
  become: true

- name: _verify | Install a unit whose ExecStart runs a real podman image
  copy:
    dest: /etc/systemd/system/systemd_unit_verify_podman.service
    content: |
      [Unit]
      Description=systemd_unit_verify_podman
      [Service]
      Type=oneshot
      ExecStart=/usr/bin/podman run --rm docker.io/library/busybox true
      [Install]
      WantedBy=multi-user.target
    owner: root
    group: root
    mode: "0644"
  become: true

- name: _verify | Reload so the podman unit lands on the bus
  systemd:
    daemon_reload: true
  become: true

- name: _verify | Pre-pull via tasks_from=service with start=false to isolate the pull
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      dest: systemd_unit_verify_podman.service
      start: false

- name: _verify | Detect step surfaced the unit's image through the role
  assert:
    that:
      - systemd_unit_podman_images.images == ["docker.io/library/busybox"]
      - systemd_unit_podman_images.user == ""

- name: _verify | Pre-pull placed the image in the store (container never started)
  command: podman image exists docker.io/library/busybox
  changed_when: false
  become: true

- name: _verify | Cleanup pre-pull integration fixture
  import_role:
    name: systemd_unit
    tasks_from: remove
  vars:
    systemd_unit_args:
      dest: systemd_unit_verify_podman.service

- name: _verify | Remove the probe image after the integration test
  command: podman rmi -f docker.io/library/busybox
  changed_when: false
  failed_when: false
  become: true

- name: _verify | Daemon-reload after pre-pull integration cleanup
  systemd:
    daemon_reload: true
  become: true
