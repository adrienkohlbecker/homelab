# Tests for the extract_podman_image module. Each scenario installs a fake
# unit, runs the module, asserts, and cleans up. systemctl daemon-reload +
# systemctl show forces systemd to parse the unit so its ExecStart properties
# show up on the bus where the module can read them.

- name: _verify | Install unit with single podman ExecStart
  copy:
    dest: /etc/systemd/system/extract_podman_image_test.service
    content: |
      [Unit]
      Description=extract_podman_image_test
      [Service]
      Type=oneshot
      ExecStart=/usr/bin/podman run --rm docker.io/library/alpine:3.19 true
    owner: root
    group: root
    mode: "0644"
  become: true

- name: _verify | Reload systemd so the new unit lands on the bus
  systemd:
    daemon_reload: true
  become: true

- name: _verify | Force systemd to load the unit so ExecStart is queryable  # noqa: command-instead-of-module
  command: systemctl show extract_podman_image_test.service
  changed_when: false
  become: true

- name: _verify | Extract image from normal unit
  extract_podman_image:
    name: extract_podman_image_test
  register: _verify_normal
  become: true

- name: _verify | Normal unit yields the single image and no unresolved argvs
  assert:
    that:
      - _verify_normal.images == ["docker.io/library/alpine:3.19"]
      - _verify_normal.unresolved == []
      # No User= declared → systemd's bus reports the empty string. The
      # service.yml pre-pull task treats "" and "root" identically (root-
      # scoped pull into /var/lib/containers/storage), so the empty-string
      # case must round-trip cleanly.
      - _verify_normal.user == ""

- name: _verify | Replace with a non-podman unit
  copy:
    dest: /etc/systemd/system/extract_podman_image_test.service
    content: |
      [Unit]
      Description=extract_podman_image_test
      [Service]
      Type=oneshot
      ExecStart=/bin/true
    owner: root
    group: root
    mode: "0644"
  become: true

- name: _verify | Reload systemd
  systemd:
    daemon_reload: true
  become: true

- name: _verify | Force load  # noqa: command-instead-of-module
  command: systemctl show extract_podman_image_test.service
  changed_when: false
  become: true

- name: _verify | Non-podman unit returns empty images and no unresolved argvs
  extract_podman_image:
    name: extract_podman_image_test
  register: _verify_nonpodman
  become: true

- name: _verify | Non-podman unit yields empty result
  assert:
    that:
      - _verify_nonpodman.images == []
      - _verify_nonpodman.unresolved == []

- name: _verify | Replace with a podman argv that has no positional image
  copy:
    dest: /etc/systemd/system/extract_podman_image_test.service
    content: |
      [Unit]
      Description=extract_podman_image_test
      [Service]
      Type=oneshot
      ExecStart=/usr/bin/podman run --rm
    owner: root
    group: root
    mode: "0644"
  become: true

- name: _verify | Reload systemd
  systemd:
    daemon_reload: true
  become: true

- name: _verify | Force load  # noqa: command-instead-of-module
  command: systemctl show extract_podman_image_test.service
  changed_when: false
  become: true

- name: _verify | Unresolvable podman argv fails the play
  extract_podman_image:
    name: extract_podman_image_test
  register: _verify_unresolvable
  become: true
  ignore_errors: true

- name: _verify | Unresolvable case surfaces a fail with the expected msg
  assert:
    that:
      - _verify_unresolvable.failed
      - "'no resolvable image' in _verify_unresolvable.msg"
      - _verify_unresolvable.argvs | length == 1

# User= round-trip: a unit that declares User=<x> must surface that name
# via the module's `user` return so service.yml can route the pre-pull
# into the right podman store. nobody exists on every Ubuntu so the
# fixture installs cleanly without inventing a system user.
- name: _verify | Replace with a unit that declares User=nobody
  copy:
    dest: /etc/systemd/system/extract_podman_image_test.service
    content: |
      [Unit]
      Description=extract_podman_image_test
      [Service]
      Type=oneshot
      User=nobody
      ExecStart=/usr/bin/podman run --rm docker.io/library/alpine:3.19 true
    owner: root
    group: root
    mode: "0644"
  become: true

- name: _verify | Reload systemd
  systemd:
    daemon_reload: true
  become: true

- name: _verify | Force load  # noqa: command-instead-of-module
  command: systemctl show extract_podman_image_test.service
  changed_when: false
  become: true

- name: _verify | Extract from User=nobody unit
  extract_podman_image:
    name: extract_podman_image_test
  register: _verify_user
  become: true

- name: _verify | User= populated unit surfaces the username
  assert:
    that:
      - _verify_user.images == ["docker.io/library/alpine:3.19"]
      - _verify_user.user == "nobody"
      - _verify_user.unresolved == []

- name: _verify | Cleanup test unit file
  file:
    path: /etc/systemd/system/extract_podman_image_test.service
    state: absent
  become: true

- name: _verify | Final daemon_reload
  systemd:
    daemon_reload: true
  become: true

# Install-path coverage: the rescue block fires on any systemd-analyze
# verify failure (validate runs against the unit *after* it lands at its
# production path), but the regular test matrix ships valid units only,
# so the rescue is never exercised — a regression there would silently
# brick the host's recovery path. The fixtures below install a good
# unit, then deliberately install one verify rejects (`Bogus=` in [Unit]
# is a stable trip-wire across systemd versions), and assert both rescue
# branches: backup-restore and fresh-file-delete.

- name: _verify | Install valid template via tasks_from=install
  import_role:
    name: systemd_unit
    tasks_from: install
  vars:
    systemd_unit_args:
      src: systemd_unit_verify_ok.service.j2

- name: _verify | First install set the per-unit fact and put file on disk
  block:
    - name: _verify | Stat verify_ok service after first install
      stat:
        path: /etc/systemd/system/systemd_unit_verify_ok.service
      register: _verify_ok_stat
    - name: _verify | Assert verify_ok result and file exist after first install
      assert:
        that:
          - systemd_unit_verify_ok_service_result is defined
          - systemd_unit_verify_ok_service_result.changed
          - _verify_ok_stat.stat.exists

- name: _verify | Re-install same template is idempotent
  import_role:
    name: systemd_unit
    tasks_from: install
  vars:
    systemd_unit_args:
      src: systemd_unit_verify_ok.service.j2

- name: _verify | Second install reported no change
  assert:
    that: not systemd_unit_verify_ok_service_result.changed

- name: _verify | Rescue restores backup when validate fails over a prior unit
  block:
    - name: _verify | Install broken unit over the good one (expect failure)
      import_role:
        name: systemd_unit
        tasks_from: install
      vars:
        systemd_unit_args:
          src: systemd_unit_verify_bad.service.j2
          dest: systemd_unit_verify_ok.service
    - name: _verify | Sentinel fail if bad-over-good install succeeded
      fail:
        msg: broken install over the good unit should have failed but did not
  rescue:
    - name: _verify | On-disk content reverted to the good unit
      command: grep -qF Description=systemd_unit_verify_ok /etc/systemd/system/systemd_unit_verify_ok.service
      changed_when: false

- name: _verify | Rescue deletes new file on fresh-install validate failure
  block:
    - name: _verify | Install broken unit fresh (expect failure)
      import_role:
        name: systemd_unit
        tasks_from: install
      vars:
        systemd_unit_args:
          src: systemd_unit_verify_bad.service.j2
    - name: _verify | Sentinel fail if fresh bad install succeeded
      fail:
        msg: broken install should have failed but did not
  rescue:
    - name: _verify | Stat verify_bad path after expected rescue
      stat:
        path: /etc/systemd/system/systemd_unit_verify_bad.service
      register: _verify_bad_stat
    - name: _verify | Assert fresh bad unit was deleted by rescue
      assert:
        that: not _verify_bad_stat.stat.exists

# Mask guardrail: `systemctl mask` lives as a symlink to /dev/null at the
# unit path, and operator intent is "do not start this." The install
# preamble refuses to overwrite that. Fixture pre-creates the symlink
# (no daemon-reload needed -- we never call systemctl, we just check
# the on-disk shape), tries to install over it, asserts the play failed
# AND the symlink survived.
- name: _verify | Pre-mask a test unit path
  file:
    src: /dev/null
    dest: /etc/systemd/system/systemd_unit_mask_test.service
    state: link
    force: true
  become: true

- name: _verify | Install over a masked unit (expect failure)
  block:
    - name: _verify | Attempt install over masked unit (should raise)
      import_role:
        name: systemd_unit
        tasks_from: install
      vars:
        systemd_unit_args:
          src: systemd_unit_verify_ok.service.j2
          dest: systemd_unit_mask_test.service
    - name: _verify | Sentinel fail if masked-unit install succeeded
      fail:
        msg: install over masked unit should have refused but did not
  rescue:
    - name: _verify | Stat mask-test path after expected install refusal
      stat:
        path: /etc/systemd/system/systemd_unit_mask_test.service
      register: _verify_masked_stat
    - name: _verify | Assert mask symlink survived the install refusal
      assert:
        that:
          - _verify_masked_stat.stat.islnk
          - _verify_masked_stat.stat.lnk_target == '/dev/null'

- name: _verify | Unmask + remove mask-test fixture
  file:
    path: /etc/systemd/system/systemd_unit_mask_test.service
    state: absent
  become: true

- name: _verify | Cleanup install-path test units
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/systemd/system/systemd_unit_verify_ok.service
    - /etc/systemd/system/systemd_unit_verify_bad.service
  become: true

- name: _verify | Daemon-reload after install-path cleanup
  systemd:
    daemon_reload: true
  become: true

# Smoke the copy dispatch (extension-derived): src without .j2 picks the
# copy module so install.yml reads from files/ rather than templates/.
- name: _verify | Install valid unit via tasks_from=install (copy path)
  import_role:
    name: systemd_unit
    tasks_from: install
  vars:
    systemd_unit_args:
      src: systemd_unit_verify_copy_ok.service

- name: _verify | Copy-path install set the per-unit fact and put file on disk
  block:
    - name: _verify | Stat verify_copy_ok service after copy-path install
      stat:
        path: /etc/systemd/system/systemd_unit_verify_copy_ok.service
      register: _verify_copy_stat
    - name: _verify | Assert verify_copy_ok result and file exist after install
      assert:
        that:
          - systemd_unit_verify_copy_ok_service_result is defined
          - systemd_unit_verify_copy_ok_service_result.changed
          - _verify_copy_stat.stat.exists

# Drop-in entrypoint smoke test. dropin.yml derives dest as
# <unit>.d/override.conf and verify as the parent unit, so the override
# is validated as part of the composed unit. Layer over the still-installed
# copy-path fixture (cleanup is shared below).
- name: _verify | Install drop-in via tasks_from=dropin
  import_role:
    name: systemd_unit
    tasks_from: dropin
  vars:
    systemd_unit_args:
      src: systemd_unit_verify_dropin.conf
      for: systemd_unit_verify_copy_ok.service

- name: _verify | Drop-in landed under <unit>.d and carries the expected line
  block:
    - name: _verify | Stat drop-in override.conf path
      stat:
        path: /etc/systemd/system/systemd_unit_verify_copy_ok.service.d/override.conf
      register: _verify_dropin_stat
    - name: _verify | Assert drop-in carries the expected Environment line
      command: grep -qF Environment=DROPIN_TEST=1 /etc/systemd/system/systemd_unit_verify_copy_ok.service.d/override.conf
      changed_when: false
    - name: _verify | Assert drop-in is a regular file (not a symlink)
      assert:
        that:
          - _verify_dropin_stat.stat.exists
          - not _verify_dropin_stat.stat.islnk

- name: _verify | Cleanup drop-in directory
  file:
    path: /etc/systemd/system/systemd_unit_verify_copy_ok.service.d
    state: absent
  become: true

- name: _verify | Cleanup copy-path test unit
  file:
    path: /etc/systemd/system/systemd_unit_verify_copy_ok.service
    state: absent
  become: true

- name: _verify | Daemon-reload after copy-path cleanup
  systemd:
    daemon_reload: true
  become: true

# Remove-path coverage: parallels the install-path block above. Install a
# fresh fixture so this section is independent of state left by prior
# scenarios, then exercise the three observable behaviours of
# tasks_from=remove: deletes-on-first-call, idempotent on second call,
# refuses to delete a mask.
- name: _verify | Install fixture for remove-path tests
  import_role:
    name: systemd_unit
    tasks_from: install
  vars:
    systemd_unit_args:
      src: systemd_unit_verify_ok.service.j2

- name: _verify | Remove via tasks_from=remove
  import_role:
    name: systemd_unit
    tasks_from: remove
  vars:
    systemd_unit_args:
      dest: systemd_unit_verify_ok.service

- name: _verify | First remove deleted the file and reported changed
  block:
    - name: _verify | Stat verify_ok path after remove
      stat:
        path: /etc/systemd/system/systemd_unit_verify_ok.service
      register: _verify_removed_stat
    - name: _verify | Assert verify_ok result shows changed and file is gone
      assert:
        that:
          - systemd_unit_verify_ok_service_result is defined
          - systemd_unit_verify_ok_service_result.changed
          - not _verify_removed_stat.stat.exists

- name: _verify | Re-remove same unit is idempotent
  import_role:
    name: systemd_unit
    tasks_from: remove
  vars:
    systemd_unit_args:
      dest: systemd_unit_verify_ok.service

- name: _verify | Second remove reported no change
  assert:
    that: not systemd_unit_verify_ok_service_result.changed

# Mask guardrail (symmetric with the install-path mask test): a
# pre-existing symlink to /dev/null is operator intent that `rm`
# must not silently undo.
- name: _verify | Pre-mask a test unit path
  file:
    src: /dev/null
    dest: /etc/systemd/system/systemd_unit_remove_mask_test.service
    state: link
    force: true
  become: true

- name: _verify | Remove a masked unit (expect failure)
  block:
    - name: _verify | Attempt to remove a masked unit (should raise)
      import_role:
        name: systemd_unit
        tasks_from: remove
      vars:
        systemd_unit_args:
          dest: systemd_unit_remove_mask_test.service
    - name: _verify | Sentinel fail if remove succeeded (should not reach here)
      fail:
        msg: remove of a masked unit should have refused but did not
  rescue:
    - name: _verify | Stat mask-test path after expected refusal
      stat:
        path: /etc/systemd/system/systemd_unit_remove_mask_test.service
      register: _verify_remove_masked_stat
    - name: _verify | Assert mask is still intact after refusal
      assert:
        that:
          - _verify_remove_masked_stat.stat.islnk
          - _verify_remove_masked_stat.stat.lnk_target == '/dev/null'

- name: _verify | Unmask + remove the mask-test fixture
  file:
    path: /etc/systemd/system/systemd_unit_remove_mask_test.service
    state: absent
  become: true
