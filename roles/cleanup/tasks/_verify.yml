# Removal-only role; no positive function to exercise. Apt's own
# state=absent already proves the packages aren't installed, so we
# only assert the harder-to-catch residue: snap binary, snapd
# systemd units, squashfs mounts that survive a botched purge.

- name: _verify | Probe for snap binary
  command: which snap
  register: _cleanup_verify_snap_bin
  changed_when: false
  failed_when: _cleanup_verify_snap_bin.rc == 0

- name: _verify | List residual snapd unit files
  command: systemctl list-unit-files --no-legend 'snapd.*'
  register: _cleanup_verify_snapd_units
  changed_when: false

- name: _verify | Assert no snapd systemd unit files remain
  assert:
    that:
      - _cleanup_verify_snapd_units.stdout | trim | length == 0
    fail_msg: "Residual snapd unit files:\n{{ _cleanup_verify_snapd_units.stdout }}"

- name: _verify | Look for residual squashfs mounts (snap leftovers)
  # findmnt(8): rc=0 = match found, rc=1 = no match. Any other rc
  # is an unexpected failure (binary missing, etc.) — surface it.
  command: findmnt --first-only --noheadings --types squashfs
  register: _cleanup_verify_squashfs_mounts
  changed_when: false
  failed_when: _cleanup_verify_squashfs_mounts.rc not in [0, 1]

- name: _verify | Assert no squashfs (snap) mounts remain
  assert:
    that:
      - _cleanup_verify_squashfs_mounts.rc == 1
    fail_msg: "Residual snap mounts present:\n{{ _cleanup_verify_squashfs_mounts.stdout }}"
