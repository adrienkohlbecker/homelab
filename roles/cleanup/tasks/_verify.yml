# Removal-only role; no positive function to exercise. Apt's own
# state=absent already proves the packages aren't installed, so we
# assert the harder-to-catch residue: snap binary, snapd as a live
# unit, snapd unit files on disk, squashfs mounts, runtime data
# roots, plus the apt pin that keeps snapd from being reseeded.

- name: _verify | Probe for snap binary
  stat:
    path: /usr/bin/snap
  register: _cleanup_verify_snap_bin

- name: _verify | Assert snap binary is gone
  assert:
    that:
      - not _cleanup_verify_snap_bin.stat.exists
    fail_msg: "/usr/bin/snap still present"

- name: _verify | Gather service facts
  service_facts:

- name: _verify | Assert snapd.socket is gone from systemd's view
  assert:
    that:
      - "'snapd.socket' not in ansible_facts.services"
    fail_msg: "snapd.socket still known to systemd: {{ ansible_facts.services['snapd.socket'] | default('') }}"

- name: _verify | Find residual snapd unit files on disk
  find:
    paths:
      - /lib/systemd/system
      - /usr/lib/systemd/system
      - /etc/systemd/system
    patterns: snapd*
    file_type: any
    recurse: true
  register: _cleanup_verify_snapd_units

- name: _verify | Assert no snapd systemd unit files remain
  assert:
    that:
      - _cleanup_verify_snapd_units.files | length == 0
    fail_msg: "Residual snapd unit files: {{ _cleanup_verify_snapd_units.files | map(attribute='path') | list }}"

- name: _verify | Look for residual squashfs mounts (snap leftovers)
  # findmnt(8) only guarantees rc=0=match / rc=1=no-match in
  # --first-only mode; tree mode returns rc=0 even with no matches.
  # We sacrifice "list every stuck mount in fail_msg" for the clean
  # rc semantics the assert below relies on.
  command: findmnt --first-only --noheadings --types squashfs
  register: _cleanup_verify_squashfs_mounts
  changed_when: false
  failed_when: _cleanup_verify_squashfs_mounts.rc not in [0, 1]

- name: _verify | Assert no squashfs (snap) mounts remain
  assert:
    that:
      - _cleanup_verify_squashfs_mounts.rc == 1
    fail_msg: "Residual snap mounts present:\n{{ _cleanup_verify_squashfs_mounts.stdout }}"

- name: _verify | Probe snap data roots
  stat:
    path: "{{ item }}"
  register: _cleanup_verify_data_roots
  loop:
    - /var/snap
    - /var/lib/snapd
    - /var/cache/snapd
    - /root/snap
  become: true  # /root is mode 0700 so /root/snap stat needs root

- name: _verify | Assert no snap data roots remain
  assert:
    that:
      - not item.stat.exists
    fail_msg: "Residual snap data root: {{ item.item }}"
  loop: "{{ _cleanup_verify_data_roots.results }}"
  loop_control:
    label: "{{ item.item }}"

- name: _verify | Assert nosnap apt pin is in place
  stat:
    path: /etc/apt/preferences.d/nosnap.pref
  register: _cleanup_verify_nosnap_pin
  failed_when: not _cleanup_verify_nosnap_pin.stat.exists

# Exercise prune_ansible_backups: it must evict a backup whose FILENAME
# timestamp is older than the cutoff, keep a fresh one, and never touch files
# that don't match the ansible <name>.<pid>.<ts>~ pattern. The fresh fixture's
# timestamp is taken from the target's own clock so it can't drift stale.
- name: _verify | Capture a 'now' timestamp for the fresh fixture
  command: date +%Y-%m-%d@%H:%M:%S
  register: _cleanup_verify_now
  changed_when: false

- name: _verify | Create the prune fixture dir
  file:
    path: /etc/_verify_prune
    state: directory
    mode: "0755"
  become: true

- name: _verify | Plant prune fixtures
  copy:
    dest: "{{ item }}"
    content: x
    mode: "0644"
  loop:
    - /etc/_verify_prune/old.111.2020-01-01@00:00:00~                  # > 7d → pruned
    - /etc/_verify_prune/fresh.222.{{ _cleanup_verify_now.stdout }}~   # today → kept
    - /etc/_verify_prune/notkept.txt                                   # no ~ → never matched
    - /etc/_verify_prune/editor~                                       # bare ~, wrong shape → kept
  become: true

- name: _verify | Run the prune scoped to the fixture dir
  command:
    argv:
      - /usr/local/sbin/prune_ansible_backups
      - /etc/_verify_prune
  changed_when: false
  become: true

- name: _verify | Stat the prune fixtures
  stat:
    path: "{{ item }}"
  loop:
    - /etc/_verify_prune/old.111.2020-01-01@00:00:00~
    - /etc/_verify_prune/fresh.222.{{ _cleanup_verify_now.stdout }}~
    - /etc/_verify_prune/notkept.txt
    - /etc/_verify_prune/editor~
  register: _cleanup_verify_prune
  become: true

- name: _verify | Assert old pruned, fresh + non-matching kept
  assert:
    that:
      - not _cleanup_verify_prune.results[0].stat.exists
      - _cleanup_verify_prune.results[1].stat.exists
      - _cleanup_verify_prune.results[2].stat.exists
      - _cleanup_verify_prune.results[3].stat.exists
    fail_msg: prune did not honor the 7-day cutoff / ansible-backup pattern

- name: _verify | Clean up the prune fixture dir
  file:
    path: /etc/_verify_prune
    state: absent
  become: true
