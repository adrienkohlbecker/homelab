# This role is purely removal — there's no positive "function" to
# exercise — so this is the state-check exception CLAUDE.md allows.
# On packer-built ZFS boxes none of these were ever installed and the
# asserts pass trivially; the value is regression coverage that catches
# a future role transitively pulling any of them back in.

- name: _verify | Re-gather package facts
  ansible.builtin.package_facts:
    manager: apt
  check_mode: false

- name: _verify | Assert cleanup target packages are absent
  ansible.builtin.assert:
    that:
      - item not in ansible_facts.packages
    fail_msg: "{{ item }} is still installed after cleanup"
  loop:
    - ufw
    - cloud-init
    - snapd
    - fwupd
    - os-prober

- name: _verify | Look for residual squashfs mounts (snap leftovers)
  ansible.builtin.command:
    cmd: findmnt --noheadings --types squashfs
  register: cleanup_verify_squashfs_mounts
  changed_when: false
  # findmnt exits 0 even when there are no matches (it reserves rc=1
  # for actual errors), so we can't gate on rc — fall back to parsing
  # stdout. failed_when: false keeps a true error from masking that.
  failed_when: false

- name: _verify | Assert no squashfs (snap) mounts remain
  ansible.builtin.assert:
    that:
      - cleanup_verify_squashfs_mounts.stdout | trim | length == 0
    fail_msg: "Residual snap mounts present:\n{{ cleanup_verify_squashfs_mounts.stdout }}"
