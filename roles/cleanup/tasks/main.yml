# Purge baseline packages we don't want and any snaps that came with
# the upstream image. Converges two host lineages: packer-built ZFS
# boxes (debootstrap'd — none of this is ever present, role no-ops)
# and vanilla Ubuntu cloud images / server ISOs (the `minimal` test
# variant + any future cloud VMs) where cloud-init / snapd / fwupd
# come preinstalled.

- name: Probe for snap binary
  stat:
    path: /usr/bin/snap
  register: _cleanup_snap_bin
  check_mode: false
  become: true
  tags:
    - cleanup

# `snap remove --purge --terminate`: --purge skips snapshot saving
# (no separate snap-forget cleanup needed); --terminate stops the
# snap's processes and unmounts its squashfs before removing (no
# separate mount-stop pass needed). Removal MUST be ordered apps →
# bases → snapd: snapd refuses to remove a base (core*/bare) while an
# app still depends on it (e.g. lxd pins core20), and snapd itself
# goes last. `snap list` is alphabetical, not dependency-ordered, so
# a naive head -1 picks core20 before lxd and spins until it gives
# up — we instead tag each snap with a removal priority (app=0,
# base=1, snapd=2) and remove the lowest-priority one per iteration.
# The until-loop converges on the iteration where snap list comes
# back empty; retries=30 caps at 30 snaps (cloud images ship a
# handful, lab-class hosts none, so this is generous headroom).
- name: Force-purge all snaps (apps → bases → snapd)
  shell: |
    set -euo pipefail
    # Two concessions to `set -e -o pipefail`: `snap list` exits 1
    # when nothing is installed (the done state), so we `|| true` it;
    # and the priority pick is a single awk over the whole list (no
    # head/sort early-exit) so nothing raises SIGPIPE mid-pipeline.
    s=$( { snap list --all --unicode=never --color=never 2>/dev/null || true; } \
         | awk 'NR>1 && $1!="" {
                  p = 0
                  if ($1 ~ /^(bare|core[0-9]*)$/) p = 1
                  if ($1 == "snapd") p = 2
                  if (best == "" || p < bestp) { bestp = p; best = $1 }
                }
                END { if (best != "") print best }')
    if [ -n "$s" ]; then
      snap remove --purge --terminate "$s"
      echo "removed: $s"
    fi
  args:
    executable: /bin/bash
  register: _cleanup_snap_purge
  changed_when: "'removed:' in _cleanup_snap_purge.stdout"
  until: "'removed:' not in _cleanup_snap_purge.stdout"
  retries: 30
  delay: 1
  when: _cleanup_snap_bin.stat.exists
  become: true
  tags:
    - cleanup

# Belt-and-braces against the rare case --terminate leaves a stuck
# snap-*.mount unit standing; systemctl accepts globs natively, so
# a single invocation handles all of them.
- name: Stop any lingering snap-*.mount units  # noqa: command-instead-of-module
  # systemctl accepts unit-name globs natively; the systemd module
  # does not, so we shell out. `failed_when: false` covers the
  # "no matching units" return.
  command: systemctl stop 'snap-*.mount'
  register: _cleanup_snap_mounts
  changed_when: false
  failed_when: false
  when: _cleanup_snap_bin.stat.exists
  become: true
  tags:
    - cleanup

# Block snapd from being reinstalled by a later `apt install` whose
# dep chain pulls a snap-shimmed transitional package (firefox,
# chromium-browser, …). Without this, the purge below is undone
# silently the next time apt is asked to install anything snap-shimmed.
- name: Pin snapd against reinstallation
  copy:
    src: nosnap.pref
    dest: /etc/apt/preferences.d/nosnap.pref
    owner: root
    group: root
    mode: "0644"
    backup: true
  become: true
  tags:
    - cleanup

- name: Uninstall unneeded packages
  apt:
    name:
      - cloud-init
      - snapd
      - fwupd
      - os-prober
    state: absent
    autoremove: true
    purge: true
    autoclean: true
  become: true
  tags:
    - cleanup

# `apt purge snapd` only removes dpkg-tracked files; the runtime
# data roots survive as orphaned trees (multi-MB to multi-GB),
# and on a debootstrap host they're absent so this is a no-op.
- name: Remove snap data roots
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - /var/snap
    - /var/lib/snapd
    - /var/cache/snapd
    - /root/snap
  become: true
  tags:
    - cleanup

# `backup: true` on every config-writing task (CLAUDE.md) leaves
# <name>.<pid>.<timestamp>~ files accumulating across the host (thousands, back
# to 2024). The daily ZFS snapshots hold deep history and ansible --diff shows
# changes live, so the on-disk backups only need to cover a recent window — a
# daily timer prunes anything older than a week. Deliberately not gated on
# zfs_root: it runs on the non-ZFS hosts too (fox), where the ansible repo + git
# are the recovery path rather than snapshots; a 7-day window is reasonable
# regardless, and gating would trip the undefined-on-localhost trap logrotate
# just fixed.
- name: Install the ansible-backup prune script
  copy:
    src: prune_ansible_backups
    dest: /usr/local/sbin/prune_ansible_backups
    owner: root
    group: root
    mode: "0755"
    backup: true
    validate: bash -n %s
  become: true
  tags:
    - cleanup

- name: Schedule the ansible-backup prune timer
  import_role:
    name: systemd_timer
    tasks_from: install
  vars:
    systemd_timer_args:
      name: prune_ansible_backups
      description: Prune ansible config backups older than a week
      on_calendar: "*-*-* 03:30:00"
      exec_start: /usr/local/sbin/prune_ansible_backups
  tags:
    - cleanup
