- name: Gather the package facts
  package_facts:
    manager: apt
  tags:
    - cleanup
  check_mode: false

- name: List installed snaps
  command: snap list
  register: _cleanup_snap_list
  changed_when: false
  failed_when: false
  check_mode: false
  when: "'snapd' in ansible_facts.packages"
  tags:
    - cleanup

- name: Uninstall snaps
  # Removal order matters: app snaps depend on their base (e.g. an `lxd`
  # snap pins `core22`), so the base can't be removed first or snap
  # refuses with "snap X requires base Y". And snapd itself must come
  # last because removing it while any snap is still mounted fails.
  # We split the discovered list by the Notes column (last whitespace
  # field): apps (Notes is `-`, `disabled`, `classic`, ...) → bases
  # (Notes contains `base`) → snapd literal. snapd is filtered out of
  # both selectattr/rejectattr passes by the regex and re-appended
  # explicitly, so it always lands last regardless of where it sat in
  # `snap list`'s alphabetic output.
  when:
    - "'snapd' in ansible_facts.packages"
    - _cleanup_snap_list.rc == 0
    - _cleanup_snap_list.stdout_lines | length > 1
  snap:
    name: "{{ item }}"
    state: absent
  become: true
  loop: >-
    {{
      (_cleanup_snap_rows | rejectattr(-1, 'search', '(^|,)(base|snapd)($|,)') | map(attribute=0) | list)
      + (_cleanup_snap_rows | selectattr(-1, 'search', '(^|,)base($|,)') | map(attribute=0) | list)
      + ['snapd']
    }}
  vars:
    _cleanup_snap_rows: "{{ _cleanup_snap_list.stdout_lines[1:] | map('split') | list }}"
  tags:
    - cleanup

- name: Uninstall unneeded packages
  apt:
    pkg:
      - ufw
      - cloud-init
      - snapd
      - fwupd
      - os-prober
    state: absent
    autoremove: true
    purge: true
  become: true
  tags:
    - cleanup
