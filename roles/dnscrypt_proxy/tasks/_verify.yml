# Functional verification: exercise the actual DNS path through
# dnscrypt-proxy's systemd-activated socket. Stat-only "is the socket
# listening" would pass even if the service crashes on its first query
# (typo in dnscrypt-proxy.toml, broken resolver list, etc.) -- socket
# activation keeps the .socket unit `active (listening)` regardless of
# the .service unit's fate.
#
# Probe 127.0.0.1:5053 rather than the podman bridge gateway (10.88.0.1):
# loopback is unrestricted by the firewall's saddr-scoped INPUT rule, so
# we don't have to spin up a container/netns just to satisfy the saddr
# match. It's the same socket -- the override binds 0.0.0.0:5053.

# Verify is harness-invoked only -- not on prod hosts -- so a one-off
# dnsutils install here keeps prod posture clean. Cheaper than maintaining
# three near-identical hand-rolled DNS packet builders.
- name: _verify | Install dnsutils for dig
  apt:
    pkg:
      - dnsutils
    cache_valid_time: 3600
  become: true

- name: _verify | dnscrypt-proxy.socket is loaded and active
  systemd:
    name: dnscrypt-proxy.socket
  register: _verify_socket
  failed_when: >-
    _verify_socket.status.LoadState != "loaded"
    or _verify_socket.status.ActiveState != "active"
  become: true

# Pre-probe: the .service unit should be inactive before any client
# connects -- proves the .socket is lazily activating rather than the
# .service running as a normal daemon. If someone disables socket
# activation in the future, this catches it.
- name: _verify | dnscrypt-proxy.service is inactive before first query
  systemd:
    name: dnscrypt-proxy.service
  register: _verify_service_pre
  failed_when: _verify_service_pre.status.ActiveState != "inactive"
  become: true

# Retry under ansible: socket activation only triggers when the first
# datagram arrives, then dnscrypt-proxy spends ~5s probing upstream
# resolvers before serving queries. The datagram that triggered activation
# is buffered on the kernel socket but dnscrypt-proxy 2.0.45 logs
# `Systemd sockets are untested and unsupported` and empirically doesn't
# pick it up. dig's per-attempt 2s timeout matches the loop delay; total
# budget ~30s gives 6x margin on the measured 5s. +short prints answer
# records on NOERROR-with-answers and is empty otherwise -- so
# `stdout != ''` distinguishes a real A record from SERVFAIL / NXDOMAIN /
# NOERROR-empty.
- name: _verify | Resolve example.com via dnscrypt-proxy on 127.0.0.1:5053
  command:
    argv:
      - dig
      - "@127.0.0.1"
      - -p
      - "{{ service_ports.dnscrypt_proxy }}"
      - example.com
      - A
      - +short
      - +time=2
      - +tries=1
  register: _verify_probe_udp
  retries: 15
  delay: 2
  until: _verify_probe_udp.rc == 0 and _verify_probe_udp.stdout != ''
  changed_when: false

# TCP path: the override binds ListenStream alongside ListenDatagram, and
# pi-hole falls back to TCP on truncated (>512B) replies. Shorter retry
# budget than UDP because the service is already warm by the time we get
# here -- but still retry to absorb scheduler hiccups between adjacent
# tasks rather than coupling to "the UDP probe just woke the service".
- name: _verify | Resolve example.com via dnscrypt-proxy on 127.0.0.1:5053/tcp
  command:
    argv:
      - dig
      - "@127.0.0.1"
      - -p
      - "{{ service_ports.dnscrypt_proxy }}"
      - +tcp
      - example.com
      - A
      - +short
      - +time=2
      - +tries=1
  register: _verify_probe_tcp
  retries: 5
  delay: 2
  until: _verify_probe_tcp.rc == 0 and _verify_probe_tcp.stdout != ''
  changed_when: false

- name: _verify | dnscrypt-proxy.service was woken by socket activation
  systemd:
    name: dnscrypt-proxy.service
  register: _verify_service_post
  failed_when: _verify_service_post.status.ActiveState != "active"
  become: true

# Anonymized DNSCrypt -- two layers:
#
# 1. Startup grep ("Anonymized DNS: routing everything via [...]") proves the
#    [anonymized_dns] block was parsed and routes registered. Doesn't prove
#    anything actually traversed a relay.
#
# 2. Per-query grep ("Anonymizing queries for [<server>] via [anon-...]") is
#    emitted the first time the load balancer routes a real query to that
#    (server, relay) pair. Drive 20 queries so lb_strategy='random' picks
#    each of the two servers at least once near-certain (P(fail per server)
#    = 0.5^20 ~ 1e-6). Both servers are DNSCrypt-protocol stamps, so both
#    should appear; if one is missing, that server's stamp doesn't advertise
#    the supports-relay flag and queries to it silently fall back to direct.
- name: _verify | dnscrypt-proxy registered anonymized routes at startup
  command: journalctl --no-pager -u dnscrypt-proxy.service
  register: _verify_journal_startup
  changed_when: false
  become: true
  failed_when: "'Anonymized DNS: routing' not in _verify_journal_startup.stdout"

# +time=5 (not the original +time=2) because the relay round-trip
# (dct-fr/dnscry.pt-paris-ipv4 → upstream → back) occasionally spikes
# past 2s under cold network conditions, dropping a query with dig rc=9
# and aborting the loop. 5s per query × 20 queries caps total runtime
# under 100s even in the pathological case.
- name: _verify | Drive 20 queries so the load balancer picks both pinned servers
  shell: |
    set -e
    for _ in $(seq 20); do
      dig @127.0.0.1 -p {{ service_ports.dnscrypt_proxy }} example.com A +short +time=5 +tries=1 > /dev/null
    done
  changed_when: false

- name: _verify | Both pinned servers had a query traverse a relay
  command: journalctl --no-pager -u dnscrypt-proxy.service
  register: _verify_journal_relay
  changed_when: false
  become: true
  failed_when:
    - "'Anonymizing queries for [dct-fr]' not in _verify_journal_relay.stdout
       or 'Anonymizing queries for [dnscry.pt-paris-ipv4]' not in _verify_journal_relay.stdout"
