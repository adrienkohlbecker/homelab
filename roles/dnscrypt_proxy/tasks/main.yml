- name: Install dnscrypt-proxy
  apt:
    pkg:
      - dnscrypt-proxy
    policy_rc_d: 101
    cache_valid_time: 3600
  register: dnscrypt_proxy_apt
  become: true
  tags:
    - dnscrypt_proxy

- name: Install dnscrypt-proxy socket override
  import_role:
    name: systemd_unit
    tasks_from: dropin
  vars:
    systemd_unit_args:
      src: override_socket.conf.j2
      for: dnscrypt-proxy.socket
  tags:
    - dnscrypt_proxy

- name: Copy dnscrypt-proxy conf
  copy:
    src: dnscrypt-proxy.toml
    dest: /etc/dnscrypt-proxy/dnscrypt-proxy.toml
    mode: "0644"
    owner: root
    group: root
    backup: true
  become: true
  register: dnscrypt_proxy_conf
  tags:
    - dnscrypt_proxy

- name: Enable the service
  when: not (ansible_check_mode and dnscrypt_proxy_apt.changed)
  systemd:
    name: dnscrypt-proxy
    enabled: true
  become: true
  tags:
    - dnscrypt_proxy

- name: Enable dnscrypt_proxy socket
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: dnscrypt-proxy.socket
      condition: "{{ not (ansible_check_mode and dnscrypt_proxy_apt.changed) }}"
      restart: "{{ dnscrypt_proxy_conf.changed or dnscrypt_proxy_socket_d_override_conf_result.changed }}"
  tags:
    - dnscrypt_proxy
