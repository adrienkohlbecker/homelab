- name: Install dnscrypt-proxy
  apt:
    pkg:
      - dnscrypt-proxy
    policy_rc_d: 101
    cache_valid_time: 3600
  register: dnscrypt_proxy_apt
  become: true
  tags:
    - dnscrypt_proxy

# The package helper tries to register the loopback socket with systemd-resolved
# via resolvconf, which fails on loopback-only links. This role owns the
# dnscrypt-proxy listener directly, so keep that helper out of the unit state.
- name: Disable dnscrypt-proxy resolvconf integration
  when: not (ansible_check_mode and dnscrypt_proxy_apt.changed)
  systemd:
    name: dnscrypt-proxy-resolvconf.service
    enabled: false
    masked: true
    state: stopped
  become: true
  tags:
    - dnscrypt_proxy

- name: Install dnscrypt-proxy socket override
  import_role:
    name: systemd_unit
    tasks_from: dropin
  vars:
    systemd_unit_args:
      src: override_socket.conf.j2
      for: dnscrypt-proxy.socket
  tags:
    - dnscrypt_proxy

- name: Template dnscrypt-proxy conf
  template:
    src: dnscrypt-proxy.toml.j2
    dest: /etc/dnscrypt-proxy/dnscrypt-proxy.toml
    mode: "0644"
    owner: root
    group: root
    backup: true
    validate: /usr/sbin/dnscrypt-proxy -check -config %s
  become: true
  register: dnscrypt_proxy_conf
  tags:
    - dnscrypt_proxy

- name: Enable dnscrypt-proxy service
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: dnscrypt-proxy.service
      condition: "{{ not (ansible_check_mode and dnscrypt_proxy_apt.changed) }}"
      start: false
  tags:
    - dnscrypt_proxy

# Toml is read by .service, not .socket -- restart the daemon directly when
# the conf changes. try-restart no-ops if the .service is currently inactive
# (first apply where the socket hasn't been activated yet, or quiet socket
# that has idled out the daemon); in that case the next socket activation
# reads the new toml. systemd_unit's restart: would force-start the daemon,
# which contradicts the socket-activation design -- so this stays as a bare
# command for its restart-when-active-only semantic.
- name: Restart dnscrypt-proxy.service if conf changed  # noqa: command-instead-of-module no-changed-when -- try-restart's no-op-when-inactive semantic has no systemd module equivalent; when: gates execution
  when:
    - dnscrypt_proxy_conf.changed
    - not (ansible_check_mode and dnscrypt_proxy_apt.changed)
  command: systemctl try-restart dnscrypt-proxy.service
  become: true
  tags:
    - dnscrypt_proxy

- name: Enable dnscrypt_proxy socket
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: dnscrypt-proxy.socket
      condition: "{{ not (ansible_check_mode and dnscrypt_proxy_apt.changed) }}"
      restart: "{{ dnscrypt_proxy_socket_d_override_conf_result.changed }}"
  tags:
    - dnscrypt_proxy

# Reap legacy /var/log/dnscrypt-proxy/query.log[.gz] leftovers. The
# role's templated toml doesn't enable query logging, but earlier
# manually-edited configs did, leaving stale per-query DNS traces on
# disk (privacy-sensitive: every resolved name + client IP). dnscrypt
# uses an internal rotator so there's no /etc/logrotate.d entry to
# worry about.
- name: Find legacy dnscrypt-proxy query log files
  find:
    paths: /var/log/dnscrypt-proxy
    patterns:
      - 'query.log'
      - 'query*.log.gz'
      - 'query-*.log'
      - 'query-*.log.gz'
    file_type: file
  register: dnscrypt_proxy_legacy_query_logs
  become: true
  tags:
    - dnscrypt_proxy

- name: Remove legacy dnscrypt-proxy query log files
  file:
    path: "{{ item.path }}"
    state: absent
  loop: "{{ dnscrypt_proxy_legacy_query_logs.files }}"
  loop_control:
    label: "{{ item.path }}"
  become: true
  tags:
    - dnscrypt_proxy
