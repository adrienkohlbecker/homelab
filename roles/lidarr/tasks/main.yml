- name: Add media group
  import_role:
    name: media
    tasks_from: group
  tags:
    - lidarr

- name: Set up lidarr system user, group, and config dir
  import_role:
    name: service_user
    tasks_from: user
  vars:
    service_user_args:
      name: lidarr
      extra_groups: [ media ]
      # linuxserver/lidarr's s6 init recursively chowns /config to
      # PUID:PGID=lidarr:media on every container start. Match it here
      # so ansible doesn't flap the dir's gid back to `lidarr` each run.
      config_dir_group: media
  tags:
    - lidarr

# Lidarr hardcodes its DBs at /config/<name>.db and writes -wal/-shm next to
# the resolved path. Symlink at /config so SQLite resolves through to the
# 4K-recordsize sqlite dataset before computing WAL location. The symlink
# target matches the host path so it resolves identically inside the
# container (see matching --volume in lidarr.service.j2). pre_create plants
# empty files on a cold host so state=link doesn't refuse the dangling
# symlink before Lidarr creates the DBs on first boot.
- name: Pre-create sqlite dataset and symlink lidarr DBs onto it
  import_role:
    name: sqlite_dataset
    tasks_from: dataset
  vars:
    sqlite_dataset_args:
      name: lidarr
      owner: lidarr
      group: media
      mode: "0750"
      condition: "{{ not (ansible_check_mode and lidarr_user.changed) }}"
      pre_create: true
      links:
        - /mnt/services/lidarr/lidarr.db
        - /mnt/services/lidarr/logs.db
  tags:
    - lidarr

- name: Configure lidarr
  # Render via copy:content + regex_replace because lidarr rewrites
  # config.xml on shutdown without a trailing newline; a plain template:
  # leaves us drifting forever.
  copy:
    content: "{{ lookup('template', 'config.xml.j2') | regex_replace('\\n+$', '') }}"
    dest: /mnt/services/lidarr/config.xml
    owner: lidarr
    group: media
    mode: "0600"
    backup: true
    validate: python3 -c 'import xml.etree.ElementTree as ET, sys; ET.parse(sys.argv[1])' "%s"
  register: lidarr_conf
  # ansible.cfg sets [diff] always=True + verbosity=1, so without this the
  # rendered <ApiKey> would print to the operator/CI log on write & rotation.
  no_log: true
  become: true
  tags:
    - lidarr

- name: Install lidarr service
  import_role:
    name: systemd_unit
    tasks_from: install
  vars:
    systemd_unit_args:
      src: lidarr.service.j2
      condition: "{{ not (ansible_check_mode and lidarr_user.changed) }}"
  tags:
    - lidarr

- name: Enable lidarr service
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: lidarr
      condition: "{{ not (ansible_check_mode and (lidarr_service_result.changed or lidarr_user.changed)) }}"
      restart: "{{ lidarr_service_result.changed or lidarr_conf.changed or media_group.changed }}"
  tags:
    - lidarr

- name: Configure nginx
  import_role:
    name: nginx
    tasks_from: site
  vars:
    nginx_site_args:
      subdomain: lidarr
      proxy_pass: http://127.0.0.1:{{ service_ports.lidarr }}/
      # See sonarr's nginx_site_args comment.
      auth: required
  tags:
    - lidarr
