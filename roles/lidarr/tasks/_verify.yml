# Negative probe first: confirms /api/v1/* enforces the apikey. Pairs with the
# auth'd probe below -- together they prove the apikey we templated is both
# required by lidarr and the one it accepted. Without this, a future bug that
# disabled apikey enforcement would let the auth'd probe pass on any key.
- name: _verify | Lidarr /api/v1/system/status rejects unauth'd requests
  uri:
    url: http://127.0.0.1:{{ service_ports.lidarr }}/api/v1/system/status
    status_code: 401
  register: _lidarr_http_unauth
  retries: 30
  delay: 2
  until: _lidarr_http_unauth.status == 401

# Authenticated probe -- proves the apikey we templated into config.xml is
# the one the running container accepted, not just one we wrote to disk.
# Header form keeps the key out of journald.
- name: _verify | Lidarr answers /api/v1/system/status with our apikey
  uri:
    url: http://127.0.0.1:{{ service_ports.lidarr }}/api/v1/system/status
    headers:
      X-Api-Key: "{{ lidarr_api_key }}"
    status_code: 200
    return_content: true
  register: _lidarr_http
  retries: 30
  delay: 2
  until: _lidarr_http.status == 200
  failed_when: (_lidarr_http.json | default({})) | length == 0

# The vhost is `auth: required`, so the real browser access pattern is an
# Authelia-gated UI -- the API path above is reached intra-stack via
# lidarr.dns.podman with X-Api-Key, bypassing nginx entirely. With the
# stub in gate mode (see _setup.yml), assert a cookieless GET / lands on
# nginx's error_page 401 =302 redirect to the portal. This is the only
# probe that fails if `auth: required` is dropped from nginx_site_args
# (the loopback apikey probes stay green without it). Asserting the 302
# returnUrl (rd=) echoes lidarr's own URL proves the request routed to
# lidarr's server_name (not the default vhost) and the request URI survived.
#
# Map the vhost FQDN to loopback so SNI matches the served certificate.
# Probing https://localhost with a Host: header leaves SNI=localhost, which
# OpenSSL 3.x (noble/resolute) rejects as a fatal unrecognized_name alert
# (status -1); hitting the FQDN directly keeps SNI correct on every release.
- name: _verify | Map the lidarr vhost FQDN to loopback for SNI-correct probing
  lineinfile:
    path: /etc/hosts
    line: "127.0.0.1 lidarr.{{ inventory_hostname }}.{{ domain }}"
    state: present
  become: true

- name: _verify | Lidarr UI gate redirects unauthenticated requests to Authelia
  uri:
    url: https://lidarr.{{ inventory_hostname }}.{{ domain }}/
    validate_certs: false
    follow_redirects: none
    status_code: 302
  register: _lidarr_nginx_gate
  failed_when: _lidarr_nginx_gate is not authelia_redirects_to('lidarr', inventory_hostname, domain)

# The sqlite_dataset symlink + matching --volume is the role's whole reason
# for its non-obvious structure: it lands the DBs (and their -wal/-shm
# siblings) on the 4K-recordsize sqlite dataset. The HTTP probes above pass
# whether or not that routing holds -- a dropped symlink or --volume strands
# the DB at /config inside the container and nothing here would notice.
# Assert it functionally: the on-disk paths are symlinks onto the dataset,
# and lidarr wrote real schema through them (the API answering 200 above
# means migration finished, so the dataset-side files are populated by now).
- name: _verify | Stat the lidarr DB paths
  stat:
    path: "/mnt/services/lidarr/{{ item }}"
    follow: false
  loop:
    - lidarr.db
    - logs.db
  register: _lidarr_db_links
  become: true

- name: _verify | Lidarr DBs are symlinks onto the sqlite dataset
  assert:
    that:
      - item.stat.islnk
      - item.stat.lnk_target == "/mnt/services/sqlite/lidarr/" ~ item.item
    fail_msg: "{{ item.item }} is not a symlink onto the sqlite dataset (stat={{ item.stat }})"
  loop: "{{ _lidarr_db_links.results }}"
  loop_control:
    label: "{{ item.item }}"

- name: _verify | Stat the dataset-side lidarr DBs
  stat:
    path: "/mnt/services/sqlite/lidarr/{{ item }}"
  loop:
    - lidarr.db
    - logs.db
  register: _lidarr_db_files
  become: true

- name: _verify | Lidarr wrote real, non-empty DBs onto the dataset
  assert:
    that:
      - item.stat.exists
      - not item.stat.islnk
      - item.stat.size > 0
    fail_msg: "{{ item.item }} on the dataset is missing or empty (stat={{ item.stat }})"
  loop: "{{ _lidarr_db_files.results }}"
  loop_control:
    label: "{{ item.item }}"

# config.xml is the role's other fragile contract: lidarr rewrites it on
# every shutdown, so config.xml.j2's element order + casing must match
# lidarr's own writeback byte-for-byte or the next converge drifts and
# restart-churns forever. The idempotence pass can't catch this -- the
# harness never restarts lidarr between converges, so lidarr never rewrites
# the file. Force a clean shutdown+restart here, then assert our template
# still matches what lidarr wrote back.
- name: _verify | Restart lidarr to force a config.xml writeback
  systemd:
    name: lidarr
    state: restarted
  become: true

- name: _verify | Lidarr is back up after the restart
  uri:
    url: http://127.0.0.1:{{ service_ports.lidarr }}/api/v1/system/status
    headers:
      X-Api-Key: "{{ lidarr_api_key }}"
    status_code: 200
  register: _lidarr_http_postrestart
  retries: 60
  delay: 2
  until: _lidarr_http_postrestart.status == 200

- name: _verify | Render the config.xml our template would write
  set_fact:
    _lidarr_conf_expected: "{{ lookup('template', 'config.xml.j2') | rstrip_newlines }}"

- name: _verify | Read config.xml back after the writeback
  slurp:
    src: /mnt/services/lidarr/config.xml
  register: _lidarr_conf_ondisk
  become: true

- name: _verify | Templated config.xml survives lidarr's writeback without drift
  assert:
    that:
      - (_lidarr_conf_ondisk | slurp_text(trim=false)) == _lidarr_conf_expected
    fail_msg: >-
      lidarr rewrote config.xml into a form config.xml.j2 no longer matches --
      its element order/casing drifted from lidarr's writeback, so deploying
      would restart-churn. Re-capture config.xml.j2 from a running instance.
