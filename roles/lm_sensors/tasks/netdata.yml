# Invoked from roles/netdata/tasks/main.yml after netdata is installed --
# don't call this before the netdata role has run. netdata_restart is set
# by that caller; default it so a standalone import (or _verify) still works.

# The shared netdata `template` helper carries no validate: -- it also writes
# non-YAML configs (netdata health .conf, logrotate) for other callers -- so
# validate the relabel input here. A malformed entry would otherwise raise a
# Jinja error mid-render, or land a config netdata silently accept-then-defaults.
# We check sensor_relabel directly rather than the rendered template: the
# template always emits one job (so a `jobs | length` check is tautological),
# and a missing `sensors` key crashes the render before any parse runs.
- name: Assert sensor_relabel is well-formed before rendering the collector config
  vars:
    _relabel: "{{ sensor_relabel | default([]) }}"
    _sensors: "{{ _relabel | map(attribute='sensors', default=[]) | flatten }}"
  assert:
    that:
      - _relabel is sequence and _relabel is not string
      - _relabel | selectattr('chip', 'undefined') | list | length == 0
      - _relabel | selectattr('sensors', 'undefined') | list | length == 0
      - _sensors | selectattr('name', 'undefined') | list | length == 0
      - _sensors | selectattr('label', 'undefined') | list | length == 0
    fail_msg: >-
      sensor_relabel entries each need a `chip` and a non-empty `sensors` list
      of {name, label} dicts. Got: {{ _relabel }}
  tags:
    - lm_sensors

- name: Configure lm_sensors metrics
  import_role:
    name: netdata
    tasks_from: template
  vars:
    netdata_args:
      src: sensors.conf.j2
      dest: go.d/sensors.conf
      restart: "{{ netdata_restart | default(true) }}"
  tags:
    - lm_sensors
