# The harness runs main.yml (apt + modules-load + live modprobe) on its own
# with the qemu_test module fixture; this file asserts that took effect, then
# exercises the netdata collector arm (normally invoked from
# roles/netdata/tasks/main.yml).
#
# Scope note: the qemu box is a sensorless arm64 `virt` machine -- it
# registers thermal *governors* but exposes no hwmon device, so netdata's
# sensors collector has nothing to chart, and netdata's arm64 build omits the
# stock /usr/lib/netdata/conf.d/go.d/sensors.conf that prod (x86_64) ships and
# the copy helper seeds from. Live charting therefore can't be verified here
# (it's observed on prod); instead we verify modules load for real, and that
# netdata.yml renders + deploys a valid go.d config including the relabel
# template path.

- name: _verify | Select expected qemu sensor fixture values
  set_fact:
    lm_sensors_effective_modules: >-
      {{ lm_sensors_qemu_test_modules
         if (qemu_test | bool) else lm_sensors_modules }}
    lm_sensors_effective_relabel: >-
      {{ lm_sensors_qemu_test_relabel
         if (qemu_test | bool) else lm_sensors_relabel }}
    lm_sensors_effective_ignore: >-
      {{ lm_sensors_qemu_test_ignore
         if (qemu_test | bool) else lm_sensors_ignore }}

- name: _verify | Read the modules-load.d file
  slurp:
    path: /etc/modules-load.d/lm_sensors.conf
  register: _lm_sensors_modload
  become: true

- name: _verify | Assert it lists exactly lm_sensors_modules
  assert:
    that:
      - (_lm_sensors_modload.content | b64decode).split() == lm_sensors_effective_modules
    fail_msg: >-
      /etc/modules-load.d/lm_sensors.conf = {{ _lm_sensors_modload.content | b64decode | trim }};
      expected {{ lm_sensors_effective_modules }}

- name: _verify | Assert each module is loaded in the running kernel
  command: grep -qw {{ item | replace('-', '_') }} /proc/modules
  loop: "{{ lm_sensors_effective_modules }}"
  changed_when: false
  become: true

- name: _verify | Read the deployed libsensors ignore file
  slurp:
    path: /etc/sensors.d/zz_netdata_ignore.conf
  register: _lm_sensors_ignore
  become: true

- name: _verify | Assert the ignore file lists the fixture chip and feature
  vars:
    _content: "{{ _lm_sensors_ignore.content | b64decode }}"
  assert:
    that:
      - "'lm-sensors-test-0' in _content"
      - "'ignore temp2' in _content"
    fail_msg: "deployed /etc/sensors.d/zz_netdata_ignore.conf:\n{{ _lm_sensors_ignore.content | b64decode }}"

# install.yml uses policy_rc_d=101 so apt won't auto-start netdata; prod
# starts it in netdata's main.yml after configuration. The test path skips
# that, so start the daemon here before installing the collector.
- name: _verify | Start netdata
  systemd:
    name: netdata
    state: started
  become: true

- name: _verify | Ensure netdata go.d conf.d dir exists
  file:
    path: /usr/lib/netdata/conf.d/go.d
    state: directory
    mode: "0755"
  become: true

# The netdata copy helper seeds dest from this stock file before overwriting
# it with our render. prod (x86_64) ships it; the arm64 test box doesn't, so
# seed a stub (force:false leaves the real file untouched on x86_64) to
# exercise the same code path. Content is irrelevant -- it gets overwritten.
- name: _verify | Seed stub stock sensors.conf (arm64 build omits it)
  copy:
    content: "jobs:\n  - name: sensors\n"
    dest: /usr/lib/netdata/conf.d/go.d/sensors.conf
    mode: "0644"
    force: false
  become: true

# No lm_sensors_netdata_restart set here -- relies on netdata.yml's default(true), which
# is exactly finding 9's standalone-invocation fix.
- name: _verify | Install lm_sensors netdata collector
  import_tasks: netdata.yml

- name: _verify | Read the deployed go.d sensors config
  slurp:
    path: /etc/netdata/go.d/sensors.conf
  register: _lm_sensors_godconf
  become: true

- name: _verify | Assert it is valid YAML and rendered the relabel map
  vars:
    _parsed: "{{ _lm_sensors_godconf | slurp_yaml }}"
  assert:
    that:
      - _parsed.jobs | length > 0
      - _parsed.jobs[0].name == 'sensors'
      - _parsed.jobs[0].relabel[0].chip == 'lm-sensors-test-0'
      - _parsed.jobs[0].relabel[0].sensors[0].label == 'Verify Probe'
    fail_msg: "deployed /etc/netdata/go.d/sensors.conf:\n{{ _lm_sensors_godconf | slurp_text(trim=false) }}"

# Exercise the empty-list removal arm (usage scenario 2): re-running with no
# modules must drop the modules-load.d file and live-unload the dropped
# module. 'dummy' isn't in use here, so modprobe -r removes it cleanly and no
# reboot is flagged; a pinned module would stay loaded and flag a reboot
# instead (the fallback path -- see main.yml's unload comment).
- name: _verify | Clear any pre-existing reboot-required sentinel
  file:
    path: /var/run/reboot-required
    state: absent
  become: true

- name: _verify | Switch to an empty module list
  set_fact:
    lm_sensors_qemu_test_modules: []
    lm_sensors_qemu_test_relabel: []
    lm_sensors_qemu_test_ignore: []

- name: _verify | Re-run the role's module-management tasks
  import_tasks: main.yml

- name: _verify | Stat the modules-load.d file after removal
  stat:
    path: /etc/modules-load.d/lm_sensors.conf
  register: _lm_sensors_modload_after
  become: true

- name: _verify | Stat the libsensors ignore file after removal
  stat:
    path: /etc/sensors.d/zz_netdata_ignore.conf
  register: _lm_sensors_ignore_after
  become: true

- name: _verify | Check whether the dropped module is still loaded
  command: grep -qw dummy /proc/modules
  register: _lm_sensors_dummy_loaded
  changed_when: false
  failed_when: false
  become: true

- name: _verify | Stat the reboot-required sentinel
  stat:
    path: /var/run/reboot-required
  register: _lm_sensors_reboot_after
  become: true

- name: _verify | Assert removal dropped the files and live-unloaded the module
  assert:
    that:
      - not _lm_sensors_modload_after.stat.exists
      - not _lm_sensors_ignore_after.stat.exists
      - _lm_sensors_dummy_loaded.rc != 0
      - not _lm_sensors_reboot_after.stat.exists
    fail_msg: >-
      empty-list removal arm: modules-load.d exists={{ _lm_sensors_modload_after.stat.exists }},
      sensors.d ignore exists={{ _lm_sensors_ignore_after.stat.exists }},
      dummy still loaded={{ _lm_sensors_dummy_loaded.rc == 0 }},
      reboot-required exists={{ _lm_sensors_reboot_after.stat.exists }}
