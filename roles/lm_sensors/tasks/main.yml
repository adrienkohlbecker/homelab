- name: Assert sensor_modules is a list of valid module names
  assert:
    that:
      - sensor_modules is not string
      - sensor_modules | reject('match', '^[a-z0-9_-]+\Z') | list | length == 0
    fail_msg: >-
      sensor_modules must be a list of kernel module names (lowercase letters,
      digits, underscore, hyphen). Got: {{ sensor_modules }}
  tags:
    - lm_sensors

- name: Install lm-sensors
  apt:
    pkg:
      - lm-sensors
    policy_rc_d: 101
    cache_valid_time: 3600
  become: true
  tags:
    - lm_sensors

- name: Load detected sensor modules
  when: sensor_modules | length > 0
  copy:
    dest: /etc/modules-load.d/lm_sensors.conf
    content: "{{ sensor_modules | join('\n') }}\n"
    mode: "0644"
    owner: root
    group: root
    backup: true
  become: true
  register: lm_sensors_modules_copy
  tags:
    - lm_sensors

- name: Remove sensor modules
  when: sensor_modules | length == 0
  file:
    path: /etc/modules-load.d/lm_sensors.conf
    state: absent
  become: true
  register: lm_sensors_modules_rm
  tags:
    - lm_sensors

# Load the modules live so sensors (and their netdata charts) appear
# immediately instead of waiting for the next boot. modprobe is
# idempotent, so on a host where the drivers are already loaded this is a
# no-op after first apply; modules-load.d above keeps them loaded at boot.
- name: Load sensor modules now
  when: sensor_modules | length > 0
  modprobe:
    name: "{{ item }}"
    state: present
  loop: "{{ sensor_modules }}"
  become: true
  tags:
    - lm_sensors

# Only a removal needs a reboot: dropping a module from modules-load.d
# doesn't unload it from the running kernel, and rmmod mid-run is risky (a
# driver may be in use). Adding modules no longer reboots -- they're
# modprobe'd live above. (Shrinking the list leaves the dropped module
# loaded until the next boot, which is harmless for sensor drivers.)
- name: Touch /var/run/reboot-required (sensor modules removed)
  when: lm_sensors_modules_rm.changed
  file:
    path: /var/run/reboot-required
    state: touch
    owner: root
    group: root
    mode: "0644"
  become: true
  tags:
    - lm_sensors
