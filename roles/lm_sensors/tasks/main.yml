- name: Select sensor module and relabel inputs for this host
  set_fact:
    lm_sensors_effective_modules: >-
      {{ lm_sensors_qemu_test_modules
         if (qemu_test | bool) else lm_sensors_modules }}
    lm_sensors_effective_relabel: >-
      {{ lm_sensors_qemu_test_relabel
         if (qemu_test | bool) else lm_sensors_relabel }}
    lm_sensors_effective_ignore: >-
      {{ lm_sensors_qemu_test_ignore
         if (qemu_test | bool) else lm_sensors_ignore }}
    lm_sensors_effective_limits: >-
      {{ lm_sensors_qemu_test_limits
         if (qemu_test | bool) else lm_sensors_limits }}
  tags:
    - lm_sensors

- name: Assert lm_sensors_limits is well-formed
  vars:
    _limits: "{{ lm_sensors_effective_limits }}"
    _sets: "{{ _limits | map(attribute='set', default=[]) | flatten }}"
  assert:
    that:
      - _limits is sequence and _limits is not string
      - _limits | selectattr('chip', 'undefined') | list | length == 0
      - _limits | selectattr('set', 'undefined') | list | length == 0
      - _sets | selectattr('feature', 'undefined') | list | length == 0
      - _sets | selectattr('value', 'undefined') | list | length == 0
      - _sets | rejectattr('feature', 'match', '^[a-z0-9_]+\Z') | list | length == 0
      - _sets | map(attribute='value') | reject('match', '^-?[0-9]+(\.[0-9]+)?\Z') | list | length == 0
    fail_msg: >-
      lm_sensors_limits entries each need a `chip` and a `set` list of
      {feature, value} dicts -- feature a hwmon subfeature name (lowercase
      letters, digits, underscore -- e.g. temp7_max), value numeric.
      Got: {{ _limits }}
  tags:
    - lm_sensors

- name: Assert lm_sensors_ignore is well-formed
  vars:
    _ignore: "{{ lm_sensors_effective_ignore }}"
    _features: "{{ _ignore | map(attribute='features', default=[]) | flatten }}"
  assert:
    that:
      - _ignore is sequence and _ignore is not string
      - _ignore | selectattr('chip', 'undefined') | list | length == 0
      - _ignore | selectattr('features', 'undefined') | list | length == 0
      - _features | reject('match', '^[a-z0-9_]+\Z') | list | length == 0
    fail_msg: >-
      lm_sensors_ignore entries each need a `chip` and a `features` list of
      hwmon feature names (lowercase letters, digits, underscore -- e.g. temp3).
      Got: {{ _ignore }}
  tags:
    - lm_sensors

- name: Assert lm_sensors_modules is a list of valid module names
  assert:
    that:
      - lm_sensors_effective_modules is not string
      - lm_sensors_effective_modules | reject('match', '^[a-z0-9_-]+\Z') | list | length == 0
    fail_msg: >-
      lm_sensors_modules must be a list of kernel module names (lowercase letters,
      digits, underscore, hyphen). Got: {{ lm_sensors_effective_modules }}
  tags:
    - lm_sensors

- name: Install lm-sensors
  apt:
    pkg:
      - i2c-tools
      - lm-sensors
    policy_rc_d: 101
    cache_valid_time: 3600
  become: true
  tags:
    - lm_sensors

# Read the currently-persisted list first so we can spot modules being
# dropped (a shrink or a full clear) and unload them live below, instead of
# leaving them resident until the next boot.
- name: Stat the persisted sensor module list
  stat:
    path: /etc/modules-load.d/lm_sensors.conf
  register: lm_sensors_modload_stat
  become: true
  tags:
    - lm_sensors

- name: Read the persisted sensor module list
  when: lm_sensors_modload_stat.stat.exists
  slurp:
    path: /etc/modules-load.d/lm_sensors.conf
  register: lm_sensors_modload_old
  become: true
  tags:
    - lm_sensors

- name: Compute which sensor modules are being dropped
  set_fact:
    lm_sensors_dropped: >-
      {{ ((lm_sensors_modload_old.content | default('') | b64decode).split()
          if lm_sensors_modload_stat.stat.exists else [])
         | difference(lm_sensors_effective_modules) }}
  tags:
    - lm_sensors

# Load additions live BEFORE persisting the list, so a bad or unavailable
# module name fails the play here and never lands in modules-load.d (where it
# would re-fail at every boot). modprobe is idempotent -- a no-op once the
# driver is loaded -- so this also brings sensors (and their netdata charts)
# up immediately instead of waiting for the next boot.
- name: Load sensor modules now
  when: lm_sensors_effective_modules | length > 0
  modprobe:
    name: "{{ item }}"
    state: present
  loop: "{{ lm_sensors_effective_modules }}"
  become: true
  tags:
    - lm_sensors

- name: Persist the sensor module list for boot
  when: lm_sensors_effective_modules | length > 0
  copy:
    dest: /etc/modules-load.d/lm_sensors.conf
    content: "{{ lm_sensors_effective_modules | join('\n') }}\n"
    mode: "0644"
    owner: root
    group: root
    backup: true
    validate: grep -qE '^[A-Za-z0-9_-]+$' %s
  become: true
  tags:
    - lm_sensors

- name: Remove the persisted module list when empty
  when: lm_sensors_effective_modules | length == 0
  file:
    path: /etc/modules-load.d/lm_sensors.conf
    state: absent
  become: true
  tags:
    - lm_sensors

# Live-unload dropped modules best-effort. `modprobe -r` (state: absent)
# refuses to remove an in-use module rather than forcing it (never rmmod -f),
# so this can't wedge a driver fan2go or an open hwmon reader is
# holding -- those stay loaded and get the reboot flag below. This is also
# why the role hand-rolls module management instead of community.general
# modprobe's `persistent:`: that writes per-module files and only *comments
# out* a dropped module on removal, never unloading it.
- name: Unload dropped sensor modules (best effort)
  when: lm_sensors_dropped | length > 0
  modprobe:
    name: "{{ item }}"
    state: absent
  loop: "{{ lm_sensors_dropped }}"
  failed_when: false
  become: true
  tags:
    - lm_sensors

# A dropped module still resident after the unload attempt is pinned (in
# use); flag a reboot so the operator can clear it. Cleanly-unloaded modules
# need none. modprobe maps hyphens to underscores in /proc/modules.
- name: Check whether dropped modules are still loaded
  when: lm_sensors_dropped | length > 0
  command: grep -qw {{ item | replace('-', '_') }} /proc/modules
  loop: "{{ lm_sensors_dropped }}"
  register: lm_sensors_dropped_loaded
  changed_when: false
  failed_when: false
  become: true
  tags:
    - lm_sensors

- name: Ask to reboot
  when: >-
    lm_sensors_dropped_loaded.results | default([])
    | selectattr('rc', 'defined') | selectattr('rc', 'eq', 0) | list | length > 0
  file:
    path: /var/run/reboot-required
    state: touch
    owner: root
    group: root
    mode: "0644"
  become: true
  tags:
    - lm_sensors

# Phantom/unconnected hwmon inputs to hide from libsensors (see the template
# header for why). Host-global config under /etc/sensors.d/; the netdata
# restart below makes the change take effect live rather than at next reboot.
- name: Write the libsensors ignore list
  when: lm_sensors_effective_ignore | length > 0
  template:
    src: sensors_ignore.conf.j2
    dest: /etc/sensors.d/zz_netdata_ignore.conf
    mode: "0644"
    owner: root
    group: root
    backup: true
    validate: grep -qE '^chip[[:space:]]+"' %s
  register: lm_sensors_ignore_file
  become: true
  tags:
    - lm_sensors

- name: Remove the libsensors ignore list when empty
  when: lm_sensors_effective_ignore | length == 0
  file:
    path: /etc/sensors.d/zz_netdata_ignore.conf
    state: absent
  register: lm_sensors_ignore_removed
  become: true
  tags:
    - lm_sensors

# Chip alarm-limit overrides (see the template header). `set` directives,
# unlike `ignore`, must be pushed to the chip with `sensors -s`; the apply
# task below does it live and the package's lm-sensors.service re-runs it at
# boot (ensured enabled when limits are configured).
- name: Write the libsensors limits overrides
  when: lm_sensors_effective_limits | length > 0
  template:
    src: sensors_limits.conf.j2
    dest: /etc/sensors.d/zz_homelab_limits.conf
    mode: "0644"
    owner: root
    group: root
    backup: true
    validate: grep -qE '^[[:space:]]*set[[:space:]]' %s
  register: lm_sensors_limits_file
  become: true
  tags:
    - lm_sensors

# Removing the file stops it being re-applied at the next boot; the live chip
# keeps the last-set limit until then (libsensors has no record of the factory
# default to restore), which is harmless -- a raised threshold simply persists
# one more boot.
- name: Remove the libsensors limits overrides when empty
  when: lm_sensors_effective_limits | length == 0
  file:
    path: /etc/sensors.d/zz_homelab_limits.conf
    state: absent
  register: lm_sensors_limits_removed
  become: true
  tags:
    - lm_sensors

# The lm-sensors package ships lm-sensors.service (runs `sensors -s` at boot)
# on prod (amd64); the arm64 test box's build omits the unit. Probe for it so
# the enable is a no-op where the unit is absent rather than failing -- those
# hosts have no real chip to persist limits for anyway, and the live apply
# below still covers the current boot.
- name: Check whether lm-sensors.service exists  # noqa: command-instead-of-module
  command: systemctl list-unit-files lm-sensors.service
  register: lm_sensors_unit
  changed_when: false
  failed_when: false
  check_mode: false
  become: true
  tags:
    - lm_sensors

- name: Ensure lm-sensors.service is enabled to re-apply limits at boot
  when:
    - lm_sensors_effective_limits | length > 0
    - "'lm-sensors.service' in lm_sensors_unit.stdout"
  systemd:
    name: lm-sensors.service
    enabled: true
  become: true
  tags:
    - lm_sensors

# `sensors -s` errors ("No sensors found", rc 1) on a host with no hwmon chip
# -- the arm64 test box exposes none. Gate the apply on a real chip being
# present so the box skips cleanly; where chips exist a non-zero rc is a
# genuine config parse error and should fail the converge.
- name: Detect whether any hwmon chip is present
  find:
    paths: /sys/class/hwmon
    patterns: hwmon*
    file_type: any
  register: lm_sensors_hwmon
  become: true
  tags:
    - lm_sensors

# `sensors -s` evaluates every /etc/sensors.d `set` directive against the
# detected chips, pushing the new limits to sysfs. Run only when the file
# changed so converges stay quiet.
- name: Apply the libsensors limits live
  when:
    - lm_sensors_limits_file.changed | default(false)
    - lm_sensors_hwmon.matched | int > 0
  command: sensors -s
  changed_when: true
  become: true
  tags:
    - lm_sensors

# debugfs.plugin reads libsensors once at startup, so a live change needs a
# netdata restart to be picked up. Only when netdata is already running -- in
# the role's standalone test converge netdata is installed but not yet started
# (the _verify starts it fresh, which reads the file on its own); on prod
# netdata is up from its own (earlier) play, so the restart fires.
- name: Check whether netdata is running  # noqa: command-instead-of-module
  command: systemctl is-active --quiet netdata
  register: lm_sensors_netdata_active
  changed_when: false
  failed_when: false
  check_mode: false
  become: true
  tags:
    - lm_sensors

- name: Restart netdata to re-read the sensor ignore list and limits
  when:
    - >-
      (lm_sensors_ignore_file.changed | default(false))
      or (lm_sensors_ignore_removed.changed | default(false))
      or (lm_sensors_limits_file.changed | default(false))
      or (lm_sensors_limits_removed.changed | default(false))
    - lm_sensors_netdata_active.rc == 0
  systemd:
    name: netdata
    state: restarted
  become: true
  tags:
    - lm_sensors
