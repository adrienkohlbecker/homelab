- name: Set up speedtest system user and group
  import_role:
    name: service_user
    tasks_from: user
  vars:
    service_user_args:
      name: speedtest
      config_dir: false
  tags:
    - speedtest

- name: Install speedtest service
  import_role:
    name: systemd_unit
    tasks_from: install
  vars:
    systemd_unit_args:
      src: speedtest.service.j2
      condition: "{{ not (ansible_check_mode and speedtest_user.changed) }}"
  tags:
    - speedtest

- name: Pull speedtest image
  containers.podman.podman_image:
    name: "{{ speedtest_image }}"
  register: speedtest_image_pull
  retries: 3
  delay: 10
  until: speedtest_image_pull is not failed
  become: true
  tags:
    - speedtest

- name: Enable speedtest service
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: speedtest
      condition: "{{ not (ansible_check_mode and (speedtest_user.changed or speedtest_service_result.changed)) }}"
      restart: "{{ speedtest_service_result.changed }}"
  tags:
    - speedtest

- name: Configure nginx
  import_role:
    name: nginx
    tasks_from: site
  vars:
    nginx_site_args:
      subdomain: speedtest
      proxy_pass: http://127.0.0.1:{{ service_ports.speedtest }}/
      client_max_body_size: "0"
      proxy_buffering: "off"
      proxy_request_buffering: "off"
      auth: required
  tags:
    - speedtest
