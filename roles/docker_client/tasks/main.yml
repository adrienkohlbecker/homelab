- name: Install gpg
  apt:
    pkg: gpg
    cache_valid_time: 3600
  become: true
  register: apt_install_gpg
  tags:
    - docker_client

# Repository setup forks on Ubuntu major version because apt-key was
# removed from the default install in resolute (26.04). See netdata
# install.yml for the same idiom.
- name: Add repository key
  when:
    - ansible_distribution_major_version | int < 26
    - not (ansible_check_mode and apt_install_gpg.changed)
  apt_key:
    id: 9DC858229FC7DD38854AE2D88D81803C0EBFCD88
    url: https://download.docker.com/linux/ubuntu/gpg
    keyring: /etc/apt/trusted.gpg.d/docker.gpg
  become: true
  tags:
    - docker_client

- name: Add repository
  when: ansible_distribution_major_version | int < 26
  apt_repository:
    repo: deb [arch={{ (ansible_architecture == "aarch64") | ternary('arm64', 'amd64') }} signed-by=/etc/apt/trusted.gpg.d/docker.gpg] {{ mirror_apt_docker }} {{ ansible_distribution_release }} stable
  register: apt_repository_docker_client_legacy
  become: true
  tags:
    - docker_client

# Pre-warm /var/lib/apt/lists/ so the python3-debian install below
# works in check mode. Packer ships an empty cache and the apt
# module's update_cache is a no-op under --check. See
# roles/apt/tasks/install.yml for the full rationale.
- name: Pre-warm apt cache (real fetch even in --check)  # noqa: command-instead-of-module
  when: ansible_distribution_major_version | int >= 26
  command: apt-get update
  changed_when: false
  check_mode: false
  become: true
  tags:
    - docker_client

# deb822_repository requires python3-debian even in check mode. See
# netdata install.yml for the gate idiom.
- name: Install python3-debian
  when: ansible_distribution_major_version | int >= 26
  apt:
    pkg: python3-debian
    cache_valid_time: 3600
  become: true
  register: apt_install_python3_debian
  tags:
    - docker_client

- name: Add repository (deb822)
  when:
    - ansible_distribution_major_version | int >= 26
    - not (ansible_check_mode and apt_install_python3_debian.changed)
  deb822_repository:
    name: docker
    types: deb
    uris: "{{ mirror_apt_docker }}"
    suites: "{{ ansible_distribution_release }}"
    components: stable
    architectures: "{{ (ansible_architecture == 'aarch64') | ternary('arm64', 'amd64') }}"
    signed_by: https://download.docker.com/linux/ubuntu/gpg
  register: apt_repository_docker_client_deb822
  become: true
  tags:
    - docker_client

# Coalesce the version-gated registers so downstream tasks keep
# referencing apt_repository_docker_client.changed without caring
# which branch ran. Includes the per-branch prereq installs
# (apt_install_gpg on jammy, apt_install_python3_debian on
# resolute) so check mode -- where the repo task is gated out by
# the prereq install -- still propagates a "would-change" signal;
# otherwise install docker client would run in check mode against
# an unconfigured repo.
- name: Track repository changes
  set_fact:
    apt_repository_docker_client:
      changed: "{{ apt_repository_docker_client_legacy is changed or apt_repository_docker_client_deb822 is changed or apt_install_gpg is changed or apt_install_python3_debian is changed }}"
  tags:
    - docker_client

# deb822_repository writes the .sources file but doesn't run
# `apt update`, so the install below would otherwise hit a stale
# cache (cache_valid_time=3600) and fail to find docker-ce-cli.
# Force a refresh on the run that actually changed the repo.
- name: Refresh apt cache after docker repo change
  when: apt_repository_docker_client.changed and not ansible_check_mode
  apt:
    update_cache: true
  become: true
  tags:
    - docker_client

- name: Install docker client
  when: not (ansible_check_mode and apt_repository_docker_client.changed)
  apt:
    pkg:
      - docker-ce-cli
      - docker-buildx-plugin
      - docker-compose-plugin
    cache_valid_time: 3600
  become: true
  tags:
    - docker_client

# Docker CLI defaults to /var/run/docker.sock; point it at the rootful podman
# socket instead. POSIX `:=` form so an operator-set DOCKER_HOST (e.g. for
# debugging against a remote daemon) survives a login. /etc/profile.d/ covers
# login shells for humans; services that shell out to `docker` need
# DOCKER_HOST set in their unit env directly.
- name: Point docker CLI at podman socket
  copy:
    dest: /etc/profile.d/docker_client.sh
    content: |
      : "${DOCKER_HOST:=unix:///run/podman/podman.sock}"
      export DOCKER_HOST
    owner: root
    group: root
    mode: "0644"
    backup: true
    validate: bash -n %s
  become: true
  tags:
    - docker_client

# Transitional: prior versions of this role wrote a hyphenated filename;
# delete it so prod hosts converge cleanly. Drop this task once every host
# has applied the rename.
- name: Remove legacy hyphenated profile.d shim
  file:
    path: /etc/profile.d/docker-client.sh
    state: absent
  become: true
  tags:
    - docker_client

- name: Add podman-socket group
  group:
    name: podman-socket
    system: true
  register: docker_client_podman_socket_group
  become: true
  tags:
    - docker_client

- name: Add user to podman-socket group
  when: not (ansible_check_mode and docker_client_podman_socket_group.changed)
  import_role:
    name: usergroup_immediate
    tasks_from: user
  vars:
    usergroup_immediate_group: podman-socket
  tags:
    - docker_client
