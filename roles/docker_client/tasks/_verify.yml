# Exercises the docker_client role's contract:
# 1) docker / docker-buildx-plugin / docker-compose-plugin are
#    installed and runnable (binary exec, not just dpkg state).
# 2) /etc/profile.d/docker_client.sh fires in a login shell and
#    exports DOCKER_HOST=unix:///run/podman/podman.sock. docker
#    itself honoring $DOCKER_HOST is upstream's contract; the
#    podman role's contract owns whether the socket answers.
# 3) ansible_user_id resolves to a podman-socket member via nsswitch
#    (post-reset_connection, i.e. what a fresh login picks up).

# docker version returns rc=1 when it can't reach the daemon, even
# when --format only asks for client fields -- the server query is
# unconditional. The test VM has no podman socket, so the failure
# is expected; we only care that stdout reports a parseable client
# version. failed_when: false keeps the task green so the assert
# below speaks for itself.
- name: _verify | docker CLI is installed and runnable
  command: >-
    docker version --format '{% raw %}{{.Client.Version}}{% endraw %}'
  changed_when: false
  failed_when: false
  register: _verify_docker_version

- name: _verify | docker client version parses
  assert:
    that:
      - _verify_docker_version.stdout is match('^[0-9]+\.[0-9]+\.[0-9]+')
    fail_msg: >-
      Expected docker client version like X.Y.Z,
      got stdout={{ _verify_docker_version.stdout | default('') }}

- name: _verify | buildx plugin loads
  command: docker buildx version
  changed_when: false
  register: _verify_buildx_version

- name: _verify | buildx version is non-empty
  assert:
    that:
      - _verify_buildx_version.stdout | length > 0
    fail_msg: >-
      docker buildx version produced no stdout;
      got stdout={{ _verify_buildx_version.stdout | default('') }}

- name: _verify | compose plugin loads
  command: docker compose version --short
  changed_when: false
  register: _verify_compose_version

- name: _verify | compose version is non-empty
  assert:
    that:
      - _verify_compose_version.stdout | length > 0
    fail_msg: >-
      docker compose version --short produced no stdout;
      got stdout={{ _verify_compose_version.stdout | default('') }}

# bash -lc starts a login shell, which sources /etc/profile and
# therefore /etc/profile.d/docker_client.sh. A non-login shell would
# miss the shim and silently inherit ansible's own env. Probing
# $DOCKER_HOST directly checks the contract the role promises
# without depending on a running daemon or on docker subcommand
# quirks -- e.g. `docker context inspect default` returns the
# static context's stored endpoint, which DOCKER_HOST overrides
# at the resolver level rather than mutating.
- name: _verify | login-shell shim exports DOCKER_HOST
  command: bash -lc 'printf %s "$DOCKER_HOST"'
  changed_when: false
  register: _verify_docker_host_env

- name: _verify | DOCKER_HOST resolves to the podman socket
  assert:
    that:
      - _verify_docker_host_env.stdout == 'unix:///run/podman/podman.sock'
    fail_msg: >-
      Expected DOCKER_HOST=unix:///run/podman/podman.sock,
      got {{ _verify_docker_host_env.stdout }}

# id -nG reports the groups nsswitch resolves for the user, i.e.
# the supplementary set a fresh login shell or service would pick
# up. That's a stronger check than parsing /etc/group via getent:
# it exercises the same path that consumers (login shells, the
# rootful podman socket's permission check) actually use, and it
# witnesses the post-reset_connection state that usergroup_immediate
# is named for.
- name: _verify | Read ansible_user_id supplementary groups
  command: id -nG {{ ansible_user_id }}
  changed_when: false
  register: _verify_ansible_user_groups

- name: _verify | ansible_user_id resolves to podman-socket member
  assert:
    that:
      - "'podman-socket' in _verify_ansible_user_groups.stdout.split()"
    fail_msg: >-
      Expected {{ ansible_user_id }} to have podman-socket in its
      supplementary group set; got
      {{ _verify_ansible_user_groups.stdout | default('') }}
