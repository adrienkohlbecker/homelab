# crashkernel= delivery splits on grub_bootloader: GRUB hosts rely on the
# distro kdump-tools.cfg in grub.d; ZBM hosts write a ZFS cmdline property.
# The minimal cell exercises the GRUB path and its _verify assertions.
machines:
  box:
  minimal:
skip:
  minimal: >-
    Reboot in _verify: the first become task after the helper's reboot
    times out in CI (mitogen "Connection timed out"). Passes in every solo
    reproduction tried -- box, noble-minimal, and a CI-identical container
    (same image, passt, network, vault); fails only in the live CI matrix.
    The differentiating factor is not yet identified. Quarantined so it
    can't gate a green run; remove once the reboot helper is fixed
    (roles/reboot).
