- name: Add radarr group
  group:
    name: radarr
    system: true
  become: true
  tags:
    - radarr

- name: Add media group
  import_role:
    name: media
    tasks_from: group
  tags:
    - radarr

- name: Add radarr user
  user:
    name: radarr
    group: radarr
    groups: media
    createhome: false
    system: true
    shell: /usr/sbin/nologin
    home: /nonexistent
  become: true
  register: radarr_user
  tags:
    - radarr

- name: Create configuration directory
  when: not (ansible_check_mode and radarr_user.changed)
  file:
    dest: /mnt/services/radarr
    state: directory
    owner: radarr
    group: media
    mode: "0755"
  become: true
  tags:
    - radarr

- name: Create sqlite directory
  when: not (ansible_check_mode and radarr_user.changed)
  file:
    dest: /mnt/services/sqlite/radarr
    state: directory
    owner: radarr
    group: media
    mode: "0755"
  become: true
  tags:
    - radarr

# Radarr hardcodes its DBs at /config/<name>.db and writes -wal/-shm next to
# the resolved path. Symlink at /config so SQLite resolves through to the
# 4K-recordsize sqlite dataset before computing WAL location.
- name: Symlink radarr SQLite DBs onto sqlite dataset
  when: not (ansible_check_mode and radarr_user.changed)
  file:
    src: "/mnt/services/sqlite/radarr/{{ item }}"
    dest: "/mnt/services/radarr/{{ item }}"
    state: link
    force: true
    owner: radarr
    group: media
    follow: false
  become: true
  loop:
    - radarr.db
    - logs.db
  tags:
    - radarr

- name: Configure radarr
  # Render via copy:content + regex_replace because radarr rewrites
  # config.xml on shutdown without a trailing newline; a plain template:
  # leaves us drifting forever.
  copy:
    content: "{{ lookup('template', 'config.xml.j2') | regex_replace('\\n+$', '') }}"
    dest: /mnt/services/radarr/config.xml
    owner: radarr
    group: media
    mode: "0600"
    backup: true
  register: radarr_conf
  become: true
  tags:
    - radarr

- name: Install radarr service
  import_role:
    name: systemd_unit
    tasks_from: install
  vars:
    systemd_unit_args:
      src: radarr.service.j2
      condition: "{{ not (ansible_check_mode and radarr_user.changed) }}"
  tags:
    - radarr

- name: Enable radarr service
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: radarr
      condition: "{{ not (ansible_check_mode and (systemd_unit.changed or radarr_user.changed)) }}"
      restart: "{{ systemd_unit.changed or radarr_conf.changed }}"
  tags:
    - radarr

- name: Configure nginx
  import_role:
    name: nginx
    tasks_from: site
  vars:
    nginx_site_args:
      subdomain: radarr
      proxy_pass: http://localhost:7878/
      csp_additional: "connect-src plex.tv *.plex.tv {{ nginx_csp_default }}"
  tags:
    - radarr
