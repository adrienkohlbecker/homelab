- name: Add media group
  import_role:
    name: media
    tasks_from: group
  tags:
    - radarr

- name: Set up radarr system user, group, and config dir
  import_role:
    name: service_user
    tasks_from: user
  vars:
    service_user_args:
      name: radarr
      extra_groups: [ media ]
      # linuxserver/radarr's s6 init recursively chowns /config to
      # PUID:PGID=radarr:media on every container start. Match it here
      # so ansible doesn't flap the dir's gid back to `radarr` each run.
      config_dir_group: media
  tags:
    - radarr

# Radarr hardcodes its DBs at /config/<name>.db and writes -wal/-shm next to
# the resolved path. Symlink at /config so SQLite resolves through to the
# 4K-recordsize sqlite dataset before computing WAL location. The symlink
# target matches the host path so it resolves identically inside the
# container (see matching --volume in radarr.service.j2). pre_create plants
# empty files on a cold host so state=link doesn't refuse the dangling
# symlink before Radarr creates the DBs on first boot.
- name: Pre-create sqlite dataset and symlink radarr DBs onto it
  import_role:
    name: sqlite_dataset
    tasks_from: dataset
  vars:
    sqlite_dataset_args:
      name: radarr
      owner: radarr
      group: media
      mode: "0750"
      condition: "{{ not (ansible_check_mode and radarr_user.changed) }}"
      pre_create: true
      links:
        - /mnt/services/radarr/radarr.db
        - /mnt/services/radarr/logs.db
  tags:
    - radarr

- name: Configure radarr
  # Render via copy:content + regex_replace because radarr rewrites
  # config.xml on shutdown without a trailing newline; a plain template:
  # leaves us drifting forever.
  copy:
    content: "{{ lookup('template', 'config.xml.j2') | regex_replace('\\n+$', '') }}"
    dest: /mnt/services/radarr/config.xml
    owner: radarr
    group: media
    mode: "0600"
    backup: true
    validate: python3 -c 'import xml.etree.ElementTree as ET, sys; ET.parse(sys.argv[1])' "%s"
  register: radarr_conf
  # ansible.cfg sets [diff] always=True + verbosity=1, so without this the
  # rendered <ApiKey> would print to the operator/CI log on write & rotation.
  no_log: true
  become: true
  tags:
    - radarr

- name: Install radarr service
  import_role:
    name: systemd_unit
    tasks_from: install
  vars:
    systemd_unit_args:
      src: radarr.service.j2
      condition: "{{ not (ansible_check_mode and radarr_user.changed) }}"
  tags:
    - radarr

- name: Enable radarr service
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: radarr
      condition: "{{ not (ansible_check_mode and (radarr_service_result.changed or radarr_user.changed)) }}"
      restart: "{{ radarr_service_result.changed or radarr_conf.changed or radarr_user.changed or media_group.changed }}"
  tags:
    - radarr

- name: Configure nginx
  import_role:
    name: nginx
    tasks_from: site
  vars:
    nginx_site_args:
      subdomain: radarr
      proxy_pass: http://127.0.0.1:{{ service_ports.radarr }}/
      csp_additional: "connect-src plex.tv *.plex.tv {{ nginx_csp_default }}"
      # See sonarr's nginx_site_args comment.
      auth: required
  tags:
    - radarr
