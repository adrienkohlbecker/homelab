# Negative probe first: confirms /api/v3/* enforces the apikey. Pairs with the
# auth'd probe below -- together they prove the apikey we templated is both
# required by radarr and the one it accepted. Without this, a future bug that
# disabled apikey enforcement would let the auth'd probe pass on any key.
- name: _verify | Radarr /api/v3/system/status rejects unauth'd requests
  uri:
    url: http://127.0.0.1:{{ service_ports.radarr }}/api/v3/system/status
    status_code: 401
  register: _radarr_http_unauth
  retries: 30
  delay: 2
  until: _radarr_http_unauth.status == 401

# Authenticated probe -- proves the apikey we templated into config.xml is
# the one the running container accepted, not just one we wrote to disk.
# Header form keeps the key out of journald.
- name: _verify | Radarr answers /api/v3/system/status with our apikey
  uri:
    url: http://127.0.0.1:{{ service_ports.radarr }}/api/v3/system/status
    headers:
      X-Api-Key: "{{ radarr_api_key }}"
    status_code: 200
    return_content: true
  register: _radarr_http
  retries: 30
  delay: 2
  until: _radarr_http.status == 200
  failed_when: (_radarr_http.json | default({})) | length == 0

# The vhost is `auth: required`, so the real browser access pattern is an
# Authelia-gated UI -- the API path above is reached intra-stack via
# radarr.dns.podman with X-Api-Key, bypassing nginx entirely. With the
# stub in gate mode (see _setup.yml), assert a cookieless GET / lands on
# nginx's error_page 401 =302 redirect to the portal. This is the only
# probe that fails if `auth: required` is dropped from nginx_site_args
# (the loopback apikey probes stay green without it). Asserting the 302
# returnUrl (rd=) echoes radarr's own URL proves the Host header routed to
# radarr's server_name (not the default vhost) and the request URI survived.
- name: _verify | Radarr UI gate redirects unauthenticated requests to Authelia
  uri:
    url: https://localhost/
    headers:
      Host: "radarr.{{ inventory_hostname }}.{{ domain }}"
    validate_certs: false
    follow_redirects: none
    status_code: 302
  register: _radarr_nginx_gate
  failed_when: >-
    _radarr_nginx_gate.status != 302
    or 'auth.' not in (_radarr_nginx_gate.location | default(''))
    or ('rd=https://radarr.' ~ inventory_hostname ~ '.' ~ domain) not in (_radarr_nginx_gate.location | default(''))

# The --network media join + radarr.dns.podman FQDN is how intra-stack peers
# (bazarr, seerr, ...) reach radarr with X-Api-Key, bypassing nginx. The
# loopback/nginx probes above don't exercise it -- a dropped `--network media`
# strands that path while leaving them green. Probe from a throwaway container
# on the media network: a keyless GET that must 401 proves aardvark resolves
# the FQDN, radarr listens, and apikey enforcement is reached over that path
# (no key on argv keeps it out of the test VM's journald/ps).
- name: _verify | Radarr is reachable intra-stack at radarr.dns.podman over the media network
  command: >-
    podman run --rm --network media --entrypoint /usr/bin/curl
    docker.io/linuxserver/radarr:5.26.2
    -s -o /dev/null -w %{http_code}
    http://radarr.dns.podman:7878/api/v3/system/status
  become: true
  register: _radarr_dns_podman
  until: _radarr_dns_podman.rc == 0 and _radarr_dns_podman.stdout == "401"
  retries: 15
  delay: 2
  changed_when: false

# The sqlite_dataset symlink + matching --volume is the role's whole reason
# for its non-obvious structure: it lands the DBs (and their -wal/-shm
# siblings) on the 4K-recordsize sqlite dataset. The HTTP probes above pass
# whether or not that routing holds -- a dropped symlink or --volume strands
# the DB at /config inside the container and nothing here would notice.
# Assert it functionally: the on-disk paths are symlinks onto the dataset,
# and radarr wrote real schema through them (the API answering 200 above
# means migration finished, so the dataset-side files are populated by now).
- name: _verify | Stat the radarr DB paths
  stat:
    path: "/mnt/services/radarr/{{ item }}"
    follow: false
  loop:
    - radarr.db
    - logs.db
  register: _radarr_db_links
  become: true

- name: _verify | Radarr DBs are symlinks onto the sqlite dataset
  assert:
    that:
      - item.stat.islnk
      - item.stat.lnk_target == "/mnt/services/sqlite/radarr/" ~ item.item
    fail_msg: "{{ item.item }} is not a symlink onto the sqlite dataset (stat={{ item.stat }})"
  loop: "{{ _radarr_db_links.results }}"
  loop_control:
    label: "{{ item.item }}"

- name: _verify | Stat the dataset-side radarr DBs
  stat:
    path: "/mnt/services/sqlite/radarr/{{ item }}"
  loop:
    - radarr.db
    - logs.db
  register: _radarr_db_files
  become: true

- name: _verify | Radarr wrote real, non-empty DBs onto the dataset
  assert:
    that:
      - item.stat.exists
      - not item.stat.islnk
      - item.stat.size > 0
    fail_msg: "{{ item.item }} on the dataset is missing or empty (stat={{ item.stat }})"
  loop: "{{ _radarr_db_files.results }}"
  loop_control:
    label: "{{ item.item }}"

# config_dir_group: media (see main.yml) exists to stop ansible flapping
# /mnt/services/radarr's gid back to `radarr` against linuxserver's startup
# chown to PUID:PGID=radarr:media. Assert the dir landed group `media` so a
# regression in that setting surfaces here, not as a silent per-converge flap.
- name: _verify | Stat the radarr config dir
  stat:
    path: /mnt/services/radarr
  register: _radarr_config_dir
  become: true

- name: _verify | Radarr config dir is group media
  assert:
    that:
      - _radarr_config_dir.stat.gr_name == "media"
    fail_msg: "/mnt/services/radarr is not group media (gr_name={{ _radarr_config_dir.stat.gr_name }})"

# config.xml is the role's other fragile contract: radarr rewrites it on
# every shutdown, so config.xml.j2's element order + casing must match
# radarr's own writeback byte-for-byte or the next converge drifts and
# restart-churns forever. The idempotence pass can't catch this -- the
# harness never restarts radarr between converges, so radarr never rewrites
# the file. Force a clean shutdown+restart here, then assert our template
# still matches what radarr wrote back.
- name: _verify | Restart radarr to force a config.xml writeback
  systemd:
    name: radarr
    state: restarted
  become: true

- name: _verify | Radarr is back up after the restart
  uri:
    url: http://127.0.0.1:{{ service_ports.radarr }}/api/v3/system/status
    headers:
      X-Api-Key: "{{ radarr_api_key }}"
    status_code: 200
  register: _radarr_http_postrestart
  retries: 60
  delay: 2
  until: _radarr_http_postrestart.status == 200

- name: _verify | Render the config.xml our template would write
  set_fact:
    _radarr_conf_expected: "{{ lookup('template', 'config.xml.j2') | regex_replace('\\n+$', '') }}"

- name: _verify | Read config.xml back after the writeback
  slurp:
    src: /mnt/services/radarr/config.xml
  register: _radarr_conf_ondisk
  become: true

- name: _verify | Templated config.xml survives radarr's writeback without drift
  assert:
    that:
      - (_radarr_conf_ondisk.content | b64decode) == _radarr_conf_expected
    fail_msg: >-
      radarr rewrote config.xml into a form config.xml.j2 no longer matches --
      its element order/casing drifted from radarr's writeback, so deploying
      would restart-churn. Re-capture config.xml.j2 from a running instance.
