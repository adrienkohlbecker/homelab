- name: _test | Install nginx
  import_role:
    name: _test
    tasks_from: nginx

- name: _setup | Install podman
  import_role:
    name: podman
    tasks_from: install

- name: _test | Setup dependencies
  shell: |
    set -euo pipefail
    mkdir /mnt/{services,scratch,media}
  args:
    executable: /bin/bash
    creates: /mnt/services
  become: true
