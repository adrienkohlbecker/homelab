- name: _setup | Add media group
  import_role:
    name: media
    tasks_from: group

- name: _setup | Install nginx
  import_role:
    name: test
    tasks_from: nginx

- name: _setup | Install podman
  import_role:
    name: podman
    tasks_from: install

- name: _setup | Create media podman network
  import_role:
    name: media
    tasks_from: network

- name: _setup | Install authelia stub in gate mode for auth=required tests
  import_role:
    name: test
    tasks_from: authelia_stub
  vars:
    test_authelia_stub_args:
      mode: gate

- name: _setup | Ensure /mnt/services, /mnt/scratch, and /mnt/media exist
  file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - /mnt/services
    - /mnt/services/sqlite
    - /mnt/scratch
    # radarr scopes its bind-mount to /mnt/scratch/radarr (the category dir
    # sabnzbd creates on prod, before radarr starts); the container won't
    # start without the source. Create it here for the isolated test.
    - /mnt/scratch/radarr
    - /mnt/media
  become: true
