# Functional checks for the hostname role. The converge proves the
# hostname/template tasks exited cleanly; these checks verify that
# (a) the kernel transient + /etc/hostname match inventory_hostname,
# (b) /etc/hosts resolves both the short and FQDN forms to 127.0.1.1
# locally without a DNS round-trip, (c) the IPv6 ::1 alias for
# `localhost` is in place, and (d) etc_hosts_entries (when set)
# actually resolves to its configured IP.

- name: _verify | Read running hostname
  command: hostname
  register: _verify_hostname
  changed_when: false

- name: _verify | Read FQDN
  command: hostname --fqdn
  register: _verify_hostname_fqdn
  changed_when: false

- name: _verify | Read /etc/hostname
  slurp:
    src: /etc/hostname
  register: _verify_etc_hostname

- name: _verify | Read static hostname (systemd)
  # The transient kernel hostname can match by DHCP coincidence even when
  # the static (persistent) name is wrong — only the static value survives
  # a reboot, so assert on it directly.
  command: hostnamectl --static
  register: _verify_hostnamectl_static
  changed_when: false

- name: _verify | Hostname state matches inventory
  assert:
    quiet: true
    that:
      - _verify_hostname.stdout == inventory_hostname
      - _verify_hostname_fqdn.stdout == inventory_hostname ~ "." ~ domain
      - (_verify_etc_hostname.content | b64decode).strip() == inventory_hostname
      - _verify_hostnamectl_static.stdout == inventory_hostname
    fail_msg: |
      Hostname state mismatch:
        running: {{ _verify_hostname.stdout }}
        fqdn:    {{ _verify_hostname_fqdn.stdout }}
        /etc/hostname: {{ (_verify_etc_hostname.content | b64decode).strip() }}
        static:  {{ _verify_hostnamectl_static.stdout }}
        expected: {{ inventory_hostname }} / {{ inventory_hostname }}.{{ domain }}

- name: _verify | Resolve inventory_hostname short form
  command: getent -s files ahosts {{ inventory_hostname }}
  register: _verify_getent_short
  changed_when: false

- name: _verify | Resolve inventory_hostname FQDN form
  command: getent -s files ahosts {{ inventory_hostname }}.{{ domain }}
  register: _verify_getent_fqdn
  changed_when: false

- name: _verify | Resolve localhost over IPv6
  command: getent -s files ahostsv6 localhost
  register: _verify_getent_localhost
  changed_when: false

- name: _verify | /etc/hosts resolution matches expectation
  assert:
    quiet: true
    that:
      - "'127.0.1.1' in _verify_getent_short.stdout"
      - "'127.0.1.1' in _verify_getent_fqdn.stdout"
      - "'::1' in _verify_getent_localhost.stdout"
    fail_msg: |
      /etc/hosts resolution mismatch:
        short → {{ _verify_getent_short.stdout | replace('\n', ' / ') }}
        fqdn  → {{ _verify_getent_fqdn.stdout | replace('\n', ' / ') }}
        v6    → {{ _verify_getent_localhost.stdout | replace('\n', ' / ') }}

- name: _verify | Resolve etc_hosts_entries to configured IPs
  when: etc_hosts_entries | default({}) | length > 0
  command: getent -s files ahosts {{ item.key }}
  loop: "{{ etc_hosts_entries | default({}) | dict2items }}"
  register: _verify_etc_hosts_entries
  changed_when: false
  failed_when:
    - _verify_etc_hosts_entries.rc != 0
    - item.value not in _verify_etc_hosts_entries.stdout
