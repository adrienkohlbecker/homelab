- name: Validate inventory_hostname is an RFC 1123 short label
  assert:
    that:
      - inventory_hostname is match('^[a-z0-9]([a-z0-9-]{0,61}[a-z0-9])?$')
    fail_msg: >-
      inventory_hostname={{ inventory_hostname }} is not a valid RFC 1123
      short label (lowercase alnum + hyphen, ≤63 chars, no leading/trailing
      hyphen). FQDNs and uppercase aren't accepted — fix hosts.ini.
  tags:
    - hostname

- name: Set hostname
  hostname:
    name: "{{ inventory_hostname }}"
  become: true
  register: hostname_set
  tags:
    - hostname

- name: Re-gather facts after hostname change
  # Downstream roles in site.yml consume ansible_hostname / ansible_fqdn,
  # populated at play start — before this task ran. Refresh so the rest of
  # the play sees the new identity.
  setup:
  when: hostname_set.changed
  tags:
    - hostname

- name: Touch /var/run/reboot-required on hostname change
  # rsyslog, journald, postfix and other daemons cache gethostname() at start;
  # without a reboot they keep the stale label until they're restarted.
  file:
    path: /var/run/reboot-required
    state: touch
    mode: "0644"
  become: true
  when: hostname_set.changed
  tags:
    - hostname

- name: Setup hosts file
  template:
    src: hosts.j2
    dest: /etc/hosts
    owner: root
    group: root
    mode: "0644"
    backup: true
    lstrip_blocks: true
    trim_blocks: true
    validate: python3 -c 'import sys, ipaddress; [ipaddress.ip_address(l.split()[0]) for l in open(sys.argv[1]) if l.strip() and not l.startswith("#")]' %s
  become: true
  tags:
    - hostname

- name: Check for cloud-init
  stat:
    path: /etc/cloud/cloud.cfg.d
  register: hostname_cloud_init_dir
  tags:
    - hostname

- name: Pin cloud-init to preserve hostname and /etc/hosts
  # cloud-init's manage_etc_hosts can regenerate /etc/hosts on boot from a
  # template, wiping the template above; preserve_hostname stops cc_set_hostname
  # from reverting the hostname on the next boot. Both default-vary per cloud
  # image vendor; pin explicitly. Skips when cloud-init isn't installed
  # (roles/cleanup strips it on prod ZFS hosts).
  when: hostname_cloud_init_dir.stat.exists
  copy:
    dest: /etc/cloud/cloud.cfg.d/90-disable-manage-hosts.cfg
    mode: "0644"
    owner: root
    group: root
    backup: true
    content: |
      manage_etc_hosts: false
      preserve_hostname: true
    validate: python3 -c 'import yaml,sys; yaml.safe_load(open(sys.argv[1]))' %s
  become: true
  tags:
    - hostname
