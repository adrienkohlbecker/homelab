# SSO/OIDC plugin (9p4/jellyfin-plugin-sso). Provides the in-app OIDC
# login flow against Authelia (see notes/jellyfin_sso_rollout.md). The
# plugin is managed .NET (arch-independent) so there is a single
# url/sha256, not the x86_64/aarch64 split other artifacts use.
#
# VERSION CEILING: Jellyfin refuses to load a plugin whose targetAbi
# exceeds the server version. The server image is 10.10.6 (see
# jellyfin.service.j2); v3.5.2.4 targets ABI 10.9.0.0 — the newest
# release that loads on 10.10.x. The maintained 4.x line targets ABI
# 10.11.0.0 and will NOT load here. When Jellyfin is bumped to 10.11,
# move to the 4.x line (and sequence that upgrade carefully — a
# 10.10→10.11 jump may ship an auth-DB migration that re-auths every
# device).
#
# The upstream manifest publishes only an md5 checksum; the sha256 below
# was computed from the verified download per repo convention. The zip
# ships SSO-Auth.dll + IdentityModel.dll + IdentityModel.OidcClient.dll
# + meta.json (meta.json is what makes Jellyfin's plugin manager
# recognise + enable the plugin).
jellyfin_sso_plugin_version: "3.5.2.4"
jellyfin_sso_plugin:
  url: https://github.com/9p4/jellyfin-plugin-sso/releases/download/v{{ jellyfin_sso_plugin_version }}/sso-authentication_{{ jellyfin_sso_plugin_version }}.zip
  sha256: f0341638f87a3596105057e32a8b18409f1c15a4449fda0c1e3010d7543e9c28
