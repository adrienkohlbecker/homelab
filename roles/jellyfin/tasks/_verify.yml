# Loopback probe through the host-side published port -- confirms
# /System/Info/Public returns valid JSON, not just that the container's
# own healthcheck passes (which the unit's --sdnotify=healthy already
# gates the "active" state on).
- name: _verify | Jellyfin /System/Info/Public over loopback
  uri:
    url: http://localhost:{{ service_ports.jellyfin }}/System/Info/Public
    status_code: 200
    return_content: true
  register: _verify_http
  retries: 30
  delay: 2
  until: _verify_http.status == 200
  failed_when: not ((_verify_http.json.ProductName | default('')) is search('^Jellyfin'))

# Exercise the nginx-proxied path -- catches typo'd subdomain or
# proxy_pass regressions that the loopback probe would miss.
- name: _verify | Jellyfin /System/Info/Public via nginx vhost
  uri:
    url: https://localhost/System/Info/Public
    headers:
      Host: "jellyfin.{{ inventory_hostname }}.{{ domain }}"
    validate_certs: false
    status_code: 200
    return_content: true
  register: _verify_http_nginx
  retries: 30
  delay: 2
  until: _verify_http_nginx.status == 200
  failed_when: not ((_verify_http_nginx.json.ProductName | default('')) is search('^Jellyfin'))

# SQLite wiring: the symlinks at /config/data/<name>.db MUST resolve
# through to the dedicated /mnt/services/sqlite/ dataset (the role's
# whole reason to exist). Without this assert a regression in the
# symlink task or the self-pathed bind-mount lands DB writes back on
# the services dataset silently.
- name: _verify | Stat jellyfin SQLite symlinks
  stat:
    path: "/mnt/services/jellyfin/data/{{ item }}"
    follow: false
  register: _verify_symlinks
  become: true
  loop:
    - library.db
    - jellyfin.db

- name: _verify | Assert symlink targets land on sqlite dataset
  assert:
    that:
      - item.stat.islnk
      - item.stat.lnk_target == '/mnt/services/sqlite/jellyfin/' ~ item.item
    fail_msg: >-
      /mnt/services/jellyfin/data/{{ item.item }} should be a symlink
      pointing into /mnt/services/sqlite/jellyfin/, but is
      {{ 'a regular file' if not item.stat.islnk else 'pointing at ' ~ item.stat.lnk_target }}.
  loop: "{{ _verify_symlinks.results }}"
  loop_control:
    label: "{{ item.item }}"

# HW transcoding wiring smoke. On box the device is a phantom set up by
# _test/tasks/fake_render_device.yml (open() returns ENXIO), so anything
# that actually probes VAAPI would fall back to software. The checks
# below verify the ansible-side templating reached the container:
# (1) the device is visible inside the container, (2) the container has
# the render gid in its supplementary groups. Catches a regression in
# the unit template's --device or --group-add lines that the previous
# host-side stat-equality check would have missed (it just compared
# getent against itself).
#
# _verify.yml runs as a separate ansible-playbook invocation, so the
# getent_group fact set in main.yml's converge phase isn't in scope
# here — re-lookup before asserting.
- name: _verify | Re-lookup render gid for assertions
  when: has_transcoding_acceleration
  become: true
  getent:
    database: group
    key: render

- name: _verify | Confirm /dev/dri/renderD128 inside container
  when: has_transcoding_acceleration
  command: podman exec jellyfin stat -c %n /dev/dri/renderD128
  register: _verify_dri_in_container
  changed_when: false
  failed_when: _verify_dri_in_container.stdout != '/dev/dri/renderD128'
  become: true

- name: _verify | Confirm render gid in container supplementary groups
  when: has_transcoding_acceleration
  command: podman exec jellyfin id -G
  register: _verify_container_groups
  changed_when: false
  failed_when: getent_group.render[1] not in _verify_container_groups.stdout.split()
  become: true

# Functional transcode probe: lavfi testsrc → libx264 → HLS segments on
# the /config/transcodes tmpfs. Exercises jellyfin-ffmpeg presence,
# tmpfs writability, and the codec chain in a way stat-only checks
# can't. Software encode so the probe runs identically with or without
# real HW; HW-accelerated transcoding requires real codec silicon and
# isn't covered in CI.
# Full path, not bare `ffmpeg`: the jellyfin/jellyfin image ships
# jellyfin-ffmpeg only at /usr/lib/jellyfin-ffmpeg/ffmpeg and puts nothing
# on $PATH, so `podman exec jellyfin ffmpeg` is rc 127. Do not "simplify"
# this back to bare ffmpeg.
- name: _verify | Functional ffmpeg transcode into /config/transcodes
  command: >-
    podman exec jellyfin /usr/lib/jellyfin-ffmpeg/ffmpeg
    -nostdin -hide_banner -loglevel error
    -f lavfi -i testsrc=duration=2:size=320x180:rate=10
    -c:v libx264 -preset ultrafast
    -f hls -hls_time 1
    -hls_segment_filename /config/transcodes/_verify-%d.ts
    /config/transcodes/_verify.m3u8 -y
  changed_when: false
  become: true

- name: _verify | Confirm transcode produced a non-empty playlist
  command: podman exec jellyfin stat -c %s /config/transcodes/_verify.m3u8
  register: _verify_ffmpeg_output
  changed_when: false
  failed_when: (_verify_ffmpeg_output.stdout | int) == 0
  become: true

# --- SSO plugin ---------------------------------------------------------
# A real OIDC round-trip can't be exercised here: Authelia isn't running
# in the jellyfin role test and the box snakeoil chain doesn't validate
# auth.box.mhaf.fr (the same IdP gap minio/gitea hit). So we assert the
# strongest signals available without a live IdP -- the plugin files are
# present, the DLL actually LOADED (proving the pinned version is
# ABI-compatible with this Jellyfin), and the seeded login button reached
# disk with the host substituted in.
- name: _verify | Stat SSO plugin files
  stat:
    path: "/mnt/services/jellyfin/plugins/sso/{{ item }}"
  register: _verify_sso_files
  become: true
  loop:
    - SSO-Auth.dll
    - IdentityModel.dll
    - IdentityModel.OidcClient.dll
    - meta.json

- name: _verify | Assert SSO plugin files present
  assert:
    that:
      - item.stat.exists
    fail_msg: "SSO plugin file missing: {{ item.item }}"
  loop: "{{ _verify_sso_files.results }}"
  loop_control:
    label: "{{ item.item }}"

# Jellyfin logs "Loaded plugin: <Name> <Version>" (PluginManager.cs:604)
# only for plugins whose targetAbi <= the running server version
# (:702). A plugin pinned too new is skipped, not loaded -- so a matched
# line is the proof the ABI pin in vars/main.yml is right, which a stat
# of the DLL on disk can't give. Logs come over the journald log-driver;
# the container is the same instance from converge, so startup lines are
# still readable.
- name: _verify | Read jellyfin container logs
  command: podman logs jellyfin
  register: _verify_jf_logs
  changed_when: false
  become: true

- name: _verify | Assert SSO plugin loaded (ABI-compatible)
  assert:
    that:
      - >-
        (_verify_jf_logs.stdout ~ _verify_jf_logs.stderr)
        is search('Loaded plugin: SSO-Auth ' ~ jellyfin_sso_plugin_version)
    fail_msg: >-
      Jellyfin did not log loading SSO-Auth {{ jellyfin_sso_plugin_version }}.
      The pin's targetAbi most likely exceeds the running Jellyfin -- check
      jellyfin_sso_plugin_version in vars/main.yml against the server image
      tag in jellyfin.service.j2.

- name: _verify | Read seeded branding.xml
  slurp:
    src: /mnt/services/jellyfin/config/branding.xml
  register: _verify_branding
  become: true

- name: _verify | Assert SSO login button seeded with this host
  assert:
    that:
      - >-
        (_verify_branding.content | b64decode)
        is search('jellyfin\.' ~ inventory_hostname ~ '\.' ~ domain ~ '/sso/OID/start/authelia')
    fail_msg: >-
      branding.xml is missing the SSO login-button form for
      jellyfin.{{ inventory_hostname }}.{{ domain }}.
