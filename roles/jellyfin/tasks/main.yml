- name: Add jellyfin group
  group:
    name: jellyfin
    system: true
  become: true
  tags:
    - jellyfin

- name: Add media group
  group:
    name: media
    system: true
  become: true
  register: media_group
  tags:
    - jellyfin

- name: Add render group
  group:
    name: render
    system: true
  become: true
  register: render_group
  tags:
    - jellyfin

- name: Add jellyfin user
  user:
    name: jellyfin
    group: jellyfin
    groups: media
    createhome: false
    system: true
    shell: /usr/sbin/nologin
    home: /nonexistent
  become: true
  register: jellyfin_user
  tags:
    - jellyfin

- name: Create configuration directory
  when: not (ansible_check_mode and jellyfin_user.changed)
  file:
    dest: /mnt/services/jellyfin
    state: directory
    owner: "{{ jellyfin_user.uid }}"
    group: media
    mode: "0755"
  become: true
  tags:
    - jellyfin

- name: Create sqlite directory
  when: not (ansible_check_mode and jellyfin_user.changed)
  file:
    dest: /mnt/services/sqlite/jellyfin
    state: directory
    owner: "{{ jellyfin_user.uid }}"
    group: media
    mode: "0755"
  become: true
  tags:
    - jellyfin

# Jellyfin hardcodes its DBs under /config/data/. Pre-create the parent dir
# so symlinks below can be placed on a fresh deploy (jellyfin would create
# it on first start, but that race breaks idempotency).
- name: Create jellyfin data directory
  when: not (ansible_check_mode and jellyfin_user.changed)
  file:
    dest: /mnt/services/jellyfin/data
    state: directory
    owner: "{{ jellyfin_user.uid }}"
    group: media
    mode: "0755"
  become: true
  tags:
    - jellyfin

# Symlink the SQLite DBs so Jellyfin's hardcoded /config/data/<name>.db paths
# resolve through to the 4K sqlite dataset before SQLite computes WAL/SHM.
- name: Symlink jellyfin SQLite DBs onto sqlite dataset
  when: not (ansible_check_mode and jellyfin_user.changed)
  file:
    src: "/mnt/services/sqlite/jellyfin/{{ item }}"
    dest: "/mnt/services/jellyfin/data/{{ item }}"
    state: link
    owner: "{{ jellyfin_user.uid }}"
    group: media
    follow: false
  become: true
  loop:
    - library.db
    - jellyfin.db
  tags:
    - jellyfin

# Introskipper is an optional plugin; only manage its DB symlink when its
# data dir is already present.
- name: Check for introskipper plugin data
  stat:
    path: /mnt/services/jellyfin/data/introskipper
  register: jellyfin_introskipper_dir
  become: true
  tags:
    - jellyfin

- name: Symlink introskipper SQLite DB onto sqlite dataset
  when:
    - not (ansible_check_mode and jellyfin_user.changed)
    - jellyfin_introskipper_dir.stat.exists
  file:
    src: /mnt/services/sqlite/jellyfin/introskipper.db
    dest: /mnt/services/jellyfin/data/introskipper/introskipper.db
    state: link
    owner: "{{ jellyfin_user.uid }}"
    group: media
    follow: false
  become: true
  tags:
    - jellyfin

- name: Create scratch directory
  when: not (ansible_check_mode and jellyfin_user.changed)
  file:
    dest: /mnt/scratch/jellyfin
    state: directory
    owner: "{{ jellyfin_user.uid }}"
    group: media
    mode: "0755"
  become: true
  tags:
    - jellyfin

- name: Create transcodes directory
  when: not (ansible_check_mode and jellyfin_user.changed)
  file:
    dest: /mnt/scratch/jellyfin/transcodes
    state: directory
    owner: "{{ jellyfin_user.uid }}"
    group: media
    mode: "0755"
  become: true
  tags:
    - jellyfin

- name: Create scratch directory
  when: not (ansible_check_mode and jellyfin_user.changed)
  file:
    dest: /mnt/scratch/jellyfin
    state: directory
    owner: "{{ jellyfin_user.uid }}"
    group: media
    mode: "0755"
  become: true
  tags:
    - jellyfin

- name: Create cache directory
  when: not (ansible_check_mode and jellyfin_user.changed)
  file:
    dest: /mnt/scratch/jellyfin/cache
    state: directory
    owner: "{{ jellyfin_user.uid }}"
    group: media
    mode: "0755"
  become: true
  tags:
    - jellyfin

- name: Create logs directory
  when: not (ansible_check_mode and jellyfin_user.changed)
  file:
    dest: /var/log/jellyfin
    state: directory
    owner: "{{ jellyfin_user.uid }}"
    group: media
    mode: "0755"
  become: true
  tags:
    - jellyfin

- name: Install jellyfin service
  import_role:
    name: systemd_unit
    tasks_from: template
  vars:
    systemd_unit_src: jellyfin.service
    systemd_unit_condition: "{{ not (ansible_check_mode and jellyfin_user.changed) }}"
  tags:
    - jellyfin

- name: Enable jellyfin service
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_src: jellyfin
    systemd_unit_condition: "{{ not (ansible_check_mode and (systemd_unit.changed or jellyfin_user.changed)) }}"
    systemd_unit_restart: "{{ systemd_unit.changed }}"
  tags:
    - jellyfin

- name: Configure nginx
  import_role:
    name: nginx
    tasks_from: site
  vars:
    nginx_subdomain: jellyfin
    nginx_proxy_pass: http://localhost:8096/
  tags:
    - jellyfin
