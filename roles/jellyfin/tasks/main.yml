- name: Add media group
  import_role:
    name: media
    tasks_from: group
  tags:
    - jellyfin

- name: Lookup render group gid (HW transcoding hosts only)
  import_role:
    name: media
    tasks_from: render_group
  when: has_transcoding_acceleration
  become: true
  tags:
    - jellyfin

- name: Set up jellyfin system user, group, and config dir
  import_role:
    name: service_user
    tasks_from: user
  vars:
    service_user_args:
      name: jellyfin
      extra_groups: [ media ]
      config_dir_group: media
  tags:
    - jellyfin

# Jellyfin hardcodes its DBs under /config/data/. Pre-create the parent dir
# (and the sqlite/scratch/log siblings) so the symlinks below can be placed
# on a fresh deploy; jellyfin would create them on first start, but that
# race breaks idempotency.
- name: Create jellyfin state directories
  when: not (ansible_check_mode and jellyfin_user.changed)
  file:
    dest: "{{ item }}"
    state: directory
    owner: jellyfin
    group: media
    mode: "0755"
  become: true
  loop:
    - /mnt/services/jellyfin/config
    - /mnt/services/jellyfin/data
    - /mnt/services/jellyfin/data/introskipper
    - /mnt/scratch/jellyfin
    - /mnt/scratch/jellyfin/cache
    - /var/log/jellyfin
  tags:
    - jellyfin

- name: Create qemu render-device fixture
  when:
    - qemu_test
    - has_transcoding_acceleration
  import_role:
    name: test
    tasks_from: fake_render_device
  tags:
    - jellyfin

- name: Install tmpfiles.d entry for /var/log/jellyfin reaping
  when: not (ansible_check_mode and jellyfin_user.changed)
  template:
    src: jellyfin.tmpfiles.conf.j2
    dest: /etc/tmpfiles.d/jellyfin.conf
    owner: root
    group: root
    mode: "0644"
    backup: true
    # --dry-run (validate without the --create side effect) landed in systemd
    # 256, so only resolute (26.04, systemd 259) has it -- jammy (249) and noble
    # (255) both lack it and error on the flag. Gate on major >= 26, not the
    # codename; noble falls back to plain --create like jammy.
    validate: >-
      systemd-tmpfiles
      {{ '--dry-run' if ansible_distribution_major_version | int >= 26 else '' }}
      --create %s
  become: true
  tags:
    - jellyfin

# Override jellyfin's default Serilog config to drop the Async-wrapped
# File sink (which writes /config/log/log_<date>.log -> host
# /var/log/jellyfin/log_*.log). The Console sink still routes the same
# records to container stdout, which podman's journald log-driver
# ships to journald -> fluent-bit's systemd input -> HyperDX. Serilog's
# user override replaces the WriteTo array wholesale; the rest of the
# config (MinimumLevel, Enrich) matches the bundled logging.default.json
# so they stay in sync if jellyfin ever changes a default. Per-transcode
# FFmpeg.*.log files in /var/log/jellyfin are written by jellyfin core
# (not Serilog) and are unaffected -- they're per-stream and not tailed
# by fluent-bit either way.
- name: Disable jellyfin Serilog File sink
  when: not (ansible_check_mode and jellyfin_user.changed)
  copy:
    src: logging.json
    dest: /mnt/services/jellyfin/config/logging.json
    owner: jellyfin
    group: media
    mode: "0644"
    backup: true
    validate: python3 -c 'import json,sys; json.load(open(sys.argv[1]))' "%s"
  register: jellyfin_logging_json
  become: true
  tags:
    - jellyfin

# --- SSO/OIDC plugin (Authelia) -----------------------------------------
# In-app OIDC login for the web client + Quick Connect for native apps.
# NOT nginx forward-auth: the jellyfin nginx site stays auth:none so
# native bearer-token clients (TVs/phones/mobile app) keep working. The
# plugin DLLs + meta.json drop under /config/plugins/sso/; the OID config
# and login button are seeded as files Jellyfin reads at startup (it only
# rewrites them on a dashboard save, which the templates' headers forbid).
# Version is pinned in vars/main.yml against the 10.10.6 ABI ceiling.
# Full rationale: notes/jellyfin_sso_rollout.md.
- name: Install unzip for SSO plugin extraction
  apt:
    name: unzip
    state: present
  become: true
  tags:
    - jellyfin

- name: Create SSO plugin directories
  when: not (ansible_check_mode and jellyfin_user.changed)
  file:
    dest: "{{ item }}"
    state: directory
    owner: jellyfin
    group: media
    mode: "0755"
  become: true
  loop:
    - /mnt/services/jellyfin/plugins
    - /mnt/services/jellyfin/plugins/sso
    - /mnt/services/jellyfin/plugins/configurations
  tags:
    - jellyfin

# Plugin policy: only SSO-Auth is source-controlled here, because it is
# auth-critical -- a from-scratch rebuild must come up with working OIDC login.
# The other two plugins in use are operator-installed via the Jellyfin UI and
# left to Jellyfin's own auto-update: Intro Skipper (intro/credit + media-segment
# detection) and Open Subtitles. They are convenience features, not load-bearing,
# so pinning their binaries (download + sha256 + per-Jellyfin-bump ABI ceiling)
# isn't worth the maintenance. The role still owns their managed state -- Intro
# Skipper's introskipper.db rides the 4K sqlite dataset (below) and its
# TaskExtractMediaSegments schedule is pinned via the API (above). After a bare
# rebuild, install both from the UI; their state and schedules then reconcile.
#
# Gate the download on the same version-stamped sentinel the Extract task
# below keys off. The zip stages under /tmp, which is wiped on reboot and
# aged out by systemd-tmpfiles -- so a bare get_url re-fetches every
# converge once the file is gone, even though the plugin is already
# installed. (CI misses this: its two converges run back-to-back with no
# reboot, so /tmp still holds the zip and get_url's checksum short-circuits.)
# When the version is already installed we skip the fetch entirely; a pin
# bump removes the old sentinel match, so the download re-fires for the new
# version.
- name: Check whether the pinned SSO plugin version is installed
  stat:
    path: /mnt/services/jellyfin/plugins/sso/.installed-{{ jellyfin_sso_plugin_version }}
  register: jellyfin_sso_sentinel
  become: true
  tags:
    - jellyfin

- name: Download SSO plugin
  when: not jellyfin_sso_sentinel.stat.exists
  get_url:
    url: "{{ jellyfin_sso_plugin.url }}"
    dest: /tmp/sso-authentication_{{ jellyfin_sso_plugin_version }}.zip
    checksum: sha256:{{ jellyfin_sso_plugin.sha256 }}
    mode: "0644"
  become: true
  tags:
    - jellyfin

# A version bump can rename the bundled assemblies (3.x shipped
# IdentityModel.dll; 4.x ships Duende.IdentityModel.dll). unarchive
# overwrites by name but never prunes, so the prior version's DLL would
# linger beside the new one and risk an assembly-load conflict. On a
# version change (sentinel absent) wipe the plugin dir so extract lands a
# clean set; the OID runtime config lives under plugins/configurations/,
# not here, so it is untouched.
- name: Reset SSO plugin dir on a version change
  when: not jellyfin_sso_sentinel.stat.exists
  file:
    path: /mnt/services/jellyfin/plugins/sso
    state: "{{ item }}"
    owner: jellyfin
    group: media
    mode: "0755"
  loop:
    - absent
    - directory
  become: true
  tags:
    - jellyfin

# Owner jellyfin is required, not cosmetic: the container runs as uid 0
# mapped to the host jellyfin uid, so root-owned files on the host would
# be unreadable inside it. unarchive's own content comparison isn't
# reliably idempotent here (it re-reports changed on re-run), so gate on a
# version-stamped sentinel: the marker name carries the version, so a pin
# bump re-extracts (overwriting the stable-named DLLs) while an unchanged
# version is a no-op.
- name: Extract SSO plugin
  when: not (ansible_check_mode and jellyfin_user.changed)
  unarchive:
    src: /tmp/sso-authentication_{{ jellyfin_sso_plugin_version }}.zip
    dest: /mnt/services/jellyfin/plugins/sso
    remote_src: true
    owner: jellyfin
    group: media
    creates: /mnt/services/jellyfin/plugins/sso/.installed-{{ jellyfin_sso_plugin_version }}
  register: jellyfin_sso_extract
  become: true
  tags:
    - jellyfin

- name: Stamp installed SSO plugin version
  when:
    - not (ansible_check_mode and jellyfin_user.changed)
    - jellyfin_sso_extract is changed
  file:
    path: /mnt/services/jellyfin/plugins/sso/.installed-{{ jellyfin_sso_plugin_version }}
    state: touch
    owner: jellyfin
    group: media
    mode: "0644"
  become: true
  tags:
    - jellyfin

# The SSO plugin's OID provider is NOT seeded as a file here: it lives in
# a custom SerializableDictionary whose XML only round-trips when the
# plugin's own WriteXml produces it -- a hand-written config deserializes
# to an empty dict and Jellyfin overwrites it. It's provisioned via the
# plugin HTTP API after the service is up (see below).
#
# Render via copy:content + rstrip_newlines (not template:) because Jellyfin
# rewrites these XML files via .NET's XmlSerializer, which emits no trailing
# newline; a plain template: adds one, so every run after Jellyfin has
# touched the file would re-diff and trigger a needless restart. Same
# pattern as roles/sonarr (config.xml).
- name: Configure Jellyfin network settings
  when: not (ansible_check_mode and jellyfin_user.changed)
  copy:
    content: "{{ lookup('template', 'network.xml.j2') | rstrip_newlines }}"
    dest: /mnt/services/jellyfin/config/network.xml
    owner: jellyfin
    group: media
    mode: "0600"
    backup: true
    validate: python3 -c 'import xml.dom.minidom,sys; xml.dom.minidom.parse(sys.argv[1])' "%s"
  register: jellyfin_network
  become: true
  tags:
    - jellyfin

- name: Configure Jellyfin branding (SSO login button)
  when: not (ansible_check_mode and jellyfin_user.changed)
  copy:
    content: "{{ lookup('template', 'branding.xml.j2') | rstrip_newlines }}"
    dest: /mnt/services/jellyfin/config/branding.xml
    owner: jellyfin
    group: media
    mode: "0644"
    backup: true
    validate: python3 -c 'import xml.dom.minidom,sys; xml.dom.minidom.parse(sys.argv[1])' "%s"
  register: jellyfin_branding
  become: true
  tags:
    - jellyfin

# The unit's self-pathed --volume /mnt/services/sqlite/jellyfin:/mnt/services/sqlite/jellyfin
# resolves the symlink targets identically inside the container — do not
# change the container-side path without updating sqlite_dataset_args.name
# (which is the host symlink-target stem) in lockstep.
- name: Pre-create sqlite dataset and symlink jellyfin DBs onto it
  import_role:
    name: sqlite_dataset
    tasks_from: dataset
  vars:
    sqlite_dataset_args:
      name: jellyfin
      owner: jellyfin
      group: media
      mode: "0750"
      condition: "{{ not (ansible_check_mode and jellyfin_user.changed) }}"
      # Jellyfin creates these DBs on first boot, so on a cold host the
      # symlink targets don't exist yet -- pre_create plants empty files
      # so state=link doesn't refuse the dangling symlink.
      #
      # Only jellyfin.db (the EF Core store) and the Intro Skipper DB are
      # managed. The legacy library.db is deliberately absent: 10.11
      # migrates it into jellyfin.db and renames the old file to
      # library.db.old, and a fresh 10.11 install never creates library.db
      # at all -- re-asserting that symlink would only resurrect a link to
      # the stale pre-migration DB.
      pre_create: true
      links:
        - /mnt/services/jellyfin/data/jellyfin.db
        - /mnt/services/jellyfin/data/introskipper/introskipper.db
  tags:
    - jellyfin

- name: Install jellyfin service
  import_role:
    name: systemd_unit
    tasks_from: install
  vars:
    systemd_unit_args:
      src: jellyfin.service.j2
      condition: "{{ not (ansible_check_mode and (jellyfin_user.changed or media_group.changed)) }}"
  tags:
    - jellyfin

- name: Pull jellyfin image
  containers.podman.podman_image:
    name: "{{ jellyfin_image }}"
  register: jellyfin_image_pull
  retries: 3
  delay: 10
  until: jellyfin_image_pull is not failed
  become: true
  tags:
    - jellyfin

- name: Enable jellyfin service
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: jellyfin
      condition: "{{ not (ansible_check_mode and (jellyfin_service_result.changed or jellyfin_user.changed or media_group.changed)) }}"
      restart: >-
        {{ jellyfin_service_result.changed
           or jellyfin_user.changed
           or media_group.changed
           or jellyfin_logging_json.changed | default(false)
           or jellyfin_sso_extract.changed | default(false)
           or jellyfin_branding.changed | default(false)
           or jellyfin_network.changed | default(false) }}
  tags:
    - jellyfin

# Provision the SSO OID provider via the plugin's HTTP API now that the
# service is up. The plugin stores OidConfigs in a custom
# SerializableDictionary that only round-trips through its own WriteXml,
# so we let the plugin persist it (POST /sso/OID/Add) rather than seeding
# the file. Same fingerprint-sentinel + not-qemu_test shape as roles/gitea:
# the API needs a real Jellyfin admin token (no admin user / token exists
# on the box fixture), and the JSON body is PascalCase to match Jellyfin's
# null-naming-policy, case-sensitive model binder. Roles is [] (empty =>
# every authenticated Authelia user may sign in); AdminRoles=[admins] maps
# the groups claim to a Jellyfin admin. See notes/jellyfin_sso_rollout.md.
- name: Compose desired SSO OID provider state
  when: not qemu_test
  set_fact:
    jellyfin_oidc_state:
      OidEndpoint: "https://auth.{{ authelia_cookie_domain }}"
      OidClientId: jellyfin
      OidSecret: "{{ jellyfin_oidc_client_secret }}"
      Enabled: true
      EnableAuthorization: true
      EnableAllFolders: true
      EnabledFolders: []
      Roles: []
      AdminRoles:
        - admins
      EnableFolderRoles: false
      EnableLiveTvRoles: false
      EnableLiveTv: false
      EnableLiveTvManagement: false
      RoleClaim: groups
      OidScopes:
        - groups
  tags:
    - jellyfin

- name: Read existing SSO OID provisioning fingerprint
  when: not qemu_test
  slurp:
    src: /mnt/services/jellyfin/.oidc_authelia.fingerprint
  register: jellyfin_oidc_fp_slurp
  # Absent on first apply -- swallow so the comparison falls into the
  # "needs provisioning" path.
  failed_when: false
  become: true
  tags:
    - jellyfin

# Fingerprint covers the whole config (incl. the secret's bytes via the
# json hash), so a secret rotation or any field change re-POSTs; the
# sentinel stores only the hash, never the secret.
- name: Compute desired vs current SSO OID fingerprints
  when: not qemu_test
  set_fact:
    jellyfin_oidc_desired_fp: "{{ jellyfin_oidc_state | to_json(sort_keys=true) | hash('sha256') }}"
    jellyfin_oidc_current_fp: "{{ jellyfin_oidc_fp_slurp | slurp_text(default='') }}"
  tags:
    - jellyfin

- name: Provision SSO OID provider via plugin API
  when:
    - not qemu_test
    - jellyfin_oidc_desired_fp != jellyfin_oidc_current_fp
  uri:
    url: http://localhost:{{ service_ports.jellyfin }}/sso/OID/Add/authelia
    method: POST
    headers:
      Authorization: 'MediaBrowser Token="{{ jellyfin_api_token }}"'
    body_format: json
    body: "{{ jellyfin_oidc_state }}"
    status_code: [ 200, 204 ]
  register: jellyfin_oidc_post
  retries: 30
  delay: 2
  until: jellyfin_oidc_post.status | default(0) in [200, 204]
  changed_when: true
  tags:
    - jellyfin

- name: Persist SSO OID provisioning fingerprint  # noqa: require-backup
  when:
    - not qemu_test
    - jellyfin_oidc_desired_fp != jellyfin_oidc_current_fp
  copy:
    content: "{{ jellyfin_oidc_desired_fp }}\n"
    dest: /mnt/services/jellyfin/.oidc_authelia.fingerprint
    owner: jellyfin
    group: media
    mode: "0640"
  become: true
  tags:
    - jellyfin

# Test-only: a fresh box Jellyfin has no admin user, so the API-driven pin below
# would have no token. Bootstrap a throwaway admin via the startup-wizard API
# and mint a token, so the scheduled-task pin (and its _verify) exercise the
# real Jellyfin API on box_deps instead of being skipped. Never runs against
# prod, which authenticates with the vaulted jellyfin_api_token.
- name: Bootstrap a throwaway Jellyfin admin to mint an API token (test only)
  when: qemu_test
  tags:
    - jellyfin
  block:
    - name: Wait for Jellyfin before bootstrapping the admin
      uri:
        url: http://localhost:{{ service_ports.jellyfin }}/System/Info/Public
        status_code: 200
        return_content: true
      register: jellyfin_public_info
      retries: 30
      delay: 2
      until: jellyfin_public_info.status | default(0) == 200
      changed_when: false

    # Wizard endpoints only work before completion -- gate on the live flag so
    # the idempotence re-run (wizard already done) skips them cleanly.
    - name: Run the startup wizard to create the first admin
      when: not (jellyfin_public_info.json.StartupWizardCompleted | default(false))
      block:
        # /System/Info/Public answers 200 well before the wizard subsystem is
        # serviceable, so the wait above clears while POSTs here still 503 with
        # "Server is still starting up" -- especially right after the service
        # task restarts a seconds-old container (SIGINT ignored mid-startup ->
        # 60s SIGKILL -> cold .NET restart). Retry this first wizard call
        # through that window; once it returns 2xx (this endpoint answers 204)
        # the server is past startup and the rest of the block follows
        # immediately.
        - name: Set the startup-wizard locale
          uri:
            url: http://localhost:{{ service_ports.jellyfin }}/Startup/Configuration
            method: POST
            body_format: json
            body:
              UICulture: en-US
              MetadataCountryCode: US
              PreferredMetadataLanguage: en
            status_code: [ 200, 204 ]
          register: jellyfin_wizard_locale
          retries: 30
          delay: 2
          until: jellyfin_wizard_locale.status | default(0) in [200, 204]
          changed_when: true

        # GET /Startup/User creates and returns the default admin; the POST below
        # only *updates* the first user (Users.First()) and 500s with "Sequence
        # contains no elements" if none exists yet. So this GET is load-bearing,
        # not a probe.
        - name: Seed the default admin via the startup wizard
          uri:
            url: http://localhost:{{ service_ports.jellyfin }}/Startup/User
            status_code: 200
          changed_when: true

        - name: Set the startup-wizard admin name and password
          uri:
            url: http://localhost:{{ service_ports.jellyfin }}/Startup/User
            method: POST
            body_format: json
            body:
              Name: "{{ jellyfin_test_admin_user }}"
              Password: "{{ jellyfin_test_admin_password }}"
            status_code: [ 200, 204 ]
          changed_when: true

        - name: Complete the startup wizard
          uri:
            url: http://localhost:{{ service_ports.jellyfin }}/Startup/Complete
            method: POST
            status_code: [ 200, 204 ]
          changed_when: true

    - name: Authenticate as the throwaway admin to mint a token
      uri:
        url: http://localhost:{{ service_ports.jellyfin }}/Users/AuthenticateByName
        method: POST
        headers:
          Authorization: 'MediaBrowser Client="ansible-harness", Device="box", DeviceId="ansible-harness-box", Version="1.0"'
        body_format: json
        body:
          Username: "{{ jellyfin_test_admin_user }}"
          Pw: "{{ jellyfin_test_admin_password }}"
        status_code: 200
        return_content: true
      register: jellyfin_test_auth
      retries: 10
      delay: 2
      until: jellyfin_test_auth.status | default(0) == 200
      changed_when: false

- name: Resolve the effective Jellyfin API token (vaulted on prod, minted on the fixture)
  set_fact:
    jellyfin_effective_api_token: "{{ (jellyfin_test_auth.json.AccessToken | default('')) if qemu_test else jellyfin_api_token }}"
  tags:
    - jellyfin

# Pin the heavy media-reading schedules via the API. Jellyfin ships these as
# IntervalTriggers / late-night DailyTriggers that can fire during the 02:00 UTC
# backup (trickplay generation at 03:00 local = 02:00 UTC in winter is the worst
# case); replace each with a single nightly DailyTrigger in the late-evening
# window. Tasks are resolved by stable Key (not a per-instance GUID). Runs
# wherever a token is available -- vaulted on prod, minted above on the fixture.
# See notes/scheduled_jobs_audit.md and jellyfin_scheduled_task_times in
# vars/main.yml for the per-task times.
- name: Fetch Jellyfin scheduled tasks
  when: jellyfin_effective_api_token | length > 0
  uri:
    url: http://localhost:{{ service_ports.jellyfin }}/ScheduledTasks?isHidden=false
    headers:
      Authorization: 'MediaBrowser Token="{{ jellyfin_effective_api_token }}"'
    return_content: true
    status_code: 200
  register: jellyfin_tasks
  retries: 30
  delay: 2
  until: jellyfin_tasks.status | default(0) == 200
  changed_when: false
  tags:
    - jellyfin

# Idempotent per task: only POST when the live triggers are not already exactly
# our single nightly DailyTrigger -- so an out-of-band UI change is reverted
# while steady state is a no-op. _task is computed per iteration; a Key Jellyfin
# no longer exposes resolves to length 0 and is skipped (the length==1 guard
# short-circuits the [0] lookups before they can error).
- name: Pin the heavy Jellyfin scheduled-task triggers
  when:
    - jellyfin_effective_api_token | length > 0
    - _task | length == 1
    - not (
        (_task[0].Triggers | default([]) | length == 1)
        and (_task[0].Triggers[0].Type | default('')) == 'DailyTrigger'
        and (_task[0].Triggers[0].TimeOfDayTicks | default(-1) | int) == (item.value | int)
      )
  vars:
    _task: "{{ jellyfin_tasks.json | default([]) | selectattr('Key', 'equalto', item.key) | list }}"
  uri:
    url: http://localhost:{{ service_ports.jellyfin }}/ScheduledTasks/{{ _task[0].Id }}/Triggers
    method: POST
    headers:
      Authorization: 'MediaBrowser Token="{{ jellyfin_effective_api_token }}"'
    body_format: json
    body:
      - Type: DailyTrigger
        TimeOfDayTicks: "{{ item.value }}"
    status_code: [ 200, 204 ]
  loop: "{{ jellyfin_scheduled_task_times | dict2items }}"
  loop_control:
    label: "{{ item.key }} -> {{ item.value }}"
  register: jellyfin_scan_post
  changed_when: true
  tags:
    - jellyfin

- name: Configure nginx
  import_role:
    name: nginx
    tasks_from: site
  vars:
    nginx_site_args:
      subdomain: jellyfin
      proxy_pass: http://127.0.0.1:{{ service_ports.jellyfin }}/
      # Jellyfin's reverse-proxy guide recommends 20M for plugin
      # uploads and custom poster art.
      client_max_body_size: 20m
      # Buffering breaks HLS seek latency and stalls /Videos/{id}/stream;
      # jellyfin's own nginx guide says off. The upstream still streams
      # to the client; nginx just stops trying to spool full chunks.
      proxy_buffering: "off"
      # Match proxy_buffering off on the request side — plugin/poster
      # uploads stream directly upstream instead of spooling to
      # /var/lib/nginx/body/ first.
      proxy_request_buffering: "off"
      # 4K HEVC transcode cold-starts routinely exceed the default 60s
      # before the first segment leaves ffmpeg; bump the read timeout so
      # nginx doesn't kill the first request while the backend is alive.
      proxy_read_timeout: 300s
      # Jellyfin's web UI loads cast_sender.js from gstatic for
      # Chromecast support. Narrow the allow-list to script-src so
      # it doesn't fall through to connect-src/frame-src/img-src via
      # default-src.
      csp_additional: "script-src www.gstatic.com {{ nginx_csp_default }}"
      # Slowloris defense on the upload paths: with proxy_request_buffering
      # off, nginx hands bytes upstream as they arrive — without body/header
      # timeouts a 1-byte/sec PUT can pin a worker for proxy_read_timeout
      # (300s here) per connection. nginx's defaults are 60s; tighten the
      # body side since 30s is plenty for a 20m upload over LAN.
      server_conf: |
        client_body_timeout 30s;
        client_header_timeout 10s;
  tags:
    - jellyfin

# Functional HW-transcode gate. This is the only place the real VAAPI/QSV
# path can be exercised: box can't (phantom render node + no codec
# silicon) and _verify runs only against qemu, never prod. A regression to
# silent software fallback (e.g. the crun 0.17 device-cgroup bug that
# denied libdrm's access(F_OK) probe) passes every stat check, so assert
# the real path here -- a short synthetic encode through the same
# libvpl->iHD->i915 chain jellyfin uses, with no dependency on library
# contents. Read-only (encodes to null) so changed_when: false; a nonzero
# rc fails the converge. Skipped on qemu/non-accelerated hosts via the
# gate, and in check mode by command's own default.
- name: Confirm hardware transcoding works
  when:
    - has_transcoding_acceleration
    - not (qemu_test | default(false))
  command: >-
    podman exec jellyfin /usr/lib/jellyfin-ffmpeg/ffmpeg
    -nostdin -hide_banner -loglevel error
    -init_hw_device vaapi=va:/dev/dri/renderD128 -init_hw_device qsv=qs@va
    -filter_hw_device qs
    -f lavfi -i testsrc=size=640x480:rate=30
    -frames:v 30 -vf format=nv12,hwupload=extra_hw_frames=16,format=qsv
    -c:v h264_qsv -f null -
  changed_when: false
  become: true
  tags:
    - jellyfin
