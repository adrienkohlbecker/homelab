- name: Add media group
  import_role:
    name: media
    tasks_from: group
  tags:
    - jellyfin

# Read the render gid from /etc/group on transcoding hosts rather than
# creating it ourselves with `group:`. udev/mesa ship sysusers.d entries
# that own the canonical gid; a dynamic group-create can drift if a
# package later installs a different fixed gid, silently de-aligning
# the container's --group-add from /dev/dri/renderD128's actual owner.
- name: Lookup render group gid (HW transcoding hosts only)
  when: has_transcoding_acceleration
  become: true
  block:
    - name: getent render group
      getent:
        database: group
        key: render
        fail_key: false
    - name: Assert render group present
      assert:
        that:
          - getent_group.render is defined
        fail_msg: >-
          /etc/group has no 'render' entry. On a host with
          has_transcoding_acceleration=true, install one of the
          transcoding driver packages (mesa-va-drivers,
          intel-media-va-driver) — they ship a sysusers.d that owns
          this group — and re-run.
    - name: Capture render gid
      set_fact:
        jellyfin_render_gid: "{{ getent_group.render[1] | int }}"
  tags:
    - jellyfin

- name: Set up jellyfin system user, group, and config dir
  import_role:
    name: service_user
    tasks_from: user
  vars:
    service_user_args:
      name: jellyfin
      extra_groups: [media]
      config_dir_group: media
  tags:
    - jellyfin

# Jellyfin hardcodes its DBs under /config/data/. Pre-create the parent dir
# (and the sqlite/scratch/log siblings) so the symlinks below can be placed
# on a fresh deploy; jellyfin would create them on first start, but that
# race breaks idempotency.
- name: Create jellyfin state directories
  when: not (ansible_check_mode and jellyfin_user.changed)
  file:
    dest: "{{ item }}"
    state: directory
    owner: jellyfin
    group: media
    mode: "0755"
  become: true
  loop:
    - /mnt/services/jellyfin/data
    - /mnt/scratch/jellyfin
    - /mnt/scratch/jellyfin/cache
    - /var/log/jellyfin
  tags:
    - jellyfin

# The sqlite dir is split out because the per-service sqlite subdirs are
# group-tight (0750) across the media stack — only the owning service +
# the media group should be able to list jellyfin's DB files; other users
# on the host have no business there.
- name: Create jellyfin sqlite dir
  when: not (ansible_check_mode and jellyfin_user.changed)
  file:
    dest: /mnt/services/sqlite/jellyfin
    state: directory
    owner: jellyfin
    group: media
    mode: "0750"
  become: true
  tags:
    - jellyfin

- name: Install tmpfiles.d entry for /var/log/jellyfin reaping
  when: not (ansible_check_mode and jellyfin_user.changed)
  template:
    src: jellyfin.tmpfiles.conf.j2
    dest: /etc/tmpfiles.d/jellyfin.conf
    owner: root
    group: root
    mode: "0644"
    backup: true
    validate: >-
      systemd-tmpfiles
      {{ '--dry-run' if ansible_distribution_release not in ['jammy'] else '' }}
      --create %s
  become: true
  tags:
    - jellyfin

# Introskipper is an optional plugin; only manage its DB symlink when its
# data dir is already present.
- name: Check for introskipper plugin data
  stat:
    path: /mnt/services/jellyfin/data/introskipper
  register: jellyfin_introskipper_dir
  become: true
  tags:
    - jellyfin

# Symlink the SQLite DBs so Jellyfin's hardcoded /config/data/<name>.db paths
# resolve through to the 4K sqlite dataset before SQLite computes WAL/SHM.
# The matching --volume in jellyfin.service.j2 is self-pathed
# (/mnt/services/sqlite/jellyfin:/mnt/services/sqlite/jellyfin) so the
# symlink targets resolve identically inside the container -- do not change
# the container-side path without updating the symlink src in lockstep.
#
# No `force:` on the link tasks: `state: link` defaults to refusing to
# convert a regular file into a symlink (it raises "refusing to convert
# between file and link for ..."), which is exactly the safety we want
# on a snapshot-restore / downgrade where a real DB might already sit
# at the dest. Resolve by moving the offending file under
# /mnt/services/sqlite/jellyfin/ before re-running.
- name: Symlink jellyfin SQLite DBs onto sqlite dataset
  when: not (ansible_check_mode and jellyfin_user.changed)
  file:
    src: "/mnt/services/sqlite/jellyfin/{{ item }}"
    dest: "/mnt/services/jellyfin/data/{{ item }}"
    state: link
    owner: jellyfin
    group: media
    follow: false
  become: true
  loop:
    - library.db
    - jellyfin.db
  tags:
    - jellyfin

- name: Symlink introskipper SQLite DB onto sqlite dataset
  when:
    - not (ansible_check_mode and jellyfin_user.changed)
    - jellyfin_introskipper_dir.stat.exists
  file:
    src: /mnt/services/sqlite/jellyfin/introskipper.db
    dest: /mnt/services/jellyfin/data/introskipper/introskipper.db
    state: link
    owner: jellyfin
    group: media
    follow: false
  become: true
  tags:
    - jellyfin

- name: Install jellyfin service
  import_role:
    name: systemd_unit
    tasks_from: install
  vars:
    systemd_unit_args:
      src: jellyfin.service.j2
      condition: "{{ not (ansible_check_mode and jellyfin_user.changed) }}"
  tags:
    - jellyfin

- name: Enable jellyfin service
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: jellyfin
      condition: "{{ not (ansible_check_mode and (jellyfin_service_result.changed or jellyfin_user.changed)) }}"
      restart: "{{ jellyfin_service_result.changed or jellyfin_user.changed or media_group.changed }}"
  tags:
    - jellyfin

- name: Configure nginx
  import_role:
    name: nginx
    tasks_from: site
  vars:
    nginx_site_args:
      subdomain: jellyfin
      proxy_pass: http://localhost:{{ service_ports.jellyfin }}/
      # Jellyfin's reverse-proxy guide recommends 20M for plugin
      # uploads and custom poster art.
      client_max_body_size: 20m
      # Buffering breaks HLS seek latency and stalls /Videos/{id}/stream;
      # jellyfin's own nginx guide says off. The upstream still streams
      # to the client; nginx just stops trying to spool full chunks.
      proxy_buffering: "off"
      # Match proxy_buffering off on the request side — plugin/poster
      # uploads stream directly upstream instead of spooling to
      # /var/lib/nginx/body/ first.
      proxy_request_buffering: "off"
      # 4K HEVC transcode cold-starts routinely exceed the default 60s
      # before the first segment leaves ffmpeg; bump the read timeout so
      # nginx doesn't kill the first request while the backend is alive.
      proxy_read_timeout: 300s
      # Jellyfin's web UI loads cast_sender.js from gstatic for
      # Chromecast support. Narrow the allow-list to script-src so
      # it doesn't fall through to connect-src/frame-src/img-src via
      # default-src.
      csp_additional: "script-src www.gstatic.com {{ nginx_csp_default }}"
      # Slowloris defense on the upload paths: with proxy_request_buffering
      # off, nginx hands bytes upstream as they arrive — without body/header
      # timeouts a 1-byte/sec PUT can pin a worker for proxy_read_timeout
      # (300s here) per connection. nginx's defaults are 60s; tighten the
      # body side since 30s is plenty for a 20m upload over LAN.
      server_conf: |
        client_body_timeout 30s;
        client_header_timeout 10s;
  tags:
    - jellyfin
