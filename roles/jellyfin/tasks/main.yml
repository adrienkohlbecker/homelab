- name: Add media group
  import_role:
    name: media
    tasks_from: group
  tags:
    - jellyfin

# Read the render gid from /etc/group on transcoding hosts rather than
# creating it ourselves. udev/mesa ship sysusers.d entries that own the
# canonical gid; creating dynamically with `group:` can drift if a
# package later installs a different fixed gid, silently de-aligning
# the container's --group-add from /dev/dri/renderD128's actual owner.
# Failing loud is the right call: a transcoding host with no render
# group means hardware acceleration would fall back to software,
# which is worse than a noisy ansible failure.
- name: Lookup render group gid (HW transcoding hosts only)
  when: has_transcoding_acceleration
  getent:
    database: group
    key: render
    fail_key: true
  become: true
  tags:
    - jellyfin

- name: Capture render group fact
  when: has_transcoding_acceleration
  set_fact:
    render_group:
      gid: "{{ getent_group.render[1] }}"
  tags:
    - jellyfin

- name: Set up jellyfin system user, group, and config dir
  import_role:
    name: service_user
    tasks_from: user
  vars:
    service_user_args:
      name: jellyfin
      extra_groups: [media]
      config_dir_group: media
  tags:
    - jellyfin

# Jellyfin hardcodes its DBs under /config/data/. Pre-create the parent dir
# (and the sqlite/scratch/log siblings) so the symlinks below can be placed
# on a fresh deploy; jellyfin would create them on first start, but that
# race breaks idempotency.
- name: Create jellyfin state directories
  when: not (ansible_check_mode and jellyfin_user.changed)
  file:
    dest: "{{ item }}"
    state: directory
    owner: jellyfin
    group: media
    mode: "0755"
  become: true
  loop:
    - /mnt/services/sqlite/jellyfin
    - /mnt/services/jellyfin/data
    - /mnt/scratch/jellyfin
    - /mnt/scratch/jellyfin/cache
    - /var/log/jellyfin
  tags:
    - jellyfin

# Introskipper is an optional plugin; only manage its DB symlink when its
# data dir is already present.
- name: Check for introskipper plugin data
  stat:
    path: /mnt/services/jellyfin/data/introskipper
  register: jellyfin_introskipper_dir
  become: true
  tags:
    - jellyfin

# Pre-flight: refuse to clobber a real DB. `force: true` on the link tasks
# below would silently unlink() a regular file before planting the symlink,
# so a restored snapshot or downgraded jellyfin that recreated /config/data/
# would lose live state on the next play. The dest must be absent or already
# a symlink.
- name: Pre-flight SQLite DB paths for symlink safety
  stat:
    path: "{{ item }}"
  register: jellyfin_db_stats
  become: true
  loop:
    - /mnt/services/jellyfin/data/library.db
    - /mnt/services/jellyfin/data/jellyfin.db
    - /mnt/services/jellyfin/data/introskipper/introskipper.db
  tags:
    - jellyfin

- name: Assert no real DB file exists at the symlink dest
  assert:
    that:
      - not (item.stat.exists | default(false)) or (item.stat.islnk | default(false))
    fail_msg: >-
      {{ item.item }} exists as a regular file. Move it onto
      /mnt/services/sqlite/jellyfin/ (preserving the basename) before
      re-running; otherwise the symlink task would delete the live DB.
  loop: "{{ jellyfin_db_stats.results }}"
  loop_control:
    label: "{{ item.item }}"
  tags:
    - jellyfin

# Symlink the SQLite DBs so Jellyfin's hardcoded /config/data/<name>.db paths
# resolve through to the 4K sqlite dataset before SQLite computes WAL/SHM.
# The matching --volume in jellyfin.service.j2 is self-pathed
# (/mnt/services/sqlite/jellyfin:/mnt/services/sqlite/jellyfin) so the
# symlink targets resolve identically inside the container -- do not change
# the container-side path without updating the symlink src in lockstep.
- name: Symlink jellyfin SQLite DBs onto sqlite dataset
  when: not (ansible_check_mode and jellyfin_user.changed)
  file:
    src: "/mnt/services/sqlite/jellyfin/{{ item }}"
    dest: "/mnt/services/jellyfin/data/{{ item }}"
    state: link
    force: true
    owner: "{{ jellyfin_user.uid }}"
    group: media
    follow: false
  become: true
  loop:
    - library.db
    - jellyfin.db
  tags:
    - jellyfin

- name: Symlink introskipper SQLite DB onto sqlite dataset
  when:
    - not (ansible_check_mode and jellyfin_user.changed)
    - jellyfin_introskipper_dir.stat.exists
  file:
    src: /mnt/services/sqlite/jellyfin/introskipper.db
    dest: /mnt/services/jellyfin/data/introskipper/introskipper.db
    state: link
    force: true
    owner: "{{ jellyfin_user.uid }}"
    group: media
    follow: false
  become: true
  tags:
    - jellyfin

- name: Install jellyfin service
  import_role:
    name: systemd_unit
    tasks_from: install
  vars:
    systemd_unit_args:
      src: jellyfin.service.j2
      condition: "{{ not (ansible_check_mode and jellyfin_user.changed) }}"
  tags:
    - jellyfin

- name: Enable jellyfin service
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: jellyfin
      condition: "{{ not (ansible_check_mode and (jellyfin_service_result.changed or jellyfin_user.changed)) }}"
      restart: "{{ jellyfin_service_result.changed or jellyfin_user.changed or media_group.changed }}"
  tags:
    - jellyfin

- name: Configure nginx
  import_role:
    name: nginx
    tasks_from: site
  vars:
    nginx_site_args:
      subdomain: jellyfin
      proxy_pass: http://localhost:{{ service_ports.jellyfin }}/
      # Plugin / poster uploads from the admin UI can exceed the default
      # client_max_body_size (16M); 100M covers stock plugins and custom
      # poster art without blocking installs at the nginx layer.
      client_max_body_size: 100m
      # Buffering breaks HLS seek latency and stalls /Videos/{id}/stream;
      # jellyfin's own nginx guide says off. The upstream still streams
      # to the client; nginx just stops trying to spool full chunks.
      proxy_buffering: "off"
      # 4K HEVC transcode cold-starts routinely exceed the default 60s
      # before the first segment leaves ffmpeg; bump the read timeout so
      # nginx doesn't kill the first request while the backend is alive.
      proxy_read_timeout: 300s
  tags:
    - jellyfin
