# Datasets carved under rpool/services on every zfs_root host. The dict-list
# shape is consumed by both tasks/main.yml (looped into the zfs/tasks_from:
# dataset helper) and tasks/_verify.yml (looped into zfs get assertions), so a
# new dataset is one entry that updates both halves.
#
# The sqlite child carves recordsize=4K for SQLite-heavy services (adguard,
# HA recorder). Matches SQLite's default page_size=4096 exactly: 1× write
# amplification, and each modified page contributes only 4K to the snapshot
# diff instead of 128K at the parent's default. Compression is sacrificed (a 4K
# record can't compress below the 4K ashift=12 sector floor) but snapshot
# growth is the binding constraint. Not the 64K-record/64K-page pairing OpenZFS
# suggests for databases: the apps run SQLite at its stock 4K page size, and
# snapshot growth (not throughput) is what we optimise for here.
# atime=off kills the write-per-read on these DB files. primarycache and logbias
# stay at their ZFS defaults deliberately -- the apps keep only a small
# in-process SQLite page cache, so ARC still earns its keep on cold reads
# (primarycache=metadata would starve it), and the small synchronous commits
# want logbias=latency, not throughput.
#
# autobackup:bak=true tags both datasets for zfs-autobackup; the picker filters
# with `-s local` (see _verify.yml's header for why source matters).
# Order is load-bearing: ZFS requires parent datasets to exist before children.
services_datasets:
  - dataset: rpool/services
    mountpoint: /mnt/services
    extra_properties:
      'autobackup:bak': 'true'
  - dataset: rpool/services/sqlite
    mountpoint: /mnt/services/sqlite
    extra_properties:
      'autobackup:bak': 'true'
      recordsize: '4096'
      atime: 'off'
