# Functional verify for the datasets created by main.yml.
#
# An idempotent converge is not evidence extra_properties actually landed --
# community.general.zfs treats a property whose source is not local|received|-
# as absent, so a value silently inherited from the parent reads back correct
# while never being set locally. For the sqlite child this is load-bearing: an
# inherited recordsize would test-pass yet silently defeat the 4K-page tuning
# the ~10 SQLite consumer roles depend on. `zfs get` source must be `local`,
# not just right -- zfs-autobackup's picker filters with `-s local`
# (roles/zfs_autobackup/templates/zfs_autosnapshot.sh.j2:14), so an inherited
# autobackup:bak=true would test-pass but never get backed up.
#
# Expected values come from services_datasets (vars/main.yml), shared with
# main.yml: the assertions track whatever both halves agree on, and the owner
# probe keeps the role's "I created this dir as root" contract honest.

- name: _verify | Mountpoint property set locally with expected value
  when: zfs_root
  command:
    argv:
      - zfs
      - get
      - -H
      - -p
      - -s
      - local
      - -o
      - value
      - mountpoint
      - "{{ item.dataset }}"
  register: services_verify_mountpoint
  changed_when: false
  failed_when: services_verify_mountpoint.stdout | trim != item.mountpoint
  loop: "{{ services_datasets }}"
  loop_control:
    label: "{{ item.dataset }} mountpoint={{ item.mountpoint }}"
  become: true

- name: _verify | Datasets mounted at mountpoint
  when: zfs_root
  command:
    argv:
      - findmnt
      - --first-only
      - --noheadings
      - --source
      - "{{ item.dataset }}"
      - --mountpoint
      - "{{ item.mountpoint }}"
      - --types
      - zfs
  changed_when: false
  loop: "{{ services_datasets }}"
  loop_control:
    label: "{{ item.mountpoint }} <- {{ item.dataset }}"
  become: true

- name: _verify | Reset property accumulator
  when: zfs_root
  set_fact:
    services_verify_props: []

- name: _verify | Flatten datasets x expected properties
  when: zfs_root
  set_fact:
    services_verify_props: >-
      {{ services_verify_props
         + (item.extra_properties | default({}) | dict2items
            | map('combine', {'dataset': item.dataset}) | list) }}
  loop: "{{ services_datasets }}"
  loop_control:
    label: "{{ item.dataset }}"

- name: _verify | Extra property set locally with expected value
  when: zfs_root
  command:
    argv:
      - zfs
      - get
      - -H
      - -p
      - -s
      - local
      - -o
      - value
      - "{{ item.key }}"
      - "{{ item.dataset }}"
  register: services_verify_prop
  changed_when: false
  failed_when: services_verify_prop.stdout | trim != item.value
  loop: "{{ services_verify_props }}"
  loop_control:
    label: "{{ item.dataset }} {{ item.key }}={{ item.value }}"
  become: true

- name: _verify | Mountpoint owned by root
  when: zfs_root
  stat:
    path: "{{ item.mountpoint }}"
  register: services_verify_owner
  failed_when: >-
    not services_verify_owner.stat.exists
    or not services_verify_owner.stat.isdir
    or services_verify_owner.stat.pw_name != 'root'
    or services_verify_owner.stat.gr_name != 'root'
    or services_verify_owner.stat.mode != '0755'
  loop: "{{ services_datasets }}"
  loop_control:
    label: "{{ item.mountpoint }} owner=root:root"

- name: _verify | Dataset is not readonly
  when: zfs_root
  command:
    argv:
      - zfs
      - get
      - -H
      - -p
      - -o
      - value
      - readonly
      - "{{ item.dataset }}"
  register: services_verify_readonly
  changed_when: false
  failed_when: services_verify_readonly.stdout | trim != 'off'
  loop: "{{ services_datasets }}"
  loop_control:
    label: "{{ item.dataset }} readonly=off"
  become: true

- name: _verify | Mount status units are active
  when: zfs_root
  command:
    argv:
      - systemctl
      - is-active
      - "zfs_mount{{ item.mountpoint | regex_replace('^/$', '/root') | replace('/', '_') }}.service"
  changed_when: false
  loop: "{{ services_datasets }}"
  loop_control:
    label: "zfs_mount{{ item.mountpoint | regex_replace('^/$', '/root') | replace('/', '_') }}.service"
  become: true
