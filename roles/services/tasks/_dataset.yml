# Per-dataset wrapper for the include_tasks loop in main.yml. Uses include_tasks
# + include_role + set_fact (rather than the cheaper import_role + loop +
# task-level vars) because import_role expands inner task names at parse time
# before item is bound, and a task-level vars: dict referencing {{ item }} on
# include_role triggers a parse-time templating warning. Set the consumed role's
# input fact (zfs_dataset_args) directly. Mirrors roles/data/tasks/_dataset.yml.
- name: _dataset | Build zfs_dataset_args
  set_fact:
    zfs_dataset_args:  # noqa: var-naming[no-role-prefix]
      dataset: "{{ item.dataset }}"
      mountpoint: "{{ item.mountpoint }}"
      owner: root
      group: root
      mode: '0755'
      extra_properties: "{{ item.extra_properties | default({}) }}"

- name: _dataset | Configure dataset
  include_role:
    name: zfs
    tasks_from: dataset
