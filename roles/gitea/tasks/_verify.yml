# Loopback probe -- confirms gitea is serving. Type=notify already gates
# "active" on the HTTP listener being bound, so the retries here are
# mostly belt-and-suspenders for slow-cold-DB cases.
- name: _verify | Gitea answers /api/healthz on loopback
  uri:
    url: http://127.0.0.1:{{ service_ports.gitea }}/api/healthz
    status_code: 200
  register: _gitea_healthz
  retries: 30
  delay: 2
  until: _gitea_healthz.status == 200

# Asserts the running gitea matches the version pinned in vars/main.yml
# -- catches "binary updated, unit not restarted" and bad-download cases.
- name: _verify | Gitea /api/v1/version matches pinned gitea_version
  uri:
    url: http://127.0.0.1:{{ service_ports.gitea }}/api/v1/version
    status_code: 200
  register: _gitea_version
  # Substring-match would let pin 1.26.1 be satisfied by 1.26.10. Strip
  # any `+build` metadata (gitea returns `1.26.1+gitea-dev` for non-
  # release builds) and equate exactly.
  failed_when: >-
    _gitea_version.json.version is not defined
    or _gitea_version.json.version.split('+')[0] != gitea_version

# Reverse-proxy chain probe -- a typo'd subdomain or broken
# nginx_site_args would pass the loopback probe above silently.
- name: _verify | Gitea reachable via nginx vhost
  uri:
    url: https://localhost/api/healthz
    headers:
      Host: "gitea.{{ inventory_hostname }}.{{ domain }}"
    validate_certs: false
    status_code: 200

# Confirms gitea actually opened the sqlite db at the path we configured
# -- a permissions/mount regression on /mnt/services/sqlite/gitea/ would
# land here as "no such file" with a unit still active.
- name: _verify | Gitea sqlite database exists and is owned by git
  stat:
    path: /mnt/services/sqlite/gitea/gitea.db
  register: _gitea_sqlite
  failed_when: >-
    not _gitea_sqlite.stat.exists
    or _gitea_sqlite.stat.pw_name != 'git'
  become: true

# Ask gitea to audit its own state. check-db-version catches a
# half-finished schema migration after a version bump; check-db-
# consistency catches dangling rows from interrupted admin ops;
# authorized-keys catches a corrupted ~git/.ssh/authorized_keys
# rewrite (which can silently expose a bash shell at git@ if the
# command= prefix is lost). Skipping the `paths` check -- it requires
# Log.RootPath + Repository.ROOT to pre-exist as writable dirs, which
# the role intentionally doesn't create.
- name: _verify | Gitea doctor self-checks (db + authorized_keys)
  command: >-
    /usr/local/bin/gitea doctor check
    --run check-db-version,check-db-consistency,authorized-keys
    --config /etc/gitea/app.ini
  environment:
    GITEA_WORK_DIR: /mnt/services/gitea
  become: true
  become_user: git
  changed_when: false

# Functional git roundtrip: confirms the HTTP basic-auth path, git over
# HTTP, sqlite write path, and on-disk repo creation all work end-to-
# end. State checks above can pass on a build that is "running but not
# functional"; this is the smoke test that actually does the job.
- name: _verify | Wipe any prior throwaway clone directory
  file:
    path: /tmp/gitea_verify_clone
    state: absent

# Auth in the rest of this chain is access-token only, so the password
# is never used by anything; --random-password keeps a usable literal
# out of the source tree. The two-step (create user, mint token) shape
# is retained on purpose -- `--access-token` only prints a token on
# fresh create, which would break --keep re-runs.
- name: _verify | Create throwaway admin user
  command: >-
    /usr/local/bin/gitea admin user create
    --username verify --random-password
    --email verify@verify.invalid --admin
    --config /etc/gitea/app.ini
  environment:
    GITEA_WORK_DIR: /mnt/services/gitea
  become: true
  become_user: git
  register: _gitea_user_create
  changed_when: _gitea_user_create.rc == 0
  failed_when: >-
    _gitea_user_create.rc != 0
    and "already exists" not in _gitea_user_create.stderr

# gitea 1.26+ rejects HTTP basic auth for /api/v1/* with "token is
# required" -- need a real access token. --raw prints just the token
# (no preamble) so capture is one filter. Token-name embeds epoch so
# --keep re-runs don't collide with the "name already used" check.
- name: _verify | Generate an access token for the throwaway user
  command: >-
    /usr/local/bin/gitea admin user generate-access-token
    --username verify
    --token-name verify_{{ ansible_date_time.epoch }}
    --scopes all --raw
    --config /etc/gitea/app.ini
  environment:
    GITEA_WORK_DIR: /mnt/services/gitea
  become: true
  become_user: git
  register: _gitea_token
  changed_when: false

# Status 201 on first run, 409 on a --keep re-run. gitea accepts the
# API token as the Basic-auth password (DISABLE_QUERY_AUTH_TOKEN in
# app.ini blocks the ?token=... URL variant); force_basic_auth keeps
# the credential out of ansible's failure-display dict.
- name: _verify | Create a throwaway repo via API
  uri:
    url: http://127.0.0.1:{{ service_ports.gitea }}/api/v1/user/repos
    method: POST
    url_username: verify
    url_password: "{{ _gitea_token.stdout | trim }}"
    force_basic_auth: true
    body_format: json
    body:
      name: functional_test
      auto_init: true
      default_branch: main
    status_code: [ 201, 409 ]

- name: _verify | Git clone the throwaway repo over HTTP  # noqa: latest[git]
  git:
    repo: "http://verify:{{ _gitea_token.stdout | trim }}@127.0.0.1:{{ service_ports.gitea }}/verify/functional_test.git"
    dest: /tmp/gitea_verify_clone
  environment:
    GIT_TERMINAL_PROMPT: "0"

# Commit + push exercises the receive-pack path, which writes through
# gitea -> on-disk repo + sqlite -- the same path a real developer hits.
- name: _verify | Commit and push a stamp
  shell: |
    set -euo pipefail
    cd /tmp/gitea_verify_clone
    git config user.email verify@verify.invalid
    git config user.name verify
    date +%s > stamp.txt
    git add stamp.txt
    git commit -m "verify functional test stamp"
    git push origin main
  args:
    executable: /bin/bash
  environment:
    GIT_TERMINAL_PROMPT: "0"
  register: _gitea_push
  changed_when: true

- name: _verify | Confirm pushed file is fetchable through the API
  uri:
    url: http://127.0.0.1:{{ service_ports.gitea }}/api/v1/repos/verify/functional_test/contents/stamp.txt
    url_username: verify
    url_password: "{{ _gitea_token.stdout | trim }}"
    force_basic_auth: true
    status_code: 200

# SSH roundtrip: the HTTP path above exercises gitea's own listener;
# this exercises a different code path -- host sshd matching the
# pubkey in ~git/.ssh/authorized_keys (rewritten by gitea on key
# add), running the forced `gitea serv` command, and handing off to
# git-upload-pack. ls-remote does the full handshake in ~1s without
# transferring objects.
- name: _verify | Generate throwaway SSH keypair on the target
  command: ssh-keygen -t ed25519 -N "" -f /tmp/gitea_verify_ssh_key -C verify@verify.invalid
  args:
    creates: /tmp/gitea_verify_ssh_key
  changed_when: false

- name: _verify | Slurp throwaway SSH pubkey
  slurp:
    src: /tmp/gitea_verify_ssh_key.pub
  register: _gitea_ssh_pubkey

# 201 on first run, 422 on a --keep re-run (gitea rejects a duplicate
# key fingerprint regardless of title).
- name: _verify | Upload pubkey to verify user via API
  uri:
    url: http://127.0.0.1:{{ service_ports.gitea }}/api/v1/user/keys
    method: POST
    url_username: verify
    url_password: "{{ _gitea_token.stdout | trim }}"
    force_basic_auth: true
    body_format: json
    body:
      title: "verify_{{ ansible_date_time.epoch }}"
      key: "{{ _gitea_ssh_pubkey.content | b64decode | trim }}"
    status_code: [ 201, 422 ]

- name: _verify | Git ls-remote over SSH (exercises gitea-serv + authorized_keys)  # noqa: command-instead-of-module
  command: git ls-remote ssh://git@127.0.0.1:22/verify/functional_test.git HEAD
  environment:
    GIT_SSH_COMMAND: ssh -i /tmp/gitea_verify_ssh_key -o IdentitiesOnly=yes -o IdentityAgent=none -o PreferredAuthentications=publickey -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o BatchMode=yes
    GIT_TERMINAL_PROMPT: "0"
  changed_when: false

# Smoke test for the OIDC CLI tooling. main.yml's add-oauth /
# update-oauth path is gated on `not qemu_test` (the box VM can't
# reach a real Authelia at auth.box.mhaf.fr -- see comment in
# main.yml), so this assertion is shape-only on box: that the CLI
# parses the auth-source DB without erroring. On prod it doubles as
# proof that the provisioning landed.
- name: _verify | Gitea admin auth list runs cleanly
  command: /usr/local/bin/gitea admin auth list --config /etc/gitea/app.ini
  environment:
    GITEA_WORK_DIR: /mnt/services/gitea
  become: true
  become_user: git
  register: _gitea_auth_list
  changed_when: false
  failed_when: >-
    _gitea_auth_list.rc != 0
    or 'ID' not in _gitea_auth_list.stdout
    or 'Name' not in _gitea_auth_list.stdout

- name: _verify | Authelia OIDC source registered (prod only)
  when: not qemu_test
  assert:
    that:
      - _gitea_auth_list.stdout_lines | select('search', '\sauthelia\s+OAuth2\s+true\b') | list | length == 1
    fail_msg: |
      `gitea admin auth list` does not show an active OAuth2 source
      named "authelia". Check the add-oauth task in main.yml -- a
      transient discovery-URL fetch failure leaves no source row.
