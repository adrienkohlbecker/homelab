# get_url with `checksum:` is idempotent: it computes the on-disk
# file's sha256 and skips the download when it matches the pin, so a
# separate `gitea --version` pre-check is redundant. The old pre-check
# also had a substring-match bug -- pinning gitea_version 1.26.1 was
# satisfied by an installed 1.26.10, silently skipping a downgrade.
# tmp_dest on the same filesystem makes the replace an atomic rename,
# so an interrupted download can't leave a partial binary at the dest.
- name: install | Install gitea binary
  get_url:
    url: "{{ gitea_release[ansible_architecture].url }}"
    checksum: "sha256:{{ gitea_release[ansible_architecture].sha256 }}"
    dest: /usr/local/bin/gitea
    mode: "0755"
    owner: root
    group: root
    tmp_dest: /usr/local/bin
  register: gitea_installed
  become: true
