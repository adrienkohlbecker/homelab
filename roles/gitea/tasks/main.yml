- name: Add git group
  group:
    name: git
    system: true
  become: true
  tags:
    - gitea

- name: Add git user
  user:
    name: git
    group: git
    createhome: true
    system: true
    shell: /bin/bash
    home: /home/git
  become: true
  register: gitea_user
  tags:
    - gitea

- name: Create configuration directory
  when: not (ansible_check_mode and gitea_user.changed)
  file:
    dest: "{{ item }}"
    state: directory
    owner: git
    group: git
    mode: "0755"
  become: true
  loop:
    - /mnt/services/gitea
    - /mnt/services/gitea/custom
    - /mnt/services/gitea/data
    - /mnt/services/sqlite/gitea
    - /var/log/gitea
  tags:
    - gitea

- name: Create configuration directory
  when: not (ansible_check_mode and gitea_user.changed)
  file:
    dest: /etc/gitea
    state: directory
    owner: git
    group: git
    mode: "0755"
  become: true
  tags:
    - gitea

- name: Configure gitea
  template:
    src: app.ini.j2
    dest: /etc/gitea/app.ini
    owner: git
    group: git
    mode: "0600"
    backup: true
  register: gitea_conf
  become: true
  tags:
    - gitea

- name: Install gitea binary
  import_tasks: install.yml
  tags:
    - gitea

- name: Install gitea service
  import_role:
    name: systemd_unit
    tasks_from: install
  vars:
    systemd_unit_args:
      src: gitea.service.j2
      condition: "{{ not (ansible_check_mode and gitea_user.changed) }}"
  tags:
    - gitea

- name: Enable gitea service
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: gitea
      condition: "{{ not (ansible_check_mode and (systemd_unit.changed or gitea_user.changed)) }}"
      restart: "{{ systemd_unit.changed or gitea_conf.changed or gitea_installed.changed }}"
  tags:
    - gitea

- name: Configure nginx
  import_role:
    name: nginx
    tasks_from: site
  vars:
    nginx_subdomain: gitea
    nginx_proxy_pass: http://localhost:3000/
    nginx_location_conf: |
      # Otherwise podman uploads return HTTP 413
      client_max_body_size     0;
  tags:
    - gitea
