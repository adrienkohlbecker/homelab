# root's outbound SSH identity for the nightly ZFS backups. Two consumers read
# what this role produces:
#   - zfs_autobackup onsite: `zfs-autobackup --ssh-config /root/.ssh/config
#     --ssh-source zfs_autobackup@<peer>` spawns many short ssh calls per run, so
#     the ControlMaster block in files/ssh_config multiplexes them (load-bearing).
#   - zfs_autobackup offsite: rsync of bak-tagged snapshots to ak@bunk, which pins
#     this host's pubkey to a forced `rrsync -wo` command (host_vars/bunk.yml).
# /root/.ssh/known_hosts for those peers is owned by zfs_autobackup (dest.yml,
# ssh-keyscan), not this role -- so a regenerated keypair needs a manual bunk.yml
# update, which the "Warn on keypair regeneration" task below enforces.
- name: Create ssh directory
  file:
    dest: /root/.ssh
    state: directory
    owner: root
    group: root
    mode: "0700"
  become: true
  register: ssh_root_directory
  tags:
    - ssh_root

- name: Check for existing keypair
  stat:
    path: /root/.ssh/id_ed25519
  become: true
  register: ssh_root_key_stat
  tags:
    - ssh_root

- name: Generate an OpenSSH keypair
  when: not (ansible_check_mode and ssh_root_directory.changed)
  community.crypto.openssh_keypair:
    path: /root/.ssh/id_ed25519
    type: ed25519
    owner: root
    group: root
    mode: "0600"
    comment: root@{{ inventory_hostname }}
    regenerate: full_idempotence
    backend: opensshbin
  become: true
  register: ssh_root_keypair
  tags:
    - ssh_root

# A regenerated key no longer matches the pubkey bunk pins in its forced-command
# authorized_keys, so offsite backups would fail to authenticate until
# host_vars/bunk.yml is updated by hand. Halting the converge here is deliberate:
# it forces that manual step before the host proceeds. Regeneration only happens
# on real key drift/corruption (regenerate: full_idempotence above), never on a
# clean re-run. Skipped under --check so a dry-run never aborts.
- name: Warn on keypair regeneration
  when:
    - not ansible_check_mode
    - ssh_root_keypair.changed | default(false)
    - ssh_root_key_stat.stat.exists
  fail:
    msg: >-
      Root SSH keypair regenerated on {{ inventory_hostname }} -- the old public
      key is now stale in bunk authorized_keys, so offsite backups will fail to
      authenticate. Replace the entry for root@{{ inventory_hostname }} in
      host_vars/bunk.yml ssh_public_keys_additional with the new public key below,
      then re-converge bunk. (If the host was recently renamed in inventory, a
      comment mismatch on the existing key may have triggered this regeneration.)
      {{ ssh_root_keypair.public_key }}
  tags:
    - ssh_root

- name: Configure ssh
  when: not (ansible_check_mode and ssh_root_directory.changed)
  copy:
    src: ssh_config
    dest: /root/.ssh/config
    owner: root
    group: root
    mode: "0600"
    backup: true
    validate: ssh -G -F %s localhost
  become: true
  tags:
    - ssh_root
