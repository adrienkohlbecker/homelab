# Functional testing (an actual SSH to bunk) is impossible on the box fixture: it
# has no WireGuard peer, and known_hosts for the backup peers is gated
# `when: not qemu_test` in zfs_autobackup. So these checks fall back to artifact
# state (key type/mode/owner, config mode/owner) plus `ssh -G`, which parses the
# shipped config and proves the load-bearing directives survive the Host-block
# merge -- the one genuinely functional assertion here. The closing block forces a
# regeneration to confirm the warn/fail gate in main.yml would catch a real
# rotation; safe because the box fixture is disposable.
- name: _verify | Stat /root/.ssh directory
  stat:
    path: /root/.ssh
  register: _ssh_root_dir
  become: true

- name: _verify | Assert /root/.ssh directory exists with mode 0700 owned by root
  assert:
    that:
      - _ssh_root_dir.stat.exists
      - (_ssh_root_dir.stat.mode | default('')) == '0700'
      - (_ssh_root_dir.stat.pw_name | default('')) == 'root'
      - (_ssh_root_dir.stat.gr_name | default('')) == 'root'
    fail_msg: >-
      /root/.ssh: exists={{ _ssh_root_dir.stat.exists }}
      mode={{ _ssh_root_dir.stat.mode | default('absent') }} (want 0700)
      owner={{ _ssh_root_dir.stat.pw_name | default('absent') }}:{{ _ssh_root_dir.stat.gr_name | default('absent') }} (want root:root)

- name: _verify | Stat ed25519 private key
  stat:
    path: /root/.ssh/id_ed25519
  register: _ssh_root_key
  become: true

- name: _verify | Assert ed25519 private key exists with mode 0600 owned by root
  assert:
    that:
      - _ssh_root_key.stat.exists
      - (_ssh_root_key.stat.mode | default('')) == '0600'
      - (_ssh_root_key.stat.pw_name | default('')) == 'root'
      - (_ssh_root_key.stat.gr_name | default('')) == 'root'
    fail_msg: >-
      /root/.ssh/id_ed25519: exists={{ _ssh_root_key.stat.exists }}
      mode={{ _ssh_root_key.stat.mode | default('absent') }} (want 0600)
      owner={{ _ssh_root_key.stat.pw_name | default('absent') }}:{{ _ssh_root_key.stat.gr_name | default('absent') }} (want root:root)

- name: _verify | Stat /root/.ssh/config
  stat:
    path: /root/.ssh/config
  register: _ssh_root_config_file
  become: true

- name: _verify | Assert /root/.ssh/config exists with mode 0600 owned by root
  assert:
    that:
      - _ssh_root_config_file.stat.exists
      - (_ssh_root_config_file.stat.mode | default('')) == '0600'
      - (_ssh_root_config_file.stat.pw_name | default('')) == 'root'
      - (_ssh_root_config_file.stat.gr_name | default('')) == 'root'
    fail_msg: >-
      /root/.ssh/config: exists={{ _ssh_root_config_file.stat.exists }}
      mode={{ _ssh_root_config_file.stat.mode | default('absent') }} (want 0600)
      owner={{ _ssh_root_config_file.stat.pw_name | default('absent') }}:{{ _ssh_root_config_file.stat.gr_name | default('absent') }} (want root:root)

- name: _verify | Assert ssh_config parses cleanly
  command: ssh -G -F /root/.ssh/config localhost
  register: _ssh_root_config
  become: true
  changed_when: false

- name: _verify | Assert expected directives are active
  assert:
    that:
      - "'batchmode yes' in _ssh_root_config.stdout"
      - "'controlmaster auto' in _ssh_root_config.stdout"
      - "'controlpath /root/.ssh/.controlmaster-' in _ssh_root_config.stdout"
      - "'controlpersist 300' in _ssh_root_config.stdout"
      - "'forwardagent no' in _ssh_root_config.stdout"
      - "'identityfile ~/.ssh/id_ed25519' in _ssh_root_config.stdout"
      - "'identitiesonly yes' in _ssh_root_config.stdout"
      - "'preferredauthentications publickey' in _ssh_root_config.stdout"
      - "'serveralivecountmax 2' in _ssh_root_config.stdout"
      - "'serveraliveinterval 30' in _ssh_root_config.stdout"
      - "'connecttimeout 10' in _ssh_root_config.stdout"
    fail_msg: "ssh_config missing expected directives"

- name: _verify | Capture key fingerprint before forced regeneration
  command: ssh-keygen -l -f /root/.ssh/id_ed25519
  register: _ssh_root_fp_before
  become: true
  changed_when: false
  failed_when: "'ED25519' not in _ssh_root_fp_before.stdout"

- name: _verify | Force keypair regeneration to exercise the regen-detection path
  community.crypto.openssh_keypair:
    path: /root/.ssh/id_ed25519
    type: ed25519
    owner: root
    group: root
    mode: "0600"
    comment: root@{{ inventory_hostname }}
    regenerate: always
    backend: opensshbin
  become: true
  register: _ssh_root_regen

- name: _verify | Assert regeneration surfaces as a change with a new public key
  assert:
    that:
      - _ssh_root_regen.changed
      - _ssh_root_regen.public_key is defined
      - _ssh_root_regen.public_key | length > 0
    fail_msg: >-
      openssh_keypair regenerate did not surface as a change -- the warn/fail gate
      in main.yml would miss a real key rotation.

- name: _verify | Assert the regenerated key fingerprint actually differs
  command: ssh-keygen -l -f /root/.ssh/id_ed25519
  register: _ssh_root_fp_after
  become: true
  changed_when: false
  failed_when: _ssh_root_fp_after.stdout == _ssh_root_fp_before.stdout
