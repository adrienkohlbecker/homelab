- name: _verify | Assert /root/.ssh directory exists with mode 0700
  stat:
    path: /root/.ssh
  register: _ssh_root_dir
  become: true
  failed_when: not _ssh_root_dir.stat.exists or _ssh_root_dir.stat.mode != '0700'

- name: _verify | Assert ed25519 private key exists with mode 0600
  stat:
    path: /root/.ssh/id_ed25519
  register: _ssh_root_key
  become: true
  failed_when: not _ssh_root_key.stat.exists or _ssh_root_key.stat.mode != '0600'

- name: _verify | Assert keypair is ed25519
  command: ssh-keygen -l -f /root/.ssh/id_ed25519
  register: _ssh_root_keygen
  become: true
  changed_when: false
  failed_when: "'ED25519' not in _ssh_root_keygen.stdout"

- name: _verify | Assert ssh_config parses cleanly
  command: ssh -G -F /root/.ssh/config localhost
  register: _ssh_root_config
  become: true
  changed_when: false

- name: _verify | Assert expected directives are active
  assert:
    that:
      - "'controlmaster auto' in _ssh_root_config.stdout | lower"
      - "'identityfile ~/.ssh/id_ed25519' in _ssh_root_config.stdout | lower"
      - "'identitiesonly yes' in _ssh_root_config.stdout | lower"
    fail_msg: "ssh_config missing expected directives"
