# Network-stack hardening alongside roles/iptables. Ubuntu's defaults
# are inconsistent (rp_filter=2, log_martians=0, send_redirects=1) —
# pin the secure values explicitly so this file is the single place
# to read for "what's the host's network posture?".

# Disable IPv6 entirely. Cutting the stack at the kernel layer stops
# services that bind on `::` (e.g. transmission) from sitting on a
# silent dead listener, stops neighbor discovery churn, and means we
# don't have to maintain a parallel ip6tables ruleset.
net.ipv6.conf.all.disable_ipv6 = 1
net.ipv6.conf.default.disable_ipv6 = 1

# Strict reverse-path: drop packets whose source IP wouldn't route
# back via the ingress interface (asymmetric-routing / spoofed-source
# filtering).
net.ipv4.conf.all.rp_filter = 1
net.ipv4.conf.default.rp_filter = 1

# Refuse source-routed packets (an attacker can't dictate the path).
net.ipv4.conf.all.accept_source_route = 0
net.ipv4.conf.default.accept_source_route = 0

# Ignore inbound ICMP redirects (an attacker can't reroute our traffic
# to them).
net.ipv4.conf.all.accept_redirects = 0
net.ipv4.conf.default.accept_redirects = 0

# Don't emit ICMP redirects either — we don't act as a router for
# arbitrary clients.
net.ipv4.conf.all.send_redirects = 0
net.ipv4.conf.default.send_redirects = 0

# Log packets with bogus source IPs (e.g. RFC1918 arriving on WAN).
net.ipv4.conf.all.log_martians = 1
net.ipv4.conf.default.log_martians = 1

# SYN-flood mitigation. Default is on in modern Ubuntu; assert anyway.
net.ipv4.tcp_syncookies = 1
