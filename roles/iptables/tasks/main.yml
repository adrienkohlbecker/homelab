- name: Install iptables-persistent
  apt:
    pkg:
      - iptables-persistent
    cache_valid_time: 3600
  become: true
  tags:
    - iptables

# rules.v6 drops everything in the filter table, so IPv6 traffic
# never reaches userspace anyway. Disable at the kernel layer too so
# services that bind on `::` (e.g. transmission) don't sit on a
# silent dead listener and so neighbor discovery doesn't churn.
- name: Disable IPv6 at the kernel level
  ansible.posix.sysctl:
    name: "{{ item }}"
    value: '1'
    sysctl_set: true
    state: present
    reload: true
  loop:
    - net.ipv6.conf.all.disable_ipv6
    - net.ipv6.conf.default.disable_ipv6
  become: true
  tags:
    - iptables

# Network-stack hardening alongside the firewall: assert the
# defenses iptables can't express itself. Ubuntu's defaults are
# inconsistent (rp_filter=2, log_martians=0, send_redirects=1) — pin
# the secure values explicitly so the role is the single place to
# read for "what's the host's network posture?".
#
#  rp_filter=1                  Strict reverse-path: drop packets
#                               whose source IP wouldn't route back
#                               via the ingress interface (asymmetric
#                               routing / spoofed-source filtering).
#  accept_source_route=0        Refuse source-routed packets (an
#                               attacker can't dictate the path).
#  accept_redirects=0           Ignore ICMP redirects (an attacker
#                               can't reroute our traffic to them).
#  send_redirects=0             Don't emit ICMP redirects either; we
#                               don't act as a router for arbitrary
#                               clients.
#  log_martians=1               Log packets with bogus source IPs
#                               (e.g. RFC1918 arriving on WAN).
#  tcp_syncookies=1             SYN-flood mitigation. Default is on
#                               in modern Ubuntu; assert anyway.
- name: Network-stack hardening sysctls
  ansible.posix.sysctl:
    name: "{{ item.name }}"
    value: "{{ item.value }}"
    sysctl_set: true
    state: present
    reload: true
  loop:
    - { name: net.ipv4.conf.all.rp_filter,            value: '1' }
    - { name: net.ipv4.conf.default.rp_filter,        value: '1' }
    - { name: net.ipv4.conf.all.accept_source_route,  value: '0' }
    - { name: net.ipv4.conf.default.accept_source_route, value: '0' }
    - { name: net.ipv4.conf.all.accept_redirects,     value: '0' }
    - { name: net.ipv4.conf.default.accept_redirects, value: '0' }
    - { name: net.ipv4.conf.all.send_redirects,       value: '0' }
    - { name: net.ipv4.conf.default.send_redirects,   value: '0' }
    - { name: net.ipv4.conf.all.log_martians,         value: '1' }
    - { name: net.ipv4.conf.default.log_martians,     value: '1' }
    - { name: net.ipv4.tcp_syncookies,                value: '1' }
  loop_control:
    label: "{{ item.name }}"
  become: true
  tags:
    - iptables

- name: Configure iptables (v4)
  copy:
    src: rules.v4
    dest: /etc/iptables/rules.v4
    owner: root
    group: root
    mode: "0644"
    backup: true
  register: iptables_v4
  become: true
  tags:
    - iptables

- name: Apply iptables v4
  when: iptables_v4.changed
  command: iptables-restore /etc/iptables/rules.v4
  changed_when: true
  become: true
  tags:
    - iptables

# Full restore (no -n) flushes all chains in every table the file
# touches — including third-party chains: netavark (NETAVARK_FORWARD,
# NETAVARK-HOSTPORT-*), libvirt (per-network LIBVIRT_*), fail2ban
# (f2b-* and INPUT jumps). Each integration that adds runtime rules
# needs a stat-gated reload here so a rules.v4 change doesn't leave
# containers / VMs / bans broken. Stat-gates also cover first-apply
# (these tools may not be installed yet — iptables runs early in
# site.yml).
- name: Check for podman binary
  stat:
    path: /usr/bin/podman
  register: iptables_podman_binary
  tags:
    - iptables

- name: Reload netavark/podman firewall rules after restore
  when: iptables_v4.changed and iptables_podman_binary.stat.exists
  command: podman network reload --all
  changed_when: true
  become: true
  tags:
    - iptables

- name: Check for virsh binary (libvirt)
  stat:
    path: /usr/bin/virsh
  register: iptables_virsh_binary
  tags:
    - iptables

- name: List active libvirt networks
  when: iptables_v4.changed and iptables_virsh_binary.stat.exists
  command: virsh net-list --name
  register: iptables_libvirt_networks
  changed_when: false
  become: true
  tags:
    - iptables

# net-destroy + net-start re-installs the network's iptables rules
# without restarting libvirtd or guest VMs. ~1s connectivity blip per
# network for any guest attached to it; guests don't reboot.
- name: Reload libvirt networks (re-installs iptables rules)
  when: iptables_v4.changed and iptables_virsh_binary.stat.exists
  shell: |
    set -euo pipefail
    virsh net-destroy "{{ item }}"
    virsh net-start "{{ item }}"
  args:
    executable: /bin/bash
  loop: "{{ iptables_libvirt_networks.stdout_lines | default([]) | select | list }}"
  changed_when: true
  become: true
  tags:
    - iptables

- name: Check for fail2ban-client binary
  stat:
    path: /usr/bin/fail2ban-client
  register: iptables_fail2ban_binary
  tags:
    - iptables

# fail2ban-client reload re-creates its f2b-* chains and the INPUT
# jump that the iptables-restore just wiped. Active bans persist (in
# fail2ban's database) and get re-applied on reload.
- name: Reload fail2ban (re-installs banned IP iptables rules)
  when: iptables_v4.changed and iptables_fail2ban_binary.stat.exists
  command: fail2ban-client reload
  changed_when: true
  become: true
  tags:
    - iptables

- name: Configure iptables (v6)
  copy:
    src: rules.v6
    dest: /etc/iptables/rules.v6
    owner: root
    group: root
    mode: "0644"
    backup: true
  register: iptables_v6
  become: true
  tags:
    - iptables

- name: Apply iptables v6
  when: iptables_v6.changed
  command: ip6tables-restore /etc/iptables/rules.v6
  changed_when: true
  become: true
  tags:
    - iptables
