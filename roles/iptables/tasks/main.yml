- name: Install nftables
  apt:
    pkg:
      - nftables
    cache_valid_time: 3600
  register: iptables_apt_nftables
  become: true
  tags:
    - iptables

- name: Create nftables.service drop-in directory
  file:
    path: /etc/systemd/system/nftables.service.d
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true
  tags:
    - iptables

# Stock nftables.service ships `ExecStop=/usr/sbin/nft flush ruleset`,
# which would tear down netavark / fail2ban / libvirt tables on any
# `systemctl stop` or `restart`. Scope the stop to our own table.
- name: Install nftables.service ExecStop drop-in
  import_role:
    name: systemd_unit
    tasks_from: copy
  vars:
    systemd_unit_src: override_nftables.conf
    systemd_unit_dest: nftables.service.d/override.conf
    systemd_unit_verify: nftables.service
  tags:
    - iptables

# Pin nf_conntrack at boot so /proc/sys/net/netfilter/nf_conntrack_*
# is populated before systemd-sysctl reads /etc/sysctl.d/. Deliberately
# not modprobed mid-run: loading conntrack on a live host classifies
# every existing TCP connection (no state, no SYN history) as INVALID
# under loose=0 — our `ct state invalid drop` rule then kills SSH
# along with everything else. Settings take effect at next reboot;
# until then the nftables non-SYN drop rules are the only protection
# (which is what was there before this commit anyway).
- name: Pin nf_conntrack at boot
  copy:
    src: modules-load.conf
    dest: /etc/modules-load.d/30-iptables-hardening.conf
    owner: root
    group: root
    mode: "0644"
    backup: true
  become: true
  tags:
    - iptables

# Network-stack hardening (IPv6-disable + ipv4 hardening) lives in
# files/sysctl-hardening.conf. One artifact, one reload — the file
# header documents each setting's rationale.
- name: Install network-stack hardening sysctls
  copy:
    src: sysctl-hardening.conf
    dest: /etc/sysctl.d/30-iptables-hardening.conf
    owner: root
    group: root
    mode: "0644"
    backup: true
  register: iptables_sysctl
  become: true
  tags:
    - iptables

# -e (--ignore) skips keys whose /proc path doesn't exist yet — the
# nf_conntrack_* keys aren't writable until the module loads. On
# subsequent runs (after a reboot has loaded the module via
# modules-load.d), the keys are applied normally.
- name: Apply hardening sysctls
  when: iptables_sysctl.changed
  command: sysctl -e -p /etc/sysctl.d/30-iptables-hardening.conf
  changed_when: true
  become: true
  tags:
    - iptables

# Signal site.yml's tail reboot block when the sysctl file changed
# but nf_conntrack isn't loaded yet — that's the only case where a
# key in the file (nf_conntrack_tcp_loose) can't take effect live.
# After the resulting reboot, modules-load.d loads conntrack and
# systemd-sysctl writes the desired value at boot. Subsequent runs
# (module persistent) reapply via `sysctl -e -p` without needing
# another reboot.
- name: Check whether nf_conntrack is loaded (gates reboot signal)
  stat:
    path: /sys/module/nf_conntrack
  register: iptables_nf_conntrack_loaded
  tags:
    - iptables

- name: Signal reboot required (conntrack sysctls deferred to boot)
  when:
    - iptables_sysctl.changed
    - not iptables_nf_conntrack_loaded.stat.exists
  copy:
    dest: /var/run/reboot-required
    content: |
      *** System restart required ***
    owner: root
    group: root
    mode: "0644"
    force: false
  become: true
  tags:
    - iptables

# `nft -c -f %s` validates the assembled ruleset before it ever
# touches the kernel — a real correctness improvement over
# iptables-restore, which had no equivalent dry-run path used by the
# old role. Skipped on the same-run-as-install check-mode branch
# (nftables apt install reports changed but didn't actually run, so
# nft isn't on disk yet to validate with).
- name: Configure nftables ruleset
  when: not (ansible_check_mode and iptables_apt_nftables.changed)
  template:
    src: nftables.conf.j2
    dest: /etc/nftables.conf
    owner: root
    group: root
    mode: "0644"
    backup: true
    validate: "nft -c -f %s"
  register: iptables_ruleset
  become: true
  tags:
    - iptables

# `nft -f` is per-table atomic: the `flush table ip homelab` +
# rebuild inside the file replaces only our table. netavark /
# libvirt / fail2ban tables (in iptables-nft compat) are untouched.
# No more reload-cascade for those integrations.
- name: Apply nftables ruleset
  when: iptables_ruleset.changed and not (ansible_check_mode and iptables_apt_nftables.changed)
  command: nft -f /etc/nftables.conf
  changed_when: true
  become: true
  tags:
    - iptables

- name: Enable nftables.service
  when: not (ansible_check_mode and iptables_apt_nftables.changed)
  systemd:
    name: nftables.service
    enabled: true
    state: started
  become: true
  tags:
    - iptables

# Cohabitation cleanup: the old iptables-restore set policy DROP on
# `ip filter` chains via `:INPUT DROP` etc. Now that our rules live
# in `ip homelab` with its own policy, the leftover DROP on
# `ip filter` would silently drop packets that aren't matched there —
# specifically anything netavark / libvirt / fail2ban added an
# explicit ACCEPT for. Reset to ACCEPT.
#
# Only on jammy/noble — resolute+ has nothing using iptables-nft
# compat (netavark / libvirt / fail2ban all on native-nft drivers),
# so calling iptables -P there would *create* the empty chains we
# don't want. Drop these releases from the list as each one ages out.
#
# In prod the iptables binary arrives via the podman role; in test
# _setup.yml installs it explicitly.
- name: Reset iptables-nft compat chain policies (cohabitation cleanup)
  when: ansible_distribution_release in ["jammy", "noble"]
  ansible.builtin.iptables:
    table: "{{ item.table | default('filter') }}"
    chain: "{{ item.chain }}"
    policy: ACCEPT
  loop:
    - { chain: INPUT }
    - { chain: FORWARD }
    - { chain: OUTPUT }
    - { chain: PREROUTING, table: nat }
    - { chain: POSTROUTING, table: nat }
  become: true
  tags:
    - iptables

# On resolute+ the compat layer has no users — drop the package so
# `iptables -L` doesn't quietly resurrect empty `ip filter` chains
# (and so an operator looking for the ruleset doesn't get a confusing
# half-answer). apt resolves dependents; if anything still hard-
# Depends on iptables on a future release, this fails loudly.
- name: Remove iptables-nft compat layer (resolute+)
  when: ansible_distribution_release not in ["jammy", "noble"]
  apt:
    pkg:
      - iptables
    state: absent
  become: true
  tags:
    - iptables

# One-shot transition cleanup. Drop these tasks after a release
# cycle once every host has converged.
- name: Remove iptables-persistent (legacy regime)
  apt:
    pkg:
      - iptables-persistent
    state: absent
  become: true
  tags:
    - iptables

- name: Remove legacy iptables rule files
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/iptables/rules.v4
    - /etc/iptables/rules.v6
    - /etc/iptables
  become: true
  tags:
    - iptables
