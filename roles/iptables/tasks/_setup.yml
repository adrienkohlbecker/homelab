# In prod the iptables binary lands via the podman role's apt install
# on jammy/noble (netavark's iptables firewall_driver needs it for
# --publish port forwarding). The iptables role itself ships before
# podman in site.yml, so it can't rely on the binary being there yet
# at role-converge time — except for one task, the cohabitation
# cleanup, which calls iptables -P on the legacy `ip filter` chains.
# In prod that's fine because the binary already exists from prior
# converges. In test the VM is fresh and iptables isn't installed
# until the podman role runs. Install it here so the cleanup task
# has something to call.
- name: _setup | Install iptables for cohabitation cleanup
  when: ansible_distribution_release in ["jammy", "noble"]
  apt:
    pkg:
      - iptables
    cache_valid_time: 3600
  become: true
