# Loopback probe -- exercises the container directly via the published port.
# Retries cover cold-start: --health-start-period is 100s and the ~3-minute
# budget below leaves margin over that. /ping is profilarr's dedicated liveness
# endpoint (200, no auth), unlike /api/v1/health which is API-key gated and
# answers 401.
- name: _verify | Profilarr answers /ping on its loopback port
  uri:
    url: http://127.0.0.1:{{ service_ports.profilarr }}/ping
    status_code: 200
    timeout: 10
  register: _profilarr_loopback
  retries: 30
  delay: 2
  until: _profilarr_loopback.status == 200
  become: true

# nginx-vhost probe -- exercises the proxied path, not just loopback. A
# regression in the nginx_site wiring (typo'd subdomain, broken proxy_pass)
# would pass the loopback probe above silently. The _test authelia_stub admits
# the auth_request subrequest, so the request reaches profilarr and /ping
# answers 200.
- name: _verify | Profilarr answers /ping through the nginx vhost
  uri:
    url: https://localhost/ping
    headers:
      Host: "profilarr.{{ inventory_hostname }}.{{ domain }}"
    validate_certs: false
    status_code: 200
    timeout: 10
  register: _profilarr_nginx
  retries: 30
  delay: 2
  until: _profilarr_nginx.status == 200
  become: true

# Symlink-relocation probe -- proves the /config/profilarr.db symlink resolves
# onto the 4K sqlite dataset end-to-end (the reason the sqlite_dataset helper
# is wired in). A botched links: target or a clobbered symlink fails here
# rather than silently landing the DB + WAL on the wrong dataset.
- name: _verify | Profilarr DB symlink resolves onto the sqlite dataset
  stat:
    path: /mnt/services/profilarr/profilarr.db
    follow: false
  register: _profilarr_db_link
  failed_when: >-
    not _profilarr_db_link.stat.exists
    or not _profilarr_db_link.stat.islnk
    or _profilarr_db_link.stat.lnk_target != '/mnt/services/sqlite/profilarr/profilarr.db'
  become: true

# Ownership + content probe -- profilarr creates the DB as the in-container
# PUID/PGID, which must land as the host profilarr user; a PUID/PGID drift would
# write it under a different host uid silently. The size check proves the
# container wrote a real DB through the symlink, not the empty placeholder the
# sqlite_dataset helper pre-creates on a cold host (also profilarr-owned, so it
# would satisfy the ownership check alone). The world-readable assertion proves
# --env UMASK=027 took effect -- the DB holds every synced *arr instance's API
# key, so a silently-ignored UMASK (mode 0644) must fail here, not slip past the
# owner check.
- name: _verify | Profilarr SQLite DB is profilarr-owned, owner-private, non-empty
  stat:
    path: /mnt/services/sqlite/profilarr/profilarr.db
  register: _profilarr_db_owner
  failed_when: >-
    not _profilarr_db_owner.stat.exists
    or _profilarr_db_owner.stat.islnk
    or _profilarr_db_owner.stat.pw_name != 'profilarr'
    or _profilarr_db_owner.stat.roth
    or _profilarr_db_owner.stat.size == 0
  become: true
