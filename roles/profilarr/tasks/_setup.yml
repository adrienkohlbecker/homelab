- name: _setup | Install nginx
  import_role:
    name: test
    tasks_from: nginx

- name: _setup | Install podman
  import_role:
    name: podman
    tasks_from: install

- name: _setup | Create media podman network
  import_role:
    name: media
    tasks_from: network

- name: _setup | Install authelia stub for auth=required tests
  import_role:
    name: test
    tasks_from: authelia_stub

- name: _setup | Setup dependencies
  file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - /mnt/services
    - /mnt/services/sqlite
  become: true
