- name: Install profilarr service
  import_role:
    name: systemd_unit
    tasks_from: install
  vars:
    systemd_unit_args:
      src: profilarr.service.j2
      condition: "{{ not (ansible_check_mode and profilarr_user.changed) }}"
  tags:
    - profilarr

- name: Enable profilarr service
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: profilarr
      condition: "{{ not (ansible_check_mode and (profilarr_service_result.changed or profilarr_user.changed)) }}"
      restart: "{{ profilarr_service_result.changed }}"
  tags:
    - profilarr

- name: Configure nginx
  import_role:
    name: nginx
    tasks_from: site
  vars:
    nginx_site_args:
      subdomain: profilarr
      proxy_pass: http://localhost:6868/
      auth: required
  tags:
    - profilarr
