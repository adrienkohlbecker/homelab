- name: Set up profilarr system user, group, and config dir
  import_role:
    name: service_user
    tasks_from: user
  vars:
    service_user_args:
      name: profilarr
      # /config holds profilarr.db, which stores the connection details and
      # API keys of every *arr instance profilarr syncs -- keep it off-limits
      # to other local accounts.
      config_dir_mode: "0750"
  tags:
    - profilarr

# Profilarr hardcodes profilarr.db at /config root and writes -wal/-shm next
# to the resolved path. Symlink at /config so SQLite resolves through to the
# 4K-recordsize sqlite dataset before computing WAL placement. The symlink
# target matches the host path so it resolves identically inside the container
# (see matching --volume in profilarr.service.j2). pre_create plants an empty
# file on a cold host so state=link doesn't refuse the dangling symlink before
# profilarr creates the DB on first boot.
- name: Pre-create sqlite dataset and symlink profilarr DB onto it
  import_role:
    name: sqlite_dataset
    tasks_from: dataset
  vars:
    sqlite_dataset_args:
      name: profilarr
      owner: profilarr
      group: profilarr
      mode: "0750"
      condition: "{{ not (ansible_check_mode and profilarr_user.changed) }}"
      pre_create: true
      links:
        - /mnt/services/profilarr/profilarr.db
  tags:
    - profilarr

- name: Install profilarr service
  import_role:
    name: systemd_unit
    tasks_from: install
  vars:
    systemd_unit_args:
      src: profilarr.service.j2
      condition: "{{ not (ansible_check_mode and profilarr_user.changed) }}"
  tags:
    - profilarr

- name: Enable profilarr service
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: profilarr
      condition: "{{ not (ansible_check_mode and (profilarr_service_result.changed or profilarr_user.changed)) }}"
      restart: "{{ profilarr_service_result.changed }}"
  tags:
    - profilarr

- name: Configure nginx
  import_role:
    name: nginx
    tasks_from: site
  vars:
    nginx_site_args:
      subdomain: profilarr
      proxy_pass: http://127.0.0.1:6868/
      auth: required
  tags:
    - profilarr
