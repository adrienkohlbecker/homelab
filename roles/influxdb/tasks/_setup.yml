- name: _setup | Install podman
  import_role:
    name: podman
    tasks_from: install

- name: _test | Install nginx
  import_role:
    name: _test
    tasks_from: nginx

- name: _setup | Create /mnt/services
  file:
    path: /mnt/services
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true
