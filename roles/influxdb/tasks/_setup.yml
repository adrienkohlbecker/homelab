- name: _setup | Install podman
  import_role:
    name: podman
    tasks_from: install

- name: _setup | Install nginx
  import_role:
    name: test
    tasks_from: nginx

# Stand in for the real Authelia. `gate` mode returns 401 on every
# auth-request subrequest -- so an unauthenticated browser probe to /
# follows the site's error_page 401 -> 302 redirect to the portal, which
# is what the influxdb vhost (auth: required, no token injection) does
# for every browser hit. _verify asserts that redirect.
- name: _setup | Install authelia stub in gate mode
  import_role:
    name: test
    tasks_from: authelia_stub
  vars:
    test_authelia_stub_args:
      mode: gate

- name: _setup | Create /mnt/services
  file:
    path: /mnt/services
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true
