- name: Set up influxdb system user, group, and config dir
  import_role:
    name: service_user
    tasks_from: user
  vars:
    service_user_args:
      name: influxdb
  tags:
    - influxdb

# data/ -- BoltDB + TSM engine state, 0700 owned by influxdb. The
# image's entrypoint chmod 700s the bolt_dir / ENGINE_PATH subdirs
# inside this on every boot; matching the parent's mode here keeps
# ansible idempotent across container restarts.
#
# config/ -- /etc/influxdb2 (influx-configs CLI config with admin
# token, configd-init-config.json, etc.), 0775 owned by influxdb.
# The image's entrypoint actively chmod 775s this on every boot
# (create_directories() in docker-entrypoint.sh runs unconditionally),
# so any tighter mode here would flap back-and-forth between every
# ansible re-apply and every container restart. The token file inside
# is 0600 from `influx setup`; the 0775 parent only widens *traversal*
# to the host group, which has only the influxdb user as a member.
- name: Create influxdb config and data directories
  when: not (ansible_check_mode and influxdb_user.changed)
  file:
    dest: "{{ item.path }}"
    state: directory
    owner: influxdb
    group: influxdb
    mode: "{{ item.mode }}"
  loop:
    - { path: /mnt/services/influxdb/data,    mode: "0700" }
    - { path: /mnt/services/influxdb/config,  mode: "0775" }
  become: true
  tags:
    - influxdb

# Initial bootstrap (org/user/bucket) is done by the image's entrypoint
# via DOCKER_INFLUXDB_INIT_* env on first start -- it checks for a
# populated BoltDB and skips if one is present, so it's naturally
# idempotent without a sentinel file. Both secrets are mounted via
# --secret and consumed via *_FILE env so the password never lands on
# any command line or in `podman inspect` / /proc/<pid>/environ.
- name: Create influxdb_root_user secret
  import_role:
    name: podman_secret
    tasks_from: secret
  vars:
    podman_secret_args:
      name: influxdb_root_user
      data: "{{ influxdb_root_user }}"
  tags:
    - influxdb

- name: Create influxdb_root_password secret
  import_role:
    name: podman_secret
    tasks_from: secret
  vars:
    podman_secret_args:
      name: influxdb_root_password
      data: "{{ influxdb_root_password }}"
  tags:
    - influxdb

# Operator (all-access) token. Seeded into the BoltDB on first boot via
# DOCKER_INFLUXDB_INIT_ADMIN_TOKEN_FILE so the value the CLI default config
# carries (templated below from the same influxdb_root_token) actually exists
# in the database. Without it a fresh bootstrap would mint a *random* operator
# token and the managed config would 401. Honored only on first boot (BoltDB
# empty); on existing hosts setup is skipped and this is a no-op input.
- name: Create influxdb_admin_token secret
  import_role:
    name: podman_secret
    tasks_from: secret
  vars:
    podman_secret_args:
      name: influxdb_admin_token
      data: "{{ influxdb_root_token }}"
  tags:
    - influxdb

- name: Create homeassistant podman network
  when: not ansible_check_mode
  containers.podman.podman_network:
    name: homeassistant
    disable_dns: false
    state: present
  register: influxdb_network
  become: true
  tags:
    - influxdb

# DOCKER_INFLUXDB_INIT_* honors the credentials only on first boot
# (no BoltDB present). A vault rotation updates the podman secret here
# but the running app keeps the original credentials silently. Split
# into two fail-loud gates because the recovery procedure differs --
# password rotation runs `influx user password`, username rotation
# needs `influx user update --name` (which we can't automate; the OLD
# username has just been replaced in vault and we don't know it).
# Each gate correlates rotated AND existed_before for the SAME secret,
# so a fresh-bootstrap host (both secrets created, neither pre-existed)
# doesn't trip either.
- name: Fail if root password rotated post-bootstrap
  fail:
    msg: |
      influxdb_root_password changed in vault. The podman secret has
      been updated, but the influxdb image's DOCKER_INFLUXDB_INIT_*
      setup runs only on first boot (BoltDB empty), so the running
      instance still has the old password.

      To complete the rotation, run on the target host:

        podman exec -it influxdb influx user password \
          --name '{{ influxdb_root_user }}'

      Then re-run this play.
  when:
    - influxdb_root_password_rotated
    - influxdb_root_password_existed_before
  tags:
    - influxdb

- name: Fail if root username rotated post-bootstrap
  fail:
    msg: |
      influxdb_root_user changed in vault. Renaming the bootstrap user
      via vault rotation is not supported: the old username (needed
      for `influx user update --name`) was just overwritten and isn't
      recoverable from the play. Look it up from the vault git history
      and rename manually:

        podman exec -it influxdb sh -c 'influx user update \
          --id $(influx user list --name <OLD_USERNAME> --json \
                 | jq -r ".[0].id") \
          --name {{ influxdb_root_user }}'

      Then re-run this play.
  when:
    - influxdb_root_user_rotated
    - influxdb_root_user_existed_before
  tags:
    - influxdb

- name: Install influxdb service
  import_role:
    name: systemd_unit
    tasks_from: install
  vars:
    systemd_unit_args:
      src: influxdb.service.j2
      condition: "{{ not (ansible_check_mode and influxdb_user.changed) }}"
  tags:
    - influxdb

- name: Pull influxdb image
  containers.podman.podman_image:
    name: "{{ influxdb_image }}"
  register: influxdb_image_pull
  retries: 3
  delay: 10
  until: influxdb_image_pull is not failed
  become: true
  tags:
    - influxdb

- name: Enable influxdb service
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: influxdb
      condition: "{{ not (ansible_check_mode and (influxdb_service_result.changed or influxdb_user.changed)) }}"
      restart: "{{ influxdb_service_result.changed or influxdb_network.changed or influxdb_root_user_rotated or influxdb_root_password_rotated }}"
  tags:
    - influxdb

# Block until influxdb answers ping. With --sdnotify=healthy + the
# in-container --health-cmd, systemd's "active" already implies
# /health returns 200, but `influx ping` exec'd via podman additionally
# proves the CLI bind (used by `tasks_from: bucket`) works. Runs in
# main.yml so per-tenant callers further down the play graph can
# assume the container is reachable without paying their own retry.
- name: Wait for influxdb container to answer ping
  command:
    argv:
      - podman
      - exec
      - influxdb
      - influx
      - ping
  register: _influxdb_ready
  changed_when: false
  retries: 30
  delay: 2
  until: _influxdb_ready.rc == 0
  when: not (ansible_check_mode and (influxdb_service_result.changed or influxdb_user.changed))
  become: true
  tags:
    - influxdb

# Manage the CLI default config so `influx ...` inside the container
# authenticates with the vaulted operator token. influx setup writes this file
# on first boot, but on every later boot (BoltDB already populated) setup is
# skipped -- so a token regenerated in the UI, or any drift, leaves the file
# pointing at a dead token (401). Templating it here makes influxdb_root_token
# the single source of truth; influxd does not read it (the CLI reads it
# per-exec) so no restart is needed.
- name: Template the influx CLI default config
  when: not (ansible_check_mode and influxdb_user.changed)
  template:
    src: influx-configs.j2
    dest: /mnt/services/influxdb/config/influx-configs
    owner: influxdb
    group: influxdb
    mode: "0600"
    backup: true
  become: true
  tags:
    - influxdb

# Prove the managed config token is accepted by the running BoltDB -- an
# authenticated round-trip the unauth /health and `influx ping` checks cannot
# cover. failed_when:false + until lets the retry ride cold-start; the assert
# below turns a persistent 401 into a loud, actionable failure (the usual cause
# is influxdb_root_token rotated in vault without regenerating it in InfluxDB).
# Skipped under --check: `command` does not run there, so there is no rc to
# assert on.
- name: Check the influx default config authenticates
  command:
    argv:
      - podman
      - exec
      - influxdb
      - influx
      - org
      - list
      - --name
      - "{{ influxdb_root_org }}"
  register: _influxdb_auth_check
  changed_when: false
  failed_when: false
  retries: 10
  delay: 2
  until: _influxdb_auth_check.rc == 0
  when: not ansible_check_mode
  become: true
  tags:
    - influxdb

- name: Assert the influx default config authenticates
  assert:
    that:
      - _influxdb_auth_check.rc == 0
    fail_msg: >-
      `influx org list` was rejected by the running InfluxDB -- the operator
      token in influxdb_root_token is not recognized. If you rotated it,
      regenerate an all-access token in the InfluxDB UI (Load Data -> API
      Tokens) for {{ influxdb_root_user }}, set influxdb_root_token to the new
      BARE value in vault (ansible-vault edit group_vars/prod.yml), and re-apply.
  when: not ansible_check_mode
  tags:
    - influxdb

# auth: required puts Authelia in front of the UI; bypass-on-
# Authorization (enabled implicitly by upstream_authorization) lets
# machine clients (HomeAssistant, Telegraf, Grafana) keep using their
# native `Authorization: Token <t>` headers -- their request short-
# circuits the auth_request subrequest with a 204 and their original
# header passes through unmodified. Browser users get an Authorization
# header injected per the upstream_authorization dict below, skipping
# InfluxDB's own login (no double auth). Unknown Authelia users fall
# through to InfluxDB's native sign-in (operator break-glass).
#
# SSO injection source: the nginx task below builds upstream_authorization
# inline as a single-entry map { influxdb_authelia_user: "Token <influxdb_root_token>" }.
# influxdb_root_token is the vaulted BARE all-access operator token; the
# InfluxDB-specific `Token ` scheme is prepended there so nginx_site injects the
# finished header verbatim. The SAME token also backs the CLI default config and
# the first-boot DOCKER_INFLUXDB_INIT_ADMIN_TOKEN above -- one secret, three
# consumers. The role deliberately does NOT auto-derive the token from `influx
# auth list`: InfluxDB 2.8+ redacts token secrets there (returned only once, at
# `auth create`), so a re-read yields an empty string and both the injection and
# the CLI config silently break. An explicit vaulted token is boring and robust:
# it rotates only on operator action and survives every influxd upgrade. Authelia
# and InfluxDB usernames are intentionally decoupled -- influxdb_authelia_user is
# the Authelia identity, influxdb_root_user the InfluxDB-side admin name.
#
# Rotate the operator token:
#   1. InfluxDB UI (Load Data -> API Tokens) -> generate an all-access token for
#      {{ influxdb_root_user }} and copy it ONCE. (Or, while the CLI still
#      authenticates: podman exec -it influxdb influx auth create --all-access
#      --user {{ influxdb_root_user }} --json.)
#   2. ansible-vault edit group_vars/prod.yml -> set influxdb_root_token to the
#      new BARE value, then re-apply. The config template re-points the CLI and
#      the authenticated check above confirms the BoltDB accepts it.

- name: Configure nginx
  import_role:
    name: nginx
    tasks_from: site
  vars:
    nginx_site_args:
      subdomain: influxdb
      proxy_pass: http://127.0.0.1:{{ service_ports.influxdb }}/
      auth: required
      # Jinja dict-literal so the key (influxdb_authelia_user) is evaluated; a
      # templated YAML key ("{{ ... }}":) is NOT resolved and would reach the
      # nginx injection-safety assert as a literal `{{ }}` string.
      upstream_authorization: "{{ {influxdb_authelia_user: 'Token ' ~ influxdb_root_token} }}"
  tags:
    - influxdb
