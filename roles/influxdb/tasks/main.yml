- name: Set up influxdb system user, group, and config dir
  import_role:
    name: service_user
    tasks_from: user
  vars:
    service_user_args:
      name: influxdb
  tags:
    - influxdb

# config/ holds /etc/influxdb2 (influx-configs token file etc.) and
# data/ holds the BoltDB + TSM engine state. Both 0700-owned by the
# influxdb user; the helper creates the parent /mnt/services/influxdb
# at 0755.
- name: Create influxdb config and data directories
  when: not (ansible_check_mode and influxdb_user.changed)
  file:
    dest: "{{ item }}"
    state: directory
    owner: influxdb
    group: influxdb
    mode: "0700"
  loop:
    - /mnt/services/influxdb/config
    - /mnt/services/influxdb/data
  become: true
  tags:
    - influxdb

- name: Install influxdb service
  import_role:
    name: systemd_unit
    tasks_from: install
  vars:
    systemd_unit_args:
      src: influxdb.service.j2
      condition: "{{ not (ansible_check_mode and influxdb_user.changed) }}"
  tags:
    - influxdb

- name: Enable influxdb service
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: influxdb
      condition: "{{ not (ansible_check_mode and (influxdb_service_result.changed or influxdb_user.changed)) }}"
      restart: "{{ influxdb_service_result.changed }}"
  tags:
    - influxdb

- name: Initial setup
  when: not (ansible_check_mode and (influxdb_service_result.changed or influxdb_user.changed ))
  command: podman exec influxdb influx setup --username "{{ influxdb_root_user }}" --password "{{ influxdb_root_password }}" --org home --bucket default --force
  args:
    creates: /mnt/services/influxdb/config/influx-configs
  become: true
  tags:
    - influxdb

- name: Configure nginx
  import_role:
    name: nginx
    tasks_from: site
  vars:
    nginx_site_args:
      subdomain: influxdb
      proxy_pass: http://localhost:{{ service_ports.influxdb }}/
  tags:
    - influxdb
