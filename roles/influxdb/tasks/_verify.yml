# Loopback /health probe -- confirms influxd is up and the publish path
# is wired. Retries cover cold-start (--health-start-period is 30s; the
# budget below gives ~60s headroom). Host header matches the nginx leg
# below to future-proof against ALLOWED_HOSTS-style restrictions.
- name: _verify | Influxdb /health on loopback port
  uri:
    url: http://localhost:{{ service_ports.influxdb }}/health
    headers:
      Host: influxdb.{{ inventory_hostname }}.{{ domain }}
    return_content: true
  register: _verify_loopback
  retries: 30
  delay: 2
  until:
    - _verify_loopback.status == 200
    - _verify_loopback.json.status | default('') == 'pass'
  become: true

# Authelia gate probe -- the influxdb subdomain runs `auth: required`,
# so a cookie-less GET / has to land on Authelia's 302 redirect chain.
# Validates the auth_request wiring (without it the request would reach
# InfluxDB and return the SPA's HTML 200).
- name: _verify | Influxdb / gate redirects unauthenticated to Authelia
  uri:
    url: https://localhost/
    headers:
      Host: influxdb.{{ inventory_hostname }}.{{ domain }}
    validate_certs: false
    follow_redirects: none
    status_code: 302
  register: _verify_gate
  failed_when: >-
    _verify_gate.status != 302
    or 'auth.' not in (_verify_gate.location | default(''))
  become: true

# Mint the bootstrap admin token: DOCKER_INFLUXDB_INIT_MODE=setup makes
# this fixed by the role's main.yml on first boot. Used by the bypass-
# on-Authorization probe below to assert the path is reachable and the
# upstream answers as the admin user.
- name: _verify | Extract bootstrap admin token
  command:
    argv:
      - podman
      - exec
      - influxdb
      - influx
      - auth
      - list
      - --user
      - "{{ influxdb_root_user }}"
      - --json
  register: _verify_admin_auth
  changed_when: false
  no_log: true
  become: true

# nginx-leg bypass-on-Authorization: a machine client presenting its
# own Authorization header (Telegraf / HA / Grafana shape) must skip
# the Authelia subrequest entirely (`if ($http_authorization) return
# 204` in /internal/authelia) and reach InfluxDB unchanged. /health
# returns 200 with status=pass; the same probe also covers the
# proxy_pass wiring (a typo in nginx_site_args would fail this too).
- name: _verify | Influxdb /health reachable via nginx with bypass-on-Authorization
  vars:
    _admin_token: "{{ (_verify_admin_auth.stdout | from_json | first).token }}"
  uri:
    url: https://localhost/health
    headers:
      Host: influxdb.{{ inventory_hostname }}.{{ domain }}
      Authorization: Token {{ _admin_token }}
    validate_certs: false
    return_content: true
  register: _verify_nginx
  failed_when: >-
    _verify_nginx.status != 200
    or _verify_nginx.json.status | default('') != 'pass'
  no_log: true
  become: true

# Service-native CLI liveness -- catches a regression where /health
# returns 200 but the in-container CLI can't talk to influxd (e.g. a
# misconfigured /etc/influxdb2/configs after a bind-mount perms change).
- name: _verify | Influx ping succeeds
  command: podman exec influxdb influx ping
  changed_when: false
  become: true

# SSO injection wiring: roles/influxdb/tasks/main.yml captures the
# bootstrap admin's operator token and feeds it into nginx's
# upstream_authorization map under the `influxdb_authelia_user` key.
# The rendered nginx site config should contain an
# `if ($authelia_user = "<authelia_user>") { set $upstream_auth
# "Token <t>"; }` line -- catches a regression where the set_fact
# lookup returns Undefined, the combine() folds it into {}, and the
# Authorization injection silently no-ops.
- name: _verify | Bootstrap token wired into nginx upstream_authorization
  command:
    argv:
      - grep
      - -F
      - 'if ($authelia_user = "{{ influxdb_authelia_user }}") { set $upstream_auth "Token '
      - /etc/nginx/sites-available/influxdb
  changed_when: false
  no_log: true
  become: true

# Exercise bucket.yml end-to-end with a throwaway tenant. Verifies the
# org→user→bucket→write-auth path and -- via the write/query roundtrip
# below -- that the produced token actually carries the bucket-scoped
# write permission.
- name: _verify | Provision throwaway influxdb tenant via bucket.yml
  import_role:
    name: influxdb
    tasks_from: bucket
  vars:
    influxdb_bucket_args:
      org: "{{ influxdb_root_org }}"
      user: verify_user
      bucket: verify_bucket

# Contract assertion: bucket.yml surfaces the write-auth token via
# its per-bucket fact. An Undefined fact would mean either the
# bucket-scoped auth was never created or the regex/selectattr path
# in bucket.yml's token-extraction stopped matching.
- name: _verify | Bucket.yml surfaced a write-auth token for verify_bucket
  assert:
    that:
      - influxdb_bucket_verify_bucket_token is defined
      - influxdb_bucket_verify_bucket_token | length > 0
    fail_msg: >-
      bucket.yml did not produce influxdb_bucket_verify_bucket_token.
      Either the conditional auth-create skipped (re-check its `when:`
      regex) or the token-extraction selectattr in bucket.yml stopped
      matching the auth shape.

# Functional write + negative-read on the bucket write-auth: the write
# step's 204 proves the token is honored; the read step (which must fail
# rc != 0) proves write-bucket doesn't accidentally grant read. A previous
# admin-as-self query step was redundant -- 204 + rc-check span both.
# argv form keeps the line-protocol point's embedded space in one slot;
# no_log keeps the token out of ansible's task log.
- name: _verify | Exercise bucket-scoped write-auth (positive write + negative read)
  vars:
    _verify_token: "{{ influxdb_bucket_verify_bucket_token }}"
  block:
    - name: _verify | Write a sentinel point with the bucket write-auth
      command:
        argv:
          - podman
          - exec
          - influxdb
          - influx
          - write
          - --bucket
          - verify_bucket
          - --org
          - "{{ influxdb_root_org }}"
          - --token
          - "{{ _verify_token }}"
          - sentinel,source=ansible_verify value=1
      changed_when: false
      no_log: true
      become: true

    - name: _verify | Write-bucket-only token attempts read
      command:
        argv:
          - podman
          - exec
          - influxdb
          - influx
          - query
          - --org
          - "{{ influxdb_root_org }}"
          - --token
          - "{{ _verify_token }}"
          - >-
            from(bucket:"verify_bucket") |> range(start:-1m)
      register: _verify_neg_query
      changed_when: false
      failed_when: false
      no_log: true
      become: true

    - name: _verify | Write-bucket-only token cannot read (auth scope enforced)
      assert:
        that:
          - _verify_neg_query.rc != 0
        fail_msg: >-
          Write-bucket token successfully read from verify_bucket --
          bucket.yml's --write-bucket invocation appears to grant read
          perms, which is a scope regression.

# Negative-org test: bucket.yml asserts the requested org exists (only
# influxdb_root_org is bootstrapped). A typo in a caller's
# influxdb_bucket_args.org should hit that assert with a concrete
# next-step message; exercise the path so a regression in the selectattr
# expression or assert wording is loud here rather than misleading on a
# real prod apply.
- name: _verify | Bucket.yml against a nonexistent org fails at the assert
  block:
    - name: _verify | Call bucket.yml with definitely_not_here org
      import_role:
        name: influxdb
        tasks_from: bucket
      vars:
        influxdb_bucket_args:
          org: definitely_not_here
          user: verify_user
          bucket: verify_bucket
    - name: _verify | Reaching this means assert-org-exists didn't fire
      fail:
        msg: bucket.yml accepted org=definitely_not_here -- assert-org-exists is broken.
  rescue:
    - name: _verify | Confirm the rescue caught assert-org-exists, not some other failure
      assert:
        that:
          - ansible_failed_task.action == 'assert'
          - ansible_failed_task.name is search('Assert org')
          - ansible_failed_result.msg is search('influxdb org')
        fail_msg: >-
          bucket.yml failed under definitely_not_here, but not at the expected
          assert-org-exists task. Failed task: {{ ansible_failed_task.name }}
          (action={{ ansible_failed_task.action }})

# Ownership assertion -- catches a regression where data/ or config/ ends
# up owned by a different host uid (e.g. a future uidmap change that
# doesn't include a +0 override for the influxdb user). Both bind-mounts
# matter: the image's entrypoint actively flaps config/ to 0775 every
# restart, so a uid drift on it would silently break the CLI's
# /etc/influxdb2/configs reads inside the container.
- name: _verify | Influxdb data and config dirs are owned by influxdb
  stat:
    path: /mnt/services/influxdb/{{ item }}
  register: _verify_dir_owner
  loop:
    - data
    - config
  failed_when: >-
    not _verify_dir_owner.stat.exists
    or _verify_dir_owner.stat.pw_name != 'influxdb'
  become: true
