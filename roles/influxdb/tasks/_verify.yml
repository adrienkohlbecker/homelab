# Loopback /health probe -- confirms influxd is up and the publish path
# is wired. Retries cover cold-start (--health-start-period is 30s; the
# budget below gives ~60s headroom). Host header matches the nginx leg
# below to future-proof against ALLOWED_HOSTS-style restrictions.
- name: _verify | Influxdb /health on loopback port
  uri:
    url: http://localhost:{{ service_ports.influxdb }}/health
    headers:
      Host: influxdb.{{ inventory_hostname }}.{{ domain }}
    return_content: true
  register: _influxdb_loopback
  retries: 30
  delay: 2
  until:
    - _influxdb_loopback.status == 200
    - _influxdb_loopback.json.status | default('') == 'pass'
  become: true

# Authelia gate probe -- the influxdb subdomain runs `auth: required`,
# so a cookie-less GET / has to land on Authelia's 302 redirect chain.
# Validates the auth_request wiring (without it the request would reach
# InfluxDB and return the SPA's HTML 200).
#
# Map the vhost FQDN to loopback so SNI matches the served certificate.
# Probing https://localhost with a Host: header leaves SNI=localhost, which
# OpenSSL 3.x (noble/resolute) rejects as a fatal unrecognized_name alert
# (status -1); hitting the FQDN directly keeps SNI correct on every release.
- name: _verify | Map the influxdb vhost FQDN to loopback for SNI-correct probing
  lineinfile:
    path: /etc/hosts
    line: "127.0.0.1 influxdb.{{ inventory_hostname }}.{{ domain }}"
    state: present
  become: true

- name: _verify | Influxdb / gate redirects unauthenticated to Authelia
  uri:
    url: https://influxdb.{{ inventory_hostname }}.{{ domain }}/
    validate_certs: false
    follow_redirects: none
    status_code: 302
  register: _influxdb_gate
  failed_when: _influxdb_gate is not authelia_redirects_to('influxdb', inventory_hostname, domain, require_rd=false)
  become: true

# Service-native CLI liveness -- catches a regression where /health
# returns 200 but the in-container CLI can't talk to influxd (e.g. a
# misconfigured /etc/influxdb2/configs after a bind-mount perms change).
- name: _verify | Influx ping succeeds
  command: podman exec influxdb influx ping
  changed_when: false
  become: true

# The influxdb vhost is browser-only (auth: required, no token injection): no
# upstream_authorization map is rendered, so there is no conf.d/upstream_auth
# file to assert on. The gate-redirect probe above already proves the vhost is
# Authelia-gated; machine clients reach influxd off-vhost over the podman network
# (covered by roles/homeassistant/_verify).

# Exercise bucket.yml end-to-end with a throwaway tenant. Verifies the
# org→user→bucket→write-auth path and -- via the write/query roundtrip
# below -- that the produced token actually carries the bucket-scoped
# write permission.
- name: _verify | Provision throwaway influxdb tenant via bucket.yml
  import_role:
    name: influxdb
    tasks_from: bucket
  vars:
    influxdb_bucket_args:
      org: "{{ influxdb_root_org }}"
      user: verify_user
      bucket: verify_bucket

# Resolve the throwaway tenant's org + bucket ids -- needed both to
# assert bucket.yml minted a write-auth (by its permission string) and
# to mint a fresh throwaway token for the functional roundtrip below.
- name: _verify | Resolve verify org id
  command:
    argv:
      - podman
      - exec
      - influxdb
      - influx
      - org
      - list
      - --name
      - "{{ influxdb_root_org }}"
      - --json
  register: _influxdb_verify_org
  changed_when: false
  become: true

- name: _verify | Resolve verify_bucket id
  command:
    argv:
      - podman
      - exec
      - influxdb
      - influx
      - bucket
      - list
      - --org
      - "{{ influxdb_root_org }}"
      - --name
      - verify_bucket
      - --json
  register: _influxdb_verify_bucket
  changed_when: false
  become: true

# Contract: bucket.yml minted a bucket-scoped write-auth for verify_user.
# The token value is redacted by influxd 2.8+ (only the permission string
# survives), so assert on the permission -- shaped
# `write:orgs/<orgid>/buckets/<bucketid>` -- not a token. A miss means
# bucket.yml's conditional auth-create skipped (re-check its `when:`) or
# the influx-cli --json shape changed.
- name: _verify | Bucket.yml minted a write-auth for verify_bucket
  vars:
    _verify_org_id: "{{ (_influxdb_verify_org.stdout | from_json | first).id }}"
    _verify_bucket_id: "{{ (_influxdb_verify_bucket.stdout | from_json | first).id }}"
  command:
    argv:
      - podman
      - exec
      - influxdb
      - influx
      - auth
      - list
      - --user
      - verify_user
      - --json
  register: _influxdb_verify_auth_list
  changed_when: false
  failed_when: >-
    ((_influxdb_verify_auth_list.stdout | from_json)
     | selectattr('permissions', 'defined')
     | selectattr('permissions', 'contains',
         'write:orgs/' ~ _verify_org_id ~ '/buckets/' ~ _verify_bucket_id)
     | list | length) == 0
  become: true

# Mint a fresh throwaway write-auth to exercise the write path end-to-end.
# bucket.yml's own token is redacted post-creation, so _verify mints its
# own here -- the token IS returned at `auth create`, so this is the only
# path to a usable token value, mirroring the operator's one-time copy.
- name: _verify | Mint a throwaway write-auth for the functional roundtrip
  vars:
    _verify_bucket_id: "{{ (_influxdb_verify_bucket.stdout | from_json | first).id }}"
  command:
    argv:
      - podman
      - exec
      - influxdb
      - influx
      - auth
      - create
      - --json
      - --org
      - "{{ influxdb_root_org }}"
      - --user
      - verify_user
      - --write-bucket
      - "{{ _verify_bucket_id }}"
  register: _influxdb_verify_auth_create
  changed_when: false
  become: true

# Functional write + negative-read on the throwaway write-auth: the write
# step's 204 proves the token is honored; the read step (which must fail
# rc != 0) proves write-bucket doesn't accidentally grant read. A previous
# admin-as-self query step was redundant -- 204 + rc-check span both.
# argv form keeps the line-protocol point's embedded space in one slot.
- name: _verify | Exercise bucket-scoped write-auth (positive write + negative read)
  vars:
    _verify_token: "{{ (_influxdb_verify_auth_create.stdout | from_json).token }}"
  block:
    - name: _verify | Write a sentinel point with the bucket write-auth
      command:
        argv:
          - podman
          - exec
          - influxdb
          - influx
          - write
          - --bucket
          - verify_bucket
          - --org
          - "{{ influxdb_root_org }}"
          - --token
          - "{{ _verify_token }}"
          - sentinel,source=ansible_verify value=1
      changed_when: false
      become: true

    - name: _verify | Write-bucket-only token attempts read
      command:
        argv:
          - podman
          - exec
          - influxdb
          - influx
          - query
          - --org
          - "{{ influxdb_root_org }}"
          - --token
          - "{{ _verify_token }}"
          - >-
            from(bucket:"verify_bucket") |> range(start:-1m)
      register: _influxdb_neg_query
      changed_when: false
      failed_when: false
      become: true

    - name: _verify | Write-bucket-only token cannot read (auth scope enforced)
      assert:
        that:
          - _influxdb_neg_query.rc != 0
        fail_msg: >-
          Write-bucket token successfully read from verify_bucket --
          bucket.yml's --write-bucket invocation appears to grant read
          perms, which is a scope regression.

# Negative-org test: bucket.yml asserts the requested org exists (only
# influxdb_root_org is bootstrapped). A typo in a caller's
# influxdb_bucket_args.org should hit that assert with a concrete
# next-step message; exercise the path so a regression in the selectattr
# expression or assert wording is loud here rather than misleading on a
# real prod apply.
- name: _verify | Bucket.yml against a nonexistent org fails at the assert
  block:
    - name: _verify | Call bucket.yml with definitely_not_here org
      import_role:
        name: influxdb
        tasks_from: bucket
      vars:
        influxdb_bucket_args:
          org: definitely_not_here
          user: verify_user
          bucket: verify_bucket
    - name: _verify | Reaching this means assert-org-exists didn't fire
      fail:
        msg: bucket.yml accepted org=definitely_not_here -- assert-org-exists is broken.
  rescue:
    - name: _verify | Confirm the rescue caught assert-org-exists, not some other failure
      assert:
        that:
          - ansible_failed_task.action == 'assert'
          - ansible_failed_task.name is search('Assert org')
          - ansible_failed_result.msg is search('influxdb org')
        fail_msg: >-
          bucket.yml failed under definitely_not_here, but not at the expected
          assert-org-exists task. Failed task: {{ ansible_failed_task.name }}
          (action={{ ansible_failed_task.action }})

# Ownership assertion -- catches a regression where data/ or config/ ends
# up owned by a different host uid (e.g. a future uidmap change that
# doesn't include a +0 override for the influxdb user). Both bind-mounts
# matter: the image's entrypoint actively flaps config/ to 0775 every
# restart, so a uid drift on it would silently break the CLI's
# /etc/influxdb2/configs reads inside the container.
- name: _verify | Influxdb data and config dirs are owned by influxdb
  stat:
    path: /mnt/services/influxdb/{{ item }}
  register: _influxdb_dir_owner
  loop:
    - data
    - config
  failed_when: >-
    not _influxdb_dir_owner.stat.exists
    or _influxdb_dir_owner.stat.pw_name != 'influxdb'
  become: true
