# Provision a per-tenant (org, user, bucket, write-auth) into a
# running influxdb container. Idempotent via query-then-create
# pairs. Each task uses `influx ... --json` and parses via
# `from_json` to avoid the column-shape drift that tab-cut parsing
# carries across influxdb-cli versions.
#
# Inputs flow through `influxdb_bucket_args` (dict) per the
# helper-role pattern in CLAUDE.md so each call replaces the dict
# wholesale and inter-call vars-leak can't happen.
#
# Required keys:
#   org    -- influxdb org name (must already exist; not created here)
#   user   -- user name (created if missing, attached to <org>)
#   bucket -- bucket name (created under <org> if missing)
#
# Outputs:
#   influxdb_bucket_<bucket>_token  -- the bucket-scoped write-auth
#     token. Per-bucket key so two callers with different buckets in
#     the same play don't clobber each other. The bucket name is
#     sanitised through regex_replace for the key.
#
# An operator who only wants the token (HA UI paste, etc.) can also
# read it out-of-band at any time via
#   podman exec influxdb influx auth list --user <user> --json
# and is the only path for a token created by an earlier bootstrap
# that's no longer in any ansible play's memory.
#
# Assumes the influxdb role's main.yml has already been applied in
# the same play -- main.yml's "Wait for influxdb container to answer
# ping" is the synchronization barrier; this file doesn't repeat it.
# argv form across this file: each user-controlled value lands in its
# own argv slot, so a name containing a space or a leading dash can't
# argv-inject if a future caller feeds untrusted input. Today every
# caller passes inventory literals, but the shape is the cheap
# foot-gun fix.

- name: bucket | Assert args
  assert:
    that:
      - influxdb_bucket_args.org    is defined
      - influxdb_bucket_args.user   is defined
      - influxdb_bucket_args.bucket is defined
    fail_msg: >-
      influxdb_bucket requires influxdb_bucket_args.{org,user,bucket}.

- name: bucket | Query org {{ influxdb_bucket_args.org }}
  command:
    argv:
      - podman
      - exec
      - influxdb
      - influx
      - org
      - list
      - --name
      - "{{ influxdb_bucket_args.org }}"
      - --json
  register: _influxdb_bucket_org_query
  changed_when: false
  check_mode: false
  # Tolerate "org not found" (influx-cli 2.7 exits non-zero on no-match
  # for --name) so the assert below fires with its helpful operator
  # message instead of failing as a bare "command returned non-zero".
  # Matches the user/bucket/auth queries downstream.
  failed_when: false
  become: true

# selectattr('name','equalto', ...) is defensive: influx-cli 2.x's
# `--name` is an exact filter today, but `length > 0` against the
# bare result would silently accept a future patch that turned the
# filter into a prefix/substring match. The org is bootstrapped only
# via DOCKER_INFLUXDB_INIT_ORG; any other org has to exist already,
# so the assert gives the operator a concrete next step. First
# `that:` clause short-circuits the from_json filter when stdout is
# non-JSON (rc != 0 case).
- name: "bucket | Assert org exists: {{ influxdb_bucket_args.org }}"
  assert:
    that:
      - _influxdb_bucket_org_query.rc == 0
      - (_influxdb_bucket_org_query.stdout
          | from_json
          | selectattr('name', 'equalto', influxdb_bucket_args.org)
          | list | length) > 0
    fail_msg: >-
      influxdb org '{{ influxdb_bucket_args.org }}' not found.
      The influxdb role's main.yml bootstraps only `{{ influxdb_root_org }}`
      (via DOCKER_INFLUXDB_INIT_ORG); any other org must be pre-created
      out-of-band with `podman exec influxdb influx org create
      --name {{ influxdb_bucket_args.org }}`.

# block-scoped lazy vars replace the earlier set_fact pattern. Each
# reference re-evaluates from the relevant query register; values
# never enter host-fact scope, so a subsequent import_role with
# different inputs can't pick up the previous call's ids.
- name: bucket | Provision tenant {{ influxdb_bucket_args.user ~ ' / ' ~ influxdb_bucket_args.bucket ~ ' in org ' ~ influxdb_bucket_args.org }}
  vars:
    _influxdb_org_id: >-
      {{ (_influxdb_bucket_org_query.stdout
          | from_json
          | selectattr('name', 'equalto', influxdb_bucket_args.org)
          | first).id }}
    _influxdb_bucket_id: >-
      {{ (_influxdb_bucket_bucket_id_query.stdout
          | from_json
          | selectattr('name', 'equalto', influxdb_bucket_args.bucket)
          | first).id }}
    # Persisted store for this bucket's write-auth token. InfluxDB 2.8+
    # redacts the token from `auth list` (returned only at `auth create`),
    # so we keep it here at creation and read it back on later converges.
    # regex_replace sanitises the bucket name into a filename the same way
    # the exposed fact key is sanitised below.
    _influxdb_bucket_token_path: >-
      /mnt/services/influxdb/secrets/bucket_{{
        influxdb_bucket_args.bucket | regex_replace('[^A-Za-z0-9_]', '_') }}_token
  block:
    - name: bucket | Query user {{ influxdb_bucket_args.user }}
      command:
        argv:
          - podman
          - exec
          - influxdb
          - influx
          - user
          - list
          - --name
          - "{{ influxdb_bucket_args.user }}"
          - --json
      register: _influxdb_bucket_user_query
      changed_when: false
      check_mode: false
      failed_when: false
      become: true

    # Users in influx 2.x aren't tied to orgs in `influx user list`;
    # org membership is a separate relationship. Detect a cross-org
    # collision: a same-name user that exists but isn't a member of
    # the target org. Failing fast here surfaces the manual fix
    # (`influx org members add`) instead of letting the rest of the
    # block silently proceed with a user attached to the wrong org.
    - name: bucket | Query org members
      command:
        argv:
          - podman
          - exec
          - influxdb
          - influx
          - org
          - members
          - list
          - --id
          - "{{ _influxdb_org_id }}"
          - --json
      register: _influxdb_bucket_members_query
      changed_when: false
      check_mode: false
      failed_when: false
      become: true

    - name: bucket | Assert pre-existing user is a member of org {{ influxdb_bucket_args.org }}
      vars:
        _user_exists: >-
          {{ _influxdb_bucket_user_query.rc == 0
             and (_influxdb_bucket_user_query.stdout | from_json | length) > 0 }}
        _user_in_org: >-
          {{ ((_influxdb_bucket_members_query.stdout | default('[]') | from_json)
              | selectattr('name', 'equalto', influxdb_bucket_args.user)
              | list | length) > 0 }}
      assert:
        that:
          - not (_user_exists | bool) or (_user_in_org | bool)
        fail_msg: >-
          influxdb user '{{ influxdb_bucket_args.user }}' already exists but is
          not a member of org '{{ influxdb_bucket_args.org }}'. Attach manually:
            podman exec influxdb sh -c 'influx org members add \
              --id {{ _influxdb_org_id }} \
              --member $(influx user list --name {{ influxdb_bucket_args.user }} --json | jq -r ".[0].id")'
          Then re-run this play.

    - name: bucket | Create user {{ influxdb_bucket_args.user }}  # noqa: no-changed-when -- when: gates execution, like creates: did
      when: >-
        _influxdb_bucket_user_query.rc != 0
        or (_influxdb_bucket_user_query.stdout | from_json | length) == 0
      command:
        argv:
          - podman
          - exec
          - influxdb
          - influx
          - user
          - create
          - --org-id
          - "{{ _influxdb_org_id }}"
          - --name
          - "{{ influxdb_bucket_args.user }}"
      become: true

    - name: bucket | Query bucket {{ influxdb_bucket_args.bucket }}
      command:
        argv:
          - podman
          - exec
          - influxdb
          - influx
          - bucket
          - list
          - --org-id
          - "{{ _influxdb_org_id }}"
          - --name
          - "{{ influxdb_bucket_args.bucket }}"
          - --json
      register: _influxdb_bucket_bucket_query
      changed_when: false
      check_mode: false
      failed_when: false
      become: true

    - name: bucket | Create bucket {{ influxdb_bucket_args.bucket }}  # noqa: no-changed-when -- when: gates execution, like creates: did
      when: >-
        _influxdb_bucket_bucket_query.rc != 0
        or (_influxdb_bucket_bucket_query.stdout | from_json | length) == 0
      command:
        argv:
          - podman
          - exec
          - influxdb
          - influx
          - bucket
          - create
          - --org-id
          - "{{ _influxdb_org_id }}"
          - --name
          - "{{ influxdb_bucket_args.bucket }}"
      become: true

    # Re-query post-create so the auth task always sees a concrete bucket
    # id. The conditional create above doesn't emit a usable id (the
    # upstream `influx bucket create` output schema changed across 2.x
    # patch releases).
    - name: bucket | Query bucket id for {{ influxdb_bucket_args.bucket }}
      command:
        argv:
          - podman
          - exec
          - influxdb
          - influx
          - bucket
          - list
          - --org-id
          - "{{ _influxdb_org_id }}"
          - --name
          - "{{ influxdb_bucket_args.bucket }}"
          - --json
      register: _influxdb_bucket_bucket_id_query
      changed_when: false
      check_mode: false
      failed_when: >-
        _influxdb_bucket_bucket_id_query.rc != 0
        or (_influxdb_bucket_bucket_id_query.stdout
            | from_json
            | selectattr('name', 'equalto', influxdb_bucket_args.bucket)
            | list | length) == 0
      become: true

    - name: bucket | Query auth for {{ influxdb_bucket_args.user }}
      command:
        argv:
          - podman
          - exec
          - influxdb
          - influx
          - auth
          - list
          - --user
          - "{{ influxdb_bucket_args.user }}"
          - --json
      register: _influxdb_bucket_auth_query
      changed_when: false
      check_mode: false
      failed_when: false
      become: true

    # Is this bucket's write-auth token already persisted? The file under
    # secrets/ -- not influxd -- is the source of truth for the token value,
    # because `influx auth list` redacts the secret to "" in 2.8+ (returned
    # only at `auth create`). In steady state the file exists and the three
    # mutating tasks below all skip; we just read it back.
    - name: bucket | Stat persisted write-auth token for {{ influxdb_bucket_args.bucket }}
      stat:
        path: "{{ _influxdb_bucket_token_path }}"
      register: _influxdb_bucket_token_stat
      check_mode: false
      become: true

    # When recreating (no persisted token to recover) and a write-auth
    # already exists, delete it first so we don't orphan an unreadable
    # token. Identify it by its bucket-scoped write permission: permissions
    # are bare strings shaped `write:orgs/<orgid>/buckets/<bucketid>` (NOT
    # the dict {action, resource} the HTTP API returns), and we anchor on
    # both ids so a cross-org perm reusing the bucket id can't false-match.
    - name: bucket | Delete stale write-auth before recreate for {{ influxdb_bucket_args.bucket }}  # noqa: no-changed-when -- when: gates execution
      vars:
        _existing_write_auth: >-
          {{ (_influxdb_bucket_auth_query.stdout | default('[]') | from_json)
             | selectattr('permissions', 'defined')
             | selectattr('permissions', 'contains',
                 'write:orgs/' ~ _influxdb_org_id ~ '/buckets/' ~ _influxdb_bucket_id)
             | list }}
      when:
        - not _influxdb_bucket_token_stat.stat.exists
        - _existing_write_auth | length > 0
      command:
        argv:
          - podman
          - exec
          - influxdb
          - influx
          - auth
          - delete
          - --id
          - "{{ (_existing_write_auth | first).id }}"
      become: true

    # `--json` so the created authorization (token included) parses cleanly.
    # This is the ONLY point the token secret is visible, so the persist
    # task below must capture it from this register.
    - name: bucket | Create write-auth for bucket {{ influxdb_bucket_args.bucket }}  # noqa: no-changed-when -- when: gates execution, like creates: did
      when: not _influxdb_bucket_token_stat.stat.exists
      command:
        argv:
          - podman
          - exec
          - influxdb
          - influx
          - auth
          - create
          - --json
          - --org-id
          - "{{ _influxdb_org_id }}"
          - --user
          - "{{ influxdb_bucket_args.user }}"
          - --write-bucket
          - "{{ _influxdb_bucket_id }}"
      register: _influxdb_bucket_auth_create
      become: true

    # Persist the just-minted token, 0600 owned by influxdb. Gated on the
    # create having actually run (skipped in check mode / when the file
    # already exists) so we never template an Undefined `.token`.
    - name: bucket | Persist write-auth token for {{ influxdb_bucket_args.bucket }}
      when: _influxdb_bucket_auth_create is not skipped
      copy:
        content: "{{ (_influxdb_bucket_auth_create.stdout | from_json).token }}\n"
        dest: "{{ _influxdb_bucket_token_path }}"
        owner: influxdb
        group: influxdb
        mode: "0600"
        backup: true
      become: true

    # Read the token back -- one uniform source whether we just created it
    # or it already existed. trim drops the trailing newline. Gated so a
    # check-mode run on a never-provisioned host (no file, create skipped)
    # doesn't slurp a missing path.
    - name: bucket | Read persisted write-auth token for {{ influxdb_bucket_args.bucket }}
      when: _influxdb_bucket_token_stat.stat.exists or (_influxdb_bucket_auth_create is not skipped)
      slurp:
        src: "{{ _influxdb_bucket_token_path }}"
      register: _influxdb_bucket_token_slurp
      check_mode: false
      become: true

    # Per-bucket key so concurrent bucket.yml invocations against
    # different buckets in the same play don't overwrite each other's
    # tokens. regex_replace mirrors the systemd_unit helper's "sanitise
    # for fact name" idiom -- bucket names can carry chars that aren't
    # valid in ansible identifiers.
    - name: bucket | Expose write-auth token for bucket {{ influxdb_bucket_args.bucket }}
      when: _influxdb_bucket_token_slurp is not skipped
      set_fact:
        "influxdb_bucket_{{ influxdb_bucket_args.bucket | regex_replace('[^A-Za-z0-9_]', '_') }}_token": >-
          {{ _influxdb_bucket_token_slurp.content | b64decode | trim }}
