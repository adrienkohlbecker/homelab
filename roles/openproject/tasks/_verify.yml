---
# Ownership-of-uidmap-target checks: catch a regression in the bijective
# +102/+1000 uidmap (the bundled postgres/app internal users landing on the
# wrong host uid, breaking ZFS replication portability). PG_VERSION is written
# by the in-container postgres (uid 102) at initdb, so its host ownership proves
# the +102 map end-to-end -- unlike stat'ing a dir the converge itself chowned.
- name: _verify | Openproject pgdata is owned by openproject_pg (container-written PG_VERSION)
  stat:
    path: /mnt/services/openproject/pgdata/PG_VERSION
  register: _verify_pgdata
  failed_when: >-
    not _verify_pgdata.stat.exists
    or _verify_pgdata.stat.pw_name != 'openproject_pg'
  become: true

# assets/files is created by the in-container app (uid 1000) at first boot --
# unlike assets/ itself, which the converge chowned -- so its host ownership
# proves the +1000 uidmap end-to-end (mirrors the PG_VERSION check above).
- name: _verify | Openproject assets/files is owned by openproject (container-written)
  stat:
    path: /mnt/services/openproject/assets/files
  register: _verify_assets
  failed_when: >-
    not _verify_assets.stat.exists
    or _verify_assets.stat.pw_name != 'openproject'
  become: true

# /health_checks/database is the endpoint the unit's steady-state --health-cmd
# gates active/auto-restart on (startup uses /default); probing it mirrors the
# real liveness check and exercises the bundled postgres (+102 map) through a
# live DB query.
- name: _verify | Openproject answers /health_checks/database on its loopback port
  uri:
    url: http://127.0.0.1:{{ service_ports.openproject }}/health_checks/database
    status_code: 200
    timeout: 10
  register: _verify_health
  retries: 60
  delay: 5
  until: _verify_health.status == 200
  become: true

# Confirm the vhost refuses unauthenticated requests. auth: required wires
# nginx's auth_request to Authelia; _setup installs the authelia_stub in gate
# mode (401 on the auth-request subrequest), so nginx's error_page 401 -> 302
# fires here exactly as prod redirects to auth.<domain>. A config drift dropping
# auth would proxy straight through to OpenProject's own login and return 200,
# failing this assertion.
- name: _verify | Openproject vhost refuses unauthenticated requests
  uri:
    url: https://localhost/
    validate_certs: false
    follow_redirects: none
    headers:
      Host: "openproject.{{ inventory_hostname }}.{{ domain }}"
    status_code: 302

# The rotation gate (tasks/check_secret_key_rotation.yml) is the role's
# load-bearing safety net. Prove the REAL gate fires (not a copy of its
# predicate): drift the stored label to simulate a vault rotation, run the gate,
# confirm it aborts (rescue catches the fail), then restore the label so a later
# converge stays idempotent.
- name: _verify | SECRET_KEY_BASE rotation gate aborts on a drifted store
  block:
    - name: _verify | Drift the stored secret label (simulate a vault rotation)
      containers.podman.podman_secret:
        name: openproject_secret_key
        data: "{{ openproject_secret_key }}"
        labels:
          data_sha256: drifted-on-purpose
        force: true
      become: true

    - name: _verify | Run the real gate against the drifted store
      block:
        - name: _verify | Import the real rotation gate
          import_tasks: check_secret_key_rotation.yml
        - name: _verify | Record that the gate did not fire
          set_fact:
            _verify_gate_fired: false
      rescue:
        - name: _verify | Record that the gate fired
          set_fact:
            _verify_gate_fired: true
  always:
    - name: _verify | Restore the correct stored secret label
      containers.podman.podman_secret:
        name: openproject_secret_key
        data: "{{ openproject_secret_key }}"
        labels:
          data_sha256: "{{ openproject_secret_key | hash('sha256') }}"
        force: true
      become: true

- name: _verify | Assert the rotation gate aborted
  assert:
    that: _verify_gate_fired | default(false) | bool
    fail_msg: SECRET_KEY_BASE drift was not detected -- the rotation gate is broken
