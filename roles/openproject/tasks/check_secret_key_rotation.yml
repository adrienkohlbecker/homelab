# SECRET_KEY_BASE is the Rails master key: rotating it makes already-stored
# encrypted data (sessions, 2FA/TOTP secrets, stored OAuth/SMTP credentials)
# permanently undecryptable. The podman_secret helper rotates the store
# unconditionally on drift, so we compare the vault value against the stored
# secret BEFORE the new key reaches the store -- failing after the create would
# leave it staged for the next restart to silently load.
#
# Compare the stored value directly (secret inspect --showsecret, the same
# byte-compare the podman_secret module does internally) rather than a
# Spec.Labels hash: the helper stamps no such label, and adding one there would
# rotate every podman secret fleet-wide on the next converge (the module
# recreates on label drift), tripping this guard and its siblings. inspect
# exits non-zero when the secret is absent (first bootstrap) -- treated as
# "nothing to compare", so the create below proceeds.
- name: Inspect the stored openproject_secret_key (if present)
  command: podman secret inspect --showsecret openproject_secret_key
  register: _openproject_stored_secret
  failed_when: false
  changed_when: false
  check_mode: false
  become: true
  tags:
    - openproject

- name: Fail if openproject_secret_key changed post-bootstrap
  vars:
    _stored: "{{ (_openproject_stored_secret.stdout | from_json | first).SecretData | default('') }}"
  fail:
    msg: |
      openproject_secret_key changed in vault. SECRET_KEY_BASE is the Rails
      master key: rotating it makes already-stored encrypted data (sessions,
      2FA/TOTP secrets, stored OAuth/SMTP credentials) permanently
      undecryptable.

      Revert the change, or perform a deliberate key-rotation migration, then
      re-run this play.
  when:
    - _openproject_stored_secret.rc == 0
    - _stored != openproject_secret_key
  tags:
    - openproject
