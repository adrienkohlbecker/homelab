- name: _setup | Install podman
  import_role:
    name: podman
    tasks_from: install

- name: _test | Install nginx
  import_role:
    name: _test
    tasks_from: nginx

- name: _setup | Install authelia stub in gate mode
  import_role:
    name: _test
    tasks_from: authelia_stub
  vars:
    authelia_stub_mode: gate
