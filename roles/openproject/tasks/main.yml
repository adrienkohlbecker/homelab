- name: Add openproject group
  group:
    name: openproject
    system: true
  become: true
  tags:
    - openproject

- name: Add openproject user
  user:
    name: openproject
    group: openproject
    createhome: false
    system: true
    shell: /usr/sbin/nologin
    home: /nonexistent
  become: true
  register: openproject_user
  tags:
    - openproject

# Two host users because the all-in-one image runs rails as in-container app
# (uid 1000) and postgres as in-container postgres (uid 102), with supervisord
# + gosu dropping privileges. Bijective uidmap in the unit (+102 → openproject_pg,
# +1000 → openproject) so files written under each bind-mount land owned by the
# matching host user, regardless of the image's apt-assigned numbering.
- name: Add openproject_pg group
  group:
    name: openproject_pg
    system: true
  become: true
  tags:
    - openproject

- name: Add openproject_pg user
  user:
    name: openproject_pg
    group: openproject_pg
    createhome: false
    system: true
    shell: /usr/sbin/nologin
    home: /nonexistent
  become: true
  register: openproject_pg_user
  tags:
    - openproject

- name: Create configuration directory
  when: not (ansible_check_mode and openproject_user.changed)
  file:
    dest: /mnt/services/openproject
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true
  tags:
    - openproject

- name: Create pgdata directory
  when: not (ansible_check_mode and openproject_pg_user.changed)
  file:
    dest: /mnt/services/openproject/pgdata
    state: directory
    owner: openproject_pg
    group: openproject_pg
    mode: "0700"
  become: true
  tags:
    - openproject

- name: Create assets directory
  when: not (ansible_check_mode and openproject_user.changed)
  file:
    dest: /mnt/services/openproject/assets
    state: directory
    owner: openproject
    group: openproject
    mode: "0700"
  become: true
  tags:
    - openproject

- name: Create openproject secret key
  import_role:
    name: podman_secret
    tasks_from: secret
  vars:
    podman_secret_args:
      name: openproject_secret_key
      data: "{{ openproject_secret_key }}"
  tags:
    - openproject

- name: Install openproject service
  import_role:
    name: systemd_unit
    tasks_from: install
  vars:
    systemd_unit_args:
      src: openproject.service.j2
      condition: "{{ not (ansible_check_mode and (openproject_user.changed or openproject_pg_user.changed)) }}"
  tags:
    - openproject

# Pre-stage chown'd layers so the unit's `systemctl start` doesn't blow
# through TimeoutSec doing the per-file ID-mapped copy on first extraction.
# The +N:M:1 uidmap-override pattern doesn't compose with idmapped mounts,
# so podman falls back to a copy regardless of kernel support; we just move
# the cost out of the deadline. Image name is read back from the just-
# installed unit so it stays in sync with the template.
- name: Detect openproject unit image
  when: not ansible_check_mode
  extract_podman_image:
    name: openproject
  register: openproject_unit_image
  become: true
  tags:
    - openproject

- name: Pre-pull openproject image
  when: not ansible_check_mode
  containers.podman.podman_image:
    name: "{{ openproject_unit_image.images[0] }}"
  register: openproject_image_pull
  become: true
  tags:
    - openproject

- name: Pre-stage openproject chown'd layers
  when:
    - not ansible_check_mode
    - openproject_image_pull.changed
  shell: |
    set -euo pipefail
    podman create --replace --name openproject-prestage \
      --uidmap=0:0:65536 \
      --uidmap=+102:{{ openproject_pg_user.uid }}:1 \
      --uidmap=+1000:{{ openproject_user.uid }}:1 \
      --gidmap=0:0:65536 \
      --gidmap=+106:{{ openproject_pg_user.group }}:1 \
      --gidmap=+1000:{{ openproject_user.group }}:1 \
      {{ openproject_unit_image.images[0] }} true
    podman rm openproject-prestage
  args:
    executable: /bin/bash
  become: true
  tags:
    - openproject

- name: Enable openproject service
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: openproject
      condition: "{{ not (ansible_check_mode and (systemd_unit.changed or openproject_user.changed or openproject_pg_user.changed)) }}"
      restart: "{{ systemd_unit.changed or openproject_secret_key_rotated }}"
  tags:
    - openproject

- name: Configure nginx
  import_role:
    name: nginx
    tasks_from: site
  vars:
    nginx_subdomain: openproject
    nginx_proxy_pass: http://localhost:8070/
    nginx_csp_additional: "img-src secure.gravatar.com {{ nginx_csp_default }}"
  tags:
    - openproject
