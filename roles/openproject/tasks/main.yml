- name: Add openproject group
  group:
    name: openproject
    system: true
  become: true
  tags:
    - openproject

- name: Add openproject user
  user:
    name: openproject
    group: openproject
    createhome: false
    system: true
    shell: /usr/sbin/nologin
    home: /nonexistent
  become: true
  register: openproject_user
  tags:
    - openproject

- name: Create configuration directory
  when: not (ansible_check_mode and openproject_user.changed)
  file:
    dest: /mnt/services/openproject
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true
  tags:
    - openproject

- name: Create pgdata directory
  when: not (ansible_check_mode and openproject_user.changed)
  file:
    dest: /mnt/services/openproject/pgdata
    state: directory
    owner: 102
    group: 105
    mode: "0700"
  become: true
  tags:
    - openproject

- name: Create assets directory
  when: not (ansible_check_mode and openproject_user.changed)
  file:
    dest: /mnt/services/openproject/assets
    state: directory
    owner: 1000
    group: 1000
    mode: "0700"
  become: true
  tags:
    - openproject

- name: Create openproject secret key
  import_role:
    name: podman_secret
    tasks_from: secret
  vars:
    podman_secret_name: openproject_secret_key
    podman_secret_data: "{{ openproject_secret_key }}"
  tags:
    - openproject

- name: Install openproject service
  import_role:
    name: systemd_unit
    tasks_from: template
  vars:
    systemd_unit_src: openproject.service
    systemd_unit_condition: "{{ not (ansible_check_mode and openproject_user.changed) }}"
  tags:
    - openproject

- name: Enable openproject service
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_src: openproject
    systemd_unit_condition: "{{ not (ansible_check_mode and (systemd_unit.changed or openproject_user.changed)) }}"
    systemd_unit_restart: "{{ systemd_unit.changed or openproject_secret_key_rotated }}"
  tags:
    - openproject

- name: Configure nginx
  import_role:
    name: nginx
    tasks_from: site
  vars:
    nginx_subdomain: openproject
    nginx_proxy_pass: http://localhost:8070/
    nginx_csp_additional: "img-src secure.gravatar.com {{ nginx_csp_default }}"
  tags:
    - openproject
