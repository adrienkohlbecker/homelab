- name: Assert openproject required inputs are set
  assert:
    that:
      - openproject_secret_key is defined
      - openproject_secret_key | length > 0
    fail_msg: openproject_secret_key must be set (vaulted) in host/group_vars
  tags:
    - openproject

- name: Set up openproject system user, group, and config dir
  import_role:
    name: service_user
    tasks_from: user
  vars:
    service_user_args:
      name: openproject
  tags:
    - openproject

# Two host users because the all-in-one image runs rails as in-container app
# (uid 1000) and postgres as in-container postgres (uid 102), with supervisord
# + gosu dropping privileges. Bijective uidmap in the unit (+102 → openproject_pg,
# +1000 → openproject) so files written under each bind-mount land owned by the
# matching host user, regardless of the image's apt-assigned numbering. Container
# root (supervisord, pre-drop) deliberately stays mapped to host root: it writes
# nothing into the bind-mounts (postgres/app do, as 102/1000), and a +0 override
# would collide with +1000 on the same host uid -- podman refuses to map two
# container ids onto one host id ("container ID 0 cannot be mapped to a host ID").
- name: Set up openproject_pg system user and group
  import_role:
    name: service_user
    tasks_from: user
  vars:
    service_user_args:
      name: openproject_pg
      config_dir: false
  tags:
    - openproject

- name: Create pgdata directory
  when: not (ansible_check_mode and openproject_pg_user.changed)
  file:
    dest: /mnt/services/openproject/pgdata
    state: directory
    owner: openproject_pg
    group: openproject_pg
    mode: "0700"
  become: true
  tags:
    - openproject

- name: Create assets directory
  when: not (ansible_check_mode and openproject_user.changed)
  file:
    dest: /mnt/services/openproject/assets
    state: directory
    owner: openproject
    group: openproject
    mode: "0700"
  become: true
  tags:
    - openproject

# The SECRET_KEY_BASE rotation gate lives in its own file so _verify can drive
# the real check (not a copy of its predicate). It aborts the play if the
# vaulted key drifts from the stored secret, before the new key reaches the
# store -- rotating the Rails master key makes stored encrypted data (sessions,
# 2FA/TOTP, OAuth/SMTP creds) permanently undecryptable.
- name: Gate openproject_secret_key against post-bootstrap rotation
  import_tasks: check_secret_key_rotation.yml
  tags:
    - openproject

- name: Create openproject secret key
  import_role:
    name: podman_secret
    tasks_from: secret
  vars:
    podman_secret_args:
      name: openproject_secret_key
      data: "{{ openproject_secret_key }}"
  tags:
    - openproject

# Optional: with openproject_admin_password unset the admin account isn't
# seeded (operator creates it by hand). When set, OPENPROJECT_SEED__ADMIN__USER__
# PASSWORD__RESET=false in the unit means the password only applies at first
# account creation, so leaving the var in place across re-converges is safe.
- name: Create openproject admin password secret
  when: openproject_admin_password is defined
  import_role:
    name: podman_secret
    tasks_from: secret
  vars:
    podman_secret_args:
      name: openproject_admin_password
      data: "{{ openproject_admin_password }}"
  tags:
    - openproject

- name: Fail if openproject_admin_password rotated post-bootstrap
  fail:
    msg: |
      openproject_admin_password changed in vault, but it only takes effect when
      OpenProject first seeds the admin account; the running instance still has
      the old password. Change it on the live instance under Administration >
      Users > admin, or via the Rails console:

        podman exec -it openproject bundle exec rails console

      then re-run this play.
  when: (openproject_admin_password_rotated | default(false)) and (openproject_admin_password_existed_before | default(false))
  tags:
    - openproject

- name: Create openproject smtp password secret
  when: openproject_smtp_password is defined
  import_role:
    name: podman_secret
    tasks_from: secret
  vars:
    podman_secret_args:
      name: openproject_smtp_password
      data: "{{ openproject_smtp_password }}"
  tags:
    - openproject

- name: Install openproject service
  import_role:
    name: systemd_unit
    tasks_from: install
  vars:
    systemd_unit_args:
      src: openproject.service.j2
      condition: "{{ not (ansible_check_mode and (openproject_user.changed or openproject_pg_user.changed)) }}"
  tags:
    - openproject

- name: Enable openproject service
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: openproject
      condition: "{{ not (ansible_check_mode and (openproject_service_result.changed or openproject_user.changed or openproject_pg_user.changed)) }}"
      restart: "{{ openproject_service_result.changed or openproject_secret_key_rotated or (openproject_admin_password_rotated | default(false)) or (openproject_smtp_password_rotated | default(false)) }}"
  tags:
    - openproject

- name: Configure nginx
  import_role:
    name: nginx
    tasks_from: site
  vars:
    nginx_site_args:
      subdomain: openproject
      proxy_pass: http://127.0.0.1:{{ service_ports.openproject }}/
      client_max_body_size: 256m
      auth: required
      csp_additional: "img-src secure.gravatar.com {{ nginx_csp_default }}"
  tags:
    - openproject
