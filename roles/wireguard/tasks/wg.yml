---
- name: wg | Configure wireguard interface
  template:
    src: wg.conf.j2
    dest: /etc/wireguard/{{ iface }}.conf
    owner: root
    group: root
    mode: "0600"
    backup: true
    # wg-quick strip rejects any path whose basename doesn't match
    # [A-Za-z0-9_=+.-]{1,15}\.conf, so the ansible-staged temp file
    # fails the check. Symlink it under the real interface name in a
    # per-run tempdir and parse through the link.
    validate: 'sh -c ''d=$(mktemp -d) && ln -s "%s" "$d/{{ iface }}.conf" && wg-quick strip "$d/{{ iface }}.conf" >/dev/null && rm -rf "$d"'''
  register: wireguard_cfg
  become: true
  tags:
    - wireguard

# Full wg-quick@{{ iface }} restart (down+up) on any config change -- NOT a
# `wg syncconf` hot-reload. syncconf preserves live sessions but only syncs the
# crypto config, not kernel routes: a peer added after the first `up` (e.g. fox
# joining the backbone) would get synced crypto but no AllowedIP route, so
# traffic to its wg IP falls through the default route and is silently lost --
# handshakes still work (they're wg-internal via peer endpoints), but no data
# passes. A restart re-runs wg-quick's route installation. Cost: every peer
# re-handshakes (a brief blip + reset transfer counters / NAT source-port
# mappings) on a config change -- acceptable for a home backbone, and far
# simpler than reconciling routes alongside syncconf.
- name: wg | Enable wg-quick@{{ iface }} service
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: wg-quick@{{ iface }}.service
      condition: "{{ not (ansible_check_mode and apt_install_wireguard.changed) }}"
      restart: "{{ apt_install_wireguard.changed or wireguard_cfg.changed }}"
  tags:
    - wireguard
