---
- name: wg | Configure wireguard interface
  template:
    src: wg.conf.j2
    dest: /etc/wireguard/{{ iface }}.conf
    owner: root
    group: root
    mode: "0600"
    backup: true
    validate: wg-quick strip %s >/dev/null
  register: wireguard_cfg
  become: true
  tags:
    - wireguard

- name: wg | Enable wg-quick@{{ iface }} service
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: wg-quick@{{ iface }}.service
      condition: "{{ not (ansible_check_mode and apt_install_wireguard.changed) }}"
      restart: "{{ wireguard_cfg.changed or apt_install_wireguard.changed }}"
  tags:
    - wireguard
