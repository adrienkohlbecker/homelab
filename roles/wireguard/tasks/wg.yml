---
- name: wg | Configure wireguard interface
  template:
    src: wg.conf.j2
    dest: /etc/wireguard/{{ iface }}.conf
    owner: root
    group: root
    mode: "0600"
    backup: true
    # wg-quick strip rejects any path whose basename doesn't match
    # [A-Za-z0-9_=+.-]{1,15}\.conf, so the ansible-staged temp file
    # fails the check. Symlink it under the real interface name in a
    # per-run tempdir and parse through the link.
    validate: 'sh -c ''d=$(mktemp -d) && ln -s "%s" "$d/{{ iface }}.conf" && wg-quick strip "$d/{{ iface }}.conf" >/dev/null && rm -rf "$d"'''
  register: wireguard_cfg
  become: true
  tags:
    - wireguard

- name: wg | Enable wg-quick@{{ iface }} service
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: wg-quick@{{ iface }}.service
      condition: "{{ not (ansible_check_mode and apt_install_wireguard.changed) }}"
      restart: "{{ apt_install_wireguard.changed }}"
  tags:
    - wireguard

# Hot-reload via wg syncconf preserves active sessions (handshakes,
# transfer counters, source-port NAT mappings); a full down/up forces
# every peer to re-handshake. Only when config-only changed -- a
# package upgrade gets the full restart above so the new binary takes
# effect. wg syncconf requires the iface to be up, which is true on
# every code path that reaches here (systemd_unit started/restarted
# above).
- name: wg | Reload wg-quick@{{ iface }} via wg syncconf
  shell: |
    set -euo pipefail
    wg syncconf {{ iface }} <(wg-quick strip {{ iface }})
  args:
    executable: /bin/bash
  become: true
  when: wireguard_cfg.changed and not apt_install_wireguard.changed
  tags:
    - wireguard
