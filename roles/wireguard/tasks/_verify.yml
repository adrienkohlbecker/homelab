---
# Behavior probes against the live wg interface, not the rendered
# config. Only invoked by test/testrole.py against a qemu VM; never
# from site.yml or `mise run ansible --tags wireguard`.
- name: _verify | Assert wg-quick@wg0 is active
  systemd:
    name: wg-quick@wg0.service
    state: started
  become: true
  check_mode: true
  register: wireguard_service_check
  failed_when: wireguard_service_check.changed

- name: _verify | Assert IPv4 forwarding is active at runtime
  command: sysctl -n net.ipv4.ip_forward
  register: wireguard_ipv4_fwd
  become: true
  changed_when: false
  failed_when: wireguard_ipv4_fwd.stdout | trim != '1'

- name: _verify | Assert IPv6 forwarding is active at runtime
  command: sysctl -n net.ipv6.conf.all.forwarding
  register: wireguard_ipv6_fwd
  become: true
  changed_when: false
  failed_when: wireguard_ipv6_fwd.stdout | trim != '1'

# One `wg show <iface> dump` carries the whole live interface + peer table as
# tab-separated columns, so the scalar probes below parse a single register
# instead of re-invoking wg (and hand-parsing it) per attribute. Columns:
#   interface line: private-key  public-key  listen-port  fwmark
#   peer lines:     public-key  preshared-key  endpoint  allowed-ips
#                   latest-handshake  transfer-rx  transfer-tx  persistent-keepalive
- name: _verify | Dump live wg interface + peer state
  command: wg show {{ iface | default('wg0') }} dump
  register: wireguard_dump
  become: true
  changed_when: false

- name: _verify | Assert listen-port matches service_ports.wireguard
  vars:
    listen_port_actual: "{{ (wireguard_dump.stdout_lines[0] | split('\t'))[2] | int }}"
  assert:
    quiet: true
    that: listen_port_actual == service_ports.wireguard
    fail_msg: >-
      wg0 listen-port {{ listen_port_actual }} != service_ports.wireguard
      ({{ service_ports.wireguard }})

# Count equals all-peers-minus-self only because converge is server-only
# (main.yml asserts own_peer.is_server), so the template's loop includes every
# other peer; against a non-server converge it would be servers-only.
- name: _verify | Assert peer count matches wireguard_peers - 1
  assert:
    quiet: true
    that: wireguard_dump.stdout_lines[1:] | length == (wireguard_peers | length - 1)
    fail_msg: >-
      live peer count {{ wireguard_dump.stdout_lines[1:] | length }} !=
      wireguard_peers - 1 ({{ wireguard_peers | length - 1 }})

- name: _verify | Assert interface carries own_peer.address
  vars:
    own_peer: "{{ wireguard_peers | selectattr('name', 'eq', inventory_hostname) | first }}"
  command: ip -4 -o addr show dev {{ iface | default('wg0') }}
  register: wireguard_ip_addr
  become: true
  changed_when: false
  failed_when: ('inet ' ~ own_peer.address ~ '/32') not in wireguard_ip_addr.stdout

- name: _verify | Assert preshared keys are loaded for every peer
  vars:
    psk_fields: "{{ wireguard_dump.stdout_lines[1:] | map('split', '\t') | map(attribute=1) | list }}"
  assert:
    quiet: true
    that:
      - "'(none)' not in psk_fields"
      - psk_fields | length == (wireguard_peers | length - 1)
    fail_msg: "preshared keys missing or miscounted: {{ psk_fields }}"

# PersistentKeepalive is emitted per-pair (wg.conf.j2), only when the converging
# host appears in a peer's keepalive_from. Assert the live count of peers with a
# keepalive interval matches that membership -- guards the per-pair condition
# from regressing to per-peer (which would force a heartbeat on mobile peers).
# On box no peer lists box, so the expected count is 0.
- name: _verify | Assert persistent-keepalive matches keepalive_from membership
  vars:
    expected_keepalive_count: "{{ wireguard_peers | selectattr('keepalive_from', 'defined') | map(attribute='keepalive_from') | select('contains', inventory_hostname) | list | length }}"
    keepalive_on_count: "{{ wireguard_dump.stdout_lines[1:] | map('split', '\t') | map(attribute=7) | reject('eq', 'off') | list | length }}"
  assert:
    quiet: true
    that: keepalive_on_count | int == expected_keepalive_count | int
    fail_msg: >-
      keepalive-on count {{ keepalive_on_count }} != keepalive_from membership
      ({{ expected_keepalive_count }})

# Regression guard for the syncconf-vs-routes bug: every non-default peer
# AllowedIP must have a kernel route via the wg iface, else traffic to that
# peer's wg IP falls through the default route and is silently lost (handshakes
# still work). Excludes 0.0.0.0/0 + ::/0 (wg-quick fwmark/policy routing).
- name: _verify | Assert kernel routes exist for every peer AllowedIP
  shell: |
    set -euo pipefail
    missing=""
    cidrs=$(wg show {{ iface | default('wg0') }} allowed-ips | sed 's/\t/ /' | cut -d' ' -f2- \
            | tr ' ' '\n' | grep -E '/[0-9]+$' | grep -vxE '0\.0\.0\.0/0|::/0' | sort -u || true)
    for cidr in $cidrs; do
      ip route show "$cidr" dev {{ iface | default('wg0') }} | grep -q . || missing="$missing $cidr"
    done
    echo "missing_routes:$missing"
    test -z "$missing"
  args:
    executable: /bin/bash
  become: true
  changed_when: false
