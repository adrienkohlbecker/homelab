---
# Per-peer client config + QR + zip generation. Runs only via the
# `wireguard.yml` entry point (mise run ansible:wireguard) on the
# operator's laptop -- NOT imported from main.yml, so `mise run
# ansible --tags wireguard` against a server doesn't touch the
# operator's working tree.
#
# wireguard_render_plan flattens client peers x config shapes (the
# split-tunnel default plus one all-traffic-via-<server> variant per
# server peer) into a single list of {peer, suffix, vpn} dicts so the
# template + QR tasks each appear once instead of once-per-shape.

# Peer names flow unquoted into the PSK and QR shell commands below
# (and into shell-redirected file paths). The regex bounds names to
# [a-z][a-z0-9_]* so a `$`, backtick, space, or `;` in a future
# inventory entry can't turn the localhost play into RCE against the
# operator. Underscores match the repo-wide identifier convention.
- name: Assert wireguard peer names are shell-safe
  assert:
    that: item.name is match('^[a-z][a-z0-9_]*$')
    fail_msg: "wireguard peer name {{ item.name | to_json }} must match ^[a-z][a-z0-9_]*$"
  loop: "{{ wireguard_peers }}"
  loop_control:
    label: "{{ item.name }}"
  tags:
    - wireguard

- name: Seed wireguard render plan with split-tunnel shapes
  set_fact:
    wireguard_render_plan: "{{ wireguard_peers | rejectattr('is_server') | map(attribute='name') | map('community.general.dict_kv', 'peer') | map('combine', {'suffix': '', 'vpn': ''}) | list }}"
  tags:
    - wireguard

- name: Append all-traffic shapes to wireguard render plan
  set_fact:
    wireguard_render_plan: "{{ wireguard_render_plan + [{'peer': item[0], 'suffix': ' (' ~ item[1] ~ ' all-traffic)', 'vpn': item[1]}] }}"
  loop: "{{ (wireguard_peers | rejectattr('is_server') | map(attribute='name') | list) | product(wireguard_peers | selectattr('is_server') | map(attribute='name') | list) | list }}"
  loop_control:
    label: "{{ item[0] }} via {{ item[1] }}"
  tags:
    - wireguard

- name: Create wireguard artifact root
  file:
    dest: "{{ playbook_dir }}/wireguard"
    state: directory
    owner: "{{ ansible_facts.user_uid }}"
    group: "{{ ansible_facts.user_gid }}"
    mode: "0700"
  tags:
    - wireguard

- name: Create wireguard per-peer artifact dir
  file:
    dest: "{{ playbook_dir }}/wireguard/{{ item }}"
    state: directory
    owner: "{{ ansible_facts.user_uid }}"
    group: "{{ ansible_facts.user_gid }}"
    mode: "0700"
  loop: "{{ wireguard_peers | rejectattr('is_server') | map(attribute='name') }}"
  tags:
    - wireguard

- name: Create wireguard psk dir
  file:
    dest: "{{ playbook_dir }}/wireguard/psk"
    state: directory
    owner: "{{ ansible_facts.user_uid }}"
    group: "{{ ansible_facts.user_gid }}"
    mode: "0700"
  tags:
    - wireguard

# umask on the redirect lands the .psk at 0644 by default; the explicit
# umask 077 here is what makes 0600 stick (ansible's file: mode is
# meaningless on shell-redirected output). tr -d '\n' strips wg genpsk's
# trailing newline to stay byte-equivalent with existing PSK files.
- name: Generate preshared key
  shell: set -euo pipefail; umask 077; wg genpsk | tr -d '\n' > {{ playbook_dir }}/wireguard/psk/{{ item[0] }}-{{ item[1] }}.psk
  args:
    executable: /bin/bash
    creates: "{{ playbook_dir }}/wireguard/psk/{{ item[0] }}-{{ item[1] }}.psk"
  loop: "{{ wireguard_peers | map(attribute='name') | sort | combinations(2) }}"
  tags:
    - wireguard

- name: Render wireguard client config
  template:
    src: "{{ playbook_dir }}/roles/wireguard/templates/wg.conf.j2"
    dest: "{{ playbook_dir }}/wireguard/{{ item.peer }}/home{{ item.suffix }}.conf"
    owner: "{{ ansible_facts.user_uid }}"
    group: "{{ ansible_facts.user_gid }}"
    mode: "0600"
  vars:
    own_peer_name: "{{ item.peer }}"
    vpn_peer_name: "{{ item.vpn }}"
  loop: "{{ wireguard_render_plan }}"
  loop_control:
    label: "{{ item.peer }}{{ item.suffix }}"
  tags:
    - wireguard

# umask 077 makes qrencode's output land at 0600 (the PNG embeds the
# same secret as the .conf).
- name: Render wireguard QR code
  shell: set -euo pipefail; umask 077; if [ -f "{{ playbook_dir }}/wireguard/{{ item.peer }}/qr{{ item.suffix }}.png" ]; then bfr=`md5sum "{{ playbook_dir }}/wireguard/{{ item.peer }}/qr{{ item.suffix }}.png" | cut -f 1 -d " "`; else bfr="none"; fi; qrencode -t png -o "{{ playbook_dir }}/wireguard/{{ item.peer }}/qr{{ item.suffix }}.png" -r "{{ playbook_dir }}/wireguard/{{ item.peer }}/home{{ item.suffix }}.conf"; aftr=`md5sum "{{ playbook_dir }}/wireguard/{{ item.peer }}/qr{{ item.suffix }}.png" | cut -f 1 -d " "`; test $bfr = $aftr || ([ "$?" = 1 ] && echo "file updated" || exit 1)
  args:
    executable: /bin/bash
  register: wireguard_qr_result
  changed_when: "'file updated' in wireguard_qr_result.stdout"
  loop: "{{ wireguard_render_plan }}"
  loop_control:
    label: "{{ item.peer }}{{ item.suffix }}"
  tags:
    - wireguard

- name: Bundle wireguard client artifacts into zip
  archive:
    path:
      - "{{ playbook_dir }}/wireguard/{{ item }}/*.conf"
    dest: "{{ playbook_dir }}/wireguard/{{ item }}/{{ item }}.zip"
    format: zip
    owner: "{{ ansible_facts.user_uid }}"
    group: "{{ ansible_facts.user_gid }}"
    mode: "0600"
  loop: "{{ wireguard_peers | rejectattr('is_server') | map(attribute='name') }}"
  tags:
    - wireguard

# Without this prune, renaming `phone` -> `mobile` in wireguard_peers
# leaves `./wireguard/phone/home.conf` (a private-key-bearing file) on
# disk forever, and the next zip-export accidentally includes it.
- name: Find existing wireguard peer dirs
  find:
    paths: "{{ playbook_dir }}/wireguard"
    file_type: directory
    depth: 1
    excludes:
      - psk
  register: wireguard_peer_dirs_found
  tags:
    - wireguard

- name: Prune orphan wireguard peer dirs
  file:
    path: "{{ item.path }}"
    state: absent
  loop: "{{ wireguard_peer_dirs_found.files | default([]) }}"
  loop_control:
    label: "{{ item.path | basename }}"
  when: (item.path | basename) not in (wireguard_peers | rejectattr('is_server') | map(attribute='name') | list)
  tags:
    - wireguard

- name: Find existing wireguard PSK files
  find:
    paths: "{{ playbook_dir }}/wireguard/psk"
    file_type: file
    patterns: "*.psk"
  register: wireguard_psk_files_found
  tags:
    - wireguard

# expected_psks is the canonical set the Generate preshared key task
# above produces: sorted-pair filenames `<a>-<b>.psk` for every
# combinations(2) of all peer names.
- name: Prune orphan wireguard PSK files
  file:
    path: "{{ item.path }}"
    state: absent
  vars:
    expected_psks: "{{ wireguard_peers | map(attribute='name') | sort | combinations(2) | map('join', '-') | map('regex_replace', '$', '.psk') | list }}"
  loop: "{{ wireguard_psk_files_found.files | default([]) }}"
  loop_control:
    label: "{{ item.path | basename }}"
  when: (item.path | basename) not in expected_psks
  tags:
    - wireguard
