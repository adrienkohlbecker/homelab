- name: _setup | Install nginx
  import_role:
    name: test
    tasks_from: nginx

- name: _setup | Install podman
  import_role:
    name: podman
    tasks_from: install

- name: _setup | Create media podman network
  import_role:
    name: media
    tasks_from: network

- name: _setup | Install authelia stub for auth=required tests
  import_role:
    name: test
    tasks_from: authelia_stub
  vars:
    test_authelia_stub_args:
      mode: gate

- name: _setup | Create fixture directories
  file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - /mnt/services
    - /mnt/services/sqlite
  become: true

# Install the real sort_ini binary (not a stub): _verify re-sorts config.ini
# with it to prove the rendered template round-trips through the watcher
# without churn. A `tail` stub would strip nothing and hide blank-line drift.
- name: _setup | Install sort_ini binary
  import_role:
    name: sort_ini
