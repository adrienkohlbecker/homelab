- name: _test | Install nginx
  import_role:
    name: _test
    tasks_from: nginx

- name: _setup | Install podman
  import_role:
    name: podman
    tasks_from: install

- name: _test | Setup dependencies
  shell: |
    set -euo pipefail
    mkdir -p /mnt/services/plex
    ln -s /usr/bin/tail /usr/local/bin/sort_ini
  args:
    executable: /bin/bash
    creates: /mnt/services
  become: true
