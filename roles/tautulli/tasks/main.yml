- name: Set up tautulli system user and group
  import_role:
    name: service_user
    tasks_from: user
  vars:
    service_user_args:
      name: tautulli
  tags:
    - tautulli

# Tautulli's --datadir bundles config.ini, logs, backups, and tautulli.db
# into one directory. The helper symlinks only the live DB so SQLite resolves
# to the 4K sqlite dataset; backups stay on the 128K dataset (one-shot full DB
# files compress and snapshot fine at 128K). force: true (no pre_create) plants
# the dangling link on a cold host -- Tautulli creates the real DB through it.
- name: Place tautulli SQLite DB on the sqlite dataset
  import_role:
    name: sqlite_dataset
    tasks_from: dataset
  vars:
    sqlite_dataset_args:
      name: tautulli
      owner: tautulli
      group: tautulli
      mode: "0755"
      condition: "{{ not (ansible_check_mode and tautulli_user.changed) }}"
      force: true
      links:
        - /mnt/services/tautulli/tautulli.db
  tags:
    - tautulli

- name: Read existing tautulli config for runtime PMS values
  slurp:
    src: /mnt/services/tautulli/config.ini
  register: _tautulli_existing
  failed_when: false
  become: true
  tags:
    - tautulli

- name: Preserve runtime PMS values
  when: _tautulli_existing is succeeded
  set_fact:
    _tautulli_pms_plexpass: "{{ (_tautulli_existing.content | b64decode | regex_findall('(?m)^pms_plexpass = (\\d+)$')) | default(['0'], true) | first }}"
    _tautulli_pms_version: "{{ (_tautulli_existing.content | b64decode | regex_findall('(?m)^pms_version = ([\\w.\\-]+)$')) | default([''], true) | first }}"
  tags:
    - tautulli

- name: Default runtime PMS values for fresh install
  when: _tautulli_existing is not succeeded
  set_fact:
    _tautulli_pms_plexpass: "0"
    _tautulli_pms_version: ""
  tags:
    - tautulli

- name: Configure tautulli
  template:
    src: config.ini.j2
    dest: /mnt/services/tautulli/config.ini
    owner: tautulli
    group: tautulli
    mode: "0600"
    backup: true
    validate: python3 -c 'import configparser,sys; configparser.ConfigParser().read(sys.argv[1])' "%s"
  register: tautulli_conf
  become: true
  tags:
    - tautulli

- name: Install tautulli service
  import_role:
    name: systemd_unit
    tasks_from: install
  vars:
    systemd_unit_args:
      src: tautulli.service.j2
      condition: "{{ not (ansible_check_mode and tautulli_user.changed) }}"
  tags:
    - tautulli

- name: Enable tautulli service
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: tautulli
      condition: "{{ not (ansible_check_mode and (tautulli_service_result.changed or tautulli_user.changed)) }}"
      restart: "{{ tautulli_service_result.changed or tautulli_conf.changed }}"
  tags:
    - tautulli

- name: Configure nginx
  import_role:
    name: nginx
    tasks_from: site
  vars:
    nginx_site_args:
      subdomain: tautulli
      proxy_pass: "http://127.0.0.1:{{ service_ports.tautulli }}/"
      csp_default_src: "plex.tv *.plex.tv"
      auth: required
  tags:
    - tautulli

- name: Configure ini watcher
  import_role:
    name: sort_ini
    tasks_from: path
  vars:
    sort_ini_args:
      path: /mnt/services/tautulli/config.ini
  tags:
    - tautulli
