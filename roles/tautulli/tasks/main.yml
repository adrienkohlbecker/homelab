- name: Add tautulli group
  group:
    name: tautulli
    system: true
  become: true
  tags:
    - tautulli

- name: Add tautulli user
  user:
    name: tautulli
    group: tautulli
    createhome: false
    system: true
    shell: /usr/sbin/nologin
    home: /nonexistent
  become: true
  register: tautulli_user
  tags:
    - tautulli

- name: Create configuration directory
  when: not (ansible_check_mode and tautulli_user.changed)
  file:
    dest: /mnt/services/tautulli
    state: directory
    owner: tautulli
    group: tautulli
    mode: "0755"
  become: true
  tags:
    - tautulli

- name: Create sqlite directory
  when: not (ansible_check_mode and tautulli_user.changed)
  file:
    dest: /mnt/services/sqlite/tautulli
    state: directory
    owner: tautulli
    group: tautulli
    mode: "0755"
  become: true
  tags:
    - tautulli

# Tautulli's --datadir bundles config.ini, logs, backups, and tautulli.db
# into one directory. Symlink only the live DB so SQLite resolves to the
# 4K sqlite dataset; backups stay on the 128K dataset (one-shot full DB
# files compress and snapshot fine at 128K).
- name: Symlink tautulli SQLite DB onto sqlite dataset
  when: not (ansible_check_mode and tautulli_user.changed)
  file:
    src: /mnt/services/sqlite/tautulli/tautulli.db
    dest: /mnt/services/tautulli/tautulli.db
    state: link
    force: true
    owner: tautulli
    group: tautulli
    follow: false
  become: true
  tags:
    - tautulli

- name: Configure tautulli
  template:
    src: config.ini.j2
    dest: /mnt/services/tautulli/config.ini
    owner: tautulli
    group: tautulli
    mode: "0600"
    backup: true
  register: tautulli_conf
  become: true
  tags:
    - tautulli

- name: Install tautulli service
  import_role:
    name: systemd_unit
    tasks_from: install
  vars:
    systemd_unit_args:
      src: tautulli.service.j2
      condition: "{{ not (ansible_check_mode and tautulli_user.changed) }}"
  tags:
    - tautulli

- name: Enable tautulli service
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: tautulli
      condition: "{{ not (ansible_check_mode and (systemd_unit.changed or tautulli_user.changed)) }}"
      restart: "{{ systemd_unit.changed or tautulli_conf.changed }}"
  tags:
    - tautulli

- name: Configure nginx
  import_role:
    name: nginx
    tasks_from: site
  vars:
    nginx_subdomain: tautulli
    nginx_proxy_pass: http://localhost:8182/
    nginx_csp_default_src: "plex.tv *.plex.tv"
  tags:
    - tautulli

- name: Configure ini watcher
  import_role:
    name: sort_ini
    tasks_from: path
  vars:
    sort_ini_path: /mnt/services/tautulli/config.ini
    sort_ini_escaped_path: mnt-services-tautulli-config.ini
  tags:
    - tautulli
