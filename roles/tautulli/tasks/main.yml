- name: Assert required tautulli inputs are provided
  assert:
    that:
      - tautulli_api_key | default('') | length > 0
      - tautulli_jwt_secret | default('') | length > 0
      - tautulli_pms_token | default('') | length > 0
      - tautulli_pms_client_id | default('') | length > 0
      - tautulli_pms_uuid | default('') | length > 0
      - themoviedb_api_key | default('') | length > 0
      - plex_machine_id | default('') | length > 0
      - service_ports.tautulli is defined
      - external_ips.lab is defined
      - system_timezone | default('') | length > 0
      - domain | default('') | length > 0
  tags:
    - tautulli

- name: Add media group
  import_role:
    name: media
    tasks_from: group
  tags:
    - tautulli

- name: Set up tautulli system user and group
  import_role:
    name: service_user
    tasks_from: user
  vars:
    service_user_args:
      name: tautulli
      extra_groups: [ media ]
      config_dir_group: media
      # /config holds config.ini (api_key/pms_token/jwt_secret) and Tautulli's
      # own backups/ which bundle copies of it; 0700 keeps the dir untraversable
      # by the media co-tenants config_dir_group would otherwise let in.
      config_dir_mode: "0700"
  tags:
    - tautulli

# Tautulli's --datadir bundles config.ini, logs, backups, and tautulli.db
# into one directory. The helper symlinks only the live DB so SQLite resolves
# to the 4K sqlite dataset; backups stay on the 128K dataset (one-shot full DB
# files compress and snapshot fine at 128K). force: true (no pre_create) plants
# the dangling link on a cold host -- Tautulli creates the real DB through it.
- name: Place tautulli SQLite DB on the sqlite dataset
  import_role:
    name: sqlite_dataset
    tasks_from: dataset
  vars:
    sqlite_dataset_args:
      name: tautulli
      owner: tautulli
      group: media
      mode: "0750"
      condition: "{{ not (ansible_check_mode and (tautulli_user.changed or media_group.changed)) }}"
      force: true
      links:
        - /mnt/services/tautulli/tautulli.db
  tags:
    - tautulli

- name: Read existing tautulli config for runtime PMS values
  slurp:
    src: /mnt/services/tautulli/config.ini
  register: _tautulli_existing
  failed_when: false
  become: true
  tags:
    - tautulli

- name: Preserve runtime PMS values (default on fresh install)
  set_fact:
    _tautulli_pms_plexpass: >-
      {{ ((_tautulli_existing.content | b64decode | regex_findall('(?m)^pms_plexpass = (\d+)$'))
          | default(['0'], true) | first)
         if _tautulli_existing is succeeded else '0' }}
    _tautulli_pms_version: >-
      {{ ((_tautulli_existing.content | b64decode | regex_findall('(?m)^pms_version = ([\w.\-]+)$'))
          | default([''], true) | first)
         if _tautulli_existing is succeeded else '' }}
  tags:
    - tautulli

- name: Configure tautulli
  template:
    src: config.ini.j2
    dest: /mnt/services/tautulli/config.ini
    owner: tautulli
    group: media
    mode: "0600"
    backup: true
    validate: python3 -c 'import configparser,sys; configparser.ConfigParser().read(sys.argv[1])' "%s"
  register: tautulli_conf
  when: not (ansible_check_mode and (tautulli_user.changed or media_group.changed))
  become: true
  tags:
    - tautulli

- name: Install tautulli service
  import_role:
    name: systemd_unit
    tasks_from: install
  vars:
    systemd_unit_args:
      src: tautulli.service.j2
      condition: "{{ not (ansible_check_mode and (tautulli_user.changed or media_group.changed)) }}"
  tags:
    - tautulli

- name: Enable tautulli service
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: tautulli
      condition: "{{ not (ansible_check_mode and (tautulli_service_result.changed or tautulli_user.changed or media_group.changed)) }}"
      restart: "{{ tautulli_service_result.changed or tautulli_conf.changed or tautulli_user.changed or media_group.changed }}"
  tags:
    - tautulli

- name: Configure nginx
  import_role:
    name: nginx
    tasks_from: site
  vars:
    nginx_site_args:
      subdomain: tautulli
      proxy_pass: "http://127.0.0.1:{{ service_ports.tautulli }}/"
      # Tautulli's Plex sign-in does browser-side XHR to plex.tv; scope it to
      # connect-src (matching radarr/sonarr) rather than widening default-src.
      csp_additional: "connect-src plex.tv *.plex.tv {{ nginx_csp_default }}"
      auth: required
  tags:
    - tautulli

- name: Configure ini watcher
  import_role:
    name: sort_ini
    tasks_from: path
  vars:
    sort_ini_args:
      path: /mnt/services/tautulli/config.ini
  tags:
    - tautulli
