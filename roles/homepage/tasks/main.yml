- name: Assert required role inputs
  assert:
    that:
      - homepage_netdata_hosts is defined
      - homepage_netdata_hosts | length > 0
    fail_msg: homepage_netdata_hosts must be defined and non-empty in host_vars
  tags:
    - homepage

- name: Set up homepage system user, group, and config dir
  import_role:
    name: service_user
    tasks_from: user
  vars:
    service_user_args:
      name: homepage
  tags:
    - homepage

- name: Configure homepage YAML config
  when: not (ansible_check_mode and homepage_user.changed)
  template:
    src: "{{ item }}.yaml.j2"
    dest: "/mnt/services/homepage/{{ item }}.yaml"
    owner: homepage
    group: homepage
    mode: "0644"
    backup: true
    validate: python3 -c 'import yaml,sys; yaml.safe_load(open(sys.argv[1]))' "%s"
  loop:
    - services
    - bookmarks
    - settings
    - widgets
  become: true
  tags:
    - homepage

- name: Install homepage service
  import_role:
    name: systemd_unit
    tasks_from: install
  vars:
    systemd_unit_args:
      src: homepage.service.j2
      condition: "{{ not (ansible_check_mode and homepage_user.changed) }}"
  tags:
    - homepage

# Homepage hot-reloads YAML config from the bind-mounted dir, so config-file
# changes don't need a service restart — only the unit template itself does.
- name: Enable homepage service
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: homepage
      condition: "{{ not (ansible_check_mode and (homepage_service_result.changed or homepage_user.changed)) }}"
      restart: "{{ homepage_service_result.changed }}"
  tags:
    - homepage

- name: Configure nginx
  import_role:
    name: nginx
    tasks_from: site
  vars:
    nginx_site_args:
      subdomain: homepage
      proxy_pass: http://localhost:{{ service_ports.homepage }}/
      auth: required
      # Mount the alerts sidecar under /alerts/ on the same origin as homepage
      # itself. Same-origin lets the panel resize its own iframe via
      # window.frameElement and folds away the CSP frame-src/frame-ancestors
      # ceremony a sibling subdomain would need. auth_request is repeated here
      # because the site template only wires it into `location /`; sibling
      # locations in server_conf need their own copy or a direct hit to
      # /alerts/ would bypass forward-auth.
      server_conf: |
        location /alerts/ {
          auth_request /internal/authelia;
          proxy_pass http://localhost:{{ service_ports.homepage_alerts }}/;
          proxy_http_version 1.1;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
        }
      # Bookmark icons resolve via the selfh.st icon set served from jsdelivr,
      # so img-src has to allow that CDN — default-src 'self' wouldn't.
      csp_additional: img-src cdn.jsdelivr.net {{ nginx_csp_default }}
  tags:
    - homepage

# Sidecar service: a tiny stdlib-only Python http.server that polls each host's
# netdata `/api/v1/alarms?active`, renders an HTML page, and exposes the same
# data as JSON. Embedded in the homepage dashboard via an iframe widget so the
# alarm names show up next to the count tiles.
- name: Create alerts panel source directory
  file:
    dest: /opt/homepage_alerts
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true
  tags:
    - homepage

- name: Copy alerts panel server
  copy:
    src: alerts_server.py
    dest: /opt/homepage_alerts/alerts_server.py
    owner: root
    group: root
    mode: "0644"
    backup: true
    validate: python3 -c 'import sys; compile(open(sys.argv[1]).read(), sys.argv[1], "exec")' "%s"
  register: homepage_alerts_source
  become: true
  tags:
    - homepage

- name: Install alerts panel service
  import_role:
    name: systemd_unit
    tasks_from: install
  vars:
    systemd_unit_args:
      src: homepage_alerts.service.j2
      condition: "{{ not (ansible_check_mode and homepage_user.changed) }}"
  tags:
    - homepage

- name: Enable alerts panel service
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: homepage_alerts
      condition: "{{ not (ansible_check_mode and (homepage_alerts_service_result.changed or homepage_user.changed)) }}"
      restart: "{{ homepage_alerts_service_result.changed or homepage_alerts_source.changed }}"
  tags:
    - homepage
