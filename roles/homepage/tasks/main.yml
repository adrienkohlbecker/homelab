- name: Assert required role inputs
  assert:
    that:
      - homepage_netdata_hosts is defined
      - homepage_netdata_hosts | length > 0
    fail_msg: homepage_netdata_hosts must be defined and non-empty in host_vars
  tags:
    - homepage

- name: Set up homepage system user, group, and config dir
  import_role:
    name: service_user
    tasks_from: user
  vars:
    service_user_args:
      name: homepage
  tags:
    - homepage

# The homepage container's entrypoint mkdir's /app/config/logs at
# every start; with /app/config bind-mounted :ro the mkdir errors
# ENOENT/EROFS and the Next.js process subsequently 500s every
# request. Pre-create the dir on the host side so the entrypoint
# notices it ("Skipping ownership changes for /app/config/logs")
# and the read-only mount stays read-only. On prod the dir already
# exists from before the :ro switch -- this task is a no-op there.
- name: Create homepage logs dir (mkdir'd by entrypoint, ro-mount can't)
  when: not (ansible_check_mode and homepage_user.changed)
  file:
    path: /mnt/services/homepage/logs
    state: directory
    owner: homepage
    group: homepage
    mode: "0755"
  become: true
  tags:
    - homepage

# The homepage container's Node entrypoint also `copyfile`'s the
# integration configs (docker.yaml, kubernetes.yaml, proxmox.yaml,
# custom.css, custom.js) from /app/src/skeleton/ into /app/config/
# at startup whenever the target is missing. With /app/config :ro
# the copyfile errors EROFS and the unit fails to start. Touch
# each file so the entrypoint's "copy if absent" path no-ops.
# force: false leaves any operator-edited content alone on prod
# (those files preexist from before the :ro switch).
- name: Touch homepage skeleton-seeded config files (entrypoint copyfile no-op)
  when: not (ansible_check_mode and homepage_user.changed)
  copy:
    content: ""
    dest: "/mnt/services/homepage/{{ item }}"
    force: false
    owner: homepage
    group: homepage
    mode: "0644"
  loop:
    - docker.yaml
    - kubernetes.yaml
    - proxmox.yaml
    - custom.css
    - custom.js
  become: true
  tags:
    - homepage

- name: Configure homepage YAML config
  when: not (ansible_check_mode and homepage_user.changed)
  template:
    src: "{{ item }}.yaml.j2"
    dest: "/mnt/services/homepage/{{ item }}.yaml"
    owner: homepage
    group: homepage
    mode: "0644"
    backup: true
    validate: python3 -c 'import yaml,sys; yaml.safe_load(open(sys.argv[1]))' "%s"
  loop:
    - services
    - bookmarks
    - settings
    - widgets
  become: true
  tags:
    - homepage

- name: Install homepage service
  import_role:
    name: systemd_unit
    tasks_from: install
  vars:
    systemd_unit_args:
      src: homepage.service.j2
      condition: "{{ not (ansible_check_mode and homepage_user.changed) }}"
  tags:
    - homepage

# Homepage hot-reloads YAML config from the bind-mounted dir, so config-file
# changes don't need a service restart — only the unit template itself does.
- name: Enable homepage service
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: homepage
      condition: "{{ not (ansible_check_mode and (homepage_service_result.changed or homepage_user.changed)) }}"
      restart: "{{ homepage_service_result.changed }}"
  tags:
    - homepage

- name: Configure nginx
  import_role:
    name: nginx
    tasks_from: site
  vars:
    nginx_site_args:
      subdomain: homepage
      proxy_pass: http://localhost:{{ service_ports.homepage }}/
      auth: required
      # Mount the alerts sidecar under /alerts/ on the same origin as homepage
      # itself. Same-origin lets the panel resize its own iframe via
      # window.frameElement and folds away the CSP frame-src/frame-ancestors
      # ceremony a sibling subdomain would need. auth_request is repeated here
      # because the site template only wires it into `location /`; a sibling
      # location in server_conf needs its own copy or a direct hit to
      # /alerts/ would bypass forward-auth.
      #
      # Static index.html written by alerts_generate.py at
      # /var/www/homepage_alerts/. Default nginx Last-Modified/ETag handling
      # is wanted: the iframe's 30s refreshInterval sends conditional GETs
      # that 304 on unchanged content.
      server_conf: |
        location /alerts/ {
          auth_request /internal/authelia;
          alias /var/www/homepage_alerts/;
          index index.html;
        }
      # Bookmark icons resolve via the selfh.st icon set served from jsdelivr,
      # so img-src has to allow that CDN — default-src 'self' wouldn't.
      csp_additional: img-src cdn.jsdelivr.net {{ nginx_csp_default }}
  tags:
    - homepage

# Sidecar: a stdlib-only Python oneshot that polls each configured host's
# netdata `/api/v1/alarms?active`, renders HTML + JSON, and atomically writes
# both to /var/www/homepage_alerts/. nginx serves them under /alerts/ on the
# homepage vhost (same origin, so the iframe widget can resize itself via
# window.frameElement). Fires every 30s via systemd timer; no long-running
# process.
- name: Create alerts sidecar source directory
  file:
    dest: /opt/homepage_alerts
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true
  tags:
    - homepage

- name: Create alerts sidecar output directory
  file:
    dest: /var/www/homepage_alerts
    state: directory
    owner: homepage
    group: homepage
    mode: "0755"
  when: not (ansible_check_mode and homepage_user.changed)
  become: true
  tags:
    - homepage

- name: Copy alerts sidecar generator
  copy:
    src: alerts_generate.py
    dest: /opt/homepage_alerts/alerts_generate.py
    owner: root
    group: root
    mode: "0644"
    backup: true
    validate: python3 -c 'import sys; compile(open(sys.argv[1]).read(), sys.argv[1], "exec")' "%s"
  register: homepage_alerts_source
  become: true
  tags:
    - homepage

# Install both homepage_alerts.service (Type=oneshot) and homepage_alerts.timer
# via the systemd_timer helper. monitor: false because sub-minute cadences
# don't map to netdata's overdue-detector hourly/daily/weekly/monthly buckets;
# systemd_service_unit_failed_state catches a wedged timer independently.
- name: Install and enable homepage_alerts timer
  import_role:
    name: systemd_timer
    tasks_from: install
  vars:
    # NETDATA_HOSTS env value: a `<name>=<query-url>[=<click-url>]` triple per
    # host, comma-joined. Whichever host this is running on is queried via
    # loopback (skips nginx + TLS), with the public FQDN as the click-through
    # target; other hosts use the FQDN for both.
    homepage_alerts_netdata_hosts_env: >-
      {%- set ents = [] -%}
      {%- for h in homepage_netdata_hosts -%}
      {%- set q = 'http://localhost:19999=' if h == inventory_hostname else '' -%}
      {%- set _ = ents.append(h ~ '=' ~ q ~ 'https://netdata.' ~ h ~ '.' ~ domain) -%}
      {%- endfor -%}
      {{ ents | join(',') }}
    systemd_timer_args:
      name: homepage_alerts
      description: Generate homepage alerts panel static files
      # Every 30s (at :00 and :30 of every minute). AccuracySec=1s is
      # required — systemd's 1min default would let fires drift well past
      # the iframe widget's 30s refreshInterval.
      on_calendar: "*:*:0/30"
      accuracy_sec: 1s
      # Fire immediately on enable so a fresh install doesn't leave nginx
      # 404'ing /alerts/ until the next OnCalendar tick.
      on_active_sec: "0"
      exec_start: /usr/bin/python3 /opt/homepage_alerts/alerts_generate.py
      run_as: homepage
      monitor: false
      # Bound a wedged run well within the 30s cadence. Each fire fans out to
      # N netdata hosts in parallel with FETCH_TIMEOUT=5s, so 25s is plenty
      # even on a chatty agent with the bulk alarm_log fetch.
      timeout_start_sec: 25s
      environment:
        NETDATA_HOSTS: "{{ homepage_alerts_netdata_hosts_env }}"
        OUTPUT_DIR: /var/www/homepage_alerts
      additional_service_directives:
        - "PrivateTmp=yes"
        - "ProtectSystem=strict"
        - "ProtectHome=yes"
        - "NoNewPrivileges=yes"
        - "ReadWritePaths=/var/www/homepage_alerts"
  tags:
    - homepage

# Trigger one immediate run when the script or units change. On fresh enable
# OnActiveSec=0 already fires the first run; this handles subsequent applies
# (e.g. NETDATA_HOSTS changed) where the timer is already running and would
# otherwise wait up to 30s for its next OnCalendar tick. state: started is a
# no-op if the oneshot is currently mid-run, and starts a fresh run if it's
# inactive — never SIGTERMs a run in progress.
- name: Force an immediate alerts_generate run on changes
  systemd:
    name: homepage_alerts.service
    state: started
  when:
    - not ansible_check_mode
    - homepage_alerts_source.changed
      or homepage_alerts_service_result.changed
      or homepage_alerts_timer_result.changed
  become: true
  tags:
    - homepage
