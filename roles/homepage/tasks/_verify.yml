- name: _verify | Homepage answers on its loopback port
  uri:
    url: http://localhost:{{ service_ports.homepage }}/api/healthcheck
    status_code: 200
  register: _verify_http
  retries: 30
  delay: 2
  until: _verify_http.status == 200
  become: true

- name: _verify | Homepage answers through nginx via Host header
  uri:
    url: https://localhost/api/healthcheck
    headers:
      Host: "homepage.{{ inventory_hostname }}.{{ domain }}"
    validate_certs: false
    status_code: 200
  become: true

# Wait + assert split: the timer fires the .service on OnActiveSec=0 so
# index.html appears shortly after enable, but ansible may race the first
# run. Combining retry-until with failed_when=content-check would fail-fast
# on the first 404; split into two tasks so retries get their full budget
# before content assertions fire.
- name: _verify | Homepage_alerts renders HTML through nginx
  uri:
    url: https://localhost/alerts/
    headers:
      Host: "homepage.{{ inventory_hostname }}.{{ domain }}"
    validate_certs: false
    return_content: true
    status_code: 200
  register: _verify_alerts_html
  retries: 30
  delay: 2
  until: _verify_alerts_html.status == 200
  become: true

- name: _verify | Homepage_alerts HTML carries the iframe-resize script
  assert:
    that:
      - "'frameElement' in _verify_alerts_html.content"
    fail_msg: "Expected the same-origin iframe-resize script (frameElement) in the rendered HTML"

- name: _verify | Homepage_alerts HTML names every configured host
  assert:
    that: item in _verify_alerts_html.content
    fail_msg: "Host {{ item }} missing from rendered HTML"
  loop: "{{ homepage_netdata_hosts }}"

# Functional check on the per-host error path (A3-lite). The box fixture sets
# homepage_netdata_hosts = [box] and the test VM has no real netdata on
# :19999, so _fetch_one's bare-except is guaranteed to fire and render_html
# should emit `<div class="err">`. A regression that silently drops the
# error rendering (e.g. _fetch_one swallowing the entry, or render_html
# stripping the err branch) would pass the "host name in content" check
# above (because the <h2> still renders) but fail this one. Box-only — on
# lab-qemu/pug-qemu the netdata targets may be reachable from the test VM.
- name: _verify | Per-host error path renders on test box
  when: inventory_hostname == 'box'
  assert:
    that:
      - '"<div class=\"err\">" in _verify_alerts_html.content'
    fail_msg: >-
      Expected a per-host <div class="err"> rendered on box (no real netdata
      reachable from the test fixture). HTML content was:
      {{ _verify_alerts_html.content }}

# Hot-reload proof: the role intentionally skips restart on YAML config
# edits because gethomepage watches /app/config. If a future image bump
# drops the watcher this assertion fires loudly instead of letting the
# regression hide as "ansible reports changed, dashboard shows old data".
- name: _verify | Inject sentinel bookmark to exercise homepage hot-reload
  copy:
    dest: /mnt/services/homepage/bookmarks.yaml
    content: |
      - Verify:
          - HomepageVerifySentinel:
              - abbr: VS
                href: https://verify.example/
    owner: homepage
    group: homepage
    mode: "0644"
  become: true

- name: _verify | Homepage hot-reloads bookmarks.yaml and renders the sentinel
  # Probe /api/bookmarks rather than the SSR'd `/` page: getStaticProps
  # caches the rendered HTML by path (query string doesn't differentiate
  # SSG output), so polling `/?_t=N` returns the same year-old HIT
  # response no matter how many random query strings you throw at it.
  # The /api/bookmarks JSON endpoint reads from the live in-memory
  # config that gethomepage's chokidar file-watch refreshes, so the
  # sentinel appears here as soon as the watcher fires.
  uri:
    url: "http://localhost:{{ service_ports.homepage }}/api/bookmarks"
    return_content: true
    status_code: 200
  register: _verify_hotreload
  retries: 60
  delay: 2
  until: "'HomepageVerifySentinel' in _verify_hotreload.content"
  become: true
