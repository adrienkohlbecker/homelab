# Empty `fans` leaves /etc/fancontrol removed and the service stopped
# but the package installed. Per-host configs override in host_vars.
# Note: ansible replaces the whole `fancontrol_settings` dict on
# host_vars override, so `interval` set here does NOT propagate when
# host_vars defines its own `fancontrol_settings:` -- the template
# falls back to 10 if the key is unset in the effective dict. Document
# the effective default here for discoverability; the template's
# `| default(10)` is the live mechanism.
fancontrol_settings:
  fans: []
  interval: 10
