[Unit]
# Cap the restart loop: 10 attempts per 10 minutes. Without this the
# default 5-burst-per-10s window collides with our RestartSec=10s and
# the unit either parks accidentally or, if RestartSec is widened,
# respawns indefinitely on persistent sysfs failure.
StartLimitIntervalSec=600
StartLimitBurst=10

[Service]
Restart=on-failure
RestartSec=10s

# Re-resolve hwmonN keys in /etc/fancontrol against current
# /sys/class/hwmon before the daemon parses the file. Kernel renumbers
# hwmon entries across reboots based on module load order, and DEVPATH
# for SATA-attached chips also shifts with topology changes;
# FixupDeviceFiles inside fancontrol handles only the easier subset.
# See files/fancontrol_remap for the why.
ExecStartPre=/usr/local/sbin/fancontrol_remap

# Sandboxing. /sys is exempted from ProtectSystem= by design (kernel
# API filesystem) so fancontrol can still write pwm* under
# /sys/class/hwmon. /run needs ReadWritePaths for /run/fancontrol.pid.
# /etc/fancontrol is exempted (just that file, not all of /etc) so
# ExecStartPre can rewrite it in place. Do NOT add
# ProtectKernelTunables=true -- it would make /sys read-only and break
# the daemon.
ProtectSystem=strict
ProtectHome=true
PrivateTmp=true
NoNewPrivileges=true
ReadWritePaths=/run /etc/fancontrol
