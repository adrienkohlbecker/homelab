- name: Install fancontrol
  apt:
    pkg:
      - fancontrol
    policy_rc_d: 101
    cache_valid_time: 3600
  become: true
  register: fancontrol_apt
  tags:
    - fancontrol

# Owns the chip-name -> hwmonN resolution. Reads /etc/fancontrol.template
# (chip-name keyed) and emits /etc/fancontrol (hwmonN keyed) for the
# daemon. Runs at every service start (ExecStartPre, see restart.conf)
# AND as `--check %s` during the template task's validate, so a missing
# chip is caught at apply time rather than at next boot.
- name: Install fancontrol_remap script  # noqa: require-backup
  copy:
    src: fancontrol_remap
    dest: /usr/local/sbin/fancontrol_remap
    owner: root
    group: root
    mode: "0755"
    validate: python3 -c 'import sys; compile(open(sys.argv[1]).read(), sys.argv[1], "exec")' %s
  become: true
  register: fancontrol_remap_script
  tags:
    - fancontrol

# Upstream fancontrol.service sets no Restart=, but the daemon's own
# failure path is `restorefans 1` (set fans to 100%) then exit. Without
# auto-restart a transient sysfs error leaves the box loud forever.
# on-failure (not always) so a clean shutdown doesn't respawn, and a
# config validation failure surfaces rather than loops.
- name: Install fancontrol restart drop-in
  import_role:
    name: systemd_unit
    tasks_from: dropin
  vars:
    systemd_unit_args:
      src: restart.conf
      for: fancontrol.service
      condition: "{{ not (ansible_check_mode and fancontrol_apt.changed) }}"
  tags:
    - fancontrol

# Chip-name-keyed source of truth. The daemon never reads this file;
# fancontrol_remap consumes it at ExecStartPre and emits the hwmonN-keyed
# /etc/fancontrol that the daemon parses. validate: invokes the same
# render path so a missing chip / unstripped DEVPATH fails the play.
- name: Template /etc/fancontrol.template
  when:
    - fancontrol_settings.fans | length > 0
    - not (ansible_check_mode and fancontrol_apt.changed)
  template:
    src: fancontrol.j2
    dest: /etc/fancontrol.template
    owner: root
    group: root
    mode: "0644"
    backup: true
    validate: /usr/local/sbin/fancontrol_remap --check %s
  register: fancontrol_template
  become: true
  tags:
    - fancontrol

# Active stop+disable on transition to empty fans -- without this, the
# running daemon keeps its in-memory config until reboot, potentially
# driving PWMs from a config that no longer matches hardware.
- name: Stop and disable fancontrol service (no fan settings)
  when:
    - fancontrol_settings.fans | length == 0
    - not (ansible_check_mode and fancontrol_apt.changed)
  systemd:
    name: fancontrol
    state: stopped
    enabled: false
  become: true
  tags:
    - fancontrol

- name: Remove fancontrol config files (no fan settings)
  when: fancontrol_settings.fans | length == 0
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/fancontrol
    - /etc/fancontrol.template
  become: true
  register: fancontrol_removed
  tags:
    - fancontrol

- name: Enable and start fancontrol service
  when: fancontrol_settings.fans | length > 0
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: fancontrol
      condition: "{{ not (ansible_check_mode and fancontrol_apt.changed) }}"
      restart: >-
        {{ fancontrol_apt.changed
           or fancontrol_template.changed | default(false)
           or fancontrol_service_d_override_conf_result.changed | default(false)
           or fancontrol_remap_script.changed | default(false) }}
  tags:
    - fancontrol
