- name: Install fancontrol
  apt:
    pkg:
      - fancontrol
    policy_rc_d: 101
    cache_valid_time: 3600
  become: true
  register: fancontrol_apt
  tags:
    - fancontrol

# Upstream fancontrol.service sets no Restart=, but the daemon's own
# failure path is `restorefans 1` (set fans to 100%) then exit. Without
# auto-restart a transient sysfs error leaves the box loud forever.
# on-failure (not always) so a clean shutdown doesn't respawn, and a
# config validation failure surfaces rather than loops.
- name: Install fancontrol restart drop-in
  import_role:
    name: systemd_unit
    tasks_from: dropin
  vars:
    systemd_unit_args:
      src: restart.conf
      for: fancontrol.service
      condition: "{{ not (ansible_check_mode and fancontrol_apt.changed) }}"
  tags:
    - fancontrol

# hwmonN numbering shifts across kernel upgrades and module load order;
# DEVPATH for sata-attached chips (drivetemp) shifts when SATA cables
# move. Resolve both at apply time so host_vars can refer to chips by
# their stable kernel name (nct6798, drivetemp). fancontrol's own
# FixupDeviceFiles handles further hwmonN drift between ansible runs.
- name: Discover hwmon devices
  when: fancontrol_settings.fans | length > 0
  tags:
    - fancontrol
  block:
    - name: List hwmon device directories
      find:
        paths: /sys/class/hwmon
        patterns: hwmon*
        file_type: any
        follow: false
      register: fancontrol_hwmon_dirs

    - name: Read hwmon chip names
      slurp:
        src: "{{ item.path }}/name"
      loop: "{{ fancontrol_hwmon_dirs.files }}"
      loop_control:
        label: "{{ item.path | basename }}"
      register: fancontrol_hwmon_names

    - name: Resolve hwmon device sysfs paths
      command:
        cmd: readlink -f "{{ item.path }}"
      loop: "{{ fancontrol_hwmon_dirs.files }}"
      loop_control:
        label: "{{ item.path | basename }}"
      register: fancontrol_hwmon_links
      changed_when: false
      check_mode: false

    # cacheable: true persists the fact across plays so _verify.yml
    # (which runs as a separate play) can reuse the discovery instead
    # of rediscovering.
    - name: Build fancontrol_chip_map
      set_fact:
        cacheable: true
        fancontrol_chip_map: >-
          {{
            fancontrol_chip_map | default({}) | combine({
              (item.1.content | b64decode | trim): {
                "hwmon": item.0.path | basename,
                "devpath": item.2.stdout | regex_replace('^/sys/(.*)/hwmon/hwmon[0-9]+$', '\\1'),
              }
            })
          }}
      loop: "{{ fancontrol_hwmon_dirs.files | zip(fancontrol_hwmon_names.results, fancontrol_hwmon_links.results) | list }}"
      loop_control:
        label: "{{ item.1.content | b64decode | trim }}"

- name: Assert all chips referenced by fancontrol_settings.fans exist
  when: fancontrol_settings.fans | length > 0
  assert:
    that: fancontrol_chip in fancontrol_chip_map
    fail_msg: >-
      fancontrol_settings references chip {{ fancontrol_chip }} -- not
      present in /sys/class/hwmon. Check the chip name in host_vars or
      load the right kernel module.
  loop: >-
    {{ (fancontrol_settings.fans | map(attribute='pwm')  | list
       + fancontrol_settings.fans | map(attribute='temp') | list
       + fancontrol_settings.fans | map(attribute='fan')  | list
    ) | map('regex_replace', '/.*$', '') | unique | list }}
  loop_control:
    loop_var: fancontrol_chip
  tags:
    - fancontrol

- name: Template /etc/fancontrol
  when:
    - fancontrol_settings.fans | length > 0
    - not (ansible_check_mode and fancontrol_apt.changed)
  template:
    src: fancontrol.j2
    dest: /etc/fancontrol
    owner: root
    group: root
    mode: "0644"
    backup: true
    # Catches malformed configs (missing FCTEMPS, INTERVAL<=0, etc.)
    # before the daemon sees them. fancontrol exits non-zero on parse
    # failure, so ansible refuses the write instead of leaving the box
    # wedged at next service start. `--check` is the only positional
    # mode the upstream script understands -- it loads $1, validates,
    # exits 0 without entering the daemon loop.
    validate: fancontrol --check %s
  register: fancontrol_conf
  become: true
  tags:
    - fancontrol

# Active stop+disable on transition to empty fans -- without this, the
# running daemon keeps its in-memory config until reboot, potentially
# driving PWMs from a config that no longer matches hardware.
- name: Stop and disable fancontrol service (no fan settings)
  when:
    - fancontrol_settings.fans | length == 0
    - not (ansible_check_mode and fancontrol_apt.changed)
  systemd:
    name: fancontrol
    state: stopped
    enabled: false
  become: true
  tags:
    - fancontrol

- name: Remove /etc/fancontrol (no fan settings)
  when: fancontrol_settings.fans | length == 0
  file:
    path: /etc/fancontrol
    state: absent
  become: true
  register: fancontrol_removed
  tags:
    - fancontrol

- name: Enable and start fancontrol service
  when: fancontrol_settings.fans | length > 0
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: fancontrol
      condition: "{{ not (ansible_check_mode and fancontrol_apt.changed) }}"
      restart: >-
        {{ fancontrol_apt.changed
           or fancontrol_conf.changed | default(false)
           or fancontrol_service_d_override_conf_result.changed | default(false) }}
  tags:
    - fancontrol
