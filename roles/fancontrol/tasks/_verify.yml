# Two branches, gated on the actual state of fancontrol_settings.fans.
# Empty-fans branch: state checks (file removed, service stopped+disabled)
# are the function -- there's no daemon behavior to observe.
# Non-empty-fans branch: functional checks (daemon active, fans spinning).
# Implicitly real-hardware-only: fancontrol_remap --check (run by the
# template task) fails earlier on qemu (where nct6798 / drivetemp don't
# exist), so reaching _verify with fans populated means the host actually
# has the chips.

# ---- both branches ----
# Script is installed unconditionally by main.yml so /etc/fancontrol
# stays in sync whenever a future host_vars edit adds fans.

- name: _verify | Assert fancontrol_remap script is installed and executable
  stat:
    path: /usr/local/sbin/fancontrol_remap
  register: fancontrol_remap_stat
  failed_when: >-
    not fancontrol_remap_stat.stat.exists
    or fancontrol_remap_stat.stat.mode != "0755"
    or fancontrol_remap_stat.stat.pw_name != "root"

# ---- empty branch ----

- name: _verify | Assert /etc/fancontrol is absent (no fan settings)
  when: fancontrol_settings.fans | length == 0
  stat:
    path: /etc/fancontrol
  register: fancontrol_conf_absent
  failed_when: fancontrol_conf_absent.stat.exists

- name: _verify | Assert /etc/fancontrol.template is absent (no fan settings)
  when: fancontrol_settings.fans | length == 0
  stat:
    path: /etc/fancontrol.template
  register: fancontrol_template_absent
  failed_when: fancontrol_template_absent.stat.exists

- name: _verify | Assert fancontrol service is inactive and disabled (no fan settings)
  when: fancontrol_settings.fans | length == 0
  systemd:
    name: fancontrol
  register: fancontrol_unit_empty
  failed_when: >-
    fancontrol_unit_empty.status.ActiveState == "active"
    or fancontrol_unit_empty.status.UnitFileState != "disabled"
  become: true

# ---- non-empty branch ----

- name: _verify | Assert /etc/fancontrol.template exists, mode 0644 root:root (fans configured)
  when: fancontrol_settings.fans | length > 0
  stat:
    path: /etc/fancontrol.template
  register: fancontrol_template_present
  failed_when: >-
    not fancontrol_template_present.stat.exists
    or fancontrol_template_present.stat.mode != "0644"
    or fancontrol_template_present.stat.pw_name != "root"
    or fancontrol_template_present.stat.gr_name != "root"

- name: _verify | Assert /etc/fancontrol exists, mode 0644 root:root (fans configured)
  when: fancontrol_settings.fans | length > 0
  stat:
    path: /etc/fancontrol
  register: fancontrol_conf_present
  failed_when: >-
    not fancontrol_conf_present.stat.exists
    or fancontrol_conf_present.stat.mode != "0644"
    or fancontrol_conf_present.stat.pw_name != "root"
    or fancontrol_conf_present.stat.gr_name != "root"

- name: _verify | Assert fancontrol service is loaded, active, enabled (fans configured)
  when: fancontrol_settings.fans | length > 0
  systemd:
    name: fancontrol
  register: fancontrol_unit_present
  failed_when: >-
    fancontrol_unit_present.status.LoadState != "loaded"
    or fancontrol_unit_present.status.ActiveState != "active"
    or fancontrol_unit_present.status.UnitFileState != "enabled"
  become: true

# Build chip-name -> hwmonN by walking live /sys/class/hwmon. Distinct
# from main.yml's removed discovery: this runs in the verify play and
# only feeds the fan-RPM slurp below -- it never feeds template
# generation. The script (fancontrol_remap) owns the authoritative
# resolution; this walk is the verifier's independent witness.
- name: _verify | List hwmon device directories
  when: fancontrol_settings.fans | length > 0
  find:
    paths: /sys/class/hwmon
    patterns: hwmon*
    file_type: any
    follow: false
  register: fancontrol_verify_hwmon_dirs

- name: _verify | Read hwmon chip names
  when: fancontrol_settings.fans | length > 0
  slurp:
    src: "{{ item.path }}/name"
  loop: "{{ fancontrol_verify_hwmon_dirs.files }}"
  loop_control:
    label: "{{ item.path | basename }}"
  register: fancontrol_verify_hwmon_names

- name: _verify | Build chip-name -> hwmonN map
  when: fancontrol_settings.fans | length > 0
  set_fact:
    fancontrol_verify_chip_to_hwmon: >-
      {{ dict(
        fancontrol_verify_hwmon_names.results
          | map(attribute='content') | map('b64decode')
          | map('trim') | list
        | zip(
          fancontrol_verify_hwmon_dirs.files
            | map(attribute='path') | map('basename') | list
        )
      ) }}

- name: _verify | Assert every referenced chip resolves under /sys/class/hwmon
  when: fancontrol_settings.fans | length > 0
  assert:
    that: fancontrol_chip in fancontrol_verify_chip_to_hwmon
    fail_msg: >-
      chip {{ fancontrol_chip }} (referenced by fancontrol_settings.fans)
      is not present in /sys/class/hwmon. fancontrol_remap --check should
      have caught this at apply time; check `journalctl -u fancontrol -b`
      for the script's stderr.
  loop: "{{ fancontrol_referenced_chips }}"
  loop_control:
    loop_var: fancontrol_chip

# Reads fan*_input directly from sysfs for every fan. Wait up to 30s
# per fan for the daemon to evaluate temps and bring it above MINSTART
# -- on a cold start the first INTERVAL pass may run before the fan
# has spun up. If a fan never crosses 0, either it isn't physically
# wired or MINSTART / MINSTOP / MINPWM are below its stall threshold
# and need a higher value in host_vars. Looping per-fan catches
# regressions where one of N fans is misconfigured but the others
# spin (e.g. an FCFANS mismap the chip-existence assert can't see).
- name: _verify | Assert each fan reports non-zero RPM
  when: fancontrol_settings.fans | length > 0
  slurp:
    src: "/sys/class/hwmon/{{ fancontrol_verify_chip_to_hwmon[item.fan.split('/')[0]] }}/{{ item.fan.split('/')[1] }}"
  loop: "{{ fancontrol_settings.fans }}"
  loop_control:
    label: "{{ item.name }} ({{ item.fan }})"
  register: fancontrol_fan_rpm
  until: (fancontrol_fan_rpm.content | b64decode | trim | int) > 0
  retries: 10
  delay: 3
