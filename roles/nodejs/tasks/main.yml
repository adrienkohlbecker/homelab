- name: Install gpg
  apt:
    pkg: gpg
    cache_valid_time: 3600
  become: true
  register: nodejs_apt_gpg
  tags:
    - nodejs

# Repository setup forks on Ubuntu major version because apt-key was
# removed from the default install in resolute (26.04). See netdata
# install.yml for the same idiom.
- name: Add repository key
  when:
    - ansible_distribution_major_version | int < 26
    - not (ansible_check_mode and nodejs_apt_gpg.changed)
  apt_key:
    id: 2F59B5F99B1BE0B4
    url: https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key
    keyring: /etc/apt/trusted.gpg.d/nodesource.gpg
  become: true
  tags:
    - nodejs

- name: Configure apt
  copy:
    src: nodejs
    dest: /etc/apt/preferences.d/nodejs
    owner: root
    group: root
    mode: "0644"
    backup: true
  register: nodejs_apt_pin
  become: true
  tags:
    - nodejs

- name: Add repository
  when: ansible_distribution_major_version | int < 26
  apt_repository:
    repo: deb [arch={{ (ansible_architecture == "aarch64") | ternary('arm64', 'amd64') }} signed-by=/etc/apt/trusted.gpg.d/nodesource.gpg] {{ mirror_apt_nodesource }} nodistro main
  register: nodejs_apt_repo_legacy
  become: true
  tags:
    - nodejs

# Pre-warm /var/lib/apt/lists/ so the python3-debian install below
# works in check mode. Packer ships an empty cache and the apt
# module's update_cache is a no-op under --check. See
# roles/apt/tasks/install.yml for the full rationale.
- name: Pre-warm apt cache (real fetch even in --check)  # noqa: command-instead-of-module
  when: ansible_distribution_major_version | int >= 26
  ansible.builtin.command: apt-get update
  changed_when: false
  check_mode: false
  become: true
  tags:
    - nodejs

# deb822_repository requires python3-debian even in check mode. See
# netdata install.yml for the gate idiom.
- name: Install python3-debian
  when: ansible_distribution_major_version | int >= 26
  apt:
    pkg: python3-debian
    cache_valid_time: 3600
  become: true
  register: nodejs_apt_python3_debian
  tags:
    - nodejs

- name: Add repository (deb822)
  when:
    - ansible_distribution_major_version | int >= 26
    - not (ansible_check_mode and nodejs_apt_python3_debian.changed)
  ansible.builtin.deb822_repository:
    name: nodesource
    types: deb
    uris: "{{ mirror_apt_nodesource }}"
    suites: nodistro
    components: main
    architectures: "{{ (ansible_architecture == 'aarch64') | ternary('arm64', 'amd64') }}"
    signed_by: https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key
  register: nodejs_apt_repo_deb822
  become: true
  tags:
    - nodejs

# Skip in check mode if any prereq would have changed -- the apt cache
# wouldn't reflect the deb822 source that wasn't actually written.
- name: Install node
  when: not (ansible_check_mode and (nodejs_apt_repo_legacy is changed or nodejs_apt_repo_deb822 is changed or nodejs_apt_python3_debian is changed))
  apt:
    pkg:
      - nodejs
    cache_valid_time: 3600
  become: true
  register: nodejs_apt
  tags:
    - nodejs
