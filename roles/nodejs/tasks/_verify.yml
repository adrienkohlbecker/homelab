# Exercises the nodejs role's contract: node + npm are installed and runnable
# (binary exec, not just dpkg state) and node reports the pinned major. The
# apt_source contract (pin wins at priority 600 from the NodeSource mirror,
# signing key scoped + legacy global-trust copy gone) is asserted once in the
# shared apt_source _verify, imported below.

- name: _verify | Node is installed and runnable
  command: node --version
  changed_when: false
  register: _nodejs_node_version

- name: _verify | Node reports the pinned major version {{ nodejs_major }}
  assert:
    that:
      - _nodejs_node_version.stdout is match('v' ~ nodejs_major ~ '[.]')
    fail_msg: >-
      Expected node v{{ nodejs_major }}.x, got
      stdout={{ _nodejs_node_version.stdout | default('') }}

# Bare command, not an assert: a missing/broken npm fails on non-zero exit,
# and any bundled npm trivially reports an X.Y.Z, so asserting the shape adds
# nothing.
- name: _verify | Bundled npm is installed and runnable
  command: npm --version
  changed_when: false

- name: _verify | NodeSource apt_source contract (key scoping + pin priority)
  import_role:
    name: apt_source
    tasks_from: _verify
  vars:
    apt_source_args:
      name: nodesource
      uris: "{{ mirror_apt_nodesource }}"
      pin:
        package: nodejs
        version: "{{ nodejs_major }}.*"
        priority: 600
    # The shared _verify tombstones this source as its final step (the VM is
    # torn down after, so removing the real source is safe) to exercise the
    # state: absent path. A separate concrete dict -- not apt_source_args |
    # combine -- so the nested apt_source import isn't a self-referential
    # template; the full add-args match nodejs/main.yml so apt_repository
    # removes the same source line it added.
    apt_source_tombstone_args:
      name: nodesource
      key_id: 6F71F525282841EEDAF851B42F59B5F99B1BE0B4
      key_url: https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key
      uris: "{{ mirror_apt_nodesource }}"
      suites: nodistro
      components: main
      state: absent
