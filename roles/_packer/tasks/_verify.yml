# Assertions for state set up by packer/scripts/{provision,chroot}.sh.
# Run automatically by test/testrole.py after the role-apply +
# idempotence passes. Add new assertions here as packer code grows.
#
# Skipped on the `minimal` variant — that variant boots the upstream
# Ubuntu cloud image directly and never goes through packer's
# provision.sh / chroot.sh, so none of the invariants below apply.

- name: _verify | Skip on minimal (no packer-built image to assert against)
  when: qemu_test_minimal | default(false)
  ansible.builtin.meta: end_play

# --- chroot.sh apt-sources reset (universal) ---
#
# chroot.sh writes sources.list twice: once with $UBUNTU_MIRROR (Nexus
# during the build for fast cached fetches) and once at the very end
# with $UBUNTU_MIRROR_UPSTREAM so the at-rest image isn't pinned to a
# Nexus-internal URL someone deploying to a new site can't reach. A
# regression where the final reset gets skipped would silently ship
# images with build-time URLs -- works on lab, fails everywhere else.
#
# testrole.py skips the mirrors prelude for _packer
# (_SKIP_MIRRORS_PRELUDE_ROLES) so the VM stays in its packer-shipped
# state and these asserts see what chroot.sh actually wrote, not what
# the prelude rewrote on top.

- name: _verify | Slurp packer-shipped /etc/apt/sources.list
  ansible.builtin.slurp:
    src: /etc/apt/sources.list
  register: _packer_verify_sources_list

- name: _verify | Decode sources.list + resolve expected upstream URLs
  ansible.builtin.set_fact:
    _packer_verify_sources_list_text: "{{ _packer_verify_sources_list.content | b64decode }}"
    # Upstream URLs match packer/qemu.pkr.hcl's arch_table.upstream_*
    # entries; chroot.sh inherits them via $UBUNTU_MIRROR_UPSTREAM /
    # $UBUNTU_MIRROR_SECURITY_UPSTREAM. Hardcoded here rather than
    # pulled from group_vars/all.yml's mirror_apt_* (which resolve via
    # nexus_url) so the assertion is a true upstream-or-bust check
    # independent of the test environment's nexus setting.
    _packer_verify_upstream_archive: "{{ 'http://ports.ubuntu.com/ubuntu-ports' if ansible_architecture == 'aarch64' else 'http://archive.ubuntu.com/ubuntu' }}"
    _packer_verify_upstream_security: "{{ 'http://ports.ubuntu.com/ubuntu-ports' if ansible_architecture == 'aarch64' else 'http://security.ubuntu.com/ubuntu' }}"

- name: _verify | Sources.list points at upstream Ubuntu mirrors
  ansible.builtin.assert:
    that:
      - _packer_verify_upstream_archive in _packer_verify_sources_list_text
      - _packer_verify_upstream_security in _packer_verify_sources_list_text
    fail_msg: >-
      /etc/apt/sources.list missing upstream URL
      ({{ _packer_verify_upstream_archive }} and/or
      {{ _packer_verify_upstream_security }}) -- chroot.sh's final
      write_sources_list with $UBUNTU_MIRROR_UPSTREAM didn't run or
      didn't land; shipped image is pinned to a build-time URL.

- name: _verify | Sources.list doesn't carry the build-time Nexus URL
  ansible.builtin.assert:
    that:
      - "'nexus' not in _packer_verify_sources_list_text"
    fail_msg: >-
      /etc/apt/sources.list contains 'nexus' -- chroot.sh's final
      upstream reset got skipped, image is shipping with build-time
      mirror URLs and won't apt-update at sites without Nexus access.

- name: _verify | Sources.list mentions every expected suite
  ansible.builtin.assert:
    that:
      - item in _packer_verify_sources_list_text
    fail_msg: "/etc/apt/sources.list missing suite '{{ item }}'."
  loop:
    - "{{ ansible_distribution_release }}"
    - "{{ ansible_distribution_release }}-updates"
    - "{{ ansible_distribution_release }}-backports"
    - "{{ ansible_distribution_release }}-security"

- name: _verify | Sources.list mentions every expected component
  ansible.builtin.assert:
    that:
      - item in _packer_verify_sources_list_text
    fail_msg: "/etc/apt/sources.list missing component '{{ item }}'."
  loop:
    - main
    - restricted
    - universe
    - multiverse

# --- ESP fundamentals (universal across box / lab / pug) ---

- name: _verify | Stat firmware-fallback rEFInd
  ansible.builtin.stat:
    path: /boot/efi/EFI/BOOT/BOOT{{ 'AA64' if ansible_architecture == 'aarch64' else 'X64' }}.EFI
  register: _packer_verify_refind_fallback

- name: _verify | Firmware-fallback rEFInd binary present at /EFI/BOOT/
  ansible.builtin.assert:
    that: _packer_verify_refind_fallback.stat.exists
    fail_msg: "rEFInd firmware-fallback (BOOTAA64.EFI / BOOTX64.EFI) missing — chroot.sh's fallback copy didn't land"

- name: _verify | Stat ZBM kernel + initrd
  ansible.builtin.stat:
    path: "{{ item }}"
  loop:
    - /boot/efi/EFI/ZBM/initramfs-bootmenu.img
    - /boot/efi/EFI/ZBM/{{ 'vmlinux-bootmenu' if ansible_architecture == 'aarch64' else 'vmlinuz-bootmenu' }}
  register: _packer_verify_zbm

- name: _verify | ZBM artifacts present and non-empty
  ansible.builtin.assert:
    that:
      - item.stat.exists
      - item.stat.size > 0
    fail_msg: "ZBM artifact missing or empty: {{ item.item }}"
  loop: "{{ _packer_verify_zbm.results }}"
  loop_control:
    label: "{{ item.item }}"

# --- refind.conf contents ---

- name: _verify | Read /boot/efi/EFI/refind/refind.conf
  ansible.builtin.slurp:
    src: /boot/efi/EFI/refind/refind.conf
  register: _packer_verify_refind_conf

- name: _verify | Decode refind.conf once for the asserts below
  ansible.builtin.set_fact:
    _packer_verify_refind_conf_text: "{{ _packer_verify_refind_conf.content | b64decode }}"

- name: _verify | ZBM menuentries + default_selection + dont_scan_dirs in refind.conf
  ansible.builtin.assert:
    that:
      - >-
        'default_selection "Ubuntu (ZBM)"' in _packer_verify_refind_conf_text
      - >-
        'menuentry "Ubuntu (ZBM)"' in _packer_verify_refind_conf_text
      - >-
        'menuentry "Ubuntu (ZBM Menu)"' in _packer_verify_refind_conf_text
      - "'/EFI/ZBM' in _packer_verify_refind_conf_text"
    fail_msg: "refind.conf missing expected ZBM menuentries / default_selection / dont_scan_dirs"

# --- NVRAM Boot entries (rEFInd, plus aarch64 EFI-stub) ---

- name: _verify | Read NVRAM Boot entries via efibootmgr
  ansible.builtin.command: efibootmgr -v
  changed_when: false
  register: _packer_verify_efibootmgr
  become: true

# chroot.sh registers either a single "rEFInd" entry (single-disk
# variants) or per-disk "rEFInd (disk N)" entries (multi-disk mdadm-EFI
# on lab). The disk-N suffix is the survival mechanism: firmware only
# follows paths it knows about, so losing one disk still leaves the
# other entries usable. Either shape must be in NVRAM -- the
# firmware-fallback BOOT<arch>.EFI checked above is a degraded recovery
# path (kicks in on CMOS clear / BIOS reset), not the everyday loader.
# A green fallback + missing primary entry would silently force every
# reboot through the fallback chain.
- name: _verify | REFInd Boot entry registered in NVRAM
  ansible.builtin.assert:
    that: >-
      _packer_verify_efibootmgr.stdout
      is search('^Boot[0-9A-F]{4}\*?\s+rEFInd( \(disk \d+\))?\s', multiline=True)
    fail_msg: >-
      No NVRAM Boot#### entry labelled "rEFInd" (or "rEFInd (disk N)")
      — chroot.sh's efibootmgr -c didn't run or didn't land. The
      firmware-fallback /EFI/BOOT/BOOT<arch>.EFI is a recovery path,
      not a primary boot loader.

# --- mdadm-EFI multi-disk variants (lab variant) ---
#
# chroot.sh's LAYOUT=mirror branch builds an mdadm RAID1 EFI mirror
# (/dev/md/efi) across the OS disks (mirror swap is an rpool zvol, not
# mdadm), and registers per-disk "rEFInd (disk N)" NVRAM entries so the
# host survives losing any single disk. Detect via /dev/md/efi presence --
# the LAYOUT="" branch (single-disk variants) doesn't create it.
# Skipping the block on single-disk variants is intentional: the
# universal rEFInd assertion above already covers them.

- name: _verify | Stat /dev/md/efi (mdadm-EFI mirror detection)
  ansible.builtin.stat:
    path: /dev/md/efi
  register: _packer_verify_md_efi

- name: _verify | Mdadm-EFI multi-disk assertions
  when: _packer_verify_md_efi.stat.exists
  block:
    - name: _verify | Mdadm --detail --test (clean=0, degraded=1, failed=2)
      ansible.builtin.command: mdadm --detail --test {{ item }}
      changed_when: false
      failed_when: false
      become: true
      loop:
        - /dev/md/efi
      register: _packer_verify_md_test

    - name: _verify | EFI mirror is clean
      ansible.builtin.assert:
        that: item.rc == 0
        fail_msg: >-
          mdadm --detail --test {{ item.item }} returned rc={{ item.rc }}
          — degraded or failed array. stderr: {{ item.stderr }}
      loop: "{{ _packer_verify_md_test.results }}"
      loop_control:
        label: "{{ item.item }}"

    - name: _verify | Per-disk "rEFInd (disk N)" NVRAM entries exist
      vars:
        _disk_entries: >-
          {{ _packer_verify_efibootmgr.stdout_lines
             | select('match', '^Boot[0-9A-F]{4}\*?\s+rEFInd \(disk \d+\)\s')
             | list }}
      ansible.builtin.assert:
        that: _disk_entries | length >= 2
        fail_msg: >-
          Multi-disk variant has only {{ _disk_entries | length }}
          per-disk "rEFInd (disk N)" NVRAM entries — chroot.sh's
          per-disk efibootmgr -c loop didn't run for every disk,
          breaking the single-disk-survival path.

# --- rpool shape (universal) ---
#
# provision.sh creates rpool with a specific feature/property set and
# sets bootfs; chroot.sh stamps org.zfsbootmenu:commandline on
# rpool/ROOT so ZBM knows what cmdline to hand the kernel. The pool
# also has to be *healthy* -- a degraded mirror on lab is invisible
# without a status probe (zpool import succeeds in degraded state),
# and the mdadm assertions above only cover the /boot/efi array,
# not rpool.
#
# Properties asserted below are the ones whose absence is silent (the
# pool still imports/boots without them) but functionally load-bearing:
# - ashift=12: wrong on creation = poor IO; un-changeable post-create.
# - compatibility=openzfs-2.1-linux: caps feature flags so the pool
#   stays importable on older systems; provision.sh sets this
#   explicitly and a regression silently widens the feature set.
# - compression=zstd, xattr=sa, acltype=posix, autotrim=on: dataset
#   defaults inherited by everything under rpool; subtle perf/feature
#   regressions if missing. Booting masks them all.

- name: _verify | Read source of org.zfsbootmenu:commandline on rpool/ROOT
  ansible.builtin.command: zfs get -H -o source org.zfsbootmenu:commandline rpool/ROOT
  changed_when: false
  become: true
  register: _packer_verify_zbm_cmdline_source

- name: _verify | Org.zfsbootmenu:commandline is set locally on rpool/ROOT
  ansible.builtin.assert:
    # Source must be `local` (set by chroot.sh's `zfs set`), not `-`
    # (never set) or `inherited` (would mean a parent set it, which
    # nothing in our stack does). The value itself is the empty string
    # by design, so checking source rather than value is the right
    # signal -- value="" is indistinguishable from value-not-set when
    # looking at the value alone.
    that: _packer_verify_zbm_cmdline_source.stdout | trim == 'local'
    fail_msg: >-
      org.zfsbootmenu:commandline on rpool/ROOT has source
      `{{ _packer_verify_zbm_cmdline_source.stdout | trim }}` (want
      `local`) -- chroot.sh's `zfs set org.zfsbootmenu:commandline=`
      didn't run. ZBM will fall through to a parent dataset's value
      (or defaults), which can silently change the kernel cmdline at
      boot.

# Each property is checked with its own `zpool get`/`zfs get`
# invocation so the failing iteration names the exact property +
# observed value in the task output, instead of dumping a whole
# dict and leaving the reader to spot the mismatch. The "want"
# dicts double as the spec -- adding a new property to check is
# one line.
- name: _verify | Rpool zpool properties
  vars:
    _packer_zpool_want:
      ashift: "12"
      autotrim: "on"
      bootfs: "rpool/ROOT/{{ ansible_distribution_release }}"
      compatibility: "openzfs-2.1-linux"
      health: "ONLINE"
  ansible.builtin.command:
    argv: [ zpool, get, -H, -o, value, "{{ item.key }}", rpool ]
  changed_when: false
  become: true
  loop: "{{ _packer_zpool_want | dict2items }}"
  loop_control:
    label: "{{ item.key }}={{ item.value }}"
  register: _packer_verify_zpool_prop
  failed_when: (_packer_verify_zpool_prop.stdout | trim) != item.value

- name: _verify | Rpool root-dataset properties
  vars:
    _packer_zfs_want:
      compression: "zstd"
      xattr: "sa"
      acltype: "posix"
      atime: "on"
      relatime: "on"
  ansible.builtin.command:
    argv: [ zfs, get, -H, -o, value, "{{ item.key }}", rpool ]
  changed_when: false
  become: true
  loop: "{{ _packer_zfs_want | dict2items }}"
  loop_control:
    label: "{{ item.key }}={{ item.value }}"
  register: _packer_verify_zfs_prop
  failed_when: (_packer_verify_zfs_prop.stdout | trim) != item.value

# --- swap active (universal) ---
#
# chroot.sh bakes swap on every variant (sized by SWAP_SIZE): single-disk
# variants format the 8200 partition, mirror variants the rpool/swap
# zvol. Either way chroot.sh writes the fstab entry and
# systemd-fstab-generator activates it at boot. We test the live `swapon`
# state rather than parsing fstab because that exercises the full path
# (fstab entry + device resolution + mkswap signature + systemd
# activation); a broken fstab entry would leave swap inactive at runtime
# and the kernel would silently OOM under memory pressure instead of paging.
- name: _verify | Read active swap devices
  ansible.builtin.command: swapon --show=NAME --noheadings
  changed_when: false
  register: _packer_verify_swapon

- name: _verify | At least one swap device is active
  ansible.builtin.assert:
    that: _packer_verify_swapon.stdout_lines | length > 0
    fail_msg: >-
      `swapon --show` reports no active swap -- chroot.sh's fstab swap
      entry didn't activate at boot (broken device path, missing
      mkswap signature, or fstab entry dropped). Kernel will OOM under
      memory pressure with no paging fallback.

# --- chroot.sh post-debootstrap shape (universal) ---

# chroot.sh sets MODULES=most in /etc/initramfs-tools/initramfs.conf
# right before the final update-initramfs, so the shipped image
# boots on bare-metal hardware whose controllers/NICs the build host
# didn't happen to have loaded. The real failure mode --
# "image fails to mount root on a server with hardware X" -- only
# surfaces on first-bare-metal-boot, too late to recover.
#
# Check functionally: list the contents of the built initrd and
# confirm it carries server-class drivers that wouldn't be in
# MODULES=dep on a virtio-root QEMU build. megaraid_sas (LSI/Avago
# MegaRAID HBA) and mpt3sas (Avago/Broadcom SAS HBA) are both
# upstream scsi modules that initramfs-tools' `most-modules` hook
# bundles unconditionally; if MODULES=most regressed to MODULES=dep
# the grep below fails. Asserting the built initrd directly catches
# regressions in initramfs.conf, in the update-initramfs invocation,
# and in the dpkg trigger ordering (a stale initrd built before the
# sed would still pass the slurp+grep check).
- name: _verify | Initramfs carries server-class HBA drivers (functional MODULES=most check)
  ansible.builtin.shell:
    # Plain `grep -E` rather than `grep -qE`: with `set -o pipefail`,
    # grep -q's early-exit-on-first-match SIGPIPEs lsinitramfs (rc=141)
    # and the pipeline reports failure even when the modules are
    # present. Without -q, grep reads to EOF; rc is just the match/
    # no-match signal we want. >/dev/null keeps the matches out of
    # the task output.
    cmd: >-
      set -euo pipefail;
      lsinitramfs /boot/initrd.img-{{ ansible_kernel }}
      | grep -E '/(megaraid_sas|mpt3sas)\.ko' >/dev/null
    executable: /bin/bash
  changed_when: false
  become: true

# chroot.sh holds grub* before installing linux-generic so apt doesn't
# pull grub-pc/grub-efi-amd64/etc via the Recommends alternation. The
# safety net (apt-mark hold) is a *mechanism*; the invariant we care
# about is the *outcome* -- no grub package is actually installed.
# Assert the outcome directly: a future Recommends churn could pull
# in a grub variant the existing hold glob didn't catch, and a holds-
# only check would pass while the invariant silently regressed.
#
# dpkg-query rather than `apt list --installed` because the latter
# depends on apt's cache (which _test/mirrors rewrites to Nexus before
# _verify runs). dpkg state is mirror-independent. `${db:Status-Status}`
# is the install state proper ("installed" / "not-installed" /
# "config-files" / ...), distinct from selection state ("install" /
# "hold" / "deinstall" / "purge") -- a held-but-not-installed package
# has Status-Status=not-installed, which we want, while an installed-
# and-held package has Status-Status=installed, which we want to fail.
- name: _verify | Dpkg install status for grub*
  ansible.builtin.command: dpkg-query -W -f='${binary:Package} ${db:Status-Status}\n' 'grub*'
  changed_when: false
  failed_when: false  # exits 1 when the pattern matches nothing
  register: _packer_verify_grub_status

- name: _verify | No grub* package is installed
  ansible.builtin.assert:
    that: >-
      _packer_verify_grub_status.stdout_lines
      | select('search', '\\sinstalled$')
      | list | length == 0
    fail_msg: >-
      A grub-prefixed package is in installed state --
      chroot.sh's `apt-mark hold 'grub*'` either didn't take effect
      or a future Recommends pulled in a variant the glob didn't
      cover. Installed grub will fight rEFInd at boot.
      Offending: {{ _packer_verify_grub_status.stdout_lines
                    | select('search', '\\sinstalled$') | list }}

# The check above is a snapshot ("nothing grub is installed right
# now"). The hold is a *mechanism* meant to block future installs;
# verify it functionally by asking apt to install a grub package in
# dry-run mode. With -y and no --allow-change-held-packages, apt
# exits non-zero on held-package changes. Picking grub-pc because
# it's the bare-metal x86 grub variant linux-generic Recommends
# alongside grub-efi-amd64; both arches have it in the archive.
- name: _verify | Apt refuses to install grub-pc (dry-run)  # noqa: command-instead-of-module
  ansible.builtin.command: apt-get install --simulate --yes --no-install-recommends grub-pc
  changed_when: false
  failed_when: false
  become: true
  environment:
    DEBIAN_FRONTEND: noninteractive
  register: _packer_verify_apt_grub_dryrun

- name: _verify | Apt blocked the dry-run install (rc != 0)
  ansible.builtin.assert:
    that: _packer_verify_apt_grub_dryrun.rc != 0
    fail_msg: >-
      `apt-get install --simulate -y grub-pc` succeeded (rc=0) --
      the hold safety net isn't blocking future grub installs.
      Held packages under -y should error with "Held packages were
      changed and -y was used without --allow-change-held-packages".
      stdout: {{ _packer_verify_apt_grub_dryrun.stdout }}
      stderr: {{ _packer_verify_apt_grub_dryrun.stderr }}

# --- sshd password-auth lockdown ---
#
# chroot.sh drops /etc/ssh/sshd_config.d/00-no-password-auth.conf to
# force PasswordAuthentication no on the shipped image. Verify via
# `sshd -T` (effective-config dump) rather than slurping the snippet
# directly -- that exercises the whole chain (Include directive in
# /etc/ssh/sshd_config + drop-in file + lexical-order precedence).
# Reading the snippet alone would pass even if /etc/ssh/sshd_config
# were edited to drop the Include line.

- name: _verify | Read effective sshd config
  ansible.builtin.command: sshd -T
  changed_when: false
  become: true
  register: _packer_verify_sshd_effective

- name: _verify | Sshd effective config disables password authentication
  ansible.builtin.assert:
    that: >-
      _packer_verify_sshd_effective.stdout_lines
      | select('match', '^passwordauthentication\s+no$')
      | list | length > 0
    fail_msg: >-
      `sshd -T` does not report `passwordauthentication no` --
      chroot.sh's sshd_config.d/00-no-password-auth.conf drop-in didn't
      land, or /etc/ssh/sshd_config no longer Includes sshd_config.d.
      The shipped image would accept passwords on any account that
      has one.

# --- vagrant user can NOPASSWD sudo (universal) ---
#
# chroot.sh creates the vagrant system user, drops the packer pubkey
# into its authorized_keys, adds vagrant to sudo + adm, and writes
# /etc/sudoers.d/vagrant mode 0400 root:root with NOPASSWD: ALL.
# Test it functionally: as vagrant (the harness's SSH user), run
# `sudo -n whoami` and assert the result is `root`. This exercises
# the entire chain end-to-end -- group membership, sudoers drop-in
# mode (visudo silently ignores files not 0440/0400 or not owned by
# root), and the NOPASSWD directive -- and catches failure modes
# that per-property stat checks miss (e.g. a typo in the NOPASSWD
# line keeps mode/owner correct but breaks sudo). Existence + mode
# of authorized_keys is implicitly proven: the harness logs in via
# that key to run this playbook.

- name: _verify | Vagrant escalates to root via NOPASSWD sudo
  ansible.builtin.command: sudo -n whoami
  changed_when: false
  failed_when: false
  register: _packer_verify_vagrant_sudo

- name: _verify | NOPASSWD sudo for vagrant returns root
  ansible.builtin.assert:
    that:
      - _packer_verify_vagrant_sudo.rc == 0
      - _packer_verify_vagrant_sudo.stdout | trim == 'root'
    fail_msg: >-
      `sudo -n whoami` as vagrant did not return "root"
      (rc={{ _packer_verify_vagrant_sudo.rc }},
      stdout={{ _packer_verify_vagrant_sudo.stdout | trim | default('<empty>', true) }},
      stderr={{ _packer_verify_vagrant_sudo.stderr | trim | default('<empty>', true) }}).
      chroot.sh's vagrant-user setup regressed: vagrant not in sudo
      group, /etc/sudoers.d/vagrant missing or wrong mode (visudo
      ignores non-0440/0400 files silently), or NOPASSWD directive
      malformed.

# --- aarch64: direct EFI-stub boot path + kernel-install hook ---

- name: _verify | EFI-stub direct-boot assertions (aarch64)
  when: ansible_architecture == "aarch64"
  block:
    - name: _verify | Stat staged EFI-stub kernel + initrd
      ansible.builtin.stat:
        path: "{{ item }}"
      loop:
        - /boot/efi/EFI/Linux/vmlinuz.efi
        - /boot/efi/EFI/Linux/initrd
      register: _packer_verify_efi_linux

    - name: _verify | Staged kernel + initrd present and non-empty
      ansible.builtin.assert:
        that:
          - item.stat.exists
          - item.stat.size > 0
        fail_msg: "staged {{ item.item }} missing or empty — initial-stage call from chroot.sh failed"
      loop: "{{ _packer_verify_efi_linux.results }}"
      loop_control:
        label: "{{ item.item }}"

    # Path-presence is enough — `efibootmgr -c` registers the loader
    # path and the --unicode cmdline atomically, so if the path is in
    # NVRAM the cmdline went with it. We don't grep for the cmdline
    # because --unicode stores it as UCS-2 (ASCII chars interleaved
    # with nulls) and efibootmgr -v's printout doesn't show the
    # cmdline as a contiguous ASCII substring.
    - name: _verify | Direct EFI-stub Boot entry is registered in NVRAM
      ansible.builtin.assert:
        that:
          - "'EFI\\\\Linux\\\\vmlinuz.efi' in _packer_verify_efibootmgr.stdout"
        fail_msg: >-
          No NVRAM Boot#### entry pointing at /EFI/Linux/vmlinuz.efi —
          chroot.sh's aarch64 efibootmgr -c didn't run or didn't land

    # chroot.sh registers the EFI-stub entry AFTER the rEFInd entries;
    # `efibootmgr -c` prepends to BootOrder, so the Linux entry should
    # end up first. If a future chroot.sh change flips ordering, or a
    # third entry slips in front, default boot silently falls through
    # to rEFInd -> ZBM -> kexec — the aarch64/EDK2 panic path the
    # EFI-stub direct boot was added to avoid.
    - name: _verify | First BootOrder entry resolves to the EFI-stub Linux loader
      vars:
        _bo_first: >-
          {{ (_packer_verify_efibootmgr.stdout_lines
              | select('match', '^BootOrder:')
              | first | default(''))
              | regex_replace('^BootOrder:\s*', '')
              | split(',') | first | default('') }}
        _bo_first_line: >-
          {{ _packer_verify_efibootmgr.stdout_lines
             | select('match', '^Boot' ~ _bo_first ~ '\*?\s')
             | first | default('') }}
      ansible.builtin.assert:
        that:
          - _bo_first | length > 0
          - "'EFI\\\\Linux\\\\vmlinuz.efi' in _bo_first_line"
        fail_msg: >-
          First BootOrder entry (Boot{{ _bo_first }}) is not the
          /EFI/Linux/vmlinuz.efi loader — default boot would land on
          rEFInd -> ZBM -> kexec, which panics on aarch64/EDK2.

    - name: _verify | Stat kernel-install hook (regular file)
      ansible.builtin.stat:
        path: /etc/kernel/postinst.d/zz-stage-efi-stub
      register: _packer_verify_hook_postinst

    - name: _verify | Hook is an executable regular file in /etc/kernel/postinst.d
      ansible.builtin.assert:
        that:
          - _packer_verify_hook_postinst.stat.exists
          - _packer_verify_hook_postinst.stat.isreg
          - _packer_verify_hook_postinst.stat.executable
        fail_msg: "/etc/kernel/postinst.d/zz-stage-efi-stub missing / not a regular executable"

    - name: _verify | Stat hook symlinks
      ansible.builtin.stat:
        path: "{{ item }}"
      loop:
        - /etc/kernel/postrm.d/zz-stage-efi-stub
        - /etc/initramfs/post-update.d/zz-stage-efi-stub
      register: _packer_verify_hook_links

    - name: _verify | Hook symlinks in postrm.d and post-update.d point at the postinst.d entry
      ansible.builtin.assert:
        that:
          - item.stat.exists
          - item.stat.islnk
          - "'postinst.d/zz-stage-efi-stub' in item.stat.lnk_target"
        fail_msg: "{{ item.item }} not a symlink to /etc/kernel/postinst.d/zz-stage-efi-stub"
      loop: "{{ _packer_verify_hook_links.results }}"
      loop_control:
        label: "{{ item.item }}"

# --- x86_64: no /EFI/Linux staging (only the aarch64 branch creates it) ---

- name: _verify | X86_64-only assertions
  when: ansible_architecture == "x86_64"
  block:
    - name: _verify | Stat /EFI/Linux on x86_64
      ansible.builtin.stat:
        path: /boot/efi/EFI/Linux
      register: _packer_verify_efi_linux_x86

    - name: _verify | /EFI/Linux directory absent on x86_64
      ansible.builtin.assert:
        that: not _packer_verify_efi_linux_x86.stat.exists
        fail_msg: "/boot/efi/EFI/Linux/ shouldn't exist on x86_64 — only the aarch64 branch in chroot.sh creates it"

# --- Functional kernel-update + reboot exercise (both arches) ---
#
# Trigger an apt-driven kernel transaction and reboot, then prove the
# firmware boots into a *different* kernel. End-to-end exercise of the
# live boot chain:
#   x86_64:  firmware -> rEFInd -> ZBM (Components mode) -> kexec
#   aarch64: firmware -> EFI-stub direct boot via /EFI/Linux/
#
# Per-release apt trigger differs (no one-size path works on all):
#
# - jammy/noble: install the HWE meta-package. The HWE kernel is newer
#   than what packer shipped, becomes the highest in /boot/, and the
#   reboot lands on it.
#
# - resolute: 26.04 LTS GA has no HWE concept. Install the second-newest
#   linux-image-X.Y.Z-generic, then hide the running kernel's /boot
#   files behind dotfile names so the "highest kernel" selection skips
#   them (ZBM's glob on x86_64; the postinst.d hook's glob on aarch64).
#   dpkg's "Aborting removal of the running kernel" prerm guard blocks
#   the cleaner apt-purge path, so this is the closest substitute
#   without bypassing dpkg.
#
# aarch64 also re-runs the postinst.d hook (after the hide) so
# /EFI/Linux/ restages with the older kernel, and asserts the file
# hashes flipped. That ESP-staging path is the aarch64-only mechanism
# for the direct-EFI-stub workaround documented at chroot.sh's top.
- name: _verify | Kernel-update + reboot exercise
  block:
    - name: _verify | Capture uname -r before kernel transaction
      ansible.builtin.command: uname -r
      changed_when: false
      register: _packer_verify_uname_before

    - name: _verify | Capture /EFI/Linux/{vmlinuz.efi,initrd} hashes before (aarch64)
      when: ansible_architecture == "aarch64"
      ansible.builtin.stat:
        path: "{{ item }}"
        get_checksum: true
        checksum_algorithm: sha256
      loop:
        - /boot/efi/EFI/Linux/vmlinuz.efi
        - /boot/efi/EFI/Linux/initrd
      register: _packer_verify_efi_linux_before
      become: true

    # Pre-2026-05 this branch had a separate HWE-meta-install path
    # for jammy/noble (linux-generic-hwe-22.04 etc.), which fell over
    # once the packer image started shipping HWE itself -- apt
    # reported the install as a no-op and the rest of the test had
    # nothing to verify. Use the older-kernel-install + hide-running
    # path for every release; works the same way whether the running
    # kernel is HWE or GA, because apt-cache madison lists both
    # linux-image-generic branches and picks the second-newest
    # version as the downgrade target.
    - name: _verify | Older-kernel install + hide running kernel
      block:
        - name: _verify | Refresh apt cache so madison sees the current archive
          ansible.builtin.apt:
            update_cache: true
          become: true

        # apt-cache madison lists every available version of the
        # metapackage; the running kernel is the newest, so the
        # second-newest is the downgrade target. Version is
        # "ABI.REVISION" (e.g. 7.0.0-15.15); sed strips the trailing
        # .REVISION (and any +N suffix) to leave the ABI fragment that
        # names the actual linux-image-X.Y.Z-N-generic package.
        - name: _verify | Find second-newest linux-image-generic ABI in archive
          ansible.builtin.shell:
            cmd: |
              set -euo pipefail
              versions=$(apt-cache madison linux-image-generic |
                         awk '$1=="linux-image-generic"{print $3}' |
                         sort -uV)
              count=$(echo "$versions" | grep -c .)
              if [ "$count" -lt 2 ]; then
                echo >&2 "archive has only $count linux-image-generic version(s); need 2+ for a downgrade target (test premise broken)"
                exit 1
              fi
              # apt-cache madison emits two version shapes depending
              # on release:
              #   noble / resolute: X.Y.Z-N.M (dash before the ABI
              #     revision, dot before the package revision) --
              #     `5.15.0-179.163`. ABI is X.Y.Z-N.
              #   jammy: X.Y.Z.N.M (dots all the way) --
              #     `5.15.0.179.163`. ABI is also X.Y.Z-N but the
              #     meta-package version uses dots.
              # Two-pass sed: first strip the trailing .M (package
              # revision), then convert any remaining .N to -N so
              # the result is the canonical X.Y.Z-N ABI that
              # linux-image-<ABI>-generic uses.
              ver=$(echo "$versions" | tail -2 | head -1)
              echo "$ver" | sed -E -e 's/\.[0-9]+$//' -e 's/\.([0-9]+)$/-\1/'
            executable: /bin/bash
          register: _packer_verify_older_abi
          changed_when: false

        - name: _verify | Older-kernel ABI was found in the archive
          ansible.builtin.assert:
            that: _packer_verify_older_abi.stdout != ""
            fail_msg: >-
              Older-kernel ABI extraction returned an empty string —
              the madison version didn't match the expected
              ABI.REVISION shape (sed strip failed)

        - name: _verify | Install older specific kernel + modules
          ansible.builtin.apt:
            name:
              - "linux-image-{{ _packer_verify_older_abi.stdout }}-generic"
              - "linux-modules-{{ _packer_verify_older_abi.stdout }}-generic"
            state: present
          become: true

        # dpkg refuses to purge the running kernel ("Aborting removal of
        # the running kernel"). Hide the /boot files behind dotfile names
        # — shell globs don't match leading dots, so:
        #   x86_64: ZBM's /boot/vmlinuz-* scan skips the hidden running
        #           kernel and picks the older one as the new highest.
        #   aarch64: the postinst.d hook's same glob skips them; we
        #            re-run the hook below to restage /EFI/Linux/.
        - name: _verify | Hide running kernel files from highest-kernel selection
          ansible.builtin.shell:
            cmd: |
              set -euo pipefail
              mv -f /boot/vmlinuz-{{ ansible_kernel }} /boot/.vmlinuz-{{ ansible_kernel }}
              mv -f /boot/initrd.img-{{ ansible_kernel }} /boot/.initrd.img-{{ ansible_kernel }}
            executable: /bin/bash
          changed_when: true
          become: true

        - name: _verify | Re-run the hook to stage the older kernel onto /EFI/Linux/ (aarch64)
          when: ansible_architecture == "aarch64"
          ansible.builtin.command: /etc/kernel/postinst.d/zz-stage-efi-stub
          changed_when: true
          become: true

    - name: _verify | Capture /EFI/Linux/{vmlinuz.efi,initrd} hashes after (aarch64)
      when: ansible_architecture == "aarch64"
      ansible.builtin.stat:
        path: "{{ item }}"
        get_checksum: true
        checksum_algorithm: sha256
      loop:
        - /boot/efi/EFI/Linux/vmlinuz.efi
        - /boot/efi/EFI/Linux/initrd
      register: _packer_verify_efi_linux_after
      become: true

    - name: _verify | Hook restaged vmlinuz.efi and initrd onto the ESP (aarch64)
      when: ansible_architecture == "aarch64"
      ansible.builtin.assert:
        that:
          - >-
            _packer_verify_efi_linux_after.results[0].stat.checksum
            != _packer_verify_efi_linux_before.results[0].stat.checksum
          - >-
            _packer_verify_efi_linux_after.results[1].stat.checksum
            != _packer_verify_efi_linux_before.results[1].stat.checksum
        fail_msg: >-
          /EFI/Linux/vmlinuz.efi or /EFI/Linux/initrd unchanged after the
          kernel transaction — postinst.d hook didn't fire (or fired but
          failed silently)

    - name: _verify | Reboot to pick up the swapped kernel
      ansible.builtin.reboot:
        reboot_timeout: 300
      become: true

    - name: _verify | Capture uname -r after reboot
      ansible.builtin.command: uname -r
      changed_when: false
      register: _packer_verify_uname_after

    - name: _verify | Boot chain landed on the swapped kernel
      ansible.builtin.assert:
        that: >-
          _packer_verify_uname_after.stdout
          != _packer_verify_uname_before.stdout
        fail_msg: >-
          uname -r is still {{ _packer_verify_uname_before.stdout }}
          after reboot — boot chain kept selecting the previous kernel
          even though we installed a different one
