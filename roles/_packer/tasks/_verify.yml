# Assertions for state set up by packer/scripts/{provision,chroot}.sh.
# Run automatically by test/testrole.py after the role-apply +
# idempotence passes. Add new assertions here as packer code grows.
#
# Skipped on the `minimal` variant — that variant boots the upstream
# Ubuntu cloud image directly and never goes through packer's
# provision.sh / chroot.sh, so none of the invariants below apply.

- name: _verify | Skip on minimal (no packer-built image to assert against)
  when: qemu_test_minimal | default(false)
  ansible.builtin.meta: end_play

# --- ESP fundamentals (universal across box / lab / pug) ---

- name: _verify | Stat firmware-fallback rEFInd
  ansible.builtin.stat:
    path: /boot/efi/EFI/BOOT/BOOT{{ 'AA64' if ansible_architecture == 'aarch64' else 'X64' }}.EFI
  register: _packer_verify_refind_fallback

- name: _verify | Firmware-fallback rEFInd binary present at /EFI/BOOT/
  ansible.builtin.assert:
    that: _packer_verify_refind_fallback.stat.exists
    fail_msg: "rEFInd firmware-fallback (BOOTAA64.EFI / BOOTX64.EFI) missing — chroot.sh's fallback copy didn't land"

- name: _verify | Stat ZBM kernel + initrd
  ansible.builtin.stat:
    path: "{{ item }}"
  loop:
    - /boot/efi/EFI/ZBM/initramfs-bootmenu.img
    - /boot/efi/EFI/ZBM/{{ 'vmlinux-bootmenu' if ansible_architecture == 'aarch64' else 'vmlinuz-bootmenu' }}
  register: _packer_verify_zbm

- name: _verify | ZBM artifacts present and non-empty
  ansible.builtin.assert:
    that:
      - item.stat.exists
      - item.stat.size > 0
    fail_msg: "ZBM artifact missing or empty: {{ item.item }}"
  loop: "{{ _packer_verify_zbm.results }}"
  loop_control:
    label: "{{ item.item }}"

# --- refind.conf contents ---

- name: _verify | Read /boot/efi/EFI/refind/refind.conf
  ansible.builtin.slurp:
    src: /boot/efi/EFI/refind/refind.conf
  register: _packer_verify_refind_conf

- name: _verify | ZBM menuentries and dont_scan_dirs entry are present in refind.conf
  ansible.builtin.assert:
    that:
      - >-
        'menuentry "Ubuntu (ZBM)"' in (_packer_verify_refind_conf.content | b64decode)
      - >-
        'menuentry "Ubuntu (ZBM Menu)"' in (_packer_verify_refind_conf.content | b64decode)
      - "'/EFI/ZBM' in (_packer_verify_refind_conf.content | b64decode)"
    fail_msg: "refind.conf missing expected ZBM menuentries / dont_scan_dirs"

# --- aarch64: direct EFI-stub boot path + kernel-install hook ---

- name: _verify | EFI-stub direct-boot assertions (aarch64)
  when: ansible_architecture == "aarch64"
  block:
    - name: _verify | Stat staged EFI-stub kernel + initrd
      ansible.builtin.stat:
        path: "{{ item }}"
      loop:
        - /boot/efi/EFI/Linux/vmlinuz.efi
        - /boot/efi/EFI/Linux/initrd
      register: _packer_verify_efi_linux

    - name: _verify | Staged kernel + initrd present and non-empty
      ansible.builtin.assert:
        that:
          - item.stat.exists
          - item.stat.size > 0
        fail_msg: "staged {{ item.item }} missing or empty — initial-stage call from chroot.sh failed"
      loop: "{{ _packer_verify_efi_linux.results }}"
      loop_control:
        label: "{{ item.item }}"

    - name: _verify | Direct-boot menuentry is the default in refind.conf
      ansible.builtin.assert:
        that:
          - >-
            'default_selection "Ubuntu (direct)"' in (_packer_verify_refind_conf.content | b64decode)
          - >-
            'menuentry "Ubuntu (direct)"' in (_packer_verify_refind_conf.content | b64decode)
          - "'/EFI/Linux' in (_packer_verify_refind_conf.content | b64decode)"
          - "'/EFI/Linux/vmlinuz.efi' in (_packer_verify_refind_conf.content | b64decode)"
          - "'/EFI/Linux/initrd' in (_packer_verify_refind_conf.content | b64decode)"
        fail_msg: "refind.conf missing aarch64 'Ubuntu (direct)' menuentry, default_selection, or /EFI/Linux dont_scan_dirs entry"

    - name: _verify | Stat kernel-install hook (regular file)
      ansible.builtin.stat:
        path: /etc/kernel/postinst.d/zz-stage-efi-stub
      register: _packer_verify_hook_postinst

    - name: _verify | Hook is an executable regular file in /etc/kernel/postinst.d
      ansible.builtin.assert:
        that:
          - _packer_verify_hook_postinst.stat.exists
          - _packer_verify_hook_postinst.stat.isreg
          - _packer_verify_hook_postinst.stat.executable
        fail_msg: "/etc/kernel/postinst.d/zz-stage-efi-stub missing / not a regular executable"

    - name: _verify | Stat hook symlinks
      ansible.builtin.stat:
        path: "{{ item }}"
      loop:
        - /etc/kernel/postrm.d/zz-stage-efi-stub
        - /etc/initramfs/post-update.d/zz-stage-efi-stub
      register: _packer_verify_hook_links

    - name: _verify | Hook symlinks in postrm.d and post-update.d point at the postinst.d entry
      ansible.builtin.assert:
        that:
          - item.stat.exists
          - item.stat.islnk
          - "'postinst.d/zz-stage-efi-stub' in item.stat.lnk_target"
        fail_msg: "{{ item.item }} not a symlink to /etc/kernel/postinst.d/zz-stage-efi-stub"
      loop: "{{ _packer_verify_hook_links.results }}"
      loop_control:
        label: "{{ item.item }}"

# --- x86_64: ZBM is the default boot path; no /EFI/Linux staging ---

- name: _verify | ZBM-default-boot assertions (x86_64)
  when: ansible_architecture == "x86_64"
  block:
    - name: _verify | Default_selection points at ZBM in refind.conf
      ansible.builtin.assert:
        that:
          - >-
            'default_selection "Ubuntu (ZBM)"' in (_packer_verify_refind_conf.content | b64decode)
        fail_msg: "x86_64 refind.conf default_selection isn't 'Ubuntu (ZBM)'"

    - name: _verify | Stat /EFI/Linux on x86_64
      ansible.builtin.stat:
        path: /boot/efi/EFI/Linux
      register: _packer_verify_efi_linux_x86

    - name: _verify | /EFI/Linux directory absent on x86_64
      ansible.builtin.assert:
        that: not _packer_verify_efi_linux_x86.stat.exists
        fail_msg: "/boot/efi/EFI/Linux/ shouldn't exist on x86_64 — only the aarch64 branch in chroot.sh creates it"
