# Assertions for state set up by packer/scripts/{provision,chroot}.sh.
# Run automatically by test/testrole.py after the role-apply +
# idempotence passes. Add new assertions here as packer code grows.
#
# Skipped on the `minimal` variant — that variant boots the upstream
# Ubuntu cloud image directly and never goes through packer's
# provision.sh / chroot.sh, so none of the invariants below apply.

- name: _verify | Skip on minimal (no packer-built image to assert against)
  when: qemu_test_minimal | default(false)
  ansible.builtin.meta: end_play

# --- ESP fundamentals (universal across box / lab / pug) ---

- name: _verify | Stat firmware-fallback rEFInd
  ansible.builtin.stat:
    path: /boot/efi/EFI/BOOT/BOOT{{ 'AA64' if ansible_architecture == 'aarch64' else 'X64' }}.EFI
  register: _packer_verify_refind_fallback

- name: _verify | Firmware-fallback rEFInd binary present at /EFI/BOOT/
  ansible.builtin.assert:
    that: _packer_verify_refind_fallback.stat.exists
    fail_msg: "rEFInd firmware-fallback (BOOTAA64.EFI / BOOTX64.EFI) missing — chroot.sh's fallback copy didn't land"

- name: _verify | Stat ZBM kernel + initrd
  ansible.builtin.stat:
    path: "{{ item }}"
  loop:
    - /boot/efi/EFI/ZBM/initramfs-bootmenu.img
    - /boot/efi/EFI/ZBM/{{ 'vmlinux-bootmenu' if ansible_architecture == 'aarch64' else 'vmlinuz-bootmenu' }}
  register: _packer_verify_zbm

- name: _verify | ZBM artifacts present and non-empty
  ansible.builtin.assert:
    that:
      - item.stat.exists
      - item.stat.size > 0
    fail_msg: "ZBM artifact missing or empty: {{ item.item }}"
  loop: "{{ _packer_verify_zbm.results }}"
  loop_control:
    label: "{{ item.item }}"

# --- refind.conf contents ---

- name: _verify | Read /boot/efi/EFI/refind/refind.conf
  ansible.builtin.slurp:
    src: /boot/efi/EFI/refind/refind.conf
  register: _packer_verify_refind_conf

- name: _verify | Decode refind.conf once for the asserts below
  ansible.builtin.set_fact:
    _packer_verify_refind_conf_text: "{{ _packer_verify_refind_conf.content | b64decode }}"

- name: _verify | ZBM menuentries + default_selection + dont_scan_dirs in refind.conf
  ansible.builtin.assert:
    that:
      - >-
        'default_selection "Ubuntu (ZBM)"' in _packer_verify_refind_conf_text
      - >-
        'menuentry "Ubuntu (ZBM)"' in _packer_verify_refind_conf_text
      - >-
        'menuentry "Ubuntu (ZBM Menu)"' in _packer_verify_refind_conf_text
      - "'/EFI/ZBM' in _packer_verify_refind_conf_text"
    fail_msg: "refind.conf missing expected ZBM menuentries / default_selection / dont_scan_dirs"

# --- NVRAM Boot entries (rEFInd, plus aarch64 EFI-stub) ---

- name: _verify | Read NVRAM Boot entries via efibootmgr
  ansible.builtin.command: efibootmgr -v
  changed_when: false
  register: _packer_verify_efibootmgr
  become: true

# chroot.sh registers either a single "rEFInd" entry (single-disk
# variants) or per-disk "rEFInd (disk N)" entries (multi-disk mdadm-EFI
# on lab). The disk-N suffix is the survival mechanism: firmware only
# follows paths it knows about, so losing one disk still leaves the
# other entries usable. Either shape must be in NVRAM -- the
# firmware-fallback BOOT<arch>.EFI checked above is a degraded recovery
# path (kicks in on CMOS clear / BIOS reset), not the everyday loader.
# A green fallback + missing primary entry would silently force every
# reboot through the fallback chain.
- name: _verify | rEFInd Boot entry registered in NVRAM
  ansible.builtin.assert:
    that: >-
      _packer_verify_efibootmgr.stdout
      is search('^Boot[0-9A-F]{4}\*?\s+rEFInd( \(disk \d+\))?\s', multiline=True)
    fail_msg: >-
      No NVRAM Boot#### entry labelled "rEFInd" (or "rEFInd (disk N)")
      — chroot.sh's efibootmgr -c didn't run or didn't land. The
      firmware-fallback /EFI/BOOT/BOOT<arch>.EFI is a recovery path,
      not a primary boot loader.

# --- mdadm-EFI multi-disk variants (lab variant) ---
#
# chroot.sh's LAYOUT=mirror branch builds an mdadm RAID1 EFI mirror
# (/dev/md/efi) + RAID0 swap (/dev/md/swap) across the OS disks, and
# registers per-disk "rEFInd (disk N)" NVRAM entries so the host
# survives losing any single disk. Detect via /dev/md/efi presence --
# the LAYOUT="" branch (single-disk variants) doesn't create it.
# Skipping the block on single-disk variants is intentional: the
# universal rEFInd assertion above already covers them.

- name: _verify | Stat /dev/md/efi (mdadm-EFI mirror detection)
  ansible.builtin.stat:
    path: /dev/md/efi
  register: _packer_verify_md_efi

- name: _verify | mdadm-EFI multi-disk assertions
  when: _packer_verify_md_efi.stat.exists
  block:
    - name: _verify | mdadm --detail --test (clean=0, degraded=1, failed=2)
      ansible.builtin.command: mdadm --detail --test {{ item }}
      changed_when: false
      failed_when: false
      become: true
      loop:
        - /dev/md/efi
        - /dev/md/swap
      register: _packer_verify_md_test

    - name: _verify | EFI mirror + swap array are clean
      ansible.builtin.assert:
        that: item.rc == 0
        fail_msg: >-
          mdadm --detail --test {{ item.item }} returned rc={{ item.rc }}
          — degraded or failed array. stderr: {{ item.stderr }}
      loop: "{{ _packer_verify_md_test.results }}"
      loop_control:
        label: "{{ item.item }}"

    - name: _verify | Per-disk "rEFInd (disk N)" NVRAM entries exist
      vars:
        _disk_entries: >-
          {{ _packer_verify_efibootmgr.stdout_lines
             | select('match', '^Boot[0-9A-F]{4}\*?\s+rEFInd \(disk \d+\)\s')
             | list }}
      ansible.builtin.assert:
        that: _disk_entries | length >= 2
        fail_msg: >-
          Multi-disk variant has only {{ _disk_entries | length }}
          per-disk "rEFInd (disk N)" NVRAM entries — chroot.sh's
          per-disk efibootmgr -c loop didn't run for every disk,
          breaking the single-disk-survival path.

# --- chroot.sh post-debootstrap shape (universal) ---

# chroot.sh sets MODULES=most in /etc/initramfs-tools/initramfs.conf
# right before the final update-initramfs, so the shipped image boots
# on bare-metal hardware whose controllers/NICs the build host didn't
# happen to have loaded. A regression here would surface only on
# first-bare-metal-boot of the image, which is too late to recover.
- name: _verify | Read /etc/initramfs-tools/initramfs.conf
  ansible.builtin.slurp:
    src: /etc/initramfs-tools/initramfs.conf
  register: _packer_verify_initramfs_conf

- name: _verify | initramfs.conf carries MODULES=most
  ansible.builtin.assert:
    # \b in a YAML/Jinja string literal is Python's backspace escape,
    # not a regex word boundary; anchor with $ + \s instead. (\s isn't
    # a Python string escape, so it passes through to re unchanged.)
    that: >-
      (_packer_verify_initramfs_conf.content | b64decode)
      is search('^MODULES=most\s*$', multiline=True)
    fail_msg: >-
      MODULES=most missing from initramfs.conf — chroot.sh's sed
      didn't run or was overridden, and the shipped initrd will only
      carry modules the build host had loaded (boot failure on
      bare-metal with unfamiliar controllers/NICs).

# chroot.sh holds grub* before installing linux-generic so apt doesn't
# pull grub-pc/grub-efi-amd64/etc via the Recommends alternation. If
# the holds were silently dropped (apt-mark unhold somewhere, dpkg
# state surgery during a kernel upgrade), a future apt upgrade could
# pull a grub package back in, install its post-install hook, and
# fight with rEFInd at boot. Match any grub-prefixed held package --
# chroot.sh's glob is intentionally future-grub-variant-tolerant.
#
# dpkg --get-selections rather than apt-mark showhold because the
# latter depends on apt's cache contents -- _test/mirrors rewrites
# sources to Nexus before _verify runs, and apt-mark filters its
# output by what's currently in the cache. dpkg state is mirror-
# independent and survives sources.list churn.
- name: _verify | dpkg selections for grub*
  ansible.builtin.command: dpkg --get-selections 'grub*'
  changed_when: false
  failed_when: false  # exits 1 when the pattern matches nothing
  register: _packer_verify_grub_selections

- name: _verify | grub* packages have selection=hold
  ansible.builtin.assert:
    that: >-
      _packer_verify_grub_selections.stdout_lines
      | select('search', '\\bhold$')
      | list | length > 0
    fail_msg: >-
      No grub-prefixed packages have selection=hold in dpkg --
      chroot.sh's apt-mark hold 'grub*' didn't take effect or was
      cleared, leaving future apt operations free to install grub
      and create a boot-loader conflict with rEFInd.

# --- aarch64: direct EFI-stub boot path + kernel-install hook ---

- name: _verify | EFI-stub direct-boot assertions (aarch64)
  when: ansible_architecture == "aarch64"
  block:
    - name: _verify | Stat staged EFI-stub kernel + initrd
      ansible.builtin.stat:
        path: "{{ item }}"
      loop:
        - /boot/efi/EFI/Linux/vmlinuz.efi
        - /boot/efi/EFI/Linux/initrd
      register: _packer_verify_efi_linux

    - name: _verify | Staged kernel + initrd present and non-empty
      ansible.builtin.assert:
        that:
          - item.stat.exists
          - item.stat.size > 0
        fail_msg: "staged {{ item.item }} missing or empty — initial-stage call from chroot.sh failed"
      loop: "{{ _packer_verify_efi_linux.results }}"
      loop_control:
        label: "{{ item.item }}"

    # Path-presence is enough — `efibootmgr -c` registers the loader
    # path and the --unicode cmdline atomically, so if the path is in
    # NVRAM the cmdline went with it. We don't grep for the cmdline
    # because --unicode stores it as UCS-2 (ASCII chars interleaved
    # with nulls) and efibootmgr -v's printout doesn't show the
    # cmdline as a contiguous ASCII substring.
    - name: _verify | Direct EFI-stub Boot entry is registered in NVRAM
      ansible.builtin.assert:
        that:
          - "'EFI\\\\Linux\\\\vmlinuz.efi' in _packer_verify_efibootmgr.stdout"
        fail_msg: >-
          No NVRAM Boot#### entry pointing at /EFI/Linux/vmlinuz.efi —
          chroot.sh's aarch64 efibootmgr -c didn't run or didn't land

    # chroot.sh registers the EFI-stub entry AFTER the rEFInd entries;
    # `efibootmgr -c` prepends to BootOrder, so the Linux entry should
    # end up first. If a future chroot.sh change flips ordering, or a
    # third entry slips in front, default boot silently falls through
    # to rEFInd -> ZBM -> kexec — the aarch64/EDK2 panic path the
    # EFI-stub direct boot was added to avoid.
    - name: _verify | First BootOrder entry resolves to the EFI-stub Linux loader
      vars:
        _bo_first: >-
          {{ (_packer_verify_efibootmgr.stdout_lines
              | select('match', '^BootOrder:')
              | first | default(''))
              | regex_replace('^BootOrder:\s*', '')
              | split(',') | first | default('') }}
        _bo_first_line: >-
          {{ _packer_verify_efibootmgr.stdout_lines
             | select('match', '^Boot' ~ _bo_first ~ '\*?\s')
             | first | default('') }}
      ansible.builtin.assert:
        that:
          - _bo_first | length > 0
          - "'EFI\\\\Linux\\\\vmlinuz.efi' in _bo_first_line"
        fail_msg: >-
          First BootOrder entry (Boot{{ _bo_first }}) is not the
          /EFI/Linux/vmlinuz.efi loader — default boot would land on
          rEFInd -> ZBM -> kexec, which panics on aarch64/EDK2.

    - name: _verify | Stat kernel-install hook (regular file)
      ansible.builtin.stat:
        path: /etc/kernel/postinst.d/zz-stage-efi-stub
      register: _packer_verify_hook_postinst

    - name: _verify | Hook is an executable regular file in /etc/kernel/postinst.d
      ansible.builtin.assert:
        that:
          - _packer_verify_hook_postinst.stat.exists
          - _packer_verify_hook_postinst.stat.isreg
          - _packer_verify_hook_postinst.stat.executable
        fail_msg: "/etc/kernel/postinst.d/zz-stage-efi-stub missing / not a regular executable"

    - name: _verify | Stat hook symlinks
      ansible.builtin.stat:
        path: "{{ item }}"
      loop:
        - /etc/kernel/postrm.d/zz-stage-efi-stub
        - /etc/initramfs/post-update.d/zz-stage-efi-stub
      register: _packer_verify_hook_links

    - name: _verify | Hook symlinks in postrm.d and post-update.d point at the postinst.d entry
      ansible.builtin.assert:
        that:
          - item.stat.exists
          - item.stat.islnk
          - "'postinst.d/zz-stage-efi-stub' in item.stat.lnk_target"
        fail_msg: "{{ item.item }} not a symlink to /etc/kernel/postinst.d/zz-stage-efi-stub"
      loop: "{{ _packer_verify_hook_links.results }}"
      loop_control:
        label: "{{ item.item }}"

# --- x86_64: no /EFI/Linux staging (only the aarch64 branch creates it) ---

- name: _verify | x86_64-only assertions
  when: ansible_architecture == "x86_64"
  block:
    - name: _verify | Stat /EFI/Linux on x86_64
      ansible.builtin.stat:
        path: /boot/efi/EFI/Linux
      register: _packer_verify_efi_linux_x86

    - name: _verify | /EFI/Linux directory absent on x86_64
      ansible.builtin.assert:
        that: not _packer_verify_efi_linux_x86.stat.exists
        fail_msg: "/boot/efi/EFI/Linux/ shouldn't exist on x86_64 — only the aarch64 branch in chroot.sh creates it"

# --- Functional kernel-update + reboot exercise (both arches) ---
#
# Trigger an apt-driven kernel transaction and reboot, then prove the
# firmware boots into a *different* kernel. End-to-end exercise of the
# live boot chain:
#   x86_64:  firmware -> rEFInd -> ZBM (Components mode) -> kexec
#   aarch64: firmware -> EFI-stub direct boot via /EFI/Linux/
#
# Per-release apt trigger differs (no one-size path works on all):
#
# - jammy/noble: install the HWE meta-package. The HWE kernel is newer
#   than what packer shipped, becomes the highest in /boot/, and the
#   reboot lands on it.
#
# - resolute: 26.04 LTS GA has no HWE concept. Install the second-newest
#   linux-image-X.Y.Z-generic, then hide the running kernel's /boot
#   files behind dotfile names so the "highest kernel" selection skips
#   them (ZBM's glob on x86_64; the postinst.d hook's glob on aarch64).
#   dpkg's "Aborting removal of the running kernel" prerm guard blocks
#   the cleaner apt-purge path, so this is the closest substitute
#   without bypassing dpkg.
#
# aarch64 also re-runs the postinst.d hook (after the hide) so
# /EFI/Linux/ restages with the older kernel, and asserts the file
# hashes flipped. That ESP-staging path is the aarch64-only mechanism
# for the direct-EFI-stub workaround documented at chroot.sh's top.
- name: _verify | Kernel-update + reboot exercise
  block:
    - name: _verify | Capture uname -r before kernel transaction
      ansible.builtin.command: uname -r
      changed_when: false
      register: _packer_verify_uname_before

    - name: _verify | Capture /EFI/Linux/{vmlinuz.efi,initrd} hashes before (aarch64)
      when: ansible_architecture == "aarch64"
      ansible.builtin.stat:
        path: "{{ item }}"
        get_checksum: true
        checksum_algorithm: sha256
      loop:
        - /boot/efi/EFI/Linux/vmlinuz.efi
        - /boot/efi/EFI/Linux/initrd
      register: _packer_verify_efi_linux_before
      become: true

    - name: _verify | HWE-kernel install (jammy/noble)
      when: ansible_distribution_release in ["jammy", "noble"]
      block:
        - name: _verify | Install HWE kernel (newer than what packer shipped)
          ansible.builtin.apt:
            name: linux-generic-hwe-{{ '22.04' if ansible_distribution_release == 'jammy' else '24.04' }}
            state: present
            update_cache: true
          become: true
          register: _packer_verify_hwe_install

        - name: _verify | HWE install was a real install, not a no-op
          ansible.builtin.assert:
            that: _packer_verify_hwe_install.changed
            fail_msg: >-
              apt reported no changes from `linux-generic-hwe-*` —
              HWE was already current, so the test premise is broken
              (no different kernel to reboot into)

    - name: _verify | Older-kernel install + hide running kernel (resolute)
      when: ansible_distribution_release == "resolute"
      block:
        - name: _verify | Refresh apt cache so madison sees the current archive
          ansible.builtin.apt:
            update_cache: true
          become: true

        # apt-cache madison lists every available version of the
        # metapackage; the running kernel is the newest, so the
        # second-newest is the downgrade target. Version is
        # "ABI.REVISION" (e.g. 7.0.0-15.15); sed strips the trailing
        # .REVISION (and any +N suffix) to leave the ABI fragment that
        # names the actual linux-image-X.Y.Z-N-generic package.
        - name: _verify | Find second-newest linux-image-generic ABI in archive
          ansible.builtin.shell:
            cmd: |
              set -euo pipefail
              versions=$(apt-cache madison linux-image-generic |
                         awk '$1=="linux-image-generic"{print $3}' |
                         sort -uV)
              count=$(echo "$versions" | grep -c .)
              if [ "$count" -lt 2 ]; then
                echo >&2 "archive has only $count linux-image-generic version(s); need 2+ for a downgrade target (test premise broken)"
                exit 1
              fi
              ver=$(echo "$versions" | tail -2 | head -1)
              echo "$ver" | sed -E 's/^([0-9]+\.[0-9]+\.[0-9]+-[0-9]+).*$/\1/'
          register: _packer_verify_older_abi
          changed_when: false

        - name: _verify | Older-kernel ABI was found in the archive
          ansible.builtin.assert:
            that: _packer_verify_older_abi.stdout != ""
            fail_msg: >-
              Older-kernel ABI extraction returned an empty string —
              the madison version didn't match the expected
              ABI.REVISION shape (sed strip failed)

        - name: _verify | Install older specific kernel + modules
          ansible.builtin.apt:
            name:
              - "linux-image-{{ _packer_verify_older_abi.stdout }}-generic"
              - "linux-modules-{{ _packer_verify_older_abi.stdout }}-generic"
            state: present
          become: true

        # dpkg refuses to purge the running kernel ("Aborting removal of
        # the running kernel"). Hide the /boot files behind dotfile names
        # — shell globs don't match leading dots, so:
        #   x86_64: ZBM's /boot/vmlinuz-* scan skips the hidden running
        #           kernel and picks the older one as the new highest.
        #   aarch64: the postinst.d hook's same glob skips them; we
        #            re-run the hook below to restage /EFI/Linux/.
        - name: _verify | Hide running kernel files from highest-kernel selection
          ansible.builtin.shell:
            cmd: |
              set -euo pipefail
              mv -f /boot/vmlinuz-{{ ansible_kernel }} /boot/.vmlinuz-{{ ansible_kernel }}
              mv -f /boot/initrd.img-{{ ansible_kernel }} /boot/.initrd.img-{{ ansible_kernel }}
          become: true

        - name: _verify | Re-run the hook to stage the older kernel onto /EFI/Linux/ (aarch64)
          when: ansible_architecture == "aarch64"
          ansible.builtin.command: /etc/kernel/postinst.d/zz-stage-efi-stub
          become: true

    - name: _verify | Capture /EFI/Linux/{vmlinuz.efi,initrd} hashes after (aarch64)
      when: ansible_architecture == "aarch64"
      ansible.builtin.stat:
        path: "{{ item }}"
        get_checksum: true
        checksum_algorithm: sha256
      loop:
        - /boot/efi/EFI/Linux/vmlinuz.efi
        - /boot/efi/EFI/Linux/initrd
      register: _packer_verify_efi_linux_after
      become: true

    - name: _verify | Hook restaged vmlinuz.efi and initrd onto the ESP (aarch64)
      when: ansible_architecture == "aarch64"
      ansible.builtin.assert:
        that:
          - >-
            _packer_verify_efi_linux_after.results[0].stat.checksum
            != _packer_verify_efi_linux_before.results[0].stat.checksum
          - >-
            _packer_verify_efi_linux_after.results[1].stat.checksum
            != _packer_verify_efi_linux_before.results[1].stat.checksum
        fail_msg: >-
          /EFI/Linux/vmlinuz.efi or /EFI/Linux/initrd unchanged after the
          kernel transaction — postinst.d hook didn't fire (or fired but
          failed silently)

    - name: _verify | Reboot to pick up the swapped kernel
      ansible.builtin.reboot:
        reboot_timeout: 300
      become: true

    - name: _verify | Capture uname -r after reboot
      ansible.builtin.command: uname -r
      changed_when: false
      register: _packer_verify_uname_after

    - name: _verify | Boot chain landed on the swapped kernel
      ansible.builtin.assert:
        that: >-
          _packer_verify_uname_after.stdout
          != _packer_verify_uname_before.stdout
        fail_msg: >-
          uname -r is still {{ _packer_verify_uname_before.stdout }}
          after reboot — boot chain kept selecting the previous kernel
          even though we installed a different one
