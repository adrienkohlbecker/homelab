# Network-stack hardening alongside roles/firewall. Ubuntu's defaults
# are inconsistent (rp_filter=2, log_martians=0, send_redirects=1) —
# pin the secure values explicitly so this file is the single place
# to read for "what's the host's network posture?".

# Disable IPv6 entirely. Cutting the stack at the kernel layer stops
# services that bind on `::` (e.g. transmission) from sitting on a
# silent dead listener, stops neighbor discovery churn, and means we
# don't have to maintain a parallel ip6tables ruleset.
net.ipv6.conf.all.disable_ipv6 = 1
net.ipv6.conf.default.disable_ipv6 = 1

# Strict reverse-path: drop packets whose source IP wouldn't route
# back via the ingress interface (asymmetric-routing / spoofed-source
# filtering).
net.ipv4.conf.all.rp_filter = 1
net.ipv4.conf.default.rp_filter = 1

# Refuse source-routed packets (an attacker can't dictate the path).
net.ipv4.conf.all.accept_source_route = 0
net.ipv4.conf.default.accept_source_route = 0

# Ignore inbound ICMP redirects (an attacker can't reroute our traffic
# to them).
net.ipv4.conf.all.accept_redirects = 0
net.ipv4.conf.default.accept_redirects = 0

# Don't emit ICMP redirects either — we don't act as a router for
# arbitrary clients.
net.ipv4.conf.all.send_redirects = 0
net.ipv4.conf.default.send_redirects = 0

# Log packets with bogus source IPs (e.g. RFC1918 arriving on WAN).
net.ipv4.conf.all.log_martians = 1
net.ipv4.conf.default.log_martians = 1

# SYN-flood mitigation. Default is on in modern Ubuntu; assert anyway.
net.ipv4.tcp_syncookies = 1

# Drop RSTs that arrive during TIME-WAIT (RFC 1337) — closes a
# narrow TCP-hijack window where an attacker forges a RST to
# tear down a half-closed connection.
net.ipv4.tcp_rfc1337 = 1

# Ignore ICMP echo to broadcast/multicast addresses (smurf-style
# amplification). Default 1 on modern Ubuntu but pin explicitly.
net.ipv4.icmp_echo_ignore_broadcasts = 1

# Silently drop malformed ICMP error responses — reduces martians
# log noise paired with log_martians=1 above.
net.ipv4.icmp_ignore_bogus_error_responses = 1

# Strict ARP behaviour for a multi-homed host (wg0 + podman bridges
# + WAN). arp_ignore=1: reply only if the target IP is configured
# on the receiving interface. arp_announce=2: source ARP requests
# with the local address best-matched for the destination instead
# of leaking another interface's IP. Both are also keepalived's
# canonical recommendation for VRRP setups.
net.ipv4.conf.all.arp_ignore = 1
net.ipv4.conf.default.arp_ignore = 1
net.ipv4.conf.all.arp_announce = 2
net.ipv4.conf.default.arp_announce = 2

# Strict conntrack: classify mid-stream non-SYN TCP as INVALID rather
# than NEW. The default `loose=1` makes such packets show up as NEW
# state (attackable via crafted ACK probes); the nftables non-SYN
# drop rules are a backstop but kernel-level enforcement is the
# first line. Takes effect at next reboot — nf_conntrack is pinned
# via /etc/modules-load.d/30-firewall-hardening.conf, loaded before
# systemd-sysctl reads this file at boot. Applying mid-flight is
# unsafe: it'd reclassify in-flight TCP (no SYN history in fresh
# conntrack) as INVALID and the ruleset drops it.
net.netfilter.nf_conntrack_tcp_loose = 0
