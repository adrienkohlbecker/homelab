# nf_conntrack is autoloaded on demand by netfilter once anything
# touches ct state, but we want it loaded early enough that
# `sysctl -p` can write net.netfilter.nf_conntrack_tcp_loose before
# nftables.service brings up our ruleset.
nf_conntrack

# The homelab ruleset declares an ingress flowtable. Autoloading can happen
# too late during boot: nftables parses the flowtable before the kernel has
# registered the flowtable expression, then succeeds on a later retry. Load the
# stack before nftables.service starts so the first ruleset load is clean.
nf_flow_table
nf_flow_table_inet
nft_flow_offload
