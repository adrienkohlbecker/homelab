# Drop-in: scope the ExecStop to our own table instead of the stock
# `nft flush ruleset`, which would also tear down netavark / fail2ban
# / libvirt tables in the same kernel ruleset on any `systemctl stop`
# or `restart`. The leading empty ExecStop= resets the inherited list.
# The `-` prefix on the ExecStop command makes systemd ignore a
# nonzero exit — `nft delete table` errors if the table doesn't
# exist (e.g. on `systemctl stop` after a failed start that never
# loaded the ruleset). Without the dash the unit lands in `failed`
# state and needs a manual `reset-failed` before subsequent starts.
#
# ExecReload runs nft -f atomically (via the add/flush/load idiom in
# the file) — `systemctl reload nftables` updates the ruleset in
# place with no firewall-less window. Stock nftables.service has no
# ExecReload; we add one so config changes can propagate via reload
# rather than restart.
#
# The second ExecReload re-runs wg0_flowtable.service: reload's
# delete-table/add-table sequence wipes the runtime flowtable, and
# /etc/nftables.conf doesn't carry wg0 in the devices clause (it's
# attached dynamically by wg0_flowtable.service, tied to wg-quick@wg0
# lifecycle so the firewall can come up at boot without waiting for
# the wg iface to exist). `try-restart` is a no-op if wg-quick@wg0
# isn't active; `-` swallows any failure so a degraded wg0_flowtable
# can't block an nftables reload.
#
# `--no-block` is load-bearing: without it, systemctl waits for the
# restart job to complete. The restart's start phase orders After=
# nftables.service, but nftables.service can't transition from
# `reloading` to `active` until this ExecReload returns — a circular
# wait that pins nftables in `reloading` forever. With --no-block the
# job is queued and systemctl returns immediately; the queued start
# fires once nftables finishes its reload.
[Unit]
# The ruleset uses flowtable expressions whose modules are pinned in
# /etc/modules-load.d/30-firewall-hardening.conf. Order after
# systemd-modules-load so first boot-time ExecStart does not race module
# registration and fail before a later retry succeeds.
After=systemd-modules-load.service

[Service]
ExecStop=
ExecStop=-/usr/sbin/nft delete table inet homelab
ExecReload=/usr/sbin/nft -f /etc/nftables.conf
ExecReload=-/bin/systemctl --no-block try-restart wg0_flowtable.service
