# Capture nft counters at end-of-probe state, assert each one fired
# (or stayed at 0 for negative-only rules). Also confirms sysctl
# persistence (the conntrack tcp_loose=0 fact is bootloader-only)
# and the reboot signal the role writes when nf_conntrack wasn't
# loaded at sysctl-write time.

- name: _verify_counters | Capture nftables counters after crafted-packet probes
  command: nft -j list table inet homelab
  register: _firewall_counters_after_crafted
  changed_when: false
  become: true

# nf_conntrack_tcp_loose=0 makes the kernel itself classify mid-stream
# non-SYN TCP as INVALID rather than NEW. Can't apply mid-flight (would
# break live SSH), so the value persists in /etc/sysctl.d/ and the
# module is pinned via /etc/modules-load.d/ to load at next boot. The
# nftables non-SYN drop rules above remain the runtime protection
# until then.
- name: _verify_counters | Sysctl — nf_conntrack_tcp_loose=0 persisted in sysctl.d
  slurp:
    src: /etc/sysctl.d/90-firewall-hardening.conf
  register: _firewall_sysctl_persist
  become: true

- name: _verify_counters | Sysctl — nf_conntrack module pinned in modules-load.d
  slurp:
    src: /etc/modules-load.d/30-firewall-hardening.conf
  register: _firewall_modload_persist
  become: true

- name: _verify_counters | Sysctl — assert persistence
  assert:
    that:
      # ansible.posix.sysctl writes `key=value` without surrounding
      # spaces; the earlier assertion expected `key = value` (the
      # canonical sysctl(8) parse-tolerant form) and missed the
      # actual on-disk shape. Compare against the no-spaces form.
      - "'net.netfilter.nf_conntrack_tcp_loose=0' in (_firewall_sysctl_persist.content | b64decode)"
      - "'nf_conntrack' in (_firewall_modload_persist.content | b64decode)"
    fail_msg: >-
      Either /etc/sysctl.d/90-firewall-hardening.conf doesn't pin
      nf_conntrack_tcp_loose=0, or /etc/modules-load.d/30-firewall-
      hardening.conf doesn't pin nf_conntrack. Without both,
      loose=0 won't take effect at next boot.

# Martian-source logging: the role pins all=0 (the kernel OR-folds
# `all` with each iface's flag, so all=1 would re-enable logging on
# every iface and defeat keepalived's per-vmac suppression) and
# default=1 (so newly-created real ifaces still log martians). Read the
# live kernel knobs, not the persisted file, since the role applies
# these immediately.
- name: _verify_counters | Sysctl — read live martian-logging knobs
  command: cat /proc/sys/net/ipv4/conf/all/log_martians /proc/sys/net/ipv4/conf/default/log_martians
  register: _firewall_log_martians
  changed_when: false
  become: true

- name: _verify_counters | Sysctl — assert all=0 (no OR-fold) and default=1
  assert:
    that:
      - _firewall_log_martians.stdout_lines == ['0', '1']
    fail_msg: >-
      net.ipv4.conf.{all,default}.log_martians = {{ _firewall_log_martians.stdout_lines }},
      expected ['0', '1']. all must be 0 so the kernel OR-fold can't re-arm
      martian logging on keepalived's vmac (vrrp.<VRID>); default must stay 1
      so new real interfaces still log martians.

# First-apply path: nf_conntrack wasn't loaded at sysctl-write time,
# so the role should have created /var/run/reboot-required to let
# site.yml's tail block schedule a reboot.
- name: _verify_counters | Reboot signal — /var/run/reboot-required exists
  stat:
    path: /var/run/reboot-required
  register: _firewall_reboot_required_stat
  become: true

# Require recent mtime so a stale file from a prior --keep'd run
# doesn't false-pass. The role's apply is well within an hour of
# verify on a normal harness cycle (~10 min total); cross-session
# --keep'd re-runs (file from yesterday) correctly fail.
- name: _verify_counters | Reboot signal — assert reboot was signaled this run
  assert:
    that:
      - _firewall_reboot_required_stat.stat.exists
      - _firewall_reboot_required_stat.stat.mtime > (ansible_date_time.epoch | int) - 3600
    fail_msg: >-
      /var/run/reboot-required is missing or stale (mtime older than
      1 hour). With nf_conntrack not pre-loaded, the conntrack sysctl
      can't take effect until reboot — the role should have signaled
      this run.

# Look up each counter by name and confirm packets fired as expected.
# Counters are declared at table scope (see nftables.conf.j2) and
# referenced from rules via `counter name "X"`; the table-scope
# declaration is what carries packets/bytes. selectattr by `family`
# winnows the JSON to those declarations (rule references inside
# `rule.expr` also have a `counter` key but no `family`).
- name: _verify_counters | Counter-checked rules each fired the expected number of times
  vars:
    nft_counters: "{{ _firewall_counters_after_crafted.stdout | nft_counters_by_name }}"
    input_nonsyn_pkts: "{{ nft_counters.input_nonsyn.packets }}"
    forward_nonsyn_pkts: "{{ nft_counters.forward_nonsyn.packets }}"
    forward_podman_isolation_pkts: "{{ nft_counters.forward_podman_isolation.packets }}"
    forward_catchall_pkts: "{{ nft_counters.forward_catchall.packets }}"
    icmp_overflow_pkts: "{{ nft_counters.icmp_overflow.packets }}"
    input_silenced_pkts: "{{ nft_counters.input_silenced.packets }}"
    input_silenced_netbios_pkts: "{{ nft_counters.input_silenced_netbios.packets }}"
    igmp_accept_pkts: "{{ nft_counters.igmp_accept.packets }}"
    input_catchall_pkts: "{{ nft_counters.input_catchall.packets }}"
    # VRRP rule's counter is asserted at 0 — the negative probe sends
    # proto-112 from wg0 (extns ingress) and the iif scope must reject.
    vrrp_pkts: "{{ nft_counters.vrrp_accept.packets }}"
    # UDP accept rule counters (A6) — advertised WAN forwards exercise the
    # WAN-scoped Transmission/Tailscale positives. mDNS remains negative-only:
    # the controller-side WAN forward does not preserve a HOME_LAN source
    # address.
    mosh_pkts: "{{ nft_counters.mosh_accept.packets }}"
    aardvark_pkts: "{{ nft_counters.aardvark_accept.packets }}"
    wireguard_pkts: "{{ nft_counters.wireguard_accept.packets }}"
    mdns_pkts: "{{ nft_counters.mdns_accept.packets }}"
    # TCP accept rule counters — most probes intentionally have no
    # listener, so the rule-specific counter is the signal that each
    # firewall branch matched. Keep these split so one open port can't
    # mask another regressing out of the ruleset.
    input_ssh_pkts: "{{ nft_counters.input_ssh.packets }}"
    input_http_pkts: "{{ nft_counters.input_http.packets }}"
    input_https_pkts: "{{ nft_counters.input_https.packets }}"
    input_admin_samba_pkts: "{{ nft_counters.input_admin_samba.packets }}"
    input_admin_nut_pkts: "{{ nft_counters.input_admin_nut.packets }}"
    input_transmission_tcp_pkts: "{{ nft_counters.input_transmission_tcp.packets }}"
    input_transmission_udp_pkts: "{{ nft_counters.input_transmission_udp.packets }}"
    input_nut_podman_pkts: "{{ nft_counters.input_nut_podman.packets }}"
    input_loopback_pkts: "{{ nft_counters.input_loopback.packets }}"
    input_icmp_accept_pkts: "{{ nft_counters.input_icmp_accept.packets }}"
    input_authelia_wg_pkts: "{{ nft_counters.input_authelia_wg.packets }}"
    tailscale_input_pkts: "{{ nft_counters.tailscale_input_accept.packets }}"
    tailscale_forward_pkts: "{{ nft_counters.tailscale_forward_accept.packets }}"
    tailscale_underlay_pkts: "{{ nft_counters.tailscale_underlay_accept.packets }}"
    tailscale_lan_pkts: "{{ nft_counters.tailscale_lan_accept.packets }}"
  assert:
    that:
      - input_nonsyn_pkts | int >= 1
      - forward_nonsyn_pkts | int >= 1
      - forward_podman_isolation_pkts | int >= 1
      - forward_catchall_pkts | int >= 1
      - icmp_overflow_pkts | int >= 1
      - input_silenced_pkts | int >= 1
      - input_silenced_netbios_pkts | int >= 1  # udp dport 137 probe
      - igmp_accept_pkts | int >= 1             # raw proto-2 (IGMP) probe
      - input_catchall_pkts | int >= 1
      - vrrp_pkts | int == 0
      - mosh_pkts | int >= 1
      - aardvark_pkts | int >= 2  # two probes: default-bridge + non-default-bridge
      - wireguard_pkts | int >= 1
      - mdns_pkts | int == 0
      - input_ssh_pkts | int >= 1
      - input_http_pkts | int >= 1
      - input_https_pkts | int >= 1
      - input_admin_samba_pkts | int >= 1
      - input_admin_nut_pkts | int >= 1
      - input_transmission_tcp_pkts | int >= 1
      - input_transmission_udp_pkts | int >= 1
      - input_nut_podman_pkts | int >= 1     # nut positive from podman_bridge_pool source
      - input_loopback_pkts | int >= 1       # host curl 127.0.0.1:80
      - input_icmp_accept_pkts | int >= 1    # ping probe + first 20 of the flood
      - input_authelia_wg_pkts | int >= 1
      - tailscale_input_pkts | int >= 1
      - tailscale_forward_pkts | int >= 1
      - tailscale_underlay_pkts | int >= 1
      - tailscale_lan_pkts | int >= 2  # two probes: wireguard-source + mac_mgmt path
    fail_msg: >-
      Counter-based probes didn't fire all expected rules: non-SYN
      (input/forward), podman direct cross-network isolation,
      forward catch-all, icmp overflow, input silenced-noise (udp
      set / NetBIOS), IGMP accept, or input catch-all; OR the VRRP rule's iif scope
      accepted a wg0-ingress packet (vrrp_pkts > 0); OR an INPUT
      accept rule failed to fire (SSH/HTTP/HTTPS, admin samba/nut,
      Authelia WG, podman-pool nut, Tailscale input/forward/underlay,
      Tailscale LAN-direct (needs both wireguard-source and mac_mgmt
      probes, >= 2), loopback, icmp accept, or
      Transmission WAN ingress; OR mDNS
      accepted a non-home fixture packet.
      Either a rule is missing, the probe didn't reach the chain, or
      another rule swallowed the packet first.
