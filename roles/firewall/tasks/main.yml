# default_interface (group_vars/all.yml) is sourced from
# ansible_default_ipv4.interface. If gather-facts picks a bridge or
# tunnel (a libvirt/podman bridge briefly owning the default route, or
# wg0 with policy routing), every `iifname $WAN_IFACE` rule attaches
# to the wrong iface — wg/transmission iif scope misfires AND traffic
# arriving on the real WAN no longer matches the rules, falling back
# to admin services scoped only by saddr. rp_filter is only a partial
# backstop here (loose mode — see the sysctl block below for why this
# macvlan host can't run strict), so assert the iface is sane and make
# the failure mode loud rather than silent.
- name: Assert default_interface is plausible (not a bridge/tunnel)
  assert:
    that:
      - ansible_default_ipv4.interface is defined
      - ansible_default_ipv4.interface is not match("^(wg|podman|virbr|docker|br-|veth)")
    fail_msg: >-
      ansible_default_ipv4.interface resolved to
      '{{ ansible_default_ipv4.interface }}', which looks like a
      bridge/tunnel — the firewall's iifname-scoped rules would
      attach to the wrong iface. Override `default_interface` in
      host_vars (group_vars/all.yml defaults it to
      ansible_default_ipv4.interface) when gather-facts is picking
      the wrong default-route owner.
  tags:
    - firewall

# policy_rc_d: 101 prevents the dpkg postinst from auto-starting
# nftables.service before our drop-in / template lands. Without it
# there's a sub-second window where stock Ubuntu's example ruleset
# (or no ruleset) is active. Matches the pattern used by keepalived /
# fail2ban / dnscrypt_proxy.
- name: Install nftables
  apt:
    pkg:
      - nftables
    cache_valid_time: 3600
    policy_rc_d: 101
  register: firewall_apt_nftables
  become: true
  tags:
    - firewall

# Stock nftables.service ships `ExecStop=/usr/sbin/nft flush ruleset`,
# which would tear down netavark / fail2ban / libvirt tables in the
# same kernel ruleset on any `systemctl stop` or `restart`. Scope the
# stop to our own table.
- name: Install nftables.service ExecStop drop-in
  import_role:
    name: systemd_unit
    tasks_from: dropin
  vars:
    systemd_unit_args:
      src: override_nftables.conf
      for: nftables.service
  tags:
    - firewall

# Pin nf_conntrack at boot so /proc/sys/net/netfilter/nf_conntrack_*
# is populated before systemd-sysctl reads /etc/sysctl.d/. Deliberately
# not modprobed mid-run: loading conntrack on a live host classifies
# every existing TCP connection (no state, no SYN history) as INVALID
# under loose=0 — our `ct state invalid drop` rule then kills SSH
# along with everything else. Settings take effect at next reboot;
# until then the nftables non-SYN drop rules are the only protection.
- name: Pin nf_conntrack at boot
  copy:
    src: modules-load.conf
    dest: /etc/modules-load.d/30-firewall-hardening.conf
    owner: root
    group: root
    mode: "0644"
    backup: true
  become: true
  tags:
    - firewall

# Network-stack hardening sysctls. Ubuntu's defaults are inconsistent
# (log_martians=0, send_redirects=1) — pin the secure values explicitly
# so /etc/sysctl.d/90-firewall-hardening.conf is the single source of
# truth for the host's network posture. Module writes the .conf file
# AND applies each key live.
#
# The 90- prefix is load-bearing: systemd-sysctl applies sysctl.d files
# in basename-lexical order, last-writer-wins. An earlier 30- prefix
# was silently overridden at every boot by /usr/lib/sysctl.d/50-
# default.conf (which globs `net.ipv4.conf.*.rp_filter=2` and sets
# default=2), so the file's values only held until the next reboot.
# 90- sorts after 50-default so our posture is authoritative.
#
# nf_conntrack_tcp_loose handled separately below: the module isn't
# loaded at first-apply time so its live write would fail; if we
# inline it here with `ignoreerrors: true` the sysctl module reports
# changed=true every run (couldn't apply live → marks as changed)
# and the rerun never converges.
# Remove the pre-rename file: hosts provisioned before the 30→90
# rename keep the stale 30-firewall-hardening.conf. It's overridden by
# the new 90- file at boot so it's not harmful, but a lingering conf
# with conflicting values is a debugging trap. (The modules-load.d
# file keeps its 30- prefix — module load order is not last-wins.)
- name: Remove pre-rename 30-firewall-hardening sysctl file
  file:
    path: /etc/sysctl.d/30-firewall-hardening.conf
    state: absent
  become: true
  tags:
    - firewall

- name: Install network-stack hardening sysctls
  ansible.posix.sysctl:
    name: "{{ item.name }}"
    value: "{{ item.value }}"
    sysctl_file: /etc/sysctl.d/90-firewall-hardening.conf
  loop:
    # Disable IPv6 entirely. Cuts the stack at the kernel layer so
    # services binding `::` end up on a dead listener, neighbor
    # discovery churn stops, and we don't maintain a parallel
    # ip6tables ruleset.
    - { name: net.ipv6.conf.all.disable_ipv6, value: '1' }
    - { name: net.ipv6.conf.default.disable_ipv6, value: '1' }
    # Loose reverse-path (rp_filter=2): drop packets whose source isn't
    # routable via ANY interface (still catches RFC1918-on-WAN spoofs),
    # but tolerate the asymmetric paths this host's macvlan topology
    # creates. lab carries the keepalived pihole VIP on a `vrrp.N`
    # macvlan that shares eth0's L2 segment, so VRRP-unicast and LAN
    # broadcast/multicast legitimately ingress on an iface other than
    # the one their source routes back through. Strict (=1) would drop
    # that traffic and break keepalived failover. =2 is also what Ubuntu
    # ships, so this no longer fights /usr/lib/sysctl.d/50-default.conf.
    - { name: net.ipv4.conf.all.rp_filter, value: '2' }
    - { name: net.ipv4.conf.default.rp_filter, value: '2' }
    # Refuse source-routed packets (no attacker-dictated path).
    - { name: net.ipv4.conf.all.accept_source_route, value: '0' }
    - { name: net.ipv4.conf.default.accept_source_route, value: '0' }
    # Ignore inbound ICMP redirects (no attacker-controlled reroute).
    - { name: net.ipv4.conf.all.accept_redirects, value: '0' }
    - { name: net.ipv4.conf.default.accept_redirects, value: '0' }
    # Don't emit ICMP redirects either — we're not a transit router.
    - { name: net.ipv4.conf.all.send_redirects, value: '0' }
    - { name: net.ipv4.conf.default.send_redirects, value: '0' }
    # Log packets with bogus source IPs (e.g. RFC1918 on WAN).
    - { name: net.ipv4.conf.all.log_martians, value: '1' }
    - { name: net.ipv4.conf.default.log_martians, value: '1' }
    # SYN-flood mitigation. Default on in modern Ubuntu; pin anyway.
    - { name: net.ipv4.tcp_syncookies, value: '1' }
    # Drop RSTs in TIME-WAIT (RFC 1337) — closes a narrow TCP-hijack
    # window.
    - { name: net.ipv4.tcp_rfc1337, value: '1' }
    # Ignore ICMP echo to broadcast/multicast (smurf amplification);
    # silently drop malformed ICMP error responses (martians noise).
    - { name: net.ipv4.icmp_echo_ignore_broadcasts, value: '1' }
    - { name: net.ipv4.icmp_ignore_bogus_error_responses, value: '1' }
    # Strict ARP for a multi-homed host. arp_ignore=1: reply only if
    # the target IP is on the receiving interface. arp_announce=2:
    # source ARPs with the local address best-matched for the dest
    # instead of leaking another iface's IP. Same as keepalived's
    # canonical VRRP recommendation.
    - { name: net.ipv4.conf.all.arp_ignore, value: '1' }
    - { name: net.ipv4.conf.default.arp_ignore, value: '1' }
    - { name: net.ipv4.conf.all.arp_announce, value: '2' }
    - { name: net.ipv4.conf.default.arp_announce, value: '2' }
  loop_control:
    label: "{{ item.name }}"
  register: firewall_sysctl
  become: true
  tags:
    - firewall

# Strict conntrack: classify mid-stream non-SYN TCP as INVALID rather
# than NEW. Pinned at boot via modules-load.d (already in this role)
# so subsequent reboots have nf_conntrack loaded, with the value
# written from /etc/sysctl.d/ by systemd-sysctl at startup.
#
# Split from the main loop because we need different handling for
# "module not loaded" (first-apply on a fresh host): the conf line
# always goes in the file via lineinfile (kernel reads it at next
# boot once modules-load.d fires), but the live sysctl is gated on
# the module being present so we don't trigger the EINVAL that
# inline `ignoreerrors: true` would silently turn into perpetual
# changed=true.
- name: Check whether nf_conntrack is loaded (gates live sysctl + reboot signal)
  stat:
    path: /sys/module/nf_conntrack
  register: firewall_nf_conntrack_loaded
  tags:
    - firewall

- name: Pin nf_conntrack_tcp_loose in sysctl.d (idempotent file write)
  when: not (ansible_check_mode and firewall_sysctl.changed)
  lineinfile:
    path: /etc/sysctl.d/90-firewall-hardening.conf
    regexp: '^net\.netfilter\.nf_conntrack_tcp_loose\s*='
    # No spaces around `=` to match ansible.posix.sysctl's on-disk
    # shape -- _verify_counters' grep asserts the no-space form.
    line: 'net.netfilter.nf_conntrack_tcp_loose=0'
    create: false
  register: firewall_conntrack_pinned
  become: true
  tags:
    - firewall

- name: Apply nf_conntrack_tcp_loose live (only when module is loaded)
  when:
    - firewall_nf_conntrack_loaded.stat.exists
    - not (ansible_check_mode and firewall_sysctl.changed)
  ansible.posix.sysctl:
    name: net.netfilter.nf_conntrack_tcp_loose
    value: '0'
    sysctl_file: /etc/sysctl.d/90-firewall-hardening.conf
    reload: false
  become: true
  tags:
    - firewall

# Signal site.yml's tail reboot block when any sysctl changed and
# nf_conntrack isn't loaded yet -- that's the only case where a key
# in the file (conntrack_tcp_loose) can't take effect live. After
# the resulting reboot, modules-load.d loads conntrack and
# systemd-sysctl writes the desired value at boot. Subsequent runs
# (module persistent) reapply without needing another reboot.
- name: Signal reboot required (conntrack sysctl deferred to boot)
  when:
    - firewall_sysctl.changed or firewall_conntrack_pinned.changed
    - not firewall_nf_conntrack_loaded.stat.exists
  file:
    path: /var/run/reboot-required
    state: touch
    owner: root
    group: root
    mode: "0644"
  become: true
  tags:
    - firewall

# Auto-revert safety net. `nft -c -f` validates SYNTAX (good — see
# next task) but can't detect "the new ruleset drops the operator's
# own SSH path", which silently locks them out at reload time.
# Mitigation: schedule a systemd-run timer to re-apply the previous
# pre-reload snapshot 60s from now, run the reload, and cancel the
# timer once ansible can still reach the host after the reload. If
# anything between scheduling and cancellation loses the SSH
# connection (the new rules killed it, the host panicked, the
# network blipped), the timer fires and restores the
# previous-known-good ruleset.
# Gated on nftables.service already being active AND a pre-reload
# snapshot already existing — first install has no working ruleset
# to revert TO, so the safety net is degraded by design until the
# post-reload snapshot below seeds it for the next run.
#
# check_mode: false forces a real probe even in --check; otherwise
# command{} reports "would have run" with rc=0 in the register and
# the gates below trust a fabricated state.
- name: Check if nftables.service is currently active (gates auto-revert)
  command: systemctl is-active nftables.service
  register: firewall_nftables_pre_active
  changed_when: false
  failed_when: false
  check_mode: false
  become: true
  tags:
    - firewall

- name: Stat prior pre-reload snapshot (gates auto-revert scheduling)
  stat:
    path: /etc/nftables.conf.pre-reload
  register: firewall_pre_reload_snapshot
  become: true
  tags:
    - firewall

# `nft -c -f %s` validates the assembled ruleset before it ever
# touches the kernel — a real correctness improvement over
# iptables-restore, which had no equivalent dry-run path used by the
# old role. Skipped on the same-run-as-install check-mode branch
# (nftables apt install reports changed but didn't actually run, so
# nft isn't on disk yet to validate with).
- name: Configure nftables ruleset
  when: not (ansible_check_mode and firewall_apt_nftables.changed)
  template:
    src: nftables.conf.j2
    dest: /etc/nftables.conf
    owner: root
    group: root
    mode: "0644"
    backup: true
    validate: "nft -c -f %s"
  register: firewall_ruleset
  become: true
  tags:
    - firewall

# Pre-emptively stop ufw.service before nftables.service starts.
# Vanilla Ubuntu cloud images / server ISOs ship ufw enabled and
# both services register INPUT-hook chains in the kernel netfilter
# table — they can briefly coexist until the apt-purge below, but
# that window has two firewalls fighting over the same packets with
# different priorities. Stopping ufw first closes the window.
# Gated on the unit existing (stat the package install path), so
# re-converge after the purge silently skips.
- name: Stat ufw.service unit file
  stat:
    path: /lib/systemd/system/ufw.service
  register: firewall_ufw_unit
  tags:
    - firewall

- name: Stop ufw.service before nftables takes over the INPUT hook
  when: firewall_ufw_unit.stat.exists
  systemd:
    name: ufw.service
    state: stopped
  become: true
  tags:
    - firewall

# Schedule the auto-revert. The pre-stop / reset-failed dance
# idempotently clears any leftover unit from a prior interrupted
# run so the --unit name is free for systemd-run. shell{} (not
# command{}) because we chain three commands.
- name: Schedule auto-revert timer (60s — cancelled on successful reload)
  when:
    - firewall_nftables_pre_active.rc == 0
    - firewall_ruleset.changed
    - firewall_pre_reload_snapshot.stat.exists
  shell: |
    set -euo pipefail
    systemctl stop firewall_emergency_revert.timer 2>/dev/null || true
    systemctl reset-failed firewall_emergency_revert.timer firewall_emergency_revert.service 2>/dev/null || true
    systemd-run --unit firewall_emergency_revert --on-active=60 /usr/sbin/nft -f /etc/nftables.conf.pre-reload
  args: { executable: /bin/bash }
  changed_when: true
  become: true
  tags:
    - firewall

# Apply ruleset + service lifecycle via the systemd_unit helper. The
# ExecReload drop-in installed above maps `state: reloaded` to atomic
# `nft -f` (per-table flush+rebuild inside the file replaces only our
# table; netavark / libvirt / fail2ban tables in iptables-nft compat
# are untouched). First converge: start fires ExecStart which loads
# the ruleset, reload is skipped because start already changed state.
# Re-converge with template or drop-in change: start is a no-op,
# reload fires ExecReload — no stop/start window. The condition skips
# check-mode runs where the apt install reported changed but didn't
# actually run (nft isn't on disk yet for the unit's ExecStart).
- name: Apply nftables.service ruleset and lifecycle
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: nftables
      condition: "{{ not (ansible_check_mode and firewall_apt_nftables.changed) }}"
      reload: "{{ firewall_ruleset.changed or nftables_service_d_override_conf_result.changed }}"
  tags:
    - firewall

# Cancel the auto-revert. The reload completed and ansible can still
# reach the host. If we never get here (reload broke SSH, role
# errored, network blip), the systemd-run timer fires in 60s and
# restores /etc/nftables.conf.pre-reload via `nft -f`.
- name: Cancel auto-revert timer (post-reload alive)
  when:
    - firewall_nftables_pre_active.rc == 0
    - firewall_ruleset.changed
    - firewall_pre_reload_snapshot.stat.exists
  shell: |
    set -euo pipefail
    systemctl stop firewall_emergency_revert.timer 2>/dev/null || true
    systemctl reset-failed firewall_emergency_revert.timer firewall_emergency_revert.service 2>/dev/null || true
  args: { executable: /bin/bash }
  changed_when: true
  become: true
  tags:
    - firewall

# Promote the now-confirmed-good live ruleset into the pre-reload
# snapshot so the NEXT apply has a rollback target. Snapshotting
# *before* the reload (the previous shape) drifts every rerun: after
# apply N writes live=X', pre-reload still holds the X from before
# apply N -- the idempotence stat sees them differ and copies again,
# reporting changed=true on a clean rerun. Post-reload snapshotting
# converges in one step: after a successful reload, live == pre-reload.
# remote_src copy is gated by an explicit stat-checksum compare
# because remote_src misreports changed=true on byte-identical
# src/dest under mitogen (lab-only, reproducible).
- name: Stat live + pre-reload for post-reload snapshot
  stat:
    path: "{{ item }}"
    checksum_algorithm: sha256
  loop:
    - /etc/nftables.conf
    - /etc/nftables.conf.pre-reload
  register: firewall_post_reload_stats
  become: true
  tags:
    - firewall

# Source-exists gate covers the same-run-as-install check-mode branch
# (apt reported changed but didn't install, so /etc/nftables.conf
# isn't on disk yet to snapshot).
- name: Snapshot post-reload ruleset for next run's auto-revert
  when:
    - firewall_post_reload_stats.results[0].stat.exists
    - >-
      not firewall_post_reload_stats.results[1].stat.exists
      or firewall_post_reload_stats.results[0].stat.checksum
         != firewall_post_reload_stats.results[1].stat.checksum
  copy:
    src: /etc/nftables.conf
    dest: /etc/nftables.conf.pre-reload
    remote_src: true
    mode: "0644"
  become: true
  tags:
    - firewall

# Dynamically attach wg0 to the homelab `bulk` flowtable. Kept out of
# the static `devices = { ... }` clause in nftables.conf so the firewall
# can come up at boot before wg-quick@wg0 brings the iface up (nft
# errors out with ENOENT when a flowtable device doesn't exist yet,
# which previously left the host without a firewall on every boot until
# manual restart). The unit's lifecycle is bound to wg-quick@wg0 via
# WantedBy/PartOf, and nftables.service's ExecReload drop-in re-runs it
# after a reload wipes the runtime flowtable. See the unit-file header
# for the BindsTo-vs-WantedBy rationale.
- name: Install wg0_flowtable.service
  import_role:
    name: systemd_unit
    tasks_from: install
  vars:
    systemd_unit_args:
      src: wg0_flowtable.service
  tags:
    - firewall

- name: Apply wg0_flowtable.service lifecycle
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: wg0_flowtable.service
      # Skip the systemctl enable/start when the install above only
      # would-changed in check mode -- otherwise the enable errors
      # with "Could not find the requested service wg0_flowtable".
      condition: "{{ not (ansible_check_mode and (wg0_flowtable_service_result.changed | default(false))) }}"
      restart: "{{ wg0_flowtable_service_result.changed | default(false) }}"
  tags:
    - firewall

# Enforce the "host is never without a firewall" invariant: refuse to
# purge ufw or remove iptables-nft unless nftables.service is actually
# active. Without this gate, a future tag-limited or check-mode run
# that skips the service-start step would still purge ufw, leaving a
# window with no host firewall. `systemctl is-active` returns rc=0
# when active (running or, for oneshot, exited after success);
# service_facts can't be used here because it maps Type=oneshot
# +RemainAfterExit=yes units (which nftables.service is) to
# state: stopped regardless of actual liveness.
- name: Confirm nftables.service is active before removing ufw/iptables
  command: systemctl is-active nftables.service
  register: firewall_nftables_active
  changed_when: false
  failed_when: >-
    not ansible_check_mode and firewall_nftables_active.rc != 0
  become: true
  tags:
    - firewall

# Vanilla Ubuntu cloud images / server ISOs ship ufw enabled with
# its own iptables ruleset; we replace it with the nftables config
# above. Purge here (after nftables is up) rather than in roles/
# cleanup so the host is never without a firewall — cleanup runs
# ~19 roles before this one, and removing ufw there would leave a
# window with no host firewall during first-boot bootstrap.
- name: Purge ufw (superseded by nftables)
  apt:
    pkg:
      - ufw
    state: absent
    autoremove: true
    purge: true
  become: true
  tags:
    - firewall

# On resolute+ the compat layer has no users — drop the package so
# `iptables -L` doesn't quietly resurrect empty `ip filter` chains
# (and so an operator looking for the ruleset doesn't get a confusing
# half-answer). apt resolves dependents; if anything still hard-
# Depends on iptables on a future release, this fails loudly.
- name: Remove iptables-nft compat layer (resolute+)
  when: ansible_distribution_release not in ["jammy", "noble"]
  apt:
    pkg:
      - iptables
    state: absent
  become: true
  tags:
    - firewall
