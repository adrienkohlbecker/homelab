- name: Install nftables
  apt:
    pkg:
      - nftables
    cache_valid_time: 3600
  register: firewall_apt_nftables
  become: true
  tags:
    - firewall

# Stock nftables.service ships `ExecStop=/usr/sbin/nft flush ruleset`,
# which would tear down netavark / fail2ban / libvirt tables in the
# same kernel ruleset on any `systemctl stop` or `restart`. Scope the
# stop to our own table.
- name: Install nftables.service ExecStop drop-in
  import_role:
    name: systemd_unit
    tasks_from: dropin
  vars:
    systemd_unit_args:
      src: override_nftables.conf
      for: nftables.service
  tags:
    - firewall

# Pin nf_conntrack at boot so /proc/sys/net/netfilter/nf_conntrack_*
# is populated before systemd-sysctl reads /etc/sysctl.d/. Deliberately
# not modprobed mid-run: loading conntrack on a live host classifies
# every existing TCP connection (no state, no SYN history) as INVALID
# under loose=0 — our `ct state invalid drop` rule then kills SSH
# along with everything else. Settings take effect at next reboot;
# until then the nftables non-SYN drop rules are the only protection.
- name: Pin nf_conntrack at boot
  copy:
    src: modules-load.conf
    dest: /etc/modules-load.d/30-firewall-hardening.conf
    owner: root
    group: root
    mode: "0644"
    backup: true
  become: true
  tags:
    - firewall

# Network-stack hardening (IPv6-disable + ipv4 hardening) lives in
# files/sysctl-hardening.conf. One artifact, one reload — the file
# header documents each setting's rationale.
- name: Install network-stack hardening sysctls
  copy:
    src: sysctl-hardening.conf
    dest: /etc/sysctl.d/30-firewall-hardening.conf
    owner: root
    group: root
    mode: "0644"
    backup: true
  register: firewall_sysctl
  become: true
  tags:
    - firewall

# -e (--ignore) skips keys whose /proc path doesn't exist yet — the
# nf_conntrack_* keys aren't writable until the module loads. On
# subsequent runs (after a reboot has loaded the module via
# modules-load.d), the keys are applied normally.
- name: Apply hardening sysctls
  when: firewall_sysctl.changed
  command: sysctl -e -p /etc/sysctl.d/30-firewall-hardening.conf
  changed_when: true
  become: true
  tags:
    - firewall

# Signal site.yml's tail reboot block when the sysctl file changed
# but nf_conntrack isn't loaded yet — that's the only case where a
# key in the file (nf_conntrack_tcp_loose) can't take effect live.
# After the resulting reboot, modules-load.d loads conntrack and
# systemd-sysctl writes the desired value at boot. Subsequent runs
# (module persistent) reapply via `sysctl -e -p` without needing
# another reboot.
- name: Check whether nf_conntrack is loaded (gates reboot signal)
  stat:
    path: /sys/module/nf_conntrack
  register: firewall_nf_conntrack_loaded
  tags:
    - firewall

- name: Signal reboot required (conntrack sysctls deferred to boot)
  when:
    - firewall_sysctl.changed
    - not firewall_nf_conntrack_loaded.stat.exists
  copy:
    dest: /var/run/reboot-required
    content: |
      *** System restart required ***
    owner: root
    group: root
    mode: "0644"
    force: false
  become: true
  tags:
    - firewall

# `nft -c -f %s` validates the assembled ruleset before it ever
# touches the kernel — a real correctness improvement over
# iptables-restore, which had no equivalent dry-run path used by the
# old role. Skipped on the same-run-as-install check-mode branch
# (nftables apt install reports changed but didn't actually run, so
# nft isn't on disk yet to validate with).
- name: Configure nftables ruleset
  when: not (ansible_check_mode and firewall_apt_nftables.changed)
  template:
    src: nftables.conf.j2
    dest: /etc/nftables.conf
    owner: root
    group: root
    mode: "0644"
    backup: true
    validate: "nft -c -f %s"
  register: firewall_ruleset
  become: true
  tags:
    - firewall

# `nft -f` is per-table atomic: the `flush table ip homelab` +
# rebuild inside the file replaces only our table. netavark /
# libvirt / fail2ban tables (in iptables-nft compat) are untouched.
# No more reload-cascade for those integrations.
- name: Apply nftables ruleset
  when: firewall_ruleset.changed and not (ansible_check_mode and firewall_apt_nftables.changed)
  command: nft -f /etc/nftables.conf
  changed_when: true
  become: true
  tags:
    - firewall

- name: Enable nftables.service
  when: not (ansible_check_mode and firewall_apt_nftables.changed)
  systemd:
    name: nftables.service
    enabled: true
    state: started
  become: true
  tags:
    - firewall

# Vanilla Ubuntu cloud images / server ISOs ship ufw enabled with
# its own iptables ruleset; we replace it with the nftables config
# above. Purge here (after nftables is up) rather than in roles/
# cleanup so the host is never without a firewall — cleanup runs
# ~19 roles before this one, and removing ufw there would leave a
# window with no host firewall during first-boot bootstrap.
- name: Purge ufw (superseded by nftables)
  apt:
    pkg:
      - ufw
    state: absent
    autoremove: true
    purge: true
  become: true
  tags:
    - firewall

# On resolute+ the compat layer has no users — drop the package so
# `iptables -L` doesn't quietly resurrect empty `ip filter` chains
# (and so an operator looking for the ruleset doesn't get a confusing
# half-answer). apt resolves dependents; if anything still hard-
# Depends on iptables on a future release, this fails loudly.
- name: Remove iptables-nft compat layer (resolute+)
  when: ansible_distribution_release not in ["jammy", "noble"]
  apt:
    pkg:
      - iptables
    state: absent
  become: true
  tags:
    - firewall
