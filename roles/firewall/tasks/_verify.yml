# Functional firewall verification — every probe exercises live
# netfilter behaviour. Test scaffolding (podman, listeners, multi-IP
# netns) lives here rather than in _setup.yml because _setup is
# reserved for genuine role dependencies — none of this is needed for
# the firewall role itself to converge.
#
# Probe topology:
#   extns netns ─ veth_ext ── wg0* (192.0.2.1) ─ root netns (the VM)
#
# The rig carrier subnet is TEST-NET-1 (192.0.2.0/24, RFC 5737):
# reserved address space that can never collide with a real route on
# the fixture. Any RFC1918 pick risks shadowing — an earlier
# 10.99.0.0/24 rig broke on EC2 cells whose VPC subnet was exactly
# that /24 (the ENI's subnet route hijacked the probe replies).
#
# extns starts with only the non-scope primary (192.0.2.2/24) on
# veth_ext. The four representative-subnet sources are bound per
# probe-group in _verify_input.yml via `ip -n extns addr replace
# probe_X/32 …` tasks so each group's source is visible at its call
# site rather than preconfigured. /32 host routes back via wg0 are
# declared once at netns setup (idempotent, and replies still need
# to land on wg0 regardless of which source is active). Aliases
# derived from group_vars via ipmath(250) — offset 250 keeps each
# address outside netavark's bottom-up auto-allocation range while
# staying inside the subnet (assumes /24-or-bigger; smaller prefixes
# overflow silently).
#
#   192.0.2.2                          non-scope source (primary)
#   site_subnets.home  + .250 offset   physical home LAN source
#   wireguard_subnet   + .250 offset   wireguard client source
#   podman_default_network + .250      container source (DNS rule probes)
#   podman_bridge_pool     + .250      non-default-bridge container source
#
# *The veth is named wg0 deliberately so traffic from extns enters
# the root netns's INPUT/FORWARD chains as if it arrived on the real
# wireguard interface — exercising rules that key on -i wg0.
- name: _verify | Derive probe source IPs from subnet vars
  set_fact:
    _firewall_probe_home: "{{ site_subnets.home | ansible.utils.ipmath(250) }}"
    _firewall_probe_wg: "{{ wireguard_subnet | ansible.utils.ipmath(250) }}"
    _firewall_probe_podman: "{{ podman_default_network | ansible.utils.ipmath(250) }}"
    _firewall_probe_podman_pool: "{{ podman_bridge_pool | ansible.utils.ipmath(250) }}"
    # Non-scope source: in-subnet on the netns veth (192.0.2.0/24, see
    # the topology header above) but outside any allowlisted saddr —
    # used by the OOS negative probes (samba, nut, mosh).
    _firewall_probe_nonscope: 192.0.2.2
    # Container target for crafted-packet probes — an unused IP in
    # podman_default_network; not a real container, just a destination
    # the FORWARD chain's iif=wg0/oif=podman0 path resolves to.
    _firewall_probe_container_dest: "{{ podman_default_network | ansible.utils.ipmath(2) }}"

- name: _verify | Set up netns/veth test rig
  import_tasks: _verify_rig.yml
- name: _verify | Run INPUT chain probes
  import_tasks: _verify_input.yml
- name: _verify | Run FORWARD chain probes
  import_tasks: _verify_forward.yml
- name: _verify | Run drop-path probes
  import_tasks: _verify_drops.yml
- name: _verify | Assert nftables counters
  import_tasks: _verify_counters.yml
- name: _verify | Run lifecycle (stop/start) probes
  import_tasks: _verify_lifecycle.yml
