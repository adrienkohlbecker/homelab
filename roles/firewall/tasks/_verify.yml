# Functional firewall verification — every probe exercises live
# netfilter behaviour. Test scaffolding (podman, listeners, multi-IP
# netns) lives here rather than in _setup.yml because _setup is
# reserved for genuine role dependencies — none of this is needed for
# the firewall role itself to converge.
#
# Probe topology:
#   extns netns ─ veth_ext ── wg0* (10.99.0.1) ─ root netns (the VM)
#
# extns is set up with multiple source aliases so we can probe each
# scoped INPUT rule from a representative source. Specific /32 host
# routes back to those aliases go via wg0; we avoid broader subnet
# routes that would collide with podman0's real container network.
# Aliases derived from group_vars via ipmath(250) — picking offset
# 250 keeps the address comfortably outside netavark's bottom-up
# auto-allocation range while staying within the subnet.
#
#   10.99.0.2                          non-scope source (catch-all reject)
#   site_subnets.home  + .250 offset   physical home LAN source
#   wireguard_subnet   + .250 offset   wireguard client source
#   podman_default_network + .250      container source (DNS rule probes)
#   podman_bridge_pool     + .250      non-default-bridge container source
#
# *The veth is named wg0 deliberately so traffic from extns enters
# the root netns's INPUT/FORWARD chains as if it arrived on the real
# wireguard interface — exercising rules that key on -i wg0.
- name: _verify | Derive probe source IPs from subnet vars
  set_fact:
    probe_home: "{{ site_subnets.home | ansible.utils.ipmath(250) }}"
    probe_wg: "{{ wireguard_subnet | ansible.utils.ipmath(250) }}"
    probe_podman: "{{ podman_default_network | ansible.utils.ipmath(250) }}"
    probe_podman_pool: "{{ podman_bridge_pool | ansible.utils.ipmath(250) }}"
    # Non-scope source: in-subnet on the netns veth (10.99.0.0/24, see
    # the topology header above) but outside any allowlisted saddr —
    # used by the OOS negative probes (samba, nut, mosh, dnscrypt).
    probe_nonscope: 10.99.0.2
    # Container target for crafted-packet probes — an unused IP in
    # podman_default_network; not a real container, just a destination
    # the FORWARD chain's iif=wg0/oif=podman0 path resolves to.
    probe_container_dest: "{{ podman_default_network | ansible.utils.ipmath(2) }}"

# Guard the harness against a future site-subnet shrink: ipmath(250)
# silently overflows the subnet if the prefix is too narrow, and the
# /32 host routes would then alias another subnet — every probe would
# fail with confusing rejects rather than a clean "test rig outgrew
# its addressing" error.
- name: _verify | Assert probe addresses are in-prefix and pairwise distinct
  assert:
    # network_in_network(value, test) — `value` is the outer network,
    # `test` is the address being tested. Pipe the subnet so the IP
    # is the argument; otherwise the semantics invert.
    that:
      - site_subnets.home | ansible.utils.network_in_network(probe_home)
      - wireguard_subnet | ansible.utils.network_in_network(probe_wg)
      - podman_default_network | ansible.utils.network_in_network(probe_podman)
      - podman_bridge_pool | ansible.utils.network_in_network(probe_podman_pool)
      - ([probe_home, probe_wg, probe_podman, probe_podman_pool] | unique | length) == 4
    fail_msg: >-
      Probe address ipmath(250) overflowed its subnet OR collided with
      another subnet. The harness assumes /24-or-bigger subnets and no
      overlap between site_subnets.home / wireguard_subnet /
      podman_default_network / podman_bridge_pool.

- name: _verify | Install probe-only deps
  apt:
    name:
      - python3
      - iproute2
      - curl
      - iputils-ping
      - socat        # UDP echo listeners (5053 / 5333 / 5353)
      - hping3       # crafted TCP-ACK probes for `! --syn` rules
    cache_valid_time: 3600
  become: true

- name: _verify | Pull tiny test image
  command: podman pull docker.io/library/busybox
  register: firewall_verify_pull
  changed_when: "'Storing signatures' in firewall_verify_pull.stdout or 'Writing manifest' in firewall_verify_pull.stdout"
  become: true

# Publish 32400:32400 — port is arbitrary; the FORWARD rule scopes by
# --ctstate DNAT, not by dport. Run busybox httpd on 32400 inside the
# container to serve a tiny known-content page the probe can grep for.
# --cap-add=NET_RAW restores the capability podman 5.x dropped from
# default_capabilities — the container-egress probe below uses busybox
# ping (SOCK_RAW), which fails with "permission denied" without it.
- name: _verify | Run busybox httpd test container with --publish on 32400
  command: >
    podman run -d --replace --name firewall_verify_httpd
      --publish 0.0.0.0:32400:32400
      --cap-add=NET_RAW
      docker.io/library/busybox
      sh -c 'mkdir -p /www && echo firewall-verify-ok > /www/index.html && exec httpd -f -p 32400 -h /www'
  changed_when: true
  become: true

# TCP listeners aren't bound for INPUT probes any more — every TCP
# accept rule carries a named counter and the assertion block at the
# end of _verify checks each counter incremented (positive cases) or
# stayed at 0 (negative cases). Without a listener, a positive probe
# gets RST from the kernel and curl exits non-zero; we drive that via
# `failed_when: false` because the load-bearing signal is the counter,
# not the rc. Trade-off: per-probe granularity is lost (multiple
# positives merge into a single >= 1 assertion), and a regression that
# breaks just one of N positive paths won't surface as long as another
# still fires the same counter. The busybox httpd above stays because
# the DNAT body-grep probe asserts the response payload, which a
# counter alone cannot prove.

# Multi-aliased extns netns + matching host /32 routes. The aliases
# let curl/nc source-bind from each representative subnet without
# spinning up four separate netns. /32 host routes ensure replies
# return via wg0 without colliding with podman0's 10.88.0.0/16 route.
- name: _verify | Create probe netns with multi-source aliases
  shell: |
    set -euo pipefail
    # Add-or-verify: succeeds if the netns is freshly added OR
    # already present. A real failure (e.g. kernel netns support
    # missing) bubbles up instead of being swallowed by `|| true`.
    ip netns add extns 2>/dev/null || [ -d /var/run/netns/extns ]
    if ! ip link show wg0 >/dev/null 2>&1; then
      ip link add wg0 type veth peer name veth_ext
      ip link set veth_ext netns extns
    fi
    ip addr replace 10.99.0.1/24 dev wg0
    ip link set wg0 up
    ip -n extns addr replace {{ probe_nonscope }}/24 dev veth_ext
    ip -n extns addr replace {{ probe_home }}/32 dev veth_ext
    ip -n extns addr replace {{ probe_wg }}/32 dev veth_ext
    ip -n extns addr replace {{ probe_podman }}/32 dev veth_ext
    ip -n extns addr replace {{ probe_podman_pool }}/32 dev veth_ext
    ip -n extns link set veth_ext up
    ip -n extns link set lo up
    ip -n extns route replace default via 10.99.0.1
    ip route replace {{ probe_home }}/32 dev wg0
    ip route replace {{ probe_wg }}/32 dev wg0
    ip route replace {{ probe_podman }}/32 dev wg0
    ip route replace {{ probe_podman_pool }}/32 dev wg0
  args:
    executable: /bin/bash
  changed_when: true
  become: true

- name: _verify | Wait for httpd container
  wait_for: { host: 127.0.0.1, port: 32400, timeout: 30 }
  become: true

# --- Functional probes ------------------------------------------------

# Unscoped INPUT allow / catch-all reject — baseline coverage.
- name: _verify | INPUT allow — port 80 reachable from extns (unscoped)
  command: ip netns exec extns curl --connect-timeout 3 --max-time 5 -sf http://10.99.0.1:80/
  changed_when: false
  failed_when: false
  become: true

- name: _verify | INPUT deny — port 18080 (no rule, no listener) hits catch-all
  command: ip netns exec extns curl --connect-timeout 3 --max-time 5 -sf http://10.99.0.1:18080/
  changed_when: false
  failed_when: false
  become: true

- name: _verify | INPUT allow — port 443 reachable from extns (unscoped)
  command: ip netns exec extns curl --connect-timeout 3 --max-time 5 -sf http://10.99.0.1:443/
  changed_when: false
  failed_when: false
  become: true

# Loopback accept (`iif lo accept`). No listener on :80 — the rule
# fires (counter `input_loopback` increments) before the kernel
# decides there's nowhere to deliver the SYN. A regression that
# breaks the iif=lo rule diverts the packet to the catch-all chain;
# the counter assertion at the end of _verify catches that.
- name: _verify | INPUT allow — iif lo (loopback 127.0.0.1:80 from host)
  command: curl --connect-timeout 3 --max-time 5 -sf http://127.0.0.1:80/
  changed_when: false
  failed_when: false
  become: true

# SSH (22/tcp) is in the unscoped `tcp dport { 22, 80, 443 } accept`
# set. The harness's own ansible connection is over WAN-side slirp
# hostfwd, so a regression that scopes 22 to @lan_admin_ifaces would
# still pass via the test rig's enp0s2 — probe from extns to lock in
# the unscoped contract on top of that. bash /dev/tcp opens a raw TCP
# connection; rc=0 means the SYN-ACK landed, rc!=0 means the catch-all
# fired.
- name: _verify | INPUT allow — SSH (22/tcp) reachable from extns (unscoped)
  shell: ip netns exec extns timeout 3 bash -c "exec 3<>/dev/tcp/10.99.0.1/22"
  args: { executable: /bin/bash }
  changed_when: false
  become: true

# Reset counters before the UDP probe sweep below (and the crafted-
# packet probes further down). Each UDP-accept rule has a named
# counter; the probes below send single packets and the assertion
# block at the end of _verify checks each counter incremented (or
# stayed at 0 for negative cases). This replaces the older
# `nc -u | grep -q pong` round-trip pattern which was timing-flaky
# under load (2-second deadlines, per-packet socat shell fork) and
# could only signal accept-or-reject without seeing which rule fired.
- name: _verify | Reset nftables counters before UDP and crafted-packet probes
  command: nft reset counters table ip homelab
  changed_when: false
  become: true

# Wireguard 51820 is scoped to -i WAN. Two probes — positive via
# the controller-side UDP hostfwd (slirp ingresses on enp0s2, which
# is the WAN iface in the test VM) and negative from the netns where
# traffic always ingresses on wg0.
- name: _verify | INPUT allow — wireguard (51820/udp) reachable on WAN iface from controller
  delegate_to: localhost
  shell: |
    echo . | nc -u -w 1 127.0.0.1 {{ wan_udp_test_port }} >/dev/null 2>&1 || true
  args: { executable: /bin/bash }
  changed_when: false

- name: _verify | INPUT — wireguard (51820/udp) rejected when ingressing on wg0
  shell: |
    echo . | ip netns exec extns socat -u STDIN UDP-SENDTO:10.99.0.1:51820,bind={{ probe_nonscope }}
  args: { executable: /bin/bash }
  changed_when: false
  become: true

# Transmission BT peer port is WAN-only (iif=$WAN_IFACE). Positive
# WAN ingress would need a slirp hostfwd extension to forward another
# pair of test ports — out of scope here. Probe the iif scope by
# confirming wg0 ingress is rejected, which catches a regression that
# drops the iif scope and exposes 51413 to wg peers.
- name: _verify | INPUT — transmission (51413/tcp) rejected on wg0 ingress (iif scope)
  command: ip netns exec extns curl --connect-timeout 3 --max-time 5 -sf http://10.99.0.1:51413/
  changed_when: false
  failed_when: false
  become: true

# Admin services (mosh/samba/nut/NetBIOS) use the concatenated set
# lan_admin_pairs to require an (iif, saddr) *intersection* — wg0 only
# accepts $WG_SUBNET saddrs, $WAN_IFACE only accepts $HOME_LAN. The
# rig ingresses everything on wg0, so:
#   - probe_wg (in $WG_SUBNET) is the positive case.
#   - probe_home (in $HOME_LAN) is now a NEGATIVE case here — wrong
#     iif for its saddr. The wg0+HOME_LAN path was accepted under the
#     prior union semantics; a regression back to union would let
#     this probe through.
#   - probe_nonscope (in neither subnet) — still negative.
# The $WAN_IFACE+$HOME_LAN positive half can't be probed in this rig
# (slirp doesn't preserve source IP), so half of each rule's contract
# is asserted via JSON shape only (see notes/ for the rig limits).
- name: _verify | INPUT — mosh (60000/udp) reachable from wireguard source
  shell: |
    echo . | ip netns exec extns socat -u STDIN UDP-SENDTO:10.99.0.1:60000,bind={{ probe_wg }}
  args: { executable: /bin/bash }
  changed_when: false
  become: true

- name: _verify | INPUT — mosh (60000/udp) rejected from home_LAN source via wg0 (iif/saddr mismatch)
  shell: |
    echo . | ip netns exec extns socat -u STDIN UDP-SENDTO:10.99.0.1:60000,bind={{ probe_home }}
  args: { executable: /bin/bash }
  changed_when: false
  become: true

- name: _verify | INPUT — mosh (60000/udp) rejected from non-scope source
  shell: |
    echo . | ip netns exec extns socat -u STDIN UDP-SENDTO:10.99.0.1:60000,bind={{ probe_nonscope }}
  args: { executable: /bin/bash }
  changed_when: false
  become: true

- name: _verify | INPUT — Samba (445/tcp) reachable from wireguard source
  command: >
    ip netns exec extns curl --interface {{ probe_wg }}
      --connect-timeout 3 --max-time 5 -sf http://10.99.0.1:445/
  changed_when: false
  failed_when: false
  become: true

- name: _verify | INPUT — Samba (445/tcp) rejected from home_LAN source via wg0 (iif/saddr mismatch)
  command: >
    ip netns exec extns curl --interface {{ probe_home }}
      --connect-timeout 3 --max-time 5 -sf http://10.99.0.1:445/
  changed_when: false
  failed_when: false
  become: true

- name: _verify | INPUT — Samba (445/tcp) rejected from non-scope source
  command: >
    ip netns exec extns curl --interface {{ probe_nonscope }}
      --connect-timeout 3 --max-time 5 -sf http://10.99.0.1:445/
  changed_when: false
  failed_when: false
  become: true

- name: _verify | INPUT — nut (3493/tcp) reachable from wireguard source
  command: >
    ip netns exec extns curl --interface {{ probe_wg }}
      --connect-timeout 3 --max-time 5 -sf http://10.99.0.1:{{ service_ports.nut }}/
  changed_when: false
  failed_when: false
  become: true

- name: _verify | INPUT — nut (3493/tcp) rejected from home_LAN source via wg0 (iif/saddr mismatch)
  command: >
    ip netns exec extns curl --interface {{ probe_home }}
      --connect-timeout 3 --max-time 5 -sf http://10.99.0.1:{{ service_ports.nut }}/
  changed_when: false
  failed_when: false
  become: true

- name: _verify | INPUT — nut (3493/tcp) rejected from non-scope source
  command: >
    ip netns exec extns curl --interface {{ probe_nonscope }}
      --connect-timeout 3 --max-time 5 -sf http://10.99.0.1:{{ service_ports.nut }}/
  changed_when: false
  failed_when: false
  become: true

# Separate rule: containers on any podman bridge can reach nut (HA's
# NUT integration connects from its bridge). Sourced from
# probe_podman_pool which sits in podman_bridge_pool — matches the
# `ip saddr $PODMAN_POOL tcp dport 3493 accept` rule.
- name: _verify | INPUT — nut (3493/tcp) reachable from podman_bridge_pool source
  command: >
    ip netns exec extns curl --interface {{ probe_podman_pool }}
      --connect-timeout 3 --max-time 5 -sf http://10.99.0.1:3493/
  changed_when: false
  failed_when: false
  become: true

# NetBIOS uses the same lan_admin_pairs (iif, saddr) intersection.
# Positive case from wg-source via wg0; the home_LAN-via-wg0 mismatch
# is structurally identical and already covered by the Samba probes.
- name: _verify | INPUT — NetBIOS (137/udp) reachable from wireguard source
  shell: |
    echo . | ip netns exec extns socat -u STDIN UDP-SENDTO:10.99.0.1:137,bind={{ probe_wg }}
  args: { executable: /bin/bash }
  changed_when: false
  become: true

# Source-scoped UDP: container DNS (5053/5333) and home-LAN mDNS (5353).
# socat sends a single UDP packet source-bound to the requested
# alias; assertion is via the rule's named counter in the block below.
- name: _verify | INPUT — dnscrypt (5053/udp) reachable from container source
  shell: |
    echo . | ip netns exec extns socat -u STDIN UDP-SENDTO:10.99.0.1:{{ service_ports.dnscrypt_proxy }},bind={{ probe_podman }}
  args: { executable: /bin/bash }
  changed_when: false
  become: true

- name: _verify | INPUT — dnscrypt (5053/udp) rejected from non-scope source
  shell: |
    echo . | ip netns exec extns socat -u STDIN UDP-SENDTO:10.99.0.1:{{ service_ports.dnscrypt_proxy }},bind={{ probe_nonscope }}
  args: { executable: /bin/bash }
  changed_when: false
  become: true

# Same rule accepts TCP alongside UDP on the dnscrypt port — pihole
# falls back to TCP opportunistically when a UDP response would be
# truncated. Probe the TCP path to lock in the `meta l4proto { tcp,
# udp }` scope; a regression to UDP-only would silently bring back
# the ~2 TCP drops/day the rule was added to fix.
- name: _verify | INPUT — dnscrypt (5053/tcp) reachable from container source
  command: >
    ip netns exec extns curl --interface {{ probe_podman }}
      --connect-timeout 3 --max-time 5 -sf http://10.99.0.1:{{ service_ports.dnscrypt_proxy }}/
  changed_when: false
  failed_when: false
  become: true

- name: _verify | INPUT — aardvark-dns (5333/udp) reachable from default-bridge source
  shell: |
    echo . | ip netns exec extns socat -u STDIN UDP-SENDTO:10.99.0.1:5333,bind={{ probe_podman }}
  args: { executable: /bin/bash }
  changed_when: false
  become: true

# Regression probe for the cross-bridge case: aardvark-dns binds the
# gateway IP of every dns-enabled named bridge (mosquitto, redis, …),
# all carved out of netavark's 10.89.0.0/16 default_subnet_pools[0]
# base. A previous saddr-scoped rule covered only podman_default_network
# and the catch-all UDP reject killed every cross-bridge container-name
# lookup (paperless → redis, z2m → mosquitto) before aardvark saw it.
- name: _verify | INPUT — aardvark-dns (5333/udp) reachable from non-default-bridge source
  shell: |
    echo . | ip netns exec extns socat -u STDIN UDP-SENDTO:10.99.0.1:5333,bind={{ probe_podman_pool }}
  args: { executable: /bin/bash }
  changed_when: false
  become: true

# mDNS positive case isn't probable in the rig — the rule requires
# iif=$WAN_IFACE + saddr=$HOME_LAN simultaneously, but slirp doesn't
# preserve saddr on $WAN_IFACE ingress and extns ingresses on wg0.
# Instead probe both negative dimensions: (a) home-LAN saddr arriving
# on wg0 is rejected by the iif scope, (b) wg-saddr is rejected by the
# saddr scope. Together they pin down both halves of the rule.
- name: _verify | INPUT — mDNS (5353/udp) sent from home_LAN saddr via wg0 (iif scope rejects)
  shell: |
    echo . | ip netns exec extns socat -u STDIN UDP-SENDTO:10.99.0.1:5353,bind={{ probe_home }}
  args: { executable: /bin/bash }
  changed_when: false
  become: true

- name: _verify | INPUT — mDNS (5353/udp) sent from wg saddr (saddr scope rejects)
  shell: |
    echo . | ip netns exec extns socat -u STDIN UDP-SENDTO:10.99.0.1:5353,bind={{ probe_wg }}
  args: { executable: /bin/bash }
  changed_when: false
  become: true

# VRRP (proto 112) scoping is asserted statically because slirp
# doesn't pass arbitrary L4 protocols, so a functional probe across
# the netns harness isn't feasible. Confirm the rendered rule still
# carries the iifname + protocol scope — guards against someone
# unscoping it back to `ip protocol vrrp accept`. JSON output is
# more stable than text against nft's canonicalization quirks
# (e.g. `ip protocol 112` ↔ `ip protocol vrrp`).
- name: _verify | INPUT — get nft ruleset (JSON, for VRRP scope check)
  command: nft -j list table ip homelab
  register: nft_ruleset_vrrp
  changed_when: false
  become: true

- name: _verify | INPUT — VRRP rule renders with iifname + protocol scope
  vars:
    # `selectattr('comment', 'defined')` is load-bearing on ansible-core 2.19+:
    # Jinja's `selectattr('comment', 'eq', X)` errors on items lacking the
    # attribute entirely, and the unannotated rules in this table (e.g.
    # established/related accept) don't carry a comment.
    nft_rules: "{{ (nft_ruleset_vrrp.stdout | from_json).nftables
                   | selectattr('rule', 'defined')
                   | map(attribute='rule')
                   | selectattr('comment', 'defined') | list }}"
    vrrp_matches: "{{ (nft_rules | selectattr('comment', 'eq', 'keepalived (VRRP, LAN unicast)') | first).expr
                      | selectattr('match', 'defined')
                      | map(attribute='match') | list }}"
  assert:
    that:
      - (vrrp_matches | selectattr('left.meta', 'defined') | selectattr('left.meta.key', 'eq', 'iifname') | map(attribute='right') | first) == default_interface
      - (vrrp_matches | selectattr('left.payload', 'defined') | selectattr('left.payload.field', 'eq', 'protocol') | map(attribute='right') | first) in ['vrrp', 112]
    fail_msg: >-
      VRRP rule by comment 'keepalived (VRRP, LAN unicast)' missing
      iifname={{ default_interface }} or protocol=vrrp scope.

# FORWARD/DNAT — published container reachable via wg0 ingress.
- name: _verify | FORWARD/DNAT — published 32400 reachable via wg0 ingress
  command: ip netns exec extns curl --connect-timeout 3 --max-time 5 -s http://10.99.0.1:32400/
  register: firewall_verify_container
  changed_when: false
  failed_when: firewall_verify_container.rc != 0 or 'firewall-verify-ok' not in firewall_verify_container.stdout
  become: true

# FORWARD/DNAT WAN-side counterpart — packet ingresses on enp0s2
# (the qemu slirp interface) via the controller-side hostfwd that
# the harness sets up in QemuMachine.prepare(). delegate_to: localhost
# runs the curl on the test runner, so the packet reaches the VM
# from "outside" exactly the way real WAN traffic does. Without the
# hostfwd this rule is unreachable from the netns harness.
- name: _verify | FORWARD/DNAT — published 32400 reachable from controller via WAN hostfwd
  delegate_to: localhost
  command: curl --connect-timeout 5 --max-time 10 -s http://127.0.0.1:{{ wan_tcp_test_port }}/
  register: firewall_verify_wan_container
  changed_when: false
  failed_when: firewall_verify_wan_container.rc != 0 or 'firewall-verify-ok' not in firewall_verify_wan_container.stdout

# FORWARD chain podman0→podman0 ct-status-dnat regression probe.
# This path broke during the nft migration: containers inheriting the
# host's resolv.conf (one-shot containers without --dns) ended up
# querying a VIP that PREROUTING DNATs back into the bridge — iif and
# oif both podman0. netavark's NETAVARK_FORWARD chain accepted, but
# our `ip homelab` forward chain had no matching rule and fell
# through to default DROP; multi-base-chain semantics drops the
# packet regardless. Re-fired the canonical case here by running a
# transient busybox on the same `podman` network and curling the
# bridge gateway IP — netavark's existing --publish 32400 rule
# DNATs that to the long-running httpd container, exercising exactly
# the iif=podman0/oif=podman0/ct-status-dnat path.
- name: _verify | FORWARD/DNAT — container → host bridge IP → DNAT'd to container on same bridge
  command: >
    podman run --rm --network podman docker.io/library/busybox
    wget -q -O - -T 5 http://10.88.0.1:32400/
  register: firewall_verify_container_to_vip
  changed_when: false
  failed_when: firewall_verify_container_to_vip.rc != 0 or 'firewall-verify-ok' not in firewall_verify_container_to_vip.stdout
  become: true

# Host egress smoke check — nftables has no `output` chain registered
# (default policy=accept) and no host-source MASQUERADE rule, so this
# just confirms egress isn't disrupted by the sysctls or by something
# else in our table. The container-source and wg-source MASQUERADE
# rules are exercised by the two POSTROUTING probes below.
- name: _verify | Egress — outbound HTTPS from host works
  uri:
    url: https://example.com/
    timeout: 10
    status_code: 200
  become: true

# Container-egress MASQUERADE — exercises -s podman_default_network
# -j MASQUERADE.
- name: _verify | POSTROUTING — container egress through MASQUERADE works
  command: podman exec firewall_verify_httpd wget -q -O- --timeout=10 https://example.com/
  changed_when: false
  become: true

# FORWARD "podman → external" rule deliberately covers every non-podman
# egress iface (WAN, home LAN, wg, libvirt, macvlan) — the container →
# example.com probe above exercises the WAN case; this one hits a
# non-WAN destination (extns over wg0) so a future tightening to WAN-
# only fails loudly. ICMP rather than HTTP because extns has no
# listener bound to its veth IP.
- name: _verify | FORWARD — container egress to non-WAN iface (wg0) reachable
  command: podman exec firewall_verify_httpd ping -c 1 -W 3 {{ probe_nonscope }}
  changed_when: false
  become: true

# Wireguard-source-egress MASQUERADE — exercises -s wireguard_subnet
# -j MASQUERADE. extns alias {{ probe_wg }} sits in wireguard_subnet;
# egress hits FORWARD wg0→WAN ACCEPT, then the matching POSTROUTING
# rule MASQUERADEs to the host's egress IP. slirp NATs again on the
# qemu side, reply round-trips back via wg0. IP literal (1.1.1.1)
# avoids needing DNS inside the netns (no /etc/resolv.conf there).
- name: _verify | POSTROUTING — wireguard-source egress through MASQUERADE works
  command: ip netns exec extns curl --interface {{ probe_wg }} --connect-timeout 5 --max-time 10 -sI http://1.1.1.1/
  changed_when: false
  become: true

# ICMP rate-limit ACCEPT path. One ping is well below 10/sec.
- name: _verify | ICMP — ping from extns is accepted
  command: ip netns exec extns ping -c 1 -W 2 10.99.0.1
  changed_when: false
  become: true

# Crafted-packet probes for non-SYN DROP rules on input and forward.
# hping3 always exits 0 on send (it doesn't fail just because no reply
# arrived), so we use nft per-rule counters as the actual assertion:
# send the crafted packet, then confirm the specific rule's counter
# incremented. Counters were reset earlier (before the UDP probe sweep),
# so this section adds to the same counter state.
- name: _verify | input — TCP-ACK (no SYN) from extns to :80 hits the non-SYN drop
  command: ip netns exec extns hping3 -A -p 80 -c 1 --quiet 10.99.0.1
  changed_when: false
  failed_when: false
  become: true

- name: _verify | forward — TCP-ACK (no SYN) from extns to a container hits the non-SYN drop
  command: ip netns exec extns hping3 -A -p 32400 -c 1 --quiet {{ probe_container_dest }}
  changed_when: false
  failed_when: false
  become: true

# forward catch-all drop — direct curl from extns to a container's
# bridge IP (no DNAT involved, so the wg0→podman0 ct-status-dnat
# allow doesn't match either). With established, invalid, non-SYN,
# and the scoped allows all not matching, the packet falls through
# to the trailing counter-drop.
- name: _verify | forward — direct-to-container TCP-SYN with no DNAT hits the catch-all drop
  command: ip netns exec extns curl --connect-timeout 2 --max-time 3 -sf http://{{ probe_container_dest }}:80/
  register: probe_forward_drop
  changed_when: false
  failed_when: probe_forward_drop.rc == 0
  become: true

# ICMP echo flood with varying IDs — must vary ICMP-id per packet to
# exercise the rate-limit rule, because conntrack tracks ICMP echo by
# (src, dst, type, id): a same-id flood collapses to one flow that
# short-circuits via `ct state established,related accept` after the
# first packet. Python's raw-ICMP socket sends 50 packets with IDs
# 1000-1049 back-to-back from extns; each is a NEW conntrack flow
# reaching the icmp rule. Burst 20 + ~10/sec refill over <1s → ~30
# overflow drops.
- name: _verify | Stage ICMP flood probe script
  copy:
    dest: /tmp/firewall_verify_icmp_flood.py
    mode: "0755"
    content: |
      import socket, struct
      sock = socket.socket(socket.AF_INET, socket.SOCK_RAW, socket.IPPROTO_ICMP)
      for i in range(50):
          icmp_id = 1000 + i
          # echo-request: type=8 code=0 chksum=0 (placeholder)
          hdr = struct.pack("!BBHHH", 8, 0, 0, icmp_id, 0)
          chksum = 0
          for j in range(0, len(hdr), 2):
              chksum += (hdr[j] << 8) | hdr[j + 1]
          while chksum >> 16:
              chksum = (chksum & 0xFFFF) + (chksum >> 16)
          chksum = ~chksum & 0xFFFF
          pkt = struct.pack("!BBHHH", 8, 0, chksum, icmp_id, 0)
          sock.sendto(pkt, ("10.99.0.1", 0))
  become: true

- name: _verify | input — ICMP echo flood (varying IDs) overflows the rate-limit
  command: ip netns exec extns python3 /tmp/firewall_verify_icmp_flood.py
  changed_when: false
  failed_when: false
  become: true

# Silenced-noise (dport 1900/SSDP) — sending UDP to any port in the
# silenced set should land on that rule, not the catch-all.
- name: _verify | input — UDP to silenced-noise port hits the silenced-noise drop
  shell: echo ping | ip netns exec extns nc -u -w 1 10.99.0.1 1900
  args: { executable: /bin/bash }
  changed_when: false
  failed_when: false
  become: true

# Catch-all (UDP to a port with no rule, no listener, no scope match)
# — falls through to the trailing counter-drop.
- name: _verify | input — UDP to unscoped 18181 hits the catch-all drop
  shell: echo ping | ip netns exec extns nc -u -w 1 -s {{ probe_nonscope }} 10.99.0.1 18181
  args: { executable: /bin/bash }
  changed_when: false
  failed_when: false
  become: true

# VRRP iif-scope negative probe. The rule is `iifname $WAN_IFACE ip
# saddr $HOME_LAN ip protocol vrrp accept` — wg0 ingress (which is how
# every extns packet arrives) must not match. Positive probe isn't
# possible in this rig because slirp doesn't pass arbitrary L4
# protocols on WAN, and adding a second veth named like $WAN_IFACE
# would conflict with the netns topology. Confirm the rule's counter
# stays at 0 after a proto-112 packet from extns — a regression that
# drops the iif scope (`ip saddr ... ip protocol vrrp accept`) would
# accept this packet and increment the counter.
- name: _verify | input — VRRP (proto 112) on wg0 ingress doesn't match the WAN-iif rule
  command: ip netns exec extns hping3 --rawip -H 112 -c 1 -d 0 --quiet 10.99.0.1
  changed_when: false
  failed_when: false
  become: true

- name: _verify | Capture nftables counters after crafted-packet probes
  command: nft -j list table ip homelab
  register: counters_after_crafted
  changed_when: false
  become: true

# nf_conntrack_tcp_loose=0 makes the kernel itself classify mid-stream
# non-SYN TCP as INVALID rather than NEW. Can't apply mid-flight (would
# break live SSH), so the value persists in /etc/sysctl.d/ and the
# module is pinned via /etc/modules-load.d/ to load at next boot. The
# nftables non-SYN drop rules above remain the runtime protection
# until then.
- name: _verify | sysctl — nf_conntrack_tcp_loose=0 persisted in sysctl.d
  slurp:
    src: /etc/sysctl.d/30-firewall-hardening.conf
  register: sysctl_persist
  become: true

- name: _verify | sysctl — nf_conntrack module pinned in modules-load.d
  slurp:
    src: /etc/modules-load.d/30-firewall-hardening.conf
  register: modload_persist
  become: true

- name: _verify | sysctl — assert persistence
  assert:
    that:
      - "'net.netfilter.nf_conntrack_tcp_loose = 0' in (sysctl_persist.content | b64decode)"
      - "'nf_conntrack' in (modload_persist.content | b64decode)"
    fail_msg: >-
      Either sysctl-hardening.conf doesn't pin
      nf_conntrack_tcp_loose=0, or modules-load.d doesn't pin
      nf_conntrack. Without both, loose=0 won't take effect at
      next boot.

# First-apply path: nf_conntrack wasn't loaded at sysctl-write time,
# so the role should have created /var/run/reboot-required to let
# site.yml's tail block schedule a reboot.
- name: _verify | reboot signal — /var/run/reboot-required exists
  stat:
    path: /var/run/reboot-required
  register: reboot_required_stat
  become: true

# Require recent mtime so a stale file from a prior --keep'd run
# doesn't false-pass. The role's apply is well within an hour of
# verify on a normal harness cycle (~10 min total); cross-session
# --keep'd re-runs (file from yesterday) correctly fail.
- name: _verify | reboot signal — assert reboot was signaled this run
  assert:
    that:
      - reboot_required_stat.stat.exists
      - reboot_required_stat.stat.mtime > (ansible_date_time.epoch | int) - 3600
    fail_msg: >-
      /var/run/reboot-required is missing or stale (mtime older than
      1 hour). With nf_conntrack not pre-loaded, the conntrack sysctl
      can't take effect until reboot — the role should have signaled
      this run.

# Look up each counter by name and confirm packets fired as expected.
# Counters are declared at table scope (see nftables.conf.j2) and
# referenced from rules via `counter name "X"`; the table-scope
# declaration is what carries packets/bytes. selectattr by `family`
# winnows the JSON to those declarations (rule references inside
# `rule.expr` also have a `counter` key but no `family`).
- name: _verify | Counter-checked rules each fired the expected number of times
  vars:
    nft_counters: "{{ (counters_after_crafted.stdout | from_json).nftables
                      | selectattr('counter', 'defined')
                      | map(attribute='counter')
                      | selectattr('family', 'defined') | list }}"
    input_nonsyn_pkts: "{{ (nft_counters | selectattr('name', 'eq', 'input_nonsyn') | first).packets }}"
    forward_nonsyn_pkts: "{{ (nft_counters | selectattr('name', 'eq', 'forward_nonsyn') | first).packets }}"
    forward_catchall_pkts: "{{ (nft_counters | selectattr('name', 'eq', 'forward_catchall') | first).packets }}"
    icmp_overflow_pkts: "{{ (nft_counters | selectattr('name', 'eq', 'icmp_overflow') | first).packets }}"
    input_silenced_pkts: "{{ (nft_counters | selectattr('name', 'eq', 'input_silenced') | first).packets }}"
    input_catchall_pkts: "{{ (nft_counters | selectattr('name', 'eq', 'input_catchall') | first).packets }}"
    # VRRP rule's counter is asserted at 0 — the negative probe sends
    # proto-112 from wg0 (extns ingress) and the iif scope must reject.
    vrrp_pkts: "{{ (nft_counters | selectattr('name', 'eq', 'vrrp_accept') | first).packets }}"
    # UDP accept rule counters (A6) — each rule has at least one
    # positive probe except mdns, which the rig can't simulate
    # positively (slirp doesn't carry the right saddr on WAN ingress);
    # both mdns probes are negative.
    mosh_pkts: "{{ (nft_counters | selectattr('name', 'eq', 'mosh_accept') | first).packets }}"
    netbios_pkts: "{{ (nft_counters | selectattr('name', 'eq', 'netbios_accept') | first).packets }}"
    dnscrypt_pkts: "{{ (nft_counters | selectattr('name', 'eq', 'dnscrypt_accept') | first).packets }}"
    aardvark_pkts: "{{ (nft_counters | selectattr('name', 'eq', 'aardvark_accept') | first).packets }}"
    wireguard_pkts: "{{ (nft_counters | selectattr('name', 'eq', 'wireguard_accept') | first).packets }}"
    mdns_pkts: "{{ (nft_counters | selectattr('name', 'eq', 'mdns_accept') | first).packets }}"
    # TCP accept rule counters — listeners were dropped (see header
    # comment near the httpd container task); each TCP rule carries a
    # named counter and the rc-vs-listener signal is gone. Positives
    # assert >= 1; transmission is negative-only here because positive
    # WAN ingress would need a slirp hostfwd extension.
    input_unscoped_tcp_pkts: "{{ (nft_counters | selectattr('name', 'eq', 'input_unscoped_tcp') | first).packets }}"
    input_admin_tcp_pkts: "{{ (nft_counters | selectattr('name', 'eq', 'input_admin_tcp') | first).packets }}"
    input_transmission_pkts: "{{ (nft_counters | selectattr('name', 'eq', 'input_transmission') | first).packets }}"
    input_nut_podman_pkts: "{{ (nft_counters | selectattr('name', 'eq', 'input_nut_podman') | first).packets }}"
    input_loopback_pkts: "{{ (nft_counters | selectattr('name', 'eq', 'input_loopback') | first).packets }}"
    input_icmp_accept_pkts: "{{ (nft_counters | selectattr('name', 'eq', 'input_icmp_accept') | first).packets }}"
  assert:
    that:
      - input_nonsyn_pkts | int >= 1
      - forward_nonsyn_pkts | int >= 1
      - forward_catchall_pkts | int >= 1
      - icmp_overflow_pkts | int >= 1
      - input_silenced_pkts | int >= 1
      - input_catchall_pkts | int >= 1
      - vrrp_pkts | int == 0
      - mosh_pkts | int >= 1
      - netbios_pkts | int >= 1
      - dnscrypt_pkts | int >= 1
      - aardvark_pkts | int >= 2  # two probes: default-bridge + non-default-bridge
      - wireguard_pkts | int >= 1
      - mdns_pkts | int == 0  # both probes negative (iif + saddr scope rejections)
      - input_unscoped_tcp_pkts | int >= 1   # extns→:80, :443, :22 via bash /dev/tcp
      - input_admin_tcp_pkts | int >= 1      # samba/nut positives from wg saddr
      - input_transmission_pkts | int == 0   # negative-only: wg0 ingress must miss WAN iif scope
      - input_nut_podman_pkts | int >= 1     # nut positive from podman_bridge_pool source
      - input_loopback_pkts | int >= 1       # host curl 127.0.0.1:80
      - input_icmp_accept_pkts | int >= 1    # ping probe + first 20 of the flood
    fail_msg: >-
      Counter-based probes didn't fire all expected rules: non-SYN
      (input/forward), forward catch-all, icmp overflow, input
      silenced-noise, or input catch-all; OR the VRRP rule's iif scope
      accepted a wg0-ingress packet (vrrp_pkts > 0); OR a TCP accept
      rule failed to fire (unscoped 22/80/443, admin samba/nut,
      podman-pool nut, loopback, icmp accept); OR the transmission
      iif scope accepted a wg0-ingress packet (input_transmission > 0).
      Either a rule is missing, the probe didn't reach the chain, or
      another rule swallowed the packet first.

# Re-apply coverage. With iptables-restore the apply was destructive
# (wiped netavark's chains), so the verify forced a re-flush + podman
# network reload to validate the reload-cascade. nft -f is per-table
# atomic — our apply only touches `ip homelab`, leaving netavark's
# `ip filter`/`ip nat` chains alone. The smoke check is just: re-apply
# our ruleset and confirm the published-container path still works.
- name: _verify | Re-apply nftables ruleset (must not disturb netavark)
  command: nft -f /etc/nftables.conf
  changed_when: true
  become: true

- name: _verify | FORWARD/DNAT after re-apply — published 32400 still reachable
  command: ip netns exec extns curl --connect-timeout 3 --max-time 5 -s http://10.99.0.1:32400/
  register: firewall_verify_after_reapply
  changed_when: false
  failed_when: firewall_verify_after_reapply.rc != 0 or 'firewall-verify-ok' not in firewall_verify_after_reapply.stdout
  become: true

# Stock nftables.service ExecStop is `nft flush ruleset` — would nuke
# netavark/fail2ban tables on any systemctl stop. Confirm the drop-in
# scopes the stop to ip homelab only. Sentinel table simulates a
# co-tenant; if ExecStop still flushed everything, it'd disappear.
# Runs last because the stop/start cycle resets per-rule counters.
- name: _verify | ExecStop drop-in — install sentinel table
  command: nft add table ip firewall_verify_sentinel
  changed_when: false
  become: true

- name: _verify | ExecStop drop-in — stop nftables.service
  systemd: { name: nftables.service, state: stopped }
  become: true

- name: _verify | ExecStop drop-in — list tables after stop
  command: nft list tables
  register: tables_after_stop
  changed_when: false
  become: true

- name: _verify | ExecStop drop-in — sentinel survived, homelab deleted
  assert:
    that:
      - "'table ip firewall_verify_sentinel' in tables_after_stop.stdout"
      - "'table ip homelab' not in tables_after_stop.stdout"
    fail_msg: >-
      ExecStop drop-in didn't scope correctly: sentinel table should
      survive a stop (it didn't) and ip homelab should be gone (it
      wasn't). Stock `nft flush ruleset` likely still in effect.

- name: _verify | ExecStop drop-in — cleanup sentinel
  command: nft delete table ip firewall_verify_sentinel
  changed_when: false
  failed_when: false
  become: true

- name: _verify | ExecStop drop-in — restart nftables.service
  systemd: { name: nftables.service, state: started }
  become: true

- name: _verify | ExecStop drop-in — homelab table restored after start
  command: nft list tables
  register: tables_after_start
  changed_when: false
  failed_when: "'table ip homelab' not in tables_after_start.stdout"
  become: true
