# Functional firewall verification — every probe exercises live
# netfilter behaviour. Test scaffolding (podman, listeners, multi-IP
# netns) lives here rather than in _setup.yml because _setup is
# reserved for genuine role dependencies — none of this is needed for
# the firewall role itself to converge.
#
# Probe topology:
#   extns netns ─ veth_ext ── wg0* (10.99.0.1) ─ root netns (the VM)
#
# extns is set up with multiple source aliases so we can probe each
# scoped INPUT rule from a representative source. Specific /32 host
# routes back to those aliases go via wg0; we avoid broader subnet
# routes that would collide with podman0's real container network.
# Aliases derived from group_vars via ipmath(250) — picking offset
# 250 keeps the address comfortably outside netavark's bottom-up
# auto-allocation range while staying within the subnet.
#
#   10.99.0.2                          non-scope source (catch-all reject)
#   site_subnets.home  + .250 offset   physical home LAN source
#   wireguard_subnet   + .250 offset   wireguard client source
#   podman_default_network + .250      container source (DNS rule probes)
#   podman_bridge_pool     + .250      non-default-bridge container source
#
# *The veth is named wg0 deliberately so traffic from extns enters
# the root netns's INPUT/FORWARD chains as if it arrived on the real
# wireguard interface — exercising rules that key on -i wg0.
- name: _verify | Derive probe source IPs from subnet vars
  set_fact:
    probe_home: "{{ site_subnets.home | ansible.utils.ipmath(250) }}"
    probe_wg: "{{ wireguard_subnet | ansible.utils.ipmath(250) }}"
    probe_podman: "{{ podman_default_network | ansible.utils.ipmath(250) }}"
    probe_podman_pool: "{{ podman_bridge_pool | ansible.utils.ipmath(250) }}"

# Use the real prod podman install path (jammy backports pin, netavark
# backend, zvol setup) — keeps the test rig faithful to what runs on
# real hosts and avoids re-implementing package selection here.
- name: _verify | Install podman stack via prod install.yml
  import_role:
    name: podman
    tasks_from: install

- name: _verify | Install probe-only deps
  apt:
    name:
      - python3
      - iproute2
      - curl
      - iputils-ping
      - socat        # UDP echo listeners (5053 / 5333 / 5353)
      - hping3       # crafted TCP-ACK probes for `! --syn` rules
    cache_valid_time: 3600
  become: true

- name: _verify | Pull tiny test image
  command: podman pull docker.io/library/busybox
  register: firewall_verify_pull
  changed_when: "'Storing signatures' in firewall_verify_pull.stdout or 'Writing manifest' in firewall_verify_pull.stdout"
  become: true

# Publish 32400:32400 (not :80) because :80 is already taken by the
# python http.server INPUT probe; otherwise the port is arbitrary —
# the FORWARD rule scopes by --ctstate DNAT, not by dport. Run busybox
# httpd on 32400 inside the container to serve a tiny known-content
# page the probe can grep for.
- name: _verify | Run busybox httpd test container with --publish on 32400
  command: >
    podman run -d --replace --name firewall_verify_httpd
      --publish 0.0.0.0:32400:32400
      docker.io/library/busybox
      sh -c 'mkdir -p /www && echo firewall-verify-ok > /www/index.html && exec httpd -f -p 32400 -h /www'
  changed_when: true
  become: true

# TCP listeners — one python http.server per port. Probes that source
# from an allowed range get HTTP 200 (curl --connect-timeout exits 0);
# probes from a denied source hit the catch-all REJECT and curl exits
# non-zero with "Connection refused".
- name: _verify | Bind python http.server on TCP listeners
  command: >
    systemd-run --unit firewall-verify-tcp-{{ item }} --remain-after-exit
      python3 -m http.server {{ item }} --bind 0.0.0.0
  loop:
    - 80     # unscoped INPUT-allow probe target
    - 443    # unscoped INPUT-allow (HTTPS port; serves plain HTTP for the probe)
    - 445    # Samba probe target (-s site_subnets.home / wireguard_subnet)
    - 3493   # nut probe target (-s site_subnets.home / wireguard_subnet)
  changed_when: true
  become: true

# UDP listeners — socat echoes "pong" so the probe can `grep -q pong`
# to confirm the packet round-tripped (the only reliable way to
# distinguish ACCEPT from REJECT/DROP on UDP, since both ACCEPT-no-
# listener and REJECT produce ICMP port-unreachable).
- name: _verify | Bind socat UDP echo listeners
  command: >
    systemd-run --unit firewall-verify-udp-{{ item }} --remain-after-exit
      socat UDP-RECVFROM:{{ item }},fork SYSTEM:'echo pong'
  loop:
    - "{{ service_ports.dnscrypt_proxy }}"  # dnscrypt-proxy (-s podman_default_network)
    - 5333   # aardvark-dns   (-s podman_default_network)
    - 5353   # mDNS           (-s site_subnets.home)
    - 51820  # wireguard      (-i WAN — only used to verify negative case from wg0)
    - 60000  # mosh           (-s site_subnets.home / wireguard_subnet, port within 60000:61000)
  changed_when: true
  become: true

# Multi-aliased extns netns + matching host /32 routes. The aliases
# let curl/nc source-bind from each representative subnet without
# spinning up four separate netns. /32 host routes ensure replies
# return via wg0 without colliding with podman0's 10.88.0.0/16 route.
- name: _verify | Create probe netns with multi-source aliases
  shell: |
    set -euo pipefail
    # Add-or-verify: succeeds if the netns is freshly added OR
    # already present. A real failure (e.g. kernel netns support
    # missing) bubbles up instead of being swallowed by `|| true`.
    ip netns add extns 2>/dev/null || [ -d /var/run/netns/extns ]
    if ! ip link show wg0 >/dev/null 2>&1; then
      ip link add wg0 type veth peer name veth_ext
      ip link set veth_ext netns extns
    fi
    ip addr replace 10.99.0.1/24 dev wg0
    ip link set wg0 up
    ip -n extns addr replace 10.99.0.2/24 dev veth_ext
    ip -n extns addr replace {{ probe_home }}/32 dev veth_ext
    ip -n extns addr replace {{ probe_wg }}/32 dev veth_ext
    ip -n extns addr replace {{ probe_podman }}/32 dev veth_ext
    ip -n extns addr replace {{ probe_podman_pool }}/32 dev veth_ext
    ip -n extns link set veth_ext up
    ip -n extns link set lo up
    ip -n extns route replace default via 10.99.0.1
    ip route replace {{ probe_home }}/32 dev wg0
    ip route replace {{ probe_wg }}/32 dev wg0
    ip route replace {{ probe_podman }}/32 dev wg0
    ip route replace {{ probe_podman_pool }}/32 dev wg0
  args:
    executable: /bin/bash
  changed_when: true
  become: true

- name: _verify | Wait for TCP listeners
  wait_for: { host: 127.0.0.1, port: "{{ item }}", timeout: 10 }
  loop: [80, 443, 445, 3493]
  become: true

- name: _verify | Wait for httpd container
  wait_for: { host: 127.0.0.1, port: 32400, timeout: 30 }
  become: true

# --- Functional probes ------------------------------------------------

# Unscoped INPUT allow / catch-all reject — baseline coverage.
- name: _verify | INPUT allow — port 80 reachable from extns (unscoped)
  command: ip netns exec extns curl --connect-timeout 3 --max-time 5 -sf http://10.99.0.1:80/
  changed_when: false
  become: true

- name: _verify | INPUT deny — port 18080 (no rule, no listener) is rejected
  command: ip netns exec extns curl --connect-timeout 3 --max-time 5 -sf http://10.99.0.1:18080/
  register: probe_18080
  changed_when: false
  failed_when: probe_18080.rc == 0
  become: true

- name: _verify | INPUT allow — port 443 reachable from extns (unscoped)
  command: ip netns exec extns curl --connect-timeout 3 --max-time 5 -sf http://10.99.0.1:443/
  changed_when: false
  become: true

# Wireguard 51820 is scoped to -i WAN. Two probes — positive via
# the controller-side UDP hostfwd (slirp ingresses on enp0s2, which
# is the WAN iface in the test VM) and negative from the netns where
# traffic always ingresses on wg0.
- name: _verify | INPUT allow — wireguard (51820/udp) reachable on WAN iface from controller
  delegate_to: localhost
  shell: |
    echo ping | nc -u -w 2 127.0.0.1 {{ wan_udp_test_port }} | grep -q pong
  args: { executable: /bin/bash }
  changed_when: false

- name: _verify | INPUT — wireguard (51820/udp) rejected when ingressing on wg0
  shell: |
    echo ping | ip netns exec extns nc -u -w 2 10.99.0.1 51820 | grep -q pong
  args: { executable: /bin/bash }
  register: probe_wg_oos
  changed_when: false
  failed_when: probe_wg_oos.rc == 0
  become: true

# Mosh is scoped to home LAN + wireguard. Probe positive from each.
- name: _verify | INPUT — mosh (60000/udp) reachable from home LAN source
  shell: |
    echo ping | ip netns exec extns nc -u -w 2 -s {{ probe_home }} 10.99.0.1 60000 | grep -q pong
  args: { executable: /bin/bash }
  changed_when: false
  become: true

- name: _verify | INPUT — mosh (60000/udp) reachable from wireguard source
  shell: |
    echo ping | ip netns exec extns nc -u -w 2 -s {{ probe_wg }} 10.99.0.1 60000 | grep -q pong
  args: { executable: /bin/bash }
  changed_when: false
  become: true

- name: _verify | INPUT — mosh (60000/udp) rejected from non-scope source
  shell: |
    echo ping | ip netns exec extns nc -u -w 2 -s 10.99.0.2 10.99.0.1 60000 | grep -q pong
  args: { executable: /bin/bash }
  register: probe_mosh_oos
  changed_when: false
  failed_when: probe_mosh_oos.rc == 0
  become: true

# Source-scoped admin services: positive cases for each rule, plus
# one negative case from the non-scope source per service.
- name: _verify | INPUT — Samba (445/tcp) reachable from each allowed source
  command: >
    ip netns exec extns curl --interface {{ item.src }}
      --connect-timeout 3 --max-time 5 -sf http://10.99.0.1:445/
  loop:
    - { src: "{{ probe_home }}", label: home LAN }
    - { src: "{{ probe_wg }}", label: wireguard }
  loop_control: { label: "{{ item.label }}" }
  changed_when: false
  become: true

- name: _verify | INPUT — Samba (445/tcp) rejected from non-scope source 10.99.0.2
  command: >
    ip netns exec extns curl --interface 10.99.0.2
      --connect-timeout 3 --max-time 5 -sf http://10.99.0.1:445/
  register: probe_samba_oos
  changed_when: false
  failed_when: probe_samba_oos.rc == 0
  become: true

- name: _verify | INPUT — nut (3493/tcp) reachable from each allowed source
  command: >
    ip netns exec extns curl --interface {{ item.src }}
      --connect-timeout 3 --max-time 5 -sf http://10.99.0.1:3493/
  loop:
    - { src: "{{ probe_home }}", label: home LAN }
    - { src: "{{ probe_wg }}", label: wireguard }
  loop_control: { label: "{{ item.label }}" }
  changed_when: false
  become: true

- name: _verify | INPUT — nut (3493/tcp) rejected from non-scope source 10.99.0.2
  command: >
    ip netns exec extns curl --interface 10.99.0.2
      --connect-timeout 3 --max-time 5 -sf http://10.99.0.1:3493/
  register: probe_nut_oos
  changed_when: false
  failed_when: probe_nut_oos.rc == 0
  become: true

# Source-scoped UDP: container DNS (5053/5333) and home-LAN mDNS (5353).
# `nc -u -w 2 -s SRC` source-binds; piping through `grep -q pong`
# turns the round-trip into a clean exit code.
- name: _verify | INPUT — dnscrypt (5053/udp) reachable from container source
  shell: |
    echo ping | ip netns exec extns nc -u -w 2 -s {{ probe_podman }} 10.99.0.1 {{ service_ports.dnscrypt_proxy }} | grep -q pong
  args: { executable: /bin/bash }
  changed_when: false
  become: true

- name: _verify | INPUT — dnscrypt (5053/udp) rejected from non-scope source
  shell: |
    echo ping | ip netns exec extns nc -u -w 2 -s 10.99.0.2 10.99.0.1 {{ service_ports.dnscrypt_proxy }} | grep -q pong
  register: probe_dns_oos
  changed_when: false
  failed_when: probe_dns_oos.rc == 0
  become: true

- name: _verify | INPUT — aardvark-dns (5333/udp) reachable from default-bridge source
  shell: |
    echo ping | ip netns exec extns nc -u -w 2 -s {{ probe_podman }} 10.99.0.1 5333 | grep -q pong
  args: { executable: /bin/bash }
  changed_when: false
  become: true

# Regression probe for the cross-bridge case: aardvark-dns binds the
# gateway IP of every dns-enabled named bridge (mosquitto, redis, …),
# all carved out of netavark's 10.89.0.0/16 default_subnet_pools[0]
# base. A previous saddr-scoped rule covered only podman_default_network
# and the catch-all UDP reject killed every cross-bridge container-name
# lookup (paperless → redis, z2m → mosquitto) before aardvark saw it.
- name: _verify | INPUT — aardvark-dns (5333/udp) reachable from non-default-bridge source
  shell: |
    echo ping | ip netns exec extns nc -u -w 2 -s {{ probe_podman_pool }} 10.99.0.1 5333 | grep -q pong
  args: { executable: /bin/bash }
  changed_when: false
  become: true

# mDNS positive case isn't probable in the rig — the rule requires
# iif=$WAN_IFACE + saddr=$HOME_LAN simultaneously, but slirp doesn't
# preserve saddr on $WAN_IFACE ingress and extns ingresses on wg0.
# Instead probe both negative dimensions: (a) home-LAN saddr arriving
# on wg0 is rejected by the iif scope, (b) wg-saddr is rejected by the
# saddr scope. Together they pin down both halves of the rule.
- name: _verify | INPUT — mDNS (5353/udp) rejected on wg0 ingress (iif scope)
  shell: |
    echo ping | ip netns exec extns nc -u -w 2 -s {{ probe_home }} 10.99.0.1 5353 | grep -q pong
  args: { executable: /bin/bash }
  register: probe_mdns_iif
  changed_when: false
  failed_when: probe_mdns_iif.rc == 0
  become: true

- name: _verify | INPUT — mDNS (5353/udp) rejected from wireguard source (saddr scope)
  shell: |
    echo ping | ip netns exec extns nc -u -w 2 -s {{ probe_wg }} 10.99.0.1 5353 | grep -q pong
  register: probe_mdns_wg
  changed_when: false
  failed_when: probe_mdns_wg.rc == 0
  become: true

# VRRP (proto 112) scoping is asserted statically because slirp
# doesn't pass arbitrary L4 protocols, so a functional probe across
# the netns harness isn't feasible. Confirm the rendered rule still
# carries the iifname + LAN-saddr scope — guards against someone
# unscoping it back to `ip protocol vrrp accept`. nft canonicalizes
# `ip protocol 112` to `ip protocol vrrp` on output, hence the match.
- name: _verify | INPUT — VRRP rule renders with iifname + LAN-saddr scope
  command: nft list table ip homelab
  register: vrrp_rule_dump
  changed_when: false
  failed_when: >
    ('iifname "' + default_interface + '" ip saddr ' + site_subnets.home + ' ip protocol vrrp accept') not in vrrp_rule_dump.stdout
  become: true

# FORWARD/DNAT — published container reachable via wg0 ingress.
- name: _verify | FORWARD/DNAT — published 32400 reachable via wg0 ingress
  command: ip netns exec extns curl --connect-timeout 3 --max-time 5 -s http://10.99.0.1:32400/
  register: firewall_verify_container
  changed_when: false
  failed_when: firewall_verify_container.rc != 0 or 'firewall-verify-ok' not in firewall_verify_container.stdout
  become: true

# FORWARD/DNAT WAN-side counterpart — packet ingresses on enp0s2
# (the qemu slirp interface) via the controller-side hostfwd that
# the harness sets up in QemuMachine.prepare(). delegate_to: localhost
# runs the curl on the test runner, so the packet reaches the VM
# from "outside" exactly the way real WAN traffic does. Without the
# hostfwd this rule is unreachable from the netns harness.
- name: _verify | FORWARD/DNAT — published 32400 reachable from controller via WAN hostfwd
  delegate_to: localhost
  command: curl --connect-timeout 5 --max-time 10 -s http://127.0.0.1:{{ wan_tcp_test_port }}/
  register: firewall_verify_wan_container
  changed_when: false
  failed_when: firewall_verify_wan_container.rc != 0 or 'firewall-verify-ok' not in firewall_verify_wan_container.stdout

# FORWARD chain podman0→podman0 ct-status-dnat regression probe.
# This path broke during the nft migration: containers inheriting the
# host's resolv.conf (one-shot containers without --dns) ended up
# querying a VIP that PREROUTING DNATs back into the bridge — iif and
# oif both podman0. netavark's NETAVARK_FORWARD chain accepted, but
# our `ip homelab` forward chain had no matching rule and fell
# through to default DROP; multi-base-chain semantics drops the
# packet regardless. Re-fired the canonical case here by running a
# transient busybox on the same `podman` network and curling the
# bridge gateway IP — netavark's existing --publish 32400 rule
# DNATs that to the long-running httpd container, exercising exactly
# the iif=podman0/oif=podman0/ct-status-dnat path.
- name: _verify | FORWARD/DNAT — container → host bridge IP → DNAT'd to container on same bridge
  command: >
    podman run --rm --network podman docker.io/library/busybox
    wget -q -O - -T 5 http://10.88.0.1:32400/
  register: firewall_verify_container_to_vip
  changed_when: false
  failed_when: firewall_verify_container_to_vip.rc != 0 or 'firewall-verify-ok' not in firewall_verify_container_to_vip.stdout
  become: true

# Host-egress MASQUERADE — exercises -s site_subnets.home (or home_subnet
# on prod) -j MASQUERADE for the host's own outbound traffic.
- name: _verify | OUTPUT + MASQUERADE — outbound HTTPS from VM works
  uri:
    url: https://example.com/
    timeout: 10
    status_code: 200
  become: true

# Container-egress MASQUERADE — exercises -s podman_default_network
# -j MASQUERADE.
- name: _verify | POSTROUTING — container egress through MASQUERADE works
  command: podman exec firewall_verify_httpd wget -q -O- --timeout=10 https://example.com/
  changed_when: false
  become: true

# FORWARD "podman → external" rule deliberately covers every non-podman
# egress iface (WAN, home LAN, wg, libvirt, macvlan) — the container →
# example.com probe above exercises the WAN case; this one hits a
# non-WAN destination (extns over wg0) so a future tightening to WAN-
# only fails loudly. ICMP rather than HTTP because extns has no
# listener bound to its veth IP.
- name: _verify | FORWARD — container egress to non-WAN iface (wg0) reachable
  command: podman exec firewall_verify_httpd ping -c 1 -W 3 10.99.0.2
  changed_when: false
  become: true

# Wireguard-source-egress MASQUERADE — exercises -s wireguard_subnet
# -j MASQUERADE. extns alias {{ probe_wg }} sits in wireguard_subnet;
# egress hits FORWARD wg0→WAN ACCEPT, then the matching POSTROUTING
# rule MASQUERADEs to the host's egress IP. slirp NATs again on the
# qemu side, reply round-trips back via wg0. IP literal (1.1.1.1)
# avoids needing DNS inside the netns (no /etc/resolv.conf there).
- name: _verify | POSTROUTING — wireguard-source egress through MASQUERADE works
  command: ip netns exec extns curl --interface {{ probe_wg }} --connect-timeout 5 --max-time 10 -sI http://1.1.1.1/
  changed_when: false
  become: true

# ICMP rate-limit ACCEPT path. One ping is well below 10/sec.
- name: _verify | ICMP — ping from extns is accepted
  command: ip netns exec extns ping -c 1 -W 2 10.99.0.1
  changed_when: false
  become: true

# Crafted-packet probes for non-SYN DROP rules on input and forward.
# hping3 always exits 0 on send (it doesn't fail just because no reply
# arrived), so we use nft per-rule counters as the actual assertion:
# reset counters, send the crafted packet, then confirm the specific
# rule's counter incremented. Each rule has a unique comment so the
# text-rendered output is unambiguous.
- name: _verify | Reset nftables counters before crafted-packet probes
  command: nft reset counters table ip homelab
  changed_when: false
  become: true

- name: _verify | input — TCP-ACK (no SYN) from extns to :80 hits the non-SYN drop
  command: ip netns exec extns hping3 -A -p 80 -c 1 --quiet 10.99.0.1
  changed_when: false
  failed_when: false
  become: true

- name: _verify | forward — TCP-ACK (no SYN) from extns to a container hits the non-SYN drop
  command: ip netns exec extns hping3 -A -p 32400 -c 1 --quiet 10.88.0.2
  changed_when: false
  failed_when: false
  become: true

# forward catch-all drop — direct curl from extns to a container's
# bridge IP (no DNAT involved, so the wg0→podman0 ct-status-dnat
# allow doesn't match either). With established, invalid, non-SYN,
# and the scoped allows all not matching, the packet falls through
# to the trailing counter-drop.
- name: _verify | forward — direct-to-container TCP-SYN with no DNAT hits the catch-all drop
  command: ip netns exec extns curl --connect-timeout 2 --max-time 3 -sf http://10.88.0.2:80/
  register: probe_forward_drop
  changed_when: false
  failed_when: probe_forward_drop.rc == 0
  become: true

- name: _verify | Capture nftables counters after crafted-packet probes
  command: nft list table ip homelab
  register: counters_after_crafted
  changed_when: false
  become: true

# nf_conntrack_tcp_loose=0 makes the kernel itself classify mid-stream
# non-SYN TCP as INVALID rather than NEW. Can't apply mid-flight (would
# break live SSH), so the value persists in /etc/sysctl.d/ and the
# module is pinned via /etc/modules-load.d/ to load at next boot. The
# nftables non-SYN drop rules above remain the runtime protection
# until then.
- name: _verify | sysctl — nf_conntrack_tcp_loose=0 persisted in sysctl.d
  slurp:
    src: /etc/sysctl.d/30-firewall-hardening.conf
  register: sysctl_persist
  become: true

- name: _verify | sysctl — nf_conntrack module pinned in modules-load.d
  slurp:
    src: /etc/modules-load.d/30-firewall-hardening.conf
  register: modload_persist
  become: true

- name: _verify | sysctl — assert persistence
  assert:
    that:
      - "'net.netfilter.nf_conntrack_tcp_loose = 0' in (sysctl_persist.content | b64decode)"
      - "'nf_conntrack' in (modload_persist.content | b64decode)"
    fail_msg: >-
      Either sysctl-hardening.conf doesn't pin
      nf_conntrack_tcp_loose=0, or modules-load.d doesn't pin
      nf_conntrack. Without both, loose=0 won't take effect at
      next boot.

# First-apply path: nf_conntrack wasn't loaded at sysctl-write time,
# so the role should have created /var/run/reboot-required to let
# site.yml's tail block schedule a reboot.
- name: _verify | reboot signal — /var/run/reboot-required exists
  stat:
    path: /var/run/reboot-required
  register: reboot_required_stat
  become: true

- name: _verify | reboot signal — assert reboot was signaled
  assert:
    that:
      - reboot_required_stat.stat.exists
    fail_msg: >-
      /var/run/reboot-required wasn't created. With nf_conntrack
      not pre-loaded, the conntrack sysctl can't take effect until
      reboot — the role should have signaled.

# Match `counter packets N bytes M drop comment "..."` with N >= 1
# (non-zero pkts), confirming the rule actually saw a packet rather
# than just being present. The comment disambiguates the three
# counter-drop rules.
- name: _verify | Counter-checked drop rules each fired ≥ 1 time
  assert:
    that:
      - counters_after_crafted.stdout is search('counter packets [1-9][0-9]* bytes [0-9]+ drop comment "input non-syn drop"')
      - counters_after_crafted.stdout is search('counter packets [1-9][0-9]* bytes [0-9]+ drop comment "forward non-syn drop"')
      - counters_after_crafted.stdout is search('counter packets [1-9][0-9]* bytes [0-9]+ drop comment "forward catch-all"')
    fail_msg: >-
      Counter-based probes didn't fire all expected drop rules:
      non-SYN (input/forward) or the forward catch-all. Either a rule
      is missing, the probe didn't reach the chain, or another rule
      swallowed the packet first.

# Re-apply coverage. With iptables-restore the apply was destructive
# (wiped netavark's chains), so the verify forced a re-flush + podman
# network reload to validate the reload-cascade. nft -f is per-table
# atomic — our apply only touches `ip homelab`, leaving netavark's
# `ip filter`/`ip nat` chains alone. The smoke check is just: re-apply
# our ruleset and confirm the published-container path still works.
- name: _verify | Re-apply nftables ruleset (must not disturb netavark)
  command: nft -f /etc/nftables.conf
  changed_when: true
  become: true

- name: _verify | FORWARD/DNAT after re-apply — published 32400 still reachable
  command: ip netns exec extns curl --connect-timeout 3 --max-time 5 -s http://10.99.0.1:32400/
  register: firewall_verify_after_reapply
  changed_when: false
  failed_when: firewall_verify_after_reapply.rc != 0 or 'firewall-verify-ok' not in firewall_verify_after_reapply.stdout
  become: true

# Stock nftables.service ExecStop is `nft flush ruleset` — would nuke
# netavark/fail2ban tables on any systemctl stop. Confirm the drop-in
# scopes the stop to ip homelab only. Sentinel table simulates a
# co-tenant; if ExecStop still flushed everything, it'd disappear.
# Runs last because the stop/start cycle resets per-rule counters.
- name: _verify | ExecStop drop-in — install sentinel table
  command: nft add table ip firewall_verify_sentinel
  changed_when: false
  become: true

- name: _verify | ExecStop drop-in — stop nftables.service
  systemd: { name: nftables.service, state: stopped }
  become: true

- name: _verify | ExecStop drop-in — list tables after stop
  command: nft list tables
  register: tables_after_stop
  changed_when: false
  become: true

- name: _verify | ExecStop drop-in — sentinel survived, homelab deleted
  assert:
    that:
      - "'table ip firewall_verify_sentinel' in tables_after_stop.stdout"
      - "'table ip homelab' not in tables_after_stop.stdout"
    fail_msg: >-
      ExecStop drop-in didn't scope correctly: sentinel table should
      survive a stop (it didn't) and ip homelab should be gone (it
      wasn't). Stock `nft flush ruleset` likely still in effect.

- name: _verify | ExecStop drop-in — cleanup sentinel
  command: nft delete table ip firewall_verify_sentinel
  changed_when: false
  failed_when: false
  become: true

- name: _verify | ExecStop drop-in — restart nftables.service
  systemd: { name: nftables.service, state: started }
  become: true

- name: _verify | ExecStop drop-in — homelab table restored after start
  command: nft list tables
  register: tables_after_start
  changed_when: false
  failed_when: "'table ip homelab' not in tables_after_start.stdout"
  become: true
