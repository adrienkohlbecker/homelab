# INPUT chain probes. Counters are reset up-front so every probe in
# this file contributes to the assertion block in _verify_counters.yml
# from a clean baseline; positives fire `>= 1` (any number is fine) and
# negative-only counters stay at 0. The reset is up-front (not between
# the TCP and UDP blocks) so it can't wipe TCP probe hits before assertion
# time.
- name: _verify_input | Reset nftables counters before INPUT probes
  command: nft reset counters table inet homelab
  changed_when: false
  become: true

# Unscoped INPUT allow / catch-all reject — baseline coverage.
- name: _verify_input | INPUT allow — port 80 reachable from extns (unscoped)
  command: ip netns exec extns curl --connect-timeout 3 --max-time 5 -sf http://192.0.2.1:80/
  register: _firewall_input_http
  changed_when: false
  failed_when: _firewall_input_http.rc != 0 or 'firewall-verify-ok' not in _firewall_input_http.stdout
  become: true

- name: _verify_input | INPUT deny — port 18080 (no rule, no listener) hits catch-all
  command: ip netns exec extns curl --connect-timeout 3 --max-time 5 -sf http://192.0.2.1:18080/
  changed_when: false
  failed_when: false
  become: true

- name: _verify_input | INPUT allow — port 443 reachable from extns (unscoped)
  command: ip netns exec extns curl --connect-timeout 3 --max-time 5 -sf http://192.0.2.1:443/
  register: _firewall_input_https
  changed_when: false
  failed_when: _firewall_input_https.rc != 0 or 'firewall-verify-ok' not in _firewall_input_https.stdout
  become: true

# Loopback accept (`iif lo accept`). The fixture listener returns a known
# body so this proves real delivery, while the counter assertion at the end
# still confirms the packet matched the loopback rule rather than a broader
# allow.
- name: _verify_input | INPUT allow — iif lo (loopback 127.0.0.1:80 from host)  # noqa: command-instead-of-module
  command: curl --connect-timeout 3 --max-time 5 -sf http://127.0.0.1:80/
  register: _firewall_input_loopback
  changed_when: false
  failed_when: _firewall_input_loopback.rc != 0 or 'firewall-verify-ok' not in _firewall_input_loopback.stdout
  become: true

- name: _verify_input | INPUT allow — tailscale0 ingress reaches mesh accept
  command: >
    ip netns exec extns curl --interface {{ _firewall_probe_tailscale }}
      --connect-timeout 3 --max-time 5 -sf http://100.64.99.1:80/
  register: _firewall_input_tailscale
  changed_when: false
  failed_when: _firewall_input_tailscale.rc != 0 or 'firewall-verify-ok' not in _firewall_input_tailscale.stdout
  become: true

# SSH (22/tcp) is in the unscoped `tcp dport { 22, 80, 443 } accept`
# set. The harness's own ansible connection is over WAN-side slirp
# hostfwd, so a regression that scopes 22 to @lan_admin_ifaces would
# still pass via the test rig's enp0s2 — probe from extns to lock in
# the unscoped contract on top of that. bash /dev/tcp opens a raw TCP
# connection; rc=0 means the SYN-ACK landed, rc!=0 means the catch-all
# fired.
- name: _verify_input | INPUT allow — SSH (22/tcp) reachable from extns (unscoped)
  shell: ip netns exec extns timeout 3 bash -c "exec 3<>/dev/tcp/192.0.2.1/22"
  args: { executable: /bin/bash }
  changed_when: false
  become: true

# Wireguard 51820 is scoped to -i WAN. Two probes — positive via the
# controller-side WAN endpoint (qemu: loopback UDP forward, ingressing on
# enp0s2, the WAN iface in the test VM; EC2: the cell's public IP through
# the security group's 51820/udp allow) and negative from the netns where
# traffic always ingresses on wg0.
- name: _verify_input | INPUT allow — wireguard (51820/udp) reachable on WAN iface from controller  # noqa: risky-shell-pipe
  delegate_to: localhost
  shell: |
    echo . | nc -u -w 1 {{ wan_probe_host }} {{ wan_forward_ports.udp['51820'] }} >/dev/null 2>&1 || true
  args: { executable: /bin/bash }
  changed_when: false

- name: _verify_input | INPUT — wireguard (51820/udp) rejected when ingressing on wg0  # noqa: risky-shell-pipe
  shell: echo . | ip netns exec extns nc -u -w 1 -s {{ _firewall_probe_nonscope }} 192.0.2.1 51820
  args: { executable: /bin/bash }
  changed_when: false
  become: true

# Transmission BT peer port is WAN-only (iif=$WAN_IFACE). Harness backends
# that expose controller-side forwards for both protocols prove WAN ingress;
# the wg0 probes below still catch regressions that drop the iif scope and
# expose 51413 to tunnel peers.
- name: _verify_input | INPUT allow — transmission (51413/tcp) reachable on WAN iface from controller  # noqa: command-instead-of-module
  delegate_to: localhost
  command: >
    curl --connect-timeout 3 --max-time 5 -sf
      http://{{ wan_probe_host }}:{{ wan_forward_ports.tcp[(service_ports.transmission_bt | string)] }}/
  register: _firewall_input_transmission_wan
  changed_when: false
  failed_when: _firewall_input_transmission_wan.rc != 0 or 'firewall-verify-ok' not in _firewall_input_transmission_wan.stdout

- name: _verify_input | INPUT allow — transmission (51413/udp) reaches WAN iface from controller  # noqa: risky-shell-pipe
  delegate_to: localhost
  shell: echo . | nc -u -w 1 {{ wan_probe_host }} {{ wan_forward_ports.udp[(service_ports.transmission_bt | string)] }} >/dev/null 2>&1 || true
  args: { executable: /bin/bash }
  changed_when: false

- name: _verify_input | INPUT — transmission (51413/tcp) rejected on wg0 ingress (iif scope)
  command: ip netns exec extns curl --connect-timeout 3 --max-time 5 -sf http://192.0.2.1:51413/
  changed_when: false
  failed_when: false
  become: true

- name: _verify_input | INPUT — transmission (51413/udp) rejected on wg0 ingress (iif scope)  # noqa: risky-shell-pipe
  shell: echo . | ip netns exec extns nc -u -w 1 -s {{ _firewall_probe_nonscope }} 192.0.2.1 51413
  args: { executable: /bin/bash }
  changed_when: false
  become: true

- name: _verify_input | INPUT allow — tailscale underlay reaches WAN iface from controller  # noqa: risky-shell-pipe
  delegate_to: localhost
  shell: echo . | nc -u -w 1 {{ wan_probe_host }} {{ wan_forward_ports.udp[(tailscale_port | string)] }} >/dev/null 2>&1 || true
  args: { executable: /bin/bash }
  changed_when: false
  when:
    - tailscale_wan_direct | default(false)

# mDNS requires iif=$WAN_IFACE + saddr=$HOME_LAN simultaneously. The WAN
# forward reaches the WAN iface, but the forwarded source is not a HOME_LAN
# address from nft's perspective, so this is a WAN-source negative. wg0 probes
# below cover each half of the scope failing from synthetic in-VM sources.
- name: _verify_input | INPUT — mDNS (5353/udp) rejected from non-home WAN source  # noqa: risky-shell-pipe
  delegate_to: localhost
  shell: echo . | nc -u -w 1 {{ wan_probe_host }} {{ wan_forward_ports.udp['5353'] }} >/dev/null 2>&1 || true
  args: { executable: /bin/bash }
  changed_when: false

# --- probe_wg group (wireguard-source positives) ---------------------
# Admin services (mosh/samba/nut) use the concatenated set
# lan_admin_pairs to require an (iif, saddr) *intersection* — wg0 only
# accepts $WG_SUBNET saddrs, $WAN_IFACE only accepts $HOME_LAN. The
# rig ingresses everything on wg0, so probe_wg (in $WG_SUBNET) is the
# positive case for all three services. mDNS rides the same group as a
# saddr-scope negative (wg saddr fails the iif=WAN + saddr=$HOME_LAN
# requirement on the saddr half).
- name: _verify_input | Bind probe_wg on extns veth (wireguard-source probes)
  command: ip -n extns addr replace {{ _firewall_probe_wg }}/32 dev veth_ext
  changed_when: true
  become: true

- name: _verify_input | INPUT — mosh (60000/udp) reachable from wireguard source  # noqa: risky-shell-pipe
  shell: echo . | ip netns exec extns nc -u -w 1 -s {{ _firewall_probe_wg }} 192.0.2.1 60000
  args: { executable: /bin/bash }
  changed_when: false
  become: true

- name: _verify_input | INPUT — Samba (445/tcp) reachable from wireguard source
  command: >
    ip netns exec extns curl --interface {{ _firewall_probe_wg }}
      --connect-timeout 3 --max-time 5 -sf http://192.0.2.1:445/
  register: _firewall_input_samba_wg
  changed_when: false
  failed_when: _firewall_input_samba_wg.rc != 0 or 'firewall-verify-ok' not in _firewall_input_samba_wg.stdout
  become: true

- name: _verify_input | INPUT — nut (3493/tcp) reachable from wireguard source
  command: >
    ip netns exec extns curl --interface {{ _firewall_probe_wg }}
      --connect-timeout 3 --max-time 5 -sf http://192.0.2.1:{{ service_ports.nut }}/
  register: _firewall_input_nut_wg
  changed_when: false
  failed_when: _firewall_input_nut_wg.rc != 0 or 'firewall-verify-ok' not in _firewall_input_nut_wg.stdout
  become: true

- name: _verify_input | INPUT — Authelia forward-auth reachable from wireguard source
  command: >
    ip netns exec extns curl --interface {{ _firewall_probe_wg }}
      --connect-timeout 3 --max-time 5 -sf http://192.0.2.1:{{ service_ports.authelia }}/
  register: _firewall_input_authelia_wg
  changed_when: false
  failed_when: _firewall_input_authelia_wg.rc != 0 or 'firewall-verify-ok' not in _firewall_input_authelia_wg.stdout
  become: true

# mDNS rule requires iif=$WAN_IFACE + saddr=$HOME_LAN simultaneously.
# wg saddr fails the saddr half — counter must not increment.
- name: _verify_input | INPUT — mDNS (5353/udp) sent from wg saddr (saddr scope rejects)  # noqa: risky-shell-pipe
  shell: echo . | ip netns exec extns nc -u -w 1 -s {{ _firewall_probe_wg }} 192.0.2.1 5353
  args: { executable: /bin/bash }
  changed_when: false
  become: true

# IGMP accept is unscoped (link-local TTL=1 — no WAN-routable IGMP), so
# a raw proto-2 packet from any ingress must hit igmp_accept. hping3
# --rawip -H 2 sends an IGMP (protocol 2) datagram (same mechanism as
# the VRRP proto-112 negative probe).
- name: _verify_input | INPUT — IGMP (proto 2) reaches the igmp_accept rule
  command: ip netns exec extns hping3 --rawip -H 2 -c 1 -d 0 --quiet 192.0.2.1
  changed_when: false
  failed_when: false
  become: true

# --- probe_home group (home_LAN-source iif/saddr-mismatch negatives) -
# probe_home (in $HOME_LAN) on wg0 ingress is a NEGATIVE case across
# the admin set: wrong iif for its saddr. The wg0+HOME_LAN path was
# accepted under prior union semantics; regression back to union
# would let these through. mDNS rides the same group as the iif-half
# negative (home saddr on wg0 fails the iif=$WAN_IFACE requirement).
- name: _verify_input | Bind probe_home on extns veth (home_LAN-source probes)
  command: ip -n extns addr replace {{ _firewall_probe_home }}/32 dev veth_ext
  changed_when: true
  become: true

- name: _verify_input | INPUT — mosh (60000/udp) rejected from home_LAN source via wg0 (iif/saddr mismatch)  # noqa: risky-shell-pipe
  shell: echo . | ip netns exec extns nc -u -w 1 -s {{ _firewall_probe_home }} 192.0.2.1 60000
  args: { executable: /bin/bash }
  changed_when: false
  become: true

- name: _verify_input | INPUT — Samba (445/tcp) rejected from home_LAN source via wg0 (iif/saddr mismatch)
  command: >
    ip netns exec extns curl --interface {{ _firewall_probe_home }}
      --connect-timeout 3 --max-time 5 -sf http://192.0.2.1:445/
  register: _firewall_input_samba_home_wrong_iif
  changed_when: false
  failed_when: _firewall_input_samba_home_wrong_iif.rc == 0
  become: true

- name: _verify_input | INPUT — nut (3493/tcp) rejected from home_LAN source via wg0 (iif/saddr mismatch)
  command: >
    ip netns exec extns curl --interface {{ _firewall_probe_home }}
      --connect-timeout 3 --max-time 5 -sf http://192.0.2.1:{{ service_ports.nut }}/
  register: _firewall_input_nut_home_wrong_iif
  changed_when: false
  failed_when: _firewall_input_nut_home_wrong_iif.rc == 0
  become: true

- name: _verify_input | INPUT — mDNS (5353/udp) sent from home_LAN saddr via wg0 (iif scope rejects)  # noqa: risky-shell-pipe
  shell: echo . | ip netns exec extns nc -u -w 1 -s {{ _firewall_probe_home }} 192.0.2.1 5353
  args: { executable: /bin/bash }
  changed_when: false
  become: true

- name: _verify_input | INPUT — Samba (445/tcp) reachable from home_LAN source via mac_mgmt
  command: >
    ip netns exec extns curl --interface {{ _firewall_probe_home_mac }}
      --connect-timeout 3 --max-time 5 -sf http://{{ _firewall_probe_home_mac_host }}:445/
  register: _firewall_input_samba_mac_mgmt
  changed_when: false
  failed_when: _firewall_input_samba_mac_mgmt.rc != 0 or 'firewall-verify-ok' not in _firewall_input_samba_mac_mgmt.stdout
  become: true

- name: _verify_input | INPUT — nut (3493/tcp) reachable from home_LAN source via mac_mgmt
  command: >
    ip netns exec extns curl --interface {{ _firewall_probe_home_mac }}
      --connect-timeout 3 --max-time 5 -sf http://{{ _firewall_probe_home_mac_host }}:{{ service_ports.nut }}/
  register: _firewall_input_nut_mac_mgmt
  changed_when: false
  failed_when: _firewall_input_nut_mac_mgmt.rc != 0 or 'firewall-verify-ok' not in _firewall_input_nut_mac_mgmt.stdout
  become: true

# --- probe_nonscope group (out-of-scope negatives) -------------------
# probe_nonscope (192.0.2.2 primary on veth_ext) is in neither
# $HOME_LAN nor $WG_SUBNET nor $PODMAN_DEFAULT — every saddr-scoped
# rule must reject it. No bind task: the primary alias is in place
# from the netns setup above.
- name: _verify_input | INPUT — mosh (60000/udp) rejected from non-scope source  # noqa: risky-shell-pipe
  shell: echo . | ip netns exec extns nc -u -w 1 -s {{ _firewall_probe_nonscope }} 192.0.2.1 60000
  args: { executable: /bin/bash }
  changed_when: false
  become: true

- name: _verify_input | INPUT — Samba (445/tcp) rejected from non-scope source
  command: >
    ip netns exec extns curl --interface {{ _firewall_probe_nonscope }}
      --connect-timeout 3 --max-time 5 -sf http://192.0.2.1:445/
  register: _firewall_input_samba_nonscope
  changed_when: false
  failed_when: _firewall_input_samba_nonscope.rc == 0
  become: true

- name: _verify_input | INPUT — nut (3493/tcp) rejected from non-scope source
  command: >
    ip netns exec extns curl --interface {{ _firewall_probe_nonscope }}
      --connect-timeout 3 --max-time 5 -sf http://192.0.2.1:{{ service_ports.nut }}/
  register: _firewall_input_nut_nonscope
  changed_when: false
  failed_when: _firewall_input_nut_nonscope.rc == 0
  become: true

# --- probe_podman group (default-bridge-source positives) ------------
# Container DNS (5333 aardvark) — consumers live on the default podman
# bridge, so positive probes source-bind from probe_podman (in
# $PODMAN_DEFAULT). nc -u sends a single UDP packet source-bound to the
# alias; the named counter is the assertion.
- name: _verify_input | Bind probe_podman on extns veth (default-bridge-source probes)
  command: ip -n extns addr replace {{ _firewall_probe_podman }}/32 dev veth_ext
  changed_when: true
  become: true

- name: _verify_input | INPUT — aardvark-dns (5333/udp) reachable from default-bridge source  # noqa: risky-shell-pipe
  shell: echo . | ip netns exec extns nc -u -w 1 -s {{ _firewall_probe_podman }} 192.0.2.1 5333
  args: { executable: /bin/bash }
  changed_when: false
  become: true

# --- probe_podman_pool group (non-default-bridge-source positives) ---
# Cross-bridge regression: aardvark-dns binds the gateway IP of every
# dns-enabled named bridge (mosquitto, …), all carved out of
# netavark's 10.89.0.0/16 default_subnet_pools[0] base. A previous
# saddr-scoped rule covered only podman_default_network and the
# catch-all UDP reject killed every cross-bridge container-name lookup
# (z2m → mosquitto) before aardvark saw it. HA's
# NUT integration is the other consumer from this subnet, matching
# the separate `ip saddr $PODMAN_POOL tcp dport 3493 accept` rule.
- name: _verify_input | Bind probe_podman_pool on extns veth (non-default-bridge-source probes)
  command: ip -n extns addr replace {{ _firewall_probe_podman_pool }}/32 dev veth_ext
  changed_when: true
  become: true

- name: _verify_input | INPUT — nut (3493/tcp) reachable from podman_bridge_pool source
  command: >
    ip netns exec extns curl --interface {{ _firewall_probe_podman_pool }}
      --connect-timeout 3 --max-time 5 -sf http://192.0.2.1:3493/
  register: _firewall_input_nut_podman_pool
  changed_when: false
  failed_when: _firewall_input_nut_podman_pool.rc != 0 or 'firewall-verify-ok' not in _firewall_input_nut_podman_pool.stdout
  become: true

- name: _verify_input | INPUT — aardvark-dns (5333/udp) reachable from non-default-bridge source  # noqa: risky-shell-pipe
  shell: echo . | ip netns exec extns nc -u -w 1 -s {{ _firewall_probe_podman_pool }} 192.0.2.1 5333
  args: { executable: /bin/bash }
  changed_when: false
  become: true

# VRRP and mDNS still need structural checks: the harness can't
# generate arbitrary L4 protocol 112 through the WAN path, and the qemu
# WAN forward doesn't preserve a HOME_LAN source address for mDNS.
# JSON output is more stable than text against nft's canonicalization
# quirks (e.g. `ip protocol 112` ↔ `ip protocol vrrp`).
- name: _verify_input | INPUT — get nft ruleset (JSON, for structural scope checks)
  command: nft -j list table inet homelab
  register: _firewall_nft_ruleset_scope
  changed_when: false
  become: true

- name: _verify_input | INPUT — VRRP rule absent on non-keepalived peers
  vars:
    vrrp_rules: "{{ _firewall_nft_ruleset_scope.stdout | nft_rules_by_counter('vrrp_accept') }}"
  assert:
    that:
      - vrrp_rules | length == 0
    fail_msg: >-
      Non-keepalived host rendered a VRRP accept rule; only hosts in
      dns_keepalived_peers should accept peer VRRP.
  when: inventory_hostname not in dns_keepalived_peers

- name: _verify_input | INPUT — VRRP rule renders with iifname + protocol scope
  vars:
    # Anchor on the rule's counter reference rather than its comment
    # text. Counter names are part of each rule's functional identity;
    # comments are documentation and may be rephrased without breaking
    # the rule. nft -j renders a per-rule `counter name "<name>"`
    # reference as `{"counter": "<name>"}` (bare string value), not
    # `{"counter": {"name": "<name>"}}` -- the latter shape is what
    # nft uses for the standalone counter *declaration* at the head
    # of the table, not for references inside rule expressions.
    # `contains` on the exact reference dict finds the matching rule.
    vrrp_rule: "{{ _firewall_nft_ruleset_scope.stdout | nft_rule_by_counter('vrrp_accept') }}"
    vrrp_matches: "{{ vrrp_rule.expr
                      | selectattr('match', 'defined')
                      | map(attribute='match') | list }}"
  assert:
    that:
      - (vrrp_matches | selectattr('left.meta', 'defined') | selectattr('left.meta.key', 'eq', 'iifname') | map(attribute='right') | first) == default_interface
      - (vrrp_matches | selectattr('left.payload', 'defined') | selectattr('left.payload.field', 'eq', 'protocol') | map(attribute='right') | first) in ['vrrp', 112]
    fail_msg: >-
      VRRP rule referencing counter `vrrp_accept` is missing
      iifname={{ default_interface }} or protocol=vrrp scope.
  when: inventory_hostname in dns_keepalived_peers

- name: _verify_input | INPUT — mDNS rendered rule keeps LAN iif/source/port scope
  vars:
    mdns_rule: "{{ _firewall_nft_ruleset_scope.stdout | nft_rule_by_counter('mdns_accept') }}"
    mdns_matches: "{{ mdns_rule.expr
                      | selectattr('match', 'defined')
                      | map(attribute='match') | list }}"
    mdns_saddr: "{{ mdns_matches
                    | selectattr('left.payload', 'defined')
                    | selectattr('left.payload.protocol', 'eq', 'ip')
                    | selectattr('left.payload.field', 'eq', 'saddr')
                    | map(attribute='right') | first }}"
  assert:
    that:
      - (mdns_matches | selectattr('left.meta', 'defined') | selectattr('left.meta.key', 'eq', 'iifname') | map(attribute='right') | first) == default_interface
      - mdns_saddr.prefix.addr == (network.sites.home.cidr | ansible.utils.ipaddr('network'))
      - (mdns_saddr.prefix.len | int) == (network.sites.home.cidr | ansible.utils.ipaddr('prefix') | int)
      - (mdns_matches | selectattr('left.payload', 'defined') | selectattr('left.payload.protocol', 'eq', 'udp') | selectattr('left.payload.field', 'eq', 'dport') | map(attribute='right') | first | int) == 5353
    fail_msg: >-
      mDNS firewall rule lost its iifname, home-LAN source, or UDP/5353 scope.
