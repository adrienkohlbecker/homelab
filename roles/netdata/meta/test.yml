# Release-divergent: the install path branches at major version 26 -- jammy/noble
# (< 26) take the apt-repo branch, resolute (>= 26) takes the >= 26 branch.
# resolute is the only divergent release.
ubuntu:
  - resolute
# _setup.yml imports test/nginx + test/authelia_stub and the _verify path
# exercises the full nginx+Authelia front (token bypass, redacted access
# log), so route to box_deps where nginx is pre-baked (packer/seed_deps.yml)
# to skip the apt-backports + nginx install on every test run. netdata itself
# isn't pre-baked -- the saving is the shared nginx bringup, same as the
# the fluentbit consumer of the same _setup pattern.
machines:
  box_deps:
# The keepalived_vrrp _verify chart never registers on a cell. Its fixture is a
# loopback VIP (198.51.100.10/32 on lo), NOT a real keepalived VIP, so the cause
# is likely cell-side (charts.d collector / timing) rather than the L2 limit
# that grounds udm_dns_failover — a candidate to re-enable after a cell-side
# debug, ahead of the ENI work. Skipped on aws meanwhile; full qemu coverage.
aws_skip:
  box_deps: keepalived_vrrp _verify chart fails to register on a cell (cause TBD)
  box_deps:resolute: keepalived_vrrp _verify chart fails to register on a cell (cause TBD)
