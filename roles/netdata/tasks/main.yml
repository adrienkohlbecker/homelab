- name: Require netdata_alerts_token to be defined
  assert:
    that:
      - netdata_alerts_token is defined
      - netdata_alerts_token | length >= 16
    fail_msg: >-
      netdata_alerts_token must be set in group_vars/prod.yml (vaulted
      with --encrypt-vault-id prod) or group_vars/test.yml. Fronts the
      URL-param bypass that lab's homepage_alerts poller uses to fetch
      cross-host netdata over nginx; see notes/authelia_rollout.md.
  tags:
    - netdata

- name: Install netdata package
  import_role:
    name: netdata
    tasks_from: install
  tags:
    - netdata

- name: Configure netdata daemon
  import_tasks: configure.yml
  tags:
    - netdata

- name: Configure netdata alerts
  import_tasks: alerts.yml
  tags:
    - netdata

- name: Configure systemdunits metrics
  import_role:
    name: netdata
    tasks_from: config
  vars:
    netdata_args:
      src: systemdunits.conf
      dest: go.d/systemdunits.conf
      restart: "{{ not (ansible_check_mode and (netdata_apt.changed or netdata_apt_repo.changed)) }}"
  tags:
    - netdata

- name: Setup shell for netdata user (for console troubleshooting)
  file:
    path: /var/lib/netdata/.zshrc
    state: touch
    access_time: preserve
    modification_time: preserve
    # Owned by netdata, not root: netdata chowns /var/lib/netdata to itself
    # on startup, so a root-owned file here flips back to netdata every
    # converge (breaks idempotence) and can't durably resist the daemon
    # anyway.
    owner: netdata
    group: netdata
    mode: "0644"
  become: true
  tags:
    - netdata

- name: Configure nginx
  import_role:
    name: nginx
    tasks_from: site
  vars:
    nginx_site_args:
      subdomain: netdata
      proxy_pass: http://127.0.0.1:19999/
      # Browser path goes through Authelia; lab's homepage_alerts timer
      # polls cross-host (e.g. https://netdata.pug.fahm.fr/api/v1/alarms)
      # with no cookie/Basic auth, so it appends ?auth_token=<secret> on
      # every URL to bypass the auth_request subrequest. The token is
      # the same vaulted secret across all netdata hosts so a single
      # poller can hit any of them. Loopback fetches on the host running
      # homepage_alerts skip nginx entirely and don't need the token.
      # Tradeoff: one static secret fleet-wide, carried in the URL query
      # string (so it can land in proxy logs/history) with no rotation
      # beyond a vault edit + reconverge. The blast radius is bounded to the
      # read API by the `allow {management,netdata.conf} from = none` ACLs
      # set in "Configure netdata" above.
      # See notes/authelia_rollout.md and alerts_generate.py.
      auth: required
      bypass_query_param:
        name: auth_token
        value: "{{ netdata_alerts_token }}"
      # alarm_log?count=10000 (polled by homepage_alerts every 30s) returns
      # ~hundreds of KB to a few MB; default 8x4k buffers spill to disk.
      # Measured 1.7MB on pug -- 16x64k=1MB still spills (~2k warn/day);
      # 32x128k=4MB gives 2x headroom for future alarm growth.
      location_conf: |
        proxy_buffer_size 16k;
        proxy_buffers 32 128k;
  tags:
    - netdata

