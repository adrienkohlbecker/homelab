- name: Install netdata package
  import_role:
    name: netdata
    tasks_from: install
  tags:
    - netdata

- name: Divert configuration file
  community.general.dpkg_divert:
    path: /etc/netdata/netdata.conf
  become: true
  tags:
    - netdata

- name: Configure netdata
  ini_file:
    path: /etc/netdata/netdata.conf
    section: "{{ item.section }}"
    option: "{{ item.option }}"
    value: "{{ item.value }}"
    owner: netdata
    group: netdata
    mode: "0644"
    ignore_spaces: true
    backup: true
  loop:
    - section: web
      option: bind to
      value: 127.0.0.1
    - section: global
      option: access log
      value: none # accesses are logged by nginx
    - section: db
      option: update every
      value: 5
    # Drop tier 2 (1h resolution / 2-year retention). Tier 0 + tier 1
    # still give 14 days at 5s + 90 days at 1m, which covers any chart
    # you'd actually look at on a homelab. Saves ~100-150 MiB of
    # per-metric overhead in the main netdata process.
    - section: db
      option: storage tiers
      value: 2
    # ML anomaly detection trains a model per metric. Memory cost grows
    # with metric count and the alerts aren't actionable here.
    - section: ml
      option: enabled
      value: 'no'
    # ebpf.plugin loads syscall/process eBPF programs and runs as its
    # own ~300 MiB process. Useful for syscall-level forensics, dead
    # weight if nobody looks at it.
    - section: plugins
      option: ebpf
      value: 'no'
    - section: registry
      option: enabled
      value: 'yes'
    - section: registry
      option: registry to announce
      value: https://netdata.{{ inventory_hostname }}.{{ domain }}
  register: netdata_conf
  become: true
  tags:
    - netdata

- name: Copy the cloud config
  copy:
    src: cloud.conf
    dest: /var/lib/netdata/cloud.d/cloud.conf
    owner: netdata
    group: netdata
    mode: "0644"
    backup: true
  register: cloud_conf
  become: true
  tags:
    - netdata

- name: Configure prometheus metrics
  import_role:
    name: netdata
    tasks_from: template
  vars:
    netdata_template_src: prometheus.conf.j2
    netdata_template_dest: go.d/prometheus.conf
    netdata_template_mode: "0600"
    netdata_template_restart: "{{ not (ansible_check_mode and (netdata_apt.changed or apt_repository_netdata.changed)) }}"
  tags:
    - netdata

- name: Disable analytics
  file:
    path: /etc/netdata/.opt-out-from-anonymous-statistics
    state: touch
    access_time: preserve
    modification_time: preserve
    owner: netdata
    group: netdata
    mode: "0644"
  register: netdata_optout
  become: true
  tags:
    - netdata

- name: Configure docker metrics
  import_role:
    name: netdata
    tasks_from: copy
  vars:
    netdata_copy_src: docker.conf
    netdata_copy_dest: go.d/docker.conf
    netdata_copy_restart: "{{ not (ansible_check_mode and (netdata_apt.changed or apt_repository_netdata.changed)) }}"
  tags:
    - netdata

- name: Install intel-gpu-tools
  when: ansible_architecture == "x86_64"
  apt:
    pkg: intel-gpu-tools
    cache_valid_time: 3600
  become: true
  tags:
    - netdata

- name: Configure intel gpu metrics
  import_role:
    name: netdata
    tasks_from: copy
  vars:
    netdata_copy_src: intelgpu.conf
    netdata_copy_dest: go.d/intelgpu.conf
    netdata_copy_condition: '{{ ansible_architecture == "x86_64" }}'
    netdata_copy_restart: "{{ not (ansible_check_mode and (netdata_apt.changed or apt_repository_netdata.changed)) }}"
  tags:
    - netdata

- name: Copy health_alarm_notify template
  command: cp /usr/lib/netdata/conf.d/health_alarm_notify.conf /etc/netdata/health_alarm_notify.conf
  args:
    creates: /etc/netdata/health_alarm_notify.conf
  register: netdata_health_alarm_notify_template
  become: true
  tags:
    - netdata

- name: Setup health_alarm_notify
  when: not (ansible_check_mode and netdata_health_alarm_notify_template.changed)
  lineinfile:
    path: /etc/netdata/health_alarm_notify.conf
    regexp: "{{ item.line }}"
    line: "{{ item.value }}"
    validate: bash -n %s
    backup: true
  loop:
    - line: ^SEND_EMAIL=
      value: SEND_EMAIL="NO"
    - line: ^SEND_TELEGRAM=
      value: SEND_TELEGRAM="YES"
    - line: ^TELEGRAM_BOT_TOKEN=
      value: TELEGRAM_BOT_TOKEN="{{ telegram_netdata_bot_token }}"
    - line: ^DEFAULT_RECIPIENT_TELEGRAM=
      value: DEFAULT_RECIPIENT_TELEGRAM="{{ telegram_personal_chat_id }}"
  register: netdata_health_alarm_notify
  become: true
  tags:
    - netdata

- name: Add user to podman-socket group
  user:
    name: netdata
    groups: podman-socket
    append: true
  become: true
  tags:
    - netdata

- name: Mount debugfs
  mount:
    path: /sys/kernel/debug
    src: /debugfs
    fstype: debugfs
    opts: defaults,noatime
    state: mounted
    backup: true
  register: debugfs_mount
  become: true
  tags:
    - netdata

# Drop-in override that blocks `systemctl start/restart netdata` on the
# HTTP API answering. Without it, downstream `netdatacli reload-health`
# in health_copy/health_template races against /run/netdata/netdata.pipe
# coming up — Type=notify's READY=1 fires before the listener is fully
# accepting connections. Installed before "Enable netdata service" so
# the first start (and every subsequent restart) is synchronous.
- name: Create netdata service override directory
  file:
    dest: /etc/systemd/system/netdata.service.d
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true
  tags:
    - netdata

- name: Install netdata service override
  import_role:
    name: systemd_unit
    tasks_from: copy
  vars:
    systemd_unit_src: override.conf
    systemd_unit_dest: netdata.service.d/override.conf
    systemd_unit_verify: netdata.service
  tags:
    - netdata

# Enable+start the service before the alert/metrics config writes so
# `netdatacli reload-health` (in health_copy/health_template) lands on
# a running daemon. On first install the service starts with stock
# alerts; the role then writes custom alerts and reload-health hot-loads
# them. Brief gap is acceptable on a fresh install.
- name: Enable netdata service
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_src: netdata
    systemd_unit_condition: "{{ not (ansible_check_mode and (netdata_apt.changed or apt_repository_netdata.changed)) }}"
    systemd_unit_restart: "{{ netdata_conf.changed or cloud_conf.changed or netdata_optout.changed or netdata_health_alarm_notify.changed or debugfs_mount.changed or netdata_service_d_override_conf_result.changed }}"
  tags:
    - netdata

- name: Configure netdata alerts
  import_role:
    name: netdata
    tasks_from: health_copy
  vars:
    netdata_copy_src: systemdunits_alerts.conf
    netdata_copy_dest: systemdunits.conf
    netdata_copy_restart: "{{ not (ansible_check_mode and (netdata_apt.changed or apt_repository_netdata.changed)) }}"
  tags:
    - netdata

- name: Configure netdata alerts
  import_role:
    name: netdata
    tasks_from: health_template
  vars:
    netdata_template_src: zfs_alerts_override.conf.j2
    netdata_template_dest: zfs_alerts_override.conf
    netdata_template_restart: "{{ not (ansible_check_mode and (netdata_apt.changed or apt_repository_netdata.changed)) }}"
  tags:
    - netdata

- name: Configure systemdunits metrics
  import_role:
    name: netdata
    tasks_from: copy
  vars:
    netdata_copy_src: systemdunits.conf
    netdata_copy_dest: go.d/systemdunits.conf
    netdata_copy_restart: "{{ not (ansible_check_mode and (netdata_apt.changed or apt_repository_netdata.changed)) }}"
  tags:
    - netdata

- name: Setup shell for netdata user (for console troubleshooting)
  file:
    path: /var/lib/netdata/.zshrc
    state: touch
    access_time: preserve
    modification_time: preserve
    owner: netdata
    group: netdata
    mode: "0644"
  become: true
  tags:
    - netdata

- name: Configure nginx
  import_role:
    name: nginx
    tasks_from: site
  vars:
    nginx_subdomain: netdata
    nginx_proxy_pass: http://127.0.0.1:19999/
  tags:
    - netdata

- name: Install fail2ban metrics
  import_role:
    name: fail2ban
    tasks_from: netdata
  vars:
    netdata_restart: "{{ not (ansible_check_mode and (netdata_apt.changed or apt_repository_netdata.changed)) }}"
  tags:
    - netdata

- name: Install smart metrics
  import_role:
    name: smart
    tasks_from: netdata
  vars:
    netdata_restart: "{{ not (ansible_check_mode and (netdata_apt.changed or apt_repository_netdata.changed)) }}"
  tags:
    - netdata

- name: Install lm_sensors metrics
  import_role:
    name: lm_sensors
    tasks_from: netdata
  vars:
    netdata_restart: "{{ not (ansible_check_mode and (netdata_apt.changed or apt_repository_netdata.changed)) }}"
  tags:
    - netdata

- name: Install certbot metrics
  import_role:
    name: certbot
    tasks_from: netdata
  vars:
    netdata_restart: "{{ not (ansible_check_mode and (netdata_apt.changed or apt_repository_netdata.changed)) }}"
  tags:
    - netdata

- name: Install nginx metrics
  import_role:
    name: nginx
    tasks_from: netdata
  vars:
    netdata_restart: "{{ not (ansible_check_mode and (netdata_apt.changed or apt_repository_netdata.changed)) }}"
  tags:
    - netdata
