- name: Install netdata package
  import_role:
    name: netdata
    tasks_from: install
  tags:
    - netdata

- name: Divert configuration file
  community.general.dpkg_divert:
    path: /etc/netdata/netdata.conf
  become: true
  tags:
    - netdata

- name: Configure netdata
  ini_file:
    path: /etc/netdata/netdata.conf
    section: "{{ item.section }}"
    option: "{{ item.option }}"
    value: "{{ item.value }}"
    owner: netdata
    group: netdata
    mode: "0644"
    ignore_spaces: true
    backup: true
  loop:
    - section: web
      option: bind to
      value: 127.0.0.1
    - section: global
      option: access log
      value: none # accesses are logged by nginx
    - section: db
      option: update every
      value: 5
    # Drop tier 2 (1h resolution / 2-year retention). Tier 0 + tier 1
    # still give 14 days at 5s + 90 days at 1m, which covers any chart
    # you'd actually look at on a homelab. Saves ~100-150 MiB of
    # per-metric overhead in the main netdata process.
    - section: db
      option: storage tiers
      value: 2
    # ML anomaly detection trains a model per metric. Memory cost grows
    # with metric count and the alerts aren't actionable here.
    - section: ml
      option: enabled
      value: 'no'
    # ebpf.plugin loads syscall/process eBPF programs and runs as its
    # own ~300 MiB process. Useful for syscall-level forensics, dead
    # weight if nobody looks at it.
    - section: plugins
      option: ebpf
      value: 'no'
    - section: registry
      option: enabled
      value: 'yes'
    - section: registry
      option: registry to announce
      value: https://netdata.{{ inventory_hostname }}.{{ domain }}
  register: netdata_conf
  become: true
  tags:
    - netdata

- name: Copy the cloud config
  copy:
    src: cloud.conf
    dest: /var/lib/netdata/cloud.d/cloud.conf
    owner: netdata
    group: netdata
    mode: "0644"
    backup: true
  register: cloud_conf
  become: true
  tags:
    - netdata

- name: Configure prometheus metrics
  import_role:
    name: netdata
    tasks_from: template
  vars:
    netdata_args:
      src: prometheus.conf.j2
      dest: go.d/prometheus.conf
      mode: "0600"
      restart: "{{ not (ansible_check_mode and (netdata_apt.changed or apt_repository_netdata.changed)) }}"
  tags:
    - netdata

- name: Copy stock go.d.conf
  command: cp /usr/lib/netdata/conf.d/go.d.conf /etc/netdata/go.d.conf
  args:
    creates: /etc/netdata/go.d.conf
  register: netdata_godconf_copy
  become: true
  tags:
    - netdata

- name: Disable pihole collector in go.d.conf
  when: not (ansible_check_mode and netdata_godconf_copy.changed)
  lineinfile:
    path: /etc/netdata/go.d.conf
    regexp: '^[#\s]*pihole:\s+'
    line: '  pihole: no'
    backup: true
  register: netdata_godconf_pihole
  become: true
  tags:
    - netdata

- name: Disable analytics
  file:
    path: /etc/netdata/.opt-out-from-anonymous-statistics
    state: touch
    access_time: preserve
    modification_time: preserve
    owner: netdata
    group: netdata
    mode: "0644"
  register: netdata_optout
  become: true
  tags:
    - netdata

- name: Configure docker metrics
  import_role:
    name: netdata
    tasks_from: copy
  vars:
    netdata_args:
      src: docker.conf
      dest: go.d/docker.conf
      restart: "{{ not (ansible_check_mode and (netdata_apt.changed or apt_repository_netdata.changed)) }}"
  tags:
    - netdata

- name: Install intel-gpu-tools
  when: ansible_architecture == "x86_64"
  apt:
    pkg: intel-gpu-tools
    cache_valid_time: 3600
  become: true
  tags:
    - netdata

- name: Configure intel gpu metrics
  import_role:
    name: netdata
    tasks_from: copy
  vars:
    netdata_args:
      src: intelgpu.conf
      dest: go.d/intelgpu.conf
      condition: '{{ ansible_architecture == "x86_64" }}'
      restart: "{{ not (ansible_check_mode and (netdata_apt.changed or apt_repository_netdata.changed)) }}"
  tags:
    - netdata

- name: Copy health_alarm_notify template
  command: cp /usr/lib/netdata/conf.d/health_alarm_notify.conf /etc/netdata/health_alarm_notify.conf
  args:
    creates: /etc/netdata/health_alarm_notify.conf
  register: netdata_health_alarm_notify_template
  become: true
  tags:
    - netdata

- name: Setup health_alarm_notify
  when: not (ansible_check_mode and netdata_health_alarm_notify_template.changed)
  lineinfile:
    path: /etc/netdata/health_alarm_notify.conf
    regexp: "{{ item.line }}"
    line: "{{ item.value }}"
    validate: bash -n %s
    backup: true
  loop:
    - line: ^SEND_EMAIL=
      value: SEND_EMAIL="NO"
    - line: ^SEND_TELEGRAM=
      value: SEND_TELEGRAM="YES"
    - line: ^TELEGRAM_BOT_TOKEN=
      value: TELEGRAM_BOT_TOKEN="{{ telegram_netdata_bot_token }}"
    - line: ^DEFAULT_RECIPIENT_TELEGRAM=
      value: DEFAULT_RECIPIENT_TELEGRAM="{{ telegram_personal_chat_id }}"
  register: netdata_health_alarm_notify
  become: true
  tags:
    - netdata

- name: Add user to podman-socket group
  user:
    name: netdata
    groups: podman-socket
    append: true
  become: true
  tags:
    - netdata

- name: Mount debugfs
  mount:
    path: /sys/kernel/debug
    src: /debugfs
    fstype: debugfs
    opts: defaults,noatime
    state: mounted
    backup: true
  register: debugfs_mount
  become: true
  tags:
    - netdata

# Drop-in override that blocks `systemctl start/restart netdata` on the
# HTTP API answering. Without it, downstream `netdatacli reload-health`
# in health_copy/health_template races against /run/netdata/netdata.pipe
# coming up — Type=notify's READY=1 fires before the listener is fully
# accepting connections. Installed before "Enable netdata service" so
# the first start (and every subsequent restart) is synchronous.
- name: Install netdata service override
  import_role:
    name: systemd_unit
    tasks_from: dropin
  vars:
    systemd_unit_args:
      src: override.conf
      for: netdata.service
  tags:
    - netdata

# Enable+start the service before the alert/metrics config writes so
# `netdatacli reload-health` (in health_copy/health_template) lands on
# a running daemon. On first install the service starts with stock
# alerts; the role then writes custom alerts and reload-health hot-loads
# them. Brief gap is acceptable on a fresh install.
- name: Enable netdata service
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: netdata
      condition: "{{ not (ansible_check_mode and (netdata_apt.changed or apt_repository_netdata.changed)) }}"
      restart: "{{ netdata_conf.changed or cloud_conf.changed or netdata_optout.changed or netdata_health_alarm_notify.changed or debugfs_mount.changed or netdata_service_d_override_conf_result.changed or netdata_pihole_conf_removed.changed or netdata_godconf_copy.changed or netdata_godconf_pihole.changed }}"
  tags:
    - netdata

- name: Configure netdata alerts
  import_role:
    name: netdata
    tasks_from: health_copy
  vars:
    netdata_args:
      src: systemdunits_alerts.conf
      dest: systemdunits.conf
      restart: "{{ not (ansible_check_mode and (netdata_apt.changed or apt_repository_netdata.changed)) }}"
  tags:
    - netdata

- name: Configure netdata alerts
  import_role:
    name: netdata
    tasks_from: health_template
  vars:
    netdata_args:
      src: zfs_alerts_override.conf.j2
      dest: zfs_alerts_override.conf
      restart: "{{ not (ansible_check_mode and (netdata_apt.changed or apt_repository_netdata.changed)) }}"
  tags:
    - netdata

- name: Configure netdata postfix queue alert
  import_role:
    name: netdata
    tasks_from: health_copy
  vars:
    netdata_args:
      src: postfix_alerts.conf
      dest: postfix.conf
      restart: "{{ not (ansible_check_mode and (netdata_apt.changed or apt_repository_netdata.changed)) }}"
  tags:
    - netdata

- name: Configure netdata fail2ban ban-count alert
  import_role:
    name: netdata
    tasks_from: health_copy
  vars:
    netdata_args:
      src: fail2ban_alerts.conf
      dest: fail2ban.conf
      restart: "{{ not (ansible_check_mode and (netdata_apt.changed or apt_repository_netdata.changed)) }}"
  tags:
    - netdata

- name: Configure netdata wireguard bunk-peer handshake alert
  import_role:
    name: netdata
    tasks_from: health_template
  vars:
    netdata_args:
      src: wireguard_alerts.conf.j2
      dest: wireguard.conf
      restart: "{{ not (ansible_check_mode and (netdata_apt.changed or apt_repository_netdata.changed)) }}"
  tags:
    - netdata

- name: Configure netdata SMART + NVMe wear alerts
  import_role:
    name: netdata
    tasks_from: health_copy
  vars:
    netdata_args:
      src: disk_health_alerts.conf
      dest: disk_health.conf
      restart: "{{ not (ansible_check_mode and (netdata_apt.changed or apt_repository_netdata.changed)) }}"
  tags:
    - netdata

# Un-silence the two predictive disk-fill alarms shipped in upstream
# /usr/lib/netdata/conf.d/health.d/disks.conf. Upstream sets
# `to: silent` on out_of_disk_space_time and out_of_disk_inodes_time
# because the 1h linear extrapolation can be noisy on bursty cloud
# workloads. On lab/pug the workload is stable enough that the
# prediction is a useful early warning -- the static disk_space_usage
# alarm only escalates to CRITICAL at 98% used + <5GB free, which
# leaves no room to react (the 2026-05-15 /var/lib/containers fill
# went WARNING -> CRITICAL in ~10s as the zvol passed 98%, with no
# usable lead time).
#
# Patching disks.conf rather than re-declaring the templates because
# the upstream calc depends on $disk_fill_rate (a sibling template);
# re-declaring would require maintaining that whole chain in-tree and
# is brittle across netdata upgrades. The `replace` regex is anchored
# to each template's name so the other `to: silent` entries in the
# file (10min_disk_utilization, 10min_disk_backlog -- legitimately
# silent) are preserved.
- name: Stage upstream disks.conf into /etc/netdata/health.d
  command: cp /usr/lib/netdata/conf.d/health.d/disks.conf /etc/netdata/health.d/disks.conf
  args:
    creates: /etc/netdata/health.d/disks.conf
  register: netdata_disks_staged
  become: true
  tags:
    - netdata

- name: Un-silence out_of_disk_space_time
  when: not (ansible_check_mode and netdata_disks_staged.changed)
  replace:
    path: /etc/netdata/health.d/disks.conf
    # (?s) = dotall so .*? spans newlines; non-greedy stops at the
    # FIRST `to: silent` after the template header, which is the one
    # belonging to this template (other templates intervene with their
    # own `to:` fields before another silent one appears).
    regexp: '(?s)(template:\s*out_of_disk_space_time\b.*?\bto:\s*)silent'
    replace: '\1sysadmin'
    backup: true
  register: netdata_disks_space_unsilenced
  become: true
  tags:
    - netdata

- name: Un-silence out_of_disk_inodes_time
  when: not (ansible_check_mode and netdata_disks_staged.changed)
  replace:
    path: /etc/netdata/health.d/disks.conf
    regexp: '(?s)(template:\s*out_of_disk_inodes_time\b.*?\bto:\s*)silent'
    replace: '\1sysadmin'
    backup: true
  register: netdata_disks_inodes_unsilenced
  become: true
  tags:
    - netdata

- name: Reload netdata health after disks.conf edits
  when: netdata_disks_staged.changed or netdata_disks_space_unsilenced.changed or netdata_disks_inodes_unsilenced.changed
  command: netdatacli reload-health
  changed_when: true
  become: true
  tags:
    - netdata

# Same staging+replace pattern as disks.conf above, for timex.conf's
# system_clock_sync_state alarm. The kernel's ntp_adjtime() exposes a
# clock-synchronized bit; that bit going to 0 means the local clock has
# drifted out of sync with whatever ntp daemon is configured (chrony on
# lab/pug). Upstream defaults `to: silent` because clock-sync is "boring"
# on most cloud hosts -- but on lab/pug an out-of-sync clock breaks
# TLS-cert validation, signed-package apt-get, and zfs replication
# bookmarks. Cheap to alert on; not noisy in steady state.
- name: Stage upstream timex.conf into /etc/netdata/health.d
  command: cp /usr/lib/netdata/conf.d/health.d/timex.conf /etc/netdata/health.d/timex.conf
  args:
    creates: /etc/netdata/health.d/timex.conf
  register: netdata_timex_staged
  become: true
  tags:
    - netdata

- name: Un-silence system_clock_sync_state
  when: not (ansible_check_mode and netdata_timex_staged.changed)
  replace:
    path: /etc/netdata/health.d/timex.conf
    # `alarm:` (not `template:`) since this binds to a single named chart
    # rather than fanning out across a context. Same (?s)/.*? shape as
    # disks.conf so the regex stops at the first `to: silent` after the
    # alarm header.
    regexp: '(?s)(alarm:\s*system_clock_sync_state\b.*?\bto:\s*)silent'
    replace: '\1sysadmin'
    backup: true
  register: netdata_timex_unsilenced
  become: true
  tags:
    - netdata

- name: Reload netdata health after timex.conf edits
  when: netdata_timex_staged.changed or netdata_timex_unsilenced.changed
  command: netdatacli reload-health
  changed_when: true
  become: true
  tags:
    - netdata

- name: Configure systemdunits metrics
  import_role:
    name: netdata
    tasks_from: copy
  vars:
    netdata_args:
      src: systemdunits.conf
      dest: go.d/systemdunits.conf
      restart: "{{ not (ansible_check_mode and (netdata_apt.changed or apt_repository_netdata.changed)) }}"
  tags:
    - netdata

- name: Setup shell for netdata user (for console troubleshooting)
  file:
    path: /var/lib/netdata/.zshrc
    state: touch
    access_time: preserve
    modification_time: preserve
    owner: netdata
    group: netdata
    mode: "0644"
  become: true
  tags:
    - netdata

- name: Configure nginx
  import_role:
    name: nginx
    tasks_from: site
  vars:
    nginx_site_args:
      subdomain: netdata
      proxy_pass: http://127.0.0.1:19999/
  tags:
    - netdata

- name: Install fail2ban metrics
  import_role:
    name: fail2ban
    tasks_from: netdata
  vars:
    netdata_restart: "{{ not (ansible_check_mode and (netdata_apt.changed or apt_repository_netdata.changed)) }}"
  tags:
    - netdata

- name: Install smart metrics
  import_role:
    name: smart
    tasks_from: netdata
  vars:
    netdata_restart: "{{ not (ansible_check_mode and (netdata_apt.changed or apt_repository_netdata.changed)) }}"
  tags:
    - netdata

- name: Install hdparm metrics
  import_role:
    name: hdparm
    tasks_from: netdata
  tags:
    - netdata

- name: Install systemd_timer metrics
  import_role:
    name: systemd_timer
    tasks_from: netdata
  tags:
    - netdata

- name: Install netdata_presence metrics
  import_role:
    name: netdata
    tasks_from: presence
  tags:
    - netdata

- name: Install lm_sensors metrics
  import_role:
    name: lm_sensors
    tasks_from: netdata
  vars:
    netdata_restart: "{{ not (ansible_check_mode and (netdata_apt.changed or apt_repository_netdata.changed)) }}"
  tags:
    - netdata

- name: Install certbot metrics
  import_role:
    name: certbot
    tasks_from: netdata
