# Functional verification of netdata_presence.chart.sh and the
# context_liveness templates that consume netdata_contexts /
# netdata_collectors. host_vars/box.yml seeds:
#   netdata_contexts:
#     system_cpu: system.cpu             (real chart, always live)
#     ghost: foo.does_not_exist          (never-existed chart)
#   netdata_collectors:
#     - go.d:collector:systemdunits:service-units  (real, always-live -- the role configures it)
#     - go.d:collector:fake_plugin:fake_job        (never-existed collector)
# So the collector emits present=1 for system_cpu + systemdunits and
# present=0 for ghost + fake_plugin:fake_job, and the health templates fan
# out across the resulting charts. systemdunits is the present=1 witness for
# the collector prefix match (instanced mode, plugin != job) -- not just the
# trivial present=0 path; fake_plugin:fake_job is the present=0 witness.

- name: _verify | Netdata.service is loaded and active
  systemd:
    name: netdata
  register: _netdata_unit
  failed_when: >-
    _netdata_unit.status.LoadState != "loaded"
    or _netdata_unit.status.ActiveState != "active"
  become: true

# netdata is the only flat-repo (trailing-slash suite, no components) + glob-pin
# ("netdata*") consumer, so the shared apt_source _verify runs here to cover
# that path: the signing key is scoped (not globally trusted) and the 2.* pin
# wins at priority 999 from the mirror. No tombstone/negative-key args: netdata
# never removes its source, and since the nodejs consumer was retired the
# apt_source state:absent / negative-fingerprint paths have no live exerciser
# (the helper capability stays; re-add tombstone args from a consumer that
# actually removes a source if that coverage is wanted again).
- name: _verify | Netdata apt_source contract (flat repo, scoped key, glob pin)
  import_role:
    name: apt_source
    tasks_from: _verify
  vars:
    apt_source_args:
      name: netdata
      uris: "{{ mirror_apt_netdata }}/"
      pin:
        package: "netdata*"
        version: "2.*"
        priority: 999

- name: _verify | Add loopback VIP fixture for keepalived_vrrp collector
  command: ip addr replace 198.51.100.10/32 dev lo
  changed_when: false
  become: true

- name: _verify | Install keepalived_vrrp collector fixture
  import_role:
    name: netdata
    tasks_from: charts_d
  vars:
    netdata_keepalived_vrrp_ip: 198.51.100.10
    netdata_keepalived_vrrp_update_every: 5
    netdata_args:
      name: keepalived_vrrp
      script: keepalived_vrrp.chart.sh
      conf: charts_d_keepalived_vrrp.conf.j2

- name: _verify | Install keepalived_vrrp lost-master alert fixture
  import_role:
    name: netdata
    tasks_from: health
  vars:
    netdata_args:
      src: keepalived_vrrp_alerts.conf
      dest: keepalived_vrrp.conf

- name: _verify | Wait for keepalived_vrrp chart to register
  uri:
    url: http://localhost:{{ service_ports.netdata }}/api/v1/charts
    return_content: true
  register: _netdata_keepalived_vrrp_charts
  retries: 30
  delay: 2
  until: >-
    _netdata_keepalived_vrrp_charts.status == 200
    and 'keepalived_vrrp.state' in (_netdata_keepalived_vrrp_charts.content | from_json).charts.keys()

- name: _verify | Keepalived_vrrp fixture reports holds_vip=1
  uri:
    url: http://localhost:{{ service_ports.netdata }}/api/v1/data?chart=keepalived_vrrp.state&points=1&after=-90&format=json
    return_content: true
  register: _netdata_keepalived_vrrp_data
  retries: 30
  delay: 2
  until: >-
    _netdata_keepalived_vrrp_data.status == 200
    and 'holds_vip' in (_netdata_keepalived_vrrp_data.json.labels | default([]))
    and (_netdata_keepalived_vrrp_data.json.data | default([])) | length > 0
    and _netdata_keepalived_vrrp_data.json.data[0][_netdata_keepalived_vrrp_data.json.labels.index('holds_vip')] | int == 1

- name: _verify | Keepalived_vrrp chart carries VIP label + shared context
  uri:
    url: http://localhost:{{ service_ports.netdata }}/api/v1/chart?chart=keepalived_vrrp.state
    return_content: true
  register: _netdata_keepalived_vrrp_chart
- name: _verify | Assert keepalived_vrrp labels + context
  assert:
    that:
      - _netdata_keepalived_vrrp_chart.json.context == "keepalived_vrrp.state"
      - _netdata_keepalived_vrrp_chart.json.chart_labels.vip | default('') == "198.51.100.10"
    fail_msg: >-
      chart {{ _netdata_keepalived_vrrp_chart.json.id }} context={{ _netdata_keepalived_vrrp_chart.json.context }}
      labels={{ _netdata_keepalived_vrrp_chart.json.chart_labels | default({}) }}

- name: _verify | Keepalived lost-master alert registered against the fixture
  uri:
    url: http://localhost:{{ service_ports.netdata }}/api/v1/alarms?all
    return_content: true
  register: _netdata_keepalived_vrrp_alarms
  retries: 30
  delay: 2
  until: >-
    _netdata_keepalived_vrrp_alarms.status == 200
    and (_netdata_keepalived_vrrp_alarms.content | from_json).alarms.keys() | list
        | select('search', 'keepalived_vrrp.state.keepalived_lost_master') | list | length > 0

- name: _verify | Remove keepalived_vrrp alert fixture
  file:
    path: /etc/netdata/health.d/keepalived_vrrp.conf
    state: absent
  register: _netdata_keepalived_vrrp_alert_cleanup
  become: true

- name: _verify | Reload health after keepalived_vrrp alert fixture cleanup
  when: _netdata_keepalived_vrrp_alert_cleanup.changed
  import_tasks: reload_health.yml

- name: _verify | Remove keepalived_vrrp collector fixture files
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - /usr/libexec/netdata/charts.d/keepalived_vrrp.chart.sh
    - /etc/netdata/charts.d/keepalived_vrrp.conf
  register: _netdata_keepalived_vrrp_collector_cleanup
  become: true

- name: _verify | Remove loopback VIP fixture
  command: ip addr del 198.51.100.10/32 dev lo
  changed_when: false
  failed_when: false
  become: true

- name: _verify | Restart netdata after keepalived_vrrp collector fixture cleanup
  when: _netdata_keepalived_vrrp_collector_cleanup.changed
  systemd:
    name: netdata
    state: restarted
  become: true

# Shorten update_every so the test doesn't have to wait a full minute
# for the first emission. The collector defaults to 60s; 5s lets the
# `retries: 30, delay: 2` loops below converge in seconds, not minutes.
- name: _verify | Speed up netdata_presence update_every
  copy:
    content: |
      netdata_presence_update_every=5
      netdata_presence_contexts=(
        "system_cpu=system.cpu"
        "ghost=foo.does_not_exist"
      )
      netdata_presence_collectors=(
        "go.d:collector:systemdunits:service-units"
        "go.d:collector:fake_plugin:fake_job"
      )
    dest: /etc/netdata/charts.d/netdata_presence.conf
    owner: netdata
    group: netdata
    mode: "0644"
    backup: true
  become: true

- name: _verify | Restart netdata so charts.d rereads netdata_presence.conf
  systemd:
    name: netdata
    state: restarted
  become: true

# Gate on the chart appearing before any /api/v1/data probe -- the data
# endpoint 404s for unknown charts, which would fail the task outright
# instead of letting `until:` retry.
- name: _verify | Wait for both context-presence charts to register
  uri:
    url: http://localhost:{{ service_ports.netdata }}/api/v1/charts
    return_content: true
  register: _netdata_charts
  retries: 30
  delay: 2
  until: >-
    _netdata_charts.status == 200
    and 'netdata_presence.context_system_cpu' in (_netdata_charts.content | from_json).charts.keys()
    and 'netdata_presence.context_ghost' in (_netdata_charts.content | from_json).charts.keys()
    and 'netdata_presence.collector_go_d_collector_systemdunits_service_units' in (_netdata_charts.content | from_json).charts.keys()
    and 'netdata_presence.collector_go_d_collector_fake_plugin_fake_job' in (_netdata_charts.content | from_json).charts.keys()

# `points=1` defaults to a 1-second window; with update_every=5s that
# misses 4 polls out of 5. `&after=-30` widens to 30s so a healthy
# collector lands at least a few points in range. Membership tests
# instead of `.index(...)` so a transient response shape returns False
# cleanly rather than raising and aborting the retry loop.
- name: _verify | System_cpu context resolves to present=1
  uri:
    url: http://localhost:{{ service_ports.netdata }}/api/v1/data?chart=netdata_presence.context_system_cpu&points=1&after=-30&format=json
    return_content: true
  register: _netdata_system_cpu_data
  retries: 30
  delay: 2
  until: >-
    _netdata_system_cpu_data.status == 200
    and 'present' in (_netdata_system_cpu_data.json.labels | default([]))
    and (_netdata_system_cpu_data.json.data | default([])) | length > 0
    and _netdata_system_cpu_data.json.data[0][_netdata_system_cpu_data.json.labels.index('present')] | int == 1

- name: _verify | Systemdunits collector resolves to present=1
  uri:
    url: http://localhost:{{ service_ports.netdata }}/api/v1/data?chart=netdata_presence.collector_go_d_collector_systemdunits_service_units&points=1&after=-30&format=json
    return_content: true
  register: _netdata_systemdunits_data
  retries: 30
  delay: 2
  until: >-
    _netdata_systemdunits_data.status == 200
    and 'present' in (_netdata_systemdunits_data.json.labels | default([]))
    and (_netdata_systemdunits_data.json.data | default([])) | length > 0
    and _netdata_systemdunits_data.json.data[0][_netdata_systemdunits_data.json.labels.index('present')] | int == 1

- name: _verify | Ghost context resolves to present=0
  uri:
    url: http://localhost:{{ service_ports.netdata }}/api/v1/data?chart=netdata_presence.context_ghost&points=1&after=-30&format=json
    return_content: true
  register: _netdata_ghost_data
  retries: 30
  delay: 2
  until: >-
    _netdata_ghost_data.status == 200
    and 'present' in (_netdata_ghost_data.json.labels | default([]))
    and (_netdata_ghost_data.json.data | default([])) | length > 0
    and _netdata_ghost_data.json.data[0][_netdata_ghost_data.json.labels.index('present')] | int == 0

- name: _verify | Fake_plugin:fake_job collector resolves to present=0
  uri:
    url: http://localhost:{{ service_ports.netdata }}/api/v1/data?chart=netdata_presence.collector_go_d_collector_fake_plugin_fake_job&points=1&after=-30&format=json
    return_content: true
  register: _netdata_fake_collector_data
  retries: 30
  delay: 2
  until: >-
    _netdata_fake_collector_data.status == 200
    and 'present' in (_netdata_fake_collector_data.json.labels | default([]))
    and (_netdata_fake_collector_data.json.data | default([])) | length > 0
    and _netdata_fake_collector_data.json.data[0][_netdata_fake_collector_data.json.labels.index('present')] | int == 0

# Unit-test the collector chart-prefix derivation directly. The live
# present=1 path above only exercises 'instanced' mode (systemdunits,
# plugin != job); 'exact' mode (plugin == job -- nvme, fail2ban, zfspool,
# the dominant prod shape) and the non-go.d skip have no always-live witness
# on the box fixture, so assert the pure derivation function here. Sourcing
# the collector is side-effect-free (no curl/error at load time).
- name: _verify | Assert the collector chart-prefix derivation (exact + instanced + skip)
  shell: |
    source /usr/libexec/netdata/charts.d/netdata_presence.chart.sh
    fail=0
    check() {
      got=$(_netdata_presence_collector_chart_prefix "$1")
      if [ "$got" != "$2" ]; then
        echo "FAIL: prefix('$1') = '$got', expected '$2'"
        fail=1
      fi
    }
    check "go.d:collector:nvme:nvme" "exact nvme"
    check "go.d:collector:fail2ban:fail2ban" "exact fail2ban"
    check "go.d:collector:systemdunits:service-units" "instanced systemdunits_service-units"
    check "not-go.d:foo:bar:baz" ""
    exit $fail
  args:
    executable: /bin/bash
  changed_when: false

# Each chart carries CLABELs (context+context_id for context charts,
# collector for collector charts); the alert templates use ${label:foo}
# in their summary/info so the alert text identifies which entry
# failed. Verify the labels are set as expected.
- name: _verify | System_cpu chart carries context labels + shared context
  uri:
    url: http://localhost:{{ service_ports.netdata }}/api/v1/chart?chart=netdata_presence.context_system_cpu
    return_content: true
  register: _netdata_system_cpu_chart
- name: _verify | Assert system_cpu labels + context
  assert:
    that:
      - _netdata_system_cpu_chart.json.context == "netdata_presence.context"
      - _netdata_system_cpu_chart.json.chart_labels.context | default('') == "system_cpu"
      - _netdata_system_cpu_chart.json.chart_labels.context_id | default('') == "system.cpu"
    fail_msg: >-
      chart {{ _netdata_system_cpu_chart.json.id }} context={{ _netdata_system_cpu_chart.json.context }}
      labels={{ _netdata_system_cpu_chart.json.chart_labels | default({}) }}

- name: _verify | Fake collector chart carries collector label + shared context
  uri:
    url: http://localhost:{{ service_ports.netdata }}/api/v1/chart?chart=netdata_presence.collector_go_d_collector_fake_plugin_fake_job
    return_content: true
  register: _netdata_fake_collector_chart
- name: _verify | Assert collector label + context
  assert:
    that:
      - _netdata_fake_collector_chart.json.context == "netdata_presence.collector"
      - _netdata_fake_collector_chart.json.chart_labels.collector | default('') == "go.d:collector:fake_plugin:fake_job"
    fail_msg: >-
      chart {{ _netdata_fake_collector_chart.json.id }} context={{ _netdata_fake_collector_chart.json.context }}
      labels={{ _netdata_fake_collector_chart.json.chart_labels | default({}) }}

# Two alert template fan-outs to assert here:
#   1) netdata_context_missing / netdata_collector_missing (presence alerts)
#      should instantiate per-chart on the shared contexts.
#   2) liveness_<name> (per-context staleness) from context_liveness.conf.j2
#      should instantiate only for real charts -- liveness_ghost is expected
#      to silently drop because foo.does_not_exist isn't in the registry.
- name: _verify | Fetch alarms
  uri:
    url: http://localhost:{{ service_ports.netdata }}/api/v1/alarms?all
    return_content: true
  register: _netdata_alarms
  retries: 10
  delay: 2
  until: _netdata_alarms.status == 200

- name: _verify | Presence alerts instantiated against the new charts
  vars:
    _keys: "{{ (_netdata_alarms.content | from_json).alarms.keys() | list }}"
  assert:
    that:
      - _keys | select('search', 'netdata_presence.context_system_cpu.netdata_context_missing') | list | length > 0
      - _keys | select('search', 'netdata_presence.context_ghost.netdata_context_missing') | list | length > 0
      - _keys | select('search', 'netdata_presence.collector_go_d_collector_fake_plugin_fake_job.netdata_collector_missing') | list | length > 0
    fail_msg: >-
      Expected netdata_context_missing + netdata_collector_missing to fan out
      across netdata_presence.* charts. Got presence keys:
      {{ _keys | select('search', 'netdata_presence') | list }}

- name: _verify | Liveness_system_cpu present, liveness_ghost absent
  vars:
    _keys: "{{ (_netdata_alarms.content | from_json).alarms.keys() | list }}"
  assert:
    that:
      - _keys | select('search', 'liveness_system_cpu') | list | length > 0
      - _keys | select('search', 'liveness_ghost') | list | length == 0
    fail_msg: >-
      Expected liveness_system_cpu to be registered and liveness_ghost to be
      silently dropped (foo.does_not_exist isn't in the chart registry).
      Got liveness keys: {{ _keys | select('search', 'liveness_') | list }}

- name: _verify | Reboot-required alarm uses sustained file-presence lookup
  vars:
    _alarm: >-
      {{
        ((_netdata_alarms.content | from_json).alarms
         ["system.post_update_reboot_status.system_post_update_reboot_status"])
        | default({})
      }}
  assert:
    that:
      - _alarm.recipient | default('') == "sysadmin"
      - _alarm.lookup_method | default('') == "min"
      - _alarm.lookup_after | default(0) == -1800
      - _alarm.lookup_before | default(0) == 0
      - _alarm.lookup_dimensions | default('') == "required"
    fail_msg: >-
      Expected system_post_update_reboot_status to route to sysadmin only after
      required stayed high for 30m. Got:
      {{ _alarm }}

# Closes the loop the on-disk un-silence assert (main.yml) can't: prove the
# reload-health actually propagated the un-silence into a LIVE alarm. The
# out_of_disk_space_time template (un-silenced from upstream's `to: silent`)
# fans out against box's disk.space charts, so it must appear in ?all. The
# `until` is the assertion -- fail fast at the deadline if it never registers.
- name: _verify | Un-silenced disk-fill alarm is live in the daemon
  uri:
    url: http://localhost:{{ service_ports.netdata }}/api/v1/alarms?all
    return_content: true
  register: _netdata_diskfill_alarm
  retries: 15
  delay: 2
  until: >-
    _netdata_diskfill_alarm.status == 200
    and ((_netdata_diskfill_alarm.content | from_json).alarms.keys() | list
         | select('search', 'out_of_disk_space_time') | list | length > 0)

# Prove the un-silenced stock collector-failure alarm
# (plugin_data_collection_status) reached a LIVE alarm routed to sysadmin.
# box runs go.d collectors (systemdunits; nginx via _setup), so the template
# fans out across their netdata.plugin_data_collection_status charts -- at
# least one resulting alarm must be present and NOT silent. The `until` is
# the assertion; fail fast at the deadline if it never registers un-silenced.
- name: _verify | Un-silenced collector-failure alarm is live and routed to sysadmin
  uri:
    url: http://localhost:{{ service_ports.netdata }}/api/v1/alarms?all
    return_content: true
  register: _netdata_godplugin_alarm
  retries: 15
  delay: 2
  until: >-
    _netdata_godplugin_alarm.status == 200
    and ((_netdata_godplugin_alarm.content | from_json).alarms.values() | list
         | selectattr('name', 'equalto', 'plugin_data_collection_status')
         | rejectattr('recipient', 'equalto', 'silent') | list | length > 0)

# Restore the production conf (update_every back to 60s) so the role
# leaves no surprise idempotency drift behind.
- name: _verify | Restore netdata_presence.conf from template
  template:
    src: charts_d_netdata_presence.conf.j2
    dest: /etc/netdata/charts.d/netdata_presence.conf
    owner: netdata
    group: netdata
    mode: "0644"
    backup: true
  become: true

- name: _verify | Restart netdata to drop fast-poll override
  systemd:
    name: netdata
    state: restarted
  become: true

# Map the netdata vhost FQDN to loopback for SNI-correct probing: noble/resolute
# OpenSSL 3.x rejects SNI=localhost with TLSV1_UNRECOGNIZED_NAME.
- name: _verify | Map the netdata vhost FQDN to loopback for SNI-correct probing
  lineinfile:
    path: /etc/hosts
    regexp: '^127\.0\.0\.1\s+netdata\.'
    line: "127.0.0.1 netdata.{{ inventory_hostname }}.{{ domain }}"
  become: true

# --- nginx Authelia gate ---
# Browser path through `https://netdata.<host>.<domain>` is gated by Authelia
# forward-auth: an unauthenticated hit must 302 to the auth portal. Cross-host
# alert polling no longer touches nginx (it pulls over SSH, asserted below), so
# there is no URL-param bypass to exercise here anymore.
- name: _verify | Browser hit without auth redirects to Authelia
  uri:
    url: "https://netdata.{{ inventory_hostname }}.{{ domain }}/"
    validate_certs: false
    follow_redirects: none
    status_code: 302
  register: _netdata_no_auth
  failed_when: >-
    _netdata_no_auth.status != 302
    or ("auth." not in (_netdata_no_auth.location | default("")))
  become: true

# --- netdata_poll forced-command SSH access ---
# Cross-host alert polling reaches netdata over SSH, not nginx. Prove the
# netdata_poll key (1) returns the expected JSON bundle and (2) is pinned to
# its forced command -- a client-supplied command is ignored, so the key
# cannot be turned into a shell or an arbitrary fetch. StrictHostKeyChecking=no
# + /dev/null known_hosts is fine here: this is a loopback self-connect inside
# the throwaway test VM, where the prod keyscan-managed known_hosts is moot.
- name: _verify | Stage the netdata_poll test private key
  copy:
    content: "{{ netdata_poll_ssh_private_key | trim }}\n"
    dest: /tmp/netdata_poll_verify_key
    mode: "0600"
  changed_when: false

- name: _verify | Forced-command key returns the alert bundle
  command: >-
    ssh -i /tmp/netdata_poll_verify_key
    -o BatchMode=yes -o IdentitiesOnly=yes -o IdentityAgent=none
    -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null
    -o ConnectTimeout=5
    netdata_poll@127.0.0.1
  register: _netdata_poll_bundle
  changed_when: false

- name: _verify | Bundle carries both read-API payloads
  assert:
    that:
      - (_netdata_poll_bundle.stdout | from_json).alarms is defined
      - (_netdata_poll_bundle.stdout | from_json).transitions is defined
    fail_msg: >-
      netdata_poll_fetch did not return {alarms, transitions}:
      {{ _netdata_poll_bundle.stdout[:200] }}

# The transition log is filtered server-side to active-alarm rows only (the
# bandwidth optimisation): every returned transition must name a currently
# active alarm. With no active alarms the list is empty -- a strong witness
# that the filter ran rather than passing the full log through.
- name: _verify | Returned transitions are filtered to active alarms only
  vars:
    _bundle: "{{ _netdata_poll_bundle.stdout | from_json }}"
    _active_names: "{{ (_bundle.alarms.alarms | default({})).values() | map(attribute='name') | list }}"
  assert:
    that:
      - _bundle.transitions.transitions | default([]) | rejectattr('alert', 'in', _active_names) | list | length == 0
    fail_msg: >-
      netdata_poll_fetch returned transition rows for inactive alarms
      ({{ _bundle.transitions.transitions | default([]) | length }} rows,
      active alarms: {{ _active_names }}); the server-side filter should keep
      only active-alarm transitions.

# Forced command must win over a client-supplied command: asking for `id`
# still returns the bundle, never the shell output -- the key can't escape.
- name: _verify | Client-supplied command is overridden by the forced command
  command: >-
    ssh -i /tmp/netdata_poll_verify_key
    -o BatchMode=yes -o IdentitiesOnly=yes -o IdentityAgent=none
    -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null
    -o ConnectTimeout=5
    netdata_poll@127.0.0.1 id
  register: _netdata_poll_forced
  changed_when: false
  failed_when: >-
    _netdata_poll_forced.rc != 0
    or "uid=" in _netdata_poll_forced.stdout
    or (_netdata_poll_forced.stdout | from_json).alarms is not defined

# ControlMaster reuse is what makes the homepage poller's 30s cadence cheap
# (one warm connection per peer, not a fresh handshake each fire). Prove the
# forced-command key supports multiplexing: an initial call opens a persistent
# master, and `-O check` confirms a second call would ride it rather than
# re-handshake.
- name: _verify | Open a multiplexed master to the netdata_poll key
  command: >-
    ssh -i /tmp/netdata_poll_verify_key
    -o BatchMode=yes -o IdentitiesOnly=yes -o IdentityAgent=none
    -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null
    -o ConnectTimeout=5
    -o ControlMaster=auto -o ControlPath=/tmp/netdata_poll_verify_cm
    -o ControlPersist=10
    netdata_poll@127.0.0.1
  changed_when: false

- name: _verify | ControlMaster is live for connection reuse
  command: >-
    ssh -o ControlPath=/tmp/netdata_poll_verify_cm -O check
    netdata_poll@127.0.0.1
  register: _netdata_poll_cm
  changed_when: false
  failed_when: "'Master running' not in _netdata_poll_cm.stderr"

- name: _verify | Tear down the multiplexed master
  command: >-
    ssh -o ControlPath=/tmp/netdata_poll_verify_cm -O exit
    netdata_poll@127.0.0.1
  changed_when: false
  failed_when: false

- name: _verify | Remove the staged netdata_poll test key
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - /tmp/netdata_poll_verify_key
    - /tmp/netdata_poll_verify_cm
  changed_when: false

# Cover the cross-role coupling: netdata's main.yml imports certbot's
# tasks_from: netdata to render x509check.conf. A break in the
# certbot-side template (x509check.conf.j2) or the netdata template
# helper would surface here.
- name: _verify | Slurp rendered x509check config
  slurp:
    src: /etc/netdata/go.d/x509check.conf
  register: _netdata_x509check
  become: true

- name: _verify | X509check renders structurally-valid YAML pointing at the host cert
  vars:
    _x509check: "{{ _netdata_x509check.content | b64decode | from_yaml }}"
    _expected_source: "file:///etc/letsencrypt/live/{{ inventory_hostname }}.{{ domain }}/fullchain.pem"
  assert:
    that:
      - _x509check.jobs | length == 1
      - _x509check.jobs[0].source == _expected_source
      - _x509check.jobs[0].check_full_chain
    fail_msg: >-
      x509check.conf didn't render the host cert path correctly
      (parsed={{ _x509check }}, expected source={{ _expected_source }})
