# Inputs: caller passes a single dict `netdata_args` with keys
#   src         required; template file under the calling role's templates/
#   dest        required; path relative to /etc/netdata/ (e.g. go.d/pihole.conf)
#   mode        optional, default '0644'
#   condition   optional bool, default true; gates the whole call
#   restart     optional bool, default true; restart netdata after a change
#
# The dict form prevents inter-call leakage at play-vars scope: each
# import_role pass replaces the whole `netdata_args` value, so a
# previous caller's mode/condition/restart can't bleed into the next
# caller that doesn't explicitly override.
- name: template | Ensure netdata directory exists
  when: netdata_args.condition | default(true)
  file:
    dest: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - /etc/netdata/
    - /etc/netdata/{{ netdata_args.dest | dirname }}/
  become: true

- name: template | Copy metrics template
  when: netdata_args.condition | default(true)
  command: cp /usr/lib/netdata/conf.d/{{ netdata_args.dest }} /etc/netdata/{{ netdata_args.dest }}
  args:
    creates: /etc/netdata/{{ netdata_args.dest }}
  register: netdata_template_copy
  become: true

- name: template | Setup metrics
  when: not (ansible_check_mode and netdata_template_copy.changed) and (netdata_args.condition | default(true))
  template:
    src: "{{ netdata_args.src }}"
    dest: /etc/netdata/{{ netdata_args.dest }}
    owner: netdata
    group: netdata
    mode: "{{ netdata_args.mode | default('0644') }}"
    backup: true
  register: netdata_template
  become: true

- name: template | Restart netdata
  when: (netdata_args.restart | default(true)) and (netdata_template_copy.changed or netdata_template.changed)
  systemd:
    name: netdata
    state: restarted
  become: true
