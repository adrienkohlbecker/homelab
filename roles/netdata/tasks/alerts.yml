# Health-alert phase, imported by main.yml after the service is up so
# netdatacli reload-health lands on a running daemon: the shipped alert
# configs plus the disks.conf/timex.conf un-silence and their
# fail-closed asserts. Split out of main.yml for navigability.
- name: Configure netdata alerts
  import_role:
    name: netdata
    tasks_from: health
  vars:
    netdata_args:
      src: systemdunits_alerts.conf
      dest: systemdunits.conf
  tags:
    - netdata

- name: Configure netdata alerts
  import_role:
    name: netdata
    tasks_from: health
  vars:
    netdata_args:
      src: zfs_alerts_override.conf.j2
      dest: zfs_alerts_override.conf
  tags:
    - netdata

- name: Configure netdata postfix queue alert
  import_role:
    name: netdata
    tasks_from: health
  vars:
    netdata_args:
      src: postfix_alerts.conf
      dest: postfix.conf
  tags:
    - netdata

# The alert targets the fail2ban chart, which only exists where the collector
# runs; gate on the same fail2ban_enabled flag.
- name: Configure netdata fail2ban ban-count alert
  when: fail2ban_enabled | default(false)
  import_role:
    name: netdata
    tasks_from: health
  vars:
    netdata_args:
      src: fail2ban_alerts.conf
      dest: fail2ban.conf
  tags:
    - netdata

- name: Configure netdata wireguard bunk-peer handshake alert
  import_role:
    name: netdata
    tasks_from: health
  vars:
    netdata_args:
      src: wireguard_alerts.conf.j2
      dest: wireguard.conf
  tags:
    - netdata

# keepalived lost-master alarm, fed by the keepalived_vrrp collector above.
# Deployed ONLY on the highest-priority VRRP peer: a backup normally has
# holds_vip=0, so the alarm there would be a permanent false positive. The
# priority-max compare mirrors site.yml's reboot DNS-safety gate; the leading
# peer-membership check short-circuits the hostvars extract on non-peers (the
# box test fixture), so it stays a no-op there.
- name: Configure netdata keepalived lost-master alert
  import_role:
    name: netdata
    tasks_from: health
  vars:
    netdata_args:
      src: keepalived_vrrp_alerts.conf
      dest: keepalived_vrrp.conf
      condition: >-
        {{ (inventory_hostname in (pihole_keepalived_peers | default([])))
           and ((pihole_keepalived_priority | default(0) | int)
                == (pihole_keepalived_peers
                    | map('extract', hostvars, 'pihole_keepalived_priority')
                    | map('int') | max)) }}
  tags:
    - netdata

- name: Configure netdata SMART + NVMe wear alerts
  import_role:
    name: netdata
    tasks_from: health
  vars:
    netdata_args:
      src: disk_health_alerts.conf
      dest: disk_health.conf
  tags:
    - netdata

- name: Configure netdata fluent-bit output-drop alert
  import_role:
    name: netdata
    tasks_from: health
  vars:
    netdata_args:
      src: fluentbit_alerts.conf
      dest: fluentbit.conf
  tags:
    - netdata

# Un-silence the two predictive disk-fill alarms shipped in upstream
# /usr/lib/netdata/conf.d/health.d/disks.conf. Upstream sets
# `to: silent` on out_of_disk_space_time and out_of_disk_inodes_time
# because the 1h linear extrapolation can be noisy on bursty cloud
# workloads. On lab/pug the workload is stable enough that the
# prediction is a useful early warning -- the static disk_space_usage
# alarm only escalates to CRITICAL at 98% used + <5GB free, which
# leaves no room to react (the 2026-05-15 /var/lib/containers fill
# went WARNING -> CRITICAL in ~10s as the zvol passed 98%, with no
# usable lead time).
#
# Patching disks.conf rather than re-declaring the templates because
# the upstream calc depends on $disk_fill_rate (a sibling template);
# re-declaring would require maintaining that whole chain in-tree and
# is brittle across netdata upgrades. The `replace` regex is anchored
# to each template's name so the other `to: silent` entries in the
# file (10min_disk_utilization, 10min_disk_backlog -- legitimately
# silent) are preserved.
- name: Stage upstream disks.conf into /etc/netdata/health.d
  command: cp /usr/lib/netdata/conf.d/health.d/disks.conf /etc/netdata/health.d/disks.conf
  args:
    creates: /etc/netdata/health.d/disks.conf
  register: netdata_disks_staged
  become: true
  tags:
    - netdata

- name: Un-silence out_of_disk_space_time
  when: not (ansible_check_mode and netdata_disks_staged.changed)
  replace:
    path: /etc/netdata/health.d/disks.conf
    # (?ms): dotall so . spans newlines + multiline so ^ matches line
    # starts. The `(?:(?!^\s*template:).)*?` body consumes any char that
    # is NOT the start of a new `template:` line, so the match is
    # confined to the SAME stanza as the header. Without the lookahead,
    # after the first apply the non-greedy `.*?` walks past this
    # template's now-`sysadmin` and matches the next `to: silent`
    # downstream (10min_disk_utilization), reporting a phantom change
    # on every rerun.
    regexp: '(?ms)(^\s*template:\s*out_of_disk_space_time\b(?:(?!^\s*template:).)*?^\s*to:\s*)silent'
    replace: '\1sysadmin'
    backup: true
  register: netdata_disks_space_unsilenced
  become: true
  tags:
    - netdata

- name: Un-silence out_of_disk_inodes_time
  when: not (ansible_check_mode and netdata_disks_staged.changed)
  replace:
    path: /etc/netdata/health.d/disks.conf
    regexp: '(?ms)(^\s*template:\s*out_of_disk_inodes_time\b(?:(?!^\s*template:).)*?^\s*to:\s*)silent'
    replace: '\1sysadmin'
    backup: true
  register: netdata_disks_inodes_unsilenced
  become: true
  tags:
    - netdata

# Damp the predictive disk-fill flap. out_of_disk_*_time estimates
# hours-to-full as $avail / $disk_fill_rate, and disk_fill_rate is
# ($baseline_avail - $current_avail) / hours where baseline is the `min`
# avail in a 10m window. Upstream samples that baseline at -50m; on a
# churny filesystem (container prune, minio/scratch write-then-delete)
# current avail routinely bounces back above the 50-min-ago min, flipping
# the rate negative -> calc yields inf -> CLEAR, then a fresh write drops
# it again -> WARNING, cycling several times an hour. Each crossing is a
# telegram. Two dampers:
#   (a) deepen the baseline sample to -3h. On a steadily-filling disk the
#       free space 3h ago sits well above current avail, so a transient
#       deletion no longer lifts current past the baseline and the rate
#       stays positive -- far fewer spurious CLEARs. The estimate just
#       averages the fill over ~3h instead of ~55m, which is if anything
#       a steadier early-warning signal.
#   (b) lengthen the predictive alarms' down-delay so a raised alarm rides
#       through residual blips before it's allowed to clear.
# Raising is left untouched (warn/crit every 10s, no up-delay), so a
# genuine fast fill still fires immediately -- the 2026-05-15 lead-time
# requirement that motivated the un-silence above is preserved.
- name: Deepen the disk-fill rate baseline window
  when: not (ansible_check_mode and netdata_disks_staged.changed)
  replace:
    path: /etc/netdata/health.d/disks.conf
    # [ \t] (not \s) so the line-anchored match can't span into the next
    # line. The `min -10m`/`unaligned of avail` literals fence the edit to
    # the disk_fill_rate + disk_inode_rate lookups -- the only two stanzas
    # carrying `at -50m` (verified against upstream v2.10.3).
    regexp: '^([ \t]*lookup:[ \t]*min -10m )at -50m( unaligned of avail)[ \t]*$'
    replace: '\1at -3h\2'
    backup: true
  register: netdata_disks_rate_window
  become: true
  tags:
    - netdata

- name: Lengthen the out_of_disk_space_time down-delay
  when: not (ansible_check_mode and netdata_disks_staged.changed)
  replace:
    path: /etc/netdata/health.d/disks.conf
    # Stanza-anchored (same shape as the un-silence above): the bare
    # `delay: down 15m multiplier 1.2 max 1h` string is shared with the
    # legitimately-silent 10min_disk_utilization/backlog templates, so a
    # global replace would clobber theirs.
    regexp: '(?ms)(^\s*template:\s*out_of_disk_space_time\b(?:(?!^\s*template:).)*?^\s*delay:\s*)down 15m multiplier 1.2 max 1h'
    replace: '\1down 1h multiplier 1.5 max 6h'
    backup: true
  register: netdata_disks_space_delay
  become: true
  tags:
    - netdata

- name: Lengthen the out_of_disk_inodes_time down-delay
  when: not (ansible_check_mode and netdata_disks_staged.changed)
  replace:
    path: /etc/netdata/health.d/disks.conf
    regexp: '(?ms)(^\s*template:\s*out_of_disk_inodes_time\b(?:(?!^\s*template:).)*?^\s*delay:\s*)down 15m multiplier 1.2 max 1h'
    replace: '\1down 1h multiplier 1.5 max 6h'
    backup: true
  register: netdata_disks_inodes_delay
  become: true
  tags:
    - netdata

- name: Reload netdata health after disks.conf edits
  when: >-
    netdata_disks_staged.changed or netdata_disks_space_unsilenced.changed
    or netdata_disks_inodes_unsilenced.changed or netdata_disks_rate_window.changed
    or netdata_disks_space_delay.changed or netdata_disks_inodes_delay.changed
  import_tasks: reload_health.yml
  tags:
    - netdata

# Fail-closed: the un-silence `replace` reports changed=false both when it
# already ran AND when it matched nothing (upstream renamed/restructured the
# template), so a silent no-op would otherwise leave the predictive disk-fill
# alarm at `to: silent` with no signal. Assert the end state instead. Skipped
# in check mode, where the staging+replace above is gated off on a fresh host.
- name: Slurp the un-silenced disks.conf
  when: not ansible_check_mode
  slurp:
    src: /etc/netdata/health.d/disks.conf
  register: netdata_disks_unsilenced_check
  become: true
  tags:
    - netdata

- name: Assert the disk-fill predictive alarms route to sysadmin
  when: not ansible_check_mode
  vars:
    _disks: "{{ netdata_disks_unsilenced_check.content | b64decode }}"
  assert:
    that:
      # Same stanza-anchored shape and whitespace classes as the replace
      # regexes above (\s* around `template:`/`to:`), so a no-space upstream
      # variant the replace flips can't then false-fail this assert. The one
      # deliberate divergence: `\s` after the name instead of \b -- \b in a
      # `that:` conditional is re-escaped to a backspace by ansible 2.20, so
      # we consume the trailing newline instead. Zero matches means the
      # un-silence missed -- fail here, not during an actual disk-fill.
      - _disks | regex_findall('(?ms)^\s*template:\s*out_of_disk_space_time\s(?:(?!^\s*template:).)*?^\s*to:\s*sysadmin') | length >= 1
      - _disks | regex_findall('(?ms)^\s*template:\s*out_of_disk_inodes_time\s(?:(?!^\s*template:).)*?^\s*to:\s*sysadmin') | length >= 1
      # Flap-damping landed: deepened baseline on both rate templates + the
      # lengthened down-delay on both predictive templates. Same fail-closed
      # rationale -- an upstream restructure that defeats a replace must fail
      # here, not silently leave the alarm flapping in production.
      - _disks | regex_findall('(?m)^\s*lookup:\s*min -10m at -3h unaligned of avail') | length >= 2
      - _disks | regex_findall('(?ms)^\s*template:\s*out_of_disk_space_time\s(?:(?!^\s*template:).)*?^\s*delay:\s*down 1h multiplier 1.5 max 6h') | length >= 1
      - _disks | regex_findall('(?ms)^\s*template:\s*out_of_disk_inodes_time\s(?:(?!^\s*template:).)*?^\s*delay:\s*down 1h multiplier 1.5 max 6h') | length >= 1
    fail_msg: >-
      disks.conf out_of_disk_space_time / out_of_disk_inodes_time no longer
      resolve to a `to: sysadmin` stanza with the deepened (-3h) fill-rate
      baseline and lengthened (down 1h) predictive delay -- upstream likely
      renamed or restructured them, leaving the predictive disk-fill alarm
      silenced or flapping. Re-check the un-silence/damping regexes in this role.
  tags:
    - netdata

# Same staging+replace pattern as disks.conf above, for timex.conf's
# system_clock_sync_state alarm. The kernel's ntp_adjtime() exposes a
# clock-synchronized bit; that bit going to 0 means the local clock has
# drifted out of sync with whatever ntp daemon is configured (chrony on
# lab/pug). Upstream defaults `to: silent` because clock-sync is "boring"
# on most cloud hosts -- but on lab/pug an out-of-sync clock breaks
# TLS-cert validation, signed-package apt-get, and zfs replication
# bookmarks. Cheap to alert on; not noisy in steady state.
- name: Stage upstream timex.conf into /etc/netdata/health.d
  command: cp /usr/lib/netdata/conf.d/health.d/timex.conf /etc/netdata/health.d/timex.conf
  args:
    creates: /etc/netdata/health.d/timex.conf
  register: netdata_timex_staged
  become: true
  tags:
    - netdata

- name: Un-silence system_clock_sync_state
  when: not (ansible_check_mode and netdata_timex_staged.changed)
  replace:
    path: /etc/netdata/health.d/timex.conf
    # `alarm:` (not `template:`) since this binds to a single named chart
    # rather than fanning out across a context. Same stanza-anchored shape
    # as disks.conf's regex above -- today timex.conf only ships one
    # alarm so drift is impossible, but defensive in case upstream adds
    # a second one in a future release.
    regexp: '(?ms)(^\s*alarm:\s*system_clock_sync_state\b(?:(?!^\s*alarm:|^\s*template:).)*?^\s*to:\s*)silent'
    replace: '\1sysadmin'
    backup: true
  register: netdata_timex_unsilenced
  become: true
  tags:
    - netdata

- name: Reload netdata health after timex.conf edits
  when: netdata_timex_staged.changed or netdata_timex_unsilenced.changed
  import_tasks: reload_health.yml
  tags:
    - netdata

# Fail-closed, same rationale as the disks.conf assert above.
- name: Slurp the un-silenced timex.conf
  when: not ansible_check_mode
  slurp:
    src: /etc/netdata/health.d/timex.conf
  register: netdata_timex_unsilenced_check
  become: true
  tags:
    - netdata

- name: Assert the clock-sync alarm routes to sysadmin
  when: not ansible_check_mode
  vars:
    _timex: "{{ netdata_timex_unsilenced_check.content | b64decode }}"
  assert:
    that:
      # \s* around `alarm:`/`to:` matches the replace regex's classes; `\s`
      # (not \b) after the name dodges ansible 2.20 re-escaping \b in `that:`.
      - _timex | regex_findall('(?ms)^\s*alarm:\s*system_clock_sync_state\s(?:(?!^\s*alarm:|^\s*template:).)*?^\s*to:\s*sysadmin') | length >= 1
    fail_msg: >-
      timex.conf system_clock_sync_state no longer resolves to a
      `to: sysadmin` stanza -- upstream likely renamed/restructured it,
      leaving the clock-desync alert silenced. Re-check the un-silence regex.
  tags:
    - netdata

# Same staging+replace pattern as disks/timex above, for go.d.plugin.conf's
# plugin_data_collection_status template -- netdata's built-in "this go.d
# collector is running but its polls are failing" alarm (lookup: average -30s
# of failed; warn: $this == 1; delay: down 1m), shipped `to: silent`.
# Un-silencing it closes the O2 gap: netdata_presence.chart.sh catches a job
# that never instantiated any chart; this catches a job that instantiated but
# is now failing to collect. A job that never autodetects emits no status
# chart, so idle prometheus jobs on hosts where the target is absent don't
# alarm. go.d.plugin.conf ships exactly one template, so the stanza anchoring
# is defensive against a future upstream addition.
#
# Upstream's `delay: down 1m` (no up-delay) still flapped: collectors like
# docker/kuma/minio intermittently miss a single scrape cycle (target
# slow under load) then recover, and a 30s-average-of-failed crossing 1 for
# one cycle was enough to notify. We add `up 5m` so the failure must persist
# ~5m before it pages -- a genuinely-broken collector stays down well past
# that, but a one-off timeout no longer does.
- name: Stage upstream go.d.plugin.conf into /etc/netdata/health.d
  command: cp /usr/lib/netdata/conf.d/health.d/go.d.plugin.conf /etc/netdata/health.d/go.d.plugin.conf
  args:
    creates: /etc/netdata/health.d/go.d.plugin.conf
  register: netdata_godplugin_staged
  become: true
  tags:
    - netdata

- name: Un-silence plugin_data_collection_status
  when: not (ansible_check_mode and netdata_godplugin_staged.changed)
  replace:
    path: /etc/netdata/health.d/go.d.plugin.conf
    regexp: '(?ms)(^\s*template:\s*plugin_data_collection_status\b(?:(?!^\s*template:).)*?^\s*to:\s*)silent'
    replace: '\1sysadmin'
    backup: true
  register: netdata_godplugin_unsilenced
  become: true
  tags:
    - netdata

- name: Add an up-delay to plugin_data_collection_status
  when: not (ansible_check_mode and netdata_godplugin_staged.changed)
  replace:
    path: /etc/netdata/health.d/go.d.plugin.conf
    # Stanza-anchored like the un-silence above (defensive though the file
    # ships one template). Require a sustained failure before paging.
    regexp: '(?ms)(^\s*template:\s*plugin_data_collection_status\b(?:(?!^\s*template:).)*?^\s*delay:\s*)down 1m'
    replace: '\1up 5m down 5m'
    backup: true
  register: netdata_godplugin_delay
  become: true
  tags:
    - netdata

- name: Reload netdata health after go.d.plugin.conf edits
  when: netdata_godplugin_staged.changed or netdata_godplugin_unsilenced.changed or netdata_godplugin_delay.changed
  import_tasks: reload_health.yml
  tags:
    - netdata

# Fail-closed, same rationale as the disks/timex asserts above.
- name: Slurp the un-silenced go.d.plugin.conf
  when: not ansible_check_mode
  slurp:
    src: /etc/netdata/health.d/go.d.plugin.conf
  register: netdata_godplugin_unsilenced_check
  become: true
  tags:
    - netdata

- name: Assert the data-collection-failure alarm routes to sysadmin
  when: not ansible_check_mode
  vars:
    _godplugin: "{{ netdata_godplugin_unsilenced_check.content | b64decode }}"
  assert:
    that:
      # \s (not \b) after the name dodges ansible 2.20 re-escaping \b in `that:`.
      - _godplugin | regex_findall('(?ms)^\s*template:\s*plugin_data_collection_status\s(?:(?!^\s*template:).)*?^\s*to:\s*sysadmin') | length >= 1
      - _godplugin | regex_findall('(?ms)^\s*template:\s*plugin_data_collection_status\s(?:(?!^\s*template:).)*?^\s*delay:\s*up 5m down 5m') | length >= 1
    fail_msg: >-
      go.d.plugin.conf plugin_data_collection_status no longer resolves to a
      `to: sysadmin` stanza with the `up 5m` debounce -- upstream likely
      renamed/restructured it, leaving the collector-failure alert silenced or
      flappy. Re-check the un-silence/delay regexes.
  tags:
    - netdata
