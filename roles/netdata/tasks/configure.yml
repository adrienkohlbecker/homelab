# Daemon-configuration phase, imported by main.yml right after the
# package install: netdata.conf settings, cloud opt-out, the go.d
# collectors, telegram alerting, the startup-readiness drop-in, and
# the service enable. Split out of main.yml for navigability; runs in
# main.yml's order so the registers it sets feed the service restart.
- name: Divert configuration file
  community.general.dpkg_divert:
    path: /etc/netdata/netdata.conf
  become: true
  tags:
    - netdata

# Only the load-bearing overrides are templated; netdata overlays the file on
# its compiled-in defaults, so this is deliberately not a wholesale netdata.conf
# (which would freeze the hundreds of auto-tuned [plugin:*] sections). The
# validate parses the rendered INI so a vault/jinja typo fails the converge
# rather than being silently accept-then-defaulted by the daemon.
- name: Configure netdata
  template:
    src: netdata.conf.j2
    dest: /etc/netdata/netdata.conf
    owner: netdata
    group: netdata
    mode: "0644"
    backup: true
    validate: python3 -c 'import configparser,sys; configparser.ConfigParser(strict=False, delimiters=("=",)).read(sys.argv[1])' "%s"
  register: netdata_conf
  become: true
  tags:
    - netdata

- name: Copy the cloud config
  copy:
    src: cloud.conf
    dest: /var/lib/netdata/cloud.d/cloud.conf
    owner: netdata
    group: netdata
    mode: "0660"
    backup: true
  register: netdata_cloud_conf
  become: true
  tags:
    - netdata

# The opt-out above (enabled = no) does NOT disconnect an already-claimed
# agent: a host that still carries claim state in cloud.d/ reconnects ACLK to
# Netdata Cloud on every start regardless of the flag. Cloud then polls it
# remotely, and on 2.10.x that alert-transitions polling churns the metadata
# sqlite under lock contention (bloated meta DB, stalled reload-health, restarts
# that exceed the stop timeout). Remove any stale claim so the opt-out is real.
# Idempotent: absent on a never-claimed host, so this only acts if a claim
# reappears.
- name: Unclaim from Netdata Cloud
  file:
    path: "/var/lib/netdata/cloud.d/{{ item }}"
    state: absent
  loop:
    - claimed_id
    - private.pem
    - public.pem
  register: netdata_cloud_unclaim
  become: true
  tags:
    - netdata

# Drop-in override that blocks `systemctl start/restart netdata` on the HTTP
# API answering: netdata's Type=notify signals READY=1 before the listener is
# fully accepting connections, so a bare restart returns "early" and a
# following `netdatacli reload-health` would race the listener coming up.
# Installed here -- ahead of the first go.d config write below -- so the very
# first start (the config-helper restart on a fresh install, where the package
# was held by policy_rc_d) is already API-gated, not just the later "Enable
# netdata service" step. Mirrors the podman --health-startup-cmd pattern.
- name: Install netdata service override
  import_role:
    name: systemd_unit
    tasks_from: dropin
  vars:
    systemd_unit_args:
      src: override.conf
      for: netdata.service
  tags:
    - netdata

- name: Configure prometheus metrics
  import_role:
    name: netdata
    tasks_from: config
  vars:
    netdata_args:
      src: prometheus.conf.j2
      dest: go.d/prometheus.conf
      mode: "0600"
      validate: python3 -c 'import yaml,sys; yaml.safe_load(open(sys.argv[1]))' "%s"
      condition: "{{ not (ansible_check_mode and (netdata_apt.changed or netdata_apt_repo.changed)) }}"
  tags:
    - netdata

- name: Copy stock go.d.conf
  command: cp /usr/lib/netdata/conf.d/go.d.conf /etc/netdata/go.d.conf
  args:
    creates: /etc/netdata/go.d.conf
  register: netdata_godconf_copy
  become: true
  tags:
    - netdata

- name: Configure docker metrics
  import_role:
    name: netdata
    tasks_from: config
  vars:
    netdata_args:
      src: docker.conf.j2
      dest: go.d/docker.conf
      validate: python3 -c 'import yaml,sys; yaml.safe_load(open(sys.argv[1]))' "%s"
      condition: "{{ not (ansible_check_mode and (netdata_apt.changed or netdata_apt_repo.changed)) }}"
  tags:
    - netdata

- name: Install intel-gpu-tools
  when: ansible_architecture == "x86_64"
  apt:
    pkg: intel-gpu-tools
    cache_valid_time: 3600
  become: true
  tags:
    - netdata

- name: Configure intel gpu metrics
  import_role:
    name: netdata
    tasks_from: config
  vars:
    netdata_args:
      src: intelgpu.conf
      dest: go.d/intelgpu.conf
      condition: '{{ ansible_architecture == "x86_64" and not (ansible_check_mode and (netdata_apt.changed or netdata_apt_repo.changed)) }}'
      validate: python3 -c 'import yaml,sys; yaml.safe_load(open(sys.argv[1]))' "%s"
  tags:
    - netdata

- name: Copy health_alarm_notify template
  command: cp /usr/lib/netdata/conf.d/health_alarm_notify.conf /etc/netdata/health_alarm_notify.conf
  args:
    creates: /etc/netdata/health_alarm_notify.conf
  register: netdata_health_alarm_notify_template
  become: true
  tags:
    - netdata

- name: Setup health_alarm_notify
  when: not (ansible_check_mode and netdata_health_alarm_notify_template.changed)
  lineinfile:
    path: /etc/netdata/health_alarm_notify.conf
    regexp: "{{ item.line }}"
    line: "{{ item.value }}"
    validate: bash -n %s
    # Pin mode/owner explicitly: this file carries the telegram bot token
    # and is otherwise seeded by `cp` inheriting the package default.
    owner: root
    group: netdata
    mode: "0640"
    backup: true
  loop:
    - line: ^SEND_EMAIL=
      value: SEND_EMAIL="NO"
    - line: ^SEND_TELEGRAM=
      value: SEND_TELEGRAM="YES"
    - line: ^TELEGRAM_BOT_TOKEN=
      value: TELEGRAM_BOT_TOKEN="{{ telegram_netdata_bot_token }}"
    - line: ^DEFAULT_RECIPIENT_TELEGRAM=
      value: DEFAULT_RECIPIENT_TELEGRAM="{{ telegram_personal_chat_id }}"
  register: netdata_health_alarm_notify
  become: true
  tags:
    - netdata

# netdata's docker collector reads container stats through the read-only
# socket_proxy (tcp loopback; see roles/socket_proxy + docker.conf.j2), so it
# no longer needs rw on /run/podman/podman.sock. Actively drop any
# podman-socket membership left from before the proxy: gpasswd -d is the only
# clean "remove from one supplementary group" primitive (the user module can
# only rewrite the whole list). Gated on actual membership so it's idempotent
# and a no-op on hosts without the group (e.g. the box test fixture).
- name: Read the podman-socket group membership
  getent:
    database: group
    key: podman-socket
    # Don't fail when the group is absent (e.g. the box test fixture); the
    # key then maps to None and the drop below is skipped.
    fail_key: false
  register: netdata_podman_socket_grp
  become: true
  tags:
    - netdata

- name: Drop netdata from the podman-socket group (now reads via socket_proxy)
  vars:
    # getent_group[<name>] = [passwd, gid, members]; members CSV at [2]. The
    # `, true` default replaces the None fail_key gives when the group is absent.
    _members: "{{ (netdata_podman_socket_grp.ansible_facts.getent_group['podman-socket'] | default(['', '', ''], true))[2] }}"
  when: "'netdata' in _members.split(',')"
  command: gpasswd -d netdata podman-socket
  register: netdata_podman_socket_drop
  changed_when: true
  become: true
  tags:
    - netdata

- name: Mount debugfs
  mount:
    path: /sys/kernel/debug
    src: /debugfs
    fstype: debugfs
    opts: defaults,noatime
    state: mounted
    backup: true
  register: netdata_debugfs_mount
  become: true
  tags:
    - netdata

# Enable+start the service before the alert/metrics config writes so
# `netdatacli reload-health` (in health_copy/health_template) lands on
# a running daemon. On first install the service starts with stock
# alerts; the role then writes custom alerts and reload-health hot-loads
# them. Brief gap is acceptable on a fresh install.
- name: Enable netdata service
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: netdata
      condition: "{{ not (ansible_check_mode and (netdata_apt.changed or netdata_apt_repo.changed)) }}"
      restart: "{{ netdata_conf.changed or netdata_cloud_conf.changed or netdata_cloud_unclaim.changed or netdata_health_alarm_notify.changed or netdata_debugfs_mount.changed or netdata_service_d_override_conf_result.changed or netdata_godconf_copy.changed or (netdata_podman_socket_drop.changed | default(false)) }}"
  tags:
    - netdata
