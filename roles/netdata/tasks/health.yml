# Install a netdata health-alert config under /etc/netdata/health.d/ and
# hot-reload via `netdatacli reload-health`. Merges the former
# health_copy/health_template helpers: the module is chosen by src's suffix.
#
# Inputs: caller passes a single dict `netdata_args` with keys
#   src   required; file under the caller's files/ (copy) or templates/
#         (template, when src ends in .j2)
#   dest  required; bare filename under /etc/netdata/health.d/
#   mode  optional, default '0644'
#   validate optional; a parse-check command (%s = rendered file) run before
#         the file moves into place. Health configs are a netdata-specific DSL
#         with no offline parser, so callers usually omit this.
#
# Module dispatch mirrors config.yml / systemd_unit/install.yml: *.j2 ->
# template, anything else -> copy. As in config.yml, the scalar inputs are
# resolved into _netdata_health_* locals by the set_fact preamble (re-read on
# every import, so no inter-call leakage); _module and validate stay inline
# for the same reasons (parse-time task name / pre-`when` module spec, and
# default(omit) can't survive a fact).
#
# Accepts `condition` (gate the whole call) and `restart` (gate the reload)
# like config.yml/charts_d.yml, for a uniform helper contract. The "restart"
# here is a hitless `netdatacli reload-health`, not a daemon restart -- a
# health config change hot-loads where a go.d config needs a restart. The
# role's health files each define their own complete alarm set, so -- unlike
# a go.d config -- there's no stock health.d/<dest> worth seeding before the
# overwrite.
- name: health | Ensure netdata directory exists
  when: netdata_args.condition | default(true)
  file:
    dest: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - /etc/netdata/
    - /etc/netdata/health.d/
  become: true

- name: health | Assert required inputs are set
  when: netdata_args.condition | default(true)
  assert:
    that:
      - netdata_args.src is defined and netdata_args.src | length > 0
      - netdata_args.dest is defined and netdata_args.dest | length > 0
    fail_msg: >-
      health helper requires netdata_args.src (file under the caller's
      files/ or templates/) and netdata_args.dest (bare filename under health.d/)

- name: health | Assert dest is a safe basename
  when: netdata_args.condition | default(true)
  assert:
    that:
      - netdata_args.dest is match('^[A-Za-z0-9_.-]+$')
    fail_msg: >-
      netdata_args.dest must be a bare filename under health.d/
      (got {{ netdata_args.dest }})

- name: health | Resolve caller args for {{ netdata_args.dest }}
  set_fact:
    _netdata_health_src: "{{ netdata_args.src }}"
    _netdata_health_dest: "{{ netdata_args.dest }}"
    _netdata_health_mode: "{{ netdata_args.mode | default('0644') }}"
    _netdata_health_condition: "{{ netdata_args.condition | default(true) }}"
    _netdata_health_restart: "{{ netdata_args.restart | default(true) }}"

- name: health | Setup alert config ({{ _module }})
  when: _netdata_health_condition
  vars:
    _module: "{{ 'template' if _netdata_health_src.endswith('.j2') else 'copy' }}"
  action: "{{ _module }}"
  args:
    src: "{{ _netdata_health_src }}"
    dest: /etc/netdata/health.d/{{ _netdata_health_dest }}
    owner: netdata
    group: netdata
    mode: "{{ _netdata_health_mode }}"
    backup: true
    # validate stays inline with default(omit) -- routing it through a fact
    # would break the no-validate callers (omit via set_fact becomes an
    # undefined fact, not a placeholder).
    validate: "{{ netdata_args.validate | default(omit) }}"
  register: netdata_alerts_conf
  become: true

- name: health | Reload health configuration
  when: _netdata_health_condition and _netdata_health_restart and netdata_alerts_conf.changed
  import_tasks: reload_health.yml
