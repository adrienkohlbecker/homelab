# keepalived VRRP master-state collector. Reads directly off the host: is the
# DNS VIP bound to a local interface? Gated by host var so non-DNS hosts stay
# clean; the plugin's own _check is a second guard.
- name: Install keepalived VRRP metrics
  import_role:
    name: netdata
    tasks_from: charts_d
  vars:
    netdata_args:
      name: keepalived_vrrp
      script: keepalived_vrrp.chart.sh
      conf: charts_d_keepalived_vrrp.conf.j2
      condition: "{{ netdata_keepalived_vrrp_enabled }}"
      restart: "{{ not (ansible_check_mode and (netdata_apt.changed or netdata_apt_repo.changed)) }}"
  tags:
    - netdata

- name: Remove stale keepalived VRRP collector files
  when: not netdata_keepalived_vrrp_enabled
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - /usr/libexec/netdata/charts.d/keepalived_vrrp.chart.sh
    - /etc/netdata/charts.d/keepalived_vrrp.conf
  register: netdata_keepalived_vrrp_absent
  become: true
  tags:
    - netdata

- name: Restart netdata after stale keepalived VRRP collector removal
  when: netdata_keepalived_vrrp_absent.changed
  systemd:
    name: netdata
    state: restarted
  become: true
  tags:
    - netdata
