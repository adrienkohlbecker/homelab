# Metric-wiring phase, imported by main.yml after the service is up: each
# sibling role ships a tasks/netdata.yml that drops its own collector config
# (and any alerts) through netdata's config/health/charts_d helpers. Split out
# of main.yml for navigability; runs in main.yml's order. netdata_presence is
# netdata's own collector rather than a sibling role.
# fail2ban now runs only on fox (and the test box); skip its collector on the
# internal hosts that dropped it.
- name: Install fail2ban metrics
  when: inventory_hostname not in ['lab', 'pug']
  import_role:
    name: fail2ban
    tasks_from: netdata
  vars:
    fail2ban_netdata_restart: "{{ not (ansible_check_mode and (netdata_apt.changed or netdata_apt_repo.changed)) }}"
  tags:
    - netdata

