# Inputs: caller passes a single dict `netdata_args` with keys
#   src         required; template file under the calling role's templates/
#   dest        required; filename under /etc/netdata/health.d/
#   mode        optional, default '0644'
#
# The dict form prevents inter-call leakage at play-vars scope (see
# template.yml for the longer rationale; same shape).
- name: health_template | Ensure netdata directory exists
  file:
    dest: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - /etc/netdata/
    - /etc/netdata/health.d/
  become: true

- name: health_template | Check if built-in template
  stat:
    path: /usr/lib/netdata/conf.d/health.d/{{ netdata_args.dest }}
  register: netdata_alerts_template_builtin
  become: true

- name: health_template | Copy alerting template
  when: netdata_alerts_template_builtin.stat.exists
  command: cp /usr/lib/netdata/conf.d/health.d/{{ netdata_args.dest }} /etc/netdata/health.d/{{ netdata_args.dest }}
  args:
    creates: /etc/netdata/health.d/{{ netdata_args.dest }}
  register: netdata_alerts_template
  become: true

- name: health_template | Copy the alerting config
  template:
    src: "{{ netdata_args.src }}"
    dest: "/etc/netdata/health.d/{{ netdata_args.dest }}"
    owner: netdata
    group: netdata
    mode: "{{ netdata_args.mode | default('0644') }}"
    backup: true
  register: netdata_alerts_conf
  become: true

- name: health_template | Reload health configuration
  when: (netdata_alerts_conf.changed or netdata_alerts_template.changed)
  command: netdatacli reload-health
  changed_when: true
  become: true
