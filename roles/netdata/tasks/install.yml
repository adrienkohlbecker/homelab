- name: install | Install gpg
  apt:
    pkg: gpg
    cache_valid_time: 3600
  become: true
  register: netdata_apt_gpg
  tags:
    - netdata

# Source is netdata's pre-2023 packagecloud repo, not repo.netdata.cloud:
# the latter prunes old releases and no longer carries the 1.46.* series
# this role pins, so the pin had gone silently dead (any fresh install
# jumped to 2.x). packagecloud still serves 1.46.3, so the pin resolves.
# Full rationale: notes/netdata_packagecloud_migration.md. packagecloud is
# component-based (`<release> main`), unlike repo.netdata.cloud's flat layout,
# and signs with its own key (A799AB70…, not Netdatabot's 6E155DC1…).
#
# Repository setup forks on Ubuntu major version because apt-key was
# removed from the default install in resolute (26.04) and the apt_key
# module errors with "Either apt-key or gpg binary is required". The
# deb822_repository module replaces both apt_key + apt_repository with
# a single sources.list.d/*.sources file that embeds the key inline.
- name: install | Add repository key (upstream)
  when:
    - ansible_distribution_major_version | int < 26
    - not (ansible_check_mode and netdata_apt_gpg.changed)
  apt_key:
    id: 6E155DC153906B73765A74A99DD4A74CECFA8F4F
    url: https://repo.netdata.cloud/netdatabot.gpg.key
    keyring: /etc/apt/trusted.gpg.d/netdata.gpg
  become: true
  tags:
    - netdata

- name: install | Add repository key (packagecloud)
  when:
    - ansible_distribution_major_version | int < 26
    - not (ansible_check_mode and netdata_apt_gpg.changed)
  apt_key:
    id: A799AB702EA6DEE3E21AA716B4188B90F6FB8FD3
    url: https://packagecloud.io/netdata/netdata/gpgkey
    keyring: /etc/apt/trusted.gpg.d/netdata.gpg
  become: true
  tags:
    - netdata

- name: install | Add repository
  when: ansible_distribution_major_version | int < 26
  apt_repository:
    repo: deb [signed-by=/etc/apt/trusted.gpg.d/netdata.gpg] {{ mirror_apt_netdata_packagecloud }} {{ ansible_distribution_release }} main
  register: netdata_apt_repo_legacy
  become: true
  tags:
    - netdata

# repo.netdata.cloud and packagecloud sanitize to different sources.list.d
# filenames, so the mirror switch leaves the old flat-layout list behind on
# hosts provisioned before the migration -- it would keep pulling stale 2.x
# metadata. Drop it. Legacy path only: the deb822 path (>= 26) reuses the same
# `netdata.sources` name and is overwritten in place. No-op on fresh hosts and
# on test machines (their Nexus-URL list keeps its filename across the switch).
- name: install | Drop the pre-migration repo.netdata.cloud source
  when: ansible_distribution_major_version | int < 26
  file:
    path: /etc/apt/sources.list.d/repo_netdata_cloud_repos_stable_ubuntu.list
    state: absent
  register: netdata_apt_old_repo_removed
  become: true
  tags:
    - netdata

# Pre-warm /var/lib/apt/lists/ so the python3-debian install below
# works in check mode. Packer ships an empty cache and the apt
# module's update_cache is a no-op under --check. See
# roles/apt/tasks/install.yml for the full rationale.
- name: install | Pre-warm apt cache (real fetch even in --check)  # noqa: command-instead-of-module
  when: ansible_distribution_major_version | int >= 26
  ansible.builtin.command: apt-get update
  changed_when: false
  check_mode: false
  become: true
  tags:
    - netdata

# deb822_repository requires python3-debian even in check mode (it
# parses/writes deb822 itself rather than shelling to apt). Install it
# explicitly and gate the deb822 task on its .changed -- mirrors the
# gpg/apt_key pair on the legacy path.
- name: install | Install python3-debian
  when: ansible_distribution_major_version | int >= 26
  apt:
    pkg: python3-debian
    cache_valid_time: 3600
  become: true
  register: netdata_apt_python3_debian
  tags:
    - netdata

# Component-based repo: bare Suites (release name), Components `main`.
- name: install | Add repository (deb822)
  when:
    - ansible_distribution_major_version | int >= 26
    - not (ansible_check_mode and netdata_apt_python3_debian.changed)
  ansible.builtin.deb822_repository:
    name: netdata
    types: deb
    uris: "{{ mirror_apt_netdata }}"
    suites: "{{ ansible_distribution_release }}"
    components: main
    signed_by: https://packagecloud.io/netdata/netdata/gpgkey
  register: netdata_apt_repo_deb822
  become: true
  tags:
    - netdata

- name: install | Configure apt
  copy:
    src: apt_preferences
    dest: /etc/apt/preferences.d/netdata
    owner: root
    group: root
    mode: "0644"
    backup: true
  register: netdata_apt_pin
  become: true
  tags:
    - netdata

# Coalesce the version-gated registers so downstream tasks keep
# referencing netdata_apt_repo.changed without caring which
# branch ran. Includes netdata_apt_python3_debian so check mode on
# resolute (where the deb822 task is gated out by the prereq install)
# still propagates a "would-change" signal -- otherwise install
# netdata would run in check mode against an unconfigured repo.
- name: install | Track repository changes
  set_fact:
    netdata_apt_repo:
      changed: "{{ netdata_apt_repo_legacy is changed or netdata_apt_old_repo_removed is changed or netdata_apt_repo_deb822 is changed or netdata_apt_python3_debian is changed }}"
  tags:
    - netdata

# deb822_repository writes the .sources file but doesn't run
# `apt update`, so the install below would otherwise hit a stale
# cache (cache_valid_time=3600) and fail to find `netdata`. Force
# a refresh on the run that actually changed the repo.
- name: install | Refresh apt cache after netdata repo change
  when: netdata_apt_repo.changed and not ansible_check_mode
  apt:
    update_cache: true
  become: true
  tags:
    - netdata

- name: install | Install netdata
  when: not (ansible_check_mode and netdata_apt_repo.changed)
  apt:
    pkg:
      - netdata
    policy_rc_d: 101
    cache_valid_time: 3600
  register: netdata_apt
  become: true
  tags:
    - netdata

# Letsencrypt live/ + archive/ are 0750 root:ssl-cert (see
# roles/certbot/tasks/main.yml); netdata's go.d/x509check reads
# /etc/letsencrypt/live/<host>/fullchain.pem, so the netdata user
# needs ssl-cert to traverse those dirs. Create the group here
# rather than relying on certbot having run first — the ssl-cert
# apt package's postinst is idempotent against the group already
# existing, so certbot installing the package later is fine.
- name: install | Ensure ssl-cert group exists
  group:
    name: ssl-cert
    system: true
    state: present
  become: true
  tags:
    - netdata

- name: install | Add netdata to ssl-cert group
  when: not (ansible_check_mode and netdata_apt.changed)
  user:
    name: netdata
    groups: ssl-cert
    append: true
  become: true
  tags:
    - netdata

# No separate netdata-plugin-* packages: the base `netdata` package covers
# what this fleet charts. slabinfo was installed historically but is unused
# (disabled-by-default, and no collector/context/alarm references it) and has
# no arm64 build on packagecloud — so it hard-failed local arm64 (Apple
# Silicon) test VMs while the x86_64 fleet (lab/pug/fox) was unaffected.
# Don't re-add it without a concrete consumer. See
# notes/netdata_packagecloud_migration.md.
