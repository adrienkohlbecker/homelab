- name: install | Install gpg
  apt:
    pkg: gpg
    cache_valid_time: 3600
  become: true
  register: apt_install_gpg
  tags:
    - netdata

# Repository setup forks on Ubuntu major version because apt-key was
# removed from the default install in resolute (26.04) and the apt_key
# module errors with "Either apt-key or gpg binary is required". The
# deb822_repository module replaces both apt_key + apt_repository with
# a single sources.list.d/*.sources file that embeds the key inline.
- name: install | Add repository key
  when:
    - ansible_distribution_major_version | int < 26
    - not (ansible_check_mode and apt_install_gpg.changed)
  apt_key:
    id: 6E155DC153906B73765A74A99DD4A74CECFA8F4F
    url: https://repo.netdata.cloud/netdatabot.gpg.key
    keyring: /etc/apt/trusted.gpg.d/netdata.gpg
  become: true
  tags:
    - netdata

- name: install | Add repository
  when: ansible_distribution_major_version | int < 26
  apt_repository:
    repo: deb [signed-by=/etc/apt/trusted.gpg.d/netdata.gpg] {{ mirror_apt_netdata }}/ {{ ansible_distribution_release }}/
  register: apt_repository_netdata_legacy
  become: true
  tags:
    - netdata

# Pre-warm /var/lib/apt/lists/ so the python3-debian install below
# works in check mode. Packer ships an empty cache and the apt
# module's update_cache is a no-op under --check. See
# roles/apt/tasks/install.yml for the full rationale.
- name: install | Pre-warm apt cache (real fetch even in --check)  # noqa: command-instead-of-module
  when: ansible_distribution_major_version | int >= 26
  ansible.builtin.command: apt-get update
  changed_when: false
  check_mode: false
  become: true
  tags:
    - netdata

# deb822_repository requires python3-debian even in check mode (it
# parses/writes deb822 itself rather than shelling to apt). Install it
# explicitly and gate the deb822 task on its .changed -- mirrors the
# gpg/apt_key pair on the legacy path.
- name: install | Install python3-debian
  when: ansible_distribution_major_version | int >= 26
  apt:
    pkg: python3-debian
    cache_valid_time: 3600
  become: true
  register: apt_install_python3_debian
  tags:
    - netdata

# Flat repo: trailing `/` on Suites, no Components field.
- name: install | Add repository (deb822)
  when:
    - ansible_distribution_major_version | int >= 26
    - not (ansible_check_mode and apt_install_python3_debian.changed)
  ansible.builtin.deb822_repository:
    name: netdata
    types: deb
    uris: "{{ mirror_apt_netdata }}/"
    suites: "{{ ansible_distribution_release }}/"
    signed_by: https://repo.netdata.cloud/netdatabot.gpg.key
  register: apt_repository_netdata_deb822
  become: true
  tags:
    - netdata

- name: install | Configure apt
  copy:
    src: apt_preferences
    dest: /etc/apt/preferences.d/netdata
    owner: root
    group: root
    mode: "0644"
    backup: true
  register: apt_pin_netdata
  become: true
  tags:
    - netdata

# Coalesce the version-gated registers so downstream tasks keep
# referencing apt_repository_netdata.changed without caring which
# branch ran. Includes apt_install_python3_debian so check mode on
# resolute (where the deb822 task is gated out by the prereq install)
# still propagates a "would-change" signal -- otherwise install
# netdata would run in check mode against an unconfigured repo.
- name: install | Track repository changes
  set_fact:
    apt_repository_netdata:
      changed: "{{ apt_repository_netdata_legacy is changed or apt_repository_netdata_deb822 is changed or apt_install_python3_debian is changed }}"
  tags:
    - netdata

# deb822_repository writes the .sources file but doesn't run
# `apt update`, so the install below would otherwise hit a stale
# cache (cache_valid_time=3600) and fail to find `netdata`. Force
# a refresh on the run that actually changed the repo.
- name: install | Refresh apt cache after netdata repo change
  when: apt_repository_netdata.changed and not ansible_check_mode
  apt:
    update_cache: true
  become: true
  tags:
    - netdata

- name: install | Install netdata
  when: not (ansible_check_mode and apt_repository_netdata.changed)
  apt:
    pkg:
      - netdata
    policy_rc_d: 101
    cache_valid_time: 3600
  register: netdata_apt
  become: true
  tags:
    - netdata

# Letsencrypt live/ + archive/ are 0750 root:ssl-cert (see
# roles/certbot/tasks/main.yml); netdata's go.d/x509check reads
# /etc/letsencrypt/live/<host>/fullchain.pem, so the netdata user
# needs ssl-cert to traverse those dirs.
- name: install | Add netdata to ssl-cert group
  when: not (ansible_check_mode and netdata_apt.changed)
  user:
    name: netdata
    groups: ssl-cert
    append: true
  become: true
  tags:
    - netdata

- name: install | Install netdata plugins
  when: not (ansible_check_mode and (netdata_apt.changed or apt_repository_netdata.changed))
  apt:
    pkg:
      - netdata-plugin-slabinfo
    cache_valid_time: 3600
  become: true
  tags:
    - netdata
