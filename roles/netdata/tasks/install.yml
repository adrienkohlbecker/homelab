- name: install | Install gpg
  apt:
    pkg: gpg
    cache_valid_time: 3600
  become: true
  register: apt_install_gpg
  tags:
    - netdata

- name: install | Add repository key
  apt_key:
    id: 6E155DC153906B73765A74A99DD4A74CECFA8F4F
    url: https://repo.netdata.cloud/netdatabot.gpg.key
    keyring: /etc/apt/trusted.gpg.d/netdata.gpg
  become: true
  when: not (ansible_check_mode and apt_install_gpg.changed)
  tags:
    - netdata

- name: install | Add repository
  apt_repository:
    repo: deb [signed-by=/etc/apt/trusted.gpg.d/netdata.gpg] {{ mirror_apt_netdata }}/ {{ ansible_distribution_release }}/
  register: apt_repository_netdata
  become: true
  tags:
    - netdata

- name: install | Configure apt
  copy:
    src: apt_preferences
    dest: /etc/apt/preferences.d/netdata
    owner: root
    group: root
    mode: "0644"
    backup: true
  register: apt_pin_netdata
  become: true
  tags:
    - netdata

- name: install | Install netdata
  when: not (ansible_check_mode and apt_repository_netdata.changed)
  apt:
    pkg:
      - netdata
    policy_rc_d: 101
    cache_valid_time: 3600
  register: netdata_apt
  become: true
  tags:
    - netdata

- name: install | Install netdata plugins
  when: not (ansible_check_mode and (netdata_apt.changed or apt_repository_netdata.changed))
  apt:
    pkg:
      - netdata-plugin-slabinfo
    cache_valid_time: 3600
  become: true
  tags:
    - netdata
