- name: _setup | Install nginx
  import_role:
    name: test
    tasks_from: nginx

# netdata uses nginx_site_args.auth=required. Gate-mode Authelia stub so
# _verify sees the unauthenticated browser hit redirect to the portal (302).
- name: _setup | Install authelia stub in gate mode
  import_role:
    name: test
    tasks_from: authelia_stub
  vars:
    test_authelia_stub_args:
      mode: gate
