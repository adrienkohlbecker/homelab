- name: _setup | Install nginx
  import_role:
    name: test
    tasks_from: nginx

# netdata uses nginx_site_args.auth=required + bypass_query_param.
# Gate-mode Authelia stub so _verify can distinguish bypass-token (200)
# from no-token / wrong-token (302) paths.
- name: _setup | Install authelia stub in gate mode
  import_role:
    name: test
    tasks_from: authelia_stub
  vars:
    test_authelia_stub_args:
      mode: gate
