# Postfix queue depth alarm.
#
# Netdata ships no stock postfix health template (the postfix_local
# chart exists but has no default alarm). This is the only thing that
# surfaces a stuck mail relay -- mail-to-root is a load-bearing
# notification channel (zfs_health.sh drive-error/scrub-expired,
# nut_monitor UPS events, unattended-upgrades errors all rely on it).
# A Mailgun credential expiry, DNS resolution failure, or sustained
# rate-limit silently stacks the queue otherwise.
#
# Steady-state queue depth on lab/pug is 0 -- relay is sub-second when
# healthy. >5 emails stuck for 10m is the WARN threshold (small enough
# to catch real backups, large enough to ride out a transient batch).
# >10 is CRIT (relay genuinely broken). `up 10m` smooths over a
# legitimate brief queueing burst during a Mailgun blip; `down 30m`
# avoids flapping during recovery.

template: postfix_queue_depth
      on: postfix.qemails
   class: Workload
    type: System
component: Mail
    calc: $emails
   units: emails
   every: 1m
    warn: $this > (($status >= $WARNING)  ? (3)  : (5))
    crit: $this > (($status == $CRITICAL) ? (5)  : (10))
   delay: up 10m down 30m multiplier 1.5 max 1h
 summary: Postfix queue depth
    info: Mail queued for delivery via the SMTP relay (mailgun); high values indicate the relay is broken or rate-limited, silencing the email-to-root notification channel.
      to: sysadmin
