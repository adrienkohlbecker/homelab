# vim:ft=yaml
## All available configuration options, their descriptions and default values:
## https://github.com/netdata/netdata/tree/master/src/go/collectors/go.d.plugin/modules/systemdunits#readme

jobs:
  - name: service-units
    autodetection_retry: 60
    include:
      - '*'
    skip_transient: true
    # Also collect per-unit enablement state (enabled/disabled/masked), not
    # just runtime active/failed. Surfaces a unit that was silently disabled
    # or masked -- invisible to the failed-state alerts. Refreshed every
    # collect_unit_files_every (default 300s); include_unit_files defaults to
    # '*.service'.
    collect_unit_files: true

