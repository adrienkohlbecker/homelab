# Health templates for netdata_presence.chart.sh. Bind on the shared
# contexts so a single template instantiates per-chart (per-entry).
# `present == 0` means the configured context_id / collector chart did
# not appear in netdata's chart registry the last time we polled --
# native $last_collected_t templates can't catch that case because
# they bind at parse time to charts that already exist. delay: up 5m
# keeps a freshly-started netdata from alarming before its collectors
# finish their first iteration.
template: netdata_context_missing
on: netdata_presence.context
lookup: min -60s of present
every: 60s
crit: $this < (1)
delay: up 5m
summary: Context ${label:context} not registered with netdata
info: Configured context ${label:context} (${label:context_id}) has never appeared in netdata's chart registry -- native liveness templates can't bind to a chart that doesn't exist, so this presence check is what surfaces a misnamed context, disabled collector, or upstream rename.

template: netdata_collector_missing
on: netdata_presence.collector
lookup: min -60s of present
every: 60s
crit: $this < (1)
delay: up 5m
summary: Collector ${label:collector} not registered with netdata
info: Configured collector ${label:collector} has no corresponding netdata.go_d_*_data_collection_status chart -- collector configuration was rejected, job name drifted, or plugin failed to load. Native staleness/failure alerts (see context_liveness.conf) cover the runtime path; this catches the never-instantiated case.
