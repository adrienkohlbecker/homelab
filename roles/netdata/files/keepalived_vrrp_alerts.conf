# keepalived lost-master alarm, fed by the keepalived_vrrp charts.d collector
# (holds_vip = is the DNS VIP bound to a local interface). Deployed by
# roles/netdata ONLY on the highest-priority VRRP peer: a backup normally has
# holds_vip=0, so this alarm there would be a permanent false positive. On the
# primary, a sustained holds_vip=0 means the VIP failed over to a backup -- the
# household DNS path moved off its usual host, worth surfacing.
#
# max -10s: holds_vip rides 1 while the VIP is local; crit only once it has been
# 0 for a full window. delay up 5m so a brief/auto-recovering flap (a twitchy
# FTL healthcheck yielding then reclaiming) doesn't page; down 1m clears soon
# after the VIP returns.
 alarm: keepalived_lost_master
    on: keepalived_vrrp.state
 lookup: max -10s of holds_vip
  units: held
  every: 10s
   crit: $this != 1
  delay: up 5m down 1m
summary: keepalived lost the DNS VIP
   info: The primary VRRP peer has not held the DNS VIP for 5+ minutes; a backup has taken over (or no peer holds it). Investigate unless this is planned maintenance.
     to: sysadmin
