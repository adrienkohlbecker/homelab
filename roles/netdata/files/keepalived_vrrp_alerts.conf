# keepalived lost-master alarm, fed by the keepalived_vrrp charts.d collector.
# Deployed only on the designated primary peer: a backup normally has
# holds_vip=0, so this alarm there would be a permanent false positive.
#
# max -2m lets the alert tolerate a few missed 30s samples. delay up 5m keeps
# brief/auto-recovering flaps from paging; down 1m clears soon after the VIP
# returns.
template: keepalived_lost_master
    on: keepalived_vrrp.state
 class: Errors
  type: System
component: Network
 lookup: max -2m of holds_vip
  units: held
  every: 30s
   crit: $this != 1
  delay: up 5m down 1m
summary: keepalived lost the DNS VIP
   info: The primary VRRP peer has not held the DNS VIP for 5+ minutes; a backup has taken over (or no peer holds it). Investigate unless this is planned maintenance.
     to: sysadmin
