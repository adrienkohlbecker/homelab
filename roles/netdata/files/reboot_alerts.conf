# Post-update reboot-required alarm.
#
# The stock alarm fires as soon as /run/reboot_required appears. During a
# converge, roles may touch /var/run/reboot-required before the site-level
# reboot drain reaches that host, which produces a transient page in the
# middle of the run. Keep the signal, but only notify when the required
# dimension stays high for 30m.

alarm: system_post_update_reboot_status
    on: system.post_update_reboot_status
 class: Errors
  type: System
component: OS
lookup: min -30m unaligned of required
 units: status
 every: 10s
  warn: $this == 1
summary: System requires reboot after package updates
  info: System requires reboot after package updates
    to: sysadmin
