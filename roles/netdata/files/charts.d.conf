# Managed by ansible (roles/netdata/files/charts.d.conf).
#
# charts.d.plugin sources this on every start, then probes each *.chart.sh in
# /usr/libexec/netdata/charts.d/. With charts.d enabled by default, every
# bundled module (libreswan, opensips, hdparm, ...) runs its check() -- on a
# host without the matching service the check fails and logs a warning per
# start (and the missing file itself logs `charts.d.conf not found`).
#
# Disable the blanket auto-enable and enable only the collectors this fleet
# installs through the charts_d helper. charts.d.plugin enables a module only
# when its flag equals that module's `required` keyword -- "yes" for these
# collectors (only the bundled `example` wants "force"). A flag for a module
# whose .chart.sh is absent is inert, so listing every repo-managed charts.d
# collector is safe on every host.
enable_all_charts="no"
hdparm="yes"
keepalived_vrrp="yes"
netdata_presence="yes"
systemd_timers="yes"
zfs_scan="yes"
