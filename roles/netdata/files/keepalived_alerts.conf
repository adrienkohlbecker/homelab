# keepalived VRRP master-loss alarm.
#
# The keepalived_exporter encodes the current VRRP state in a chart
# label (`state=MASTER` / `state=BACKUP`). When a host transitions from
# MASTER to BACKUP, the chart with state=MASTER stops being updated --
# its $last_collected_t freezes -- and a new chart with state=BACKUP
# appears.
#
# Template scoped to `state=MASTER` charts so it only instantiates on
# hosts currently or recently in MASTER. When MASTER staleness exceeds
# 5min, the host has lost master role -- crit-worthy because a silent
# failover from lab -> bunk for the DNS VIP is otherwise invisible
# (homepage UI is the only signal).
#
# Caveats: doesn't catch the reverse direction (peer host BECOMING
# master). If lab dies, lab's alarms can't fire; pug doesn't have a
# state=MASTER chart yet so this template doesn't instantiate there.
# Detecting "pug took over" cleanly would need keepalived NOTIFY
# scripts (out of scope today). Practical workaround: lab being down
# already fires the systemd_service_unit_failed_state on multiple
# units + the wireguard handshake alarms, so the user knows lab is
# in trouble; the DNS-VIP-specific detail (who's MASTER now) is a
# nice-to-have rather than the primary signal.

template: keepalived_lost_master
      on: prometheus.keepalived_exporter_local.keepalived_vrrp_become_master
chart labels: state=MASTER
   class: Errors
    type: System
component: Network
    calc: $now - $last_collected_t
   units: seconds
   every: 30s
    crit: $this > 300
   delay: up 5m down 30m
 summary: keepalived ${label:name} MASTER chart stale
    info: This host's keepalived state=MASTER chart has stopped updating, meaning the host has transitioned out of MASTER. A peer took over the VRRP IP. Investigate; if this is intentional (manual failover, maintenance), no action needed.
      to: sysadmin
