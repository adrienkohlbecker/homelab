[Service]
# Opt out of netdata's anonymous telemetry at the daemon level (and for the
# anonymous-statistics.sh helpers it spawns, which inherit this env).
# Documented equivalent of the .opt-out-from-anonymous-statistics sentinel.
Environment=DO_NOT_TRACK=1

# Block service start until the HTTP API answers — netdata's stock
# Type=notify signals READY=1 before the listener is fully up, so a bare
# `systemctl start` returns "early" from a CLI consumer's POV and a
# downstream `netdatacli reload-health` then races the listener coming up.
# Mirrors the podman --health-startup-cmd pattern used in *.service.j2.
#
# --retry-connrefused treats the pre-bind ECONNREFUSED window as transient
# (plain --retry only covers HTTP/transport errors), so one curl replaces
# the old timeout+until+sleep shell loop. --retry-max-time 120 caps the
# total wait; --connect-timeout/--max-time bound each attempt.
ExecStartPost=/usr/bin/curl --fail --silent --show-error --retry 240 --retry-connrefused --retry-delay 1 --retry-max-time 120 --connect-timeout 1 --max-time 5 -o /dev/null http://localhost:19999/api/v1/info
