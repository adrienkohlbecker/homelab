[Service]
# Block service start until the HTTP API answers — netdata's stock
# Type=notify signals READY=1 before the listener is fully up, so a
# bare `systemctl start` returns "early" from a CLI consumer's POV
# and downstream `netdatacli reload-health` calls then race against
# /run/netdata/netdata.pipe. Mirrors the podman --health-startup-cmd
# pattern used in *.service.j2 unit templates.
ExecStartPost=/bin/sh -c 'timeout 120 sh -c "until curl --fail --silent --show-error --connect-timeout 1 --max-time 5 -o /dev/null http://localhost:19999/api/v1/info; do sleep 0.5; done"'
