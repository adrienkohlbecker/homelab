# SMART + NVMe wear alarms.
#
# These signals are weeks-to-months lead time on disk failure. No
# upstream netdata health templates exist for the go.d smartctl/nvme
# collectors (the charts emit but no alarms fan out).
#
# smartctl.device_smart_status carries a failed/passed counter pair per
# device; `failed > 0` is the canonical "drive thinks it's dying" bit
# (from SMART's overall-health self-assessment, not per-attribute). Any
# non-zero count is CRIT -- single sample is sufficient signal.
#
# nvme.device_estimated_endurance_perc is the % of manufacturer-estimated
# write endurance consumed (0 = brand new, 100 = end-of-life). Lab is
# currently at 4% so plenty of headroom; WARN at 80% gives many months
# of advance notice for procurement. The chart's dimension is named
# `used`.

template: smartctl_device_failing
      on: smartctl.device_smart_status
   class: Errors
    type: System
component: Disk
    calc: $failed
   units: bool
   every: 1m
    crit: $this > 0
   delay: down 1h
 summary: SMART overall health failing on ${label:device_name}
    info: SMART self-assessment reports the drive is failing -- this is the canonical "predicted to fail" bit; replace the drive.
      to: sysadmin

template: nvme_endurance_used_high
      on: nvme.device_estimated_endurance_perc
   class: Workload
    type: System
component: Disk
    calc: $used
   units: %
   every: 1m
    warn: $this > 80
    crit: $this > 90
   delay: down 1h
 summary: NVMe ${label:device} endurance used
    info: Percentage of manufacturer-estimated write endurance consumed; > 80% is a procurement signal, > 90% is a replacement signal.
      to: sysadmin
