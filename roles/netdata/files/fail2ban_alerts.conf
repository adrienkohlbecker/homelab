# fail2ban ban-count alarm.
#
# The fail2ban.jail_sshd_banned_ips chart tracks the currently-banned
# IP count in the sshd jail. Steady-state is 0 (one-off probes get
# banned and then time out per bantime). A sustained-high count means
# a brute-force campaign is in progress -- either many simultaneous
# attackers (distributed) or one persistent attacker rotating IPs.
#
# Absolute thresholds rather than rate-of-change: netdata 1.46 doesn't
# have clean delta syntax, and the absolute count is itself a useful
# signal (the chart cycles back to 0 once bantime expires, so a high
# count IS unusual). bantime defaults to 24h so a steady accumulation
# over an attack would peak in tens of unique IPs.
#
# `up 30m` filters out brief enumeration scans that fail2ban catches
# and lets time out cleanly; `down 1h` avoids flapping during slow
# decay as bans expire.

template: fail2ban_jail_banned_ips_high
      on: fail2ban.jail_banned_ips
   class: Security
    type: System
component: SSH
    calc: $banned
   units: ips
   every: 1m
    warn: $this > 30
    crit: $this > 100
   delay: up 30m down 1h multiplier 1.5 max 2h
 summary: fail2ban sshd jail banned IPs
    info: A sustained-high banned IP count indicates an ongoing brute-force campaign; if fail2ban itself died, systemd_service_unit_failed_state would fire instead.
      to: sysadmin
