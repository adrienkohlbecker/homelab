# fluent-bit output drop-rate alarm.
#
# fluent-bit retries against ingestion endpoints (OpenObserve via http.0,
# HyperDX via opentelemetry.1) with a 5MB on-disk backlog buffer. Retries
# during transient blips are normal; what's not normal is fluent-bit
# *dropping* records after exhausting retries -- that's silent log loss.
#
# The chart fans out per-output, so this template instantiates one alarm
# per output (http.0 + opentelemetry.1 today). Catches: backend
# unreachable long enough to exhaust retries, backend authentication
# broken, ingest endpoint returning persistent 5xx.
#
# warn on any sustained drop rate (drops are pure data loss); delay up
# 5m so a single record drop during a transient blip doesn't fire,
# down 1h so the alarm stays visible after the backend recovers.

template: fluentbit_output_records_dropped
      on: prometheus.fluentbit.fluentbit_output_dropped_records_total
   class: Errors
    type: System
component: Logs
    calc: $fluentbit_output_dropped_records_total
   units: records/s
   every: 1m
    warn: $this > 0
   delay: up 5m down 1h multiplier 1.5 max 2h
 summary: fluent-bit output dropping records
    info: fluent-bit is dropping records after exhausting retries against an ingestion endpoint -- silent log loss in progress. Identify the failing output and either fix the backend or drop the output from fluent-bit.conf.
      to: sysadmin
