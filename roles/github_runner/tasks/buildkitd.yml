# Rootless BuildKit for the zbm-build CI job. The upstream ZFSBootMenu Dockerfile
# uses heredoc RUN blocks that jammy's buildah (1.33) can't parse, so the build
# needs real BuildKit via `docker buildx`. buildx's docker-container driver runs
# BuildKit nested inside podman, which can't execute in the runner's rootless
# podman -- so buildkitd runs here as a standalone rootless process (via
# rootlesskit), and the CI job points buildx at it with the `remote` driver.
# `--load` then imports into the runner's rootless podman -- the same store
# build.sh's `podman run` reads -- so no cross-store copy is needed.
#
# Binaries install to versioned dirs under /opt and are symlinked onto PATH, so
# a version bump (vars/main.yml) re-points the symlinks and re-renders the unit.

- name: Set up rootless buildkit
  become: true
  tags:
    - github_runner
  block:
    - name: Download buildkit + rootlesskit tarballs
      when: not (ansible_check_mode and github_runner_user.changed)
      get_url:
        url: "{{ item.url }}"
        checksum: "sha256:{{ item.sha256 }}"
        dest: "/opt/{{ item.name }}"
        owner: root
        group: root
        mode: "0644"
      loop:
        - name: "buildkit-{{ github_runner_buildkit_version }}.tar.gz"
          url: "{{ github_runner_buildkit_archive[ansible_architecture].url }}"
          sha256: "{{ github_runner_buildkit_archive[ansible_architecture].sha256 }}"
        - name: "rootlesskit-{{ github_runner_rootlesskit_version }}.tar.gz"
          url: "{{ github_runner_rootlesskit_archive[ansible_architecture].url }}"
          sha256: "{{ github_runner_rootlesskit_archive[ansible_architecture].sha256 }}"
      loop_control:
        label: "{{ item.name }}"

    - name: Create buildkit + rootlesskit extract dirs
      file:
        path: "/opt/{{ item }}"
        state: directory
        owner: root
        group: root
        mode: "0755"
      loop:
        - "buildkit-{{ github_runner_buildkit_version }}"
        - "rootlesskit-{{ github_runner_rootlesskit_version }}"

    # The extract -> symlink -> unit -> start chain can't be dry-run: in check
    # mode the tarballs and dirs above are only reported (not placed), so the
    # unarchive's "dest must exist" check fails. Skip the chain under --check
    # (real converges run it; _verify exercises the result functionally).
    - name: Extract buildkit (bin/buildkitd, buildctl, buildkit-runc)
      when: not ansible_check_mode
      unarchive:
        src: "/opt/buildkit-{{ github_runner_buildkit_version }}.tar.gz"
        remote_src: true
        dest: "/opt/buildkit-{{ github_runner_buildkit_version }}"
        creates: "/opt/buildkit-{{ github_runner_buildkit_version }}/bin/buildkitd"
        owner: root
        group: root

    - name: Extract rootlesskit
      when: not ansible_check_mode
      unarchive:
        src: "/opt/rootlesskit-{{ github_runner_rootlesskit_version }}.tar.gz"
        remote_src: true
        dest: "/opt/rootlesskit-{{ github_runner_rootlesskit_version }}"
        creates: "/opt/rootlesskit-{{ github_runner_rootlesskit_version }}/rootlesskit"
        owner: root
        group: root

    - name: Symlink buildkit + rootlesskit binaries onto PATH
      when: not ansible_check_mode
      file:
        src: "{{ item.src }}"
        dest: "/usr/local/bin/{{ item.dest }}"
        state: link
        force: true
      loop:
        - dest: buildkitd
          src: "/opt/buildkit-{{ github_runner_buildkit_version }}/bin/buildkitd"
        - dest: buildctl
          src: "/opt/buildkit-{{ github_runner_buildkit_version }}/bin/buildctl"
        - dest: buildkit-runc
          src: "/opt/buildkit-{{ github_runner_buildkit_version }}/bin/buildkit-runc"
        - dest: rootlesskit
          src: "/opt/rootlesskit-{{ github_runner_rootlesskit_version }}/rootlesskit"
      loop_control:
        label: "{{ item.dest }}"

# buildkitd auto-detects rootlesskit and runs its OCI worker without the
# process sandbox -- no explicit flag needed (matches the validated command).
# RuntimeDirectory makes systemd create %t/buildkit for the socket; the build
# cache persists under the runner's home.
#
# --oci-worker-gc-keepstorage raises GC's cache floor (Reserved,Free,Maximum
# in MB) far above the default 2000 (2 GB) -- the ZBM builder image alone is
# ~1.3 GB, so the default would evict it plus the xbps download cache between
# runs, defeating the upstream `--mount=type=cache` and forcing cold rebuilds.
# 20 GB comfortably retains the layers + xbps cache across ZBM version bumps
# (the runner's /mnt/scratch has ~1 TB).
- name: Install rootless buildkit user service
  import_role:
    name: systemd_unit
    tasks_from: install
  vars:
    systemd_unit_args:
      src: buildkit.service
      user: github_runner
      condition: "{{ not (ansible_check_mode and github_runner_user.changed) }}"
  tags:
    - github_runner

- name: Enable + start rootless buildkit user service
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: buildkit.service
      user: github_runner
      condition: "{{ not (ansible_check_mode and github_runner_user.changed) }}"
      restart: "{{ buildkit_service_result.changed | default(false) }}"
  tags:
    - github_runner
