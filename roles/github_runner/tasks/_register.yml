# Per-instance registration + container deploy. Called from main.yml
# with loop_var: runner_instance (keys: repo, suffix, labels).
#
# runner_iid == <repo>_<suffix> is the universal handle: systemd
# template instance name, podman container name suffix, on-disk state
# dir name, podman secret name suffix.

- name: _register | Resolve instance id for {{ runner_instance.repo }}/{{ runner_instance.suffix }}
  set_fact:
    runner_iid: "{{ runner_instance.repo }}_{{ runner_instance.suffix }}"
  tags:
    - github_runner

- name: _register | Create state dir for {{ runner_iid }}
  file:
    path: /mnt/services/github_runner/{{ runner_iid }}
    state: directory
    owner: github_runner
    group: github_runner
    mode: "0755"
  become: true
  tags:
    - github_runner

- name: _register | Create workdir for {{ runner_iid }}
  file:
    path: /mnt/scratch/github_runner/workdir_{{ runner_iid }}
    state: directory
    owner: github_runner
    group: github_runner
    mode: "0755"
  become: true
  tags:
    - github_runner

# Check if this instance has already registered. The .runner file is
# written by config.sh on first successful registration; if it's there,
# we skip the token fetch + secret rotation entirely and the container
# uses the persisted .credentials.
- name: _register | Check if {{ runner_iid }} is already registered
  stat:
    path: /mnt/services/github_runner/{{ runner_iid }}/.runner
  register: runner_registered
  become: true
  tags:
    - github_runner

# Registration token (1h TTL, can't be vaulted). Fetched from the
# controller workstation via `gh api`. Skipped if already registered;
# skipped under qemu_test (no GitHub fixture to register against).
- name: _register | Fetch registration token for {{ runner_iid }}
  when:
    - not qemu_test
    - not runner_registered.stat.exists
  command: gh api -X POST /repos/{{ github_runner_owner }}/{{ runner_instance.repo }}/actions/runners/registration-token --jq .token
  register: runner_token_result
  delegate_to: localhost
  become: false
  changed_when: false
  check_mode: false
  no_log: true
  tags:
    - github_runner

# Per-instance podman secret. The container's entrypoint consumes
# RUNNER_TOKEN on first start (when /runner/.runner is absent) and
# ignores it on every subsequent start. Stored as a github_runner-owned
# rootless secret so the runner container under --userns keep-id can
# read it.
- name: _register | Store registration token in podman secret for {{ runner_iid }}
  when:
    - not qemu_test
    - not runner_registered.stat.exists
  import_role:
    name: podman_secret
    tasks_from: secret
  vars:
    podman_secret_args:
      name: github_runner_token_{{ runner_iid }}
      data: "{{ runner_token_result.stdout }}"
      user: github_runner
  tags:
    - github_runner

# Per-instance env file consumed by podman's --env-file in the template.
# Static for the instance's lifetime; changes (relabel, repo rename)
# propagate to the unit's restart via the register below.
- name: _register | Install env file for {{ runner_iid }}
  template:
    src: github_runner_envfile.j2
    dest: /etc/default/github_runner@{{ runner_iid }}
    owner: root
    group: root
    mode: "0644"
    backup: true
  become: true
  register: runner_envfile
  tags:
    - github_runner

# Enable + start github_runner@<repo>_<suffix>.service. Skipped under
# qemu_test (no GitHub-backed registration; run.sh would fail with
# "Must configure first" and loop on the restart-limit).
- name: _register | Enable github_runner@{{ runner_iid }}
  when: not qemu_test
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: github_runner@{{ runner_iid }}
      condition: "{{ not (ansible_check_mode and github_runner_user.changed) }}"
      # Restart on env-file edits (label or repo URL change). Token
      # rotations are also wired in, but they only matter for instances
      # not-yet-registered -- a token rotation on an already-registered
      # instance is harmless leftover, the container ignores it.
      restart: >-
        {{
          runner_envfile.changed
          or lookup('vars',
                    'github_runner_token_' ~ runner_iid ~ '_rotated',
                    default=false)
        }}
  tags:
    - github_runner
