# Per-repo registration + unit install. Looped from main.yml over
# github_runner_repos with loop_var: runner_repo. Each per-repo dir
# gets its own full actions/runner extract -- the shared-binary
# experiment didn't survive contact with Runner.Listener's
# Assembly.Location-based state-file paths (symlinks resolve through
# to the binary location, so state files like .runner_migrated, .env,
# _diag/ all landed in the shared dir and collided across runners).
# 150 MB per extra runner is cheap on lab's storage.

- name: _register | Create install dir for {{ runner_repo }}
  file:
    path: /mnt/services/github_runner/{{ runner_repo }}
    state: directory
    owner: github_runner
    group: github_runner
    mode: "0755"
  become: true
  tags:
    - github_runner

- name: _register | Create workdir for {{ runner_repo }}
  file:
    path: /mnt/scratch/github_runner/workdir-{{ runner_repo }}
    state: directory
    owner: github_runner
    group: github_runner
    mode: "0755"
  become: true
  tags:
    - github_runner

# Install / upgrade actions/runner from the shared tarball cache. The
# version sentinel (.version-<ver>) lives in the per-repo dir so a
# version bump triggers re-extraction for each repo independently.
- name: _register | Check current actions/runner version for {{ runner_repo }}
  stat:
    path: /mnt/services/github_runner/{{ runner_repo }}/.version-{{ github_runner_version }}
  register: github_runner_version_sentinel
  become: true
  tags:
    - github_runner

- name: _register | Extract actions/runner tarball into {{ runner_repo }}
  when: not github_runner_version_sentinel.stat.exists
  unarchive:
    src: /mnt/services/github_runner/.tarballs/actions-runner-{{ github_runner_version }}.tar.gz
    dest: /mnt/services/github_runner/{{ runner_repo }}/
    remote_src: true
    owner: github_runner
    group: github_runner
    # Don't blow away .runner / .credentials / _work; the tarball
    # doesn't include them, but --no-overwrite-dir keeps `tar` from
    # messing with files it never created.
    extra_opts:
      - "--no-overwrite-dir"
  become: true
  register: github_runner_extracted
  tags:
    - github_runner

- name: _register | Mark current actions/runner version for {{ runner_repo }}
  when: not github_runner_version_sentinel.stat.exists
  copy:
    dest: /mnt/services/github_runner/{{ runner_repo }}/.version-{{ github_runner_version }}
    content: "{{ github_runner_version }}\n"
    owner: github_runner
    group: github_runner
    mode: "0644"
  become: true
  tags:
    - github_runner

- name: _register | Check if {{ runner_repo }} is already registered
  stat:
    path: /mnt/services/github_runner/{{ runner_repo }}/.runner
  register: github_runner_registered
  become: true
  tags:
    - github_runner

# Registration token (1h TTL, can't be vaulted). Fetched from the
# controller via `gh api` against the per-repo URL. Skipped under
# qemu_test -- there's no GitHub fixture to register against.
- name: _register | Fetch registration token for {{ runner_repo }}
  when:
    - not qemu_test
    - not github_runner_registered.stat.exists
  command: gh api -X POST /repos/{{ github_runner_owner }}/{{ runner_repo }}/actions/runners/registration-token --jq .token
  register: github_runner_token_result
  delegate_to: localhost
  become: false
  changed_when: false
  check_mode: false
  no_log: true
  tags:
    - github_runner

- name: _register | Register {{ runner_repo }} runner with GitHub
  when:
    - not qemu_test
    - not github_runner_registered.stat.exists
  command: >-
    ./config.sh
    --url https://github.com/{{ github_runner_owner }}/{{ runner_repo }}
    --token {{ github_runner_token_result.stdout }}
    --name {{ inventory_hostname }}
    --labels {{ github_runner_labels }}
    --work /mnt/scratch/github_runner/workdir-{{ runner_repo }}
    --unattended
    --replace
  args:
    chdir: /mnt/services/github_runner/{{ runner_repo }}
    creates: /mnt/services/github_runner/{{ runner_repo }}/.runner
  become: true
  become_user: github_runner
  no_log: true
  tags:
    - github_runner

- name: _register | Install github_runner_{{ runner_repo }} service
  import_role:
    name: systemd_unit
    tasks_from: install
  vars:
    systemd_unit_args:
      src: github_runner.service.j2
      dest: github_runner_{{ runner_repo }}.service
      condition: "{{ not (ansible_check_mode and github_runner_user.changed) }}"
  tags:
    - github_runner

- name: _register | Enable github_runner_{{ runner_repo }} service
  when: not qemu_test
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: github_runner_{{ runner_repo }}
      condition: "{{ not (ansible_check_mode and (github_runner_user.changed or github_runner_extracted.changed)) }}"
      restart: >-
        {{
          lookup('vars',
                 'github_runner_' ~ runner_repo ~ '_service_result',
                 default={'changed': false}).changed
          or github_runner_extracted.changed
        }}
  tags:
    - github_runner
