# Per-instance enable for the templated github_runner@.service. Called
# from main.yml with loop_var: runner_instance (keys: repo, suffix,
# labels).
#
# Instance identity is the literal concatenation
# {{ runner_instance.repo ~ '_' ~ runner_instance.suffix }}. The literal
# stays inlined in task `name:` fields because they render at parse time
# (per feedback_ansible_task_name_parse_time -- name: renders before
# set_fact runs); task BODIES read the same value via the runner_iid
# set_fact below, which is safe because it's re-set at the top of this
# file on every loop iteration (per feedback_set_fact_leaks_across_iterations).
#
# Ephemeral + JIT model: no per-instance state dir, no per-instance
# registration token, no .runner sentinel to wait for. The container's
# entrypoint mints a single-use JIT config on every start using the
# host-level github_runner_pat secret (created in main.yml, shared
# across all instances); the runner registers, runs one job, deregisters,
# exits, and systemd's Restart=always brings up the next container.

# Reset at the top of every iteration so a previous instance's values
# can't bleed into the next via set_fact persistence. runner_name_re
# uses regex_escape so an inventory_hostname containing '.' or '-'
# (today bare 'lab'/'pug'/'bunk', but future-proofed) doesn't silently
# broaden the match.
- name: _register | Set instance facts for {{ runner_instance.repo ~ '_' ~ runner_instance.suffix }}
  set_fact:
    runner_iid: "{{ runner_instance.repo }}_{{ runner_instance.suffix }}"
    runner_name_re: "^{{ (inventory_hostname ~ '_' ~ runner_instance.repo ~ '_' ~ runner_instance.suffix) | regex_escape }}_[a-f0-9]+$"

- name: _register | Create workdir for {{ runner_instance.repo ~ '_' ~ runner_instance.suffix }}
  file:
    path: /mnt/scratch/github_runner/workdir_{{ runner_iid }}
    state: directory
    owner: github_runner
    group: github_runner
    mode: "0755"
  become: true

# Per-instance env file consumed by podman's --env-file in the template.
# Static for the instance's lifetime; changes (relabel, repo rename)
# propagate to the unit's restart via the register below. NOTE: a
# restart in ephemeral mode kills the in-flight job; schedule label
# edits when the instance is idle, or accept the dropped job.
- name: _register | Install env file for {{ runner_instance.repo ~ '_' ~ runner_instance.suffix }}
  template:
    src: github_runner_envfile.j2
    dest: /etc/default/github_runner@{{ runner_iid }}
    owner: root
    group: root
    mode: "0644"
    backup: true
  become: true
  register: runner_envfile

# Enable + start github_runner@<repo>_<suffix>.service in system
# scope (the unit runs as root and demotes to host github_runner
# inside the container via the uidmap override -- see the template's
# [Unit] rationale block). Skipped under qemu_test (no real GitHub-
# backed JIT minting; entrypoint's curl POST would fail and loop on
# the restart-limit). _verify.yml exercises the unit-loads-and-
# secret-resolves contract under qemu_test instead.
- name: _register | Enable github_runner@{{ runner_instance.repo ~ '_' ~ runner_instance.suffix }}
  when: not qemu_test
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: github_runner@{{ runner_iid }}
      condition: "{{ not (ansible_check_mode and github_runner_user.changed) }}"
      # Restart on env-file edits (label or repo URL change), PAT
      # rotation (data sha mismatch surfaces as github_runner_pat_rotated),
      # actions-runner tarball bump (the running container :O-overlays
      # /opt/actions-runner at start so re-extract on its own doesn't
      # propagate to live containers), or template re-render (systemd_unit
      # install records the dest via sanitize-to-underscore ->
      # github_runner@.service becomes github_runner__service_result;
      # install runs once in main.yml so every instance fans out the same
      # .changed signal). The PAT and tarball are both shared host-wide
      # so each rotation/bump bounces every instance to pick up the new
      # value/binary next start. The github_runner_pat_rotated and
      # github_runner_extract facts are set once in main.yml (before this
      # loop), so every iteration here reads the same host-level value --
      # they're host-wide triggers, not per-instance ones.
      restart: >-
        {{ runner_envfile.changed
           or github_runner_pat_rotated | default(false)
           or (github_runner_extract.changed | default(false))
           or (github_runner__service_result.changed | default(false)) }}

# After the unit is running, confirm GitHub agrees the runner is
# registered + online. Catches PAT scope/revocation, repo-deleted,
# or entrypoint failure modes at apply-time rather than at next-CI-
# run-time. The entrypoint appends a random 8-char suffix to
# RUNNER_NAME (runner/entrypoint.sh) so we match by prefix. Retries
# cover the ~5-10s the runner takes to register on first start.
# Skipped under qemu_test (no real GitHub). no_log: true keeps the
# PAT bearer out of task output.
- name: _register | Verify {{ runner_instance.repo ~ '_' ~ runner_instance.suffix }} is registered with GitHub
  when: not qemu_test
  uri:
    url: "https://api.github.com/repos/{{ runner_instance.owner }}/{{ runner_instance.repo }}/actions/runners"
    method: GET
    headers:
      Accept: application/vnd.github+json
      Authorization: "Bearer {{ github_runner_pat }}"
      X-GitHub-Api-Version: "2022-11-28"
    status_code: 200
    return_content: true
  register: _verify_runner_online
  until: >-
    _verify_runner_online.json.runners
    | selectattr('status', 'equalto', 'online')
    | selectattr('name', 'match', runner_name_re)
    | list | length > 0
  retries: 12
  delay: 5
  no_log: true
