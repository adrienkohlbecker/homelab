- name: Set up github_runner system user, group, and config dir
  import_role:
    name: service_user
    tasks_from: user
  vars:
    service_user_args:
      name: github_runner
      home: /mnt/scratch/github_runner
      createhome: true
      # kvm so podman can hand /dev/kvm to ci containers via
      # --device + --group-add 1 (rootless userns doesn't map the host
      # kvm gid through by default; see roles/gitea_runner's git history
      # -- formerly act_runner -- for the full rationale, which is
      # unchanged here).
      extra_groups: [ kvm ]
  tags:
    - github_runner

- name: Create runtime directories
  when: not (ansible_check_mode and github_runner_user.changed)
  file:
    dest: "{{ item }}"
    state: directory
    owner: github_runner
    group: github_runner
    mode: "0755"
  become: true
  loop:
    - /mnt/services/github_runner
    # Shared actions/runner extract target. One copy of bin/ + externals/
    # + run.sh + config.sh + .path, symlinked into each per-repo state
    # dir; see _register.yml.
    - /mnt/services/github_runner/runner
    - /mnt/services/github_runner/.tarballs
    - /mnt/scratch/github_runner/cache
    # Bind-mounted into test cells via container.options for the harness's
    # --workdir-parent. Lives on /mnt/scratch (terabytes) instead of the
    # container's writable overlay so concurrent qcow2 overlays + role
    # checkouts can't ENOSPC the cell. Each cell mounts a unique subdir
    # underneath this so two concurrent cells can't see each other; the
    # tmpfiles.d entry below reaps the per-cell subdirs after they idle.
    - /mnt/scratch/github_runner/scratch
  tags:
    - github_runner

# systemd-tmpfiles --clean runs daily via systemd-tmpfiles-clean.timer
# and applies the rule on each tick. The rule walks the test scratch
# tree, deletes files >1d stale, removes empty old subdirs as a side
# effect -- so a completed or crashed test cell's per-cell tree gets
# fully reaped once its contents are >1d old. The 1d age is comfortably
# beyond the harness's 1500s timeout, so a live cell can't be touched.
- name: Install tmpfiles.d entry for test scratch
  when: not (ansible_check_mode and github_runner_user.changed)
  template:
    src: tmpfiles.conf.j2
    dest: /etc/tmpfiles.d/github_runner.conf
    owner: root
    group: root
    mode: "0644"
    backup: true
    # Catches typos in the rule line; --create exits non-zero on parse
    # failure. --dry-run was added in systemd 250 -- jammy ships 249
    # so we drop the flag there.
    validate: >-
      systemd-tmpfiles
      {{ '--dry-run' if ansible_distribution_release not in ['jammy'] else '' }}
      --create %s
  become: true
  tags:
    - github_runner

# actions/runner bind-mounts /var/run/docker.sock into every job
# container. Without dockerd on lab, this path doesn't exist, so
# `docker create` fails with "permission denied" trying to mkdir it as
# the volume mountpoint under /var/run (root-only writable). Point the
# path at github_runner's rootless podman socket -- the bind-mount
# succeeds, AND workflow steps that try to use docker inside a job
# container reach podman's docker-compat API. /var/run is tmpfs, so
# the L rule in tmpfiles.d/github_runner.conf above re-creates this
# symlink at boot; this task is the immediate-apply equivalent. force:
# true so a stale or differently-targeted prior symlink gets fixed.
- name: Symlink /var/run/docker.sock to github_runner's rootless podman socket
  when: not (ansible_check_mode and github_runner_user.changed)
  file:
    src: /run/user/{{ github_runner_user.uid }}/podman/podman.sock
    dest: /var/run/docker.sock
    state: link
    force: true
    follow: false
  become: true
  tags:
    - github_runner

# Linger so rootless podman has a user systemd manager up at all times:
# crun makes sd-bus calls when creating containers, which fail with
# "Permission denied" without one. `loginctl enable-linger` starts
# user@<uid>.service which provides the dbus + cgroup hierarchy crun
# expects.
- name: Turn on linger
  command: loginctl enable-linger github_runner
  args:
    creates: /var/lib/systemd/linger/github_runner
  become: true
  register: github_runner_linger
  tags:
    - github_runner

# linger triggers user@<uid>.service asynchronously; subsequent rootless
# podman tasks (and the github_runner.service start) need it fully up so
# crun's sd-bus calls succeed. systemd module with state=started blocks
# until active.
- name: Ensure github_runner user systemd manager is running
  when: not (ansible_check_mode and github_runner_user.changed)
  systemd:
    name: user@{{ github_runner_user.uid }}.service
    state: started
  become: true
  tags:
    - github_runner

# Same xino=off override as gitea_runner (formerly act_runner) had; see
# that role's git history for the kernel printk rationale. Scoped to
# github_runner so the rootful overlay's working xino is unaffected.
- name: Create rootless containers config directory
  when: not (ansible_check_mode and github_runner_user.changed)
  file:
    path: /mnt/scratch/github_runner/.config/containers
    state: directory
    owner: github_runner
    group: github_runner
    mode: "0755"
  become: true
  tags:
    - github_runner

- name: Configure rootless overlay storage opts
  when: not (ansible_check_mode and github_runner_user.changed)
  copy:
    dest: /mnt/scratch/github_runner/.config/containers/storage.conf
    # Only the mountopt override (xino=off); see roles/gitea_runner's
    # git history (formerly act_runner) for the printk-suppression
    # rationale. Pinning the driver explicitly via [storage] driver =
    # "overlay" would silence podman's cosmetic "auto-picked a driver"
    # warning, but ALSO triggers a "database graph driver mismatch"
    # error against any podman storage database that was first
    # initialised without a driver setting -- which is what
    # github_runner ends up with on a fresh apply, because the user's
    # first podman invocation (any CI workflow's pull/run of the
    # ci image) happens before this file is written. The
    # warning is harmless; the database mismatch is fatal. Leave it
    # implicit.
    content: |
      [storage.options.overlay]
      mountopt = "nodev,xino=off"
    owner: github_runner
    group: github_runner
    mode: "0644"
  become: true
  tags:
    - github_runner

# Migrate the pre-multi-repo single-instance layout (top-level .runner /
# bin / etc under /mnt/services/github_runner) into the per-repo layout.
# No-op when the layout is already migrated or on a fresh install.
# Runs BEFORE the tarball extract so it can move the legacy bin/ into
# runner/; the extract task's version sentinel then sees runner/ in the
# expected post-migration state.
- import_tasks: _migrate.yml

# Install / upgrade actions/runner from the upstream tarball. The
# version sentinel (runner/.version-<ver>) is what `unarchive` keys off
# via `creates:` -- on a version bump we delete the sentinel via the
# pre-task, the unarchive overwrites everything in runner/, and the
# post-task writes the new sentinel. The tarball is kept under
# .tarballs/ so the apt-style upgrade-then-clean pattern is auditable
# (and a rollback is one `cp` away).
- name: Check current github_runner version
  when: not (ansible_check_mode and github_runner_user.changed)
  stat:
    path: /mnt/services/github_runner/runner/.version-{{ github_runner_version }}
  register: github_runner_version_sentinel
  become: true
  tags:
    - github_runner

- name: Download actions/runner tarball
  when:
    - not (ansible_check_mode and github_runner_user.changed)
    - not github_runner_version_sentinel.stat.exists
  get_url:
    url: "{{ github_runner_release[ansible_architecture].url }}"
    checksum: "sha256:{{ github_runner_release[ansible_architecture].sha256 }}"
    dest: /mnt/services/github_runner/.tarballs/actions-runner-{{ github_runner_version }}.tar.gz
    owner: github_runner
    group: github_runner
    mode: "0644"
  become: true
  register: github_runner_tarball
  tags:
    - github_runner

- name: Extract actions/runner tarball
  when:
    - not (ansible_check_mode and github_runner_user.changed)
    - not github_runner_version_sentinel.stat.exists
  unarchive:
    src: /mnt/services/github_runner/.tarballs/actions-runner-{{ github_runner_version }}.tar.gz
    dest: /mnt/services/github_runner/runner/
    remote_src: true
    owner: github_runner
    group: github_runner
    # Don't blow away symlinks the per-repo state dirs use to reach
    # back into runner/; the tarball doesn't write into those, but
    # --no-overwrite-dir keeps `tar` from messing with files it never
    # created.
    extra_opts:
      - "--no-overwrite-dir"
  become: true
  register: github_runner_extracted
  tags:
    - github_runner

- name: Mark current github_runner version
  when:
    - not (ansible_check_mode and github_runner_user.changed)
    - not github_runner_version_sentinel.stat.exists
  copy:
    dest: /mnt/services/github_runner/runner/.version-{{ github_runner_version }}
    content: "{{ github_runner_version }}\n"
    owner: github_runner
    group: github_runner
    mode: "0644"
  become: true
  tags:
    - github_runner

# Safety-net: move any top-level entries that aren't runner/ + .tarballs/
# + per-repo state dirs into runner/. Catches files the legacy _migrate
# missed (env.sh, run-helper.sh.template, config-helper.sh.template,
# safe_directories, license/notice files) without needing the
# migration to enumerate the full set. Idempotent: on a host whose
# top level is already cleaned up there are no orphans to move.
- name: Consolidate orphaned top-level entries into runner/
  shell: |
    set -euo pipefail
    cd /mnt/services/github_runner
    shopt -s dotglob nullglob
    moved=0
    for entry in *; do
      case "$entry" in
        runner|.tarballs|{{ github_runner_repos | join('|') }}|.runner|.credentials|.credentials_rsaparams|_diag|_work|svc.sh|.version-*)
          continue
          ;;
      esac
      if [ -e "$entry" ] && [ ! -L "$entry" ]; then
        mv -- "$entry" runner/
        moved=$((moved + 1))
      fi
    done
    echo "moved=$moved"
  args:
    executable: /bin/bash
  register: github_runner_consolidate
  changed_when: "'moved=0' not in github_runner_consolidate.stdout"
  become: true
  tags:
    - github_runner

- name: Enable rootless podman socket
  when: not (ansible_check_mode and (github_runner_user.changed or github_runner_linger.changed))
  systemd:
    name: podman.socket
    enabled: true
    scope: user
  become: true
  become_user: github_runner
  tags:
    - github_runner

- name: Start rootless podman socket
  when: not (ansible_check_mode and (github_runner_user.changed or github_runner_linger.changed))
  systemd:
    name: podman.socket
    state: started
    scope: user
  become: true
  become_user: github_runner
  tags:
    - github_runner

- name: Install podman prune timer for github_runner
  import_role:
    name: podman
    tasks_from: prune
  vars:
    podman_prune_args:
      user: github_runner
      condition: "{{ not (ansible_check_mode and github_runner_user.changed) }}"
  tags:
    - github_runner

# Per-repo registration + systemd unit install. include_tasks (not
# include_role + loop) so vars: re-evaluate per iteration -- see
# memory feedback_include_role_loop_vars for the trap. loop_var: the
# repo name; _register.yml references it as {{ runner_repo }}.
- name: Register and enable per-repo github_runner instances
  include_tasks: _register.yml
  loop: "{{ github_runner_repos }}"
  loop_control:
    loop_var: runner_repo
  tags:
    - github_runner
