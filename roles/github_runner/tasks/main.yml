# Per-host instance list validation. repo + suffix flow into systemd
# unit names + the per-instance dir under /opt/actions-runner/. A typo
# like "../wat" would write files outside the intended location; an
# empty labels string would render the runner unreachable to every
# workflow's runs-on filter. Catching at apply-time is louder than
# debugging an absent runner at job-dispatch time.
- name: Assert github_runner_instances entries are well-formed
  assert:
    that:
      - "'repo' in item and item.repo is match('^[A-Za-z0-9_-]+$')"
      - "'suffix' in item and item.suffix is match('^[A-Za-z0-9_-]+$')"
      - "'owner' in item and item.owner is match('^[A-Za-z0-9_-]+$')"
      - "'labels' in item and item.labels | length > 0"
    fail_msg: >-
      github_runner_instances entry {{ item }} is malformed. Each entry
      needs repo + suffix + owner matching [A-Za-z0-9_-]+ and a non-empty
      labels string.
  loop: "{{ github_runner_instances }}"
  loop_control:
    label: "{{ item.repo | default('?') }}_{{ item.suffix | default('?') }}"
  tags:
    - github_runner

- name: Assert (repo, suffix) pairs are unique across github_runner_instances
  assert:
    that:
      - >-
        (github_runner_instances | map(attribute='repo')
         | zip(github_runner_instances | map(attribute='suffix'))
         | list | unique | length) == (github_runner_instances | length)
    fail_msg: >-
      github_runner_instances contains a duplicate (repo, suffix) pair.
      Each instance maps to a unique systemd unit, per-instance dir,
      and runner name; collisions silently race. Entries:
      {{ github_runner_instances }}
  tags:
    - github_runner

# Operator-managed long-lived PAT. Used only at apply time by
# _register.yml to mint a one-time registration token via
# `POST /repos/<o>/<r>/actions/runners/registration-token`, which
# config.sh then consumes to register the runner. Long-lived
# .credentials get written to /opt/actions-runner/<inst>/ and serve
# every subsequent run.sh launch -- the PAT itself never crosses
# apply-time. Fine-grained PAT with `Administration: Read and write`
# on each target repo (Metadata: Read auto-selected). Mint once via
# GitHub UI, vault into host_vars/<host>.yml as `github_runner_pat:
# !vault | ...`. Fail loud on missing/empty so the operator sees the
# actionable cause instead of a 401 buried in `_register.yml`'s
# config.sh stderr.
- name: Assert github_runner_pat is vaulted in host_vars
  when: github_runner_instances | length > 0
  assert:
    that:
      - github_runner_pat is defined
      - github_runner_pat | length > 0
    fail_msg: >-
      github_runner_pat is unset for {{ inventory_hostname }}. Mint a
      fine-grained GitHub PAT (Administration: Read and write on
      every repo listed under github_runner_instances), then vault
      it into host_vars/{{ inventory_hostname }}.yml.
  tags:
    - github_runner

# python3-tomli for the storage.conf TOML validate below (stdlib
# tomllib only landed in 3.11; jammy ships 3.10). apt-idempotent on
# hosts that already have it from another role.
- name: Install host dependencies for github_runner
  apt:
    pkg:
      - python3-tomli
    install_recommends: false
    cache_valid_time: 3600
  become: true
  tags:
    - github_runner

# kvm in extra_groups so workflow-spawned `container:` blocks that
# claim /dev/kvm via `--device /dev/kvm --group-add 1` (the literal
# 1 is the container-side gid mapped from host kvm via subgid
# passthrough -- see CLAUDE.md "Why the literal `1`") can actually
# read the device. The runner process itself doesn't need /dev/kvm,
# only the qemu-spawning sibling containers do.
- name: Set up github_runner system user, group, and config dir
  import_role:
    name: service_user
    tasks_from: user
  vars:
    service_user_args:
      name: github_runner
      home: /mnt/scratch/github_runner
      createhome: true
      # No persistent state under /mnt/services -- the runner's data
      # (per-instance dirs at /opt/actions-runner/<inst>/, workdirs at
      # /mnt/scratch/github_runner/workdir_<inst>/) lives elsewhere by
      # design. Suppress the helper's default config-dir creation.
      config_dir: false
      home_mode: "0755"
      extra_groups: [ kvm ]
  tags:
    - github_runner

# NVMe-backed dataset for CI test workdirs (qcow2 overlays + ansible
# state). Overlays are the write-hot path during converge -- putting
# them on rpool (NVMe) instead of dozer/scratch (SATA SSD) cuts I/O
# latency for the 6 concurrent VMs. recordsize=64K matches qcow2's
# default cluster size so each cluster write maps 1:1 to a ZFS record.
- name: Create NVMe-backed CI scratch dataset
  import_role:
    name: zfs
    tasks_from: dataset
  vars:
    zfs_dataset_args:
      dataset: rpool/ci_scratch
      mountpoint: /mnt/ci_scratch
      owner: github_runner
      group: github_runner
      extra_properties:
        'autobackup:bak': 'false'
        'com.sun:auto-snapshot': 'false'
        recordsize: 65536
        sync: disabled
        redundant_metadata: most
        logbias: throughput
        atime: 'off'
        setuid: 'off'
        devices: 'off'
  tags:
    - github_runner

# Canonical actions/runner install on the host. Per-instance dirs at
# /opt/actions-runner/<inst>/ are hard-link mirrors (cp -al, see
# _register.yml) -- inode sharing keeps the 500MB tree at 1x across N
# instances. Owned by github_runner so the runner process (and the
# config.sh invocation in _register.yml) can read everything.
- name: Create /opt/actions-runner
  when: not (ansible_check_mode and github_runner_user.changed)
  file:
    path: /opt/actions-runner
    state: directory
    owner: github_runner
    group: github_runner
    mode: "0755"
  become: true
  tags:
    - github_runner

# checksum: in get_url drives re-download on version bump (sha mismatch
# with existing tarball forces fetch); also surfaces tampering since
# the URL is plain https.
- name: Download actions-runner tarball
  when: not (ansible_check_mode and github_runner_user.changed)
  get_url:
    url: "{{ github_runner_archive[ansible_architecture].url }}"
    dest: /opt/actions-runner/.runner.tar.gz
    checksum: "sha256:{{ github_runner_archive[ansible_architecture].sha256 }}"
    owner: github_runner
    group: github_runner
    mode: "0644"
  become: true
  register: github_runner_tarball
  tags:
    - github_runner

# Re-extracting on top of an existing install overwrites binaries in
# place (the tarball flattens into the dest dir with no top-level
# subdir). Per-instance hard links to the OLD inodes still point at the
# OLD binaries until _register.yml's refresh task fires; the same
# github_runner_extract.changed fact drives that refresh.
- name: Extract actions-runner tarball
  when:
    - not (ansible_check_mode and github_runner_user.changed)
    - github_runner_tarball.changed
  unarchive:
    src: /opt/actions-runner/.runner.tar.gz
    dest: /opt/actions-runner
    remote_src: true
    owner: github_runner
    group: github_runner
  become: true
  register: github_runner_extract
  tags:
    - github_runner

# tmpfiles.d entry: reaps idle test-cell scratch dirs (1d), workflow
# _temp (7d), _actions cache (30d). Also carries the L rule that points
# /var/run/docker.sock at github_runner's rootless podman socket --
# load-bearing for workflow `container:` blocks where actions/runner
# asks the host podman to bind /var/run/docker.sock into sibling job
# containers (statfs on the host side needs the path to resolve).
- name: Install tmpfiles.d entry
  when: not (ansible_check_mode and github_runner_user.changed)
  template:
    src: github_runner.tmpfiles.conf.j2
    dest: /etc/tmpfiles.d/github_runner.conf
    owner: root
    group: root
    mode: "0644"
    backup: true
    # --dry-run (validate without the --create side effect) landed in systemd
    # 256, so only resolute (26.04, systemd 259) has it -- jammy (249) and noble
    # (255) both lack it and error on the flag. Gate on major >= 26, not the
    # codename; noble falls back to plain --create like jammy.
    validate: >-
      systemd-tmpfiles
      {{ '--dry-run' if ansible_distribution_major_version | int >= 26 else '' }}
      --create %s
  become: true
  tags:
    - github_runner

# Immediate-apply companion to the L rule above. tmpfiles-setup.service
# only re-applies at boot, so a freshly-applied role without this task
# wouldn't materialise the symlink until the next reboot.
- name: Symlink /var/run/docker.sock to github_runner's rootless podman socket
  when: not (ansible_check_mode and github_runner_user.changed)
  file:
    src: /run/user/{{ github_runner_user.uid }}/podman/podman.sock
    dest: /var/run/docker.sock
    state: link
    force: true
    follow: false
  become: true
  tags:
    - github_runner

# Linger so rootless podman has a user systemd manager up at all times:
# crun makes sd-bus calls when creating containers, which fail with
# "Permission denied" without one. The helper enables linger and waits
# for user@<uid>.service (which provides the dbus + cgroup hierarchy
# crun expects) so subsequent rootless podman tasks find a live bus.
- name: Turn on linger
  import_role:
    name: linger
    tasks_from: linger
  vars:
    linger_args:
      name: github_runner
      uid: "{{ github_runner_user.uid }}"
  tags:
    - github_runner

# storage.conf for github_runner's rootless podman, which serves the
# DooD socket workflow `container:` blocks use. The four knobs are all
# load-bearing for the rootless + uidmapped sibling-container model on
# jammy's podman 3.4 / crun 0.17 -- see comments below for each.
- name: Create rootless containers config directory
  when: not (ansible_check_mode and github_runner_user.changed)
  file:
    path: /mnt/scratch/github_runner/.config/containers
    state: directory
    owner: github_runner
    group: github_runner
    mode: "0755"
  become: true
  tags:
    - github_runner

# * rootless_storage_path -- restate the system-config value because
#   podman 4.9 treats this user file as a full REPLACEMENT, not a
#   merge. Without it the xino=off addition silently strips the
#   system-set rootless_storage_path and graphroot falls back to
#   XDG_DATA_HOME on ZFS, where native kernel overlay produces ESTALE
#   during dpkg unpacks.
#
# * driver = "overlay" -- silences the cosmetic "auto-picked a driver"
#   warning AND fixes a load-bearing diagnostic regression where the
#   warning re-emits during storage's ID-mapped-copy step and hijacks
#   the error chain. On a new host this initialises cleanly; on an
#   existing host whose DB was first populated with the driver
#   implicit, podman trips a "database graph driver mismatch" -- fix
#   is `podman system reset --force` then re-apply with the pin.
#
# * mountopt = "nodev,xino=off" -- silence the kernel's "overlayfs:
#   fs ... does not support file handles, falling back to xino=off"
#   printk that fires ~160x/day during rootless CI churn. The fallback
#   is unavoidable rootless; pre-declaring xino=off skips the probe.
#
# * ignore_chown_errors = "true" -- needed for uidmapped sibling
#   containers' ID-mapped layer copy. This podman lacks kernel
#   idmapped-overlay support (needs 5.19+; jammy is 5.15) and falls
#   back to a chown'd physical copy. Files with file capabilities
#   can't have their security.capability xattr restored in the
#   rootless namespace; without this knob the copy aborts EPERM.
- name: Configure rootless overlay storage opts
  when: not (ansible_check_mode and github_runner_user.changed)
  copy:
    dest: /mnt/scratch/github_runner/.config/containers/storage.conf
    content: |
      [storage]
      driver = "overlay"
      rootless_storage_path = "/var/lib/containers/rootless/$USER"
      [storage.options.overlay]
      mountopt = "nodev,xino=off"
      ignore_chown_errors = "true"
    owner: github_runner
    group: github_runner
    mode: "0644"
    backup: true
    # podman silently falls back to defaults on parse failure; validate
    # catches typos. tomli over stdlib's tomllib because jammy ships
    # Python 3.10.
    validate: python3 -c 'import tomli, sys; tomli.load(open(sys.argv[1], "rb"))' %s
  become: true
  tags:
    - github_runner

- name: Enable rootless podman socket
  when: not (ansible_check_mode and (github_runner_user.changed or github_runner_lingered))
  systemd:
    name: podman.socket
    enabled: true
    scope: user
  become: true
  become_user: github_runner
  tags:
    - github_runner

- name: Start rootless podman socket
  when: not (ansible_check_mode and (github_runner_user.changed or github_runner_lingered))
  systemd:
    name: podman.socket
    state: started
    scope: user
  become: true
  become_user: github_runner
  tags:
    - github_runner

- name: Install podman prune timer for github_runner
  import_role:
    name: podman
    tasks_from: prune
  vars:
    podman_prune_args:
      user: github_runner
      condition: "{{ not (ansible_check_mode and github_runner_user.changed) }}"
  tags:
    - github_runner

# Launcher script the templated unit's ExecStart points at. The unit
# could in principle inline `cd /opt/actions-runner/%i && exec ./run.sh`,
# but a stable /usr/local/bin path is what makes systemd-analyze verify
# pass (it substitutes "i" as the placeholder during template
# verification; a per-instance ExecStart path would fail because
# /opt/actions-runner/i/run.sh doesn't exist).
- name: Install github_runner_run launcher script
  copy:
    src: github_runner_run.sh
    dest: /usr/local/bin/github_runner_run
    owner: root
    group: root
    mode: "0755"
    backup: true
    validate: sh -n %s
  become: true
  tags:
    - github_runner

# Install the templated unit into system scope. Per-instance enable
# happens in _register.yml against the instantiated name.
- name: Install github_runner@.service template
  import_role:
    name: systemd_unit
    tasks_from: install
  vars:
    systemd_unit_args:
      src: github_runner.service.j2
      dest: github_runner@.service
      condition: "{{ not (ansible_check_mode and github_runner_user.changed) }}"
  tags:
    - github_runner

# Per-instance configure + enable. include_tasks (not include_role +
# loop) so vars: re-evaluate per iteration -- see memory
# feedback_include_role_loop_vars for the trap.
- name: Register and enable github_runner instances
  include_tasks:
    file: _register.yml
    apply:
      tags:
        - github_runner
  loop: "{{ github_runner_instances }}"
  loop_control:
    loop_var: github_runner_instance
    label: "{{ github_runner_instance.repo }}_{{ github_runner_instance.suffix }}"
  tags:
    - github_runner

# Reconcile orphan instances. An operator removing an entry from
# github_runner_instances expects the role to stop+disable the
# corresponding unit and remove the per-instance dir.
#
# Dangling GitHub-side registrations remain as offline on the
# repository's runner list (config.sh remove would need a removal
# token; not bothering -- they age out, and `gh api -X DELETE` cleans
# manually if they get noisy). Workdirs under /mnt/scratch stay so a
# repurposed (repo, suffix) pair benefits from the cached _work /
# _actions; manual rm if disk pressure matters.
- name: Compute desired github_runner instance ids
  set_fact:
    github_runner_desired_iids: >-
      {{ github_runner_instances | map(attribute='repo')
         | zip(github_runner_instances | map(attribute='suffix'))
         | map('join', '_') | list }}
  tags:
    - github_runner

- name: Find installed github_runner per-instance dirs
  find:
    paths: /opt/actions-runner
    patterns: '*_*'
    file_type: directory
    recurse: false
  register: github_runner_dirs_installed
  become: true
  tags:
    - github_runner

- name: Compute orphan github_runner instance ids
  set_fact:
    github_runner_orphan_iids: >-
      {{ github_runner_dirs_installed.files
         | map(attribute='path') | map('basename')
         | reject('in', github_runner_desired_iids)
         | list }}
  tags:
    - github_runner

- name: Stop and disable orphan github_runner@<id>.service units
  when: not qemu_test
  systemd:
    name: "github_runner@{{ item }}.service"
    state: stopped
    enabled: false
  loop: "{{ github_runner_orphan_iids }}"
  become: true
  tags:
    - github_runner

- name: Remove orphan github_runner per-instance dirs
  file:
    path: "/opt/actions-runner/{{ item }}"
    state: absent
  loop: "{{ github_runner_orphan_iids }}"
  become: true
  tags:
    - github_runner

# Clears the github_runner_image_rotate timer + its netdata
# systemd_timers metadata. The host-native runner install pulls no
# images, so there's nothing to rotate; a leftover
# /etc/netdata/charts.d/systemd_timers.d/github_runner_image_rotate.conf
# would otherwise make netdata's systemd_timers collector fire
# systemd_timer_overdue CRITICAL forever against a timer that doesn't
# exist. remove is idempotent (no-op once the units + metadata are
# gone), so this stays as a tombstone rather than a one-shot cleanup.
- name: Remove the retired github_runner_image_rotate timer
  import_role:
    name: systemd_timer
    tasks_from: remove
  vars:
    systemd_timer_args:
      name: github_runner_image_rotate
  tags:
    - github_runner
