- name: Set up github_runner system user, group, and config dir
  import_role:
    name: service_user
    tasks_from: user
  vars:
    service_user_args:
      name: github_runner
      home: /mnt/scratch/github_runner
      createhome: true
      # kvm so podman can hand /dev/kvm to lab-runtime containers via
      # --device + --group-add 1 (rootless userns doesn't map the host
      # kvm gid through by default; see roles/gitea_runner's git history
      # -- formerly act_runner -- for the full rationale, which is
      # unchanged here).
      extra_groups: [ kvm ]
  tags:
    - github_runner

- name: Create runtime directories
  when: not (ansible_check_mode and github_runner_user.changed)
  file:
    dest: "{{ item }}"
    state: directory
    owner: github_runner
    group: github_runner
    mode: "0755"
  become: true
  loop:
    - /mnt/services/github_runner
    - /mnt/services/github_runner/.tarballs
    - /mnt/scratch/github_runner/cache
    - /mnt/scratch/github_runner/workdir
    # Bind-mounted into test cells via container.options for the harness's
    # --workdir-parent. Lives on /mnt/scratch (terabytes) instead of the
    # container's writable overlay so concurrent qcow2 overlays + role
    # checkouts can't ENOSPC the cell. Each cell mounts a unique subdir
    # underneath this so two concurrent cells can't see each other; the
    # tmpfiles.d entry below reaps the per-cell subdirs after they idle.
    - /mnt/scratch/github_runner/lab-runtime-workdir
  tags:
    - github_runner

# systemd-tmpfiles --clean runs daily via systemd-tmpfiles-clean.timer
# and applies the rule on each tick. The rule walks lab-runtime-workdir's
# tree, deletes files >1d stale, removes empty old subdirs as a side
# effect -- so a completed or crashed test cell's per-cell tree gets
# fully reaped once its contents are >1d old. The 1d age is comfortably
# beyond the harness's 1500s timeout, so a live cell can't be touched.
- name: Install tmpfiles.d entry for lab-runtime-workdir
  when: not (ansible_check_mode and github_runner_user.changed)
  template:
    src: tmpfiles.conf.j2
    dest: /etc/tmpfiles.d/github_runner.conf
    owner: root
    group: root
    mode: "0644"
    backup: true
    # Catches typos in the rule line; --create exits non-zero on parse
    # failure. --dry-run was added in systemd 250 -- jammy ships 249
    # so we drop the flag there.
    validate: >-
      systemd-tmpfiles
      {{ '--dry-run' if ansible_distribution_release not in ['jammy'] else '' }}
      --create %s
  become: true
  tags:
    - github_runner

# actions/runner bind-mounts /var/run/docker.sock into every job
# container. Without dockerd on lab, this path doesn't exist, so
# `docker create` fails with "permission denied" trying to mkdir it as
# the volume mountpoint under /var/run (root-only writable). Point the
# path at github_runner's rootless podman socket -- the bind-mount
# succeeds, AND workflow steps that try to use docker inside a job
# container reach podman's docker-compat API. /var/run is tmpfs, so
# the L rule in tmpfiles.d/github_runner.conf above re-creates this
# symlink at boot; this task is the immediate-apply equivalent. force:
# true so a stale or differently-targeted prior symlink gets fixed.
- name: Symlink /var/run/docker.sock to github_runner's rootless podman socket
  when: not (ansible_check_mode and github_runner_user.changed)
  file:
    src: /run/user/{{ github_runner_user.uid }}/podman/podman.sock
    dest: /var/run/docker.sock
    state: link
    force: true
    follow: false
  become: true
  tags:
    - github_runner

# Linger has to be on BEFORE the lab-runtime build runs: rootless
# podman's runtime (crun) makes sd-bus calls when creating the build's
# intermediate containers, which fail with "Permission denied" if the
# user has no systemd manager. `loginctl enable-linger` starts
# user@<uid>.service which provides the dbus + cgroup hierarchy crun
# expects.
- name: Turn on linger
  command: loginctl enable-linger github_runner
  args:
    creates: /var/lib/systemd/linger/github_runner
  become: true
  register: github_runner_linger
  tags:
    - github_runner

# linger triggers user@<uid>.service asynchronously; the build task
# immediately following needs it fully up so crun's sd-bus calls
# succeed. systemd module with state=started blocks until active.
- name: Ensure github_runner user systemd manager is running
  when: not (ansible_check_mode and github_runner_user.changed)
  systemd:
    name: user@{{ github_runner_user.uid }}.service
    state: started
  become: true
  tags:
    - github_runner

# Same xino=off override as gitea_runner (formerly act_runner) had; see
# that role's git history for the kernel printk rationale. Scoped to
# github_runner so the rootful overlay's working xino is unaffected.
- name: Create rootless containers config directory
  when: not (ansible_check_mode and github_runner_user.changed)
  file:
    path: /mnt/scratch/github_runner/.config/containers
    state: directory
    owner: github_runner
    group: github_runner
    mode: "0755"
  become: true
  tags:
    - github_runner

# actions/runner shells out to `docker pull <image>` unconditionally
# before creating a job container, and the docker-compat socket path
# in podman always tries the registry -- our locally-built lab-runtime
# image lives at localhost/lab-runtime:latest in podman storage but
# "localhost" gets parsed as a registry host and connects to lab's
# nginx instead. Install a /usr/local/bin/docker wrapper that
# intercepts pull -> podman pull --policy=missing (CLI path, honours
# local storage); everything else passes through to /usr/bin/docker.
# The github_runner systemd unit inherits PATH=/usr/local/bin:/usr/bin
# so the wrapper wins.
- name: Install docker-pull wrapper for actions/runner
  copy:
    src: docker_pull_wrapper.sh
    dest: /usr/local/bin/docker
    owner: root
    group: root
    mode: "0755"
    backup: true
  become: true
  tags:
    - github_runner

- name: Configure rootless overlay storage opts
  when: not (ansible_check_mode and github_runner_user.changed)
  copy:
    dest: /mnt/scratch/github_runner/.config/containers/storage.conf
    # Only the mountopt override (xino=off); see roles/gitea_runner's
    # git history (formerly act_runner) for the printk-suppression
    # rationale. Pinning the driver
    # explicitly via [storage] driver = "overlay" would silence podman's
    # cosmetic "auto-picked a driver" warning, but ALSO triggers a
    # "database graph driver mismatch" error against any podman storage
    # database that was first initialised without a driver setting --
    # which is what github_runner ends up with on a fresh apply, because
    # the user's first podman invocation (the lab-runtime build) happens
    # before this file is written. The warning is harmless; the database
    # mismatch is fatal. Leave it implicit.
    content: |
      [storage.options.overlay]
      mountopt = "nodev,xino=off"
    owner: github_runner
    group: github_runner
    mode: "0644"
  become: true
  tags:
    - github_runner

# Build the lab-runtime container image used by every CI workflow. The
# image lives only in the github_runner user's local podman image store --
# no registry, no push.
#
# Idempotence: hash the five build inputs (Dockerfile + mise.toml +
# pyproject.toml + uv.lock + packer/qemu.pkr.hcl), stamp the digest on
# the image as the `homelab.input_hash` label, and skip the block when
# the existing image's label matches. Same shape as the podman_secret
# helper (sha256 stored as a label on the resource itself). podman's
# layer cache would already make a forced rebuild fast (~200ms when
# inputs are unchanged), but the label gate is what keeps ansible
# honest about reporting changed -- without it, force: true reports
# changed=true on every apply and the harness's idempotence check
# fails.
#
# Build inputs are staged into a per-apply temp dir on the remote via
# `rsync --relative` so the repo's relative paths survive into the
# build context (Dockerfile's `COPY packer/qemu.pkr.hcl ...` depends
# on that). The temp dir, plus the GitHub token tmpfile used for
# `podman build --secret`, are both torn down in `always:` so a build
# crash doesn't leak state.
- name: Compute lab-runtime build inputs hash
  set_fact:
    github_runner_lab_runtime_input_hash: >-
      {{ [(lookup('file', playbook_dir + '/roles/github_runner/files/Dockerfile.lab-runtime') | hash('sha256')),
      (lookup('file', playbook_dir + '/mise.toml') | hash('sha256')),
      (lookup('file', playbook_dir + '/pyproject.toml') | hash('sha256')),
      (lookup('file', playbook_dir + '/uv.lock') | hash('sha256')),
      (lookup('file', playbook_dir + '/packer/qemu.pkr.hcl') | hash('sha256'))] | join('') | hash('sha256') }}
  tags:
    - github_runner

# Reads the label off the existing image, if any. Returns rc!=0 with
# empty stdout when the image doesn't exist yet (first apply) -- which
# compares unequal to the freshly-computed hash and triggers a build,
# so failed_when: false is the right shape here. When the image exists
# but predates this label (upgraded from an earlier version of the
# role), the Go-template `index` on a missing key prints empty/<no
# value>, which likewise won't match and triggers a re-stamping build.
#
# Gated on the check-mode pattern: in check mode the github_runner
# user was only *reported* as created by service_user, so a become_user
# to it would error with "unknown user". When skipped the register has
# no .stdout; the build block's `default('')` handles that, and the
# block's `not ansible_check_mode` predicate keeps the build out of
# check mode regardless.
- name: Read existing lab-runtime image input hash
  when: not (ansible_check_mode and github_runner_user.changed)
  ansible.builtin.command:
    argv:
      - podman
      - image
      - inspect
      - lab-runtime:latest
      - --format
      - '{% raw %}{{ index .Config.Labels "homelab.input_hash" }}{% endraw %}'
  register: github_runner_lab_runtime_existing_hash
  changed_when: false
  failed_when: false
  become: true
  become_user: github_runner
  environment:
    XDG_RUNTIME_DIR: /run/user/{{ github_runner_user.uid | default('0') }}
    DBUS_SESSION_BUS_ADDRESS: unix:path=/run/user/{{ github_runner_user.uid | default('0') }}/bus
  tags:
    - github_runner

- name: Build lab-runtime image
  when:
    - not ansible_check_mode
    - (github_runner_lab_runtime_existing_hash.stdout | default('') | trim) != github_runner_lab_runtime_input_hash
  tags:
    - github_runner
  become: true
  become_user: github_runner
  block:
    - name: Create temp build context for lab-runtime image
      ansible.builtin.tempfile:
        state: directory
        prefix: lab-runtime-build-
      register: github_runner_lab_runtime_buildctx

    # Re-create the input paths inside the tempdir so the Dockerfile's
    # `COPY packer/qemu.pkr.hcl ...` and the role-relative Dockerfile
    # path land at the layout the build expects. copy doesn't mkdir
    # intermediate dirs on its own.
    - name: Create build context subdirs
      ansible.builtin.file:
        path: "{{ github_runner_lab_runtime_buildctx.path }}/{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - roles/github_runner/files
        - packer

    # Stages each file individually via ansible's standard connection.
    # synchronize would be terser (one rsync invocation, --relative
    # preserves paths) but its action plugin uses inventory_hostname
    # for the rsync destination -- which doesn't translate to the
    # harness's 127.0.0.1:<forwarded-port> SSH setup, so test runs
    # blow up on "ssh: connect to host box: ...". copy goes through
    # the same connection plugin as everything else and Just Works.
    - name: Stage build inputs into temp build context
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/{{ item }}"
        dest: "{{ github_runner_lab_runtime_buildctx.path }}/{{ item }}"
        mode: "0644"
      loop:
        - roles/github_runner/files/Dockerfile.lab-runtime
        - mise.toml
        - pyproject.toml
        - uv.lock
        - packer/qemu.pkr.hcl

    - name: Stage GitHub token tmpfile for the lab-runtime build
      when: not ansible_check_mode
      copy:
        dest: /run/user/{{ github_runner_user.uid | default('0') }}/lab-runtime-build-token
        content: "{{ mise_github_token }}"
        mode: "0400"
      no_log: true

    - name: Build lab-runtime image
      when: not ansible_check_mode
      environment:
        XDG_RUNTIME_DIR: /run/user/{{ github_runner_user.uid | default('0') }}
        DBUS_SESSION_BUS_ADDRESS: unix:path=/run/user/{{ github_runner_user.uid | default('0') }}/bus
      containers.podman.podman_image:
        name: lab-runtime
        tag: latest
        state: build
        path: "{{ github_runner_lab_runtime_buildctx.path }}"
        force: true
        build:
          file: "{{ github_runner_lab_runtime_buildctx.path }}/roles/github_runner/files/Dockerfile.lab-runtime"
          extra_args: >-
            --cgroup-manager=cgroupfs
            --secret id=mise_github_token,src=/run/user/{{ github_runner_user.uid | default('0') }}/lab-runtime-build-token
            --label homelab.input_hash={{ github_runner_lab_runtime_input_hash }}
      register: github_runner_lab_runtime_build

  always:
    - name: Remove temp build context
      when: github_runner_lab_runtime_buildctx.path is defined
      file:
        path: "{{ github_runner_lab_runtime_buildctx.path }}"
        state: absent

    - name: Remove staged GitHub token tmpfile
      when: not ansible_check_mode
      file:
        path: /run/user/{{ github_runner_user.uid | default('0') }}/lab-runtime-build-token
        state: absent

# Install / upgrade actions/runner from the upstream tarball. The
# version sentinel (.version-<ver>) is what `unarchive` keys off via
# `creates:` -- on a version bump we delete the sentinel via the
# pre-task, the unarchive overwrites everything in /mnt/services/
# github_runner/, and the post-task writes the new sentinel. The
# tarball is kept under .tarballs/ so the apt-style upgrade-then-clean
# pattern is auditable (and a rollback is one `cp` away).
- name: Check current github_runner version
  when: not (ansible_check_mode and github_runner_user.changed)
  stat:
    path: /mnt/services/github_runner/.version-{{ github_runner_version }}
  register: github_runner_version_sentinel
  become: true
  tags:
    - github_runner

- name: Download actions/runner tarball
  when:
    - not (ansible_check_mode and github_runner_user.changed)
    - not github_runner_version_sentinel.stat.exists
  get_url:
    url: "{{ github_runner_release[ansible_architecture].url }}"
    checksum: "sha256:{{ github_runner_release[ansible_architecture].sha256 }}"
    dest: /mnt/services/github_runner/.tarballs/actions-runner-{{ github_runner_version }}.tar.gz
    owner: github_runner
    group: github_runner
    mode: "0644"
  become: true
  register: github_runner_tarball
  tags:
    - github_runner

- name: Extract actions/runner tarball
  when:
    - not (ansible_check_mode and github_runner_user.changed)
    - not github_runner_version_sentinel.stat.exists
  unarchive:
    src: /mnt/services/github_runner/.tarballs/actions-runner-{{ github_runner_version }}.tar.gz
    dest: /mnt/services/github_runner/
    remote_src: true
    owner: github_runner
    group: github_runner
    # Don't blow away .runner / .credentials / _work; the tarball
    # doesn't include them but `extra_opts` keeps `tar` from messing
    # with files it never created.
    extra_opts:
      - "--no-overwrite-dir"
  become: true
  register: github_runner_extracted
  tags:
    - github_runner

- name: Mark current github_runner version
  when:
    - not (ansible_check_mode and github_runner_user.changed)
    - not github_runner_version_sentinel.stat.exists
  copy:
    dest: /mnt/services/github_runner/.version-{{ github_runner_version }}
    content: "{{ github_runner_version }}\n"
    owner: github_runner
    group: github_runner
    mode: "0644"
  become: true
  tags:
    - github_runner

- name: Check if github_runner is already registered
  stat:
    path: /mnt/services/github_runner/.runner
  register: github_runner_registered
  become: true
  tags:
    - github_runner

# Registration token (1h TTL, can't be vaulted). Fetched from the
# controller via `gh api`, which authenticates through the operator's
# existing gh login (keyring) or a $GITHUB_TOKEN env var (resolved by
# mise's [env] from op://). Skipped under qemu_test -- there's no
# GitHub fixture to register against; tests verify the static layout
# only.
- name: Fetch GitHub runner registration token
  when:
    - not qemu_test
    - not github_runner_registered.stat.exists
  command: gh api -X POST /repos/{{ github_runner_owner }}/{{ github_runner_repo }}/actions/runners/registration-token --jq .token
  register: github_runner_token_result
  delegate_to: localhost
  become: false
  changed_when: false
  check_mode: false
  no_log: true
  tags:
    - github_runner

- name: Register runner with GitHub
  when:
    - not qemu_test
    - not github_runner_registered.stat.exists
  command: >-
    ./config.sh
    --url https://github.com/{{ github_runner_owner }}/{{ github_runner_repo }}
    --token {{ github_runner_token_result.stdout }}
    --name {{ inventory_hostname }}
    --labels {{ github_runner_labels }}
    --unattended
    --replace
  args:
    chdir: /mnt/services/github_runner
    creates: /mnt/services/github_runner/.runner
  become: true
  become_user: github_runner
  no_log: true
  tags:
    - github_runner

- name: Enable rootless podman socket
  when: not (ansible_check_mode and (github_runner_user.changed or github_runner_linger.changed))
  systemd:
    name: podman.socket
    enabled: true
    scope: user
  become: true
  become_user: github_runner
  tags:
    - github_runner

- name: Start rootless podman socket
  when: not (ansible_check_mode and (github_runner_user.changed or github_runner_linger.changed))
  systemd:
    name: podman.socket
    state: started
    scope: user
  become: true
  become_user: github_runner
  tags:
    - github_runner

- name: Install podman prune timer for github_runner
  import_role:
    name: podman
    tasks_from: prune
  vars:
    podman_prune_args:
      user: github_runner
      condition: "{{ not (ansible_check_mode and github_runner_user.changed) }}"
  tags:
    - github_runner

# System-scope unit (User=github_runner in the unit file lets the system
# manager run the process as that user without making the unit user-scope).
# The default user inside systemd_unit is 'root', so no override needed.
- name: Install github_runner service
  import_role:
    name: systemd_unit
    tasks_from: install
  vars:
    systemd_unit_args:
      src: github_runner.service.j2
      condition: "{{ not (ansible_check_mode and github_runner_user.changed) }}"
  tags:
    - github_runner

# Under qemu_test the runner isn't registered, so run.sh would loop on
# "configure first" -- skip the service-start step. The unit file itself
# is still installed above so syntax / dependency errors surface in
# check-mode and integration tests.
- name: Enable github_runner service
  when: not qemu_test
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: github_runner
      condition: "{{ not (ansible_check_mode and (systemd_unit.changed or github_runner_user.changed)) }}"
      restart: "{{ systemd_unit.changed or github_runner_extracted.changed }}"
  tags:
    - github_runner
