# Validate the per-host instance list before touching anything. repo and
# suffix flow into systemd unit names, envfile paths, and the workdir
# tree -- a typo like "../wat" would write files outside the intended
# location, and duplicate (repo, suffix) pairs would silently race the
# same files. An empty labels string would render RUNNER_LABELS= and
# trip the entrypoint's required-env check at container-start time;
# catching it at apply-time is louder.
- name: Assert github_runner_instances entries are well-formed
  assert:
    that:
      - "'repo' in item and item.repo is match('^[A-Za-z0-9_-]+$')"
      - "'suffix' in item and item.suffix is match('^[A-Za-z0-9_-]+$')"
      - "'owner' in item and item.owner is match('^[A-Za-z0-9_-]+$')"
      - "'labels' in item and item.labels | length > 0"
      - "'runner_group_id' not in item or (item.runner_group_id is integer and item.runner_group_id >= 1)"
    fail_msg: >-
      github_runner_instances entry {{ item }} is malformed. Each entry
      needs repo + suffix + owner matching [A-Za-z0-9_-]+ and a non-empty
      labels string. runner_group_id is optional and defaults to 1 in the
      envfile (the only group on personal-account repos and the org's
      reserved "Default" group on org repos); when present it must be an
      integer >= 1. Set explicitly for a custom org runner group.
  loop: "{{ github_runner_instances }}"
  loop_control:
    label: "{{ item.repo | default('?') }}_{{ item.suffix | default('?') }}"
  tags:
    - github_runner

- name: Assert (repo, suffix) pairs are unique across github_runner_instances
  assert:
    that:
      - >-
        (github_runner_instances | map(attribute='repo')
         | zip(github_runner_instances | map(attribute='suffix'))
         | list | unique | length) == (github_runner_instances | length)
    fail_msg: >-
      github_runner_instances contains a duplicate (repo, suffix) pair.
      Each instance maps to a unique systemd unit, envfile, and workdir;
      collisions silently race the same files. Entries: {{ github_runner_instances }}
  tags:
    - github_runner

# Operator-managed long-lived PAT. Required for the ephemeral + JIT
# model -- every container start mints a single-use JIT config via
# `gh api /repos/.../actions/runners/generate-jitconfig`, which needs
# a fine-grained PAT with `Administration: Read and write` on each
# target repo (Metadata: Read is auto-selected). Actions: Read/write
# is NOT needed for generate-jitconfig and shouldn't be granted --
# this PAT is single-purpose. Mint once via GitHub UI (Settings →
# Developer settings → Fine-grained tokens), select every repo listed
# in any host's github_runner_instances, then vault into
# host_vars/<host>.yml as `github_runner_pat: !vault | ...`. Fail
# loud on missing or empty so the operator sees the actionable cause
# instead of a confusing downstream "secret data is required" or
# jinja "undefined" error. Skipped on hosts with no instances (the
# role is a no-op there).
- name: Assert github_runner_pat is vaulted in host_vars
  when: github_runner_instances | length > 0
  assert:
    that:
      - github_runner_pat is defined
      - github_runner_pat | length > 0
    fail_msg: >-
      github_runner_pat is unset for {{ inventory_hostname }}. Mint a
      fine-grained GitHub PAT (Administration: Read and write on
      every repo listed under github_runner_instances), then vault
      it into host_vars/{{ inventory_hostname }}.yml.
  tags:
    - github_runner

# jq + curl are consumed by github_runner_jit_mint (the ExecStartPre
# helper that mints a single-use JIT registration on the host so the
# PAT never enters the runner container). python3-tomli supplies the
# `tomli` module used by the storage.conf validate below (stdlib's
# tomllib only landed in Python 3.11; jammy ships 3.10). apt-idempotent
# on hosts that already have any of these via other roles.
- name: Install host dependencies for JIT mint and config validation
  apt:
    pkg:
      - curl
      - jq
      - python3-tomli
    install_recommends: false
    cache_valid_time: 3600
  become: true
  tags:
    - github_runner

- name: Set up github_runner system user, group, and config dir
  import_role:
    name: service_user
    tasks_from: user
  vars:
    service_user_args:
      name: github_runner
      home: /mnt/scratch/github_runner
      createhome: true
      # Ephemeral runners hold no persistent state under /mnt/services;
      # see the "Create top-level scratch directory" task comment below.
      # Suppress the helper's default config-dir creation so an empty
      # /mnt/services/github_runner doesn't get stamped + zfs-replicated.
      config_dir: false
      # 0755 (vs Ubuntu's HOME_MODE=0750 default): the runner container
      # bind-mounts /mnt/scratch/github_runner/workdir_<inst>/ from
      # under $HOME, and crun stats the bind-mount source from a
      # transient pre-uidmap userns state where the process is
      # "nobody" -- a 0750 home dir blocks traversal at that moment
      # and the container fails with EACCES on stat. 0755 keeps the
      # path traversable; per-file modes inside still gate actual
      # read access.
      home_mode: "0755"
      # kvm so sibling workflow containers (spawned by the in-container
      # runner via the bind-mounted rootless podman socket) can claim
      # /dev/kvm via --device + --group-add 1. The runner container
      # itself doesn't need /dev/kvm -- it just orchestrates -- but the
      # qemu-running siblings do. See CLAUDE.md "The runner uses
      # --device /dev/kvm --group-add 1" for the userns wiring.
      extra_groups: [ kvm ]
  tags:
    - github_runner

# Top-level scratch dir shared by all instances. Per-instance workdirs
# are created inside _register.yml. No /mnt/services/github_runner
# anymore -- ephemeral runners hold no persistent state on disk; the
# runner binaries live in the image at /actions-runner.
- name: Create top-level scratch directory
  when: not (ansible_check_mode and github_runner_user.changed)
  file:
    # Bind-mounted into sibling workflow containers via the workflow's
    # container.options for the harness's --workdir-parent. Lives on
    # /mnt/scratch (terabytes) instead of the container's writable
    # overlay so concurrent qcow2 overlays + role checkouts can't
    # ENOSPC the cell. Each cell mounts a unique subdir underneath so
    # two concurrent cells can't see each other; the tmpfiles.d entry
    # below reaps the per-cell subdirs after they idle.
    dest: /mnt/scratch/github_runner/scratch
    state: directory
    owner: github_runner
    group: github_runner
    mode: "0755"
  become: true
  tags:
    - github_runner

# actions/runner install on the host (not baked into the runner image).
# This is the path-mirror anchor that makes `container:` workflows
# work over DooD: actions/runner spawns docker create with -v
# /opt/actions-runner/externals:/__e:ro for the workflow container,
# and docker (running on the host via the bind-mounted socket) needs
# that path to resolve on the host's filesystem -- not just inside
# the runner container. So we install on the host AND bind-mount the
# same path into the runner container; both views see identical files.
#
# Owned by github_runner so the runner can read everything via the
# +0 uidmap override (in-container uid 0 → host github_runner) when
# the unit's overlay-mount presents the dir read-side. The bind-mount
# in the unit uses :O (overlay), so any in-container writes (.runner,
# .credentials, _diag/, etc.) land in a transient upper layer and
# don't propagate to this host-side dir -- the host copy stays
# whatever the extract/chown task left here.
- name: Create /opt/actions-runner
  when: not (ansible_check_mode and github_runner_user.changed)
  file:
    path: /opt/actions-runner
    state: directory
    owner: github_runner
    group: github_runner
    mode: "0755"
  become: true
  tags:
    - github_runner

# checksum: in get_url drives re-download on version bump (sha
# mismatch with existing tarball forces fetch); also surfaces
# tampering since the URL is plain https.
- name: Download actions-runner tarball
  when: not (ansible_check_mode and github_runner_user.changed)
  get_url:
    url: "{{ github_runner_archive[ansible_architecture].url }}"
    dest: /opt/actions-runner/.runner.tar.gz
    checksum: "sha256:{{ github_runner_archive[ansible_architecture].sha256 }}"
    owner: github_runner
    group: github_runner
    mode: "0644"
  become: true
  register: github_runner_tarball
  tags:
    - github_runner

# Extract is gated solely on tarball-just-downloaded. A prior
# interrupted apply (crash between get_url and unarchive) self-heals
# on the next apply: get_url's `checksum:` re-fires on a sha mismatch,
# so a partial download is detected and re-fetched, and the extract
# then fires unconditionally on tarball.changed. Re-extracting on
# top of an existing install overwrites the binaries in place
# (actions/runner's tarball flattens into the dest dir with no
# top-level subdir), so it's safe to re-run.
- name: Extract actions-runner tarball
  when:
    - not (ansible_check_mode and github_runner_user.changed)
    - github_runner_tarball.changed
  unarchive:
    src: /opt/actions-runner/.runner.tar.gz
    dest: /opt/actions-runner
    remote_src: true
    owner: github_runner
    group: github_runner
  become: true
  # Each running container :O-overlays /opt/actions-runner at start, so
  # it holds open-fd snapshots of the OLD tree; the new binaries don't
  # propagate until the container restarts. _register.yml's restart
  # trigger consumes this fact to bounce every instance on a version bump.
  register: github_runner_extract
  tags:
    - github_runner

# systemd-tmpfiles --clean runs daily via systemd-tmpfiles-clean.timer
# and applies the rule on each tick. The rule walks the test scratch
# tree, deletes files >1d stale, removes empty old subdirs as a side
# effect -- so a completed or crashed test cell's per-cell tree gets
# fully reaped once its contents are >1d old. The 1d age is comfortably
# beyond the harness's 1500s timeout, so a live cell can't be touched.
# Also carries the L rule that points /var/run/docker.sock at
# github_runner's rootless podman socket -- see the template's rationale
# block for why that's load-bearing for `container:` workflows.
- name: Install tmpfiles.d entry for test scratch
  when: not (ansible_check_mode and github_runner_user.changed)
  template:
    src: github_runner.tmpfiles.conf.j2
    dest: /etc/tmpfiles.d/github_runner.conf
    owner: root
    group: root
    mode: "0644"
    backup: true
    # Catches typos in the rule line; --create exits non-zero on parse
    # failure. --dry-run was added in systemd 250 -- jammy ships 249
    # so we drop the flag there.
    validate: >-
      systemd-tmpfiles
      {{ '--dry-run' if ansible_distribution_release not in ['jammy'] else '' }}
      --create %s
  become: true
  tags:
    - github_runner

# Immediate-apply companion to the L rule above. tmpfiles-setup.service
# only re-runs the rule at boot (and the rule itself is a no-op for an
# already-correct symlink under --create semantics), so a freshly-
# applied role without this task wouldn't materialise the symlink until
# the next reboot. force: true so a stale or differently-targeted prior
# symlink gets fixed in place.
- name: Symlink /var/run/docker.sock to github_runner's rootless podman socket
  when: not (ansible_check_mode and github_runner_user.changed)
  file:
    src: /run/user/{{ github_runner_user.uid }}/podman/podman.sock
    dest: /var/run/docker.sock
    state: link
    force: true
    follow: false
  become: true
  tags:
    - github_runner

# Linger so rootless podman has a user systemd manager up at all times:
# crun makes sd-bus calls when creating containers, which fail with
# "Permission denied" without one. The helper enables linger and waits
# for user@<uid>.service (which provides the dbus + cgroup hierarchy
# crun expects) so subsequent rootless podman tasks find a live bus.
- name: Turn on linger
  import_role:
    name: linger
    tasks_from: linger
  vars:
    linger_args:
      name: github_runner
      uid: "{{ github_runner_user.uid }}"
  tags:
    - github_runner

# storage.conf for github_runner's rootless podman, which serves the
# DooD socket the runner container bind-mounts. Sibling workflow
# containers (spawned by `container:` blocks via that socket) run
# under this storage tree, NOT the runner container itself -- the
# runner runs under root/system podman per the unit template's
# rationale block. So these knobs only matter for sibling containers
# now; the runner image is pulled and stored under /var/lib/
# containers/storage by root podman, untouched by this file.
- name: Create rootless containers config directory
  when: not (ansible_check_mode and github_runner_user.changed)
  file:
    path: /mnt/scratch/github_runner/.config/containers
    state: directory
    owner: github_runner
    group: github_runner
    mode: "0755"
  become: true
  tags:
    - github_runner

# Four overlay-storage knobs, all load-bearing for the rootless +
# uidmapped sibling-container model on this jammy podman (3.4 /
# crun 0.17):
#
# * rootless_storage_path -- restate the system-config value because
#   podman 4.9 treats this user file as a full REPLACEMENT, not a
#   merge. Without it the user file's xino=off addition silently
#   strips the system-set rootless_storage_path and graphroot falls
#   back to XDG_DATA_HOME on ZFS -- where native kernel overlay
#   produces ESTALE during dpkg unpacks (the linux-libc-dev
#   netfilter-headers case is the canonical victim).
#
# * driver = "overlay" -- silences the cosmetic "auto-picked a
#   driver" warning, AND fixes a load-bearing diagnostic regression
#   in this podman version: the same warning re-emits during
#   storage's ID-mapped-copy step, hijacks the error chain, and the
#   real cause of any copy failure ends up replaced with the warning
#   text. With the driver pinned, the warning never fires and the
#   actual error surfaces. On a brand-new host this initialises
#   cleanly. On an existing host whose DB was first populated with
#   the driver implicit, podman trips a "database graph driver \"\"
#   does not match \"overlay\"" mismatch -- the one-time fix is to
#   sudo -u github_runner podman system reset --force (drop the pin
#   first if reset can't read the DB), then re-apply with the pin.
#
# * mountopt = "nodev,xino=off" -- silence the kernel's "overlayfs:
#   fs ... does not support file handles, falling back to xino=off"
#   printk that fires ~160x/day during rootless CI churn. The
#   fallback is unavoidable rootless (CAP_DAC_READ_SEARCH isn't
#   held in init userns, so the kernel disables file-handle support
#   regardless of fs); pre-declaring xino=off makes it skip the
#   probe -- same end state, no printk. nodev preserves the
#   upstream default; userxattr is force-added by podman internally
#   for rootless, so we don't restate it.
#
# * ignore_chown_errors = "true" -- needed for uidmapped sibling
#   containers' ID-mapped layer copy. This podman lacks kernel
#   idmapped-overlay support (needs 5.19+; jammy is 5.15) and falls
#   back to a physical chown'd copy of each layer. Files in any
#   sibling image with file capabilities can't have their
#   security.capability xattr restored in the rootless namespace,
#   and without this knob the copy aborts with EPERM. With it, the
#   offending files keep their image-side ownership (harmless at
#   runtime; the sibling container's in-namespace root owns
#   everything via its own +0 uidmap override).
- name: Configure rootless overlay storage opts
  when: not (ansible_check_mode and github_runner_user.changed)
  copy:
    dest: /mnt/scratch/github_runner/.config/containers/storage.conf
    content: |
      [storage]
      driver = "overlay"
      rootless_storage_path = "/var/lib/containers/rootless/$USER"
      [storage.options.overlay]
      mountopt = "nodev,xino=off"
      ignore_chown_errors = "true"
    owner: github_runner
    group: github_runner
    mode: "0644"
    backup: true
    # podman silently falls back to defaults on parse failure -- exactly
    # the failure mode CLAUDE.md's "validate: parses the rendered file"
    # policy is designed to catch, and these four overlay knobs are all
    # load-bearing. tomli over the stdlib's tomllib because jammy is on
    # Python 3.10.
    validate: python3 -c 'import tomli, sys; tomli.load(open(sys.argv[1], "rb"))' %s
  become: true
  tags:
    - github_runner

- name: Enable rootless podman socket
  when: not (ansible_check_mode and (github_runner_user.changed or github_runner_linger.changed))
  systemd:
    name: podman.socket
    enabled: true
    scope: user
  become: true
  become_user: github_runner
  tags:
    - github_runner

- name: Start rootless podman socket
  when: not (ansible_check_mode and (github_runner_user.changed or github_runner_linger.changed))
  systemd:
    name: podman.socket
    state: started
    scope: user
  become: true
  become_user: github_runner
  tags:
    - github_runner

- name: Install podman prune timer for github_runner
  import_role:
    name: podman
    tasks_from: prune
  vars:
    podman_prune_args:
      user: github_runner
      condition: "{{ not (ansible_check_mode and github_runner_user.changed) }}"
  tags:
    - github_runner

# Host-level PAT secret consumed by every runner container's entrypoint
# to mint per-start JIT configs. One secret, shared by all instances --
# the generate-jitconfig API call is scoped per-repo, so the same PAT
# works for every (repo, suffix) instance on the host. Operator mints
# the PAT manually (GitHub → Settings → Developer settings → fine-
# grained tokens; scope = repo + actions:write on the target repos)
# and vaults the value into host_vars/<host>.yml as github_runner_pat.
# podman_secret rotates when the data sha changes; the helper exposes
# github_runner_pat_rotated so _register.yml can restart instances to
# pick up the new value.
- name: Create host-level github_runner PAT podman secret
  when: not (ansible_check_mode and github_runner_user.changed)
  import_role:
    name: podman_secret
    tasks_from: secret
  vars:
    podman_secret_args:
      name: github_runner_pat
      data: "{{ github_runner_pat }}"
  tags:
    - github_runner

# Install the templated unit into system scope (/etc/systemd/system/),
# running as root and demoting to github_runner inside the container
# via the --uidmap=+0:<uid>:1 override. Standard CLAUDE.md pattern,
# same shape as every other system-scope podman role on this host.
# Per-instance enablement happens in _register.yml via systemctl on
# the instantiated name (github_runner@<repo>_<suffix>.service).
- name: Install github_runner@.service template
  import_role:
    name: systemd_unit
    tasks_from: install
  vars:
    systemd_unit_args:
      src: github_runner.service.j2
      dest: github_runner@.service
      condition: "{{ not (ansible_check_mode and github_runner_user.changed) }}"
  tags:
    - github_runner

# ExecStartPre helper that mints the JIT registration outside the
# container so the long-lived PAT never crosses the container boundary.
# The runner unit invokes /usr/local/bin/github_runner_jit_mint %i
# before podman run; the script reads the PAT podman secret (root-only
# accessible), POSTs to GitHub's generate-jitconfig, and writes the
# resulting blob to /run/<unit>/jit, which the container bind-mounts
# at /run/jit:ro.
- name: Install github_runner_jit_mint script
  copy:
    src: github_runner_jit_mint.sh
    dest: /usr/local/bin/github_runner_jit_mint
    owner: root
    group: root
    mode: "0755"
    backup: true
    validate: bash -n %s
  become: true
  tags:
    - github_runner

# Idle-runner image rotation. --pull on the unit (default 'missing')
# handles bootstrap on first start, but an ephemeral runner only
# restarts after running a job -- a runner that registered hours ago
# and has been listening for jobs ever since stays on the stale image
# until either a job lands on it or this timer rotates it. The script
# refreshes the local store via `podman pull` and restarts only idle
# stale instances (Runner.Worker absence in the container process tree
# is the busy/idle signal); mid-job instances pick up the new image
# naturally on their next respawn.
- name: Install github_runner_image_rotate script
  copy:
    src: github_runner_image_rotate.sh
    dest: /usr/local/bin/github_runner_image_rotate
    owner: root
    group: root
    mode: "0755"
    backup: true
    validate: bash -n %s
  become: true
  tags:
    - github_runner

# 5-minute cadence so a fresh runner-image.yml build propagates to
# idle runners within a few minutes -- short enough that an operator
# rebuilding the image and then dispatching another workflow usually
# lands on the new image. monitor: true with frequency: hourly: a
# missed tick is cheap (rotation just lags by 5 more minutes), but a
# chronic failure mode (nexus auth drift, podman API change) is
# invisible without netdata's systemd_timers collector; the overdue
# threshold (2 * 3600s = 2h) is loose enough that occasional misses
# don't page, tight enough that a wedged script alerts before the
# next ansible apply would.
- name: Schedule github_runner_image_rotate timer
  import_role:
    name: systemd_timer
    tasks_from: install
  vars:
    systemd_timer_args:
      name: github_runner_image_rotate
      description: Rotate idle github_runner instances onto the latest runner image
      on_calendar: "*:0/5:00"
      exec_start: /usr/local/bin/github_runner_image_rotate
      monitor: true
      frequency: hourly
  tags:
    - github_runner

# Per-instance envfile + container deploy.
# include_tasks (not include_role + loop) so vars: re-evaluate per
# iteration -- see memory feedback_include_role_loop_vars for the trap.
- name: Register and enable github_runner instances
  include_tasks:
    file: _register.yml
    apply:
      tags:
        - github_runner
  loop: "{{ github_runner_instances }}"
  loop_control:
    loop_var: runner_instance
    label: "{{ runner_instance.repo }}_{{ runner_instance.suffix }}"
  tags:
    - github_runner

# Reconcile orphan instances: an operator who removes an entry from
# github_runner_instances expects the role to stop+disable the
# corresponding unit and remove its envfile -- otherwise the orphan
# runner keeps polling GitHub on a now-unintended label until manual
# intervention, and `journalctl -u github_runner@<orphan>.service`
# accumulates noise. Workdirs are intentionally left in place so a
# repurposed (repo, suffix) pair benefits from the cached
# _work/_actions; remove manually if disk pressure matters.
#
# Dangling registrations remain on GitHub's runner list as offline
# after we SIGKILL a mid-job runner (the ephemeral self-deregister
# only fires on clean exit). They harmlessly age out; periodic
# `gh api -X DELETE` cleanup if they get noisy.
- name: Compute desired github_runner instance ids
  set_fact:
    github_runner_desired_iids: >-
      {{ github_runner_instances | map(attribute='repo')
         | zip(github_runner_instances | map(attribute='suffix'))
         | map('join', '_') | list }}
  tags:
    - github_runner

- name: Find installed github_runner envfiles
  find:
    paths: /etc/default
    patterns: 'github_runner@*'
    file_type: file
  register: github_runner_envfiles_installed
  become: true
  tags:
    - github_runner

- name: Compute orphan github_runner instance ids
  set_fact:
    github_runner_orphan_iids: >-
      {{ github_runner_envfiles_installed.files
         | map(attribute='path') | map('basename')
         | map('regex_replace', '^github_runner@', '')
         | reject('in', github_runner_desired_iids)
         | list }}
  tags:
    - github_runner

- name: Stop and disable orphan github_runner@<id>.service units
  when: not qemu_test
  systemd:
    name: "github_runner@{{ item }}.service"
    state: stopped
    enabled: false
  loop: "{{ github_runner_orphan_iids }}"
  become: true
  tags:
    - github_runner

- name: Remove orphan github_runner envfiles
  file:
    path: "/etc/default/github_runner@{{ item }}"
    state: absent
  loop: "{{ github_runner_orphan_iids }}"
  become: true
  tags:
    - github_runner
