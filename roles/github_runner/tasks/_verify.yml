- name: _verify | github_runner user exists; populate getent_passwd for uid lookups
  getent:
    database: passwd
    key: github_runner
  become: true

# CLAUDE.md "Why the literal `1`" -- rootless podman builds the
# container gidmap from /etc/subgid shortest-range-first, so the
# unit's --device /dev/kvm --group-add 1 expects the kvm-gid range
# to land at container gid 1. Today _setup.yml synthesizes a kvm
# group, asks subid for the passthrough, and the resulting
# /etc/subgid should carry both ranges for github_runner: one
# count-65536 + one count-1 (the kvm gid). Slurp the file and
# assert both shapes so a regression in subid's template or the
# ordering invariant fails loud.
- name: _verify | resolve kvm gid for the subid range check
  getent:
    database: group
    key: kvm
  become: true

- name: _verify | slurp /etc/subgid
  slurp:
    src: /etc/subgid
  register: _verify_subgid
  become: true

- name: _verify | github_runner has the 65536 base range + kvm single-gid range
  vars:
    _subgid_lines: "{{ (_verify_subgid.content | b64decode).splitlines() }}"
    _kvm_gid: "{{ ansible_facts.getent_group.kvm[1] }}"
  assert:
    that:
      - _subgid_lines | select('match', '^github_runner:[0-9]+:65536$') | list | length == 1
      - _subgid_lines | select('match', '^github_runner:' ~ _kvm_gid ~ ':1$') | list | length == 1
    fail_msg: >-
      /etc/subgid is missing the expected github_runner ranges. Got:
      {{ _subgid_lines | select('match', '^github_runner:') | list }}.
      Expected a 65536-count base range and a 1-count range mapping
      the host kvm gid {{ _kvm_gid }}.

- name: _verify | rootless podman.socket is active under github_runner
  systemd:
    name: podman.socket
    scope: user
  register: _verify_podman_sock
  failed_when: _verify_podman_sock.status.ActiveState != "active"
  become: true
  become_user: github_runner

# Host-level PAT secret. Created in main.yml from the vaulted
# github_runner_pat var via podman_secret with the default user=root,
# so it lives in root's podman -- inspect there, not in github_runner's
# rootless podman (which only owns the DooD socket). Under qemu_test
# the value is a stub; under prod it's the real PAT.
- name: _verify | github_runner_pat podman secret exists
  command: podman secret inspect github_runner_pat
  changed_when: false
  become: true

- name: _verify | github_runner_image_rotate.timer is active
  systemd:
    name: github_runner_image_rotate.timer
  register: _verify_rotate_timer
  failed_when: >-
    _verify_rotate_timer.status.LoadState != "loaded"
    or _verify_rotate_timer.status.ActiveState != "active"
  become: true

# Per-instance unit-load check. The container itself isn't running --
# the stub PAT would 401 against GitHub's generate-jitconfig and the
# unit would loop on the restart-limit. System-scope: the unit lives
# under /etc/systemd/system/.
- name: _verify | github_runner@<instance>.service loads
  systemd:
    name: github_runner@{{ item.repo }}_{{ item.suffix }}.service
  register: _verify_unit
  failed_when: _verify_unit.status.LoadState != "loaded"
  loop: "{{ github_runner_instances }}"
  loop_control:
    label: "{{ item.repo }}_{{ item.suffix }}"
  become: true

# Functional: exercise both branches of the rotate script's decision
# logic -- the cache-fallback "fresh, skip" path AND the "stale, restart"
# path -- without depending on nexus reachability or a real systemd
# instance start succeeding.
#
# /etc/hosts pin nexus.lab.fahm.fr -> 127.0.0.1 so `podman pull` of
# the runner image deterministically fails (TCP RST on 127.0.0.1:443),
# triggering the script's cache-fallback branch. The test infra at
# roles/_test/tasks/mirrors.yml writes `10.123.0.2 nexus.lab.fahm.fr`
# already, so this lineinfile uses regexp= to REPLACE that entry --
# otherwise getaddrinfo returns both addresses and the first (working)
# one wins. Without this the test is environment-sensitive: a box VM
# with nexus reachable pulls the real runner image, latest != alpine,
# "rotating" fires, systemctl tries to restart the real unit,
# ExecStartPre (jit_mint with stub PAT) 401s, the unit fails, the
# test fails.
- name: _verify | Pin nexus.lab.fahm.fr to 127.0.0.1 so rotate's pull deterministically fails
  lineinfile:
    path: /etc/hosts
    regexp: '\bnexus\.lab\.fahm\.fr\b'
    line: "127.0.0.1 nexus.lab.fahm.fr"
    state: present
  become: true

# Two cacheable images so we can synthesize divergent digests. alpine
# is the "running" container's image; busybox is what we'll point
# `nexus.lab.fahm.fr/homelab/runner:latest` at later to force the
# stale branch. Both come from docker.io (still reachable -- /etc/hosts
# only pinned the nexus name).
- name: _verify | Pull alpine for the fixture container
  command: podman pull docker.io/library/alpine:latest
  changed_when: false
  become: true

- name: _verify | Pull busybox so the stale branch has a digest to swap to
  command: podman pull docker.io/library/busybox:latest
  changed_when: false
  become: true

- name: _verify | Tag alpine as nexus.lab.fahm.fr/homelab/runner:latest (the fresh-skip fixture)
  command: podman tag docker.io/library/alpine:latest nexus.lab.fahm.fr/homelab/runner:latest
  changed_when: false
  become: true

- name: _verify | Start the rotate fixture container (--replace to dodge a stale prior run)
  command: >-
    podman run -d --replace --name github_runner_homelab_test1
    nexus.lab.fahm.fr/homelab/runner:latest sleep 60
  changed_when: false
  become: true

# Phase A: live container's image digest == latest tag's digest
# (both alpine). The rotate script's pull fails (nexus pinned to
# 127.0.0.1), the cache-fallback fires, the digest comparison finds
# fresh, the loop exits 0 with no "rotating" line.
- name: _verify | rotate Phase A -- run script against the fresh fixture
  command: /usr/local/bin/github_runner_image_rotate
  changed_when: false
  become: true
  register: _verify_rotate_fresh
  failed_when: false

- name: _verify | rotate Phase A -- cache-fallback fires, no rotation triggered
  assert:
    that:
      - _verify_rotate_fresh.rc == 0
      - "'proceeding with cached' in _verify_rotate_fresh.stderr"
      - "'rotating' not in _verify_rotate_fresh.stdout"
    fail_msg: >-
      Phase A expected the rotate script to exit 0 with the cache-fallback
      stderr line and no "rotating" decision. Got rc={{ _verify_rotate_fresh.rc }},
      stdout={{ _verify_rotate_fresh.stdout | default('') | trim }},
      stderr={{ _verify_rotate_fresh.stderr | default('') | trim }}.

# Phase B: retag the runner:latest reference to busybox (different
# digest from the running container's alpine). The rotate script's
# pull still fails (nexus pinned), cache-fallback uses the now-busybox
# tag, digest comparison finds stale, the script calls
# `systemctl restart github_runner@homelab_test1.service`. A stub
# systemctl ahead of /usr/bin in PATH records the call and exits 0
# so the rotate script exits cleanly even though no real systemd
# unit could start under qemu_test (the stub PAT would 401 jit_mint).
- name: _verify | Stub-systemctl scratch dir
  file:
    path: /tmp/github_runner_stub
    state: directory
    mode: "0755"
  become: true

- name: _verify | Install stub systemctl that logs invocations and exits 0
  copy:
    dest: /tmp/github_runner_stub/systemctl
    content: |
      #!/bin/bash
      printf '%s\n' "$*" >> /tmp/github_runner_stub/calls.log
      exit 0
    mode: "0755"
  become: true

- name: _verify | Clear the stub call log before Phase B
  copy:
    dest: /tmp/github_runner_stub/calls.log
    content: ""
    mode: "0644"
  become: true

- name: _verify | Retag busybox as nexus.lab.fahm.fr/homelab/runner:latest to diverge digests
  command: podman tag docker.io/library/busybox:latest nexus.lab.fahm.fr/homelab/runner:latest
  changed_when: false
  become: true

- name: _verify | rotate Phase B -- run script against the stale fixture
  command: /usr/local/bin/github_runner_image_rotate
  changed_when: false
  become: true
  environment:
    PATH: "/tmp/github_runner_stub:/usr/sbin:/usr/bin:/sbin:/bin"
  register: _verify_rotate_stale
  failed_when: false

- name: _verify | rotate Phase B -- stale decision fires and script exits cleanly
  assert:
    that:
      - _verify_rotate_stale.rc == 0
      - "'proceeding with cached' in _verify_rotate_stale.stderr"
      - "'rotating' in _verify_rotate_stale.stdout"
    fail_msg: >-
      Phase B expected the rotate script to exit 0 with the cache-fallback
      stderr line and "rotating" in stdout. Got rc={{ _verify_rotate_stale.rc }},
      stdout={{ _verify_rotate_stale.stdout | default('') | trim }},
      stderr={{ _verify_rotate_stale.stderr | default('') | trim }}.

- name: _verify | Read stub systemctl call log
  slurp:
    src: /tmp/github_runner_stub/calls.log
  register: _verify_stub_log
  become: true

- name: _verify | rotate Phase B -- stub recorded the expected restart call
  assert:
    that:
      - "'restart github_runner@homelab_test1.service' in (_verify_stub_log.content | b64decode)"
    fail_msg: >-
      Phase B should have invoked `systemctl restart
      github_runner@homelab_test1.service` via the stub. Stub log:
      {{ _verify_stub_log.content | b64decode | trim }}

# Run the JIT mint script and assert it failed AT the curl step (not
# earlier). The stub PAT ("changeme" in group_vars/test.yml) can't
# authenticate, so curl --fail-with-body returns non-zero with "curl:"
# on stderr. Catches regressions in envfile sourcing, secret inspect,
# jq pipeline, etc. -- those fail with different markers (no "curl:"
# in stderr).
- name: _verify | github_runner_jit_mint -- run the full script path
  command: /usr/local/bin/github_runner_jit_mint {{ github_runner_instances[0].repo }}_{{ github_runner_instances[0].suffix }}
  changed_when: false
  become: true
  register: _verify_jit_mint
  failed_when: false

- name: _verify | github_runner_jit_mint failed at the curl step (stub PAT 401s)
  assert:
    that:
      - _verify_jit_mint.rc != 0
      - "'curl' in _verify_jit_mint.stderr"
    fail_msg: >-
      jit_mint should have failed at the curl step with a 401 from
      GitHub (stub PAT in test vault). A different failure marker
      points at an earlier regression (envfile sourcing, secret
      inspect, jq pipeline, etc.). Got rc={{ _verify_jit_mint.rc }},
      stderr={{ _verify_jit_mint.stderr | default('') | trim }}.
