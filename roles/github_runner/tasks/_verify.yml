- name: _verify | github_runner user exists; populate getent_passwd for uid lookups
  getent:
    database: passwd
    key: github_runner
  become: true

# CLAUDE.md "Why the literal `1`" -- rootless podman builds the
# container gidmap from /etc/subgid shortest-range-first, so workflow
# `container:` blocks claiming `--device /dev/kvm --group-add 1` expect
# the kvm-gid range to land at container gid 1. _setup.yml synthesizes
# a kvm group and asks subid for the passthrough; slurp /etc/subgid
# and assert both ranges so a regression in subid's template (or in
# the ordering invariant) fails loud.
- name: _verify | resolve kvm gid for the subid range check
  getent:
    database: group
    key: kvm
  become: true

- name: _verify | slurp /etc/subgid
  slurp:
    src: /etc/subgid
  register: _verify_subgid
  become: true

- name: _verify | github_runner has the 65536 base range + kvm single-gid range
  vars:
    _subgid_lines: "{{ (_verify_subgid.content | b64decode).splitlines() }}"
    _kvm_gid: "{{ ansible_facts.getent_group.kvm[1] }}"
  assert:
    that:
      - _subgid_lines | select('match', '^github_runner:[0-9]+:65536$') | list | length == 1
      - _subgid_lines | select('match', '^github_runner:' ~ _kvm_gid ~ ':1$') | list | length == 1
    fail_msg: >-
      /etc/subgid is missing the expected github_runner ranges. Got:
      {{ _subgid_lines | select('match', '^github_runner:') | list }}.
      Expected a 65536-count base range and a 1-count range mapping
      the host kvm gid {{ _kvm_gid }}.

- name: _verify | rootless podman.socket is active under github_runner
  systemd:
    name: podman.socket
    scope: user
  register: _verify_podman_sock
  failed_when: _verify_podman_sock.status.ActiveState != "active"
  become: true
  become_user: github_runner

# Canonical actions/runner install: tarball extracted with run.sh +
# bin/Runner.Listener present. Hard-link mirror in per-instance dirs
# checked below.
- name: _verify | Canonical /opt/actions-runner/run.sh is executable
  stat:
    path: /opt/actions-runner/run.sh
  register: _verify_canonical_runsh
  failed_when: not _verify_canonical_runsh.stat.exists or not _verify_canonical_runsh.stat.executable
  become: true

- name: _verify | Canonical bin/Runner.Listener is present
  stat:
    path: /opt/actions-runner/bin/Runner.Listener
  register: _verify_canonical_listener
  failed_when: not _verify_canonical_listener.stat.exists
  become: true

# Per-instance binary hard links: stat both the canonical and per-
# instance run.sh and compare inode numbers. Same inode means cp -al
# succeeded; different inodes mean the refresh task drifted or
# _register.yml's populate didn't fire. This is the load-bearing
# isolation check -- without per-instance binary trees, multiple
# instances would race the same .runner / .credentials at config.sh
# time and at startup.
- name: _verify | Per-instance run.sh is a hard link to canonical
  vars:
    _instance: "{{ github_runner_instances[0].repo }}_{{ github_runner_instances[0].suffix }}"
  block:
    - stat:
        path: /opt/actions-runner/run.sh
      register: _verify_can_inode
      become: true
    - stat:
        path: /opt/actions-runner/{{ _instance }}/run.sh
      register: _verify_inst_inode
      become: true
    - assert:
        that:
          - _verify_inst_inode.stat.exists
          - _verify_inst_inode.stat.executable
          - _verify_inst_inode.stat.inode == _verify_can_inode.stat.inode
        fail_msg: >-
          /opt/actions-runner/{{ _instance }}/run.sh is missing or its
          inode differs from canonical. Canonical inode:
          {{ _verify_can_inode.stat.inode }}, per-instance inode:
          {{ _verify_inst_inode.stat.inode | default('absent') }}. cp -al
          in _register.yml should have hard-linked them.

# /var/run/docker.sock symlink. tmpfiles.d sets the L rule for the
# next reboot; main.yml's immediate-apply file:state=link materialises
# it now. Workflow `container:` blocks rely on this when actions/runner
# asks the host podman to bind /var/run/docker.sock into sibling job
# containers -- the host-side statfs needs the symlink target to
# resolve.
- name: _verify | /var/run/docker.sock points at github_runner's podman socket
  vars:
    _gr_uid: "{{ ansible_facts.getent_passwd['github_runner'][1] }}"
  stat:
    path: /var/run/docker.sock
    follow: false
  register: _verify_docker_sock
  failed_when:
    - not _verify_docker_sock.stat.islnk
      or _verify_docker_sock.stat.lnk_target != '/run/user/' ~ _gr_uid ~ '/podman/podman.sock'
  become: true

# Per-instance unit loads (renders cleanly, parses cleanly). Under
# qemu_test the unit ISN'T started by _register.yml (no GitHub-side
# registration), so we drive a full start manually below with a stub
# run.sh -- this load check just ensures the unit template renders
# correctly for every declared instance.
- name: _verify | github_runner@<instance>.service loads
  systemd:
    name: github_runner@{{ item.repo }}_{{ item.suffix }}.service
  register: _verify_unit_load
  failed_when: _verify_unit_load.status.LoadState != "loaded"
  loop: "{{ github_runner_instances }}"
  loop_control:
    label: "{{ item.repo }}_{{ item.suffix }}"
  become: true

# Functional unit-start smoke: replace the per-instance run.sh with a
# stub that just sleeps, then start the unit and wait for it to reach
# ActiveState=active. Catches regressions in:
#   - WorkingDirectory (the stub's $PWD assertion checks this)
#   - User= / Group= (PUID/PGID check below)
#   - ExecStart binary path resolution
#   - systemd unit syntax (would fail to start otherwise)
# Doesn't catch: actual GitHub registration / Runner.Listener boot --
# those require a real PAT and run in prod only.
- name: _verify | Replace per-instance run.sh with sleep+pwd stub
  vars:
    _instance: "{{ github_runner_instances[0].repo }}_{{ github_runner_instances[0].suffix }}"
  copy:
    dest: /opt/actions-runner/{{ _instance }}/run.sh
    content: |
      #!/bin/sh
      # _verify stub: real config requires GitHub; just prove the unit
      # spawns us in the right cwd as the right user.
      set -eu
      test "$(pwd)" = "/opt/actions-runner/{{ _instance }}" \
        || { echo >&2 "_verify stub: bad cwd $(pwd)"; exit 1; }
      test "$(id -un)" = "github_runner" \
        || { echo >&2 "_verify stub: bad uid $(id -un)"; exit 1; }
      # Daemonize so systemd reads Type=simple as active. Long enough
      # that the wait task below succeeds before the stub exits.
      exec sleep 300
    mode: "0755"
    owner: github_runner
    group: github_runner
    backup: true
  become: true

- name: _verify | Start the test instance to drive the unit's ExecStart
  systemd:
    name: github_runner@{{ github_runner_instances[0].repo }}_{{ github_runner_instances[0].suffix }}.service
    state: restarted
    daemon_reload: true
  become: true

- name: _verify | Wait for the unit to reach active
  systemd:
    name: github_runner@{{ github_runner_instances[0].repo }}_{{ github_runner_instances[0].suffix }}.service
  register: _verify_unit_smoke
  until: _verify_unit_smoke.status.ActiveState == "active"
  retries: 10
  delay: 2
  failed_when: _verify_unit_smoke.status.ActiveState != "active"
  become: true

# Tear down the stub: stop the unit so the sleep process exits and the
# next role apply doesn't leave a dangling test process. The stub's
# backup at <name>.<ts>~ is left in place -- ansible's backup: true
# rotates it on the next template/copy.
- name: _verify | Stop the test instance after smoke
  systemd:
    name: github_runner@{{ github_runner_instances[0].repo }}_{{ github_runner_instances[0].suffix }}.service
    state: stopped
  become: true
