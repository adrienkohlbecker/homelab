- name: _verify | github_runner user exists; populate getent_passwd for uid lookups
  getent:
    database: passwd
    key: github_runner
  become: true

- name: _verify | subuid/subgid entries exist for github_runner
  command: grep -q '^github_runner:' /etc/{{ item }}
  changed_when: false
  loop:
    - subuid
    - subgid
  become: true

- name: _verify | linger is enabled for github_runner
  stat:
    path: /var/lib/systemd/linger/github_runner
  register: _verify_linger
  failed_when: not _verify_linger.stat.exists
  become: true

- name: _verify | rootless podman.socket is active under github_runner
  systemd:
    name: podman.socket
    scope: user
  register: _verify_podman_sock
  failed_when: _verify_podman_sock.status.ActiveState != "active"
  become: true
  become_user: github_runner

# Host-level PAT secret. Created in main.yml from the vaulted
# github_runner_pat var via podman_secret with the default user=root,
# so it lives in root's podman -- inspect there, not in github_runner's
# rootless podman (which only owns the DooD socket). Under qemu_test
# the value is a stub; under prod it's the real PAT.
- name: _verify | github_runner_pat podman secret exists
  command: podman secret inspect github_runner_pat
  changed_when: false
  become: true

- name: _verify | github_runner_image_rotate.timer is active
  systemd:
    name: github_runner_image_rotate.timer
  register: _verify_rotate_timer
  failed_when: >-
    _verify_rotate_timer.status.LoadState != "loaded"
    or _verify_rotate_timer.status.ActiveState != "active"
  become: true

# Functional smoke: run the script once and confirm it exits cleanly
# AND took one of its two valid code paths. Under qemu_test the run
# typically hits the pull-failure soft-exit because nexus may not be
# reachable from the box VM; this catches a regression that breaks
# the loop (no "rotated=" summary on stdout) AND breaks the pull-fail
# message (no "podman pull of" on stderr). Either marker must appear
# -- if neither does, the script crashed silently or hit an uncovered
# branch.
- name: _verify | github_runner_image_rotate runs cleanly
  command: /usr/local/bin/github_runner_image_rotate
  changed_when: false
  become: true
  register: _verify_rotate
  failed_when: >-
    _verify_rotate.rc != 0
    or (
      'rotated=' not in _verify_rotate.stdout
      and 'podman pull of' not in _verify_rotate.stderr
    )

# Per-instance unit-load check. _verify only runs under the test
# harness against a disposable qemu VM, so we only have the qemu_test
# branch: load the instantiated template + verify systemd accepts the
# instance name. The container itself isn't running -- the stub PAT
# would 401 against GitHub's generate-jitconfig and the unit would
# loop on the restart-limit. System-scope: the unit lives under
# /etc/systemd/system/ (see github_runner.service.j2's [Unit] block).
- name: _verify | github_runner@<instance>.service loads
  systemd:
    name: github_runner@{{ item.repo }}_{{ item.suffix }}.service
  register: _verify_unit
  failed_when: _verify_unit.status.LoadState != "loaded"
  loop: "{{ github_runner_instances }}"
  loop_control:
    label: "{{ item.repo }}_{{ item.suffix }}"
  become: true
