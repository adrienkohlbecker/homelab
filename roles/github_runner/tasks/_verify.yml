- name: _verify | github_runner user exists; populate getent_passwd for uid lookups
  getent:
    database: passwd
    key: github_runner
  become: true

- name: _verify | subuid/subgid entries exist for github_runner
  command: grep -q '^github_runner:' /etc/{{ item }}
  changed_when: false
  loop:
    - subuid
    - subgid
  become: true

- name: _verify | linger is enabled for github_runner
  stat:
    path: /var/lib/systemd/linger/github_runner
  register: _verify_linger
  failed_when: not _verify_linger.stat.exists
  become: true

- name: _verify | rootless podman.socket is active under github_runner
  systemd:
    name: podman.socket
    scope: user
  register: _verify_podman_sock
  failed_when: _verify_podman_sock.status.ActiveState != "active"
  become: true
  become_user: github_runner

- name: _verify | github_runner@.service template is installed in system scope
  stat:
    path: /etc/systemd/system/github_runner@.service
  register: _verify_template
  failed_when: not _verify_template.stat.exists
  become: true

# Host-level PAT secret. Created in main.yml from the vaulted
# github_runner_pat var; consumed by every runner container's
# entrypoint to mint per-start JIT configs. Under qemu_test the value
# is a stub; under prod it's the real PAT.
# The unit is system-scope; podman_secret defaults to user=root and
# main.yml doesn't override that, so the secret lives in root's
# podman store, not github_runner's rootless store. Inspect from
# root accordingly -- a previous `become_user: github_runner` here
# checked the wrong namespace and always reported missing.
- name: _verify | github_runner_pat podman secret exists
  command: podman secret inspect github_runner_pat
  changed_when: false
  become: true

# Per-instance assertions. Under qemu_test the envfile lands and the
# unit loads (template + instance syntax check); the container isn't
# started because the entrypoint's curl POST to GitHub's
# generate-jitconfig with a stub PAT would 401 and loop on the
# restart-limit. Under prod the container is running with the unit
# active (which under --sdnotify=healthy implies the healthcheck has
# passed, i.e. Runner.Listener is up and polling).
- name: _verify | env file present for each instance
  stat:
    path: /etc/default/github_runner@{{ item.repo }}_{{ item.suffix }}
  register: _verify_envfiles
  failed_when: not _verify_envfiles.stat.exists
  loop: "{{ github_runner_instances }}"
  loop_control:
    label: "{{ item.repo }}_{{ item.suffix }}"
  become: true

- name: _verify | per-instance workdir exists
  stat:
    path: /mnt/scratch/github_runner/workdir_{{ item.repo }}_{{ item.suffix }}
  register: _verify_workdirs
  failed_when: >-
    not _verify_workdirs.stat.exists
    or not _verify_workdirs.stat.isdir
  loop: "{{ github_runner_instances }}"
  loop_control:
    label: "{{ item.repo }}_{{ item.suffix }}"
  become: true

# Per-instance unit queries are system-scope (the template was moved
# back from /etc/systemd/user/ to /etc/systemd/system/ -- see the
# unit template's [Unit] comment for why).
- name: _verify | github_runner@<instance>.service loads (qemu_test)
  when: qemu_test
  systemd:
    name: github_runner@{{ item.repo }}_{{ item.suffix }}.service
  register: _verify_unit_test
  failed_when: _verify_unit_test.status.LoadState != "loaded"
  loop: "{{ github_runner_instances }}"
  loop_control:
    label: "{{ item.repo }}_{{ item.suffix }}"
  become: true

# Under prod assert the unit is active. With --sdnotify=healthy this
# implies the healthcheck passed (Runner.Listener up); the runner is
# polling GitHub for jobs.
- name: _verify | github_runner@<instance>.service is active (prod)
  when: not qemu_test
  systemd:
    name: github_runner@{{ item.repo }}_{{ item.suffix }}.service
  register: _verify_unit_prod
  failed_when: >-
    _verify_unit_prod.status.LoadState != "loaded"
    or _verify_unit_prod.status.ActiveState != "active"
  loop: "{{ github_runner_instances }}"
  loop_control:
    label: "{{ item.repo }}_{{ item.suffix }}"
  become: true
