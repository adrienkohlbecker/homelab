- name: _setup | Install dependencies
  apt:
    pkg:
      - podman
      # podman's rootless mode shells out to newuidmap/newgidmap (in uidmap)
      # to read the subuid/subgid ranges. uidmap is only a Recommends of
      # podman, so install_recommends:false leaves it out -- pull it in
      # explicitly so podman can start under github_runner.
      - uidmap
    install_recommends: false
    cache_valid_time: 3600
  become: true

# In production, host-wide subuid/subgid allocation happens in the
# `subid` role (driven by host_vars `subid_users`). The role-only test
# harness reuses the same role with a minimal input so subuid/subgid
# layout matches prod's shape -- without an allocation, rootless podman
# refuses to start with "no subuid ranges found for user github_runner".
#
# Synthesize a kvm group on the test VM (the box image has no /dev/kvm
# so there's no upstream-managed kvm group either) so we can mirror
# prod's subid_extra_subgid_groups passthrough. CLAUDE.md "Why the
# literal `1`" calls out that rootless podman builds the container
# gidmap shortest-range-first from /etc/subgid, and the literal `1` on
# the unit's --group-add depends on that ordering staying stable when
# a second single-id range gets added later. _verify.yml asserts the
# expected /etc/subgid shape so a regression on that chain is loud.
- name: _setup | Synthesize a kvm group for the subid passthrough test
  group:
    name: kvm
    state: present
    system: true
  become: true

- name: _setup | Apply subid role for github_runner
  import_role:
    name: subid
  vars:
    subid_users:
      - github_runner
    subid_extra_subgid_groups:
      - { user: github_runner, group: kvm }

# Run the podman role's install.yml so the test VM gets the same
# storage layout prod does: rpool/podman zvol mounted at
# /var/lib/containers, /var/lib/containers/rootless created with
# sticky-bit perms, /etc/containers/storage.conf written with the right
# graphroot. Mirroring just the rootless mkdir isn't enough -- under
# the new design the role calls podman_secret which exercises the full
# rootless storage stack, and any drift between prod's perms/mount
# layout and the test's flat-rootfs is what produced the previous
# "mkdir /var/lib/containers/rootless: permission denied" failure.
- name: _setup | Install podman with prod-shape storage layout
  import_role:
    name: podman
    tasks_from: install

# Under qemu_test the runner doesn't register against GitHub (no
# fixture exists for github.com's runner-registration API). The role's
# main.yml gates the registration + service-start tasks on `qemu_test`,
# so this _setup.yml only needs to bring up the rootless-podman
# prerequisites. _verify.yml asserts the static layout (binary, user,
# subid, podman socket) without expecting the runner to be online.
