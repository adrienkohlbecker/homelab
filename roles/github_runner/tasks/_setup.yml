# Test-harness setup for roles/github_runner. The role no longer ships
# a runner container image (the runner runs directly as the
# github_runner system user); this file's job is just to bring up the
# rootless-podman prerequisites and the kvm/subgid passthrough fixture
# that prod uses for workflow `container:` blocks.

# Synthesize a kvm group on the test VM (box has no /dev/kvm so there
# is no upstream-managed kvm group). The role's service_user_args adds
# github_runner to kvm so workflow-spawned sibling containers that
# claim /dev/kvm (--device + --group-add 1) keep working under the
# rootless podman serving the DooD socket.
- name: _setup | Synthesize a kvm group for the subid passthrough test
  group:
    name: kvm
    state: present
    system: true
  become: true

# Apply subid with the same shape prod uses: a base 65536 range plus a
# 1-count range for the kvm gid. CLAUDE.md "Why the literal `1`" calls
# out that rootless podman builds the container gidmap shortest-range-
# first from /etc/subgid, so the workflow's --group-add 1 expects the
# kvm-gid range to land at container gid 1. _verify.yml below asserts
# the expected /etc/subgid shape so a regression on the ordering
# invariant fails loud.
- name: _setup | Apply subid role for github_runner
  import_role:
    name: subid
  vars:
    subid_users:
      - github_runner
    subid_extra_subgid_groups:
      - { user: github_runner, group: kvm }

# Run the podman role's install.yml so the test VM gets the same
# storage layout prod does: rpool/podman zvol mounted at
# /var/lib/containers, /var/lib/containers/rootless with sticky-bit
# perms, /etc/containers/storage.conf with the right graphroot. The
# role's storage.conf for github_runner (under
# /mnt/scratch/github_runner/.config/) sits on top of this layout.
- name: _setup | Install podman with prod-shape storage layout
  import_role:
    name: podman
    tasks_from: install
