# Reap idle per-cell test workdirs created by the lab-runtime CI
# workflows. Each cell bind-mounts a unique subdir under here (host path
# embeds github.run_id + strategy.job-index; see .github/workflows/test.yml).
# Cleanup mechanics: `e` cleans files older than the Age field, then
# recursively removes empty subdirs that are also old enough -- so a
# completed/crashed cell's tree gets eaten once its contents are >1d
# stale. lab-runtime-workdir itself is the rule target and stays.
# Age=1d is comfortably beyond the harness's 1500s timeout, so a live
# cell can't be reaped mid-run.
#
# Type Path                                                Mode UID GID Age
e      /mnt/scratch/github_runner/lab-runtime-workdir      -    -   -   1d

# Sentinels touched by packer-build.yml's final step; polled by
# test.yml's wait-for-packer-build job to gate the _packer test cell
# behind a green packer-build for the same SHA. Dedicated subdir so
# this Age=7d sweep can't reach the qcow2 artifact tree -- e walks
# every file under Path, with no per-glob age restriction. packer-build
# mkdir -p's the subdir before writing; the d rule below is belt-and-
# braces for hosts where packer-build has never run yet.
d      /mnt/scratch/qemu/_sentinels                        0755 root root -
e      /mnt/scratch/qemu/_sentinels                        -    -    -    7d
