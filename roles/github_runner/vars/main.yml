# actions/runner release pinning. Bumping = edit both URL and sha256
# for every arch in lockstep, then re-apply the role. Each instance's
# next restart picks up the new binary.
#
# URL adjacent to its sha256 per arch (CLAUDE.md "Centralize
# downloadable artifact metadata") so a human auditing a checksum
# sees exactly which URL it pins without recomposing from a version
# constant.
github_runner_archive:
  x86_64:
    url: "https://github.com/actions/runner/releases/download/v2.334.0/actions-runner-linux-x64-2.334.0.tar.gz"
    sha256: "048024cd2c848eb6f14d5646d56c13a4def2ae7ee3ad12122bee960c56f3d271"
  aarch64:
    url: "https://github.com/actions/runner/releases/download/v2.334.0/actions-runner-linux-arm64-2.334.0.tar.gz"
    sha256: "f44255bd3e80160eb25f71bc83d06ea025f6908748807a584687b3184759f7e4"

# BuildKit + rootlesskit back github_runner's rootless buildkitd, which drives
# `docker buildx` in the zbm-build CI job (the upstream ZBM Dockerfile uses
# heredocs buildah can't parse, and buildx-in-podman can't run nested in the
# runner's rootless podman -- so buildkitd runs as a standalone rootless
# process). Same pinning discipline as the runner archive: bump URL+sha256 per
# arch in lockstep, re-apply. The buildkit tarball ships buildkitd + buildctl +
# buildkit-runc under bin/; rootlesskit sets up the unprivileged user namespace
# buildkitd runs in (it reads /etc/subuid directly -- see roles/subid).
github_runner_buildkit_version: "0.30.0"
github_runner_buildkit_archive:
  x86_64:
    url: "https://github.com/moby/buildkit/releases/download/v0.30.0/buildkit-v0.30.0.linux-amd64.tar.gz"
    sha256: "2da148c50540409988c837e62b72176e4a9ad7855548a2dd6ea1cd0c0d2d360d"
  aarch64:
    url: "https://github.com/moby/buildkit/releases/download/v0.30.0/buildkit-v0.30.0.linux-arm64.tar.gz"
    sha256: "d0c9601e49f441dcc5c6493c884275a5470dcc9c188c96573c4dd503f2fde97d"
github_runner_rootlesskit_version: "3.0.1"
github_runner_rootlesskit_archive:
  x86_64:
    url: "https://github.com/rootless-containers/rootlesskit/releases/download/v3.0.1/rootlesskit-x86_64.tar.gz"
    sha256: "0850aa446151dfbdca15ed228ff0151751792cb5a99260b9a6738e1b490cc37b"
  aarch64:
    url: "https://github.com/rootless-containers/rootlesskit/releases/download/v3.0.1/rootlesskit-aarch64.tar.gz"
    sha256: "fdd9d2aa12bb8914081dfe1cd129c5a6a06cf1f80c732713f905a92c07b9b45c"
