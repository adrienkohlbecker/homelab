github_runner_version: "2.334.0"

# Labels reported to GitHub on registration. `self-hosted` is the
# implicit label GitHub adds to every self-hosted runner; we list it
# explicitly so workflows' `runs-on: [self-hosted, <host>]` selector
# resolves unambiguously. The host-named label is what workflows match
# on -- gives each runner an addressable identity (lab vs pug vs ...)
# without depending on image-name conventions.
github_runner_labels: "self-hosted,{{ inventory_hostname }}"

# GitHub repos to register a runner against. One actions/runner listener
# process + state dir per entry; the upstream tarball is extracted once
# into /mnt/services/github_runner/runner/ and per-repo state dirs
# symlink the binary entries (bin, externals, run.sh, config.sh, .path)
# into themselves so the ~150 MB extracted tree isn't duplicated. All
# repos must live under the single owner below (personal-account
# constraint -- no org, no shared runner groups).
github_runner_owner: "adrienkohlbecker"
github_runner_repos:
  - homelab

github_runner_release:
  x86_64:
    url: "https://github.com/actions/runner/releases/download/v{{ github_runner_version }}/actions-runner-linux-x64-{{ github_runner_version }}.tar.gz"
    sha256: "048024cd2c848eb6f14d5646d56c13a4def2ae7ee3ad12122bee960c56f3d271"
  aarch64:
    url: "https://github.com/actions/runner/releases/download/v{{ github_runner_version }}/actions-runner-linux-arm64-{{ github_runner_version }}.tar.gz"
    sha256: "f44255bd3e80160eb25f71bc83d06ea025f6908748807a584687b3184759f7e4"
