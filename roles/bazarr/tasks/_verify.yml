# Negative probe first: confirms /api/* enforces the apikey. Pairs with the
# auth'd probe below -- together they prove the apikey we templated is both
# required by bazarr and the one it accepted. Without this, a future bug that
# disabled apikey enforcement would let the auth'd probe pass on any key.
- name: _verify | Bazarr /api/system/status rejects unauth'd requests
  uri:
    url: http://localhost:{{ service_ports.bazarr }}/api/system/status
    status_code: 401
  register: _bazarr_http_unauth
  retries: 30
  delay: 2
  until: _bazarr_http_unauth.status == 401

# Authenticated probe -- proves the apikey we templated into config.yaml is
# the one the running container accepted, not just one we wrote to disk.
# Header form keeps the key out of journald.
- name: _verify | Bazarr answers /api/system/status with our apikey
  uri:
    url: http://localhost:{{ service_ports.bazarr }}/api/system/status
    headers:
      X-API-KEY: "{{ bazarr_api_key }}"
    status_code: 200
    return_content: true
  register: _bazarr_http
  retries: 30
  delay: 2
  until: _bazarr_http.status == 200
  failed_when: (_bazarr_http.json.data | default({})) | length == 0

# The vhost is `auth: required`, so the real browser access pattern is an
# Authelia-gated UI -- the API path above is reached intra-stack via
# bazarr.dns.podman with X-API-KEY, bypassing nginx entirely. With the
# stub in gate mode (see _setup.yml), assert a cookieless GET / lands on
# nginx's error_page 401 =302 redirect to the portal. This is the only
# probe that fails if `auth: required` is dropped from nginx_site_args
# (the loopback apikey probes stay green without it). Asserting the 302
# returnUrl (rd=) echoes bazarr's own URL proves the Host header routed to
# bazarr's server_name (not the default vhost) and the request URI survived.
- name: _verify | Bazarr UI gate redirects unauthenticated requests to Authelia
  uri:
    url: https://localhost/
    headers:
      Host: "bazarr.{{ inventory_hostname }}.{{ domain }}"
    validate_certs: false
    follow_redirects: none
    status_code: 302
  register: _bazarr_nginx_gate
  failed_when: >-
    _bazarr_nginx_gate.status != 302
    or 'auth.' not in (_bazarr_nginx_gate.location | default(''))
    or ('rd=https://bazarr.' ~ inventory_hostname ~ '.' ~ domain) not in (_bazarr_nginx_gate.location | default(''))
