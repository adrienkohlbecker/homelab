- name: _verify | bazarr user exists
  getent:
    database: passwd
    key: bazarr
    fail_key: true
  become: true

- name: _verify | bazarr config dir exists
  stat:
    path: /mnt/services/bazarr
  register: _verify_config_dir
  failed_when: not _verify_config_dir.stat.exists or _verify_config_dir.stat.pw_name != 'bazarr'
  become: true

- name: _verify | bazarr sqlite dir exists
  stat:
    path: /mnt/services/sqlite/bazarr
  register: _verify_sqlite_dir
  failed_when: not _verify_sqlite_dir.stat.exists or _verify_sqlite_dir.stat.pw_name != 'bazarr'
  become: true

- name: _verify | bazarr.service is loaded and active
  systemd:
    name: bazarr
  register: _verify_unit
  failed_when: >-
    _verify_unit.status.LoadState != "loaded"
    or _verify_unit.status.ActiveState != "active"
  become: true

# Negative probe first: confirms /api/* enforces the apikey. Pairs with the
# auth'd probe below -- together they prove the apikey we templated is both
# required by bazarr and the one it accepted. Without this, a future bug that
# disabled apikey enforcement would let the auth'd probe pass on any key.
- name: _verify | bazarr /api/system/status rejects unauth'd requests
  uri:
    url: http://localhost:{{ service_ports.bazarr }}/api/system/status
    status_code: 401
  register: _verify_http_unauth
  retries: 30
  delay: 2
  until: _verify_http_unauth.status == 401

# Authenticated probe -- proves the apikey we templated into config.yaml is
# the one the running container accepted, not just one we wrote to disk.
# Header form keeps the key out of journald.
- name: _verify | bazarr answers /api/system/status with our apikey
  uri:
    url: http://localhost:{{ service_ports.bazarr }}/api/system/status
    headers:
      X-API-KEY: "{{ bazarr_api_key }}"
    status_code: 200
    return_content: true
  register: _verify_http
  retries: 30
  delay: 2
  until: _verify_http.status == 200
  failed_when: (_verify_http.json.data | default({})) | length == 0
