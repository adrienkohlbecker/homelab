- name: Add media group
  import_role:
    name: media
    tasks_from: group
  tags:
    - bazarr

- name: Set up bazarr system user, group, and config dir
  import_role:
    name: service_user
    tasks_from: user
  vars:
    service_user_args:
      name: bazarr
      extra_groups: [ media ]
      # linuxserver/bazarr's s6 init recursively chowns /config to
      # PUID:PGID=bazarr:media on every container start. Match it here
      # so ansible doesn't flap the dir's gid back to `bazarr` each run.
      config_dir_group: media
  tags:
    - bazarr

- name: Create sqlite directory
  when: not (ansible_check_mode and bazarr_user.changed)
  file:
    dest: /mnt/services/sqlite/bazarr
    state: directory
    owner: bazarr
    group: media
    mode: "0750"
  become: true
  tags:
    - bazarr

- name: Create bazarr config subdirectory
  when: not (ansible_check_mode and bazarr_user.changed)
  file:
    dest: /mnt/services/bazarr/config
    state: directory
    owner: bazarr
    group: media
    mode: "0755"
  become: true
  tags:
    - bazarr

- name: Configure bazarr
  template:
    src: config.yaml.j2
    dest: /mnt/services/bazarr/config/config.yaml
    owner: bazarr
    group: media
    mode: "0600"
    backup: true
    validate: python3 -c 'import yaml,sys; yaml.safe_load(open(sys.argv[1]))' "%s"
  register: bazarr_conf
  become: true
  # On a fresh-host --check run bazarr_user + its config dir are only reported
  # (their creating tasks are guarded), so an unguarded template with
  # owner=bazarr would fail resolving the not-yet-created user/dir.
  when: not (ansible_check_mode and bazarr_user.changed)
  tags:
    - bazarr

- name: Install bazarr service
  import_role:
    name: systemd_unit
    tasks_from: install
  vars:
    systemd_unit_args:
      src: bazarr.service.j2
      condition: "{{ not (ansible_check_mode and bazarr_user.changed) }}"
  tags:
    - bazarr

- name: Pull bazarr image
  containers.podman.podman_image:
    name: "{{ bazarr_image }}"
  register: bazarr_image_pull
  retries: 3
  delay: 10
  until: bazarr_image_pull is not failed
  become: true
  tags:
    - bazarr

- name: Enable bazarr service
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: bazarr
      condition: "{{ not (ansible_check_mode and (bazarr_service_result.changed or bazarr_user.changed)) }}"
      restart: "{{ bazarr_service_result.changed or bazarr_conf.changed or bazarr_user.changed or media_group.changed }}"
  tags:
    - bazarr

- name: Configure nginx
  import_role:
    name: nginx
    tasks_from: site
  vars:
    nginx_site_args:
      subdomain: bazarr
      proxy_pass: http://127.0.0.1:{{ service_ports.bazarr }}/
      # Bazarr's own auth.type stays null (config.yaml.j2) -- it trusts the
      # reverse proxy when no native auth is configured, and intra-stack
      # peers reach it as bazarr.dns.podman:{{ service_ports.bazarr }} with
      # apikey. See sonarr's nginx_site_args comment.
      auth: required
  tags:
    - bazarr
