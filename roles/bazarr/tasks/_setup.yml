- name: _test | Install nginx
  import_role:
    name: _test
    tasks_from: nginx

- name: _setup | Install podman
  import_role:
    name: podman
    tasks_from: install

- name: _setup | Ensure /mnt/services and /mnt/media exist
  file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - /mnt/services
    - /mnt/media
  become: true
