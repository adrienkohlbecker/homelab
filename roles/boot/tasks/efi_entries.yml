# Declare and converge EFI NVRAM boot entries so the firmware boots
# rEFInd -> ZBM by default, with per-disk entries on mdadm-EFI hosts
# for single-disk-failure survivability.
#
# A Python helper diffs current NVRAM state against boot_efi_entries
# (from defaults) and applies the minimum changes: create missing
# entries, remove stale/relabeled managed entries, reorder BootOrder.
#
# Gated on `not grub_bootloader` by the import in main.yml.

- name: efi_entries | Assert cmdline engine has run (aarch64 needs options)
  when: ansible_architecture == 'aarch64'
  assert:
    that: _boot_assembled_cmdline is defined
    fail_msg: >-
      _boot_assembled_cmdline is not set — the cmdline engine (tasks/cmdline.yml)
      must run before efi_entries.yml on aarch64. Don't --start-at-task past it.
  tags:
    - boot

- name: efi_entries | Create /opt/boot
  file:
    path: /opt/boot
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true
  tags:
    - boot

- name: efi_entries | Install management script
  copy:
    src: efi_entries.py
    dest: /opt/boot/efi_entries.py
    owner: root
    group: root
    mode: "0755"
    backup: true
    validate: python3 -m py_compile "%s"
  register: _boot_efi_install
  become: true
  tags:
    - boot

- name: efi_entries | Converge NVRAM entries
  when: not (ansible_check_mode and _boot_efi_install is changed)
  command:
    argv: "{{ ['python3', '/opt/boot/efi_entries.py'] + (['--check'] if ansible_check_mode else []) }}"
  environment:
    BOOT_EFI_ENTRIES: "{{ boot_efi_entries | to_json }}"
    BOOT_EFI_TIMEOUT: "{{ boot_efi_timeout | to_json }}"
  check_mode: false
  become: true
  register: _boot_efi_result
  changed_when: (_boot_efi_result.stdout | from_json).changed
  # The script exits non-zero on any efibootmgr/mdadm failure, printing a
  # structured {"failed": true, "msg": ...} to stdout first. Fail on the rc
  # (short-circuits before from_json, so an empty-stdout crash still fails
  # cleanly) and surface the diagnostic through the registered stdout.
  failed_when: >-
    _boot_efi_result.rc != 0
    or (_boot_efi_result.stdout | from_json).failed | default(false)
  tags:
    - boot

- name: efi_entries | Surface firmware warnings
  when:
    - _boot_efi_result is not skipped
    - (_boot_efi_result.stdout | from_json).warnings | default([]) | length > 0
  debug:
    msg: "{{ (_boot_efi_result.stdout | from_json).warnings }}"
  tags:
    - boot

- name: efi_entries | Ask to reboot
  when: _boot_efi_result is changed
  file:
    path: /var/run/reboot-required
    state: touch
    owner: root
    group: root
    mode: "0644"
  become: true
  tags:
    - boot
