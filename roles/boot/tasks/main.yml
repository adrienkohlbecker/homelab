# Cross-cutting boot setup. This role owns the kernel-cmdline engine
# (tasks/cmdline.yml, imported by zfs/console/kdump to contribute a fragment to
# whichever bootloader the host uses) plus the boot-chain config below that no
# feature role owns. It runs on the ZBM hosts; grub hosts drive their cmdline
# through the same engine via the console role and need none of these tasks.
# Bootloader install + image staging stay role-owned (zfsbootmenu, refind);
# disk/ESP creation stays one-time bootstrap.

- name: Assert grub_bootloader is set
  assert:
    that: grub_bootloader is defined
    fail_msg: boot requires grub_bootloader (bool) in host/group vars.
  tags:
    - boot

# We boot via rEFInd -> ZFSBootMenu, never grub. linux-generic Recommends a
# grub-* alternation; hold the whole grub family so a later kernel upgrade can't
# pull it in to fight the rEFInd boot path. dpkg-query expands the glob; then
# dpkg_selections sets the hold with proper check-mode and diff support.
- name: Enumerate grub packages
  when: not grub_bootloader
  shell:
    executable: /bin/bash
    cmd: set -euo pipefail; dpkg-query -W -f='${db:Status-Status}\t${binary:Package}\n' 'grub*' | awk -F'\t' '/^installed/ {print $2}'
  register: boot_grub_packages
  changed_when: false
  failed_when: false
  become: true
  tags:
    - boot

- name: Hold grub packages
  when: not grub_bootloader and boot_grub_packages.stdout_lines | default([]) | length > 0
  dpkg_selections:
    name: "{{ item }}"
    selection: hold
  loop: "{{ boot_grub_packages.stdout_lines }}"
  become: true
  tags:
    - boot

# fsck.vfat (ESP integrity) + mkdosfs. The ESP itself is created at bootstrap,
# but the tooling belongs with the role that owns the boot chain.
- name: Install ESP filesystem tools
  apt:
    package:
      - dosfstools
      - initramfs-tools
    cache_valid_time: 3600
  become: true
  tags:
    - boot

# Pull all modules into the initramfs (not just the build host's loaded set) so
# the image boots on bare-metal controllers/NICs the builder didn't have
# (lab/pug carry server-class HBAs). MODULES=most is the default on these images
# already; pin it so a regression to 'dep' can't silently strand a boot.
# conf.d overrides the main initramfs.conf and survives package upgrades.
- name: Build a portable initramfs (MODULES=most)
  copy:
    dest: /etc/initramfs-tools/conf.d/modules-most
    content: "MODULES=most\n"
    owner: root
    group: root
    mode: "0644"
    backup: true
    validate: sh -n %s
  register: boot_initramfs_modules
  become: true
  tags:
    - boot

- name: Update initramfs
  when:
    - boot_initramfs_modules.changed
    - not ansible_check_mode
  command: update-initramfs -v -u -k all
  changed_when: true
  become: true
  tags:
    - boot

- name: Ask to reboot
  when: boot_initramfs_modules.changed
  file:
    path: /var/run/reboot-required
    state: touch
    owner: root
    group: root
    mode: "0644"
  become: true
  tags:
    - boot

# Base kernel console args — the twin of the `zfs set` in chroot.sh, reproduced
# so the cmdline engine doesn't silently drop them on every converge. tty0 keeps
# VGA output. The earlycon + serial args are host-specific: earlycon probing an
# absent I/O port hangs the boot (lab has UART at 0x60a0 not 0x3f8; pug has
# none). Hosts with a real UART set boot_serial_console in host_vars; test VMs
# get the qemu virtual UART automatically.
- name: Set the base console command line
  when: not grub_bootloader
  import_role:
    name: boot
    tasks_from: cmdline
  vars:
    _boot_serial: >-
      {% if qemu_test | default(false) %}
      {{ (ansible_architecture == 'aarch64')
         | ternary('earlycon=pl011,0x9000000,115200 console=ttyAMA0,115200',
                   'earlycon=uart8250,io,0x3f8 console=ttyS0,115200') }}
      {% else %}
      {{ boot_serial_console }}
      {% endif %}
    boot_cmdline_args:
      name: default
      contents: "console=tty0{{ (' ' ~ (_boot_serial | trim)) if ((_boot_serial | trim) | length > 0) else '' }}"
  tags:
    - boot
