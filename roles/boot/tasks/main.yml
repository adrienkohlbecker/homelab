# Cross-cutting boot setup. This role owns the kernel-cmdline engine
# (tasks/cmdline.yml, imported by zfs/console/kdump to contribute a fragment to
# whichever bootloader the host uses) plus the boot-chain config below that no
# feature role owns. It runs on the ZBM hosts; grub hosts drive their cmdline
# through the same engine via the console role and need none of these tasks.
# Bootloader install + image staging stay role-owned (zfsbootmenu, refind);
# disk/ESP creation stays one-time bootstrap.

- name: Assert grub_bootloader is set
  assert:
    that: grub_bootloader is defined
    fail_msg: boot requires grub_bootloader (bool) in host/group vars.
  tags:
    - boot

# We boot via rEFInd -> ZFSBootMenu, never grub. linux-generic Recommends a
# grub-* alternation; hold the whole grub family so a later kernel upgrade can't
# pull it in to fight the rEFInd boot path. dpkg-query expands the glob; then
# dpkg_selections sets the hold with proper check-mode and diff support.
- name: Enumerate grub packages
  when: not grub_bootloader
  shell:
    executable: /bin/bash
    cmd: set -euo pipefail; dpkg-query -W -f='${db:Status-Status}\t${binary:Package}\n' 'grub*' | awk -F'\t' '/^installed/ {print $2}'
  register: boot_grub_packages
  changed_when: false
  failed_when: false
  become: true
  tags:
    - boot

- name: Hold grub packages
  when: not grub_bootloader and boot_grub_packages.stdout_lines | default([]) | length > 0
  dpkg_selections:
    name: "{{ item }}"
    selection: hold
  loop: "{{ boot_grub_packages.stdout_lines }}"
  become: true
  tags:
    - boot

# fsck.vfat (ESP integrity) + mkdosfs. The ESP itself is created at bootstrap,
# but the tooling belongs with the role that owns the boot chain.
- name: Install ESP filesystem tools
  apt:
    package:
      - dosfstools
      - efibootmgr
      - initramfs-tools
    cache_valid_time: 3600
  become: true
  tags:
    - boot

# These units are useful only when the host has LVM or multipath state to
# monitor. The packages may remain installed as dependencies, so manage the
# systemd entry points instead of purging shared storage tooling.
- name: Probe unused LVM and multipath unit files # noqa: command-instead-of-module
  when: boot_disable_lvm_services | bool
  command: systemctl list-unit-files {{ item }}
  loop:
    - lvm2-monitor.service
    - lvm2-lvmpolld.service
    - dm-event.service
    - multipathd.service
    - lvm2-lvmpolld.socket
    - dm-event.socket
    - multipathd.socket
  register: boot_lvm_unit_files
  changed_when: false
  failed_when: false
  check_mode: false
  become: true
  tags:
    - boot

- name: Disable unused LVM and multipath monitor units
  when:
    - boot_disable_lvm_services | bool
    - item.rc == 0
    - item.stdout_lines | select('match', '^' ~ (item.item | regex_escape) ~ '\s') | list | length > 0
  systemd:
    name: "{{ item.item }}"
    enabled: false
    masked: true
    state: stopped
  loop: "{{ boot_lvm_unit_files.results }}"
  loop_control:
    label: "{{ item.item }}"
  become: true
  tags:
    - boot

# Pull all modules into the initramfs (not just the build host's loaded set) so
# the image boots on bare-metal controllers/NICs the builder didn't have
# (lab/pug carry server-class HBAs). MODULES=most is the default on these images
# already; pin it so a regression to 'dep' can't silently strand a boot.
# conf.d overrides the main initramfs.conf and survives package upgrades.
- name: Build a portable initramfs (MODULES=most)
  copy:
    dest: /etc/initramfs-tools/conf.d/modules-most
    content: "MODULES=most\n"
    owner: root
    group: root
    mode: "0644"
    backup: true
    validate: sh -n %s
  register: boot_initramfs_modules
  become: true
  tags:
    - boot

- name: Update initramfs
  when:
    - boot_initramfs_modules.changed
    - not ansible_check_mode
  command: update-initramfs -u -k all
  changed_when: true
  become: true
  tags:
    - boot

- name: Ask to reboot
  when: boot_initramfs_modules.changed
  file:
    path: /var/run/reboot-required
    state: touch
    owner: root
    group: root
    mode: "0644"
  become: true
  tags:
    - boot

# Base kernel console args — the twin of the `zfs set` in chroot.sh, reproduced
# so the cmdline engine doesn't silently drop them on every converge. tty0 keeps
# VGA output. The earlycon + serial args come from _console_cmdline (group_vars),
# which selects the arch-specific QEMU UART on test VMs and boot_serial_console
# on real hardware (empty on lab/pug which have no UART).
- name: Set the base console command line
  when: not grub_bootloader
  import_role:
    name: boot
    tasks_from: cmdline
  vars:
    boot_cmdline_args:
      name: default
      contents: "{{ _console_cmdline }}"
  tags:
    - boot

- name: Set initramfs debug command line
  import_role:
    name: boot
    tasks_from: cmdline
  vars:
    boot_cmdline_args:
      name: initramfs_debug
      contents: "{{ (boot_initramfs_debug | bool) | ternary('debug', '') }}"
      grub_scope: default
  tags:
    - boot

- name: Set target kernel debug command line
  import_role:
    name: boot
    tasks_from: cmdline
  vars:
    boot_cmdline_args:
      name: target_debug
      contents: "{{ boot_target_debug_cmdline }}"
      grub_scope: default
  tags:
    - boot

# NVRAM boot entries — managed after the boot-chain config above is in place.
# Firmware points at boot loaders on the ESP; per-loader config carries the
# loader-specific kernel command line.
- name: Manage EFI boot entries
  when: not grub_bootloader
  import_tasks: efi_entries.yml
  tags:
    - boot

# tmpfs /tmp -- the twin of chroot.sh's `systemctl enable tmp.mount` in the
# baked image, reproduced so an ansible-from-stock-Ubuntu host gets the same
# RAM-backed /tmp (it pages out to swap under pressure). jammy/noble ship it as
# a disabled template under /usr/share/systemd/ -- stage it into place first;
# resolute ships + pre-enables /usr/lib/systemd/system/tmp.mount, so the stage
# no-ops there. Enabling only takes effect at the next boot (a live /tmp can't
# be remounted), so touch reboot-required on a change.
- name: Probe for the systemd tmp.mount template
  stat:
    path: /usr/share/systemd/tmp.mount
  register: boot_tmp_mount_template
  become: true
  tags:
    - boot

- name: Stage tmp.mount from the systemd template
  when: boot_tmp_mount_template.stat.exists
  copy:
    src: /usr/share/systemd/tmp.mount
    dest: /etc/systemd/system/tmp.mount
    remote_src: true
    owner: root
    group: root
    mode: "0644"
    backup: true
  register: boot_tmp_mount_staged
  become: true
  tags:
    - boot

- name: Reload systemd for the staged tmp.mount
  when:
    - boot_tmp_mount_staged.changed | default(false)
    - not (ansible_check_mode and boot_tmp_mount_staged.changed | default(false))
  systemd:
    daemon_reload: true
  become: true
  tags:
    - boot

- name: Enable tmpfs /tmp via tmp.mount
  # In check mode on a fresh host the staging copy above only *reports* it would
  # create tmp.mount, so systemd can't find the unit to enable. Skip enabling
  # when the unit is merely pending -- the staging task already covers the diff.
  when: not (ansible_check_mode and boot_tmp_mount_staged.changed | default(false))
  systemd:
    name: tmp.mount
    enabled: true
  register: boot_tmp_mount
  become: true
  tags:
    - boot

- name: Ask to reboot after enabling tmp.mount
  when: boot_tmp_mount.changed
  file:
    path: /var/run/reboot-required
    state: touch
    owner: root
    group: root
    mode: "0644"
  become: true
  tags:
    - boot
