# Functional checks for the boot role. The converge proves the tasks exit-code
# cleanly; these assert the end-state they're responsible for.
#
# Reboot first so /proc/cmdline reflects the role's writes. Same pattern as
# console/_verify.yml. Skipped on aarch64 — EDK2 aarch64 has a known reboot
# bug on this image and the test box bypasses ZBM entirely.
- name: _verify | Reboot to apply boot-chain changes
  when: not grub_bootloader and ansible_architecture != 'aarch64'
  reboot:
    reboot_timeout: 600
  become: true

# Verify the hold is in place (dpkg Want=hold) rather than just checking
# "no grub installed" which is a tautology on test fixtures that never had
# grub. Also assert none are installed, which is the hold's intended effect.
- name: _verify | Dpkg install status for grub*
  when: not grub_bootloader
  command: dpkg-query -W -f='${binary:Package} ${db:Status-Want} ${db:Status-Status}\n' 'grub*'
  changed_when: false
  failed_when: false
  register: _boot_verify_grub_status
  become: true

- name: _verify | At least one grub package is held
  when: not grub_bootloader
  assert:
    that: >-
      _boot_verify_grub_status.stdout_lines
      | select('search', '\\shold\\s')
      | list | length > 0
    fail_msg: >-
      No grub-prefixed package has dpkg Want=hold — apt-mark hold grub*
      did not take effect: {{ _boot_verify_grub_status.stdout_lines }}

- name: _verify | No grub package is installed
  when: not grub_bootloader
  assert:
    that: >-
      _boot_verify_grub_status.stdout_lines
      | select('search', '\\sinstalled$')
      | list | length == 0
    fail_msg: >-
      A grub-prefixed package is installed despite the hold — it will fight
      rEFInd at boot. Offending: {{ _boot_verify_grub_status.stdout_lines
                                    | select('search', '\\sinstalled$') | list }}

- name: _verify | MODULES=most is pinned in initramfs conf.d
  command: grep -qxF MODULES=most /etc/initramfs-tools/conf.d/modules-most
  changed_when: false
  register: _boot_verify_modules
  failed_when: _boot_verify_modules.rc != 0
  become: true

# The conf.d check proves the pin landed; this proves it took effect. ahci (SATA)
# and e1000 (Intel NIC) are the witnesses: both ship in stock kernels but a
# virtio-only VM loads neither, so a MODULES=dep initramfs omits them while
# MODULES=most pulls them in (with the rest of the broad driver set). Finding
# either in the live image proves update-initramfs honoured the pin rather than
# building the boot-critical minimum dep would. Two drivers (one storage, one
# net) so a flavour that trims one -- a stripped -kvm cloud kernel might -- still
# matches the other. grep reads to EOF (no -q) so an early close can't SIGPIPE
# lsinitramfs under pipefail.
- name: _verify | Find the host initramfs (cloud images may boot initrd-less)
  stat:
    path: /boot/initrd.img-{{ ansible_kernel }}
  register: _boot_verify_initrd
  become: true

- name: _verify | MODULES=most pulled non-virtio drivers (ahci/e1000) into the initramfs
  # Skipped where the host boots without an initramfs at all (the arm64 cloud
  # fixture has no /boot/initrd.img to inspect); the conf.d pin check stands in.
  when: _boot_verify_initrd.stat.exists
  shell:
    cmd: >-
      set -euo pipefail;
      lsinitramfs /boot/initrd.img-{{ ansible_kernel }} | grep -E '/(ahci|e1000)\.ko' >/dev/null
    executable: /bin/bash
  changed_when: false
  become: true

# The 'default' fragment carries the base console args. On test VMs (qemu) this
# includes earlycon + serial for harness output capture; on prod (no legacy UART)
# it's just console=tty0.
- name: _verify | Read the assembled ZBM commandline
  when: not grub_bootloader
  command: zfs get -H -o value org.zfsbootmenu:commandline rpool/ROOT
  register: _boot_verify_cmdline
  changed_when: false
  become: true

- name: _verify | Commandline carries console=tty0
  when: not grub_bootloader
  assert:
    that:
      - "'console=tty0' in _boot_verify_cmdline.stdout"
    fail_msg: >-
      org.zfsbootmenu:commandline is missing console=tty0 from the 'default'
      fragment: {{ _boot_verify_cmdline.stdout }}

- name: _verify | Commandline carries serial args (when configured)
  when: not grub_bootloader and (boot_serial_console | default('') | trim | length > 0 or (qemu_test | default(false)))
  vars:
    _expected: >-
      {% if qemu_test | default(false) %}earlycon={% else %}{{ boot_serial_console }}{% endif %}
  assert:
    that:
      - "_expected | trim in _boot_verify_cmdline.stdout"
    fail_msg: >-
      Expected serial args not found in org.zfsbootmenu:commandline.
      Expected: {{ _expected | trim }}
      Got: {{ _boot_verify_cmdline.stdout }}

# /proc/cmdline exposes the args the running kernel actually booted with.
# Post-reboot this proves the ZBM property propagated through the boot chain,
# not just that the ZFS property was set. Skipped on aarch64 (no reboot above).
- name: _verify | Read the running kernel's cmdline
  when: not grub_bootloader and ansible_architecture != 'aarch64'
  slurp:
    src: /proc/cmdline
  register: _boot_verify_proc_cmdline
  become: true

- name: _verify | Running kernel booted with console=tty0
  when: not grub_bootloader and ansible_architecture != 'aarch64'
  vars:
    _cmdline: "{{ _boot_verify_proc_cmdline.content | b64decode }}"
  assert:
    that:
      - "'console=tty0' in _cmdline"
    fail_msg: >-
      /proc/cmdline does not carry console=tty0 after reboot — the
      ZBM property may not have propagated: {{ _cmdline }}

- name: _verify | Running kernel booted with earlycon (when configured)
  when: not grub_bootloader and ansible_architecture != 'aarch64' and (qemu_test | default(false))
  vars:
    _cmdline: "{{ _boot_verify_proc_cmdline.content | b64decode }}"
  assert:
    that:
      - "'earlycon=' in _cmdline"
    fail_msg: >-
      /proc/cmdline does not carry earlycon= after reboot — the
      ZBM serial args may not have propagated: {{ _cmdline }}

# --- EFI NVRAM boot entries ---

- name: _verify | Dump EFI boot entries
  when: not grub_bootloader
  command: efibootmgr -v
  changed_when: false
  become: true
  register: _boot_verify_efi_dump

- name: _verify | Expected EFI labels present in NVRAM
  when: not grub_bootloader
  vars:
    _efi_dump: "{{ _boot_verify_efi_dump.stdout }}"
    _expected_labels: "{{ boot_efi_entries | map(attribute='label') | list }}"
  assert:
    that: item in _efi_dump
    fail_msg: >-
      EFI label '{{ item }}' not found in efibootmgr -v output
  loop: "{{ _expected_labels }}"

- name: _verify | Aarch64 EFI-stub entry carries kernel cmdline
  when: not grub_bootloader and ansible_architecture == 'aarch64'
  assert:
    that: "'root=zfs:' in _boot_verify_efi_dump.stdout"
    fail_msg: >-
      aarch64 Linux EFI-stub entry missing root=zfs: in optional data —
      the entry may have been created without --unicode options

- name: _verify | EFI entries are converged
  when: not grub_bootloader
  command:
    argv: "{{ ['python3', '/opt/boot/efi_entries.py', '--check'] }}"
  environment:
    BOOT_EFI_ENTRIES: "{{ boot_efi_entries | to_json }}"
    BOOT_EFI_TIMEOUT: "{{ boot_efi_timeout | to_json }}"
  changed_when: false
  become: true
  register: _boot_verify_efi

- name: _verify | No EFI entry drift
  when: not grub_bootloader
  vars:
    _efi_result: "{{ _boot_verify_efi.stdout | from_json }}"
  assert:
    that: not _efi_result.changed
    fail_msg: >-
      EFI boot entries need changes: {{ _efi_result.actions | join(', ') }}
