# policy_rc_d suppresses the dpkg post-install auto-start. Without it
# fail2ban comes up briefly with the stock iptables-multiport banaction
# before the nftables drop-in below lands; any ban issued in that window
# writes into the iptables-nft compat `ip filter` table, orphaned from
# the firewall role's nftables ruleset.
- name: Install fail2ban
  apt:
    pkg:
      - fail2ban
    cache_valid_time: 3600
    policy_rc_d: 101
  become: true
  register: apt_install_fail2ban
  tags:
    - fail2ban

# Empty / undefined interpolation silently strips ignoreip entries —
# fail2ban-client -t accepts "ignoreip = 127.0.0.1/8 ::1  " as valid,
# so a typo'd refactor of either var would lock admin traffic out
# without surfacing in --check.
- name: Assert ignoreip inputs are defined
  assert:
    that:
      - site_subnets.home is defined
      - site_subnets.home | length > 0
      - wireguard_subnet is defined
      - wireguard_subnet | length > 0
    fail_msg: >-
      site_subnets.home and wireguard_subnet must be defined and non-empty;
      they compose ignoreip in /etc/fail2ban/jail.d/99-nftables.local.
  tags:
    - fail2ban

# fail2ban reads jail.d/*.local alphabetically with last-wins precedence
# for keys; the override used to live at 00-nftables.local where any
# higher-prefix sibling would silently win. Cleanup-on-migration.
- name: Drop legacy 00-nftables.local override
  file:
    path: /etc/fail2ban/jail.d/00-nftables.local
    state: absent
  become: true
  register: fail2ban_legacy_override
  tags:
    - fail2ban

# Use the nftables banaction set so f2b-* chains land in `inet f2b-table`
# instead of the iptables-nft compat `ip filter`. Active bans persist in
# fail2ban's database and get re-applied to the new framework on reload.
#
# Ubuntu's fail2ban deb ships every jail at `enabled = false`, so the
# sshd jail is pinned explicitly here rather than left contingent on
# upstream defaults.
- name: Use nftables banaction
  copy:
    dest: /etc/fail2ban/jail.d/99-nftables.local
    content: |
      [DEFAULT]
      banaction = nftables-multiport
      banaction_allports = nftables-allports
      backend = systemd
      ignoreip = 127.0.0.1/8 ::1 {{ site_subnets.home }} {{ wireguard_subnet }}

      # systemd-journal entries carry IPs, not hostnames; rDNS resolve
      # is wasted and risks banning the wrong IP on asymmetric DNS.
      usedns = no

      # Pinned explicitly so a future Ubuntu fail2ban deb can't shift
      # the threshold under us; values match the current upstream
      # defaults so apply is a no-op until policy changes.
      bantime = 10m
      findtime = 10m
      maxretry = 5

      # Escalating curve up to 1w; rndtime jitter prevents botnets
      # timing retries to ban-expiry. dbpurgeage must outlast maxtime
      # or repeat offenders' history is dropped before escalation
      # peaks, capping the effective ceiling at the default 24h.
      bantime.increment = true
      bantime.maxtime = 1w
      bantime.rndtime = 10m
      dbpurgeage = 2w

      [sshd]
      enabled = true
    owner: root
    group: root
    mode: "0640"
    backup: true
  register: fail2ban_banaction
  become: true
  tags:
    - fail2ban

# Surface jail-config typos at copy time rather than at reload, where a
# failed reload would leave fail2ban dead silently.
- name: Validate fail2ban config
  when:
    - fail2ban_banaction.changed
    - not ansible_check_mode
  command: fail2ban-client -t
  changed_when: false
  become: true
  tags:
    - fail2ban

# apt upgrade swaps the binary -> full restart. Config-only edits reload
# via SIGHUP to preserve in-memory ban state.
- name: Enable fail2ban service
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: fail2ban
      condition: "{{ not (ansible_check_mode and apt_install_fail2ban.changed) }}"
      restart: "{{ apt_install_fail2ban.changed }}"
      reload: "{{ (fail2ban_banaction.changed or fail2ban_legacy_override.changed) and not apt_install_fail2ban.changed }}"
  tags:
    - fail2ban
