- name: Install fail2ban
  apt:
    pkg:
      - fail2ban
    cache_valid_time: 3600
  become: true
  register: apt_install_fail2ban
  tags:
    - fail2ban

# Use the nftables banaction set so f2b-* chains land in `inet f2b-table`
# instead of the iptables-nft compat `ip filter`. Active bans persist in
# fail2ban's database and get re-applied to the new framework on the
# restart below.
- name: Use nftables banaction
  copy:
    dest: /etc/fail2ban/jail.d/00-nftables.local
    content: |
      [DEFAULT]
      banaction = nftables-multiport
      banaction_allports = nftables-allports
    owner: root
    group: root
    mode: "0644"
    backup: true
  register: fail2ban_banaction
  become: true
  tags:
    - fail2ban

- name: Enable fail2ban service
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_src: fail2ban
    systemd_unit_condition: "{{ not (ansible_check_mode and apt_install_fail2ban.changed) }}"
    systemd_unit_restart: "{{ fail2ban_banaction.changed }}"
  tags:
    - fail2ban
