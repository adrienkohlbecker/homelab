# policy_rc_d suppresses the dpkg post-install auto-start. Without it
# fail2ban comes up briefly with the stock iptables-multiport banaction
# before the nftables drop-in below lands; any ban issued in that window
# writes into the iptables-nft compat `ip filter` table, orphaned from
# the firewall role's nftables ruleset.
- name: Install fail2ban
  apt:
    pkg:
      - fail2ban
    cache_valid_time: 3600
    policy_rc_d: 101
  become: true
  register: fail2ban_apt
  tags:
    - fail2ban

# Empty / undefined interpolation silently strips ignoreip entries —
# fail2ban-client -t accepts "ignoreip = 127.0.0.1/8 ::1  " as valid,
# so a typo'd refactor of either var would lock admin traffic out
# without surfacing in --check.
- name: Assert ignoreip inputs are defined
  assert:
    that:
      - site_subnets.home is defined
      - site_subnets.home | length > 0
      - wireguard_subnet is defined
      - wireguard_subnet | length > 0
    fail_msg: >-
      site_subnets.home and wireguard_subnet must be defined and non-empty;
      they compose ignoreip in /etc/fail2ban/jail.local.
  tags:
    - fail2ban

# fail2ban loads jail.conf -> jail.d/*.conf -> jail.local -> jail.d/*.local
# alphabetically with last-wins precedence. We now write our DEFAULT
# block at /etc/fail2ban/jail.local (the upstream-canonical override
# path); two earlier prefix iterations under jail.d/ are cleaned up.
- name: Drop legacy jail.d overrides
  file:
    path: "/etc/fail2ban/jail.d/{{ item }}"
    state: absent
  loop:
    - 00-nftables.local
    - 99-nftables.local
  become: true
  register: fail2ban_legacy_override
  tags:
    - fail2ban

# Daemon-level config (logtarget lives in [Definition] of fail2ban.conf,
# distinct from jail.local's [DEFAULT]). Route fail2ban-server's own
# runtime log to journald instead of /var/log/fail2ban.log so the
# systemd input in fluent-bit picks it up alongside every other service
# rather than needing a dedicated tail. logtarget changes require a
# server restart -- SIGHUP reload re-reads jails but doesn't reopen
# the daemon log handle.
- name: Write fail2ban daemon overrides
  copy:
    dest: /etc/fail2ban/fail2ban.local
    content: |
      [Definition]
      logtarget = SYSTEMD-JOURNAL
    owner: root
    group: root
    mode: "0640"
    backup: true
  register: fail2ban_daemon
  become: true
  tags:
    - fail2ban

# [DEFAULT] block: banaction routes f2b-* chains into `inet f2b-table`
# (nftables-native) instead of the iptables-nft compat `ip filter`.
# Active bans persist in fail2ban's database and re-apply on restart.
#
# `backend = ...` is intentionally NOT pinned here — keeping it at the
# default lets each jail pick its own (sshd uses systemd; a future
# logpath-based jail like postfix-sasl would silently break if forced
# onto the journal without a matching journalmatch).
- name: Write fail2ban defaults
  copy:
    dest: /etc/fail2ban/jail.local
    content: |
      [DEFAULT]
      banaction = nftables-multiport
      banaction_allports = nftables-allports
      ignoreip = 127.0.0.1/8 ::1 {{ site_subnets.home }} {{ wireguard_subnet }}

      # systemd-journal entries carry IPs, not hostnames; rDNS resolve
      # is wasted and risks banning the wrong IP on asymmetric DNS.
      usedns = no

      # Pinned explicitly so a future Ubuntu fail2ban deb can't shift
      # the threshold under us; values match the current upstream
      # defaults so apply is a no-op until policy changes.
      bantime = 10m
      findtime = 10m
      maxretry = 5

      # Escalating curve up to 1w; rndtime jitter prevents botnets
      # timing retries to ban-expiry. dbpurgeage must outlast maxtime
      # or repeat offenders' history is dropped before escalation
      # peaks, capping the effective ceiling at the default 24h.
      bantime.increment = true
      bantime.maxtime = 1w
      bantime.rndtime = 10m
      dbpurgeage = 2w

      # action_mwl: ban event + whois + offending journal lines via
      # the local MTA (postfix -> mailgun). Postmortem does not need
      # ssh'ing to the host. Sender defaults to root@<host>; postfix
      # rewrites the envelope on its way to mailgun.
      destemail = {{ root_email }}
      action = %(action_mwl)s
    owner: root
    group: root
    mode: "0640"
    backup: true
  register: fail2ban_default
  become: true
  tags:
    - fail2ban

# Per-jail sshd config. `backend = systemd` is scoped here (not in
# [DEFAULT], see jail.local comment). journalmatch is pinned to
# `_COMM=sshd` so the filter catches both jammy's `ssh.service` and
# noble's `ssh.socket` + `ssh@N-.service` template-unit layout — the
# stock filter ANDs on `_SYSTEMD_UNIT=sshd.service` and silently
# misses the latter.
- name: Write fail2ban sshd jail
  copy:
    dest: /etc/fail2ban/jail.d/sshd.local
    content: |
      [sshd]
      enabled = true
      backend = systemd
      journalmatch = _COMM=sshd
    owner: root
    group: root
    mode: "0640"
    backup: true
  register: fail2ban_sshd_jail
  become: true
  tags:
    - fail2ban

# The active mail action (sendmail-whois-lines) inherits actionstart /
# actionstop from sendmail-common.conf, which email "[Fail2Ban] <jail>:
# started/stopped on <host>" on every daemon restart -- pure noise, one
# per host per apply. Empty both via the action's .local so only
# actionban (the ban event + whois + offending log lines) still mails.
# sendmail-whois-lines.local (the action named in the jail) overrides the
# inherited keys with highest precedence.
- name: Suppress fail2ban start/stop notification emails
  copy:
    dest: /etc/fail2ban/action.d/sendmail-whois-lines.local
    content: |
      [Definition]
      actionstart =
      actionstop =
    owner: root
    group: root
    mode: "0640"
    backup: true
  register: fail2ban_mail_action
  become: true
  tags:
    - fail2ban

# Surface jail-config typos at apply time. Runs every apply (not
# gated on .changed) so a previous failed apply that left a broken
# file on disk doesn't get silently skipped on idempotent re-runs.
# fail2ban-client lacks a single-file validate mode, so this can't
# move to the copy task's `validate:` parameter.
- name: Validate fail2ban config
  when: not (ansible_check_mode and fail2ban_apt.changed)
  command: fail2ban-client -t
  changed_when: false
  become: true
  tags:
    - fail2ban

# Banaction-class changes live in jail.local -> restart, since
# fail2ban-client reload does NOT migrate already-active f2b-*
# chains to a new banaction's table. Per-jail tweaks (jail.d/*.local
# or the legacy-cleanup) keep using SIGHUP reload to preserve
# in-memory ban state; the on-disk db replays on restart anyway.
- name: Enable fail2ban service
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: fail2ban
      condition: "{{ not (ansible_check_mode and fail2ban_apt.changed) }}"
      restart: "{{ fail2ban_apt.changed or ((fail2ban_default.changed or fail2ban_daemon.changed) and not fail2ban_apt.changed) }}"
      reload: "{{ (fail2ban_sshd_jail.changed or fail2ban_legacy_override.changed or fail2ban_mail_action.changed) and not fail2ban_apt.changed and not fail2ban_default.changed and not fail2ban_daemon.changed }}"
  tags:
    - fail2ban
