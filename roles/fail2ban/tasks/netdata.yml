# netdata's go.d/fail2ban collector invokes `fail2ban-client status`
# via the setuid-root `ndsudo` helper (allowlisted subcommands in
# upstream's src/collectors/utils/ndsudo.c — `fail2ban-client-status`
# and `fail2ban-client-status-jail`). The collector never opens the
# control socket directly, so no fail2ban-group membership is
# required on the netdata user.
- name: Configure fail2ban metrics
  import_role:
    name: netdata
    tasks_from: config
  vars:
    netdata_args:
      src: fail2ban.conf
      dest: go.d/fail2ban.conf
      condition: "{{ fail2ban_netdata_condition | default(true) }}"
  tags:
    - fail2ban
