# Functional verification of the role's premise: bans land in
# `inet f2b-table` (the nftables-native banaction) and not in the
# iptables-nft compat `ip filter` table. Stat-only checks (unit
# active, file present) would pass even if the banaction silently
# regressed to iptables-multiport.

# Harness-invoked only; nftables is implicit on prod via the firewall
# role, but testrole.py fail2ban runs in isolation.
- name: _verify | Install nftables
  apt:
    pkg:
      - nftables
    cache_valid_time: 3600
  become: true

# Doubles as the A2 check: the sshd jail was pinned explicitly rather
# than left to upstream defaults. fail2ban cold-starts in a few seconds
# after enable; status returns error before the daemon is ready.
- name: _verify | fail2ban-client status lists the sshd jail
  command: fail2ban-client status
  register: _verify_status
  retries: 15
  delay: 2
  until:
    - _verify_status.rc == 0
    - "'sshd' in _verify_status.stdout"
  changed_when: false
  become: true

# Synthetic ban against TEST-NET-1 (RFC 5737); never matches a real client.
- name: _verify | Issue a synthetic ban
  command: fail2ban-client set sshd banip 192.0.2.1
  changed_when: true
  become: true

- name: _verify | Banned IP appears in inet f2b-table
  command: nft list table inet f2b-table
  register: _verify_f2b_table
  changed_when: false
  failed_when: >-
    _verify_f2b_table.rc != 0
    or '192.0.2.1' not in _verify_f2b_table.stdout
  become: true

# Negative assertion: the iptables-nft compat `ip filter` table either
# does not exist (rc != 0) or does not carry an f2b-sshd chain. If it
# does, the banaction override silently reverted to iptables-multiport.
- name: _verify | iptables-nft compat path is NOT used
  command: nft list table ip filter
  register: _verify_ip_filter
  changed_when: false
  failed_when: _verify_ip_filter.rc == 0 and 'f2b-sshd' in _verify_ip_filter.stdout
  become: true

- name: _verify | Unban the synthetic IP
  command: fail2ban-client set sshd unbanip 192.0.2.1
  changed_when: true
  become: true

- name: _verify | Banned IP is gone from inet f2b-table
  command: nft list table inet f2b-table
  register: _verify_f2b_after
  changed_when: false
  failed_when: "'192.0.2.1' in _verify_f2b_after.stdout"
  become: true
