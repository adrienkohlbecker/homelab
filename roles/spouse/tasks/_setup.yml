- name: _setup | Install dependencies
  apt:
    pkg:
      - samba
      # smbclient is a separate package from the samba server; _verify uses it
      # to prove the spouse SMB account actually authenticates.
      - smbclient
    install_recommends: false
    cache_valid_time: 3600
  become: true

- name: _setup | Create /mnt/data
  file:
    path: /mnt/data
    state: directory
    mode: "0755"
  become: true
