- name: _setup | Install dependencies
  apt:
    pkg:
      - samba
    install_recommends: false
    cache_valid_time: 3600
  become: true

- name: _setup | Setup dependencies
  shell: |
    set -euo pipefail
    mkdir /mnt/data
  args:
    executable: /bin/bash
    creates: /mnt/data
  become: true
