- name: Add spouse group
  group:
    name: "{{ spouse_firstname }}"
    system: false
  become: true
  tags:
    - spouse

- name: Add spouse user
  user:
    name: "{{ spouse_firstname }}"
    group: "{{ spouse_firstname }}"
    createhome: true
    system: false
    shell: /usr/sbin/nologin
    password: "!"
    home: /mnt/data/{{ spouse_firstname }}
  become: true
  register: spouse_user
  tags:
    - spouse

- name: Configure spouse samba user
  import_role:
    name: samba
    tasks_from: smbpasswd
  vars:
    samba_smbpasswd_args:
      name: "{{ spouse_firstname }}"
      password: "{{ spouse_samba_password }}"
  when: not (ansible_check_mode and spouse_user.changed)
  tags:
    - spouse
