- name: _verify | POSIX user exists with correct attributes
  getent:
    database: passwd
    key: "{{ spouse_firstname }}"

- name: _verify | Assert user shell, home, and non-system UID
  assert:
    that:
      # getent_passwd[user]: [password, uid, gid, gecos, home, shell] (0-indexed)
      - ansible_facts.getent_passwd[spouse_firstname][5] == '/usr/sbin/nologin'
      - ansible_facts.getent_passwd[spouse_firstname][4] == '/mnt/data/' ~ spouse_firstname
      # system: false in main.yml gives a stable non-system UID for the arq bucket
      # and subid range -- assert it stayed that way.
      - ansible_facts.getent_passwd[spouse_firstname][1] | int >= 1000
      - ansible_facts.getent_passwd[spouse_firstname][2] | int >= 1000
    fail_msg: >-
      Expected nologin shell, /mnt/data/{{ spouse_firstname }} home, non-system UID/GID;
      got: {{ ansible_facts.getent_passwd[spouse_firstname] | default([]) }}

- name: _verify | POSIX group exists
  getent:
    database: group
    key: "{{ spouse_firstname }}"

- name: _verify | Assert group is non-system
  assert:
    that:
      # getent_group[group]: [password, gid, members] (0-indexed)
      - ansible_facts.getent_group[spouse_firstname][1] | int >= 1000
    fail_msg: >-
      Group {{ spouse_firstname }} missing or has system GID
      (got {{ ansible_facts.getent_group[spouse_firstname][1] | default('absent') }}).

- name: _verify | Home directory exists and is owned correctly
  stat:
    path: /mnt/data/{{ spouse_firstname }}
  register: spouse_verify_home
  become: true

- name: _verify | Assert home directory ownership and mode
  assert:
    that:
      - spouse_verify_home.stat.exists
      - spouse_verify_home.stat.pw_name == spouse_firstname
      - spouse_verify_home.stat.gr_name == spouse_firstname
      # 0750 is useradd's HOME_MODE default on Ubuntu; the home is the spouse's
      # private data dir (exported only via [homes] valid users = %S), so assert
      # it stayed owner+own-group, not world-readable.
      - spouse_verify_home.stat.mode == '0750'
    fail_msg: >-
      Home dir /mnt/data/{{ spouse_firstname }} missing, wrong ownership, or
      mode != 0750 (got {{ spouse_verify_home.stat.mode | default('absent') }}).

# Functional probes: prove the account can authenticate and access its [homes]
# share. PASSWD env keeps the vaulted value out of the process argument list
# (smbclient reads PASSWD from the environment when no %password is given).
- name: _verify | SMB account authenticates and can list shares
  command: smbclient -L localhost -U {{ spouse_firstname }}
  environment:
    PASSWD: "{{ spouse_samba_password }}"
  changed_when: false
  become: true

- name: _verify | SMB account can access homes share
  command: smbclient //localhost/{{ spouse_firstname }} -U {{ spouse_firstname }} -c ls
  environment:
    PASSWD: "{{ spouse_samba_password }}"
  changed_when: false
  become: true

- name: _verify | Smbpasswd sentinel exists
  stat:
    path: /etc/samba/.smbpasswd_{{ spouse_firstname }}_hash
  register: spouse_verify_sentinel
  become: true

- name: _verify | Assert sentinel file
  assert:
    that:
      - spouse_verify_sentinel.stat.exists
      - spouse_verify_sentinel.stat.mode == '0600'
      - spouse_verify_sentinel.stat.pw_name == 'root'
    fail_msg: >-
      Sentinel /etc/samba/.smbpasswd_{{ spouse_firstname }}_hash missing, wrong perms,
      or not root-owned.
