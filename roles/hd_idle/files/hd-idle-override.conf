[Service]
# hd-idle 1.05 (the C version Ubuntu ships through noble) daemonizes via
# fork() and writes no PIDFile. Under the package's Type=forking unit,
# systemd's GuessMainPID heuristic races the rapid stop->start->start cycle
# the systemd_unit helper issues on a config change: it can declare the
# unit "Deactivated successfully" ~15ms after a start while hd-idle is
# mid-fork, leaving it inactive. The next converge's `state: started` then
# restarts it and reports changed, which trips the harness idempotence
# check. Running it in the foreground (-d) under Type=simple lets systemd
# track the real process directly -- no fork, no race, and accurate
# liveness for auto-restart on a genuine crash. -d also turns on hd-idle's
# debug output, which is silent unless a disk actually changes power state.
# The Go rewrite (resolute+) ships its own Type=simple unit and is left
# alone (this drop-in is gated to jammy/noble in tasks/main.yml).
Type=simple
ExecStart=
ExecStart=/usr/sbin/hd-idle -d $HD_IDLE_OPTS
