- name: Install hd-idle
  apt:
    pkg: hd-idle
    policy_rc_d: 101
    cache_valid_time: 3600
  register: hd_idle_apt
  become: true
  tags:
    - hd_idle

- name: Divert hd-idle configuration
  community.general.dpkg_divert:
    path: /etc/default/hd-idle
  when: not (ansible_check_mode and hd_idle_apt.changed)
  become: true
  tags:
    - hd_idle

- name: Copy hd-idle configuration
  template:
    src: hd-idle.j2
    dest: /etc/default/hd-idle
    owner: root
    group: root
    mode: "0644"
    backup: true
    validate: 'sh -c ''. "%s" && test -n "${HD_IDLE_OPTS:-}"'''
  when: not (ansible_check_mode and hd_idle_apt.changed)
  register: hd_idle_conf
  become: true
  tags:
    - hd_idle

# jammy/noble ship hd-idle 1.05 (C), a forking daemon with no PIDFile that
# systemd's Type=forking unit tracks unreliably under rapid restarts —
# breaking idempotence. Override it to foreground/Type=simple (rationale in
# files/hd-idle-override.conf). Must land before the service start below so
# the unit comes up as Type=simple. Gated to the C-version releases; the Go
# rewrite (resolute+) has a proper Type=simple unit already.
- name: Run hd-idle in the foreground (jammy/noble fork-tracking race)
  import_role:
    name: systemd_unit
    tasks_from: dropin
  vars:
    systemd_unit_args:
      for: hd-idle.service
      src: hd-idle-override.conf
      condition: "{{ not (ansible_check_mode and hd_idle_apt.changed) }}"
  when: ansible_distribution_release in ['jammy', 'noble']
  tags:
    - hd_idle

- name: Enable hd_idle service
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: hd-idle
      condition: "{{ not (ansible_check_mode and hd_idle_apt.changed) }}"
      restart: >-
        {{ hd_idle_apt.changed or hd_idle_conf.changed
           or (hd_idle_service_d_override_conf_result.changed | default(false)) }}
  tags:
    - hd_idle

# Reap legacy /var/log/hd-idle.log[.N] leftovers. Older HD_IDLE_OPTS
# included -l /var/log/hd-idle.log; the current template omits -l so
# hd-idle writes to stderr -> systemd-journald. The package-shipped
# /etc/logrotate.d/hd-idle has `missingok`, so logrotate silently
# skips the file after this purge.
- name: Find legacy hd-idle log files
  find:
    paths: /var/log
    patterns:
      - 'hd-idle.log'
      - 'hd-idle.log.*'
    file_type: file
  register: hd_idle_legacy_logs
  become: true
  tags:
    - hd_idle

- name: Remove legacy hd-idle log files
  file:
    path: "{{ item.path }}"
    state: absent
  loop: "{{ hd_idle_legacy_logs.files }}"
  loop_control:
    label: "{{ item.path }}"
  become: true
  tags:
    - hd_idle
