# Functional check: hd-idle is alive and its argv matches what the
# template rendered. We can't drive a real spindown in CI (would need
# to wait the full idle window against a real spinning disk), so this
# is the closest we get -- two assertions:
#
#   (1) global flags  '-i 0' (always) and '-s 1' (on releases newer
#       than jammy/noble) appear in argv. Catches the env-file
#       parse-failure mode where HD_IDLE_OPTS silently empties.
#
#   (2) per-disk -a    for every rotational + non-removable + non-
#       virtual disk ansible_devices sees, an '-a /dev/disk/by-id/<id>
#       -i 1200' entry appears in argv. Catches regressions in the
#       template's selectattr filter chain.
#
# On every variant (box / minimal / lab / pug) the per-disk list is
# non-empty: _setup.yml loads a scsi_debug ghost disk that satisfies
# the template filter, so (2) always exercises the filter chain end-
# to-end. On lab/pug the ghost is joined by real spinning disks.

- name: _verify | confirm hd-idle is active
  command: systemctl is-active hd-idle
  changed_when: false
  become: true

- name: _verify | read hd-idle process argv
  command: pgrep -a hd-idle
  register: hd_idle_proc
  changed_when: false
  become: true

- name: _verify | assert hd-idle argv carries global flags from the env file
  assert:
    that:
      - "'-i 0' in hd_idle_proc.stdout"
      - "ansible_distribution_release in ['jammy', 'noble'] or '-s 1' in hd_idle_proc.stdout"
    fail_msg: >-
      hd-idle running but missing expected flags; HD_IDLE_OPTS may have
      failed to parse from /etc/default/hd-idle.
      pgrep output: {{ hd_idle_proc.stdout }}

- name: _verify | assert each expected per-disk -a entry appears in argv
  # Mirror of the template filter chain at templates/hd-idle.j2:61 --
  # keep these two in sync. See the template's comment block for why
  # we discriminate pseudo-devices by name prefix and not via `virtual`.
  vars:
    hd_idle_expected_disk_ids: >-
      {{ ansible_devices | dict2items
         | rejectattr('key', 'match', '^(md|dm-|loop|sr|ram|zd)')
         | selectattr('value.rotational', 'equalto', '1')
         | selectattr('value.removable', 'equalto', '0')
         | map(attribute='value.links.ids')
         | select
         | map('sort')
         | map('first')
         | list }}
  assert:
    that:
      - "'-a /dev/disk/by-id/' ~ item ~ ' -i 1200' in hd_idle_proc.stdout"
    fail_msg: >-
      hd-idle argv missing expected per-disk entry for
      /dev/disk/by-id/{{ item }} -i 1200.
      Filter regression in templates/hd-idle.j2?
      pgrep output: {{ hd_idle_proc.stdout }}
  loop: "{{ hd_idle_expected_disk_ids }}"
