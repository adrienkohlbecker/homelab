# Materialise a synthetic rotational SCSI disk so the test variants
# (box, minimal -- all virtio + rotational=0) actually exercise the
# template's per-disk selectattr filter. Without this, ansible_devices
# offers no rotational+non-removable+non-virtual disk and the per-disk
# branch of templates/hd-idle.j2 emits zero -a entries -- and the
# loop in _verify.yml asserts nothing.
#
# scsi_debug lives in linux-modules-extra-<abi> on jammy/noble, which the lab
# chroot.sh deliberately skips via --no-install-recommends on linux-generic --
# so install it here on demand. resolute (26.04) consolidated kernel packaging
# and ships no linux-modules-extra-<abi> at all: scsi_debug moved into the base
# linux-modules-<abi> already installed with the running kernel, so the on-
# demand install is both impossible (no such package) and unnecessary there.
# Gate it to < 26; resolute+ just modprobe straight from the base package.
# modprobe gives us a real /dev/sdN with a /sys/block/sdN/device/ chain (so
# ansible reports virtual=0) and udev-created /dev/disk/by-id/scsi-* symlinks.
#
# scsi_debug devices default to queue/rotational=0 (treated as an
# in-memory SSD). The module's `rotational=` param only exists on
# newer kernels (jammy 5.15 doesn't have it), so we flip the flag
# via sysfs after load -- works on every kernel, and is idempotent
# with future kernels that do honour the param. Without the override
# the template filter drops the device and we're back to zero -a
# entries on box.
#
# Refreshing ansible_devices after the sysfs poke updates the fact
# cache (jsonfile, 2h TTL per the harness env) so the subsequent
# main apply + _verify both see the ghost. No cleanup -- the harness
# destroys the VM at end of test.

- name: _setup | Install linux-modules-extra to make scsi_debug available
  when: ansible_distribution_major_version | int < 26
  apt:
    pkg: "linux-modules-extra-{{ ansible_kernel }}"
    cache_valid_time: 3600
  become: true

- name: _setup | Load scsi_debug to provide a fake rotational disk
  modprobe:
    name: scsi_debug
    params: "dev_size_mb=8 num_tgts=1"
  become: true

- name: _setup | Wait for udev to populate /dev/disk/by-id/scsi-*
  command: udevadm settle
  changed_when: false
  become: true

- name: _setup | Locate the scsi_debug block device
  # SCSI INQUIRY pads MODEL to 16 bytes with spaces, so exact-match
  # against "scsi_debug" misses; case-glob handles the padding.
  shell: |
    for blk in /sys/block/sd*; do
      case "$(cat "$blk/device/model" 2>/dev/null)" in
        scsi_debug*) basename "$blk" ;;
      esac
    done
    exit 0
  register: _hd_idle_scsi_debug_block
  changed_when: false
  become: true
  failed_when: _hd_idle_scsi_debug_block.stdout_lines | length != 1

- name: _setup | Flag scsi_debug device as rotational (jammy 5.15 lacks the module param)
  shell: "echo 1 > /sys/block/{{ _hd_idle_scsi_debug_block.stdout }}/queue/rotational"
  become: true
  changed_when: true

- name: _setup | Refresh facts cache so main + _verify see the ghost
  setup:
