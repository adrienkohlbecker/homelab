# Functional checks: timer active, config parses, and the deployed values
# are what apt actually resolves (via apt-config dump — not by re-reading
# the files this role just wrote).

- name: _verify | Apt-daily-upgrade timer is active  # noqa: command-instead-of-module
  command: systemctl is-active apt-daily-upgrade.timer
  changed_when: false
  become: true
  tags:
    - unattended_upgrades

- name: _verify | Unattended-upgrades dry-run succeeds (config parses)
  command: unattended-upgrades --dry-run
  changed_when: false
  timeout: 120
  become: true
  tags:
    - unattended_upgrades

- name: _verify | Apt-config parses both config files without error
  command: apt-config dump APT::Periodic Unattended-Upgrade
  changed_when: false
  register: unattended_upgrades_verify_aptconfig
  become: true
  tags:
    - unattended_upgrades

- name: _verify | Parsed apt-config reflects deployed values
  assert:
    that:
      - '"APT::Periodic::Unattended-Upgrade \"1\"" in unattended_upgrades_verify_aptconfig.stdout'
      - '"APT::Periodic::Update-Package-Lists \"1\"" in unattended_upgrades_verify_aptconfig.stdout'
      - '"APT::Periodic::AutocleanInterval \"7\"" in unattended_upgrades_verify_aptconfig.stdout'
      - '"Unattended-Upgrade::Automatic-Reboot \"false\"" in unattended_upgrades_verify_aptconfig.stdout'
      - '"Unattended-Upgrade::Mail \"root\"" in unattended_upgrades_verify_aptconfig.stdout'
      - '"Unattended-Upgrade::SyslogEnable \"true\"" in unattended_upgrades_verify_aptconfig.stdout'
      - '"\"^linux-(image|headers|modules)\"" in unattended_upgrades_verify_aptconfig.stdout'
    fail_msg: "apt-config dump does not reflect deployed APT::Periodic / Unattended-Upgrade values"
  tags:
    - unattended_upgrades

# _setup planted the collector dir, so the gated registration in main.yml must
# have fired and written the metadata file with the timer's daily period.
- name: _verify | Read apt-daily-upgrade netdata metadata
  slurp:
    src: /etc/netdata/charts.d/systemd_timers.d/apt-daily-upgrade.conf
  register: unattended_upgrades_verify_meta
  become: true
  tags:
    - unattended_upgrades

- name: _verify | Apt-daily-upgrade.timer is registered for overdue monitoring
  assert:
    that:
      - (unattended_upgrades_verify_meta.content | b64decode) is search('period_secs=86400')
    fail_msg: "apt-daily-upgrade.timer not registered with the netdata systemd_timers collector"
  tags:
    - unattended_upgrades
