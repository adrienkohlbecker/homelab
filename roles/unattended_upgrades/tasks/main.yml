- name: Install unattended-upgrades
  apt:
    pkg:
      # provides /var/run/reboot-required sentinel (consumed by site.yml
      # reboot check, boot, firewall, DNS reboot guard, etc.)
      - update-notifier-common
      - unattended-upgrades
    cache_valid_time: 3600
    lock_timeout: 300
  become: true
  register: unattended_upgrades_apt
  tags:
    - unattended_upgrades

- name: Configure unattended-upgrades periodic settings
  copy:
    src: 20auto-upgrades
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    owner: root
    group: root
    mode: "0644"
    backup: true
    validate: 'apt-config dump -c %s'
  become: true
  register: unattended_upgrades_apt_20
  tags:
    - unattended_upgrades

- name: Configure unattended-upgrades behavior
  copy:
    src: 50unattended-upgrades
    dest: /etc/apt/apt.conf.d/50unattended-upgrades
    owner: root
    group: root
    mode: "0644"
    backup: true
    validate: 'apt-config dump -c %s'
  become: true
  register: unattended_upgrades_apt_50
  tags:
    - unattended_upgrades

# The qemu test image masks the apt-daily pair to keep them off the dpkg lock
# during converge (packer/scripts/chroot.sh). This role owns the unattended
# upgrade pipeline, so it unmasks both from that clean base: apt-daily.timer is
# the download half that feeds apt-daily-upgrade.timer's install run. masked:
# false is a no-op on prod (stock Ubuntu ships these unmasked), so the role
# proves it drives the units to the desired state regardless of the start point.
- name: Ensure the apt-daily download timer is unmasked
  when: not (ansible_check_mode and unattended_upgrades_apt.changed)
  systemd:
    name: apt-daily.timer
    masked: false
  become: true
  tags:
    - unattended_upgrades

- name: Ensure apt-daily-upgrade timer is active
  when: not (ansible_check_mode and unattended_upgrades_apt.changed)
  systemd:
    name: apt-daily-upgrade.timer
    masked: false
    state: started
    enabled: true
  become: true
  tags:
    - unattended_upgrades

- name: Validate unattended-upgrades config
  when: unattended_upgrades_apt_20.changed or unattended_upgrades_apt_50.changed
  command: unattended-upgrades --dry-run --verbose
  changed_when: false
  timeout: 120
  become: true
  tags:
    - unattended_upgrades

- name: Check for netdata systemd_timers collector
  stat:
    path: /etc/netdata/charts.d/systemd_timers.d
  register: unattended_upgrades_timers_meta
  become: true
  tags:
    - unattended_upgrades

# Mail "root" only fires on a run that *errors*; a disabled or never-firing
# timer is silent. Registering apt-daily-upgrade.timer with netdata's
# systemd_timers collector adds the missing heartbeat: it alerts overdue once
# age > 2 * period_secs. Gated on the collector dir so it no-ops on hosts
# without netdata and self-heals on the converge after the netdata band runs.
- name: Register apt-daily-upgrade.timer for netdata overdue monitoring
  when: unattended_upgrades_timers_meta.stat.exists
  copy:
    dest: /etc/netdata/charts.d/systemd_timers.d/apt-daily-upgrade.conf
    content: |
      # Managed by ansible roles/unattended_upgrades/tasks/main.yml.
      # Consumed by /usr/libexec/netdata/charts.d/systemd_timers.chart.sh.
      # period_secs is apt-daily-upgrade.timer's daily cadence
      # (OnCalendar=*-*-* 6:00); RandomizedDelaySec jitter is absorbed by the
      # collector's 2 * period grace.
      period_secs=86400
    owner: netdata
    group: netdata
    mode: "0644"
    backup: true
  become: true
  tags:
    - unattended_upgrades
