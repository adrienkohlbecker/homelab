- name: Install unattended-upgrades
  apt:
    pkg:
      - update-notifier-common
      - unattended-upgrades
    cache_valid_time: 3600
  become: true
  tags:
    - unattended_upgrades

- name: Setup unattended-upgrades (20auto-upgrades)
  copy:
    src: 20auto-upgrades
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    owner: root
    group: root
    mode: "0644"
    backup: true
  become: true
  register: unattended_upgrades_apt_20
  tags:
    - unattended_upgrades

- name: Setup unattended-upgrades (50unattended-upgrades)
  copy:
    src: 50unattended-upgrades
    dest: /etc/apt/apt.conf.d/50unattended-upgrades
    owner: root
    group: root
    mode: "0644"
    backup: true
  become: true
  register: unattended_upgrades_apt_50
  tags:
    - unattended_upgrades

- name: Dry-run unattended-upgrades
  when: unattended_upgrades_apt_20.changed or unattended_upgrades_apt_50.changed
  command: unattended-upgrades --dry-run --verbose
  changed_when: false
  become: true
  tags:
    - unattended_upgrades
