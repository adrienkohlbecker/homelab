# Podman networks the HA container joins, in declaration order. Both
# the unit template (homeassistant.service.j2) and the core.network
# template (core.network.j2) read this list -- the unit emits one
# `--network=...` flag per entry, the core.network template uses the
# index of "mac_iot" to compute the corresponding ethN container
# interface name (podman names attached interfaces eth0, eth1, ... in
# the order they appear on `podman run --network=` flags). Re-ordering
# this list regenerates both templates consistently, and the network
# restriction stays pinned to whichever interface ends up holding the
# mac_iot IP -- no separate runtime probe needed.
homeassistant_networks:
  # mosquitto bridge: HA needs aardvark-dns resolution of "mosquitto"
  # to reach the broker. Discovery/zeroconf is intentionally NOT
  # enabled on this adapter (see core.network.j2 + main.yml).
  - name: mosquitto
  # mac_iot: HA's L2 presence on the IoT VLAN (10.123.4.0/24). No IP
  # pin — HA is the only container on this network, netavark allocates
  # deterministically from ip_range .136/29 (upper /29 of lab's IoT
  # macvlan_block; see data/network_topology.yml). Nothing downstream
  # keys on a specific address: HomeKit/Sonos discovery uses mDNS/UPnP
  # identity, no DNS A-record points at this IP, no firewall rule keys
  # on it. Re-introduce a pin (add `ip: <addr>`) if either of those
  # changes, or if a second container joins this network and starts
  # contending for slot assignments.
  #
  # mac IS pinned: without it podman mints a fresh random MAC every
  # container recreate (unit restart / image bump), UniFi sees that as
  # a new IoT-VLAN client each time, and lab's UniFi client list grows
  # a stale entry per HA recreate. Same prefix + seed shape as the
  # host-iface MACs in roles/macvlan so all L2 identities under this
  # repo are derived from one rule.
  - name: mac_iot
    mac: "{{ '82:48:10' | random_mac(seed=inventory_hostname ~ '_homeassistant') }}"
