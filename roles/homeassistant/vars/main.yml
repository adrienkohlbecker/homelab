# Third-party HA addons fetched from upstream GitHub releases. URL +
# sha256 + version live together so a bump touches one place; the
# install path in tasks/_install_addon.yml compares `version` against
# an on-disk `.installed-version` sentinel and refreshes the tree on
# mismatch.
#
# Anything HACS-installable is intentionally managed via the HACS UI
# inside HA rather than this list -- adding it twice double-loads its
# frontend resources. Bootstrap HACS here, install the rest from the
# UI. Examples currently managed via HACS: thermal_comfort,
# thermal_comfort_icons.
#
# Adding a new ansible-managed addon: append an entry here. Existing-
# pattern fields (`include`, `extra_opts`) are optional and unset for
# entries that don't need archive filtering.
homeassistant_addons:
  - name: hacs
    url: "{{ mirror_github }}/hacs/integration/releases/download/2.0.5/hacs.zip"
    sha256: 97be6b824a4f38e683728cc6dd72367f6b8bad0a43428b1b3b987a3087adf413
    version: "2.0.5"
    dest: /mnt/services/homeassistant/custom_components/hacs
    archive: zip
