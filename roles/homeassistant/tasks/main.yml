# Precondition: the host must have a `mac_iot` macvlan_block in
# host_vars with `podman_network: true` (lab has both). The macvlan
# role provisions the iface + the podman network named `mac_iot` on
# the IoT VLAN; HA attaches via --network=mac_iot (see
# homeassistant_networks in vars/main.yml).
#
# The podman network gives HA an L2 presence on the IoT VLAN
# (netplan-named `iot`, vlan id 4 on nic0) so it can do mDNS/SSDP
# discovery of Sonos / HomeKit / Zigbee-bridge targets and talk
# directly to IoT devices on the /24 (Philips airpurifier CoAP,
# etc.). ip_range is the upper /29 of lab's IoT block (.136/29 — 8
# container slots, lower /29 = mac_iot iface + libvirt VMs); HA gets
# whatever netavark allocates first.

# Join the mosquitto-owned network so home-assistant can resolve `mosquitto`
# via aardvark-dns. See paperless/tasks/main.yml for the rationale.
- name: Create mosquitto podman network
  when: not ansible_check_mode
  containers.podman.podman_network:
    name: mosquitto
    disable_dns: false
    state: present
  become: true
  tags:
    - homeassistant

- name: Set up homeassistant system user, group, and config dir
  import_role:
    name: service_user
    tasks_from: user
  vars:
    service_user_args:
      name: homeassistant
  tags:
    - homeassistant

- name: Create sqlite directory
  when: not (ansible_check_mode and homeassistant_user.changed)
  file:
    dest: /mnt/services/sqlite/homeassistant
    state: directory
    owner: homeassistant
    group: homeassistant
    mode: "0755"
  become: true
  tags:
    - homeassistant

- name: Create homeassistant subdirectories
  when: not (ansible_check_mode and homeassistant_user.changed)
  file:
    dest: "/mnt/services/homeassistant/{{ item }}"
    state: directory
    owner: homeassistant
    group: homeassistant
    mode: "0755"
  become: true
  loop:
    - custom_templates
    - blueprints
    - blueprints/automation
    - www
    - custom_components
    - .storage
  tags:
    - homeassistant

# Restrict HA's zeroconf/mDNS announcements to the mac_iot adapter.
# Without this, HA advertises *all* its adapters -- including the
# internal mosquitto-bridge IP 10.89.0.29 -- to every adapter it can
# reach. LAN clients pick up the bridge IP from mDNS, try to connect
# to it from outside, and the packets land on lab's eth0 destined to
# a podman-only IP, triggering kernel "martian source" logs (~120k/day
# on lab). The ethN name baked into core.network.j2 is computed from
# the homeassistant_networks list in vars/main.yml -- single source of
# truth shared with the unit template's --network= ordering.
#
# force: false so an operator's UI edit (Settings -> System -> Network)
# stays authoritative. First apply lands our default; subsequent UI
# changes win. Deleting the file on disk reverts HA to "use all
# adapters" (the unconfigured default), so a recovery path exists.
- name: Restrict homeassistant network adapters
  template:
    src: core.network.j2
    dest: /mnt/services/homeassistant/.storage/core.network
    owner: homeassistant
    group: homeassistant
    mode: "0600"
    force: false
  register: homeassistant_network_storage
  become: true
  tags:
    - homeassistant

# ZHA stores its zigbee.db under /config alongside YAML/automations. The
# recorder DB already lives on the sqlite dataset via /config/db; pull
# zigbee.db onto the same dataset by symlinking through /config/db so
# SQLite resolves the symlink before computing WAL placement. The symlink
# target is dangling on the host (no /config/db there) but resolves
# inside the container — force: true bypasses ansible's host-side check.
- name: Stat ZHA zigbee.db on host
  stat:
    path: /mnt/services/homeassistant/zigbee.db
    follow: false
  register: homeassistant_zigbee_db_stat
  become: true
  tags:
    - homeassistant

# Guard against `force: true` silently replacing a real ZHA database with
# a dangling symlink. If zigbee.db already exists as a regular file
# (e.g. role applied before this symlink task landed, ZHA created its
# DB at that path), force the operator to manually move it to
# /mnt/services/sqlite/homeassistant/zigbee.db first.
- name: Refuse to clobber a real zigbee.db with a symlink
  assert:
    that: not (homeassistant_zigbee_db_stat.stat.exists and not homeassistant_zigbee_db_stat.stat.islnk)
    fail_msg: >-
      /mnt/services/homeassistant/zigbee.db exists as a regular file; the
      symlink task would replace it and lose ZHA's database. Move it to
      /mnt/services/sqlite/homeassistant/zigbee.db (and remove the
      original) before re-running.
  tags:
    - homeassistant

- name: Symlink ZHA zigbee.db onto sqlite dataset
  file:
    src: /config/db/zigbee.db
    dest: /mnt/services/homeassistant/zigbee.db
    state: link
    owner: homeassistant
    group: homeassistant
    follow: false
    force: true
  become: true
  tags:
    - homeassistant

# The influxdb integration is configured through HA's UI (not via
# configuration.yaml); the helper below lands the org / user /
# bucket / write-auth and exposes the token via the per-bucket fact
# `influxdb_bucket_homeassistant_token`. The token-file task below
# materialises it on disk so the operator can `cat` it during the
# one-time HA UI integration setup rather than running
# `podman exec influxdb influx auth list --user homeassistant --json`.
- name: Bootstrap influxdb tenant for homeassistant
  import_role:
    name: influxdb
    tasks_from: bucket
  vars:
    influxdb_bucket_args:
      org: "{{ influxdb_root_org }}"
      user: homeassistant
      bucket: homeassistant
  tags:
    - homeassistant

# 0600 owned by homeassistant so only the operator (via sudo) and the
# homeassistant uid can read it. Skip in check mode because the token
# fact isn't populated when bucket.yml's tasks are skipped.
- name: Materialise the influxdb write-auth token for operator paste
  when: not ansible_check_mode
  copy:
    content: "{{ influxdb_bucket_homeassistant_token }}\n"
    dest: /mnt/services/homeassistant/influxdb_token
    owner: homeassistant
    group: homeassistant
    mode: "0600"
  become: true
  no_log: true
  tags:
    - homeassistant

# HA-flavoured YAML uses custom tags (!include, !include_dir_merge_named,
# !secret, ...). yaml.safe_load chokes on those, so register a stub
# constructor that returns None for any !-prefixed tag before parsing.
#
# Scope of this check: well-formedness only -- catches jinja quoting
# bugs, vault-substitution typos that break YAML structure, indentation
# regressions. It does NOT check HA-tag semantics: a typo'd
# `!include automatons.yaml` (target missing) or `!secret no_such_key`
# (key missing) both parse fine here -- the stub returns None and YAML
# is structurally valid. HA's own schema + integration loaders catch
# those at startup, where they're loud but post-deploy.
- name: Configure homeassistant
  template:
    src: configuration.yaml.j2
    dest: /mnt/services/homeassistant/configuration.yaml
    owner: homeassistant
    group: homeassistant
    mode: "0600"
    backup: true
    validate: python3 -c 'import yaml,sys; yaml.add_multi_constructor("!",lambda l,s,n:None,Loader=yaml.SafeLoader); yaml.safe_load(open(sys.argv[1]))' "%s"
  register: homeassistant_conf
  become: true
  tags:
    - homeassistant

- name: Configure homeassistant config files
  copy:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    owner: homeassistant
    group: homeassistant
    mode: "{{ item.mode | default('0600') }}"
    backup: true
    validate: "{{ item.validate | default(omit) }}"
  register: homeassistant_config_files
  become: true
  vars:
    _yaml_validate: python3 -c 'import yaml,sys; yaml.add_multi_constructor("!",lambda l,s,n:None,Loader=yaml.SafeLoader); yaml.safe_load(open(sys.argv[1]))' "%s"
  loop:
    - src: macros.jinja
      dest: /mnt/services/homeassistant/custom_templates/macros.jinja
    - src: sensors.yaml
      dest: /mnt/services/homeassistant/sensors.yaml
      validate: "{{ _yaml_validate }}"
    - src: templates.yaml
      dest: /mnt/services/homeassistant/templates.yaml
      validate: "{{ _yaml_validate }}"
    - src: blueprints/automation/hvac_dry_mode.yaml
      dest: /mnt/services/homeassistant/blueprints/automation/hvac_dry_mode.yaml
      mode: "0644"
      validate: "{{ _yaml_validate }}"
  loop_control:
    label: "{{ item.dest }}"
  tags:
    - homeassistant

- name: Ensure files exist
  file:
    path: /mnt/services/homeassistant/{{ item }}
    owner: homeassistant
    group: homeassistant
    mode: "0600"
    state: touch
    modification_time: preserve
    access_time: preserve
  register: homeassistant_files
  become: true
  with_items:
    - automations.yaml
    - scripts.yaml
    - scenes.yaml
  tags:
    - homeassistant

# unarchive's zip codepath shells out to /usr/bin/unzip; ubuntu cloud
# images don't ship it by default.
- name: Install unzip
  apt:
    pkg:
      - unzip
    cache_valid_time: 3600
  become: true
  tags:
    - homeassistant

# Bootstrap HACS. Anything else HACS-installable is intentionally managed
# via the HACS UI inside HA -- adding it twice double-loads its frontend
# resources. Examples currently managed via HACS: thermal_comfort,
# thermal_comfort_icons. The version, URL, and sha256 stay together so a
# bump touches one place; the `creates:` sentinel + checksum-pinned
# download give content-pinning without an on-disk version file.
- name: Create HACS download cache dir
  file:
    path: /var/cache/homeassistant
    state: directory
    owner: root
    group: root
    mode: "0700"
  register: homeassistant_hacs_dir
  become: true
  tags:
    - homeassistant

- name: Create HACS install dir
  when: not (ansible_check_mode and homeassistant_user.changed)
  file:
    path: /mnt/services/homeassistant/custom_components/hacs
    state: directory
    owner: homeassistant
    group: homeassistant
    mode: "0755"
  become: true
  tags:
    - homeassistant

- name: Download HACS archive
  # In check mode the cache dir creation above is would-only, so
  # get_url's destination dir doesn't exist and it errors with
  # "Destination /var/cache/homeassistant does not exist".
  when: not (ansible_check_mode and homeassistant_hacs_dir.changed)
  get_url:
    url: "{{ mirror_github }}/hacs/integration/releases/download/2.0.5/hacs.zip"
    checksum: sha256:97be6b824a4f38e683728cc6dd72367f6b8bad0a43428b1b3b987a3087adf413
    dest: /var/cache/homeassistant/hacs.zip
    mode: "0644"
    owner: root
    group: root
  become: true
  tags:
    - homeassistant

- name: Unpack HACS
  when: not (ansible_check_mode and homeassistant_user.changed)
  unarchive:
    src: /var/cache/homeassistant/hacs.zip
    remote_src: true
    dest: /mnt/services/homeassistant/custom_components/hacs
    creates: /mnt/services/homeassistant/custom_components/hacs/manifest.json
    owner: homeassistant
    group: homeassistant
  register: homeassistant_hacs_unpack
  become: true
  tags:
    - homeassistant

- name: Install homeassistant service
  import_role:
    name: systemd_unit
    tasks_from: install
  vars:
    systemd_unit_args:
      src: homeassistant.service.j2
      condition: "{{ not (ansible_check_mode and homeassistant_user.changed) }}"
  tags:
    - homeassistant

# Pre-stage chown'd layers so the unit's `systemctl start` doesn't blow
# through TimeoutSec=120 doing the per-file ID-mapped copy on first
# extraction. The +0:N:1 uidmap-override pattern doesn't compose with
# idmapped mounts, so podman falls back to a copy regardless of kernel
# support; we just move the cost out of the deadline. The staging
# container is removed; cached chown'd layers stay in storage and are
# reused by the unit's later `podman run`. Image name is read back
# from the just-installed unit so it stays in sync with the template.
- name: Detect homeassistant unit image
  when: not ansible_check_mode
  extract_podman_image:
    name: homeassistant
  register: homeassistant_unit_image
  become: true
  tags:
    - homeassistant

# Sentinel encodes (image-tag, uid, gid) so a bump in any of the three
# invalidates the cache and re-runs the prestage. Lives under podman's
# storage root so if storage is wiped the sentinel goes with it (the
# chown'd layers cached there would also be gone, so re-prestaging is
# correct).
- name: Compute homeassistant prestage sentinel path
  when: not ansible_check_mode
  set_fact:
    homeassistant_prestage_sentinel: >-
      /var/lib/containers/storage/.prestage_homeassistant_{{
        (homeassistant_unit_image.images[0] ~ '|' ~ homeassistant_user.uid ~ '|' ~ homeassistant_user.group)
        | hash('sha1')
      }}
  tags:
    - homeassistant

- name: Pre-stage homeassistant chown'd layers
  when: not ansible_check_mode
  shell: |
    set -euo pipefail
    podman create --replace --name homeassistant-prestage \
      --uidmap=0:0:65536 \
      --uidmap=+0:{{ homeassistant_user.uid }}:1 \
      --gidmap=0:0:65536 \
      --gidmap=+0:{{ homeassistant_user.group }}:1 \
      {{ homeassistant_unit_image.images[0] | quote }} true
    podman rm homeassistant-prestage
    touch {{ homeassistant_prestage_sentinel | quote }}
  args:
    executable: /bin/bash
    creates: "{{ homeassistant_prestage_sentinel }}"
  become: true
  tags:
    - homeassistant

- name: Enable homeassistant service
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: homeassistant
      condition: "{{ not (ansible_check_mode and (homeassistant_service_result.changed or homeassistant_user.changed)) }}"
      restart: "{{ homeassistant_service_result.changed or homeassistant_conf.changed or homeassistant_hacs_unpack.changed or homeassistant_config_files.changed or homeassistant_network_storage.changed }}"
  tags:
    - homeassistant

# sqlite3 CLI for the journal_mode probe + WAL conversion below.
# Each container ships its own libsqlite but the host-side PRAGMA
# tasks shell out to /usr/bin/sqlite3 which isn't preinstalled on
# Ubuntu cloud images. Prod gets it via healthchecks/fluentbit
# transitively; testrole.py runs only this role, so the dep is
# local.
- name: Install sqlite3 CLI
  apt:
    pkg: sqlite3
    cache_valid_time: 3600
  become: true
  tags:
    - homeassistant

# HA's recorder writes very heavily (every state change, every poll);
# ZHA's zigpy DB sees fewer writes but the same fsync amplification.
# WAL halves the per-commit fsync count and lets readers not block the
# writer. The mode is persisted in the DB header, so this is one-shot
# (probe returns 'wal' on subsequent applies). DBs are skipped if
# absent (first apply before HA has created them); the second apply
# after HA's first cold start lands the conversion.
- name: Read sqlite journal mode
  command: sqlite3 -readonly /mnt/services/sqlite/homeassistant/{{ item }} 'PRAGMA journal_mode;'
  register: homeassistant_sqlite_pragma
  changed_when: false
  failed_when: false
  become: true
  loop:
    - home-assistant_v2.db
    - zigbee.db
  loop_control:
    label: "{{ item }}"
  tags:
    - homeassistant

- name: Convert sqlite to WAL
  command: sqlite3 /mnt/services/sqlite/homeassistant/{{ item.item }} 'PRAGMA journal_mode=WAL;'
  when:
    - item.rc == 0
    - (item.stdout | default('') | trim) not in ['wal', '']
  changed_when: true
  become: true
  loop: "{{ homeassistant_sqlite_pragma.results }}"
  loop_control:
    label: "{{ item.item }}"
  tags:
    - homeassistant

- name: Configure nginx
  import_role:
    name: nginx
    tasks_from: site
  vars:
    nginx_site_args:
      subdomain: homeassistant
      proxy_pass: http://localhost:{{ service_ports.homeassistant }}/
      csp_additional: "connect-src tile.openstreetmap.org a.tile.openstreetmap.org b.tile.openstreetmap.org c.tile.openstreetmap.org {{ nginx_csp_default }}; img-src *.cartocdn.com *.home-assistant.io {{ nginx_csp_default }}"
      location_conf: |
        add_header Access-Control-Allow-Origin "https://brands.home-assistant.io";
  tags:
    - homeassistant

- name: Install vscode editor
  import_role:
    name: vscode
    tasks_from: module
  vars:
    vscode_user:
      uid: "{{ homeassistant_user.uid }}"
      group: "{{ homeassistant_user.group }}"
      changed: "{{ homeassistant_user.changed }}"
    vscode_name: vscode_ha
    vscode_path: vscode_ha
    vscode_subdomain: vscode_ha
    vscode_mount: /mnt/services/homeassistant
    vscode_workspace: homeassistant
    vscode_port: 3002
    vscode_csp_frame_ancestors: https://homeassistant.{{ inventory_hostname }}.{{ domain }}/ 'self'
  tags:
    - homeassistant
