- name: Create internal podman network
  # 10.123.4.96/30 — usable .97/.98. The earlier choice of .100/30
  # (.101/.102) collided with lab's host IP 10.123.4.102 on eth0.4
  # (host_vars/lab.yml: vlans.iot.addresses), and netavark
  # auto-assigned HA the colliding .102. Two MACs claiming the same
  # IP made every HA-originated frame on the IoT VLAN log as a martian
  # on the host. Keep this block clear of any address that lab itself
  # carries on the .4 VLAN.
  containers.podman.podman_network:
    name: iot_macvlan
    subnet: 10.123.4.96/30
    driver: macvlan
    opt:
      parent: iot
  become: true
  tags:
    - homeassistant

# Join the mosquitto-owned network so home-assistant can resolve `mosquitto`
# via aardvark-dns. See paperless/tasks/main.yml for the rationale.
- name: Create mosquitto podman network
  when: not ansible_check_mode
  containers.podman.podman_network:
    name: mosquitto
    disable_dns: false
    state: present
  become: true
  tags:
    - homeassistant

- name: Set up homeassistant system user, group, and config dir
  import_role:
    name: service_user
    tasks_from: user
  vars:
    service_user_args:
      name: homeassistant
  tags:
    - homeassistant

- name: Create sqlite directory
  when: not (ansible_check_mode and homeassistant_user.changed)
  file:
    dest: /mnt/services/sqlite/homeassistant
    state: directory
    owner: homeassistant
    group: homeassistant
    mode: "0755"
  become: true
  tags:
    - homeassistant

- name: Create homeassistant subdirectories
  when: not (ansible_check_mode and homeassistant_user.changed)
  file:
    dest: "/mnt/services/homeassistant/{{ item }}"
    state: directory
    owner: homeassistant
    group: homeassistant
    mode: "0755"
  become: true
  loop:
    - custom_templates
    - blueprints
    - blueprints/automation
    - www
    - custom_components
  tags:
    - homeassistant

# ZHA stores its zigbee.db under /config alongside YAML/automations. The
# recorder DB already lives on the sqlite dataset via /config/db; pull
# zigbee.db onto the same dataset by symlinking through /config/db so
# SQLite resolves the symlink before computing WAL placement. The symlink
# target is dangling on the host (no /config/db there) but resolves
# inside the container — force: true bypasses ansible's host-side check.
- name: Symlink ZHA zigbee.db onto sqlite dataset
  file:
    src: /config/db/zigbee.db
    dest: /mnt/services/homeassistant/zigbee.db
    state: link
    owner: homeassistant
    group: homeassistant
    follow: false
    force: true
  become: true
  tags:
    - homeassistant

# The influxdb integration is configured through HA's UI (not via
# configuration.yaml); the bootstrap tasks below still need to land
# the org/user/bucket/write-token that the UI integration consumes.
- name: Get influxdb org ID
  shell: set -euo pipefail; podman exec influxdb influx org list --name home --hide-headers | cut -f1
  args:
    executable: /bin/bash
  check_mode: false
  changed_when: false
  register: homeassistant_influxdb_org
  become: true
  tags:
    - homeassistant

- name: Create influxdb user
  check_mode: false
  shell: set -euo pipefail; ((podman exec influxdb influx user list --name homeassistant --hide-headers && echo >&2 "Found!") || ( {{ ansible_check_mode | ternary('echo TODO', 'podman exec influxdb influx user create --org-id ' + homeassistant_influxdb_org.stdout + ' --name homeassistant --hide-headers') }} )) | tr -s '\t' | cut -f1
  args:
    executable: /bin/bash
  changed_when: "'Found!' not in homeassistant_influxdb_user.stderr"
  register: homeassistant_influxdb_user
  become: true
  tags:
    - homeassistant

- name: Create influxdb bucket
  check_mode: false
  shell: set -euo pipefail; ((podman exec influxdb influx bucket list --org-id {{ homeassistant_influxdb_org.stdout }} --name homeassistant --hide-headers && echo >&2 "Found!") || ( {{ ansible_check_mode | ternary('echo TODO', 'podman exec influxdb influx bucket create --org-id ' + homeassistant_influxdb_org.stdout + ' --name homeassistant --hide-headers') }} )) | tr -s '\t' | cut -f1
  args:
    executable: /bin/bash
  changed_when: "'Found!' not in homeassistant_influxdb_bucket.stderr"
  register: homeassistant_influxdb_bucket
  become: true
  tags:
    - homeassistant

- name: Create influxdb auth
  check_mode: false
  shell: set -euo pipefail; ((podman exec influxdb influx auth list -u homeassistant | grep "{{ homeassistant_influxdb_user.stdout }}" | grep "\\[write:orgs/{{ homeassistant_influxdb_org.stdout }}/buckets/{{ homeassistant_influxdb_bucket.stdout }}\\]" && echo >&2 "Found!") || ( {{ ansible_check_mode | ternary('echo TODO', 'podman exec influxdb influx auth create --org-id ' + homeassistant_influxdb_org.stdout + ' --user homeassistant --write-bucket ' + homeassistant_influxdb_bucket.stdout + ' --hide-headers') }} )) | tr -s '\t' | cut -f2
  args:
    executable: /bin/bash
  changed_when: "'Found!' not in homeassistant_influxdb_auth.stderr"
  register: homeassistant_influxdb_auth
  become: true
  tags:
    - homeassistant

- name: Configure homeassistant
  template:
    src: configuration.yaml.j2
    dest: /mnt/services/homeassistant/configuration.yaml
    owner: homeassistant
    group: homeassistant
    mode: "0600"
    backup: true
    block_start_string: "<<%"
    block_end_string: "%>>"
    variable_start_string: "<<<"
    variable_end_string: ">>>"
  register: homeassistant_conf
  become: true
  tags:
    - homeassistant

- name: Configure homeassistant config files
  copy:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    owner: homeassistant
    group: homeassistant
    mode: "{{ item.mode | default('0600') }}"
    backup: true
  register: homeassistant_config_files
  become: true
  loop:
    - src: macros.jinja
      dest: /mnt/services/homeassistant/custom_templates/macros.jinja
    - src: sensors.yaml
      dest: /mnt/services/homeassistant/sensors.yaml
    - src: templates.yaml
      dest: /mnt/services/homeassistant/templates.yaml
    - src: blueprints/automation/hvac_dry_mode.yaml
      dest: /mnt/services/homeassistant/blueprints/automation/hvac_dry_mode.yaml
      mode: "0644"
  loop_control:
    label: "{{ item.dest }}"
  tags:
    - homeassistant

- name: Ensure files exist
  file:
    path: /mnt/services/homeassistant/{{ item }}
    owner: homeassistant
    group: homeassistant
    mode: "0600"
    state: touch
    modification_time: preserve
    access_time: preserve
  register: homeassistant_files
  become: true
  with_items:
    - automations.yaml
    - covers.yaml
    - scripts.yaml
    - scenes.yaml
  tags:
    - homeassistant

# unarchive's zip codepath shells out to /usr/bin/unzip; ubuntu cloud
# images don't ship it by default.
- name: Install unzip
  apt:
    pkg:
      - unzip
    cache_valid_time: 3600
  become: true
  tags:
    - homeassistant

- name: Install custom HA addons
  include_tasks: _install_addon.yml
  loop: "{{ homeassistant_addons }}"
  loop_control:
    loop_var: addon
    label: "{{ addon.name }}"
  tags:
    - homeassistant

- name: Install homeassistant service
  import_role:
    name: systemd_unit
    tasks_from: install
  vars:
    systemd_unit_args:
      src: homeassistant.service.j2
      condition: "{{ not (ansible_check_mode and homeassistant_user.changed) }}"
  tags:
    - homeassistant

# Pre-stage chown'd layers so the unit's `systemctl start` doesn't blow
# through TimeoutSec=120 doing the per-file ID-mapped copy on first
# extraction. The +0:N:1 uidmap-override pattern doesn't compose with
# idmapped mounts, so podman falls back to a copy regardless of kernel
# support; we just move the cost out of the deadline. The staging
# container is removed; cached chown'd layers stay in storage and are
# reused by the unit's later `podman run`. Image name is read back
# from the just-installed unit so it stays in sync with the template.
- name: Detect homeassistant unit image
  when: not ansible_check_mode
  extract_podman_image:
    name: homeassistant
  register: homeassistant_unit_image
  become: true
  tags:
    - homeassistant

- name: Pre-pull homeassistant image
  when: not ansible_check_mode
  containers.podman.podman_image:
    name: "{{ homeassistant_unit_image.images[0] }}"
  register: homeassistant_image_pull
  become: true
  tags:
    - homeassistant

- name: Pre-stage homeassistant chown'd layers
  when:
    - not ansible_check_mode
    - homeassistant_image_pull.changed
  shell: |
    set -euo pipefail
    podman create --replace --name homeassistant-prestage \
      --uidmap=0:0:65536 \
      --uidmap=+0:{{ homeassistant_user.uid }}:1 \
      --gidmap=0:0:65536 \
      --gidmap=+0:{{ homeassistant_user.group }}:1 \
      {{ homeassistant_unit_image.images[0] }} true
    podman rm homeassistant-prestage
  args:
    executable: /bin/bash
  become: true
  tags:
    - homeassistant

- name: Enable homeassistant service
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: homeassistant
      condition: "{{ not (ansible_check_mode and (systemd_unit.changed or homeassistant_user.changed)) }}"
      restart: "{{ systemd_unit.changed or homeassistant_conf.changed or (homeassistant_addons_changed | default(false)) or homeassistant_config_files.changed }}"
  tags:
    - homeassistant

# HA's recorder writes very heavily (every state change, every poll);
# ZHA's zigpy DB sees fewer writes but the same fsync amplification.
# WAL halves the per-commit fsync count and lets readers not block the
# writer. The mode is persisted in the DB header, so this is one-shot
# (probe returns 'wal' on subsequent applies). DBs are skipped if
# absent (first apply before HA has created them); the second apply
# after HA's first cold start lands the conversion.
- name: Read sqlite journal mode
  command: sqlite3 -readonly /mnt/services/sqlite/homeassistant/{{ item }} 'PRAGMA journal_mode;'
  register: homeassistant_sqlite_pragma
  changed_when: false
  failed_when: false
  become: true
  loop:
    - home-assistant_v2.db
    - zigbee.db
  loop_control:
    label: "{{ item }}"
  tags:
    - homeassistant

- name: Convert sqlite to WAL
  command: sqlite3 /mnt/services/sqlite/homeassistant/{{ item.item }} 'PRAGMA journal_mode=WAL;'
  when:
    - item.rc == 0
    - (item.stdout | default('') | trim) not in ['wal', '']
  become: true
  loop: "{{ homeassistant_sqlite_pragma.results }}"
  loop_control:
    label: "{{ item.item }}"
  tags:
    - homeassistant

- name: Configure nginx
  import_role:
    name: nginx
    tasks_from: site
  vars:
    nginx_site_args:
      subdomain: homeassistant
      proxy_pass: http://localhost:{{ service_ports.homeassistant }}/
      csp_additional: "connect-src *.openstreetmap.org {{ nginx_csp_default }}; img-src *.cartocdn.com *.home-assistant.io {{ nginx_csp_default }}"
      location_conf: |
        add_header Access-Control-Allow-Origin "https://brands.home-assistant.io";
  tags:
    - homeassistant

- name: Install vscode editor
  import_role:
    name: vscode
    tasks_from: module
  vars:
    vscode_user: "{{ homeassistant_user }}"
    vscode_name: vscode_ha
    vscode_path: vscode_ha
    vscode_subdomain: vscode_ha
    vscode_mount: /mnt/services/homeassistant
    vscode_workspace: homeassistant
    vscode_port: 3002
    vscode_csp_frame_ancestors: https://homeassistant.{{ inventory_hostname }}.{{ domain }}/ 'self'
  tags:
    - homeassistant
