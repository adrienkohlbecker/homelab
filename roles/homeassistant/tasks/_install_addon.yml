# Per-iteration include (NOT include_role with loop -- that binds vars
# once across iterations; see memory feedback_include_role_loop_vars).
# Inputs flow via the loop var `homeassistant_addon`. The version sentinel inside
# homeassistant_addon.dest lets a vars/main.yml bump trigger re-install without
# computing on-disk-content sha256 vs an expected literal; the prior
# per-artifact sha1-of-extracted-file approach worked but only one of
# the three artifacts ever used it (icons), so the asymmetry meant
# manual edits to HACS or thermal_comfort were never detected anyway.
- name: Create {{ homeassistant_addon.name }} install dir
  file:
    dest: "{{ homeassistant_addon.dest }}"
    state: directory
    owner: homeassistant
    group: homeassistant
    mode: "0755"
  become: true
  register: _homeassistant_addon_dir

- name: Read installed version of {{ homeassistant_addon.name }}
  command: cat {{ homeassistant_addon.dest }}/.installed-version
  register: _homeassistant_addon_installed
  changed_when: false
  failed_when: false
  check_mode: false
  become: true

- name: Install/update {{ homeassistant_addon.name }}
  when: (_homeassistant_addon_installed.stdout | default('') | trim) != homeassistant_addon.version
  become: true
  block:
    - name: Download {{ homeassistant_addon.name }} archive
      check_mode: false
      get_url:
        url: "{{ homeassistant_addon.url }}"
        checksum: "sha256:{{ homeassistant_addon.sha256 }}"
        dest: "/tmp/{{ homeassistant_addon.name }}.{{ homeassistant_addon.archive }}"
        mode: "0644"
        owner: root
        group: root

    - name: Unpack {{ homeassistant_addon.name }}
      when: not (ansible_check_mode and _homeassistant_addon_dir.changed)
      unarchive:
        src: "/tmp/{{ homeassistant_addon.name }}.{{ homeassistant_addon.archive }}"
        remote_src: true
        dest: "{{ homeassistant_addon.dest }}"
        mode: "a+rX"
        owner: homeassistant
        group: homeassistant
        list_files: true
        include: "{{ homeassistant_addon.include | default(omit) }}"
        extra_opts: "{{ homeassistant_addon.extra_opts | default(omit) }}"

    - name: Record installed version of {{ homeassistant_addon.name }}
      when: not (ansible_check_mode and _homeassistant_addon_dir.changed)
      copy:
        content: "{{ homeassistant_addon.version }}\n"
        dest: "{{ homeassistant_addon.dest }}/.installed-version"
        owner: homeassistant
        group: homeassistant
        mode: "0644"

    - name: Remove {{ homeassistant_addon.name }} archive
      file:
        path: "/tmp/{{ homeassistant_addon.name }}.{{ homeassistant_addon.archive }}"
        state: absent

    # Inside the install block so the flag is set only when this homeassistant_addon
    # actually entered the install path. The OR-chain in main.yml's
    # restart: line consumes it as a single trigger for all homeassistant_addons.
    - name: Mark restart trigger for {{ homeassistant_addon.name }}
      set_fact:
        homeassistant_homeassistant_addons_changed: true
