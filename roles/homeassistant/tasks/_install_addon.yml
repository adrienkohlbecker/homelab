# Per-iteration include (NOT include_role with loop -- that binds vars
# once across iterations; see memory feedback_include_role_loop_vars).
# Inputs flow via the loop var `addon`. The version sentinel inside
# addon.dest lets a vars/main.yml bump trigger re-install without
# computing on-disk-content sha256 vs an expected literal; the prior
# per-artifact sha1-of-extracted-file approach worked but only one of
# the three artifacts ever used it (icons), so the asymmetry meant
# manual edits to HACS or thermal_comfort were never detected anyway.
- name: Create {{ addon.name }} install dir
  file:
    dest: "{{ addon.dest }}"
    state: directory
    owner: homeassistant
    group: homeassistant
    mode: "0755"
  become: true
  register: _addon_dir

- name: Read installed version of {{ addon.name }}
  command: cat {{ addon.dest }}/.installed-version
  register: _addon_installed
  changed_when: false
  failed_when: false
  check_mode: false
  become: true

- name: Install/update {{ addon.name }}
  when: (_addon_installed.stdout | default('') | trim) != addon.version
  become: true
  block:
    - name: Download {{ addon.name }} archive
      check_mode: false
      get_url:
        url: "{{ addon.url }}"
        checksum: "sha256:{{ addon.sha256 }}"
        dest: "/tmp/{{ addon.name }}.{{ addon.archive }}"
        mode: "0644"
        owner: root
        group: root

    - name: Unpack {{ addon.name }}
      when: not (ansible_check_mode and _addon_dir.changed)
      unarchive:
        src: "/tmp/{{ addon.name }}.{{ addon.archive }}"
        remote_src: true
        dest: "{{ addon.dest }}"
        mode: "a+rX"
        owner: homeassistant
        group: homeassistant
        list_files: true
        include: "{{ addon.include | default(omit) }}"
        extra_opts: "{{ addon.extra_opts | default(omit) }}"

    - name: Record installed version of {{ addon.name }}
      when: not (ansible_check_mode and _addon_dir.changed)
      copy:
        content: "{{ addon.version }}\n"
        dest: "{{ addon.dest }}/.installed-version"
        owner: homeassistant
        group: homeassistant
        mode: "0644"

    - name: Remove {{ addon.name }} archive
      file:
        path: "/tmp/{{ addon.name }}.{{ addon.archive }}"
        state: absent

    # Inside the install block so the flag is set only when this addon
    # actually entered the install path. The OR-chain in main.yml's
    # restart: line consumes it as a single trigger for all addons.
    - name: Mark restart trigger for {{ addon.name }}
      set_fact:
        homeassistant_addons_changed: true
