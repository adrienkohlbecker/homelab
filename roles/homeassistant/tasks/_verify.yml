- name: _verify | Homeassistant unit is loaded and active
  systemd:
    name: homeassistant
  register: _homeassistant_unit
  failed_when: >-
    _homeassistant_unit.status.LoadState != "loaded"
    or _homeassistant_unit.status.ActiveState != "active"
  become: true

# HA falls back to "recovery mode" -- ignoring configuration.yaml entirely
# and reverting every option to its built-in default -- when it can't parse
# the config, e.g. a `!include` target the role forgot to pre-touch. That
# silently drops use_x_forwarded_for, so the nginx probe below fails with an
# opaque 400 (HA rejecting the proxied request); assert the real cause here
# first. Guards against a new `!include` landing in configuration.yaml
# without a matching stub in main.yml's "Ensure files exist" list.
- name: _verify | Homeassistant did not fall back to recovery mode
  command:
    argv:
      - journalctl
      - -u
      - homeassistant
      - -b
      - --no-pager
      - --grep=Activating recovery mode
  register: _homeassistant_recovery_mode
  changed_when: false
  failed_when: '"Activating recovery mode" in _homeassistant_recovery_mode.stdout'
  become: true

# Functional probe of HA itself. /manifest.json is the same endpoint
# the unit's --health-cmd polls, so a 200 here proves the container
# is serving on the published port -- not just that systemd called it
# active. Retry budget matches the unit's 100s start-period plus slack.
- name: _verify | Homeassistant answers /manifest.json on loopback
  uri:
    url: http://localhost:{{ service_ports.homeassistant }}/manifest.json
    status_code: 200
  register: _homeassistant_http
  retries: 60
  delay: 2
  until: _homeassistant_http.status == 200

# Exercise the nginx-proxied path too. A regression in the nginx_site
# wiring (typo'd subdomain, broken proxy_pass, CSP rewriting the
# response away) would pass the loopback probe above silently.
- name: _verify | Homeassistant answers /manifest.json via nginx vhost
  uri:
    url: https://localhost/manifest.json
    headers:
      Host: "homeassistant.{{ inventory_hostname }}.{{ domain }}"
    validate_certs: false
    status_code: 200
  register: _homeassistant_http_nginx
  retries: 30
  delay: 2
  until: _homeassistant_http_nginx.status == 200

# /config/zigbee.db must be a symlink to /config/db/zigbee.db inside the
# container so SQLite's WAL placement lands on the sqlite dataset bind
# mount, not the main config dataset. The target file itself may not
# exist (ZHA only writes it once configured); the link should.
- name: _verify | ZHA zigbee.db symlink resolves inside the container
  command: podman exec homeassistant readlink /config/zigbee.db
  register: _homeassistant_zigbee_link
  changed_when: false
  failed_when: _homeassistant_zigbee_link.stdout | trim != '/config/db/zigbee.db'
  become: true

# HA's mac_iot IP isn't pinned (vars/main.yml) — assert it
# falls inside the network's ip_range (the upper /29 of mac_iot's
# block; same derivation roles/macvlan/tasks/install.yml applies).
# Pulling the expected range from `macvlan_blocks` directly (not
# from the topology) keeps the check correct for both prod hosts
# (block in 10.123.x) and qemu test fixtures (block in qemu_subnet's
# 10.0.2.x, since netavark requires ip_range ⊂ parent's subnet).
- name: _verify | Homeassistant mac_iot IP is in this host's IoT /29
  vars:
    _mac_iot_block: "{{ (macvlan_blocks | selectattr('name', 'eq', 'mac_iot') | list | first).block }}"
    _expected_range: "{{ _mac_iot_block | ansible.utils.ipsubnet(_mac_iot_block | ansible.utils.ipaddr('prefix') | int + 1, 1) }}"
  command: >
    podman inspect homeassistant
    --format
    {% raw %}'{{ .NetworkSettings.Networks.mac_iot.IPAddress }}'{% endraw %}
  register: _homeassistant_macvlan_ip
  changed_when: false
  failed_when: not (_homeassistant_macvlan_ip.stdout | trim | ansible.utils.ipaddr(_expected_range))
  become: true

# The unit's ExecStartPost (pin_default_route.sh) down-ranks HA's mac_iot
# default only when a second default exists, so HA must always retain a
# usable route off-subnet. Assert egress isn't stranded -- the one failure
# mode of the route surgery. On box the macvlan is the only default and
# the script no-ops (single-default host), so this can't validate lab's
# "bridge wins" preference -- that's checked by hand on lab after deploy.
- name: _verify | Homeassistant retains off-subnet egress (route not stranded)
  command: podman exec homeassistant ip route get 1.1.1.1
  register: _homeassistant_ha_egress
  changed_when: false
  failed_when: _homeassistant_ha_egress.rc != 0 or 'dev ' not in _homeassistant_ha_egress.stdout
  become: true

# pin_default_route.sh's down-rank branch only fires when >1 default route
# exists. The fragility it guards is that netavark gives one network's
# default a low metric and the other's a high one, but which network lands
# low is tied to the ethN ordering, which isn't stable across hosts/boots --
# so the macvlan can end up as the preferred egress, routing off-IoT traffic
# (Marantz, WAN) out the IoT VLAN where the firewall drops it. Which branch
# box hits at boot is netavark's coin-flip, so to exercise the down-rank
# deterministically we synthesize the worst case here: flush HA's defaults,
# then install the mac_iot default at a *lower* (preferred) metric than the
# bridge so mac_iot wins egress, confirm that, run the real script, and
# assert it demoted mac_iot far enough that the bridge now wins. (Two
# defaults can't share a metric -- the route key is dst+metric -- so we use
# asymmetric metrics rather than a literal tie.) Gateways are read from
# podman so the check tracks whatever subnets/ethN netavark handed out. Edits
# the netns via nsenter from the host because HA has no CAP_NET_ADMIN -- the
# same reason the script does. Test-only route surgery; _verify never runs
# against prod and the box VM is torn down right after, so leaving HA on the
# post-script routes (bridge default still present) is fine.
- name: _verify | Pin_default_route down-ranks a preferred mac_iot default so the bridge wins
  shell: |
    set -euo pipefail
    {% raw %}
    pid="$(podman inspect -f "{{.State.Pid}}" homeassistant)"
    mac_gw="$(podman inspect homeassistant --format "{{.NetworkSettings.Networks.mac_iot.Gateway}}")"
    br_gw="$(podman inspect homeassistant --format "{{.NetworkSettings.Networks.mosquitto.Gateway}}")"
    nsenter -t "$pid" -n ip route flush default
    nsenter -t "$pid" -n ip route add default via "$br_gw" metric 100
    nsenter -t "$pid" -n ip route add default via "$mac_gw" metric 50
    pre="$(nsenter -t "$pid" -n ip -4 route get 1.1.1.1)"
    echo "before script (mac_iot preferred): $pre"
    case "$pre" in
      *"via $mac_gw"*) ;;
      *) echo "SETUP FAIL: mac_iot should win egress before the script, got: $pre" >&2; exit 1 ;;
    esac
    /opt/homeassistant/pin_default_route.sh "$mac_gw"
    post="$(nsenter -t "$pid" -n ip -4 route get 1.1.1.1)"
    echo "after script (bridge should win): $post"
    case "$post" in
      *"via $br_gw"*) ;;
      *) echo "FAIL: expected bridge gw $br_gw to win egress after down-rank, got: $post" >&2; exit 1 ;;
    esac
    {% endraw %}
  args:
    executable: /bin/bash
  register: _homeassistant_route_downrank
  changed_when: false
  become: true

# Functional HACS check: grep HA's journal for the loader's "We found
# a custom integration hacs" warning. That line fires when HA actually
# discovers HACS at startup, proving: HACS files visible inside the
# container, manifest.json parsed, integration registered with HA's
# loader. Stronger than stat'ing the bind-mount the role just wrote.
# --grep bounds journalctl's output so a long-running prod host
# doesn't dump megabytes into stdout.
- name: _verify | HA loader discovered HACS at startup
  command:
    argv:
      - journalctl
      - -u
      - homeassistant
      - -b
      - --no-pager
      - --grep=custom integration hacs
  register: _homeassistant_hacs_loaded
  changed_when: false
  retries: 30
  delay: 4
  until: _homeassistant_hacs_loaded.stdout | length > 0
  become: true

# Influxdb bootstrap artifacts. The main.yml tasks create user, bucket,
# and write-auth via idempotent query+create pairs; assert each landed
# by listing it back. Catches a regression in the from_json filters,
# the selectattr permission match, or a future influx-cli rename that
# breaks --json output.
- name: _verify | Influxdb homeassistant user exists
  command: podman exec influxdb influx user list --name homeassistant --json
  register: _homeassistant_influxdb_user
  changed_when: false
  failed_when: (_homeassistant_influxdb_user.stdout | from_json | length) == 0
  become: true

- name: _verify | Influxdb homeassistant bucket exists
  command: podman exec influxdb influx bucket list --name homeassistant --json
  register: _homeassistant_influxdb_bucket
  changed_when: false
  failed_when: (_homeassistant_influxdb_bucket.stdout | from_json | length) == 0
  become: true

- name: _verify | Cache influxdb homeassistant bucket record
  set_fact:
    _homeassistant_influxdb_bucket_rec: "{{ (_homeassistant_influxdb_bucket.stdout | from_json | first) }}"

# `influx auth list --json` emits permissions as bare strings (e.g.
# `write:orgs/<orgid>/buckets/<bucketid>`), not dicts. Match the
# bucket-scoped write permission anchored on BOTH org id and bucket
# id, matching bucket.yml's tightened detection regex -- a perm
# pointing at the same bucket id under a different org would not
# false-positive here.
- name: _verify | Influxdb write-auth on homeassistant bucket exists
  command: podman exec influxdb influx auth list --user homeassistant --json
  register: _homeassistant_influxdb_auth
  changed_when: false
  failed_when: >-
    (_homeassistant_influxdb_auth.stdout | from_json)
    | selectattr('permissions', 'defined')
    | map(attribute='permissions') | flatten
    | select('search', '^write:orgs/' ~ _homeassistant_influxdb_bucket_rec.orgID ~ '/buckets/' ~ _homeassistant_influxdb_bucket_rec.id ~ '$')
    | list | length == 0
  become: true

# WAL is set in main.yml via `PRAGMA journal_mode=WAL` on the two DBs.
# Re-read it here so a silent no-op (e.g. a BUSY-lock returning the
# requested mode without applying, or a sqlite-cli regression) doesn't
# pass apply but degrade the role's "WAL for write throughput" design.
# DBs are absent on first apply before HA writes them -- skip then.
- name: _verify | Stat sqlite DBs
  stat:
    path: /mnt/services/sqlite/homeassistant/{{ item }}
  register: _homeassistant_sqlite_dbs
  loop:
    - home-assistant_v2.db
    - zigbee.db
  loop_control:
    label: "{{ item }}"
  become: true

- name: _verify | Sqlite DBs are in WAL mode (when present)
  command: sqlite3 -readonly /mnt/services/sqlite/homeassistant/{{ item.item }} 'PRAGMA journal_mode;'
  register: _homeassistant_sqlite_wal
  changed_when: false
  failed_when: (_homeassistant_sqlite_wal.stdout | trim) != 'wal'
  loop: "{{ _homeassistant_sqlite_dbs.results }}"
  loop_control:
    label: "{{ item.item }}"
  when: item.stat.exists
  become: true
