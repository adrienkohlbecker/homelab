- name: _setup | Install podman
  import_role:
    name: podman
    tasks_from: install

- name: _setup | Install nginx
  import_role:
    name: _test
    tasks_from: nginx

- name: _setup | Create dummy iot interface
  # The role's macvlan network uses `iot` as its parent. Production hosts
  # have a real iot VLAN; test environments don't, so stand up a dummy
  # interface with the same name to satisfy the macvlan creation.
  shell: |
    set -euo pipefail
    if ip link show iot >/dev/null 2>&1; then
      echo "exists"
    else
      ip link add iot type dummy
      ip link set iot up
      echo "created"
    fi
  args:
    executable: /bin/bash
  register: iot_setup
  changed_when: '"created" in iot_setup.stdout'
  become: true

# Provision the mac_iot iface + podman network from host_vars'
# macvlan_blocks. In site.yml the macvlan role runs early in the
# play order so homeassistant's `--network=mac_iot` finds it
# already created; under testrole.py only the role-under-test runs,
# so we replay the dep here.
- name: _setup | Install macvlan
  import_role:
    name: macvlan

# Run the real influxdb role so the bootstrap exercises the same image
# tag + the same `home` org / default bucket the prod host runs against.
# Replaces a hand-rolled `podman run docker.io/influxdb:2.7.6` that
# drifted vs prod's 2.7.11 and hand-rolled DOCKER_INFLUXDB_INIT_* env.
- name: _setup | Install influxdb
  import_role:
    name: influxdb

# Pre-create the homeassistant influxdb tenant so main.yml's
# `Bootstrap influxdb tenant` call sees the bucket already there
# during the check-mode pass. Without this, check mode tries the
# conditional `influx bucket create` (which is a real podman exec
# the check-mode pass skips), then the subsequent post-create
# `bucket list ...` query fails with 404. Real applies are
# idempotent: this _setup pass creates the bucket once for real,
# main.yml's identical import_role no-ops the create.
- name: _setup | Pre-create homeassistant influxdb bucket for check-mode pass
  import_role:
    name: influxdb
    tasks_from: bucket
  vars:
    influxdb_bucket_args:
      org: home
      user: homeassistant
      bucket: homeassistant

# Provision a real mosquitto broker so _verify exercises HA's MQTT
# integration path end-to-end instead of joining a nameplate-only
# `mosquitto` network that no broker is listening on. Test fixture
# `group_vars/test.yml` already defines `mosquitto_accounts`.
- name: _setup | Install mosquitto
  import_role:
    name: mosquitto
