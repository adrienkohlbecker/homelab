- name: _setup | Install podman
  import_role:
    name: podman
    tasks_from: install

- name: _setup | Install nginx
  import_role:
    name: _test
    tasks_from: nginx

- name: _setup | Create dummy iot interface
  # The role's macvlan network uses `iot` as its parent. Production hosts
  # have a real iot VLAN; test environments don't, so stand up a dummy
  # interface with the same name to satisfy the macvlan creation.
  shell: |
    set -euo pipefail
    if ip link show iot >/dev/null 2>&1; then
      echo "exists"
    else
      ip link add iot type dummy
      ip link set iot up
      echo "created"
    fi
  args:
    executable: /bin/bash
  register: iot_setup
  changed_when: '"created" in iot_setup.stdout'
  become: true

# Run the real influxdb role so the bootstrap exercises the same image
# tag + the same `home` org / default bucket the prod host runs against.
# Replaces a hand-rolled `podman run docker.io/influxdb:2.7.6` that
# drifted vs prod's 2.7.11 and hand-rolled DOCKER_INFLUXDB_INIT_* env.
- name: _setup | Install influxdb
  import_role:
    name: influxdb
