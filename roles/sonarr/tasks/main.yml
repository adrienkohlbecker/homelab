- name: Assert sonarr_api_key is provided
  assert:
    that:
      - sonarr_api_key is defined
      - (sonarr_api_key | default('')) | length > 0
    fail_msg: >-
      sonarr_api_key is required (vaulted in group_vars/{prod,test}.yml). Without it
      config.xml renders an empty <ApiKey>, sonarr self-generates a random key on
      boot, and every intra-stack X-Api-Key consumer (bazarr, seerr, ...) silently
      breaks.
  tags:
    - sonarr

- name: Add media group
  import_role:
    name: media
    tasks_from: group
  tags:
    - sonarr

- name: Set up sonarr system user, group, and config dir
  import_role:
    name: service_user
    tasks_from: user
  vars:
    service_user_args:
      name: sonarr
      extra_groups: [ media ]
      # linuxserver/sonarr's s6 init recursively chowns /config to
      # PUID:PGID=sonarr:media on every container start. Match it here
      # so ansible doesn't flap the dir's gid back to `sonarr` each run.
      config_dir_group: media
  tags:
    - sonarr

# Sonarr hardcodes its DBs at /config/<name>.db and writes -wal/-shm next to
# the resolved path. Symlink at /config so SQLite resolves through to the
# 4K-recordsize sqlite dataset before computing WAL location. The symlink
# target matches the host path so it resolves identically inside the
# container (see matching --volume in sonarr.service.j2). pre_create plants
# empty files on a cold host so state=link doesn't refuse the dangling
# symlink before Sonarr creates the DBs on first boot.
- name: Pre-create sqlite dataset and symlink sonarr DBs onto it
  import_role:
    name: sqlite_dataset
    tasks_from: dataset
  vars:
    sqlite_dataset_args:
      name: sonarr
      owner: sonarr
      group: media
      mode: "0750"
      condition: "{{ not (ansible_check_mode and sonarr_user.changed) }}"
      pre_create: true
      links:
        - /mnt/services/sonarr/sonarr.db
        - /mnt/services/sonarr/logs.db
  tags:
    - sonarr

- name: Configure sonarr
  # Render via copy:content + rstrip_newlines because sonarr rewrites
  # config.xml on shutdown without a trailing newline; a plain template:
  # leaves us drifting forever.
  copy:
    content: "{{ lookup('template', 'config.xml.j2') | rstrip_newlines }}"
    dest: /mnt/services/sonarr/config.xml
    owner: sonarr
    group: media
    mode: "0600"
    backup: true
    validate: python3 -c 'import xml.etree.ElementTree as ET, sys; ET.parse(sys.argv[1])' "%s"
  register: sonarr_conf
  become: true
  # On a fresh-host --check run sonarr_user + its config dir are only reported
  # (their creating tasks are guarded), so an unguarded copy with owner=sonarr
  # would fail resolving the not-yet-created user/dir.
  when: not (ansible_check_mode and sonarr_user.changed)
  tags:
    - sonarr

- name: Install sonarr service
  import_role:
    name: systemd_unit
    tasks_from: install
  vars:
    systemd_unit_args:
      src: sonarr.service.j2
      condition: "{{ not (ansible_check_mode and sonarr_user.changed) }}"
  tags:
    - sonarr

- name: Pull sonarr image
  containers.podman.podman_image:
    name: "{{ sonarr_image }}"
  register: sonarr_image_pull
  retries: 3
  delay: 10
  until: sonarr_image_pull is not failed
  become: true
  tags:
    - sonarr

- name: Enable sonarr service
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: sonarr
      condition: "{{ not (ansible_check_mode and (sonarr_service_result.changed or sonarr_user.changed)) }}"
      restart: "{{ sonarr_service_result.changed or sonarr_conf.changed or sonarr_user.changed or media_group.changed }}"
  tags:
    - sonarr

- name: Configure nginx
  import_role:
    name: nginx
    tasks_from: site
  vars:
    nginx_site_args:
      subdomain: sonarr
      proxy_pass: http://127.0.0.1:{{ service_ports.sonarr }}/
      csp_additional: "connect-src plex.tv *.plex.tv {{ nginx_csp_default }}"
      # Browser admin gets forward-auth; sonarr's AuthenticationMethod=External
      # reads the X-Forwarded-User header the site template now forwards from
      # Authelia. Intra-stack peers (bazarr, seerr, etc.) reach sonarr
      # via sonarr.dns.podman:8989 carrying X-Api-Key, bypassing nginx
      # entirely.
      auth: required
  tags:
    - sonarr
