- name: Add sonarr group
  group:
    name: sonarr
    system: true
  become: true
  tags:
    - sonarr

- name: Add media group
  group:
    name: media
    system: true
  become: true
  register: media_group
  tags:
    - sonarr

- name: Add sonarr user
  user:
    name: sonarr
    group: sonarr
    groups: media
    createhome: false
    system: true
    shell: /usr/sbin/nologin
    home: /nonexistent
  become: true
  register: sonarr_user
  tags:
    - sonarr

- name: Create configuration directory
  when: not (ansible_check_mode and sonarr_user.changed)
  file:
    dest: /mnt/services/sonarr
    state: directory
    owner: sonarr
    group: media
    mode: "0755"
  become: true
  tags:
    - sonarr

- name: Create sqlite directory
  when: not (ansible_check_mode and sonarr_user.changed)
  file:
    dest: /mnt/services/sqlite/sonarr
    state: directory
    owner: sonarr
    group: media
    mode: "0755"
  become: true
  tags:
    - sonarr

# Sonarr hardcodes its DBs at /config/<name>.db and writes -wal/-shm next to
# the resolved path. Symlink at /config so SQLite resolves through to the
# 4K-recordsize sqlite dataset before computing WAL location. Symlink target
# matches the host path so it resolves identically inside the container (see
# matching --volume in sonarr.service.j2).
- name: Symlink sonarr SQLite DBs onto sqlite dataset
  when: not (ansible_check_mode and sonarr_user.changed)
  file:
    src: "/mnt/services/sqlite/sonarr/{{ item }}"
    dest: "/mnt/services/sonarr/{{ item }}"
    state: link
    owner: sonarr
    group: media
    follow: false
  become: true
  loop:
    - sonarr.db
    - logs.db
  tags:
    - sonarr

- name: Configure sonarr
  # Render via copy:content + regex_replace because sonarr rewrites
  # config.xml on shutdown without a trailing newline; a plain template:
  # leaves us drifting forever.
  copy:
    content: "{{ lookup('template', 'config.xml.j2') | regex_replace('\\n+$', '') }}"
    dest: /mnt/services/sonarr/config.xml
    owner: sonarr
    group: media
    mode: "0600"
    backup: true
  register: sonarr_conf
  become: true
  tags:
    - sonarr

- name: Install sonarr service
  import_role:
    name: systemd_unit
    tasks_from: template
  vars:
    systemd_unit_src: sonarr.service
    systemd_unit_condition: "{{ not (ansible_check_mode and sonarr_user.changed) }}"
  tags:
    - sonarr

- name: Enable sonarr service
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_src: sonarr
    systemd_unit_condition: "{{ not (ansible_check_mode and (systemd_unit.changed or sonarr_user.changed)) }}"
    systemd_unit_restart: "{{ systemd_unit.changed or sonarr_conf.changed }}"
  tags:
    - sonarr

- name: Configure nginx
  import_role:
    name: nginx
    tasks_from: site
  vars:
    nginx_subdomain: sonarr
    nginx_proxy_pass: http://localhost:8989/
    nginx_csp_additional: "connect-src plex.tv *.plex.tv {{ nginx_csp_default }}"
  tags:
    - sonarr
