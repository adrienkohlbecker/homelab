# Negative probe first: confirms /api/v3/* enforces the apikey. Pairs with the
# auth'd probe below -- together they prove the apikey we templated is both
# required by sonarr and the one it accepted. Without this, a future bug that
# disabled apikey enforcement would let the auth'd probe pass on any key.
- name: _verify | Sonarr /api/v3/system/status rejects unauth'd requests
  uri:
    url: http://127.0.0.1:{{ service_ports.sonarr }}/api/v3/system/status
    status_code: 401
  register: _sonarr_http_unauth
  retries: 30
  delay: 2
  until: _sonarr_http_unauth.status == 401

# Authenticated probe -- proves the apikey we templated into config.xml is
# the one the running container accepted, not just one we wrote to disk.
# Header form keeps the key out of journald.
- name: _verify | Sonarr answers /api/v3/system/status with our apikey
  uri:
    url: http://127.0.0.1:{{ service_ports.sonarr }}/api/v3/system/status
    headers:
      X-Api-Key: "{{ sonarr_api_key }}"
    status_code: 200
    return_content: true
  register: _sonarr_http
  retries: 30
  delay: 2
  until: _sonarr_http.status == 200
  failed_when: >-
    (_sonarr_http.json | default({})) | length == 0
    or (_sonarr_http.json | default({})).authentication | default('') != "external"

# The vhost is `auth: required`, so the real browser access pattern is an
# Authelia-gated UI -- the API path above is reached intra-stack via
# sonarr.dns.podman with X-Api-Key, bypassing nginx entirely. With the
# stub in gate mode (see _setup.yml), assert a cookieless GET / lands on
# nginx's error_page 401 =302 redirect to the portal. This is the only
# probe that fails if `auth: required` is dropped from nginx_site_args
# (the loopback apikey probes stay green without it). Asserting the 302
# returnUrl (rd=) echoes sonarr's own URL proves SNI routed to sonarr's
# server_name (not the default vhost) and the request URI survived.
#
# Map the vhost FQDN to loopback so SNI matches the served certificate.
# Probing https://localhost with a Host: header leaves SNI=localhost, which
# OpenSSL 3.x (noble/resolute) rejects as a fatal unrecognized_name alert
# (status -1); hitting the FQDN directly keeps SNI correct on every release.
- name: _verify | Map the sonarr vhost FQDN to loopback for SNI-correct probing
  lineinfile:
    path: /etc/hosts
    line: "127.0.0.1 sonarr.{{ inventory_hostname }}.{{ domain }}"
    state: present
  become: true

- name: _verify | Sonarr UI gate redirects unauthenticated requests to Authelia
  uri:
    url: https://sonarr.{{ inventory_hostname }}.{{ domain }}/
    validate_certs: false
    follow_redirects: none
    status_code: 302
  register: _sonarr_nginx_gate
  failed_when: >-
    _sonarr_nginx_gate.status != 302
    or 'auth.' not in (_sonarr_nginx_gate.location | default(''))
    or ('rd=https://sonarr.' ~ inventory_hostname ~ '.' ~ domain) not in (_sonarr_nginx_gate.location | default(''))

# Media-network join probe. Intra-stack peers (bazarr, seerr, sabnzbd) reach
# sonarr at sonarr.dns.podman:8989 with X-Api-Key, bypassing nginx entirely.
# The loopback/nginx probes above don't exercise that path -- a dropped
# `--network media` strands it while leaving them green. Probe from inside the
# running container: aardvark only answers *.dns.podman when the container
# actually joined `media`, so a keyless GET returning 401 proves DNS resolution
# + apikey enforcement over that path.
- name: _verify | Sonarr is reachable intra-stack at sonarr.dns.podman over the media network
  command: >-
    podman exec sonarr
    curl -s -o /dev/null -w '%{http_code}'
    http://sonarr.dns.podman:8989/api/v3/system/status
  become: true
  register: _verify_dns_podman
  changed_when: false
  retries: 15
  delay: 2
  until: _verify_dns_podman.rc == 0 and _verify_dns_podman.stdout == "401"

# Scratch is the pipeline bridge between the download client (sabnzbd) and
# sonarr's import process. A dropped --volume line strands imports silently --
# a wife-acceptance-factor failure that only surfaces when new episodes stop
# appearing. The loopback/API probes above stay green without it.
- name: _verify | Scratch volume is mounted inside the container
  command: >-
    podman exec sonarr
    test -d /scratch/sonarr
  become: true
  changed_when: false

# The sqlite_dataset symlink + matching --volume is the role's whole reason
# for its non-obvious structure: it lands the DBs (and their -wal/-shm
# siblings) on the 4K-recordsize sqlite dataset. The HTTP probes above pass
# whether or not that routing holds -- a dropped symlink or --volume strands
# the DB at /config inside the container and nothing here would notice.
# Assert it functionally: the on-disk paths are symlinks onto the dataset,
# and sonarr wrote real schema through them (the API answering 200 above
# means migration finished, so the dataset-side files are populated by now).
- name: _verify | Stat the sonarr DB paths
  stat:
    path: "/mnt/services/sonarr/{{ item }}"
  loop:
    - sonarr.db
    - logs.db
  register: _sonarr_db_links
  become: true

- name: _verify | Sonarr DBs are symlinks onto the sqlite dataset
  assert:
    that:
      - item.stat.islnk
      - item.stat.lnk_target == "/mnt/services/sqlite/sonarr/" ~ item.item
    fail_msg: "{{ item.item }} is not a symlink onto the sqlite dataset (stat={{ item.stat }})"
  loop: "{{ _sonarr_db_links.results }}"
  loop_control:
    label: "{{ item.item }}"

- name: _verify | Stat the dataset-side sonarr DBs
  stat:
    path: "/mnt/services/sqlite/sonarr/{{ item }}"
  loop:
    - sonarr.db
    - logs.db
  register: _sonarr_db_files
  become: true

- name: _verify | Sonarr wrote real, non-empty DBs onto the dataset
  assert:
    that:
      - item.stat.exists
      - not item.stat.islnk
      - item.stat.size > 0
    fail_msg: "{{ item.item }} on the dataset is missing or empty (stat={{ item.stat }})"
  loop: "{{ _sonarr_db_files.results }}"
  loop_control:
    label: "{{ item.item }}"

# config_dir_group: media (see main.yml) exists to stop ansible flapping
# /mnt/services/sonarr's gid back to `sonarr` against linuxserver's startup
# chown to PUID:PGID=sonarr:media. Assert the dir landed group `media` so a
# regression in that setting surfaces here, not as a silent per-converge flap.
- name: _verify | Stat the sonarr config dir
  stat:
    path: /mnt/services/sonarr
  register: _verify_config_dir
  become: true

- name: _verify | Sonarr config dir is group media
  assert:
    that:
      - _verify_config_dir.stat.gr_name == "media"
    fail_msg: "/mnt/services/sonarr is not group media (gr_name={{ _verify_config_dir.stat.gr_name }})"

# config.xml is the role's other fragile contract: sonarr rewrites it on
# every shutdown, so config.xml.j2's element order + casing must match
# sonarr's own writeback byte-for-byte or the next converge drifts and
# restart-churns forever. The idempotence pass can't catch this -- the
# harness never restarts sonarr between converges, so sonarr never rewrites
# the file. Force a clean shutdown+restart here, then assert our template
# still matches what sonarr wrote back.
- name: _verify | Restart sonarr to force a config.xml writeback
  systemd:
    name: sonarr
    state: restarted
  become: true

- name: _verify | Sonarr is back up after the restart
  uri:
    url: http://127.0.0.1:{{ service_ports.sonarr }}/api/v3/system/status
    headers:
      X-Api-Key: "{{ sonarr_api_key }}"
    status_code: 200
  register: _sonarr_http_postrestart
  retries: 60
  delay: 2
  until: _sonarr_http_postrestart.status == 200

- name: _verify | Render the config.xml our template would write
  set_fact:
    _sonarr_conf_expected: "{{ lookup('template', 'config.xml.j2') | regex_replace('\\n+$', '') }}"

- name: _verify | Read config.xml back after the writeback
  slurp:
    src: /mnt/services/sonarr/config.xml
  register: _sonarr_conf_ondisk
  become: true

- name: _verify | Templated config.xml survives sonarr's writeback without drift
  assert:
    that:
      - (_sonarr_conf_ondisk.content | b64decode) == _sonarr_conf_expected
    fail_msg: >-
      sonarr rewrote config.xml into a form config.xml.j2 no longer matches --
      its element order/casing drifted from sonarr's writeback, so deploying
      would restart-churn. Re-capture config.xml.j2 from a running instance.

- name: _verify | config.xml ownership survived writeback
  stat:
    path: /mnt/services/sonarr/config.xml
  register: _verify_conf_stat
  become: true

- name: _verify | config.xml is still owned sonarr:media mode 0600
  assert:
    that:
      - _verify_conf_stat.stat.pw_name == "sonarr"
      - _verify_conf_stat.stat.gr_name == "media"
      - _verify_conf_stat.stat.mode == "0600"
    fail_msg: >-
      sonarr's writeback changed config.xml ownership/mode from the ansible-applied
      sonarr:media 0600 (stat={{ _verify_conf_stat.stat }})
