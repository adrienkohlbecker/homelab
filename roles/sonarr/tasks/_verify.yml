# Negative probe first: confirms /api/v3/* enforces the apikey. Pairs with the
# auth'd probe below -- together they prove the apikey we templated is both
# required by sonarr and the one it accepted. Without this, a future bug that
# disabled apikey enforcement would let the auth'd probe pass on any key.
- name: _verify | Sonarr /api/v3/system/status rejects unauth'd requests
  uri:
    url: http://127.0.0.1:{{ service_ports.sonarr }}/api/v3/system/status
    status_code: 401
  register: _verify_http_unauth
  retries: 30
  delay: 2
  until: _verify_http_unauth.status == 401

# Authenticated probe -- proves the apikey we templated into config.xml is
# the one the running container accepted, not just one we wrote to disk.
# Header form keeps the key out of journald.
- name: _verify | Sonarr answers /api/v3/system/status with our apikey
  uri:
    url: http://127.0.0.1:{{ service_ports.sonarr }}/api/v3/system/status
    headers:
      X-Api-Key: "{{ sonarr_api_key }}"
    status_code: 200
    return_content: true
  register: _verify_http
  retries: 30
  delay: 2
  until: _verify_http.status == 200
  failed_when: (_verify_http.json | default({})) | length == 0

# The vhost is `auth: required`, so the real browser access pattern is an
# Authelia-gated UI -- the API path above is reached intra-stack via
# sonarr.dns.podman with X-Api-Key, bypassing nginx entirely. With the
# stub in gate mode (see _setup.yml), assert a cookieless GET / lands on
# nginx's error_page 401 =302 redirect to the portal. This is the only
# probe that fails if `auth: required` is dropped from nginx_site_args
# (the loopback apikey probes stay green without it). Asserting the 302
# returnUrl (rd=) echoes sonarr's own URL proves the Host header routed to
# sonarr's server_name (not the default vhost) and the request URI survived.
- name: _verify | Sonarr UI gate redirects unauthenticated requests to Authelia
  uri:
    url: https://localhost/
    headers:
      Host: "sonarr.{{ inventory_hostname }}.{{ domain }}"
    validate_certs: false
    follow_redirects: none
    status_code: 302
  register: _verify_nginx_gate
  failed_when: >-
    _verify_nginx_gate.status != 302
    or 'auth.' not in (_verify_nginx_gate.location | default(''))
    or ('rd=https://sonarr.' ~ inventory_hostname ~ '.' ~ domain) not in (_verify_nginx_gate.location | default(''))

# The sqlite_dataset symlink + matching --volume is the role's whole reason
# for its non-obvious structure: it lands the DBs (and their -wal/-shm
# siblings) on the 4K-recordsize sqlite dataset. The HTTP probes above pass
# whether or not that routing holds -- a dropped symlink or --volume strands
# the DB at /config inside the container and nothing here would notice.
# Assert it functionally: the on-disk paths are symlinks onto the dataset,
# and sonarr wrote real schema through them (the API answering 200 above
# means migration finished, so the dataset-side files are populated by now).
- name: _verify | Stat the sonarr DB paths
  stat:
    path: "/mnt/services/sonarr/{{ item }}"
  loop:
    - sonarr.db
    - logs.db
  register: _verify_db_links
  become: true

- name: _verify | Sonarr DBs are symlinks onto the sqlite dataset
  assert:
    that:
      - item.stat.islnk
      - item.stat.lnk_target == "/mnt/services/sqlite/sonarr/" ~ item.item
    fail_msg: "{{ item.item }} is not a symlink onto the sqlite dataset (stat={{ item.stat }})"
  loop: "{{ _verify_db_links.results }}"
  loop_control:
    label: "{{ item.item }}"

- name: _verify | Stat the dataset-side sonarr DBs
  stat:
    path: "/mnt/services/sqlite/sonarr/{{ item }}"
  loop:
    - sonarr.db
    - logs.db
  register: _verify_db_files
  become: true

- name: _verify | Sonarr wrote real, non-empty DBs onto the dataset
  assert:
    that:
      - item.stat.exists
      - not item.stat.islnk
      - item.stat.size > 0
    fail_msg: "{{ item.item }} on the dataset is missing or empty (stat={{ item.stat }})"
  loop: "{{ _verify_db_files.results }}"
  loop_control:
    label: "{{ item.item }}"

# config.xml is the role's other fragile contract: sonarr rewrites it on
# every shutdown, so config.xml.j2's element order + casing must match
# sonarr's own writeback byte-for-byte or the next converge drifts and
# restart-churns forever. The idempotence pass can't catch this -- the
# harness never restarts sonarr between converges, so sonarr never rewrites
# the file. Force a clean shutdown+restart here, then assert our template
# still matches what sonarr wrote back.
- name: _verify | Restart sonarr to force a config.xml writeback
  systemd:
    name: sonarr
    state: restarted
  become: true

- name: _verify | Sonarr is back up after the restart
  uri:
    url: http://127.0.0.1:{{ service_ports.sonarr }}/api/v3/system/status
    headers:
      X-Api-Key: "{{ sonarr_api_key }}"
    status_code: 200
  register: _verify_http_postrestart
  retries: 60
  delay: 2
  until: _verify_http_postrestart.status == 200

- name: _verify | Render the config.xml our template would write
  set_fact:
    _verify_conf_expected: "{{ lookup('template', 'config.xml.j2') | regex_replace('\\n+$', '') }}"

- name: _verify | Read config.xml back after the writeback
  slurp:
    src: /mnt/services/sonarr/config.xml
  register: _verify_conf_ondisk
  become: true

- name: _verify | Templated config.xml survives sonarr's writeback without drift
  assert:
    that:
      - (_verify_conf_ondisk.content | b64decode) == _verify_conf_expected
    fail_msg: >-
      sonarr rewrote config.xml into a form config.xml.j2 no longer matches --
      its element order/casing drifted from sonarr's writeback, so deploying
      would restart-churn. Re-capture config.xml.j2 from a running instance.
