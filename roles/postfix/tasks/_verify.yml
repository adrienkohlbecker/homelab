# Post-converge functional check (harness-only, never site.yml). We can't
# exercise the live Mailgun relay from the qemu fixture (test/ creds are
# `changeme`, no outbound), so assert the wiring instead: the config parses with
# no warnings, the effective postconf parameters are what the template intended,
# a postmap lookup of the relayhost key against the texthash sasl map resolves to
# the rendered credential (exercises vault substitution + the map type, not just
# that a literal appears in the file), the sender-rewrite map resolves, the
# root/operator aliases resolve to root_email, mailutils sends from email_domain,
# and -- the one live exercise -- a locally injected `root` message is qualified
# to root@$mydomain (proves myorigin works, not just that it is set in the file).
- name: _verify | Postfix configuration parses with no warnings
  command: postfix check
  register: _postfix_check
  # `postfix check` exits 0 even when it prints `warning:` lines (unknown
  # parameter, bad permissions), so gate on stderr too, not just the rc.
  failed_when: _postfix_check.rc != 0 or (_postfix_check.stderr | length > 0)
  changed_when: false
  become: true

# Expected effective config, keyed by parameter name. Defined once and reused
# for both the postconf query and the assertion, so the query order and the
# checks can't silently drift apart (the failure mode of positional indexing).
- name: _verify | Build the expected effective-config map
  set_fact:
    _postfix_expected:
      relayhost: "[{{ smtp_host }}]:{{ smtp_port }}"
      inet_interfaces: loopback-only
      myorigin: "{{ domain }}"
      smtp_sasl_password_maps: texthash:/etc/postfix/sasl_passwd
      smtp_tls_security_level: "{{ 'secure' if (smtp_use_ssl | bool or smtp_use_tls | bool) else 'none' }}"
      smtp_sasl_auth_enable: "yes"
      smtp_tls_mandatory_protocols: ">=TLSv1.2"
      smtp_tls_mandatory_ciphers: high
      smtp_generic_maps: texthash:/etc/postfix/generic

# -h suppresses parameter names; -x expands $name refs so `myorigin = $mydomain`
# reads back as the literal domain. Output order matches the argument order.
- name: _verify | Read back effective postfix parameters
  command: postconf -hx {{ _postfix_expected.keys() | list | join(' ') }}
  register: _postfix_conf
  changed_when: false
  become: true

- name: _verify | Query the SASL map for the relayhost key
  command: postmap -q "[{{ smtp_host }}]:{{ smtp_port }}" texthash:/etc/postfix/sasl_passwd
  register: _postfix_sasl
  changed_when: false
  become: true

- name: _verify | Query the sender-rewrite map for the local domain
  command: postmap -q @{{ domain }} texthash:/etc/postfix/generic
  register: _postfix_generic
  changed_when: false
  become: true

- name: _verify | Effective config matches the templated relay intent
  assert:
    that:
      - item.1 == item.2
    fail_msg: >-
      postfix parameter {{ item.0 }} drifted from the template: expected
      "{{ item.1 }}", got "{{ item.2 }}".
  loop: >-
    {{ _postfix_expected.keys() | list
       | zip(_postfix_expected.values() | map('string') | list, _postfix_conf.stdout_lines)
       | list }}
  loop_control:
    label: "{{ item.0 }}"

- name: _verify | Credential and sender-rewrite map lookups resolve
  assert:
    that:
      - _postfix_sasl.stdout == postfix_smtp_user ~ ':' ~ postfix_smtp_password
      - _postfix_generic.stdout == inventory_hostname ~ '@' ~ email_domain
    fail_msg: >-
      texthash lookup drifted: the SASL map must resolve the relayhost key to
      {{ postfix_smtp_user }}:<password>, and the generic map must rewrite
      @{{ domain }} to {{ inventory_hostname }}@{{ email_domain }}.

- name: _verify | Resolve the root and operator aliases
  command: postmap -q {{ item }} hash:/etc/aliases
  loop:
    - root
    - "{{ operator_user }}"
  register: _postfix_alias
  changed_when: false
  become: true

- name: _verify | Read back the mailutils sender domain
  slurp:
    src: /etc/mailutils.conf
  register: _postfix_mailutils
  become: true

- name: _verify | Aliases resolve to root_email and mailutils sends from email_domain
  assert:
    that:
      - _postfix_alias.results[0].stdout == root_email
      - _postfix_alias.results[1].stdout == root_email
      - ('email-domain ' ~ email_domain) in (_postfix_mailutils.content | b64decode)
    fail_msg: >-
      alias/mailutils wiring drifted: root and {{ operator_user }} must alias to
      root_email ({{ root_email }}), and /etc/mailutils.conf must set
      email-domain {{ email_domain }}. alias lookups:
      {{ _postfix_alias.results | map(attribute='stdout') | list }}.

# Live exercise of myorigin: a bare `root` sender (the shape cron/smartd/fail2ban
# use) must be qualified to root@$mydomain. Inject one message and read the
# qualified envelope sender that qmgr logs to the journal -- that line is written
# when the message reaches the active queue and persists regardless of the
# (always-failing, no real Mailgun) delivery attempt, so the check is race-free.
- name: _verify | Inject a local root-origin probe message
  command: /usr/sbin/sendmail -i root
  args:
    stdin: |
      Subject: postfix _verify sender-qualification probe

      probe
  changed_when: false
  become: true

- name: _verify | Probe's envelope sender was qualified to root@domain
  command: journalctl -t postfix/qmgr --no-pager
  register: _postfix_qmgr
  until: ('from=<root@' ~ domain ~ '>') in _postfix_qmgr.stdout
  retries: 10
  delay: 1
  changed_when: false
  become: true

- name: _verify | Drain the probe from the queue
  command: postsuper -d ALL
  changed_when: false
  become: true
