# Required inputs live in group_vars (vaulted in prod.yml) and the role asserts
# them per CLAUDE.md. A mistyped/empty vault key renders sasl_passwd as
# `[host]:587 user:` -- postfix accepts it, converges green, then silently fails
# SASL auth at Mailgun, so every cron/fail2ban/smartd alert is lost. A non-empty
# check (not just `is defined`) is what catches the empty-string case.
- name: Assert required postfix relay inputs are set
  assert:
    that:
      - postfix_smtp_user | default('') | length > 0
      - postfix_smtp_password | default('') | length > 0
      - smtp_host | default('') | length > 0
      - smtp_port | default('') | string | length > 0
      - email_domain | default('') | length > 0
      - root_email | default('') | length > 0
      - operator_user | default('') | length > 0
      - domain | default('') | length > 0
    fail_msg: >-
      One of postfix_smtp_user, postfix_smtp_password, smtp_host, smtp_port,
      email_domain, root_email, operator_user, domain is unset or empty. Set
      them in group_vars/{prod,test}.yml (postfix_smtp_password is vaulted); see
      the task comment for why an empty value is rejected rather than just
      undefined.
  tags:
    - postfix

# policy_rc_d: 101 stops dpkg from auto-starting postfix mid-install before its
# config is templated; it is a harmless no-op for libsasl2-modules/mailutils
# (neither ships a daemon to suppress).
- name: Install postfix, libsasl2 (TLS auth) and mailutils (sending mail)
  apt:
    pkg:
      - postfix
      - libsasl2-modules
      - mailutils
    policy_rc_d: 101
    cache_valid_time: 3600
  register: postfix_apt
  become: true
  tags:
    - postfix

# No inline validate: `postfix check`/`postconf` parse the live /etc/postfix
# directory, not ansible's temp `%s` file, so they can't validate the staged
# render. The real parse-check runs post-converge in _verify.yml.
- name: Postfix relay configuration
  template:
    src: main.cf.j2
    dest: /etc/postfix/main.cf
    owner: root
    group: root
    mode: "0644"
    backup: true
    validate: python3 -c 'import sys; sys.exit(0 if any(l.startswith("relayhost =") for l in open(sys.argv[1])) else 1)' %s
  become: true
  register: postfix_cfg
  tags:
    - postfix

- name: Install Sasl authentication details
  template:
    src: sasl_passwd.j2
    dest: /etc/postfix/sasl_passwd
    owner: root
    group: root
    mode: "0600"
    backup: true
    validate: grep -qE '^[^[:space:]]+[[:space:]]+[^[:space:]]+:[^[:space:]]+$' %s
  become: true
  register: postfix_sasl_auth
  tags:
    - postfix

- name: Install outbound sender rewriting map
  template:
    src: generic.j2
    dest: /etc/postfix/generic
    owner: root
    group: root
    mode: "0644"
    backup: true
    validate: grep -qE '^[^[:space:]]+[[:space:]]+[^[:space:]]+$' %s
  become: true
  register: postfix_generic
  tags:
    - postfix

- name: Enable postfix
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: postfix
      condition: "{{ not (ansible_check_mode and postfix_apt.changed) }}"
      restart: "{{ postfix_cfg.changed or postfix_sasl_auth.changed or postfix_generic.changed or postfix_apt.changed }}"
  tags:
    - postfix

- name: Setup user email aliases
  template:
    src: aliases.j2
    dest: /etc/aliases
    owner: root
    group: root
    mode: "0644"
    backup: true
    validate: python3 -c 'import sys; sys.exit(1 if any(":" not in l for l in open(sys.argv[1]) if l.strip() and not l.lstrip().startswith("#")) else 0)' %s
  become: true
  register: postfix_aliases
  tags:
    - postfix

- name: Rebuild aliases database
  command: newaliases
  become: true
  when: postfix_aliases.changed
  changed_when: true
  tags:
    - postfix

- name: Install the mailutils sender-domain config
  template:
    src: mailutils.conf.j2
    dest: /etc/mailutils.conf
    mode: "0644"
    backup: true
    validate: grep -qE '^address[[:space:]]*\{' %s
  become: true
  tags:
    - postfix
