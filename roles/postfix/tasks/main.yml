- name: Install postfix
  apt:
    pkg:
      - postfix
    policy_rc_d: 101
    cache_valid_time: 3600
  register: postfix_apt
  become: true
  tags:
    - postfix

- name: Install libsasl2 (for postfix TLS authentication) and mailutils (for sending emails)
  apt:
    pkg:
      - libsasl2-modules
      - mailutils
    cache_valid_time: 3600
  become: true
  tags:
    - postfix

- name: Postfix relay configuration
  template:
    src: main.cf.j2
    dest: /etc/postfix/main.cf
    owner: root
    group: root
    mode: "0644"
    backup: true
  become: true
  register: postfix_cfg
  tags:
    - postfix

- name: Install Sasl authentication details
  template:
    src: sasl_passwd.j2
    dest: /etc/postfix/sasl_passwd
    owner: root
    group: root
    mode: "0600"
    backup: true
  become: true
  register: sasl_auth
  tags:
    - postfix

- name: Update postfix credentials
  command: postmap /etc/postfix/sasl_passwd
  changed_when: true
  become: true
  when: sasl_auth.changed
  tags:
    - postfix

- name: Enable postfix
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: postfix
      condition: "{{ not (ansible_check_mode and postfix_apt.changed) }}"
      restart: "{{ postfix_cfg.changed or sasl_auth.changed }}"
  tags:
    - postfix

- name: Setup user email aliases
  template:
    src: aliases.j2
    dest: /etc/aliases
    owner: root
    group: root
    mode: "0644"
    backup: true
  become: true
  register: aliases
  tags:
    - postfix

- name: Rebuild aliases database
  command: newaliases
  become: true
  when: aliases.changed
  changed_when: true
  tags:
    - postfix

- name: Copy the mail config
  template:
    src: mailutils.conf.j2
    dest: /etc/mailutils.conf
    mode: "0755"
    backup: true
  become: true
  tags:
    - postfix
