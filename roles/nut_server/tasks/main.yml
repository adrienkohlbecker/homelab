# nut_server runs on every home host (site.yml, all:!bunk:!fox), not just
# lab: each host independently SNMP-polls the one Eaton UPS and exposes its
# own upsd, so no host depends on a single NUT server being up. Active
# shutdown-on-power-loss is eaton_ipp's job (per-host vendor daemon); this
# upsd serves Home Assistant (on lab) + operator `upsc`, and is the standing
# base for a future per-host upsmon (nut_monitor) — which is why it is
# deliberately not gated to lab alone.

- name: Assert required nut secrets are set
  assert:
    that:
      - nut_upsmon_password is defined and (nut_upsmon_password | length > 0)
      - nut_homeassistant_password is defined and (nut_homeassistant_password | length > 0)
    fail_msg: >-
      nut_upsmon_password and nut_homeassistant_password must be set
      (group_vars/{prod,test}.yml); upsd.users renders them verbatim.
  tags:
    - nut_server

- name: Install nut
  apt:
    pkg:
      - nut-snmp
      - nut-cgi
      - fcgiwrap
    cache_valid_time: 3600
  become: true
  register: nut_server_apt
  tags:
    - nut_server

- name: Configure nut nut.conf
  when: not (ansible_check_mode and nut_server_apt.changed)
  copy:
    src: nut.conf
    dest: /etc/nut/nut.conf
    backup: true
    owner: root
    group: nut
    mode: "0640"
  become: true
  register: nut_server_nut_conf
  tags:
    - nut_server

- name: Configure nut ups.conf
  when: not (ansible_check_mode and nut_server_apt.changed)
  template:
    src: ups.conf.j2
    dest: /etc/nut/ups.conf
    owner: root
    group: nut
    mode: "0640"
    backup: true
    # ups.conf's global `maxretry` precedes the first [section], so a parse
    # needs configparser's allow_unnamed_section (Python 3.13+). jammy (3.10)
    # / noble (3.12) lack it — skip validation there (omit) rather than
    # duplicate the task; blacklist so future releases validate automatically.
    validate: "{{ nut_server_ups_validate if ansible_distribution_release not in ['jammy', 'noble'] else omit }}"
  vars:
    nut_server_ups_validate: >-
      python3 -c 'import configparser; configparser.ConfigParser(allow_no_value=True, allow_unnamed_section=True).read("%s")'
  register: nut_server_ups_conf
  become: true
  tags:
    - nut_server

- name: Configure nut upsd.conf
  when: not (ansible_check_mode and nut_server_apt.changed)
  template:
    src: upsd.conf.j2
    dest: /etc/nut/upsd.conf
    backup: true
    owner: root
    group: nut
    mode: "0640"
  become: true
  register: nut_server_upsd_conf
  tags:
    - nut_server

- name: Configure nut upsd.users
  when: not (ansible_check_mode and nut_server_apt.changed)
  template:
    src: upsd.users.j2
    dest: /etc/nut/upsd.users
    owner: root
    group: nut
    mode: "0640"
    backup: true
    validate: python3 -c 'import configparser; configparser.ConfigParser(allow_no_value=True).read("%s")'
  become: true
  register: nut_server_upsd_users
  tags:
    - nut_server

- name: Configure nut hosts.conf
  when: not (ansible_check_mode and nut_server_apt.changed)
  copy:
    src: hosts.conf
    dest: /etc/nut/hosts.conf
    backup: true
    owner: root
    group: root
    mode: "0644"
  become: true
  tags:
    - nut_server

- name: Configure nut upsset.conf
  when: not (ansible_check_mode and nut_server_apt.changed)
  copy:
    src: upsset.conf
    dest: /etc/nut/upsset.conf
    backup: true
    owner: root
    group: root
    mode: "0644"
  become: true
  tags:
    - nut_server

- name: Enable nut-driver service
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      # jammy (2.7.4) ships a single nut-driver.service; 2.8+ uses the
      # nut-driver@<ups> instance template. Key on the release codename,
      # matching the ups.conf validate blacklist above (not major-version).
      src: '{{ "nut-driver" if ansible_distribution_release in ["jammy"] else "nut-driver@eaton" }}'
      condition: "{{ not (ansible_check_mode and nut_server_apt.changed) }}"
      restart: "{{ nut_server_nut_conf.changed or nut_server_ups_conf.changed }}"
      start: "{{ not qemu_test }}"
  tags:
    - nut_server

- name: Enable nut-server service
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: nut-server
      condition: "{{ not (ansible_check_mode and nut_server_apt.changed) }}"
      restart: "{{ nut_server_nut_conf.changed or nut_server_upsd_conf.changed or nut_server_upsd_users.changed }}"
      start: "{{ not qemu_test }}" # TODO: no hardware UPS to talk to
  tags:
    - nut_server

- name: Configure nginx
  import_role:
    name: nginx
    tasks_from: site
  vars:
    nginx_site_args:
      subdomain: nut
      auth: required
      server_conf: |
        location = / {
          return 301 /upsstats.cgi;
        }
      location_conf: |
        gzip off;
        root /usr/lib/cgi-bin/nut;

        include /etc/nginx/fastcgi_params;

        fastcgi_pass  unix:/var/run/fcgiwrap.socket;
        fastcgi_param SCRIPT_FILENAME  /usr/lib/cgi-bin/nut$fastcgi_script_name;
  tags:
    - nut_server
