- name: _verify | openobserve user exists
  command: getent passwd openobserve
  changed_when: false
  become: true

- name: _verify | openobserve config dir exists
  stat:
    path: /mnt/services/openobserve
  register: _verify_config_dir
  failed_when: not _verify_config_dir.stat.exists or _verify_config_dir.stat.pw_name != 'openobserve'
  become: true

- name: _verify | openobserve sqlite dir exists
  stat:
    path: /mnt/services/sqlite/openobserve
  register: _verify_sqlite_dir
  failed_when: not _verify_sqlite_dir.stat.exists or _verify_sqlite_dir.stat.pw_name != 'openobserve'
  become: true

- name: _verify | openobserve.service is loaded and active
  systemd:
    name: openobserve
  register: _verify_unit
  failed_when: >-
    _verify_unit.status.LoadState != "loaded"
    or _verify_unit.status.ActiveState != "active"
  become: true

- name: _verify | openobserve answers /healthz on its loopback port
  uri:
    url: http://localhost:{{ service_ports.openobserve }}/healthz
    status_code: 200
  register: _verify_http
  retries: 30
  delay: 2
  until: _verify_http.status == 200
