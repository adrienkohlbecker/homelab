# Site datasets carried under tank/ on every zfs_root host that runs this
# role. The dict-list shape is consumed by both tasks/main.yml (looped
# into the zfs/tasks_from: dataset helper) and tasks/_verify.yml (looped
# into zfs get assertions), so a new site is one line that updates both
# halves.
data_datasets:
  - { name: data, mountpoint: /mnt/data }
  - { name: brumath, mountpoint: /mnt/brumath }
  - { name: eckwersheim, mountpoint: /mnt/eckwersheim }

# Extra zfs properties applied to every site dataset.
#
# autobackup:bak=true tags the dataset for zfs-autobackup; the picker
# filters with `-s local` -- see _verify.yml's header for why source
# matters here.
#
# special_small_blocks=32K routes records <=32K to the pool's special
# (allocation-class) vdev; pairs with the default 128K recordsize.
# Inert today on tank (no special vdev) and rpool (single-disk), kept
# set so existing data already lands on the special vdev the day one
# attaches. roles/media uses the same 32K threshold paired with a 1MB
# recordsize, making the threshold proportionally stronger.
data_extra_properties:
  'autobackup:bak': 'true'
  special_small_blocks: '32768'

# Resolves the host's tank pool name. Stays in sync with the
# `default('tank')` in roles/zfs/tasks/dataset.yml:55 -- both must agree
# or _verify checks a pool that main.yml didn't create.
data_pool: "{{ zfs_tank_filesystem | default('tank') }}"
