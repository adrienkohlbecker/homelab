- name: Configure zfs datasets
  include_role:
    name: zfs
    tasks_from: dataset
  loop:
    - dataset: tank/data
      mountpoint: /mnt/data
      extra_properties:
        'autobackup:bak': 'true'
        special_small_blocks: '32768'
    - dataset: tank/brumath
      mountpoint: /mnt/brumath
      mode: '0775'
      extra_properties:
        'autobackup:bak': 'true'
        special_small_blocks: '32768'
    - dataset: tank/eckwersheim
      mountpoint: /mnt/eckwersheim
      mode: '0775'
      extra_properties:
        'autobackup:bak': 'true'
        special_small_blocks: '32768'
  loop_control:
    loop_var: data_item
    label: '{{ data_item.dataset }}'
  vars:
    zfs_dataset: '{{ data_item.dataset }}'
    zfs_dataset_mountpoint: '{{ data_item.mountpoint }}'
    zfs_dataset_mode: "{{ data_item.mode | default(omit) }}"
    zfs_dataset_extra_properties: "{{ data_item.extra_properties | default(omit) }}"
  tags:
    - data
