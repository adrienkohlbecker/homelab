- name: Configure each shared dataset
  include_role:
    name: zfs
    tasks_from: dataset
    apply:
      tags: data
  loop:
    - data
    - brumath
    - eckwersheim
  loop_control:
    loop_var: data_item
  vars:
    zfs_dataset: '{{ zfs_tank_filesystem }}/{{ data_item }}'
    zfs_dataset_mountpoint: '/mnt/{{ data_item }}'
    zfs_dataset_extra_properties:
      'autobackup:bak': 'true'
  tags:
    - data
