- name: Configure tank/data dataset
  import_role:
    name: zfs
    tasks_from: dataset
  vars:
    zfs_dataset_args:
      dataset: tank/data
      mountpoint: /mnt/data
      extra_properties:
        'autobackup:bak': 'true'
        special_small_blocks: '32768'
  tags:
    - data

- name: Configure tank/brumath dataset
  import_role:
    name: zfs
    tasks_from: dataset
  vars:
    zfs_dataset_args:
      dataset: tank/brumath
      mountpoint: /mnt/brumath
      mode: '0775'
      extra_properties:
        'autobackup:bak': 'true'
        special_small_blocks: '32768'
  tags:
    - data

- name: Configure tank/eckwersheim dataset
  import_role:
    name: zfs
    tasks_from: dataset
  vars:
    zfs_dataset_args:
      dataset: tank/eckwersheim
