# Functional verify for the three site datasets created by main.yml.
#
# An idempotent converge is not evidence extra_properties actually
# landed -- community.general.zfs treats a property whose source is
# anything other than local|received|- as absent, so a property
# silently inherited from a parent dataset can read back as the right
# value while never being set locally. `zfs get` is the only reliable
# witness. Source must be `local`, not just the right value:
# zfs-autobackup's picker filters with `-s local`
# (roles/zfs_autobackup/templates/zfs_autosnapshot.sh.j2:14), so an
# inherited `autobackup:bak=true` would test-pass but never get backed
# up. Asserting `local` for the mountpoint as well as the extra
# properties keeps the role's "I set this explicitly" contract honest.

- name: _verify | Dataset exists
  when: zfs_root
  command:
    argv:
      - zfs
      - list
      - -H
      - -o
      - name
      - "{{ data_pool }}/{{ item.name }}"
  changed_when: false
  loop: '{{ data_datasets }}'
  loop_control:
    label: '{{ data_pool }}/{{ item.name }}'
  become: true

- name: _verify | Mountpoint property set locally with expected value
  when: zfs_root
  command:
    argv:
      - zfs
      - get
      - -H
      - -p
      - -o
      - source,value
      - mountpoint
      - "{{ data_pool }}/{{ item.name }}"
  register: data_verify_mountpoint
  changed_when: false
  failed_when: >-
    (data_verify_mountpoint.stdout.split('\t') | first | trim) != 'local'
    or (data_verify_mountpoint.stdout.split('\t') | last | trim) != item.mountpoint
  loop: '{{ data_datasets }}'
  loop_control:
    label: '{{ data_pool }}/{{ item.name }} mountpoint={{ item.mountpoint }}'
  become: true

- name: _verify | Dataset mounted at mountpoint
  when: zfs_root
  command:
    argv:
      - findmnt
      - --noheadings
      - --output
      - SOURCE
      - "{{ item.mountpoint }}"
  register: data_verify_findmnt
  changed_when: false
  failed_when: data_verify_findmnt.stdout | trim != data_pool ~ '/' ~ item.name
  loop: '{{ data_datasets }}'
  loop_control:
    label: '{{ item.mountpoint }} <- {{ data_pool }}/{{ item.name }}'
  become: true

- name: _verify | Extra property set locally with expected value
  when: zfs_root
  command:
    argv:
      - zfs
      - get
      - -H
      - -p
      - -o
      - source,value
      - "{{ item.1.key }}"
      - "{{ data_pool }}/{{ item.0.name }}"
  register: data_verify_prop
  changed_when: false
  failed_when: >-
    (data_verify_prop.stdout.split('\t') | first | trim) != 'local'
    or (data_verify_prop.stdout.split('\t') | last | trim) != item.1.value
  loop: '{{ data_datasets | product(data_extra_properties | dict2items) | list }}'
  loop_control:
    label: '{{ data_pool }}/{{ item.0.name }} {{ item.1.key }}={{ item.1.value }}'
  become: true

- name: _verify | Mountpoint owned by ansible_user_id
  when: zfs_root
  stat:
    path: "{{ item.mountpoint }}"
  register: data_verify_owner
  failed_when: >-
    not data_verify_owner.stat.exists
    or data_verify_owner.stat.pw_name != ansible_user_id
    or data_verify_owner.stat.gr_name != ansible_user_id
  loop: '{{ data_datasets }}'
  loop_control:
    label: "{{ item.mountpoint }} owner={{ ansible_user_id }}:{{ ansible_user_id }}"

- name: _verify | Mountpoint is writable as ansible_user_id
  when: zfs_root
  file:
    path: "{{ item.mountpoint }}/.verify_probe"
    state: touch
    mode: '0600'
  loop: '{{ data_datasets }}'
  loop_control:
    label: "{{ item.mountpoint }}/.verify_probe"
  changed_when: false
  become: false

- name: _verify | Remove write probe
  when: zfs_root
  file:
    path: "{{ item.mountpoint }}/.verify_probe"
    state: absent
  loop: '{{ data_datasets }}'
  loop_control:
    label: "{{ item.mountpoint }}/.verify_probe"
  changed_when: false
  become: false
