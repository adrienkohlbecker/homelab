---
- name: _verify | Filebrowser root autoindex lists configured trees
  uri:
    url: https://localhost/
    headers:
      Host: filebrowser.{{ inventory_hostname }}.{{ domain }}
    validate_certs: false
    return_content: true
    status_code: 200
  register: _verify_root
  retries: 10
  delay: 2
  until: _verify_root.status == 200

- name: _verify | Root listing contains every expected tree symlink
  assert:
    that:
      - "'Index of /' in _verify_root.content"
      - "'href=\"home/\"' in _verify_root.content"
      - "(not zfs_has_data_mount) or 'href=\"data/\"' in _verify_root.content"
      - "(not zfs_has_media_mount) or 'href=\"media/\"' in _verify_root.content"
      - "(not zfs_has_services_mount) or 'href=\"services/\"' in _verify_root.content"

- name: _verify | Filebrowser /data/ autoindex renders
  when: zfs_has_data_mount
  uri:
    url: https://localhost/data/
    headers:
      Host: filebrowser.{{ inventory_hostname }}.{{ domain }}
    validate_certs: false
    return_content: true
    status_code: 200
  register: _verify_data
  failed_when: _verify_data.status != 200 or 'Index of /data/' not in _verify_data.content

- name: _verify | Filebrowser /media/ autoindex renders
  when: zfs_has_media_mount
  uri:
    url: https://localhost/media/
    headers:
      Host: filebrowser.{{ inventory_hostname }}.{{ domain }}
    validate_certs: false
    return_content: true
    status_code: 200
  register: _verify_media
  failed_when: _verify_media.status != 200 or 'Index of /media/' not in _verify_media.content

- name: _verify | Filebrowser /services/ autoindex renders
  when: zfs_has_services_mount
  uri:
    url: https://localhost/services/
    headers:
      Host: filebrowser.{{ inventory_hostname }}.{{ domain }}
    validate_certs: false
    return_content: true
    status_code: 200
  register: _verify_services
  failed_when: _verify_services.status != 200 or 'Index of /services/' not in _verify_services.content
