---
- name: _verify | Define filebrowser trees mirror
  set_fact:
    _filebrowser_trees:
      - { name: home, enabled: true }
      - { name: data, enabled: "{{ zfs_has_data_mount }}" }
      - { name: media, enabled: "{{ zfs_has_media_mount }}" }
      - { name: services, enabled: "{{ zfs_has_services_mount }}" }

# Map the vhost FQDN to loopback so SNI matches the served certificate.
# Probing https://localhost with a Host: header leaves SNI=localhost, which
# OpenSSL 3.x (noble/resolute) rejects as a fatal unrecognized_name alert
# (status -1); hitting the FQDN directly keeps SNI correct on every release.
- name: _verify | Map the filebrowser vhost FQDN to loopback for SNI-correct probing
  lineinfile:
    path: /etc/hosts
    line: "127.0.0.1 filebrowser.{{ inventory_hostname }}.{{ domain }}"
    state: present
  become: true

- name: _verify | Filebrowser root autoindex serves
  uri:
    url: https://filebrowser.{{ inventory_hostname }}.{{ domain }}/
    validate_certs: false
    return_content: true
    status_code: 200
  register: _filebrowser_root
  retries: 3
  delay: 2
  until: _filebrowser_root.status == 200

- name: _verify | Root listing carries the Index header
  assert:
    that:
      - "'Index of /' in _filebrowser_root.content"

- name: _verify | Root listing reflects every tree mount flag (both directions)
  assert:
    that:
      - "(not item.enabled) or ('href=\"' ~ item.name ~ '/\"') in _filebrowser_root.content"
      - "item.enabled or ('href=\"' ~ item.name ~ '/\"') not in _filebrowser_root.content"
  loop: "{{ _filebrowser_trees }}"
  loop_control:
    label: "{{ item.name }}"

- name: _verify | Root listing carries the sub_filter-injected theme link and viewport
  assert:
    that:
      - "'<link rel=\"stylesheet\" href=\"/.theme.css\">' in _filebrowser_root.content"
      - "'width=device-width,initial-scale=1' in _filebrowser_root.content"

- name: _verify | /.theme.css is reachable as text/css
  uri:
    url: https://filebrowser.{{ inventory_hostname }}.{{ domain }}/.theme.css
    validate_certs: false
    status_code: 200
  register: _filebrowser_theme
  failed_when: _filebrowser_theme.status != 200 or 'text/css' not in (_filebrowser_theme.content_type | default(''))

- name: _verify | Per-tree autoindex renders when enabled
  when: item.enabled
  uri:
    url: https://filebrowser.{{ inventory_hostname }}.{{ domain }}/{{ item.name }}/
    validate_certs: false
    return_content: true
    status_code: 200
  register: _filebrowser_tree
  failed_when: _filebrowser_tree.status != 200 or ('Index of /' ~ item.name ~ '/') not in _filebrowser_tree.content
  loop: "{{ _filebrowser_trees }}"
  loop_control:
    label: "{{ item.name }}"
