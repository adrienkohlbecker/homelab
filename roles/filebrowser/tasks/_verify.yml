---
- name: _verify | Define filebrowser trees mirror
  set_fact:
    _filebrowser_trees:
      - { name: home, enabled: true }
      - { name: data, enabled: "{{ zfs_has_data_mount }}" }
      - { name: media, enabled: "{{ zfs_has_media_mount }}" }
      - { name: services, enabled: "{{ zfs_has_services_mount }}" }

- name: _verify | Filebrowser root autoindex serves
  uri:
    url: https://localhost/
    headers:
      Host: filebrowser.{{ inventory_hostname }}.{{ domain }}
    url_username: "{{ filebrowser_basic_auth_user }}"
    url_password: "{{ filebrowser_basic_auth_password }}"
    force_basic_auth: true
    validate_certs: false
    return_content: true
    status_code: 200
  register: _verify_root
  retries: 3
  delay: 2
  until: _verify_root.status == 200

- name: _verify | Root listing carries the Index header
  assert:
    that:
      - "'Index of /' in _verify_root.content"

- name: _verify | Root listing reflects every tree mount flag (both directions)
  assert:
    that:
      - "(not item.enabled) or ('href=\"' ~ item.name ~ '/\"') in _verify_root.content"
      - "item.enabled or ('href=\"' ~ item.name ~ '/\"') not in _verify_root.content"
  loop: "{{ _filebrowser_trees }}"
  loop_control:
    label: "{{ item.name }}"

- name: _verify | Root listing carries the sub_filter-injected theme link and viewport
  assert:
    that:
      - "'<link rel=\"stylesheet\" href=\"/.theme.css\">' in _verify_root.content"
      - "'width=device-width,initial-scale=1' in _verify_root.content"

- name: _verify | /.theme.css is reachable as text/css
  uri:
    url: https://localhost/.theme.css
    headers:
      Host: filebrowser.{{ inventory_hostname }}.{{ domain }}
    url_username: "{{ filebrowser_basic_auth_user }}"
    url_password: "{{ filebrowser_basic_auth_password }}"
    force_basic_auth: true
    validate_certs: false
    status_code: 200
  register: _verify_theme
  failed_when: _verify_theme.status != 200 or 'text/css' not in (_verify_theme.content_type | default(''))

- name: _verify | Per-tree autoindex renders when enabled
  when: item.enabled
  uri:
    url: https://localhost/{{ item.name }}/
    headers:
      Host: filebrowser.{{ inventory_hostname }}.{{ domain }}
    url_username: "{{ filebrowser_basic_auth_user }}"
    url_password: "{{ filebrowser_basic_auth_password }}"
    force_basic_auth: true
    validate_certs: false
    return_content: true
    status_code: 200
  register: _verify_tree
  failed_when: _verify_tree.status != 200 or ('Index of /' ~ item.name ~ '/') not in _verify_tree.content
  loop: "{{ _filebrowser_trees }}"
  loop_control:
    label: "{{ item.name }}"
