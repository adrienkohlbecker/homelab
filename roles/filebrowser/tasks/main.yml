- name: Set up filebrowser system user, group, and config dir
  import_role:
    name: service_user
    tasks_from: user
  vars:
    service_user_args:
      name: filebrowser
  tags:
    - filebrowser

- name: Create filebrowser sqlite directory
  when: not (ansible_check_mode and filebrowser_user.changed)
  file:
    dest: /mnt/services/sqlite/filebrowser
    state: directory
    owner: filebrowser
    group: filebrowser
    mode: "0755"
  become: true
  tags:
    - filebrowser

- name: Install filebrowser service
  import_role:
    name: systemd_unit
    tasks_from: install
  vars:
    systemd_unit_args:
      src: filebrowser.service.j2
      condition: "{{ not (ansible_check_mode and filebrowser_user.changed) }}"
  tags:
    - filebrowser

- name: Enable filebrowser service
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: filebrowser
      condition: "{{ not (ansible_check_mode and (filebrowser_service_result.changed or filebrowser_user.changed)) }}"
      restart: "{{ filebrowser_service_result.changed }}"
  tags:
    - filebrowser

- name: Configure nginx
  import_role:
    name: nginx
    tasks_from: site
  vars:
    nginx_site_args:
      subdomain: filebrowser
      proxy_pass: http://localhost:{{ service_ports.filebrowser }}/
  tags:
    - filebrowser
