# Read-only directory autoindex via nginx — no daemon, no upload/delete.
# Publishes /srv/filebrowser at filebrowser.<host>.<domain> behind nginx
# basic auth (htpasswd at /etc/nginx/filebrowser.htpasswd, bcrypt).
# Consumes zfs_has_<name>_mount flags to gate which trees are symlinked in;
# `home` always points at the connecting operator's $HOME (ansible_user_dir).
# Theme CSS lives at /var/www/filebrowser/.theme.css and is aliased into
# the site at /.theme.css.
- name: Create filebrowser autoindex root
  file:
    path: /srv/filebrowser
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true
  tags:
    - filebrowser

# Symlinks per available tree. Toggling a zfs_has_*_mount flag flips
# the corresponding link between `present` and `absent` so a flag
# change is reflected on the next converge without a manual cleanup.
# `src` must be omitted when state != link/hard, hence the ternary.
- name: Place filebrowser tree symlinks under /srv/filebrowser
  file:
    path: /srv/filebrowser/{{ item.name }}
    src: "{{ item.src if item.enabled | bool else omit }}"
    state: "{{ 'link' if item.enabled | bool else 'absent' }}"
    force: true
  loop:
    - { name: home, src: "{{ ansible_user_dir }}", enabled: true }
    - { name: data, src: /mnt/data, enabled: "{{ zfs_has_data_mount }}" }
    - { name: media, src: /mnt/media, enabled: "{{ zfs_has_media_mount }}" }
    - { name: services, src: /mnt/services, enabled: "{{ zfs_has_services_mount }}" }
  loop_control:
    label: "{{ item.name }}"
  become: true
  tags:
    - filebrowser

- name: Create filebrowser theme directory
  file:
    path: /var/www/filebrowser
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true
  tags:
    - filebrowser

# Transitional: legacy theme.css path under /etc/nginx/snippets/ (the role
# briefly used it after the container -> autoindex migration). Drop after
# this has converged everywhere.
- name: Remove legacy filebrowser theme location
  file:
    path: /etc/nginx/snippets/filebrowser_theme.css
    state: absent
  become: true
  tags:
    - filebrowser

- name: Install filebrowser nginx theme stylesheet
  copy:
    src: theme.css
    dest: /var/www/filebrowser/.theme.css
    owner: root
    group: root
    mode: "0644"
    backup: true
  become: true
  tags:
    - filebrowser

# pip libpass (a maintained passlib fork) instead of the apt python3-passlib
# package. The apt 1.7.4 fails to load its bcrypt backend when /usr/local
# has bcrypt >= 4.1 (passlib reads `bcrypt.__about__.__version__`, removed
# in bcrypt 4.1.0; lab carries bcrypt 5.0 pulled in by paramiko via
# podman-compose). Upstream passlib has no 1.7.5; libpass installs to
# /usr/local/lib/python3.X/dist-packages/ and imports as `passlib`,
# shadowing the broken apt copy.
- name: Install python3-pip for libpass install
  apt:
    name: python3-pip
    cache_valid_time: 3600
  become: true
  register: filebrowser_pip3_apt
  tags:
    - filebrowser

# passlib doesn't bundle a bcrypt backend; without `bcrypt` importable
# the htpasswd module fails "bcrypt: no backends available". On lab
# bcrypt 5.0 rides in transitively via paramiko/podman-compose; under
# testrole.py there's no such backdoor, so install jammy's python3-
# bcrypt (3.2.0) explicitly. libpass handles every bcrypt API shape.
- name: Install python3-bcrypt backend for libpass
  apt:
    name: python3-bcrypt
    cache_valid_time: 3600
  become: true
  register: filebrowser_bcrypt_apt
  tags:
    - filebrowser

- name: Install libpass via pip for the htpasswd module
  when: not (ansible_check_mode and filebrowser_pip3_apt.changed)
  pip:
    name: libpass
    version: "1.9.3"
    executable: pip3
  become: true
  register: filebrowser_passlib
  tags:
    - filebrowser

- name: Configure filebrowser basic-auth credentials
  # Skip when any upstream changed in check-mode: pip3-apt and
  # bcrypt-apt would gate the libpass pip task off, and libpass
  # itself would not have actually installed passlib -- the
  # htpasswd module then fails its import-passlib precheck or its
  # bcrypt-backend precheck.
  when: not (ansible_check_mode
             and (filebrowser_pip3_apt.changed
                  or filebrowser_bcrypt_apt.changed
                  or filebrowser_passlib.changed))
  htpasswd:
    path: /etc/nginx/filebrowser.htpasswd
    name: "{{ filebrowser_basic_auth_user }}"
    password: "{{ filebrowser_basic_auth_password }}"
    crypt_scheme: bcrypt
    owner: root
    group: www-data
    mode: "0640"
  become: true
  tags:
    - filebrowser

- name: Configure nginx
  import_role:
    name: nginx
    tasks_from: site
  vars:
    nginx_site_args:
      subdomain: filebrowser
      # No other site should embed the autoindex — defense-in-depth for the
      # case where attacker-influenced filenames make it onto disk.
      csp_frame_ancestors: "'none'"
      # sub_filter rewrites the autoindex HTML so it picks up viewport
      # meta + the stylesheet on the fly. The CSS lives outside
      # /srv/filebrowser (aliased under `location =`) so it doesn't
      # show up in the autoindex listing.
      location_conf: |
        root /srv/filebrowser;
        charset utf-8;
        # MIME map wiped so every served file is application/octet-stream —
        # browsers download instead of rendering HTML/SVG planted in the
        # mounted trees by upstream services (sabnzbd, *arr, etc.). nginx
        # synthesises the autoindex response with a hard-coded text/html
        # and bypasses `types`, so the listing itself still renders.
        types { }
        default_type application/octet-stream;
        autoindex on;
        autoindex_exact_size off;
        autoindex_localtime on;
        sub_filter '<head>' '<head><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="stylesheet" href="/.theme.css">';
        sub_filter_types text/html;
        sub_filter_last_modified on;
      server_conf: |
        auth_basic "Filebrowser";
        auth_basic_user_file /etc/nginx/filebrowser.htpasswd;
        location = /.theme.css {
          alias /var/www/filebrowser/.theme.css;
        }
  tags:
    - filebrowser
