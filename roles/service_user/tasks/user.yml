- name: Add {{ service_user_name }} group
  group:
    name: "{{ service_user_name }}"
    system: true
  become: true

- name: Add {{ service_user_name }} user
  user:
    name: "{{ service_user_name }}"
    group: "{{ service_user_name }}"
    groups: "{{ service_user_extra_groups | default([]) }}"
    append: true
    createhome: "{{ service_user_createhome | default(false) }}"
    system: true
    shell: "{{ service_user_shell | default('/usr/sbin/nologin') }}"
    home: "{{ service_user_home | default('/nonexistent') }}"
  become: true
  register: service_user_result

# Capture the user record under a per-service fact so successive calls in
# the same play don't clobber a shared register, and so callers can
# reference {{ <name>_user.uid }} / .group in their templates.
- name: Record user record for {{ service_user_name }}
  set_fact:
    "{{ service_user_name }}_user": "{{ service_user_result }}"

# Stateless services (no config / no on-host state) opt out via
# service_user_config_dir: false. The helper still owns user/group/uid
# capture; callers that don't bind-mount /mnt/services/<svc> anywhere
# shouldn't be carrying an empty dir.
- name: Create configuration directory for {{ service_user_name }}
  when:
    - service_user_config_dir | default(true)
    - not (ansible_check_mode and service_user_result.changed)
  file:
    dest: /mnt/services/{{ service_user_name }}
    state: directory
    owner: "{{ service_user_name }}"
    group: "{{ service_user_name }}"
    mode: "0755"
  become: true

# Reset caller-input vars to documented defaults so they don't leak
# into a sibling call later in the play. See roles/systemd_unit/tasks/
# install.yml for the full background on the import_role + vars: leak
# (ansible/ansible#74091, #79502).
- name: Reset caller-input vars to defaults
  set_fact:
    service_user_extra_groups: []
    service_user_createhome: false
    service_user_shell: /usr/sbin/nologin
    service_user_home: /nonexistent
    service_user_config_dir: true
