# Inputs: caller passes a single dict `service_user_args` with keys
#   name              required; system group + user name and config dir basename
#   extra_groups      optional list, default []; appended to the user.
#                     The groups must already exist on the host -- create
#                     them before this import (e.g. jellyfin imports the
#                     media/render groups first).
#   createhome        optional bool, default false; usually only true when the
#                     service writes into $HOME (github_runner)
#   shell             optional, default '/usr/sbin/nologin'
#   home              optional, default '/nonexistent'
#   home_mode         optional, default null (= don't touch). When set,
#                     chmods the home dir to this octal mode. Useful when
#                     /etc/login.defs HOME_MODE (0750 on Ubuntu) is too
#                     restrictive -- e.g. a podman bind-mount source under
#                     $HOME is stat'd from a transient userns where the
#                     process appears as "nobody" and can't traverse a
#                     group-only dir, surfacing as EACCES at container
#                     start. Pass "0755" to make the path world-traversable
#                     (files inside keep their own modes, so this doesn't
#                     widen actual read access).
#   config_dir        optional bool, default true; false skips creating and
#                     owning /mnt/services/<name> -- the caller creates any
#                     state dirs it needs itself.
#   config_dir_group  optional, default <name>; override the dir's group
#                     when the running container chowns its bind-mount to
#                     a shared group (e.g. linuxserver/* images with
#                     PGID=media recursively chown /config on startup,
#                     and ansible flaps the gid every run otherwise).
#   config_dir_mode   optional, default "0750"; /mnt/services/<name> holds
#                     service state (configs, DBs, secrets), so it is
#                     owner+group only by default. Loosen to "0755" when a
#                     co-tenant needs world traversal, or tighten to "0700"
#                     to drop group read (plex does -- Preferences.xml
#                     carries secrets config_dir_group shouldn't see).
#
# The dict form prevents inter-call leakage at play-vars scope: each
# import_role pass replaces the whole `service_user_args` value, so a
# previous caller's createhome / extra_groups / etc. can't bleed into
# the next caller that doesn't explicitly override.
#
# Outputs: registers `<name>_user` (the ansible.builtin.user result) so
# callers can template {{ <name>_user.uid }} (int) and {{ <name>_user.group }}
# (the primary gid as an int -- safe in podman --user / --uidmap) into unit
# files. The fact key replaces non-identifier chars in name with '_'
# (name='foo-bar' -> foo_bar_user). In --check mode on a host where the user
# does not exist yet the user task only reports the create, so .uid/.group
# are undefined -- gate consumers with
# `when: not (ansible_check_mode and <name>_user.changed)`.
- name: "Validate inputs for {{ service_user_args.name | default('<unset>') }}"
  assert:
    quiet: true
    that:
      - service_user_args.name is defined
      - service_user_args.name is string
      # name becomes the group/user name, the /mnt/services/<name> basename,
      # and (via regex_replace below) the <name>_user fact key -- so it must
      # be a valid identifier. Same guard as roles/podman_secret + roles/linger.
      - service_user_args.name is match('^[a-z_][a-z0-9_-]*$')
    fail_msg: >-
      service_user_args needs name (a valid identifier matching
      [a-z_][a-z0-9_-]*); got name={{ service_user_args.name | default('<unset>') }}

# Catch incoherent home options up front rather than silently no-op'ing.
- name: "Validate home options for {{ service_user_args.name }}"
  assert:
    quiet: true
    that:
      # home_mode is applied only by the home-dir file task below, which is
      # gated on createhome -- so home_mode without createhome is silently
      # ignored. Fail loudly instead of letting the mode vanish.
      - service_user_args.home_mode is not defined or (service_user_args.createhome | default(false)) | bool
      # createhome with the default home would materialize /nonexistent (a
      # sentinel several system tools special-case) as a real directory.
      - not (service_user_args.createhome | default(false) | bool) or (service_user_args.home | default('/nonexistent')) != '/nonexistent'
    fail_msg: >-
      Incoherent home options for {{ service_user_args.name }}: home_mode
      needs createhome: true, and createhome needs a real home (not the
      /nonexistent sentinel).

- name: Resolve caller defaults for {{ service_user_args.name }}
  set_fact:
    _service_user_name: "{{ service_user_args.name }}"
    _service_user_extra_groups: "{{ service_user_args.extra_groups | default([]) }}"
    _service_user_createhome: "{{ service_user_args.createhome | default(false) }}"
    _service_user_shell: "{{ service_user_args.shell | default('/usr/sbin/nologin') }}"
    _service_user_home: "{{ service_user_args.home | default('/nonexistent') }}"
    _service_user_home_mode: "{{ service_user_args.home_mode | default(None) }}"
    _service_user_config_dir: "{{ service_user_args.config_dir | default(true) }}"
    _service_user_config_dir_group: "{{ service_user_args.config_dir_group | default(service_user_args.name) }}"
    _service_user_config_dir_mode: "{{ service_user_args.config_dir_mode | default('0750') }}"

- name: "Add group {{ service_user_args.name }}"
  group:
    name: "{{ _service_user_name }}"
    system: true
  become: true

- name: "Add user {{ service_user_args.name }}"
  user:
    name: "{{ _service_user_name }}"
    group: "{{ _service_user_name }}"
    groups: "{{ _service_user_extra_groups }}"
    append: true
    createhome: "{{ _service_user_createhome }}"
    system: true
    # nologin + system already lock the account; pin the password field to
    # '!' so the locked state is explicit and survives a future relaxation.
    password: "!"
    shell: "{{ _service_user_shell }}"
    home: "{{ _service_user_home }}"
  become: true
  register: service_user_result

# Capture the user record under a per-service fact so successive calls in
# the same play don't clobber a shared register, and so callers can
# reference {{ <name>_user.uid }} / .group in their templates.
#
# The fact name is sanitized via regex_replace because ansible variable
# names must match [A-Za-z_][A-Za-z0-9_]* -- any non-identifier char
# (notably a hyphen, which POSIX permits in user/group names and which
# some upstream daemons hardcode) would otherwise produce "Invalid
# variable name" at set_fact time. The typical case (name='paperless')
# is unchanged; hyphenated names (name='foo-bar') resolve to
# foo_bar_user. Same pattern as roles/systemd_unit/tasks/install.yml's
# per-unit fact.
- name: Record user record for {{ service_user_args.name }}
  set_fact:
    "{{ _service_user_name | regex_replace('[^A-Za-z0-9_]', '_') }}_user": "{{ service_user_result }}"

# Override useradd's HOME_MODE (Ubuntu defaults to 0750) when the caller
# asked for a specific mode. Idempotent: ansible's file module reports
# changed only when the mode actually differs. Gated on createhome so
# we don't try to chmod the placeholder /nonexistent.
- name: "Set home directory mode for {{ service_user_args.name }}"
  when:
    - _service_user_createhome
    - _service_user_home_mode is not none
    - not (ansible_check_mode and service_user_result.changed)
  file:
    path: "{{ _service_user_home }}"
    state: directory
    owner: "{{ _service_user_name }}"
    group: "{{ _service_user_name }}"
    mode: "{{ _service_user_home_mode }}"
  become: true

# Stateless services (no config / no on-host state) opt out via
# config_dir: false. The helper still owns user/group/uid capture; callers
# that don't bind-mount /mnt/services/<svc> anywhere shouldn't be carrying
# an empty dir.
- name: Create configuration directory for {{ service_user_args.name }}
  when:
    - _service_user_config_dir
    - not (ansible_check_mode and service_user_result.changed)
  file:
    dest: /mnt/services/{{ _service_user_name }}
    state: directory
    owner: "{{ _service_user_name }}"
    group: "{{ _service_user_config_dir_group }}"
    mode: "{{ _service_user_config_dir_mode }}"
  become: true
