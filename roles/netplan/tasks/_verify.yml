# Post-converge assertions for the safe-apply machinery. The role's
# converge succeeding only tells us the tasks didn't error — these
# checks confirm the actual end-state on the box matches expectations,
# so a future refactor that silently breaks (e.g.) the cancel-marker
# touch can't slip through.

- name: _verify | Config file landed at the documented path with 0600
  stat:
    path: /etc/netplan/01-netcfg.yaml
  register: netplan_verify_cfg
  failed_when:
    - not netplan_verify_cfg.stat.exists or netplan_verify_cfg.stat.mode != "0600"

- name: _verify | Networkd is active
  systemd:
    name: systemd-networkd
  register: netplan_verify_networkd
  failed_when: netplan_verify_networkd.status.ActiveState != "active"

- name: _verify | networkd-dispatcher is masked (can't start to spew veth noise)
  # `is-enabled` returns "masked" only when the unit is symlinked to
  # /dev/null, which is what blocks it from being triggered by networkd's
  # D-Bus signals. A plain `disabled`/`static` would still let it start.
  command: systemctl is-enabled networkd-dispatcher.service
  register: netplan_verify_dispatcher
  changed_when: false
  failed_when: netplan_verify_dispatcher.stdout != "masked"

- name: _verify | Runtime configs exist in /run/systemd/network
  # netplan generate writes to /run/systemd/network — if these are
  # missing the apply ran but networkd is operating on stale state.
  find:
    paths: /run/systemd/network
    patterns: "*-netplan-*.network"
  register: netplan_verify_runtime
  failed_when: netplan_verify_runtime.matched < 1

- name: _verify | Snapshot dir /run/netplan_prev kept for next apply
  # The pre-template snapshot task always populates this; the cancel
  # step intentionally leaves it in place so the next converge's
  # snapshot rotates it, and the async netplan apply --state can
  # finish reading without racing a removal.
  stat:
    path: /run/netplan_prev
  register: netplan_verify_prev
  failed_when: not (netplan_verify_prev.stat.exists and netplan_verify_prev.stat.isdir)

- name: _verify | Rollback timer and service not currently running
  # After cancel (or after a rollback fire), both units must end in
  # inactive. If either is active/activating/failed we've leaked a
  # pending rollback or hit a unit-script error.
  systemd:
    name: "{{ item }}"
  register: netplan_verify_unit
  changed_when: false
  failed_when: netplan_verify_unit.status.ActiveState != "inactive"
  loop:
    - netplan_rollback.timer
    - netplan_rollback.service
  loop_control:
    label: "{{ item }}"

- name: _verify | On-disk config still validates
  # Re-run the apply-time validator post-converge so an unchanged-YAML
  # run still asserts current state. `netplan generate --debug` compiles
  # to /run/systemd/network without restarting networkd. No ansible
  # module wraps `netplan generate`.
  command: netplan generate --debug
  changed_when: false
  become: true

# Functional end-to-end test of the rollback safety harness — the
# critical check in this file, the one that catches snapshot-timing
# bugs that stat-only assertions cannot.
#
# Approach: write a known-broken /etc/netplan/01-netcfg.yaml directly
# (bypassing the role's template — the harness passes `-e
# @host_vars/foo.yml` as CLI extra-vars, which beats include_role's
# vars: precedence, so we can't override the `netplan` host var from
# inside _verify). Then invoke the role's apply.yml tasks_from to
# arm the rollback timer, apply the broken config, watch the role's
# wait_for_connection canary fail when SSH severs, then wait for the
# rollback timer at +90s to restore /run/netplan_prev → /etc/netplan
# and bring DHCP back. Assert the journal recorded the rollback fire
# and the good config is back on disk.
- name: _verify rollback | Write a known-broken /etc/netplan directly
  # 192.0.2.0/24 is TEST-NET-1 (RFC 5737), guaranteed not to match
  # any real network. Replacing the DHCP-assigned IP with a static
  # address on this range makes networkd drop the live lease,
  # severing SSH. `dhcp4: false` alone is not enough — networkd
  # holds onto the existing lease until something explicitly
  # replaces it.
  copy:
    dest: /etc/netplan/01-netcfg.yaml
    content: |
      # _verify-rollback-broken
      network:
        version: 2
        ethernets:
          en:
            match:
              name: "en*"
            dhcp4: false
            dhcp6: false
            addresses: ["192.0.2.99/24"]
    owner: root
    group: root
    mode: "0600"
    backup: true
  become: true

- name: _verify rollback | Run the role's apply path against the broken config
  become: true
  block:
    - import_tasks: apply.yml

    - name: _verify rollback | Apply path completed cleanly — rollback was not exercised
      # We should never reach this task: the wait_for_connection inside
      # apply.yml must time out because the broken config severed SSH.
      # If it didn't, either the bad config wasn't actually
      # destructive on this host (rare) or SSH survived via a side
      # channel — either way the test didn't validate the rollback.
      fail:
        msg: "Expected the apply path's wait_for_connection canary to time out, but it succeeded"

  rescue:
    - name: _verify rollback | Wait for SSH to recover after the rollback timer fires
      # By the time we land here, ~65s of apply.yml's wait_for_connection
      # has already elapsed. The rollback timer fires at +90s relative to
      # the apply, so we start probing in ~25s.
      wait_for_connection:
        delay: 20
        timeout: 120

- name: _verify rollback | Confirm the rollback timer logged its firing
  # The rollback script calls `logger -t netplan_rollback "auto-
  # rollback firing: ..."`. If we recovered SSH but this isn't in the
  # journal, something else healed the network and the rollback path
  # wasn't exercised. No built-in ansible module wraps journalctl.
  command: journalctl -t netplan_rollback --since "5 minutes ago"
  register: netplan_verify_rollback_journal
  changed_when: false
  failed_when: "'auto-rollback firing' not in netplan_verify_rollback_journal.stdout"
  become: true

- name: _verify rollback | Read /etc/netplan/01-netcfg.yaml
  slurp:
    src: /etc/netplan/01-netcfg.yaml
  register: netplan_verify_rollback_etcfile
  become: true

- name: _verify rollback | Confirm broken marker is gone from /etc/netplan
  # The broken file carried the `_verify-rollback-broken` marker
  # comment; the rolled-back content should not have it.
  assert:
    that:
      - "'_verify-rollback-broken' not in (netplan_verify_rollback_etcfile.content | b64decode)"

- name: _verify rollback | Wipe stale /run/netplan_prev before re-snapshot
  # mv consumed it during rollback; recreate matching what the role's
  # unconditional pre-template snapshot task would have produced.
  file:
    path: /run/netplan_prev
    state: absent
  become: true
  changed_when: false

- name: _verify rollback | Re-snapshot /etc/netplan to /run/netplan_prev
  copy:
    src: /etc/netplan/
    dest: /run/netplan_prev/
    remote_src: true
    mode: preserve
  become: true
  changed_when: false
