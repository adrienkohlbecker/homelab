# Post-converge assertions for the safe-apply machinery. The role's
# converge succeeding only tells us the tasks didn't error — these
# checks confirm the actual end-state on the box matches expectations,
# so a future refactor that silently breaks (e.g.) the cancel-marker
# touch can't slip through.

- name: _verify | Config file landed at the documented path with 0600
  stat:
    path: /etc/netplan/01-netcfg.yaml
  register: netplan_verify_cfg
  failed_when:
    - not netplan_verify_cfg.stat.exists or netplan_verify_cfg.stat.mode != "0600"

- name: _verify | Networkd is active
  systemd:
    name: systemd-networkd
  register: netplan_verify_networkd
  failed_when: netplan_verify_networkd.status.ActiveState != "active"

- name: _verify | Runtime configs exist in /run/systemd/network
  # netplan generate writes to /run/systemd/network — if these are
  # missing the apply ran but networkd is operating on stale state.
  find:
    paths: /run/systemd/network
    patterns: "*-netplan-*.network"
  register: netplan_verify_runtime
  failed_when: netplan_verify_runtime.matched < 1

- name: _verify | Cancel-marker /run/netplan-keep present
  # Proof the safe-apply path got all the way through wait_for_connection
  # to the Cancel auto-rollback step. If absent, either the apply was
  # skipped (no YAML change) or wait_for_connection failed and the
  # rollback timer is still pending.
  stat:
    path: /run/netplan-keep
  register: netplan_verify_keep
  failed_when: not netplan_verify_keep.stat.exists

- name: _verify | Snapshot dir /var/lib/netplan-prev kept for next apply
  # The cancel step intentionally leaves this around — the async apply
  # may still be reading --state, and the next safe-apply rotates it.
  # Asserting its presence pins down the leave-in-place decision.
  stat:
    path: /var/lib/netplan-prev
  register: netplan_verify_prev
  failed_when: not (netplan_verify_prev.stat.exists and netplan_verify_prev.stat.isdir)

- name: _verify | Rollback transient unit cleaned up
  # systemd-run --collect should reap the netplan-rollback.service unit
  # after it fires (the timer is one-shot). list-units returns 0 with
  # empty output when no match. If the unit is still listed as active
  # we've leaked a pending rollback into post-apply state. The systemd
  # module doesn't expose "is this unit completely gone" cleanly, so
  # shell out.
  command: systemctl list-units --no-legend --state=active netplan-rollback.service netplan-rollback.timer  # noqa command-instead-of-module
  register: netplan_verify_unit
  changed_when: false
  failed_when: netplan_verify_unit.stdout != ""

- name: _verify | Validation regex still catches the unique-match warning
  # Guards the validation gate against accidental regression: feed the
  # exact message that locked us out on 2026-05-10 into the same
  # grep used by `main.yml`'s "Validate config" step and confirm it
  # would have refused. If someone narrows the regex this fails loudly.
  shell: |
    set -o pipefail
    if echo "WARNING:root:Cannot find unique matching interface for nic0" \
       | grep -qiE "WARNING|Cannot find unique|ERROR"; then
      exit 0
    fi
    exit 1
  args:
    executable: /bin/bash
  changed_when: false
