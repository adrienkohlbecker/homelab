- name: Install netplan
  apt:
    pkg:
      - netplan.io
    cache_valid_time: 3600
  become: true
  tags:
    - netplan

- name: Install rollback script
  copy:
    src: netplan_rollback.sh
    dest: /usr/local/bin/netplan_rollback
    owner: root
    group: root
    mode: "0755"
    backup: true
  become: true
  tags:
    - netplan

- name: Install netplan_rollback.service
  include_role:
    name: systemd_unit
    tasks_from: copy
  vars:
    systemd_unit_src: netplan_rollback.service
  tags:
    - netplan

- name: Install netplan_rollback.timer
  include_role:
    name: systemd_unit
    tasks_from: copy
  vars:
    systemd_unit_src: netplan_rollback.timer
  tags:
    - netplan

- name: Assert netplan host var is a non-empty mapping
  # Rendering an empty `netplan` would produce `network: { version: 2 }`
  # with no interfaces — netplan accepts it silently, networkd ends up
  # with no .network files in /run, and the host loses configured
  # networking on next apply. Fail loudly before the template runs.
  assert:
    that:
      - netplan is defined
      - netplan is mapping
      - netplan | length > 0
    fail_msg: "host_vars must define a non-empty `netplan` mapping (see host_vars/lab.yml for the schema)"
  tags:
    - netplan

# Snapshot BEFORE the template runs so /run/netplan_prev captures the
# genuine *previous* /etc/netplan, not the just-rendered new one. Two
# downstream consumers read this:
#   - `netplan apply --state` diffs new-vs-prev to restrict restart
#     scope to genuinely-changed ifaces.
#   - the systemd-run rollback timer mv's it over /etc/netplan if we
#     don't reconnect post-apply.
# Unconditional so the snapshot is always available; the apply block
# below is what's gated on netplan_cfg.changed.
- name: Wipe any stale /run/netplan_prev
  file:
    path: /run/netplan_prev
    state: absent
  become: true
  changed_when: false
  tags:
    - netplan

- name: Snapshot current /etc/netplan to /run/netplan_prev
  copy:
    src: /etc/netplan/
    dest: /run/netplan_prev/
    remote_src: true
    mode: preserve
  become: true
  changed_when: false
  tags:
    - netplan

- name: Configure netplan
  template:
    src: config.yaml.j2
    dest: /etc/netplan/01-netcfg.yaml
    owner: root
    group: root
    mode: "0600"
    backup: true
  become: true
  register: netplan_cfg
  tags:
    - netplan

- name: Cleanup config added by cloud-init and installer
  file:
    path: "{{ item }}"
    state: absent
  become: true
  loop:
    - /etc/netplan/00-installer-config.yaml
    - /etc/netplan/50-cloud-init.yaml
  tags:
    - netplan

# Apply tasks extracted to apply.yml so _verify can invoke the same
# path with a deliberately-broken /etc/netplan and exercise the
# rollback timer end-to-end.
# Gated on `not ansible_check_mode` because all of this is destructive.
- name: Apply netplan safely
  when: netplan_cfg.changed and not ansible_check_mode
  become: true
  tags:
    - netplan
  block:
    - include_tasks: apply.yml
