- name: Install netplan
  apt:
    pkg:
      - netplan.io
    cache_valid_time: 3600
  become: true
  tags:
    - netplan

- name: Configure netplan
  template:
    src: config.yaml.j2
    dest: /etc/netplan/01-netcfg.yaml
    owner: root
    group: root
    mode: "0600"
    backup: true
  become: true
  register: netplan_cfg
  tags:
    - netplan

- name: Cleanup config added by cloud-init and installer
  file:
    path: "{{ item }}"
    state: absent
  become: true
  loop:
    - /etc/netplan/00-installer-config.yaml
    - /etc/netplan/50-cloud-init.yaml
  tags:
    - netplan

# Apply path — two layers of safety after the earlier SSH-lockout incident
# (see notes/netplan-safe-apply.md):
#   1. Pre-flight validation: `netplan generate --debug` writes to /run but
#      doesn't restart networkd. Surfaces "Cannot find unique matching
#      interface" and similar before we touch live state.
#   2. systemd-run-scheduled rollback: takes a runtime snapshot of
#      /etc/netplan, schedules a deadline 90 s ahead, applies, then asks
#      ansible to wait_for_connection. If we make it back we touch a
#      cancel-file; if we don't, the timer fires and restores the prior
#      config so the box doesn't get stranded.
# Gated on `not ansible_check_mode` because all of this is destructive.
- name: Apply netplan safely
  when: netplan_cfg.changed and not ansible_check_mode
  become: true
  tags:
    - netplan
  block:
    - name: Validate config (netplan generate --debug)
      # netplan generate is "compile, write to /run, don't restart networkd"
      # — safe to use as a validation gate. Surfaces the unique-match
      # warning that previously halted apply mid-way.
      shell: |
        set -o pipefail
        out=$(netplan generate --debug 2>&1)
        echo "$out"
        if echo "$out" | grep -qiE "WARNING|Cannot find unique|ERROR"; then
          echo "netplan generate reported a warning/error — refusing to apply" >&2
          exit 1
        fi
      args:
        executable: /bin/bash
      changed_when: false

    - name: Snapshot current /etc/netplan for rollback
      # /run/netplan-rollback is the directory the rollback timer mv's
      # over /etc/netplan if we don't reconnect in time.
      # /var/lib/netplan-prev is the snapshot we hand to `netplan apply
      # --state` below.
      shell: |
        set -e
        rm -rf /var/lib/netplan-prev /run/netplan-rollback
        cp -a /etc/netplan /var/lib/netplan-prev
        cp -a /etc/netplan /run/netplan-rollback
      changed_when: false

    - name: Arm 90s auto-rollback (cancelled by touching /run/netplan-keep)
      # systemd-run --on-active is preferable to at(1): no extra package,
      # no MTA dependencies, --collect cleans the unit up after it runs.
      # The deadline of 90s is intentionally longer than the
      # wait_for_connection timeout below (60s) so a slow reconnect
      # doesn't trigger a spurious revert.
      # The stop+reset-failed prelude clears any pending timer from a
      # prior apply within the same 90s window — otherwise the second
      # `--unit=netplan-rollback` would refuse to start.
      shell: |
        set -e
        rm -f /run/netplan-keep
        systemctl stop netplan-rollback.timer netplan-rollback.service 2>/dev/null || true
        systemctl reset-failed netplan-rollback.timer netplan-rollback.service 2>/dev/null || true
        systemd-run --on-active=90 --unit=netplan-rollback --collect /bin/bash -c '
          if [ -f /run/netplan-keep ]; then
            rm -f /run/netplan-keep
            rm -rf /run/netplan-rollback
            logger -t netplan-rollback "cancelled — apply confirmed OK"
            exit 0
          fi
          logger -t netplan-rollback "auto-rollback firing: restoring previous /etc/netplan"
          rm -rf /etc/netplan
          mv /run/netplan-rollback /etc/netplan
          netplan apply
        '
      changed_when: false

    - name: Apply netplan asynchronously
      # async: 30 + poll: 0 hands control back to ansible immediately
      # so wait_for_connection can take over. If we let `command` block
      # synchronously, an apply that severs SSH freezes the ansible run
      # instead of failing fast.
      command: netplan apply --state /var/lib/netplan-prev
      async: 30
      poll: 0
      changed_when: true

    - name: Wait for SSH to re-establish (canary for the rollback timer)
      # If this fails (timeout: 60), the auto-rollback (deadline: 90) is
      # still pending and will restore the prior config. On the next
      # ansible run from a healthy box we'll see what went wrong.
      wait_for_connection:
        delay: 5
        timeout: 60

    - name: Cancel auto-rollback
      # Belt-and-suspenders cancel:
      #   1. touch /run/netplan-keep — the keep-file the timer reads. If
      #      the timer fires between this and step 2 (would need apply +
      #      wait_for_connection to exceed 90 s), it sees the file and
      #      exits cleanly without rolling back.
      #   2. systemctl stop the timer — collapses the +90 s wait so
      #      `_verify | Rollback transient unit cleaned up` doesn't have
      #      to race the deadline, and operators don't see a pending
      #      timer for a minute and a half post-apply.
      #   3. rm /run/netplan-rollback — only safe AFTER the timer is
      #      stopped (otherwise concurrent with the rollback script).
      # /var/lib/netplan-prev is left in place — the next safe-apply
      # rotates it.
      shell: |
        set -e
        touch /run/netplan-keep
        systemctl stop netplan-rollback.timer netplan-rollback.service 2>/dev/null || true
        rm -rf /run/netplan-rollback
      changed_when: false
