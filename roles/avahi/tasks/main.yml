- name: Install avahi-daemon
  import_role:
    name: apt_no_autostart
    tasks_from: apt
  vars:
    apt_no_autostart_pkg: avahi-daemon
    apt_no_autostart_unit: avahi-daemon.service
  tags:
    - avahi

- name: Install tools
  apt:
    pkg:
      - avahi-utils
    cache_valid_time: 3600
  become: true
  tags:
    - avahi

- name: Copy avahi daemon conf
  copy:
    src: avahi-daemon.conf
    dest: /etc/avahi/avahi-daemon.conf
    mode: "0644"
    owner: root
    group: root
  become: true
  register: avahi_daemon_conf
  tags:
    - avahi

- name: Copy avahi device-info service
  copy:
    src: device-info.service
    dest: /etc/avahi/services/device-info.service
    mode: "0644"
    owner: root
    group: root
  become: true
  register: avahi_device_info
  tags:
    - avahi

- name: Enable avahi service
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_src: avahi-daemon
    systemd_unit_condition: "{{ not (ansible_check_mode and apt_no_autostart.changed) }}"
    systemd_unit_restart: "{{ avahi_device_info.changed or avahi_daemon_conf.changed }}"
  tags:
    - avahi
