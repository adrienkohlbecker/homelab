- name: Install avahi
  apt:
    pkg:
      - avahi-daemon
      - avahi-utils
      - libxml2-utils
    policy_rc_d: 101
    cache_valid_time: 3600
  register: avahi_apt
  become: true
  tags:
    - avahi

- name: Render avahi daemon conf
  template:
    src: avahi-daemon.conf.j2
    dest: /etc/avahi/avahi-daemon.conf
    mode: "0644"
    owner: root
    group: root
    backup: true
    validate: python3 -c 'import configparser,sys; configparser.ConfigParser().read(sys.argv[1])' %s
  when: not (ansible_check_mode and avahi_apt.changed)
  become: true
  register: avahi_daemon_conf
  tags:
    - avahi

# The host deliberately does NOT advertise _device-info._tcp. Claiming
# an Apple `model=` made macOS treat these Linux servers as
# Continuity-capable Macs and open rapportd/Handoff sessions to them on
# udp/3722, dropped at the firewall as pure log noise. Samba shares still
# surface in Finder via the samba role's _smb._tcp advert; the
# mounted-share icon comes from `fruit:model` in smb.conf (in-band over
# the SMB AAPL extension), independent of this record. Remove any file
# left by a prior converge so the advert disappears on the next reload.
- name: Remove the avahi device-info service
  file:
    path: /etc/avahi/services/device-info.service
    state: absent
  become: true
  register: avahi_device_info_removed
  tags:
    - avahi

- name: Enable avahi service
  # Daemon conf changes need a real restart (allow-interfaces et al.
  # are only read at startup). Service-XML changes under
  # /etc/avahi/services/ are picked up via SIGHUP, so a reload drops the
  # removed device-info advert without flushing the LAN's mDNS cache. A
  # conf change wins both — restart already re-reads the services dir, so
  # the reload is redundant in that case.
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: avahi-daemon
      condition: "{{ not (ansible_check_mode and avahi_apt.changed) }}"
      restart: "{{ avahi_daemon_conf.changed }}"
      reload: "{{ avahi_device_info_removed.changed and not avahi_daemon_conf.changed }}"
  tags:
    - avahi
