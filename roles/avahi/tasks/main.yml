- name: Install avahi
  apt:
    pkg:
      - avahi-daemon
      - avahi-utils
    policy_rc_d: 101
    cache_valid_time: 3600
  register: avahi_apt
  become: true
  tags:
    - avahi

- name: Render avahi daemon conf
  template:
    src: avahi-daemon.conf.j2
    dest: /etc/avahi/avahi-daemon.conf
    mode: "0644"
    owner: root
    group: root
    backup: true
  become: true
  register: avahi_daemon_conf
  tags:
    - avahi

- name: Copy avahi device-info service
  copy:
    src: device-info.service
    dest: /etc/avahi/services/device-info.service
    mode: "0644"
    owner: root
    group: root
  become: true
  register: avahi_device_info
  tags:
    - avahi

- name: Enable avahi service
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_src: avahi-daemon
    systemd_unit_condition: "{{ not (ansible_check_mode and avahi_apt.changed) }}"
    systemd_unit_restart: "{{ avahi_device_info.changed or avahi_daemon_conf.changed }}"
  tags:
    - avahi
