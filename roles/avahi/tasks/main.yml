- name: Install avahi
  apt:
    pkg:
      - avahi-daemon
      - avahi-utils
      - libxml2-utils
    policy_rc_d: 101
    cache_valid_time: 3600
  register: avahi_apt
  become: true
  tags:
    - avahi

- name: Render avahi daemon conf
  template:
    src: avahi-daemon.conf.j2
    dest: /etc/avahi/avahi-daemon.conf
    mode: "0644"
    owner: root
    group: root
    backup: true
    validate: python3 -c 'import configparser,sys; configparser.ConfigParser().read(sys.argv[1])' %s
  when: not (ansible_check_mode and avahi_apt.changed)
  become: true
  register: avahi_daemon_conf
  tags:
    - avahi

- name: Render avahi device-info service
  template:
    src: device-info.service.j2
    dest: /etc/avahi/services/device-info.service
    mode: "0644"
    owner: root
    group: root
    backup: true
    validate: xmllint --noout --dtdvalid /usr/share/avahi/avahi-service.dtd %s
  when: not (ansible_check_mode and avahi_apt.changed)
  become: true
  register: avahi_device_info
  tags:
    - avahi

- name: Enable avahi service
  # Daemon conf changes need a real restart (allow-interfaces et al.
  # are only read at startup). Service-XML drops into
  # /etc/avahi/services/ are picked up via SIGHUP, so reload keeps
  # the LAN's mDNS cache warm across per-host model overrides. A conf
  # change wins both — restart already re-reads the services dir, so
  # the reload is redundant in that case.
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: avahi-daemon
      condition: "{{ not (ansible_check_mode and avahi_apt.changed) }}"
      restart: "{{ avahi_daemon_conf.changed }}"
      reload: "{{ avahi_device_info.changed and not avahi_daemon_conf.changed }}"
  tags:
    - avahi
