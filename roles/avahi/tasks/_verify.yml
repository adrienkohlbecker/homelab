# Wire-path check: getent ahosts <host>.local routes through
# libnss-mdns (mdns4_minimal), which sends its own multicast query
# to 224.0.0.251 and is *not* a D-Bus self-query of avahi -- this
# verifies the daemon answers on the wire, not just over the local
# socket. If allow-interfaces regressed to lo-only, the multicast
# group on the real uplink wouldn't be joined and this would fail.
# Retried because the first multicast announcement lags unit-active
# by several seconds on cold start (esp. in QEMU).
- name: _verify | Host's own .local name resolves via mDNS on the wire
  command: getent ahosts {{ ansible_hostname }}.local
  register: _avahi_resolve
  retries: 20
  delay: 2
  until:
    - _avahi_resolve.rc == 0
    - ansible_default_ipv4.address in _avahi_resolve.stdout
  changed_when: false

# Confirms avahi joined the mDNS multicast group (224.0.0.251) on
# the pinned iface. Avahi binds 0.0.0.0:5353 for multicast reception
# (kernel requirement), so the iface pin lives at the IGMP-membership
# layer rather than the bind layer -- ss would always show the
# wildcard bind regardless of allow-interfaces. Positive check:
# catches a regression that failed to join the group at all (typo
# in allow-interfaces, socket-option bug) which the getent above
# could still mask via the kernel's loopback path for local queries.
- name: _verify | Avahi joined 224.0.0.251 on the pinned iface
  command: ip -j maddr show dev {{ default_interface }}
  register: _avahi_maddr
  changed_when: false
  failed_when: >-
    _avahi_maddr.rc != 0
    or '224.0.0.251' not in
       ((_avahi_maddr.stdout | from_json | first).maddr
        | selectattr('family', 'defined')
        | selectattr('family', 'equalto', 'inet')
        | map(attribute='address') | list)

# The role no longer publishes _device-info._tcp: advertising an Apple
# `model=` made macOS treat the host as a Continuity Mac and probe it on
# udp/3722 (see main.yml). Functional negative: browse the wire for the
# type and assert this host isn't announcing it. `-t` terminates after
# one cache cycle so the wait is bounded; since the role never publishes
# the record, the host's row is deterministically absent. A re-introduced
# template would re-announce and this row would reappear -- so it
# regresses on the real bug rather than being tautological.
- name: _verify | Browse the wire for _device-info._tcp announcements
  command: avahi-browse -prt _device-info._tcp
  register: _avahi_device_info
  changed_when: false

- name: _verify | Assert this host announces no _device-info._tcp record
  assert:
    that:
      - _avahi_device_info.rc == 0
      - _avahi_device_info.stdout_lines
          | select('match', '^=;' + default_interface + ';IPv4;' + ansible_hostname + ';')
          | list | length == 0
    fail_msg: >-
      {{ ansible_hostname }} is still announcing _device-info._tcp on
      {{ default_interface }} -- it is advertising as an Apple device again
      and will draw rapportd/3722 probes. avahi-browse output:
      {{ _avahi_device_info.stdout }}
