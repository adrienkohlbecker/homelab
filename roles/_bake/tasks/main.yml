# Drives the homelab-service:<release> bake: applies the same _test fixture
# tasks the harness would otherwise run on every podman-service role test,
# then `testrole.py --commit` snapshots the result into a reusable image.
# See test/build_image.py for the bake invocation.
- import_role:
    name: _test
    tasks_from: podman

- import_role:
    name: _test
    tasks_from: nginx
