- name: Add zfs mount service for root pool
  when: zfs_root
  import_role:
    name: zfs_mount
    tasks_from: unit
  vars:
    zfs_mount_dataset: "rpool/ROOT/{{ ansible_distribution_release }}"
    zfs_mount_mountpoint: /
  tags:
    - zfs_mount

# No host currently sets zfs_has_bpool=true. Kept for future hardware
# with a separate boot pool (e.g. legacy GRUB-on-ZFS layouts).
- name: Add zfs mount service for boot pool
  when: zfs_root and zfs_has_bpool
  import_role:
    name: zfs_mount
    tasks_from: unit
  vars:
    zfs_mount_dataset: "bpool/BOOT/{{ ansible_distribution_release }}"
    zfs_mount_mountpoint: /boot
  tags:
    - zfs_mount
