# dataset is pinned to ansible_distribution_release at converge time. If the
# host is later booted into a different boot environment via ZFSBootMenu
# without re-converging (e.g. a rollback), this unit asserts a SOURCE not
# mounted at / and fails -- blocking every consumer that Requires= it.
# Re-converge after a deliberate BE switch to regenerate the unit.
- name: Add zfs mount service for root pool
  when: zfs_root
  import_role:
    name: zfs_mount
    tasks_from: unit
  vars:
    zfs_mount_args:
      dataset: "rpool/ROOT/{{ ansible_distribution_release }}"
      mountpoint: /
      canmount: noauto
  tags:
    - zfs_mount

# No host currently sets zfs_has_bpool=true. Kept for future hardware
# with a separate boot pool (e.g. legacy GRUB-on-ZFS layouts).
- name: Add zfs mount service for boot pool
  when: zfs_root and zfs_has_bpool
  import_role:
    name: zfs_mount
    tasks_from: unit
  vars:
    zfs_mount_args:
      dataset: "bpool/BOOT/{{ ansible_distribution_release }}"
      mountpoint: /boot
      canmount: noauto
  tags:
    - zfs_mount
