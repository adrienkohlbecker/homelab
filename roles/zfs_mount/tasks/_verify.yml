- name: _verify | Root mount unit is active
  command:
    argv:
      - systemctl
      - is-active
      - zfs_mount_root.service
  changed_when: false
  become: true

- name: _verify | Check mount passes for root dataset
  command: /usr/local/bin/zfs_check_mount rpool/ROOT/{{ ansible_distribution_release }} / noauto
  changed_when: false
  become: true

- name: _verify | Check mount fails for a wrong mountpoint
  command: /usr/local/bin/zfs_check_mount rpool/ROOT/{{ ansible_distribution_release }} /nonexistent
  register: _zfs_mount_verify_negative
  changed_when: false
  failed_when: _zfs_mount_verify_negative.rc == 0
  become: true

- name: _verify | Findmnt confirms root dataset
  command: findmnt --first-only --mountpoint / --noheadings --types zfs --output SOURCE
  register: _zfs_mount_verify_findmnt
  changed_when: false
  become: true

- name: _verify | Assert root mount source is correct
  assert:
    that: _zfs_mount_verify_findmnt.stdout | trim == 'rpool/ROOT/' ~ ansible_distribution_release
    quiet: true
