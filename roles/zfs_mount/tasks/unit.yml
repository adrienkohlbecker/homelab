# Install a per-mountpoint oneshot (zfs_mount_<path>.service) that asserts
# the dataset is correctly mounted at boot; consumer service units
# Requires= it so they refuse to start on a failed/missing mount. Caller
# passes one dict `zfs_mount_args`:
#   dataset    zfs dataset path (e.g. rpool/services)
#   mountpoint absolute mountpoint (e.g. /mnt/services)
#   canmount   optional expected canmount; 'on' (default) for auto-mount
#              datasets, 'noauto' for boot environments.
#
# The dict form mirrors systemd_unit / service_user: each import_role pass
# replaces the whole `zfs_mount_args` value at play-vars scope so a previous
# caller's args can't bleed into the next call.
#
# Unit-name suffix: mountpoint with '/' -> '_' ('/' itself -> 'root'). This
# is not systemd-escape and is non-injective when a mountpoint holds a
# literal '_' (e.g. /mnt/ci_scratch and a hypothetical /mnt/ci/scratch both
# map to mnt_ci_scratch). The live mountpoint set is collision-free; the
# assert below rejects only the one concrete footgun (/root aliasing /).
# ~14 consumer *.service.j2 hard-code the resulting names as Requires=, so
# changing this derivation is a fleet-wide rename.
- name: unit | Assert required inputs
  assert:
    that:
      - zfs_mount_args.dataset is defined
      - zfs_mount_args.dataset | length > 0
      - zfs_mount_args.dataset is match('^[A-Za-z0-9][A-Za-z0-9_.:/-]*$')
      - zfs_mount_args.mountpoint is defined
      - zfs_mount_args.mountpoint is string
      - zfs_mount_args.mountpoint is match('^/')
      - zfs_mount_args.mountpoint != '/root'
      - (zfs_mount_args.canmount | default('on')) in ['on', 'noauto']
    quiet: true
  tags:
    - zfs_mount

- name: Add check mount binary
  copy:
    src: zfs_check_mount.sh
    dest: /usr/local/bin/zfs_check_mount
    mode: "0755"
    owner: root
    group: root
    backup: true
    validate: bash -n %s
  become: true
  tags:
    - zfs_mount

- name: unit | Derive unit name suffix
  set_fact:
    _zfs_mount_unit_name: "{{ zfs_mount_args.mountpoint | zfs_mount_unit }}"
  tags:
    - zfs_mount

- name: unit | Install systemd mount service
  import_role:
    name: systemd_unit
    tasks_from: install
  vars:
    systemd_unit_args:
      src: zfs_mount.service.j2
      dest: "{{ _zfs_mount_unit_name }}"
  tags:
    - zfs_mount

- name: unit | Enable zfs_mount service
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: "{{ _zfs_mount_unit_name | regex_replace('\\.service$', '') }}"
      condition: "{{ not (ansible_check_mode and (lookup('vars', (_zfs_mount_unit_name | ansible_var_key) ~ '_result', default={}) | default({})).changed | default(false)) }}"
      restart: "{{ (lookup('vars', (_zfs_mount_unit_name | ansible_var_key) ~ '_result', default={}) | default({})).changed | default(false) }}"
  tags:
    - zfs_mount
