- name: unit | Assert required inputs
  assert:
    that:
      - zfs_mount_dataset is defined
      - zfs_mount_dataset | length > 0
      - zfs_mount_mountpoint is defined
      - zfs_mount_mountpoint is string
      - zfs_mount_mountpoint is match('^/')
    quiet: true
  tags:
    - zfs_mount

- name: Add check mount binary
  copy:
    src: zfs_check_mount.sh
    dest: /usr/local/bin/zfs_check_mount
    mode: "0755"
    owner: root
    group: root
    backup: true
    validate: bash -n %s
  become: true
  tags:
    - zfs_mount

- name: unit | Derive unit name suffix
  set_fact:
    _zfs_mount_unit_suffix: "{{ zfs_mount_mountpoint | regex_replace('^/$', '/root') | replace('/', '_') }}"
  tags:
    - zfs_mount

- name: unit | Install systemd mount service
  import_role:
    name: systemd_unit
    tasks_from: install
  vars:
    systemd_unit_args:
      src: zfs_mount.service.j2
      dest: "zfs_mount{{ _zfs_mount_unit_suffix }}.service"
  tags:
    - zfs_mount

- name: unit | Enable zfs_mount service
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: "zfs_mount{{ _zfs_mount_unit_suffix }}"
      condition: "{{ not (ansible_check_mode and (vars['zfs_mount' ~ _zfs_mount_unit_suffix ~ '_service_result'] | default({})).changed | default(false)) }}"
      restart: "{{ (vars['zfs_mount' ~ _zfs_mount_unit_suffix ~ '_service_result'] | default({})).changed | default(false) }}"
  tags:
    - zfs_mount
