- name: Add check mount binary
  copy:
    src: zfs_check_mount.sh
    dest: /usr/local/bin/zfs_check_mount
    mode: "0755"
    owner: root
    group: root
    backup: true
    validate: bash -n %s
  become: true
  tags:
    - zfs_mount

- name: unit | Install systemd mount service
  import_role:
    name: systemd_unit
    tasks_from: install
  vars:
    systemd_unit_args:
      src: zfs_mount.service.j2
      dest: zfs_mount{{ zfs_mount_mountpoint | regex_replace('^/$', '/root') | replace('/', '_') }}.service
  tags:
    - zfs_mount

- name: unit | Capture mount unit install result
  set_fact:
    _zfs_mount_unit_changed: >-
      {{ (vars['zfs_mount' ~ (zfs_mount_mountpoint | regex_replace('^/$', '/root') | replace('/', '_')) ~ '_service_result']
          | default({})).changed | default(false) }}
  tags:
    - zfs_mount

- name: unit | Enable zfs_mount service
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: zfs_mount{{ zfs_mount_mountpoint | regex_replace('^/$', '/root') | replace('/', '_') }}
      condition: "{{ not (ansible_check_mode and _zfs_mount_unit_changed) }}"
      restart: "{{ _zfs_mount_unit_changed }}"
  tags:
    - zfs_mount
