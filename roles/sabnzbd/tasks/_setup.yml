- name: _test | Install nginx
  import_role:
    name: _test
    tasks_from: nginx

- name: _setup | Install podman
  import_role:
    name: podman
    tasks_from: install

- name: _setup | Create media podman network
  import_role:
    name: media
    tasks_from: network

- name: _setup | Install authelia stub in gate mode for auth=required tests
  import_role:
    name: _test
    tasks_from: authelia_stub
  vars:
    # authelia_stub_mode is _test's input var, so it can't carry a sabnzbd_
    # prefix. no-role-prefix is experimental -- a silent warning in the
    # sibling gate-mode roles, but it fires firmly in this role's play scope.
    authelia_stub_mode: gate  # noqa: var-naming[no-role-prefix]

- name: _test | Setup dependencies
  file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - /mnt/services
    - /mnt/services/sqlite
    - /mnt/scratch
    - /mnt/media
    # sabnzbd scopes its bind-mount to /mnt/media/Other (the media role
    # creates this on prod); the container won't start without the source.
    - /mnt/media/Other
  become: true

- name: _test | Stub sort_ini binary
  file:
    src: /usr/bin/tail
    dest: /usr/local/bin/sort_ini
    state: link
  become: true
