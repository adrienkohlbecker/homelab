# Required inputs live in group_vars/host_vars (prod.yml/test.yml), never
# defaulted in the role -- an unset or renamed key renders an empty value that
# SABnzbd silently rewrites the .ini from defaults over, losing every server
# credential with no converge error (the configparser validate only catches
# malformed syntax, not an empty-but-valid `api_key =`).
- name: Assert required sabnzbd inputs are provided
  assert:
    that:
      - sabnzbd_api_key | default('') | length > 0
      - sabnzbd_nzb_key | default('') | length > 0
      - sabnzbd_newsdemon_username | default('') | length > 0
      - sabnzbd_newsdemon_password | default('') | length > 0
      - sabnzbd_newsgroupdirect_username | default('') | length > 0
      - sabnzbd_newsgroupdirect_password | default('') | length > 0
      - sabnzbd_usenetfarm_username | default('') | length > 0
      - sabnzbd_usenetfarm_password | default('') | length > 0
      - sabnzbd_smtp_username | default('') | length > 0
      - sabnzbd_smtp_password | default('') | length > 0
      - sabnzbd_smtp_from | default('') | length > 0
      # The *arr/omdb keys render into autoProcessMedia.cfg (nzbToMedia's
      # handoff to the import apps). A renamed/unset key renders an empty
      # value there with no parse error -- silently breaking post-processing.
      - radarr_api_key | default('') | length > 0
      - sonarr_api_key | default('') | length > 0
      - lidarr_api_key | default('') | length > 0
      - omdb_api_key | default('') | length > 0
    fail_msg: >-
      sabnzbd requires its api/nzb keys, the three Usenet provider credentials,
      SMTP creds, and the radarr/sonarr/lidarr/omdb api keys set in
      group_vars/host_vars (see group_vars/prod.yml and group_vars/test.yml).
  tags:
    - sabnzbd

- name: Add media group
  import_role:
    name: media
    tasks_from: group
  tags:
    - sabnzbd

- name: Set up sabnzbd system user, group, and config dir
  import_role:
    name: service_user
    tasks_from: user
  vars:
    service_user_args:
      name: sabnzbd
      extra_groups: [ media ]
      # linuxserver/sabnzbd's s6 init recursively chowns /config to
      # PUID:PGID=sabnzbd:media on every container start. Match it here
      # so ansible doesn't flap the dir's gid back to `sabnzbd` each run.
      config_dir_group: media
  tags:
    - sabnzbd

- name: Create sqlite directory
  when: not (ansible_check_mode and sabnzbd_user.changed)
  file:
    dest: /mnt/services/sqlite/sabnzbd
    state: directory
    owner: sabnzbd
    group: media
    mode: "0750"
  become: true
  tags:
    - sabnzbd

# Sabnzbd creates admin/ on first start, but the symlink below needs the
# parent dir to exist already. Pre-create with matching ownership.
- name: Create admin directory
  when: not (ansible_check_mode and sabnzbd_user.changed)
  file:
    dest: /mnt/services/sabnzbd/admin
    state: directory
    owner: sabnzbd
    group: media
    mode: "0755"
  become: true
  tags:
    - sabnzbd

# Sabnzbd writes history1.db inside /config/admin/ alongside cookies.dat,
# server.cert, queue.sav, etc. Symlink only the SQLite DB so SQLite resolves
# through to the 4K sqlite dataset before computing WAL/SHM placement.
#
# force: true is load-bearing on a cold host: it lets ansible plant the
# symlink while the target doesn't exist yet, and sabnzbd then creates
# history1.db *through* the dangling link on first start (SQLite follows it
# and writes the real DB at the sqlite-dataset target — this is exactly the
# state prod runs in). Without force, state=link refuses the dangling link
# and the converge dies before sabnzbd ever runs. Do NOT instead pre-create
# an empty target file: sabnzbd treats a 0-byte history1.db as needing
# reinitialization and rewrites it via temp+rename, which replaces the
# symlink with a real file — breaking both the 4K placement and idempotence.
# Same hand-rolled force:true shape as roles/kuma (not the sqlite_dataset
# helper, whose pre_create path suits apps like jellyfin that migrate an
# empty DB cleanly). Idempotent once planted: an already-correct symlink is
# left unchanged.
- name: Symlink sabnzbd history DB onto sqlite dataset
  when: not (ansible_check_mode and sabnzbd_user.changed)
  file:
    src: /mnt/services/sqlite/sabnzbd/history1.db
    dest: /mnt/services/sabnzbd/admin/history1.db
    state: link
    owner: sabnzbd
    group: media
    follow: false
    force: true
  become: true
  tags:
    - sabnzbd

# Per-category download targets: sabnzbd drops completed tv/movie/music
# jobs here (the [[tv]]/[[movie]]/[[music]] category dirs in sabnzbd.ini)
# and sonarr/radarr/lidarr import out of them, each mounting only its own
# /mnt/scratch/<name>. Ownership is split across roles by convention --
# sabnzbd creates the dirs, each *arr app (own uid, media group) reads/moves
# from them -- so the 0775 group-write is load-bearing, not cosmetic.
- name: Create storage directories
  when: not (ansible_check_mode and sabnzbd_user.changed)
  file:
    dest: "{{ item }}"
    state: directory
    owner: sabnzbd
    group: media
    mode: "0775"
  become: true
  tags:
    - sabnzbd
  loop:
    - /mnt/scratch/sonarr
    - /mnt/scratch/radarr
    - /mnt/scratch/lidarr

# SABnzbd increments each server's usage_at_start -- the byte odometer it
# pairs with `quota` to compute remaining quota -- as it downloads, then
# rewrites sabnzbd.ini. A fixed literal in the template would clobber that
# live counter on every converge, resetting quota accounting and flapping a
# restart via sabnzbd_conf.changed. Read the current on-disk values back in;
# a fresh host with no ini yet falls through to the baseline literals.
- name: Read existing sabnzbd.ini to preserve usage counters
  slurp:
    src: /mnt/services/sabnzbd/sabnzbd.ini
  register: sabnzbd_existing_ini
  failed_when: false
  changed_when: false
  become: true
  tags:
    - sabnzbd

# Anchor each capture to its own [[server]] block: [^\[]*? stops at the next
# section header, so a server whose usage_at_start line is ever missing falls
# through to its baseline literal instead of bleeding into the following
# server's counter. Dots are escaped (literal, not any-char); | int both keeps
# the rendered value a bare integer and rejects a non-digit scrape.
- name: Preserve per-server usage counters across converges
  vars:
    _ini: "{{ sabnzbd_existing_ini.content | default('') | b64decode }}"
  set_fact:
    sabnzbd_newsdemon_usage_at_start: "{{ ((_ini | regex_search('\\[\\[eu\\.newsdemon\\.com\\]\\][^\\[]*?usage_at_start = (\\d+)', '\\1') or ['0']) | first) | int }}"
    sabnzbd_newsgroupdirect_usage_at_start: "{{ ((_ini | regex_search('\\[\\[news-ssl\\.newsgroupdirect\\.com\\]\\][^\\[]*?usage_at_start = (\\d+)', '\\1') or ['3147984888738']) | first) | int }}"
    sabnzbd_usenetfarm_usage_at_start: "{{ ((_ini | regex_search('\\[\\[news\\.usenet\\.farm\\]\\][^\\[]*?usage_at_start = (\\d+)', '\\1') or ['4857142225255']) | first) | int }}"
  tags:
    - sabnzbd

# configparser is a smoke test, not SABnzbd's own ConfigObj parser: it
# catches a jinja/vault typo that yields a malformed ini before SABnzbd
# silently rewrites it from defaults (losing all server creds) on a parse
# failure. The [__top__] prepend hosts the file's leading __encoding__ /
# __version__ keys, which sit above any section. (autoProcessMedia.cfg gets
# no validate: its repeated [[movie]]/[[tv]]/[[music]] subsections flatten
# to duplicate-section errors under configparser.)
- name: Configure sabnzbd.ini
  template:
    src: sabnzbd.ini.j2
    dest: /mnt/services/sabnzbd/sabnzbd.ini
    owner: sabnzbd
    group: media
    mode: "0600"
    backup: true
    validate: python3 -c 'import configparser,sys; configparser.ConfigParser(allow_no_value=True).read_string("[__top__]\n" + open(sys.argv[1]).read())' "%s"
  register: sabnzbd_conf
  become: true
  tags:
    - sabnzbd

- name: Configure nzbToMedia (autoProcessMedia.cfg)
  template:
    src: autoProcessMedia.cfg.j2
    dest: /mnt/services/sabnzbd/autoProcessMedia.cfg
    owner: sabnzbd
    group: media
    mode: "0600"
    backup: true
  register: sabnzbd_media_conf
  become: true
  tags:
    - sabnzbd

# Download scratch dir (the unit bind-mounts /mnt/scratch/sabnzbd) and the
# nzbToMedia code dir the unarchive below populates -- both sabnzbd:media 0755.
- name: Create scratch and nzbToMedia directories
  when: not (ansible_check_mode and sabnzbd_user.changed)
  file:
    dest: "{{ item }}"
    state: directory
    owner: sabnzbd
    group: media
    mode: "0755"
  become: true
  loop:
    - /mnt/scratch/sabnzbd
    - /opt/nzbToMedia
  tags:
    - sabnzbd

# checksum: in get_url integrity-gates the tarball (a git tag is mutable, so
# the name alone is no guarantee) and drives re-download on a version bump --
# a sha mismatch re-fetches rather than reusing the stale archive.
- name: Download nzbToMedia archive
  when: not (ansible_check_mode and sabnzbd_user.changed)
  get_url:
    url: "{{ sabnzbd_nzbtomedia_url }}"
    dest: "/opt/nzbToMedia/.nzbToMedia-{{ sabnzbd_nzbtomedia_version }}.tar.gz"
    checksum: "sha256:{{ sabnzbd_nzbtomedia_sha256 }}"
    owner: sabnzbd
    group: media
    mode: "0644"
  become: true
  tags:
    - sabnzbd

# Version-stamped sentinel gates the extract: the marker name carries the
# version, so a pin bump removes the match and re-extracts (overwriting the
# stable-named scripts) while an unchanged version is a no-op. `creates:`
# short-circuits the extract entirely once the sentinel is present.
- name: Extract nzbToMedia
  when: not (ansible_check_mode and sabnzbd_user.changed)
  unarchive:
    src: "/opt/nzbToMedia/.nzbToMedia-{{ sabnzbd_nzbtomedia_version }}.tar.gz"
    dest: /opt/nzbToMedia
    remote_src: true
    extra_opts:
      - --strip-components=1
    creates: "/opt/nzbToMedia/.installed-{{ sabnzbd_nzbtomedia_version }}"
  register: sabnzbd_nzbtomedia_extract
  become: true
  become_user: sabnzbd
  tags:
    - sabnzbd

- name: Stamp installed nzbToMedia version  # noqa: require-backup
  when:
    - not (ansible_check_mode and sabnzbd_user.changed)
    - sabnzbd_nzbtomedia_extract is changed
  file:
    path: "/opt/nzbToMedia/.installed-{{ sabnzbd_nzbtomedia_version }}"
    state: touch
    owner: sabnzbd
    group: media
    mode: "0644"
  become: true
  tags:
    - sabnzbd

- name: Install sabnzbd service
  import_role:
    name: systemd_unit
    tasks_from: install
  vars:
    systemd_unit_args:
      src: sabnzbd.service.j2
      condition: "{{ not (ansible_check_mode and sabnzbd_user.changed) }}"
  tags:
    - sabnzbd

- name: Enable sabnzbd service
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: sabnzbd
      condition: "{{ not (ansible_check_mode and (sabnzbd_service_result.changed or sabnzbd_user.changed)) }}"
      restart: "{{ sabnzbd_service_result.changed or sabnzbd_conf.changed or sabnzbd_media_conf.changed or sabnzbd_user.changed or media_group.changed }}"
  tags:
    - sabnzbd

- name: Configure nginx
  import_role:
    name: nginx
    tasks_from: site
  vars:
    nginx_site_args:
      subdomain: sabnzbd
      proxy_pass: http://127.0.0.1:{{ service_ports.sabnzbd }}/
      # Authelia is the sole UI gate: sabnzbd's misc/username +
      # misc/password are empty, so there's no second login. sabnzbd binds
      # host = :: inside the container (sabnzbd.ini), so the *arr leg reaches
      # it at sabnzbd.dns.podman:8080 over the media podman network carrying
      # api_key, bypassing nginx entirely. Don't "harden" that bind to
      # 127.0.0.1 -- it would break the *arr path, which never traverses the
      # loopback --publish. The flip side: api_key is a full admin credential
      # reachable in cleartext by ANY container on the flat media network,
      # not just the *arr apps. Accepted under the single-operator model; the
      # lever to tighten is a narrower network, not the cookie gate.
      auth: required
  tags:
    - sabnzbd

- name: Configure ini watcher
  import_role:
    name: sort_ini
    tasks_from: path
  vars:
    sort_ini_path: /mnt/services/sabnzbd/sabnzbd.ini
    sort_ini_escaped_path: mnt-services-sabnzbd-sabnzbd.ini
  tags:
    - sabnzbd
