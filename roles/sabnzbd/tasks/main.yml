- name: Install dependencies
  apt:
    package:
      - git
    cache_valid_time: 3600
  register: sabnzbd_apt_deps
  become: true
  tags:
    - sabnzbd

- name: Add sabnzbd group
  group:
    name: sabnzbd
    system: true
  become: true
  tags:
    - sabnzbd

- name: Add media group
  import_role:
    name: media
    tasks_from: group
  tags:
    - sabnzbd

- name: Add sabnzbd user
  user:
    name: sabnzbd
    group: sabnzbd
    groups: media
    createhome: false
    system: true
    shell: /usr/sbin/nologin
    home: /nonexistent
  become: true
  register: sabnzbd_user
  tags:
    - sabnzbd

- name: Create configuration directory
  when: not (ansible_check_mode and sabnzbd_user.changed)
  file:
    dest: /mnt/services/sabnzbd
    state: directory
    owner: sabnzbd
    group: media
    mode: "0755"
  become: true
  tags:
    - sabnzbd

- name: Create sqlite directory
  when: not (ansible_check_mode and sabnzbd_user.changed)
  file:
    dest: /mnt/services/sqlite/sabnzbd
    state: directory
    owner: sabnzbd
    group: media
    mode: "0755"
  become: true
  tags:
    - sabnzbd

# Sabnzbd creates admin/ on first start, but the symlink below needs the
# parent dir to exist already. Pre-create with matching ownership.
- name: Create admin directory
  when: not (ansible_check_mode and sabnzbd_user.changed)
  file:
    dest: /mnt/services/sabnzbd/admin
    state: directory
    owner: sabnzbd
    group: media
    mode: "0755"
  become: true
  tags:
    - sabnzbd

# Sabnzbd writes history1.db inside /config/admin/ alongside cookies.dat,
# server.cert, queue.sav, etc. Symlink only the SQLite DB so SQLite resolves
# through to the 4K sqlite dataset before computing WAL/SHM placement.
- name: Symlink sabnzbd history DB onto sqlite dataset
  when: not (ansible_check_mode and sabnzbd_user.changed)
  file:
    src: /mnt/services/sqlite/sabnzbd/history1.db
    dest: /mnt/services/sabnzbd/admin/history1.db
    state: link
    force: true
    owner: sabnzbd
    group: media
    follow: false
  become: true
  tags:
    - sabnzbd

- name: Create storage directories
  file:
    dest: "{{ item }}"
    state: directory
    owner: sabnzbd
    group: media
    mode: "0775"
  become: true
  tags:
    - sabnzbd
  loop:
    - /mnt/scratch/sonarr
    - /mnt/scratch/radarr
    - /mnt/scratch/lidarr

- name: Configure sabnzbd
  template:
    src: sabnzbd.ini.j2
    dest: /mnt/services/sabnzbd/sabnzbd.ini
    owner: sabnzbd
    group: media
    mode: "0600"
    backup: true
  register: sabnzbd_conf
  become: true
  tags:
    - sabnzbd

- name: Configure sabnzbd
  template:
    src: autoProcessMedia.cfg.j2
    dest: /mnt/services/sabnzbd/autoProcessMedia.cfg
    owner: sabnzbd
    group: media
    mode: "0600"
    backup: true
  register: sabnzbd_media_conf
  become: true
  tags:
    - sabnzbd

- name: Configure sabnzbd
  when: not (ansible_check_mode and sabnzbd_user.changed)
  copy:
    src: before_start.sh
    dest: /mnt/services/sabnzbd/before_start.sh
    owner: "{{ sabnzbd_user.uid }}"
    group: "{{ media_group.gid }}"
    mode: "0755"
    backup: true
  register: sabnzbd_before_start
  become: true
  tags:
    - sabnzbd

- name: Create scratch directory
  file:
    dest: /mnt/scratch/sabnzbd
    state: directory
    owner: sabnzbd
    group: media
    mode: "0755"
  become: true
  tags:
    - sabnzbd

- name: Create nzbToMedia directory
  file:
    dest: /opt/nzbToMedia
    state: directory
    owner: sabnzbd
    group: media
    mode: "0755"
  become: true
  tags:
    - sabnzbd

- name: Read installed nzbToMedia version
  ansible.builtin.slurp:
    src: /opt/nzbToMedia/.version
  register: sabnzbd_nzbtomedia_installed
  failed_when: false
  changed_when: false
  tags:
    - sabnzbd

- name: Download nzbToMedia
  when:
    - not (ansible_check_mode and sabnzbd_user.changed)
    - (sabnzbd_nzbtomedia_installed.content | default('') | b64decode | trim) != '12.1.13'
  ansible.builtin.unarchive:
    src: "{{ mirror_github }}/clinton-hall/nzbToMedia/archive/refs/tags/12.1.13.tar.gz"
    dest: /opt/nzbToMedia
    remote_src: true
    extra_opts:
      - --strip-components=1
  become: true
  become_user: sabnzbd
  tags:
    - sabnzbd

- name: Write nzbToMedia version stamp
  when:
    - not (ansible_check_mode and sabnzbd_user.changed)
    - (sabnzbd_nzbtomedia_installed.content | default('') | b64decode | trim) != '12.1.13'
  ansible.builtin.copy:
    content: "12.1.13"
    dest: /opt/nzbToMedia/.version
    owner: sabnzbd
    group: media
    mode: "0644"
  become: true
  tags:
    - sabnzbd

- name: Install sabnzbd service
  import_role:
    name: systemd_unit
    tasks_from: install
  vars:
    systemd_unit_args:
      src: sabnzbd.service.j2
      condition: "{{ not (ansible_check_mode and sabnzbd_user.changed) }}"
  tags:
    - sabnzbd

- name: Enable sabnzbd service
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: sabnzbd
      condition: "{{ not (ansible_check_mode and (systemd_unit.changed or sabnzbd_user.changed)) }}"
      restart: "{{ systemd_unit.changed or sabnzbd_conf.changed or sabnzbd_media_conf.changed or sabnzbd_before_start.changed }}"
  tags:
    - sabnzbd

- name: Configure nginx
  import_role:
    name: nginx
    tasks_from: site
  vars:
    nginx_site_args:
      subdomain: sabnzbd
      proxy_pass: http://localhost:8080/
  tags:
    - sabnzbd

- name: Configure ini watcher
  import_role:
    name: sort_ini
    tasks_from: path
  vars:
    sort_ini_path: /mnt/services/sabnzbd/sabnzbd.ini
    sort_ini_escaped_path: mnt-services-sabnzbd-sabnzbd.ini
  tags:
    - sabnzbd
