# mode=version is unauthenticated (SABnzbd serves it without an api_key),
# so it only proves the container is up and answering. Type=notify +
# --sdnotify=healthy means the unit is already active==healthy by converge
# end; the retries are a safety margin on the test fixture.
- name: _verify | SABnzbd answers mode=version on its loopback port
  uri:
    url: "http://127.0.0.1:{{ service_ports.sabnzbd }}/api?mode=version&output=json"
    status_code: 200
    return_content: true
  register: sabnzbd_verify_version
  retries: 30
  delay: 2
  until:
    - sabnzbd_verify_version.status == 200
    - sabnzbd_verify_version.json.version is defined

# before_start.sh (the /custom-cont-init.d hook) installs ffmpeg at init so
# nzbToMedia's check_media has ffprobe. Confirm the hook actually ran:
# nothing else exercises it, and it proves a non-root-owned custom-init
# script executes in this image (the file rides the sabnzbd:media ownership
# the container chowns /config to, not root).
- name: _verify | The before_start hook installed ffprobe in the container
  command: podman exec sabnzbd ffprobe -version
  register: sabnzbd_verify_ffprobe
  changed_when: false
  retries: 30
  delay: 2
  until: sabnzbd_verify_ffprobe.rc == 0
  become: true

# Negative probe: an authenticated mode (queue) WITHOUT the key must be
# refused -- SABnzbd answers HTTP 403. Pairs with the auth'd probe below:
# together they prove the api_key we templated is both required and the one
# the running container accepted, not just a string we wrote to disk.
- name: _verify | SABnzbd refuses an authenticated call without the api_key
  uri:
    url: "http://127.0.0.1:{{ service_ports.sabnzbd }}/api?mode=queue&output=json"
    status_code: 403
  register: sabnzbd_verify_noauth

# Authenticated probe with our key. SABnzbd takes the api_key only as a
# query param (no header form), so it lands in the URL -- fine on the
# ephemeral test host.
- name: _verify | SABnzbd answers mode=queue with our api_key
  uri:
    url: "http://127.0.0.1:{{ service_ports.sabnzbd }}/api?mode=queue&output=json&apikey={{ sabnzbd_api_key }}"
    status_code: 200
    return_content: true
  register: sabnzbd_verify_auth
  failed_when: sabnzbd_verify_auth.json.queue is not defined

# Exercise the nginx-proxied path too. A regression in the nginx_site
# wiring (typo'd subdomain, broken proxy_pass) would pass the loopback
# probes silently. The authelia stub (always_200) admits the subrequest.
- name: _verify | SABnzbd answers via the nginx vhost
  uri:
    url: "https://localhost/api?mode=version&output=json"
    headers:
      Host: "sabnzbd.{{ inventory_hostname }}.{{ domain }}"
    validate_certs: false
    status_code: 200
    return_content: true
  register: sabnzbd_verify_nginx
  retries: 30
  delay: 2
  until:
    - sabnzbd_verify_nginx.status == 200
    - sabnzbd_verify_nginx.json.version is defined

# The history-DB symlink + matching --volume is the role's whole reason for
# its non-obvious structure: it lands history1.db (and its -wal/-shm
# siblings) on the 4K-recordsize sqlite dataset. The HTTP probes above pass
# whether or not that routing holds -- a dropped symlink strands the DB at
# /config inside the container and nothing else here would notice. Assert it
# functionally: the on-disk path is a symlink onto the dataset, and SABnzbd
# wrote a real, non-empty DB through it on first start.
- name: _verify | Stat the history DB symlink
  stat:
    path: /mnt/services/sabnzbd/admin/history1.db
  register: sabnzbd_verify_db_link
  become: true

- name: _verify | History DB is a symlink onto the sqlite dataset
  assert:
    that:
      - sabnzbd_verify_db_link.stat.islnk
      - sabnzbd_verify_db_link.stat.lnk_target == "/mnt/services/sqlite/sabnzbd/history1.db"
    fail_msg: "history1.db is not a symlink onto the sqlite dataset (stat={{ sabnzbd_verify_db_link.stat }})"

- name: _verify | Stat the dataset-side history DB
  stat:
    path: /mnt/services/sqlite/sabnzbd/history1.db
  register: sabnzbd_verify_db_file
  retries: 15
  delay: 2
  until:
    - sabnzbd_verify_db_file.stat.exists
    - not sabnzbd_verify_db_file.stat.islnk
    - (sabnzbd_verify_db_file.stat.size | default(0) | int) > 0
  become: true

- name: _verify | SABnzbd wrote a real, non-empty history DB onto the dataset
  assert:
    that:
      - sabnzbd_verify_db_file.stat.exists
      - not sabnzbd_verify_db_file.stat.islnk
      - (sabnzbd_verify_db_file.stat.size | int) > 0
    fail_msg: "history1.db on the dataset is missing or empty (stat={{ sabnzbd_verify_db_file.stat }})"
