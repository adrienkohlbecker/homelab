# mode=version is unauthenticated (SABnzbd serves it without an api_key),
# so it only proves the container is up and answering. Type=notify +
# --sdnotify=healthy means the unit is already active==healthy by converge
# end; the retries are a safety margin on the test fixture.
- name: _verify | SABnzbd answers mode=version on its loopback port
  uri:
    url: "http://127.0.0.1:{{ service_ports.sabnzbd }}/api?mode=version&output=json"
    status_code: 200
    return_content: true
  register: _verify_version
  retries: 30
  delay: 2
  until:
    - _verify_version.status == 200
    - _verify_version.json.version is defined

# The universal-package-install Docker Mod (DOCKER_MODS in the unit) installs
# ffmpeg at init so nzbToMedia's check_media (autoProcessMedia.cfg) has ffprobe.
# Confirm it landed: nothing else exercises the mod, and a missing ffprobe
# silently degrades post-processing.
- name: _verify | The universal-package-install mod installed ffprobe in the container
  command: podman exec sabnzbd ffprobe -version
  register: _verify_ffprobe
  changed_when: false
  retries: 30
  delay: 2
  until: _verify_ffprobe.rc == 0
  become: true

# The category scripts SABnzbd invokes (script_dir=/opt/nzbToMedia in
# sabnzbd.ini, and the nzbTo*.py names in the [[movie]]/[[tv]]/[[music]]
# categories) must parse under the *container's* Python -- the host-side
# extraction landing the files proves nothing about whether a wrong
# --strip-components or an interpreter mismatch left them unrunnable, which
# would silently break the *arr handoff. py_compile is the version-mismatch
# probe without needing nzbToMedia's full downloader env to run for real.
- name: _verify | The nzbToMedia scripts compile under the container Python
  command: >-
    podman exec sabnzbd python3 -m py_compile
    /opt/nzbToMedia/nzbToRadarr.py
    /opt/nzbToMedia/nzbToNzbDrone.py
    /opt/nzbToMedia/nzbToLidarr.py
  register: _verify_nzbtomedia
  changed_when: false
  become: true

# Negative probe: an authenticated mode (queue) WITHOUT the key must be
# refused -- SABnzbd answers HTTP 403. Pairs with the auth'd probe below:
# together they prove the api_key we templated is both required and the one
# the running container accepted, not just a string we wrote to disk.
- name: _verify | SABnzbd refuses an authenticated call without the api_key
  uri:
    url: "http://127.0.0.1:{{ service_ports.sabnzbd }}/api?mode=queue&output=json"
    status_code: 403
  register: _verify_http_unauth

# Authenticated probe with our key. SABnzbd takes the api_key only as a
# query param (no header form), so it lands in the URL -- fine on the
# ephemeral test host.
- name: _verify | SABnzbd answers mode=queue with our api_key
  uri:
    url: "http://127.0.0.1:{{ service_ports.sabnzbd }}/api?mode=queue&output=json&apikey={{ sabnzbd_api_key }}"
    status_code: 200
    return_content: true
  register: _verify_http
  failed_when: _verify_http.json.queue is not defined

# The vhost is `auth: required`, so a cookieless request must be bounced to
# Authelia rather than proxied through. With the stub in gate mode (see
# _setup.yml), assert a cookieless GET / lands on nginx's error_page 401 =302
# redirect to the portal. This is the only probe that fails if `auth: required`
# is dropped from nginx_site_args -- the loopback probes above stay green
# without it (and mode=version is unauthenticated, so it can't prove the gate
# either). The Host header still exercises the subdomain -> server_name routing.
- name: _verify | SABnzbd UI gate redirects unauthenticated requests to Authelia
  uri:
    url: https://localhost/
    headers:
      Host: "sabnzbd.{{ inventory_hostname }}.{{ domain }}"
    validate_certs: false
    follow_redirects: none
    status_code: 302
  register: _verify_nginx_gate
  failed_when: >-
    _verify_nginx_gate.status != 302
    or 'auth.' not in (_verify_nginx_gate.location | default(''))

# The history-DB symlink + matching --volume is the role's whole reason for
# its non-obvious structure: it lands history1.db (and its -wal/-shm
# siblings) on the 4K-recordsize sqlite dataset. The HTTP probes above pass
# whether or not that routing holds -- a dropped symlink strands the DB at
# /config inside the container and nothing else here would notice. Assert it
# functionally: the on-disk path is a symlink onto the dataset, and SABnzbd
# wrote a real, non-empty DB through it on first start.
- name: _verify | Stat the history DB symlink
  stat:
    path: /mnt/services/sabnzbd/admin/history1.db
  register: _verify_db_link
  become: true

- name: _verify | History DB is a symlink onto the sqlite dataset
  assert:
    that:
      - _verify_db_link.stat.islnk
      - _verify_db_link.stat.lnk_target == "/mnt/services/sqlite/sabnzbd/history1.db"
    fail_msg: "history1.db is not a symlink onto the sqlite dataset (stat={{ _verify_db_link.stat }})"

- name: _verify | Stat the dataset-side history DB
  stat:
    path: /mnt/services/sqlite/sabnzbd/history1.db
  register: _verify_db_file
  retries: 15
  delay: 2
  until:
    - _verify_db_file.stat.exists
    - not _verify_db_file.stat.islnk
    - (_verify_db_file.stat.size | default(0) | int) > 0
  become: true

- name: _verify | SABnzbd wrote a real, non-empty history DB onto the dataset
  assert:
    that:
      - _verify_db_file.stat.exists
      - not _verify_db_file.stat.islnk
      - (_verify_db_file.stat.size | int) > 0
    fail_msg: "history1.db on the dataset is missing or empty (stat={{ _verify_db_file.stat }})"

# autoProcessMedia.cfg is rendered with no validate: (its repeated subsections
# break configparser) and carries four cross-role credentials nothing else
# exercises. Confirm each templated key landed in the file -- a renamed/unset
# var would leave an empty value and silently break nzbToMedia's handoff to the
# *arr apps. Substring checks (not regex) sidestep the repeated-section parse.
- name: _verify | Read the rendered autoProcessMedia.cfg
  slurp:
    src: /mnt/services/sabnzbd/autoProcessMedia.cfg
  register: _verify_apm
  become: true

- name: _verify | Rendered autoProcessMedia.cfg carries the post-processing credentials
  vars:
    _apm: "{{ _verify_apm.content | b64decode }}"
  assert:
    that:
      - sabnzbd_api_key in _apm
      - radarr_api_key in _apm
      - sonarr_api_key in _apm
      - lidarr_api_key in _apm
      - omdb_api_key in _apm
    fail_msg: "autoProcessMedia.cfg is missing a rendered api key (sabnzbd/radarr/sonarr/lidarr/omdb)"

# usage_at_start preservation (main.yml's slurp+regex readback) is the role's
# most fragile mechanism and the HTTP/DB probes can't see it: a broken readback
# silently resets the per-server quota odometer to the template baseline on the
# next converge. The harness idempotence check never catches it either -- it
# re-converges before any counter has moved off baseline. Exercise it directly:
# seed a sentinel counter on disk, re-run the role, and assert the re-render
# read it back rather than clobbering it. Re-importing the role is out of
# contract on prod, but _verify is test-only (the host is ephemeral).
- name: _verify | Seed a sentinel usage_at_start into the on-disk ini
  replace:
    path: /mnt/services/sabnzbd/sabnzbd.ini
    regexp: '(\[\[eu\.newsdemon\.com\]\][^\[]*?usage_at_start = )\d+'
    replace: '\g<1>987654321'
  become: true

- name: _verify | Re-run the role to exercise the counter readback
  import_role:
    name: sabnzbd

- name: _verify | Re-read the ini after the re-converge
  slurp:
    src: /mnt/services/sabnzbd/sabnzbd.ini
  register: _verify_usage_ini
  become: true

- name: _verify | The seeded usage_at_start survived the re-render
  vars:
    _ini: "{{ _verify_usage_ini.content | b64decode }}"
  assert:
    that:
      - (_ini | regex_search('\\[\\[eu\\.newsdemon\\.com\\]\\][^\\[]*?usage_at_start = (\\d+)', '\\1') | first) == '987654321'
    fail_msg: "usage_at_start preservation regressed: the readback reset the seeded counter to baseline"
