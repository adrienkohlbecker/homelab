- name: _verify | act_runner user exists
  command: getent passwd act_runner
  changed_when: false
  become: true

- name: _verify | act_runner registration file exists
  stat:
    path: /mnt/services/act_runner/.runner
  register: _verify_runner_file
  failed_when: not _verify_runner_file.stat.exists
  become: true

- name: _verify | act_runner config file exists
  stat:
    path: /mnt/services/act_runner/config.yml
  register: _verify_config_file
  failed_when: not _verify_config_file.stat.exists
  become: true

- name: _verify | linger is enabled for act_runner
  stat:
    path: /var/lib/systemd/linger/act_runner
  register: _verify_linger
  failed_when: not _verify_linger.stat.exists
  become: true

- name: _verify | act_runner.service is loaded and active
  systemd:
    name: act_runner
  register: _verify_unit
  failed_when:
    - _verify_unit.status.LoadState != "loaded"
    - _verify_unit.status.ActiveState != "active"
  become: true
