- name: _test | Install dependencies
  apt:
    pkg:
      - podman
      - git
      # podman's rootless mode shells out to newuidmap/newgidmap (in uidmap)
      # to read the subuid/subgid ranges. uidmap is only a Recommends of
      # podman, so install_recommends:false leaves it out -- pull it in
      # explicitly so podman can start under act_runner.
      - uidmap
    install_recommends: false
    cache_valid_time: 3600
  become: true

# In production, host-wide subuid/subgid allocation happens in the `subid` role
# (driven by host_vars `subid_users`). The role-only test harness doesn't apply
# that role, so we pre-seed an entry for act_runner here -- without it, rootless
# podman refuses to start with "no subuid ranges found for user act_runner".
- name: _test | Pre-allocate subuid for act_runner
  lineinfile:
    path: /etc/subuid
    line: "act_runner:100000:65536"
    regexp: "^act_runner:"
    create: true
    owner: root
    group: root
    mode: "0644"
  become: true

- name: _test | Pre-allocate subgid for act_runner
  lineinfile:
    path: /etc/subgid
    line: "act_runner:100000:65536"
    regexp: "^act_runner:"
    create: true
    owner: root
    group: root
    mode: "0644"
  become: true

- name: _test | Install gitea
  get_url:
    url: "{{ act_runner_test_gitea_release[ansible_architecture].url }}"
    checksum: "sha256:{{ act_runner_test_gitea_release[ansible_architecture].sha256 }}"
    dest: /gitea
    mode: "0755"
    owner: root
    group: root
  become: true

- name: _test | Run gitea
  shell: |
    set -euo pipefail

    mkdir -p /{custom,data,log}
    mkdir -p /custom/conf
    mkdir -p /data/gitea-repositories
    cat <<EOF >/custom/conf/app.ini
    I_AM_BEING_UNSAFE_RUNNING_AS_ROOT=true

    [database]
    DB_TYPE = sqlite3

    [security]
    INSTALL_LOCK = true

    [actions]
    ENABLED = true
    EOF

    systemd-run env HOME=/root /gitea web
    sleep 5
    echo "gitea.{{ inventory_hostname }}.{{ domain }}"
  args:
    executable: /bin/bash
    creates: /custom/conf/app.ini
  changed_when: true
  become: true
