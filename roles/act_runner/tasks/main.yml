- name: Set up act_runner system user, group, and config dir
  import_role:
    name: service_user
    tasks_from: user
  vars:
    service_user_args:
      name: act_runner
      home: /mnt/scratch/act_runner
      createhome: true
      # kvm so podman can hand /dev/kvm to lab-runtime containers via
      # --device + --group-add keep-groups (rootless userns doesn't map
      # the host kvm gid through by default; keep-groups passes the host
      # supplementary groups through).
      extra_groups: [ kvm ]
  tags:
    - act_runner

- name: Create runtime directories
  when: not (ansible_check_mode and act_runner_user.changed)
  file:
    dest: "{{ item }}"
    state: directory
    owner: act_runner
    group: act_runner
    mode: "0755"
  become: true
  loop:
    - /mnt/services/act_runner
    - /mnt/scratch/act_runner/cache
    - /mnt/scratch/act_runner/workdir
    # Bind-mounted into test cells via container.options for the harness's
    # --workdir-parent. Lives on /mnt/scratch (terabytes) instead of the
    # container's writable overlay so concurrent qcow2 overlays + role
    # checkouts can't ENOSPC the cell. Each cell mounts a unique subdir
    # underneath this so two concurrent cells can't see each other; the
    # tmpfiles.d entry below reaps the per-cell subdirs after they idle.
    - /mnt/scratch/act_runner/lab-runtime-workdir
  tags:
    - act_runner

# systemd-tmpfiles --clean runs daily via systemd-tmpfiles-clean.timer
# and applies the rule on each tick. The rule walks lab-runtime-workdir's
# tree, deletes files >1d stale, removes empty old subdirs as a side
# effect -- so a completed or crashed test cell's per-cell tree gets
# fully reaped once its contents are >1d old. The 1d age is comfortably
# beyond the harness's 1500s timeout, so a live cell can't be touched.
- name: Install tmpfiles.d entry for lab-runtime-workdir
  copy:
    src: tmpfiles.conf
    dest: /etc/tmpfiles.d/act_runner.conf
    owner: root
    group: root
    mode: "0644"
    backup: true
    # Catches typos in the rule line; --create exits non-zero on parse
    # failure. --dry-run was added in systemd 250 -- jammy ships 249
    # so we drop the flag there. Without --dry-run the validate's
    # side effect is the `d` rule's mkdir of /mnt/scratch/qemu/
    # _sentinels (idempotent; next tmpfiles tick would do the same);
    # the `e` rule has no creation side effect.
    validate: >-
      systemd-tmpfiles
      {{ '--dry-run' if ansible_distribution_release not in ['jammy'] else '' }}
      --create %s
  become: true
  tags:
    - act_runner

# Linger has to be on BEFORE the lab-runtime build runs: rootless
# podman's runtime (crun) makes sd-bus calls when creating the build's
# intermediate containers, which fail with "Permission denied" if the
# user has no systemd manager. `loginctl enable-linger` starts
# user@<uid>.service which provides the dbus + cgroup hierarchy crun
# expects.
- name: Turn on linger
  command: loginctl enable-linger act_runner
  args:
    creates: /var/lib/systemd/linger/act_runner
  become: true
  register: act_runner_linger
  tags:
    - act_runner

# linger triggers user@<uid>.service asynchronously; the build task
# immediately following needs it fully up so crun's sd-bus calls
# succeed. systemd module with state=started blocks until active.
# Skip under check mode when the user wasn't really created — uid
# isn't populated on the service_user result, and templating
# user@{{ uid }}.service would fail.
- name: Ensure act_runner user systemd manager is running
  when: not (ansible_check_mode and act_runner_user.changed)
  systemd:
    name: user@{{ act_runner_user.uid }}.service
    state: started
  become: true
  tags:
    - act_runner

# Silence the kernel's "overlayfs: fs on '...' does not support file
# handles, falling back to xino=off" printk that fires on every rootless
# overlay mount. The fallback is unavoidable in a rootless userns
# (CAP_DAC_READ_SEARCH isn't held in the init namespace, so the kernel
# disables file-handle support regardless of underlying fs), and CI churn
# emits the warning ~160x/day on lab. Pre-declaring xino=off in mountopt
# makes the kernel skip the probe — same end state, no printk.
#
# Scoped to act_runner (the only loud rootless user) instead of global
# /etc/containers/storage.conf so rootful overlay keeps its working xino.
# nodev preserves the upstream default; userxattr is force-added by
# podman internally for rootless, so we don't restate it.
- name: Create rootless containers config directory
  when: not (ansible_check_mode and act_runner_user.changed)
  file:
    path: /mnt/scratch/act_runner/.config/containers
    state: directory
    owner: act_runner
    group: act_runner
    mode: "0755"
  become: true
  tags:
    - act_runner

- name: Configure rootless overlay storage opts
  when: not (ansible_check_mode and act_runner_user.changed)
  copy:
    dest: /mnt/scratch/act_runner/.config/containers/storage.conf
    content: |
      [storage.options.overlay]
      mountopt = "nodev,xino=off"
    owner: act_runner
    group: act_runner
    mode: "0644"
  become: true
  tags:
    - act_runner

# Build the lab-runtime container image used by every CI workflow. The
# image lives only in the act_runner user's local podman image store --
# no registry, no push. podman build is layer-cached, so unchanged
# inputs exit in ~200ms even with force: true.
#
# Build inputs (Dockerfile + mise.toml + pyproject.toml + uv.lock +
# packer/qemu.pkr.hcl) are staged into a per-apply temp dir on the
# remote via `rsync --relative` so the repo's relative paths survive
# into the build context (Dockerfile's `COPY packer/qemu.pkr.hcl ...`
# depends on that). The temp dir, plus the GitHub token tmpfile used
# for `podman build --secret`, are both torn down in `always:` so a
# build crash doesn't leak state.
#
# force: true because we no longer keep a persistent build dir to
# diff against; podman's layer cache makes no-op rebuilds cheap.
#
# --cgroup-manager=cgroupfs (extra_args) scopes a workaround to just
# the build: rootless podman's default systemd cgroup manager needs
# to register transient scopes via the user session bus, but the box
# images don't ship dbus-user-session (chroot.sh installs
# linux-generic --no-install-recommends), so /run/user/$UID/bus
# doesn't exist and crun fails with "sd-bus call: Permission denied".
# cgroupfs sidesteps it; workflow containers spawned at runtime use
# the systemd default unaltered.
#
# --secret id=NAME,src=PATH mounts the token tmpfile inside the
# consuming RUN; the Dockerfile reads /run/secrets/<NAME>.
#
# environment: become_user: act_runner doesn't propagate
# XDG_RUNTIME_DIR / DBUS_SESSION_BUS_ADDRESS the way a login session
# would; rootless podman/crun need them to reach the user's systemd
# manager. Default('0') keeps templating from failing in check mode
# where act_runner_user has no uid field; the build itself is gated
# by `when: not ansible_check_mode` so '0' is never used.
- name: Build lab-runtime image
  # Skip the whole block in check mode: tempfile doesn't actually
  # create the dir (returns a result without `path`), so the
  # downstream synchronize fails resolving dest. The build itself is
  # also a no-op in check mode, so there's nothing to dry-run here.
  when: not ansible_check_mode
  tags:
    - act_runner
  # Whole block runs as act_runner so the build context (tempfile +
  # rsync'd inputs) and the token tmpfile are written by the same
  # user that podman_image will read them as -- no chmod / chown
  # dance. synchronize's become_user wiring auto-generates
  # `--rsync-path="sudo -u act_runner rsync"` so the remote rsync
  # writes as act_runner too.
  become: true
  become_user: act_runner
  block:
    - name: Create temp build context for lab-runtime image
      ansible.builtin.tempfile:
        state: directory
        prefix: lab-runtime-build-
      register: act_runner_lab_runtime_buildctx

    - name: Stage build inputs into temp build context
      # rsync --relative + the /./ pivot in src preserves the path
      # after the pivot inside dest. The Dockerfile is included with
      # its repo-relative path, so it lands at
      # <ctx>/roles/act_runner/files/Dockerfile.lab-runtime and
      # podman_image below points `build.file` at it -- no separate
      # copy task needed. Inputs land at the layout the Dockerfile's
      # COPY statements expect (e.g. packer/qemu.pkr.hcl). Intermediate
      # dirs are auto-created (ansible.builtin.copy won't do that).
      # owner/group: false drops rsync's -o/-g; controller UIDs don't
      # translate to the remote anyway (ansible-lint no-same-owner).
      ansible.posix.synchronize:
        src: "{{ playbook_dir }}/./{{ item }}"
        dest: "{{ act_runner_lab_runtime_buildctx.path }}/"
        owner: false
        group: false
        rsync_opts:
          - "--relative"
      loop:
        - roles/act_runner/files/Dockerfile.lab-runtime
        - mise.toml
        - pyproject.toml
        - uv.lock
        - packer/qemu.pkr.hcl

    - name: Stage GitHub token tmpfile for the lab-runtime build
      # mise pulls tool releases from GitHub during `mise install`.
      # Anon API is 60/hr; authenticated 5000/hr. podman build's
      # --secret needs src=PATH (no podman-secret store integration),
      # so the token lands at a 0400 file in /run/user/<uid>/ --
      # tmpfs (act_runner owns its own /run/user/<uid>/), gone on
      # reboot, plus torn down in `always:` below.
      when: not ansible_check_mode
      copy:
        dest: /run/user/{{ act_runner_user.uid | default('0') }}/lab-runtime-build-token
        content: "{{ mise_github_token }}"
        mode: "0400"
      no_log: true

    - name: Build lab-runtime image
      when: not ansible_check_mode
      environment:
        XDG_RUNTIME_DIR: /run/user/{{ act_runner_user.uid | default('0') }}
        DBUS_SESSION_BUS_ADDRESS: unix:path=/run/user/{{ act_runner_user.uid | default('0') }}/bus
      containers.podman.podman_image:
        name: lab-runtime
        tag: latest
        state: build
        path: "{{ act_runner_lab_runtime_buildctx.path }}"
        force: true
        build:
          file: "{{ act_runner_lab_runtime_buildctx.path }}/roles/act_runner/files/Dockerfile.lab-runtime"
          extra_args: >-
            --cgroup-manager=cgroupfs
            --secret id=mise_github_token,src=/run/user/{{ act_runner_user.uid | default('0') }}/lab-runtime-build-token
      register: act_runner_lab_runtime_build

  always:
    - name: Remove temp build context
      when: act_runner_lab_runtime_buildctx.path is defined
      file:
        path: "{{ act_runner_lab_runtime_buildctx.path }}"
        state: absent

    - name: Remove staged GitHub token tmpfile
      when: not ansible_check_mode
      file:
        path: /run/user/{{ act_runner_user.uid | default('0') }}/lab-runtime-build-token
        state: absent

- name: Configure act_runner
  when: not (ansible_check_mode and act_runner_user.changed)
  template:
    src: config.yml.j2
    dest: /mnt/services/act_runner/config.yml
    owner: act_runner
    group: act_runner
    mode: "0644"
    backup: true
  register: act_runner_conf
  become: true
  tags:
    - act_runner

- name: Check if act_runner is installed
  command: act_runner --version
  register: act_runner_check
  failed_when: false
  changed_when: false
  check_mode: false
  become: true
  tags:
    - act_runner

- name: Install act_runner if needed
  check_mode: false
  when: act_runner_version not in act_runner_check.stdout
  get_url:
    url: "{{ act_runner_release[ansible_architecture].url }}"
    checksum: "sha256:{{ act_runner_release[ansible_architecture].sha256 }}"
    dest: /usr/local/bin/act_runner
    mode: "0755"
    owner: root
    group: root
  become: true
  register: act_runner_installed
  tags:
    - act_runner

- name: Check if act_runner is registered
  stat:
    path: /mnt/services/act_runner/.runner
  register: act_runner_registered
  become: true
  tags:
    - act_runner

# --work-path matches roles/act_runner/tasks/_setup.yml's `gitea web`
# invocation; without it gitea looks next to the binary, misses app.ini,
# and refuses with "Gitea is not supposed to be run as root" because
# I_AM_BEING_UNSAFE_RUNNING_AS_ROOT=true lives in app.ini, not env.
- name: Get registration token (test)
  when:
    - qemu_test
    - not act_runner_registered.stat.exists
  command: /usr/local/bin/gitea --work-path /var/lib/gitea actions generate-runner-token
  register: _test_runner_token
  become: true
  tags:
    - act_runner

- name: Compute registration instance URL
  set_fact:
    act_runner_instance: >-
      {{
        'http://localhost:3000'
        if qemu_test
        else 'https://gitea.' + inventory_hostname + '.' + domain
      }}
  tags:
    - act_runner

- name: Compute prod registration token
  when: not qemu_test
  set_fact:
    act_runner_token: "{{ gitea_runner_registration_token }}"
  tags:
    - act_runner

# In check-mode (or when .runner already exists) the fixture's
# `gitea actions generate-runner-token` task is skipped, leaving
# _test_runner_token unset. The conditional substitutes a placeholder
# so check-mode dry-run output still renders the `act_runner register`
# command; on real runs the registration's `creates: .../.runner`
# short-circuits when already registered, so the placeholder never
# reaches the wire. Inline conditional rather than `default([..])[1]`
# because ansible-core 2.20's templating engine misroutes `[1]` on a
# default-substituted list as `.1` attribute access and errors out.
- name: Compute test registration token
  when: qemu_test
  set_fact:
    act_runner_token: >-
      {{ _test_runner_token.stdout_lines[1]
         if (_test_runner_token.stdout_lines | default([]) | length > 1)
         else 'TOKEN' }}
  tags:
    - act_runner

- name: Register runner
  when: not (ansible_check_mode and act_runner_user.changed)
  command: >-
    act_runner register
    -c /mnt/services/act_runner/config.yml
    --no-interactive
    --instance {{ act_runner_instance }}
    --token {{ act_runner_token }}
  args:
    creates: /mnt/services/act_runner/.runner
  become: true
  become_user: act_runner
  register: act_runner_registration
  tags:
    - act_runner

- name: Load JSON file
  when: not (ansible_check_mode and (act_runner_user.changed or act_runner_registration.changed))
  slurp:
    src: /mnt/services/act_runner/.runner
  register: act_runner_settings_b64
  become: true
  tags:
    - act_runner

- name: Update .runner with templated labels and address
  when: not (ansible_check_mode and (act_runner_user.changed or act_runner_registration.changed))
  template:
    src: runner.json.j2
    dest: /mnt/services/act_runner/.runner
    owner: act_runner
    group: act_runner
    mode: "0600"
    backup: true
    validate: python3 -c "import json,sys; json.load(open(sys.argv[1]))" %s
  vars:
    act_runner_settings_json: "{{ act_runner_settings_b64['content'] | default('e30=') | b64decode | from_json }}"
  register: act_runner_json_conf
  become: true
  tags:
    - act_runner

- name: Enable rootless podman socket
  when: not (ansible_check_mode and (act_runner_user.changed or act_runner_linger.changed))
  systemd:
    name: podman.socket
    enabled: true
    scope: user
  become: true
  become_user: act_runner
  tags:
    - act_runner

- name: Start rootless podman socket
  when: not (ansible_check_mode and (act_runner_user.changed or act_runner_linger.changed))
  systemd:
    name: podman.socket
    state: started
    scope: user
  become: true
  become_user: act_runner
  tags:
    - act_runner

- name: Install podman prune timer for act_runner
  import_role:
    name: podman
    tasks_from: prune
  vars:
    podman_prune_args:
      user: act_runner
      condition: "{{ not (ansible_check_mode and act_runner_user.changed) }}"
  tags:
    - act_runner

- name: Install act_runner service
  import_role:
    name: systemd_unit
    tasks_from: install
  vars:
    systemd_unit_args:
      src: act_runner.service.j2
      condition: "{{ not (ansible_check_mode and act_runner_user.changed) }}"
  tags:
    - act_runner

- name: Enable act_runner service
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: act_runner
      condition: "{{ not (ansible_check_mode and (systemd_unit.changed or act_runner_user.changed)) }}"
      restart: "{{ systemd_unit.changed or act_runner_conf.changed or act_runner_registration.changed or act_runner_json_conf.changed or act_runner_installed.changed }}"
  tags:
    - act_runner
