- name: Set up act_runner system user, group, and config dir
  import_role:
    name: service_user
    tasks_from: user
  vars:
    service_user_name: act_runner
    service_user_home: /mnt/scratch/act_runner
    service_user_createhome: true
    # kvm so podman can hand /dev/kvm to lab-runtime containers via
    # --device + --group-add keep-groups (rootless userns doesn't map
    # the host kvm gid through by default; keep-groups passes the host
    # supplementary groups through).
    service_user_extra_groups: [ kvm ]
  tags:
    - act_runner

- name: Create runtime directories
  when: not (ansible_check_mode and act_runner_user.changed)
  file:
    dest: "{{ item }}"
    state: directory
    owner: act_runner
    group: act_runner
    mode: "0755"
  become: true
  loop:
    - /mnt/services/act_runner
    - /mnt/services/act_runner/build
    - /mnt/scratch/act_runner/cache
    - /mnt/scratch/act_runner/workdir
  tags:
    - act_runner

# Linger has to be on BEFORE the lab-runtime build runs: rootless
# podman's runtime (crun) makes sd-bus calls when creating the build's
# intermediate containers, which fail with "Permission denied" if the
# user has no systemd manager. `loginctl enable-linger` starts
# user@<uid>.service which provides the dbus + cgroup hierarchy crun
# expects.
- name: Turn on linger
  command: loginctl enable-linger act_runner
  args:
    creates: /var/lib/systemd/linger/act_runner
  become: true
  register: act_runner_linger
  tags:
    - act_runner

# linger triggers user@<uid>.service asynchronously; the build task
# immediately following needs it fully up so crun's sd-bus calls
# succeed. systemd module with state=started blocks until active.
# Skip under check mode when the user wasn't really created — uid
# isn't populated on the service_user result, and templating
# user@{{ uid }}.service would fail.
- name: Ensure act_runner user systemd manager is running
  when: not (ansible_check_mode and act_runner_user.changed)
  systemd:
    name: user@{{ act_runner_user.uid }}.service
    state: started
  become: true
  tags:
    - act_runner

# Build the lab-runtime container image used by every CI workflow. The
# image lives only in the act_runner user's local podman image store —
# no registry, no push. podman build is layer-cached, so unchanged
# inputs exit in ~200ms; the changed_when below reports honestly via
# the "Storing signatures" line that podman only prints on real layer
# commit.
#
# Build inputs (Dockerfile + mise.toml + pyproject.toml + uv.lock) are
# staged into /mnt/services/act_runner/build/ from the controller's
# repo root. Bumping any of them triggers a rebuild on the next role
# apply.
- name: Stage lab-runtime Dockerfile
  when: not (ansible_check_mode and act_runner_user.changed)
  copy:
    src: Dockerfile.lab-runtime
    dest: /mnt/services/act_runner/build/Dockerfile.lab-runtime
    owner: act_runner
    group: act_runner
    mode: "0644"
    backup: true
  become: true
  register: act_runner_lab_runtime_dockerfile
  tags:
    - act_runner

- name: Stage lab-runtime build inputs from repo root
  when: not (ansible_check_mode and act_runner_user.changed)
  copy:
    src: "{{ playbook_dir }}/{{ item }}"
    dest: /mnt/services/act_runner/build/{{ item }}
    owner: act_runner
    group: act_runner
    mode: "0644"
    backup: true
  become: true
  loop:
    - mise.toml
    - pyproject.toml
    - uv.lock
  register: act_runner_lab_runtime_inputs
  tags:
    - act_runner

- name: Build lab-runtime image
  when: not ansible_check_mode
  # --cgroup-manager=cgroupfs scopes a workaround to JUST the build
  # command: rootless podman's default systemd cgroup manager needs to
  # register transient scopes via the user session bus, but the box
  # images don't ship dbus-user-session (chroot.sh installs
  # linux-generic --no-install-recommends), so /run/user/$UID/bus
  # doesn't exist and crun fails with "sd-bus call: Permission denied".
  # The user manager is up (linger + start above) — only the dbus
  # session daemon is missing. cgroupfs sidesteps it entirely. Workflow
  # containers spawned at runtime use the systemd default unaltered.
  command: podman --cgroup-manager=cgroupfs build -t lab-runtime:latest -f Dockerfile.lab-runtime .
  args:
    chdir: /mnt/services/act_runner/build
  # become_user: act_runner doesn't propagate XDG_RUNTIME_DIR or
  # DBUS_SESSION_BUS_ADDRESS the way a real login session would, and
  # rootless podman/crun need them to find the user's systemd manager
  # for cgroup + sd-bus operations. Set them explicitly.
  # Default('0') keeps templating from failing in check mode where
  # service_user_result has no uid field; the task itself is gated by
  # `when: not ansible_check_mode` so '0' is never actually used.
  environment:
    XDG_RUNTIME_DIR: /run/user/{{ act_runner_user.uid | default('0') }}
    DBUS_SESSION_BUS_ADDRESS: unix:path=/run/user/{{ act_runner_user.uid | default('0') }}/bus
  become: true
  become_user: act_runner
  register: act_runner_lab_runtime_build
  changed_when: "'Storing signatures' in act_runner_lab_runtime_build.stdout"
  tags:
    - act_runner

- name: Configure act_runner
  when: not (ansible_check_mode and act_runner_user.changed)
  template:
    src: config.yml.j2
    dest: /mnt/services/act_runner/config.yml
    owner: act_runner
    group: act_runner
    mode: "0644"
    backup: true
  register: act_runner_conf
  become: true
  tags:
    - act_runner

- name: Check if act_runner is installed
  command: act_runner --version
  register: act_runner_check
  failed_when: false
  changed_when: false
  check_mode: false
  become: true
  tags:
    - act_runner

- name: Install act_runner if needed
  check_mode: false
  when: act_runner_version not in act_runner_check.stdout
  get_url:
    url: "{{ act_runner_release[ansible_architecture].url }}"
    checksum: "sha256:{{ act_runner_release[ansible_architecture].sha256 }}"
    dest: /usr/local/bin/act_runner
    mode: "0755"
    owner: root
    group: root
  become: true
  tags:
    - act_runner

- name: Check if act_runner is registered
  stat:
    path: /mnt/services/act_runner/.runner
  register: act_runner_registered
  become: true
  tags:
    - act_runner

# --work-path matches roles/act_runner/tasks/_setup.yml's `gitea web`
# invocation; without it gitea looks next to the binary, misses app.ini,
# and refuses with "Gitea is not supposed to be run as root" because
# I_AM_BEING_UNSAFE_RUNNING_AS_ROOT=true lives in app.ini, not env.
- name: Get registration token (test)
  when:
    - qemu_test
    - not act_runner_registered.stat.exists
  command: /usr/local/bin/gitea --work-path /var/lib/gitea actions generate-runner-token
  register: _test_runner_token
  become: true
  tags:
    - act_runner

- name: Compute registration instance URL
  set_fact:
    act_runner_instance: >-
      {{
        'http://localhost:3000'
        if qemu_test
        else 'https://gitea.' + inventory_hostname + '.' + domain
      }}
  tags:
    - act_runner

- name: Compute prod registration token
  when: not qemu_test
  set_fact:
    act_runner_token: "{{ gitea_runner_registration_token }}"
  tags:
    - act_runner

# In check-mode (or when .runner already exists) the fixture's
# `gitea actions generate-runner-token` task is skipped, leaving
# _test_runner_token unset. The conditional substitutes a placeholder
# so check-mode dry-run output still renders the `act_runner register`
# command; on real runs the registration's `creates: .../.runner`
# short-circuits when already registered, so the placeholder never
# reaches the wire. Inline conditional rather than `default([..])[1]`
# because ansible-core 2.20's templating engine misroutes `[1]` on a
# default-substituted list as `.1` attribute access and errors out.
- name: Compute test registration token
  when: qemu_test
  set_fact:
    act_runner_token: >-
      {{ _test_runner_token.stdout_lines[1]
         if (_test_runner_token.stdout_lines | default([]) | length > 1)
         else 'TOKEN' }}
  tags:
    - act_runner

- name: Register runner
  when: not (ansible_check_mode and act_runner_user.changed)
  command: >-
    act_runner register
    -c /mnt/services/act_runner/config.yml
    --no-interactive
    --instance {{ act_runner_instance }}
    --token {{ act_runner_token }}
  args:
    creates: /mnt/services/act_runner/.runner
  become: true
  become_user: act_runner
  register: act_runner_registration
  tags:
    - act_runner

- name: Load JSON file
  when: not (ansible_check_mode and (act_runner_user.changed or act_runner_registration.changed))
  slurp:
    src: /mnt/services/act_runner/.runner
  register: act_runner_settings_b64
  become: true
  tags:
    - act_runner

- name: Update .runner with templated labels and address
  when: not (ansible_check_mode and (act_runner_user.changed or act_runner_registration.changed))
  template:
    src: runner.json.j2
    dest: /mnt/services/act_runner/.runner
    owner: act_runner
    group: act_runner
    mode: "0600"
    backup: true
    validate: python3 -c "import json,sys; json.load(open(sys.argv[1]))" %s
  vars:
    act_runner_settings_json: "{{ act_runner_settings_b64['content'] | default('e30=') | b64decode | from_json }}"
  register: act_runner_json_conf
  become: true
  tags:
    - act_runner

- name: Enable rootless podman socket
  when: not (ansible_check_mode and (act_runner_user.changed or act_runner_linger.changed))
  systemd:
    name: podman.socket
    enabled: true
    scope: user
  become: true
  become_user: act_runner
  tags:
    - act_runner

- name: Start rootless podman socket
  when: not (ansible_check_mode and (act_runner_user.changed or act_runner_linger.changed))
  systemd:
    name: podman.socket
    state: started
    scope: user
  become: true
  become_user: act_runner
  tags:
    - act_runner

- name: Install podman prune timer for act_runner
  import_role:
    name: podman
    tasks_from: prune
  vars:
    podman_prune_user: act_runner
    podman_prune_condition: "{{ not (ansible_check_mode and act_runner_user.changed) }}"
  tags:
    - act_runner

- name: Install act_runner service
  import_role:
    name: systemd_unit
    tasks_from: template
  vars:
    systemd_unit_src: act_runner.service
    systemd_unit_condition: "{{ not (ansible_check_mode and act_runner_user.changed) }}"
  tags:
    - act_runner

- name: Enable act_runner service
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_src: act_runner
    systemd_unit_condition: "{{ not (ansible_check_mode and (systemd_unit.changed or act_runner_user.changed)) }}"
    systemd_unit_restart: "{{ systemd_unit.changed or act_runner_conf.changed or act_runner_registration.changed or act_runner_json_conf.changed }}"
  tags:
    - act_runner
