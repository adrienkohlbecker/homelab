act_runner_version: "0.2.10"

# Labels written into .runner on every play, so a host_vars override can add
# or remove a label without re-registering the runner. The runner reports
# these to gitea on each connection; the gitea side updates lazily.
act_runner_labels:
  - "host_{{ inventory_hostname }}:host"
  - "ubuntu-22.04:docker://ghcr.io/catthehacker/ubuntu:act-22.04"
  - "ubuntu-24.04:docker://ghcr.io/catthehacker/ubuntu:act-24.04"

act_runner_release:
  x86_64:
    url: "{{ mirror_gitea_com }}/gitea/act_runner/releases/download/v{{ act_runner_version }}/act_runner-{{ act_runner_version }}-linux-amd64"
    sha256: "b11753c8fe0143dfbaa392ffc5cc035db551fd7254c145dce512aebc8947542a"
  aarch64:
    url: "{{ mirror_gitea_com }}/gitea/act_runner/releases/download/v{{ act_runner_version }}/act_runner-{{ act_runner_version }}-linux-arm64"
    sha256: "1d727f9190ce559689db9d716d548f01c0cde1c034c9c4d570f7992857251be8"

# Gitea fixture used by _setup.yml for in-test registration.
act_runner_test_gitea_version: "1.21.11"
act_runner_test_gitea_release:
  x86_64:
    url: "{{ mirror_gitea_dl }}/gitea/{{ act_runner_test_gitea_version }}/gitea-{{ act_runner_test_gitea_version }}-linux-amd64"
    sha256: "238056fa4616633a9ec5a358aac75275bd3f271d5e5238af3dd5f22c713fe97e"
  aarch64:
    url: "{{ mirror_gitea_dl }}/gitea/{{ act_runner_test_gitea_version }}/gitea-{{ act_runner_test_gitea_version }}-linux-arm64"
    sha256: "1bdbb3507067b3db9c2178be0bc038c2549fddb4eafff96d4a7c0010c7d1e404"
