act_runner_version: "0.6.1"

# Labels written into .runner on every play, so a host_vars override can add
# or remove a label without re-registering the runner. The runner reports
# these to gitea on each connection; the gitea side updates lazily.
#
# Just the one label: every CI workflow runs in the lab-runtime image
# (built by this role from files/Dockerfile.lab-runtime). The bare
# host_<name> and stock ubuntu-22.04/24.04 docker labels were unused.
act_runner_labels:
  - "lab-runtime:docker://lab-runtime:latest"

act_runner_release:
  x86_64:
    url: "{{ mirror_gitea_com }}/gitea/act_runner/releases/download/v{{ act_runner_version }}/act_runner-{{ act_runner_version }}-linux-amd64"
    sha256: "b4dadc7ea9440e94e73d0bb620aea231acb5a02f35f8bfcfa1ba8824db66367e"
  aarch64:
    url: "{{ mirror_gitea_com }}/gitea/act_runner/releases/download/v{{ act_runner_version }}/act_runner-{{ act_runner_version }}-linux-arm64"
    sha256: "98d143b5a3b50a2f8e5b8e5ee31e10dad35099a9a0e394c43ac2998df396766f"
