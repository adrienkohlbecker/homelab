# Functional verify: stand up a throwaway system user, drive the helper,
# assert the linger sentinel + a live user manager, prove a re-run is a
# no-op, then tear down.
#
# The helper's check-mode gate (`when: not (ansible_check_mode and
# _linger_result.changed)`) is deliberately not exercised here: it only
# takes its skip path under a real `ansible-playbook --check` run, and the
# harness never runs _verify under --check. Forcing check mode via the
# `check_mode: true` task keyword runs the tasks in check mode but leaves
# `ansible_check_mode` false, so the gate would not take its --check branch
# — a test built on it would pass for the wrong reason.
- name: _verify | Create fixture user
  user:
    name: linger_test
    system: true
    create_home: false
    shell: /usr/sbin/nologin
  register: _verify_user
  become: true

- name: _verify | Drive the helper
  import_role:
    name: linger
    tasks_from: linger
  vars:
    linger_args:
      name: linger_test
      uid: "{{ _verify_user.uid }}"

- name: _verify | Linger sentinel exists
  stat:
    path: /var/lib/systemd/linger/linger_test
  register: _verify_sentinel
  become: true

- name: _verify | Assert sentinel and per-user fact were exposed
  assert:
    that:
      - _verify_sentinel.stat.exists
      - linger_test_lingered is defined
      - linger_test_lingered

# The user manager being active is the headline behavior callers depend on
# (a live bus for rootless podman / user-scope timers); failed_when makes
# the probe its own assertion.
- name: _verify | User manager is active
  command: systemctl is-active user@{{ _verify_user.uid }}.service
  register: _verify_active
  changed_when: false
  failed_when: _verify_active.stdout | trim != 'active'
  become: true

# An active manager alone doesn't prove the user's runtime environment is
# live; logind provisions /run/user/<uid> (XDG_RUNTIME_DIR — where rootless
# podman and user-scope units place their sockets) precisely because linger
# is on, and user@<uid>.service is ordered after it, so assert it exists.
# (The per-user dbus socket /run/user/<uid>/bus would be a stronger probe,
# but it depends on dbus-user-session, which the minimal box fixture lacks.)
- name: _verify | XDG_RUNTIME_DIR is provisioned
  stat:
    path: /run/user/{{ _verify_user.uid }}
  register: _verify_runtime_dir
  become: true

# Prove it is linger keeping the manager up, not a live login session:
# the fixture user has never logged in, so loginctl must list no session
# for it while user@<uid>.service is nonetheless active.
- name: _verify | List active sessions
  command: loginctl list-sessions --no-legend
  register: _verify_sessions
  changed_when: false
  become: true

- name: _verify | Assert runtime dir present and manager is lingering, not session-backed
  assert:
    that:
      - _verify_runtime_dir.stat.exists
      - _verify_runtime_dir.stat.isdir
      - _verify_sessions.stdout is not search('linger_test')

- name: _verify | Drive the helper again (idempotence)
  import_role:
    name: linger
    tasks_from: linger
  vars:
    linger_args:
      name: linger_test
      uid: "{{ _verify_user.uid }}"

- name: _verify | Assert the re-run was a no-op
  assert:
    that:
      - linger_test_lingered is defined
      - not linger_test_lingered

- name: _verify | Drive the disable subtask (also exercises the disable path)
  import_role:
    name: linger
    tasks_from: disable
  vars:
    linger_args:
      name: linger_test
      uid: "{{ _verify_user.uid }}"

- name: _verify | Confirm the linger marker is gone after disable
  stat:
    path: /var/lib/systemd/linger/linger_test
  register: _verify_sentinel_gone
  become: true

- name: _verify | Assert disable-linger removed the marker
  assert:
    that:
      - not _verify_sentinel_gone.stat.exists

- name: _verify | Remove fixture user
  user:
    name: linger_test
    state: absent
  become: true
