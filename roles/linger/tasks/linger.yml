# Inputs: caller passes a single dict `linger_args` with keys
#   name  required; user account to linger (for the ansible SSH user
#         pass `ansible_user_id`, for service_user-created accounts
#         pass the literal name). The account must already exist —
#         loginctl enable-linger errors on an unknown user, so place
#         this import after the task that creates the user.
#   uid   required; the user's uid (caller resolves; for the ansible
#         SSH user pass `ansible_user_uid`, for service_user-created
#         accounts pass `<svc>_user.uid`)
#
# Use the gathered facts (`ansible_user_id` / `ansible_user_uid`), not
# `ansible_user` — the latter is set by the connection plugin and isn't
# present in the template context when `vars:` on `import_role` is
# evaluated, which trips a "'ansible_user' is undefined" warning.
#
# Does, in order: enable-linger for <name>, record the result under
# `<name>_linger`, and start user@<uid>.service. The subtle, load-bearing
# parts:
#   - enable-linger only writes the persistence marker; it never
#     synchronously starts the user manager, so the explicit start is what
#     gives a consumer driving `systemctl --user` right after a live bus.
#     Hard contract — every caller depends on it; do not drop it.
#   - `<name>_linger` lets service-user callers chain check-mode gates on
#     downstream user-scope tasks (`<name>_linger.changed` paired with
#     `<name>_user.changed`); the operator-user callers (podman, user)
#     ignore it. Only `.changed` is contractual — don't reach into the
#     command register's .stdout/.rc. For the operator user it is also
#     last-writer-wins (user then podman both linger the SSH account in one
#     play), another reason only service-user callers should rely on it.
#   - the `creates:` sentinel only suppresses a phantom "changed" on
#     re-runs; enable-linger is itself idempotent, so it is not a
#     correctness guard.
#
# The dict form mirrors service_user / systemd_timer / podman_secret:
# each import_role replaces the whole `linger_args` value at play-vars
# scope so a previous caller's name/uid can't bleed into the next call.
- name: linger | Validate inputs for {{ linger_args.name | default('<unset>') }}
  assert:
    that:
      - linger_args.name is defined
      - linger_args.name is string
      - linger_args.name is match('^[a-z_][a-z0-9_-]*$')
      # Under --check on a not-yet-provisioned host, service_user only
      # *reports* creating the account, so <svc>_user.uid is still unset
      # and linger_args.uid resolves undefined. Tolerate that in check mode
      # only: on a real run this assert requires a uid. The one path that
      # reaches here undefined is check-mode-on-a-fresh-host, and there the
      # enable-linger task reports "would change", so the user-manager start
      # below is skipped by its own check-mode gate — the undefined uid is
      # never consumed.
      - linger_args.uid is defined or ansible_check_mode
      - linger_args.uid is not defined or (linger_args.uid | string is match('^[0-9]+$'))
    quiet: true
    fail_msg: >-
      linger_args needs name (a valid username matching [a-z_][a-z0-9_-]*)
      and a numeric uid; got name={{ linger_args.name | default('<unset>') }}
      uid={{ linger_args.uid | default('<unset>') }}.

- name: linger | Enable linger for {{ linger_args.name }}
  command:
    argv:
      - loginctl
      # Fail fast rather than block on a TTY if polkit ever wants
      # interactive auth (hardened policy, or a non-root become_user).
      - --no-ask-password
      - enable-linger
      - "{{ linger_args.name }}"
    creates: /var/lib/systemd/linger/{{ linger_args.name }}
  become: true
  register: _linger_enable_result

# The fact key is sanitized via regex_replace because ansible variable
# names must match [A-Za-z_][A-Za-z0-9_]* — a hyphen (which the name regex
# above permits, and which some upstream daemons hardcode) would otherwise
# fail set_fact with "Invalid variable name". Same pattern as service_user.
- name: linger | Record linger result for {{ linger_args.name }}
  set_fact:
    "{{ linger_args.name | regex_replace('[^A-Za-z0-9_]', '_') }}_linger": "{{ _linger_enable_result }}"

- name: linger | Ensure user manager is running for {{ linger_args.name }}
  when: not (ansible_check_mode and _linger_enable_result.changed)
  systemd:
    name: user@{{ linger_args.uid }}.service
    state: started
  become: true
