# Pinned to the last MinIO release before the console SPA and the
# on-disk IAM layout changed: the nginx sub_filter SSO injection
# (tasks/main.yml) and the .minio.sys/* idempotence sentinels
# (tasks/data.yml) both depend on this vintage. A bump needs a console
# + provisioning re-test, not a bare version change. URL kept adjacent
# to its sha256 so the pin is auditable without recomposing the URL.
