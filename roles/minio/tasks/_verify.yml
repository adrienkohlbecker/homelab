# S3 API readiness on the loopback port. /minio/health/live is the
# unauth-friendly liveness endpoint; once it returns 200 the daemon
# is parsing requests. Retries cover MINIO_VOLUMES init + IAM
# sub-system load on cold start.
- name: _verify | MinIO S3 API answers /minio/health/live
  uri:
    url: http://localhost:{{ service_ports.minio_api }}/minio/health/live
    status_code: 200
  register: minio_verify_api
  retries: 30
  delay: 2
  until: minio_verify_api.status == 200
  become: true

# Console subsystem on the loopback console port. /api/v1/login is
# the unauth endpoint the SPA hits at boot to learn whether to show
# the form or redirect to an external IdP -- a 200 here proves the
# console server is up independent of the OIDC config loading.
- name: _verify | MinIO console answers /api/v1/login
  uri:
    url: http://localhost:{{ service_ports.minio_console }}/api/v1/login
    status_code: 200
    return_content: true
  register: minio_verify_console
  failed_when: >-
    minio_verify_console.status != 200
    or minio_verify_console.json.loginStrategy is not defined
  become: true

# nginx proxy chain for the API subdomain. ARQ / restic / terraform
# backend all hit this URL via SigV4 against the S3 API.
- name: _verify | MinIO API reachable through nginx
  uri:
    url: https://localhost/minio/health/live
    headers:
      Host: minio-api.{{ inventory_hostname }}.{{ domain }}
    validate_certs: false
    status_code: 200
  become: true

# nginx proxy chain for the console subdomain. Also asserts the
# sub_filter injection landed -- the SPA HTML carries our
# auto-redirect script that fires when no session cookie is set,
# bypassing the "Login with SSO" button click. A MinIO upgrade
# that changes the </head> token (different casing, whitespace,
# minification) would break the injection silently; this catches
# it as a regression.
- name: _verify | MinIO console reachable through nginx (+ auto-redirect injection)
  uri:
    url: https://localhost/
    headers:
      Host: minio.{{ inventory_hostname }}.{{ domain }}
    validate_certs: false
    return_content: true
    status_code: 200
  register: minio_verify_console_spa
  failed_when: >-
    minio_verify_console_spa.status != 200
    or 'fetch("/api/v1/login")' not in minio_verify_console_spa.content
  become: true

# Data-plane provisioning, exercised through the `default` alias
# (configured in client.yml). Catches the 403-class regressions a stat on
# the policy dir can't -- a user created without its policy, a bucket that
# never got made, a policy file that failed to load.
- name: _verify | Provisioned bucket is listable
  command: mcli ls default/{{ minio_buckets[0] }}
  changed_when: false
  become: true

- name: _verify | useronly + admins IAM policies exist
  command: mcli admin policy info default {{ item }}
  changed_when: false
  loop:
    - useronly
    - admins
  become: true

- name: _verify | Provisioned user exists
  command: mcli admin user info default {{ minio_users[0].access_key }}
  changed_when: false
  become: true

# OIDC integration end-to-end (console flips loginStrategy=redirect,
# admins claim mints STS creds) is verified manually on prod -- on
# box, the MINIO_IDENTITY_OPENID_CONFIG_URL points at
# https://auth.box.mhaf.fr/.well-known/openid-configuration, which
# (a) has no /etc/hosts entry mapping it to 127.0.0.1, and
# (b) wouldn't pass MinIO's TLS validation against the single-CN
# snakeoil cert even with a hosts entry. Bringing OIDC under _verify
# would need a multi-SAN snakeoil cert + system-trust insertion +
# real Authelia in _setup; not worth the extra ~30s per test run for
# the regression coverage it adds. The OIDC env vars themselves are
# rendered by main.yml's template task which fails loudly if
# minio_oidc_client_secret is undefined.
