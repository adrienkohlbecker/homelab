# S3 API readiness through the nginx proxy chain. /minio/health/live is the
# unauth-friendly liveness endpoint; once it returns 200 the daemon is
# parsing requests and the proxy is wired. Retries cover MINIO_VOLUMES init +
# IAM sub-system load on cold start. ARQ / restic / terraform all reach MinIO
# via this same SigV4-over-HTTPS path, so it doubles as the readiness gate.
#
# Map the vhost FQDN to loopback so SNI matches the served certificate.
# Probing https://localhost with a Host: header leaves SNI=localhost, which
# OpenSSL 3.x (noble/resolute) rejects as a fatal unrecognized_name alert
# (status -1); hitting the FQDN directly keeps SNI correct on every release.
- name: _verify | Map the minio-api vhost FQDN to loopback for SNI-correct probing
  lineinfile:
    path: /etc/hosts
    line: "127.0.0.1 minio-api.{{ inventory_hostname }}.{{ domain }}"
    state: present
  become: true

- name: _verify | MinIO API answers through nginx
  uri:
    url: https://minio-api.{{ inventory_hostname }}.{{ domain }}/minio/health/live
    validate_certs: false
    status_code: 200
  register: minio_verify_api
  retries: 30
  delay: 2
  until: minio_verify_api.status == 200
  become: true

# Console subsystem on the loopback console port. /api/v1/login is the unauth
# endpoint the SPA hits at boot to learn whether to show the form or redirect
# to an external IdP -- a 200 + loginStrategy proves the console server is up
# independent of the OIDC config loading.
- name: _verify | MinIO console answers /api/v1/login
  uri:
    url: http://localhost:{{ service_ports.minio_console }}/api/v1/login
    status_code: 200
    return_content: true
  register: minio_verify_console
  failed_when: >-
    minio_verify_console.status != 200
    or minio_verify_console.json.loginStrategy is not defined
  become: true

# nginx proxy chain for the console subdomain.
#
# Map the vhost FQDN to loopback so SNI matches the served certificate.
# Probing https://localhost with a Host: header leaves SNI=localhost, which
# OpenSSL 3.x (noble/resolute) rejects as a fatal unrecognized_name alert
# (status -1); hitting the FQDN directly keeps SNI correct on every release.
- name: _verify | Map the minio console vhost FQDN to loopback for SNI-correct probing
  lineinfile:
    path: /etc/hosts
    line: "127.0.0.1 minio.{{ inventory_hostname }}.{{ domain }}"
    state: present
  become: true

- name: _verify | MinIO console reachable through nginx
  uri:
    url: https://minio.{{ inventory_hostname }}.{{ domain }}/
    validate_certs: false
    status_code: 200
  become: true

# Data-plane provisioning, exercised through the `default` alias supplied via
# MC_HOST_default in the environment (client.yml no longer persists an alias).
# Catches the 403-class regressions a stat on the policy dir can't -- a user
# created without its policy, a bucket that never got made, a policy file that
# failed to load.
- name: _verify | Data-plane checks
  become: true
  block:

    # Authenticate AS the provisioned user (not root) and list its own bucket:
    # proves the useronly policy actually grants own-bucket access, which the
    # root-alias checks below can't (root reads everything). Import a scoped
    # alias from the user's creds (same off-argv stdin path client.yml uses).
    # The bucket is named for the access_key -- the coupling main.yml asserts.
    - name: _verify | Import an alias scoped to the provisioned user
      command: mcli alias import scoped /dev/stdin
      args:
        stdin: "{{ {'url': 'http://localhost:' ~ service_ports.minio_api, 'accessKey': minio_users[0].access_key, 'secretKey': minio_users[0].secret_key, 'api': 'S3v4', 'path': 'auto'} | to_json }}"
      changed_when: false

    - name: _verify | Provisioned user can list its own bucket (useronly scope)
      command: mcli ls scoped/{{ minio_users[0].access_key }}
      changed_when: false

    - name: _verify | Provisioned bucket is listable
      command: mcli ls default/{{ minio_buckets[0] }}
      changed_when: false

    # Existence only -- this does NOT prove `admins` grants admin:* (a typo'd
    # action would still register and pass `policy info`); the admin grant is
    # exercised manually via the OIDC login path (see below).
    - name: _verify | Useronly + admins IAM policies exist
      command: mcli admin policy info default {{ item }}
      changed_when: false
      loop:
        - useronly
        - admins

    - name: _verify | Provisioned user exists
      command: mcli admin user info default {{ minio_users[0].access_key }}
      changed_when: false

# OIDC integration end-to-end (console flips loginStrategy=redirect, admins
# claim mints STS creds) is verified manually on prod -- on box, the
# MINIO_IDENTITY_OPENID_CONFIG_URL points at
# https://auth.box.mhaf.fr/.well-known/openid-configuration, which
# (a) has no /etc/hosts entry mapping it to 127.0.0.1, and
# (b) wouldn't pass MinIO's TLS validation against the single-CN snakeoil
# cert even with a hosts entry. Bringing OIDC under _verify would need a
# multi-SAN snakeoil cert + system-trust insertion + real Authelia in _setup;
# not worth the extra ~30s per test run for the regression coverage it adds.
# The OIDC env vars themselves are rendered by main.yml's template task which
# fails loudly if minio_oidc_client_secret is undefined.
