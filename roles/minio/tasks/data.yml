- name: data | Install jq
  apt:
    pkg: jq
    cache_valid_time: 3600
  become: true
  tags:
    - minio

# Feed the keys on stdin (access key line 1, secret line 2) so the secret
# never lands in argv / the process table; mcli reads them from stdin when
# only the alias is passed. Run every converge (changed_when: false) rather
# than gating on an on-disk sentinel: `mcli admin user add` overwrites, so a
# rotated secret_key in minio_users is actually re-applied here.
- name: data | Create users
  command: mcli admin user add default
  args:
    stdin: "{{ item.access_key }}\n{{ item.secret_key }}"
  changed_when: false
  loop: "{{ minio_users }}"
  become: true
  tags:
    - minio

# --ignore-existing no-ops (exit 0) when the bucket is already present, so
# this is self-idempotent without coupling to MinIO's on-disk bucket layout.
- name: data | Create buckets
  command: mcli mb --ignore-existing default/{{ item }}
  changed_when: false
  loop: "{{ minio_buckets }}"
  become: true
  tags:
    - minio

- name: data | Create policy dir
  file:
    path: /opt/minio/policies
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true
  tags:
    - minio

# `useronly` scopes a user to their own bucket; `admins` grants full
# admin + s3 -- it's the policy the OIDC groups:["admins"] claim attaches
# at login (see MINIO_IDENTITY_OPENID_CLAIM_NAME=groups in minio.cfg.j2),
# named to match Authelia's group so the claim->policy lookup just works.
- name: data | Provision IAM policies
  include_tasks: policy.yml
  loop:
    - { name: useronly, src: useronly.json }
    - { name: admins, src: admins.json }
  loop_control:
    loop_var: minio_policy
  tags:
    - minio

- name: data | Attach useronly policy
  command: mcli admin policy set default useronly user={{ item.access_key }}
  args:
    creates: /mnt/minio/.minio.sys/config/iam/policydb/users/{{ item.access_key }}.json
  loop: "{{ minio_users }}"
  become: true
  tags:
    - minio
