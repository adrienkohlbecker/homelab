- name: Assert required inputs are set
  assert:
    that:
      - minio_root_user | default('') | length > 0
      - minio_root_password | default('') | length > 0
      - minio_oidc_client_secret | default('') | length > 0
      - minio_users is defined
      - minio_buckets is defined
      - zfs_dozer_filesystem | default('') | length > 0
    fail_msg: >-
      minio requires minio_root_user, minio_root_password,
      minio_oidc_client_secret, minio_users, minio_buckets and
      zfs_dozer_filesystem in host_vars/group_vars. A mistyped vault key
      renders to an empty string that boots an auth-broken MinIO which still
      reaches `active`, so check for non-empty, not just defined.
  tags:
    - minio

# The useronly policy (files/useronly.json) scopes every user to
# arn:aws:s3:::${aws:username}, which resolves to the access_key. A user
# whose access_key has no same-named bucket authenticates fine but 403s on
# every operation -- catch that here rather than as a runtime ARQ/restic 403.
- name: Assert each minio user has a matching bucket
  assert:
    that: item.access_key in minio_buckets
    fail_msg: >-
      minio user '{{ item.access_key }}' has no bucket of the same name in
      minio_buckets. Add '{{ item.access_key }}' to minio_buckets or rename
      the user.
    quiet: true
  loop: "{{ minio_users }}"
  loop_control:
    label: "{{ item.access_key }}"
  tags:
    - minio

- name: Install minio server
  import_role:
    name: deb_install
    tasks_from: install
  vars:
    deb_install_args:
      name: minio
      version: "{{ minio_version }}"
      url: "{{ minio_release[ansible_architecture].url }}"
      sha256: "{{ minio_release[ansible_architecture].sha256 }}"
  tags:
    - minio

- name: Create minio system user
  import_role:
    name: service_user
    tasks_from: user
  vars:
    service_user_args:
      name: minio-user
      # /mnt/minio is a ZFS mountpoint (created below), not /mnt/services/<svc>
      config_dir: false
  tags:
    - minio

- name: Provision the minio dataset
  import_role:
    name: zfs
    tasks_from: dataset
  vars:
    zfs_dataset_args:
      dataset: '{{ zfs_dozer_filesystem }}/minio'
      mountpoint: /mnt/minio
      owner: minio-user
      group: minio-user
      extra_properties:
        'autobackup:bak': 'true'
  tags:
    - minio

- name: Configure minio
  template:
    src: minio.cfg.j2
    dest: /etc/default/minio
    owner: minio-user
    group: minio-user
    mode: "0600"
    backup: true
  register: minio_cfg
  become: true
  tags:
    - minio

- name: Install minio service override
  import_role:
    name: systemd_unit
    tasks_from: dropin
  vars:
    systemd_unit_args:
      src: override_service.conf.j2
      for: minio.service
      condition: "{{ zfs_root }}"
  tags:
    - minio

- name: Enable minio service
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: minio
      condition: "{{ not (ansible_check_mode and (minio_deb_changed | default(false) | bool)) }}"
      restart: "{{ minio_service_d_override_conf_result.changed or minio_cfg.changed or (minio_deb_changed | default(false) | bool) }}"
  tags:
    - minio

- name: Configure nginx (console)
  import_role:
    name: nginx
    tasks_from: site
  vars:
    nginx_site_args:
      subdomain: minio
      proxy_pass: http://127.0.0.1:{{ service_ports.minio_console }}/
  tags:
    - minio

- name: Configure nginx (api)
  import_role:
    name: nginx
    tasks_from: site
  vars:
    nginx_site_args:
      subdomain: minio-api
      proxy_pass: http://127.0.0.1:{{ service_ports.minio_api }}/
      # Stream large S3 uploads (ARQ/restic) to MinIO as they arrive
      # instead of buffering the whole request body in nginx first.
      proxy_request_buffering: 'off'
      # Otherwise ARQ uploads return HTTP 413.
      client_max_body_size: 60M
      # MINIO_PROMETHEUS_AUTH_TYPE=public leaves the metrics endpoint
      # unauthenticated; the scrapers hit it on loopback, so close the
      # public path rather than expose bucket names/sizes.
      location_conf: |
        location /minio/v2/metrics/ { deny all; return 404; }
  tags:
    - minio

- name: Configure minio client
  import_tasks: client.yml

- name: Configure minio data
  import_tasks: data.yml
