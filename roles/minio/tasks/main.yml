# Query just the minio package version rather than package_facts, which
# enumerates every installed apt package (~2s) only to read one version.
# argv form keeps ${Version} literal for dpkg-query (no shell, no shlex
# quoting); rc!=0 + empty stdout when not installed -> install path.
- name: Check installed minio version  # noqa: command-instead-of-module
  command:
    argv:
      - dpkg-query
      - -W
      - -f=${Version}
      - minio
  register: minio_pkg
  changed_when: false
  failed_when: false
  check_mode: false
  tags:
    - minio

- name: Install minio if needed
  when: minio_pkg.stdout != minio_version
  become: true
  tags:
    - minio
  block:

    - name: Download minio deb
      check_mode: false
      get_url:
        url: "{{ minio_release[ansible_architecture].url }}"
        dest: /tmp/minio.deb
        mode: '0644'
        owner: root
        group: root
        checksum: "sha256:{{ minio_release[ansible_architecture].sha256 }}"
      register: minio_download
      retries: 3
      delay: 5
      until: minio_download is succeeded

    - name: Install minio
      apt:
        deb: /tmp/minio.deb
      register: minio_installed

    - name: Delete deb file
      file:
        path: /tmp/minio.deb
        state: absent

- name: Create minio system user
  import_role:
    name: service_user
    tasks_from: user
  vars:
    service_user_args:
      name: minio-user
      # /mnt/minio is a ZFS mountpoint (created below), not /mnt/services/<svc>
      config_dir: false
  tags:
    - minio

- name: Create zfs filesystem
  when: zfs_root
  zfs:
    name: '{{ zfs_dozer_filesystem }}/minio'
    state: present
    extra_zfs_properties:
      mountpoint: /mnt/minio
      'autobackup:bak': 'true'
  become: true
  tags:
    - minio

- name: Create data dir
  when: not (ansible_check_mode and minio_user_user.changed)
  file:
    dest: /mnt/minio
    state: directory
    owner: minio-user
    group: minio-user
    mode: "0755"
  become: true
  tags:
    - minio

- name: Set up mount service for dozer/minio
  when: zfs_root
  import_role:
    name: zfs_mount
    tasks_from: unit
  vars:
    zfs_mount_dataset: '{{ zfs_dozer_filesystem }}/minio'
    zfs_mount_mountpoint: /mnt/minio
  become: true
  tags:
    - minio

- name: Configure minio
  template:
    src: minio.cfg.j2
    dest: /etc/default/minio
    owner: minio-user
    group: minio-user
    mode: "0600"
    backup: true
  register: minio_cfg
  become: true
  tags:
    - minio

- name: Install minio service override
  import_role:
    name: systemd_unit
    tasks_from: dropin
  vars:
    systemd_unit_args:
      src: override_service.conf.j2
      for: minio.service
      condition: "{{ zfs_root }}"
  tags:
    - minio

- name: Enable minio service
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: minio
      condition: "{{ not (ansible_check_mode and (minio_installed.changed | default(false))) }}"
      restart: "{{ minio_service_d_override_conf_result.changed or minio_cfg.changed or (minio_installed.changed | default(false)) }}"
  tags:
    - minio

- name: Configure nginx (console)
  import_role:
    name: nginx
    tasks_from: site
  vars:
    nginx_site_args:
      subdomain: minio
      proxy_pass: http://127.0.0.1:{{ service_ports.minio_console }}/
      # Skip the "Login with SSO" click. MinIO 2022's console SPA
      # renders a button when /api/v1/login returns
      # loginStrategy=redirect; inject a script that runs the same
      # redirect on page load when no session cookie is present.
      # /oauth_callback is excluded so the post-Authelia round-trip
      # completes; Accept-Encoding is unset so MinIO doesn't gzip
      # the HTML out from under sub_filter.
      location_conf: |
        proxy_set_header Accept-Encoding "";
        sub_filter_once on;
        sub_filter '</head>' '<script>(function(){if(location.pathname==="/oauth_callback")return;if(document.cookie.match(/(?:^|;\s*)token=/))return;fetch("/api/v1/login").then(function(r){return r.json()}).then(function(d){if(d.loginStrategy==="redirect"&&d.redirect){location.replace(d.redirect)}}).catch(function(){})})();</script></head>';
  tags:
    - minio

- name: Configure nginx (api)
  import_role:
    name: nginx
    tasks_from: site
  vars:
    nginx_site_args:
      subdomain: minio-api
      proxy_pass: http://127.0.0.1:{{ service_ports.minio_api }}/
      # Stream large S3 uploads (ARQ/restic) to MinIO as they arrive
      # instead of buffering the whole request body in nginx first.
      proxy_request_buffering: 'off'
      location_conf: |
        # Otherwise ARQ uploads return HTTP 413
        client_max_body_size     60M;
  tags:
    - minio

- name: Configure minio client
  import_tasks: client.yml

- name: Configure minio data
  import_tasks: data.yml
