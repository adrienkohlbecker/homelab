- name: Gather package facts
  package_facts:
    manager: apt
  no_log: true
  check_mode: false
  tags:
    - minio

- name: Install minio if needed
  when: '"minio" not in ansible_facts.packages or ansible_facts.packages["minio"][0].version != "20220526054841.0.0"'
  become: true
  tags:
    - minio
  block:

    - name: Download minio deb
      check_mode: false
      get_url:
        url: "{{ mirror_minio }}/server/minio/release/linux-{{ (ansible_architecture == 'aarch64') | ternary('arm64', 'amd64') }}/archive/minio_20220526054841.0.0_{{ (ansible_architecture == 'aarch64') | ternary('arm64', 'amd64') }}.deb"
        dest: /tmp/minio.deb
        mode: '0644'
        owner: root
        group: root
        checksum: sha256:{{ (ansible_architecture == "aarch64") | ternary('04c327fa3b4f6a71587226d762564629dd7b35f9b737dd89af52da8531dfc6d5', 'c2183166105b418675c12a92b759f0ba470d3e4c6de68d9cacbe5fd6ede71a8f') }}
      register: minio_download
      retries: 3
      delay: 5
      until: minio_download is succeeded

    - name: Install minio
      apt:
        deb: /tmp/minio.deb
      register: minio_installed

    - name: Delete deb file
      file:
        path: /tmp/minio.deb
        state: absent

- name: Add minio group
  group:
    name: minio-user
    system: true
  become: true
  tags:
    - minio

- name: Add minio user
  user:
    name: minio-user
    group: minio-user
    system: true
    create_home: false
    shell: /usr/sbin/nologin
    home: /nonexistent
  become: true
  tags:
    - minio

- name: Create zfs filesystem
  when: zfs_root
  zfs:
    name: '{{ zfs_dozer_filesystem }}/minio'
    state: present
    extra_zfs_properties:
      mountpoint: /mnt/minio
      'autobackup:bak': 'true'
  become: true
  tags:
    - minio

- name: Create data dir
  file:
    dest: /mnt/minio
    state: directory
    owner: minio-user
    group: minio-user
    mode: "0755"
  become: true
  tags:
    - minio

- name: Set up mount service for dozer/minio
  when: zfs_root
  import_role:
    name: zfs_mount
    tasks_from: unit
  vars:
    zfs_mount_dataset: '{{ zfs_dozer_filesystem }}/minio'
    zfs_mount_mountpoint: /mnt/minio
  become: true
  tags:
    - minio

- name: Configure minio
  template:
    src: minio.cfg.j2
    dest: /etc/default/minio
    owner: minio-user
    group: minio-user
    mode: "0600"
    backup: true
  register: minio_cfg
  become: true
  tags:
    - minio

- name: Install minio service override
  import_role:
    name: systemd_unit
    tasks_from: dropin
  vars:
    systemd_unit_args:
      src: override_service.conf.j2
      for: minio.service
      condition: "{{ zfs_root }}"
  tags:
    - minio

- name: Enable minio service
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: minio
      condition: "{{ not (ansible_check_mode and minio_installed.changed) }}"
      restart: "{{ minio_service_d_override_conf_result.changed or minio_cfg.changed }}"
  tags:
    - minio

- name: Configure nginx
  import_role:
    name: nginx
    tasks_from: site
  vars:
    nginx_site_args:
      subdomain: minio
      proxy_pass: http://127.0.0.1:9001/
      # Skip the "Login with SSO" click. MinIO 2022's console SPA
      # renders a button when /api/v1/login returns
      # loginStrategy=redirect; inject a script that runs the same
      # redirect on page load when no session cookie is present.
      # /oauth_callback is excluded so the post-Authelia round-trip
      # completes; Accept-Encoding is unset so MinIO doesn't gzip
      # the HTML out from under sub_filter.
      location_conf: |
        proxy_set_header Accept-Encoding "";
        sub_filter_once on;
        sub_filter_types text/html;
        sub_filter '</head>' '<script>(function(){if(location.pathname==="/oauth_callback")return;if(document.cookie.match(/(?:^|;\s*)token=/))return;fetch("/api/v1/login").then(function(r){return r.json()}).then(function(d){if(d.loginStrategy==="redirect"&&d.redirect){location.replace(d.redirect)}}).catch(function(){})})();</script></head>';
  tags:
    - minio

- name: Configure nginx
  import_role:
    name: nginx
    tasks_from: site
  vars:
    nginx_site_args:
      subdomain: minio-api
      proxy_pass: http://localhost:9199/
      location_conf: |
        # Otherwise ARQ uploads return HTTP 413
        client_max_body_size     60M;
        # Increase body buffer size to not buffer uploads to disk
        client_body_buffer_size  60M;
  tags:
    - minio

- name: Configure minio client
  import_tasks: client.yml

- name: Configure minio data
  import_tasks: data.yml
