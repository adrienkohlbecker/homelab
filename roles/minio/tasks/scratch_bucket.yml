# Mount a child ZFS dataset at a single bucket's directory so its data lives
# on the disposable `scratch` tree instead of the offsite-replicated
# dozer/minio dataset. This MinIO is the 2022 fs-backend single-drive build,
# so a bucket is a plain directory /mnt/minio/<bucket>; mounting a dataset
# there relocates the bucket's data without MinIO knowing. ZFS mountpoints are
# independent of dataset hierarchy, so a dozer/scratch/... dataset mounts fine
# under /mnt/minio. Tuning mirrors roles/scratch: autobackup:bak=false and
# com.sun:auto-snapshot=false keep these large CI qemu-image bundles out of
# every snapshot/backup tool (off the offsite replica); sync=disabled and
# atime=off shed durability/metadata overhead on reconstructible data.
#
# minio_scratch_bucket is sanitised into the dataset leaf -- ZFS dataset names allow a
# narrow charset, so any non-[a-z0-9] char becomes '_'.
- name: Provision scratch dataset for bucket
  import_role:
    name: zfs
    tasks_from: dataset
  vars:
    zfs_dataset_args:
      dataset: "{{ zfs_dozer_filesystem }}/scratch/minio_{{ minio_scratch_bucket | regex_replace('[^a-z0-9]', '_') }}"
      mountpoint: "/mnt/minio/{{ minio_scratch_bucket }}"
      owner: minio-user
      group: minio-user
      extra_properties:
        'autobackup:bak': 'false'
        'com.sun:auto-snapshot': 'false'
        sync: disabled
        atime: 'off'
