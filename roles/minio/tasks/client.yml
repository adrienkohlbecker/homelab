# Query just the mcli package version rather than package_facts, which
# enumerates every installed apt package (~2s) only to read one version.
- name: client | Check installed mcli version  # noqa: command-instead-of-module
  command:
    argv:
      - dpkg-query
      - -W
      - -f=${Version}
      - mcli
  register: minio_mcli_pkg
  changed_when: false
  failed_when: false
  check_mode: false
  tags:
    - minio

- name: client | Install mcli if needed
  when: minio_mcli_pkg.stdout != minio_mcli_version
  become: true
  tags:
    - minio
  block:

    - name: client | Download mcli deb
      check_mode: false
      get_url:
        url: "{{ minio_mcli_release[ansible_architecture].url }}"
        dest: /tmp/mcli.deb
        mode: '0644'
        owner: root
        group: root
        checksum: "sha256:{{ minio_mcli_release[ansible_architecture].sha256 }}"

    - name: client | Install mcli
      apt:
        deb: /tmp/mcli.deb
      register: minio_mcli_installed

    - name: client | Delete deb file
      file:
        path: /tmp/mcli.deb
        state: absent

- name: client | Configure alias
  when: not (ansible_check_mode and minio_mcli_installed.changed)
  command: mcli alias set default http://localhost:9199 {{ minio_root_user }} {{ minio_root_password }}
  args:
    creates: ~/.mcli/config.json
  tags:
    - minio
