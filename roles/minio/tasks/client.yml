# Query just the mcli package version rather than package_facts, which
# enumerates every installed apt package (~2s) only to read one version.
- name: client | Check installed mcli version  # noqa: command-instead-of-module
  command:
    argv:
      - dpkg-query
      - -W
      - -f=${Version}
      - mcli
  register: minio_mcli_pkg
  changed_when: false
  failed_when: false
  check_mode: false
  tags:
    - minio

- name: client | Install mcli if needed
  when: minio_mcli_pkg.stdout != minio_mcli_version
  become: true
  tags:
    - minio
  block:

    - name: client | Download mcli deb
      check_mode: false
      get_url:
        url: "{{ minio_mcli_release[ansible_architecture].url }}"
        dest: /tmp/mcli.deb
        mode: '0644'
        owner: root
        group: root
        checksum: "sha256:{{ minio_mcli_release[ansible_architecture].sha256 }}"

    - name: client | Install mcli
      apt:
        deb: /tmp/mcli.deb
      register: minio_mcli_installed

    - name: client | Delete deb file
      file:
        path: /tmp/mcli.deb
        state: absent

# Always (re)write the alias so a rotated MINIO_ROOT_PASSWORD is picked up
# on the next converge; mcli alias set is idempotent. become: true keeps
# the config under root's home, matching the data.yml mcli calls.
- name: client | Configure alias
  command: mcli alias set default http://localhost:{{ service_ports.minio_api }} {{ minio_root_user }} {{ minio_root_password }}
  changed_when: false
  become: true
  tags:
    - minio

# The mcli alias embeds the root password; keep it under root's home only.
# Drop any copy under the connecting user's $HOME so the credential never
# lingers in an interactive account.
- name: client | Drop per-user mcli alias config
  file:
    path: ~/.mcli
    state: absent
  tags:
    - minio
