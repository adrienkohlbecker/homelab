- name: client | Install mcli
  import_role:
    name: deb_install
    tasks_from: install
  vars:
    deb_install_args:
      name: mcli
      version: "{{ minio_mcli_version }}"
      url: "{{ minio_mcli_release[ansible_architecture].url }}"
      sha256: "{{ minio_mcli_release[ansible_architecture].sha256 }}"
  tags:
    - minio

# Persist the `default` alias for the data.yml / _verify mcli calls. Feed the
# credentials as a JSON blob on stdin (`mcli alias import` reads /dev/stdin) so
# the root password never lands in argv / the process table -- unlike
# `mcli alias set`, which takes the secret as a positional arg. Re-run every
# converge so a rotated MINIO_ROOT_PASSWORD is picked up; import overwrites.
- name: client | Configure alias
  command: mcli alias import default /dev/stdin
  args:
    stdin: "{{ {'url': 'http://localhost:' ~ service_ports.minio_api, 'accessKey': minio_root_user, 'secretKey': minio_root_password, 'api': 'S3v4', 'path': 'auto'} | to_json }}"
  changed_when: false
  become: true
  tags:
    - minio

# The mcli config lives under root's home; drop any stray ~/.mcli left by
# manual mcli use as the connecting user so a credential can't linger in an
# interactive account.
- name: client | Drop per-user mcli alias config
  file:
    path: ~/.mcli
    state: absent
  tags:
    - minio
