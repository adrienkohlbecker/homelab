# Query just the mcli package version rather than package_facts, which
# enumerates every installed apt package (~2s) only to read one version.
- name: client | Check installed mcli version  # noqa: command-instead-of-module
  command:
    argv:
      - dpkg-query
      - -W
      - -f=${Version}
      - mcli
  register: minio_mcli_pkg
  changed_when: false
  failed_when: false
  check_mode: false
  tags:
    - minio

- name: client | Install mcli if needed
  when: minio_mcli_pkg.stdout != "20220610222912.0.0"
  become: true
  tags:
    - minio
  block:

    - name: client | Download mcli deb
      check_mode: false
      get_url:
        url: "{{ mirror_minio }}/client/mc/release/linux-{{ (ansible_architecture == 'aarch64') | ternary('arm64', 'amd64') }}/archive/mcli_20220610222912.0.0_{{ (ansible_architecture == 'aarch64') | ternary('arm64', 'amd64') }}.deb"
        dest: /tmp/mcli.deb
        mode: '0644'
        owner: root
        group: root
        checksum: sha256:{{ (ansible_architecture == "aarch64") | ternary('31598860c2b5a6d03531b27ffffe03ca69de0ac3cd8c0f6ccc472e971270d5e1', '175304d072db889d67824a3da2317b3b698ba09d79709010acdec62f05c38069') }}

    - name: client | Install mcli
      apt:
        deb: /tmp/mcli.deb
      register: minio_mcli_installed

    - name: client | Delete deb file
      file:
        path: /tmp/mcli.deb
        state: absent

- name: client | Configure alias
  when: not (ansible_check_mode and minio_mcli_installed.changed)
  command: mcli alias set default http://localhost:9199 {{ minio_root_user }} {{ minio_root_password }}
  args:
    creates: ~/.mcli/config.json
  tags:
    - minio
