- name: Create media podman network
  import_tasks: network.yml

- name: Add media group
  import_tasks: group.yml

- name: Add user to media group
  import_role:
    name: usergroup_immediate
    tasks_from: user
  when: not (ansible_check_mode and media_group.changed)
  vars:
    usergroup_immediate_group: media
  tags:
    - media

- name: Configure media dataset
  import_role:
    name: zfs
    tasks_from: dataset
  when: not (ansible_check_mode and media_group.changed)
  vars:
    zfs_dataset_args:
      dataset: tank/media
      mountpoint: /mnt/media
      group: media
      mode: '0775'
      extra_properties:
        'autobackup:bak': 'false'
        recordsize: '1048576'
        special_small_blocks: '32768'
  tags:
    - media

- name: Check for legacy /mnt/media/Headphones (pre-lidarr rename)
  stat:
    path: /mnt/media/Headphones
  register: media_headphones_legacy
  tags:
    - media

# One-time migration: when headphones got retired in favour of lidarr, the
# library tree moved from /mnt/media/Headphones to /mnt/media/Lidarr. mv
# within the same zfs dataset is an inode rename, not a copy, so this is
# cheap even with a multi-GB library. The creates: guard plus the when:
# means subsequent runs (and fresh hosts that never had Headphones) skip.
- name: Rename /mnt/media/Headphones to /mnt/media/Lidarr
  command: mv /mnt/media/Headphones /mnt/media/Lidarr
  args:
    creates: /mnt/media/Lidarr
  become: true
  when: media_headphones_legacy.stat.exists
  tags:
    - media

- name: Create storage directories
  file:
    dest: "{{ item }}"
    state: directory
    owner: "{{ ansible_user_id }}"
    group: media
    mode: "0775"
  become: true
  when: not (ansible_check_mode and media_group.changed)
  tags:
    - media
  loop:
    - /mnt/media/Lidarr
    - /mnt/media/Live Music
    - /mnt/media/Movies
    - /mnt/media/Music
    - /mnt/media/Other
    - /mnt/media/TV
