- name: Add media group
  group:
    name: media
    system: true
  become: true
  register: media_group
  tags:
    - media

- name: Add user to media group
  import_role:
    name: usergroup_immediate
    tasks_from: user
  when: not (ansible_check_mode and media_group.changed)
  vars:
    usergroup_immediate_group: media
  tags:
    - media

- name: Configure media dataset
  import_role:
    name: zfs
    tasks_from: dataset
  vars:
    zfs_dataset: '{{ zfs_tank_filesystem }}/media'
    zfs_dataset_mountpoint: /mnt/media
    zfs_dataset_group: media
    zfs_dataset_mode: '0775'
    zfs_dataset_extra_properties:
      'autobackup:bak': 'false'
      recordsize: '1048576'
      special_small_blocks: '32768'
  tags:
    - media

- name: Create storage directories
  file:
    dest: "{{ item }}"
    state: directory
    owner: "{{ ansible_user }}"
    group: media
    mode: "0775"
  become: true
  tags:
    - media
  loop:
    - /mnt/media/Headphones
    - /mnt/media/Live Music
    - /mnt/media/Movies
    - /mnt/media/Music
    - /mnt/media/Other
    - /mnt/media/TV
