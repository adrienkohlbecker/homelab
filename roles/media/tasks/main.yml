- name: Create media podman network
  import_tasks: network.yml

- name: Add media group
  import_tasks: group.yml

- name: Add user to media group
  import_role:
    name: usergroup_immediate
    tasks_from: user
  when: not (ansible_check_mode and media_group.changed)
  vars:
    usergroup_immediate_group: media
  tags:
    - media

- name: Configure media dataset
  import_role:
    name: zfs
    tasks_from: dataset
  when: not (ansible_check_mode and media_group.changed)
  vars:
    zfs_dataset_args:
      dataset: tank/media
      mountpoint: /mnt/media
      group: media
      mode: '0775'
      # 1 MB recordsize suits large media files; special_small_blocks
      # routes metadata + sub-32K files to the special vdev (same 32K
      # threshold as roles/data). autobackup:bak false excludes the bulk
      # library from backup-pool replication (matches roles/scratch).
      extra_properties:
        'autobackup:bak': 'false'
        recordsize: '1048576'
        special_small_blocks: '32768'
  tags:
    - media

# Shared-ownership library dirs (ansible_user:media). Service-private dirs
# live in their owning role (e.g. transmission creates /mnt/media/Torrents
# owned transmission:media).
- name: Create storage directories
  file:
    dest: "{{ item }}"
    state: directory
    owner: "{{ ansible_user_id }}"
    group: media
    mode: "0775"
  become: true
  when: not (ansible_check_mode and media_group.changed)
  tags:
    - media
  loop:
    - /mnt/media/Lidarr
    - /mnt/media/Live Music
    - /mnt/media/Movies
    - /mnt/media/Music
    - /mnt/media/Other
    - /mnt/media/TV
