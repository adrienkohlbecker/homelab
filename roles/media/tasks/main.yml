- name: Create media podman network
  import_tasks: network.yml

- name: Add media group
  import_tasks: group.yml

- name: Add user to media group
  import_role:
    name: usergroup_immediate
    tasks_from: user
  when: not (ansible_check_mode and media_group.changed)
  vars:
    usergroup_immediate_args:
      group: media
  tags:
    - media

- name: Configure media dataset
  import_role:
    name: zfs
    tasks_from: dataset
  when: not (ansible_check_mode and media_group.changed)
  vars:
    zfs_dataset_args:
      dataset: tank/media
      mountpoint: /mnt/media
      group: media
      mode: '0775'
      extra_properties: "{{ media_dataset_properties }}"
  tags:
    - media

- name: Create storage directories
  file:
    dest: "{{ item }}"
    state: directory
    owner: "{{ ansible_user_id }}"
    group: media
    mode: "0775"
  become: true
  when: not (ansible_check_mode and media_group.changed)
  tags:
    - media
  loop: "{{ media_library_dirs }}"
