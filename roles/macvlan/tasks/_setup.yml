# Test-fixture role dependencies for the macvlan harness run. testrole.py imports
# only the role under test, so the podman_network path in install.yml needs
# podman pre-staged (prod gets it from site.yml's play order). Kept even
# though meta/test.yml routes to box_deps: box_deps just pre-bakes podman
# (packer/seed_deps.yml) so this import is a fast no-op there, while plain
# `box` (--machine box) still installs it. macvlan needs only podman, not
# nginx.
- name: _setup | Install podman
  import_role:
    name: podman
    tasks_from: install
