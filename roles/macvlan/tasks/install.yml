# install.yml — per-block setup of one macvlan iface. Called from
# main.yml via include_tasks in a loop with loop_var=macvlan_args.
# See tasks/main.yml for the macvlan_args schema.

- name: install | Validate {{ macvlan_args.name }}
  assert:
    that:
      # name lands in a systemd unit *filename*, an `ip link` argument, and
      # a sysctl key — restrict it to a kernel-legal iface name so a typo
      # can't write a unit outside the unit dir or silently mangle a key.
      - macvlan_args.name is string and macvlan_args.name is match('^[a-z][a-z0-9_]*$')
      - macvlan_args.name | length <= 15
      # parent allows a `.` for VLAN subifs (e.g. eth0.4 / iot).
      - macvlan_args.parent is string and macvlan_args.parent is match('^[a-z][a-z0-9_.]*$')
      - macvlan_args.block is string
      - macvlan_args.block | ansible.utils.ipaddr != false
      - macvlan_args.block == (macvlan_args.block | ansible.utils.ipaddr('net'))
      # The podman pool is the upper /29 (ipsubnet(prefix+1, 1)); a /29-or-
      # smaller block leaves no room for that split.
      - macvlan_args.block | ansible.utils.ipaddr('prefix') | int <= 28
      # host_ip / mac_address feed `ip addr add` / `ip link set address`
      # inside the oneshot, so a malformed value fails at unit-runtime, not
      # converge — validate the format here when supplied.
      - macvlan_args.host_ip is not defined or (macvlan_args.host_ip | ansible.utils.ipaddr) != false
      - "macvlan_args.mac_address is not defined or (macvlan_args.mac_address is match('^([0-9a-fA-F]{2}:){5}[0-9a-fA-F]{2}$'))"
    fail_msg: >-
      macvlan_args invalid for '{{ macvlan_args.name | default('<no name>') }}':
      name must be a kernel-legal iface name (^[a-z][a-z0-9_]*$, <=15 chars),
      parent an iface name, block a CIDR with prefix <=28, and host_ip/mac_address
      (if set) a valid IP / MAC.
  tags:
    - macvlan

- name: install | Validate podman parent facts for {{ macvlan_args.name }}
  when: macvlan_args.podman_network | default(false)
  assert:
    that:
      # The podman network derives subnet/gateway from the parent's IPv4
      # fact (see the podman_network task below), so the parent must be a
      # gathered iface carrying an address — otherwise the network is
      # created with an empty/garbage CIDR.
      - macvlan_args.parent in ansible_facts
      - ansible_facts[macvlan_args.parent].ipv4 is defined
      # The pool (upper /29 of block) is handed to netavark as an ip_range
      # *inside* that derived subnet, so the block must sit within the
      # parent's network — catches a block/parent mismatch at converge.
      - >-
        (macvlan_args.block | ansible.utils.ipaddr('network'))
        | ansible.utils.ipaddr(ansible_facts[macvlan_args.parent].ipv4.network ~ '/' ~ ansible_facts[macvlan_args.parent].ipv4.prefix)
        != false
    fail_msg: >-
      macvlan_args.podman_network is set for '{{ macvlan_args.name }}' but parent
      '{{ macvlan_args.parent }}' has no gathered IPv4 fact to derive the network
      from, or block '{{ macvlan_args.block }}' is not within the parent's subnet.
  tags:
    - macvlan

# Tighten ARP rules on the parent NIC to avoid the macvlan ARP-flux
# flap: with the defaults (arp_ignore=0, arp_announce=0) both the
# parent and the macvlan child can reply to ARP requests for any IP
# in the shared broadcast domain, so the LAN router sees the host's
# IP bouncing between MACs and flags a duplicate. arp_ignore=1 makes
# each interface reply only for IPs configured on it; arp_announce=2
# keeps source-IP selection sane. The matching child-iface sysctls
# live in the systemd unit since /proc/sys/net/ipv4/conf/<iface>/
# doesn't exist until after `ip link add`.
#
# Idempotent per-parent: multiple macvlan_blocks sharing a parent
# (rare in practice) re-set the same sysctl values.
- name: install | ARP sysctls on {{ macvlan_args.parent }}
  ansible.posix.sysctl:
    name: "net.ipv4.conf.{{ macvlan_args.parent }}.{{ item.key }}"
    value: "{{ item.value }}"
    # Verify against (and -w) the running kernel, not just the persisted
    # file — the mitigation has to be live on the already-up parent now,
    # not only after the next reload/reboot.
    sysctl_set: true
    # Persist to a role-owned drop-in, not the shared /etc/sysctl.conf, so
    # the role's sysctl state stays self-contained (matches swap/kdump/
    # firewall/tailscale).
    sysctl_file: /etc/sysctl.d/30-macvlan.conf
  loop:
    - { key: arp_ignore, value: '1' }
    - { key: arp_announce, value: '2' }
  loop_control:
    label: "{{ item.key }}"
  become: true
  tags:
    - macvlan

- name: "install | Install systemd unit for {{ macvlan_args.name }}"
  import_role:
    name: systemd_unit
    tasks_from: install
  vars:
    systemd_unit_args:
      src: macvlan_iface.service.j2
      dest: "{{ macvlan_args.name }}.service"
  tags:
    - macvlan

- name: install | Enable+start {{ macvlan_args.name }}
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: "{{ macvlan_args.name }}"
      # Per-unit result fact (systemd_unit exposes <basename>_<type>_result)
      # rather than the shared systemd_unit_file register, which a second unit
      # write in this loop would clobber. See roles/systemd_unit/tasks/install.yml.
      condition: "{{ not (ansible_check_mode and vars[macvlan_args.name ~ '_service_result'].changed) }}"
      restart: "{{ vars[macvlan_args.name ~ '_service_result'].changed }}"
  tags:
    - macvlan

# Optionally create a podman macvlan network on the same parent, named
# after the block. Consumers (homeassistant, future per-VLAN services)
# attach to the network by name via `--network={{ macvlan_args.name }}`
# without needing to know the parent / subnet / ip_range plumbing.
#
# ip_range = upper /29 of the block (lower /29 = host iface + libvirt
# macvtap VMs; upper /29 = podman containers). parent_subnet /
# parent_gateway derived from ansible_facts on the parent iface so
# host_vars carries only the block CIDR.
#
# This task runs inline (not via tasks_from: podman) to avoid the
# macvlan_args dict-shadowing issue when re-importing the same role
# inside a loop.
- name: install | Create podman macvlan network {{ macvlan_args.name }}
  when:
    - macvlan_args.podman_network | default(false)
    - not ansible_check_mode
  containers.podman.podman_network:
    name: "{{ macvlan_args.name }}"
    driver: macvlan
    subnet: "{{ ansible_facts[macvlan_args.parent].ipv4.network }}/{{ ansible_facts[macvlan_args.parent].ipv4.prefix }}"
    gateway: "{{ ansible_facts[macvlan_args.parent].ipv4.network | ansible.utils.ipmath(1) }}"
    ip_range: "{{ macvlan_args.block | ansible.utils.ipsubnet(macvlan_args.block | ansible.utils.ipaddr('prefix') | int + 1, 1) }}"
    opt:
      parent: "{{ macvlan_args.parent }}"
      # Must match the host child iface's `mode bridge` (macvlan_iface.service.j2)
      # so containers and the host iface interoperate on the shared parent.
      mode: bridge
  become: true
  tags:
    - macvlan
