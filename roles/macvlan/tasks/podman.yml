# Optional: create a podman macvlan network so containers can also be
# peers on the LAN.
#
# Subnet carving:
#   macvlan_subnet                       (e.g. 10.123.1.0/27, .0-.31)
#     ├── lower /28 (.0-.15)             host (mac0 at .1) + libvirt VMs
#     └── upper /28 (.16-.31)            podman containers (this ip_range)
#
# podman_network has no aux_addresses equivalent and ip_range must be a
# single aligned CIDR, so we hand podman the upper half and keep the
# host + VMs in the lower half. Costs 50% of macvlan_subnet's IP space;
# size macvlan_subnet to 2x the desired container count.
#
# Imported on demand:
#   - import_role:
#       name: macvlan
#       tasks_from: podman

- name: podman | Create the macvlan podman network
  when: not ansible_check_mode and macvlan_enable_podman
  containers.podman.podman_network:
    name: macvlan_net
    driver: macvlan
    subnet: "{{ macvlan_parent_subnet }}"
    gateway: "{{ macvlan_parent_gateway }}"
    ip_range: "{{ macvlan_subnet | ansible.utils.ipsubnet(macvlan_subnet | ansible.utils.ipaddr('prefix') | int + 1, 1) }}"
    opt:
      parent: "{{ macvlan_parent }}"
  become: true
  tags:
    - macvlan
