---
# Functional probes against the live macvlan ifaces and podman networks,
# not the rendered unit. Only invoked by test/testrole.py against a qemu
# VM; never from site.yml or `mise run ansible --tags macvlan`. Loops the
# same macvlan_blocks the role consumed; host_ip / mac_address defaults
# mirror macvlan_iface.service.j2 so a drifted default is caught too.

- name: _verify | Assert each iface exists and is UP
  command: ip -br link show {{ item.name }}
  loop: "{{ macvlan_blocks | default([]) }}"
  loop_control:
    label: "{{ item.name }}"
  register: macvlan_verify_link
  become: true
  changed_when: false
  failed_when: "'UP' not in macvlan_verify_link.stdout"

- name: _verify | Assert each iface carries its host_ip/32
  command: ip -4 -o addr show dev {{ item.name }}
  loop: "{{ macvlan_blocks | default([]) }}"
  loop_control:
    label: "{{ item.name }}"
  register: macvlan_verify_addr
  become: true
  changed_when: false
  failed_when: >-
    ((item.host_ip | default(item.block | ansible.utils.ipmath(0))) ~ '/32')
    not in macvlan_verify_addr.stdout

- name: _verify | Assert each iface carries its seeded MAC
  command: cat /sys/class/net/{{ item.name }}/address
  loop: "{{ macvlan_blocks | default([]) }}"
  loop_control:
    label: "{{ item.name }}"
  register: macvlan_verify_mac
  changed_when: false
  failed_when: >-
    macvlan_verify_mac.stdout !=
    (item.mac_address | default('82:48:10' | random_mac(seed=(inventory_hostname ~ '_' ~ item.name))))

- name: _verify | Assert the block route points at each iface
  command: ip route show {{ item.block }} dev {{ item.name }}
  loop: "{{ macvlan_blocks | default([]) }}"
  loop_control:
    label: "{{ item.name }}"
  register: macvlan_verify_route
  become: true
  changed_when: false
  failed_when: macvlan_verify_route.stdout | length == 0

- name: _verify | Assert the ARP-flux sysctls hold on each iface
  command: >-
    sysctl -n net.ipv4.conf.{{ item.name }}.arp_ignore
    net.ipv4.conf.{{ item.name }}.arp_announce
  loop: "{{ macvlan_blocks | default([]) }}"
  loop_control:
    label: "{{ item.name }}"
  register: macvlan_verify_arp
  changed_when: false
  failed_when: macvlan_verify_arp.stdout_lines != ['1', '2']

# Existence + driver + parent only; the upper-/29 ip_range is exercised
# end-to-end by roles/homeassistant/tasks/_verify.yml (a container actually
# attaches and gets an address from the pool).
- name: _verify | Assert the podman macvlan network exists on the right parent
  command: podman network inspect {{ item.name }}
  loop: "{{ macvlan_blocks | default([]) }}"
  loop_control:
    label: "{{ item.name }}"
  when: item.podman_network | default(false)
  register: macvlan_verify_podman
  become: true
  changed_when: false
  failed_when: >-
    macvlan_verify_podman.rc != 0
    or 'macvlan' not in macvlan_verify_podman.stdout
    or item.parent not in macvlan_verify_podman.stdout
