# Exercises the deb_install helper against hermetic throwaway packages built on
# the VM (no network, no archive dependency) and served to the helper over
# file://. Validates the contract: a first install flips the changed-fact true;
# a re-run with the same pin closes the gate (fact false); a version bump
# reinstalls; and a removed-but-config-files package reinstalls -- proving the
# gate keys on dpkg's status word, not a bare ${Version} (which a removed
# package still reports). The dashed package name also exercises the dash-folded
# fact (deb-install-test -> deb_install_test_deb_changed). _verify is test-only
# -- the VM is discarded -- so it installs, removes and purges freely.

- name: _verify | Build the v1 test .deb
  become: true
  block:
    - name: _verify | Create v1 control dir
      file:
        path: /tmp/deb_install_test/v1/DEBIAN
        state: directory
        mode: "0755"
    - name: _verify | Write v1 control
      copy:
        dest: /tmp/deb_install_test/v1/DEBIAN/control
        mode: "0644"
        content: |
          Package: deb-install-test
          Version: 1.0-1
          Architecture: all
          Maintainer: deb_install test <test@example.com>
          Description: throwaway package exercising the deb_install helper
    - name: _verify | Build v1
      command:
        argv:
          - dpkg-deb
          - --root-owner-group
          - --build
          - /tmp/deb_install_test/v1
          - /tmp/deb_install_test/test_1.0-1.deb
      changed_when: false
    - name: _verify | Checksum v1
      command:
        argv:
          - sha256sum
          - /tmp/deb_install_test/test_1.0-1.deb
      register: _deb_install_v1_sha
      changed_when: false

- name: _verify | Install v1 (fresh)
  import_role:
    name: deb_install
    tasks_from: install
  vars:
    deb_install_args:
      name: deb-install-test
      version: "1.0-1"
      url: "file:///tmp/deb_install_test/test_1.0-1.deb"
      sha256: "{{ _deb_install_v1_sha.stdout.split() | first }}"

- name: _verify | Query status after fresh install
  command:
    argv:
      - dpkg-query
      - -W
      - -f=${db:Status-Status} ${Version}
      - deb-install-test
  register: _deb_install_after_v1
  changed_when: false
  become: true

- name: _verify | Fresh install set the fact and installed v1
  assert:
    that:
      - deb_install_test_deb_changed | bool
      - _deb_install_after_v1.stdout == "installed 1.0-1"
    fail_msg: >-
      fresh install: fact={{ deb_install_test_deb_changed | default('UNSET') }}
      dpkg={{ _deb_install_after_v1.stdout }}

- name: _verify | Re-install v1 (same pin, expected no-op)
  import_role:
    name: deb_install
    tasks_from: install
  vars:
    deb_install_args:
      name: deb-install-test
      version: "1.0-1"
      url: "file:///tmp/deb_install_test/test_1.0-1.deb"
      sha256: "{{ _deb_install_v1_sha.stdout.split() | first }}"

- name: _verify | Re-running the same pin closed the gate (fact false)
  assert:
    that:
      - not (deb_install_test_deb_changed | bool)
    fail_msg: >-
      expected gate closed on same-version re-run, fact={{ deb_install_test_deb_changed }}

- name: _verify | Build the v2 test .deb (with a conffile)
  become: true
  block:
    - name: _verify | Create v2 dirs
      file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - /tmp/deb_install_test/v2/DEBIAN
        - /tmp/deb_install_test/v2/etc
    - name: _verify | Write v2 control
      copy:
        dest: /tmp/deb_install_test/v2/DEBIAN/control
        mode: "0644"
        content: |
          Package: deb-install-test
          Version: 2.0-1
          Architecture: all
          Maintainer: deb_install test <test@example.com>
          Description: throwaway package exercising the deb_install helper
    - name: _verify | Declare the conffile (so dpkg --remove leaves config-files state)
      copy:
        dest: /tmp/deb_install_test/v2/DEBIAN/conffiles
        mode: "0644"
        content: |
          /etc/deb-install-test.conf
    - name: _verify | Write the conffile payload
      copy:
        dest: /tmp/deb_install_test/v2/etc/deb-install-test.conf
        mode: "0644"
        content: |
          managed-by=deb_install-verify
    - name: _verify | Build v2
      command:
        argv:
          - dpkg-deb
          - --root-owner-group
          - --build
          - /tmp/deb_install_test/v2
          - /tmp/deb_install_test/test_2.0-1.deb
      changed_when: false
    - name: _verify | Checksum v2
      command:
        argv:
          - sha256sum
          - /tmp/deb_install_test/test_2.0-1.deb
      register: _deb_install_v2_sha
      changed_when: false

- name: _verify | Install v2 (version bump)
  import_role:
    name: deb_install
    tasks_from: install
  vars:
    deb_install_args:
      name: deb-install-test
      version: "2.0-1"
      url: "file:///tmp/deb_install_test/test_2.0-1.deb"
      sha256: "{{ _deb_install_v2_sha.stdout.split() | first }}"

- name: _verify | Query status after the bump
  command:
    argv:
      - dpkg-query
      - -W
      - -f=${db:Status-Status} ${Version}
      - deb-install-test
  register: _deb_install_after_v2
  changed_when: false
  become: true

- name: _verify | The bump set the fact and installed v2
  assert:
    that:
      - deb_install_test_deb_changed | bool
      - _deb_install_after_v2.stdout == "installed 2.0-1"
    fail_msg: >-
      version bump: fact={{ deb_install_test_deb_changed | default('UNSET') }}
      dpkg={{ _deb_install_after_v2.stdout }}

- name: _verify | Remove (keep config files) to reach config-files state
  command:
    argv:
      - dpkg
      - --remove
      - deb-install-test
  changed_when: false
  become: true

- name: _verify | Confirm the package is in config-files state
  command:
    argv:
      - dpkg-query
      - -W
      - -f=${db:Status-Status} ${Version}
      - deb-install-test
  register: _deb_install_after_remove
  changed_when: false
  become: true

- name: _verify | Status word is config-files, not installed
  assert:
    that:
      - _deb_install_after_remove.stdout == "config-files 2.0-1"
    fail_msg: >-
      expected config-files state, got {{ _deb_install_after_remove.stdout }}

- name: _verify | Re-install v2 over the config-files state
  import_role:
    name: deb_install
    tasks_from: install
  vars:
    deb_install_args:
      name: deb-install-test
      version: "2.0-1"
      url: "file:///tmp/deb_install_test/test_2.0-1.deb"
      sha256: "{{ _deb_install_v2_sha.stdout.split() | first }}"

- name: _verify | A config-files package reinstalls (status gate, not version)
  assert:
    that:
      - deb_install_test_deb_changed | bool
    fail_msg: >-
      expected reinstall from config-files state, fact={{ deb_install_test_deb_changed }}

# A successful install must leave nothing behind in /var/cache (the always:
# cleanup). deb-install-test was just (re)installed above, so the staged file
# should be gone.
- name: _verify | Stat the staged file after a successful install
  stat:
    path: /var/cache/deb-install-test.deb
  register: _deb_install_staged_after_install
  become: true

- name: _verify | A successful install cleaned up its staged .deb
  assert:
    that:
      - not _deb_install_staged_after_install.stat.exists
    fail_msg: >-
      expected /var/cache/deb-install-test.deb removed after install, still present

# Check mode on an already-current package must leave the gate closed: the
# install block's when: is false, so the apt task registers a skipped result
# (changed=false) and the fact stays false. Callers gate check-mode-sensitive
# follow-on tasks on exactly this (eaton_ipp's enable uses
# `not (ansible_check_mode and ipp_linux_deb_changed)`). deb-install-test is
# installed at 2.0-1 here.
- name: _verify | Re-run the current pin under check mode
  import_role:
    name: deb_install
    tasks_from: install
  check_mode: true
  vars:
    deb_install_args:
      name: deb-install-test
      version: "2.0-1"
      url: "file:///tmp/deb_install_test/test_2.0-1.deb"
      sha256: "{{ _deb_install_v2_sha.stdout.split() | first }}"

- name: _verify | Stat the staged file after the current-pin check-mode run
  stat:
    path: /var/cache/deb-install-test.deb
  register: _deb_install_staged_checkmode_current
  become: true

- name: _verify | Check mode kept the gate closed and staged nothing
  assert:
    that:
      - not (deb_install_test_deb_changed | bool)
      - not _deb_install_staged_checkmode_current.stat.exists
    fail_msg: >-
      check mode on a current package must close the gate and stage nothing;
      fact={{ deb_install_test_deb_changed }}
      staged_exists={{ _deb_install_staged_checkmode_current.stat.exists }}

# Check mode on a not-installed package must mutate nothing: the block runs but
# apt only dry-runs (no check_mode: false override), so nothing installs -- while
# the check_mode: false download + always: cleanup still leave /var/cache empty.
- name: _verify | Run a fresh pin under check mode
  import_role:
    name: deb_install
    tasks_from: install
  check_mode: true
  vars:
    deb_install_args:
      name: deb-install-check
      version: "2.0-1"
      url: "file:///tmp/deb_install_test/test_2.0-1.deb"
      sha256: "{{ _deb_install_v2_sha.stdout.split() | first }}"

- name: _verify | Query the fresh package after the check-mode run
  command:
    argv:
      - dpkg-query
      - -W
      - -f=${db:Status-Status} ${Version}
      - deb-install-check
  register: _deb_install_checkmode_query
  changed_when: false
  failed_when: _deb_install_checkmode_query.rc not in [0, 1]
  become: true

- name: _verify | Stat the fresh staged file after the check-mode run
  stat:
    path: /var/cache/deb-install-check.deb
  register: _deb_install_staged_checkmode_fresh
  become: true

- name: _verify | Check mode installed nothing and staged nothing
  assert:
    that:
      - _deb_install_checkmode_query.stdout == ""
      - not _deb_install_staged_checkmode_fresh.stat.exists
    fail_msg: >-
      check mode must not install or leave a staged .deb; dpkg={{
      _deb_install_checkmode_query.stdout }}
      staged_exists={{ _deb_install_staged_checkmode_fresh.stat.exists }}

# The assert gate must reject malformed args rather than proceed. A non-hex
# sha256 trips the assert; rescue catches the failure so the play continues.
- name: _verify | Call the helper with a malformed sha256
  block:
    - name: _verify | Install with a non-hex sha256
      import_role:
        name: deb_install
        tasks_from: install
      vars:
        deb_install_args:
          name: deb-install-test
          version: "2.0-1"
          url: "file:///tmp/deb_install_test/test_2.0-1.deb"
          sha256: "not-a-valid-sha256"
    - name: _verify | Reached past the assert (gate did NOT fire)
      set_fact:
        _deb_install_bad_args_passed: true
  rescue:
    - name: _verify | The assert gate fired as expected
      set_fact:
        _deb_install_bad_args_rejected: true

- name: _verify | Malformed args were rejected, not acted on
  assert:
    that:
      - _deb_install_bad_args_rejected | default(false)
      - not (_deb_install_bad_args_passed | default(false))
    fail_msg: >-
      expected the assert gate to reject a non-hex sha256; rejected={{
      _deb_install_bad_args_rejected | default(false) }} proceeded={{
      _deb_install_bad_args_passed | default(false) }}

# A download that succeeds but whose apt install fails must still clean up the
# staged file (the always: block). A correctly-checksummed non-deb downloads
# fine, then apt rejects it.
- name: _verify | Build a non-deb payload to force an apt failure
  become: true
  block:
    - name: _verify | Write a bogus (non-deb) file
      copy:
        dest: /tmp/deb_install_test/bogus.bin
        mode: "0644"
        content: |
          this is not a debian archive
    - name: _verify | Checksum the bogus file
      command:
        argv:
          - sha256sum
          - /tmp/deb_install_test/bogus.bin
      register: _deb_install_bogus_sha
      changed_when: false

- name: _verify | Install the bogus deb (download ok, apt rejects it)
  block:
    - name: _verify | Attempt the bogus install
      import_role:
        name: deb_install
        tasks_from: install
      vars:
        deb_install_args:
          name: deb-install-bogus
          version: "9.9"
          url: "file:///tmp/deb_install_test/bogus.bin"
          sha256: "{{ _deb_install_bogus_sha.stdout.split() | first }}"
  rescue:
    - name: _verify | The bogus install failed as expected
      set_fact:
        _deb_install_bogus_failed: true

- name: _verify | Stat the bogus staged file after the failure
  stat:
    path: /var/cache/deb-install-bogus.deb
  register: _deb_install_staged_bogus
  become: true

- name: _verify | A failed install propagated and still cleaned up
  assert:
    that:
      - _deb_install_bogus_failed | default(false)
      - not _deb_install_staged_bogus.stat.exists
    fail_msg: >-
      expected a failed install to propagate and remove
      /var/cache/deb-install-bogus.deb; failed={{ _deb_install_bogus_failed | default(false) }}
      staged_exists={{ _deb_install_staged_bogus.stat.exists }}

- name: _verify | Purge the test package and clean up
  become: true
  block:
    - name: _verify | Purge
      command:
        argv:
          - dpkg
          - --purge
          - deb-install-test
      changed_when: false
    - name: _verify | Remove the build tree
      file:
        path: /tmp/deb_install_test
        state: absent
