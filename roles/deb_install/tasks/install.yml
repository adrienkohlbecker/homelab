# Generic "install a pinned .deb when the installed version differs" helper.
# Callers pass a single dict `deb_install_args`:
#   name      required; dpkg package name (minio, mcli, ipp-linux, ...) --
#             also the staged-file basename and the prefix of the result fact.
#             A dpkg ":arch" qualifier (libfoo:amd64) is rejected by the assert
#             below; arch-qualified names are unsupported.
#   version   required; the exact dpkg ${Version} to match, *including* epoch
#             (1:2.3) and Debian revision (2.3-1) when present. This is what
#             `dpkg-query -W -f='${Version}'` records, which can differ from the
#             .deb *filename* -- e.g. eaton's ipp-linux_1.75.183-1_amd64.deb
#             records ${Version} 1.75.183. Pin the recorded version, not the URL.
#   url       required; .deb download URL
#   sha256    required; expected sha256 of the .deb
#   timeout   optional; get_url timeout (seconds); omitted -> module default
#
# apt installs the single .deb with no archive dependency resolution (its deps
# must already be satisfied) and will downgrade when the pin is older than the
# installed version -- the gate reinstalls on any non-exact match, lower included.
#
# Exposes `<name>_deb_changed` (non-identifier chars -> '_') so callers can gate
# a service restart on a fresh install. The prefix is the *deb package name*,
# not the calling role, so a hyphenated package folds the dash to '_' -- e.g.
# `ipp-linux` -> `ipp_linux_deb_changed` (NOT `eaton_ipp_deb_changed`). The dict
# form prevents inter-call leakage at play-vars scope: each import_role pass
# replaces it wholesale.
#
# Task `name:` strings stay static -- ansible renders name: at parse time, but
# deb_install_args is only bound at runtime, so an interpolated name: would
# fail "undefined". The caller's import_role task name carries the per-package
# context.
- name: Assert deb_install args
  assert:
    that:
      - deb_install_args.name | default('') | regex_findall('^[A-Za-z0-9][A-Za-z0-9.+_-]*$') | length > 0
      - deb_install_args.version | default('') | length > 0
      - deb_install_args.url | default('') | length > 0
      - deb_install_args.sha256 | default('') | regex_findall('^[0-9a-fA-F]{64}$') | length > 0
    fail_msg: >-
      deb_install_args must define name (slash-free dpkg package name),
      version, url and a 64-hex sha256; got {{ deb_install_args }}

# Read dpkg's recorded status + version directly. `apt: deb=` is idempotent on
# *version* alone -- it would leave a removed-but-config-files package (which
# still reports its version) un-reinstalled -- so gating on the status word is
# what makes "config-files" reinstall. `package_facts` can't stand in: it
# exposes the version but not dpkg's status word.
- name: Check installed deb version  # noqa: command-instead-of-module
  command:
    argv:
      - dpkg-query
      - -W
      - -f=${db:Status-Status} ${Version}
      - "{{ deb_install_args.name }}"
  register: deb_install_query
  changed_when: false
  # rc 1 is dpkg-query's "no packages found" (never installed / purged) and the
  # gate reads that as not-installed; any other non-zero is a real dpkg failure
  # (broken db, bad args), so surface it instead of silently reinstalling.
  failed_when: deb_install_query.rc not in [0, 1]
  check_mode: false

- name: Install deb if needed
  # dpkg-query emits "<status> <version>" (e.g. "installed 1.2.3"); anything but
  # an exact "installed <pinned version>" reinstalls -- not-installed yields "",
  # a removed-but-config-files package yields "config-files <version>".
  when: deb_install_query.stdout != ("installed " ~ deb_install_args.version)
  become: true
  block:

    # get_url rather than apt's own deb=<url> fetch: apt's download path does no
    # checksum verification, and this sha256 is the .deb's only integrity gate,
    # so the verified download must stay a separate step.
    - name: Download deb
      check_mode: false
      get_url:
        url: "{{ deb_install_args.url }}"
        # /var/cache (root:root 0755), not world-writable /tmp: a local user
        # can't pre-plant or symlink the staging path. 0600 keeps the transient
        # unreadable to other local users while it waits for apt.
        dest: "/var/cache/{{ deb_install_args.name }}.deb"
        mode: '0600'
        owner: root
        group: root
        checksum: "sha256:{{ deb_install_args.sha256 }}"
        timeout: "{{ deb_install_args.timeout | default(omit) }}"
      register: deb_install_download
      retries: 3
      delay: 5
      until: deb_install_download is succeeded

    - name: Install the deb package
      apt:
        deb: "/var/cache/{{ deb_install_args.name }}.deb"
        # apt: deb= aborts on an older-than-installed .deb ("a later version is
        # already installed") unless downgrades are allowed. A pin can move
        # backwards (deliberate rollback), and the status-word gate above
        # already decides *whether* apt runs, so this only widens which version
        # apt accepts -- it never re-runs on an unchanged pin.
        allow_downgrade: true
      register: deb_install_apt

  always:

    # Cleanup pairs with the check_mode: false download above so /var/cache
    # doesn't carry the deb past a --check run, and a failed apt still cleans up.
    - name: Delete deb file
      check_mode: false
      file:
        path: "/var/cache/{{ deb_install_args.name }}.deb"
        state: absent

# `deb_install_apt.changed` is the truthful "an install happened" signal --
# false when the block was skipped (result undefined, hence the default) or apt
# no-op'd because the pin was already present. Consume with `| bool` (set_fact
# renders it as a string).
- name: Record whether an install happened
  set_fact:
    "{{ deb_install_args.name | regex_replace('[^A-Za-z0-9_]', '_') }}_deb_changed": "{{ deb_install_apt.changed | default(false) }}"
