- name: _setup | Install podman
  import_role:
    name: podman
    tasks_from: install

- name: _setup | Install nginx
  import_role:
    name: test
    tasks_from: nginx

# healthchecks uses nginx_site_args.auth=required with a sibling
# `^/(ping|ping-fail)/` exemption. Gate-mode stub so _verify can
# distinguish "UI 302s to portal" from "ping path bypasses".
- name: _setup | Install authelia stub in gate mode
  import_role:
    name: test
    tasks_from: authelia_stub
  vars:
    test_authelia_stub_args:
      mode: gate

- name: _setup | Create /mnt/services parent
  file:
    path: /mnt/services
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true

- name: _setup | Create /mnt/services/sqlite parent
  file:
    path: /mnt/services/sqlite
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true
