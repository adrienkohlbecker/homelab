- name: Set up healthchecks system user, group, and config dir
  import_role:
    name: service_user
    tasks_from: user
  vars:
    service_user_name: healthchecks
  tags:
    - healthchecks
    - _check_stage1
    - _check_stage2

- name: Copy healthchecks logo
  when: not (ansible_check_mode and healthchecks_user.changed)
  copy:
    src: logo.png
    dest: /mnt/services/healthchecks/logo.png
    owner: healthchecks
    group: healthchecks
    mode: "0644"
  become: true
  tags:
    - healthchecks
    - _check_stage2

- name: Create healthchecks superuser password secret
  import_role:
    name: podman_secret
    tasks_from: secret
  vars:
    podman_secret_name: healthchecks_password
    podman_secret_data: "{{ healthchecks_password }}"
  tags:
    - healthchecks
    - _check_stage2

# linuxserver/healthchecks honors SUPERUSER_PASSWORD only when creating the
# Django superuser for the first time. After bootstrap, vault rotations get
# baked into the podman secret but the running app keeps the old password
# silently. Detect that case here and force the operator to do the rotation
# in-band; re-running the play afterwards will be clean.
- name: Fail if superuser password rotated post-bootstrap
  fail:
    msg: |
      healthchecks_password changed in vault. The podman secret has been
      updated, but linuxserver/healthchecks bakes SUPERUSER_PASSWORD into
      the Django user record only at first creation, so the running app
      still has the old password.

      To complete the rotation, run on the target host:

        podman exec -it healthchecks \
          python manage.py changepassword {{ root_email }}

      Then re-run this play.
  when: healthchecks_password_rotated and healthchecks_password_existed_before
  tags:
    - healthchecks
    - _check_stage2

- name: Create healthchecks SMTP password secret
  import_role:
    name: podman_secret
    tasks_from: secret
  vars:
    podman_secret_name: healthchecks_smtp_password
    podman_secret_data: "{{ healthchecks_smtp_password }}"
  tags:
    - healthchecks
    - _check_stage2

- name: Install healthchecks service
  import_role:
    name: systemd_unit
    tasks_from: template
  vars:
    systemd_unit_src: healthchecks.service
    systemd_unit_condition: "{{ not (ansible_check_mode and healthchecks_user.changed) }}"
  tags:
    - healthchecks
    - _check_stage2

- name: Enable healthchecks service
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_src: healthchecks
    systemd_unit_condition: "{{ not (ansible_check_mode and (systemd_unit.changed or healthchecks_user.changed)) }}"
    systemd_unit_restart: "{{ systemd_unit.changed or healthchecks_password_rotated or healthchecks_smtp_password_rotated }}"
  tags:
    - healthchecks

- name: Configure nginx
  import_role:
    name: nginx
    tasks_from: site
  vars:
    nginx_subdomain: healthchecks
    nginx_proxy_pass: http://localhost:8000/
  tags:
    - healthchecks
