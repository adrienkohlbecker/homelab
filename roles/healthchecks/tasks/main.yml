# sqlite3 CLI is used host-side to pre-create the WAL-mode DB below
# and (read-only) by the _verify journal_mode probe. libsqlite3-0 is
# pulled transitively by other packages but the CLI is not -- mirror
# the fluentbit role's explicit install (4af464f3).
- name: Install sqlite3 CLI
  apt:
    pkg: sqlite3
    cache_valid_time: 3600
  become: true
  tags:
    - healthchecks

- name: Set up healthchecks system user, group, and config dir
  import_role:
    name: service_user
    tasks_from: user
  vars:
    service_user_args:
      name: healthchecks
  tags:
    - healthchecks

- name: Create sqlite directory
  when: not (ansible_check_mode and healthchecks_user.changed)
  file:
    dest: /mnt/services/sqlite/healthchecks
    state: directory
    owner: healthchecks
    group: healthchecks
    mode: "0700"
  become: true
  tags:
    - healthchecks

# Pre-create hc.sqlite in WAL journal mode so Django inherits it on its
# first connection. journal_mode is persisted in the SQLite header, so
# once set on an empty DB it survives Django's `migrate` (which
# CREATE TABLEs into the same file). Running as the healthchecks user
# means the file lands at the host uid the +0:N:1 uidmap routes
# in-container root to -- the container can then open it read/write.
# The alternative -- letting Django create the DB in rollback-journal
# mode and converting via a stop-the-service PRAGMA pass -- needed a
# two-pass deploy and a TOCTOU-prone host-side write against a file
# the container could rename out from under us.
- name: Pre-create WAL-mode sqlite DB
  when: not (ansible_check_mode and healthchecks_user.changed)
  command:
    cmd: sqlite3 /mnt/services/sqlite/healthchecks/hc.sqlite 'PRAGMA journal_mode=WAL;'
    creates: /mnt/services/sqlite/healthchecks/hc.sqlite
  become: true
  become_user: healthchecks
  tags:
    - healthchecks

# linuxserver/healthchecks ships the image without a logo asset; this
# task drops a stock one in place so the SITE_LOGO_URL env below has
# something to render. ro bind-mount in the unit overrides the upstream
# static-collected/img/logo.png with this file.
- name: Copy healthchecks logo
  when: not (ansible_check_mode and healthchecks_user.changed)
  copy:
    src: logo.png
    dest: /mnt/services/healthchecks/logo.png
    owner: healthchecks
    group: healthchecks
    mode: "0644"
  become: true
  tags:
    - healthchecks

- name: Create healthchecks superuser password secret
  import_role:
    name: podman_secret
    tasks_from: secret
  vars:
    podman_secret_args:
      name: healthchecks_password
      data: "{{ healthchecks_password }}"
  tags:
    - healthchecks

# linuxserver/healthchecks honors SUPERUSER_PASSWORD only when creating the
# Django superuser for the first time. After bootstrap, vault rotations get
# baked into the podman secret but the running app keeps the old password
# silently. Detect that case here and force the operator to do the rotation
# in-band; re-running the play afterwards will be clean.
- name: Fail if superuser password rotated post-bootstrap
  fail:
    msg: |
      healthchecks_password changed in vault. The podman secret has been
      updated, but linuxserver/healthchecks bakes SUPERUSER_PASSWORD into
      the Django user record only at first creation, so the running app
      still has the old password.

      To complete the rotation, run on the target host:

        podman exec -it healthchecks \
          python manage.py changepassword '{{ root_email }}'

      Then re-run this play.
  when: healthchecks_password_rotated and healthchecks_password_existed_before
  tags:
    - healthchecks

- name: Create healthchecks SMTP password secret
  import_role:
    name: podman_secret
    tasks_from: secret
  vars:
    podman_secret_args:
      name: healthchecks_smtp_password
      data: "{{ healthchecks_smtp_password }}"
  tags:
    - healthchecks

# Pin Django's SECRET_KEY to a vaulted value so it survives /config
# wipes (snapshot restore, image rebuild). Without this, linuxserver
# auto-generates one and persists it inside /config, and a wipe
# silently invalidates all sessions / CSRF / password-reset HMACs.
- name: Create healthchecks SECRET_KEY secret
  import_role:
    name: podman_secret
    tasks_from: secret
  vars:
    podman_secret_args:
      name: healthchecks_secret_key
      data: "{{ healthchecks_secret_key }}"
  tags:
    - healthchecks

- name: Install healthchecks service
  import_role:
    name: systemd_unit
    tasks_from: install
  vars:
    systemd_unit_args:
      src: healthchecks.service.j2
      condition: "{{ not (ansible_check_mode and healthchecks_user.changed) }}"
  tags:
    - healthchecks

- name: Enable healthchecks service
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: healthchecks
      condition: "{{ not (ansible_check_mode and (healthchecks_service_result.changed or healthchecks_user.changed)) }}"
      restart: "{{ healthchecks_service_result.changed or healthchecks_password_rotated or healthchecks_smtp_password_rotated or healthchecks_secret_key_rotated }}"
  tags:
    - healthchecks

- name: Configure nginx
  import_role:
    name: nginx
    tasks_from: site
  vars:
    nginx_site_args:
      subdomain: healthchecks
      proxy_pass: http://localhost:{{ service_ports.healthchecks }}/
      # PR 5: gate the admin UI on Authelia. The /ping/ paths bypass
      # via a sibling location block below.
      auth: required
      # /ping/<uuid> and /ping/<uuid>/{start,fail,log,<exit_status>}
      # are healthchecks' heartbeat endpoints; /ping-fail/<uuid> is
      # the deprecated alias. Off-host crons hit them without an
      # Authelia session -- the UUID itself is the secret. The
      # sibling `location ~ ^/(ping|ping-fail)/` skips the
      # auth_request inside `location /`. Proxy headers mirror what
      # the default location / block forwards. CLAUDE.md notes that
      # healthchecks receives heartbeats from sources outside this
      # repo's grep, so the bypass is load-bearing even though no
      # in-repo caller is visible.
      server_conf: |
        location ~ ^/(ping|ping-fail)/ {
          proxy_pass http://localhost:{{ service_ports.healthchecks }};
          proxy_http_version 1.1;
          proxy_set_header Host              $host;
          proxy_set_header X-Real-IP         $remote_addr;
          proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
          proxy_set_header X-Forwarded-Host  $host;
          # Heartbeats may POST log bodies (curl --data-binary @-);
          # healthchecks truncates above 100KB but accept up to 1M to
          # keep error responses meaningful for slightly-too-big
          # bodies instead of nginx returning 413 first.
          client_max_body_size 1M;
        }
  tags:
    - healthchecks
