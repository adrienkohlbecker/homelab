- name: Set up healthchecks system user, group, and config dir
  import_role:
    name: service_user
    tasks_from: user
  vars:
    service_user_args:
      name: healthchecks
  tags:
    - healthchecks

- name: Create sqlite directory
  when: not (ansible_check_mode and healthchecks_user.changed)
  file:
    dest: /mnt/services/sqlite/healthchecks
    state: directory
    owner: healthchecks
    group: healthchecks
    mode: "0755"
  become: true
  tags:
    - healthchecks

# linuxserver/healthchecks ships the image without a logo asset; this
# task drops a stock one in place so the SITE_LOGO_URL env below has
# something to render. ro bind-mount in the unit overrides the upstream
# static-collected/img/logo.png with this file.
- name: Copy healthchecks logo
  when: not (ansible_check_mode and healthchecks_user.changed)
  copy:
    src: logo.png
    dest: /mnt/services/healthchecks/logo.png
    owner: healthchecks
    group: healthchecks
    mode: "0644"
  become: true
  tags:
    - healthchecks

- name: Create healthchecks superuser password secret
  import_role:
    name: podman_secret
    tasks_from: secret
  vars:
    podman_secret_args:
      name: healthchecks_password
      data: "{{ healthchecks_password }}"
  tags:
    - healthchecks

# linuxserver/healthchecks honors SUPERUSER_PASSWORD only when creating the
# Django superuser for the first time. After bootstrap, vault rotations get
# baked into the podman secret but the running app keeps the old password
# silently. Detect that case here and force the operator to do the rotation
# in-band; re-running the play afterwards will be clean.
- name: Fail if superuser password rotated post-bootstrap
  fail:
    msg: |
      healthchecks_password changed in vault. The podman secret has been
      updated, but linuxserver/healthchecks bakes SUPERUSER_PASSWORD into
      the Django user record only at first creation, so the running app
      still has the old password.

      To complete the rotation, run on the target host:

        podman exec -it healthchecks \
          python manage.py changepassword '{{ root_email }}'

      Then re-run this play.
  when: healthchecks_password_rotated and healthchecks_password_existed_before
  tags:
    - healthchecks

- name: Create healthchecks SMTP password secret
  import_role:
    name: podman_secret
    tasks_from: secret
  vars:
    podman_secret_args:
      name: healthchecks_smtp_password
      data: "{{ healthchecks_smtp_password }}"
  tags:
    - healthchecks

# Pin Django's SECRET_KEY to a vaulted value so it survives /config
# wipes (snapshot restore, image rebuild). Without this, linuxserver
# auto-generates one and persists it inside /config, and a wipe
# silently invalidates all sessions / CSRF / password-reset HMACs.
- name: Create healthchecks SECRET_KEY secret
  import_role:
    name: podman_secret
    tasks_from: secret
  vars:
    podman_secret_args:
      name: healthchecks_secret_key
      data: "{{ healthchecks_secret_key }}"
  tags:
    - healthchecks

- name: Install healthchecks service
  import_role:
    name: systemd_unit
    tasks_from: install
  vars:
    systemd_unit_args:
      src: healthchecks.service.j2
      condition: "{{ not (ansible_check_mode and healthchecks_user.changed) }}"
  tags:
    - healthchecks

- name: Enable healthchecks service
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: healthchecks
      condition: "{{ not (ansible_check_mode and (healthchecks_service_result.changed or healthchecks_user.changed)) }}"
      restart: "{{ healthchecks_service_result.changed or healthchecks_password_rotated or healthchecks_smtp_password_rotated or healthchecks_secret_key_rotated }}"
  tags:
    - healthchecks

# linuxserver/healthchecks (Django) doesn't expose a PRAGMA hook and
# defaults SQLite to rollback-journal mode. WAL halves the per-commit
# fsync count and lets readers not block the writer. The mode is
# persisted in the DB header, so the conversion is one-shot.
#
# Stop the service across the PRAGMA: journal_mode=WAL needs an
# exclusive lock; if Django is holding the DB the PRAGMA silently
# returns the current mode without converting, leaving the operator
# in rollback-journal mode without a failure signal. The
# symlink+ownership guard prevents in-container-root (which maps to
# host uid `healthchecks` via uidmap) from swapping hc.sqlite for a
# symlink to a root-owned target before the PRAGMA fires.
#
# First-install two-pass: the DB doesn't exist until Django creates
# it on first start, so the block skips. The next play run sees the
# DB, stops the service briefly, converts, and restarts.
- name: Stat healthchecks sqlite DB
  stat:
    path: /mnt/services/sqlite/healthchecks/hc.sqlite
    follow: false
  register: healthchecks_sqlite_stat
  become: true
  tags:
    - healthchecks

- name: Read healthchecks sqlite journal mode
  command: sqlite3 -readonly /mnt/services/sqlite/healthchecks/hc.sqlite 'PRAGMA journal_mode;'
  register: healthchecks_sqlite_pragma
  changed_when: false
  when: healthchecks_sqlite_stat.stat.exists
  become: true
  tags:
    - healthchecks

- name: Convert healthchecks sqlite to WAL
  when:
    - healthchecks_sqlite_stat.stat.exists
    - healthchecks_sqlite_pragma.stdout | default('') | trim != 'wal'
  block:
    - name: Assert healthchecks sqlite DB is a regular file owned by healthchecks
      assert:
        that:
          - healthchecks_sqlite_stat.stat.isreg
          - healthchecks_sqlite_stat.stat.pw_name == 'healthchecks'
        fail_msg: >-
          /mnt/services/sqlite/healthchecks/hc.sqlite is a symlink or
          owned by another user; refusing to PRAGMA since WAL/SHM
          sidecars would land at an attacker-controlled path.

    - name: Stop healthchecks service for WAL conversion
      systemd:
        name: healthchecks
        state: stopped

    - name: Set healthchecks sqlite to WAL
      command: sqlite3 /mnt/services/sqlite/healthchecks/hc.sqlite 'PRAGMA journal_mode=WAL;'
      register: healthchecks_sqlite_wal
      changed_when: healthchecks_sqlite_wal.stdout | trim == 'wal'
      failed_when: healthchecks_sqlite_wal.stdout | trim != 'wal'

    - name: Start healthchecks service after WAL conversion
      systemd:
        name: healthchecks
        state: started
  become: true
  tags:
    - healthchecks

- name: Configure nginx
  import_role:
    name: nginx
    tasks_from: site
  vars:
    nginx_site_args:
      subdomain: healthchecks
      proxy_pass: http://localhost:{{ service_ports.healthchecks }}/
  tags:
    - healthchecks
