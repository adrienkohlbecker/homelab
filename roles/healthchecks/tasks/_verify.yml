# Loopback probe -- exercises the container directly via the published
# port. Retries cover cold-start (--health-start-period is 10s; budget
# below gives 2 minutes to cover restart-after-deploy too). Uses the
# canonical Host header since ALLOWED_HOSTS no longer includes localhost.
- name: _verify | healthchecks answers /api/v3/status/ on its loopback port
  uri:
    url: http://localhost:{{ service_ports.healthchecks }}/api/v3/status/
    headers:
      Host: healthchecks.{{ inventory_hostname }}.{{ domain }}
    status_code: 200
    return_content: true
    timeout: 10
  register: _verify_loopback
  retries: 60
  delay: 2
  until:
    - _verify_loopback.status == 200
    - "'ok' in _verify_loopback.content"
  become: true

# nginx Host-header probe -- exercises the full reverse-proxy chain so
# a typo in nginx_site_args / proxy_pass fails here too. Also confirms
# SECURE_PROXY_SSL_HEADER wiring: the status JSON renders without
# 4xx/5xx through the https terminator.
- name: _verify | healthchecks is reachable through nginx
  uri:
    url: https://localhost/api/v3/status/
    headers:
      Host: healthchecks.{{ inventory_hostname }}.{{ domain }}
    validate_certs: false
    return_content: true
  register: _verify_nginx
  failed_when: >-
    _verify_nginx.status != 200
    or "ok" not in _verify_nginx.content
  become: true

# SECRET_KEY contract probe -- the login form's csrfmiddlewaretoken is
# HMAC-signed with SECRET_KEY at render time, and Django raises
# ImproperlyConfigured if SECRET_KEY isn't set. Asserting the token
# renders proves the vault-backed podman secret reached Django; without
# this probe a regression that loses SECRET_KEY (e.g. typo in --secret
# wiring, /config wipe with no pin) only manifests later as session
# invalidations and CSRF failures.
- name: _verify | healthchecks login form renders with a CSRF token
  uri:
    url: https://localhost/accounts/login/
    headers:
      Host: healthchecks.{{ inventory_hostname }}.{{ domain }}
    validate_certs: false
    return_content: true
  register: _verify_login
  failed_when: >-
    _verify_login.status != 200
    or 'csrfmiddlewaretoken' not in _verify_login.content
  become: true

# Functional WAL assertion -- confirms the WAL conversion actually
# stuck (the prior "PRAGMA against a held DB" race silently no-op'd
# and reported ok). Read-only probe, doesn't lock.
- name: _verify | healthchecks sqlite is in WAL journal mode
  command: sqlite3 -readonly /mnt/services/sqlite/healthchecks/hc.sqlite 'PRAGMA journal_mode;'
  register: _verify_wal
  changed_when: false
  failed_when: _verify_wal.stdout | trim != 'wal'
  become: true

# Uidmap regression detector. Django writes hc.sqlite as in-container
# root, which the +0:N:1 override routes to host uid healthchecks. A
# mapping drift (wrong uid in the override, mismatch between
# service_user and the unit) would land the file at a different host
# uid silently; assert ownership so the regression is loud.
- name: _verify | healthchecks sqlite DB is owned by healthchecks
  stat:
    path: /mnt/services/sqlite/healthchecks/hc.sqlite
  register: _verify_db_owner
  failed_when: >-
    not _verify_db_owner.stat.exists
    or _verify_db_owner.stat.pw_name != 'healthchecks'
  become: true
