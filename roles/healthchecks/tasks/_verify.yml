# Loopback probe -- exercises the container directly via the published
# port. Retries cover cold-start (--health-start-period is 10s; budget
# below gives 2 minutes to cover restart-after-deploy too). Uses the
# canonical Host header since ALLOWED_HOSTS doesn't include localhost.
- name: _verify | Healthchecks answers /api/v3/status/ on its loopback port
  uri:
    url: http://localhost:{{ service_ports.healthchecks }}/api/v3/status/
    headers:
      Host: healthchecks.{{ inventory_hostname }}.{{ domain }}
    status_code: 200
    return_content: true
    timeout: 10
  register: _healthchecks_loopback
  retries: 60
  delay: 2
  until:
    - _healthchecks_loopback.status == 200
    - "'OK' in _healthchecks_loopback.content"
  become: true

# nginx auth-gate probe -- the UI subdomain is `auth: required`, so
# a cookieless GET / has to land on Authelia's 302 redirect chain.
# Validates both the auth_request wiring and the SECURE_PROXY_SSL_HEADER
# pass-through (Django would 400 a wrong scheme before we ever see the
# 302).
- name: _verify | Healthchecks UI gate redirects unauthenticated to Authelia
  uri:
    url: https://localhost/
    headers:
      Host: healthchecks.{{ inventory_hostname }}.{{ domain }}
    validate_certs: false
    follow_redirects: none
    status_code: 302
  register: _healthchecks_nginx_gate
  failed_when: >-
    _healthchecks_nginx_gate.status != 302
    or 'auth.' not in (_healthchecks_nginx_gate.location | default(''))
  become: true

# /ping/ bypass -- exercises the sibling location block carved out for
# heartbeats. A bogus uuid still proves the request reached healthchecks
# (it returns 400 for malformed UUIDs, never a 302 to Authelia). Any
# non-302 status here means the auth_request inside `location /` did
# not fire on this path.
- name: _verify | /ping/<uuid> bypasses the Authelia gate
  uri:
    url: https://localhost/ping/00000000-0000-0000-0000-000000000000
    headers:
      Host: healthchecks.{{ inventory_hostname }}.{{ domain }}
    validate_certs: false
    follow_redirects: none
    status_code: [ 200, 400, 404 ]
  register: _healthchecks_ping_bypass
  failed_when: >-
    _healthchecks_ping_bypass.status not in [ 200, 400, 404 ]
    or _healthchecks_ping_bypass.status == 302
  become: true

# SECRET_KEY contract probe -- Django raises ImproperlyConfigured very
# early in manage.py check if SECRET_KEY is unset/blank, so a passing
# check proves the vault-backed podman secret reached Django. Replaces
# an older login-form probe that depended on Django's CSRF template
# shape (incidental detail, churned across upstream releases).
- name: _verify | Healthchecks Django config passes manage.py check
  command: podman exec --workdir /app/healthchecks healthchecks python manage.py check
  register: _healthchecks_check
  changed_when: false
  become: true

# Functional WAL assertion -- confirms the WAL conversion actually
# stuck (the prior "PRAGMA against a held DB" race silently no-op'd
# and reported ok). Read-only probe, doesn't lock.
- name: _verify | Healthchecks sqlite is in WAL journal mode
  command: sqlite3 -readonly /mnt/services/sqlite/healthchecks/hc.sqlite 'PRAGMA journal_mode;'
  register: _healthchecks_wal
  changed_when: false
  failed_when: _healthchecks_wal.stdout | trim != 'wal'
  become: true

# Uidmap regression detector. Django writes hc.sqlite as in-container
# root, which the +0:N:1 override routes to host uid healthchecks. A
# mapping drift (wrong uid in the override, mismatch between
# service_user and the unit) would land the file at a different host
# uid silently; assert ownership so the regression is loud.
- name: _verify | Healthchecks sqlite DB is owned by healthchecks
  stat:
    path: /mnt/services/sqlite/healthchecks/hc.sqlite
  register: _healthchecks_db_owner
  failed_when: >-
    not _healthchecks_db_owner.stat.exists
    or _healthchecks_db_owner.stat.pw_name != 'healthchecks'
  become: true
