global_defs {
  # Required for the vrrp_script block to run under a declared user. Without
  # it keepalived demotes scripts to `keepalived_script` (not created by the
  # .deb) and they silently fail -- the healthcheck would never gate VRRP, so
  # the VIP logic breaks. The dns.conf fragment declares `user <name>`.
  enable_script_security
  # Least-privilege default: vrrp_script blocks run as `nobody` unless they
  # opt up. The dns.conf healthcheck is a loopback DNS probe that needs no
  # privilege and keeps this default (unlike adguard on lab/pug, whose
  # container-port probe declares `user root`).
  script_user nobody
  # NB: SIGHUP-reload of global_defs is flaky in 2.2.x, so editing either
  # directive needs a manual `systemctl restart keepalived` to take effect.
}

include /etc/keepalived/conf.d/*.conf
