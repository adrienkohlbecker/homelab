# Drop-in: validate the assembled config before keepalived starts or reloads,
# covering the start paths the converge-time `keepalived -t` gate and the
# on-boot recovery script don't -- a manual `systemctl restart keepalived` or
# systemd's own auto-restart. Without this, those would bring the daemon up
# on a broken /etc/keepalived config.
[Unit]
# keepalived.service is Type=notify and wedges ~90s before failing when
# conf.d has no vrrp_instance to manage. The UDM always ships pihole.conf, so
# this is belt-and-braces -- but it fails closed if a firmware update ever
# leaves conf.d empty before the recovery script re-symlinks the fragment.
ConditionPathExistsGlob=/etc/keepalived/conf.d/*.conf

[Service]
# Fail closed if the assembled config doesn't parse, on any start path.
ExecStartPre=/usr/sbin/keepalived -t -f /etc/keepalived/keepalived.conf

# Validate before SIGHUP: an out-of-band `systemctl reload keepalived` HUPs
# the live daemon, which drops and re-adds the VIP it holds. The empty first
# line resets the unit's inherited ExecReload; the two then run serially and a
# non-zero validate aborts the reload before the HUP.
ExecReload=
ExecReload=/usr/sbin/keepalived -t -f /etc/keepalived/keepalived.conf
ExecReload=/bin/kill -HUP $MAINPID
