# _verify is test-only by contract (runs only under test/testrole.py against
# the box VM). It exercises the role's load-bearing invariants on the live
# host:
#
#   * Persistent masters under /data carry the right perms, and the active
#     paths in /etc + /usr/local/bin are symlinks pointing back at them —
#     the on-disk shape the on-boot recovery re-establishes after a firmware
#     wipe.
#   * keepalived assembles + validates, leaves init_fail FAULT once the
#     loopback healthcheck passes, and (alone on the closed bridge) becomes
#     MASTER and claims the VIP — the catastrophic-failover path.
#   * The peer-scoped iptables accept, the ip_nonlocal_bind sysctl, and the
#     heartbeat timer are all in place.
#   * The on-boot recovery script (30-keepalived.sh) is idempotent: running
#     it by hand re-applies symlinks/sysctl/iptables and leaves keepalived
#     active with the VIP still held — proving the firmware-recovery path
#     without needing an actual firmware wipe.
#
# box is alone (its peers lab/pug aren't on the bridge), so it reaches
# MASTER — unlike the real UDM, which sits BACKUP behind them. That's the
# point: the box test drives the VIP-claim mechanism this role exists for.

- name: _verify | Stat the persistent config masters under /data
  stat:
    path: "{{ item }}"
  loop:
    - /data/keepalived/keepalived.conf
    - /data/keepalived/dns.conf
    - /data/keepalived/healthcheck.sh
  register: _udm_dns_failover_data_masters
  become: true

- name: _verify | Masters exist with the expected ownership/mode
  assert:
    that:
      - _udm_dns_failover_data_masters.results | map(attribute='stat.exists') | list == [true, true, true]
      - _udm_dns_failover_data_masters.results | map(attribute='stat.pw_name') | list == ['root', 'root', 'root']
      - _udm_dns_failover_data_masters.results[0].stat.mode == '0640'
      - _udm_dns_failover_data_masters.results[1].stat.mode == '0640'
      - _udm_dns_failover_data_masters.results[2].stat.mode == '0755'

- name: _verify | Stat the active symlinks
  stat:
    path: "{{ item }}"
  loop:
    - /etc/keepalived/keepalived.conf
    - /etc/keepalived/conf.d/dns.conf
    - /usr/local/bin/dnsmasq_healthcheck
  register: _udm_dns_failover_symlinks
  become: true

- name: _verify | Active paths are symlinks pointing at the /data masters
  assert:
    that:
      - _udm_dns_failover_symlinks.results | map(attribute='stat.islnk') | list == [true, true, true]
      - _udm_dns_failover_symlinks.results[0].stat.lnk_target == '/data/keepalived/keepalived.conf'
      - _udm_dns_failover_symlinks.results[1].stat.lnk_target == '/data/keepalived/dns.conf'
      - _udm_dns_failover_symlinks.results[2].stat.lnk_target == '/data/keepalived/healthcheck.sh'

- name: _verify | Keepalived is active and enabled
  systemd:
    name: keepalived.service
  register: _udm_dns_failover_keepalived
  failed_when: >-
    _udm_dns_failover_keepalived.status.ActiveState != 'active' or
    _udm_dns_failover_keepalived.status.UnitFileState != 'enabled'
  become: true

- name: _verify | The loopback healthcheck passes (init_fail gate clears)
  command: /usr/local/bin/dnsmasq_healthcheck
  changed_when: false
  become: true

# The VIP-claim is the headline invariant: init_fail -> healthcheck passes
# -> MASTER -> VIP assigned to the tracked interface. Retry to absorb the
# election + healthcheck-rise latency after the daemon started in converge.
- name: _verify | Keepalived has claimed the VIP on the tracked interface
  command: ip -4 -oneline addr show dev {{ udm_dns_failover_interface }}
  register: _udm_dns_failover_vip
  changed_when: false
  until: network.virtual_ips.dns in _udm_dns_failover_vip.stdout
  retries: 10
  delay: 2
  become: true

- name: _verify | Sysctl ip_nonlocal_bind is set
  command: sysctl -n net.ipv4.ip_nonlocal_bind
  register: _udm_dns_failover_nonlocal
  changed_when: false
  failed_when: _udm_dns_failover_nonlocal.stdout | trim != '1'
  become: true

- name: _verify | The peer-scoped VRRP iptables accept is present
  command: >-
    iptables -w 5 -C INPUT -i {{ udm_dns_failover_interface }} -s {{ item }}
    -p 112 -m comment --comment "keepalived VRRP" -j ACCEPT
  loop: "{{ dns_keepalived_peers | select('ne', inventory_hostname) | map('extract', external_ips) | sort }}"
  changed_when: false
  become: true

- name: _verify | The heartbeat timer is active and enabled
  systemd:
    name: udm_keepalived_heartbeat.timer
  register: _udm_dns_failover_heartbeat_timer
  failed_when: >-
    _udm_dns_failover_heartbeat_timer.status.ActiveState != 'active' or
    _udm_dns_failover_heartbeat_timer.status.UnitFileState != 'enabled'
  become: true

- name: _verify | The on-boot framework unit is enabled
  systemd:
    name: on-boot.service
  register: _udm_dns_failover_onboot
  failed_when: _udm_dns_failover_onboot.status.UnitFileState != 'enabled'
  become: true

- name: _verify | Stat the keepalived validate drop-in
  stat:
    path: /etc/systemd/system/keepalived.service.d/override.conf
  register: _udm_dns_failover_dropin_stat
  become: true

- name: _verify | Slurp the keepalived validate drop-in
  slurp:
    src: /etc/systemd/system/keepalived.service.d/override.conf
  register: _udm_dns_failover_dropin_content
  become: true

- name: _verify | Drop-in is a /data symlink carrying the validate hooks
  vars:
    _dropin: "{{ _udm_dns_failover_dropin_content.content | b64decode }}"
  assert:
    that:
      - _udm_dns_failover_dropin_stat.stat.islnk
      - _udm_dns_failover_dropin_stat.stat.lnk_target == '/data/keepalived/override.conf'
      - "'ConditionPathExistsGlob=/etc/keepalived/conf.d/*.conf' in _dropin"
      - "'ExecStartPre=/usr/sbin/keepalived -t -f /etc/keepalived/keepalived.conf' in _dropin"
      - "'ExecReload=/usr/sbin/keepalived -t -f /etc/keepalived/keepalived.conf' in _dropin"

# Firmware-recovery probe: the on-boot script is the path that re-bootstraps
# everything after a SquashFS wipe. We can't wipe /usr under qemu, but the
# script is idempotent by design, so running it by hand must be a no-op that
# leaves keepalived active with the VIP still held.
- name: _verify | Capture keepalived's active-enter timestamp before recovery
  set_fact:
    _udm_dns_failover_ts_before: "{{ _udm_dns_failover_keepalived.status.ActiveEnterTimestampMonotonic }}"

- name: _verify | Run the on-boot recovery script by hand
  command: /data/on_boot.d/30-keepalived.sh
  changed_when: false
  become: true

- name: _verify | Keepalived still active, never restarted, VIP still held
  systemd:
    name: keepalived.service
  register: _udm_dns_failover_keepalived_after
  failed_when: >-
    _udm_dns_failover_keepalived_after.status.ActiveState != 'active' or
    _udm_dns_failover_keepalived_after.status.ActiveEnterTimestampMonotonic != _udm_dns_failover_ts_before
  become: true

- name: _verify | VIP still claimed after the recovery run
  command: ip -4 -oneline addr show dev {{ udm_dns_failover_interface }}
  register: _udm_dns_failover_vip_after
  changed_when: false
  failed_when: network.virtual_ips.dns not in _udm_dns_failover_vip_after.stdout
  become: true

# Drop-in probe (finding 9): a malformed fragment must not reach the live
# daemon via an out-of-band `systemctl reload`. The drop-in's ExecReload runs
# keepalived -t before the HUP, so the reload aborts and the daemon keeps the
# good config it is running -- the VIP never flaps.
- name: _verify | Drop a malformed fragment for the reload-validate probe
  copy:
    content: |
      _verify_dropin_bogus_keyword
    dest: /etc/keepalived/conf.d/_verify_dropin_bad.conf
    owner: root
    group: root
    mode: "0640"
  become: true

- name: _verify | Out-of-band systemctl reload aborts on the ExecReload validate  # noqa: command-instead-of-module
  command: systemctl reload keepalived
  register: _udm_dns_failover_bad_reload
  changed_when: false
  failed_when: false
  become: true

- name: _verify | Reload was rejected by the drop-in validate
  assert:
    that:
      - _udm_dns_failover_bad_reload.rc != 0

- name: _verify | Daemon kept the good config and VIP after the rejected reload
  systemd:
    name: keepalived.service
  register: _udm_dns_failover_keepalived_after_bad_reload
  failed_when: _udm_dns_failover_keepalived_after_bad_reload.status.ActiveState != 'active'
  become: true

- name: _verify | VIP still held after the rejected reload
  command: ip -4 -oneline addr show dev {{ udm_dns_failover_interface }}
  register: _udm_dns_failover_vip_reload
  changed_when: false
  failed_when: network.virtual_ips.dns not in _udm_dns_failover_vip_reload.stdout
  become: true

- name: _verify | Remove the reload-validate probe fragment
  file:
    path: /etc/keepalived/conf.d/_verify_dropin_bad.conf
    state: absent
  become: true

# Rescue probe: a base-conf change that then fails keepalived -t must restore
# the previous base from its backup AND delete that backup, leaving the live
# daemon on the previous good config. Perturb the base so the role's copy
# rewrites it (leaving a backup), with a malformed extra fragment present so
# keepalived -t fails after the good base is written.
- name: _verify | Count base-conf backups before the rollback probe
  find:
    paths: /data/keepalived
    patterns: 'keepalived.conf.*'
  register: _udm_dns_failover_backups_pre
  become: true

- name: _verify | Perturb the base conf so the next copy leaves a backup
  lineinfile:
    path: /data/keepalived/keepalived.conf
    line: "# _verify rollback perturbation"
    insertafter: EOF
  become: true

- name: _verify | Drop a malformed fragment to fail validation after the copy
  copy:
    content: |
      _verify_rollback_bogus_keyword
    dest: /etc/keepalived/conf.d/_verify_rollback_bad.conf
    owner: root
    group: root
    mode: "0640"
  become: true

- name: _verify | Re-run the role expecting the base-conf rescue to fire
  block:
    - name: _verify | Converge with a perturbed base conf and a bad fragment
      import_role:
        name: udm_dns_failover
    - name: _verify | Role unexpectedly succeeded on the rollback probe
      fail:
        msg: keepalived -t did not fail the run as it must with a malformed fragment present.
  rescue:
    - name: _verify | Role aborted and the base-conf rescue ran as expected
      debug:
        msg: role failed validation as expected -- base conf restored from backup.

- name: _verify | Slurp the base conf after the rollback
  slurp:
    src: /data/keepalived/keepalived.conf
  register: _udm_dns_failover_base_after_rollback
  become: true

- name: _verify | Count base-conf backups after the rollback probe
  find:
    paths: /data/keepalived
    patterns: 'keepalived.conf.*'
  register: _udm_dns_failover_backups_post
  become: true

- name: _verify | Rollback restored the perturbed base and cleaned its backup
  vars:
    _base: "{{ _udm_dns_failover_base_after_rollback.content | b64decode }}"
  assert:
    that:
      # Restore arm ran: the perturbation we appended (the backed-up pre-copy
      # version) is back on disk.
      - "'# _verify rollback perturbation' in _base"
      # Delete-backup arm ran: backup count unchanged vs before the probe.
      - _udm_dns_failover_backups_post.matched == _udm_dns_failover_backups_pre.matched

- name: _verify | Keepalived still active on the good config after the rollback
  systemd:
    name: keepalived.service
  register: _udm_dns_failover_keepalived_rollback
  failed_when: _udm_dns_failover_keepalived_rollback.status.ActiveState != 'active'
  become: true

- name: _verify | Remove the rollback probe fragment
  file:
    path: /etc/keepalived/conf.d/_verify_rollback_bad.conf
    state: absent
  become: true

# VRRP-guard probe: keepalived -t passes on an instance-less fragment, so the
# on-boot recovery must ALSO confirm the instance is present before starting
# -- otherwise it brings up a healthy but VIP-less daemon, the exact
# post-firmware failure mode this guard exists to prevent. Stop keepalived,
# blank the fragment of its instance, run the recovery script, and assert it
# did NOT start the daemon. Destructive + last: leaves keepalived stopped (the
# VM is disposed after _verify).
- name: _verify | Stop keepalived for the vrrp-guard probe
  systemd:
    name: keepalived.service
    state: stopped
  become: true

- name: _verify | Replace the fragment with an instance-less stub
  copy:
    content: |
      # no vrrp_instance here -- keepalived -t passes but there is nothing to run
    dest: /data/keepalived/dns.conf
    owner: root
    group: root
    mode: "0640"
  become: true

- name: _verify | Run the recovery script against the instance-less fragment
  command: /data/on_boot.d/30-keepalived.sh
  changed_when: false
  become: true

- name: _verify | The guard skipped the start -- keepalived stays inactive
  systemd:
    name: keepalived.service
  register: _udm_dns_failover_keepalived_guard
  failed_when: _udm_dns_failover_keepalived_guard.status.ActiveState == 'active'
  become: true
