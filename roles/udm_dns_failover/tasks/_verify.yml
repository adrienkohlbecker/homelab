- name: Verify DNS is available on the VIP
  wait_for:
    host: "{{ pihole_keepalived_ip }}"
    port: 53
    timeout: 5
  become: true

- name: Verify local dnsmasq healthcheck passes
  command: /usr/local/bin/pihole_healthcheck
  changed_when: false
  become: true

- name: Verify keepalived is running
  systemd:
    name: keepalived.service
  register: _udm_dns_failover_keepalived_status
  failed_when: _udm_dns_failover_keepalived_status.status.ActiveState != 'active'
  become: true

- name: Verify VRRP state settled to BACKUP (lab/pug hold the VIP as MASTER)
  shell:
    cmd: |
      set -euo pipefail
      journalctl -t pihole-keepalived --no-pager -n 20 | grep -qw BACKUP
    executable: /bin/bash
  changed_when: false
  become: true

- name: Verify iptables VRRP rule per peer
  command: iptables -C INPUT -i {{ udm_dns_failover_interface }} -s {{ item }} -p 112 -m comment --comment "keepalived VRRP" -j ACCEPT
  loop: "{{ pihole_keepalived_peers | select('ne', inventory_hostname) | map('extract', external_ips) | sort }}"
  changed_when: false
  become: true

- name: Verify ip_nonlocal_bind is set
  command: sysctl -n net.ipv4.ip_nonlocal_bind
  register: _udm_dns_failover_nonlocal
  changed_when: false
  failed_when: _udm_dns_failover_nonlocal.stdout | trim != '1'
  become: true

- name: Verify heartbeat timer is active
  systemd:
    name: udm_keepalived_heartbeat.timer
  register: _udm_dns_failover_heartbeat_timer
  failed_when: _udm_dns_failover_heartbeat_timer.status.ActiveState != 'active'
  become: true
