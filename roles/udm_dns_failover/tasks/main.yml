# Provisions keepalived on the UDM Pro as a last-resort DNS VIP failover peer.
# When the UDM claims the VIP, its own dnsmasq (which binds every address on
# br0) automatically serves DNS on it — no separate resolver needed.
#
# All persistent state lives under /data/keepalived/ (survives firmware
# updates). An on-boot script re-bootstraps the apt-installed keepalived
# binary after firmware wipes /usr/.
#
# This role targets the UDM only (hosts: udm in site.yml). The UDM is not
# a standard Ubuntu host — it runs UniFi OS (Debian bullseye, SquashFS root,
# overlay /etc/). No handlers, no systemd_unit helper, no podman.
- name: Validate required variables
  assert:
    that:
      - pihole_keepalived_ip is defined
      - pihole_keepalived_vrid is defined
      - pihole_keepalived_priority is defined
      - (pihole_keepalived_priority | default(0) | int) > 0
      - (pihole_keepalived_priority | default(0) | int) <= 255
      - pihole_keepalived_peers is defined
      - (pihole_keepalived_peers | default([]) | length) > 0
      - inventory_hostname in external_ips
      - udm_dns_failover_heartbeat_url is defined
      - udm_dns_failover_interface is regex("^[a-zA-Z0-9._-]+$")
    fail_msg: >-
      udm_dns_failover requires pihole_keepalived_{ip,vrid,priority,peers},
      an external_ips entry, and udm_dns_failover_heartbeat_url.
  tags:
    - udm_dns_failover

# -- directory structure --------------------------------------------------

- name: Create persistent directory tree
  file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - /data/keepalived
    - /data/keepalived/cache
    - /data/on_boot.d
  become: true
  tags:
    - udm_dns_failover

# -- keepalived (apt) -----------------------------------------------------

- name: Install keepalived
  apt:
    pkg:
      - keepalived
    cache_valid_time: 3600
    policy_rc_d: 101
  register: udm_dns_failover_keepalived_apt
  become: true
  tags:
    - udm_dns_failover

- name: Find keepalived .deb in apt cache
  find:
    paths: /var/cache/apt/archives
    patterns: 'keepalived_*.deb'
  register: udm_dns_failover_keepalived_debs
  become: true
  tags:
    - udm_dns_failover

- name: Clear stale .deb files from keepalived cache
  when: udm_dns_failover_keepalived_debs.files | length > 0
  shell:
    cmd: |
      set -euo pipefail
      latest="{{ udm_dns_failover_keepalived_debs.files | sort(attribute='mtime') | last | attr('path') | basename }}"
      for f in /data/keepalived/cache/keepalived_*.deb; do
        [ -f "$f" ] && [ "$(basename "$f")" != "$latest" ] && rm -f "$f"
      done
    executable: /bin/bash
  changed_when: false
  become: true
  tags:
    - udm_dns_failover

- name: Cache keepalived .deb for firmware-update recovery
  when: udm_dns_failover_keepalived_debs.files | length > 0
  copy:
    src: "{{ udm_dns_failover_keepalived_debs.files | sort(attribute='mtime') | last | attr('path') }}"
    dest: /data/keepalived/cache/
    remote_src: true
    mode: "0644"
    backup: true
  become: true
  tags:
    - udm_dns_failover

# -- configuration files --------------------------------------------------

- name: Deploy keepalived base config
  copy:
    src: keepalived.conf
    dest: /data/keepalived/keepalived.conf
    owner: root
    group: root
    mode: "0640"
    backup: true
  register: udm_dns_failover_base_conf
  become: true
  tags:
    - udm_dns_failover

- name: Deploy VRRP fragment
  template:
    src: pihole.conf.j2
    dest: /data/keepalived/pihole.conf
    owner: root
    group: root
    mode: "0640"
    backup: true
  register: udm_dns_failover_vrrp_conf
  become: true
  tags:
    - udm_dns_failover

- name: Deploy healthcheck script
  template:
    src: healthcheck.sh.j2
    dest: /data/keepalived/healthcheck.sh
    owner: root
    group: root
    mode: "0755"
    backup: true
    validate: bash -n %s
  become: true
  tags:
    - udm_dns_failover

# -- symlinks into /etc/ --------------------------------------------------

- name: Symlink keepalived base config
  file:
    src: /data/keepalived/keepalived.conf
    dest: /etc/keepalived/keepalived.conf
    state: link
    force: true
  become: true
  tags:
    - udm_dns_failover

- name: Create keepalived conf.d directory
  file:
    path: /etc/keepalived/conf.d
    state: directory
    owner: root
    group: root
    mode: "0750"
  become: true
  tags:
    - udm_dns_failover

- name: Symlink VRRP fragment
  file:
    src: /data/keepalived/pihole.conf
    dest: /etc/keepalived/conf.d/pihole.conf
    state: link
    force: true
  become: true
  tags:
    - udm_dns_failover

- name: Symlink healthcheck script
  file:
    src: /data/keepalived/healthcheck.sh
    dest: /usr/local/bin/pihole_healthcheck
    state: link
    force: true
  become: true
  tags:
    - udm_dns_failover

# -- sysctl ----------------------------------------------------------------

- name: Enable ip_nonlocal_bind
  ansible.posix.sysctl:
    name: net.ipv4.ip_nonlocal_bind
    value: '1'
    sysctl_file: /etc/sysctl.d/30-keepalived.conf
    sysctl_set: true
  become: true
  tags:
    - udm_dns_failover

# -- iptables VRRP accept -------------------------------------------------
# INPUT has policy ACCEPT with jumps to ALIEN/TOR/UBIOS_INPUT_JUMP (no
# trailing DROP), so appending is safe. One rule per peer source IP (not a
# blanket proto-112 accept) so only the real VRRP peers can deliver adverts
# on br0 -- mirrors the peer-scoped accept the prod hosts apply via nftables
# vrrp_peer_ips. Idempotent via the -C check.

- name: Check VRRP iptables rule per peer
  command: iptables -w 5 -C INPUT -i {{ udm_dns_failover_interface }} -s {{ item }} -p 112 -m comment --comment "keepalived VRRP" -j ACCEPT
  loop: "{{ pihole_keepalived_peers | select('ne', inventory_hostname) | map('extract', external_ips) | sort }}"
  register: udm_dns_failover_iptables_check
  changed_when: false
  failed_when: false
  become: true
  tags:
    - udm_dns_failover

- name: Add VRRP iptables rule per peer
  when: item.rc != 0
  command: iptables -w 5 -A INPUT -i {{ udm_dns_failover_interface }} -s {{ item.item }} -p 112 -m comment --comment "keepalived VRRP" -j ACCEPT
  loop: "{{ udm_dns_failover_iptables_check.results }}"
  loop_control:
    label: "{{ item.item }}"
  changed_when: true
  become: true
  tags:
    - udm_dns_failover

# One-time cleanup of the pre-scoping blanket rule (proto 112 from any
# source). Converge only appends, so the legacy unscoped rule would linger
# beside the new per-peer rules until a reboot flushes it; -D removes it
# idempotently (rc != 0 once it is gone).
- name: Remove legacy unscoped VRRP iptables rule
  command: iptables -w 5 -D INPUT -i {{ udm_dns_failover_interface }} -p 112 -m comment --comment "keepalived VRRP" -j ACCEPT
  register: udm_dns_failover_iptables_legacy
  changed_when: udm_dns_failover_iptables_legacy.rc == 0
  failed_when: false
  become: true
  tags:
    - udm_dns_failover

# -- systemd units ---------------------------------------------------------

- name: Deploy on-boot framework unit
  copy:
    src: "{{ role_path }}/templates/on-boot.service"
    dest: /etc/systemd/system/on-boot.service
    owner: root
    group: root
    mode: "0644"
    backup: true
  register: udm_dns_failover_onboot_unit
  become: true
  tags:
    - udm_dns_failover

- name: Deploy on-boot keepalived script
  template:
    src: on-boot-keepalived.sh.j2
    dest: /data/on_boot.d/30-keepalived.sh
    owner: root
    group: root
    mode: "0755"
    backup: true
    validate: bash -n %s
  become: true
  tags:
    - udm_dns_failover

- name: Deploy heartbeat service to persistent storage
  template:
    src: udm_keepalived_heartbeat.service.j2
    dest: /data/keepalived/udm_keepalived_heartbeat.service
    owner: root
    group: root
    mode: "0644"
    backup: true
  become: true
  tags:
    - udm_dns_failover

- name: Deploy heartbeat timer to persistent storage
  copy:
    src: udm_keepalived_heartbeat.timer
    dest: /data/keepalived/udm_keepalived_heartbeat.timer
    owner: root
    group: root
    mode: "0644"
    backup: true
  become: true
  tags:
    - udm_dns_failover

- name: Deploy heartbeat service to systemd
  template:
    src: udm_keepalived_heartbeat.service.j2
    dest: /etc/systemd/system/udm_keepalived_heartbeat.service
    owner: root
    group: root
    mode: "0644"
    backup: true
  register: udm_dns_failover_heartbeat_service
  become: true
  tags:
    - udm_dns_failover

- name: Deploy heartbeat timer to systemd
  copy:
    src: udm_keepalived_heartbeat.timer
    dest: /etc/systemd/system/udm_keepalived_heartbeat.timer
    owner: root
    group: root
    mode: "0644"
    backup: true
  register: udm_dns_failover_heartbeat_timer
  become: true
  tags:
    - udm_dns_failover

- name: Reload systemd
  when: >-
    udm_dns_failover_onboot_unit.changed or
    udm_dns_failover_heartbeat_service.changed or
    udm_dns_failover_heartbeat_timer.changed
  systemd:
    daemon_reload: true
  become: true
  tags:
    - udm_dns_failover

# -- service lifecycle -----------------------------------------------------

- name: Enable on-boot framework
  systemd:
    name: on-boot.service
    enabled: true
  become: true
  tags:
    - udm_dns_failover

- name: Validate keepalived config before start
  when: not ansible_check_mode
  command: keepalived -t -f /etc/keepalived/keepalived.conf
  changed_when: false
  become: true
  tags:
    - udm_dns_failover

- name: Start keepalived
  systemd:
    name: keepalived.service
    state: "{{ (udm_dns_failover_base_conf.changed or udm_dns_failover_vrrp_conf.changed) | ternary('reloaded', 'started') }}"
    enabled: true
  become: true
  tags:
    - udm_dns_failover

- name: Enable heartbeat timer
  systemd:
    name: udm_keepalived_heartbeat.timer
    state: started
    enabled: true
  become: true
  tags:
    - udm_dns_failover
