# Provisions keepalived on the UDM Pro as a last-resort DNS VIP failover peer.
# When the UDM claims the VIP, its own dnsmasq (which binds every address on
# br0) automatically serves DNS on it — no separate resolver needed.
#
# All persistent state lives under /data/keepalived/ (survives firmware
# updates). An on-boot script re-bootstraps the apt-installed keepalived
# binary after firmware wipes /usr/.
#
# This role targets the UDM only (hosts: udm in site.yml). The UDM is not
# a standard Ubuntu host — it runs UniFi OS (Debian bullseye, SquashFS root,
# overlay /etc/). No handlers, no systemd_unit helper, no podman.
#
# The heartbeat timer is hand-rolled rather than via the systemd_timer
# helper for two reasons specific to this host: its units must live on
# persistent /data and be symlinked into /etc (to survive a firmware wipe),
# which the helper doesn't do; and the helper's netdata `monitor:` cadence
# alerting has nothing to attach to (no netdata on the UDM). The
# Kuma push heartbeat below is this peer's alerting channel instead.
- name: Validate required variables
  assert:
    that:
      - pihole_keepalived_ip is defined
      - pihole_keepalived_vrid is defined
      - pihole_keepalived_priority is defined
      - (pihole_keepalived_priority | default(0) | int) > 0
      - (pihole_keepalived_priority | default(0) | int) <= 255
      - pihole_keepalived_peers is defined
      - (pihole_keepalived_peers | default([]) | length) > 0
      - inventory_hostname in external_ips
      - udm_dns_failover_heartbeat_url is defined
      # The heartbeat template appends ?status=up / ?status=down, so the
      # stored value must be the bare Kuma push endpoint with no query of
      # its own -- a full copied push URL (…?status=up&msg=…) would render
      # …?status=up&msg=…?status=down and Kuma would read the first status.
      - udm_dns_failover_heartbeat_url is not search('[?]')
      # Shell-injection guard, not a validity check: the interface is
      # interpolated into the iptables `command:` tasks below and the
      # on-boot script's iptables loop. The charset rules out metacharacters;
      # a wrong-but-valid interface name still passes (keepalived would fault
      # on it at runtime).
      - udm_dns_failover_interface is regex("^[a-zA-Z0-9._-]+$")
    fail_msg: >-
      udm_dns_failover requires pihole_keepalived_{ip,vrid,priority,peers},
      an external_ips entry, and udm_dns_failover_heartbeat_url.
  tags:
    - udm_dns_failover

# -- directory structure --------------------------------------------------

- name: Create persistent directory tree
  file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - /data/keepalived
    - /data/on_boot.d
  become: true
  tags:
    - udm_dns_failover

# Root-only: the on-boot recovery path runs `dpkg -i` from here as root, so
# a non-root write into this dir would be boot-time root code execution.
- name: Create keepalived .deb cache
  file:
    path: /data/keepalived/cache
    state: directory
    owner: root
    group: root
    mode: "0700"
  become: true
  tags:
    - udm_dns_failover

# -- keepalived (apt) -----------------------------------------------------

- name: Install keepalived
  apt:
    pkg:
      - keepalived
    cache_valid_time: 3600
    policy_rc_d: 101
  register: udm_dns_failover_keepalived_apt
  become: true
  tags:
    - udm_dns_failover

- name: Find keepalived .deb in apt cache
  find:
    paths: /var/cache/apt/archives
    patterns: 'keepalived_*.deb'
  register: udm_dns_failover_keepalived_debs
  become: true
  tags:
    - udm_dns_failover

- name: Cache keepalived .deb for firmware-update recovery
  when: udm_dns_failover_keepalived_debs.files | length > 0
  copy:
    src: "{{ (udm_dns_failover_keepalived_debs.files | sort(attribute='mtime') | last).path }}"
    dest: /data/keepalived/cache/
    remote_src: true
    mode: "0644"
    backup: true
  become: true
  tags:
    - udm_dns_failover

# -- configuration files --------------------------------------------------

- name: Deploy keepalived base config
  copy:
    src: keepalived.conf
    dest: /data/keepalived/keepalived.conf
    owner: root
    group: root
    mode: "0640"
    backup: true
  register: udm_dns_failover_base_conf
  become: true
  tags:
    - udm_dns_failover

- name: Deploy VRRP fragment
  template:
    src: pihole.conf.j2
    dest: /data/keepalived/pihole.conf
    owner: root
    group: root
    mode: "0640"
    backup: true
  register: udm_dns_failover_vrrp_conf
  become: true
  tags:
    - udm_dns_failover

- name: Deploy healthcheck script
  template:
    src: healthcheck.sh.j2
    dest: /data/keepalived/healthcheck.sh
    owner: root
    group: root
    mode: "0755"
    backup: true
    validate: bash -n %s
  become: true
  tags:
    - udm_dns_failover

# -- symlinks into /etc/ --------------------------------------------------

- name: Symlink keepalived base config
  file:
    src: /data/keepalived/keepalived.conf
    dest: /etc/keepalived/keepalived.conf
    state: link
    force: true
  become: true
  tags:
    - udm_dns_failover

- name: Create keepalived conf.d directory
  file:
    path: /etc/keepalived/conf.d
    state: directory
    owner: root
    group: root
    mode: "0750"
  become: true
  tags:
    - udm_dns_failover

- name: Symlink VRRP fragment
  file:
    src: /data/keepalived/pihole.conf
    dest: /etc/keepalived/conf.d/pihole.conf
    state: link
    force: true
  become: true
  tags:
    - udm_dns_failover

- name: Symlink healthcheck script
  file:
    src: /data/keepalived/healthcheck.sh
    dest: /usr/local/bin/pihole_healthcheck
    state: link
    force: true
  become: true
  tags:
    - udm_dns_failover

# -- sysctl ----------------------------------------------------------------

- name: Enable ip_nonlocal_bind
  ansible.posix.sysctl:
    name: net.ipv4.ip_nonlocal_bind
    value: '1'
    sysctl_file: /etc/sysctl.d/30-keepalived.conf
    sysctl_set: true
  become: true
  tags:
    - udm_dns_failover

# -- iptables VRRP accept -------------------------------------------------
# INPUT has policy ACCEPT with jumps to ALIEN/TOR/UBIOS_INPUT_JUMP (no
# trailing DROP), so appending is safe. One rule per peer source IP (not a
# blanket proto-112 accept) so only the real VRRP peers can deliver adverts
# on br0 -- mirrors the peer-scoped accept the prod hosts apply via nftables
# vrrp_peer_ips. Idempotent via the -C check.

- name: Check VRRP iptables rule per peer
  command: iptables -w 5 -C INPUT -i {{ udm_dns_failover_interface }} -s {{ item }} -p 112 -m comment --comment "keepalived VRRP" -j ACCEPT
  loop: "{{ pihole_keepalived_peers | select('ne', inventory_hostname) | map('extract', external_ips) | sort }}"
  register: udm_dns_failover_iptables_check
  changed_when: false
  failed_when: false
  become: true
  tags:
    - udm_dns_failover

- name: Add VRRP iptables rule per peer
  when: item.rc != 0
  command: iptables -w 5 -A INPUT -i {{ udm_dns_failover_interface }} -s {{ item.item }} -p 112 -m comment --comment "keepalived VRRP" -j ACCEPT
  loop: "{{ udm_dns_failover_iptables_check.results }}"
  loop_control:
    label: "{{ item.item }}"
  changed_when: true
  become: true
  tags:
    - udm_dns_failover

# One-time cleanup of the pre-scoping blanket rule (proto 112 from any
# source). Converge only appends, so the legacy unscoped rule would linger
# beside the new per-peer rules until a reboot flushes it; -D removes it
# idempotently (rc != 0 once it is gone).
- name: Remove legacy unscoped VRRP iptables rule
  command: iptables -w 5 -D INPUT -i {{ udm_dns_failover_interface }} -p 112 -m comment --comment "keepalived VRRP" -j ACCEPT
  register: udm_dns_failover_iptables_legacy
  changed_when: udm_dns_failover_iptables_legacy.rc == 0
  failed_when: false
  become: true
  tags:
    - udm_dns_failover

# -- systemd units ---------------------------------------------------------

- name: Deploy on-boot framework unit
  copy:
    src: "{{ role_path }}/templates/on-boot.service"
    dest: /etc/systemd/system/on-boot.service
    owner: root
    group: root
    mode: "0644"
    backup: true
  register: udm_dns_failover_onboot_unit
  become: true
  tags:
    - udm_dns_failover

- name: Deploy on-boot keepalived script
  template:
    src: on-boot-keepalived.sh.j2
    dest: /data/on_boot.d/30-keepalived.sh
    owner: root
    group: root
    mode: "0755"
    backup: true
    validate: bash -n %s
  become: true
  tags:
    - udm_dns_failover

# 0640: the rendered unit embeds the Kuma push URL (a bearer
# token), so it must not be world-readable.
- name: Deploy heartbeat service to persistent storage
  template:
    src: udm_keepalived_heartbeat.service.j2
    dest: /data/keepalived/udm_keepalived_heartbeat.service
    owner: root
    group: root
    mode: "0640"
    backup: true
  register: udm_dns_failover_heartbeat_service
  become: true
  tags:
    - udm_dns_failover

- name: Deploy heartbeat timer to persistent storage
  copy:
    src: udm_keepalived_heartbeat.timer
    dest: /data/keepalived/udm_keepalived_heartbeat.timer
    owner: root
    group: root
    mode: "0644"
    backup: true
  register: udm_dns_failover_heartbeat_timer
  become: true
  tags:
    - udm_dns_failover

# Symlink the active units to the persistent masters, so the converge and
# the on-boot recovery (which symlinks the same way) leave one on-disk
# shape -- not a real file here and a symlink after a firmware update.
- name: Symlink heartbeat service into systemd
  file:
    src: /data/keepalived/udm_keepalived_heartbeat.service
    dest: /etc/systemd/system/udm_keepalived_heartbeat.service
    state: link
    force: true
  register: udm_dns_failover_heartbeat_service_link
  become: true
  tags:
    - udm_dns_failover

- name: Symlink heartbeat timer into systemd
  file:
    src: /data/keepalived/udm_keepalived_heartbeat.timer
    dest: /etc/systemd/system/udm_keepalived_heartbeat.timer
    state: link
    force: true
  register: udm_dns_failover_heartbeat_timer_link
  become: true
  tags:
    - udm_dns_failover

# keepalived.service.d drop-in: validate the assembled config before the
# daemon starts (ExecStartPre) or reloads (ExecReload). The converge
# keepalived -t gate and the on-boot script both validate, but a manual
# `systemctl restart keepalived` or systemd auto-restart bypasses both -- the
# drop-in fails those closed. Symlinked from /data like the other units so a
# firmware wipe doesn't drop it.
- name: Deploy keepalived validate drop-in to persistent storage
  copy:
    src: override_keepalived.conf
    dest: /data/keepalived/override.conf
    owner: root
    group: root
    mode: "0644"
    backup: true
  register: udm_dns_failover_dropin
  become: true
  tags:
    - udm_dns_failover

- name: Create keepalived.service.d directory
  file:
    path: /etc/systemd/system/keepalived.service.d
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true
  tags:
    - udm_dns_failover

- name: Symlink keepalived validate drop-in into systemd
  file:
    src: /data/keepalived/override.conf
    dest: /etc/systemd/system/keepalived.service.d/override.conf
    state: link
    force: true
  register: udm_dns_failover_dropin_link
  become: true
  tags:
    - udm_dns_failover

- name: Reload systemd
  when: >-
    udm_dns_failover_onboot_unit.changed or
    udm_dns_failover_heartbeat_service.changed or
    udm_dns_failover_heartbeat_timer.changed or
    udm_dns_failover_heartbeat_service_link.changed or
    udm_dns_failover_heartbeat_timer_link.changed or
    udm_dns_failover_dropin.changed or
    udm_dns_failover_dropin_link.changed
  systemd:
    daemon_reload: true
  become: true
  tags:
    - udm_dns_failover

# -- service lifecycle -----------------------------------------------------

# In check mode on a host that hasn't converged yet (fresh UDM, or one a
# firmware update wiped), the copy above only *reports* it would create the
# unit -- the file isn't on disk -- so enabling it errors with "Could not
# find the requested service". Skip the enable in that case; on an
# already-converged host the copy is unchanged and the enable still runs.
- name: Enable on-boot framework
  when: not (ansible_check_mode and udm_dns_failover_onboot_unit.changed)
  systemd:
    name: on-boot.service
    enabled: true
  become: true
  tags:
    - udm_dns_failover

- name: Validate keepalived config before start
  when: not ansible_check_mode
  tags:
    - udm_dns_failover
  block:
    - name: Run keepalived -t on the assembled config
      command: keepalived -t -f /etc/keepalived/keepalived.conf
      changed_when: false
      become: true
  rescue:
    # keepalived -t reads the assembled config in place, so the bad file is
    # already on persistent /data -- which the on-boot recovery re-applies on
    # every boot. Restore the previous version from the backup the copy/
    # template made (and delete that backup), so a SIGHUP-reload or boot-time
    # start can't pick it up. On the first-ever write there is no backup, so
    # drop the freshly-added file instead -- leaving a broken config on /data
    # would have the on-boot recovery re-apply it forever. Mirrors the
    # three-arm rescue in roles/keepalived/tasks/main.yml.
    - name: Restore previous VRRP fragment after failed validation  # noqa: require-backup
      when: '"backup_file" in udm_dns_failover_vrrp_conf'
      copy:
        remote_src: true
        src: "{{ udm_dns_failover_vrrp_conf.backup_file }}"
        dest: /data/keepalived/pihole.conf
        owner: root
        group: root
        mode: "0640"
      become: true
    - name: Remove the VRRP fragment backup
      when: '"backup_file" in udm_dns_failover_vrrp_conf'
      file:
        path: "{{ udm_dns_failover_vrrp_conf.backup_file }}"
        state: absent
      become: true
    - name: Remove the freshly-added VRRP fragment
      when: 'udm_dns_failover_vrrp_conf.changed and "backup_file" not in udm_dns_failover_vrrp_conf'
      file:
        path: /data/keepalived/pihole.conf
        state: absent
      become: true
    - name: Restore previous base config after failed validation  # noqa: require-backup
      when: '"backup_file" in udm_dns_failover_base_conf'
      copy:
        remote_src: true
        src: "{{ udm_dns_failover_base_conf.backup_file }}"
        dest: /data/keepalived/keepalived.conf
        owner: root
        group: root
        mode: "0640"
      become: true
    - name: Remove the base config backup
      when: '"backup_file" in udm_dns_failover_base_conf'
      file:
        path: "{{ udm_dns_failover_base_conf.backup_file }}"
        state: absent
      become: true
    - name: Remove the freshly-added base config
      when: 'udm_dns_failover_base_conf.changed and "backup_file" not in udm_dns_failover_base_conf'
      file:
        path: /data/keepalived/keepalived.conf
        state: absent
      become: true
    - name: Fail after restoring keepalived config
      fail:
        msg: >-
          keepalived -t failed on the assembled config; the previous configs
          were restored from backup. Inspect the validate output above --
          /data/keepalived/pihole.conf or keepalived.conf is malformed.

# keepalived -t passes even when conf.d/*.conf is a dangling symlink (zero
# vrrp_instances): the daemon would then run, healthy and pointless, never
# claiming the VIP. Assert the fragment actually resolves and defines the
# instance before starting.
- name: Assert the VRRP instance is present in the assembled config
  when: not ansible_check_mode
  command: grep -q '^vrrp_instance pihole' /etc/keepalived/conf.d/pihole.conf
  changed_when: false
  become: true
  tags:
    - udm_dns_failover

# Same check-mode guard as the on-boot enable: when apt would have installed
# keepalived this run, keepalived.service isn't on disk yet, so a check-mode
# start can't find the unit. On a converged host apt is unchanged and the
# start/reload idempotence check still runs under --check.
- name: Start keepalived
  when: not (ansible_check_mode and udm_dns_failover_keepalived_apt.changed)
  systemd:
    name: keepalived.service
    state: "{{ (udm_dns_failover_base_conf.changed or udm_dns_failover_vrrp_conf.changed) | ternary('reloaded', 'started') }}"
    enabled: true
  become: true
  tags:
    - udm_dns_failover

# The timer unit is a symlink to the /data master; in check mode on a fresh
# host that symlink isn't created yet, so gate the enable on it the same way.
- name: Enable heartbeat timer
  when: not (ansible_check_mode and udm_dns_failover_heartbeat_timer_link.changed)
  systemd:
    name: udm_keepalived_heartbeat.timer
    state: started
    enabled: true
  become: true
  tags:
    - udm_dns_failover
