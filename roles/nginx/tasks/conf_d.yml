# Install an nginx http{}-scope drop into /etc/nginx/conf.d/ with
# place-and-validate-then-rollback semantics. Mirrors the systemd_unit
# install pattern: write the file with backup: true, run `nginx -t` to
# validate in place, on failure restore the previous version from the
# backup (or delete the freshly-added file if there is none) and fail
# loudly. Without this any typo bricks the next nginx reload host-wide
# (conf.d/ is read globally, so the blast radius is every site on the
# host).
#
# ansible's `copy: validate:` would let us check before placing, but
# nginx -t expects a full nginx.conf (events{}, http{}, etc.), not a
# conf.d snippet. Same constraint roles/systemd_unit hits — systemd-
# analyze verify takes a path — so the place-and-validate-then-rollback
# shape ports cleanly.
#
# Inputs: caller passes a single dict `nginx_conf_d_args` with keys
#   name        required; filename under /etc/nginx/conf.d/ (e.g.
#               `csp_ratelimit.conf`)
#   state       optional, default 'present'. Set to 'absent' to remove a
#               retired drop: deletes /etc/nginx/conf.d/<name> and reloads.
#               Keep the call as a tombstone so the file stays removed on a
#               fresh install (mirrors site.yml's retired-site handling).
#   src         file under the calling role's files/ to copy. Mutually
#               exclusive with content. Required when state is present.
#   content     inline content string (Jinja is evaluated in the calling
#               role's vars scope before this role sees it). Mutually
#               exclusive with src.
#   condition   optional bool, default true; gates the whole call
#   mode        optional, default '0644'
#   reload      optional bool, default true; reload nginx after a
#               successful change. Set false to batch multiple drops
#               under one explicit reload at the caller.
#
# The dict form prevents inter-call leakage at play-vars scope: each
# import_role pass replaces the whole `nginx_conf_d_args` value, so a
# previous caller's content/condition/mode can't bleed into the next
# caller that doesn't explicitly override.
#
# Exposes a per-name fact `<sanitized_name>_result` (e.g.
# `csp_ratelimit_conf_result`) holding the install task's result —
# callers reference its `.changed` to wire reload triggers (same pattern
# as systemd_unit's per-unit `<name>_result`).

- name: conf_d | Assert required inputs for {{ nginx_conf_d_args.name | default('<unnamed>') }}
  assert:
    that:
      - nginx_conf_d_args.name is defined
      - nginx_conf_d_args.name is string
      - nginx_conf_d_args.name | length > 0
    fail_msg: "nginx_conf_d_args.name is required and must be a non-empty string."

- name: conf_d | Assert state is a known value for {{ nginx_conf_d_args.name | default('<unnamed>') }}
  assert:
    that:
      - (nginx_conf_d_args.state | default('present')) in ['present', 'absent']
    fail_msg: >-
      nginx_conf_d_args.state must be 'present' or 'absent'; got
      '{{ nginx_conf_d_args.state | default('present') }}'. A typo silently
      no-ops both branches, leaving a retired drop in place.

- name: conf_d | Assert exactly one of src/content for {{ nginx_conf_d_args.name }}
  when: (nginx_conf_d_args.state | default('present')) == 'present'
  assert:
    that:
      - (nginx_conf_d_args.src is defined) != (nginx_conf_d_args.content is defined)
    fail_msg: >-
      nginx_conf_d_args requires exactly one of `src` or `content` when state
      is present (they are mutually exclusive).

- name: conf_d | Resolve caller defaults for {{ nginx_conf_d_args.name }}
  set_fact:
    _nginx_conf_d_condition: "{{ nginx_conf_d_args.condition | default(true) }}"
    _nginx_conf_d_name: "{{ nginx_conf_d_args.name }}"
    _nginx_conf_d_mode: "{{ nginx_conf_d_args.mode | default('0644') }}"
    _nginx_conf_d_reload: "{{ nginx_conf_d_args.reload | default(true) }}"
    _nginx_conf_d_state: "{{ nginx_conf_d_args.state | default('present') }}"

- name: conf_d | Install {{ nginx_conf_d_args.name }}
  when:
    - _nginx_conf_d_condition
    - _nginx_conf_d_state == 'present'
  block:
    - name: conf_d | Write {{ nginx_conf_d_args.name }}
      copy:
        src: "{{ nginx_conf_d_args.src | default(omit) }}"
        content: "{{ nginx_conf_d_args.content | default(omit) }}"
        dest: "/etc/nginx/conf.d/{{ _nginx_conf_d_name }}"
        owner: root
        group: root
        mode: "{{ _nginx_conf_d_mode }}"
        backup: true
      become: true
      register: nginx_conf_d

    - name: conf_d | Validate nginx config in place
      when: nginx_conf_d.changed
      command: nginx -t
      changed_when: false
      become: true

    # Expose the install result under a per-file fact so callers can
    # avoid the shared `nginx_conf_d` register (which is the role-
    # scoped name and would be clobbered by a second conf.d call in the
    # same play). New callers reference <sanitized_name>_result —
    # e.g. csp_ratelimit.conf -> csp_ratelimit_conf_result.
    - name: conf_d | Record install result for {{ nginx_conf_d_args.name }}
      set_fact:
        "{{ _nginx_conf_d_name | regex_replace('[^A-Za-z0-9_]', '_') }}_result": "{{ nginx_conf_d }}"

    # site.yml's per-site reload only fires when the per-site template
    # changes, so without an explicit reload here a conf.d drop change
    # would land on disk and pass validate, but the running nginx would
    # keep its old http{} state until the next unrelated trigger. Reload
    # inside the block so a rescue (rollback) skips this -- the previous
    # config is still what's running. Callers that want to batch
    # multiple drops under one reload pass `reload: false`.
    #
    # Skip in check mode: nginx_conf_d.changed reports "would change"
    # rather than "did change", and the file isn't actually on disk to
    # be reloaded. The systemd module also fails its dbus lookup with
    # "Could not find the requested service nginx" when nginx was only
    # would-installed in the same check-mode pass (e.g. fresh bootstrap
    # via roles/_test); the rescue path then mislabels the failure as
    # an nginx -t error. Real applies still reload because the install
    # task above already started the service by the time we reach here.
    - name: conf_d | Reload nginx for {{ nginx_conf_d_args.name }}
      when:
        - _nginx_conf_d_reload
        - nginx_conf_d.changed
      systemd:
        name: nginx
        state: reloaded
      become: true

  # On a failed `nginx -t`, hand off to the shared place-validate rollback
  # (also used by site.yml). It restores the previous version from the .backup
  # or removes the freshly-added drop, then fails loudly. `| default({})` keeps
  # it safe even when the copy task itself failed to render its content.
  rescue:
    - name: conf_d | Roll back the failed drop
      import_tasks: place_rollback.yml
      vars:
        _nginx_rollback_result: "{{ nginx_conf_d | default({}) }}"
        _nginx_rollback_paths:
          - "/etc/nginx/conf.d/{{ _nginx_conf_d_name }}"
        _nginx_rollback_what: "/etc/nginx/conf.d/{{ _nginx_conf_d_name }}"

# Removal path (state: absent). Deleting a drop can't introduce a syntax
# error, so there's no place-validate-rollback here -- just delete and
# reload. Recorded under the same <sanitized_name>_result fact so callers
# can wire reload triggers off a tombstone the same way as an install.
- name: conf_d | Remove retired drop {{ nginx_conf_d_args.name }}
  when:
    - _nginx_conf_d_condition
    - _nginx_conf_d_state == 'absent'
  block:
    - name: conf_d | Delete {{ nginx_conf_d_args.name }}
      file:
        path: "/etc/nginx/conf.d/{{ _nginx_conf_d_name }}"
        state: absent
      become: true
      register: nginx_conf_d_absent

    - name: conf_d | Record removal result for {{ nginx_conf_d_args.name }}
      set_fact:
        "{{ _nginx_conf_d_name | regex_replace('[^A-Za-z0-9_]', '_') }}_result": "{{ nginx_conf_d_absent }}"

    - name: conf_d | Reload nginx after removing {{ nginx_conf_d_args.name }}
      when:
        - _nginx_conf_d_reload
        - nginx_conf_d_absent.changed
      systemd:
        name: nginx
        state: reloaded
      become: true
