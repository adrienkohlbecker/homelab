# Inputs: caller passes a single dict `nginx_site_args` with keys
#   subdomain                 required; serves at <subdomain>.<host>.<domain>
#   state                     optional, default 'present'. Set to 'absent' to
#                             remove a retired site: deletes the symlink under
#                             sites-enabled/ and the config under sites-available/,
#                             then reloads. Keep the call in main.yml as a
#                             tombstone so retired sites stay decommissioned on
#                             fresh installs.
#   condition                 optional bool, default true; gates the whole
#                             call. Gates *application of changes*, not desired
#                             state -- `condition: false` does NOT tear down an
#                             already-enabled site (use `state: absent` for
#                             that), it just skips this pass. Typically a
#                             check-mode / bootstrap guard.
#   reload                    optional bool, default true; reload nginx after a
#                             config change. Setting false makes the install
#                             config-only — useful for pre-warming a site whose
#                             upstream isn't ready yet.
#   proxy_pass                optional; URL to reverse-proxy to (location /)
#   proxy_buffering           optional; nginx proxy_buffering directive value
#   proxy_request_buffering   optional; nginx proxy_request_buffering directive value
#   proxy_send_timeout        optional, default '60s'
#   proxy_read_timeout        optional, default '60s'
#   client_max_body_size      optional; sets nginx client_max_body_size
#   enable_http               optional bool, default false; if true, also listen on :80
#                             and skip the http->https redirect server block.
#                             Serves :80 in cleartext, so do NOT combine with
#                             `auth`/`bypass_query_param`: an auth flow or a vaulted
#                             token would travel unencrypted. Asserted below.
#   csp_default_src           optional CSP directive override
#   csp_frame_ancestors       optional CSP directive override
#   csp_additional            optional CSP directive prefix
#   csp_passthrough           optional bool, default false; if true, skip the
#                             site's `add_header Content-Security-Policy` entirely
#                             and let the upstream's own CSP through. Use for apps
#                             that ship a strict nonce-based CSP (Authelia) where
#                             nginx's blanket CSP would intersect with the upstream's
#                             and produce stricter-than-either rules in the browser
#   auth                      optional, default 'none'. Forward-auth via Authelia:
#                             - 'none'                 — no auth_request (default)
#                             - 'required'             — every request through /
#                                                        is auth_request'd; 401 →
#                                                        302 to the portal with
#                                                        returnUrl
#                             Requires authelia_internal_url to point at a reachable
#                             /api/authz/auth-request endpoint (defaults to lab's
#                             local Authelia; pug/bunk need a per-host override if
#                             they ever enable forward-auth).
#   bypass_query_param        optional dict { value: <str> }. With
#                             `auth: required`, the auth_request short-circuits
#                             with a 204 when the request's
#                             `?auth_token=<value>` matches the vaulted token,
#                             letting URL-param-only API clients (apps that
#                             can't send an Authorization header) bypass
#                             Authelia; browser hits without the param fall
#                             through to Authelia normally. The token is
#                             stripped from `$args` before proxy_pass (the
#                             upstream never sees it) and redacted from the
#                             access log by the `$request_safe` map. The param
#                             name is fixed to `auth_token` -- the
#                             `$req_auth_token` and `$request_safe` maps in
#                             nginx.conf.j2 hardcode it. The value must be
#                             URL-safe ([A-Za-z0-9_-]): it is matched against the
#                             raw un-decoded query, so a token a client would
#                             percent-encode never matches. A double quote is
#                             rejected (it would break the rendered nginx string);
#                             both are asserted below. Bypass sites also get
#                             Referrer-Policy: no-referrer so the token can't
#                             leak to third parties via a Referer header
#                             (redaction only covers our own access log).
#   upstream_authorization    optional dict {authelia_user: header_value};
#                             when set (and `auth: required` is on) nginx
#                             injects a per-user `Authorization` header into
#                             the upstream proxy_pass, mapped from
#                             `$authelia_user`. Renders an `if ($authelia_user
#                             = "<u>") { set $upstream_auth "<header>"; }`
#                             sequence inside `location /` (the `if + set`
#                             pattern is one of the safe-by-design "evil if"
#                             exceptions; an http-scope `map` would error out
#                             because $authelia_user is location-scoped via
#                             auth_request_set). Unknown user falls through
#                             to empty, nginx 1.13+ omits the header, and
#                             the upstream returns 401 -> operator can sign
#                             in with the upstream's native creds (break-
#                             glass). Setting this knob ALSO turns on a
#                             bypass-on-Authorization shortcut inside
#                             `/internal/authelia`: requests that already
#                             carry their own Authorization header skip the
#                             Authelia subrequest (return 204), and since
#                             $authelia_user is empty for them the if-chain
#                             above never matches -- the client's original
#                             header passes through unmodified. Use this to
#                             let one vhost serve both browser users
#                             (forward-auth + injected token) and machine
#                             clients (native token, no cookie). Implies
#                             trust in any presented Authorization -- only
#                             safe when the upstream itself validates the
#                             credential.
#   server_conf               optional snippet inserted in the server block.
#                             A `location` added here is NOT covered by the
#                             site's forward-auth (auth_request only wraps
#                             `location /`) nor by the security headers (a
#                             location declaring its own add_header drops the
#                             inherited set) -- re-add `auth_request
#                             /internal/authelia` and any needed headers
#                             yourself, or that path is public and header-less.
#   location_conf             optional snippet inserted in the / location
#                             block. Whenever it is set, the site's security
#                             headers are re-emitted at this location level (see
#                             site.conf.j2): nginx drops inherited add_header at
#                             any level that declares its own, and we can't know
#                             whether the snippet does, so we always re-emit.
#                             csp_passthrough is honoured -- the re-emit reuses
#                             the same capture, so a passthrough site stays CSP-free.
#
# The dict form prevents inter-call leakage at play-vars scope: each
# import_role pass replaces the whole `nginx_site_args` value, so a
# previous caller's proxy_pass / csp / etc. can't bleed into the next
# caller that doesn't explicitly override.
- name: site | Assert required inputs
  assert:
    that:
      - nginx_site_args.subdomain is defined
      - nginx_site_args.subdomain is string
      - nginx_site_args.subdomain | length > 0
    fail_msg: >-
      nginx_site_args.subdomain is required and must be a non-empty string;
      got {{ nginx_site_args.subdomain | default('<undefined>') }}.
  tags:
    - nginx_site

- name: site | Assert subdomain is a safe DNS label
  assert:
    that:
      - nginx_site_args.subdomain is match('^[A-Za-z0-9-]+$')
    fail_msg: >-
      nginx_site_args.subdomain must be a single DNS label ([A-Za-z0-9-]) -- it
      is interpolated into the on-disk config path and the server_name.
      Got '{{ nginx_site_args.subdomain }}'.
  tags:
    - nginx_site

- name: site | Assert state is a known value
  assert:
    that:
      - (nginx_site_args.state | default('present')) in ['present', 'absent']
    fail_msg: >-
      nginx_site_args.state must be 'present' or 'absent'; got
      '{{ nginx_site_args.state | default('present') }}'. A typo silently
      no-ops both branches, leaving a retired site running.
  tags:
    - nginx_site

- name: site | Assert bypass token is URL-safe
  when: nginx_site_args.bypass_query_param is defined
  assert:
    that:
      - nginx_site_args.bypass_query_param.value is string
      - nginx_site_args.bypass_query_param.value is match('^[A-Za-z0-9_-]+$')
    fail_msg: >-
      nginx_site_args.bypass_query_param.value must be a non-empty URL-safe
      token ([A-Za-z0-9_-]). It is matched against the raw un-decoded query, so
      a value needing percent-encoding would silently never match; it is also
      rendered inside an nginx "..." string.
  tags:
    - nginx_site

- name: site | Assert proxy_pass is a well-formed URL
  when: nginx_site_args.proxy_pass is defined
  assert:
    that:
      - nginx_site_args.proxy_pass is string
      - nginx_site_args.proxy_pass is match('^https?://')
      # No space/quote/semicolon and no control/non-ASCII char: it is rendered
      # straight into `proxy_pass ...;`, so any of those changes the directive.
      - nginx_site_args.proxy_pass is not search('[ ";]')
      - nginx_site_args.proxy_pass is not search('[^ -~]')
    fail_msg: >-
      nginx_site_args.proxy_pass must be an http(s):// URL with no whitespace,
      quotes or semicolons; got '{{ nginx_site_args.proxy_pass }}'.
  tags:
    - nginx_site

- name: site | Assert CSP overrides are injection-safe
  when: >-
    nginx_site_args.csp_additional is defined
    or nginx_site_args.csp_default_src is defined
    or nginx_site_args.csp_frame_ancestors is defined
  assert:
    that:
      - (nginx_site_args.csp_additional | default('')) is not search('"')
      - (nginx_site_args.csp_default_src | default('')) is not search('"')
      - (nginx_site_args.csp_frame_ancestors | default('')) is not search('"')
    fail_msg: >-
      nginx_site_args.csp_* values are rendered inside the add_header
      Content-Security-Policy "..." string and must not contain a double quote.
  tags:
    - nginx_site

- name: site | Assert upstream_authorization is injection-safe
  when: nginx_site_args.upstream_authorization is defined
  assert:
    that:
      # Each key/value is rendered inside an nginx "..." string; reject anything
      # outside a conservative whitelist so a stray double-quote, backslash
      # (escapes the closing quote) or control char can't break out of or
      # corrupt the directive. Widen the class here if a consumer needs more.
      - nginx_site_args.upstream_authorization.keys() | list | join('') is not search('[^A-Za-z0-9._@-]')
      - nginx_site_args.upstream_authorization.values() | list | join('') is not search('[^A-Za-z0-9 ._@:+/=-]')
    fail_msg: >-
      nginx_site_args.upstream_authorization keys (usernames) must be
      [A-Za-z0-9._@-] and values (header values) [A-Za-z0-9 ._@:+/=-]; they are
      rendered inside nginx "..." strings, so quotes/backslashes/control chars
      are rejected.
  tags:
    - nginx_site

- name: site | Assert enable_http is not combined with auth or a bypass token
  when: nginx_site_args.enable_http | default(false)
  assert:
    that:
      - (nginx_site_args.auth | default('none')) != 'required'
      - nginx_site_args.bypass_query_param is not defined
    fail_msg: >-
      enable_http serves :80 in cleartext; do not combine it with `auth: required`
      or `bypass_query_param` (the auth flow / vaulted token would travel
      unencrypted).
  tags:
    - nginx_site

- name: site | Ensure directories exists
  when: (nginx_site_args.condition | default(true)) and (nginx_site_args.state | default('present')) == 'present'
  file:
    state: directory
    path: "{{ item }}"
    mode: '0755'
    owner: root
    group: root
  loop:
    - /etc/nginx/sites-available
    - /etc/nginx/sites-enabled
  become: true
  tags:
    - nginx_site

# Place-validate-then-rollback, mirroring conf_d.yml: the rendered vhost is
# written to sites-available/ and symlinked into sites-enabled/ (where it
# joins nginx's active config), then `nginx -t` validates it in place. On
# failure the previous version is restored from the .backup (or the file and
# symlink are removed if the site is new), so a malformed render -- a bad
# server_conf/location_conf snippet, a CSP typo, an unbalanced quote -- can't
# brick the next host-wide reload for every other site. The template task
# carries no `validate:` because `nginx -t` needs the full assembled config
# (events{}, http{}, the symlink in place), not a standalone server{} snippet
# -- the same constraint conf_d documents. Validation runs on every change
# regardless of the `reload` flag, so a `reload: false` pre-warm still can't
# leave a broken file on disk to be discovered at the next unrelated reload.
- name: site | Configure and enable nginx site
  when:
    - nginx_site_args.condition | default(true)
    - (nginx_site_args.state | default('present')) == 'present'
  become: true
  tags:
    - nginx_site
  block:
    - name: site | Configure nginx site
      template:
        src: site.conf.j2
        dest: /etc/nginx/sites-available/{{ nginx_site_args.subdomain }}
        owner: root
        group: root
        # 0640 root:root: the rendered vhost can embed vaulted bypass / upstream
        # tokens, so it must not be world-readable.
        mode: "0640"
        backup: true
      register: nginx_static_conf

    - name: site | Enable nginx site
      when: not (ansible_check_mode and nginx_static_conf.changed)
      file:
        src: /etc/nginx/sites-available/{{ nginx_site_args.subdomain }}
        dest: /etc/nginx/sites-enabled/{{ nginx_site_args.subdomain }}
        state: link
      register: nginx_static_conf_enable

    - name: site | Validate nginx config in place
      when:
        - not ansible_check_mode
        - nginx_static_conf.changed or nginx_static_conf_enable.changed
      command: nginx -t
      changed_when: false

    - name: site | Reload nginx config
      when:
        - nginx_site_args.reload | default(true)
        - nginx_static_conf.changed or nginx_static_conf_enable.changed
      systemd:
        name: nginx
        state: reloaded

  # On a failed `nginx -t`, hand off to the shared place-validate rollback
  # (also used by conf_d.yml). It restores the previous version from the
  # .backup or removes the freshly-added config + its sites-enabled symlink,
  # then fails loudly. `| default({})` keeps it safe even when the template
  # task itself failed to render (no register, nothing to undo).
  rescue:
    - name: site | Roll back the failed site write
      import_tasks: place_rollback.yml
      vars:
        _nginx_rollback_result: "{{ nginx_static_conf | default({}) }}"
        _nginx_rollback_paths:
          - /etc/nginx/sites-enabled/{{ nginx_site_args.subdomain }}
          - /etc/nginx/sites-available/{{ nginx_site_args.subdomain }}
        _nginx_rollback_what: /etc/nginx/sites-available/{{ nginx_site_args.subdomain }}

- name: site | Remove retired nginx site
  when: (nginx_site_args.condition | default(true)) and (nginx_site_args.state | default('present')) == 'absent'
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/nginx/sites-enabled/{{ nginx_site_args.subdomain }}
    - /etc/nginx/sites-available/{{ nginx_site_args.subdomain }}
  become: true
  register: nginx_static_conf_absent
  tags:
    - nginx_site

- name: site | Reload nginx after removing retired site
  when:
    - nginx_site_args.condition | default(true)
    - (nginx_site_args.state | default('present')) == 'absent'
    - nginx_site_args.reload | default(true)
    - nginx_static_conf_absent.changed | default(false)
  systemd:
    name: nginx
    state: reloaded
  become: true
  tags:
    - nginx_site
