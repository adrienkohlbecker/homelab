# Inputs: caller passes a single dict `nginx_site_args` with keys
#   subdomain                 required; serves at <subdomain>.<host>.<domain>
#   state                     optional, default 'present'. Set to 'absent' to
#                             remove a retired site: deletes the symlink under
#                             sites-enabled/, the config under sites-available/
#                             and any upstream-auth map under conf.d/, then
#                             reloads. Keep the call in main.yml as a tombstone
#                             so retired sites stay decommissioned on fresh
#                             installs.
#   condition                 optional bool, default true; gates *application
#                             of changes* -- NOT the input asserts (which run
#                             every pass) and NOT desired state: `condition:
#                             false` does NOT tear down an already-enabled site
#                             (use `state: absent` for that), it just skips
#                             writing this pass. Typically a check-mode /
#                             bootstrap guard.
#   reload                    optional bool, default true; reload nginx after a
#                             config change. Setting false makes the install
#                             config-only — useful for pre-warming a site whose
#                             upstream isn't ready yet.
#   proxy_pass                optional; URL to reverse-proxy to (location /)
#   proxy_buffering           optional; nginx proxy_buffering directive value.
#                             Quote it ('on'/'off') -- bare off is YAML-coerced
#                             to false and renders an invalid `... false;`.
#   proxy_request_buffering   optional; nginx proxy_request_buffering directive
#                             value (quote it -- same YAML off->false footgun)
#   proxy_send_timeout        optional, default '60s'
#   proxy_read_timeout        optional, default '60s'
#   client_max_body_size      optional; sets nginx client_max_body_size
#   client_body_buffer_size   optional; sets nginx client_body_buffer_size --
#                             pair with client_max_body_size on upload-heavy
#                             upstreams so a large body isn't spooled to disk
#   enable_http               optional bool, default false; if true, also listen on :80
#                             and skip the http->https redirect server block.
#                             Serves :80 in cleartext, so do NOT combine with
#                             `auth`: the forward-auth flow would travel
#                             unencrypted. Asserted below.
#   csp_default_src           optional CSP directive override
#   csp_frame_ancestors       optional CSP directive override
#   csp_additional            optional CSP directive prefix
#   csp_passthrough           optional bool, default false; if true, skip the
#                             site's `add_header Content-Security-Policy` entirely
#                             and let the upstream's own CSP through. Use for apps
#                             that ship a strict nonce-based CSP (Authelia) where
#                             nginx's blanket CSP would intersect with the upstream's
#                             and produce stricter-than-either rules in the browser
#   auth                      optional, default 'none'. Forward-auth via Authelia:
#                             - 'none'                 — no auth_request (default)
#                             - 'required'             — every request through /
#                                                        is auth_request'd; 401 →
#                                                        302 to the portal with
#                                                        returnUrl
#                             Requires authelia_internal_url to point at a reachable
#                             /api/authz/auth-request endpoint (defaults to lab's
#                             local Authelia; pug/bunk need a per-host override if
#                             they ever enable forward-auth).
#   server_conf               optional snippet inserted in the server block.
#                             A `location` added here is NOT covered by the
#                             site's forward-auth (auth_request only wraps
#                             `location /`) nor by the security headers (a
#                             location declaring its own add_header drops the
#                             inherited set), and inherits none of `location /`'s
#                             proxy_set_headers -- re-add `auth_request
#                             /internal/authelia`, `include /etc/nginx/snippets/proxy_params.conf;`
#                             for the standard forwarded headers, and any needed
#                             security headers yourself, or that path is public,
#                             header-less and forwards Host/X-Forwarded-* wrong.
#   location_conf             optional snippet inserted in the / location
#                             block. Whenever it is set, the site's security
#                             headers are re-emitted at this location level (see
#                             site.conf.j2): nginx drops inherited add_header at
#                             any level that declares its own, and we can't know
#                             whether the snippet does, so we always re-emit.
#                             csp_passthrough is honoured -- the re-emit reuses
#                             the same capture, so a passthrough site stays CSP-free.
#
# The dict form prevents inter-call leakage at play-vars scope: each
# import_role pass replaces the whole `nginx_site_args` value, so a
# previous caller's proxy_pass / csp / etc. can't bleed into the next
# caller that doesn't explicitly override.
#
# Exposes a per-site fact `<sanitized_subdomain>_site_result` (e.g.
# `nginxverify_site_result`, `minio_api_site_result`) with a `.changed` bool
# covering the template, the sites-enabled symlink and the state:absent
# removal. The `_site_result` suffix (not the bare `_result` that conf_d's
# `<name>_result` and systemd_unit's `<unit>_result` use) keeps a site's fact
# from colliding with a same-named conf_d/unit fact in the same play; callers
# wire reload/restart triggers off it the same way (a second nginx_site call in
# the same play would otherwise clobber the role-scoped `nginx_static_conf`
# register).
- name: site | Assert required inputs
  assert:
    that:
      - nginx_site_args.subdomain is defined
      - nginx_site_args.subdomain is string
      - nginx_site_args.subdomain | length > 0
    fail_msg: >-
      nginx_site_args.subdomain is required and must be a non-empty string;
      got {{ nginx_site_args.subdomain | default('<undefined>') }}.
  tags:
    - nginx_site

- name: site | Assert state is a known value
  assert:
    that:
      - (nginx_site_args.state | default('present')) in ['present', 'absent']
    fail_msg: >-
      nginx_site_args.state must be 'present' or 'absent'; got
      '{{ nginx_site_args.state | default('present') }}'. A typo silently
      no-ops both branches, leaving a retired site running.
  tags:
    - nginx_site

# Path-safety runs for BOTH states: a state: absent teardown still interpolates
# the subdomain into the on-disk paths it removes, so reject path-traversal
# regardless. Deliberately weaker than the present-only DNS-label assert below --
# a retired site (e.g. homeassistant's vscode_ha tombstone) may carry a legacy
# underscore that was a valid name under an older convention, and the tombstone
# must still be able to remove it. [A-Za-z0-9._-] excludes '/' and control chars;
# '..' is rejected explicitly.
- name: site | Assert subdomain is path-safe
  assert:
    that:
      - nginx_site_args.subdomain is match('^[A-Za-z0-9._-]+$')
      - "'..' not in nginx_site_args.subdomain"
    fail_msg: >-
      nginx_site_args.subdomain must be a single path segment ([A-Za-z0-9._-], no
      '..') -- it is interpolated into the on-disk config paths. Got
      '{{ nginx_site_args.subdomain }}'.
  tags:
    - nginx_site

# Resolve caller defaults once into _nginx_site_* locals (mirrors conf_d.yml), so
# the condition/state/reload/auth/enable_http defaults live in one place rather
# than being re-spelled at every gate below and in site.conf.j2. Always set (no
# when:), so they're defined even when condition is false (the record task reads
# them) and no stale value leaks into the next nginx_site invocation. Resolved
# before the value-shape asserts so each can gate on _nginx_site_state.
- name: site | Resolve caller defaults
  set_fact:
    _nginx_site_condition: "{{ nginx_site_args.condition | default(true) }}"
    _nginx_site_state: "{{ nginx_site_args.state | default('present') }}"
    _nginx_site_reload: "{{ nginx_site_args.reload | default(true) }}"
    _nginx_site_auth: "{{ nginx_site_args.auth | default('none') }}"
    _nginx_site_enable_http: "{{ (nginx_site_args.enable_http | default(false)) | bool }}"
  tags:
    - nginx_site

# The value-shape asserts below gate on state: present -- a state: absent teardown
# renders none of these inputs (it only removes files), so validating them would
# couple a tombstone to input shape it never uses (and reject a legacy subdomain
# the present-only DNS-label rule no longer allows). Path-safety (above) is the
# only subdomain check a teardown needs.
- name: site | Assert subdomain is a safe DNS label
  when: _nginx_site_state == 'present'
  assert:
    that:
      - nginx_site_args.subdomain is match('^[A-Za-z0-9-]+$')
    fail_msg: >-
      nginx_site_args.subdomain must be a single DNS label ([A-Za-z0-9-]) -- it
      is interpolated into the on-disk config path and the server_name.
      Got '{{ nginx_site_args.subdomain }}'.
  tags:
    - nginx_site

- name: site | Assert proxy_pass is a well-formed URL
  when:
    - _nginx_site_state == 'present'
    - nginx_site_args.proxy_pass is defined
  assert:
    that:
      - nginx_site_args.proxy_pass is string
      - nginx_site_args.proxy_pass is match('^https?://')
      # No space/quote/semicolon and no control/non-ASCII char: it is rendered
      # straight into `proxy_pass ...;`, so any of those changes the directive.
      - nginx_site_args.proxy_pass is not search('[ ";]')
      - nginx_site_args.proxy_pass is not search('[^ -~]')
    fail_msg: >-
      nginx_site_args.proxy_pass must be an http(s):// URL with no whitespace,
      quotes or semicolons; got '{{ nginx_site_args.proxy_pass }}'.
  tags:
    - nginx_site

# Catch the YAML-coercion footgun the docstring warns about (bare off -> boolean
# false -> invalid `proxy_buffering false;`): require the quoted 'on'/'off'. The
# `in [...]` test rejects both the coerced booleans and any other value;
# default('on') keeps each item safe when only one of the pair is supplied.
- name: site | Assert proxy buffering toggles are quoted on/off
  when:
    - _nginx_site_state == 'present'
    - >-
      nginx_site_args.proxy_buffering is defined
      or nginx_site_args.proxy_request_buffering is defined
  assert:
    that:
      - (nginx_site_args.proxy_buffering | default('on')) in ['on', 'off']
      - (nginx_site_args.proxy_request_buffering | default('on')) in ['on', 'off']
    fail_msg: >-
      nginx_site_args.proxy_buffering / proxy_request_buffering must be the
      quoted string 'on' or 'off'; a bare off is YAML-coerced to the boolean
      false and renders an invalid `proxy_buffering false;`.
  tags:
    - nginx_site

- name: site | Assert CSP overrides are injection-safe
  when:
    - _nginx_site_state == 'present'
    - >-
      nginx_site_args.csp_additional is defined
      or nginx_site_args.csp_default_src is defined
      or nginx_site_args.csp_frame_ancestors is defined
  assert:
    that:
      - (nginx_site_args.csp_additional | default('')) is not search('"')
      - (nginx_site_args.csp_default_src | default('')) is not search('"')
      - (nginx_site_args.csp_frame_ancestors | default('')) is not search('"')
    fail_msg: >-
      nginx_site_args.csp_* values are rendered inside the add_header
      Content-Security-Policy "..." string and must not contain a double quote.
  tags:
    - nginx_site

- name: site | Assert enable_http is not combined with auth
  when:
    - _nginx_site_state == 'present'
    - _nginx_site_enable_http
  assert:
    that:
      - _nginx_site_auth != 'required'
    fail_msg: >-
      enable_http serves :80 in cleartext; do not combine it with `auth: required`
      (the forward-auth flow would travel unencrypted).
  tags:
    - nginx_site

- name: site | Assert authelia_internal_url is set when auth is required
  when:
    - _nginx_site_state == 'present'
    - _nginx_site_auth == 'required'
  assert:
    that:
      - authelia_internal_url is defined
      - (authelia_internal_url | default('')) is string
      - (authelia_internal_url | default('')) is match('^https?://')
    fail_msg: >-
      auth: required needs authelia_internal_url set to the http(s):// URL of a
      reachable Authelia /api/authz/auth-request endpoint (group_vars/all sets
      lab's; pug/bunk need a per-host override). It is rendered straight into the
      /internal/authelia proxy_pass, so an unset value would only fail later at
      `nginx -t` with a generic message.
  tags:
    - nginx_site

- name: site | Ensure directories exists
  when: _nginx_site_condition and _nginx_site_state == 'present'
  file:
    state: directory
    path: "{{ item }}"
    mode: '0755'
    owner: root
    group: root
  loop:
    - /etc/nginx/sites-available
    - /etc/nginx/sites-enabled
  become: true
  tags:
    - nginx_site

# Place-validate-then-rollback, mirroring conf_d.yml: the rendered vhost is
# written to sites-available/ and symlinked into sites-enabled/ (where it
# joins nginx's active config), then `nginx -t` validates it in place. On
# failure the previous version is restored from the .backup (or the file and
# symlink are removed if the site is new), so a malformed render -- a bad
# server_conf/location_conf snippet, a CSP typo, an unbalanced quote -- can't
# brick the next host-wide reload for every other site. The template task
# carries no `validate:` because `nginx -t` needs the full assembled config
# (events{}, http{}, the symlink in place), not a standalone server{} snippet
# -- the same constraint conf_d documents. Validation runs on every change
# regardless of the `reload` flag, so a `reload: false` pre-warm still can't
# leave a broken file on disk to be discovered at the next unrelated reload.
- name: site | Configure and enable nginx site
  when:
    - _nginx_site_condition
    - _nginx_site_state == 'present'
  become: true
  tags:
    - nginx_site
  block:
    # Prune any leftover per-user upstream-Authorization map: the SSO
    # token-injection feature was removed, and its conf.d map embedded a token
    # in plaintext, so ensure no stale file lingers for any site. Registered so
    # an actual removal still drives the validate + reload below.
    - name: site | Prune retired upstream Authorization map
      file:
        path: /etc/nginx/conf.d/upstream_auth_{{ nginx_site_args.subdomain }}.conf
        state: absent
      register: nginx_upstream_auth_map

    - name: site | Configure nginx site
      template:
        src: site.conf.j2
        dest: /etc/nginx/sites-available/{{ nginx_site_args.subdomain }}
        owner: root
        group: root
        # 0640 root:root: vhost configs are read by nginx as root and carry no
        # public value, so keep them off world-read as a conservative default.
        mode: "0640"
        backup: true
        validate: grep -qE '^server[[:space:]]*\{' %s
      register: nginx_static_conf

    - name: site | Enable nginx site
      when: not (ansible_check_mode and nginx_static_conf.changed)
      file:
        src: /etc/nginx/sites-available/{{ nginx_site_args.subdomain }}
        dest: /etc/nginx/sites-enabled/{{ nginx_site_args.subdomain }}
        state: link
      register: nginx_static_conf_enable

    - name: site | Validate nginx config in place
      when:
        - not ansible_check_mode
        - nginx_static_conf.changed or nginx_static_conf_enable.changed or (nginx_upstream_auth_map.changed | default(false))
      command: nginx -t
      changed_when: false

    - name: site | Reload nginx config
      when:
        - _nginx_site_reload
        - nginx_static_conf.changed or nginx_static_conf_enable.changed or (nginx_upstream_auth_map.changed | default(false))
      systemd:
        name: nginx
        state: reloaded

  # On a failed `nginx -t`, hand off to the shared place-validate rollback
  # (also used by conf_d.yml). It restores the previous version from the
  # .backup or removes the freshly-added config + its sites-enabled symlink;
  # this rescue then fails loudly. `| default({})` keeps it safe even when the
  # template task itself failed to render (no register, nothing to undo).
  rescue:
    # place_rollback restores the vhost's previous version from its .backup (or
    # removes a freshly-added file + symlink); the explicit fail below raises
    # after it. The map prune above makes no backup and needs no rollback --
    # removing an unreferenced orphan can't be what failed `nginx -t`.
    - name: site | Roll back the failed site write
      import_tasks: place_rollback.yml
      vars:
        _nginx_rollback_result: "{{ nginx_static_conf | default({}) }}"
        _nginx_rollback_paths:
          - /etc/nginx/sites-enabled/{{ nginx_site_args.subdomain }}
          - /etc/nginx/sites-available/{{ nginx_site_args.subdomain }}

    - name: site | Fail after rolling back the site write
      fail:
        msg: >-
          nginx -t failed after writing
          /etc/nginx/sites-available/{{ nginx_site_args.subdomain }}; previous
          state restored. Inspect the validate output above and the managed content.

- name: site | Remove retired nginx site
  when: _nginx_site_condition and _nginx_site_state == 'absent'
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/nginx/sites-enabled/{{ nginx_site_args.subdomain }}
    - /etc/nginx/sites-available/{{ nginx_site_args.subdomain }}
    - /etc/nginx/conf.d/upstream_auth_{{ nginx_site_args.subdomain }}.conf
  become: true
  register: nginx_static_conf_absent
  tags:
    - nginx_site

- name: site | Reload nginx after removing retired site
  when:
    - _nginx_site_condition
    - _nginx_site_state == 'absent'
    - _nginx_site_reload
    - nginx_static_conf_absent.changed | default(false)
  systemd:
    name: nginx
    state: reloaded
  become: true
  tags:
    - nginx_site

# Expose the change state under a per-subdomain fact so callers can wire
# reload/restart triggers off their own vhost without clobbering the
# role-scoped `nginx_static_conf` register (which a second nginx_site call in
# the same play would overwrite). Analogous to conf_d's `<name>_result` and
# systemd_unit's `<unit>_result`, but suffixed `_site_result` so a site's fact
# can't collide with a same-named conf_d/unit fact. `| bool` keeps it a real
# boolean under jinja2_native rather than the string "True"/"False".
#
# Recorded unconditionally: under condition: false every write above is skipped,
# so the registers are undefined and the `| default(false)` guards collapse the
# fact to changed: false -- but the fact still gets DEFINED, so a caller wiring a
# reload off it doesn't hit an undefined-variable error on exactly the host where
# condition gated the site off.
- name: site | Record site result
  set_fact:
    "{{ nginx_site_args.subdomain | ansible_var_key }}_site_result":
      changed: "{{ ((nginx_static_conf.changed | default(false)) or (nginx_static_conf_enable.changed | default(false)) or (nginx_upstream_auth_map.changed | default(false)) or (nginx_static_conf_absent.changed | default(false))) | bool }}"
  tags:
    - nginx_site
