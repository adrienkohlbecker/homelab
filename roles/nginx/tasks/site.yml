- name: site | Ensure directories exists
  when: nginx_condition | default(true)
  file:
    state: directory
    path: "{{ item }}"
    mode: '0755'
    owner: root
    group: root
  loop:
    - /etc/nginx/sites-available
    - /etc/nginx/sites-enabled
  become: true
  tags:
    - nginx_site

- name: site | Configure nginx site
  when: nginx_condition | default(true)
  template:
    src: site.conf.j2
    dest: /etc/nginx/sites-available/{{ nginx_subdomain }}
    owner: root
    group: root
    mode: "{{ nginx_permissions | default('0644') }}"
    backup: true
  become: true
  register: nginx_static_conf
  tags:
    - nginx_site

- name: site | Enable nginx site
  when: (nginx_condition | default(true)) and not (ansible_check_mode and nginx_static_conf.changed)
  file:
    src: /etc/nginx/sites-available/{{ nginx_subdomain }}
    dest: /etc/nginx/sites-enabled/{{ nginx_subdomain }}
    state: link
  become: true
  register: nginx_static_conf_enable
  tags:
    - nginx_site

- name: site | Reload nginx config
  when: (nginx_condition | default(true)) and (nginx_site_reload | default(true)) and (nginx_static_conf.changed or nginx_static_conf_enable.changed)
  systemd:
    name: nginx
    state: reloaded
  become: true
  tags:
    - nginx_site

# Reset caller-input vars to defaults so they don't leak into a sibling
# call later in the play. See roles/systemd_unit/tasks/install.yml for
# the full background on the import_role + vars: leak.
- name: site | Reset caller-input vars to defaults
  set_fact:
    nginx_condition: true
    nginx_permissions: "0644"
    nginx_site_reload: true
  tags:
    - nginx_site
