# Inputs: caller passes a single dict `nginx_site_args` with keys
#   subdomain                 required; serves at <subdomain>.<host>.<domain>
#   state                     optional, default 'present'. Set to 'absent' to
#                             remove a retired site: deletes the symlink under
#                             sites-enabled/ and the config under sites-available/,
#                             then reloads. Keep the call in main.yml as a
#                             tombstone so retired sites stay decommissioned on
#                             fresh installs.
#   condition                 optional bool, default true; gates the whole call
#   permissions               optional, default '0644'
#   reload                    optional bool, default true; reload nginx after a
#                             config change. Setting false makes the install
#                             config-only — useful for pre-warming a site whose
#                             upstream isn't ready yet.
#   proxy_pass                optional; URL to reverse-proxy to (location /)
#   proxy_buffering           optional; nginx proxy_buffering directive value
#   proxy_request_buffering   optional; nginx proxy_request_buffering directive value
#   proxy_connect_timeout     optional, default '60s'
#   proxy_send_timeout        optional, default '60s'
#   proxy_read_timeout        optional, default '60s'
#   client_max_body_size      optional; sets nginx client_max_body_size
#   enable_http               optional bool, default false; if true, also listen on :80
#                             and skip the http->https redirect server block
#   csp_default_src           optional CSP directive override
#   csp_frame_ancestors       optional CSP directive override
#   csp_additional            optional CSP directive prefix
#   csp_passthrough           optional bool, default false; if true, skip the
#                             site's `add_header Content-Security-Policy` entirely
#                             and let the upstream's own CSP through. Use for apps
#                             that ship a strict nonce-based CSP (Authelia) where
#                             nginx's blanket CSP would intersect with the upstream's
#                             and produce stricter-than-either rules in the browser
#   auth                      optional, default 'none'. Forward-auth via Authelia:
#                             - 'none'                 — no auth_request (default)
#                             - 'required'             — every request through /
#                                                        is auth_request'd; 401 →
#                                                        302 to the portal with
#                                                        returnUrl
#                             - 'required_bypass_api'  — same as 'required' but a
#                                                        sibling `location /api/`
#                                                        block proxies without
#                                                        auth_request. Use for
#                                                        the *arr stack and any
#                                                        service whose API path
#                                                        is bearer-token-gated
#                                                        (Sonarr, Radarr, etc.)
#                             Requires authelia_internal_url to point at a reachable
#                             /api/authz/auth-request endpoint (defaults to lab's
#                             local Authelia; pug/bunk need a per-host override if
#                             they ever enable forward-auth).
#   server_conf               optional snippet inserted in the server block
#   location_conf             optional snippet inserted in the / location block
#
# The dict form prevents inter-call leakage at play-vars scope: each
# import_role pass replaces the whole `nginx_site_args` value, so a
# previous caller's proxy_pass / csp / etc. can't bleed into the next
# caller that doesn't explicitly override.
- name: site | Ensure directories exists
  when: (nginx_site_args.condition | default(true)) and (nginx_site_args.state | default('present')) == 'present'
  file:
    state: directory
    path: "{{ item }}"
    mode: '0755'
    owner: root
    group: root
  loop:
    - /etc/nginx/sites-available
    - /etc/nginx/sites-enabled
  become: true
  tags:
    - nginx_site

- name: site | Configure nginx site
  when: (nginx_site_args.condition | default(true)) and (nginx_site_args.state | default('present')) == 'present'
  template:
    src: site.conf.j2
    dest: /etc/nginx/sites-available/{{ nginx_site_args.subdomain }}
    owner: root
    group: root
    mode: "{{ nginx_site_args.permissions | default('0644') }}"
    backup: true
  become: true
  register: nginx_static_conf
  tags:
    - nginx_site

- name: site | Enable nginx site
  when:
    - nginx_site_args.condition | default(true)
    - (nginx_site_args.state | default('present')) == 'present'
    - not (ansible_check_mode and nginx_static_conf.changed)
  file:
    src: /etc/nginx/sites-available/{{ nginx_site_args.subdomain }}
    dest: /etc/nginx/sites-enabled/{{ nginx_site_args.subdomain }}
    state: link
  become: true
  register: nginx_static_conf_enable
  tags:
    - nginx_site

- name: site | Remove retired nginx site
  when: (nginx_site_args.condition | default(true)) and (nginx_site_args.state | default('present')) == 'absent'
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/nginx/sites-enabled/{{ nginx_site_args.subdomain }}
    - /etc/nginx/sites-available/{{ nginx_site_args.subdomain }}
  become: true
  register: nginx_static_conf_absent
  tags:
    - nginx_site

- name: site | Reload nginx config
  when: >-
    (nginx_site_args.condition | default(true))
    and (nginx_site_args.reload | default(true))
    and ((nginx_static_conf.changed | default(false))
      or (nginx_static_conf_enable.changed | default(false))
      or (nginx_static_conf_absent.changed | default(false)))
  systemd:
    name: nginx
    state: reloaded
  become: true
  tags:
    - nginx_site
