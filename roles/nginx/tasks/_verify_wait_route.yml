# Shared post-reload settle for _verify. A probe fired immediately after a
# vhost's reload can race nginx draining its old workers (still on the prior
# config) and hit the default server (404), so poll until the freshly-added
# vhost actually routes before asserting on it. Bounded (fail-fast) per the
# harness flake contract.
#
# Inputs (set by the caller via vars:):
#   _wait_route_host  required; the vhost's FQDN (used in URL for SNI-correct probing).
#
# status_code carries the full set of expected transient codes (incl. 413 for
# the body-size vhost) so the probe never raises before the vhost is up; -1
# covers TLS connection errors (TLSV1_UNRECOGNIZED_NAME on noble/resolute
# OpenSSL 3.x while nginx drains old workers after a reload). The `until`
# retries on both 404 (default-server catch-all) and -1 (TLS race).
- name: "_verify | Wait for a vhost to route: {{ _wait_route_host }}"
  uri:
    url: "https://{{ _wait_route_host }}/"
    validate_certs: false
    follow_redirects: none
    status_code: [ -1, 200, 204, 301, 302, 400, 404, 413 ]
  register: nginx_verify_route_ready
  until: nginx_verify_route_ready.status not in [-1, 404]
  retries: 10
  delay: 1
