- name: install | Install nginx
  apt:
    pkg:
      - nginx
    policy_rc_d: 101
    cache_valid_time: 3600
  register: nginx_apt
  become: true
  tags:
    - nginx

# Letsencrypt live/ + archive/ are 0750 root:ssl-cert (see
# roles/certbot/tasks/main.yml); www-data needs to be in ssl-cert
# to traverse them and read fullchain.pem / privkey.pem.
- name: install | Add www-data to ssl-cert group
  when: not (ansible_check_mode and nginx_apt.changed)
  user:
    name: www-data
    groups: ssl-cert
    append: true
  become: true
  tags:
    - nginx

- name: install | Disable default site
  file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  register: nginx_default_conf
  become: true
  tags:
    - nginx

# Ship a pre-generated 2048-bit DH group rather than generating one per host.
# DH parameters are public (a shared, well-known group is exactly what named
# groups like RFC 7919 ffdhe2048 are), so a committed static group is safe and
# skips the per-host generation -- and the /dev/random stall it can hit on a
# fresh VM. Only the DHE ciphers in nginx.conf use it; ECDHE (the common path)
# does not.
- name: install | Install Diffie-Hellman parameters
  when: not (ansible_check_mode and nginx_apt.changed)
  copy:
    src: dhparam.pem
    dest: /etc/nginx/dhparam.pem
    owner: root
    group: root
    mode: "0644"
    backup: true
  become: true
  register: nginx_dhparam
  tags:
    - nginx

# nginx.conf points ssl_certificate at a single host-FQDN cert serving every
# vhost (there is no per-vhost ssl_certificate). The certbot role must issue it
# before nginx validates/starts; in test the snakeoil fixture lays it at the
# same path (tasks/_setup.yml), so this guards both without a qemu_test gate.
# Fail here with a clear message rather than letting `nginx -t` choke on the
# missing file later.
- name: install | Stat host TLS certificate
  when: not (ansible_check_mode and nginx_apt.changed)
  stat:
    path: /etc/letsencrypt/live/{{ inventory_hostname }}.{{ domain }}/fullchain.pem
  register: nginx_host_cert
  become: true
  tags:
    - nginx

- name: install | Assert host TLS certificate exists
  when: not (ansible_check_mode and nginx_apt.changed)
  assert:
    that:
      - nginx_host_cert.stat.exists
    fail_msg: >-
      Missing TLS cert at
      /etc/letsencrypt/live/{{ inventory_hostname }}.{{ domain }}/fullchain.pem
      -- nginx serves one host-FQDN cert for every vhost, so run the certbot
      role first (in test, _setup.yml lays a snakeoil cert here).
  tags:
    - nginx

# Unlike the conf.d/ and sites-available/ snippets (which `nginx -t` can't
# check in isolation, hence their place-validate-rollback dance), nginx.conf is
# a complete config: `nginx -t -c %s` validates the rendered temp file in full
# (its includes/cert paths are absolute and already on disk by this point), so
# a jinja/vault typo here is caught before it ever lands on the active config.
- name: install | Configure nginx
  template:
    src: nginx.conf.j2
    dest: /etc/nginx/nginx.conf
    owner: root
    group: root
    mode: "0644"
    backup: true
    validate: nginx -t -c %s
  become: true
  register: nginx_conf
  tags:
    - nginx

# Canonical proxy header set, `include`d by every vhost's `location /` (and
# by server_conf/location_conf snippets that add their own location). A
# snippet, not a conf.d/ drop: it is location-scope and pulled in explicitly,
# not auto-loaded into http{}. Static file, so no validate -- a broken edit
# would surface at the next site's place-validate `nginx -t`.
- name: install | Install proxy_params snippet
  when: not (ansible_check_mode and nginx_apt.changed)
  copy:
    src: proxy_params
    dest: /etc/nginx/snippets/proxy_params.conf
    owner: root
    group: root
    mode: "0644"
    backup: true
  become: true
  register: nginx_proxy_params
  tags:
    - nginx

# stub_status drop is what netdata's web_log collector (and any other
# in-cluster nginx-stats consumer) reads. Validate-and-rollback shape
# protects every site on the host from a typo here — same conf.d/
# blast-radius concern as csplogger.
- name: install | Enable stub_status
  import_tasks: conf_d.yml
  vars:
    nginx_conf_d_args:
      name: status.conf
      src: status.conf
      reload: "{{ not (ansible_check_mode and nginx_apt.changed) }}"
  tags:
    - nginx

- name: install | Enable nginx service
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: nginx
      condition: "{{ not (ansible_check_mode and nginx_apt.changed) }}"
      # A binary upgrade needs a real restart — `policy_rc_d: 101` on the apt
      # task blocks the package's own restart, so the new nginx only takes over
      # when we restart it. Pure config changes (nginx.conf, default-site
      # removal, the status.conf drop) are picked up hitlessly via SIGHUP, so
      # reload them instead of dropping in-flight connections. Mutually
      # exclusive: the restart already reloads config, so skip reload on upgrade.
      restart: "{{ nginx_apt.changed }}"
      reload: "{{ (nginx_default_conf.changed or nginx_conf.changed or (nginx_proxy_params.changed | default(false)) or (nginx_dhparam.changed | default(false)) or status_conf_result.changed) and not nginx_apt.changed }}"
  tags:
    - nginx
