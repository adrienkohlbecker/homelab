- name: install | Install nginx
  apt:
    pkg:
      - nginx
    policy_rc_d: 101
    cache_valid_time: 3600
  register: nginx_apt
  become: true
  tags:
    - nginx

# nginx's master process (root) loads ssl_certificate / ssl_certificate_key
# from the static paths in nginx.conf at startup and on every reload; the
# www-data workers inherit that TLS context via fork and never open the cert
# files themselves. privkey.pem is 0600 root:root regardless, so ssl-cert
# membership only ever granted the workers traversal into the 0750 root:ssl-cert
# live/ dir to reach the public fullchain/chain they don't read -- drop it, it
# is dead least-privilege debt. (netdata keeps its ssl-cert membership: its
# go.d/x509check genuinely reads fullchain.pem; see netdata/tasks/install.yml.)
# gpasswd, not the user module: `user` can only set the whole group list
# (append: false would strip www-data's other groups), and there is no
# remove-from-one-group primitive. Guarded on current membership so it only runs
# when there is something to remove (clean changed reporting + idempotence).
- name: install | Read ssl-cert group membership
  when: not (ansible_check_mode and nginx_apt.changed)
  getent:
    database: group
    key: ssl-cert
  register: nginx_ssl_cert_grp
  become: true
  tags:
    - nginx

- name: install | Remove www-data from ssl-cert group
  when:
    - not (ansible_check_mode and nginx_apt.changed)
    - "'www-data' in (nginx_ssl_cert_grp.ansible_facts.getent_group['ssl-cert'][2] | default('')).split(',')"
  command: gpasswd --delete www-data ssl-cert
  changed_when: true
  become: true
  tags:
    - nginx

- name: install | Disable default site
  file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  register: nginx_default_conf
  become: true
  tags:
    - nginx

# nginx.conf points ssl_certificate at a single host-FQDN cert serving every
# vhost (there is no per-vhost ssl_certificate). The certbot role must issue it
# before nginx validates/starts; in test the snakeoil fixture lays it at the
# same path (tasks/_setup.yml), so this guards both without a qemu_test gate.
# Fail here with a clear message rather than letting `nginx -t` choke on the
# missing file later.
- name: install | Stat host TLS certificate
  when: not (ansible_check_mode and nginx_apt.changed)
  stat:
    path: /etc/letsencrypt/live/{{ inventory_hostname }}.{{ domain }}/fullchain.pem
  register: nginx_host_cert
  become: true
  tags:
    - nginx

- name: install | Assert host TLS certificate exists
  when: not (ansible_check_mode and nginx_apt.changed)
  assert:
    that:
      - nginx_host_cert.stat.exists
    fail_msg: >-
      Missing TLS cert at
      /etc/letsencrypt/live/{{ inventory_hostname }}.{{ domain }}/fullchain.pem
      -- nginx serves one host-FQDN cert for every vhost, so run the certbot
      role first (in test, _setup.yml lays a snakeoil cert here).
  tags:
    - nginx

# Unlike the conf.d/ and sites-available/ snippets (which `nginx -t` can't
# check in isolation, hence their place-validate-rollback dance), nginx.conf is
# a complete config: `nginx -t -c %s` validates the rendered temp file in full
# (its includes/cert paths are absolute and already on disk by this point), so
# a jinja/vault typo here is caught before it ever lands on the active config.
- name: install | Configure nginx
  template:
    src: nginx.conf.j2
    dest: /etc/nginx/nginx.conf
    owner: root
    group: root
    mode: "0644"
    backup: true
    validate: nginx -t -c %s
  become: true
  register: nginx_conf
  tags:
    - nginx

# ECDHE-only TLS profile (no DHE ciphers in nginx.conf), so nginx reads no
# Diffie-Hellman group; keep /etc/nginx/dhparam.pem absent. Sequenced after the
# nginx.conf render above so the ssl_dhparam reference is already gone, and
# unreferenced by the config either way, so its removal needs no reload.
- name: install | Remove unused Diffie-Hellman parameters
  file:
    path: /etc/nginx/dhparam.pem
    state: absent
  become: true
  tags:
    - nginx

# Canonical proxy header set, `include`d by every vhost's `location /` (and
# by server_conf/location_conf snippets that add their own location). A
# snippet, not a conf.d/ drop: it is location-scope and pulled in explicitly,
# not auto-loaded into http{}. Static file, so no validate -- a broken edit
# would surface at the next site's place-validate `nginx -t`.
- name: install | Install proxy_params snippet
  when: not (ansible_check_mode and nginx_apt.changed)
  copy:
    src: proxy_params
    dest: /etc/nginx/snippets/proxy_params.conf
    owner: root
    group: root
    mode: "0644"
    backup: true
    validate: grep -qE '^proxy_set_header[[:space:]]+Host[[:space:]]+' %s
  become: true
  register: nginx_proxy_params
  tags:
    - nginx

# stub_status drop is what netdata's web_log collector (and any other
# in-cluster nginx-stats consumer) reads. Validate-and-rollback shape
# protects every site on the host from a typo here — a single bad
# conf.d/ file takes down every nginx vhost on the host.
- name: install | Enable stub_status
  import_tasks: conf_d.yml
  vars:
    nginx_conf_d_args:
      name: status.conf
      src: status.conf
      reload: "{{ not (ansible_check_mode and nginx_apt.changed) }}"
  tags:
    - nginx

- name: install | Enable nginx service
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: nginx
      condition: "{{ not (ansible_check_mode and nginx_apt.changed) }}"
      # A binary upgrade needs a real restart — `policy_rc_d: 101` on the apt
      # task blocks the package's own restart, so the new nginx only takes over
      # when we restart it. Pure config changes (nginx.conf, default-site
      # removal, the status.conf drop) are picked up hitlessly via SIGHUP, so
      # reload them instead of dropping in-flight connections. Mutually
      # exclusive: the restart already reloads config, so skip reload on upgrade.
      restart: "{{ nginx_apt.changed }}"
      reload: "{{ (nginx_default_conf.changed or nginx_conf.changed or (nginx_proxy_params.changed | default(false)) or status_conf_result.changed) and not nginx_apt.changed }}"
  tags:
    - nginx
