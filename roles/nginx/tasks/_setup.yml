- name: _setup | Install netdata
  import_role:
    name: netdata
    tasks_from: install

- name: _test | Install dependencies
  apt:
    pkg:
      - ssl-cert
    install_recommends: false
    cache_valid_time: 3600
  become: true

# Lay snakeoil at the letsencrypt paths nginx.conf.j2 references before
# the nginx install below validates that config.
- name: _test | Generate certificates
  shell: |
    set -euo pipefail

    mkdir -p /etc/letsencrypt/live/{{ item }}
    cp /etc/ssl/private/ssl-cert-snakeoil.key /etc/letsencrypt/live/{{ item }}/privkey.pem
    cp /etc/ssl/certs/ssl-cert-snakeoil.pem /etc/letsencrypt/live/{{ item }}/chain.pem
    cp /etc/ssl/certs/ssl-cert-snakeoil.pem /etc/letsencrypt/live/{{ item }}/fullchain.pem
  args:
    executable: /bin/bash
    creates: /etc/letsencrypt/live/{{ item }}
  become: true
  loop:
    - '{{ inventory_hostname }}.{{ domain }}'

# Pre-install nginx so the authelia_stub task below (which writes into
# /etc/nginx/conf.d/ and validates the config) has both the target
# directory and a starting nginx config. Main.yml's install will
# re-run idempotently.
- name: _setup | Install nginx
  import_tasks: install.yml

- name: _setup | Install authelia stub for auth=required tests
  # The device-proxy sites (marantz, printer, siglent, ups, tubeszb)
  # carry `auth: required`; the auth_request needs something answering
  # on 127.0.0.1:{{ service_ports.authelia }}.
  import_role:
    name: _test
    tasks_from: authelia_stub
