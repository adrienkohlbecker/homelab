- name: _setup | Install netdata
  import_role:
    name: netdata
    tasks_from: install

- name: _setup | Install dependencies
  apt:
    pkg:
      - ssl-cert
    install_recommends: false
    cache_valid_time: 3600
  become: true

# Lay snakeoil at the letsencrypt paths nginx.conf.j2 references before the
# nginx install below validates that config. harden_perms mirrors prod certbot
# perms so the _verify ssl-cert-removal check is functional (see the task file).
- name: _setup | Generate certificates
  import_tasks: _setup_snakeoil.yml
  vars:
    nginx_snakeoil_args:
      fqdn: "{{ inventory_hostname }}.{{ domain }}"
      harden_perms: true

# Pre-install nginx so the authelia_stub task below (which writes into
# /etc/nginx/conf.d/ and validates the config) has both the target
# directory and a starting nginx config. Main.yml's install will
# re-run idempotently.
- name: _setup | Install nginx
  import_tasks: install.yml

- name: _setup | Install authelia stub for auth=required tests
  # The device-proxy sites (marantz, printer, siglent, ups, tubeszb)
  # carry `auth: required`; the auth_request needs something answering
  # on 127.0.0.1:{{ service_ports.authelia }}.
  import_role:
    name: test
    tasks_from: authelia_stub

# Simulate a host provisioned before nginx dropped www-data from ssl-cert, so
# converge actually exercises install.yml's removal task (and the idempotence
# pass proves it does not re-add). A fresh host never had www-data here -- the
# _setup install.yml above already ran the removal as a no-op -- so without this
# the removal is untested and the _verify assertion would be vacuous.
- name: _setup | Pre-add www-data to ssl-cert (legacy state to exercise removal)
  user:
    name: www-data
    groups: ssl-cert
    append: true
  become: true
