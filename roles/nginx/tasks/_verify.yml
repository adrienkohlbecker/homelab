# Functional verification of the nginx role. Stand up a throwaway upstream
# stub + a transient nginx_site pointing at it, then probe the live vhost
# through nginx for the contracts the ~46 nginx_site consumers depend on:
# TLS termination + Host routing, the security headers, the Authelia 401->302
# redirect, the bypass-token short-circuit (+ token strip and access-log
# redaction), the http->https redirect, the default-server catch-all, and
# stub_status's loopback binding. Probe idiom (https://localhost + Host header
# + validate_certs:false) lifted from roles/compta/tasks/_verify.yml; the
# upstream stub via systemd-run is the roles/csplogger pattern. The VM is fresh
# per harness run and _verify runs after the idempotence check, so standing up
# fixtures here is safe (no when: qemu_test gate needed).

- name: _verify | Shared facts
  set_fact:
    nginx_verify_host: "nginxverify.{{ inventory_hostname }}.{{ domain }}"
    nginx_verify_token: nginx-verify-token

- name: _verify | Start upstream stub via systemd-run
  command:
    argv:
      - systemd-run
      - --unit=nginx_verify_upstream
      - python3
      - -c
      - |
        import http.server

        class H(http.server.BaseHTTPRequestHandler):
            protocol_version = "HTTP/1.1"

            def do_GET(self):
                # Echo the received request line to the journal so the
                # token-strip assertion can confirm auth_token never arrives.
                print("upstream-saw " + self.path, flush=True)
                body = b"nginx_verify_upstream_ok"
                self.send_response(200)
                self.send_header("Content-Length", str(len(body)))
                self.end_headers()
                self.wfile.write(body)

        print("ready", flush=True)
        http.server.HTTPServer(("127.0.0.1", 18080), H).serve_forever()
  changed_when: true
  become: true

- name: _verify | Wait for upstream stub to bind
  wait_for:
    host: 127.0.0.1
    port: 18080
    timeout: 15

# Re-point the Authelia stub to gate mode (401) so the negative auth path
# exercises the error_page 401 -> 302 redirect. The bypass-token path returns
# 204 before reaching the stub, so it still sees 200 from the upstream.
- name: _verify | Install Authelia stub in gate mode
  import_role:
    name: _test
    tasks_from: authelia_stub
  vars:
    authelia_stub_mode: gate

# Exercises the nginx_site helper end-to-end (assert, template, symlink, the
# new nginx -t validate-rollback, reload) on top of being the probe target.
- name: _verify | Configure a transient test vhost via the nginx_site helper
  import_role:
    name: nginx
    tasks_from: site
  vars:
    nginx_site_args:
      subdomain: nginxverify
      proxy_pass: http://127.0.0.1:18080/
      auth: required
      bypass_query_param:
        value: "{{ nginx_verify_token }}"

- name: _verify | Unauthenticated request redirects to the Authelia portal (302)
  uri:
    url: https://localhost/
    headers:
      Host: "{{ nginx_verify_host }}"
    validate_certs: false
    follow_redirects: none
    status_code: 302
  register: nginx_verify_unauth
  failed_when: >-
    nginx_verify_unauth.status != 302
    or 'https://auth.' not in (nginx_verify_unauth.location | default(''))

- name: _verify | Wrong bypass token still redirects to Authelia (302)
  uri:
    url: https://localhost/?auth_token=wrong_value_must_not_match
    headers:
      Host: "{{ nginx_verify_host }}"
    validate_certs: false
    follow_redirects: none
    status_code: 302
  register: nginx_verify_wrong
  failed_when: >-
    nginx_verify_wrong.status != 302
    or 'https://auth.' not in (nginx_verify_wrong.location | default(''))

- name: _verify | Correct bypass token short-circuits auth and reaches the upstream (200)
  uri:
    url: https://localhost/?auth_token={{ nginx_verify_token }}
    headers:
      Host: "{{ nginx_verify_host }}"
    validate_certs: false
    return_content: true
    status_code: 200
  register: nginx_verify_bypass
  failed_when: >-
    nginx_verify_bypass.status != 200
    or 'nginx_verify_upstream_ok' not in (nginx_verify_bypass.content | default(''))

- name: _verify | Security headers present on the proxied response
  assert:
    that:
      - nginx_verify_bypass.strict_transport_security is defined
      - nginx_verify_bypass.content_security_policy is defined
      - "'no-referrer' in (nginx_verify_bypass.referrer_policy | default(''))"
    fail_msg: >-
      Expected HSTS, CSP and Referrer-Policy: no-referrer on the proxied bypass
      response; got HSTS={{ nginx_verify_bypass.strict_transport_security | default('<none>') }},
      CSP={{ nginx_verify_bypass.content_security_policy | default('<none>') }},
      Referrer-Policy={{ nginx_verify_bypass.referrer_policy | default('<none>') }}.

# Token strip: nginx must remove auth_token from $args before proxy_pass, so
# the upstream never sees it. Send a uniquely-named probe param alongside the
# token; the probe must reach the upstream stub, the token must not.
- name: _verify | Fire a bypass request carrying a probe marker
  uri:
    url: https://localhost/?auth_token={{ nginx_verify_token }}&probe=__nginx_verify_marker__
    headers:
      Host: "{{ nginx_verify_host }}"
    validate_certs: false
    status_code: 200

- name: _verify | Nginx strips auth_token before proxy_pass (upstream never sees it)
  command: journalctl -u nginx_verify_upstream --no-pager
  register: nginx_verify_upstream_journal
  changed_when: false
  become: true
  failed_when: >-
    '__nginx_verify_marker__' not in nginx_verify_upstream_journal.stdout
    or nginx_verify_token in nginx_verify_upstream_journal.stdout

# Log redaction: nginx logs $request_safe, which rewrites auth_token=<value>
# to auth_token=REDACTED. Wait past the 5s access_log buffer flush first.
- name: _verify | Wait for the nginx access_log flush
  pause:
    seconds: 6

- name: _verify | Nginx access log redacts auth_token to REDACTED
  command: tail -n 200 /var/log/nginx/access.log
  register: nginx_verify_access_log
  changed_when: false
  become: true
  failed_when: >-
    'auth_token=REDACTED' not in nginx_verify_access_log.stdout
    or nginx_verify_token in nginx_verify_access_log.stdout

# http->https redirect and the default-server catch-all are probed on the
# public interface, not loopback: the stub_status server binds 127.0.0.1:80
# specifically, which captures every loopback :80 request regardless of Host.
- name: _verify | HTTP request 301-redirects to HTTPS
  uri:
    url: "http://{{ ansible_default_ipv4.address }}/"
    headers:
      Host: "{{ nginx_verify_host }}"
    follow_redirects: none
    status_code: 301
  register: nginx_verify_http
  failed_when: >-
    nginx_verify_http.status != 301
    or not (nginx_verify_http.location | default('')).startswith('https://')

- name: _verify | Unknown Host hits the default server (404)
  uri:
    url: "http://{{ ansible_default_ipv4.address }}/"
    headers:
      Host: nonexistent.invalid
    status_code: 404

- name: _verify | Loopback stub_status endpoint answers 200
  uri:
    url: http://127.0.0.1/nginx_status
    return_content: true
    status_code: 200
  register: nginx_verify_stub
  failed_when: >-
    nginx_verify_stub.status != 200
    or 'Active connections' not in (nginx_verify_stub.content | default(''))
