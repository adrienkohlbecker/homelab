# Functional verification of the nginx role. Stand up a throwaway upstream
# stub + a transient nginx_site pointing at it, then probe the live vhost
# through nginx for the contracts the ~46 nginx_site consumers depend on:
# TLS termination + Host routing, the security headers, the Authelia 401->302
# redirect, the bypass-token short-circuit (+ token strip and access-log
# redaction), the http->https redirect, the default-server catch-all, and
# stub_status's loopback binding. Probe idiom: map test FQDNs to loopback in
# /etc/hosts, then probe https://<fqdn>/ (validate_certs:false) so TLS SNI
# matches the vhost on every OpenSSL version (noble/resolute 3.x reject
# SNI=localhost with TLSV1_UNRECOGNIZED_NAME). The upstream stub via
# systemd-run is the roles/csplogger pattern. The VM is fresh
# per harness run and _verify runs after the idempotence check, so standing up
# fixtures here is safe (no when: qemu_test gate needed).

- name: _verify | Shared facts
  set_fact:
    nginx_verify_host: "nginxverify.{{ inventory_hostname }}.{{ domain }}"
    nginx_verify_token: nginx-verify-token

# TLS SNI follows the URL host, not the Host header. On noble/resolute (OpenSSL
# 3.x), an SNI of `localhost` that matches no server_name triggers a fatal
# TLSV1_UNRECOGNIZED_NAME. Map every test-vhost FQDN to loopback so probes can
# use the real FQDN in the URL, making SNI match the vhost on every release.
- name: _verify | Map test vhost FQDNs to loopback for SNI-correct probing
  lineinfile:
    path: /etc/hosts
    regexp: '^127\.0\.0\.1\s+nginxverify'
    line: >-
      127.0.0.1
      {{ nginx_verify_host }}
      nginxverifyempty.{{ inventory_hostname }}.{{ domain }}
      nginxverifyauth.{{ inventory_hostname }}.{{ domain }}
      nginxverifyloc.{{ inventory_hostname }}.{{ domain }}
      nginxverifyserverconf.{{ inventory_hostname }}.{{ domain }}
      nginxverifybody.{{ inventory_hostname }}.{{ domain }}
      nginxverifybuffering.{{ inventory_hostname }}.{{ domain }}
      nginxverifycsp.{{ inventory_hostname }}.{{ domain }}
      nginxverifyplain.{{ inventory_hostname }}.{{ domain }}
  become: true

- name: _verify | Map the IPv6 test vhost to ::1 so the probe reaches [::]:443
  lineinfile:
    path: /etc/hosts
    regexp: '^::1\s+nginxverifyipv6\.'
    line: "::1 nginxverifyipv6.{{ inventory_hostname }}.{{ domain }}"
  become: true

# www-data was dropped from ssl-cert (install.yml): nginx's master loads the
# cert+key as root and the workers inherit the context, so the workers never
# read the files. This assert is the cheap confirmation that converge removed
# the now-dead membership (and left netdata's intact for x509check); the
# functional proof is the HTTPS probes below -- _setup tightened live/ to 0750
# root:ssl-cert and privkey.pem to 0600 root:root and pre-added www-data, so a
# www-data worker can neither traverse live/ nor read the key, yet still
# terminates TLS, which is only possible if the master loaded it as root.
- name: _verify | Read ssl-cert group membership
  getent:
    database: group
    key: ssl-cert
  register: nginx_verify_ssl_cert_grp
  become: true

- name: _verify | Dropped www-data from ssl-cert, kept netdata
  assert:
    that:
      - "'www-data' not in (nginx_verify_ssl_cert_grp.ansible_facts.getent_group['ssl-cert'][2] | default('')).split(',')"
      - "'netdata' in (nginx_verify_ssl_cert_grp.ansible_facts.getent_group['ssl-cert'][2] | default('')).split(',')"
    fail_msg: >-
      Expected www-data removed from ssl-cert and netdata kept; ssl-cert members
      are {{ nginx_verify_ssl_cert_grp.ansible_facts.getent_group['ssl-cert'][2] | default('<none>') }}.

- name: _verify | Start upstream stub via systemd-run
  command:
    argv:
      - systemd-run
      - --unit=nginx_verify_upstream
      - python3
      - -c
      - |
        import http.server

        class H(http.server.BaseHTTPRequestHandler):
            protocol_version = "HTTP/1.1"

            def do_GET(self):
                # Echo the received request line + Authorization header to the
                # journal so the token-strip and upstream_authorization
                # assertions can confirm exactly what reached the upstream.
                print("upstream-saw " + self.path, flush=True)
                print("upstream-auth " + self.headers.get("Authorization", "<none>"), flush=True)
                print("upstream-fwduser " + self.headers.get("X-Forwarded-User", "<none>"), flush=True)
                print("upstream-remoteuser " + self.headers.get("Remote-User", "<none>"), flush=True)
                body = b"nginx_verify_upstream_ok"
                self.send_response(200)
                self.send_header("Content-Length", str(len(body)))
                self.end_headers()
                self.wfile.write(body)

        print("ready", flush=True)
        http.server.HTTPServer(("127.0.0.1", 18080), H).serve_forever()
  changed_when: true
  become: true

- name: _verify | Wait for upstream stub to bind
  wait_for:
    host: 127.0.0.1
    port: 18080
    timeout: 15

# Re-point the Authelia stub to gate mode (401) so the negative auth path
# exercises the error_page 401 -> 302 redirect. The bypass-token path returns
# 204 before reaching the stub, so it still sees 200 from the upstream.
- name: _verify | Install Authelia stub in gate mode
  import_role:
    name: test
    tasks_from: authelia_stub
  vars:
    test_authelia_stub_mode: gate

# Bounded readiness probe (fail-fast, per the harness flake contract): the stub
# re-install reloaded nginx, so poll its endpoint until the gate 401 lands
# rather than racing the reload on a slow VM.
- name: _verify | Wait for the Authelia gate stub to answer 401
  uri:
    url: "http://127.0.0.1:{{ service_ports.authelia }}/api/authz/auth-request"
    status_code: 401
  register: nginx_verify_gate_ready
  until: nginx_verify_gate_ready.status == 401
  retries: 10
  delay: 1

# Exercises the nginx_site helper end-to-end (assert, template, symlink, the
# new nginx -t validate-rollback, reload) on top of being the probe target.
- name: _verify | Configure a transient test vhost via the nginx_site helper
  import_role:
    name: nginx
    tasks_from: site
  vars:
    nginx_site_args:
      subdomain: nginxverify
      proxy_pass: http://127.0.0.1:18080/
      auth: required
      bypass_query_param:
        value: "{{ nginx_verify_token }}"

- name: _verify | Settle the nginxverify vhost
  import_tasks: _verify_wait_route.yml
  vars:
    _wait_route_host: "{{ nginx_verify_host }}"

- name: _verify | Unauthenticated request redirects to the Authelia portal (302)
  uri:
    url: "https://{{ nginx_verify_host }}/"
    validate_certs: false
    follow_redirects: none
    status_code: 302
  register: nginx_verify_unauth
  failed_when: >-
    nginx_verify_unauth.status != 302
    or 'https://auth.' not in (nginx_verify_unauth.location | default(''))

- name: _verify | Wrong bypass token still redirects to Authelia (302)
  uri:
    url: "https://{{ nginx_verify_host }}/?auth_token=wrong_value_must_not_match"
    validate_certs: false
    follow_redirects: none
    status_code: 302
  register: nginx_verify_wrong
  failed_when: >-
    nginx_verify_wrong.status != 302
    or 'https://auth.' not in (nginx_verify_wrong.location | default(''))

- name: _verify | Correct bypass token short-circuits auth and reaches the upstream (200)
  uri:
    url: "https://{{ nginx_verify_host }}/?auth_token={{ nginx_verify_token }}"
    validate_certs: false
    return_content: true
    status_code: 200
  register: nginx_verify_bypass
  failed_when: >-
    nginx_verify_bypass.status != 200
    or 'nginx_verify_upstream_ok' not in (nginx_verify_bypass.content | default(''))

- name: _verify | Security headers present on the proxied response
  assert:
    that:
      - nginx_verify_bypass.strict_transport_security is defined
      - nginx_verify_bypass.content_security_policy is defined
      - "'no-referrer' in (nginx_verify_bypass.referrer_policy | default(''))"
    fail_msg: >-
      Expected HSTS, CSP and Referrer-Policy: no-referrer on the proxied bypass
      response; got HSTS={{ nginx_verify_bypass.strict_transport_security | default('<none>') }},
      CSP={{ nginx_verify_bypass.content_security_policy | default('<none>') }},
      Referrer-Policy={{ nginx_verify_bypass.referrer_policy | default('<none>') }}.

# Token strip: nginx must remove auth_token from $args before proxy_pass, so
# the upstream never sees it. Send a uniquely-named probe param alongside the
# token; the probe must reach the upstream stub, the token must not.
- name: _verify | Fire a bypass request carrying a probe marker
  uri:
    url: "https://{{ nginx_verify_host }}/?auth_token={{ nginx_verify_token }}&probe=__nginx_verify_marker__"
    validate_certs: false
    status_code: 200

- name: _verify | Nginx strips auth_token before proxy_pass (upstream never sees it)
  command: journalctl -u nginx_verify_upstream --no-pager
  register: nginx_verify_upstream_journal
  changed_when: false
  become: true
  failed_when: >-
    '__nginx_verify_marker__' not in nginx_verify_upstream_journal.stdout
    or nginx_verify_token in nginx_verify_upstream_journal.stdout

# Log redaction: nginx logs $request_safe, which rewrites auth_token=<value>
# to auth_token=REDACTED. The access_log buffers with flush=5s, so poll
# (bounded, fail-fast) until the redacted line lands rather than sleeping a
# fixed interval that races the flush on a slow VM.
- name: _verify | Wait for the redacted auth_token to reach the access log
  command: tail -n 200 /var/log/nginx/access.log
  register: nginx_verify_access_log
  changed_when: false
  become: true
  until: "'auth_token=REDACTED' in nginx_verify_access_log.stdout"
  retries: 10
  delay: 2

- name: _verify | Nginx access log never contains the raw auth_token
  assert:
    that:
      - nginx_verify_token not in nginx_verify_access_log.stdout
    fail_msg: >-
      Raw bypass token leaked into /var/log/nginx/access.log; expected only
      auth_token=REDACTED.

# auth_token as the ONLY query param is the common case (compta's app, the
# netdata poller) and the edge where stripping must clear $args entirely.
- name: _verify | Bypass with auth_token as the sole query param reaches the upstream (200)
  uri:
    url: "https://{{ nginx_verify_host }}/?auth_token={{ nginx_verify_token }}"
    validate_certs: false
    return_content: true
    status_code: 200
  register: nginx_verify_sole
  failed_when: >-
    nginx_verify_sole.status != 200
    or 'nginx_verify_upstream_ok' not in (nginx_verify_sole.content | default(''))

- name: _verify | Sole-param auth_token is stripped before the upstream (not in journal)
  command: journalctl -u nginx_verify_upstream --no-pager
  register: nginx_verify_sole_journal
  changed_when: false
  become: true
  failed_when: nginx_verify_token in nginx_verify_sole_journal.stdout

# The single-occurrence strip + log-redaction assume one auth_token; the
# location-/ guard rejects a duplicated param outright so a malformed client
# can't smuggle a second copy past the strip.
- name: _verify | Duplicated auth_token is rejected with 400
  uri:
    url: "https://{{ nginx_verify_host }}/?auth_token={{ nginx_verify_token }}&auth_token=smuggled"
    validate_certs: false
    status_code: 400
  register: nginx_verify_dup
  failed_when: nginx_verify_dup.status != 400

# Guard against a literal "?" inside the query (a second "?" in the URI) that
# would let a ?-prefixed auth_token fire the 204 bypass while escaping the
# &-anchored $args strip, forwarding the raw token to the upstream. Rejected.
- name: _verify | A ?-smuggled auth_token is rejected with 400 (not forwarded)
  uri:
    url: "https://{{ nginx_verify_host }}/?probe=1?auth_token={{ nginx_verify_token }}"
    validate_certs: false
    status_code: 400
  register: nginx_verify_smuggle
  failed_when: nginx_verify_smuggle.status != 400

# A duplicated auth_token is rejected 400 but the request line is logged before
# the 400. Put the real token SECOND (a decoy first) so a
# single-stage redaction would leak it; the two-stage map must redact both.
- name: _verify | Fire a duplicated auth_token with the real token second
  uri:
    url: "https://{{ nginx_verify_host }}/?auth_token=decoy_first&auth_token={{ nginx_verify_token }}&dupmark=__nginx_verify_dup_marker__"
    validate_certs: false
    status_code: 400
  register: nginx_verify_dup2
  failed_when: nginx_verify_dup2.status != 400

- name: _verify | Wait for the duplicated request to reach the access log
  command: tail -n 200 /var/log/nginx/access.log
  register: nginx_verify_dup_log
  changed_when: false
  become: true
  until: "'__nginx_verify_dup_marker__' in nginx_verify_dup_log.stdout"
  retries: 10
  delay: 2

- name: _verify | Both auth_token copies are redacted in the access log
  assert:
    that:
      - nginx_verify_token not in nginx_verify_dup_log.stdout
    fail_msg: >-
      The duplicated request's second (real) auth_token leaked raw into the
      access log; the two-stage $request_safe redaction must cover both copies.

# An empty upstream_authorization dict must be a no-op -- it must NOT write a
# conf.d map nor arm the cookieless Authorization-bypass shortcut. Stub
# is still in gate mode (401), so a cookieless request carrying an Authorization
# header must fall through to Authelia (302), not short-circuit to the upstream.
- name: _verify | Configure a vhost with an empty upstream_authorization
  import_role:
    name: nginx
    tasks_from: site
  vars:
    nginx_site_args:
      subdomain: nginxverifyempty
      proxy_pass: http://127.0.0.1:18080/
      auth: required
      upstream_authorization: {}

- name: _verify | Empty upstream_authorization writes no conf.d map
  stat:
    path: /etc/nginx/conf.d/upstream_auth_nginxverifyempty.conf
  register: nginx_verify_empty_map
  become: true
  failed_when: nginx_verify_empty_map.stat.exists

- name: _verify | Settle the nginxverifyempty vhost
  import_tasks: _verify_wait_route.yml
  vars:
    _wait_route_host: "nginxverifyempty.{{ inventory_hostname }}.{{ domain }}"

- name: _verify | Empty upstream_authorization does not arm the Authorization bypass
  uri:
    url: "https://nginxverifyempty.{{ inventory_hostname }}.{{ domain }}/"
    headers:
      Authorization: Token should-not-bypass
    validate_certs: false
    follow_redirects: none
    status_code: 302
  register: nginx_verify_empty
  failed_when: nginx_verify_empty.status != 302

# http->https redirect and the default-server catch-all are probed on the
# public interface, not loopback: the stub_status server binds 127.0.0.1:80
# specifically, which captures every loopback :80 request regardless of Host.
- name: _verify | HTTP request 308-redirects to HTTPS
  uri:
    url: "http://{{ ansible_default_ipv4.address }}/"
    headers:
      Host: "{{ nginx_verify_host }}"
    follow_redirects: none
    status_code: 308
  register: nginx_verify_http
  failed_when: >-
    nginx_verify_http.status != 308
    or not (nginx_verify_http.location | default('')).startswith('https://')

- name: _verify | Unknown Host hits the default server (404)
  uri:
    url: "http://{{ ansible_default_ipv4.address }}/"
    headers:
      Host: nonexistent.invalid
    status_code: 404

- name: _verify | Loopback stub_status endpoint answers 200
  uri:
    url: http://127.0.0.1/nginx_status
    return_content: true
    status_code: 200
  register: nginx_verify_stub
  failed_when: >-
    nginx_verify_stub.status != 200
    or 'Active connections' not in (nginx_verify_stub.content | default(''))

# --- auth-passes phase ---
# Switch the stub to `authed` (200 + Remote-User) so the upstream_authorization
# injection and location_conf re-emit paths run with auth SUCCEEDING, which the
# gate-mode tests above can't reach.
- name: _verify | Switch the Authelia stub to authed mode
  import_role:
    name: test
    tasks_from: authelia_stub
  vars:
    test_authelia_stub_mode: authed

- name: _verify | Wait for the Authelia authed stub to answer 200
  uri:
    url: "http://127.0.0.1:{{ service_ports.authelia }}/api/authz/auth-request"
    status_code: 200
  register: nginx_verify_authed_ready
  until: nginx_verify_authed_ready.status == 200
  retries: 10
  delay: 1

# upstream_authorization exercises three contracts: the per-user token INJECTION
# (a browser user with no own Authorization receives the mapped token), Authelia
# identity forwarding (X-Forwarded-User, a content-phase proxy_set_header), and
# the cookieless machine-client passthrough (its own Authorization survives). The
# injection works because the token comes from a content-phase `map`
# (conf.d/upstream_auth_<sub>.conf) read after auth_request populates
# $authelia_user -- the bug it replaced used a rewrite-phase if/set that ran
# before auth and so never matched.
- name: _verify | Configure a vhost exercising upstream_authorization
  import_role:
    name: nginx
    tasks_from: site
  vars:
    nginx_site_args:
      subdomain: nginxverifyauth
      proxy_pass: http://127.0.0.1:18080/
      auth: required
      upstream_authorization:
        nginxverifyuser: Token injected-abc

- name: _verify | Settle the nginxverifyauth vhost
  import_tasks: _verify_wait_route.yml
  vars:
    _wait_route_host: "nginxverifyauth.{{ inventory_hostname }}.{{ domain }}"

- name: _verify | Authenticated browser user is admitted and identity-forwarded
  uri:
    url: "https://nginxverifyauth.{{ inventory_hostname }}.{{ domain }}/"
    validate_certs: false
    status_code: 200
  register: nginx_verify_inj
  failed_when: nginx_verify_inj.status != 200

- name: _verify | Upstream received X-Forwarded-User from the auth subrequest
  command: journalctl -u nginx_verify_upstream --no-pager
  register: nginx_verify_inj_journal
  changed_when: false
  become: true
  until: "'upstream-fwduser nginxverifyuser' in nginx_verify_inj_journal.stdout"
  retries: 10
  delay: 1

# The same identity is also forwarded under Authelia's canonical Remote-* name.
- name: _verify | Upstream received Remote-User from the auth subrequest
  command: journalctl -u nginx_verify_upstream --no-pager
  register: nginx_verify_remote_journal
  changed_when: false
  become: true
  until: "'upstream-remoteuser nginxverifyuser' in nginx_verify_remote_journal.stdout"
  retries: 10
  delay: 1

# The fix: the browser user (no own Authorization) gets the token the
# upstream_authorization map assigned to nginxverifyuser. The old rewrite-phase
# if/set produced `upstream-auth <none>` here; the content-phase map injects it.
- name: _verify | Upstream received the per-user injected Authorization token
  command: journalctl -u nginx_verify_upstream --no-pager
  register: nginx_verify_inj_auth_journal
  changed_when: false
  become: true
  until: "'upstream-auth Token injected-abc' in nginx_verify_inj_auth_journal.stdout"
  retries: 10
  delay: 1

- name: _verify | Cookieless machine client's own Authorization passes through unmodified
  uri:
    url: "https://nginxverifyauth.{{ inventory_hostname }}.{{ domain }}/"
    headers:
      Authorization: Token machine-xyz
    validate_certs: false
    status_code: 200
  register: nginx_verify_pass
  failed_when: nginx_verify_pass.status != 200

- name: _verify | Upstream received the machine client's own token (not stripped)
  command: journalctl -u nginx_verify_upstream --no-pager
  register: nginx_verify_pass_journal
  changed_when: false
  become: true
  until: "'upstream-auth Token machine-xyz' in nginx_verify_pass_journal.stdout"
  retries: 10
  delay: 1

# location_conf: a location-level add_header drops nginx's inherited add_header
# set, so the helper re-emits the security headers inside `location /`. If that
# re-emit regressed, HSTS/CSP would silently vanish from every location_conf
# site (netdata, minio).
- name: _verify | Configure a vhost with a location_conf snippet
  import_role:
    name: nginx
    tasks_from: site
  vars:
    nginx_site_args:
      subdomain: nginxverifyloc
      proxy_pass: http://127.0.0.1:18080/
      auth: required
      location_conf: |
        add_header X-Verify-Loc "1" always;

- name: _verify | Settle the nginxverifyloc vhost
  import_tasks: _verify_wait_route.yml
  vars:
    _wait_route_host: "nginxverifyloc.{{ inventory_hostname }}.{{ domain }}"

- name: _verify | A location_conf keeps the security headers AND its own header
  uri:
    url: "https://nginxverifyloc.{{ inventory_hostname }}.{{ domain }}/"
    validate_certs: false
    status_code: 200
  register: nginx_verify_loc
  failed_when: >-
    nginx_verify_loc.status != 200
    or nginx_verify_loc.strict_transport_security is not defined
    or nginx_verify_loc.content_security_policy is not defined
    or nginx_verify_loc.x_verify_loc is not defined

# server_conf adds a sibling location at server scope. The only other use of the
# key feeds a deliberately-broken directive (the rollback test below), so the
# positive contract -- the snippet renders and the added location actually
# serves -- would otherwise be untested, yet homepage's /alerts/ relies on it.
- name: _verify | Configure a vhost with a server_conf snippet
  import_role:
    name: nginx
    tasks_from: site
  vars:
    nginx_site_args:
      subdomain: nginxverifyserverconf
      proxy_pass: http://127.0.0.1:18080/
      server_conf: |
        location = /sidecar {
          return 200 "server-conf-ok";
        }

- name: _verify | Settle the nginxverifyserverconf vhost
  import_tasks: _verify_wait_route.yml
  vars:
    _wait_route_host: "nginxverifyserverconf.{{ inventory_hostname }}.{{ domain }}"

- name: _verify | A server_conf snippet adds a working sibling location
  uri:
    url: "https://nginxverifyserverconf.{{ inventory_hostname }}.{{ domain }}/sidecar"
    validate_certs: false
    return_content: true
    status_code: 200
  register: nginx_verify_serverconf
  failed_when: >-
    nginx_verify_serverconf.status != 200
    or 'server-conf-ok' not in (nginx_verify_serverconf.content | default(''))

# The first-class client_max_body_size / client_body_buffer_size keys.
# Configuring the vhost proves both render into valid config (the helper's
# nginx -t gates a typo'd directive name); the 413 below proves the size limit
# is enforced before the body reaches the upstream. No auth needed.
- name: _verify | Configure a vhost with body-size limits
  import_role:
    name: nginx
    tasks_from: site
  vars:
    nginx_site_args:
      subdomain: nginxverifybody
      proxy_pass: http://127.0.0.1:18080/
      client_max_body_size: 1k
      client_body_buffer_size: 2k

- name: _verify | Settle the nginxverifybody vhost
  import_tasks: _verify_wait_route.yml
  vars:
    _wait_route_host: "nginxverifybody.{{ inventory_hostname }}.{{ domain }}"

- name: _verify | A body over client_max_body_size is rejected with 413
  uri:
    url: "https://nginxverifybody.{{ inventory_hostname }}.{{ domain }}/"
    method: POST
    body: "{{ 'x' * 4096 }}"
    validate_certs: false
    status_code: 413
  register: nginx_verify_body
  failed_when: nginx_verify_body.status != 413

# proxy_buffering / proxy_request_buffering take the quoted string 'on'/'off' (a
# bare off is YAML-coerced to the boolean false and renders an invalid
# `proxy_buffering false;`). The quoted form must pass the new string-toggle
# assert AND render into config the helper's nginx -t accepts; the proxied 200
# confirms the site is live. No auth needed.
- name: _verify | Configure a vhost with proxy buffering toggled off
  import_role:
    name: nginx
    tasks_from: site
  vars:
    nginx_site_args:
      subdomain: nginxverifybuffering
      proxy_pass: http://127.0.0.1:18080/
      proxy_buffering: "off"
      proxy_request_buffering: "off"

- name: _verify | Settle the nginxverifybuffering vhost
  import_tasks: _verify_wait_route.yml
  vars:
    _wait_route_host: "nginxverifybuffering.{{ inventory_hostname }}.{{ domain }}"

- name: _verify | The proxy-buffering vhost serves the proxied response
  uri:
    url: "https://nginxverifybuffering.{{ inventory_hostname }}.{{ domain }}/"
    validate_certs: false
    return_content: true
    status_code: 200
  register: nginx_verify_buffering
  failed_when: >-
    nginx_verify_buffering.status != 200
    or 'nginx_verify_upstream_ok' not in (nginx_verify_buffering.content | default(''))

# The csp_default_src / csp_frame_ancestors / csp_additional keys compose into
# the Content-Security-Policy header (site.conf.j2). Only
# csp_passthrough was tested; assert each override token actually lands in the
# rendered header, so a positioning/";" regression on the unifi consumer (the
# real csp_* user) surfaces here. No auth needed.
- name: _verify | Configure a vhost with CSP overrides
  import_role:
    name: nginx
    tasks_from: site
  vars:
    nginx_site_args:
      subdomain: nginxverifycsp
      proxy_pass: http://127.0.0.1:18080/
      csp_additional: connect-src api.csptest
      csp_default_src: default.csptest
      csp_frame_ancestors: https://frame.csptest

- name: _verify | Settle the nginxverifycsp vhost
  import_tasks: _verify_wait_route.yml
  vars:
    _wait_route_host: "nginxverifycsp.{{ inventory_hostname }}.{{ domain }}"

- name: _verify | CSP override tokens all appear in the Content-Security-Policy header
  uri:
    url: "https://nginxverifycsp.{{ inventory_hostname }}.{{ domain }}/"
    validate_certs: false
    status_code: 200
  register: nginx_verify_cspov
  failed_when: >-
    nginx_verify_cspov.status != 200
    or 'connect-src api.csptest' not in (nginx_verify_cspov.content_security_policy | default(''))
    or 'default-src default.csptest' not in (nginx_verify_cspov.content_security_policy | default(''))
    or 'frame-ancestors https://frame.csptest' not in (nginx_verify_cspov.content_security_policy | default(''))

# csp_passthrough + enable_http on one auth-less vhost: confirm :80 serves
# cleartext without a redirect, and that csp_passthrough emits no CSP header
# (letting the upstream's own through).
- name: _verify | Configure a plaintext, CSP-passthrough vhost
  import_role:
    name: nginx
    tasks_from: site
  vars:
    nginx_site_args:
      subdomain: nginxverifyplain
      proxy_pass: http://127.0.0.1:18080/
      enable_http: true
      csp_passthrough: true

- name: _verify | Settle the nginxverifyplain vhost
  import_tasks: _verify_wait_route.yml
  vars:
    _wait_route_host: "nginxverifyplain.{{ inventory_hostname }}.{{ domain }}"

- name: _verify | The enable_http listener serves :80 in cleartext without a redirect
  uri:
    url: "http://{{ ansible_default_ipv4.address }}/"
    headers:
      Host: "nginxverifyplain.{{ inventory_hostname }}.{{ domain }}"
    follow_redirects: none
    return_content: true
    status_code: 200
  register: nginx_verify_plain80
  failed_when: >-
    nginx_verify_plain80.status != 200
    or 'nginx_verify_upstream_ok' not in (nginx_verify_plain80.content | default(''))

- name: _verify | A csp_passthrough vhost emits no Content-Security-Policy header
  uri:
    url: "https://nginxverifyplain.{{ inventory_hostname }}.{{ domain }}/"
    validate_certs: false
    status_code: 200
  register: nginx_verify_csp
  failed_when: >-
    nginx_verify_csp.status != 200
    or nginx_verify_csp.content_security_policy is defined

# The nginx_ipv6 path (host_vars/fox.yml only, never in the test matrix)
# renders [::]-listeners in site.conf.j2 / nginx.conf.j2 that nothing
# else exercises. The firewall role's disable_ipv6 sysctl does NOT run in the
# nginx test path, so the box VM has IPv6 live and we can bind + probe it for
# real. Setting nginx_ipv6 only on this call adds `listen [::]:443 ssl` to this
# vhost; it becomes the only server on that socket, so a [::1] probe reaches it.
# No auth -- this exercises the listener, not the auth flow (covered above).
- name: _verify | Configure an IPv6-enabled vhost
  import_role:
    name: nginx
    tasks_from: site
  vars:
    nginx_ipv6: true
    nginx_site_args:
      subdomain: nginxverifyipv6
      proxy_pass: http://127.0.0.1:18080/

- name: _verify | Settle the nginxverifyipv6 vhost over IPv6
  import_tasks: _verify_wait_route.yml
  vars:
    _wait_route_host: "nginxverifyipv6.{{ inventory_hostname }}.{{ domain }}"

- name: _verify | The [::]:443 listener serves the vhost over ::1
  uri:
    url: "https://nginxverifyipv6.{{ inventory_hostname }}.{{ domain }}/"
    validate_certs: false
    return_content: true
    status_code: 200
  register: nginx_verify_ipv6
  failed_when: >-
    nginx_verify_ipv6.status != 200
    or 'nginx_verify_upstream_ok' not in (nginx_verify_ipv6.content | default(''))

# A state: absent call against a site that never existed must be a clean no-op:
# the otgw tombstone in main.yml runs on every fresh host, where the site was
# never created, so it must NOT report changed (which would fire a spurious
# reload every converge). The teardown loop below only removes sites this run
# created, so it can't cover the absent-of-absent path -- this does.
- name: _verify | A state:absent on a never-created site is a no-op
  import_role:
    name: nginx
    tasks_from: site
  vars:
    nginx_site_args:
      subdomain: nginxverifyneverexisted
      state: absent

- name: _verify | The never-created removal reported no change
  assert:
    that:
      - not nginxverifyneverexisted_site_result.changed
    fail_msg: >-
      state: absent on a never-created site reported changed=true; a tombstone
      call on a fresh host must be a clean no-op or it fires a spurious reload.

# A site retired under an older naming convention can carry an underscore (e.g.
# homeassistant's vscode_ha tombstone), which is not a valid DNS label. A state:
# absent teardown must still accept it -- the DNS-label assert is gated to
# present, so only the weaker path-safety check applies -- or the tombstone
# breaks the consuming role's converge on every host not yet cleaned.
- name: _verify | A state:absent on an underscore (legacy) subdomain is accepted
  import_role:
    name: nginx
    tasks_from: site
  vars:
    nginx_site_args:
      subdomain: nginx_verify_legacy
      state: absent

- name: _verify | The underscore tombstone reported no change
  assert:
    that:
      - not nginx_verify_legacy_site_result.changed
    fail_msg: >-
      state: absent on an underscore subdomain reported changed=true or tripped
      the DNS-label assert; a legacy tombstone (e.g. vscode_ha) must be a clean
      no-op.

# condition: false gates change application but must still DEFINE the per-site
# result fact (so a caller wiring a reload off <sub>_site_result doesn't hit an
# undefined var on a host where condition gated the site off) and must write
# nothing to disk. Neither contract is exercised by the create tests above.
- name: _verify | Configure a vhost with condition false
  import_role:
    name: nginx
    tasks_from: site
  vars:
    nginx_site_args:
      subdomain: nginxverifycond
      proxy_pass: http://127.0.0.1:18080/
      condition: false

- name: _verify | Condition false still defines the result fact as unchanged
  assert:
    that:
      - nginxverifycond_site_result is defined
      - not nginxverifycond_site_result.changed
    fail_msg: >-
      condition: false must still define <sub>_site_result (changed=false), or a
      caller wiring a reload off it crashes on the host where condition gated the
      site off; got {{ nginxverifycond_site_result | default('<undefined>') }}.

- name: _verify | Condition false wrote no vhost to disk
  stat:
    path: /etc/nginx/sites-available/nginxverifycond
  register: nginx_verify_cond_file
  become: true
  failed_when: nginx_verify_cond_file.stat.exists

# reload: false installs the vhost config-only (write + symlink + in-place nginx
# -t) but does NOT reload, so the running nginx keeps its old config -- the
# pre-warm-an-unready-upstream contract. Prove it: the file lands and validates
# (a broken render would have failed the helper's nginx -t regardless of reload),
# yet a :80 probe still falls through to the default server (404) because no
# reload made the vhost live. No _verify_wait_route here -- it would poll for a
# route that, by design, never appears without a reload.
- name: _verify | Configure a vhost with reload false
  import_role:
    name: nginx
    tasks_from: site
  vars:
    nginx_site_args:
      subdomain: nginxverifyreload
      proxy_pass: http://127.0.0.1:18080/
      reload: false

- name: _verify | Reload false wrote and enabled the vhost on disk
  stat:
    path: "{{ item }}"
  register: nginx_verify_reload_files
  become: true
  failed_when: not nginx_verify_reload_files.stat.exists
  loop:
    - /etc/nginx/sites-available/nginxverifyreload
    - /etc/nginx/sites-enabled/nginxverifyreload

- name: _verify | Reload false leaves the vhost not yet served (default server 404)
  uri:
    url: "http://{{ ansible_default_ipv4.address }}/"
    headers:
      Host: "nginxverifyreload.{{ inventory_hostname }}.{{ domain }}"
    follow_redirects: none
    status_code: 404
  register: nginx_verify_reload_probe
  failed_when: nginx_verify_reload_probe.status != 404

# Tear down the reload:false vhost (with a reload this time) so it doesn't leak
# into later probes; the condition:false call wrote nothing, so nothing to remove.
- name: _verify | Remove the reload-false vhost
  import_role:
    name: nginx
    tasks_from: site
  vars:
    nginx_site_args:
      subdomain: nginxverifyreload
      state: absent

# state: absent — tear down the transient vhosts via the helper and confirm both
# the symlink and the config are gone. This is the contract the otgw / vscode_ha
# tombstones rely on to stay decommissioned on a fresh install. include_tasks
# (not import_role) so nginx_site_args re-evaluates per loop iteration.
- name: _verify | Remove the transient test vhosts via the nginx_site helper
  include_tasks:
    file: site.yml
  vars:
    nginx_site_args:
      subdomain: "{{ item }}"
      state: absent
  loop:
    - nginxverify
    - nginxverifyauth
    - nginxverifyloc
    - nginxverifyserverconf
    - nginxverifyplain
    - nginxverifyempty
    - nginxverifybody
    - nginxverifybuffering
    - nginxverifycsp
    - nginxverifyipv6
  loop_control:
    label: "{{ item }}"

- name: _verify | Removed vhost configs and symlinks are gone
  stat:
    path: "{{ item }}"
  register: nginx_verify_removed
  loop:
    - /etc/nginx/sites-available/nginxverify
    - /etc/nginx/sites-enabled/nginxverify
    - /etc/nginx/sites-available/nginxverifyauth
    - /etc/nginx/sites-enabled/nginxverifyauth
    - /etc/nginx/conf.d/upstream_auth_nginxverifyauth.conf
    - /etc/nginx/sites-available/nginxverifyloc
    - /etc/nginx/sites-enabled/nginxverifyloc
    - /etc/nginx/sites-available/nginxverifyserverconf
    - /etc/nginx/sites-enabled/nginxverifyserverconf
    - /etc/nginx/sites-available/nginxverifyplain
    - /etc/nginx/sites-enabled/nginxverifyplain
    - /etc/nginx/sites-available/nginxverifyempty
    - /etc/nginx/sites-enabled/nginxverifyempty
    - /etc/nginx/sites-available/nginxverifybody
    - /etc/nginx/sites-enabled/nginxverifybody
    - /etc/nginx/sites-available/nginxverifybuffering
    - /etc/nginx/sites-enabled/nginxverifybuffering
    - /etc/nginx/sites-available/nginxverifycsp
    - /etc/nginx/sites-enabled/nginxverifycsp
    - /etc/nginx/sites-available/nginxverifyipv6
    - /etc/nginx/sites-enabled/nginxverifyipv6
  become: true
  failed_when: nginx_verify_removed.stat.exists

# No post-removal HTTP probe: a request fired immediately after the reload races
# nginx's draining old workers (which still hold the removed vhost) and follows
# their 308 to an https URL the snakeoil cert doesn't cover. The stat above is
# the deterministic check that the state: absent contract removed both files.

# conf_d state: absent -- the tombstone path (mirrors site.yml's retired-site
# handling) is otherwise untested. Two contracts: a tombstone for a never-created
# drop must be a clean no-op (changed=false, or it fires a spurious host-wide
# reload every converge), and a create-then-remove must delete the file.
- name: _verify | A conf_d state:absent on a never-created drop is a no-op
  import_role:
    name: nginx
    tasks_from: conf_d
  vars:
    nginx_conf_d_args:
      name: test_nginx_verify_absent.conf
      state: absent

- name: _verify | The never-created conf_d removal reported no change
  assert:
    that:
      - not test_nginx_verify_absent_conf_result.changed
    fail_msg: >-
      conf_d state: absent on a never-created drop reported changed=true; a
      tombstone on a fresh host must be a clean no-op or it fires a spurious
      reload every converge.

- name: _verify | Create a conf_d drop to remove
  import_role:
    name: nginx
    tasks_from: conf_d
  vars:
    nginx_conf_d_args:
      name: test_nginx_verify_absent.conf
      content: "# nginx _verify conf_d absent-path fixture\n"

- name: _verify | The conf_d drop exists before removal
  stat:
    path: /etc/nginx/conf.d/test_nginx_verify_absent.conf
  register: nginx_verify_confd_present
  become: true
  failed_when: not nginx_verify_confd_present.stat.exists

- name: _verify | Remove the conf_d drop via state absent
  import_role:
    name: nginx
    tasks_from: conf_d
  vars:
    nginx_conf_d_args:
      name: test_nginx_verify_absent.conf
      state: absent

- name: _verify | The removed conf_d drop is gone
  stat:
    path: /etc/nginx/conf.d/test_nginx_verify_absent.conf
  register: nginx_verify_confd_gone
  become: true
  failed_when: nginx_verify_confd_gone.stat.exists

# conf_d src: (file) input -- _verify otherwise only drives conf_d with `content`
# (the broken-drop and absent tests). The src branch is exercised in prod by
# install.yml's status.conf drop but never asserted here, so a regression in the
# src/content default(omit) dance would pass every test. Drop a fixture file by
# src, confirm its content actually landed, then remove it.
- name: _verify | Install a conf_d drop via the src (file) input
  import_role:
    name: nginx
    tasks_from: conf_d
  vars:
    nginx_conf_d_args:
      name: test_nginx_verify_src.conf
      src: test_verify_drop.conf

- name: _verify | Read the src-dropped conf_d file
  slurp:
    path: /etc/nginx/conf.d/test_nginx_verify_src.conf
  register: nginx_verify_src_drop
  become: true

- name: _verify | The src-dropped conf_d file carries the fixture content
  assert:
    that:
      - "'__nginx_verify_src_marker__' in (nginx_verify_src_drop.content | b64decode)"
    fail_msg: >-
      The conf_d src: input did not copy the fixture content;
      /etc/nginx/conf.d/test_nginx_verify_src.conf is missing the marker.

- name: _verify | Remove the src-dropped conf_d file
  import_role:
    name: nginx
    tasks_from: conf_d
  vars:
    nginx_conf_d_args:
      name: test_nginx_verify_src.conf
      state: absent

# src and content are mutually exclusive (conf_d asserts exactly one). Drive the
# assert to its failure direction; the helper's failure is expected, so catch it
# and confirm it was THIS assert that fired (not some unrelated error).
- name: _verify | Both src and content together fail the mutual-exclusion assert
  block:
    - name: _verify | Configure a conf_d drop with both src and content
      import_role:
        name: nginx
        tasks_from: conf_d
      vars:
        nginx_conf_d_args:
          name: test_nginx_verify_both.conf
          src: test_verify_drop.conf
          content: "# both set -- must be rejected\n"

    - name: _verify | Passing both src and content must fail (unexpected success)
      fail:
        msg: >-
          conf_d accepted both src and content; the mutual-exclusion assert
          should have failed.
  rescue:
    - name: _verify | The failure was the src/content mutual-exclusion assert
      assert:
        that:
          - "'exactly one of src/content' in (ansible_failed_task.name | default(''))"
        fail_msg: >-
          Expected the src/content mutual-exclusion assert to fail, but a
          different task failed: {{ ansible_failed_task.name | default('<unknown>') }}.

# conf_d rollback — feed the helper a syntactically broken drop and confirm the
# place-validate-rollback removes it. A broken file left under conf.d/ would
# brick the next host-wide reload for every vhost, so this is the role's
# highest-blast-radius safety net; the helper's `fail` is expected, so catch it.
- name: _verify | Broken conf.d drop is validated and rolled back
  block:
    - name: _verify | Install a deliberately broken conf.d drop
      import_role:
        name: nginx
        tasks_from: conf_d
      vars:
        nginx_conf_d_args:
          name: test_nginx_verify_broken.conf
          content: "nginx_verify_broken_directive on;"

    - name: _verify | Broken conf.d drop must fail validation (unexpected success)
      fail:
        msg: >-
          The broken conf.d drop should have failed `nginx -t` and rolled back,
          but the helper reported success.
  rescue:
    - name: _verify | Broken conf.d drop was rolled back (file absent)
      stat:
        path: /etc/nginx/conf.d/test_nginx_verify_broken.conf
      register: nginx_verify_broken_drop
      become: true
      failed_when: nginx_verify_broken_drop.stat.exists

    - name: _verify | Nginx config is still valid after the rollback
      command: nginx -t
      changed_when: false
      become: true

# site rollback — the sibling of the conf.d test for the site path, which the
# shared place-validate rollback now drives too. Feed the helper a vhost with a
# syntactically broken server_conf AND an upstream_authorization map, so the
# rollback must unwind the paired conf.d/upstream_auth_<sub>.conf alongside the
# vhost; confirm the config, its sites-enabled symlink and the map are all
# removed and nginx stays valid; the helper's `fail` is expected, so catch it.
- name: _verify | Broken site config is validated and rolled back
  block:
    - name: _verify | Configure a deliberately broken site
      import_role:
        name: nginx
        tasks_from: site
      vars:
        nginx_site_args:
          subdomain: nginxverifybroken
          proxy_pass: http://127.0.0.1:18080/
          auth: required
          upstream_authorization:
            nginxverifyuser: Token broken-rollback
          server_conf: |
            nginx_verify_broken_site_directive on;

    - name: _verify | Broken site must fail validation (unexpected success)
      fail:
        msg: >-
          The broken site should have failed `nginx -t` and rolled back, but the
          helper reported success.
  rescue:
    - name: _verify | Broken site, symlink and upstream-auth map were rolled back (absent)
      stat:
        path: "{{ item }}"
      register: nginx_verify_broken_site
      become: true
      failed_when: nginx_verify_broken_site.stat.exists
      loop:
        - /etc/nginx/sites-available/nginxverifybroken
        - /etc/nginx/sites-enabled/nginxverifybroken
        - /etc/nginx/conf.d/upstream_auth_nginxverifybroken.conf

    - name: _verify | Nginx config is still valid after the site rollback
      command: nginx -t
      changed_when: false
      become: true

# enable_http is asserted incompatible with auth/bypass -- :80 is cleartext, so
# an auth flow or vaulted token would travel unencrypted. Drive
# that safety assert to its FAILURE direction (the create-tests above only ever
# feed it valid inputs): the asserts run before any write, so there's nothing to
# roll back; the helper's failure is expected, so catch it and confirm it was
# THIS assert that fired (not some unrelated error masquerading as success).
- name: _verify | Reject enable_http when combined with auth (assert must fire)
  block:
    - name: _verify | Configure an enable_http + auth vhost (must fail the assert)
      import_role:
        name: nginx
        tasks_from: site
      vars:
        nginx_site_args:
          subdomain: nginxverifyhttpauth
          proxy_pass: http://127.0.0.1:18080/
          enable_http: true
          auth: required

    - name: _verify | Combining enable_http and auth must fail validation (unexpected success)
      fail:
        msg: >-
          enable_http + auth: required should have failed the site assert
          (cleartext :80 would carry the auth flow), but the helper accepted it.
  rescue:
    - name: _verify | The failure was the enable_http/auth assert (not something else)
      assert:
        that:
          - "'enable_http' in (ansible_failed_task.name | default(''))"
        fail_msg: >-
          Expected the enable_http/auth incompatibility assert to fail, but a
          different task failed: {{ ansible_failed_task.name | default('<unknown>') }}.
