# otgw was the OpenTherm Gateway at 10.123.4.3; device decommissioned
# (the IP now belongs to a Philips AC0850). Kept as a tombstone so a
# fresh install also removes the retired site.
- name: Configure nginx static sites (otgw — retired)
  import_tasks: site.yml
  vars:
    nginx_site_args:
      subdomain: otgw
      state: absent
      reload: "{{ not (ansible_check_mode and nginx_apt.changed) }}"
  tags:
    - nginx
