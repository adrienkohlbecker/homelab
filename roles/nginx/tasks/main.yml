- name: Configure nginx static sites (marantz)
  import_tasks: site.yml
  vars:
    nginx_site_args:
      subdomain: marantz
      proxy_pass: https://{{ external_ips.marantz }}:10443/
      reload: "{{ not (ansible_check_mode and nginx_apt.changed) }}"
      # Device firmware login still in front; Authelia adds
      # defense-in-depth at the perimeter — accept the second click.
      auth: required
  tags:
    - nginx

- name: Configure nginx static sites (printer)
  import_tasks: site.yml
  vars:
    nginx_site_args:
      subdomain: printer
      proxy_pass: http://{{ external_ips.printer }}:80/
      reload: "{{ not (ansible_check_mode and nginx_apt.changed) }}"
      auth: required
  tags:
    - nginx

