- name: Configure nginx static sites (unifi)
  import_tasks: site.yml
  vars:
    nginx_site_args:
      subdomain: unifi
      proxy_pass: https://{{ external_ips.udm }}:443/
      csp_additional: connect-src api.mapbox.com ui.com *.ui.com {{ nginx_csp_default }}
      csp_default_src: ui.com *.ui.com
      reload: "{{ not (ansible_check_mode and nginx_apt.changed) }}"
  tags:
    - nginx

