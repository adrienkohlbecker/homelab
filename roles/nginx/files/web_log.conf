
# vim:ft=yaml
jobs:
  - name: nginx
    autodetection_retry: 60
    path: /var/log/nginx/access.log
    # Response-time distribution buckets (ms). nginx logs $request_time; the
    # collector's histogram option buckets that one field for p50/p95-style
    # latency visibility per vhost. ($upstream_response_time is still collected
    # as its own metric, but the histogram option does not bucket it.)
    histogram: [10, 50, 100, 250, 500, 1000, 5000]
    log_type: csv
    csv_config:
      # Positional mirror of `log_format custom` in templates/nginx.conf.j2.
      # The collector keys the vhost dimension off $host, so it must sit where
      # nginx emits $host (the FQDN), not where it emits $server_name (the bare
      # subdomain). Fields the collector doesn't recognise ($remote_user,
      # $server_name, $http_referer, $http_user_agent, and the Authelia
      # $authelia_user/$authelia_groups pair) are placeholdered with `-` to hold
      # their column position; $ssl_protocol/$ssl_cipher feed the TLS charts.
      format: '$remote_addr - - [$time_local] $host "$request" - $status $body_bytes_sent $request_length $request_time $upstream_response_time "-" "-" "-" "-" $ssl_protocol $ssl_cipher'
