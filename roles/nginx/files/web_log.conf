
# vim:ft=yaml
jobs:
  - name: nginx
    autodetection_retry: 60
    path: /var/log/nginx/access.log
    # Response-time distribution buckets (ms). nginx already logs $request_time
    # and $upstream_response_time; this surfaces them as latency histogram
    # charts (p50/p95-style visibility) per vhost.
    histogram: [10, 50, 100, 250, 500, 1000, 5000]
    log_type: csv
    csv_config:
      format: '$remote_addr - - [$time_local] - "$request" $host $status $body_bytes_sent $request_length $request_time $upstream_response_time "-" "-"'
