# Test fixture: stand up the bits the role expects on the host.
#
# qemu-system-x86 is installed on every arch so systemd-analyze can validate
# the direct QEMU unit even on aarch64 hosts with TCG. main.yml selects qemu
# under the qemu_test fixture so the role stays clear of /dev/kvm.

- name: _setup | Install QEMU dependencies
  apt:
    pkg:
      - dmg2img
      - ovmf
      - qemu-block-extra
      - qemu-utils
      - qemu-system-x86
    cache_valid_time: 3600
  become: true
