# Downloads:
#   - OpenCore.qcow2 (19 MiB) — EFI bootloader image. The role fetches a
#     pristine pinned copy into _artifacts/, then copies it ONCE per VM into
#     the per-VM workdir. The per-VM copy holds OpenCore NVRAM (incl. iCloud
#     activation tokens) and must never be overwritten.
#   - fetch-macOS-v2.py — Apple's swcdn fetcher from OSX-KVM. Run once per VM
#     to materialise BaseSystem.dmg + .chunklist into the workdir for the
#     Recovery installer.
#
# All three are gated with `creates:` so re-runs are idempotent without
# changed_when:false lying.

- name: artifacts | Create artifacts cache dir
  file:
    path: "{{ macos_vm_artifacts_dir }}"
    state: directory
    owner: libvirt-qemu
    group: kvm
    mode: "0755"
  become: true
  register: macos_vm_artifacts_dir_result

- name: artifacts | Create per-VM workdir
  file:
    path: "{{ macos_vm_workdir }}"
    state: directory
    owner: libvirt-qemu
    group: kvm
    mode: "0755"
  become: true
  register: macos_vm_workdir_result

- name: artifacts | Fetch pinned OpenCore.qcow2
  # Skip in check mode if the dir was just (notionally) created; in check
  # mode the dir doesn't actually exist on disk so get_url's destination
  # check fails. On a real run the dir is real and the task proceeds.
  when: not (ansible_check_mode and macos_vm_artifacts_dir_result.changed)
  get_url:
    url: "{{ macos_vm_opencore_qcow2_url }}"
    dest: "{{ macos_vm_artifacts_dir }}/OpenCore.qcow2"
    checksum: "sha256:{{ macos_vm_opencore_qcow2_sha256 }}"
    owner: libvirt-qemu
    group: kvm
    mode: "0644"
  become: true

- name: artifacts | Stage OpenCore patch helper
  when: not ansible_check_mode
  copy:
    src: patch_opencore_config.py
    dest: "{{ macos_vm_artifacts_dir }}/patch_opencore_config.py"
    owner: root
    group: root
    mode: "0755"
    backup: true
  become: true

- name: artifacts | Create config-patched OpenCore cache image
  when: not ansible_check_mode
  ansible.builtin.command:
    argv:
      - cp
      - --reflink=auto
      - "{{ macos_vm_artifacts_dir }}/OpenCore.qcow2"
      - "{{ macos_vm_artifacts_dir }}/OpenCore.{{ macos_vm_opencore_config_id }}.qcow2"
    creates: "{{ macos_vm_artifacts_dir }}/OpenCore.{{ macos_vm_opencore_config_id }}.qcow2"
  become: true
  register: macos_vm_opencore_config_image

- name: artifacts | Patch OpenCore config defaults into cache image
  when: macos_vm_opencore_config_image.changed
  block:
    - name: artifacts | Load nbd kernel module
      modprobe:
        name: nbd
        params: max_part=8
      become: true

    - name: artifacts | Create OpenCore patch mountpoint
      tempfile:
        state: directory
        suffix: macos-vm-opencore
      become: true
      register: macos_vm_opencore_mount

    - name: artifacts | Clear OpenCore patch nbd device
      ansible.builtin.command:
        argv:
          - qemu-nbd
          - --disconnect
          - "{{ macos_vm_opencore_patch_nbd_device }}"
      become: true
      failed_when: false
      changed_when: false

    - name: artifacts | Attach locale OpenCore image
      ansible.builtin.command:
        argv:
          - qemu-nbd
          - "--connect={{ macos_vm_opencore_patch_nbd_device }}"
          - "{{ macos_vm_artifacts_dir }}/OpenCore.{{ macos_vm_opencore_config_id }}.qcow2"
      become: true
      changed_when: true

    - name: artifacts | Wait for OpenCore EFI partition
      wait_for:
        path: "{{ macos_vm_opencore_patch_nbd_device }}p1"
        state: present
        timeout: 10

    - name: artifacts | Mount OpenCore EFI partition
      ansible.builtin.command:
        argv:
          - mount
          - -o
          - rw
          - "{{ macos_vm_opencore_patch_nbd_device }}p1"
          - "{{ macos_vm_opencore_mount.path }}"
      become: true
      changed_when: true

    - name: artifacts | Patch OpenCore recovery locale defaults
      ansible.builtin.command:
        argv:
          - python3
          - "{{ macos_vm_artifacts_dir }}/patch_opencore_config.py"
          - "{{ macos_vm_opencore_mount.path }}/EFI/OC/config.plist"
          - --prev-lang-kbd
          - "{{ macos_vm_opencore_prev_lang_kbd }}"
          - --apple-locale
          - "{{ macos_vm_opencore_apple_locale }}"
          - --boot-args
          - "{{ macos_vm_opencore_boot_args }}"
      become: true
      register: macos_vm_opencore_config_patch
      changed_when: "'changed' in macos_vm_opencore_config_patch.stdout"

    - name: artifacts | Flush OpenCore config image writes
      ansible.builtin.command:
        argv:
          - sync
      become: true
      changed_when: false

  always:
    - name: artifacts | Unmount OpenCore patch mountpoint
      when: macos_vm_opencore_mount.path is defined
      ansible.builtin.command:
        argv:
          - umount
          - "{{ macos_vm_opencore_mount.path }}"
      become: true
      failed_when: false
      changed_when: false

    - name: artifacts | Detach OpenCore patch image
      ansible.builtin.command:
        argv:
          - qemu-nbd
          - --disconnect
          - "{{ macos_vm_opencore_patch_nbd_device }}"
      become: true
      failed_when: false
      changed_when: false

    - name: artifacts | Remove OpenCore patch mountpoint
      when: macos_vm_opencore_mount.path is defined
      file:
        path: "{{ macos_vm_opencore_mount.path }}"
        state: absent
      become: true

- name: artifacts | Set config OpenCore cache image ownership
  when: not ansible_check_mode
  file:
    path: "{{ macos_vm_artifacts_dir }}/OpenCore.{{ macos_vm_opencore_config_id }}.qcow2"
    owner: libvirt-qemu
    group: kvm
    mode: "0644"
  become: true

- name: artifacts | Stage per-VM OpenCore.qcow2 working copy  # noqa: require-backup
  # Copy from the cache only on first install. Once the VM has booted, this
  # qcow2 holds NVRAM (incl. iCloud activation) — overwriting it logs the
  # guest out of Apple services. To intentionally re-pristine, delete the
  # workdir manually first.
  when:
    - not ansible_check_mode
  copy:
    src: "{{ macos_vm_artifacts_dir }}/OpenCore.{{ macos_vm_opencore_config_id }}.qcow2"
    dest: "{{ macos_vm_workdir }}/OpenCore.qcow2"
    remote_src: true
    owner: libvirt-qemu
    group: kvm
    mode: "0644"
    force: false
  become: true

- name: artifacts | Stage fetch-macOS script
  when:
    - macos_vm_install_mode
    - not (ansible_check_mode and macos_vm_artifacts_dir_result.changed)
  get_url:
    url: "{{ macos_vm_fetch_macos_url }}"
    dest: "{{ macos_vm_artifacts_dir }}/fetch-macOS-v2.py"
    checksum: "sha256:{{ macos_vm_fetch_macos_sha256 }}"
    owner: root
    group: root
    mode: "0755"
  become: true

- name: artifacts | Install python deps for fetch-macOS
  when: macos_vm_install_mode
  apt:
    pkg:
      - python3-requests
    cache_valid_time: 3600
  become: true

- name: artifacts | Fetch BaseSystem recovery image
  when:
    - macos_vm_install_mode
    - not (ansible_check_mode and (macos_vm_artifacts_dir_result.changed or macos_vm_workdir_result.changed))
  ansible.builtin.command:
    # fetch-macOS-v2.py calls os.get_terminal_size() while verifying the
    # chunklist, so give it a pseudo-terminal even though Ansible is non-TTY.
    argv:
      - script
      - -q
      - -e
      - -c
      - >-
        python3 {{ macos_vm_artifacts_dir }}/fetch-macOS-v2.py
        --action download
        --board-id {{ macos_vm_recovery_product.board_id }}
        --mlb {{ macos_vm_recovery_product.mlb }}
        --os-type {{ macos_vm_recovery_product.os_type }}
        --outdir {{ macos_vm_workdir }}
      - /dev/null
    chdir: "{{ macos_vm_workdir }}"
    creates: "{{ macos_vm_workdir }}/BaseSystem.dmg"
  become: true
  register: macos_vm_basesystem_result
  vars:
    macos_vm_recovery_product: "{{ macos_vm_recovery_products[macos_vm_macos_version] }}"
    # Keep these in sync with fetch-macOS-v2.py's product menu. `--shortname`
    # is ignored when `--action download` is passed, so provide the resolved
    # board/MLB/os_type tuple directly.
    # 15 = Sequoia, 14 = Sonoma, 13 = Ventura. Add new entries here.
    macos_vm_recovery_products:
      "15":
        board_id: Mac-7BA5B2D9E42DDD94
        mlb: "00000000000000000"
        os_type: default
      "14":
        board_id: Mac-827FAC58A8FDFA22
        mlb: "00000000000000000"
        os_type: default
      "13":
        board_id: Mac-4B682C642B45593E
        mlb: "00000000000000000"
        os_type: latest

- name: artifacts | Convert BaseSystem DMG to raw image
  when:
    - macos_vm_install_mode
    - not (ansible_check_mode and (macos_vm_workdir_result.changed or macos_vm_basesystem_result.changed | default(false)))
  ansible.builtin.command:
    cmd: >
      qemu-img convert
      -f dmg
      -O raw
      {{ macos_vm_workdir }}/BaseSystem.dmg
      {{ macos_vm_workdir }}/BaseSystem.img
    creates: "{{ macos_vm_workdir }}/BaseSystem.img"
  become: true
  register: macos_vm_basesystem_convert_result

- name: artifacts | Set BaseSystem ownership for libvirt-qemu
  when:
    - macos_vm_install_mode
    - not (ansible_check_mode and macos_vm_workdir_result.changed)
    - not (ansible_check_mode and (macos_vm_basesystem_result.changed | default(false)))
    - not (ansible_check_mode and (macos_vm_basesystem_convert_result.changed | default(false)))
  file:
    path: "{{ item }}"
    owner: libvirt-qemu
    group: kvm
    mode: "0644"
  loop:
    - "{{ macos_vm_workdir }}/BaseSystem.dmg"
    - "{{ macos_vm_workdir }}/BaseSystem.img"
    - "{{ macos_vm_workdir }}/BaseSystem.chunklist"
  become: true
