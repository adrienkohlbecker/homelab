- name: Apply qemu test fixture values
  when: qemu_test | bool
  set_fact:
    macos_vm_install_mode: false
    macos_vm_domain_type: qemu
  tags:
    - macos_vm

- name: Validate inputs
  assert:
    that:
      - macos_vm_name | length > 0
      - zfs_root | bool
      - zfs_dozer_filesystem | length > 0
      - macos_vm_zvol_dataset | length > 0
      - macos_vm_zvol_size | length > 0
      - (macos_vm_zvol_size | human_to_bytes | int) > 0
      - macos_vm_macos_version | length > 0
      - macos_vm_network_mode == 'nat'
      - macos_vm_domain_type in ['kvm', 'qemu']
      - macos_vm_vcpus | int >= 1
      - macos_vm_memory_mib | int >= 4096
      - macos_vm_ssh_host_listen | length > 0
      - macos_vm_ssh_host_port | int > 0
      - macos_vm_ssh_host_port | int < 65536
      - macos_vm_opencore_prev_lang_kbd is match('^[A-Za-z]{2}(-[A-Za-z]{2})?:[0-9]+$')
      - macos_vm_opencore_apple_locale is match('^[a-z]{2}_[A-Z]{2}$')
      - macos_vm_opencore_boot_args | length > 0
      - macos_vm_vnc_keymap | length > 0
    fail_msg: |
      macos_vm requires macos_vm_zvol_dataset and macos_vm_zvol_size on a ZFS
      host with non-empty zfs_dozer_filesystem.
  tags:
    - macos_vm

- name: Install QEMU runtime dependencies
  apt:
    pkg:
      - dmg2img
      - ovmf
      - qemu-block-extra
      - qemu-system-x86
      - qemu-utils
    cache_valid_time: 3600
  become: true
  tags:
    - macos_vm

- name: Compute OpenCore config image id
  set_fact:
    macos_vm_opencore_config_id: >-
      {{ (macos_vm_opencore_prev_lang_kbd ~ '|' ~ macos_vm_opencore_apple_locale ~ '|' ~ macos_vm_opencore_boot_args) | hash('sha1') }}
  tags:
    - macos_vm

- name: Compute MAC address
  set_fact:
    macos_vm_resolved_mac: >-
      {{ macos_vm_mac_address if (macos_vm_mac_address | length > 0)
         else ('52:54:00' | random_mac(seed=inventory_hostname ~ '/' ~ macos_vm_name)) }}
  tags:
    - macos_vm

- name: Fetch and stage upstream artifacts
  import_tasks: artifacts.yml
  tags:
    - macos_vm

- name: Configure VM storage
  import_tasks: storage.yml
  tags:
    - macos_vm

- name: Install QEMU systemd service
  import_tasks: service.yml
  tags:
    - macos_vm
