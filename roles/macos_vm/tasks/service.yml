- name: service | Check for virsh
  stat:
    path: /usr/bin/virsh
  register: macos_vm_virsh
  become: true

- name: service | Check legacy libvirt domain state
  when:
    - macos_vm_virsh.stat.exists
    - not ansible_check_mode
  ansible.builtin.command:
    argv:
      - virsh
      - domstate
      - "{{ macos_vm_name }}"
  register: macos_vm_legacy_domain_state
  changed_when: false
  failed_when: false
  become: true

- name: service | Stop legacy libvirt domain
  when:
    - macos_vm_legacy_domain_state.rc | default(1) == 0
    - macos_vm_legacy_domain_state.stdout | trim not in ['shut off', 'shutoff']
  ansible.builtin.command:
    argv:
      - virsh
      - destroy
      - "{{ macos_vm_name }}"
  become: true
  changed_when: true

- name: service | Undefine legacy libvirt domain
  when: macos_vm_legacy_domain_state.rc | default(1) == 0
  ansible.builtin.command:
    argv:
      - virsh
      - undefine
      - "{{ macos_vm_name }}"
      - --nvram
  register: macos_vm_legacy_domain_undefine
  become: true
  changed_when: true
  failed_when:
    - macos_vm_legacy_domain_undefine.rc != 0
    - "'no domain' not in macos_vm_legacy_domain_undefine.stderr"

- name: service | Install QEMU service
  import_role:
    name: systemd_unit
    tasks_from: install
  vars:
    systemd_unit_args:
      src: macos_vm.service.j2
      dest: "macos-vm-{{ macos_vm_name }}.service"

- name: service | Set QEMU service enablement
  when: not (ansible_check_mode and (systemd_unit_file.changed | default(false)))
  systemd:
    name: "macos-vm-{{ macos_vm_name }}.service"
    enabled: "{{ macos_vm_autostart }}"
  become: true

- name: service | Start QEMU service when requested
  when:
    - macos_vm_start_service | bool
    - not (ansible_check_mode and (systemd_unit_file.changed | default(false)))
  systemd:
    name: "macos-vm-{{ macos_vm_name }}.service"
    state: "{{ 'restarted' if (systemd_unit_file.changed | default(false)) else 'started' }}"
  become: true
