# Define (or redefine) the libvirt domain. The role intentionally does NOT
# start the VM — first boot is interactive (boot from OpenCore → Recovery →
# install macOS to the passthrough disk). After install, set
#   macos_vm_install_mode: false
#   macos_vm_autostart: true
# in host_vars and re-run, then `virsh start {{ macos_vm_name }}` once.

- name: domain | Render domain XML
  set_fact:
    macos_vm_domain_xml: "{{ lookup('template', 'domain.xml.j2') }}"

- name: domain | Define libvirt domain
  community.libvirt.virt:
    command: define
    xml: "{{ macos_vm_domain_xml }}"
  become: true
  register: macos_vm_define

- name: domain | Set autostart flag
  community.libvirt.virt:
    name: "{{ macos_vm_name }}"
    autostart: "{{ macos_vm_autostart }}"
  become: true
  when: not ansible_check_mode
