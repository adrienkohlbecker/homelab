# Per-VM identity. Overridden in host_vars.
macos_vm_name: chi
macos_vm_macos_version: "15"  # Sequoia. Passed verbatim to fetch-macOS-v2.py.

# CPU & memory. macOS dislikes hybrid topology, so on Raptor Lake / Alder Lake
# pin to P-core threads only via macos_vm_cpu_pinset. Confirm thread numbering
# with `lscpu -e` on the target host before applying.
macos_vm_vcpus: 4
macos_vm_cpu_pinset: ""  # comma-separated list, e.g. "0,2,4,6". Empty = no pinning.
macos_vm_memory_mib: 12288  # 12 GiB

# QEMU accelerator: kvm for production on a real x86 host. The role switches
# this to qemu under qemu_test so systemd-analyze can validate the unit without
# needing nested KVM.
macos_vm_domain_type: kvm

# SMBIOS profile. iMacPro1,1 supports Sequoia and is the OSX-KVM default.
# For iMessage/FaceTime, SMBIOS values must be regenerated with GenSMBIOS and
# pass Apple's validity check (no registered purchase date). See notes/macos-vm-design.md.
macos_vm_smbios_model: "iMacPro1,1"

# Disk source. The role creates a sparse ZFS volume and passes its /dev/zvol
# path as a raw block device.
macos_vm_zvol_parent_datasets:
  - "{{ zfs_dozer_filesystem }}/vms"
  - "{{ zfs_dozer_filesystem }}/vms/macos"
macos_vm_zvol_dataset: "{{ zfs_dozer_filesystem }}/vms/macos/{{ macos_vm_name }}"
# 128 GB, expressed in bytes so it stays decimal rather than GiB.
macos_vm_zvol_size: "128000000000"
macos_vm_zvol_volblocksize: 16K
macos_vm_zvol_compression: zstd

# Networking. Direct QEMU uses user-mode NAT during install. It is slower than
# macvtap, but gives Recovery boring DHCP/DNS/egress and avoids libvirt.
macos_vm_network_mode: nat
macos_vm_ssh_host_listen: "127.0.0.1"
macos_vm_ssh_host_port: 2222
macos_vm_mac_address: ""                # auto-generated from inventory_hostname+name if empty

# Display & input.
macos_vm_vnc_listen: "127.0.0.1"        # tunnel via SSH; or set to a macvlan child IP (e.g. mac_mgmt's host_ip) to expose on mac_mgmt
macos_vm_vnc_password: ""               # vault, optional
macos_vm_vnc_keymap: fr                 # QEMU VNC keymap; keeps AZERTY input aligned with macOS

# Recovery defaults seeded through OpenCore NVRAM. `en-US:1` means English UI
# with Apple's French keyboard layout; `en_FR` means English language with the
# France region. These affect first boot/recovery defaults, not an installed
# user's later System Settings choices. Keep verbose boot enabled while this
# VM is still being installed/debugged so boot stalls show the real stop point.
macos_vm_opencore_prev_lang_kbd: "en-US:1"
macos_vm_opencore_apple_locale: "en_FR"
macos_vm_opencore_boot_args: "keepsyms=1 -v"

# First-install flow. Set to true while the recovery DMG should be attached;
# flip to false (and re-run the role) after macOS is installed and booting.
macos_vm_install_mode: true

# Autostart on host boot. Leave false until first install completes; flip
# afterwards. Independent of install_mode so they don't interfere.
macos_vm_autostart: false
macos_vm_start_service: false

# Where the role caches downloaded artifacts (shared across all macOS VMs)
# and per-VM working files (one subdir per VM).
macos_vm_artifacts_dir: /var/lib/libvirt/images/macos-vm/_artifacts
macos_vm_workdir: "/var/lib/libvirt/images/macos-vm/{{ macos_vm_name }}"
macos_vm_opencore_patch_nbd_device: /dev/nbd3

# qemu_test keeps install mode off so tests avoid the large recovery image
# download.
