- name: _verify | run_job success writes the sentinel for each frequency
  command: /usr/local/bin/run_job {{ item }} _verify_test_{{ item }} /bin/true
  loop:
    - hourly
    - daily
    - weekly
    - monthly
  changed_when: false
  become: true

- name: _verify | slurp each frequency sentinel
  slurp:
    src: /var/log/jobs/_verify_test_{{ item }}
  loop:
    - hourly
    - daily
    - weekly
    - monthly
  register: _verify_freq_sentinels
  become: true

# The frequency word is load-bearing for custom_exporter's next-run calc
# (see roles/custom_exporter/files/main.go) — assert each case-arm in
# run_job propagates it through to the sentinel verbatim.
- name: _verify | success assertions per frequency
  assert:
    that:
      - (item.content | b64decode) is match('^' ~ item.item ~ ' \d{4}-\d{2}-\d{2}T')
  loop: "{{ _verify_freq_sentinels.results }}"
  loop_control:
    label: "{{ item.item }}"

- name: _verify | stage failure sentinel
  copy:
    content: "daily 1970-01-01T00:00:00+00:00\n"
    dest: /var/log/jobs/_verify_test_failure
    owner: root
    group: root
    mode: "0644"
    force: true
  become: true

- name: _verify | run_job failure leaves sentinel untouched
  command: /usr/local/bin/run_job daily _verify_test_failure /bin/false
  register: _verify_failure
  changed_when: false
  failed_when: false
  become: true

- name: _verify | slurp sentinel after failure
  slurp:
    src: /var/log/jobs/_verify_test_failure
  register: _verify_failure_sentinel
  become: true

- name: _verify | failure assertions
  assert:
    that:
      - _verify_failure.rc != 0
      - (_verify_failure_sentinel.content | b64decode) == "daily 1970-01-01T00:00:00+00:00\n"

# systemd-cat capture is the other observable side of run_job (the
# sentinel is the metric side, this is the operator-debugging side).
# Confirm stdout lands at default priority and stderr is upgraded to
# err via --stderr-priority=3.
- name: _verify | run_job emits stdout and stderr to the journal
  command: >-
    /usr/local/bin/run_job daily _verify_test_journal
    /bin/sh -c 'echo CRON_VERIFY_STDOUT; echo CRON_VERIFY_STDERR >&2'
  changed_when: false
  become: true

- name: _verify | read journal entries for the test identifier
  command: journalctl --identifier _verify_test_journal --output json --no-pager
  register: _verify_journal
  changed_when: false
  become: true

- name: _verify | journal assertions
  vars:
    _entries: "{{ _verify_journal.stdout_lines | map('from_json') | list }}"
    _by_msg: "{{ dict(_entries | map(attribute='MESSAGE') | zip(_entries)) }}"
  assert:
    that:
      - "'CRON_VERIFY_STDOUT' in _by_msg"
      - "'CRON_VERIFY_STDERR' in _by_msg"
      # PRIORITY is a string in journal JSON; 6=info (default), 3=err.
      - _by_msg['CRON_VERIFY_STDOUT'].PRIORITY == '6'
      - _by_msg['CRON_VERIFY_STDERR'].PRIORITY == '3'

- name: _verify | run_job with no args prints usage
  command: /usr/local/bin/run_job
  register: _verify_noargs
  changed_when: false
  failed_when: false
  become: true

- name: _verify | noargs assertions
  assert:
    that:
      - _verify_noargs.rc != 0
      - "'Usage:' in _verify_noargs.stderr"

- name: _verify | run_job with bad frequency prints usage
  command: /usr/local/bin/run_job bogus _verify_test_bogus /bin/true
  register: _verify_badfreq
  changed_when: false
  failed_when: false
  become: true

- name: _verify | badfreq assertions
  assert:
    that:
      - _verify_badfreq.rc != 0
      - "'Usage:' in _verify_badfreq.stderr"

- name: _verify | cleanup sentinels
  file:
    path: /var/log/jobs/{{ item }}
    state: absent
  loop:
    - _verify_test_hourly
    - _verify_test_daily
    - _verify_test_weekly
    - _verify_test_monthly
    - _verify_test_failure
    - _verify_test_journal
  become: true
