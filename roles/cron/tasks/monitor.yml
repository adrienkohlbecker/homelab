# Duplicated with main.yml because tasks_from: monitor is the entry point
# for consumer roles (zfs, getmail, pihole, ...) and those run under the
# harness without cron's main.yml — so we can't rely on it having created
# the directory.
- name: monitor | Ensure job log directory exists
  file:
    dest: /var/log/jobs
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true

- name: monitor | Monitor cron entry
  file:
    path: /var/log/jobs/{{ item }}
    state: touch
    access_time: preserve
    modification_time: preserve
    owner: root
    group: root
    mode: "0644"
  loop: "{{ [cron_entry] | flatten(levels=1) }}"
  become: true
