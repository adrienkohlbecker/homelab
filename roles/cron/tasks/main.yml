- name: Copy the run script
  copy:
    src: run_job.sh
    dest: /usr/local/bin/run_job
    mode: "0755"
    owner: root
    group: root
    backup: true
    validate: bash -n %s
  become: true
  tags:
    - cron

# Created here (not in monitor.yml) so the role is self-contained: run_job's
# success-side `echo > /var/log/jobs/$id` and custom_exporter's directory
# scan both assume the dir exists, independent of whether any consumer has
# called tasks_from: monitor yet.
- name: Ensure job log directory exists
  file:
    dest: /var/log/jobs
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true
  tags:
    - cron
