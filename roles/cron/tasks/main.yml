- name: Copy the run script
  copy:
    src: run_job.sh
    dest: /usr/local/bin/run_job
    mode: "0755"
    owner: root
    group: root
    backup: true
    validate: bash -n %s
  become: true
  tags:
    - cron

# run_job's success-side `echo > /var/log/jobs/$id` and custom_exporter's
# directory scan both assume the dir exists; systemd_timer's per-job
# sentinel touch needs it too.
- name: Ensure job log directory exists
  file:
    dest: /var/log/jobs
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true
  tags:
    - cron
