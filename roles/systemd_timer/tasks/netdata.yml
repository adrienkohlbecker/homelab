# Wire the systemd_timers charts.d collector + its overdue alert into
# netdata. The collector reads each timer's LastTriggerUSec and emits an
# `overdue` boolean per timer, with the period-aware threshold (age >
# 2 * period) computed against the per-timer metadata files written by
# install.yml.
- name: Install systemd_timers charts.d collector
  import_role:
    name: netdata
    tasks_from: charts_d
  vars:
    netdata_args:
      name: systemd_timers
      script: systemd_timers.chart.sh
      conf: charts_d_systemd_timers.conf
      condition: "{{ systemd_timer_netdata_condition | default(true) }}"
  tags:
    - systemd_timer

- name: Configure systemd_timers netdata alerts
  import_role:
    name: netdata
    tasks_from: health
  vars:
    netdata_args:
      src: systemd_timers_alerts.conf
      dest: systemd_timers.conf
  tags:
    - systemd_timer
