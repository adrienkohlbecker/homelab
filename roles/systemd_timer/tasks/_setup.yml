- name: _setup | Install netdata
  import_role:
    name: netdata
    tasks_from: install

# install.yml uses policy_rc_d=101 so apt won't auto-start; prod starts
# netdata in main.yml after configuration. The test fixture skips netdata's
# main.yml, so start netdata here so health_copy in netdata.yml can reach
# the running daemon (netdatacli uses HTTP since 1.46+).
- name: _setup | Start netdata
  systemd:
    name: netdata
    state: started
  become: true
