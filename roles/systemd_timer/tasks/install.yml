# Inputs: caller passes a single dict `systemd_timer_args` with keys
#   name              required; bare name (no extension). The role
#                     installs <name>.service + <name>.timer.
#   exec_start        required; ExecStart= line. Absolute-path the
#                     first token (systemd doesn't PATH-resolve it).
#   on_calendar       required; OnCalendar= spec (e.g.
#                     `*-*-* 00:55:00`, `Sun *-*-* 00:47:00`).
#   frequency         required iff sentinel: true; one of
#                     hourly/daily/weekly/monthly. Written verbatim
#                     into /var/log/jobs/<name> on ExecStart success;
#                     custom_exporter._bump() parses it to compute the
#                     next-run timestamp, so the word matters.
#   description       optional; falls back to name.
#   randomized_delay_sec  optional; emits RandomizedDelaySec=<n>.
#   runtime_max_sec   optional; emits RuntimeMaxSec=<v>. Default '1h'
#                     — every job we ship today completes in seconds
#                     to minutes; override per-consumer if a future
#                     job legitimately needs longer.
#   sentinel          default true; pre-creates /var/log/jobs/<name>
#                     so custom_exporter sees the job before its first
#                     run completes, and the .service unit gets an
#                     ExecStartPost that updates it on success. Set
#                     false for one-off timers not monitored by the
#                     exporter (e.g. the role's own _verify fixture).
#   user              default 'root'; non-root drives the named user's
#                     user manager (linger must already be on).
#
# The dict form mirrors systemd_unit / podman_secret / service_user: each
# import_role replaces the whole `systemd_timer_args` value at play-vars
# scope so a previous caller's name/exec_start/etc. can't bleed into the
# next caller's call.
- name: install | Resolve caller defaults for {{ systemd_timer_args.name }}
  set_fact:
    _systemd_timer_user: "{{ systemd_timer_args.user | default('root') }}"
    _systemd_timer_sentinel: "{{ systemd_timer_args.sentinel | default(true) }}"

# /var/log/jobs is the metric-side surface custom_exporter scrapes;
# every sentinel-emitting unit's ExecStartPost writes here. Owning the
# directory in systemd_timer (not a separate cron role) keeps the
# helper self-contained.
- name: install | Ensure /var/log/jobs directory exists
  when: _systemd_timer_sentinel
  file:
    path: /var/log/jobs
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true

- name: install | Install service unit for {{ systemd_timer_args.name }}
  import_role:
    name: systemd_unit
    tasks_from: install
  vars:
    systemd_unit_args:
      src: service.j2
      dest: "{{ systemd_timer_args.name }}.service"
      user: "{{ _systemd_timer_user }}"

- name: install | Install timer unit for {{ systemd_timer_args.name }}
  import_role:
    name: systemd_unit
    tasks_from: install
  vars:
    systemd_unit_args:
      src: timer.j2
      dest: "{{ systemd_timer_args.name }}.timer"
      user: "{{ _systemd_timer_user }}"

# Pre-create the /var/log/jobs/<name> sentinel so custom_exporter's
# directory scan picks up the job (with last_success=0) before its
# first run completes -- otherwise the alert "this job hasn't run
# recently" has nothing to evaluate against until the timer fires.
# Skip in check-mode-on-fresh-host: the cron role owns /var/log/jobs and
# its check-mode pass only *reports* creating the dir without actually
# making it, so touching a child here would fail.
- name: install | Pre-create sentinel for {{ systemd_timer_args.name }}
  when:
    - _systemd_timer_sentinel
    - not ansible_check_mode
  file:
    path: /var/log/jobs/{{ systemd_timer_args.name }}
    state: touch
    access_time: preserve
    modification_time: preserve
    owner: root
    group: root
    mode: "0644"
  become: true

# Skip enable+start when systemd_unit just (mock-)wrote either unit file
# in check-mode — the file isn't actually on disk, so `systemctl enable`
# would fail with "Could not find the requested service". Mirrors the
# console role's guard for the same reason. The per-unit facts are set
# by systemd_unit/install via set_fact `<name>_<type>_result`.
- name: install | Enable and start timer for {{ systemd_timer_args.name }}
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: "{{ systemd_timer_args.name }}.timer"
      user: "{{ _systemd_timer_user }}"
      condition: >-
        {{ not (ansible_check_mode
                and (vars[systemd_timer_args.name ~ '_service_result'].changed
                     or vars[systemd_timer_args.name ~ '_timer_result'].changed)) }}
