# Install a paired <name>.service + <name>.timer. Caller passes `systemd_timer_args`;
# see CLAUDE.md "Helper roles → systemd_timer" for the full key reference.
#
# Non-obvious constraints kept here (everything else is in CLAUDE.md):
#   - fixed_random_delay requires randomized_delay_sec (enforced below).
#   - run_as is only valid when user == 'root'; rejected early so systemd
#     doesn't see an invalid User= in a user-scope unit.
#   - environment values must be non-secret: written into the 0644 unit file.
#     Use LoadCredential= via additional_service_directives for secrets.
#   - exec_start: literal % → %%, literal $ → $$ (systemd expands both before
#     the command runs). TimeoutStartSec= bounds oneshot ExecStart (RuntimeMaxSec=
#     has no effect under Type=oneshot).
#   - on_calendar must be a repeating schedule when monitor: true; a one-shot
#     calendar has no second elapse and can't derive a period.
#
# The dict form mirrors systemd_unit / podman_secret / service_user: each
# import_role replaces the whole `systemd_timer_args` value at play-vars
# scope so a previous caller's args can't bleed into the next call.
- name: install | Validate required inputs for {{ systemd_timer_args.name | default('<unset>') }}
  assert:
    quiet: true
    that:
      - systemd_timer_args.name is defined
      - systemd_timer_args.name is match('^[a-zA-Z0-9_]+$')
      - systemd_timer_args.exec_start is defined
      - systemd_timer_args.on_calendar is defined
    fail_msg: >-
      systemd_timer: name (got {{ systemd_timer_args.name | default('<unset>') }})
      must be defined and contain only [a-zA-Z0-9_]; exec_start and on_calendar
      must also be defined.

- name: install | Resolve caller defaults for {{ systemd_timer_args.name }}
  set_fact:
    _systemd_timer_user: "{{ systemd_timer_args.user | default('root') }}"
    # Reset from any prior invocation so a subsequent monitor:false timer can't
    # inherit a stale period if the two when: gates ever fall out of sync.
    _systemd_timer_period: {}
    # The netdata systemd_timers collector reads /var/lib/systemd/timers
    # stamps (a system path), so it can only observe system-scope timers.
    # Auto-disable monitoring for user-scope units rather than let the
    # monitor:true default register a metadata file the collector can never
    # satisfy -- which would peg the timer permanently `overdue`. User-scope
    # freshness monitoring is a deferred follow-up; callers don't need to
    # special-case it.
    _systemd_timer_monitor: "{{ (systemd_timer_args.monitor | default(true)) and (systemd_timer_args.user | default('root')) == 'root' }}"

# run_as only makes sense for system-scope units; a user-scope unit
# already runs as the named user, and User= in /etc/systemd/user/ is
# invalid. Reject early with a clear message instead of letting the
# unit template emit something systemd would reject at load time.
- name: install | Reject run_as on user-scope timer for {{ systemd_timer_args.name }}
  when: systemd_timer_args.run_as is defined
  assert:
    quiet: true
    that:
      - _systemd_timer_user == 'root'
    fail_msg: >-
      systemd_timer {{ systemd_timer_args.name }}: run_as is only valid
      for system-scope units (user: root). user-scope units already
      run as the named user; User= in /etc/systemd/user/ is invalid.

- name: install | Validate environment keys for {{ systemd_timer_args.name }}
  when: systemd_timer_args.environment is defined
  assert:
    quiet: true
    that:
      - item is match('^[A-Za-z_][A-Za-z0-9_]*$')
    fail_msg: >-
      systemd_timer {{ systemd_timer_args.name }}: environment key '{{ item }}'
      is not a valid POSIX variable name ([A-Za-z_][A-Za-z0-9_]*).
  loop: "{{ systemd_timer_args.environment.keys() | list }}"
  loop_control:
    label: "{{ item }}"

# FixedRandomDelay= only has meaning paired with RandomizedDelaySec=, and
# timer.j2 emits it *inside* the randomized_delay_sec block -- so
# fixed_random_delay alone is silently dropped, reintroducing the cross-host
# thundering-herd it was meant to prevent. Reject the combination loudly.
- name: install | Reject fixed_random_delay without randomized_delay_sec for {{ systemd_timer_args.name }}
  when: systemd_timer_args.fixed_random_delay | default(false)
  assert:
    quiet: true
    that:
      - systemd_timer_args.randomized_delay_sec is defined
    fail_msg: >-
      systemd_timer {{ systemd_timer_args.name }}: fixed_random_delay requires
      randomized_delay_sec (FixedRandomDelay= pins an otherwise-random delay to
      a stable per-host value; with no RandomizedDelaySec= there is nothing to
      pin).

# Wrapper script used by every timer's ExecStart so stderr lines land
# in the journal at priority err. Install before the unit so
# systemd-analyze's "ExecStart executable exists" check passes.
- name: install | Install stderr_priority wrapper
  copy:
    src: stderr_priority
    dest: /usr/local/bin/stderr_priority
    owner: root
    group: root
    mode: "0755"
    backup: true
    validate: bash -n %s
  become: true

# Nested import_role task names stay static. The role is called both
# from import_role sites (where systemd_timer_args is in scope at
# parse-time and a `{{ systemd_timer_args.name }}` interpolation would
# resolve) AND from include_role + set_fact sites (the trim-timer
# loop wrapper) where it isn't. Mixing the two would emit a parse-time
# template warning on every trim-loop iteration. The outer caller's
# task name already identifies which timer is being installed.
- name: install | Install service unit
  import_role:
    name: systemd_unit
    tasks_from: install
  vars:
    systemd_unit_args:
      src: service.j2
      dest: "{{ systemd_timer_args.name }}.service"
      user: "{{ _systemd_timer_user }}"

- name: install | Install timer unit
  import_role:
    name: systemd_unit
    tasks_from: install
  vars:
    systemd_unit_args:
      src: timer.j2
      dest: "{{ systemd_timer_args.name }}.timer"
      user: "{{ _systemd_timer_user }}"

# Skip enable+start when systemd_unit just (mock-)wrote either unit file
# in check-mode — the file isn't actually on disk, so `systemctl enable`
# would fail with "Could not find the requested service". Mirrors the
# console role's guard for the same reason. The per-unit facts are set
# by systemd_unit/install via set_fact `<name>_<type>_result`. Name
# stays static for the same reason as the install tasks above.
- name: install | Enable and start timer
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: "{{ systemd_timer_args.name }}.timer"
      user: "{{ _systemd_timer_user }}"
      condition: >-
        {{ not (ansible_check_mode
                and (vars[systemd_timer_args.name ~ '_service_result'].changed
                     or vars[systemd_timer_args.name ~ '_timer_result'].changed)) }}

# --- netdata overdue monitoring -------------------------------------------
# Register the timer with the netdata systemd_timers collector. Placed after
# enable+start: if the enable fails, Ansible aborts the play before reaching
# the metadata write, so a broken timer is never registered for monitoring.
# Skipped entirely for user-scope timers (monitor was auto-disabled above --
# the collector reads system-scope stamps only).

# period_secs for the overdue check is the gap between the timer's next two
# elapses, computed from on_calendar by systemd's own parser (no hand-kept
# frequency->seconds table). A non-repeating calendar yields a single elapse
# (no "Iter. #2") and can't be monitored -- fail loud so the caller sets
# monitor: false. on_calendar is passed via the environment so its value
# never lands in the script text (no quoting/escaping hazards). The two-
# elapse delta is constant for a regular schedule; a DST-straddling day can
# shift it by an hour, which the 2 * period grace absorbs.
- name: install | Derive overdue period from on_calendar for {{ systemd_timer_args.name }}
  when:
    - _systemd_timer_monitor
    - not ansible_check_mode
  shell: |
    set -euo pipefail
    out=$(LC_ALL=C systemd-analyze calendar --iterations=2 "$ON_CALENDAR")
    e1=$(printf '%s\n' "$out" | awk '/Next elapse:/{sub(/^[^:]*: /, ""); print; exit}')
    e2=$(printf '%s\n' "$out" | awk '/Iter\. #2:/{sub(/^[^:]*: /, ""); print; exit}')
    if [ -z "$e2" ]; then
      echo "on_calendar=$ON_CALENDAR does not repeat (no second elapse); set monitor: false for one-shot timers" >&2
      exit 1
    fi
    s1=$(LC_ALL=C date -d "$e1" +%s)
    s2=$(LC_ALL=C date -d "$e2" +%s)
    echo $((s2 - s1))
  args:
    executable: /bin/bash
  environment:
    ON_CALENDAR: "{{ systemd_timer_args.on_calendar }}"
  register: _systemd_timer_period
  changed_when: false
  become: true

# The metadata file is owned by netdata:netdata so the collector reads it
# unprivileged. On prod the netdata role installs that user before any timer
# consumer runs; in the test harness a standalone role run may not have
# netdata yet, and the chown below would fail. Idempotent precondition that
# no-ops when the user exists, sparing each consumer's _setup.yml from
# redundantly creating it.
- name: install | Ensure netdata user exists for metadata file ownership
  when: _systemd_timer_monitor
  user:
    name: netdata
    system: true
    create_home: false
  become: true

# Ensure the parent dir exists -- this can fire before netdata is installed
# (site.yml runs many timer-consuming roles before the netdata block), so the
# .d directory may not yet exist. Owned by root because netdata may not be
# installed yet; netdata reads a root:root parent fine so long as the
# metadata files inside are netdata:netdata.
- name: install | Ensure systemd_timers metadata dir exists
  when: _systemd_timer_monitor
  file:
    path: /etc/netdata/charts.d/systemd_timers.d
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true

# The file's mtime doubles as "installed_at" -- the collector counts from
# there until the first trigger so a freshly-installed timer doesn't alarm
# overdue before its first fire.
- name: install | Write systemd_timers metadata for {{ systemd_timer_args.name }}
  when:
    - _systemd_timer_monitor
    - not ansible_check_mode
  copy:
    dest: /etc/netdata/charts.d/systemd_timers.d/{{ systemd_timer_args.name }}.conf
    content: |
      # Managed by ansible roles/systemd_timer/tasks/install.yml.
      # Consumed by /usr/libexec/netdata/charts.d/systemd_timers.chart.sh.
      # period_secs is derived from on_calendar via systemd-analyze calendar.
      period_secs={{ _systemd_timer_period.stdout }}
    owner: netdata
    group: netdata
    mode: "0644"
    backup: true
  become: true
