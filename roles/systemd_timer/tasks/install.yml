# Inputs: caller passes a single dict `systemd_timer_args` with keys
#   name              required; bare name (no extension). The role
#                     installs <name>.service + <name>.timer.
#   exec_start        required; the command (and args) handed to the
#                     stderr_priority wrapper. The wrapper itself is
#                     the systemd-level ExecStart=, so this string runs
#                     under bash and PATH lookup applies; prefer
#                     absolute paths anyway so the unit stays grep-able
#                     to the binary it invokes.
#   on_calendar       required; OnCalendar= spec (e.g.
#                     `*-*-* 00:55:00`, `Sun *-*-* 00:47:00`).
#   frequency         required iff monitor: true; one of
#                     hourly/daily/weekly/monthly. Drives the
#                     period_secs metadata read by the netdata
#                     systemd_timers charts.d collector to detect
#                     "overdue" timers (last trigger > 2 * period).
#   description       optional; falls back to name.
#   randomized_delay_sec  optional; emits RandomizedDelaySec=<n>.
#   timeout_start_sec optional; emits TimeoutStartSec=<v>. Default '1h'
#                     — every job we ship today completes in seconds
#                     to minutes; override per-consumer if a future
#                     job legitimately needs longer. (RuntimeMaxSec=
#                     is the natural-sounding name but has no effect
#                     under Type=oneshot; TimeoutStartSec bounds
#                     ExecStart for oneshot.)
#   timeout_stop_sec  optional; emits TimeoutStopSec=<v>. Default '30s' —
#                     grace period between SIGTERM and SIGKILL when a
#                     run is being terminated (by TimeoutStartSec or
#                     by manual systemctl stop).
#   monitor           default true; writes the per-timer metadata file
#                     the netdata systemd_timers collector consumes
#                     for the overdue check. Set false for one-off
#                     timers that don't need cadence monitoring (e.g.
#                     the role's own _verify fixtures).
#   user              default 'root'; non-root drives the named user's
#                     user manager (linger must already be on).
#
# The dict form mirrors systemd_unit / podman_secret / service_user: each
# import_role replaces the whole `systemd_timer_args` value at play-vars
# scope so a previous caller's name/exec_start/etc. can't bleed into the
# next caller's call.
- name: install | Resolve caller defaults for {{ systemd_timer_args.name }}
  set_fact:
    _systemd_timer_user: "{{ systemd_timer_args.user | default('root') }}"
    _systemd_timer_monitor: "{{ systemd_timer_args.monitor | default(true) }}"

# The frequency word maps to period_secs in the netdata-side metadata
# file; an unknown value would silently disable the overdue check for
# the job. Fail loud at install time instead. Only gated when monitor
# is on; one-off timers (monitor: false) legitimately have no cadence.
- name: install | Validate frequency for {{ systemd_timer_args.name }}
  when: _systemd_timer_monitor
  assert:
    that:
      - systemd_timer_args.frequency is defined
      - systemd_timer_args.frequency in ['hourly', 'daily', 'weekly', 'monthly']
    fail_msg: >-
      systemd_timer {{ systemd_timer_args.name }}: frequency must be one of
      hourly/daily/weekly/monthly when monitor is enabled (got
      {{ systemd_timer_args.frequency | default('<unset>') }}).

# Wrapper script used by every timer's ExecStart so stderr lines land
# in the journal at priority err. Install before the unit so
# systemd-analyze's "ExecStart executable exists" check passes.
- name: install | Install stderr_priority wrapper
  copy:
    src: stderr_priority
    dest: /usr/local/bin/stderr_priority
    owner: root
    group: root
    mode: "0755"
    backup: true
    validate: bash -n %s
  become: true

- name: install | Install service unit for {{ systemd_timer_args.name }}
  import_role:
    name: systemd_unit
    tasks_from: install
  vars:
    systemd_unit_args:
      src: service.j2
      dest: "{{ systemd_timer_args.name }}.service"
      user: "{{ _systemd_timer_user }}"

- name: install | Install timer unit for {{ systemd_timer_args.name }}
  import_role:
    name: systemd_unit
    tasks_from: install
  vars:
    systemd_unit_args:
      src: timer.j2
      dest: "{{ systemd_timer_args.name }}.timer"
      user: "{{ _systemd_timer_user }}"

# Drop the per-timer metadata file the netdata systemd_timers collector
# consumes. Its mtime doubles as "installed_at" -- the collector counts
# from there until the first trigger so a freshly-installed timer
# doesn't immediately alarm overdue. period_secs is computed from the
# validated frequency above.
#
# Ensure the parent dir exists -- this task can fire before netdata is
# installed (site.yml runs many timer-consuming roles before the netdata
# block), so the .d directory may not yet exist. Owned by root because
# we don't know whether netdata has even been installed yet; netdata
# itself is fine reading a root:root parent so long as our metadata
# files inside are netdata:netdata.
- name: install | Ensure systemd_timers metadata dir exists
  when: _systemd_timer_monitor
  file:
    path: /etc/netdata/charts.d/systemd_timers.d
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true

- name: install | Write systemd_timers metadata for {{ systemd_timer_args.name }}
  when:
    - _systemd_timer_monitor
    - not ansible_check_mode
  copy:
    dest: /etc/netdata/charts.d/systemd_timers.d/{{ systemd_timer_args.name }}.conf
    content: |
      # Managed by ansible roles/systemd_timer/tasks/install.yml.
      # Consumed by /usr/libexec/netdata/charts.d/systemd_timers.chart.sh.
      period_secs={{ {'hourly': 3600, 'daily': 86400, 'weekly': 604800, 'monthly': 2592000}[systemd_timer_args.frequency] }}
    owner: netdata
    group: netdata
    mode: "0644"
    backup: true
  become: true

# Skip enable+start when systemd_unit just (mock-)wrote either unit file
# in check-mode — the file isn't actually on disk, so `systemctl enable`
# would fail with "Could not find the requested service". Mirrors the
# console role's guard for the same reason. The per-unit facts are set
# by systemd_unit/install via set_fact `<name>_<type>_result`.
- name: install | Enable and start timer for {{ systemd_timer_args.name }}
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: "{{ systemd_timer_args.name }}.timer"
      user: "{{ _systemd_timer_user }}"
      condition: >-
        {{ not (ansible_check_mode
                and (vars[systemd_timer_args.name ~ '_service_result'].changed
                     or vars[systemd_timer_args.name ~ '_timer_result'].changed)) }}
