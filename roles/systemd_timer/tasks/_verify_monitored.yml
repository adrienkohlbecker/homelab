# Contracts 3+4: monitored timer (monitor: true) writes netdata metadata
# with period_secs derived from on_calendar, and the systemd_timers charts.d
# collector emits a chart per timer with age_secs / overdue tracking read
# from the persistent trigger stamp (/var/lib/systemd/timers/stamp-*.timer).
#
# Split into its own file (imported from _verify.yml) only to keep that file
# readable -- the collector rides netdata-plugin-chartsd, which is part of
# netdata's multi-arch 2.x repo, so this runs on the arm64 box as well as
# x86_64.
#
# Both fixtures use the same hourly OnCalendar (period_secs=3600 derived),
# are stopped so systemd can't fire them and rewrite the stamp underneath
# us, then have their stamp planted directly: recent => mtime now
# (overdue=0), overdue => mtime 3h ago (age > 2*3600 -> overdue=1). Faking
# the stamp keeps the test deterministic (no waiting on a real fire or
# racing QEMU clock skew) while exercising exactly what the collector reads.

# ============================================================
# Contract 3+4: monitored timer + overdue detection via netdata
# ============================================================
- name: _verify | Install recent monitored fixture (hourly)
  import_role:
    name: systemd_timer
    tasks_from: install
  vars:
    systemd_timer_args:
      name: _verify_timer_recent
      description: monitored fixture, recent stamp
      on_calendar: "*-*-* *:00:00"
      exec_start: /bin/true

- name: _verify | Install overdue monitored fixture (hourly)
  import_role:
    name: systemd_timer
    tasks_from: install
  vars:
    systemd_timer_args:
      name: _verify_timer_overdue
      description: monitored fixture, stale stamp
      on_calendar: "*-*-* *:00:00"
      exec_start: /bin/true

# Stop both timers so systemd won't fire them and overwrite the stamps we
# plant below.
- name: _verify | Stop fixture timers to freeze their stamps
  systemd:
    name: "{{ item }}.timer"
    state: stopped
  loop:
    - _verify_timer_recent
    - _verify_timer_overdue
  become: true

- name: _verify | Plant a fresh stamp (now) for the recent fixture
  command: touch /var/lib/systemd/timers/stamp-_verify_timer_recent.timer
  changed_when: false
  become: true

- name: _verify | Plant a stale stamp (3h ago) for the overdue fixture
  command: touch -d "3 hours ago" /var/lib/systemd/timers/stamp-_verify_timer_overdue.timer
  changed_when: false
  become: true

- name: _verify | Read both fixtures' metadata files
  command: cat /etc/netdata/charts.d/systemd_timers.d/{{ item }}.conf
  register: _systemd_timer_meta
  changed_when: false
  loop:
    - _verify_timer_recent
    - _verify_timer_overdue
  become: true
- name: _verify | Assert period_secs=3600 derived from hourly on_calendar
  assert:
    that:
      - "'period_secs=3600' in item.stdout"
    fail_msg: "metadata missing period_secs=3600: {{ item.stdout }}"
  loop: "{{ _systemd_timer_meta.results }}"
  loop_control:
    label: "{{ item.item }}"

# Charts.d.plugin re-scans the metadata dir each tick (update_every=5s
# under our override). Wait for both charts to appear in netdata's
# registry, then check the data API for the expected age + overdue.
- name: _verify | Wait for both fixture charts to register
  uri:
    url: http://localhost:19999/api/v1/charts
    return_content: true
  register: _systemd_timer_charts
  retries: 30
  delay: 2
  until: >-
    _systemd_timer_charts.status == 200
    and 'systemd_timers._verify_timer_recent' in (_systemd_timer_charts.content | from_json).charts.keys()
    and 'systemd_timers._verify_timer_overdue' in (_systemd_timer_charts.content | from_json).charts.keys()

- name: _verify | Recent fixture reports overdue=0
  uri:
    url: http://localhost:19999/api/v1/data?chart=systemd_timers._verify_timer_recent&points=1&after=-30&format=json
    return_content: true
  register: _systemd_timer_recent_data
  retries: 30
  delay: 2
  until: >-
    _systemd_timer_recent_data.status == 200
    and 'overdue' in (_systemd_timer_recent_data.json.labels | default([]))
    and 'age_secs' in _systemd_timer_recent_data.json.labels
    and (_systemd_timer_recent_data.json.data | default([])) | length > 0
    and _systemd_timer_recent_data.json.data[0][_systemd_timer_recent_data.json.labels.index('overdue')] | int == 0
    and _systemd_timer_recent_data.json.data[0][_systemd_timer_recent_data.json.labels.index('age_secs')] | int < 600

- name: _verify | Overdue fixture reports overdue=1
  uri:
    url: http://localhost:19999/api/v1/data?chart=systemd_timers._verify_timer_overdue&points=1&after=-30&format=json
    return_content: true
  register: _systemd_timer_overdue_data
  retries: 30
  delay: 2
  until: >-
    _systemd_timer_overdue_data.status == 200
    and 'overdue' in (_systemd_timer_overdue_data.json.labels | default([]))
    and (_systemd_timer_overdue_data.json.data | default([])) | length > 0
    and _systemd_timer_overdue_data.json.data[0][_systemd_timer_overdue_data.json.labels.index('overdue')] | int == 1
    and _systemd_timer_overdue_data.json.data[0][_systemd_timer_overdue_data.json.labels.index('age_secs')] | int > 7200

# Alert binds on context systemd.timer_lag; netdata keys the instance
# as <chart_id>.<template_name>, e.g.
# systemd_timers._verify_timer_overdue.systemd_timer_overdue.
- name: _verify | Wait for overdue alert to register against the fixture
  uri:
    url: http://localhost:19999/api/v1/alarms?all
    return_content: true
  register: _systemd_timer_alarms
  retries: 30
  delay: 2
  until: >-
    _systemd_timer_alarms.status == 200
    and (_systemd_timer_alarms.content | from_json).alarms.keys() | list
        | select('search', 'systemd_timers._verify_timer_overdue.systemd_timer_overdue') | list | length > 0

- name: _verify | Assert overdue alert instantiated against both fixtures
  vars:
    _keys: "{{ (_systemd_timer_alarms.content | from_json).alarms.keys() | list }}"
  assert:
    that:
      - _keys | select('search', 'systemd_timers._verify_timer_recent.systemd_timer_overdue') | list | length > 0
      - _keys | select('search', 'systemd_timers._verify_timer_overdue.systemd_timer_overdue') | list | length > 0
    fail_msg: >-
      Expected systemd_timer_overdue template to bind on both fixtures.
      Got keys: {{ _keys | select('search', 'systemd_timers') | list }}

# Cleanup: remove fixtures so a follow-on test run starts clean.
# Two separate import_role calls instead of a loop — import_role
# doesn't accept `loop:`, and include_role + loop binds the vars
# block once (per [[feedback_include_role_loop_vars]]) so {{ item }}
# inside systemd_timer_args wouldn't re-evaluate per iteration.
- name: _verify | Remove recent monitored fixture
  import_role:
    name: systemd_timer
    tasks_from: remove
  vars:
    systemd_timer_args:
      name: _verify_timer_recent
- name: _verify | Remove overdue monitored fixture
  import_role:
    name: systemd_timer
    tasks_from: remove
  vars:
    systemd_timer_args:
      name: _verify_timer_overdue

# Asserts both the metadata cleanup and remove.yml's persistent-stamp drop.
- name: _verify | Stat metadata + stamp files after removal (should NOT exist)
  stat:
    path: "{{ item }}"
  loop:
    - /etc/netdata/charts.d/systemd_timers.d/_verify_timer_recent.conf
    - /etc/netdata/charts.d/systemd_timers.d/_verify_timer_overdue.conf
    - /var/lib/systemd/timers/stamp-_verify_timer_recent.timer
    - /var/lib/systemd/timers/stamp-_verify_timer_overdue.timer
  register: _systemd_timer_meta_after
  become: true
- name: _verify | Assert metadata + stamps cleaned up
  assert:
    that:
      - not item.stat.exists
    fail_msg: "{{ item.item }} still present after remove"
  loop: "{{ _systemd_timer_meta_after.results }}"
  loop_control:
    label: "{{ item.item }}"
