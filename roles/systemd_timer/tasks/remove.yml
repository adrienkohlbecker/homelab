# Inputs: caller passes a single dict `systemd_timer_args` with keys
#   name              required; bare name (no extension). Removes both
#                     <name>.service and <name>.timer.
#   user              default 'root'; non-root targets the named user's
#                     user manager.
#
# Idempotent on fresh hosts (no-op if the timer was never installed),
# so callers can leave a `tasks_from: remove` call in place on host
# groups that aren't supposed to run the timer (e.g. zfs_autobackup
# dest hosts). Order matters: stop+remove the timer first so scheduling
# halts before the service it triggered disappears.
#
# Validate name before it flows into unit names and the metadata path. Unlike
# install (which enforces the underscores-not-hyphens house style for new
# timers), remove must also accept hyphenated legacy names being torn down
# (e.g. the pre-migration podman-prune.* units), so the charset is wider --
# but still anchored to a leading alnum/underscore so a stray name can't
# start with `-` (a systemctl flag) or contain a path separator.
- name: remove | Validate name for {{ systemd_timer_args.name | default('<unset>') }}
  assert:
    quiet: true
    that:
      - systemd_timer_args.name is defined
      - systemd_timer_args.name is match('^[A-Za-z0-9_][A-Za-z0-9_-]*$')
    fail_msg: >-
      systemd_timer remove: name (got
      {{ systemd_timer_args.name | default('<unset>') }}) must be defined and
      match ^[A-Za-z0-9_][A-Za-z0-9_-]*$ (alnum/underscore, internal hyphens
      allowed for legacy units).

- name: remove | Resolve caller defaults for {{ systemd_timer_args.name }}
  set_fact:
    _systemd_timer_condition: "{{ systemd_timer_args.condition | default(true) }}"
    _systemd_timer_user: "{{ systemd_timer_args.user | default('root') }}"

- name: remove | Remove timer unit for {{ systemd_timer_args.name }}
  import_role:
    name: systemd_unit
    tasks_from: remove
  vars:
    systemd_unit_args:
      dest: "{{ systemd_timer_args.name }}.timer"
      user: "{{ _systemd_timer_user }}"
      condition: "{{ _systemd_timer_condition }}"

- name: remove | Remove service unit for {{ systemd_timer_args.name }}
  import_role:
    name: systemd_unit
    tasks_from: remove
  vars:
    systemd_unit_args:
      dest: "{{ systemd_timer_args.name }}.service"
      user: "{{ _systemd_timer_user }}"
      condition: "{{ _systemd_timer_condition }}"

# Mirror install.yml's metadata write so a removed timer also stops
# being polled by the netdata systemd_timers collector. state: absent
# is no-op if the file was never created (monitor: false at install
# time), so callers don't need to track which form they used.
# For user-scope timers install.yml never writes the file, so state:absent
# here is always a no-op -- no guard needed.
- name: remove | Drop systemd_timers metadata for {{ systemd_timer_args.name }}
  when: _systemd_timer_condition
  file:
    path: /etc/netdata/charts.d/systemd_timers.d/{{ systemd_timer_args.name }}.conf
    state: absent
  become: true

# systemd records a persistent trigger timestamp at
# /var/lib/systemd/timers/stamp-<name>.timer; its mtime is the last-fire
# time. Removing the units orphans that stamp, and a later timer reusing
# the name inherits it so Persistent=true fires an unwanted catch-up on
# first enable. Drop it. System scope only: user-scope stamps live under
# the owning user's ~/.local/share/systemd/timers.
- name: remove | Drop persistent trigger stamp for {{ systemd_timer_args.name }}
  when:
    - _systemd_timer_condition
    - _systemd_timer_user == 'root'
  file:
    path: /var/lib/systemd/timers/stamp-{{ systemd_timer_args.name }}.timer
    state: absent
  become: true
