# Per-timer overdue alert. Binds on the shared context so a single
# template instantiates against every chart emitted by
# systemd_timers.chart.sh. The collector encodes the period-aware
# threshold (age > 2 * period_secs) into the `overdue` dimension, so
# this template just watches a boolean.
#
# Pair signal: netdata's stock systemd_service_unit_failed_state alert
# fires when the timer's .service exits nonzero. Between the two, every
# failure mode of a scheduled job surfaces -- "ran and failed" via unit
# state, "never ran / ran too long ago" here.
template: systemd_timer_overdue
on: systemd.timer_lag
class: Errors
type: Linux
component: Systemd units
lookup: max -120s of overdue
every: 60s
crit: $this != 0
# The 35-minute up-delay is the post-boot grace: a timer that looks overdue
# right after boot (stamp >2*period old because the box was off) is caught up
# by Persistent=true within minutes, the status flips back to CLEAR, and the
# pending notification is cancelled -- same for the spurious overdue=1 the
# first chart.sh sample can emit (race on stamp-file reads). A genuinely
# broken timer stays overdue and still notifies ~35 minutes after tripping.
# An uptime guard inside crit: is not expressible: health expressions only
# see the chart's own dimensions plus a few host tunables (see
# /api/v1/alarm_variables), so a system.uptime reference parses as a literal
# token and netdata silently drops the whole template -- no alert binds.
delay: up 35m down 10m
to: sysadmin
summary: Timer ${label:timer} overdue
info: systemd timer ${label:timer} has not fired within 2 * its declared period; either the timer was disabled, OnCalendar is wrong, or the system was off for an extended window
