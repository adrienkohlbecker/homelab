- name: mirrors | Set hostname and seed /etc/hosts
  import_role:
    name: hostname

- name: mirrors | Ensure systemd-resolved drop-in dir exists
  file:
    path: /etc/systemd/resolved.conf.d
    state: directory
    mode: "0755"
    owner: root
    group: root
  become: true

- name: mirrors | Select the bootstrap resolver for this backend
  set_fact:
    # LAN fixtures (local + lab qemu) run on the operator LAN, where the UDM
    # blocks outbound DoT (853) from every zone but lets clients reach the
    # household AdGuard VIP — so they resolve through it like any real client
    # (dns.fahm.fr cert, validated over the system CA store; the #name is SNI
    # only and is not itself resolved). AWS cells have no LAN VIP and open
    # public 853, so they bootstrap off the public anycast pair. Both ride TCP
    # via DoT, which is what keeps qemu's SLIRP UDP drops from flaking
    # resolution. Gated on test_in_aws (not test_backend == 'qemu'): the
    # aws_qemu cell is a qemu guest but in AWS, where the LAN VIP is
    # unreachable, so it must take the public branch. prod_network (not network)
    # because the VIP is the live LAN address, not the gsub'd test subnet.
    test_dot_servers: >-
      {{ (bootstrap_dns_resolver | join(' '))
         if test_in_aws | default(false) | bool
         else (prod_network.virtual_ips.dns ~ '#dns.fahm.fr') }}

- name: mirrors | Force DNS-over-TLS so all queries ride TCP
  copy:
    dest: /etc/systemd/resolved.conf.d/10-test-dns-over-tls.conf
    mode: "0644"
    owner: root
    group: root
    content: |
      [Resolve]
      DNS={{ test_dot_servers }}
      FallbackDNS=
      DNSOverTLS=yes
      Domains=~.
    validate: python3 -c 'import configparser,sys; configparser.ConfigParser(strict=False, delimiters=("=",)).read(sys.argv[1])' "%s"
  register: test_resolved_dot
  become: true

- name: mirrors | Restart systemd-resolved to pick up DoT config
  systemd:
    name: systemd-resolved
    state: restarted
  when: test_resolved_dot.changed
  become: true

- name: mirrors | Configure apt retries and sources
  import_role:
    name: apt

- name: mirrors | Decide whether this cell uses ECR registry mirrors
  set_fact:
    # test_in_aws, not test_backend: the aws_qemu qemu cell egresses through
    # AWS and reaches ECR (the controller mints the pull token), so it mirrors
    # through ECR like the EC2 cells rather than the unreachable LAN Nexus.
    test_use_ecr_registry_mirrors: >-
      {{ (test_in_aws | default(false) | bool)
         and (test_ecr_registry | default('') | length > 0)
         and (test_ecr_registry_mirrors | default({}) | length > 0) }}

- name: mirrors | Ensure /etc/containers/registries.conf.d exists
  when: (nexus_url | length > 0) or test_use_ecr_registry_mirrors
  file:
    path: /etc/containers/registries.conf.d
    state: directory
    mode: "0755"
    owner: root
    group: root
  become: true

- name: mirrors | Configure podman registry mirrors for Nexus
  when:
    - nexus_url | length > 0
    - not test_use_ecr_registry_mirrors
  copy:
    dest: /etc/containers/registries.conf.d/homelab-mirrors.conf
    mode: "0644"
    owner: root
    group: root
    # Mirror location includes /repository/<repo>: podman bakes this path
    # into the image namespace and emits /v2/repository/<repo>/<image>/...
    # which roles/nexus's nginx rewrite swaps to Nexus's expected
    # /repository/<repo>/v2/<image>/... layout. The bare-host form
    # (no path) doesn't work — Nexus's docker v2 API only lives under
    # /repository/<repo>/v2/, never at the host root.
    content: |
      [[registry]]
      location = "docker.io"

      [[registry.mirror]]
      location = "{{ nexus_url }}/repository/docker.io"

      [[registry]]
      location = "ghcr.io"

      [[registry.mirror]]
      location = "{{ nexus_url }}/repository/ghcr.io"
  become: true

- name: mirrors | Configure podman registry mirrors for ECR
  when: test_use_ecr_registry_mirrors
  copy:
    dest: /etc/containers/registries.conf.d/homelab-mirrors.conf
    mode: "0644"
    owner: root
    group: root
    content: |
      {% for source, prefix in test_ecr_registry_mirrors | dictsort %}
      [[registry]]
      location = "{{ source }}"

      [[registry.mirror]]
      location = "{{ test_ecr_registry }}/{{ prefix }}"
      {% endfor %}
  become: true

- name: mirrors | Ensure root containers auth dir exists
  when: test_use_ecr_registry_mirrors
  file:
    path: /root/.config/containers
    state: directory
    mode: "0700"
    owner: root
    group: root
  become: true

- name: mirrors | Write ECR auth for root podman pulls
  when: test_use_ecr_registry_mirrors
  copy:
    dest: /root/.config/containers/auth.json
    mode: "0600"
    owner: root
    group: root
    content: |
      {
        "auths": {
          "{{ test_ecr_registry }}": {
            "auth": "{{ ('AWS:' ~ lookup('pipe', 'aws --region ' ~ test_aws_region ~ ' ecr get-login-password')) | b64encode }}"
          }
        }
      }
    validate: python3 -m json.tool "%s"
  become: true

- name: mirrors | Configure pip
  when: nexus_url | length > 0
  copy:
    dest: /etc/pip.conf
    mode: "0644"
    owner: root
    group: root
    content: |
      [global]
      index-url = {{ mirror_pypi }}/simple/
    validate: python3 -c 'import configparser,sys; configparser.ConfigParser().read(sys.argv[1])' "%s"
  become: true

- name: mirrors | Ensure /etc/uv exists
  when: nexus_url | length > 0
  file:
    path: /etc/uv
    state: directory
    mode: "0755"
    owner: root
    group: root
  become: true

- name: mirrors | Configure uv
  when: nexus_url | length > 0
  copy:
    dest: /etc/uv/uv.toml
    mode: "0644"
    owner: root
    group: root
    content: |
      [[index]]
      url = "{{ mirror_pypi }}/simple/"
      default = true
    # Best-effort TOML parse: tomllib is 3.11+, so the find_spec guard no-ops on
    # jammy's 3.10 (no false-fail) and validates on noble/resolute, catching a
    # jinja typo in mirror_pypi that would otherwise land as malformed TOML.
    validate: python3 -c 'import sys,importlib.util; importlib.import_module("tomllib").load(open(sys.argv[1],"rb")) if importlib.util.find_spec("tomllib") else None' "%s"
  become: true
