- name: nginx | Install ssl-cert
  apt:
    pkg:
      - ssl-cert
    install_recommends: false
    cache_valid_time: 3600
  become: true

# Lay down snakeoil at the letsencrypt paths nginx.conf.j2 references so
# the prod nginx role can start its service in tests. Mirrors what
# certbot/_setup.yml does for roles that import certbot.
- name: nginx | Lay down snakeoil certs at letsencrypt paths
  shell: |
    set -euo pipefail
    mkdir -p /etc/letsencrypt/live/{{ item }}
    cp /etc/ssl/private/ssl-cert-snakeoil.key /etc/letsencrypt/live/{{ item }}/privkey.pem
    cp /etc/ssl/certs/ssl-cert-snakeoil.pem /etc/letsencrypt/live/{{ item }}/chain.pem
    cp /etc/ssl/certs/ssl-cert-snakeoil.pem /etc/letsencrypt/live/{{ item }}/fullchain.pem
  args:
    executable: /bin/bash
    creates: /etc/letsencrypt/live/{{ item }}/fullchain.pem
  loop:
    - "{{ inventory_hostname }}.{{ domain }}"
  become: true

- name: nginx | Install nginx
  import_role:
    name: nginx
    tasks_from: install
