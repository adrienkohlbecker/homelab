- name: nginx | Install ssl-cert
  apt:
    pkg:
      - ssl-cert
    install_recommends: false
    cache_valid_time: 3600
  become: true

# Lay down snakeoil at the letsencrypt paths nginx.conf.j2 references so the
# prod nginx role can start its service in tests. Shares roles/nginx's snakeoil
# task; the prod-perms hardening (harden_perms) is only needed for nginx's own
# _verify ssl-cert-removal check, not here.
- name: nginx | Lay down snakeoil certs at letsencrypt paths
  import_role:
    name: nginx
    tasks_from: _setup_snakeoil
  vars:
    nginx_snakeoil_args:
      fqdn: "{{ inventory_hostname }}.{{ domain }}"

- name: nginx | Install nginx
  import_role:
    name: nginx
    tasks_from: install
