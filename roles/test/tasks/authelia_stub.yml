# Test-only fixture: stand in for Authelia's /api/authz/auth-request
# endpoint so roles using nginx_site_args.auth=required can be tested
# without bringing up the real authelia role. Listens on
# 127.0.0.1:{{ service_ports.authelia }} (same port the prod authelia
# role publishes); response code depends on the `test_authelia_stub_mode`
# var the caller sets:
#   always_200 (default): every auth-request subrequest returns 200,
#       so the site template's `auth_request /internal/authelia` always
#       admits the parent. Use when the _verify only cares that the
#       wiring is intact and not the gate semantics (homepage today).
#   gate: returns 401 unauthenticated, so the parent's error_page 401
#       -> 302 redirect mapping fires for negative-path probes (no
#       token / wrong token in nginx_site_args.bypass_query_param
#       tests). The bypass `if` short-circuits BEFORE reaching the
#       stub, so positive-path tests still see 200 from upstream.
#       Like real Authelia, gate mode also returns a Location header
#       pointing at the portal with a ?rd=<original-url> returnUrl, so the
#       parent's modern redirect (auth_request_set $redirection_url
#       $upstream_http_location; error_page 401 =302 $redirection_url) has a
#       target to 302 to that routes back to the requested vhost.
#   authed: returns 200 plus a `Remote-User` header (value from
#       test_authelia_stub_user, default nginxverifyuser), like Authelia on a
#       successful auth. Lets a test exercise the auth-passes paths --
#       X-Forwarded-User forwarding and per-user upstream_authorization
#       injection (the $authelia_user-keyed map in upstream_auth_map.conf.j2).
#
# Localhost-only. Prod Authelia uses the same port; this fixture is
# only ever installed by tasks/_setup.yml chains under test/testrole.py,
# never on prod. The conf.d/ filename is prefixed with `test_` to make
# the test-only intent visible in operator listings.
- name: authelia_stub | Install nginx fixture for /api/authz/auth-request
  import_role:
    name: nginx
    tasks_from: conf_d
  vars:
    nginx_conf_d_args:
      name: test_authelia_stub.conf
      reload: "{{ not (ansible_check_mode and nginx_apt.changed) }}"
      content: |
        server {
          listen 127.0.0.1:{{ service_ports.authelia }};
          server_name _;
          location = /api/authz/auth-request {
        {% if (test_authelia_stub_mode | default('always_200')) == 'gate' %}
            # `always` so add_header applies to the 401 the way real Authelia
            # emits the portal redirect in its Location response header. Like
            # real Authelia, carry the returnUrl as ?rd=<original-url> so the
            # parent's error_page 401 =302 lands on a portal URL that routes
            # back to the requested vhost. $http_x_original_url is the
            # X-Original-URL the site's /internal/authelia subrequest forwards
            # ($scheme://$host$request_uri) -- so this also exercises that
            # forward-auth wiring, not just the bare redirect.
            add_header Location "https://auth.{{ inventory_hostname }}.{{ domain }}/?rd=$http_x_original_url" always;
            return 401;
        {% elif (test_authelia_stub_mode | default('always_200')) == 'authed' %}
            # authed: 200 with a Remote-User header, like Authelia on a
            # successful auth, so the parent's auth_request_set $authelia_user
            # populates (exercises X-Forwarded-User + upstream_authorization).
            add_header Remote-User "{{ test_authelia_stub_user | default('nginxverifyuser') }}" always;
            return 200 'test_stub_ok';
        {% else %}
            return 200 'test_stub_ok';
        {% endif %}
          }
          location / {
            return 404;
          }
        }
