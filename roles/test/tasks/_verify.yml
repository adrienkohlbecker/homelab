# Assertions for the mirrors fixture (invoked by testrole.py test).
#
# Two branches:
#   - nexus_url set → check apt/podman/pip/uv all point at Nexus, and that
#     etc_hosts_entries resolves to the configured IPs.
#   - nexus_url empty (--upstream-mirrors) → check apt points at upstream.

- name: _verify | Decide whether this cell uses ECR registry mirrors
  set_fact:
    test_use_ecr_registry_mirrors: >-
      {{ test_backend == 'aws'
         and (test_ecr_registry | default('') | length > 0)
         and (test_ecr_registry_mirrors | default({}) | length > 0) }}

- name: _verify | Stat apt sources files
  stat:
    path: "{{ item }}"
  loop:
    - /etc/apt/sources.list
    - /etc/apt/sources.list.d/ubuntu.sources
  register: test_apt_sources

- name: _verify | Read apt sources (jammy legacy)
  when: ansible_distribution_release == "jammy"
  slurp:
    src: /etc/apt/sources.list
  register: test_apt_legacy

- name: _verify | Read apt sources (noble+ deb822)
  when: ansible_distribution_release != "jammy"
  slurp:
    src: /etc/apt/sources.list.d/ubuntu.sources
  register: test_apt_deb822

- name: _verify | Apt sources point at Nexus
  when: nexus_url | length > 0
  assert:
    that:
      - >-
        nexus_url in (test_apt_legacy.content | default('') | b64decode)
        or nexus_url in (test_apt_deb822.content | default('') | b64decode)
    fail_msg: "apt sources don't reference {{ nexus_url }}"

- name: _verify | Apt sources point at upstream when no nexus
  when: not (nexus_url | length > 0)
  assert:
    that:
      - >-
        ('archive.ubuntu.com' in (test_apt_legacy.content | default('') | b64decode))
        or ('ports.ubuntu.com' in (test_apt_legacy.content | default('') | b64decode))
        or ('archive.ubuntu.com' in (test_apt_deb822.content | default('') | b64decode))
        or ('ports.ubuntu.com' in (test_apt_deb822.content | default('') | b64decode))
    fail_msg: "apt sources don't reference upstream archive/ports"

- name: _verify | Legacy /etc/apt/sources.list is absent on noble+
  when: ansible_distribution_release != "jammy"
  assert:
    that:
      - not (test_apt_sources.results[0].stat.exists)
    fail_msg: "/etc/apt/sources.list should be removed on noble+ (deb822 only)"

- name: _verify | Stat podman registry mirror config
  stat:
    path: /etc/containers/registries.conf.d/homelab-mirrors.conf
  register: test_registries

- name: _verify | Read podman registry mirror config
  when: ((nexus_url | length > 0) or test_use_ecr_registry_mirrors) and test_registries.stat.exists
  slurp:
    src: /etc/containers/registries.conf.d/homelab-mirrors.conf
  register: test_registries_content

- name: _verify | Podman registry mirrors reference Nexus
  when:
    - nexus_url | length > 0
    - not test_use_ecr_registry_mirrors
  assert:
    that:
      - test_registries.stat.exists
      # Assert the mirror *location* lines, not bare 'docker.io'/'ghcr.io':
      # those appear as the [[registry]] location regardless of whether the
      # [[registry.mirror]] block survived, so a substring check on the bare
      # names passes even with the mirror blocks dropped.
      - (nexus_url ~ '/repository/docker.io') in (test_registries_content.content | b64decode)
      - (nexus_url ~ '/repository/ghcr.io') in (test_registries_content.content | b64decode)
    fail_msg: "registries.conf.d/homelab-mirrors.conf missing or doesn't mirror docker.io+ghcr.io to {{ nexus_url }}"

- name: _verify | Podman registry mirrors reference ECR
  when: test_use_ecr_registry_mirrors
  assert:
    that:
      - test_registries.stat.exists
      - (test_ecr_registry ~ '/docker-hub') in (test_registries_content.content | b64decode)
      - (test_ecr_registry ~ '/github') in (test_registries_content.content | b64decode)
      - (test_ecr_registry ~ '/gitlab') in (test_registries_content.content | b64decode)
      - (test_ecr_registry ~ '/quay') in (test_registries_content.content | b64decode)
    fail_msg: "registries.conf.d/homelab-mirrors.conf missing or doesn't mirror docker.io+ghcr.io+registry.gitlab.com+quay.io to {{ test_ecr_registry }}"

- name: _verify | Stat pip and uv configs
  stat:
    path: "{{ item }}"
  loop:
    - /etc/pip.conf
    - /etc/uv/uv.toml
  register: test_pip_uv

- name: _verify | Read pip config
  when:
    - nexus_url | length > 0
    - test_pip_uv.results[0].stat.exists
  slurp:
    src: /etc/pip.conf
  register: test_pip_content

- name: _verify | Read uv config
  when:
    - nexus_url | length > 0
    - test_pip_uv.results[1].stat.exists
  slurp:
    src: /etc/uv/uv.toml
  register: test_uv_content

- name: _verify | Pip and uv configs reference Nexus pypi mirror
  when: nexus_url | length > 0
  assert:
    that:
      - test_pip_uv.results[0].stat.exists
      - test_pip_uv.results[1].stat.exists
      - mirror_pypi in (test_pip_content.content | b64decode)
      - mirror_pypi in (test_uv_content.content | b64decode)
    fail_msg: "/etc/pip.conf or /etc/uv/uv.toml missing or doesn't reference {{ mirror_pypi }}"

- name: _verify | Resolve etc_hosts_entries to configured IPs
  when:
    - nexus_url | length > 0
    - etc_hosts_entries | length > 0
  # argv form (no shell, no quoting around the hostname) + an exact match on a
  # whitespace-split field: a substring `in stdout` would let a configured
  # 10.0.0.1 pass against a resolved 10.0.0.10.
  command:
    argv:
      - getent
      - hosts
      - "{{ item.key }}"
  loop: "{{ etc_hosts_entries | dict2items }}"
  register: test_getent
  changed_when: false
  failed_when: test_getent.rc != 0 or item.value not in test_getent.stdout.split()
  loop_control:
    label: "{{ item.key }} -> {{ item.value }}"

- name: _verify | Apt update reaches configured mirror
  apt:
    update_cache: true
    cache_valid_time: 0
  become: true

# Functional mirror probes: the slurp+substring asserts above prove the config
# files name Nexus, but not that the mirror actually serves -- the registries.conf
# path layout in particular is subtle (the docker v2 API lives only under
# /repository/<repo>/v2/, see mirrors.yml). Hit each mirror's API so a
# parses-but-404s mirror fails here, the way the apt update above does for apt.
- name: _verify | Podman docker.io mirror serves its v2 API
  when:
    - nexus_url | length > 0
    - not test_use_ecr_registry_mirrors
  uri:
    # nexus_url is a bare host (the registries.conf mirror location, where podman
    # supplies the scheme); add https:// for a direct probe. validate_certs:false
    # -- this checks the mirror *serves*, not its cert, on a throwaway VM.
    url: "https://{{ nexus_url }}/repository/docker.io/v2/"
    validate_certs: false
    # Nexus answers the v2 root 200 (anonymous) or 401 (auth-gated); a 404 means
    # the mirror location the registries.conf points at doesn't exist.
    status_code: [ 200, 401 ]
    timeout: 15
  register: test_podman_mirror

- name: _verify | PyPI mirror serves a known package index
  when: nexus_url | length > 0
  uri:
    # mirror_pypi already carries https://. Probe a package that always exists
    # rather than the bare /simple/ root (whose response varies by Nexus config).
    url: "{{ mirror_pypi }}/simple/pip/"
    validate_certs: false
    status_code: [ 200, 301, 302 ]
    timeout: 15
  register: test_pypi_mirror

# DNS-over-TLS verification: mirrors.yml forces DoT so every query rides TCP
# (the qemu SLIRP UDP-drop class of flakes). A stat of the drop-in would be a
# tautology -- assert the *running* resolver state instead, scoped to the Global
# Protocols line (driven by resolved.conf.d/) the way roles/resolved does.
- name: _verify | Read resolvectl status
  command: resolvectl status
  register: test_resolvectl
  changed_when: false
  become: true

- name: _verify | Isolate the Global Protocols line
  set_fact:
    test_resolvectl_global_protocols: >-
      {{ test_resolvectl.stdout_lines
         | select('search', 'Protocols:') | list | first | default('') }}
    # Mirror mirrors.yml's backend split: qemu resolves through the household
    # AdGuard VIP, AWS cells through the public anycast pair.
    test_expected_resolvers: >-
      {{ [prod_network.virtual_ips.dns]
         if test_backend == 'qemu'
         else bootstrap_dns_resolver }}

- name: _verify | DNS-over-TLS is enforced at the configured resolver
  assert:
    that:
      - "'+DNSOverTLS' in test_resolvectl_global_protocols"
      - >-
        (test_expected_resolvers | select('in', test_resolvectl.stdout) | list | length)
        == (test_expected_resolvers | length)
    fail_msg: >-
      systemd-resolved isn't enforcing DNS-over-TLS via {{ test_expected_resolvers | join(', ') }};
      the 10-test-dns-over-tls.conf drop-in didn't take effect, so queries can fall
      back to UDP and revive the SLIRP UDP-drop flakes it exists to prevent. Global
      Protocols line: {{ test_resolvectl_global_protocols }}

# Functional proof that public resolution actually works end-to-end: the
# whole reason for the backend-aware resolver. qemu rides the LAN VIP →
# household AdGuard → DoH upstreams; AWS rides public DoT directly. Retried
# because a single DoT handshake can lose the first round trip on a cold
# resolver. wikipedia.org is a neutral name the household filter lists pass.
- name: _verify | Resolve a public name over the enforced resolver
  command: resolvectl query --cache=no wikipedia.org
  register: test_public_resolve
  changed_when: false
  become: true
  retries: 5
  delay: 3
  until: test_public_resolve.rc == 0

# nginx fixture: snakeoil certs + prod roles/nginx tasks_from: install.

- name: _verify | Stat snakeoil cert paths
  stat:
    path: "{{ item }}"
  loop:
    - /etc/letsencrypt/live/{{ inventory_hostname }}.{{ domain }}/privkey.pem
    - /etc/letsencrypt/live/{{ inventory_hostname }}.{{ domain }}/chain.pem
    - /etc/letsencrypt/live/{{ inventory_hostname }}.{{ domain }}/fullchain.pem
  register: test_letsencrypt

- name: _verify | Letsencrypt cert files exist
  assert:
    that:
      - item.stat.exists
    fail_msg: "missing cert at {{ item.item }}"
  loop: "{{ test_letsencrypt.results }}"
  loop_control:
    label: "{{ item.item }}"

- name: _verify | Read /etc/nginx/nginx.conf
  slurp:
    src: /etc/nginx/nginx.conf
  register: test_nginx_conf

- name: _verify | Nginx.conf contains expected directives
  assert:
    that:
      - "'/etc/letsencrypt/live/' in (test_nginx_conf.content | b64decode)"
      - "'$connection_upgrade' in (test_nginx_conf.content | b64decode)"
      - "'$request_safe' in (test_nginx_conf.content | b64decode)"
    fail_msg: "/etc/nginx/nginx.conf doesn't look like prod's nginx.conf.j2 render"

- name: _verify | Nginx is active
  systemd:
    name: nginx
  register: test_nginx_unit
  failed_when: >-
    test_nginx_unit.status.LoadState != "loaded"
    or test_nginx_unit.status.ActiveState != "active"
  become: true

# Functional liveness over the loopback stub_status drop (roles/nginx install
# lands it): a plain-HTTP 127.0.0.1 probe sidesteps the SNI trap an
# https://localhost/ probe hits on OpenSSL 3.x (noble/resolute reject SNI that
# matches no server_name), and asserting the body proves nginx is actually
# serving rather than accepting any of a broad status set. The TLS config itself
# is covered by the nginx.conf directive grep above + the unit-active check (the
# install's nginx -t won't start the service unless the cert loads).
- name: _verify | Nginx stub_status serves on loopback
  uri:
    url: http://127.0.0.1/nginx_status
    return_content: true
    status_code: 200
  register: test_nginx_status
  failed_when: >-
    test_nginx_status.status != 200
    or 'Active connections' not in (test_nginx_status.content | default(''))
