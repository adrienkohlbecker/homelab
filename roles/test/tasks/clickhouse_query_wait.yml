# Poll a ClickHouse query until a caller-supplied predicate is true, or
# fail after retries. Companion to clickhouse_query.yml -- kept separate so
# the wait-loop shape (templated until: from caller) stays trusted under
# Ansible 2.19+ while the one-shot fetch keeps a literal conditional.
#
# Inputs (single dict, replaced wholesale per call):
#   test_args.sql      SQL string. Stdin'd to curl so quotes / square
#                       brackets stay human-readable.
#   test_args.label    Short tag for the task name (default "query").
#   test_args.retries  Poll count (default 30).
#   test_args.delay    Seconds between polls (default 2).
#   test_args.until    Predicate evaluated against
#                       test_clickhouse_result each iteration. Required;
#                       the helper has no sensible default for what
#                       "ready" means in caller-specific data.
#
# No failed_when: the task retries until `until` holds or retries exhaust, and
# Ansible fails the task on exhaustion. Every caller's `until` is anchored on
# `test_clickhouse_result.rc == 0`, so a transient curl failure simply keeps the
# loop polling (the point of the wait) while a row that never appears now fails
# loudly. A custom failed_when here would *override* that exhaustion failure --
# an rc==0 poll whose predicate never goes true would report ok, silently
# passing the exact assertion the wait exists to make.
#
# Output:
#   test_clickhouse_result.stdout: response from the final iteration.
# wait_end_of_query=1 buffers the full response server-side so a query
# error raised mid-stream arrives as a non-200 status (with the exception
# in the body) rather than a 200 whose body is silently truncated --
# without it curl --fail-with-body can't see the error.
- name: "clickhouse_query_wait | Assert caller supplied an until predicate"
  assert:
    that:
      - (test_args.until | default('')) | length > 0
    fail_msg: >-
      clickhouse_query_wait requires test_args.until (a boolean expression over
      test_clickhouse_result). An empty until is treated as immediately true, so
      the task would run once and never wait -- silently dropping the poll.

- name: "clickhouse_query_wait | {{ test_args.label | default('query') }}"
  command:
    cmd: "{{ _test_clickhouse_curl_cmd }}"
    stdin: "{{ test_args.sql }}"
  register: test_clickhouse_result
  changed_when: false
  retries: "{{ test_args.retries | default(30) }}"
  delay: "{{ test_args.delay | default(2) }}"
  until: "{{ test_args.until }}"
  become: true
