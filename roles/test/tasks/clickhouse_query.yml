# Run a one-shot ClickHouse query via the hyperdx container's curl.
# Used by observability roles' _verify tasks for marker-based assertions
# against the OTel logs table.
#
# Inputs (single dict, replaced wholesale per call):
#   test_args.sql    SQL string. Passed via stdin so quotes / square
#                     brackets stay human-readable rather than URL-encoded.
#   test_args.label  Short tag for the task name (default "query").
#
# Output:
#   test_clickhouse_result.stdout: raw response body (caller parses).
#
# For wait-loops (poll until a row appears) use clickhouse_query_wait.yml
# instead -- splitting the wait variant out keeps the conditional shape
# literal in the role file, which Ansible 2.19's trust check requires
# (default-from-filter conditionals that reference a register'd module
# result fail with "Encountered untrusted template or expression").
# wait_end_of_query=1 buffers the full response server-side so a query
# error raised mid-stream arrives as a non-200 status (with the exception
# in the body) rather than a 200 whose body is silently truncated --
# without it curl --fail-with-body can't see the error and the task passes
# with garbage stdout.
- name: "clickhouse_query | {{ test_args.label | default('query') }}"
  command:
    cmd: "{{ _test_clickhouse_curl_cmd }}"
    stdin: "{{ test_args.sql }}"
  register: test_clickhouse_result
  changed_when: false
  become: true
