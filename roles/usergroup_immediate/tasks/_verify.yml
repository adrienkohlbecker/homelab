- name: _verify | All usergroup_immediate scenarios
  block:
    # Scenario 1: string input (the common case — docker_client, media)
    - name: _verify | Add user to a single group (string)
      import_role:
        name: usergroup_immediate
        tasks_from: user
      vars:
        usergroup_immediate_args:
          group: usergroup_immediate_test

    # /etc/group is authoritative immediately; mitogen's reset_connection
    # doesn't reliably refresh a live worker's process supplementary set,
    # so verify via the group database rather than `id -nG`.
    - name: _verify | Read the group database after string input
      getent:
        database: group

    - name: _verify | User belongs to the test group
      assert:
        that:
          - ansible_user_id in getent_group['usergroup_immediate_test'][2].split(',')
        fail_msg: >-
          {{ ansible_user_id }} expected in usergroup_immediate_test;
          members: {{ getent_group['usergroup_immediate_test'][2] | default('') }}

    # Scenario 2: list input (the libvirt case)
    - name: _verify | Create a second test group
      group:
        name: usergroup_immediate_test2
        system: true
      become: true

    - name: _verify | Add user to multiple groups (list)
      import_role:
        name: usergroup_immediate
        tasks_from: user
      vars:
        usergroup_immediate_args:
          group:
            - usergroup_immediate_test
            - usergroup_immediate_test2

    - name: _verify | Read the group database after list input
      getent:
        database: group

    - name: _verify | User belongs to both test groups
      assert:
        that:
          - ansible_user_id in getent_group[item][2].split(',')
        fail_msg: "{{ ansible_user_id }} expected in group {{ item }}"
      loop:
        - usergroup_immediate_test
        - usergroup_immediate_test2

    # Scenario 3: idempotence — re-adding the same group should not change
    - name: _verify | Re-add user to the same group (idempotence)
      import_role:
        name: usergroup_immediate
        tasks_from: user
      vars:
        usergroup_immediate_args:
          group: usergroup_immediate_test

    - name: _verify | Second invocation did not report changed
      assert:
        that:
          - not usergroup_immediate_result.changed
        fail_msg: re-adding an existing group reported changed (idempotence violation)

  always:
    - name: _verify | Remove user from test groups
      command: gpasswd -d {{ ansible_user_id }} {{ item }}
      become: true
      loop:
        - usergroup_immediate_test
        - usergroup_immediate_test2
      failed_when: false
      changed_when: false

    - name: _verify | Tear down test groups
      group:
        name: "{{ item }}"
        state: absent
      become: true
      loop:
        - usergroup_immediate_test
        - usergroup_immediate_test2
