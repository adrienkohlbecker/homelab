# Inputs:
#   usergroup_immediate_args:
#     group   (required, string or list) — group(s) to add ansible_user_id to.
#             Each group must already exist; the `user` module hard-fails on a
#             missing group, so the caller gates with
#             `when: not (ansible_check_mode and <group_task>.changed)`.
#
# Outputs:
#   usergroup_immediate_result — the user module result (internal; not a stable API)
#
# Side-effect: on change, resets the SSH connection so a subsequent task in
# the play — including in later roles — can pick up the new membership
# without a re-login. Caveat: /etc/group is authoritative immediately, but
# mitogen doesn't reliably refresh a live worker's process supplementary
# set, so a non-`become` task that depends on the new group may not observe
# it until a genuinely fresh connection; it is reliably effective at the
# next login/service start.

- name: user | Validate inputs
  assert:
    that:
      - usergroup_immediate_args is defined
      - usergroup_immediate_args.group is defined
      - usergroup_immediate_args.group is string or usergroup_immediate_args.group is sequence
      - usergroup_immediate_args.group | length > 0
    quiet: true
    fail_msg: >-
      usergroup_immediate_args.group must be a non-empty string or list,
      got: {{ usergroup_immediate_args.group | default('undefined') }}

- name: user | Add user to group
  user:
    name: "{{ ansible_user_id }}"
    groups: "{{ usergroup_immediate_args.group }}"
    append: true
  register: usergroup_immediate_result
  become: true

# meta: reset_connection ignores task-level when:; include_tasks
# evaluates the condition before dispatching, so it works correctly.
- name: user | Reset connection to apply user group change
  include_tasks: reset_connection.yml
  when: usergroup_immediate_result.changed and not ansible_check_mode
