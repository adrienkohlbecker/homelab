- name: Install Go
  apt:
    pkg:
      - golang
    cache_valid_time: 3600
  become: true
  tags:
    - custom_exporter

- name: Create source directory
  file:
    dest: /opt/custom_exporter
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true
  register: custom_exporter_dir
  tags:
    - custom_exporter

- name: Copy files
  copy:
    src: "{{ item }}"
    dest: /opt/custom_exporter/{{ item }}
    owner: root
    group: root
    mode: "0644"
    backup: true
  loop:
    - go.mod
    - go.sum
    - main.go
  register: custom_exporter_files
  become: true
  tags:
    - custom_exporter

- name: Compile source
  command: go build main.go
  args:
    chdir: /opt/custom_exporter
  changed_when: true
  when: not (ansible_check_mode and custom_exporter_dir.changed) and custom_exporter_files.changed
  become: true
  tags:
    - custom_exporter

- name: Configure custom_exporter
  template:
    src: env.j2
    dest: /etc/default/custom_exporter
    owner: root
    group: root
    mode: "0644"
    backup: true
  register: custom_exporter_cfg
  become: true
  tags:
    - custom_exporter

- name: Install custom_exporter service
  import_role:
    name: systemd_unit
    tasks_from: install
  vars:
    systemd_unit_args:
      src: custom_exporter.service
  tags:
    - custom_exporter

- name: Enable custom_exporter service
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: custom_exporter
      condition: "{{ not (ansible_check_mode and systemd_unit.changed) }}"
      restart: "{{ systemd_unit.changed or custom_exporter_files.changed or custom_exporter_cfg.changed }}"
  tags:
    - custom_exporter

- name: Configure netdata alerts
  import_role:
    name: netdata
    tasks_from: health_copy
  vars:
    netdata_copy_src: alerts.conf
    netdata_copy_dest: custom_exporter.conf
    netdata_copy_mode: "0600"
  tags:
    - custom_exporter

- name: Configure nginx
  import_role:
    name: nginx
    tasks_from: site
  vars:
    nginx_site_args:
      subdomain: custom-exporter
      proxy_pass: http://localhost:19392/
      server_conf: |
        location = / {
          return 301 /metrics;
        }
  tags:
    - custom_exporter
