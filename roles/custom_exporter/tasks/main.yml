- name: Create source directory
  file:
    dest: /opt/custom_exporter
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true
  register: custom_exporter_dir
  tags:
    - custom_exporter

- name: Install custom_exporter
  copy:
    src: main.py
    dest: /opt/custom_exporter/main.py
    owner: root
    group: root
    mode: "0755"
    backup: true
  register: custom_exporter_files
  become: true
  tags:
    - custom_exporter

- name: Configure custom_exporter
  template:
    src: env.j2
    dest: /etc/default/custom_exporter
    owner: root
    group: root
    mode: "0644"
    backup: true
  register: custom_exporter_cfg
  become: true
  tags:
    - custom_exporter

- name: Install custom_exporter service
  import_role:
    name: systemd_unit
    tasks_from: install
  vars:
    systemd_unit_args:
      src: custom_exporter.service
  tags:
    - custom_exporter

- name: Enable custom_exporter service
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: custom_exporter
      condition: "{{ not (ansible_check_mode and custom_exporter_service_result.changed) }}"
      restart: "{{ custom_exporter_service_result.changed or custom_exporter_files.changed or custom_exporter_cfg.changed }}"
  tags:
    - custom_exporter

- name: Configure netdata alerts
  import_role:
    name: netdata
    tasks_from: health_copy
  vars:
    netdata_args:
      src: alerts.conf
      dest: custom_exporter.conf
      mode: "0600"
  tags:
    - custom_exporter

- name: Configure nginx
  import_role:
    name: nginx
    tasks_from: site
  vars:
    nginx_site_args:
      subdomain: custom-exporter
      proxy_pass: http://localhost:{{ service_ports.custom_exporter }}/
      server_conf: |
        location = / {
          return 301 /metrics;
        }
  tags:
    - custom_exporter
