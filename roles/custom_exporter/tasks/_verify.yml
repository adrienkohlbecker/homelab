# Functional verification of the metrics endpoint and both netdata-presence
# gap-closers (netdata_context_present, netdata_collector_present).
# Drive-state monitoring moved to roles/hdparm (charts.d) and cron/timer
# freshness moved to roles/systemd_timer (charts.d) -- neither lives here
# anymore. What's left is the presence checks that have to live OUTSIDE
# netdata because their whole job is to detect "this thing never appeared
# in netdata's chart registry."

- name: _verify | custom_exporter.service is loaded and active
  systemd:
    name: custom_exporter
  register: _verify_unit
  failed_when: >-
    _verify_unit.status.LoadState != "loaded"
    or _verify_unit.status.ActiveState != "active"
  become: true

- name: _verify | metrics endpoint serves exporter_up=1
  uri:
    url: http://localhost:{{ service_ports.custom_exporter }}/metrics
    return_content: true
  register: _verify_metrics
  retries: 15
  delay: 2
  until: _verify_metrics.status == 200 and 'exporter_up 1' in _verify_metrics.content

# Exercise the nginx reverse proxy installed by main.yml -- a backend-port-only
# probe would let a broken proxy_pass / server_name ship silently.
- name: _verify | metrics endpoint reachable through nginx proxy
  uri:
    url: https://localhost/metrics
    headers:
      Host: custom-exporter.{{ inventory_hostname }}.{{ domain }}
    validate_certs: false
    return_content: true
  register: _verify_proxy
  retries: 15
  delay: 2
  until: _verify_proxy.status == 200 and 'exporter_up 1' in _verify_proxy.content

# The / -> /metrics redirect is server_conf in main.yml; assert the 301 itself
# rather than following it so a regression that drops the redirect surfaces here.
- name: _verify | root path redirects to /metrics
  uri:
    url: https://localhost/
    headers:
      Host: custom-exporter.{{ inventory_hostname }}.{{ domain }}
    validate_certs: false
    follow_redirects: none
    status_code: 301
  register: _verify_redirect
  failed_when: >-
    _verify_redirect.status != 301
    or _verify_redirect.location is not defined
    or not _verify_redirect.location.endswith('/metrics')

# host_vars/box.yml seeds netdata_contexts with two entries:
#   system_cpu -> system.cpu       (real chart, always live on a running netdata)
#   ghost      -> foo.does_not_exist (never appears in /api/v2/contexts)
# The exporter should emit netdata_context_present=1 for the former and 0 for
# the latter; the alerts.conf netdata_context_missing template alerts on the 0.
- name: _verify | netdata_context_present reflects API state for configured contexts
  uri:
    url: http://localhost:{{ service_ports.custom_exporter }}/metrics
    return_content: true
  register: _verify_ctx_present
  retries: 15
  delay: 2
  until: >-
    _verify_ctx_present.status == 200
    and 'netdata_context_present{context="system_cpu"} 1' in _verify_ctx_present.content
    and 'netdata_context_present{context="ghost"} 0' in _verify_ctx_present.content

# Native $last_collected_t alerts only bind to charts that exist. Confirm the
# system.cpu liveness template instantiated; ghost is *expected* to silently
# drop (that's the gap netdata_context_present closes).
- name: _verify | context_liveness alert registered for the real chart only
  uri:
    url: http://localhost:19999/api/v1/alarms?all
    return_content: true
  register: _verify_alarms
  retries: 5
  delay: 2
  until: _verify_alarms.status == 200
- name: _verify | liveness_system_cpu present, liveness_ghost absent
  vars:
    _alarm_keys: "{{ (_verify_alarms.content | from_json).alarms.keys() | list }}"
  assert:
    that:
      - _alarm_keys | select('search', 'liveness_system_cpu') | list | length > 0
      - _alarm_keys | select('search', 'liveness_ghost') | list | length == 0
    fail_msg: >-
      Expected liveness_system_cpu to be registered and liveness_ghost to be
      silently dropped (ghost chart doesn't exist). Got alarm keys: {{ _alarm_keys }}

# Collector presence mirrors context presence: the configured-but-never-
# instantiated collector (go.d:collector:fake_plugin:fake_job) lands as 0.
# Native staleness/failure templates can't catch that case because they bind
# at parse time to charts that exist.
- name: _verify | netdata_collector_present reflects chart-registry state
  uri:
    url: http://localhost:{{ service_ports.custom_exporter }}/metrics
    return_content: true
  register: _verify_coll_present
  retries: 15
  delay: 2
  until: >-
    _verify_coll_present.status == 200
    and 'netdata_collector_present{collector="go.d:collector:fake_plugin:fake_job"} 0' in _verify_coll_present.content

# Confirm the native collector_stale / collector_failing templates registered
# against at least one real go.d collector instance. The test fixture has
# minimal go.d activity, but core collectors (logind, systemdunits, zfspool)
# always run, so netdata.plugin_data_collection_status has instances.
- name: _verify | collector_stale + collector_failing templates instantiated
  vars:
    _alarm_keys: "{{ (_verify_alarms.content | from_json).alarms.keys() | list }}"
  assert:
    that:
      - _alarm_keys | select('search', 'collector_stale') | list | length > 0
      - _alarm_keys | select('search', 'collector_failing') | list | length > 0
    fail_msg: >-
      Expected collector_stale / collector_failing to be registered against
      netdata.plugin_data_collection_status charts. Got alarm keys: {{ _alarm_keys }}

# gather_last_iteration_timestamp is the goroutine heartbeat -- guards the
# wedged-loop scenario where the HTTP server keeps serving but the gather
# routine has stalled. Should be within the last few seconds of "now".
- name: _verify | gather heartbeat is recent
  uri:
    url: http://localhost:{{ service_ports.custom_exporter }}/metrics
    return_content: true
  register: _verify_heartbeat
  retries: 15
  delay: 2
  until: >-
    _verify_heartbeat.status == 200
    and (_verify_heartbeat.content
         | regex_findall('^gather_last_iteration_timestamp ([0-9.e+-]+)$', multiline=True)
         | first | default('0') | float | int) > 0
- name: _verify | assert heartbeat within 30s of now
  vars:
    _heartbeat: >-
      {{ (_verify_heartbeat.content
          | regex_findall('^gather_last_iteration_timestamp ([0-9.e+-]+)$', multiline=True)
          | first | default('0') | float | int) }}
    _now: "{{ ansible_date_time.epoch | int }}"
  assert:
    that:
      - _heartbeat | int > 0
      - (_now | int) - (_heartbeat | int) < 30
    fail_msg: >-
      gather_last_iteration_timestamp is {{ _heartbeat }};
      expected within 30s of now ({{ _now }})
