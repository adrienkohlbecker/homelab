template: custom_exporter_last_collected_secs
on: prometheus.custom.exporter_up
calc: $now - $last_collected_t
every: 60s
crit: $this > ( 5 * 60 )
summary: Custom Exporter is down
info: Unable to collect metrics from custom exporter

template: custom_exporter_errors
on: prometheus.custom.exporter_errors
lookup: max -5m
every: 60s
crit: $this > 0
delay: down 5m
summary: Custom Exporter is reporting errors
info: Some metrics may be failing

template: custom_exporter_gather_stalled
on: prometheus.custom.gather_last_iteration_timestamp
calc: $now - $this
every: 60s
crit: $this > (60)
summary: Custom Exporter gather loop is stalled
info: gatherMetrics() goroutine has not completed an iteration in over 60s

template: netdata_collector_missing
on: prometheus.custom.netdata_collector_present
lookup: min -60s foreach collector
every: 60s
crit: $this < (1)
delay: up 5m
summary: Collector ${label:collector} not registered with netdata
info: Configured collector ${label:collector} has no corresponding netdata.go_d_*_data_collection_status chart -- collector configuration was rejected, job name drifted, or plugin failed to load. Native staleness/failure alerts (see context_liveness.conf) cover the runtime path; this catches the never-instantiated case.

template: netdata_context_missing
on: prometheus.custom.netdata_context_present
lookup: min -60s foreach context
every: 60s
crit: $this < (1)
delay: up 5m
summary: Context ${label:context} not registered with netdata
info: Configured context ${label:context} has never appeared in netdata's chart registry -- native liveness templates can't bind to a chart that doesn't exist, so this exporter-side presence check is what surfaces a misnamed context, disabled collector, or upstream rename.

template: hdparm_drive_active
on: prometheus.custom.hdparm_drive_active
lookup: min -28800s foreach device
every: 60s
crit: $this == (1)
summary: Drive ${label:device} spinning
info: Rotational drive ${label:device} is currently spinning for more than 8 hours

template: hdparm_drive_unknown
on: prometheus.custom.hdparm_drive_unknown
lookup: min -300s foreach device
every: 60s
crit: $this == (1)
summary: Drive ${label:device} in unknown state
info: hdparm cannot read power state for ${label:device}, often a pre-failure SATA-link symptom

template: cron_job_missed
on: prometheus.custom.cron_next_run_timestamp
lookup: max -60s foreach job
every: 60s
crit: $this > (0) AND $this < $now
warn: $this == (0)
delay: up 1h
summary: Cron job ${label:job} is late
info: Cron job ${label:job} has not run during its configured maximum interval
repeat: critical 1d
