# Custom parser for pihole-FTL's runtime log (/var/log/pihole/FTL.log),
# tailed under the pihole_ftl tag. FTL lines are:
#
#   2026-06-09 04:20:02.163 CEST [52M] INFO: Asked to terminate by ...
#   2026-06-09 05:57:09.152 CEST [52/T99] ERROR: add_message(...) - SQL ...
#
# i.e. <date> <tz> [<pid>(M|/T<tid>)] <LEVEL>: <body>. The PID bracket is
# either `<pid>M` (the main thread) or `<pid>/T<tid>` (a worker thread). The
# level token (INFO / WARNING / ERROR / DEBUG_<category> / ...) is FTL's own
# authoritative classification -- lnav_shape maps ftl_level to the record
# level rather than letting the generic keyword scan guess from the body,
# which would misread a body like "... - SQL error ..." on an INFO line.
#
# No Time_Key: FTL stamps a named timezone abbreviation (CEST/CET), which
# strptime cannot convert to a reliable offset, so the record keeps fluent
# bit's ingest time (within the ~5s flush window) and ftl_time/ftl_tz are
# preserved as fields for the exact daemon-local time. A line that does not
# match (startup banner, dnsmasq passthrough) is left untouched and flows
# through as a plain message.
[PARSER]
    Name        pihole_ftl
    Format      regex
    Regex       ^(?<ftl_time>\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}\.\d+) (?<ftl_tz>[A-Z]+) \[(?<pid>\d+)(?:M|/T(?<thread>\d+))?\] (?<ftl_level>[A-Z_]+): +(?<body>.*)$
    Types       pid:integer thread:integer
