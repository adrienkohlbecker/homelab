# Custom nginx access-log parser for the homelab `custom` log_format
# (defined in roles/nginx/templates/nginx.conf.j2). Extracts the HTTP
# transaction fields so lnav can filter and aggregate by method / status /
# path / latency instead of grepping the opaque access line.
#
# The capture order MUST track the log_format directive verbatim:
#   $remote_addr - $remote_user [$time_local] $host "$request" $server_name
#   $status $body_bytes_sent $request_length $request_time
#   $upstream_response_time "$referer" "$user_agent" $ssl_protocol $ssl_cipher
#
# Notes:
#  - The $host header is captured as `http_host`, never `host` -- the modify
#    filter reserves `host` for inventory_hostname, and a parsed key would
#    clobber it.
#  - The request line uses the stock graceful idiom (optional path/protocol)
#    so a malformed request -- a bad method, a missing HTTP version, a bare
#    "-" -- still yields a record with method captured rather than dropping
#    the line. On a non-match the parser filter leaves the record untouched
#    and it flows through as a plain message.
#  - $upstream_response_time is "-" when no upstream was contacted (static
#    response, redirect, error before proxy_pass); the alternation keeps it a
#    string in those cases rather than failing the float type cast.
#  - No Time_Key: the record keeps Fluent Bit's ingest time, like every other
#    stream in the aggregate. Adopting nginx's $time_local would timestamp the
#    record in the past (nginx buffers access.log ~5s) while it is written in
#    ingest order, so lnav -- which reads the merged store in file order --
#    would flag the access records out-of-time-order. time_local is preserved
#    as a field for the exact request moment.
[PARSER]
    Name        nginx_access_custom
    Format      regex
    Regex       ^(?<remote_addr>[^ ]+) - (?<remote_user>[^ ]+) \[(?<time_local>[^\]]+)\] (?<http_host>[^ ]+) "(?<method>\S+)(?: +(?<path>[^"]*?)(?: +(?<protocol>\S+))?)?" (?<server_name>[^ ]+) (?<status>\d{3}) (?<body_bytes_sent>\d+) (?<request_length>\d+) (?<request_time>[\d.]+) (?<upstream_response_time>[\d.]+|-) "(?<referer>[^"]*)" "(?<user_agent>[^"]*)" (?<ssl_protocol>\S+) (?<ssl_cipher>\S+)$
    Types       status:integer body_bytes_sent:integer request_length:integer request_time:float
