    fail_msg: "nginx access record landed with wrong shape: {{ row }}"

# Exercises level_from_message's table dispatch on a non-error
# keyword (WARN), distinct from the existing ERROR probe above:
# catches mis-ordering of the priority table and SEV-mapping drift
# after the SMP2 if/elseif -> table rewrite.
- name: _verify | Journald warn | build per-run marker
  set_fact:
    fluentbit_otlp_warn_marker: "verify_warn_{{ ansible_date_time.iso8601_basic_short }}_{{ 99999 | random }}"

- name: _verify | Journald warn | emit marked log via transient unit
