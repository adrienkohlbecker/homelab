- name: _verify | Fluent-bit.service is loaded and active
  systemd:
    name: fluent-bit
  register: _fluentbit_unit
  failed_when: >-
    _fluentbit_unit.status.LoadState != "loaded"
    or _fluentbit_unit.status.ActiveState != "active"
  become: true

- name: _verify | State-directory perms | stat
  stat:
    path: "{{ item }}"
  loop:
    - /var/lib/fluent-bit
    - /var/lib/fluent-bit/storage
  register: _fluentbit_state_dirs
  become: true

- name: _verify | State-directory perms | assert 0700 root:root
  assert:
    that:
      - item.stat.exists
      - item.stat.isdir
      - item.stat.mode == '0700'
      - item.stat.pw_name == 'root'
      - item.stat.gr_name == 'root'
    fail_msg: "fluent-bit state dir leaked perms: {{ item.stat.path }} mode={{ item.stat.mode }} owner={{ item.stat.pw_name }}:{{ item.stat.gr_name }}"
  loop: "{{ _fluentbit_state_dirs.results }}"
  loop_control:
    label: "{{ item.stat.path }}"

- name: _verify | JSONL store perms | stat
  stat:
    path: /var/log/fluent-bit/lnav.jsonl
  register: _fluentbit_lnav_store
  become: true

- name: _verify | JSONL store perms | assert 0640 root:adm
  assert:
    that:
      - _fluentbit_lnav_store.stat.exists
      - (_fluentbit_lnav_store.stat.mode | default('')) == '0640'
      - (_fluentbit_lnav_store.stat.pw_name | default('')) == 'root'
      - (_fluentbit_lnav_store.stat.gr_name | default('')) == 'adm'
    fail_msg: >-
      lnav JSONL store has wrong perms:
      mode={{ _fluentbit_lnav_store.stat.mode | default('<missing>') }}
      owner={{ _fluentbit_lnav_store.stat.pw_name | default('<missing>') }}:{{ _fluentbit_lnav_store.stat.gr_name | default('<missing>') }}

- name: _verify | HTTP_Server uptime
  uri:
    url: "http://127.0.0.1:{{ service_ports.fluentbit }}/api/v1/uptime"
    status_code: 200
  register: _fluentbit_uptime
  retries: 6
  delay: 2
  until: _fluentbit_uptime.status == 200
  become: true

- name: _verify | Build per-run markers
  set_fact:
    fluentbit_lnav_journald_marker: "verify_journald_{{ ansible_date_time.iso8601_basic_short }}_{{ 99999 | random }}"
    fluentbit_lnav_nginx_marker: "verify_nginx_{{ ansible_date_time.iso8601_basic_short }}_{{ 99999 | random }}"
    fluentbit_lnav_warn_marker: "verify_warn_{{ ansible_date_time.iso8601_basic_short }}_{{ 99999 | random }}"
    fluentbit_lnav_multiline_marker: "verify_trace_{{ ansible_date_time.iso8601_basic_short }}_{{ 99999 | random }}"
    fluentbit_lnav_mitogen_marker: "verify_mitogen_{{ ansible_date_time.iso8601_basic_short }}_{{ 99999 | random }}"
    fluentbit_lnav_healthcheck_marker: "verify_healthcheck_{{ ansible_date_time.iso8601_basic_short }}_{{ 99999 | random }}"

- name: _verify | Journald path | emit marked log via transient unit
  command: >-
    systemd-run --unit=fluentbit_verify_journald --no-block --quiet
    /usr/bin/logger -t fluentbit_verify_journald
    "ERROR {{ fluentbit_lnav_journald_marker }}"
  changed_when: false
  become: true

- name: _verify | Nginx tail | append marked line to access.log
  command: tee -a /var/log/nginx/access.log
  args:
    stdin: "{{ fluentbit_lnav_nginx_marker }}\n"
  changed_when: false
  become: true

- name: _verify | Journald warn | emit marked log via transient unit
  command: >-
    systemd-run --unit=fluentbit_verify_warn --no-block --quiet
    /usr/bin/logger -t fluentbit_verify_warn
    "WARNING {{ fluentbit_lnav_warn_marker }}"
  changed_when: false
  become: true

- name: _verify | Multiline | emit python traceback via transient unit
  command: >-
    systemd-run --unit=fluentbit_verify_multiline --no-block --quiet
    --property=SyslogIdentifier=fluentbit_verify_multiline
    /usr/bin/python3 -c "raise ValueError('trace_{{ fluentbit_lnav_multiline_marker }}')"
  changed_when: false
  become: true

- name: _verify | Mitogen | emit marked log via transient unit with mitogen-shaped identifier
  command: >-
    systemd-run --unit=fluentbit_verify_mitogen --no-block --quiet
    --property=SyslogIdentifier=python3(mitogen:fake@host:9999)
    /bin/echo fluentbit_verify_mitogen marker {{ fluentbit_lnav_mitogen_marker }}
  changed_when: false
  become: true

- name: _verify | Podman_healthcheck | derive fake 64-hex container id
  set_fact:
    fluentbit_lnav_healthcheck_cid: "{{ fluentbit_lnav_healthcheck_marker | hash('sha256') }}"

- name: _verify | Podman_healthcheck | run failing transient unit named like a container id
  command: >-
    systemd-run --unit={{ fluentbit_lnav_healthcheck_cid }}.service
    --quiet
    /bin/sh -c "exit 1"
  changed_when: false
  become: true

- name: _verify | JSONL | wait for shaped records
  command:
    argv:
      - python3
      - -c
      - |
        import json
        import sys

        path, marker, service = sys.argv[1:4]
        extra = sys.argv[4] if len(sys.argv) > 4 else ""

        with open(path, encoding="utf-8") as handle:
            for line in handle:
                if marker not in line:
                    continue
                try:
                    record = json.loads(line)
                except json.JSONDecodeError:
                    continue
                message = record.get("message", "")
                if record.get("service") == service and marker in message and (not extra or extra in message):
                    print(json.dumps(record, sort_keys=True))
                    sys.exit(0)

        sys.exit(1)
      - /var/log/fluent-bit/lnav.jsonl
      - "{{ item.marker }}"
      - "{{ item.service }}"
      - "{{ item.extra | default('') }}"
  register: _fluentbit_lnav_records
  changed_when: false
  retries: 60
  delay: 2
  until: _fluentbit_lnav_records.rc == 0
  loop:
    - name: journald
      marker: "{{ fluentbit_lnav_journald_marker }}"
      service: fluentbit_verify_journald
    - name: nginx
      marker: "{{ fluentbit_lnav_nginx_marker }}"
      service: nginx_access
    - name: warn
      marker: "{{ fluentbit_lnav_warn_marker }}"
      service: fluentbit_verify_warn
    - name: multiline
      marker: "{{ fluentbit_lnav_multiline_marker }}"
      service: fluentbit_verify_multiline
      extra: Traceback
    - name: mitogen
      marker: "{{ fluentbit_lnav_mitogen_marker }}"
      service: mitogen
    - name: podman_healthcheck
      marker: "{{ fluentbit_lnav_healthcheck_cid }}"
      service: podman_healthcheck
  loop_control:
    label: "{{ item.name }}"
  become: true

- name: _verify | JSONL | collect shaped records
  set_fact:
    _fluentbit_lnav_by_name: >-
      {{ _fluentbit_lnav_by_name | default({}) |
         combine({item.item.name: (item.stdout | from_json)}) }}
  loop: "{{ _fluentbit_lnav_records.results }}"
  loop_control:
    label: "{{ item.item.name }}"

- name: _verify | Journald path | assert JSONL shape
  vars:
    row: "{{ _fluentbit_lnav_by_name.journald }}"
  assert:
    that:
      - "row.level == 'error'"
      - "row.level_number | int == 17"
      - "row.service == 'fluentbit_verify_journald'"
      - "fluentbit_lnav_journald_marker in row.message"
      - "row.unit == 'fluentbit_verify_journald.service'"
      - "row.identifier == 'fluentbit_verify_journald'"
      - "row.host == inventory_hostname"
      - "row.stream == 'journald'"
      - "row.fields.SYSTEMD_UNIT == 'fluentbit_verify_journald.service'"
      - "row.fields.SYSLOG_IDENTIFIER == 'fluentbit_verify_journald'"
    fail_msg: "journald record landed with wrong shape: {{ row }}"

- name: _verify | Nginx tail | assert JSONL shape
  vars:
    row: "{{ _fluentbit_lnav_by_name.nginx }}"
  assert:
    that:
      - "row.level == 'info'"
      - "row.level_number | int == 9"
      - "row.service == 'nginx_access'"
      - "fluentbit_lnav_nginx_marker in row.message"
      - "row.stream == 'nginx'"
    fail_msg: "nginx access record landed with wrong shape: {{ row }}"

- name: _verify | Journald warn | assert severity classification
  vars:
    row: "{{ _fluentbit_lnav_by_name.warn }}"
  assert:
    that:
      - "row.level == 'warn'"
      - "row.level_number | int == 13"
      - "fluentbit_lnav_warn_marker in row.message"
    fail_msg: "WARN keyword classified wrong: {{ row }}"

- name: _verify | Multiline | assert traceback joined
  vars:
    row: "{{ _fluentbit_lnav_by_name.multiline }}"
  assert:
    that:
      - "'Traceback' in row.message"
      - "'ValueError' in row.message"
      - "fluentbit_lnav_multiline_marker in row.message"
      - "row.service == 'fluentbit_verify_multiline'"
    fail_msg: "Multiline traceback not joined: {{ row }}"

- name: _verify | Mitogen | assert collapse fired
  vars:
    row: "{{ _fluentbit_lnav_by_name.mitogen }}"
  assert:
    that:
      - "row.service == 'mitogen'"
      - "fluentbit_lnav_mitogen_marker in row.message"
    fail_msg: "mitogen-shaped identifier did not collapse to service=mitogen: {{ row }}"

- name: _verify | Podman_healthcheck | assert rewrite shape
  vars:
    row: "{{ _fluentbit_lnav_by_name.podman_healthcheck }}"
  assert:
    that:
      - "row.service == 'podman_healthcheck'"
      - "row.fields.CONTAINER_ID_FULL == fluentbit_lnav_healthcheck_cid"
      - "row.fields.CONTAINER_ID == fluentbit_lnav_healthcheck_cid[:12]"
      - "row.fields.UNIT == fluentbit_lnav_healthcheck_cid ~ '.service'"
      - "fluentbit_lnav_healthcheck_cid in row.message"
    fail_msg: "podman_healthcheck rewrite did not fire: {{ row }}"

- name: _verify | Fluent Bit journal has no Lua warnings
  command:
    argv:
      - journalctl
      - -u
      - fluent-bit
      - --since
      - -5 minutes
      - --no-pager
      - --grep
      - "lua.*(error|warn|warning)"
  register: _fluentbit_lua_journal
  changed_when: false
  failed_when: _fluentbit_lua_journal.rc != 1
  become: true
