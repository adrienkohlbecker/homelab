# Multiline traceback join: emit a python ValueError so the multiline
# parser (python,go,java,ruby) joins the 3-line stack into a single
# record. Filtering Body LIKE '%Traceback%' excludes the known
# fluent-bit-python-parser dup-record that re-emits the trailing
# exception line on its own (see fluent-bit.conf.j2's multiline
# filter block for the quirk's documented context).
- name: _verify | Multiline | build per-run marker
  set_fact:
    fluentbit_otlp_multiline_marker: "verify_trace_{{ ansible_date_time.iso8601_basic_short }}_{{ 99999 | random }}"

# --property=SyslogIdentifier= pins SYSLOG_IDENTIFIER on the
# resulting unit's journal output. Without it the python3 process'
# comm leaks through as the identifier ("python3"), and otlp_shape's
# SYSLOG_IDENTIFIER-first rule lands the record under
# ServiceName=python3 instead of the unit name. Real services we own
# should set SyslogIdentifier= in their unit file (or pass through a
# `logger -t` wrapper) for the same reason; this probe doubles as a
# canonical example.
- name: _verify | Multiline | emit python traceback via transient unit
  command: >-
    systemd-run --unit=fluentbit_verify_multiline --no-block --quiet
    --property=SyslogIdentifier=fluentbit_verify_multiline
    /usr/bin/python3 -c "raise ValueError('trace_{{ fluentbit_otlp_multiline_marker }}')"
  changed_when: false
  become: true

- name: _verify | Multiline | wait for joined traceback row
  import_role:
    name: test
    tasks_from: clickhouse_query_wait
  vars:
    test_args:
      label: "multiline | wait"
      sql: >-
        SELECT count() FROM default.otel_logs
        WHERE Body LIKE '%Traceback%'
          AND Body LIKE '%{{ fluentbit_otlp_multiline_marker }}%'
          AND ServiceName = 'fluentbit_verify_multiline'
      retries: 60
      delay: 2
      until: "test_clickhouse_result.rc == 0 and (test_clickhouse_result.stdout | trim | int) > 0"

- name: _verify | Multiline | fetch row
  import_role:
    name: test
    tasks_from: clickhouse_query
  vars:
    test_args:
      label: "multiline | fetch"
      sql: >-
        SELECT Body, ServiceName
        FROM default.otel_logs
        WHERE Body LIKE '%Traceback%'
          AND Body LIKE '%{{ fluentbit_otlp_multiline_marker }}%'
          AND ServiceName = 'fluentbit_verify_multiline'
        ORDER BY Timestamp DESC
        LIMIT 1
        FORMAT JSONEachRow

- name: _verify | Multiline | assert traceback joined
  vars:
    row: "{{ test_clickhouse_result.stdout | from_json }}"
  assert:
    that:
      - "'Traceback' in row.Body"
      - "'ValueError' in row.Body"
      - "fluentbit_otlp_multiline_marker in row.Body"
      - "row.ServiceName == 'fluentbit_verify_multiline'"
    fail_msg: "Multiline traceback not joined: {{ row }}"

# Mitogen collapse: ansible accelerator's workers self-name to
# "python3(mitogen:user@host:PID)" via prctl(PR_SET_NAME); otlp_shape
# detects the "(mitogen:" substring and lands all variants under
# ServiceName=mitogen instead of minting a fresh facet per worker
# PID. Probe by pinning the identifier through SyslogIdentifier= on a
# transient unit driving /bin/echo. Why /bin/echo and not logger:
# SyslogIdentifier= only applies to stdout/stderr captured by
# journald; logger writes via /dev/log and journald assigns its
# SYSLOG_IDENTIFIER from the syslog message (defaulting to the
# process name / "root"), bypassing the unit's directive. prctl from
# a real python is no good either -- the kernel comm has a 15-byte
# cap and "python3(mitogen" gets truncated before the ":" that the
# detection key matches against.
- name: _verify | Mitogen | build per-run marker
  set_fact:
    fluentbit_otlp_mitogen_marker: "verify_mitogen_{{ ansible_date_time.iso8601_basic_short }}_{{ 99999 | random }}"

- name: _verify | Mitogen | emit marked log via transient unit with mitogen-shaped identifier
  command: >-
    systemd-run --unit=fluentbit_verify_mitogen --no-block --quiet
    --property=SyslogIdentifier=python3(mitogen:fake@host:9999)
    /bin/echo fluentbit_verify_mitogen marker {{ fluentbit_otlp_mitogen_marker }}
  changed_when: false
  become: true

- name: _verify | Mitogen | wait for ClickHouse row matching marker
  import_role:
    name: test
    tasks_from: clickhouse_query_wait
  vars:
    test_args:
      label: "mitogen | wait for row"
      sql: >-
        SELECT count() FROM default.otel_logs
        WHERE Body LIKE '%{{ fluentbit_otlp_mitogen_marker }}%'
          AND ServiceName = 'mitogen'
      retries: 60
      delay: 2
      until: "test_clickhouse_result.rc == 0 and (test_clickhouse_result.stdout | trim | int) > 0"

- name: _verify | Mitogen | fetch row
  import_role:
    name: test
    tasks_from: clickhouse_query
  vars:
    test_args:
      label: "mitogen | fetch"
      sql: >-
        SELECT Body, ServiceName
        FROM default.otel_logs
        WHERE Body LIKE '%{{ fluentbit_otlp_mitogen_marker }}%'
          AND ServiceName = 'mitogen'
        ORDER BY Timestamp DESC
        LIMIT 1
        FORMAT JSONEachRow

- name: _verify | Mitogen | assert collapse fired
  vars:
    row: "{{ test_clickhouse_result.stdout | from_json }}"
  assert:
    that:
      - "row.ServiceName == 'mitogen'"
      - "fluentbit_otlp_mitogen_marker in row.Body"
    fail_msg: "mitogen-shaped identifier did not collapse to ServiceName=mitogen: {{ row }}"

# podman_unnamed fallback: when a container runs without --name, podman
# assigns "<adjective>_<scientist>" auto-names that become SYSLOG_IDENTIFIER
# fresh per run. Both _SYSTEMD_UNIT (libpod-conmon-<hash>.scope) and
# SYSLOG_IDENTIFIER are unbounded, so otlp_shape recognises the
# "libpod-conmon-" tag prefix and labels the records "podman_unnamed"
# as a class. Probe drives an actual `podman run --rm` (deliberately
# no --name) so the conmon-scope path lights up end to end.
- name: _verify | Podman_unnamed | build per-run marker
  set_fact:
    fluentbit_otlp_podman_marker: "verify_podman_unnamed_{{ ansible_date_time.iso8601_basic_short }}_{{ 99999 | random }}"

# Image is already pulled by _setup's hyperdx import (busybox isn't
# part of that, so pull explicitly here). One-shot, creates: gate not
# applicable -- podman pull is idempotent on its own.
- name: _verify | Podman_unnamed | ensure busybox image present
  command: podman pull docker.io/library/busybox
  changed_when: false
  become: true

- name: _verify | Podman_unnamed | run marked busybox container (no --name on purpose)
  command: >-
    podman run --rm --log-driver journald
    docker.io/library/busybox
    echo fluentbit_verify_podman_unnamed marker {{ fluentbit_otlp_podman_marker }}
  changed_when: false
  become: true

- name: _verify | Podman_unnamed | wait for ClickHouse row matching marker
  import_role:
    name: test
    tasks_from: clickhouse_query_wait
  vars:
    test_args:
      label: "podman_unnamed | wait for row"
      sql: >-
        SELECT count() FROM default.otel_logs
        WHERE Body LIKE '%{{ fluentbit_otlp_podman_marker }}%'
          AND ServiceName = 'podman_unnamed'
      retries: 60
      delay: 2
      until: "test_clickhouse_result.rc == 0 and (test_clickhouse_result.stdout | trim | int) > 0"

- name: _verify | Podman_unnamed | fetch row
  import_role:
    name: test
    tasks_from: clickhouse_query
  vars:
    test_args:
      label: "podman_unnamed | fetch"
      sql: >-
        SELECT Body, ServiceName
        FROM default.otel_logs
        WHERE Body LIKE '%{{ fluentbit_otlp_podman_marker }}%'
          AND ServiceName = 'podman_unnamed'
        ORDER BY Timestamp DESC
        LIMIT 1
        FORMAT JSONEachRow

- name: _verify | Podman_unnamed | assert libpod-conmon fallback fired
  vars:
    row: "{{ test_clickhouse_result.stdout | from_json }}"
  assert:
    that:
      - "row.ServiceName == 'podman_unnamed'"
      - "fluentbit_otlp_podman_marker in row.Body"
    fail_msg: "unnamed-container record did not hit libpod-conmon fallback: {{ row }}"

# podman_healthcheck override: podman runs each scheduled healthcheck
# as `systemd-run --unit=<container-id>` where the unit name is the
# full 64-char container ID + ".service". PID 1 emits "Started",
# "Deactivated successfully" and on failure "Failed with result
# 'exit-code'" — tagged with UNIT=<64hex>.service in the journal but
# _SYSTEMD_UNIT=init.scope (PID 1's cgroup) and SYSLOG_IDENTIFIER=systemd.
# otlp_shape.lua keys on the UNIT field and rewrites to
# ServiceName=podman_healthcheck + stamps CONTAINER_ID_FULL/SHORT so
# HyperDX can pivot to the container's own application logs (which
# podman's journald log driver tags with the same CONTAINER_ID_FULL).
# Spoof a real healthcheck by minting a fake 64-hex unit name and
# letting a transient unit exit non-zero; PID 1 emits the same shape.
- name: _verify | Podman_healthcheck | build per-run marker
  set_fact:
    fluentbit_otlp_healthcheck_marker: "verify_healthcheck_{{ ansible_date_time.iso8601_basic_short }}_{{ 99999 | random }}"

# SHA-256 of the marker is a unique 64-char lowercase hex string —
# the exact shape podman uses for container IDs.
- name: _verify | Podman_healthcheck | derive fake 64-hex container id
  set_fact:
    fluentbit_otlp_healthcheck_cid: "{{ fluentbit_otlp_healthcheck_marker | hash('sha256') }}"

# Default systemd-run is async-start: returns 0 after the unit launches,
# the unit then exits 1 and PID 1 logs "Failed with result 'exit-code'."
- name: _verify | Podman_healthcheck | run failing transient unit named like a container id
  command: >-
    systemd-run --unit={{ fluentbit_otlp_healthcheck_cid }}.service
    --quiet
    /bin/sh -c "exit 1"
  changed_when: false
  become: true

- name: _verify | Podman_healthcheck | wait for ClickHouse row matching cid
  import_role:
    name: test
    tasks_from: clickhouse_query_wait
  vars:
    test_args:
      label: "podman_healthcheck | wait for row"
      sql: >-
        SELECT count() FROM default.otel_logs
        WHERE LogAttributes['CONTAINER_ID_FULL'] = '{{ fluentbit_otlp_healthcheck_cid }}'
          AND ServiceName = 'podman_healthcheck'
      retries: 60
      delay: 2
      until: "test_clickhouse_result.rc == 0 and (test_clickhouse_result.stdout | trim | int) > 0"

- name: _verify | Podman_healthcheck | fetch row
  import_role:
    name: test
    tasks_from: clickhouse_query
  vars:
    test_args:
      label: "podman_healthcheck | fetch"
      sql: >-
        SELECT
          Body,
          ServiceName,
          LogAttributes['CONTAINER_ID_FULL'] AS container_id_full,
          LogAttributes['CONTAINER_ID']      AS container_id_short,
          LogAttributes['UNIT']              AS unit_field
        FROM default.otel_logs
        WHERE LogAttributes['CONTAINER_ID_FULL'] = '{{ fluentbit_otlp_healthcheck_cid }}'
          AND ServiceName = 'podman_healthcheck'
        ORDER BY Timestamp DESC
        LIMIT 1
        FORMAT JSONEachRow

- name: _verify | Podman_healthcheck | verify ClickHouse row arrived
  assert:
    that:
      - "test_clickhouse_result.stdout | default('', true) | length > 0"
    fail_msg: "podman_healthcheck row not found in ClickHouse (stdout={{ test_clickhouse_result.stdout | default('') }})"

- name: _verify | Podman_healthcheck | assert rewrite shape
  vars:
    row: "{{ test_clickhouse_result.stdout | from_json }}"
  assert:
    that:
      - "row.ServiceName == 'podman_healthcheck'"
      - "row.container_id_full == fluentbit_otlp_healthcheck_cid"
      - "row.container_id_short == fluentbit_otlp_healthcheck_cid[:12]"
      - "row.unit_field == fluentbit_otlp_healthcheck_cid ~ '.service'"
      - "fluentbit_otlp_healthcheck_cid in row.Body"
    fail_msg: "podman_healthcheck rewrite did not fire: {{ row }}"

# No probe for the svc.<empty> -> SYSLOG_IDENTIFIER fallback branch:
# the path covers records that reach journald with _TRANSPORT=kernel
# and no _SYSTEMD_UNIT (nftables LOG target, MCE, oom-killer, audit),
# but those can't be synthesised from userspace. /dev/kmsg writes go
# through the kernel ring buffer but journald still attributes them
# to the writing process's cgroup (-> _SYSTEMD_UNIT=session-X.scope),
# so they hit the normal svc.<unit> branch instead. Real kernel
# printk records bypass that attribution because the kernel isn't in
# any cgroup. See otlp_shape.lua for the fallback implementation.
