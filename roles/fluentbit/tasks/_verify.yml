- name: _verify | fluent-bit.service is loaded and active
  systemd:
    name: fluent-bit
  register: _verify_unit
  failed_when: >-
    _verify_unit.status.LoadState != "loaded"
    or _verify_unit.status.ActiveState != "active"
  become: true

- name: _verify | state-directory perms | stat
  stat:
    path: "{{ item }}"
  loop:
    - /var/lib/fluent-bit
    - /var/lib/fluent-bit/storage
  register: _verify_state_dirs
  become: true

- name: _verify | state-directory perms | assert 0700 root:root
  assert:
    that:
      - item.stat.exists
      - item.stat.isdir
      - item.stat.mode == '0700'
      - item.stat.pw_name == 'root'
      - item.stat.gr_name == 'root'
    fail_msg: "fluent-bit state dir leaked perms: {{ item.stat.path }} mode={{ item.stat.mode }} owner={{ item.stat.pw_name }}:{{ item.stat.gr_name }}"
  loop: "{{ _verify_state_dirs.results }}"
  loop_control:
    label: "{{ item.stat.path }}"

# End-to-end CSP-through-OTLP shape assertion. POST a marked CSP report
# at fluent-bit's HTTP input, let it flow through:
#   fluent-bit HTTP input
#     -> flatten_csp.lua  (legacy/reporting-api -> common flat shape)
#     -> level_from_message.lua  (severity keyword extraction)
#     -> otlp_shape.lua   (flat -> record.otlp.attributes/resource)
#     -> opentelemetry output -> hyperdx otel-collector -> ClickHouse
# Then query the landed otel_logs row to confirm every column ended up
# where the downstream UI expects:
#   ServiceName       = csplogger      (drives "Services" view; sourced
#                                       from Resource.service.name)
#   SeverityText      = "warn"         (flatten_csp pins; transform
#                                       processor's body-keyword
#                                       fallback only fires when
#                                       severity is unset)
#   SeverityNumber    = 13             (OTel SEVERITY_NUMBER_WARN)
#   Body              startswith "CSP" (flatten_csp synthesises)
#   LogAttributes contains csp_* + SYSLOG_IDENTIFIER + host
#   ResourceAttributes contains service.name + host.name
# _setup imports hyperdx so the box test VM has the real OTLP receiver
# + ClickHouse stack stood up.
- name: _verify | OTLP-end-to-end | build per-run marker
  set_fact:
    fluentbit_otlp_csp_marker: "verify_otlp_{{ ansible_date_time.iso8601_basic_short }}_{{ 99999 | random }}"

# Capture the fluent-bit journal cursor *before* the marked POST so the
# lua-filter error scan below sees only what this run produced.
# --cursor-file=PATH writes the cursor of the latest entry on exit and
# reads from it on subsequent calls; the scan task downstream reuses
# the same file. /run is root-owned ephemeral, so a non-root user
# can't pre-stage a forged cursor between calls.
- name: _verify | OTLP-end-to-end | capture pre-POST journal cursor
  command: journalctl -u fluent-bit -n 0 --cursor-file=/run/fluentbit_verify.cursor
  changed_when: false
  become: true

# Probe through the production nginx path (csplogger subdomain) rather
# than the direct fluent-bit loopback HTTP input: catches integration
# regressions in roles/csplogger's proxy_pass that neither role's own
# _verify would otherwise see (csplogger's _verify stubs fluent-bit, and
# the loopback POST here would bypass nginx). Host header drives the
# nginx server-name match, Origin/Content-Type satisfy csplogger's
# allowlists in conf.d/.
- name: _verify | OTLP-end-to-end | POST marked CSP report through nginx
  uri:
    url: "https://localhost/log"
    method: POST
    body_format: json
    body:
      csp-report:
        blocked-uri: "https://verify.example/{{ fluentbit_otlp_csp_marker }}"
        document-uri: "https://verify.example/"
        violated-directive: "script-src"
        effective-directive: "script-src-elem"
        original-policy: "default-src 'self'"
    headers:
      Host: "csplogger.{{ inventory_hostname }}.{{ domain }}"
      Origin: "https://verify.{{ domain }}"
      Content-Type: application/csp-report
    validate_certs: false
    status_code: 204

# fluent-bit's install-time dry-run validates lua *load* (syntax / module
# import); nil-deref or type-mismatch bugs only surface when a real
# record runs through the filter. Without this scan the only symptom of
# a regression in flatten_csp / level_from_message / otlp_shape would be
# silently-dropped attributes in HyperDX -- per-record errors don't bubble
# up to the HTTP 204 fluent-bit returns to nginx, and the ClickHouse-row
# assert below only catches *visible* malformation, not dropped fields.
# journalctl --grep exits 0 on match (= failure here), 1 on no-match
# (= pass), rc>1 means journalctl itself failed (also failure).
- name: _verify | OTLP-end-to-end | fluent-bit lua filters logged no runtime errors
  command: >-
    journalctl -u fluent-bit
    --cursor-file=/run/fluentbit_verify.cursor
    --no-pager
    --grep '\[(error|warn)\].*filter[_:]lua'
  register: fluentbit_lua_errors
  changed_when: false
  failed_when: fluentbit_lua_errors.rc != 1
  become: true

# Wait for the row to land. fluent-bit's Flush=5s plus collector batch
# timeout (5s) means up to ~10s typical, with retries on initial cold
# start of the collector pipeline.
#
# Match on LogAttributes['csp_blocked_uri'] rather than Body LIKE: the
# query command itself ends up in ansible's own task-output journal
# entry (SYSLOG_IDENTIFIER=ansible-ansible.legacy.command), which
# fluent-bit's systemd input ships back to ClickHouse with the marker
# baked into its Body -- Body LIKE matches that decoy instead of the
# real CSP record. csp_blocked_uri is only populated by flatten_csp.lua.
#
# Query body is passed via stdin (-i on podman exec, --data-binary @-
# on curl) so the SQL stays human-readable in the role rather than as
# a URL-encoded blob of %5B/%5D/%25.
- name: _verify | OTLP-end-to-end | wait for ClickHouse row matching marker
  command:
    cmd: podman exec -i hyperdx curl --fail -s --max-time 5 --data-binary @- "http://localhost:8123/"
    stdin: "SELECT count() FROM default.otel_logs WHERE LogAttributes['csp_blocked_uri'] LIKE '%{{ fluentbit_otlp_csp_marker }}%'"
  register: fluentbit_otlp_count
  changed_when: false
  failed_when: false
  retries: 30
  delay: 2
  until: fluentbit_otlp_count.rc == 0 and (fluentbit_otlp_count.stdout | trim | int) > 0
  become: true

- name: _verify | OTLP-end-to-end | fetch CSP row as JSON
  command:
    cmd: podman exec -i hyperdx curl --fail -s --max-time 5 --data-binary @- "http://localhost:8123/"
    stdin: >-
      SELECT
        Body,
        SeverityText,
        toUInt32(SeverityNumber) AS SeverityNumber,
        ServiceName,
        LogAttributes['csp_blocked_uri']        AS csp_blocked_uri,
        LogAttributes['csp_format']             AS csp_format,
        LogAttributes['csp_violated_directive'] AS csp_violated_directive,
        LogAttributes['csp_effective_directive'] AS csp_effective_directive,
        LogAttributes['host']                   AS log_host,
        ResourceAttributes['service.name']      AS resource_service_name,
        ResourceAttributes['host.name']         AS resource_host_name
      FROM default.otel_logs
      WHERE LogAttributes['csp_blocked_uri'] LIKE '%{{ fluentbit_otlp_csp_marker }}%'
      ORDER BY Timestamp DESC
      LIMIT 1
      FORMAT JSONEachRow
  register: fluentbit_otlp_row
  changed_when: false
  become: true

- name: _verify | OTLP-end-to-end | assert landed row shape
  vars:
    row: "{{ fluentbit_otlp_row.stdout | from_json }}"
  assert:
    that:
      # Body shape: "CSP <effective> blocked <uri> on <doc> {<json>}".
      # The JSON suffix populates LogAttributes via HyperDX collector's
      # ExtractPatterns + merge_maps, AND its first key "level":"warn"
      # is what the severity-keyword regex matches to set
      # SeverityText/Number. Each that-item is quoted as a string --
      # ansible 2.16+ rejects bare expressions.
      - "row.Body is match('^CSP ')"
      - "row.SeverityText == 'warn'"
      - "row.SeverityNumber | int == 13"
      - "row.ServiceName == 'csplogger'"
      - "row.csp_format == 'legacy'"
      - "row.csp_violated_directive == 'script-src'"
      - "row.csp_effective_directive == 'script-src-elem'"
      - "row.log_host == inventory_hostname"
      - "row.resource_service_name == 'csplogger'"
      - "row.resource_host_name == inventory_hostname"
      - "fluentbit_otlp_csp_marker in row.csp_blocked_uri"
    fail_msg: "CSP record landed in ClickHouse but with wrong shape: {{ row }}"

# Coverage for the non-CSP filter paths: the CSP probe above exercises
# flatten_csp.lua and the csp.* branch of otlp_shape.lua, but
# level_from_message.lua's body-keyword scan and otlp_shape's svc.* /
# nginx.* branches see no record. A regression that crashes the lua
# only on systemd or tail records would otherwise land green here.

- name: _verify | journald path | build per-run marker
  set_fact:
    fluentbit_otlp_journald_marker: "verify_journald_{{ ansible_date_time.iso8601_basic_short }}_{{ 99999 | random }}"

# systemd-run sets _SYSTEMD_UNIT on the resulting journal record, so
# fluent-bit's systemd input expands Tag=svc.fluentbit_verify_journald
# .service and otlp_shape strips .service to produce a predictable
# service.name. The "ERROR <marker>" body fires level_from_message's
# error-keyword arm (severity 17).
- name: _verify | journald path | emit marked log via transient unit
  command: >-
    systemd-run --unit=fluentbit_verify_journald --no-block --quiet
    /usr/bin/logger -t fluentbit_verify_journald
    "ERROR {{ fluentbit_otlp_journald_marker }}"
  changed_when: false
  become: true

# Filter on ServiceName so ansible's own task-output journal record
# (SYSLOG_IDENTIFIER=ansible-ansible.legacy.command, scoped to the ssh
# session unit) carrying the marker in its logged command line doesn't
# satisfy the count.
- name: _verify | journald path | wait for ClickHouse row matching marker
  command:
    cmd: podman exec -i hyperdx curl --fail -s --max-time 5 --data-binary @- "http://localhost:8123/"
    stdin: >-
      SELECT count() FROM default.otel_logs
      WHERE Body LIKE '%{{ fluentbit_otlp_journald_marker }}%'
        AND ServiceName = 'fluentbit_verify_journald'
  register: fluentbit_otlp_journald_count
  changed_when: false
  failed_when: false
  retries: 30
  delay: 2
  until: fluentbit_otlp_journald_count.rc == 0 and (fluentbit_otlp_journald_count.stdout | trim | int) > 0
  become: true

- name: _verify | journald path | fetch row as JSON
  command:
    cmd: podman exec -i hyperdx curl --fail -s --max-time 5 --data-binary @- "http://localhost:8123/"
    stdin: >-
      SELECT
        Body,
        SeverityText,
        toUInt32(SeverityNumber) AS SeverityNumber,
        ServiceName
      FROM default.otel_logs
      WHERE Body LIKE '%{{ fluentbit_otlp_journald_marker }}%'
        AND ServiceName = 'fluentbit_verify_journald'
      ORDER BY Timestamp DESC
      LIMIT 1
      FORMAT JSONEachRow
  register: fluentbit_otlp_journald_row
  changed_when: false
  become: true

- name: _verify | journald path | assert lua filter output
  vars:
    row: "{{ fluentbit_otlp_journald_row.stdout | from_json }}"
  assert:
    that:
      - "row.SeverityText == 'error'"
      - "row.SeverityNumber | int == 17"
      - "row.ServiceName == 'fluentbit_verify_journald'"
      - "fluentbit_otlp_journald_marker in row.Body"
    fail_msg: "journald record landed with wrong shape: {{ row }}"

# Nginx access tail: exercises the conf.j2 modify pre-stamp
# (severity_text=info on nginx.access), level_from_message's
# tag-gated lift of that field into metadata, AND otlp_shape's nginx.*
# branch. Appended via tee -a so fluent-bit's tail input sees a fresh
# line on the existing inode without rotation confusion.
- name: _verify | nginx tail | build per-run marker
  set_fact:
    fluentbit_otlp_nginx_marker: "verify_nginx_{{ ansible_date_time.iso8601_basic_short }}_{{ 99999 | random }}"

- name: _verify | nginx tail | append marked line to access.log
  command: tee -a /var/log/nginx/access.log
  args:
    stdin: "{{ fluentbit_otlp_nginx_marker }}\n"
  changed_when: false
  become: true

- name: _verify | nginx tail | wait for ClickHouse row matching marker
  command:
    cmd: podman exec -i hyperdx curl --fail -s --max-time 5 --data-binary @- "http://localhost:8123/"
    stdin: >-
      SELECT count() FROM default.otel_logs
      WHERE Body LIKE '%{{ fluentbit_otlp_nginx_marker }}%'
        AND ServiceName = 'nginx_access'
  register: fluentbit_otlp_nginx_count
  changed_when: false
  failed_when: false
  retries: 30
  delay: 2
  until: fluentbit_otlp_nginx_count.rc == 0 and (fluentbit_otlp_nginx_count.stdout | trim | int) > 0
  become: true

- name: _verify | nginx tail | fetch row as JSON
  command:
    cmd: podman exec -i hyperdx curl --fail -s --max-time 5 --data-binary @- "http://localhost:8123/"
    stdin: >-
      SELECT
        Body,
        SeverityText,
        toUInt32(SeverityNumber) AS SeverityNumber,
        ServiceName
      FROM default.otel_logs
      WHERE Body LIKE '%{{ fluentbit_otlp_nginx_marker }}%'
        AND ServiceName = 'nginx_access'
      ORDER BY Timestamp DESC
      LIMIT 1
      FORMAT JSONEachRow
  register: fluentbit_otlp_nginx_row
  changed_when: false
  become: true

- name: _verify | nginx tail | assert lua filter output
  vars:
    row: "{{ fluentbit_otlp_nginx_row.stdout | from_json }}"
  assert:
    that:
      - "row.SeverityText == 'info'"
      - "row.SeverityNumber | int == 9"
      - "row.ServiceName == 'nginx_access'"
      - "fluentbit_otlp_nginx_marker in row.Body"
    fail_msg: "nginx access record landed with wrong shape: {{ row }}"
