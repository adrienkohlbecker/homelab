- name: _verify | Fluent-bit.service is loaded and active
  systemd:
    name: fluent-bit
  register: _fluentbit_unit
  failed_when: >-
    _fluentbit_unit.status.LoadState != "loaded"
    or _fluentbit_unit.status.ActiveState != "active"
  become: true

- name: _verify | State-directory perms | stat
  stat:
    path: "{{ item }}"
  loop:
    - /var/lib/fluent-bit
    - /var/lib/fluent-bit/storage
  register: _fluentbit_state_dirs
  become: true

- name: _verify | State-directory perms | assert 0700 root:root
  assert:
    that:
      - item.stat.exists
      - item.stat.isdir
      - item.stat.mode == '0700'
      - item.stat.pw_name == 'root'
      - item.stat.gr_name == 'root'
    fail_msg: "fluent-bit state dir leaked perms: {{ item.stat.path }} mode={{ item.stat.mode }} owner={{ item.stat.pw_name }}:{{ item.stat.gr_name }}"
  loop: "{{ _fluentbit_state_dirs.results }}"
  loop_control:
    label: "{{ item.stat.path }}"

- name: _verify | JSONL store perms | stat
  stat:
    path: /var/log/fluent-bit/lnav.jsonl
  register: _fluentbit_lnav_store
  become: true

- name: _verify | JSONL store perms | assert 0640 root:adm
  assert:
    that:
      - _fluentbit_lnav_store.stat.exists
      - (_fluentbit_lnav_store.stat.mode | default('')) == '0640'
      - (_fluentbit_lnav_store.stat.pw_name | default('')) == 'root'
      - (_fluentbit_lnav_store.stat.gr_name | default('')) == 'adm'
    fail_msg: >-
      lnav JSONL store has wrong perms:
      mode={{ _fluentbit_lnav_store.stat.mode | default('<missing>') }}
      owner={{ _fluentbit_lnav_store.stat.pw_name | default('<missing>') }}:{{ _fluentbit_lnav_store.stat.gr_name | default('<missing>') }}

- name: _verify | HTTP_Server uptime
  uri:
    url: "http://127.0.0.1:{{ service_ports.fluentbit }}/api/v1/uptime"
    status_code: 200
  register: _fluentbit_uptime
  retries: 6
  delay: 2
  until: _fluentbit_uptime.status == 200
  become: true

- name: _verify | Build per-run markers
  set_fact:
    fluentbit_lnav_journald_marker: "verify_journald_{{ ansible_date_time.iso8601_basic_short }}_{{ 99999 | random }}"
    fluentbit_lnav_nginx_marker: "verify_nginx_{{ ansible_date_time.iso8601_basic_short }}_{{ 99999 | random }}"
    fluentbit_lnav_nginx_access_marker: "verify_nginxaccess_{{ ansible_date_time.iso8601_basic_short }}_{{ 99999 | random }}"
    fluentbit_lnav_nginx_5xx_marker: "verify_nginx5xx_{{ ansible_date_time.iso8601_basic_short }}_{{ 99999 | random }}"
    fluentbit_lnav_ftl_marker: "verify_ftl_{{ ansible_date_time.iso8601_basic_short }}_{{ 99999 | random }}"
    fluentbit_lnav_ftl_unparsed_marker: "verify_ftlbad_{{ ansible_date_time.iso8601_basic_short }}_{{ 99999 | random }}"
    fluentbit_lnav_ansi_marker: "verify_ansi_{{ ansible_date_time.iso8601_basic_short }}_{{ 99999 | random }}"
    fluentbit_lnav_warn_marker: "verify_warn_{{ ansible_date_time.iso8601_basic_short }}_{{ 99999 | random }}"
    fluentbit_lnav_multiline_marker: "verify_trace_{{ ansible_date_time.iso8601_basic_short }}_{{ 99999 | random }}"
    fluentbit_lnav_mitogen_marker: "verify_mitogen_{{ ansible_date_time.iso8601_basic_short }}_{{ 99999 | random }}"
    fluentbit_lnav_healthcheck_marker: "verify_healthcheck_{{ ansible_date_time.iso8601_basic_short }}_{{ 99999 | random }}"

- name: _verify | Journald path | emit marked log via transient unit
  command: >-
    systemd-run --unit=fluentbit_verify_journald --no-block --quiet
    /usr/bin/logger -t fluentbit_verify_journald
    "ERROR {{ fluentbit_lnav_journald_marker }}"
  changed_when: false
  become: true

- name: _verify | Nginx tail | append marked line to access.log
  command: tee -a /var/log/nginx/access.log
  args:
    stdin: "{{ fluentbit_lnav_nginx_marker }}\n"
  changed_when: false
  become: true

# A well-formed custom-format access line (the marker lives in the request
# path) exercises the nginx_access_custom parser end-to-end: structured fields
# must land in the JSONL record's `fields` object with the right types.
- name: _verify | Nginx access parse | append a 200 custom-format line
  command: tee -a /var/log/nginx/access.log
  args:
    stdin: "203.0.113.7 - - [08/Jun/2026:12:00:00 +0200] grafana.lab.example \"GET /{{ fluentbit_lnav_nginx_access_marker }}?x=1 HTTP/2.0\" grafana.lab.example 200 1234 567 0.042 0.040 \"https://ref.example\" \"Mozilla/5.0 verifyUA\" TLSv1.3 TLS_AES_128_GCM_SHA256\n"
  changed_when: false
  become: true

# A 5xx line must be promoted to error level by lnav_shape even though the
# upstream modify filter pins nginx.access at info.
- name: _verify | Nginx access parse | append a 503 custom-format line
  command: tee -a /var/log/nginx/access.log
  args:
    stdin: "203.0.113.7 - - [08/Jun/2026:12:00:01 +0200] grafana.lab.example \"GET /{{ fluentbit_lnav_nginx_5xx_marker }} HTTP/2.0\" grafana.lab.example 503 0 567 0.500 0.498 \"-\" \"Mozilla/5.0 verifyUA\" TLSv1.3 TLS_AES_128_GCM_SHA256\n"
  changed_when: false
  become: true

# An FTL INFO line whose BODY contains the word "error": the generic keyword
# scan would misclassify it as error, so this proves the parser-extracted
# ftl_level wins and the body becomes the message (prefix stripped).
- name: _verify | Pihole FTL parse | append a real FTL.log line
  command: tee -a /var/log/pihole/FTL.log
  args:
    stdin: "2026-06-09 04:20:02.163 CEST [52/T99] INFO: verify ftl {{ fluentbit_lnav_ftl_marker }} reported an error condition handled\n"
  changed_when: false
  become: true

# A line lacking the FTL timestamp/level prefix: the pihole_ftl parser leaves it
# untouched (no ftl_level), so lnav_shape must flag the miss with parse_error so
# a regex drift surfaces rather than the raw line passing as a plain message.
- name: _verify | Pihole FTL parse | append a line the FTL regex cannot match
  command: tee -a /var/log/pihole/FTL.log
  args:
    stdin: "unparsed ftl continuation {{ fluentbit_lnav_ftl_unparsed_marker }} with no prefix\n"
  changed_when: false
  become: true

# A seerr-style colorized line: the level token is wrapped in SGR colour codes,
# which strip_ansi must remove. printf interprets the \033 escapes into real ESC
# bytes; systemd-run captures stdout to the journal preserving them.
- name: _verify | ANSI | emit a colorized debug line via transient unit
  command: >-
    systemd-run --unit=fluentbit_verify_ansi --no-block --quiet
    --property=SyslogIdentifier=fluentbit_verify_ansi
    /usr/bin/printf "[\033[34mdebug\033[39m] ansi {{ fluentbit_lnav_ansi_marker }} colorized line\n"
  changed_when: false
  become: true

- name: _verify | Journald warn | emit marked log via transient unit
  command: >-
    systemd-run --unit=fluentbit_verify_warn --no-block --quiet
    /usr/bin/logger -t fluentbit_verify_warn
    "WARNING {{ fluentbit_lnav_warn_marker }}"
  changed_when: false
  become: true

- name: _verify | Multiline | emit python traceback via transient unit
  command: >-
    systemd-run --unit=fluentbit_verify_multiline --no-block --quiet
    --property=SyslogIdentifier=fluentbit_verify_multiline
    /usr/bin/python3 -c "raise ValueError('trace_{{ fluentbit_lnav_multiline_marker }}')"
  changed_when: false
  become: true

- name: _verify | Mitogen | emit marked log via transient unit with mitogen-shaped identifier
  command: >-
    systemd-run --unit=fluentbit_verify_mitogen --no-block --quiet
    --property=SyslogIdentifier=python3(mitogen:fake@host:9999)
    /bin/echo fluentbit_verify_mitogen marker {{ fluentbit_lnav_mitogen_marker }}
  changed_when: false
  become: true

- name: _verify | Podman_healthcheck | derive fake 64-hex container id
  set_fact:
    fluentbit_lnav_healthcheck_cid: "{{ fluentbit_lnav_healthcheck_marker | hash('sha256') }}"

- name: _verify | Podman_healthcheck | run failing transient unit named like a container id
  command: >-
    systemd-run --unit={{ fluentbit_lnav_healthcheck_cid }}.service
    --quiet
    /bin/sh -c "exit 1"
  changed_when: false
  become: true

- name: _verify | JSONL | wait for shaped records
  command:
    argv:
      - python3
      - -c
      - |
        import json
        import sys

        path, marker, service = sys.argv[1:4]
        extra = sys.argv[4] if len(sys.argv) > 4 else ""

        with open(path, encoding="utf-8") as handle:
            for line in handle:
                if marker not in line:
                    continue
                try:
                    record = json.loads(line)
                except json.JSONDecodeError:
                    continue
                message = record.get("message", "")
                if record.get("service") == service and marker in message and (not extra or extra in message):
                    print(json.dumps(record, sort_keys=True))
                    sys.exit(0)

        sys.exit(1)
      - /var/log/fluent-bit/lnav.jsonl
      - "{{ item.marker }}"
      - "{{ item.service }}"
      - "{{ item.extra | default('') }}"
  register: _fluentbit_lnav_records
  changed_when: false
  retries: 60
  delay: 2
  until: _fluentbit_lnav_records.rc == 0
  loop:
    - name: journald
      marker: "{{ fluentbit_lnav_journald_marker }}"
      service: fluentbit_verify_journald
    - name: nginx
      marker: "{{ fluentbit_lnav_nginx_marker }}"
      service: nginx_access
    - name: nginx_access
      marker: "{{ fluentbit_lnav_nginx_access_marker }}"
      service: nginx_access
    - name: nginx_5xx
      marker: "{{ fluentbit_lnav_nginx_5xx_marker }}"
      service: nginx_access
    - name: pihole_ftl
      marker: "{{ fluentbit_lnav_ftl_marker }}"
      service: pihole_ftl
    - name: pihole_ftl_unparsed
      marker: "{{ fluentbit_lnav_ftl_unparsed_marker }}"
      service: pihole_ftl
    - name: ansi
      marker: "{{ fluentbit_lnav_ansi_marker }}"
      service: fluentbit_verify_ansi
    - name: warn
      marker: "{{ fluentbit_lnav_warn_marker }}"
      service: fluentbit_verify_warn
    - name: multiline
      marker: "{{ fluentbit_lnav_multiline_marker }}"
      service: fluentbit_verify_multiline
      extra: Traceback
    - name: mitogen
      marker: "{{ fluentbit_lnav_mitogen_marker }}"
      service: mitogen
    - name: podman_healthcheck
      marker: "{{ fluentbit_lnav_healthcheck_cid }}"
      service: podman_healthcheck
  loop_control:
    label: "{{ item.name }}"
  become: true

- name: _verify | JSONL | collect shaped records
  set_fact:
    _fluentbit_lnav_by_name: >-
      {{ _fluentbit_lnav_by_name | default({}) |
         combine({item.item.name: (item.stdout | from_json)}) }}
  loop: "{{ _fluentbit_lnav_records.results }}"
  loop_control:
    label: "{{ item.item.name }}"

- name: _verify | Journald path | assert JSONL shape
  vars:
    row: "{{ _fluentbit_lnav_by_name.journald }}"
  assert:
    that:
      - "row.level == 'error'"
      - "row.service == 'fluentbit_verify_journald'"
      - "fluentbit_lnav_journald_marker in row.message"
      - "row.unit == 'fluentbit_verify_journald.service'"
      - "row.identifier == 'fluentbit_verify_journald'"
      - "row.host == inventory_hostname"
      - "row.stream == 'journald'"
      - "row.fields.SYSTEMD_UNIT == 'fluentbit_verify_journald.service'"
      - "row.fields.SYSLOG_IDENTIFIER == 'fluentbit_verify_journald'"
      # The lua filters must use the classic 3-arg signature so Fluent Bit does
      # not serialize event metadata into the JSONL as an __internal__ object.
      - "'__internal__' not in row"
      - "'level_number' not in row"
    fail_msg: "journald record landed with wrong shape: {{ row }}"

# The bare marker line above is NOT a valid custom-format access line, so the
# nginx_access_custom parser leaves it untouched (no status field). lnav_shape
# must flag the miss: parse_error names the parser and the level is raised to
# warn so a drifting parser is loud instead of the line blending into info.
- name: _verify | Nginx tail | assert unparsed line is flagged
  vars:
    row: "{{ _fluentbit_lnav_by_name.nginx }}"
  assert:
    that:
      - "row.service == 'nginx_access'"
      - "fluentbit_lnav_nginx_marker in row.message"
      - "row.stream == 'nginx'"
      - "row.parse_error == 'nginx_access_custom'"
      - "row.level == 'warn'"
    fail_msg: "nginx unparsed line not flagged with parse_error: {{ row }}"

- name: _verify | Nginx access parse | assert structured fields
  vars:
    row: "{{ _fluentbit_lnav_by_name.nginx_access }}"
  assert:
    that:
      - "row.level == 'info'"
      - "row.service == 'nginx_access'"
      - "row.stream == 'nginx'"
      # Raw request line preserved as the message body (marker lives in path).
      - "fluentbit_lnav_nginx_access_marker in row.message"
      # Parsed HTTP fields with the expected types.
      - "row.fields.method == 'GET'"
      - "row.fields.protocol == 'HTTP/2.0'"
      - "row.fields.path == '/' ~ fluentbit_lnav_nginx_access_marker ~ '?x=1'"
      - "row.fields.http_host == 'grafana.lab.example'"
      - "row.fields.status == 200"
      - "row.fields.status is integer"
      - "row.fields.body_bytes_sent == 1234"
      - "row.fields.request_length == 567"
      - "(row.fields.request_time | float) >= 0.04"
      - "(row.fields.request_time | float) <= 0.05"
      - "row.fields.user_agent == 'Mozilla/5.0 verifyUA'"
      - "row.fields.ssl_protocol == 'TLSv1.3'"
      # No Time_Key: the parsed request time is kept as a field, not adopted as
      # the record timestamp (which stays Fluent Bit ingest time).
      - "row.fields.time_local == '08/Jun/2026:12:00:00 +0200'"
      # http_host must NOT clobber the inventory host stamped by the modify filter.
      - "row.host == inventory_hostname"
      # A successful parse is not flagged.
      - "'parse_error' not in row"
    fail_msg: "nginx access line did not parse into structured fields: {{ row }}"

- name: _verify | Nginx access parse | assert 5xx promoted to error
  vars:
    row: "{{ _fluentbit_lnav_by_name.nginx_5xx }}"
  assert:
    that:
      - "row.service == 'nginx_access'"
      - "fluentbit_lnav_nginx_5xx_marker in row.message"
      - "row.fields.status == 503"
      - "row.level == 'error'"
    fail_msg: "nginx 5xx access record not promoted to error level: {{ row }}"

- name: _verify | Pihole FTL parse | assert authoritative level and structured fields
  vars:
    row: "{{ _fluentbit_lnav_by_name.pihole_ftl }}"
  assert:
    that:
      - "row.service == 'pihole_ftl'"
      - "row.stream == 'pihole_ftl'"
      # ftl_level (INFO) wins over the body keyword "error" -> stays info.
      - "row.level == 'info'"
      # body promoted to message; the timestamp/level/pid prefix is stripped.
      - "fluentbit_lnav_ftl_marker in row.message"
      - "row.message.startswith('verify ftl')"
      - "'2026-06-09' not in row.message"
      - "'INFO:' not in row.message"
      # parsed fields with the right types.
      - "row.fields.ftl_level == 'INFO'"
      - "row.fields.ftl_tz == 'CEST'"
      - "row.fields.pid == 52"
      - "row.fields.pid is integer"
      - "row.fields.thread == 99"
      - "row.host == inventory_hostname"
    fail_msg: "pihole FTL line did not parse / classify correctly: {{ row }}"

- name: _verify | Pihole FTL parse | assert unparsed line is flagged
  vars:
    row: "{{ _fluentbit_lnav_by_name.pihole_ftl_unparsed }}"
  assert:
    that:
      - "row.service == 'pihole_ftl'"
      - "row.stream == 'pihole_ftl'"
      # The raw line stays the message (no body to promote)...
      - "fluentbit_lnav_ftl_unparsed_marker in row.message"
      # ...and the parse miss is flagged + raised to warn.
      - "row.parse_error == 'pihole_ftl'"
      - "row.level == 'warn'"
      # A matched line (the case above) carries no flag -- guards against the
      # discriminant firing on every record.
      - "'parse_error' not in _fluentbit_lnav_by_name.pihole_ftl"
    fail_msg: "pihole FTL unparsed line not flagged with parse_error: {{ row }}"

- name: _verify | ANSI | assert colors stripped and level reclassified
  vars:
    row: "{{ _fluentbit_lnav_by_name.ansi }}"
  assert:
    that:
      - "row.service == 'fluentbit_verify_ansi'"
      - "fluentbit_lnav_ansi_marker in row.message"
      # The SGR colour codes are gone from the message...
      - "'[34m' not in row.message"
      - "'[39m' not in row.message"
      - "row.message == '[debug] ansi ' ~ fluentbit_lnav_ansi_marker ~ ' colorized line'"
      # ...and the de-coloured level token now classifies correctly (it would
      # have fallen through to info while the colour bytes hugged the word).
      - "row.level == 'debug'"
    fail_msg: "seerr-style ANSI not stripped / level not reclassified: {{ row }}"

- name: _verify | Journald warn | assert severity classification
  vars:
    row: "{{ _fluentbit_lnav_by_name.warn }}"
  assert:
    that:
      - "row.level == 'warn'"
      - "fluentbit_lnav_warn_marker in row.message"
    fail_msg: "WARN keyword classified wrong: {{ row }}"

- name: _verify | Multiline | assert traceback joined
  vars:
    row: "{{ _fluentbit_lnav_by_name.multiline }}"
  assert:
    that:
      - "'Traceback' in row.message"
      - "'ValueError' in row.message"
      - "fluentbit_lnav_multiline_marker in row.message"
      - "row.service == 'fluentbit_verify_multiline'"
    fail_msg: "Multiline traceback not joined: {{ row }}"

- name: _verify | Mitogen | assert collapse fired
  vars:
    row: "{{ _fluentbit_lnav_by_name.mitogen }}"
  assert:
    that:
      - "row.service == 'mitogen'"
      - "fluentbit_lnav_mitogen_marker in row.message"
    fail_msg: "mitogen-shaped identifier did not collapse to service=mitogen: {{ row }}"

- name: _verify | Podman_healthcheck | assert rewrite shape
  vars:
    row: "{{ _fluentbit_lnav_by_name.podman_healthcheck }}"
  assert:
    that:
      - "row.service == 'podman_healthcheck'"
      - "row.fields.CONTAINER_ID_FULL == fluentbit_lnav_healthcheck_cid"
      - "row.fields.CONTAINER_ID == fluentbit_lnav_healthcheck_cid[:12]"
      - "row.fields.UNIT == fluentbit_lnav_healthcheck_cid ~ '.service'"
      - "fluentbit_lnav_healthcheck_cid in row.message"
    fail_msg: "podman_healthcheck rewrite did not fire: {{ row }}"

- name: _verify | Fluent Bit journal has no Lua warnings
  command:
    argv:
      - journalctl
      - -u
      - fluent-bit
      - --since
      - -5 minutes
      - --no-pager
      - --grep
      - "lua.*(error|warn|warning)"
  register: _fluentbit_lua_journal
  changed_when: false
  failed_when: _fluentbit_lua_journal.rc != 1
  become: true
