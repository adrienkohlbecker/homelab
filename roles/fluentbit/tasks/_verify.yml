- name: _verify | Fluent-bit.service is loaded and active
  systemd:
    name: fluent-bit
  register: _fluentbit_unit
  failed_when: >-
    _fluentbit_unit.status.LoadState != "loaded"
    or _fluentbit_unit.status.ActiveState != "active"
  become: true

- name: _verify | State-directory perms | stat
  stat:
    path: "{{ item }}"
  loop:
    - /var/lib/fluent-bit
    - /var/lib/fluent-bit/storage
  register: _fluentbit_state_dirs
  become: true

- name: _verify | State-directory perms | assert 0700 root:root
  assert:
    that:
      - item.stat.exists
      - item.stat.isdir
      - item.stat.mode == '0700'
      - item.stat.pw_name == 'root'
      - item.stat.gr_name == 'root'
    fail_msg: "fluent-bit state dir leaked perms: {{ item.stat.path }} mode={{ item.stat.mode }} owner={{ item.stat.pw_name }}:{{ item.stat.gr_name }}"
  loop: "{{ _fluentbit_state_dirs.results }}"
  loop_control:
    label: "{{ item.stat.path }}"

# fluent-bit's HTTP_Server endpoint returns 200 once the engine has
# initialised inputs/outputs; /api/v1/uptime is always available when
# HTTP_Server is on (unlike /api/v1/health, which requires an explicit
# Health_Check On directive we don't ship). Either confirms the main
# loop is running, which is the function check the CLAUDE.md _verify
# rule wants.
- name: _verify | HTTP_Server uptime
  uri:
    url: "http://127.0.0.1:{{ service_ports.fluentbit }}/api/v1/uptime"
    status_code: 200
  register: _fluentbit_uptime
  retries: 6
  delay: 2
  until: _fluentbit_uptime.status == 200
  become: true

# End-to-end CSP-through-OTLP shape assertion. POST a marked CSP report
# at fluent-bit's HTTP input, let it flow through:
#   fluent-bit HTTP input
#     -> flatten_csp.lua  (legacy/reporting-api -> common flat shape)
#     -> level_from_message.lua  (severity keyword extraction)
#     -> otlp_shape.lua   (flat -> record.otlp.attributes/resource)
#     -> opentelemetry output -> hyperdx otel-collector -> ClickHouse
# Then query the landed otel_logs row to confirm every column ended up
# where the downstream UI expects:
#   ServiceName       = csplogger      (drives "Services" view; sourced
#                                       from Resource.service.name)
#   SeverityText      = "warn"         (flatten_csp pins; transform
#                                       processor's body-keyword
#                                       fallback only fires when
#                                       severity is unset)
#   SeverityNumber    = 13             (OTel SEVERITY_NUMBER_WARN)
#   Body              startswith "CSP" (flatten_csp synthesises)
#   LogAttributes contains csp_* + SYSLOG_IDENTIFIER + host
#   ResourceAttributes contains service.name + host.name
# _setup imports hyperdx so the box test VM has the real OTLP receiver
# + ClickHouse stack stood up.
- name: _verify | OTLP-end-to-end | build per-run marker
  set_fact:
    fluentbit_otlp_csp_marker: "verify_otlp_{{ ansible_date_time.iso8601_basic_short }}_{{ 99999 | random }}"

# Capture the fluent-bit journal cursor *before* the marked POST so the
# lua-filter error scan below sees only what this run produced.
# --cursor-file=PATH writes the cursor of the latest entry on exit and
# reads from it on subsequent calls; the scan task downstream reuses
# the same file. /run is root-owned ephemeral, so a non-root user
# can't pre-stage a forged cursor between calls.
- name: _verify | OTLP-end-to-end | capture pre-POST journal cursor
  command: journalctl -u fluent-bit -n 0 --cursor-file=/run/fluentbit_verify.cursor
  changed_when: false
  become: true

# Probe through the production nginx path (csplogger subdomain) rather
# than the direct fluent-bit loopback HTTP input: catches integration
# regressions in roles/csplogger's proxy_pass that neither role's own
# _verify would otherwise see (csplogger's _verify stubs fluent-bit, and
# the loopback POST here would bypass nginx). Host header drives the
# nginx server-name match, Origin/Content-Type satisfy csplogger's
# allowlists in conf.d/.
- name: _verify | OTLP-end-to-end | POST marked CSP report through nginx
  uri:
    url: "https://localhost/log"
    method: POST
    body_format: json
    body:
      csp-report:
        blocked-uri: "https://verify.example/{{ fluentbit_otlp_csp_marker }}"
        document-uri: "https://verify.example/"
        violated-directive: "script-src"
        effective-directive: "script-src-elem"
        original-policy: "default-src 'self'"
    headers:
      Host: "csplogger.{{ inventory_hostname }}.{{ domain }}"
      Origin: "https://verify.{{ domain }}"
      Content-Type: application/csp-report
    validate_certs: false
    status_code: 204

# fluent-bit's install-time dry-run validates lua *load* (syntax / module
# import); nil-deref or type-mismatch bugs only surface when a real
# record runs through the filter. Without this scan the only symptom of
# a regression in flatten_csp / level_from_message / otlp_shape would be
# silently-dropped attributes in HyperDX -- per-record errors don't bubble
# up to the HTTP 204 fluent-bit returns to nginx, and the ClickHouse-row
# assert below only catches *visible* malformation, not dropped fields.
# journalctl --grep exits 0 on match (= failure here), 1 on no-match
# (= pass), rc>1 means journalctl itself failed (also failure).
- name: _verify | OTLP-end-to-end | fluent-bit lua filters logged no runtime errors
  command: >-
    journalctl -u fluent-bit
    --cursor-file=/run/fluentbit_verify.cursor
    --no-pager
    --grep '\[(error|warn)\].*filter[_:]lua'
  register: fluentbit_lua_errors
  changed_when: false
  failed_when: fluentbit_lua_errors.rc != 1
  become: true

# Wait for the row to land. fluent-bit's Flush=5s plus collector batch
# timeout (5s) means up to ~10s typical -- but on box_deps the whole
# hyperdx/clickhouse/otel-collector stack is cold-started in _setup, so
# the first end-to-end trip can run well past that under load. fluentbit
# retries the flush indefinitely (Retry_Limit false + 50M disk buffer),
# so the row WILL arrive; the budget below (60*2s = 120s) just has to
# outlast the cold-start tail rather than the steady-state latency.
#
# Match on LogAttributes['csp_blocked_uri'] rather than Body LIKE: the
# query command itself ends up in ansible's own task-output journal
# entry (SYSLOG_IDENTIFIER=ansible-ansible.legacy.command), which
# fluent-bit's systemd input ships back to ClickHouse with the marker
# baked into its Body -- Body LIKE matches that decoy instead of the
# real CSP record. csp_blocked_uri is only populated by flatten_csp.lua.
- name: _verify | OTLP-end-to-end | wait for ClickHouse row matching marker
  import_role:
    name: test
    tasks_from: clickhouse_query_wait
  vars:
    test_args:
      label: "OTLP-end-to-end | wait for CSP row"
      sql: "SELECT count() FROM default.otel_logs WHERE LogAttributes['csp_blocked_uri'] LIKE '%{{ fluentbit_otlp_csp_marker }}%'"
      retries: 60
      delay: 2
      until: "test_clickhouse_result.rc == 0 and (test_clickhouse_result.stdout | trim | int) > 0"

- name: _verify | OTLP-end-to-end | fetch CSP row as JSON
  import_role:
    name: test
    tasks_from: clickhouse_query
  vars:
    test_args:
      label: "OTLP-end-to-end | fetch CSP row"
      sql: >-
        SELECT
          Body,
          SeverityText,
          toUInt32(SeverityNumber) AS SeverityNumber,
          ServiceName,
          LogAttributes['csp_blocked_uri']        AS csp_blocked_uri,
          LogAttributes['csp_format']             AS csp_format,
          LogAttributes['csp_violated_directive'] AS csp_violated_directive,
          LogAttributes['csp_effective_directive'] AS csp_effective_directive,
          LogAttributes['host']                   AS log_host,
          ResourceAttributes['service.name']      AS resource_service_name,
          ResourceAttributes['host.name']         AS resource_host_name
        FROM default.otel_logs
        WHERE LogAttributes['csp_blocked_uri'] LIKE '%{{ fluentbit_otlp_csp_marker }}%'
        ORDER BY Timestamp DESC
        LIMIT 1
        FORMAT JSONEachRow

- name: _verify | OTLP-end-to-end | assert landed row shape
  vars:
    row: "{{ test_clickhouse_result.stdout | from_json }}"
  assert:
    that:
      # Body shape: "CSP <effective> blocked <uri> on <doc> {<json>}".
      # The JSON suffix populates LogAttributes via HyperDX collector's
      # ExtractPatterns + merge_maps, AND its first key "level":"warn"
      # is what the severity-keyword regex matches to set
      # SeverityText/Number. Each that-item is quoted as a string --
      # ansible 2.16+ rejects bare expressions.
      - "row.Body is match('^CSP ')"
      - "row.SeverityText == 'warn'"
      - "row.SeverityNumber | int == 13"
      - "row.ServiceName == 'csplogger'"
      - "row.csp_format == 'legacy'"
      - "row.csp_violated_directive == 'script-src'"
      - "row.csp_effective_directive == 'script-src-elem'"
      - "row.log_host == inventory_hostname"
      - "row.resource_service_name == 'csplogger'"
      - "row.resource_host_name == inventory_hostname"
      - "fluentbit_otlp_csp_marker in row.csp_blocked_uri"
    fail_msg: "CSP record landed in ClickHouse but with wrong shape: {{ row }}"

# Coverage for the non-CSP filter paths: the CSP probe above exercises
# flatten_csp.lua and the csp.* branch of otlp_shape.lua, but
# level_from_message.lua's body-keyword scan and otlp_shape's svc.* /
# nginx.* branches see no record. A regression that crashes the lua
# only on systemd or tail records would otherwise land green here.

- name: _verify | Journald path | build per-run marker
  set_fact:
    fluentbit_otlp_journald_marker: "verify_journald_{{ ansible_date_time.iso8601_basic_short }}_{{ 99999 | random }}"

# systemd-run sets _SYSTEMD_UNIT on the resulting journal record, so
# fluent-bit's systemd input expands Tag=svc.fluentbit_verify_journald
# .service and otlp_shape strips .service to produce a predictable
# service.name. The "ERROR <marker>" body fires level_from_message's
# error-keyword arm (severity 17).
- name: _verify | Journald path | emit marked log via transient unit
  command: >-
    systemd-run --unit=fluentbit_verify_journald --no-block --quiet
    /usr/bin/logger -t fluentbit_verify_journald
    "ERROR {{ fluentbit_otlp_journald_marker }}"
  changed_when: false
  become: true

# Filter on ServiceName so ansible's own task-output journal record
# (SYSLOG_IDENTIFIER=ansible-ansible.legacy.command, scoped to the ssh
# session unit) carrying the marker in its logged command line doesn't
# satisfy the count.
- name: _verify | Journald path | wait for ClickHouse row matching marker
  import_role:
    name: test
    tasks_from: clickhouse_query_wait
  vars:
    test_args:
      label: "journald path | wait for row"
      sql: >-
        SELECT count() FROM default.otel_logs
        WHERE Body LIKE '%{{ fluentbit_otlp_journald_marker }}%'
          AND ServiceName = 'fluentbit_verify_journald'
      retries: 60
      delay: 2
      until: "test_clickhouse_result.rc == 0 and (test_clickhouse_result.stdout | trim | int) > 0"

- name: _verify | Journald path | fetch row as JSON
  import_role:
    name: test
    tasks_from: clickhouse_query
  vars:
    test_args:
      label: "journald path | fetch row"
      sql: >-
        SELECT
          Body,
          SeverityText,
          toUInt32(SeverityNumber) AS SeverityNumber,
          ServiceName,
          LogAttributes['SYSTEMD_UNIT']      AS systemd_unit,
          LogAttributes['SYSLOG_IDENTIFIER'] AS syslog_identifier,
          LogAttributes['host']              AS log_host
        FROM default.otel_logs
        WHERE Body LIKE '%{{ fluentbit_otlp_journald_marker }}%'
          AND ServiceName = 'fluentbit_verify_journald'
        ORDER BY Timestamp DESC
        LIMIT 1
        FORMAT JSONEachRow

# LogAttributes asserts guard otlp_shape.lua's "lift everything left in
# record into metadata.otlp.attributes" loop. An earlier version only
# lifted "host" and silently dropped every journald metadata field; the
# bug stuck around precisely because nothing here checked.
- name: _verify | Journald path | assert lua filter output
  vars:
    row: "{{ test_clickhouse_result.stdout | from_json }}"
  assert:
    that:
      - "row.SeverityText == 'error'"
      - "row.SeverityNumber | int == 17"
      - "row.ServiceName == 'fluentbit_verify_journald'"
      - "fluentbit_otlp_journald_marker in row.Body"
      - "row.systemd_unit == 'fluentbit_verify_journald.service'"
      - "row.syslog_identifier == 'fluentbit_verify_journald'"
      - "row.log_host == inventory_hostname"
    fail_msg: "journald record landed with wrong shape: {{ row }}"

# Nginx access tail: exercises the conf.j2 modify pre-stamp
# (severity_text=info on nginx.access), level_from_message's
# tag-gated lift of that field into metadata, AND otlp_shape's nginx.*
# branch. Appended via tee -a so fluent-bit's tail input sees a fresh
# line on the existing inode without rotation confusion.
- name: _verify | Nginx tail | build per-run marker
  set_fact:
    fluentbit_otlp_nginx_marker: "verify_nginx_{{ ansible_date_time.iso8601_basic_short }}_{{ 99999 | random }}"

- name: _verify | Nginx tail | append marked line to access.log
  command: tee -a /var/log/nginx/access.log
  args:
    stdin: "{{ fluentbit_otlp_nginx_marker }}\n"
  changed_when: false
  become: true

- name: _verify | Nginx tail | wait for ClickHouse row matching marker
  import_role:
    name: test
    tasks_from: clickhouse_query_wait
  vars:
    test_args:
      label: "nginx tail | wait for row"
      sql: >-
        SELECT count() FROM default.otel_logs
        WHERE Body LIKE '%{{ fluentbit_otlp_nginx_marker }}%'
          AND ServiceName = 'nginx_access'
      retries: 60
      delay: 2
      until: "test_clickhouse_result.rc == 0 and (test_clickhouse_result.stdout | trim | int) > 0"

- name: _verify | Nginx tail | fetch row as JSON
  import_role:
    name: test
    tasks_from: clickhouse_query
  vars:
    test_args:
      label: "nginx tail | fetch row"
      sql: >-
        SELECT
          Body,
          SeverityText,
          toUInt32(SeverityNumber) AS SeverityNumber,
          ServiceName
        FROM default.otel_logs
        WHERE Body LIKE '%{{ fluentbit_otlp_nginx_marker }}%'
          AND ServiceName = 'nginx_access'
        ORDER BY Timestamp DESC
        LIMIT 1
        FORMAT JSONEachRow

- name: _verify | Nginx tail | assert lua filter output
  vars:
    row: "{{ test_clickhouse_result.stdout | from_json }}"
  assert:
    that:
      - "row.SeverityText == 'info'"
      - "row.SeverityNumber | int == 9"
      - "row.ServiceName == 'nginx_access'"
      - "fluentbit_otlp_nginx_marker in row.Body"
    fail_msg: "nginx access record landed with wrong shape: {{ row }}"

# Exercises level_from_message's table dispatch on a non-error
# keyword (WARN), distinct from the existing ERROR probe above:
# catches mis-ordering of the priority table and SEV-mapping drift
# after the SMP2 if/elseif -> table rewrite.
- name: _verify | Journald warn | build per-run marker
  set_fact:
    fluentbit_otlp_warn_marker: "verify_warn_{{ ansible_date_time.iso8601_basic_short }}_{{ 99999 | random }}"

- name: _verify | Journald warn | emit marked log via transient unit
  command: >-
    systemd-run --unit=fluentbit_verify_warn --no-block --quiet
    /usr/bin/logger -t fluentbit_verify_warn
    "WARNING {{ fluentbit_otlp_warn_marker }}"
  changed_when: false
  become: true

- name: _verify | Journald warn | wait for ClickHouse row matching marker
  import_role:
    name: test
    tasks_from: clickhouse_query_wait
  vars:
    test_args:
      label: "journald warn | wait"
      sql: >-
        SELECT count() FROM default.otel_logs
        WHERE Body LIKE '%{{ fluentbit_otlp_warn_marker }}%'
          AND ServiceName = 'fluentbit_verify_warn'
      retries: 60
      delay: 2
      until: "test_clickhouse_result.rc == 0 and (test_clickhouse_result.stdout | trim | int) > 0"

- name: _verify | Journald warn | fetch row
  import_role:
    name: test
    tasks_from: clickhouse_query
  vars:
    test_args:
      label: "journald warn | fetch"
      sql: >-
        SELECT
          Body,
          SeverityText,
          toUInt32(SeverityNumber) AS SeverityNumber
        FROM default.otel_logs
        WHERE Body LIKE '%{{ fluentbit_otlp_warn_marker }}%'
          AND ServiceName = 'fluentbit_verify_warn'
        ORDER BY Timestamp DESC
        LIMIT 1
        FORMAT JSONEachRow

- name: _verify | Journald warn | assert severity classification
  vars:
    row: "{{ test_clickhouse_result.stdout | from_json }}"
  assert:
    that:
      - "row.SeverityText == 'warn'"
      - "row.SeverityNumber | int == 13"
      - "fluentbit_otlp_warn_marker in row.Body"
    fail_msg: "WARN keyword classified wrong: {{ row }}"

# Multiline traceback join: emit a python ValueError so the multiline
# parser (python,go,java,ruby) joins the 3-line stack into a single
# record. Filtering Body LIKE '%Traceback%' excludes the known
# fluent-bit-python-parser dup-record that re-emits the trailing
# exception line on its own (see fluent-bit.conf.j2's multiline
# filter block for the quirk's documented context).
- name: _verify | Multiline | build per-run marker
  set_fact:
    fluentbit_otlp_multiline_marker: "verify_trace_{{ ansible_date_time.iso8601_basic_short }}_{{ 99999 | random }}"

# --property=SyslogIdentifier= pins SYSLOG_IDENTIFIER on the
# resulting unit's journal output. Without it the python3 process'
# comm leaks through as the identifier ("python3"), and otlp_shape's
# SYSLOG_IDENTIFIER-first rule lands the record under
# ServiceName=python3 instead of the unit name. Real services we own
# should set SyslogIdentifier= in their unit file (or pass through a
# `logger -t` wrapper) for the same reason; this probe doubles as a
# canonical example.
- name: _verify | Multiline | emit python traceback via transient unit
  command: >-
    systemd-run --unit=fluentbit_verify_multiline --no-block --quiet
    --property=SyslogIdentifier=fluentbit_verify_multiline
    /usr/bin/python3 -c "raise ValueError('trace_{{ fluentbit_otlp_multiline_marker }}')"
  changed_when: false
  become: true

- name: _verify | Multiline | wait for joined traceback row
  import_role:
    name: test
    tasks_from: clickhouse_query_wait
  vars:
    test_args:
      label: "multiline | wait"
      sql: >-
        SELECT count() FROM default.otel_logs
        WHERE Body LIKE '%Traceback%'
          AND Body LIKE '%{{ fluentbit_otlp_multiline_marker }}%'
          AND ServiceName = 'fluentbit_verify_multiline'
      retries: 60
      delay: 2
      until: "test_clickhouse_result.rc == 0 and (test_clickhouse_result.stdout | trim | int) > 0"

- name: _verify | Multiline | fetch row
  import_role:
    name: test
    tasks_from: clickhouse_query
  vars:
    test_args:
      label: "multiline | fetch"
      sql: >-
        SELECT Body, ServiceName
        FROM default.otel_logs
        WHERE Body LIKE '%Traceback%'
          AND Body LIKE '%{{ fluentbit_otlp_multiline_marker }}%'
          AND ServiceName = 'fluentbit_verify_multiline'
        ORDER BY Timestamp DESC
        LIMIT 1
        FORMAT JSONEachRow

- name: _verify | Multiline | assert traceback joined
  vars:
    row: "{{ test_clickhouse_result.stdout | from_json }}"
  assert:
    that:
      - "'Traceback' in row.Body"
      - "'ValueError' in row.Body"
      - "fluentbit_otlp_multiline_marker in row.Body"
      - "row.ServiceName == 'fluentbit_verify_multiline'"
    fail_msg: "Multiline traceback not joined: {{ row }}"

# Mitogen collapse: ansible accelerator's workers self-name to
# "python3(mitogen:user@host:PID)" via prctl(PR_SET_NAME); otlp_shape
# detects the "(mitogen:" substring and lands all variants under
# ServiceName=mitogen instead of minting a fresh facet per worker
# PID. Probe by pinning the identifier through SyslogIdentifier= on a
# transient unit driving /bin/echo. Why /bin/echo and not logger:
# SyslogIdentifier= only applies to stdout/stderr captured by
# journald; logger writes via /dev/log and journald assigns its
# SYSLOG_IDENTIFIER from the syslog message (defaulting to the
# process name / "root"), bypassing the unit's directive. prctl from
# a real python is no good either -- the kernel comm has a 15-byte
# cap and "python3(mitogen" gets truncated before the ":" that the
# detection key matches against.
- name: _verify | Mitogen | build per-run marker
  set_fact:
    fluentbit_otlp_mitogen_marker: "verify_mitogen_{{ ansible_date_time.iso8601_basic_short }}_{{ 99999 | random }}"

- name: _verify | Mitogen | emit marked log via transient unit with mitogen-shaped identifier
  command: >-
    systemd-run --unit=fluentbit_verify_mitogen --no-block --quiet
    --property=SyslogIdentifier=python3(mitogen:fake@host:9999)
    /bin/echo fluentbit_verify_mitogen marker {{ fluentbit_otlp_mitogen_marker }}
  changed_when: false
  become: true

- name: _verify | Mitogen | wait for ClickHouse row matching marker
  import_role:
    name: test
    tasks_from: clickhouse_query_wait
  vars:
    test_args:
      label: "mitogen | wait for row"
      sql: >-
        SELECT count() FROM default.otel_logs
        WHERE Body LIKE '%{{ fluentbit_otlp_mitogen_marker }}%'
          AND ServiceName = 'mitogen'
      retries: 60
      delay: 2
      until: "test_clickhouse_result.rc == 0 and (test_clickhouse_result.stdout | trim | int) > 0"

- name: _verify | Mitogen | fetch row
  import_role:
    name: test
    tasks_from: clickhouse_query
  vars:
    test_args:
      label: "mitogen | fetch"
      sql: >-
        SELECT Body, ServiceName
        FROM default.otel_logs
        WHERE Body LIKE '%{{ fluentbit_otlp_mitogen_marker }}%'
          AND ServiceName = 'mitogen'
        ORDER BY Timestamp DESC
        LIMIT 1
        FORMAT JSONEachRow

- name: _verify | Mitogen | assert collapse fired
  vars:
    row: "{{ test_clickhouse_result.stdout | from_json }}"
  assert:
    that:
      - "row.ServiceName == 'mitogen'"
      - "fluentbit_otlp_mitogen_marker in row.Body"
    fail_msg: "mitogen-shaped identifier did not collapse to ServiceName=mitogen: {{ row }}"

# podman_unnamed fallback: when a container runs without --name, podman
# assigns "<adjective>_<scientist>" auto-names that become SYSLOG_IDENTIFIER
# fresh per run. Both _SYSTEMD_UNIT (libpod-conmon-<hash>.scope) and
# SYSLOG_IDENTIFIER are unbounded, so otlp_shape recognises the
# "libpod-conmon-" tag prefix and labels the records "podman_unnamed"
# as a class. Probe drives an actual `podman run --rm` (deliberately
# no --name) so the conmon-scope path lights up end to end.
- name: _verify | Podman_unnamed | build per-run marker
  set_fact:
    fluentbit_otlp_podman_marker: "verify_podman_unnamed_{{ ansible_date_time.iso8601_basic_short }}_{{ 99999 | random }}"

# Image is already pulled by _setup's hyperdx import (busybox isn't
# part of that, so pull explicitly here). One-shot, creates: gate not
# applicable -- podman pull is idempotent on its own.
- name: _verify | Podman_unnamed | ensure busybox image present
  command: podman pull docker.io/library/busybox
  changed_when: false
  become: true

- name: _verify | Podman_unnamed | run marked busybox container (no --name on purpose)
  command: >-
    podman run --rm --log-driver journald
    docker.io/library/busybox
    echo fluentbit_verify_podman_unnamed marker {{ fluentbit_otlp_podman_marker }}
  changed_when: false
  become: true

- name: _verify | Podman_unnamed | wait for ClickHouse row matching marker
  import_role:
    name: test
    tasks_from: clickhouse_query_wait
  vars:
    test_args:
      label: "podman_unnamed | wait for row"
      sql: >-
        SELECT count() FROM default.otel_logs
        WHERE Body LIKE '%{{ fluentbit_otlp_podman_marker }}%'
          AND ServiceName = 'podman_unnamed'
      retries: 60
      delay: 2
      until: "test_clickhouse_result.rc == 0 and (test_clickhouse_result.stdout | trim | int) > 0"

- name: _verify | Podman_unnamed | fetch row
  import_role:
    name: test
    tasks_from: clickhouse_query
  vars:
    test_args:
      label: "podman_unnamed | fetch"
      sql: >-
        SELECT Body, ServiceName
        FROM default.otel_logs
        WHERE Body LIKE '%{{ fluentbit_otlp_podman_marker }}%'
          AND ServiceName = 'podman_unnamed'
        ORDER BY Timestamp DESC
        LIMIT 1
        FORMAT JSONEachRow

- name: _verify | Podman_unnamed | assert libpod-conmon fallback fired
  vars:
    row: "{{ test_clickhouse_result.stdout | from_json }}"
  assert:
    that:
      - "row.ServiceName == 'podman_unnamed'"
      - "fluentbit_otlp_podman_marker in row.Body"
    fail_msg: "unnamed-container record did not hit libpod-conmon fallback: {{ row }}"

# podman_healthcheck override: podman runs each scheduled healthcheck
# as `systemd-run --unit=<container-id>` where the unit name is the
# full 64-char container ID + ".service". PID 1 emits "Started",
# "Deactivated successfully" and on failure "Failed with result
# 'exit-code'" — tagged with UNIT=<64hex>.service in the journal but
# _SYSTEMD_UNIT=init.scope (PID 1's cgroup) and SYSLOG_IDENTIFIER=systemd.
# otlp_shape.lua keys on the UNIT field and rewrites to
# ServiceName=podman_healthcheck + stamps CONTAINER_ID_FULL/SHORT so
# HyperDX can pivot to the container's own application logs (which
# podman's journald log driver tags with the same CONTAINER_ID_FULL).
# Spoof a real healthcheck by minting a fake 64-hex unit name and
# letting a transient unit exit non-zero; PID 1 emits the same shape.
- name: _verify | Podman_healthcheck | build per-run marker
  set_fact:
    fluentbit_otlp_healthcheck_marker: "verify_healthcheck_{{ ansible_date_time.iso8601_basic_short }}_{{ 99999 | random }}"

# SHA-256 of the marker is a unique 64-char lowercase hex string —
# the exact shape podman uses for container IDs.
- name: _verify | Podman_healthcheck | derive fake 64-hex container id
  set_fact:
    fluentbit_otlp_healthcheck_cid: "{{ fluentbit_otlp_healthcheck_marker | hash('sha256') }}"

# Default systemd-run is async-start: returns 0 after the unit launches,
# the unit then exits 1 and PID 1 logs "Failed with result 'exit-code'."
- name: _verify | Podman_healthcheck | run failing transient unit named like a container id
  command: >-
    systemd-run --unit={{ fluentbit_otlp_healthcheck_cid }}.service
    --quiet
    /bin/sh -c "exit 1"
  changed_when: false
  become: true

- name: _verify | Podman_healthcheck | wait for ClickHouse row matching cid
  import_role:
    name: test
    tasks_from: clickhouse_query_wait
  vars:
    test_args:
      label: "podman_healthcheck | wait for row"
      sql: >-
        SELECT count() FROM default.otel_logs
        WHERE LogAttributes['CONTAINER_ID_FULL'] = '{{ fluentbit_otlp_healthcheck_cid }}'
          AND ServiceName = 'podman_healthcheck'
      retries: 60
      delay: 2
      until: "test_clickhouse_result.rc == 0 and (test_clickhouse_result.stdout | trim | int) > 0"

- name: _verify | Podman_healthcheck | fetch row
  import_role:
    name: test
    tasks_from: clickhouse_query
  vars:
    test_args:
      label: "podman_healthcheck | fetch"
      sql: >-
        SELECT
          Body,
          ServiceName,
          LogAttributes['CONTAINER_ID_FULL'] AS container_id_full,
          LogAttributes['CONTAINER_ID']      AS container_id_short,
          LogAttributes['UNIT']              AS unit_field
        FROM default.otel_logs
        WHERE LogAttributes['CONTAINER_ID_FULL'] = '{{ fluentbit_otlp_healthcheck_cid }}'
          AND ServiceName = 'podman_healthcheck'
        ORDER BY Timestamp DESC
        LIMIT 1
        FORMAT JSONEachRow

- name: _verify | Podman_healthcheck | assert rewrite shape
  vars:
    row: "{{ test_clickhouse_result.stdout | from_json }}"
  assert:
    that:
      - "row.ServiceName == 'podman_healthcheck'"
      - "row.container_id_full == fluentbit_otlp_healthcheck_cid"
      - "row.container_id_short == fluentbit_otlp_healthcheck_cid[:12]"
      - "row.unit_field == fluentbit_otlp_healthcheck_cid ~ '.service'"
      - "fluentbit_otlp_healthcheck_cid in row.Body"
    fail_msg: "podman_healthcheck rewrite did not fire: {{ row }}"

# No probe for the svc.<empty> -> SYSLOG_IDENTIFIER fallback branch:
# the path covers records that reach journald with _TRANSPORT=kernel
# and no _SYSTEMD_UNIT (nftables LOG target, MCE, oom-killer, audit),
# but those can't be synthesised from userspace. /dev/kmsg writes go
# through the kernel ring buffer but journald still attributes them
# to the writing process's cgroup (-> _SYSTEMD_UNIT=session-X.scope),
# so they hit the normal svc.<unit> branch instead. Real kernel
# printk records bypass that attribution because the kernel isn't in
# any cgroup. See otlp_shape.lua for the fallback implementation.
