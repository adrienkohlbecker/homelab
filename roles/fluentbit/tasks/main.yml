- name: Install sqlite3 CLI
  apt:
    pkg:
      - sqlite3
    cache_valid_time: 3600
  become: true
  tags:
    - fluentbit

- name: Configure Fluent Bit apt repository
  import_role:
    name: apt_source
    tasks_from: configure
  vars:
    apt_source_args:
      name: fluentbit
      key_id: C3C0A28534B9293EAF51FABD9F9DDC083888C1CD
      key_url: https://packages.fluentbit.io/fluentbit.key
      uris: "{{ mirror_apt_fluentbit }}/{{ ansible_distribution_release }}"
      suites: "{{ ansible_distribution_release }}"
      components: main
      filename: fluent-bit
  tags:
    - fluentbit

# policy_rc_d=101 blocks the package's postinst auto-start. The default
# config logs to stdout and would harmlessly start, but skipping that
# saves a noisy systemd restart cycle.
- name: Install fluent-bit
  when: not (ansible_check_mode and apt_source_fluentbit_changed)
  apt:
    pkg: fluent-bit
    policy_rc_d: 101
    cache_valid_time: 3600
  register: fluentbit_apt
  become: true
  tags:
    - fluentbit

# fluent-bit's filesystem backlog under /var/lib/fluent-bit/storage/
# queues records while local outputs are backpressured. The package
# leaves /var/lib/fluent-bit/ at 0755 and fluent-bit creates storage/
# with the unit's default umask (0755). Tighten both to 0700 so a local
# user can't traverse the queue; fluent-bit itself runs as root (the
# conf below is 0600), so 0700 doesn't break the runtime.
- name: Tighten fluent-bit state directory perms
  file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0700"
  loop:
    - /var/lib/fluent-bit
    - /var/lib/fluent-bit/storage
  become: true
  when: not (ansible_check_mode and fluentbit_apt.changed)
  tags:
    - fluentbit

- name: Install fluent-bit Lua filters
  copy:
    src: "{{ item }}"
    dest: /etc/fluent-bit/{{ item }}
    owner: root
    group: root
    mode: "0644"
    backup: true
  loop:
    - strip_ansi.lua
    - level_from_message.lua
    - lnav_shape.lua
  become: true
  register: fluentbit_lua
  when: not (ansible_check_mode and fluentbit_apt.changed)
  tags:
    - fluentbit

- name: Remove retired OTLP shape filter
  file:
    path: /etc/fluent-bit/otlp_shape.lua
    state: absent
  become: true
  tags:
    - fluentbit

# Deployed before the main config below: fluent-bit.conf references these with
# absolute Parsers_File paths that must already exist when the config's
# `--dry-run` validate runs. One file per service whose tailed log gets a
# custom parser (nginx access, pihole FTL).
- name: Install fluent-bit custom parsers
  copy:
    src: "{{ item }}"
    dest: /etc/fluent-bit/{{ item }}
    owner: root
    group: root
    mode: "0644"
    backup: true
  loop:
    - parsers_nginx.conf
    - parsers_pihole.conf
  become: true
  register: fluentbit_parsers
  when: not (ansible_check_mode and fluentbit_apt.changed)
  tags:
    - fluentbit

- name: Create Fluent Bit lnav log directory
  file:
    path: /var/log/fluent-bit
    state: directory
    owner: root
    group: adm
    mode: "0750"
  become: true
  tags:
    - fluentbit

- name: Create Fluent Bit lnav JSONL store
  file:
    path: /var/log/fluent-bit/lnav.jsonl
    state: touch
    owner: root
    group: adm
    mode: "0640"
    access_time: preserve
    modification_time: preserve
  become: true
  tags:
    - fluentbit

- name: Configure Fluent Bit lnav JSONL rotation
  import_role:
    name: logrotate
    tasks_from: template
  vars:
    logrotate_args:
      src: logrotate.j2
      dest: /etc/logrotate.d/fluent-bit-lnav
  tags:
    - fluentbit

- name: Configure fluent-bit
  template:
    src: fluent-bit.conf.j2
    dest: /etc/fluent-bit/fluent-bit.conf
    owner: root
    group: root
    mode: "0600"
    backup: true
    validate: /opt/fluent-bit/bin/fluent-bit --config %s --dry-run
  become: true
  register: fluentbit_conf
  when: not (ansible_check_mode and (fluentbit_apt.changed or fluentbit_lua.changed))
  tags:
    - fluentbit

- name: Install fluent-bit reload override
  import_role:
    name: systemd_unit
    tasks_from: dropin
  vars:
    systemd_unit_args:
      src: override.conf.j2
      for: fluent-bit.service
      condition: "{{ not (ansible_check_mode and (fluentbit_apt.changed or apt_source_fluentbit_changed)) }}"
  tags:
    - fluentbit

# Split restart vs reload: apt package and systemd drop-in changes need
# a restart; conf/lua changes hit Hot_Reload via SIGHUP and preserve the
# in-memory backlog. Mutually exclusive (`and not restart`) matches the
# avahi pattern.
- name: Enable fluent-bit service
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: fluent-bit
      condition: "{{ not (ansible_check_mode and (fluentbit_apt.changed or apt_source_fluentbit_changed)) }}"
      restart: "{{ fluentbit_apt.changed or fluent_bit_service_d_override_conf_result.changed }}"
      reload: "{{ (fluentbit_conf.changed or fluentbit_lua.changed or fluentbit_parsers.changed) and not (fluentbit_apt.changed or fluent_bit_service_d_override_conf_result.changed) }}"
  tags:
    - fluentbit

# The systemd input plugin does not expose db.journal_mode. SQLite
# accepts PRAGMA journal_mode=WAL on a missing DB and creates a valid
# empty WAL-mode file; fluent-bit's systemd input then creates its
# cursor schema on first write.
- name: Stat fluent-bit journal.db
  stat:
    path: /var/lib/fluent-bit/journal.db
  register: fluentbit_journal_db
  when: not ansible_check_mode
  become: true
  tags:
    - fluentbit

- name: Read fluent-bit journal.db mode
  command:
    argv:
      - sqlite3
      - /var/lib/fluent-bit/journal.db
      - PRAGMA journal_mode;
  register: fluentbit_journal_db_mode
  changed_when: false
  when:
    - not ansible_check_mode
    - fluentbit_journal_db.stat.exists
  become: true
  tags:
    - fluentbit

- name: Convert fluent-bit journal.db to WAL
  command:
    argv:
      - sqlite3
      - /var/lib/fluent-bit/journal.db
      - PRAGMA busy_timeout=5000; PRAGMA journal_mode=WAL;
  changed_when: true
  when:
    - not ansible_check_mode
    - not fluentbit_journal_db.stat.exists or (fluentbit_journal_db_mode.stdout | trim) != "wal"
  become: true
  tags:
    - fluentbit

# sqlite3 CLI is installed at the top of the role (not pulled in by
# fluent-bit's apt deps -- only libsqlite3-0 is). PRAGMA busy_timeout
# precedes journal_mode=WAL as defence against fluent-bit's cursor writer
# holding the lock; fluent-bit's cursor writes are short, 5s is plenty.
- name: Set fluent-bit journal.db permissions
  file:
    path: /var/lib/fluent-bit/journal.db
    owner: root
    group: root
    mode: "0600"
  when: not ansible_check_mode
  become: true
  tags:
    - fluentbit

# parse_unifi.lua was deployed by this role when udm_syslog was active.
# The role and its fluentbit_udm_input code path were both removed; the
# deployed copy no longer serves any purpose.
- name: Remove retired parse_unifi.lua
  file:
    path: /etc/fluent-bit/parse_unifi.lua
    state: absent
  become: true
  tags:
    - fluentbit
