- name: Install gpg + sqlite3 CLI
  apt:
    pkg:
      - gpg
      - sqlite3
    cache_valid_time: 3600
  become: true
  register: fluentbit_apt_gpg
  tags:
    - fluentbit

# Repository setup forks on Ubuntu major version because apt-key was
# removed from the default install in resolute (26.04). Same release
# blacklist pattern as roles/netdata.
- name: Add fluent-bit repository key
  when:
    - ansible_distribution_major_version | int < 26
    - not (ansible_check_mode and fluentbit_apt_gpg.changed)
  apt_key:
    url: https://packages.fluentbit.io/fluentbit.key
    keyring: /etc/apt/trusted.gpg.d/fluentbit.gpg
  become: true
  tags:
    - fluentbit

- name: Add fluent-bit repository
  when: ansible_distribution_major_version | int < 26
  apt_repository:
    repo: deb [signed-by=/etc/apt/trusted.gpg.d/fluentbit.gpg] {{ mirror_apt_fluentbit }}/{{ ansible_distribution_release }} {{ ansible_distribution_release }} main
    filename: fluent-bit
  register: fluentbit_apt_repo_legacy
  become: true
  tags:
    - fluentbit

# Pre-warm /var/lib/apt/lists/ so the python3-debian install below
# works in check mode. Packer ships an empty cache and the apt
# module's update_cache is a no-op under --check. See
# roles/apt/tasks/install.yml for the full rationale.
- name: Pre-warm apt cache (real fetch even in --check)  # noqa: command-instead-of-module
  when: ansible_distribution_major_version | int >= 26
  command: apt-get update
  changed_when: false
  check_mode: false
  become: true
  tags:
    - fluentbit

- name: Install python3-debian (deb822_repository prereq)
  when: ansible_distribution_major_version | int >= 26
  apt:
    pkg: python3-debian
    cache_valid_time: 3600
  become: true
  register: fluentbit_apt_python3_debian
  tags:
    - fluentbit

- name: Add fluent-bit repository (deb822)
  when:
    - ansible_distribution_major_version | int >= 26
    - not (ansible_check_mode and fluentbit_apt_python3_debian.changed)
  deb822_repository:
    name: fluent-bit
    types: deb
    uris: "{{ mirror_apt_fluentbit }}/{{ ansible_distribution_release }}"
    suites: "{{ ansible_distribution_release }}"
    components: main
    signed_by: https://packages.fluentbit.io/fluentbit.key
  register: fluentbit_apt_repo_deb822
  become: true
  tags:
    - fluentbit

- name: Track repository changes
  set_fact:
    fluentbit_apt_repo:
      changed: "{{ fluentbit_apt_repo_legacy is changed or fluentbit_apt_repo_deb822 is changed or fluentbit_apt_python3_debian is changed }}"
  tags:
    - fluentbit

- name: Refresh apt cache after fluent-bit repo change
  when: fluentbit_apt_repo.changed and not ansible_check_mode
  apt:
    update_cache: true
  become: true
  tags:
    - fluentbit

# policy_rc_d=101 blocks the package's postinst auto-start. The default
# config logs to stdout and would harmlessly start, but skipping that
# saves a noisy systemd restart cycle.
- name: Install fluent-bit
  when: not (ansible_check_mode and fluentbit_apt_repo.changed)
  apt:
    pkg: fluent-bit
    policy_rc_d: 101
    cache_valid_time: 3600
  register: fluentbit_apt
  become: true
  tags:
    - fluentbit

# fluent-bit's filesystem backlog under /var/lib/fluent-bit/storage/
# queues records during a HyperDX outage -- journal entries (sudo argv,
# auth failures), CSP report bodies, anything in transit. The package
# leaves /var/lib/fluent-bit/ at 0755 and fluent-bit creates storage/
# with the unit's default umask (0755). Tighten both to 0700 so a local
# user can't traverse the queue; fluent-bit itself runs as root (the
# conf below is 0600), so 0700 doesn't break the runtime.
- name: Tighten fluent-bit state directory perms
  file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0700"
  loop:
    - /var/lib/fluent-bit
    - /var/lib/fluent-bit/storage
  become: true
  when: not (ansible_check_mode and fluentbit_apt.changed)
  tags:
    - fluentbit

- name: Install fluent-bit Lua filters
  copy:
    src: "{{ item }}"
    dest: /etc/fluent-bit/{{ item }}
    owner: root
    group: root
    mode: "0644"
    backup: true
  loop:
    - level_from_message.lua
    - flatten_csp.lua
    - otlp_shape.lua
  become: true
  register: fluentbit_lua
  when: not (ansible_check_mode and fluentbit_apt.changed)
  tags:
    - fluentbit

- name: Configure fluent-bit
  template:
    src: fluent-bit.conf.j2
    dest: /etc/fluent-bit/fluent-bit.conf
    owner: root
    group: root
    mode: "0600"
    backup: true
    validate: /opt/fluent-bit/bin/fluent-bit --config %s --dry-run
  become: true
  register: fluentbit_conf
  when: not (ansible_check_mode and (fluentbit_apt.changed or fluentbit_lua.changed))
  tags:
    - fluentbit

- name: Install fluent-bit reload override
  import_role:
    name: systemd_unit
    tasks_from: dropin
  vars:
    systemd_unit_args:
      src: override.conf.j2
      for: fluent-bit.service
      condition: "{{ not (ansible_check_mode and (fluentbit_apt.changed or fluentbit_apt_repo.changed)) }}"
  tags:
    - fluentbit

# Split restart vs reload: apt package upgrade swaps the binary so a
# restart is mandatory; conf/lua changes hit Hot_Reload via SIGHUP and
# preserve the in-memory backlog. Mutually exclusive (`and not apt`)
# matches the avahi pattern.
- name: Enable fluent-bit service
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: fluent-bit
      condition: "{{ not (ansible_check_mode and (fluentbit_apt.changed or fluentbit_apt_repo.changed)) }}"
      restart: "{{ fluentbit_apt.changed }}"
      reload: "{{ (fluentbit_conf.changed or fluentbit_lua.changed) and not fluentbit_apt.changed }}"
  tags:
    - fluentbit

# The systemd input plugin doesn't expose db.journal_mode (only the
# tail plugin does -- which is why the nginx-{access,error}.db files
# end up WAL by default but journal.db doesn't). Flip the mode once;
# the pragma is stored in the db header and persists across opens.
# Gate the convert on the -wal sidecar: SQLite creates -wal at the
# first WAL-mode write and keeps it while any writer holds the db
# open. fluent-bit's systemd input is a continuous writer, so during
# normal operation -wal exists after first apply and the gate skips
# thereafter. A clean shutdown removes -wal, so a play run with
# fluent-bit stopped will re-fire the (idempotent) PRAGMA -- cosmetic
# noise, not a real re-flip. wait_for absorbs the race where
# fluent-bit hasn't yet written the db on first apply; in --check the
# unit isn't actually started so we skip the wait and let the
# creates-gated convert no-op-report.
- name: Wait for fluent-bit journal.db
  wait_for:
    path: /var/lib/fluent-bit/journal.db
    timeout: 30
  when: not ansible_check_mode
  become: true
  tags:
    - fluentbit

# sqlite3 CLI is installed at the top of the role (not pulled in by
# fluent-bit's apt deps -- only libsqlite3-0 is). PRAGMA busy_timeout
# precedes journal_mode=WAL as defence against the race between
# wait_for path: returning (inode exists) and fluent-bit's cursor
# writer holding the lock; fluent-bit's cursor writes are short, 5s
# is plenty.
- name: Convert fluent-bit journal.db to WAL
  command: sqlite3 /var/lib/fluent-bit/journal.db 'PRAGMA busy_timeout=5000; PRAGMA journal_mode=WAL;'
  args:
    creates: /var/lib/fluent-bit/journal.db-wal
  become: true
  tags:
    - fluentbit
