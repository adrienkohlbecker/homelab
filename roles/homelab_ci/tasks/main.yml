- name: Create homelab_ci group
  group:
    name: homelab_ci
    state: present
    system: true
  become: true
  tags:
    - homelab_ci

- name: Install acl package
  apt:
    name: acl
    state: present
  become: true
  tags:
    - homelab_ci

# Both the operator (ak) running packer:build locally and the CI runner
# (gitlab_runner) publish qemu test-fixture artifacts here, so a tree one
# identity built must be fully manageable by the other. The setgid group
# + default ACL propagate homelab_ci:rwx to all new files and subdirectories --
# including packer-plugin-qemu's port reservation files (hardcoded 0600 by the
# plugin) -- so any group member can open them regardless of who created them.
# The x is load-bearing: publish.py's atomic swap parks the previous tree and
# shutil.rmtree's it, which needs execute (directory traversal) on every
# subdirectory; without it a member can read but not delete another's tree.
- name: Create /mnt/scratch/homelab_ci packer artifacts dir
  file:
    path: /mnt/scratch/homelab_ci
    state: directory
    group: homelab_ci
    mode: "02775"
  become: true
  register: homelab_ci_dir
  tags:
    - homelab_ci

- name: Set default homelab_ci:rwx ACL on homelab_ci
  ansible.posix.acl:
    path: /mnt/scratch/homelab_ci
    entity: homelab_ci
    etype: group
    permissions: rwx
    default: true
    state: present
  become: true
  # In check mode the dir-create above only reports creation, so the path is
  # absent and the acl module errors "Path not found"; skip until it truly exists.
  when: not (ansible_check_mode and homelab_ci_dir.changed)
  tags:
    - homelab_ci
