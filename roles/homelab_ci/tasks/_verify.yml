- name: _verify | Group homelab_ci exists
  command:
    argv:
      - getent
      - group
      - homelab_ci
  changed_when: false
  become: true

- name: _verify | CI artifacts dir exists with homelab_ci group and setgid
  stat:
    path: /mnt/scratch/homelab_ci
  register: homelab_ci_verify_dir
  become: true
  # stat no longer emits the sgid boolean -- assert the setgid + 775 perms via
  # the mode string the role declares (02775 -> stat reports '2775').
  failed_when: >-
    not homelab_ci_verify_dir.stat.exists
    or not homelab_ci_verify_dir.stat.isdir
    or homelab_ci_verify_dir.stat.gr_name != 'homelab_ci'
    or homelab_ci_verify_dir.stat.mode != '2775'

- name: _verify | CI artifacts dir has default homelab_ci:rwx ACL
  command:
    argv:
      - getfacl
      - --omit-header
      - /mnt/scratch/homelab_ci
  register: homelab_ci_verify_acl
  changed_when: false
  # rwx, not rw: the x is what lets a group member traverse and rmtree another
  # member's published tree during publish.py's atomic swap.
  failed_when: "'default:group:homelab_ci:rwx' not in homelab_ci_verify_acl.stdout"
  become: true
