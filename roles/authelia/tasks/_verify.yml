# Loopback probe — confirms the container is up and serving the
# health endpoint, independent of nginx. Cold-start window covers the
# wget healthcheck's 30s --health-start-period plus argon2 backend
# init.
- name: _verify | Authelia answers on its loopback port
  uri:
    url: http://localhost:{{ service_ports.authelia }}/api/health
    status_code: 200
    return_content: true
  register: authelia_verify_loopback
  retries: 60
  delay: 2
  until:
    - authelia_verify_loopback.status == 200
  become: true

# nginx reverse-proxy probe — exercises the full reverse-proxy chain.
# The portal SPA index returns a generic html shell with no
# Authelia-identifying text (the app boots client-side via React);
# /api/health is a sibling endpoint on the same Authelia daemon that
# returns identifiable JSON ({"status":"OK"}), so we probe it
# through nginx to assert the full proxy chain works end-to-end.
#
# Map the vhost FQDN to loopback so SNI matches the served certificate.
# Probing https://localhost with a Host: header leaves SNI=localhost, which
# OpenSSL 3.x (noble/resolute) rejects as a fatal unrecognized_name alert
# (status -1); hitting the FQDN directly keeps SNI correct on every release.
- name: _verify | Map the authelia vhost FQDN to loopback for SNI-correct probing
  lineinfile:
    path: /etc/hosts
    line: "127.0.0.1 auth.{{ authelia_cookie_domain }}"
    state: present
  become: true

- name: _verify | Authelia /api/health reachable through nginx
  uri:
    url: https://auth.{{ authelia_cookie_domain }}/api/health
    validate_certs: false
    return_content: true
  register: authelia_verify_portal
  failed_when: >-
    authelia_verify_portal.status != 200
    or authelia_verify_portal.json.status != 'OK'
  become: true

# Portal index returns the SPA shell; assert HTTP 200 + HTML
# content-type so a misconfigured nginx site (or a future Authelia
# release that breaks the SPA root) fails loudly.
- name: _verify | Authelia portal index returns the SPA shell
  uri:
    url: https://auth.{{ authelia_cookie_domain }}/
    validate_certs: false
  register: authelia_verify_portal_index
  failed_when: >-
    authelia_verify_portal_index.status != 200
    or 'text/html' not in authelia_verify_portal_index.content_type
  become: true

# auth-request endpoint reachable through nginx. Unauthenticated
# callers with the standard nginx auth_request headers get 401
# (Authelia's "redirect them to the portal" response); that's the
# success case -- it proves Authelia is processing the request via
# its auth handler, not 404'ing on the route or 502'ing on a wedged
# backend. Authelia requires X-Original-Method + X-Original-URL
# (the headers nginx's auth_request module auto-sets for real
# subrequests) -- without them it returns 400 Bad Request.
- name: _verify | Authelia auth-request endpoint returns 401 for unauthenticated callers
  uri:
    url: https://auth.{{ authelia_cookie_domain }}/api/authz/auth-request
    headers:
      X-Original-Method: GET
      X-Original-URL: "https://homepage.{{ inventory_hostname }}.{{ domain }}/"
    validate_certs: false
    status_code: 401
  become: true

# OIDC discovery endpoint. Asserts the identity_providers.oidc block
# in configuration.yml.j2 parsed, the JWKS loaded the RSA private
# key, and the HMAC secret env var was wired through. A
# misconfigured client list, missing key file, or bad PEM all
# surface here as either a non-200 response or missing expected
# fields in the discovery JSON.
- name: _verify | Authelia OIDC discovery endpoint
  uri:
    url: https://auth.{{ authelia_cookie_domain }}/.well-known/openid-configuration
    validate_certs: false
    return_content: true
  register: authelia_verify_oidc_discovery
  failed_when: >-
    authelia_verify_oidc_discovery.status != 200
    or authelia_verify_oidc_discovery.json.issuer != ('https://auth.' ~ authelia_cookie_domain)
    or 'RS256' not in authelia_verify_oidc_discovery.json.id_token_signing_alg_values_supported
  become: true

# JWKS endpoint. Confirms the public key derived from the issuer
# private key is exposed for clients to verify id_token signatures.
- name: _verify | Authelia JWKS endpoint serves the issuer public key
  uri:
    url: https://auth.{{ authelia_cookie_domain }}/jwks.json
    validate_certs: false
    return_content: true
  register: authelia_verify_jwks
  # .json.keys here would resolve to the dict.keys method, not the
  # response's "keys" field; subscript via [] to dodge the collision.
  failed_when: >-
    authelia_verify_jwks.status != 200
    or (authelia_verify_jwks.json['keys'] | length) < 1
    or authelia_verify_jwks.json['keys'][0].kty != 'RSA'
  become: true

# Cross-host network plumbing (pug/bunk -> authelia_host's WG IP) is
# exercised in multi-host nightlies, not testrole.py: on a single VM
# the wg0 IP routes via loopback anyway, so the request never hits
# the wg0 ingress firewall rule that gates cross-host access. The
# loopback probe + auth-request probe above already cover the
# Authelia-specific bits (listener up, gate semantics correct).
