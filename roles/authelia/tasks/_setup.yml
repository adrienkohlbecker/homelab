# Test-fixture role-deps for the authelia harness run. site.yml on
# prod runs apt/podman/nginx in earlier plays, but testrole.py
# imports only the role under test -- so the harness's _setup.yml
# pre-stages podman + nginx + /mnt/services first. Mirrors the
# healthchecks _setup pattern exactly.
- name: _setup | Install podman
  import_role:
    name: podman
    tasks_from: install

- name: _setup | Install nginx
  import_role:
    name: test
    tasks_from: nginx

- name: _setup | Create /mnt/services parent
  shell: |
    set -euo pipefail
    mkdir /mnt/services
  args:
    executable: /bin/bash
    creates: /mnt/services
  become: true
