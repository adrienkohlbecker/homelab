# Loopback probe -- the unit's --sdnotify=healthy gates systemd `active` on the
# in-container `headscale users list` CLI check, so by the time _verify runs the
# server is answering. /health is headscale's own liveness endpoint (200 {}).
- name: _verify | Headscale answers /health on its loopback port
  uri:
    url: http://localhost:{{ service_ports.headscale }}/health
    status_code: 200
  register: _headscale_loopback
  retries: 5
  delay: 1
  until: _headscale_loopback.status == 200
  become: true

# Metrics probe -- fox's netdata prometheus collector scrapes this loopback
# endpoint and its presence alert doubles as a headscale liveness signal, so a
# broken --publish or a changed metrics path must fail here, not silently on
# prod (the metrics surface is otherwise untested). Same URL netdata scrapes.
- name: _verify | Headscale serves prometheus metrics on its loopback port
  uri:
    url: http://localhost:{{ service_ports.headscale_metrics }}/metrics
    status_code: 200
    return_content: true
  register: _headscale_metrics
  failed_when: "'headscale_' not in (_headscale_metrics.content | default(''))"
  retries: 5
  delay: 1
  until: _headscale_metrics.status | default(0) == 200
  become: true

# nginx vhost probe -- the control endpoint is public (auth: none), so a plain
# GET /health through the TLS vhost must return 200. Validates the proxy_pass
# port + TLS termination that the Tailscale clients depend on.
- name: _verify | Headscale /health is reachable through the nginx TLS vhost
  uri:
    url: https://localhost/health
    headers:
      Host: headscale.{{ inventory_hostname }}.{{ domain }}
    validate_certs: false
    status_code: 200
  become: true

# Ownership regression detector -- headscale runs as the headscale host uid
# (tier-1 --user, no uidmap), so the SQLite DB + keys it writes into the state
# dir should be owned by that user. A dropped --user flag would land them as
# root silently; assert ownership so the drift is loud.
- name: _verify | Headscale data dir is owned by headscale
  stat:
    path: /mnt/services/headscale/data
  register: _headscale_data_owner
  failed_when: >-
    not _headscale_data_owner.stat.exists
    or _headscale_data_owner.stat.pw_name != 'headscale'
  become: true

# Symlink contract -- the role promises data/db.sqlite is a symlink onto the
# dedicated sqlite dataset. A snapshot-restore or a sqlite_dataset regression
# could leave a real file at the dest (DB silently off the 4K dataset); assert
# the symlink shape so the drift is loud.
- name: _verify | Headscale db.sqlite is a symlink onto the sqlite dataset
  stat:
    path: /mnt/services/headscale/data/db.sqlite
    follow: false
  register: _headscale_db_symlink
  failed_when: >-
    not _headscale_db_symlink.stat.exists
    or not _headscale_db_symlink.stat.islnk
    or _headscale_db_symlink.stat.lnk_target != '/mnt/services/sqlite/headscale/db.sqlite'
  become: true

# Functional API round-trip -- exercises the real control path end to end:
# the CLI talks gRPC over the unix socket to the running serve process, which
# writes to (then reads back from) the SQLite DB. A stat-only "unit active"
# check would pass even if the gRPC API or DB were wedged. Create is
# failed_when:false so a re-run against a kept VM (user already present) still
# proves the read path below.
- name: _verify | Create a throwaway headscale user (gRPC write path)
  command: podman exec headscale headscale users create test-harness
  register: _headscale_user_create
  changed_when: false
  failed_when: false
  become: true

- name: _verify | The throwaway user round-trips back through list
  command: podman exec headscale headscale users list
  register: _headscale_user_list
  changed_when: false
  failed_when: "'test-harness' not in _headscale_user_list.stdout"
  become: true

# Tie the symlink-shape check above to an observed write: the gRPC user-create
# just wrote through data/db.sqlite (the symlink), so the real DB file must now
# exist and be non-empty on the dedicated sqlite dataset -- catches a regression
# that leaves the DB off the 4K dataset even when the symlink stat still passes.
- name: _verify | The gRPC write landed on the sqlite dataset (real DB on-disk)
  stat:
    path: /mnt/services/sqlite/headscale/db.sqlite
  register: _headscale_db_real
  failed_when: not _headscale_db_real.stat.exists or _headscale_db_real.stat.size == 0
  become: true

# Dual-stack STUN publish -- fox is a dual-stack relay, so the embedded DERP
# STUN (udp/3478) must be reachable over IPv6, not just v4. This is asserted
# structurally rather than functionally on purpose: headscale's STUN answers
# Tailscale's own netcheck flow (confirmed working over IPv4 against prod fox)
# but NOT a hand-rolled RFC5389 Binding Request, and the box harness has no
# IPv6-capable Tailscale client to drive a real netcheck (the home/test nets are
# IPv4-only). So a reflection round-trip can't run here. Instead assert the
# publish plumbing the role is responsible for: the host must bind [::]:3478 (the
# v6 --publish landed) and netavark must have wired a v6 DNAT rule forwarding it
# into the container. A missing [::] listener or a non-dual-stack podman network
# fails this. End-to-end v6 STUN is verified in the field via `tailscale
# netcheck` from a v6-capable client after deploy.
- name: _verify | Host publishes DERP STUN on IPv6 ([::]:3478)
  command: ss -ulnH
  register: _headscale_stun_listen
  changed_when: false
  failed_when: "('[::]:' ~ service_ports.headscale_stun) not in _headscale_stun_listen.stdout"
  become: true

# netavark's firewall driver is iptables on jammy/noble (see roles/podman
# install.yml), so the v6 DNAT rule lives in the ip6tables nat table. On
# resolute+ netavark uses the native nftables driver and ip6tables is empty --
# check the nft ruleset there instead. box_deps (the only machine that runs this
# _verify) is noble today, so the iptables branch is the one that executes; the
# nft branch is a best-effort placeholder to refine when the box base OS moves.
- name: _verify | Netavark forwards inbound v6 STUN into the headscale container (iptables)
  shell: set -o pipefail; ip6tables -t nat -S | grep -- "--dport {{ service_ports.headscale_stun }} -j DNAT"
  args:
    executable: /bin/bash
  register: _headscale_stun_dnat
  changed_when: false
  when: ansible_distribution_release in ['jammy', 'noble']
  become: true

- name: _verify | Netavark forwards inbound v6 STUN into the headscale container (nftables)
  shell: set -o pipefail; nft list ruleset | grep -- "{{ service_ports.headscale_stun }}" | grep -iq "dnat"
  args:
    executable: /bin/bash
  register: _headscale_stun_dnat_nft
  changed_when: false
  when: ansible_distribution_release not in ['jammy', 'noble']
  become: true

# OIDC boot test -- _setup stood up a local mockoidc issuer and enabled OIDC for
# this converge. With only_start_if_oidc_is_available:true, headscale reaching
# `active` is itself proof that it completed boot-time OIDC discovery against the
# issuer (a malformed oidc block or unreachable issuer would leave the unit
# failed). Assert that, plus that the rendered config actually carried OIDC +
# the pkce block + the mock issuer -- so a regression that drops PKCE or the OIDC
# wiring fails here rather than silently shipping OIDC untested. Coverage
# boundary: this proves boot-time OIDC *discovery* + that the oidc/pkce block
# rendered -- NOT a live authorization-code / PKCE-S256 token exchange (the
# harness has no browser/OAuth client to drive enrollment). The end-to-end login
# flow is checked in the field after deploy.
- name: _verify | Headscale.service is active (boot-time OIDC discovery succeeded)  # noqa: command-instead-of-module
  command: systemctl is-active headscale.service
  register: _headscale_hs_active
  changed_when: false
  failed_when: _headscale_hs_active.stdout | trim != 'active'
  become: true

# Read the rendered config from the host (the distroless headscale image has no
# cat to podman-exec); /mnt/services/headscale/config.yaml is the file mounted
# read-only into the container.
- name: _verify | Rendered config enabled OIDC + PKCE against the mock issuer
  command: cat /mnt/services/headscale/config.yaml
  register: _headscale_hs_oidc_cfg
  changed_when: false
  failed_when: >-
    'http://10.166.0.10:8090/oidc' not in _headscale_hs_oidc_cfg.stdout
    or 'pkce:' not in _headscale_hs_oidc_cfg.stdout
  become: true

# Exercise the ACL SIGHUP reload's fail-soft contract (tasks/main.yml): a
# malformed policy on disk + SIGHUP must NOT take the server down -- headscale
# logs the load error and keeps serving the previously-loaded policy. This is
# the safety property the SIGHUP-not-restart design rests on; a regression to
# "restart on ACL change" (or a headscale change that hard-fails on a bad
# policy) surfaces here. Destructive to the on-disk ACL, which is fine: _verify
# is test-only and the VM is discarded after -- so this runs last.
- name: _verify | Plant a malformed ACL policy on disk
  copy:
    dest: /mnt/services/headscale/acl.hujson
    content: "{ this is not valid hujson policy "
    owner: headscale
    group: headscale
    mode: "0640"
  become: true

# Reload via the unit's ExecReload -- the same path prod takes for an ACL change
# (tasks/main.yml drives it through the helper's reload: arg, which is also a
# `state: reloaded`) -- so this exercises the real reload wiring, not a bare
# `podman kill`.
- name: _verify | Reload headscale to load the (malformed) policy
  systemd:
    name: headscale.service
    state: reloaded
  become: true

# `users list` round-trips gRPC over the socket to the running serve process,
# so it answering proves headscale stayed up serving its previously-loaded
# policy rather than crashing on the malformed file -- the fail-soft contract.
# Retried because the policy reload is async to signal receipt. (A stronger
# check than `systemctl is-active`, which could read 'active' mid crash-restart.)
- name: _verify | Server survived the bad reload and still serves (fail-soft)
  command: podman exec headscale headscale users list
  register: _headscale_failsoft_list
  changed_when: false
  retries: 5
  delay: 1
  until: _headscale_failsoft_list.rc == 0
  become: true
