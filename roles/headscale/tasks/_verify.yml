# Loopback probe -- the unit's --sdnotify=healthy gates systemd `active` on the
# in-container `headscale users list` CLI check, so by the time _verify runs the
# server is answering. /health is headscale's own liveness endpoint (200 {}).
- name: _verify | headscale answers /health on its loopback port
  uri:
    url: http://localhost:{{ service_ports.headscale }}/health
    status_code: 200
  register: _verify_loopback
  retries: 5
  delay: 1
  until: _verify_loopback.status == 200
  become: true

# nginx vhost probe -- the control endpoint is public (auth: none), so a plain
# GET /health through the TLS vhost must return 200. Validates the proxy_pass
# port + TLS termination that the Tailscale clients depend on.
- name: _verify | headscale /health is reachable through the nginx TLS vhost
  uri:
    url: https://localhost/health
    headers:
      Host: headscale.{{ inventory_hostname }}.{{ domain }}
    validate_certs: false
    status_code: 200
  become: true

# Ownership regression detector -- headscale runs as the headscale host uid
# (tier-1 --user, no uidmap), so the SQLite DB + keys it writes into the state
# dir should be owned by that user. A dropped --user flag would land them as
# root silently; assert ownership so the drift is loud.
- name: _verify | headscale data dir is owned by headscale
  stat:
    path: /mnt/services/headscale/data
  register: _verify_data_owner
  failed_when: >-
    not _verify_data_owner.stat.exists
    or _verify_data_owner.stat.pw_name != 'headscale'
  become: true

# Symlink contract -- the role promises data/db.sqlite is a symlink onto the
# dedicated sqlite dataset. A snapshot-restore or a sqlite_dataset regression
# could leave a real file at the dest (DB silently off the 4K dataset); assert
# the symlink shape so the drift is loud.
- name: _verify | headscale db.sqlite is a symlink onto the sqlite dataset
  stat:
    path: /mnt/services/headscale/data/db.sqlite
    follow: false
  register: _verify_db_symlink
  failed_when: >-
    not _verify_db_symlink.stat.exists
    or not _verify_db_symlink.stat.islnk
    or _verify_db_symlink.stat.lnk_target != '/mnt/services/sqlite/headscale/db.sqlite'
  become: true

# Functional API round-trip -- exercises the real control path end to end:
# the CLI talks gRPC over the unix socket to the running serve process, which
# writes to (then reads back from) the SQLite DB. A stat-only "unit active"
# check would pass even if the gRPC API or DB were wedged. Create is
# failed_when:false so a re-run against a kept VM (user already present) still
# proves the read path below.
- name: _verify | create a throwaway headscale user (gRPC write path)
  command: podman exec headscale headscale users create test-harness
  register: _verify_user_create
  changed_when: false
  failed_when: false
  become: true

- name: _verify | the throwaway user round-trips back through list
  command: podman exec headscale headscale users list
  register: _verify_user_list
  changed_when: false
  failed_when: "'test-harness' not in _verify_user_list.stdout"
  become: true
