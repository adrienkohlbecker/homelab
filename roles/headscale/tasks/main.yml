# Required inputs live in host_vars/group_vars and the role asserts them (per
# CLAUDE.md) -- the OIDC trio is only consulted when enrollment is enabled, so
# gate the assert on the same flag. A missing/typo'd issuer would otherwise fail
# opaquely at headscale's boot-time OIDC discovery on the one public host rather
# than loudly here at parse time. Mirrors roles/tailscale's input assert.
- name: Assert required headscale OIDC inputs are set when OIDC is enabled
  assert:
    that:
      - headscale_oidc_issuer is defined
      - headscale_oidc_client_id is defined
      - headscale_oidc_client_secret is defined
    fail_msg: >-
      headscale_oidc_enabled is true but one of headscale_oidc_issuer,
      headscale_oidc_client_id, headscale_oidc_client_secret is unset (set them
      in host_vars + vaulted group_vars/prod.yml; see
      notes/headscale_mesh_redesign.md §E).
  when: headscale_oidc_enabled | default(false)
  tags:
    - headscale

- name: Set up headscale system user, group, and config dir
  import_role:
    name: service_user
    tasks_from: user
  vars:
    service_user_args:
      name: headscale
  tags:
    - headscale

# State dir bind-mounted to /var/lib/headscale: the auto-generated noise + DERP
# private keys and the CLI unix socket land here. The SQLite DB lives on the
# dedicated sqlite dataset instead (symlinked in below). Owned by the headscale
# uid (tier-1 --user, no uidmap) so the container writes them directly.
- name: Create headscale data dir
  when: not (ansible_check_mode and headscale_user.changed)
  file:
    dest: /mnt/services/headscale/data
    state: directory
    owner: headscale
    group: headscale
    mode: "0750"
  become: true
  tags:
    - headscale

# Park db.sqlite on the dedicated 4K-recordsize sqlite dataset and symlink
# data/db.sqlite onto it (config.yaml points headscale at /var/lib/headscale/
# db.sqlite, i.e. the symlink; the unit mounts the dataset at the same path so
# it resolves in-container). pre_create plants an empty src file first --
# headscale creates its DB on first boot, and state=link refuses to plant a
# dangling symlink without it.
- name: Place headscale SQLite DB on the sqlite dataset
  import_role:
    name: sqlite_dataset
    tasks_from: dataset
  vars:
    sqlite_dataset_args:
      name: headscale
      owner: headscale
      group: headscale
      pre_create: true
      links:
        - /mnt/services/headscale/data/db.sqlite
      condition: "{{ not (ansible_check_mode and headscale_user.changed) }}"
  tags:
    - headscale

- name: Render headscale ACL policy
  when: not (ansible_check_mode and headscale_user.changed)
  template:
    src: acl.hujson.j2
    dest: /mnt/services/headscale/acl.hujson
    owner: headscale
    group: headscale
    mode: "0640"
    backup: true
  become: true
  register: headscale_acl_result
  tags:
    - headscale

- name: Create headscale OIDC client secret
  when: headscale_oidc_enabled | default(false)
  import_role:
    name: podman_secret
    tasks_from: secret
  vars:
    podman_secret_args:
      name: headscale_oidc_secret
      data: "{{ headscale_oidc_client_secret }}"
  tags:
    - headscale

- name: Render headscale config
  when: not (ansible_check_mode and headscale_user.changed)
  template:
    src: config.yaml.j2
    dest: /mnt/services/headscale/config.yaml
    owner: headscale
    group: headscale
    mode: "0640"
    backup: true
    # YAML-only validation is the ceiling here: headscale's native semantic
    # checker (headscale configtest) lives in the container, not on the host, and
    # the file isn't yet at its in-container path when validate runs -- so this
    # catches jinja/quoting/vault-substitution breakage but not schema errors.
    # The unit's --sdnotify=healthy gate surfaces a config headscale rejects.
    validate: python3 -c 'import yaml,sys; yaml.safe_load(open(sys.argv[1]))' %s
  become: true
  register: headscale_config_result
  tags:
    - headscale

# Dedicated dual-stack podman network so the embedded DERP STUN answers over
# IPv6 too (fox is a dual-stack relay -- see host_vars/fox.yml). The default
# podman bridge is IPv4-only; ipv6:true makes netavark hand the container an
# extra ULA /64 and set up the same DNAT path for v6 published ports. Inbound
# STUN to the host's public v6 is DNAT'd to the container's ULA with the client
# source preserved (netavark masquerades only container-subnet/localhost
# sources), so STUN reflects the real client address -- exactly as the IPv4 path
# already does.
- name: Create headscale dual-stack podman network
  when: not ansible_check_mode
  containers.podman.podman_network:
    name: headscale
    ipv6: true
    state: present
  become: true
  register: headscale_network
  tags:
    - headscale

- name: Install headscale service
  import_role:
    name: systemd_unit
    tasks_from: install
  vars:
    systemd_unit_args:
      src: headscale.service.j2
      condition: "{{ not (ansible_check_mode and headscale_user.changed) }}"
  tags:
    - headscale

- name: Enable headscale service
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: headscale
      condition: "{{ not (ansible_check_mode and (headscale_service_result.changed or headscale_user.changed)) }}"
      restart: "{{ headscale_service_result.changed or headscale_config_result.changed or (headscale_network.changed | default(false)) or (headscale_oidc_secret_rotated | default(false)) }}"
  tags:
    - headscale

# ACL-only changes reload via SIGHUP, NOT a unit restart: headscale reloads the
# HuJSON policy on SIGHUP (the same as `systemctl reload`), so an ACL tweak
# needn't bounce the control plane + embedded DERP + every client long-poll. It
# also fails soft -- a malformed policy leaves the running server on its previous
# ACL, whereas a restart could refuse to come back. Sent to the container's PID 1
# (headscale serve). Redundant-but-harmless when a co-occurring config change
# already restarted the unit (which reloaded the ACL on start); skipped on a
# clean re-run since headscale_acl_result.changed is then false, so idempotence
# holds. Hence acl is dropped from the service task's restart: chain above.
- name: Reload headscale policy on ACL change (SIGHUP, no restart)
  command: podman kill --signal HUP headscale
  when:
    - headscale_acl_result.changed
    - not ansible_check_mode
  changed_when: true
  become: true
  tags:
    - headscale

# Public vhost (NOT Authelia-gated -- Tailscale clients hit the raw control
# API + DERP relay here, all over https/443). No enable_http: certbot issues
# the cert via the DNS-01 Cloudflare challenge (no :80 needed) and clients
# never use plain HTTP, so the site stays https-only (the template's default
# :80 block just redirects to :443, and fox's firewall doesn't open 80
# anyway). Long read timeout + buffering off keep the long-poll control stream
# and the DERP websocket (handled by the site template's Upgrade/Connection
# headers) alive.
- name: Configure nginx
  import_role:
    name: nginx
    tasks_from: site
  vars:
    nginx_site_args:
      subdomain: headscale
      proxy_pass: http://127.0.0.1:{{ service_ports.headscale }}/
      proxy_buffering: "off"
      proxy_read_timeout: "3600s"
  tags:
    - headscale
