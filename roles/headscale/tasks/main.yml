# Required inputs live in host_vars/group_vars and the role asserts them (per
# CLAUDE.md) -- the OIDC trio is only consulted when enrollment is enabled, so
# gate the assert on the same flag. A missing/typo'd issuer would otherwise fail
# opaquely at headscale's boot-time OIDC discovery on the one public host rather
# than loudly here at parse time. Mirrors roles/tailscale's input assert.
- name: Assert required headscale OIDC inputs are set when OIDC is enabled
  assert:
    that:
      - headscale_oidc_issuer | default('') | length > 0
      - headscale_oidc_client_id | default('') | length > 0
      - headscale_oidc_client_secret | default('') | length > 0
    fail_msg: >-
      headscale_oidc_enabled is true but one of headscale_oidc_issuer,
      headscale_oidc_client_id, headscale_oidc_client_secret is unset or empty
      (set them in host_vars + vaulted group_vars/prod.yml; see
      notes/headscale_mesh_redesign.md §E). A mistyped vault key that renders to
      an empty string passes `is defined` but boots an OIDC-broken control plane
      that still reaches `active`, so check for non-empty, not just defined.
  when: headscale_oidc_enabled
  tags:
    - headscale

# The embedded DERP advertises these public IPs in its DERPMap; the config
# template omits each key if its var is unset. Catch the asymmetric-typo case
# (one set, one not) loudly here -- a half-set pair silently advertises the
# container's private podman address for the missing family and degrades NAT
# traversal for roaming clients on that protocol. Both-set (the dual-stack fox
# relay) and both-unset (the IPv4-only test box) are the two valid states.
- name: Assert headscale DERP advertised IPs are set together (both or neither)
  assert:
    that:
      - (headscale_derp_ipv4 is defined) == (headscale_derp_ipv6 is defined)
    fail_msg: >-
      Exactly one of headscale_derp_ipv4 / headscale_derp_ipv6 is set; set both
      (a dual-stack relay like fox) or neither (IPv4-only) -- a half-set pair
      makes the embedded DERP advertise a private address for the missing family.
  tags:
    - headscale

- name: Set up headscale system user, group, and config dir
  import_role:
    name: service_user
    tasks_from: user
  vars:
    service_user_args:
      name: headscale
  tags:
    - headscale

# State dir bind-mounted to /var/lib/headscale: the auto-generated noise + DERP
# private keys and the CLI unix socket land here. The SQLite DB lives on the
# dedicated sqlite dataset instead (symlinked in below). Owned by the headscale
# uid (tier-1 --user, no uidmap) so the container writes them directly.
- name: Create headscale data dir
  when: not (ansible_check_mode and headscale_user.changed)
  file:
    dest: /mnt/services/headscale/data
    state: directory
    owner: headscale
    group: headscale
    mode: "0750"
  become: true
  tags:
    - headscale

# Park db.sqlite on the dedicated 4K-recordsize sqlite dataset and symlink
# data/db.sqlite onto it (config.yaml points headscale at /var/lib/headscale/
# db.sqlite, i.e. the symlink; the unit mounts the dataset at the same path so
# it resolves in-container). pre_create plants an empty src file first --
# headscale creates its DB on first boot, and state=link refuses to plant a
# dangling symlink without it.
- name: Place headscale SQLite DB on the sqlite dataset
  import_role:
    name: sqlite_dataset
    tasks_from: dataset
  vars:
    sqlite_dataset_args:
      name: headscale
      owner: headscale
      group: headscale
      pre_create: true
      links:
        - /mnt/services/headscale/data/db.sqlite
      condition: "{{ not (ansible_check_mode and headscale_user.changed) }}"
  tags:
    - headscale

# No validate: here -- HuJSON (JSON + comments/trailing commas) has no host-side
# parser (python's json rejects the trailing commas; headscale's own checker is
# in-container, and the file isn't at its in-container path when validate runs).
# A malformed policy fails soft anyway: the unit's SIGHUP ExecReload keeps the
# previously-loaded policy, and _verify exercises exactly that with a planted
# malformed file. Per CLAUDE.md: omit validate rather than invent a fake one.
- name: Render headscale ACL policy
  when: not (ansible_check_mode and headscale_user.changed)
  template:
    src: acl.hujson.j2
    dest: /mnt/services/headscale/acl.hujson
    owner: headscale
    group: headscale
    mode: "0640"
    backup: true
  become: true
  register: headscale_acl_result
  tags:
    - headscale

- name: Create headscale OIDC client secret
  when: headscale_oidc_enabled
  import_role:
    name: podman_secret
    tasks_from: secret
  vars:
    podman_secret_args:
      name: headscale_oidc_secret
      data: "{{ headscale_oidc_client_secret }}"
  tags:
    - headscale

- name: Render headscale config
  when: not (ansible_check_mode and headscale_user.changed)
  template:
    src: config.yaml.j2
    dest: /mnt/services/headscale/config.yaml
    owner: headscale
    group: headscale
    mode: "0640"
    backup: true
    # YAML-only validation is the ceiling here: headscale's native semantic
    # checker (headscale configtest) lives in the container, not on the host, and
    # the file isn't yet at its in-container path when validate runs -- so this
    # catches jinja/quoting/vault-substitution breakage but not schema errors.
    # The unit's --sdnotify=healthy gate surfaces a config headscale rejects.
    validate: python3 -c 'import yaml,sys; yaml.safe_load(open(sys.argv[1]))' %s
  become: true
  register: headscale_config_result
  tags:
    - headscale

# Dedicated dual-stack podman network so the embedded DERP STUN answers over
# IPv6 too (fox is a dual-stack relay -- see host_vars/fox.yml). The default
# podman bridge is IPv4-only; ipv6:true makes netavark hand the container an
# extra ULA /64 and set up the same DNAT path for v6 published ports. Inbound
# STUN to the host's public v6 is DNAT'd to the container's ULA with the client
# source preserved (netavark masquerades only container-subnet/localhost
# sources), so STUN reflects the real client address -- exactly as the IPv4 path
# already does.
- name: Create headscale dual-stack podman network
  when: not ansible_check_mode
  containers.podman.podman_network:
    name: headscale
    ipv6: true
    state: present
  become: true
  register: headscale_network
  tags:
    - headscale

- name: Install headscale service
  import_role:
    name: systemd_unit
    tasks_from: install
  vars:
    systemd_unit_args:
      src: headscale.service.j2
      condition: "{{ not (ansible_check_mode and headscale_user.changed) }}"
  tags:
    - headscale

# Whether this run (re)starts the unit -- consumed by both the restart trigger
# and the ACL-reload guard below (single jinja expression so ansible keeps the
# bool). A restart is also the only thing that re-reads a rotated OIDC secret:
# it's mounted (--secret type=mount), so the running container won't pick up a
# new value without one -- hence headscale_oidc_secret_rotated is in the chain.
- name: Compute whether the headscale unit restarts this run
  set_fact:
    headscale_will_restart: >-
      {{ headscale_service_result.changed
         or headscale_config_result.changed
         or (headscale_network.changed | default(false))
         or (headscale_oidc_secret_rotated | default(false)) }}
  tags:
    - headscale

- name: Pull headscale image
  containers.podman.podman_image:
    name: "{{ headscale_image }}"
  register: headscale_image_pull
  retries: 3
  delay: 10
  until: headscale_image_pull is not failed
  become: true
  tags:
    - headscale

# reload: drives an ACL-only change through the unit's ExecReload (SIGHUP, no
# restart) -- see the unit template. The systemd_unit helper starts-then-reloads,
# so it reloads only when the unit was already active and skips the reload on a
# run that (re)started the unit: a fresh start loads the current policy anyway,
# and `systemctl reload` on a down unit would error (the bug a standalone `podman
# kill` had). restart and reload are mutually exclusive here by construction --
# reload requires not headscale_will_restart. A clean re-run leaves
# headscale_acl_result.changed false, so neither fires and idempotence holds.
- name: Enable headscale service
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: headscale
      condition: "{{ not (ansible_check_mode and (headscale_service_result.changed or headscale_user.changed)) }}"
      restart: "{{ headscale_will_restart }}"
      reload: "{{ headscale_acl_result.changed and not headscale_will_restart }}"
  tags:
    - headscale

# Public vhost (NOT Authelia-gated -- Tailscale clients hit the raw control
# API + DERP relay here, all over https/443). No enable_http: certbot issues
# the cert via the DNS-01 Cloudflare challenge (no :80 needed) and clients
# never use plain HTTP, so the site stays https-only (the template's default
# :80 block just redirects to :443, and fox's firewall doesn't open 80
# anyway). Long read timeout + buffering off keep the long-poll control stream
# and the DERP websocket (handled by the site template's Upgrade/Connection
# headers) alive.
- name: Configure nginx
  import_role:
    name: nginx
    tasks_from: site
  vars:
    nginx_site_args:
      subdomain: headscale
      proxy_pass: http://127.0.0.1:{{ service_ports.headscale }}/
      proxy_buffering: "off"
      proxy_read_timeout: "3600s"
  tags:
    - headscale
