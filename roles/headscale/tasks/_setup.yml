- name: _setup | Install podman
  import_role:
    name: podman
    tasks_from: install

- name: _setup | Install nginx
  import_role:
    name: _test
    tasks_from: nginx

- name: _setup | Create /mnt/services
  file:
    path: /mnt/services
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true

# On prod /mnt/services/sqlite is a real ZFS dataset (recordsize=4K) made by
# the services producer role; the test box has no such dataset, so stand the
# parent up as a plain dir for the sqlite_dataset helper to populate.
- name: _setup | Create /mnt/services/sqlite parent
  file:
    path: /mnt/services/sqlite
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true
