# Assertions for the apt role. Functional checks only:
# - 80-retries is parsed by apt (retries=3, Delay matches release).
# - apt-cache policy enumerates every expected suite against the
#   configured mirror (mirror-agnostic at the component level --
#   ports.ubuntu.com is sparse on -backports components but the
#   suite itself is published, so the suite-level check stays
#   uniform across architectures).
# - apt-get update --error-on=any succeeds (turns transient mirror
#   failures into a hard fail instead of a 0-exit warning).

- name: _verify | Read apt's parsed retry config
  ansible.builtin.command: apt-config dump Acquire::Retries
  changed_when: false
  register: _verify_apt_retries

- name: _verify | Apt parses Acquire::Retries=3
  ansible.builtin.assert:
    that:
      - '''Acquire::Retries "3";'' in _verify_apt_retries.stdout_lines'
    fail_msg: apt didn't load Acquire::Retries=3 from 80-retries.

- name: _verify | Apt parses Acquire::Retries::Delay on noble+ only
  ansible.builtin.assert:
    that:
      - >-
        ('Acquire::Retries::Delay "true";' in _verify_apt_retries.stdout_lines)
        == (ansible_distribution_major_version | int >= 24)
    fail_msg: >-
      Acquire::Retries::Delay presence in apt's parsed config
      doesn't match release (jammy must omit, noble+ must include).

- name: _verify | Read apt-cache policy
  ansible.builtin.command: apt-cache policy
  changed_when: false
  register: _verify_apt_policy

- name: _verify | Apt-cache policy lists every archive suite
  ansible.builtin.assert:
    that:
      - (_verify_apt_mirror ~ ' ' ~ item ~ '/') in _verify_apt_policy.stdout
    fail_msg: "apt-cache policy missing {{ _verify_apt_mirror }} {{ item }}."
  vars:
    _verify_apt_mirror: "{{ ubuntu_mirror | regex_replace('/$', '') }}"
  loop:
    - "{{ ansible_distribution_release }}"
    - "{{ ansible_distribution_release }}-updates"
    - "{{ ansible_distribution_release }}-backports"

- name: _verify | Apt-cache policy lists the security suite
  ansible.builtin.assert:
    that:
      - (_verify_apt_security_mirror ~ ' ' ~ ansible_distribution_release ~ '-security/') in _verify_apt_policy.stdout
    fail_msg: "apt-cache policy missing {{ _verify_apt_security_mirror }} {{ ansible_distribution_release }}-security."
  vars:
    _verify_apt_security_mirror: "{{ ubuntu_mirror_security | regex_replace('/$', '') }}"

# Functional check: every configured suite serves valid signed metadata.
# --error-on=any turns transient warnings (one unreachable suite, stale
# Release.gpg) into a non-zero exit; the apt module's update_cache lets
# them slide silently.
- name: _verify | Apt-get update succeeds (--error-on=any)  # noqa: command-instead-of-module
  # The ansible.builtin.apt module's update_cache silently swallows
  # transient suite errors; only `apt-get update --error-on=any` turns
  # them into a non-zero exit.
  ansible.builtin.command: apt-get update --error-on=any
  changed_when: false
  become: true
