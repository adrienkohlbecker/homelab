- name: install | Configure apt retries
  # Acquire::Retries::Delay (apt 2.7+ in noble) adds backoff between
  # attempts so a Nexus restart of a few seconds isn't burned through
  # instantly; apt on jammy retries immediately.
  template:
    src: 80-retries.j2
    dest: /etc/apt/apt.conf.d/80-retries
    owner: root
    group: root
    mode: "0644"
    backup: true
    validate: 'apt-config dump -c %s'
  become: true
  tags:
    - apt

- name: install | Configure apt sources (jammy legacy)
  when: ansible_distribution_major_version | int < 24
  template:
    src: sources.list.j2
    dest: /etc/apt/sources.list
    owner: root
    group: root
    mode: "0644"
    backup: true
  register: apt_mirror_legacy
  become: true
  tags:
    - apt

# Pre-warm /var/lib/apt/lists/ so the python3-debian install below
# works in check mode too. Packer ships the image with an empty cache
# (no .Packages files), and the apt module's cache update is a no-op
# in check mode -- so `apt: pkg=python3-debian` would otherwise fail
# with "no package matching" the first time the role runs in --check.
# `command:` with `check_mode: false` forces a real fetch.
- name: install | Pre-warm apt cache (real fetch even in --check)  # noqa: command-instead-of-module
  when: ansible_distribution_major_version | int >= 24
  ansible.builtin.command: apt-get update
  changed_when: false
  check_mode: false
  become: true
  tags:
    - apt

# deb822_repository requires python3-debian even in check mode (it
# parses/writes deb822 itself rather than shelling to apt). See
# roles/netdata/tasks/install.yml for the gate idiom. Installed
# before deb822 sources are written and before the legacy sources.list
# is dropped, so apt always has at least one working source to pull
# python3-debian from.
- name: install | Install python3-debian
  when: ansible_distribution_major_version | int >= 24
  apt:
    pkg: python3-debian
    cache_valid_time: 3600
    lock_timeout: 300
  become: true
  register: apt_install_python3_debian
  tags:
    - apt

- name: install | Configure apt sources (deb822 archive, noble+)
  when:
    - ansible_distribution_major_version | int >= 24
    - not (ansible_check_mode and apt_install_python3_debian.changed)
  ansible.builtin.deb822_repository:
    name: ubuntu
    types: deb
    uris: "{{ ubuntu_mirror }}"
    suites: "{{ ansible_distribution_release }} {{ ansible_distribution_release }}-updates {{ ansible_distribution_release }}-backports"
    components: main universe restricted multiverse
    signed_by: /usr/share/keyrings/ubuntu-archive-keyring.gpg
  register: apt_mirror_deb822
  become: true
  tags:
    - apt

- name: install | Configure apt sources (deb822 security, noble+)
  when:
    - ansible_distribution_major_version | int >= 24
    - not (ansible_check_mode and apt_install_python3_debian.changed)
  ansible.builtin.deb822_repository:
    name: ubuntu-security
    types: deb
    uris: "{{ ubuntu_mirror_security }}"
    suites: "{{ ansible_distribution_release }}-security"
    components: main universe restricted multiverse
    signed_by: /usr/share/keyrings/ubuntu-archive-keyring.gpg
  register: apt_mirror_deb822_security
  become: true
  tags:
    - apt

# Dropped only after the deb822 files are in place, so apt always
# has a working source -- otherwise a re-run that finds python3-debian
# already installed but the deb822 files unwritten (e.g. an interrupted
# previous run) would leave the system with no sources at all.
- name: install | Drop legacy /etc/apt/sources.list (noble+)
  when: ansible_distribution_major_version | int >= 24
  file:
    path: /etc/apt/sources.list
    state: absent
  register: apt_mirror_legacy_removed
  become: true
  tags:
    - apt

- name: install | Force apt update
  when: apt_mirror_legacy.changed or apt_mirror_legacy_removed.changed or apt_mirror_deb822.changed or apt_mirror_deb822_security.changed
  apt:
    update_cache: true
    cache_valid_time: 0
    update_cache_retries: 5
    update_cache_retry_max_delay: 30
    lock_timeout: 300
  become: true
  tags:
    - apt
