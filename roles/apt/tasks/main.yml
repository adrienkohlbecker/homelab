- name: Configure apt retries
  # Acquire::Retries::Delay (apt 2.7+ in noble) adds backoff between
  # attempts so a Nexus restart of a few seconds isn't burned through
  # instantly; apt on jammy retries immediately.
  template:
    src: 80-retries.j2
    dest: /etc/apt/apt.conf.d/80-retries
    owner: root
    group: root
    mode: "0644"
    backup: true
    validate: 'apt-config dump -c %s'
  become: true
  tags:
    - apt

- name: Configure apt sources (jammy legacy)
  when: ansible_distribution_release == "jammy"
  template:
    src: sources.list.j2
    dest: /etc/apt/sources.list
    owner: root
    group: root
    mode: "0644"
    backup: true
  register: apt_mirror_legacy
  become: true
  tags:
    - apt

# Pre-warm /var/lib/apt/lists/ so the python3-debian install below
# works in check mode too. Packer ships the image with an empty cache
# (no .Packages files), and the apt module's cache update is a no-op
# in check mode -- so `apt: pkg=python3-debian` would otherwise fail
# with "no package matching" the first time the role runs in --check.
# `command:` with `check_mode: false` forces a real fetch.
#
# apt_skip_refresh (default false) suppresses every apt-get update this
# role runs. seed_deps.yml sets it when re-importing the role at the end
# of the box_deps bake to re-render the source files at upstream: external
# egress is gone by then, so the rewrite must be network-free.
- name: Pre-warm apt cache (real fetch even in --check)  # noqa: command-instead-of-module
  when:
    - ansible_distribution_release != "jammy"
    - not (apt_skip_refresh | default(false))
  command: apt-get update
  changed_when: false
  check_mode: false
  become: true
  tags:
    - apt

# deb822_repository requires python3-debian even in check mode (it
# parses/writes deb822 itself rather than shelling to apt). See
# roles/netdata/tasks/install.yml for the gate idiom. Must run while
# the legacy /etc/apt/sources.list is still present (the only apt
# source on a fresh noble host) -- deb822 files aren't written yet,
# and the legacy-removal task below explicitly orders after these
# writes for the same reason.
- name: Install python3-debian
  when: ansible_distribution_release != "jammy"
  apt:
    pkg: python3-debian
    cache_valid_time: 3600
    lock_timeout: 300
    force_apt_get: true
  become: true
  register: apt_install_python3_debian
  tags:
    - apt

- name: Configure apt sources (deb822 archive, noble+)
  when:
    - ansible_distribution_release != "jammy"
    - not (ansible_check_mode and apt_install_python3_debian.changed)
  deb822_repository:
    name: ubuntu
    types: deb
    uris: "{{ ubuntu_mirror }}"
    suites: "{{ ansible_distribution_release }} {{ ansible_distribution_release }}-updates {{ ansible_distribution_release }}-backports"
    components: main universe restricted multiverse
    architectures: "{{ ['amd64'] if ansible_architecture == 'x86_64' else ['arm64'] }}"
    # Languages: none -- skip Translation-* index downloads; servers run C.UTF-8.
    languages:
      - none
    by_hash: 'yes'
    pdiffs: 'yes'
    signed_by: /usr/share/keyrings/ubuntu-archive-keyring.gpg
  register: apt_mirror_deb822
  become: true
  tags:
    - apt

- name: Configure apt sources (deb822 security, noble+)
  when:
    - ansible_distribution_release != "jammy"
    - not (ansible_check_mode and apt_install_python3_debian.changed)
  deb822_repository:
    name: ubuntu-security
    types: deb
    uris: "{{ ubuntu_mirror_security }}"
    suites: "{{ ansible_distribution_release }}-security"
    components: main universe restricted multiverse
    architectures: "{{ ['amd64'] if ansible_architecture == 'x86_64' else ['arm64'] }}"
    languages:
      - none
    by_hash: 'yes'
    pdiffs: 'yes'
    signed_by: /usr/share/keyrings/ubuntu-archive-keyring.gpg
  register: apt_mirror_deb822_security
  become: true
  tags:
    - apt

# Dropped only after the deb822 files are in place, so apt always
# has a working source -- otherwise a re-run that finds python3-debian
# already installed but the deb822 files unwritten (e.g. an interrupted
# previous run) would leave the system with no sources at all.
- name: Drop legacy /etc/apt/sources.list (noble+)
  when: ansible_distribution_release != "jammy"
  file:
    path: /etc/apt/sources.list
    state: absent
  register: apt_mirror_legacy_removed
  become: true
  tags:
    - apt

# Use apt-get directly (not the apt module's update_cache) so that
# --error-on=any turns a half-broken suite into a hard fail at apply
# time, matching what _verify.yml asserts. The apt module's update_cache
# silently tolerates partial-suite failures.
- name: Force apt update (--error-on=any)  # noqa: command-instead-of-module
  when:
    - apt_mirror_legacy.changed or apt_mirror_legacy_removed.changed or apt_mirror_deb822.changed or apt_mirror_deb822_security.changed
    - not (apt_skip_refresh | default(false))
  command: apt-get update --error-on=any
  register: _apt_force_update
  retries: 5
  delay: 30
  until: _apt_force_update.rc == 0
  changed_when: _apt_force_update.rc == 0
  become: true
  tags:
    - apt
