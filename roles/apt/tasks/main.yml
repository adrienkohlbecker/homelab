- name: Retry transient apt failures (Nexus restart, packet loss)
  # Acquire::Retries::Delay (apt 2.7+ in noble) adds backoff between
  # attempts so a Nexus restart of a few seconds isn't burned through
  # instantly; apt on jammy retries immediately.
  template:
    src: 80-retries.j2
    dest: /etc/apt/apt.conf.d/80-retries
    owner: root
    group: root
    mode: "0644"
  become: true
  tags:
    - apt

- name: Ensure apt is using the correct mirror for ubuntu
  template:
    src: sources.list.j2
    dest: /etc/apt/sources.list
    owner: root
    group: root
    mode: "0644"
    backup: true
  become: true
  register: apt_mirror
  tags:
    - apt

- name: Force apt update
  when: apt_mirror.changed
  apt:
    update_cache: true
  become: true
  tags:
    - apt

- name: Run apt safe-upgrade
  apt:
    upgrade: safe
    autoremove: true
    cache_valid_time: 3600
  become: true
  tags:
    - apt
