- name: _test | Install nginx
  import_role:
    name: _test
    tasks_from: nginx

- name: _setup | Install netdata
  import_role:
    name: netdata
    tasks_from: install

- name: _setup | Install podman
  import_role:
    name: podman
    tasks_from: install

# pihole_list_update timer ExecStart calls /usr/local/bin/run_job,
# installed by the cron role. In prod site.yml runs cron first; under
# the test harness only pihole runs, so import the dep here.
- name: _setup | Install run_job wrapper
  import_role:
    name: cron

- name: _test | Install dependencies
  apt:
    pkg:
      - logrotate
      - keepalived
    install_recommends: false
    cache_valid_time: 3600
  become: true

# In production, roles/keepalived creates /etc/keepalived/conf.d. Under the
# test harness pihole runs in isolation, so we mirror that here.
- name: _test | Ensure keepalived conf.d exists
  file:
    dest: /etc/keepalived/conf.d
    state: directory
    owner: root
    group: root
    mode: "0750"
  become: true

- name: _test | Configure resolved
  shell: |
    set -euo pipefail

    systemctl disable systemd-resolved.service
    systemctl stop systemd-resolved
    echo "nameserver 1.1.1.1" > /etc/resolv.conf
  args:
    executable: /bin/bash
    removes: '{{ "/etc/systemd/system/sysinit.target.wants/systemd-resolved.service" if ansible_distribution_major_version != "22" else "/etc/systemd/system/multi-user.target.wants/systemd-resolved.service" }}'
  become: true
