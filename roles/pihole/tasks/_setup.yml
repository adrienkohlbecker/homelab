- name: _setup | Install nginx
  import_role:
    name: test
    tasks_from: nginx

# pihole's vhost is auth: required (authelia forward-auth). Stand up the
# gate-mode stub (returns 401 on the auth-request endpoint) so _verify can
# prove the /admin/ gate bounces an unauthenticated request to the portal.
- name: _setup | Install authelia stub in gate mode
  import_role:
    name: test
    tasks_from: authelia_stub
  vars:
    test_authelia_stub_args:
      mode: gate

# netdata is x86_64-only (no arm64 build of the pinned 1.46.x — see
# roles/netdata/tasks/main.yml). pihole itself doesn't depend on netdata
# (its go.d collector registration is disabled), so skip the install on
# arm64 test VMs; no-op on the x86_64 fleet/CI.
- name: _setup | Install netdata
  import_role:
    name: netdata
    tasks_from: install
  when: ansible_architecture == 'x86_64'

- name: _setup | Install podman
  import_role:
    name: podman
    tasks_from: install

# functions.sh (sourced by /usr/local/bin/pihole_healthcheck). In production
# roles/bash runs site-wide; under the harness pihole runs in isolation, so
# _verify can exercise the healthcheck script.
- name: _setup | Install bash functions
  import_role:
    name: bash

- name: _setup | Install dependencies
  apt:
    pkg:
      - logrotate
      - keepalived
    install_recommends: false
    cache_valid_time: 3600
  become: true

# In production, roles/keepalived creates /etc/keepalived/conf.d. Under the
# test harness pihole runs in isolation, so we mirror that here.
- name: _setup | Ensure keepalived conf.d exists
  file:
    dest: /etc/keepalived/conf.d
    state: directory
    owner: root
    group: root
    mode: "0750"
  become: true

- name: _setup | Configure resolved
  shell: |
    set -euo pipefail

    systemctl disable systemd-resolved.service
    systemctl stop systemd-resolved
    echo "nameserver {{ bootstrap_dns_resolver }}" > /etc/resolv.conf
  args:
    executable: /bin/bash
    removes: '{{ "/etc/systemd/system/sysinit.target.wants/systemd-resolved.service" if ansible_distribution_major_version != "22" else "/etc/systemd/system/multi-user.target.wants/systemd-resolved.service" }}'
  become: true
