- name: Add pihole group
  group:
    name: pihole
    system: true
  become: true
  tags:
    - pihole

- name: Add pihole user
  user:
    name: pihole
    group: pihole
    createhome: false
    system: true
    shell: /usr/sbin/nologin
    home: /nonexistent
  register: pihole_user
  become: true
  tags:
    - pihole

- name: Create configuration directory
  when: not (ansible_check_mode and pihole_user.changed)
  file:
    dest: /mnt/services/pihole/etc
    state: directory
    owner: "{{ pihole_user.uid }}"
    group: "{{ pihole_user.group }}"
    mode: "0755"
  become: true
  tags:
    - pihole

- name: Create sqlite directory
  when: not (ansible_check_mode and pihole_user.changed)
  file:
    dest: /mnt/services/sqlite/pihole
    state: directory
    owner: "{{ pihole_user.uid }}"
    group: "{{ pihole_user.group }}"
    # pihole's container entrypoint chmods /var/lib/pihole (this bind-mount) to
    # 0775 on every start for FTL/lighttpd group-write access. Match it here so
    # the task doesn't flap on every converge.
    mode: "0775"
  become: true
  tags:
    - pihole

- name: Create configuration directory
  file:
    dest: /mnt/services/pihole/dnsmasq
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true
  tags:
    - pihole

- name: Configure dnsmasq
  template:
    src: fahm.conf.j2
    dest: /mnt/services/pihole/dnsmasq/fahm.conf
    owner: root
    group: root
    mode: "0644"
    backup: true
  register: fahm_cfg
  become: true
  tags:
    - pihole

- name: Create log directory
  when: not (ansible_check_mode and pihole_user.changed)
  file:
    dest: /var/log/pihole
    state: directory
    owner: "{{ pihole_user.uid }}"
    group: "{{ pihole_user.group }}"
    mode: "0755"
  become: true
  tags:
    - pihole

- name: Install pihole service
  import_role:
    name: systemd_unit
    tasks_from: install
  vars:
    systemd_unit_args:
      src: pihole.service.j2
      condition: "{{ not (ansible_check_mode and pihole_user.changed) }}"
  tags:
    - pihole

- name: Enable pihole service
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: pihole
      condition: "{{ not (ansible_check_mode and (systemd_unit.changed or pihole_user.changed)) }}"
      restart: false
  tags:
    - pihole

