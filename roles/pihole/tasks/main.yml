- name: Assert required pihole inputs are set
  assert:
    that:
      - pihole_keepalived_ip is defined and (pihole_keepalived_ip | ansible.utils.ipaddr)
      - pihole_keepalived_vrid is defined and (pihole_keepalived_vrid | int) > 0
      - pihole_keepalived_priority is defined and 0 < (pihole_keepalived_priority | int) <= 255
      - pihole_keepalived_peers is defined and (pihole_keepalived_peers | length) > 0
      - inventory_hostname in external_ips
      - pihole_adlists is defined
      - pihole_whitelists is defined
    fail_msg: >-
      pihole requires pihole_keepalived_{ip,vrid,priority,peers}
      (priority 1-255, set per-host in host_vars), an external_ips entry
      for this host (the VRRP unicast_src_ip), and the pihole_adlists /
      pihole_whitelists lists. Define the missing one(s) in
      host_vars / group_vars.
  tags:
    - pihole

- name: Set up pihole system user, group, and config dir
  import_role:
    name: service_user
    tasks_from: user
  vars:
    service_user_args:
      name: pihole
  tags:
    - pihole

- name: Create pihole etc directory
  when: not (ansible_check_mode and pihole_user.changed)
  file:
    dest: /mnt/services/pihole/etc
    state: directory
    owner: "{{ pihole_user.uid }}"
    group: "{{ pihole_user.group }}"
    mode: "0755"
  become: true
  tags:
    - pihole

- name: Create sqlite directory
  when: not (ansible_check_mode and pihole_user.changed)
  file:
    dest: /mnt/services/sqlite/pihole
    state: directory
    owner: "{{ pihole_user.uid }}"
    group: "{{ pihole_user.group }}"
    # pihole's container entrypoint chmods /var/lib/pihole (this bind-mount) to
    # 0775 on every start for FTL/lighttpd group-write access. Match it here so
    # the task doesn't flap on every converge.
    mode: "0775"
  become: true
  tags:
    - pihole

- name: Create log directory
  when: not (ansible_check_mode and pihole_user.changed)
  file:
    dest: /var/log/pihole
    state: directory
    owner: "{{ pihole_user.uid }}"
    group: "{{ pihole_user.group }}"
    mode: "0755"
  become: true
  tags:
    - pihole

- name: Install pihole service
  import_role:
    name: systemd_unit
    tasks_from: install
  vars:
    systemd_unit_args:
      src: pihole.service.j2
      condition: "{{ not (ansible_check_mode and pihole_user.changed) }}"
  tags:
    - pihole

- name: Enable pihole service
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: pihole
      condition: "{{ not (ansible_check_mode and (pihole_service_result.changed or pihole_user.changed)) }}"
      restart: "{{ pihole_service_result.changed }}"
      # Serialize across the lab+pug HA pair so a unit-file change never
      # restarts both nameservers at once (one node keeps serving the
      # keepalived VIP through the other's restart).
      throttle: 1
  tags:
    - pihole

