- name: Configure health script
  copy:
    src: pihole_healthcheck.sh
    dest: /usr/local/bin/pihole_healthcheck
    owner: root
    group: root
    mode: "0755"
    backup: true
    validate: bash -n %s
  become: true
  tags:
    - pihole

# --replace --name pihole_list_update: without --name, podman
# auto-generates "<adjective>_<scientist>" per run (epic_allen,
# friendly_zhukovsky, ...), and that string becomes SYSLOG_IDENTIFIER
# on the journal entries the container emits. fluentbit's otlp_shape
# then surfaces that as ServiceName in HyperDX, minting a fresh facet
# per weekly timer fire. --replace covers the rare case where a prior
# run was SIGKILL'd before --rm fired and the named container lingers.
# --dns: don't inherit the host's resolv.conf, which points at
# 127.0.0.1 -> pihole. From inside this container 127.0.0.1 is a black
# hole (no FTL runs here), and even with the host IP, pihole may be
# mid-restart when this task fires during ansible converge. The update
# only resolves public adlist URLs, so an external resolver is fine and
# breaks the circular dependency.
- name: Compute list update command
  set_fact:
    pihole_list_update_cmd: /usr/bin/podman run --rm --replace --name pihole_list_update --quiet --dns={{ bootstrap_dns_resolver }} --volume /mnt/services/sqlite/pihole:/etc/pihole --entrypoint "/usr/bin/php" --env BLOCKLISTS_URL="{{ pihole_adlists | join(' ') }}" --env WHITELIST_URL="{{ pihole_whitelists | join(' ') }}" docker.io/jacklul/pihole:2025.10.0 /usr/local/sbin/pihole-updatelists --no-gravity --no-reload --env
  tags:
    - pihole

- name: Schedule the pihole_list_update timer
  import_role:
    name: systemd_timer
    tasks_from: install
  vars:
    systemd_timer_args:
      name: pihole_list_update
      description: Weekly pihole adlist/whitelist refresh
      frequency: weekly
      on_calendar: "Sun *-*-* 00:47:00"
      exec_start: "{{ pihole_list_update_cmd }}"
  tags:
    - pihole

# Re-import the adlist/whitelist set only when our *configured* inputs
# change, not on every converge: record them to a sentinel and gate the
# trigger on it. Refreshing upstream list *content* is the weekly timer's
# job (above) plus pi-hole's own in-container gravity cron; the
# converge-time trigger exists to apply an operator adlist edit
# immediately, so input-keyed gating is both correct and idempotent (the
# previous stdout-substring changed_when was fragile -- e.g. against the
# --quiet output -- and re-ran the update container every converge).
- name: Record pihole list-update inputs
  copy:
    content: "{{ (pihole_adlists + pihole_whitelists) | to_nice_yaml }}"
    dest: /mnt/services/pihole/updatelists_inputs
    owner: "{{ pihole_user.uid }}"
    group: "{{ pihole_user.group }}"
    mode: "0644"
    backup: true
  register: pihole_list_inputs
  become: true
  tags:
    - pihole

- name: Trigger list update
  when: pihole_list_inputs.changed
  command: "{{ pihole_list_update_cmd }}"
  register: pihole_list_update
  changed_when: true
  become: true
  tags:
    - pihole

# Gravity-rebuild ownership: pi-hole's in-container cron rebuilds gravity
# on its own schedule and the weekly timer refreshes the adlist/whitelist
# rows; this converge-time rebuild fires only when the operator's inputs
# just changed (above), so a freshly-edited adlist set takes effect
# without waiting for either schedule. The Enable task's `state: restarted`
# blocks on --sdnotify=healthy, so a same-converge restart leaves the
# container healthy before we reach here; the wait still guards the case
# where the container is mid-restart for an unrelated reason.
- name: Wait for pihole to report healthy before the gravity rebuild
  when: pihole_list_update.changed
  command: /usr/bin/podman healthcheck run pihole
  register: pihole_health
  changed_when: false
  retries: 30
  delay: 2
  until: pihole_health.rc == 0
  become: true
  tags:
    - pihole

- name: Trigger gravity update
  when: pihole_list_update.changed
  command: /usr/bin/podman exec pihole pihole -g
  register: pihole_gravity_update
  changed_when: pihole_list_update.changed
  become: true
  tags:
    - pihole


# The bundled go.d/pihole collector in netdata 1.46.x predates pi-hole v6
# and probes /admin/api.php once per minute; v6 retired that path and FTL
# logs a "Bad request" warning for every probe. Disable until the netdata
# pin is bumped past 2.x (which ships the v6-aware module). See
# notes/netdata-2x-upgrade.md for the migration plan.
#
# - name: Configure pihole metrics
#   import_role:
#     name: netdata
#     tasks_from: template
#   vars:
#     netdata_args:
#       src: pihole.conf.j2
#       dest: go.d/pihole.conf
#       mode: "0600"
#   tags:
#     - pihole

- name: Configure nginx
  import_role:
    name: nginx
    tasks_from: site
  vars:
    nginx_site_args:
      subdomain: pihole
      proxy_pass: http://127.0.0.1:{{ service_ports.pihole }}/
      # The admin UI binds 127.0.0.1:8943 only, so this nginx vhost is
      # the sole LAN ingress -- forward-auth via authelia is the gate.
      # Pi-hole's own FTLCONF_webserver_api_pwhash is left unset.
      auth: required
      # Pi-hole v6 serves the admin UI under /admin/; bare / is the
      # ad-blocked-page placeholder lighttpd returns when DNS-blocked
      # domains hit the webserver. Browser visits to the admin
      # subdomain root should land on the UI directly. Exact-match
      # location wins over `location /`, so the 302 fires before
      # auth_request (same pattern as favicon/robots above) -- the
      # browser then hits /admin/ which IS auth-gated.
      server_conf: |
        location = / {
            return 302 /admin/;
        }
  tags:
    - pihole

- name: Configure keepalived
  tags:
    - pihole
  block:
    - name: Render the pihole keepalived fragment
      template:
        src: keepalived.conf.j2
        dest: /etc/keepalived/conf.d/pihole.conf
        owner: root
        group: root
        mode: "0640"
        backup: true
      register: pihole_keepalived_cfg
      become: true

    # SIGHUP-reload (hitless) for the common edits: priority, VIP, peers,
    # healthcheck params, notify hooks. Structural changes (interface, VRID)
    # need a manual `systemctl restart keepalived`. throttle: 1 serializes
    # across pihole_keepalived_peers so that even on the rare manual
    # restart, only one peer is unavailable at a time.
    #
    # enabled: true is load-bearing on a fresh host. The keepalived role
    # runs before pihole and, finding conf.d empty, disables the unit; once
    # we drop our fragment it must be enabled again or a reboot before the
    # next converge (which re-enables it) silently loses the VIP. On an
    # inactive unit `state: reloaded` also starts it, so this brings the VIP
    # up on the first converge. The base-conf ExecStartPre validate
    # (roles/keepalived) gates that start, so it can't come up on a bad conf.
    - name: Reload keepalived
      when: pihole_keepalived_cfg.changed
      systemd:
        name: keepalived
        state: reloaded
        enabled: true
      become: true
      throttle: 1
  rescue:
    # roles/keepalived's ExecReload drop-in runs `keepalived -t` before the
    # SIGHUP, so a malformed fragment fails the reload with the live daemon
    # untouched. Restore the previous good fragment (or remove a freshly
    # added one) so the broken file doesn't linger on disk for the next
    # reboot/converge, then fail loudly. Mirrors roles/nginx/tasks/conf_d.yml.
    - name: Restore previous keepalived fragment  # noqa: require-backup
      when: '"backup_file" in pihole_keepalived_cfg'
      copy:
        remote_src: true
        src: "{{ pihole_keepalived_cfg.backup_file }}"
        dest: /etc/keepalived/conf.d/pihole.conf
        owner: root
        group: root
        mode: "0640"
      become: true
    - name: Remove the keepalived fragment backup
      when: '"backup_file" in pihole_keepalived_cfg'
      file:
        path: "{{ pihole_keepalived_cfg.backup_file }}"
        state: absent
      become: true
    - name: Remove the freshly-added keepalived fragment
      when: pihole_keepalived_cfg.changed and "backup_file" not in pihole_keepalived_cfg
      file:
        path: /etc/keepalived/conf.d/pihole.conf
        state: absent
      become: true
    - name: Fail after restoring keepalived fragment
      fail:
        msg: >-
          keepalived rejected the rendered pihole fragment on reload; the
          previous fragment was restored (or removed if newly added). Inspect
          the reload output above and roles/pihole/templates/keepalived.conf.j2.
