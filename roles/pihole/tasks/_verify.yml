# keepalived isn't actually started under the harness (the role only
# drops a conf.d fragment and reloads; roles/keepalived's enable step is
# what brings the unit up, and _setup doesn't invoke it). So we can't
# assert against a live vrrp.1 iface or against UniFi's client view;
# the strongest available check is that the rendered conf carries the
# directives that make UniFi see the VIP under a dedicated VRRP MAC
# instead of the host's eth0 MAC. A regression in this template (e.g.
# someone "simplifying" the vrrp_instance block) silently re-poisons the
# UniFi client entry on the live host — this check fails the harness
# before that ships.
- name: _verify | Slurp rendered keepalived conf
  slurp:
    src: /etc/keepalived/conf.d/pihole.conf
  register: pihole_keepalived_rendered
  become: true

- name: _verify | Keepalived conf opts the VIP onto a dedicated VRRP vmac
  assert:
    that:
      - "'use_vmac' in (pihole_keepalived_rendered.content | b64decode)"
      - "'vmac_xmit_base' in (pihole_keepalived_rendered.content | b64decode)"
    fail_msg: >-
      roles/pihole/templates/keepalived.conf.j2 must keep both `use_vmac`
      and `vmac_xmit_base` so the pihole VIP rides a dedicated VRRP MAC
      (00:00:5e:00:01:<vrid>) on a vrrp.<vrid> child of eth0. Without
      them the VIP shares the host's eth0 MAC and UniFi's per-MAC client
      tracker flips the host's client record to the pihole IP.

- name: _verify | Container reports healthy
  command: /usr/bin/podman healthcheck run pihole
  register: pihole_verify_health
  changed_when: false
  retries: 30
  delay: 2
  until: pihole_verify_health.rc == 0
  become: true

# The keepalived vrrp_script that gates VRRP FAULT on container health. It's
# the HA-failover contract, so exercise the real script (cidfile read ->
# `podman container inspect` health status -> exit code) rather than just
# trusting `podman healthcheck run` above. Runs after the container is
# healthy, so it must exit 0.
- name: _verify | Keepalived healthcheck script reports healthy
  command: /usr/local/bin/pihole_healthcheck
  register: pihole_verify_hc_script
  changed_when: false
  retries: 30
  delay: 2
  until: pihole_verify_hc_script.rc == 0
  become: true

- name: _verify | FTL answers DNS for its own canonical name
  command: /usr/bin/podman exec pihole getent hosts pi.hole
  register: pihole_verify_local
  changed_when: false
  retries: 30
  delay: 2
  until: pihole_verify_local.rc == 0
  become: true

# Resolves the split-horizon override injected via
# FTLCONF_misc_dnsmasq_lines (box.fahm.fr -> the host's external_ips.box).
# Fails the harness if that env-driven dnsmasq config didn't take. This
# stays a real test of the dnsmasq line only while box.fahm.fr is absent
# from etc_hosts_entries (the --add-host source in pihole.service.j2): an
# --add-host entry would shadow the dnsmasq line and the check would pass
# for the wrong reason. Keep box.fahm.fr out of etc_hosts_entries.
- name: _verify | Split-horizon override resolves via FTLCONF_misc_dnsmasq_lines
  command: /usr/bin/podman exec pihole getent hosts box.fahm.fr
  register: pihole_verify_splithorizon
  changed_when: false
  failed_when: external_ips.box not in pihole_verify_splithorizon.stdout
  become: true

# The first converge always writes the updatelists_inputs sentinel fresh,
# so the list-update -> `pihole -g` chain has already run. Assert gravity
# actually populated -- functional proof the chain works end to end, not
# just that the container is up.
- name: _verify | Gravity table is populated
  command: /usr/bin/podman exec pihole pihole-FTL sqlite3 /var/lib/pihole/gravity.db "SELECT COUNT(*) FROM gravity"
  register: pihole_verify_gravity
  changed_when: false
  retries: 10
  delay: 3
  until: (pihole_verify_gravity.stdout | trim | int) > 0
  become: true

- name: _verify | Admin UI answers on the loopback publish
  uri:
    url: http://127.0.0.1:{{ service_ports.pihole }}/admin/
    status_code: [200, 301, 302]
  register: pihole_verify_admin
  retries: 30
  delay: 2
  until: pihole_verify_admin.status in [200, 301, 302]

# The admin subdomain's bare / is an exact-match `location = /` that 302s
# to /admin/ (nginx_site_args.server_conf) before auth_request runs -- no
# Authelia involvement. Guards that redirect block.
- name: _verify | Admin subdomain root redirects to /admin/
  uri:
    url: https://localhost/
    headers:
      Host: pihole.{{ inventory_hostname }}.{{ domain }}
    validate_certs: false
    follow_redirects: none
    status_code: 302
  register: pihole_verify_root_redirect
  failed_when: >-
    pihole_verify_root_redirect.status != 302
    or '/admin/' not in (pihole_verify_root_redirect.location | default(''))
  become: true

# /admin/ is auth: required -- a cookieless request must bounce to the
# Authelia portal (gate-mode stub returns 401 -> error_page 401 => 302).
# This is the sole LAN ingress gate for the admin UI.
- name: _verify | Admin UI gate redirects unauthenticated to Authelia
  uri:
    url: https://localhost/admin/
    headers:
      Host: pihole.{{ inventory_hostname }}.{{ domain }}
    validate_certs: false
    follow_redirects: none
    status_code: 302
  register: pihole_verify_admin_gate
  failed_when: >-
    pihole_verify_admin_gate.status != 302
    or 'auth.' not in (pihole_verify_admin_gate.location | default(''))
  become: true
