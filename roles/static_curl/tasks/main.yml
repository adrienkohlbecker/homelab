# Install a statically-linked curl binary at /usr/local/bin/curl_static.
# Designed to be bind-mounted into distroless containers (gcr.io/distroless/*)
# whose images have no shell / wget / curl, so --health-cmd has nothing to
# invoke. Podman's exec form (no shell) calls /usr/local/bin/curl_static
# directly inside the container.
#
# The tarball is sha256-pinned at download. Idempotence comes from
# running the already-installed binary with --version and skipping the
# install if it reports the expected version — no need to re-hash the
# whole binary on every play.

# xz-utils provides the xz binary that GNU tar shells out to for .tar.xz.
# The static-curl release only ships .tar.xz, so we need it on every host
# that installs curl_static. Tiny package, no daemon, safe to add.
- name: Install xz-utils (needed by tar -J to extract .tar.xz)
  apt:
    name: xz-utils
    state: present
  become: true
  tags:
    - static_curl

- name: Check installed curl_static version
  command: /usr/local/bin/curl_static --version
  register: _static_curl_existing
  changed_when: false
  failed_when: false
  become: true
  tags:
    - static_curl

- name: Install curl_static
  when: >-
    _static_curl_existing.rc != 0
    or static_curl_version not in (_static_curl_existing.stdout | default(''))
  become: true
  tags:
    - static_curl
  block:
    - name: Download static curl tarball
      get_url:
        url: "{{ static_curl_release[ansible_architecture].url }}"
        dest: /tmp/curl_static.tar.xz
        checksum: sha256:{{ static_curl_release[ansible_architecture].sha256 }}
        mode: "0644"

    # `include: [curl]` keeps trurl + SHA256SUMS out of /usr/local/bin;
    # `--transform` renames the binary so it doesn't collide with the
    # distro's /usr/bin/curl on PATH lookups inside the container.
    - name: Extract curl binary to /usr/local/bin/curl_static
      unarchive:
        src: /tmp/curl_static.tar.xz
        dest: /usr/local/bin
        remote_src: true
        include:
          - curl
        extra_opts:
          - --transform=s,^curl$,curl_static,

    - name: Fix ownership and mode on /usr/local/bin/curl_static
      file:
        path: /usr/local/bin/curl_static
        owner: root
        group: root
        mode: "0755"

  always:
    - name: Remove static curl tarball
      file:
        path: /tmp/curl_static.tar.xz
        state: absent
