- name: Validate architecture is supported
  assert:
    that: ansible_architecture in static_curl_release
    fail_msg: "static_curl only supports {{ static_curl_release.keys() | join(', ') }}, got {{ ansible_architecture }}"
  tags:
    - static_curl

- name: Install xz-utils (needed by tar -J to extract .tar.xz)
  apt:
    name: xz-utils
    state: present
    cache_valid_time: 3600
  become: true
  tags:
    - static_curl

- name: Download static curl tarball
  get_url:
    url: "{{ static_curl_release[ansible_architecture].url }}"
    dest: "/var/cache/curl_static-{{ static_curl_version }}.{{ ansible_architecture }}.tar.xz"
    checksum: "sha256:{{ static_curl_release[ansible_architecture].sha256 }}"
    mode: "0600"
  become: true
  register: _static_curl_download
  retries: 3
  delay: 5
  until: _static_curl_download is succeeded
  tags:
    - static_curl

# gtar-backed unarchive has no check-mode support; versioned dest gates
# re-extraction — this task runs only when the tarball was just downloaded.
- name: Extract curl binary to /usr/local/bin/curl_static
  when: _static_curl_download.changed and not ansible_check_mode
  become: true
  tags:
    - static_curl
  unarchive:
    src: "/var/cache/curl_static-{{ static_curl_version }}.{{ ansible_architecture }}.tar.xz"
    dest: /usr/local/bin
    remote_src: true
    owner: root
    group: root
    mode: "0755"
    list_files: true
    include:
      - curl
    extra_opts:
      - --transform=s,^\(\./\)\?curl$,curl_static,
  register: _static_curl_extract
  failed_when: _static_curl_extract.files | default([]) | length == 0

- name: Stat /usr/local/bin/curl_static after extraction
  when: _static_curl_download.changed and not ansible_check_mode
  stat:
    path: /usr/local/bin/curl_static
    get_checksum: false
  register: _static_curl_post_extract
  failed_when: not _static_curl_post_extract.stat.exists
  become: true
  tags:
    - static_curl
