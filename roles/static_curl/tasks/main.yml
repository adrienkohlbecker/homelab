- name: Validate architecture is supported
  assert:
    that: ansible_architecture in static_curl_release
    fail_msg: "static_curl only supports {{ static_curl_release.keys() | join(', ') }}, got {{ ansible_architecture }}"
  tags:
    - static_curl

- name: Install xz-utils (needed by tar -J to extract .tar.xz)
  apt:
    name: xz-utils
    state: present
    cache_valid_time: 3600
  become: true
  tags:
    - static_curl

- name: Check installed curl_static version
  command: /usr/local/bin/curl_static --version
  register: _static_curl_existing
  changed_when: false
  failed_when: false
  check_mode: false
  become: true
  tags:
    - static_curl

- name: Install curl_static
  when: >-
    _static_curl_existing.rc != 0
    or (_static_curl_existing.stdout | default('')) is not search('^curl ' ~ (static_curl_version | regex_escape) ~ ' ')
  become: true
  tags:
    - static_curl
  block:
    - name: Download static curl tarball
      get_url:
        url: "{{ static_curl_release[ansible_architecture].url }}"
        dest: /var/cache/curl_static.tar.xz
        checksum: "sha256:{{ static_curl_release[ansible_architecture].sha256 }}"
        mode: "0600"
      check_mode: false
      register: static_curl_download
      retries: 3
      delay: 5
      until: static_curl_download is succeeded

    # gtar-backed unarchive has no check-mode support
    - name: Extract curl binary to /usr/local/bin/curl_static
      when: not ansible_check_mode
      unarchive:
        src: /var/cache/curl_static.tar.xz
        dest: /usr/local/bin
        remote_src: true
        owner: root
        group: root
        mode: "0755"
        list_files: true
        include:
          - curl
        extra_opts:
          - --transform=s,^curl$,curl_static,
      register: _static_curl_extract
      failed_when: _static_curl_extract.files | default([]) | length == 0

  always:
    - name: Remove static curl tarball
      file:
        path: /var/cache/curl_static.tar.xz
        state: absent
      check_mode: false
