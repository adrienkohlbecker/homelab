# Statically-linked curl from https://github.com/stunnel/static-curl, used
# to bind-mount into distroless containers that have no in-image HTTP
# client to power their --health-cmd. Installed to /usr/local/bin/curl_static.
#
# musl variant (not glibc): the musl build is fully static — no libc
# dependency at all — so the same binary works inside any container
# image, including distroless/static, scratch, alpine, and the
# distroless/cc-debian13. The glibc-named
# build is only partially static and still needs a matching libc.so.6
# inside the container, which would lock us to distroless/cc-glibc
# images. For a localhost healthcheck the musl quirks (subset
# getaddrinfo, TLS edge cases) don't matter.
#
# Idempotence: the install task runs the already-installed binary with
# --version and skips the reinstall if the output contains
# static_curl_version. Bumping just the version + URLs + sha256s is
# enough to roll a new version onto every host on next apply.

static_curl_version: "8.20.0"

static_curl_release:
  x86_64:
    url: "{{ mirror_github }}/stunnel/static-curl/releases/download/{{ static_curl_version }}/curl-linux-x86_64-musl-{{ static_curl_version }}.tar.xz"
    sha256: 7a12a4c460967e769fad9ddae2de4fce6679633b5a1891628e657dad8df57f3d
  aarch64:
    url: "{{ mirror_github }}/stunnel/static-curl/releases/download/{{ static_curl_version }}/curl-linux-aarch64-musl-{{ static_curl_version }}.tar.xz"
    sha256: b5dde6790a33f55dee04e965d5b0fcd9c82493b72e1e5608c09ce1483359fb81
