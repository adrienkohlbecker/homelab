# Functional contract: smbd is up (nmbd is deliberately masked -- asserted
# below), the rendered config exposes the configured share with its access
# restriction, an authenticated client can reach it, and an anonymous client
# cannot. The smbtest share (host_vars/box.yml, valid users = the login user,
# time_machine: true) is the vehicle.

- name: _verify | Service smbd is active  # noqa: command-instead-of-module -- is-active query, not a state change
  command: systemctl is-active smbd
  register: samba_active
  changed_when: false
  become: true

# nmbd is masked (NetBIOS retired) -- prove it can't be started, not merely
# that it's stopped. A masked unit reports `masked` and `is-active` is non-zero.
- name: _verify | Service nmbd is masked  # noqa: command-instead-of-module -- is-enabled query, not a state change
  command: systemctl is-enabled nmbd
  register: samba_nmbd_enabled
  changed_when: false
  failed_when: samba_nmbd_enabled.stdout != 'masked'
  become: true

- name: _verify | Dump the running config
  command: testparm -s
  register: samba_testparm
  changed_when: false
  become: true

# Proves the critical per-share-key fix: the smbtest share renders, and its
# `valid users` restriction is present (the regression that silently dropped it
# would leave the share world-accessible with this line absent).
- name: _verify | Config exposes the share with its valid-users restriction
  assert:
    that:
      - "'[smbtest]' in samba_testparm.stdout"
      - "'[homes]' in samba_testparm.stdout"
      - samba_testparm.stdout is search('valid users = ' ~ ansible_user_id)
      - samba_testparm.stdout is search('fruit:time machine = yes')
      - samba_testparm.stdout is search('fruit:time machine max size = 1T')
    fail_msg: >-
      testparm output is missing the smbtest share, its valid-users line, or a
      Time Machine directive (enabled / max size) -- per-share key rendering is
      broken.

# testparm -v dumps the EFFECTIVE value of every parameter (incl. defaults), so
# this catches a silently-dropped hardening directive: a typo'd `server smb
# encrypt` would fall back to the default here rather than `required`. Samba
# accepts-then-defaults on an unknown key, so grepping the rendered file isn't
# enough -- assert against the resolved value.
- name: _verify | Dump the effective config including defaults
  command: testparm -v -s
  register: samba_testparm_verbose
  changed_when: false
  become: true

- name: _verify | Mandatory SMB3 encryption is in force
  assert:
    that:
      - samba_testparm_verbose.stdout is search('server smb encrypt = required')
    fail_msg: >-
      testparm -v does not report `server smb encrypt = required` -- mandatory
      encryption was silently dropped to its default.

# NetBIOS is retired: smbd must not announce over NetBIOS and must serve only
# 445 (no legacy 139 session port). testparm canonicalises the values, so
# assert the resolved form rather than the rendered literal.
- name: _verify | NetBIOS is disabled and only port 445 is served
  assert:
    that:
      - samba_testparm_verbose.stdout is search('disable netbios = Yes')
      - samba_testparm_verbose.stdout is search('smb ports = 445')
    fail_msg: >-
      testparm -v does not report `disable netbios = Yes` / `smb ports = 445`
      -- the NetBIOS-retirement directives were dropped to their defaults.

- name: _verify | Authenticated client can list shares
  command: smbclient -L localhost -U {{ ansible_user_id }}%{{ samba_password }}
  register: samba_smbclient_list
  changed_when: false
  become: true

- name: _verify | Share smbtest is reachable to its valid user
  command: smbclient //localhost/smbtest -U {{ ansible_user_id }}%{{ samba_password }} -c ls
  register: samba_smbclient_share
  changed_when: false
  become: true

# A read-only `ls` against a freshly-created empty dir proves little; the share
# exists to be written to (the Time Machine path). argv form keeps the
# space-bearing `put` command one token without quoting.
- name: _verify | Valid user can write through the share
  command:
    argv:
      - smbclient
      - //localhost/smbtest
      - -U
      - "{{ ansible_user_id }}%{{ samba_password }}"
      - -c
      - put /etc/hostname probe.dat
  changed_when: false
  become: true

- name: _verify | The written file landed on the backing directory
  stat:
    path: /srv/smbtest/probe.dat
  register: samba_probe_stat
  become: true

- name: _verify | Assert the write reached disk
  assert:
    that:
      - samba_probe_stat.stat.exists
    fail_msg: >-
      smbclient put reported success but probe.dat is absent under /srv/smbtest
      -- the write path (vfs fruit/streams_xattr stack) is broken.

# restrict anonymous = 2 + map to guest = never must refuse an unauthenticated
# connection -- proves the hardening is enforced, not merely configured.
- name: _verify | Anonymous access is refused
  command: smbclient -L localhost -N
  register: samba_anon
  changed_when: false
  failed_when: samba_anon.rc == 0
  become: true

- name: _verify | The zfs-mount override is installed for a share-bearing host
  stat:
    path: /etc/systemd/system/smbd.service.d/zfs-mounts.conf
  register: samba_override_stat
  become: true

- name: _verify | Assert the override exists
  assert:
    that:
      - samba_override_stat.stat.exists
    fail_msg: smbd zfs-mount override missing despite a configured share.
