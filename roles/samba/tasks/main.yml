- name: Assert required samba inputs are provided
  assert:
    that:
      # default('') so a wholly-undefined var fails into fail_msg rather than
      # raising a raw "undefined variable" jinja error here.
      - samba_password | default('') | length > 0
      - smb_shares is defined
      # default([]) so an undefined smb_shares fails on the line above rather
      # than raising a raw undefined error in these rejectattr filters.
      - (smb_shares | default([])) | rejectattr('name', 'defined') | list | length == 0
      - (smb_shares | default([])) | rejectattr('path', 'defined') | list | length == 0
    fail_msg: >-
      samba_password must be set (vaulted) and every smb_shares entry needs a
      name + path. These are required inputs; role vars sit above host_vars and
      must not default them.
  tags:
    - samba

- name: Assert smb_shares directive keys are well-formed
  assert:
    that:
      # smb.conf parameter names use spaces, never underscores ("valid users",
      # "force group", ...), so an underscore in a passthrough directive key is
      # always a typo (e.g. valid_users) -- it renders an unknown parameter
      # smbd silently ignores, leaving the share on the global default (any
      # authenticated user). Structural keys handled by the template are exempt.
      - >-
        (smb_shares | default([])) | map('dict2items') | flatten
        | rejectattr('key', 'in', ['name', 'path', 'opts', 'time_machine', 'time_machine_max_size'])
        | selectattr('key', 'search', '_') | list | length == 0
    fail_msg: >-
      An smb_shares entry has a directive key containing '_' (e.g. valid_users
      instead of `valid users`). smb.conf parameters use spaces; the typo would
      render a directive smbd ignores, silently leaving the share open to every
      authenticated user.
  tags:
    - samba

- name: Install samba package
  apt:
    pkg:
      - samba
    policy_rc_d: 101
    cache_valid_time: 3600
  register: samba_apt
  become: true
  tags:
    - samba

- name: Configure samba
  template:
    src: smb.conf.j2
    dest: /etc/samba/smb.conf
    owner: root
    group: root
    mode: "0644"
    backup: true
    validate: testparm -s %s
  register: samba_cfg
  become: true
  tags:
    - samba

- name: Enable smbd service
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: smbd
      condition: "{{ not (ansible_check_mode and samba_apt.changed) }}"
      restart: "{{ samba_cfg.changed }}"
  tags:
    - samba

# Install the override AFTER smbd is up. On a fresh host the zfs_mount_mnt_*.service
# units don't exist yet (the data/media roles in a later play create them); the
# override is installed for boot-time effect only — no smbd restart on change, so a
# subsequent reboot (with all coordinator units present) is what activates it.
- name: Create smbd override directory
  when: (smb_shares | default([])) | length > 0
  file:
    dest: /etc/systemd/system/smbd.service.d
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true
  tags:
    - samba

- name: Install smbd zfs-mount dependency override
  when: (smb_shares | default([])) | length > 0
  template:
    src: smbd_zfs_mounts_override.conf.j2
    dest: /etc/systemd/system/smbd.service.d/zfs-mounts.conf
    owner: root
    group: root
    mode: "0644"
    backup: true
  register: samba_smbd_override
  become: true
  tags:
    - samba

- name: Reload systemd after smbd override
  when:
    - (smb_shares | default([])) | length > 0
    - samba_smbd_override.changed
  systemd:
    daemon_reload: true
  become: true
  tags:
    - samba

- name: Re-enable smbd to pick up new WantedBy targets
  when:
    - not (ansible_check_mode and samba_apt.changed)
    - (smb_shares | default([])) | length > 0
    - samba_smbd_override.changed
  systemd:
    name: smbd
    enabled: true
  become: true
  tags:
    - samba

# A host that drops all its shares must shed the override too, or smbd keeps a
# boot dependency on zfs_mount units that may no longer exist.
- name: Remove smbd zfs-mount override when no shares
  when: (smb_shares | default([])) | length == 0
  file:
    dest: /etc/systemd/system/smbd.service.d/zfs-mounts.conf
    state: absent
  register: samba_smbd_override_removed
  become: true
  tags:
    - samba

- name: Reload systemd after smbd override removal
  when:
    - (smb_shares | default([])) | length == 0
    - samba_smbd_override_removed.changed
  systemd:
    daemon_reload: true
  become: true
  tags:
    - samba

# nmbd (NetBIOS name service / LAN browsing) is intentionally not run:
# clients reach SMB3 directly over TCP 445 and discover shares via the
# avahi mDNS advert below. Mask it so neither a prior enable (lab ran it
# before this) nor a package reconfigure can bring the legacy NetBIOS
# listener back. smbd has no dependency on nmbd, so this is safe.
- name: Mask the unused nmbd service
  # In check mode against a host without samba yet installed, nmbd.service
  # doesn't exist (the package install above only reported it would happen),
  # so the systemd module errors with "Could not find the requested service".
  when: not (ansible_check_mode and samba_apt.changed)
  systemd:
    name: nmbd
    state: stopped
    enabled: false
    masked: true
  become: true
  tags:
    - samba

# Best-effort mDNS advert: avahi-daemon is owned by the `avahi` role (runs
# just before this one in site.yml). If it isn't running, the advert lands on
# disk but isn't published -- discovery then depends on avahi being managed
# elsewhere, not on this role.
- name: Install avahi smb service
  template:
    src: smb.service.j2
    dest: /etc/avahi/services/smb.service
    mode: "0644"
    owner: root
    group: root
    backup: true
    validate: xmllint --noout --dtdvalid /usr/share/avahi/avahi-service.dtd %s
  become: true
  register: samba_avahi_smb
  tags:
    - samba

# Avahi reloads /etc/avahi/services/* via SIGHUP; reload (not
# restart) keeps the LAN's mDNS cache warm. Skipped when the unit
# isn't already active -- samba doesn't own avahi-daemon's
# lifecycle, so don't conjure it up here.
- name: Check avahi-daemon state
  systemd:
    name: avahi-daemon
  register: samba_avahi_state
  failed_when: false
  changed_when: false
  become: true
  tags:
    - samba

- name: Signal avahi to reload its services dir
  when:
    - samba_avahi_smb.changed
    - samba_avahi_state.status.ActiveState | default('') == 'active'
  systemd:
    name: avahi-daemon
    state: reloaded
  become: true
  tags:
    - samba

- name: Configure Samba user
  import_role:
    name: samba
    tasks_from: smbpasswd
  vars:
    samba_smbpasswd_args:
      name: "{{ ansible_user_id }}"
      password: "{{ samba_password }}"
  tags:
    - samba
