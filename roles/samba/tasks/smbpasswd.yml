# Converge-driven SMB account provisioning, shared by the samba and spouse roles.
# Caller passes a single dict:
#   samba_smbpasswd_args: { name: <login>, password: <vaulted secret> }
#
# On first run the account is created; on subsequent runs the password is
# re-set only when the vault value has changed (detected by comparing a
# sha256 sentinel under /etc/samba/.smbpasswd_<user>_hash). This makes
# vault rotation take effect on the next converge without manual SSH.
#
# Password + username are passed via the environment (never interpolated into
# the bash string), so a value containing a single quote or shell metacharacter
# can't break out of the command or land in the process arg list -- only on
# stdin, which smbpasswd -s reads (new password, then confirmation).
- name: Provision or rotate SMB password for {{ samba_smbpasswd_args.name }}
  shell: |
    set -euo pipefail
    umask 077
    sentinel="/etc/samba/.smbpasswd_${SMB_USER}_hash"
    # Include machine-id so the sentinel is host-specific and non-portable
    # even if the file is exfiltrated.
    current_hash=$(printf '%s:%s' "$SMB_PASSWORD" "$(cat /etc/machine-id)" | sha256sum | cut -d' ' -f1)
    # Also verify the SMB account still exists in the passdb -- a passdb wipe
    # (package reinstall, migration) with a surviving sentinel would otherwise
    # skip re-creation and silently leave the account absent.
    if [ -f "$sentinel" ] && [ "$(cat "$sentinel")" = "$current_hash" ] && pdbedit --user="$SMB_USER" > /dev/null 2>&1; then
      exit 0
    fi
    if pdbedit --user="$SMB_USER" > /dev/null 2>&1; then
      printf '%s\n%s\n' "$SMB_PASSWORD" "$SMB_PASSWORD" | smbpasswd -s "$SMB_USER"
    else
      printf '%s\n%s\n' "$SMB_PASSWORD" "$SMB_PASSWORD" | smbpasswd -s -a "$SMB_USER"
    fi
    printf '%s' "$current_hash" > "$sentinel"
    chmod 0600 "$sentinel"
    echo "CHANGED"
  args:
    executable: /bin/bash
  environment:
    SMB_USER: "{{ samba_smbpasswd_args.name }}"
    SMB_PASSWORD: "{{ samba_smbpasswd_args.password }}"
  register: samba_smbpasswd
  changed_when: "'CHANGED' in samba_smbpasswd.stdout"
  become: true
