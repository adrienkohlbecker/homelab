# Configures a third-party apt repository: signing key + source line +
# optional version pin, handling the Ubuntu-major-version fork once.
#
# Repository setup forks on Ubuntu major version because apt-key was
# removed from the default install in resolute (26.04): jammy (< 26) takes
# apt_key + apt_repository, resolute (>= 26) fetches the key into the same
# scoped keyring and takes deb822_repository (which needs python3-debian).
#
# The signing key lives at /usr/share/keyrings/<name>.gpg, referenced by
# signed-by= on the repo line so it is trusted for this source only. Debian
# reserves /usr/share/keyrings for dpkg-managed keys and points self-fetched
# ones at /etc/apt/keyrings; we deliberately use the former to share one
# fleet-wide keyring location with roles/apt's archive keyring.
#
# Callers pass everything through a single apt_source_args dict so each
# invocation replaces it wholesale and inter-call vars-leak can't happen:
#
#   name:          identifier -- scoped keyring file, .sources name, pin file
#   key_url:       URL of the signing key (fetched into the scoped keyring)
#   key_id:        full GPG fingerprint, re-checked against the fetched key
#   uris:          repo base URL (usually a mirror_apt_* var)
#   suites:        apt suite -- e.g. nodistro, or the release codename
#   components:    optional apt component -- e.g. main, stable; omit for a
#                  flat repo (trailing-slash suite, no components)
#   architectures: optional; defaults to the host's arch (arm64/amd64)
#   filename:      optional sources.list.d/<filename>.list name on the jammy
#                  path; defaults to <name>, matching the resolute .sources
#                  name. Set it only to pin a different file (fluentbit ->
#                  fluent-bit); a stale .list under any other name that
#                  references this source's keyring is swept on converge.
#   pin:           optional { package, version, priority } -> preferences.d/<name>
#   state:         optional present (default) | absent; absent tombstones the
#                  source -- removes its .list/.sources, keyring and pin file
#
# Exposes apt_source_<name>_changed (true when the repo line, the signing-key
# import, or a prereq install changed) so the caller can gate its install out
# of check mode -- where the repo task is skipped behind its prereq install
# and a stale cache would otherwise make the install fail to find the package.

- name: Assert apt_source args for {{ apt_source_args.name }}
  assert:
    that:
      - apt_source_args.name is defined
      - apt_source_args.key_url is defined
      - apt_source_args.key_id is defined
      - apt_source_args.uris is defined
      - apt_source_args.suites is defined
      # name lands in the keyring / .sources / preferences file paths --
      # keep it a bare slug so it can't traverse or inject path segments.
      - apt_source_args.name | default('') is match('^[a-z0-9_-]+\Z')
      # the key is the source's trust anchor; a plaintext fetch is MITM-able.
      - apt_source_args.key_url | default('') is match('https://')
      - apt_source_args.state | default('present') in ['present', 'absent']
      # single-valued: the jammy repo line space-joins while deb822 splits a
      # string on commas, so a multi-valued string would diverge across paths.
      - apt_source_args.suites | default('') is not search('[ ,]')
      - apt_source_args.components | default('') is not search('[ ,]')
    fail_msg: >-
      apt_source_args must define name, key_url, key_id, uris and suites,
      with name a [a-z0-9_-] slug and key_url an https URL;
      got {{ apt_source_args }}

# present (default) adds the source; absent tombstones it. Derived from the
# current args each call, so it never leaks across invocations.
- name: Resolve apt_source state for {{ apt_source_args.name }}
  set_fact:
    apt_source_present: "{{ apt_source_args.state | default('present') == 'present' }}"

# Jammy .list filename: default to <name> so it matches the resolute
# .sources name and is independent of the mirror URL (apt_repository would
# otherwise auto-derive an unstable name from the URL). Used by the repo
# task and the stale-.list sweep below.
- name: Resolve apt_source jammy filename for {{ apt_source_args.name }}
  set_fact:
    apt_source_filename: "{{ apt_source_args.filename | default(apt_source_args.name) }}"

# Ubuntu major version selects the repo mechanism: < 26 (jammy) takes
# apt_key + apt_repository, >= 26 (resolute) takes deb822_repository. Resolve
# it once so every branch gates on a named intent, not a repeated comparison.
- name: Resolve apt_source repo mechanism for {{ apt_source_args.name }}
  set_fact:
    apt_source_is_deb822: "{{ ansible_distribution_major_version | int >= 26 }}"

# Repo-line architecture: a caller override wins, else map the host arch to
# apt's naming. One fact so the jammy deb-line and the deb822 task agree.
- name: Resolve apt_source architecture for {{ apt_source_args.name }}
  set_fact:
    apt_source_arch: "{{ 'arm64' if ansible_architecture == 'aarch64' else 'amd64' }}"

- name: Install gpg for {{ apt_source_args.name }}
  when:
    - not apt_source_is_deb822
    - apt_source_present
  apt:
    pkg: gpg
    cache_valid_time: 3600
  become: true
  register: apt_source_gpg

- name: Add repository key for {{ apt_source_args.name }}
  when:
    - not apt_source_is_deb822
    - apt_source_present
    - not (ansible_check_mode and apt_source_gpg.changed)
  apt_key:
    id: "{{ apt_source_args.key_id }}"
    url: "{{ apt_source_args.key_url }}"
    keyring: /usr/share/keyrings/{{ apt_source_args.name }}.gpg
  become: true
  register: apt_source_key_legacy

# The key lives in the scoped keyring above (referenced by signed-by= on
# the repo line), so the global-trust copy at /etc/apt/trusted.gpg.d/ must
# not exist -- it would re-grant this key trust for every apt source.
# < 26 only: the resolute deb822 path never writes a global-trust copy.
- name: Remove global-trust keyring for {{ apt_source_args.name }}
  when: not apt_source_is_deb822
  file:
    path: /etc/apt/trusted.gpg.d/{{ apt_source_args.name }}.gpg
    state: absent
  become: true

- name: Add repository for {{ apt_source_args.name }}
  when: not apt_source_is_deb822
  apt_repository:
    repo: deb [arch={{ apt_source_args.architectures | default(apt_source_arch) }} signed-by=/usr/share/keyrings/{{ apt_source_args.name }}.gpg] {{ apt_source_args.uris }} {{ apt_source_args.suites }} {{ apt_source_args.components | default('') }}
    filename: "{{ apt_source_filename }}"
    state: "{{ apt_source_args.state | default('present') }}"
    # The strict `apt-get update --error-on=any` below is the sole refresh;
    # apt_repository's own (partial-failure-tolerant) update on change would
    # just be a redundant second pass.
    update_cache: false
  become: true
  register: apt_source_repo_legacy

# The jammy filename defaults to <name> (matching the resolute .sources
# name), so a host previously converged with apt_repository's URL-derived
# name -- or one whose mirror URL later changed -- would strand the old
# .list as a duplicate source. Sweep any other .list that references this
# source's scoped keyring, keyed on the keyring path so it can't touch an
# unrelated source. A no-op once every host carries the canonical
# <filename>.list; runs before the cache refresh so the duplicate never
# reaches apt-get update.
- name: Find stale .list files for {{ apt_source_args.name }}
  when:
    - not apt_source_is_deb822
    - apt_source_present
  find:
    paths: /etc/apt/sources.list.d
    patterns: "*.list"
    contains: "signed-by=/usr/share/keyrings/{{ apt_source_args.name }}\\.gpg"
  register: apt_source_stale_lists
  become: true

- name: Remove stale .list files for {{ apt_source_args.name }}
  when:
    - not apt_source_is_deb822
    - apt_source_present
    - (item.path | basename) != (apt_source_filename ~ '.list')
  file:
    path: "{{ item.path }}"
    state: absent
  loop: "{{ apt_source_stale_lists.files | default([]) }}"
  loop_control:
    label: "{{ item.path }}"
  become: true

# Pre-warm /var/lib/apt/lists/ so the python3-debian install below works in
# check mode. Packer ships an empty cache and the apt module's update_cache
# is a no-op under --check. See roles/apt/tasks/main.yml for the full
# rationale.
- name: Pre-warm apt cache (real fetch even in --check) for {{ apt_source_args.name }}  # noqa: command-instead-of-module
  when:
    - apt_source_is_deb822
    - apt_source_present
  command: apt-get update
  changed_when: false
  check_mode: false
  become: true

# deb822_repository requires python3-debian even in check mode, and the key
# fingerprint check below needs gpg. Gate the deb822 task on this install's
# .changed so check mode still propagates a would-change signal when the
# prereq install masks the repo task.
- name: Install repository prereqs for {{ apt_source_args.name }}
  when:
    - apt_source_is_deb822
    - apt_source_present
  apt:
    pkg:
      - gpg
      - python3-debian
    cache_valid_time: 3600
  become: true
  register: apt_source_resolute_prereqs

# Fetch the key, then dearmor it into the same scoped keyring the jammy path
# uses, so signed_by= below references a local binary keyring. apt keys the
# deb822 signed-by file format on its SUFFIX: a .gpg path must hold a BINARY
# OpenPGP keyring -- an armored key saved verbatim there is rejected as
# NO_PUBKEY at apt-get update. docker and netdata both serve armored keys, so
# dearmor to match the binary keyring jammy's apt_key import writes, keeping
# one shared /usr/share/keyrings/<name>.gpg across both release paths. The
# armored .asc is the get_url idempotence anchor (force: no -> fetched once);
# it is inert (apt only reads what signed_by points at) and the tombstone
# sweeps it.
- name: Fetch repository key (armored) for {{ apt_source_args.name }}
  when:
    - apt_source_is_deb822
    - apt_source_present
  get_url:
    url: "{{ apt_source_args.key_url }}"
    dest: /usr/share/keyrings/{{ apt_source_args.name }}.asc
    owner: root
    group: root
    mode: "0644"
  become: true
  register: apt_source_key_resolute

- name: Dearmor the repository key into the scoped keyring for {{ apt_source_args.name }}
  when:
    - apt_source_is_deb822
    - apt_source_present
    - apt_source_key_resolute is changed
  command: gpg --batch --yes --dearmor --output /usr/share/keyrings/{{ apt_source_args.name }}.gpg /usr/share/keyrings/{{ apt_source_args.name }}.asc
  changed_when: true
  become: true

# deb822_repository trusts whatever signed_by serves without checking it
# against key_id, so re-assert the fingerprint here -- a swapped key on a
# compromised mirror fails the converge instead of being trusted (TOFU),
# matching the jammy apt_key id: re-check. Real converge only: command tasks
# skip under --check, and the dry-run preview need not re-verify trust.
- name: Read repository key fingerprint for {{ apt_source_args.name }}
  when:
    - apt_source_is_deb822
    - apt_source_present
    - not ansible_check_mode
  command: gpg --show-keys --with-colons /usr/share/keyrings/{{ apt_source_args.name }}.gpg
  changed_when: false
  register: apt_source_key_fpr
  become: true

- name: Assert the fetched key matches key_id for {{ apt_source_args.name }}
  when:
    - apt_source_is_deb822
    - apt_source_present
    - not ansible_check_mode
  vars:
    # gpg --with-colons emits an `fpr:` record per key (field 10, index 9 after
    # splitting on ":", is the fingerprint); the FIRST one is the primary key.
    # Compare key_id against that exact field, not a substring of the whole
    # dump -- a hostile keyring could carry the expected fingerprint as a
    # subkey or UID and pass an `in` check while its primary signing key differs.
    apt_source_fpr_fields: "{{ (apt_source_key_fpr.stdout_lines | select('match', 'fpr:') | list | first | default('')).split(':') }}"
  assert:
    that:
      # single short-circuiting term so a short/empty list can't IndexError
      - (apt_source_fpr_fields | length > 9) and (apt_source_fpr_fields[9] == apt_source_args.key_id)
    fail_msg: >-
      Fetched key for {{ apt_source_args.name }} primary fingerprint
      {{ apt_source_fpr_fields[9] if (apt_source_fpr_fields | length > 9) else 'none' }}
      does not match expected {{ apt_source_args.key_id }}

- name: Add repository (deb822) for {{ apt_source_args.name }}
  when:
    - apt_source_is_deb822
    - not (ansible_check_mode and apt_source_resolute_prereqs.changed)
  deb822_repository:
    name: "{{ apt_source_args.name }}"
    types: deb
    uris: "{{ apt_source_args.uris }}"
    suites: "{{ apt_source_args.suites }}"
    components: "{{ apt_source_args.components | default(omit) }}"
    architectures: "{{ apt_source_args.architectures | default(apt_source_arch) }}"
    signed_by: /usr/share/keyrings/{{ apt_source_args.name }}.gpg
    state: "{{ apt_source_args.state | default('present') }}"
  become: true
  register: apt_source_repo_deb822

# deb822_repository writes the .sources file but doesn't run `apt update`,
# so the caller's install would otherwise hit a stale cache and fail to
# find the package. Force a refresh on the run that changed the repo, with
# --error-on=any so a mis-wired source (wrong signed-by, 404 suite) fails
# loudly here rather than as a baffling "no candidate" in the caller's
# install -- the apt module's update_cache silently tolerates partial-suite
# failures (matches roles/apt). Both paths suppress their module's own
# refresh (deb822_repository never runs one; apt_repository has
# update_cache: false), so this is the single refresh on either path. Gate
# on the repo registers, not the prereq installs -- a fresh gpg/python3-debian
# doesn't dirty the lists.
- name: Refresh apt cache after repository change for {{ apt_source_args.name }}  # noqa: command-instead-of-module
  when:
    - apt_source_repo_legacy is changed or apt_source_repo_deb822 is changed
    - not ansible_check_mode
  command: apt-get update --error-on=any
  register: apt_source_refresh
  retries: 5
  delay: 30
  until: apt_source_refresh.rc == 0
  changed_when: apt_source_refresh.rc == 0
  become: true

# No validate: apt has no single-file preferences parser (apt-cache policy
# reads the whole preferences.d set, not one file), and a malformed pin is
# inert -- apt skips unparsable stanzas rather than corrupting state.
- name: Configure apt pin for {{ apt_source_args.name }}
  when:
    - apt_source_args.pin is defined
    - apt_source_present
  template:
    src: preferences.j2
    dest: /etc/apt/preferences.d/{{ apt_source_args.name }}
    owner: root
    group: root
    mode: "0644"
    backup: true
  become: true

# Tombstone cleanup: the repo modules above remove the .list/.sources on
# state: absent; drop the scoped keyring and any pin file too so a retired
# source leaves nothing stranded.
- name: Remove pin for {{ apt_source_args.name }}
  when: not apt_source_present
  file:
    path: /etc/apt/preferences.d/{{ apt_source_args.name }}
    state: absent
  become: true

# Remove both the binary keyring and the armored .asc the deb822 path stages
# alongside it (a no-op on the jammy path, which never writes the .asc).
- name: Remove keyring for {{ apt_source_args.name }}
  when: not apt_source_present
  file:
    path: "/usr/share/keyrings/{{ apt_source_args.name }}.{{ item }}"
    state: absent
  loop:
    - gpg
    - asc
  become: true

# Includes the per-branch prereqs (gpg on jammy, python3-debian on resolute)
# and the signing-key import (apt_key / get_url) so a   first-run key fetch is
# signalled, and so check mode -- where the repo task is gated out by the
# prereq install -- still propagates a would-change signal to the caller.
- name: Export change signal for {{ apt_source_args.name }}
  set_fact:
    "apt_source_{{ apt_source_args.name }}_changed": "{{ apt_source_repo_legacy is changed or apt_source_repo_deb822 is changed or apt_source_key_legacy is changed or apt_source_key_resolute is changed or apt_source_gpg is changed or apt_source_resolute_prereqs is changed }}"
