# Inputs: caller passes a single dict `podman_secret_args` with keys
#   name              required; the podman secret's name
#   data              required; the secret payload as a string (JSON-encode
#                     structured data with `| to_json` before passing)
#   user              optional, default 'root'; targets a specific rootless
#                     podman. Non-root auto-derives XDG_RUNTIME_DIR /
#                     DBUS_SESSION_BUS_ADDRESS from the user's uid via
#                     getent so callers don't have to pass an environment
#                     block. Root keeps the empty default — its podman
#                     uses the system socket.
#
# The dict form prevents inter-call leakage at play-vars scope: each
# import_role pass replaces the whole `podman_secret_args` value, so a
# previous caller's user/data can't bleed into the next caller that
# doesn't explicitly override.
#
# Outputs (facts set only when this role actually runs — a caller that
# gates the import_role on a `when:` must read them through
# `| default(false)`, as headscale does for its conditional OIDC secret):
#   <name>_rotated         the secret was created or its content changed
#                          this run; drive a container restart off this.
#   <name>_existed_before  the secret already existed before this run,
#                          captured pre-create so a bootstrap-only consumer
#                          can tell a first install from a later rotation
#                          (e.g. a Django superuser made once from
#                          SUPERUSER_PASSWORD — see healthchecks/influxdb,
#                          which fail loudly if it rotates post-bootstrap).
#
# containers.podman.podman_secret is create-or-replace with native content
# drift detection on podman >= 4.7 (it `secret inspect --showsecret`s the
# stored value and recreates only when the bytes differ), and the homelab
# pins podman 4.9 fleet-wide. So we hand it name/data unconditionally and
# let the module decide whether to rotate. The pre-create existence probe
# below stays only to derive `existed_before`, which the module doesn't expose.
- name: Validate inputs for {{ podman_secret_args.name | default('<unset>') }}
  assert:
    that:
      - podman_secret_args.name is defined
      - podman_secret_args.name is string
      # name prefixes the output fact keys below; assert it's a sane,
      # sanitizable identifier so a bad name fails loudly here rather than
      # crashing set_fact. Same guard as roles/linger/tasks/linger.yml.
      - (podman_secret_args.name | default('')) is match('^[a-z_][a-z0-9_-]*$')
      - podman_secret_args.data is defined
      - podman_secret_args.data is string
    quiet: true
    fail_msg: >-
      podman_secret_args needs name (a valid identifier matching
      [a-z_][a-z0-9_-]*, since it prefixes the output fact keys) and data
      (string — JSON-encode structured data with `| to_json`); got
      name={{ podman_secret_args.name | default('<unset>') }}.

- name: Resolve caller defaults for {{ podman_secret_args.name }}
  set_fact:
    _podman_secret_name: "{{ podman_secret_args.name }}"
    _podman_secret_data: "{{ podman_secret_args.data }}"
    _podman_secret_user: "{{ podman_secret_args.user | default('root') }}"

- name: Look up uid for {{ podman_secret_args.user | default('root') }}
  when: _podman_secret_user != 'root'
  getent:
    database: passwd
    key: "{{ _podman_secret_user }}"
  become: true

# Fail with the offending name rather than letting the getent_passwd[user]
# deref below surface as an opaque template error when the account is
# missing (e.g. a caller that orders this before the service_user that
# creates it).
- name: Assert a usable passwd entry exists for {{ _podman_secret_user }}
  when: _podman_secret_user != 'root'
  assert:
    that:
      - _podman_secret_user in getent_passwd
      # field [1] is the uid; guard it's numeric so a malformed entry fails
      # here, not deep in the /run/user/<uid> path derivation below.
      - (getent_passwd[_podman_secret_user][1] | default('')) is match('^[0-9]+$')
    quiet: true
    fail_msg: >-
      podman_secret_args.user={{ _podman_secret_user }} has no usable passwd
      entry (missing, or a non-numeric uid) — create the account
      (service_user) and enable linger before targeting its rootless podman.

# Derive XDG_RUNTIME_DIR/DBUS rather than running bare become_user like
# systemd_unit does: that helper drives the user bus via the `systemd`
# module, but here the podman CLI the module shells out to needs
# XDG_RUNTIME_DIR to locate the rootless socket.
- name: Compute rootless podman environment for {{ podman_secret_args.user | default('root') }}
  when: _podman_secret_user != 'root'
  set_fact:
    _podman_secret_user_env:
      XDG_RUNTIME_DIR: "/run/user/{{ getent_passwd[_podman_secret_user][1] }}"
      DBUS_SESSION_BUS_ADDRESS: "unix:path=/run/user/{{ getent_passwd[_podman_secret_user][1] }}/bus"

# A rootless podman socket only exists once the user manager is up, which
# requires linger — the passwd assert above doesn't catch a user that exists
# but has no running manager. Stat XDG_RUNTIME_DIR (not the dbus socket: a
# lingered user has no /run/user/<uid>/bus on the box fixture) so a
# missing-linger caller fails here, not deep inside the podman CLI.
- name: Stat the rootless runtime dir for {{ _podman_secret_user }}
  when: _podman_secret_user != 'root'
  stat:
    path: "/run/user/{{ getent_passwd[_podman_secret_user][1] }}"
  register: _podman_secret_runtime_dir
  become: true

- name: Assert the rootless runtime dir is live for {{ _podman_secret_user }}
  when: _podman_secret_user != 'root'
  assert:
    that:
      - _podman_secret_runtime_dir.stat.exists
      - _podman_secret_runtime_dir.stat.isdir
    quiet: true
    fail_msg: >-
      /run/user/{{ getent_passwd[_podman_secret_user][1] }} is missing —
      enable linger for {{ _podman_secret_user }} so its user manager (hence
      its rootless podman socket) is running.

- name: List existing podman secrets
  containers.podman.podman_secret_info:
  register: _podman_secret_existing_all
  check_mode: false
  become: true
  become_user: "{{ _podman_secret_user }}"
  environment: "{{ _podman_secret_user_env | default({}) }}"

# Captured before the create/rotate task so the caller can distinguish a
# first install (existed_before=false) from a real rotation
# (existed_before=true, rotated=true).
- name: Record pre-existing state of {{ podman_secret_args.name }}
  set_fact:
    # key sanitized like service_user/linger: a non-identifier char in name
    # would otherwise fail set_fact with "Invalid variable name".
    "{{ _podman_secret_name | regex_replace('[^A-Za-z0-9_]', '_') }}_existed_before": "{{ _podman_secret_existing_all.secrets | selectattr('Spec.Name', 'eq', _podman_secret_name) | list | length > 0 }}"

- name: Create or rotate {{ podman_secret_args.name }}
  containers.podman.podman_secret:
    name: "{{ _podman_secret_name }}"
    data: "{{ _podman_secret_data }}"
  register: _podman_secret_result
  become: true
  become_user: "{{ _podman_secret_user }}"
  environment: "{{ _podman_secret_user_env | default({}) }}"

# Capture per-secret rotation status so successive import_role calls in the
# same play don't clobber the shared register.
- name: Record rotation status for {{ podman_secret_args.name }}
  set_fact:
    "{{ _podman_secret_name | regex_replace('[^A-Za-z0-9_]', '_') }}_rotated": "{{ _podman_secret_result is changed }}"
