# containers.podman.podman_secret is name-idempotent only — it never updates an
# existing secret's data when re-run. We track the sha256 of the desired content
# as a `data_sha256` label on the secret itself, look it up via podman_secret_info,
# and force-recreate when it has drifted (e.g. vault rotation).
#
# podman_secret_user (default: root) targets a specific rootless podman. When
# non-root, XDG_RUNTIME_DIR / DBUS_SESSION_BUS_ADDRESS are auto-derived from
# the user's uid via getent so callers don't have to pass an environment
# block. Root keeps the empty default — its podman uses the system socket.
- name: Look up uid for {{ podman_secret_user | default('root') }}
  when: (podman_secret_user | default('root')) != 'root'
  getent:
    database: passwd
    key: "{{ podman_secret_user }}"
  become: true

- name: Compute rootless podman environment for {{ podman_secret_user | default('root') }}
  when: (podman_secret_user | default('root')) != 'root'
  set_fact:
    # getent_passwd[user] is the colon-split passwd line; field [1] is the uid.
    podman_secret_user_env:
      XDG_RUNTIME_DIR: "/run/user/{{ getent_passwd[podman_secret_user][1] }}"
      DBUS_SESSION_BUS_ADDRESS: "unix:path=/run/user/{{ getent_passwd[podman_secret_user][1] }}/bus"

- name: List existing podman secrets
  containers.podman.podman_secret_info:
  register: podman_secret_existing_all
  check_mode: false
  become: true
  become_user: "{{ podman_secret_user | default('root') }}"
  environment: "{{ podman_secret_user_env | default({}) }}"

- name: Locate existing {{ podman_secret_name }}
  set_fact:
    podman_secret_existing: "{{ podman_secret_existing_all.secrets | selectattr('Spec.Name', 'eq', podman_secret_name) | list | first | default({}) }}"

# Captured before the create/rotate task so the caller can distinguish first
# install (existed_before=false) from a real rotation (existed_before=true,
# rotated=true). Matters for app-level state that consumes the secret only at
# bootstrap (e.g. Django superuser created via SUPERUSER_PASSWORD).
- name: Record pre-existing state of {{ podman_secret_name }}
  set_fact:
    "{{ podman_secret_name }}_existed_before": "{{ podman_secret_existing | length > 0 }}"

- name: Create or rotate {{ podman_secret_name }}
  when: >-
    not podman_secret_existing
    or (podman_secret_existing.Spec.Labels | default({})).get('data_sha256', '') != (podman_secret_data | hash('sha256'))
  containers.podman.podman_secret:
    name: "{{ podman_secret_name }}"
    data: "{{ podman_secret_data }}"
    labels:
      data_sha256: "{{ podman_secret_data | hash('sha256') }}"
    force: true
  no_log: true
  register: podman_secret_result
  become: true
  become_user: "{{ podman_secret_user | default('root') }}"
  environment: "{{ podman_secret_user_env | default({}) }}"

# Capture per-secret rotation status so successive import_role calls in the same
# play don't clobber the shared podman_secret_result register.
- name: Record rotation status for {{ podman_secret_name }}
  set_fact:
    "{{ podman_secret_name }}_rotated": "{{ podman_secret_result is changed }}"

# Reset caller-input vars to defaults so they don't leak into a sibling
# call later in the play. See roles/systemd_unit/tasks/install.yml for
# the full background on the import_role + vars: leak.
- name: Reset caller-input vars to defaults
  set_fact:
    podman_secret_user: root
    podman_secret_user_env: {}
