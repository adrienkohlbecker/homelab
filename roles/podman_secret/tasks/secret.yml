# Inputs: caller passes a single dict `podman_secret_args` with keys
#   name              required; the podman secret's name
#   data              required; the secret payload
#   user              optional, default 'root'; targets a specific rootless
#                     podman. Non-root auto-derives XDG_RUNTIME_DIR /
#                     DBUS_SESSION_BUS_ADDRESS from the user's uid via
#                     getent so callers don't have to pass an environment
#                     block. Root keeps the empty default — its podman
#                     uses the system socket.
#
# The dict form prevents inter-call leakage at play-vars scope: each
# import_role pass replaces the whole `podman_secret_args` value, so a
# previous caller's user/data can't bleed into the next caller that
# doesn't explicitly override.
#
# containers.podman.podman_secret is name-idempotent only — it never updates an
# existing secret's data when re-run. We track the sha256 of the desired content
# as a `data_sha256` label on the secret itself, look it up via podman_secret_info,
# and force-recreate when it has drifted (e.g. vault rotation).
- name: Resolve caller defaults for {{ podman_secret_args.name }}
  set_fact:
    _podman_secret_name: "{{ podman_secret_args.name }}"
    _podman_secret_data: "{{ podman_secret_args.data }}"
    _podman_secret_user: "{{ podman_secret_args.user | default('root') }}"

- name: Look up uid for {{ _podman_secret_user }}
  when: _podman_secret_user != 'root'
  getent:
    database: passwd
    key: "{{ _podman_secret_user }}"
  become: true

- name: Compute rootless podman environment for {{ _podman_secret_user }}
  when: _podman_secret_user != 'root'
  set_fact:
    # getent_passwd[user] is the colon-split passwd line; field [1] is the uid.
    _podman_secret_user_env:
      XDG_RUNTIME_DIR: "/run/user/{{ getent_passwd[_podman_secret_user][1] }}"
      DBUS_SESSION_BUS_ADDRESS: "unix:path=/run/user/{{ getent_passwd[_podman_secret_user][1] }}/bus"

- name: List existing podman secrets
  containers.podman.podman_secret_info:
  register: _podman_secret_existing_all
  check_mode: false
  become: true
  become_user: "{{ _podman_secret_user }}"
  environment: "{{ _podman_secret_user_env | default({}) }}"

- name: Locate existing {{ _podman_secret_name }}
  set_fact:
    _podman_secret_existing: "{{ _podman_secret_existing_all.secrets | selectattr('Spec.Name', 'eq', _podman_secret_name) | list | first | default({}) }}"

# Captured before the create/rotate task so the caller can distinguish first
# install (existed_before=false) from a real rotation (existed_before=true,
# rotated=true). Matters for app-level state that consumes the secret only at
# bootstrap (e.g. Django superuser created via SUPERUSER_PASSWORD).
- name: Record pre-existing state of {{ _podman_secret_name }}
  set_fact:
    "{{ _podman_secret_name }}_existed_before": "{{ _podman_secret_existing | length > 0 }}"

- name: Create or rotate {{ _podman_secret_name }}
  when: >-
    not _podman_secret_existing
    or (_podman_secret_existing.Spec.Labels | default({})).get('data_sha256', '') != (_podman_secret_data | hash('sha256'))
  containers.podman.podman_secret:
    name: "{{ _podman_secret_name }}"
    data: "{{ _podman_secret_data }}"
    labels:
      data_sha256: "{{ _podman_secret_data | hash('sha256') }}"
    force: true
  no_log: true
  register: _podman_secret_result
  become: true
  become_user: "{{ _podman_secret_user }}"
  environment: "{{ _podman_secret_user_env | default({}) }}"

# Capture per-secret rotation status so successive import_role calls in the same
# play don't clobber the shared register.
- name: Record rotation status for {{ _podman_secret_name }}
  set_fact:
    "{{ _podman_secret_name }}_rotated": "{{ _podman_secret_result is changed }}"
