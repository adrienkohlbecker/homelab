---
- name: _setup | Install podman
  import_role:
    name: podman
    tasks_from: install

- name: _setup | Install nginx
  import_role:
    name: test
    tasks_from: nginx

- name: _setup | Setup services dir
  file:
    dest: /mnt/services
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true
