---
- name: _setup | Install podman
  import_role:
    name: podman
    tasks_from: install

- name: _setup | Install nginx
  import_role:
    name: _test
    tasks_from: nginx

- name: _setup | Setup services dir
  shell: |
    set -euo pipefail
    mkdir -p /mnt/services
  args:
    executable: /bin/bash
    creates: /mnt/services
  become: true
