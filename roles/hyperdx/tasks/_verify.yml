---
# Ownership-of-uidmap-target checks. These catch a regression in the
# +101 uidmap (ClickHouse's internal user landing on the wrong host
# uid, breaking ZFS replication portability).
- name: _verify | Hyperdx config dir is owned by hyperdx
  stat:
    path: /mnt/services/hyperdx
  register: _verify_config_dir
  failed_when: not _verify_config_dir.stat.exists or _verify_config_dir.stat.pw_name != 'hyperdx'
  become: true

- name: _verify | Hyperdx clickhouse data dir is owned by hyperdx_clickhouse
  stat:
    path: /mnt/services/hyperdx/clickhouse
  register: _verify_ch_dir
  failed_when: >-
    not _verify_ch_dir.stat.exists
    or _verify_ch_dir.stat.pw_name != 'hyperdx_clickhouse'
  become: true

- name: _verify | Hyperdx clickhouse log dir is owned by hyperdx_clickhouse
  stat:
    path: /mnt/services/hyperdx/clickhouse_logs
  register: _verify_ch_log_dir
  failed_when: >-
    not _verify_ch_log_dir.stat.exists
    or _verify_ch_log_dir.stat.pw_name != 'hyperdx_clickhouse'
  become: true

# Functional probe instead of "db dir is non-empty" -- the file tree is
# tautologically non-empty after any prior mongod start, even if mongod
# is broken now.
- name: _verify | MongoDB inside the container answers serverStatus
  command: podman exec hyperdx mongo --quiet hyperdx --eval "db.serverStatus().ok"
  register: _verify_mongo
  changed_when: false
  failed_when: _verify_mongo.rc != 0 or (_verify_mongo.stdout | trim) != '1'
  retries: 30
  delay: 2
  until: _verify_mongo.rc == 0 and (_verify_mongo.stdout | trim) == '1'
  become: true

- name: _verify | Hyperdx UI answers on its loopback port
  uri:
    url: http://localhost:{{ service_ports.hyperdx }}/
    status_code: [ 200, 302, 307 ]
  register: _verify_http
  retries: 60
  delay: 2
  until: _verify_http.status in [ 200, 302, 307 ]

# Stronger signal than "frontend renders": ClickHouse is the data plane
# the otel collector exports to. Probe it via the _test helper (encodes
# the Ansible 2.19 templated-until: trust-check workaround).
- name: _verify | ClickHouse inside the container is queryable
  import_role:
    name: _test
    tasks_from: clickhouse_query
  vars:
    _test_args:
      label: select_1
      sql: SELECT 1

- name: _verify | ClickHouse SELECT 1 returns 1
  assert:
    that: (_test_clickhouse_result.stdout | trim) == '1'

# End-to-end ingest probe: synthesise a minimal OTLP log and POST it at
# the published OTLP HTTP port using the same Bearer auth fluent-bit
# does. Any auth / shape / endpoint regression here surfaces as a
# failed _verify rather than silently-dropped production logs.
#
# Retry budget reasoning: opampController only adds `otlp/hyperdx` to
# the active pipelines after a team exists (we bootstrap it in
# main.yml). The supervisor polls the api every ~30s, then the
# collector child is restarted with the new config. Allow ~3 minutes
# end-to-end (90 * 2s).
- name: _verify | OTLP HTTP endpoint accepts a synthetic log POST (loopback)
  uri:
    url: http://localhost:{{ service_ports.hyperdx_otlp_http }}/v1/logs
    method: POST
    body_format: json
    # bearertokenauth extension on the receiver is configured with
    # `scheme: ''` (see opampController.js); the header value is the
    # raw token with no "Bearer " prefix.
    headers:
      Authorization: "{{ hyperdx_ingestion_api_key }}"
    body:
      resourceLogs:
        - resource:
            attributes:
              - key: service.name
                value:
                  stringValue: hyperdx_verify_probe
          scopeLogs:
            # timeUnixNano must be recent: otel_logs has
            # `TTL TimestampTime + INTERVAL 30 DAY` and ClickHouse drops
            # past-TTL rows at insert time. The exporter counts them as
            # "sent" so failures look like silent data loss. Stamp with
            # the current epoch in nanoseconds.
            - logRecords:
                - timeUnixNano: "{{ ansible_date_time.epoch }}000000000"
                  severityText: INFO
                  body:
                    stringValue: hyperdx _verify probe (loopback)
    status_code: 200
  register: _verify_otlp_loopback
  retries: 90
  delay: 2
  until: _verify_otlp_loopback.status == 200
  no_log: true

# Exercise the nginx /v1/logs site (production ingress for off-host
# shippers). Uses Host: + validate_certs=false to hit the local nginx
# without needing DNS; same Bearer as the loopback probe. A jinja typo
# in proxy_pass, a missing proxy_set_header, or a client_max_body_size
# regression would silently break this path; the loopback probe above
# doesn't catch it.
- name: _verify | OTLP HTTP via nginx site accepts a synthetic log POST
  uri:
    url: https://localhost/v1/logs
    method: POST
    body_format: json
    validate_certs: false
    headers:
      Host: "hyperdx.{{ inventory_hostname }}.{{ domain }}"
      Authorization: "{{ hyperdx_ingestion_api_key }}"
    body:
      resourceLogs:
        - resource:
            attributes:
              - key: service.name
                value:
                  stringValue: hyperdx_verify_probe_nginx
          scopeLogs:
            - logRecords:
                - timeUnixNano: "{{ ansible_date_time.epoch }}000000000"
                  severityText: INFO
                  body:
                    stringValue: hyperdx _verify probe (nginx)
    status_code: 200
  no_log: true

# Negative-path: missing Authorization must be rejected. Currently fires
# at nginx (the `if ($http_authorization = "") return 401` short-circuit
# in main.yml's server_conf); previously fired at the OTel collector's
# bearertokenauth extension. Either layer rejecting is fine; both being
# missing is the regression we want to catch.
- name: _verify | OTLP HTTP via nginx site rejects missing Authorization
  uri:
    url: https://localhost/v1/logs
    method: POST
    body_format: json
    validate_certs: false
    headers:
      Host: "hyperdx.{{ inventory_hostname }}.{{ domain }}"
    body: {}
    status_code: 401

# Confirm the probe rows actually landed in ClickHouse, not just "the
# HTTP layer said 200". The otel_logs table is auto-created by the OTel
# ClickHouse exporter on first record; if it's missing entirely the
# pipeline silently dropped on the way through. Count >= 2 because both
# the loopback and nginx-site probes seed distinct ServiceNames.
- name: _verify | Probe rows reached otel_logs in ClickHouse
  import_role:
    name: _test
    tasks_from: clickhouse_query_wait
  vars:
    _test_args:
      label: count_verify_probes
      sql: SELECT count() FROM default.otel_logs WHERE ServiceName IN ('hyperdx_verify_probe', 'hyperdx_verify_probe_nginx')
      retries: 30
      delay: 2
      until: "_test_clickhouse_result.rc == 0 and (_test_clickhouse_result.stdout | trim | int) >= 2"
