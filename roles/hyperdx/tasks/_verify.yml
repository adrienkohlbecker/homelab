---
- name: _verify | Hyperdx user exists
  command: getent passwd hyperdx
  changed_when: false
  become: true

- name: _verify | Hyperdx clickhouse system user exists
  command: getent passwd hyperdx_clickhouse
  changed_when: false
  become: true

- name: _verify | Hyperdx config dir exists
  stat:
    path: /mnt/services/hyperdx
  register: _verify_config_dir
  failed_when: not _verify_config_dir.stat.exists or _verify_config_dir.stat.pw_name != 'hyperdx'
  become: true

# Functional ownership check: the container's clickhouse-server chowns
# /var/lib/clickhouse to its in-namespace uid 101 on first start, which
# the +101 uidmap routes to host uid hyperdx_clickhouse. If this lands
# anywhere else (root, hyperdx, a random system user), the uidmap is
# broken and the refactor regressed.
- name: _verify | Hyperdx clickhouse data dir is owned by hyperdx_clickhouse
  stat:
    path: /mnt/services/hyperdx/clickhouse
  register: _verify_ch_dir
  failed_when: >-
    not _verify_ch_dir.stat.exists
    or _verify_ch_dir.stat.pw_name != 'hyperdx_clickhouse'
  become: true

- name: _verify | Hyperdx clickhouse log dir is owned by hyperdx_clickhouse
  stat:
    path: /mnt/services/hyperdx/clickhouse_logs
  register: _verify_ch_log_dir
  failed_when: >-
    not _verify_ch_log_dir.stat.exists
    or _verify_ch_log_dir.stat.pw_name != 'hyperdx_clickhouse'
  become: true

# Mongo's data dir is owned by in-namespace root (= hyperdx on the host)
# because the entrypoint runs `mongod` without dropping privileges. We
# just assert the dir is non-empty -- if mongo failed to start there'd
# be no WiredTiger files.
- name: _verify | Hyperdx mongo data dir is non-empty
  find:
    paths: /mnt/services/hyperdx/db
    file_type: file
  register: _verify_db_dir
  failed_when: _verify_db_dir.matched == 0
  become: true

- name: _verify | Hyperdx.service is loaded and active
  systemd:
    name: hyperdx
  register: _verify_unit
  failed_when: >-
    _verify_unit.status.LoadState != "loaded"
    or _verify_unit.status.ActiveState != "active"
  become: true

- name: _verify | Hyperdx UI answers on its loopback port
  uri:
    url: http://localhost:{{ service_ports.hyperdx }}/
    status_code: [ 200, 302, 307 ]
  register: _verify_http
  retries: 60
  delay: 2
  until: _verify_http.status in [ 200, 302, 307 ]

# Stronger signal than "frontend renders": ClickHouse is the data plane
# the otel collector exports to. Probe it via `podman exec` since the
# service only publishes port 8080 (the UI) to the host loopback.
- name: _verify | ClickHouse inside the container is queryable
  command: podman exec hyperdx curl --fail --silent --show-error --max-time 5 "http://localhost:8123/?query=SELECT+1"
  register: _verify_clickhouse
  changed_when: false
  failed_when: _verify_clickhouse.rc != 0 or _verify_clickhouse.stdout | trim != '1'
  retries: 30
  delay: 2
  until: _verify_clickhouse.rc == 0
  become: true
