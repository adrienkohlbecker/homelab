---
- name: Set up hyperdx system user, group, and config dir
  import_role:
    name: service_user
    tasks_from: user
  vars:
    service_user_args:
      name: hyperdx
  tags:
    - hyperdx

# The all-in-one container drops privileges to its baked-in `clickhouse`
# (uid 101) and `mongodb` (uid 100) users when spawning those daemons.
# With a bare 1:1 uidmap those in-namespace uids would land on whatever
# host happens to have at 100/101 (commonly systemd-resolve/-journal) --
# semantic noise, and breaks ZFS replication portability across hosts
# whose system-package layout differs. Allocate dedicated host system
# users so the +N uidmap overrides in the unit route container 100/101
# to meaningful host owners. `config_dir: false` because these users
# only exist as host-side names for the userns mapping; they don't get
# /mnt/services/<name> dirs of their own.
- name: Set up hyperdx_clickhouse system user
  import_role:
    name: service_user
    tasks_from: user
  vars:
    service_user_args:
      name: hyperdx_clickhouse
      config_dir: false
  tags:
    - hyperdx

- name: Set up hyperdx_mongodb system user
  import_role:
    name: service_user
    tasks_from: user
  vars:
    service_user_args:
      name: hyperdx_mongodb
      config_dir: false
  tags:
    - hyperdx

# The all-in-one image bundles three stateful daemons (ClickHouse, MongoDB,
# OTel collector) writing to three distinct paths. Split into siblings under
# /mnt/services/hyperdx so each can become its own ZFS child dataset later
# (ClickHouse benefits from larger recordsize than MongoDB). One-shot mkdir
# rather than `file:` because the in-container entrypoint chowns the
# clickhouse bind-mounts to its internal `clickhouse` user (mapped via the
# +101 override to hyperdx_clickhouse on the host); re-asserting
# owner=hyperdx with `file:` would flip changed=true on every subsequent
# apply.
- name: Create hyperdx data subdirectories
  when: not (ansible_check_mode and hyperdx_user.changed)
  shell: |
    set -euo pipefail
    mkdir -p /mnt/services/hyperdx/{db,clickhouse,clickhouse_logs}
    chown hyperdx:hyperdx /mnt/services/hyperdx/{db,clickhouse,clickhouse_logs}
    chmod 0755 /mnt/services/hyperdx/{db,clickhouse,clickhouse_logs}
  args:
    executable: /bin/bash
    creates: /mnt/services/hyperdx/clickhouse_logs
  become: true
  tags:
    - hyperdx

- name: Install hyperdx service
  import_role:
    name: systemd_unit
    tasks_from: install
  vars:
    systemd_unit_args:
      src: hyperdx.service.j2
      condition: "{{ not (ansible_check_mode and hyperdx_user.changed) }}"
  tags:
    - hyperdx

- name: Enable hyperdx service
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: hyperdx
      condition: "{{ not (ansible_check_mode and (hyperdx_service_result.changed or hyperdx_user.changed)) }}"
      restart: "{{ hyperdx_service_result.changed }}"
  tags:
    - hyperdx

- name: Configure nginx
  import_role:
    name: nginx
    tasks_from: site
  vars:
    nginx_site_args:
      subdomain: hyperdx
      proxy_pass: http://localhost:{{ service_ports.hyperdx }}/
  tags:
    - hyperdx
