---
- name: Set up hyperdx system user, group, and config dir
  import_role:
    name: service_user
    tasks_from: user
  vars:
    service_user_args:
      name: hyperdx
  tags:
    - hyperdx

# The image's clickhouse-server drops privileges to in-namespace uid 101
# at startup. With the bare 1:1 uidmap fall-through that uid would land
# on whatever the host has at 101 (commonly systemd-journal on Ubuntu) --
# semantic noise, and breaks ZFS replication portability across hosts
# whose system-package layout differs. Allocate a dedicated host system
# user so the +101 uidmap override in the unit routes container 101 to
# a meaningful host owner. `config_dir: false` because this user only
# exists as a host-side name for the userns mapping; it doesn't get a
# /mnt/services/<name> dir of its own.
#
# MongoDB's user (uid 100) is also present in the image but the
# entrypoint runs `mongod` without dropping privileges, so its files
# land as in-namespace root (=hyperdx on the host) -- no override
# needed. If a future image starts dropping to uid 100, add a
# hyperdx_mongodb user and a +100 mapping then.
- name: Set up hyperdx_clickhouse system user
  import_role:
    name: service_user
    tasks_from: user
  vars:
    service_user_args:
      name: hyperdx_clickhouse
      config_dir: false
  tags:
    - hyperdx

# The all-in-one image bundles three stateful daemons (ClickHouse,
# MongoDB, OTel collector) writing to three distinct paths. Split into
# siblings under /mnt/services/hyperdx so each can become its own ZFS
# child dataset later (ClickHouse benefits from larger recordsize than
# MongoDB).
- name: Create hyperdx mongo data subdirectory
  when: not (ansible_check_mode and hyperdx_user.changed)
  file:
    dest: /mnt/services/hyperdx/db
    state: directory
    owner: hyperdx
    group: hyperdx
    mode: "0755"
  become: true
  tags:
    - hyperdx

# One-shot mkdir rather than `file:` because the container's
# clickhouse-server chowns these bind-mounts to its internal `clickhouse`
# user (mapped via the +101 override to hyperdx_clickhouse on the host)
# on first start; re-asserting owner=hyperdx with `file:` would flip
# changed=true on every subsequent apply.
- name: Create hyperdx clickhouse subdirectories
  when: not (ansible_check_mode and hyperdx_user.changed)
  shell: |
    set -euo pipefail
    mkdir -p /mnt/services/hyperdx/{clickhouse,clickhouse_logs}
    chown hyperdx:hyperdx /mnt/services/hyperdx/{clickhouse,clickhouse_logs}
    chmod 0755 /mnt/services/hyperdx/{clickhouse,clickhouse_logs}
  args:
    executable: /bin/bash
    creates: /mnt/services/hyperdx/clickhouse_logs
  become: true
  tags:
    - hyperdx

- name: Install hyperdx service
  import_role:
    name: systemd_unit
    tasks_from: install
  vars:
    systemd_unit_args:
      src: hyperdx.service.j2
      condition: "{{ not (ansible_check_mode and hyperdx_user.changed) }}"
  tags:
    - hyperdx

- name: Enable hyperdx service
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: hyperdx
      condition: "{{ not (ansible_check_mode and (hyperdx_service_result.changed or hyperdx_user.changed)) }}"
      restart: "{{ hyperdx_service_result.changed }}"
  tags:
    - hyperdx

# Per-IP rate-limit zone for /v1/logs. limit_req_zone is http{}-scope and
# can't live inside server{}, so it goes in /etc/nginx/conf.d/ instead of
# the per-site server_conf snippet. Sized at 10MB (~160k tracked IPs) at
# 10r/s -- fluent-bit's default flush cadence is 1-5s, generous for
# legitimate shippers while capping the cost of an unauthenticated flood.
- name: Install hyperdx OTLP rate-limit zone
  import_role:
    name: nginx
    tasks_from: conf_d
  vars:
    nginx_conf_d_args:
      name: hyperdx_otlp.conf
      content: |
        # Managed by roles/hyperdx.
        limit_req_zone $binary_remote_addr zone=hyperdx_otlp:10m rate=10r/s;
  tags:
    - hyperdx

- name: Configure nginx
  import_role:
    name: nginx
    tasks_from: site
  vars:
    nginx_site_args:
      subdomain: hyperdx
      proxy_pass: http://localhost:{{ service_ports.hyperdx }}/
      # The UI on / is gated by Authelia forward-auth. The custom
      # location /v1/logs below is a sibling block with no auth_request
      # directive, so off-host OTLP shippers authenticate via the Bearer
      # token in the Authorization header (validated by the OTel
      # collector's bearertokenauth extension) and never hit Authelia.
      auth: required
      server_conf: |
        # OTLP HTTP ingestion endpoint -- off-host log shippers (pug
        # etc., where fluent-bit can't hit loopback) POST here over
        # public TLS. Auth is the per-team ingestion API key in the
        # Authorization header, validated by the OTel collector's
        # bearertokenauth extension; nginx just forwards it.
        location /v1/logs {
          # Reject unauthenticated POSTs at the edge so we never buffer
          # up to client_max_body_size before the OTel collector rejects
          # them. `if` + `return` is one of the documented-safe shapes
          # despite "if is evil" in other contexts.
          if ($http_authorization = "") { return 401; }
          # Per-IP rate-limit (zone declared in conf.d/hyperdx_otlp.conf).
          limit_req zone=hyperdx_otlp burst=20 nodelay;
          proxy_pass http://localhost:{{ service_ports.hyperdx_otlp_http }}/v1/logs;
          proxy_http_version 1.1;
          proxy_set_header Host              $host;
          proxy_set_header X-Real-IP         $remote_addr;
          proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
          # OTLP batches sit comfortably below nginx's 1MB default but
          # raise it explicitly to give zstd-compressed flushes room.
          client_max_body_size 4M;
        }
  tags:
    - hyperdx

# Bootstrap the first team. HyperDX's all-in-one image leaves the OTLP
# receiver UNWIRED until at least one team exists in MongoDB
# (opampController only adds `otlp/hyperdx` to pipelines when
# `apiKeys.length > 0`, and apiKeys comes from team documents). Without
# this, port 4318 never binds and fluent-bit's OTLP output sees
# Connection refused. The `INGESTION_API_KEY` env that's documented for
# this purpose is dead code in the all-in-one-noauth image variant --
# config.js checks `HYPERDX_IMAGE === 'all-in-one-auth'` but
# entry.base.sh always sets `all-in-one-noauth` when IS_LOCAL_APP_MODE
# is not the dangerous-mode sentinel. Bootstrapping a real team is the
# only path that actually wires the receiver.
#
# /api/register/password is open (no auth required) but one-shot:
# returns 409 if any team already exists. So this task is naturally
# idempotent once the team is created. We force the team's apiKey to
# the vault value afterwards so fluent-bit and the _verify probe can
# authenticate with a known token regardless of the random uuid the
# api generated at registration.
- name: Wait for hyperdx api to be ready
  uri:
    url: http://localhost:{{ service_ports.hyperdx }}/api/health
    status_code: 200
  register: hyperdx_health
  retries: 60
  delay: 2
  until: hyperdx_health.status == 200
  when: not ansible_check_mode
  tags:
    - hyperdx

- name: Probe team existence in MongoDB
  # find().itcount() is robust on the legacy `mongo` shell shipped in the
  # all-in-one image (where countDocuments() throws TypeError on an empty
  # collection that doesn't exist yet).
  command: podman exec hyperdx mongo --quiet hyperdx --eval "db.teams.find().itcount()"
  register: hyperdx_team_count
  changed_when: false
  failed_when: hyperdx_team_count.rc != 0
  when: not ansible_check_mode
  become: true
  tags:
    - hyperdx

# 409 (teamAlreadyExists) is fine -- means we ran this on a prior apply
# (or the user registered manually via the UI). status_code allows both
# so the task stays green.
- name: Register first admin user (creates initial team)
  uri:
    url: http://localhost:{{ service_ports.hyperdx }}/api/register/password
    method: POST
    body_format: json
    body:
      email: "{{ root_email }}"
      password: "{{ hyperdx_admin_password }}"
      confirmPassword: "{{ hyperdx_admin_password }}"
    status_code: [ 200, 409 ]
  when:
    - not ansible_check_mode
    - hyperdx_team_count.stdout | trim | int == 0
  tags:
    - hyperdx

# Vault is source of truth for the apiKey: force-set it after registration
# so fluent-bit's Bearer matches regardless of the random uuid the api
# generated. Also force collectorAuthenticationEnforced=true (registration
# defaults to true today, but pin it so a future default flip doesn't
# silently disable auth on prod re-applies). modifiedCount=0 when the
# state already matches, so this is idempotent on subsequent applies.
- name: Force team apiKey + auth enforcement to vault values
  command: >-
    podman exec hyperdx mongo --quiet hyperdx --eval
    'JSON.stringify(db.teams.updateOne({}, {$set: {apiKey: "{{ hyperdx_ingestion_api_key }}", collectorAuthenticationEnforced: true}}))'
  register: hyperdx_team_update
  changed_when: (hyperdx_team_update.stdout | from_json).modifiedCount | int > 0
  failed_when: hyperdx_team_update.rc != 0 or (hyperdx_team_update.stdout | from_json).matchedCount | int == 0
  when: not ansible_check_mode
  become: true
  tags:
    - hyperdx
