---
- name: Set up hyperdx system user, group, and config dir
  import_role:
    name: service_user
    tasks_from: user
  vars:
    service_user_args:
      name: hyperdx
  tags:
    - hyperdx

# +101 host uid for ClickHouse's in-container privilege drop -- see
# CLAUDE.md "Container User Namespacing" for the rationale (uid 101
# inside the image -> hyperdx_clickhouse on the host via the uidmap).
# MongoDB's uid 100 is unused because its entrypoint doesn't drop
# privileges; add a +100 mapping the day that changes.
- name: Set up hyperdx_clickhouse system user
  import_role:
    name: service_user
    tasks_from: user
  vars:
    service_user_args:
      name: hyperdx_clickhouse
      config_dir: false
  tags:
    - hyperdx

# The all-in-one image bundles three stateful daemons (ClickHouse,
# MongoDB, OTel collector) writing to three distinct paths. Split into
# siblings under /mnt/services/hyperdx so each can become its own ZFS
# child dataset later (ClickHouse benefits from larger recordsize than
# MongoDB).
- name: Create hyperdx mongo data subdirectory
  when: not (ansible_check_mode and hyperdx_user.changed)
  file:
    dest: /mnt/services/hyperdx/db
    state: directory
    owner: hyperdx
    group: hyperdx
    mode: "0755"
  become: true
  tags:
    - hyperdx

# Pre-create both bind-mount targets owned by hyperdx_clickhouse so
# they match what the container's clickhouse-server chowns to on first
# start (uid 101 in-namespace -> hyperdx_clickhouse on host via the
# +101 uidmap). file: with the matching owner sees no flap on re-apply.
- name: Create hyperdx clickhouse subdirectories
  when: not (ansible_check_mode and hyperdx_clickhouse_user.changed)
  file:
    dest: "/mnt/services/hyperdx/{{ item }}"
    state: directory
    owner: hyperdx_clickhouse
    group: hyperdx_clickhouse
    mode: "0755"
  loop:
    - clickhouse
    - clickhouse_logs
  become: true
  tags:
    - hyperdx

- name: Install hyperdx service
  import_role:
    name: systemd_unit
    tasks_from: install
  vars:
    systemd_unit_args:
      src: hyperdx.service.j2
      condition: "{{ not (ansible_check_mode and hyperdx_user.changed) }}"
  tags:
    - hyperdx

- name: Enable hyperdx service
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: hyperdx
      condition: "{{ not (ansible_check_mode and (hyperdx_service_result.changed or hyperdx_user.changed)) }}"
      restart: "{{ hyperdx_service_result.changed }}"
  tags:
    - hyperdx

# Per-IP rate-limit zone for /v1/logs. limit_req_zone is http{}-scope and
# can't live inside server{}, so it goes in /etc/nginx/conf.d/ instead of
# the per-site server_conf snippet. Sized at 10MB (~160k tracked IPs) at
# 10r/s -- fluent-bit's default flush cadence is 1-5s, generous for
# legitimate shippers while capping the cost of an unauthenticated flood.
- name: Install hyperdx OTLP rate-limit zone
  import_role:
    name: nginx
    tasks_from: conf_d
  vars:
    nginx_conf_d_args:
      name: hyperdx_otlp.conf
      content: |
        # Managed by roles/hyperdx.
        limit_req_zone $binary_remote_addr zone=hyperdx_otlp:10m rate=10r/s;
  tags:
    - hyperdx

- name: Configure nginx
  import_role:
    name: nginx
    tasks_from: site
  vars:
    nginx_site_args:
      subdomain: hyperdx
      proxy_pass: http://localhost:{{ service_ports.hyperdx }}/
      # The UI on / is gated by Authelia forward-auth. The custom
      # location /v1/logs below is a sibling block with no auth_request
      # directive, so off-host OTLP shippers authenticate via the Bearer
      # token in the Authorization header (validated by the OTel
      # collector's bearertokenauth extension) and never hit Authelia.
      auth: required
      server_conf: |
        # OTLP HTTP ingestion endpoint -- off-host log shippers (pug
        # etc., where fluent-bit can't hit loopback) POST here over
        # public TLS. Auth is the per-team ingestion API key in the
        # Authorization header, validated by the OTel collector's
        # bearertokenauth extension; nginx just forwards it.
        location = /v1/logs {
          # Off-host shippers must see a plain 401 on auth failure, not
          # the Authelia 302-redirect chain. The server-level
          # `error_page 401 =302 https://auth.<domain>/?rd=...` set by
          # `auth: required` would otherwise rewrite the 401 below.
          # Override with a named location that re-emits 401 verbatim.
          error_page 401 = @v1_logs_unauthorized;
          # Per-IP rate-limit (zone declared in conf.d/hyperdx_otlp.conf).
          # Return 429 on rate-shed so shippers treat it as backpressure
          # rather than an upstream-outage 5xx and back off cleanly.
          limit_req_status 429;
          limit_req zone=hyperdx_otlp burst=20 nodelay;
          proxy_pass http://localhost:{{ service_ports.hyperdx_otlp_http }}/v1/logs;
          proxy_http_version 1.1;
          proxy_set_header Host              $host;
          proxy_set_header X-Real-IP         $remote_addr;
          proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
          # OTLP is RPC-shaped, not streaming. Default `on` would buffer
          # the whole 4MB body before forwarding, holding an nginx worker
          # while a slow client trickles. Off makes nginx forward bytes
          # as they arrive, capping per-connection cost during a flood.
          proxy_request_buffering off;
          # OTLP batches sit comfortably below nginx's 1MB default but
          # raise it explicitly to give zstd-compressed flushes room.
          client_max_body_size 4M;
        }
        location @v1_logs_unauthorized {
          return 401;
        }
  tags:
    - hyperdx

# Bootstrap: register the admin team, then pin the team's apiKey +
# collectorAuthenticationEnforced=true. The all-in-one image's OTLP
# receiver stays UNWIRED until at least one team exists in MongoDB
# (opampController only adds `otlp/hyperdx` to pipelines when
# apiKeys.length > 0). After the team exists, we force its apiKey to
# the vault value (otherwise HyperDX would generate a random one) and
# pin auth-enforcement (defends against a future upstream default flip
# that would silently disable auth on prod re-applies).
#
# Both ops are natively idempotent: /api/register/password returns 409
# on re-apply (admin already registered), mongo updateOne with $set is
# a no-op when state matches. A vault rotation of
# hyperdx_ingestion_api_key naturally re-fires the mongo update
# (modifiedCount=1 because the stored value differs from the new
# vault value), no sentinel-wipe dance needed.
- name: Register hyperdx admin team
  uri:
    url: "http://localhost:{{ service_ports.hyperdx }}/api/register/password"
    method: POST
    body_format: json
    body:
      email: "{{ root_email }}"
      password: "{{ hyperdx_admin_password }}"
      confirmPassword: "{{ hyperdx_admin_password }}"
    status_code: [ 200, 409 ]
  register: hyperdx_register
  changed_when: hyperdx_register.status == 200
  retries: 12
  delay: 5
  until: hyperdx_register.status in [200, 409]
  when: not ansible_check_mode
  no_log: true
  become: true
  tags:
    - hyperdx

# /api/register/password is the only public endpoint that sets the
# admin password; on 409 it returns silently without updating. A vault
# rotation of hyperdx_admin_password is therefore a SILENT NO-OP
# against the live admin user. Print loud guidance so an operator who
# just rotated the password doesn't believe the rotation took.
- name: Warn that hyperdx admin password is not auto-rotated on re-apply
  debug:
    msg: >-
      hyperdx admin team already exists (HTTP 409). If hyperdx_admin_password
      was rotated in vault, the LIVE admin user still has the OLD password.
      Change it manually in the HyperDX UI (Account -> Change Password) or
      via `podman exec -i hyperdx mongo hyperdx` with db.users.updateOne(...).
  when:
    - not ansible_check_mode
    - hyperdx_register.status | default(200) == 409
  tags:
    - hyperdx

# Force the team's apiKey + collectorAuthenticationEnforced=true.
# stdin (not --eval) so the apiKey never appears in /proc/<pid>/cmdline.
# JSON-encoding via ansible's to_json handles all the `"`, `\`, `$`
# quoting concerns the previous jq-based script did. Team-count guard
# refuses to proceed if more than one team exists in mongo (UI-side
# tenants created post-bootstrap, snapshot restore with stale state)
# and prints the team listing so the operator can pick which to delete.
- name: Force hyperdx team apiKey and auth-enforcement
  command:
    cmd: podman exec -i hyperdx mongo --quiet hyperdx
    stdin: |
      var apiKey = {{ hyperdx_ingestion_api_key | to_json }};
      var teams = db.teams.find({}, {name: 1, _id: 1}).toArray();
      if (teams.length !== 1) {
        print("ERROR: expected exactly one team, found " + teams.length + ": " + JSON.stringify(teams));
        print("Refusing to apply apiKey blindly. To proceed, remove extra teams via:");
        print("  podman exec -i hyperdx mongo hyperdx --eval 'db.teams.deleteOne({_id: ObjectId(\"<id>\")})'");
        quit(1);
      }
      var result = db.teams.updateOne({}, {$set: {apiKey: apiKey, collectorAuthenticationEnforced: true}});
      print(JSON.stringify(result));
  register: hyperdx_mongo_bootstrap
  changed_when: >-
    '"modifiedCount" : 1' in hyperdx_mongo_bootstrap.stdout
    or '"modifiedCount":1' in hyperdx_mongo_bootstrap.stdout
  failed_when: >-
    hyperdx_mongo_bootstrap.rc != 0
    or "ERROR:" in hyperdx_mongo_bootstrap.stdout
    or not (
      '"matchedCount" : 1' in hyperdx_mongo_bootstrap.stdout
      or '"matchedCount":1' in hyperdx_mongo_bootstrap.stdout
    )
  when: not ansible_check_mode
  no_log: true
  become: true
  tags:
    - hyperdx

# When apiKey rotated on a re-apply, restart the unit so the OTel
# collector re-reads the team's apiKey from mongo immediately rather
# than waiting for the supervisor's ~30s opamp poll + child restart
# cycle. Off-host shippers see <15s of restart instead of a 30-90s
# 401 window. Gated on `409 register` so a fresh first-apply (where
# modifiedCount=1 fires from the initial apiKey-set right after the
# brand-new team was created seconds ago) doesn't redundantly restart.
- name: Restart hyperdx so the collector picks up the rotated apiKey
  systemd:
    name: hyperdx.service
    state: restarted
  when:
    - not ansible_check_mode
    - hyperdx_mongo_bootstrap is defined
    - hyperdx_mongo_bootstrap.changed
    - hyperdx_register.status | default(200) == 409
  become: true
  tags:
    - hyperdx
