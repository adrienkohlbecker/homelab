---
- name: Set up hyperdx system user, group, and config dir
  import_role:
    name: service_user
    tasks_from: user
  vars:
    service_user_args:
      name: hyperdx
  tags:
    - hyperdx

# The image's clickhouse-server drops privileges to in-namespace uid 101
# at startup. With the bare 1:1 uidmap fall-through that uid would land
# on whatever the host has at 101 (commonly systemd-journal on Ubuntu) --
# semantic noise, and breaks ZFS replication portability across hosts
# whose system-package layout differs. Allocate a dedicated host system
# user so the +101 uidmap override in the unit routes container 101 to
# a meaningful host owner. `config_dir: false` because this user only
# exists as a host-side name for the userns mapping; it doesn't get a
# /mnt/services/<name> dir of its own.
#
# MongoDB's user (uid 100) is also present in the image but the
# entrypoint runs `mongod` without dropping privileges, so its files
# land as in-namespace root (=hyperdx on the host) -- no override
# needed. If a future image starts dropping to uid 100, add a
# hyperdx_mongodb user and a +100 mapping then.
- name: Set up hyperdx_clickhouse system user
  import_role:
    name: service_user
    tasks_from: user
  vars:
    service_user_args:
      name: hyperdx_clickhouse
      config_dir: false
  tags:
    - hyperdx

# The all-in-one image bundles three stateful daemons (ClickHouse,
# MongoDB, OTel collector) writing to three distinct paths. Split into
# siblings under /mnt/services/hyperdx so each can become its own ZFS
# child dataset later (ClickHouse benefits from larger recordsize than
# MongoDB).
- name: Create hyperdx mongo data subdirectory
  when: not (ansible_check_mode and hyperdx_user.changed)
  file:
    dest: /mnt/services/hyperdx/db
    state: directory
    owner: hyperdx
    group: hyperdx
    mode: "0755"
  become: true
  tags:
    - hyperdx

# One-shot mkdir rather than `file:` because the container's
# clickhouse-server chowns these bind-mounts to its internal `clickhouse`
# user (mapped via the +101 override to hyperdx_clickhouse on the host)
# on first start; re-asserting owner=hyperdx with `file:` would flip
# changed=true on every subsequent apply.
- name: Create hyperdx clickhouse subdirectories
  when: not (ansible_check_mode and hyperdx_user.changed)
  shell: |
    set -euo pipefail
    mkdir -p /mnt/services/hyperdx/{clickhouse,clickhouse_logs}
    chown hyperdx:hyperdx /mnt/services/hyperdx/{clickhouse,clickhouse_logs}
    chmod 0755 /mnt/services/hyperdx/{clickhouse,clickhouse_logs}
  args:
    executable: /bin/bash
    creates: /mnt/services/hyperdx/clickhouse_logs
  become: true
  tags:
    - hyperdx

- name: Install hyperdx service
  import_role:
    name: systemd_unit
    tasks_from: install
  vars:
    systemd_unit_args:
      src: hyperdx.service.j2
      condition: "{{ not (ansible_check_mode and hyperdx_user.changed) }}"
  tags:
    - hyperdx

- name: Enable hyperdx service
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: hyperdx
      condition: "{{ not (ansible_check_mode and (hyperdx_service_result.changed or hyperdx_user.changed)) }}"
      restart: "{{ hyperdx_service_result.changed }}"
  tags:
    - hyperdx

# Per-IP rate-limit zone for /v1/logs. limit_req_zone is http{}-scope and
# can't live inside server{}, so it goes in /etc/nginx/conf.d/ instead of
# the per-site server_conf snippet. Sized at 10MB (~160k tracked IPs) at
# 10r/s -- fluent-bit's default flush cadence is 1-5s, generous for
# legitimate shippers while capping the cost of an unauthenticated flood.
- name: Install hyperdx OTLP rate-limit zone
  import_role:
    name: nginx
    tasks_from: conf_d
  vars:
    nginx_conf_d_args:
      name: hyperdx_otlp.conf
      content: |
        # Managed by roles/hyperdx.
        limit_req_zone $binary_remote_addr zone=hyperdx_otlp:10m rate=10r/s;
  tags:
    - hyperdx

- name: Configure nginx
  import_role:
    name: nginx
    tasks_from: site
  vars:
    nginx_site_args:
      subdomain: hyperdx
      proxy_pass: http://localhost:{{ service_ports.hyperdx }}/
      # The UI on / is gated by Authelia forward-auth. The custom
      # location /v1/logs below is a sibling block with no auth_request
      # directive, so off-host OTLP shippers authenticate via the Bearer
      # token in the Authorization header (validated by the OTel
      # collector's bearertokenauth extension) and never hit Authelia.
      auth: required
      server_conf: |
        # OTLP HTTP ingestion endpoint -- off-host log shippers (pug
        # etc., where fluent-bit can't hit loopback) POST here over
        # public TLS. Auth is the per-team ingestion API key in the
        # Authorization header, validated by the OTel collector's
        # bearertokenauth extension; nginx just forwards it.
        location = /v1/logs {
          # Off-host shippers must see a plain 401 on auth failure, not
          # the Authelia 302-redirect chain. The server-level
          # `error_page 401 =302 https://auth.<domain>/?rd=...` set by
          # `auth: required` would otherwise rewrite the 401 below.
          # Override with a named location that re-emits 401 verbatim.
          error_page 401 = @v1_logs_unauthorized;
          # Reject obviously-empty Authorization at the edge so we never
          # buffer up to client_max_body_size before the OTel collector
          # rejects them. The regex matches empty / whitespace-only /
          # `Bearer ` with no token; anything else (real key, junk key,
          # whatever) passes through to bearertokenauth for the actual
          # validation -- a length-based edge check would be arbitrary
          # and the downstream extension is the source of truth. `if` +
          # `return` is one of the documented-safe shapes despite "if
          # is evil" elsewhere.
          if ($http_authorization ~ "^\s*(Bearer\s*)?$") { return 401; }
          # Per-IP rate-limit (zone declared in conf.d/hyperdx_otlp.conf).
          # Return 429 on rate-shed so shippers treat it as backpressure
          # rather than an upstream-outage 5xx and back off cleanly.
          limit_req_status 429;
          limit_req zone=hyperdx_otlp burst=20 nodelay;
          proxy_pass http://localhost:{{ service_ports.hyperdx_otlp_http }}/v1/logs;
          proxy_http_version 1.1;
          proxy_set_header Host              $host;
          proxy_set_header X-Real-IP         $remote_addr;
          proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
          # OTLP is RPC-shaped, not streaming. Default `on` would buffer
          # the whole 4MB body before forwarding, holding an nginx worker
          # while a slow client trickles. Off makes nginx forward bytes
          # as they arrive, capping per-connection cost during a flood.
          proxy_request_buffering off;
          # OTLP batches sit comfortably below nginx's 1MB default but
          # raise it explicitly to give zstd-compressed flushes room.
          client_max_body_size 4M;
        }
        location @v1_logs_unauthorized {
          return 401;
        }
  tags:
    - hyperdx

# jq is used by the bootstrap script below to safely JSON-escape the
# admin password (POST body) and the apiKey (mongo JS literal) so a
# future vault value containing `"`, `\`, or `$` doesn't break the
# literal or mutate an unintended field. Standard ubuntu package.
- name: Install jq
  apt:
    pkg: jq
    cache_valid_time: 3600
  become: true
  tags:
    - hyperdx

# Bootstrap is conceptually one-time: the team + apiKey + opamp wiring
# persist in MongoDB (bind-mounted ZFS dataset), so out-of-band hyperdx
# restarts don't need a re-run. The `creates:` sentinel handles first
# install; on a vault rotation the script content changes, the wipe
# task below removes the sentinel, and `creates:` re-fires the run.
# For mongo data loss (snapshot restore, accident), the operator
# manually re-runs `sudo /usr/local/bin/hyperdx_bootstrap.sh`.
- name: Install hyperdx bootstrap script
  template:
    src: hyperdx_bootstrap.sh.j2
    dest: /usr/local/bin/hyperdx_bootstrap.sh
    owner: root
    group: root
    mode: "0700"
    validate: bash -n %s
  no_log: true
  become: true
  register: hyperdx_bootstrap_script
  tags:
    - hyperdx

- name: Reset hyperdx bootstrap sentinel on script change
  when: hyperdx_bootstrap_script.changed
  file:
    path: /var/lib/hyperdx/.bootstrapped
    state: absent
  become: true
  tags:
    - hyperdx

- name: Run hyperdx bootstrap
  command: /usr/local/bin/hyperdx_bootstrap.sh
  args:
    creates: /var/lib/hyperdx/.bootstrapped
  when: not ansible_check_mode
  no_log: true
  become: true
  tags:
    - hyperdx
