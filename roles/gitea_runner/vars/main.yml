gitea_runner_version: "1.0.3"

# Labels written into .runner on every play, so a host_vars override can add
# or remove a label without re-registering the runner. The runner reports
# these to gitea on each connection; the gitea side updates lazily.
#
# Default to the gitea-provided runner-images so a plain workflow
# (`runs-on: ubuntu-latest`) Just Works without baking a custom image.
# Override per-host via gitea_runner_labels in host_vars if a workflow needs
# something more specific.
gitea_runner_labels:
  - "ubuntu-latest:docker://gitea/runner-images:ubuntu-latest"
  - "ubuntu-22.04:docker://gitea/runner-images:ubuntu-22.04"
  - "ubuntu-24.04:docker://gitea/runner-images:ubuntu-24.04"

# Upstream renamed the project (and the binary, and the canonical repo path)
# in v1.0.0 -- `gitea/act_runner` -> `gitea/runner`, `act_runner` -> `gitea-runner`.
# Old gitea.com URLs still redirect but the canonical asset name is now
# `gitea-runner-<ver>-linux-<arch>`.
gitea_runner_release:
  x86_64:
    url: "{{ mirror_gitea_com }}/gitea/runner/releases/download/v{{ gitea_runner_version }}/gitea-runner-{{ gitea_runner_version }}-linux-amd64"
    sha256: "cc25c5b0c7c1fcc9ee31e8812cf1b3751ebdbc9893082328057939f3623c0945"
  aarch64:
    url: "{{ mirror_gitea_com }}/gitea/runner/releases/download/v{{ gitea_runner_version }}/gitea-runner-{{ gitea_runner_version }}-linux-arm64"
    sha256: "4f8b65068a3caa64a8d9e468757b78d7e18d4f2ff91e7d372c6ca4b994fdfd82"
