- name: _verify | Gitea_runner user exists
  command: getent passwd gitea_runner
  changed_when: false
  become: true

- name: _verify | Gitea-runner binary version matches gitea_runner_version
  command: gitea-runner --version
  register: _verify_version
  changed_when: false
  # Substring-match would let pin 1.0.3 be satisfied by 1.0.30. regex_search
  # extracts the first semver-shaped token from `gitea-runner version X.Y.Z`
  # and equates it exactly.
  failed_when: (_verify_version.stdout | regex_search('\d+\.\d+\.\d+')) != gitea_runner_version
  become: true

- name: _verify | Gitea_runner config file exists
  stat:
    path: /mnt/services/gitea_runner/config.yml
  register: _verify_config_file
  failed_when: not _verify_config_file.stat.exists
  become: true

- name: _verify | .runner is valid JSON and carries templated name + labels
  slurp:
    src: /mnt/services/gitea_runner/.runner
  register: _verify_runner_b64
  vars:
    _runner_data: "{{ _verify_runner_b64.content | b64decode | from_json }}"
  # Asserts the role's per-apply rewrite contract: .runner is valid JSON,
  # the name field matches inventory_hostname (so gitea sees this host's
  # entry under the expected name), and the labels list matches
  # gitea_runner_labels (so a host_vars label override actually lands).
  #
  # Label-shape note: .runner.labels carries the FULL registration
  # strings ("name:scheme://arg") -- daemon.go writes ls.ToStrings() back
  # to .runner on each start. The Declare RPC sends only the parsed
  # names (ls.Names()), which is what the admin-API check below compares
  # against (via regex_replace to strip the ":scheme://arg" suffix).
  # Different shape, same source -- both correct.
  failed_when: >-
    _runner_data is not mapping
    or (_runner_data.name | default('')) != inventory_hostname
    or (_runner_data.labels | default([]) | sort) != (gitea_runner_labels | sort)
  become: true

- name: _verify | Gitea_runner.service is loaded and active
  systemd:
    name: gitea_runner
  register: _verify_unit
  failed_when: >-
    _verify_unit.status.LoadState != "loaded"
    or _verify_unit.status.ActiveState != "active"
  become: true

# The metrics endpoint exposes /healthz on the same listener as /metrics
# (see config.yml.j2). Returns 200 only once the daemon's main loop is
# up -- a stronger signal than systemd ActiveState, which flips active
# the moment ExecStart's process exec's, before the daemon has connected
# to gitea. Runs in both prod and qemu_test (loopback, no auth).
- name: _verify | Gitea_runner daemon is serving /healthz
  uri:
    url: "http://127.0.0.1:{{ service_ports.gitea_runner_metrics }}/healthz"
    status_code: 200
  register: _verify_healthz
  retries: 30
  delay: 2
  until: _verify_healthz.status | default(0) == 200
  become: true

# Functional end-to-end check via gitea's documented admin API rather
# than reaching into action_runner via sqlite. Skipped outside
# qemu_test: prod gitea isn't local and we don't have admin auth to
# its API from the playbook.
#
# Split into fetch (no_log; the response body carries no secrets but
# we ran with no_log for years and won't change that contract here)
# and assert (per-predicate so a CI failure prints which check tripped
# instead of an opaque "failed in retries"). The retry sits on the
# fetch -- the daemon's Declare RPC may take a couple of seconds to
# land after start -- and the assert just consumes the latest snapshot.
#
# Label comparison detail: gitea-runner parses "name:scheme://arg" via
# labels.Parse and Declares only label.Name (see internal/pkg/labels/
# labels.go in v1.0.3). The API echoes that .name. So we compare
# against the part-before-colon, not the full registration string.
- name: _verify | Fetch gitea_runner registration via admin API (test only)
  when: qemu_test
  uri:
    url: http://localhost:3000/api/v1/admin/actions/runners
    user: testadmin
    password: testadminpw
    force_basic_auth: true
    status_code: 200
  register: _verify_runners_api
  vars:
    _matched_runner: "{{ (_verify_runners_api.json.runners | default([]) | selectattr('name', 'equalto', inventory_hostname) | list | first) | default({}) }}"
  retries: 15
  delay: 2
  # status_code: 200 already gates retries on the response code; only
  # the row-level predicate needs to appear here so the Declare RPC has
  # time to land after daemon start.
  until: _matched_runner.name | default('') == inventory_hostname
  become: true
  no_log: true

- name: _verify | Assert gitea-side runner row matches expected shape (test only)
  when: qemu_test
  vars:
    _expected_label_names: "{{ gitea_runner_labels | map('regex_replace', ':.*$', '') | list | sort }}"
    _matched_runner: "{{ (_verify_runners_api.json.runners | default([]) | selectattr('name', 'equalto', inventory_hostname) | list | first) | default({}) }}"
    _actual_label_names: "{{ _matched_runner.labels | default([]) | map(attribute='name') | list | sort }}"
  assert:
    that:
      - _matched_runner.name | default('') == inventory_hostname
      - _actual_label_names == _expected_label_names
      - not (_matched_runner.disabled | default(true))
    fail_msg: |
      gitea-side runner row mismatch:
        name: expected={{ inventory_hostname }} actual={{ _matched_runner.name | default('<missing>') }}
        labels: expected={{ _expected_label_names }} actual={{ _actual_label_names }}
        disabled: {{ _matched_runner.disabled | default('<missing>') }}

# End-to-end smoke: create a repo, push a workflow, wait for a green
# run. Catches "daemon registered but can't actually pick + complete
# a job" -- failure modes like the workflow-poll long-poll being
# broken, the Run RPC returning a malformed shape, or step-output
# upload failing -- none of which the /healthz or admin-API checks
# would catch. qemu_test only; uses the testadmin from _setup.yml.
# host_vars/box.yml's `test-host:host` label routes the workflow
# directly on the VM host (no docker image pull cost).
- name: _verify | Mint API access token for testadmin (test only)
  when: qemu_test
  command: >-
    /usr/local/bin/gitea --config /etc/gitea/app.ini admin user generate-access-token
    --username testadmin
    --token-name runner_smoke_{{ ansible_date_time.epoch }}
    --scopes all --raw
  register: _verify_admin_token
  changed_when: false
  become: true
  become_user: git
  no_log: true

- name: _verify | Create throwaway repo for runner smoke (test only)
  when: qemu_test
  uri:
    url: http://127.0.0.1:3000/api/v1/user/repos
    method: POST
    url_username: testadmin
    url_password: "{{ _verify_admin_token.stdout | trim }}"
    force_basic_auth: true
    body_format: json
    body:
      name: runner_smoke
      auto_init: true
      default_branch: main
    # 201 on first run, 409 on a --keep re-run.
    status_code: [ 201, 409 ]
  no_log: true

- name: _verify | Push smoke workflow via Files API (test only)
  when: qemu_test
  vars:
    _smoke_workflow: |
      name: smoke
      on: push
      jobs:
        smoke:
          runs-on: [test-host]
          steps:
            - run: echo ok
  uri:
    url: http://127.0.0.1:3000/api/v1/repos/testadmin/runner_smoke/contents/.gitea/workflows/smoke.yml
    method: POST
    url_username: testadmin
    url_password: "{{ _verify_admin_token.stdout | trim }}"
    force_basic_auth: true
    body_format: json
    body:
      message: "add smoke workflow"
      content: "{{ _smoke_workflow | b64encode }}"
    # 201 on first run, 422 on a --keep re-run (file already exists).
    status_code: [ 201, 422 ]
  no_log: true

# Workflow files in .gitea/workflows/ are auto-triggered by the push
# above; test-host:host routes to the host-mode runner. 60*2 = 120s
# upper bound -- enough for fetch_interval (2s) + step exec + state
# report. `first` works because gitea returns runs newest-first.
- name: _verify | Wait for smoke workflow run to succeed (test only)
  when: qemu_test
  uri:
    url: http://127.0.0.1:3000/api/v1/repos/testadmin/runner_smoke/actions/runs
    url_username: testadmin
    url_password: "{{ _verify_admin_token.stdout | trim }}"
    force_basic_auth: true
    status_code: 200
  register: _verify_runs
  vars:
    _latest_run: "{{ (_verify_runs.json.workflow_runs | default([]) | first) | default({}) }}"
  until:
    - _latest_run.status | default('') == 'completed'
    - _latest_run.conclusion | default('') == 'success'
  retries: 60
  delay: 2
  no_log: true

- name: _verify | Assert smoke workflow run succeeded (test only)
  when: qemu_test
  vars:
    _latest_run: "{{ (_verify_runs.json.workflow_runs | default([]) | first) | default({}) }}"
  assert:
    that:
      - _latest_run.status | default('') == 'completed'
      - _latest_run.conclusion | default('') == 'success'
    fail_msg: |
      smoke workflow did not complete successfully:
        status: {{ _latest_run.status | default('<missing>') }}
        conclusion: {{ _latest_run.conclusion | default('<missing>') }}
        run_number: {{ _latest_run.run_number | default('<missing>') }}
