# Fail-loud on missing inputs rather than silently substituting an
# empty registration token or rendering an empty labels list -- both
# would surface as opaque "gitea rejected the runner" errors deep in
# the register / Declare RPC instead of at parse time.
- name: Assert required inputs are defined
  assert:
    that:
      - gitea_runner_labels is defined
      - gitea_runner_labels | length > 0
      - qemu_test or (gitea_runner_registration_token is defined and gitea_runner_registration_token | length > 0)
    fail_msg: >-
      gitea_runner needs gitea_runner_labels (group_vars/all.yml) and,
      in prod, gitea_runner_registration_token (vaulted in host_vars).
  tags:
    - gitea_runner

- name: Set up gitea_runner system user, group, and config dir
  import_role:
    name: service_user
    tasks_from: user
  vars:
    service_user_args:
      name: gitea_runner
      home: /mnt/scratch/gitea_runner
      createhome: true
  tags:
    - gitea_runner

- name: Create runtime directories
  when: not (ansible_check_mode and gitea_runner_user.changed)
  file:
    dest: "{{ item }}"
    state: directory
    owner: gitea_runner
    group: gitea_runner
    mode: "0755"
  become: true
  loop:
    - /mnt/scratch/gitea_runner/cache
    - /mnt/scratch/gitea_runner/workdir
  tags:
    - gitea_runner

# Linger has to be on before the rootless podman socket can come up:
# gitea_runner.service connects to /run/user/<uid>/podman/podman.sock,
# which is owned by the user manager and only present while
# user@<uid>.service is alive. The helper enables linger and waits for
# the user manager (linger triggers it asynchronously) so downstream
# rootless podman.socket tasks find a live bus.
- name: Turn on linger
  import_role:
    name: linger
    tasks_from: linger
  vars:
    linger_args:
      name: gitea_runner
      uid: "{{ gitea_runner_user.uid }}"
  tags:
    - gitea_runner

- name: Configure gitea_runner
  when: not (ansible_check_mode and gitea_runner_user.changed)
  template:
    src: config.yml.j2
    dest: /mnt/services/gitea_runner/config.yml
    owner: gitea_runner
    group: gitea_runner
    mode: "0640"
    backup: true
    validate: python3 -c 'import yaml,sys; yaml.safe_load(open(sys.argv[1]))' "%s"
  register: gitea_runner_conf
  become: true
  tags:
    - gitea_runner

# Upstream renamed the binary `act_runner` -> `gitea-runner` in v1.0.0.
# Keep the on-disk path matching upstream's spelling (hyphen) so logs,
# ps output, and shell PATH usage all match what an operator would
# google. The role/user/unit follow the repo's underscore convention.
#
# No pre-check via `gitea-runner --version`: get_url with `checksum:`
# already short-circuits when the on-disk file matches, and re-downloads
# on a version bump (sha mismatch). A substring check on stdout would
# also miss the 1.0.3-vs-1.0.30 trap that _verify.yml's regex_search
# explicitly guards.
- name: Install gitea-runner
  get_url:
    url: "{{ gitea_runner_release[ansible_architecture].url }}"
    checksum: "sha256:{{ gitea_runner_release[ansible_architecture].sha256 }}"
    dest: /usr/local/bin/gitea-runner
    mode: "0755"
    owner: root
    group: root
  become: true
  register: gitea_runner_installed
  tags:
    - gitea_runner

# Mint a one-shot registration token in qemu_test only; prod's token
# comes from vault as gitea_runner_registration_token. `creates:`
# matches the Register task below so the mint is also skipped once
# .runner exists, keeping idempotence cheap. --config gets app.ini so
# gitea doesn't refuse with "Gitea is not supposed to be run as root"
# (I_AM_BEING_UNSAFE_RUNNING_AS_ROOT lives in app.ini, not env).
- name: Get registration token (test)
  when: qemu_test
  command: /usr/local/bin/gitea --config /etc/gitea/app.ini actions generate-runner-token
  args:
    creates: /mnt/services/gitea_runner/.runner
  register: gitea_runner_test_token
  become: true
  become_user: git
  no_log: true
  tags:
    - gitea_runner

# The shell `"$REGISTRATION_TOKEN"` expands into argv when bash exec()s
# gitea-runner, so /proc/<pid>/cmdline of the running register process
# briefly contains the token -- readable by any local user (default
# /proc mode, no hidepid). Bounded by the register window (<1s on a
# healthy gitea). Routing the token via env (rather than pasting it
# directly into the shell command) is no better here -- both end up
# expanded into argv. gitea-runner v1.0.3 has no --token-file or stdin
# input mode that would dodge the cmdline exposure; the only way out
# would be to run register inside a container so the cmdline visibility
# is scoped to that container's pid ns -- not worth the moving parts
# for a homelab where root + gitea_runner are the only principals.
# shell: (not command:) is required because we need a shell to expand
# $REGISTRATION_TOKEN. executable: /bin/bash so `set -o pipefail` (a
# bashism) is honoured; the env always sets the var, so `set -u` is safe.
#
# failed_when: false + the follow-up Surface task is the defence-in-
# depth pairing with no_log: true: hiding the task output would
# otherwise hide the real failure cause (gitea unreachable, token
# rejected, cert untrusted). The follow-up scrubs the token from
# stderr before failing loudly.
#
# REGISTRATION_TOKEN expression: in qemu_test the mint above set
# gitea_runner_test_token.stdout to a single-line token; in prod the
# vaulted gitea_runner_registration_token is the source. The 'TOKEN'
# fall-through covers check-mode + post-registration re-applies where
# the mint task was skipped (creates: .runner) and stdout is undefined
# -- the env still renders but `creates:` keeps register itself from
# executing, so the placeholder never reaches the wire.
- name: Register runner
  when: not (ansible_check_mode and gitea_runner_user.changed)
  shell: |
    set -euo pipefail
    gitea-runner register \
      -c /mnt/services/gitea_runner/config.yml \
      --no-interactive \
      --name {{ inventory_hostname | quote }} \
      --instance {{ ('http://localhost:3000' if qemu_test else 'https://gitea.' ~ inventory_hostname ~ '.' ~ domain) | quote }} \
      --token "$REGISTRATION_TOKEN"
  args:
    creates: /mnt/services/gitea_runner/.runner
    executable: /bin/bash
  environment:
    REGISTRATION_TOKEN: >-
      {{ (gitea_runner_test_token.stdout | default('') | trim or 'TOKEN')
         if qemu_test
         else gitea_runner_registration_token }}
  become: true
  become_user: gitea_runner
  register: gitea_runner_registration
  failed_when: false
  no_log: true
  tags:
    - gitea_runner

- name: Surface registration failure (token redacted)
  when:
    - gitea_runner_registration.rc is defined
    - gitea_runner_registration.rc != 0
  vars:
    # Guard against replace('', '<REDACTED>') -- which would inject the
    # marker between every character of stderr. Empty-token can happen
    # if the vault entry is empty (prod) or the fixture mint returned
    # no output (test).
    _stderr: "{{ gitea_runner_registration.stderr | default('') }}"
    _token: >-
      {{ (gitea_runner_test_token.stdout | default('') | trim)
         if qemu_test
         else (gitea_runner_registration_token | default('')) }}
  fail:
    msg: |
      gitea-runner register failed (rc={{ gitea_runner_registration.rc }}).
      Sanitised stderr:
      {{ _stderr | replace(_token, '<REDACTED>') if _token | length > 0 else _stderr }}
  tags:
    - gitea_runner

# gitea-runner register's umask determines .runner's initial mode; v1.0.3
# happens to land at 0600 but the role shouldn't bet on upstream's umask --
# .runner holds the long-lived runner credential (UUID + secret) that lets
# the daemon impersonate this runner against gitea, pull in-flight job
# payloads, etc. A workflow that gains read access to .runner via the
# rootless podman socket has full runner-identity takeover.
- name: Lock down .runner permissions
  when: not (ansible_check_mode and gitea_runner_user.changed)
  file:
    path: /mnt/services/gitea_runner/.runner
    state: file
    mode: "0600"
    owner: gitea_runner
    group: gitea_runner
  become: true
  tags:
    - gitea_runner

- name: Enable and start rootless podman socket
  when: not (ansible_check_mode and (gitea_runner_user.changed or gitea_runner_linger.changed))
  systemd:
    name: podman.socket
    enabled: true
    state: started
    scope: user
  become: true
  become_user: gitea_runner
  register: gitea_runner_podman_socket
  tags:
    - gitea_runner

- name: Install podman prune timer for gitea_runner
  import_role:
    name: podman
    tasks_from: prune
  vars:
    podman_prune_args:
      user: gitea_runner
      condition: "{{ not (ansible_check_mode and gitea_runner_user.changed) }}"
  tags:
    - gitea_runner

- name: Install gitea_runner service
  import_role:
    name: systemd_unit
    tasks_from: install
  vars:
    systemd_unit_args:
      src: gitea_runner.service.j2
      condition: "{{ not (ansible_check_mode and gitea_runner_user.changed) }}"
  tags:
    - gitea_runner

- name: Enable gitea_runner service
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: gitea_runner
      condition: "{{ not (ansible_check_mode and (gitea_runner_service_result.changed or gitea_runner_user.changed)) }}"
      restart: "{{ gitea_runner_service_result.changed or gitea_runner_conf.changed or gitea_runner_registration.changed or gitea_runner_installed.changed or gitea_runner_podman_socket.changed }}"
  tags:
    - gitea_runner
