- name: _test | Install dependencies
  apt:
    pkg:
      - podman
      - git
      # podman's rootless mode shells out to newuidmap/newgidmap (in uidmap)
      # to read the subuid/subgid ranges. uidmap is only a Recommends of
      # podman, so install_recommends:false leaves it out -- pull it in
      # explicitly so podman can start under gitea_runner.
      - uidmap
    install_recommends: false
    cache_valid_time: 3600
  become: true

# In production, host-wide subuid/subgid allocation happens in the `subid` role
# (driven by host_vars `subid_users`). The role-only test harness doesn't apply
# that role, so we pre-seed an entry for gitea_runner here -- without it, rootless
# podman refuses to start with "no subuid ranges found for user gitea_runner".
- name: _test | Pre-allocate subuid for gitea_runner
  lineinfile:
    path: /etc/subuid
    line: "gitea_runner:100000:65536"
    regexp: "^gitea_runner:"
    create: true
    owner: root
    group: root
    mode: "0644"
  become: true

- name: _test | Pre-allocate subgid for gitea_runner
  lineinfile:
    path: /etc/subgid
    line: "gitea_runner:100000:65536"
    regexp: "^gitea_runner:"
    create: true
    owner: root
    group: root
    mode: "0644"
  become: true

- name: _test | Install gitea binary
  import_role:
    name: gitea
    tasks_from: install

- name: _test | Create gitea directories
  file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - /var/lib/gitea/custom/conf
    - /var/lib/gitea/data/gitea-repositories
    - /var/lib/gitea/log
  become: true

- name: _test | Write gitea app.ini
  copy:
    dest: /var/lib/gitea/custom/conf/app.ini
    mode: "0644"
    backup: true
    content: |
      I_AM_BEING_UNSAFE_RUNNING_AS_ROOT=true

      [database]
      DB_TYPE = sqlite3

      [security]
      INSTALL_LOCK = true

      [actions]
      ENABLED = true
  become: true

# systemd-run --unit=<name> registers a transient unit; if a unit by
# that name already exists (running, exited, or failed), systemd-run
# errors. Use the runtime unit file as the idempotence sentinel: file
# present → already launched, skip; absent → first run or unit was
# garbage-collected, launch it.
- name: _test | Start gitea via systemd-run
  command: >-
    systemd-run --unit=gitea-test --setenv=HOME=/root
    /usr/local/bin/gitea web --work-path /var/lib/gitea
  args:
    creates: /run/systemd/transient/gitea-test.service
  become: true

- name: _test | Wait for gitea API to be reachable
  uri:
    url: http://localhost:3000/api/v1/version
    status_code: 200
  register: _test_gitea_ready
  retries: 30
  delay: 1
  until: _test_gitea_ready.status == 200
