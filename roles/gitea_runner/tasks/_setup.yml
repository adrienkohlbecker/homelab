# Pre-create /mnt/services as world-traversable before roles/gitea runs.
# Otherwise ansible's file: module, when creating /mnt/services/gitea
# (mode 0750 git:git), propagates the leaf's owner+mode onto any
# newly-created intermediates -- which makes /mnt/services 0750 git:git
# and locks gitea_runner out of its own config dir later. In prod
# /mnt/services is a ZFS mountpoint so this isn't an issue; in the
# fixture it's a regular dir created lazily by whichever role drills
# first.
- name: _test | Ensure /mnt/services is world-traversable
  file:
    path: /mnt/services
    state: directory
    mode: "0755"
    owner: root
    group: root
  become: true

- name: _test | Install dependencies
  apt:
    pkg:
      - podman
      - git
      # podman's rootless mode shells out to newuidmap/newgidmap (in uidmap)
      # to read the subuid/subgid ranges. uidmap is only a Recommends of
      # podman, so install_recommends:false leaves it out -- pull it in
      # explicitly so podman can start under gitea_runner.
      - uidmap
    install_recommends: false
    cache_valid_time: 3600
  become: true

# In production, host-wide subuid/subgid allocation happens in the `subid` role
# (driven by host_vars `subid_users`). The role-only test harness doesn't apply
# that role, so we pre-seed an entry for gitea_runner here -- without it, rootless
# podman refuses to start with "no subuid ranges found for user gitea_runner".
- name: _test | Pre-allocate subuid for gitea_runner
  lineinfile:
    path: /etc/subuid
    line: "gitea_runner:100000:65536"
    regexp: "^gitea_runner:"
    create: true
    owner: root
    group: root
    mode: "0644"
  become: true

- name: _test | Pre-allocate subgid for gitea_runner
  lineinfile:
    path: /etc/subgid
    line: "gitea_runner:100000:65536"
    regexp: "^gitea_runner:"
    create: true
    owner: root
    group: root
    mode: "0644"
  become: true

# Install nginx + snakeoil certs ahead of roles/gitea, which configures
# an nginx site at gitea.<host>.<domain>. Mirrors how gitea/_setup.yml
# brings nginx in for the gitea role's own harness.
- name: _test | Install nginx (snakeoil + base config)
  import_role:
    name: _test
    tasks_from: nginx

# Use the prod gitea role end-to-end. Stubs keep the template
# idempotent across harness phases without needing vault material in
# test scope; gitea won't sign anything load-bearing in the fixture's
# lifetime.
- name: _test | Install + start gitea via the prod role
  import_role:
    name: gitea
  vars:
    gitea_jwt_secret: "test-jwt-secret-stub"
    gitea_internal_token: "test-internal-token-stub"
    gitea_lfs_jwt_secret: "test-lfs-jwt-secret-stub"
    gitea_secret_key: "test-secret-key-stub"
    gitea_smtp_user: "testadmin@example.com"
    gitea_smtp_from: "testadmin@example.com"
    gitea_smtp_password: "test-smtp-password-stub"

- name: _test | Wait for gitea API to be reachable
  uri:
    url: http://localhost:3000/api/v1/version
    status_code: 200
  register: _test_gitea_ready
  retries: 30
  delay: 1
  until: _test_gitea_ready.status == 200

# Admin user for _verify.yml's API checks against
# /api/v1/admin/actions/runners. Basic auth keeps the verify side
# simple -- no token mint/persist dance, and the credentials never
# leave the test fixture (password is hard-coded since the fixture
# itself is throwaway). `already exists` is the idempotent re-run
# path; everything else fails loudly.
- name: _test | Create gitea admin user
  command: >-
    /usr/local/bin/gitea --config /etc/gitea/app.ini admin user create
    --username testadmin --password testadminpw --email testadmin@example.com
    --admin --must-change-password=false
  register: _test_admin_create
  failed_when:
    - _test_admin_create.rc != 0
    - "'already exists' not in _test_admin_create.stderr"
  changed_when: _test_admin_create.rc == 0
  become: true
  become_user: git
  no_log: true
