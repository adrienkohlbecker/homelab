# Labels written into config.yml's runner.labels. The daemon's Declare
# RPC pushes them to gitea on each start, and SaveRegistration writes
# them back to .runner -- so editing this list and restarting the
# service updates the gitea-side runner row without re-registration.
# See internal/app/cmd/daemon.go in gitea/runner v1.0.3.
#
# Default to the gitea-provided runner-images so a plain workflow
# (`runs-on: ubuntu-latest`) Just Works without baking a custom image.
# Override per-host via gitea_runner_labels in host_vars if a workflow
# needs something more specific.
#
# defaults/ rather than vars/ so host_vars overrides take precedence
# (role vars sit above host_vars in ansible's precedence ladder).
gitea_runner_labels:
  - "ubuntu-latest:docker://gitea/runner-images:ubuntu-latest"
  - "ubuntu-22.04:docker://gitea/runner-images:ubuntu-22.04"
  - "ubuntu-24.04:docker://gitea/runner-images:ubuntu-24.04"
