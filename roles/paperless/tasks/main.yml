# Required inputs live in group_vars/{prod,test}.yml. Assert them
# non-empty: an empty paperless_secret_key boots Django with a blank
# signing key (CSRF/session breakage) and an empty OIDC secret yields a
# login page that passes the _verify markers yet fails every real
# Authelia handshake -- both reach `active` with no failure signal.
- name: Assert required paperless inputs are set
  assert:
    that:
      - paperless_secret_key | default('') | length > 0
      - paperless_oidc_client_secret | default('') | length > 0
    fail_msg: >-
      paperless_secret_key and paperless_oidc_client_secret must be set
      (group_vars/{prod,test}.yml).
  tags:
    - paperless

# Join the redis-owned network so paperless can resolve `redis` via
# aardvark-dns and connect to the redis container on the same bridge.
# Both producer (redis) and consumer (paperless) create this network
# independently -- it's idempotent, so each role stays self-contained.
- name: Create redis podman network
  when: not ansible_check_mode
  containers.podman.podman_network:
    name: redis
    disable_dns: false
    state: present
  become: true
  tags:
    - paperless

- name: Set up paperless system user, group, and config dir
  import_role:
    name: service_user
    tasks_from: user
  vars:
    service_user_args:
      name: paperless
  tags:
    - paperless

- name: Create configuration directory
  when: not (ansible_check_mode and paperless_user.changed)
  file:
    dest: /mnt/services/paperless/{{ item }}
    state: directory
    owner: paperless
    group: paperless
    mode: "0700"
  with_items:
    - data
    - media
    - consume
    - export
  become: true
  tags:
    - paperless

# Paperless mixes its SQLite DBs with the Whoosh index, classifier model,
# and logs in the same data/ dir. Whoosh and the model files don't want
# 4K records; only the two .db files belong on the sqlite dataset.
# Symlink them in place (matching-path bind so the host-side symlink
# resolves identically inside the container).
- name: Create sqlite directory
  when: not (ansible_check_mode and paperless_user.changed)
  file:
    dest: /mnt/services/sqlite/paperless
    state: directory
    owner: paperless
    group: paperless
    mode: "0700"
  become: true
  tags:
    - paperless

- name: Symlink paperless SQLite DBs onto sqlite dataset
  when: not (ansible_check_mode and paperless_user.changed)
  file:
    src: "/mnt/services/sqlite/paperless/{{ item }}"
    dest: "/mnt/services/paperless/data/{{ item }}"
    state: link
    force: true
    owner: paperless
    group: paperless
    follow: false
  become: true
  loop:
    - db.sqlite3
    - celerybeat-schedule.db
  tags:
    - paperless

- name: Create paperless secret key
  import_role:
    name: podman_secret
    tasks_from: secret
  vars:
    podman_secret_args:
      name: paperless_secret_key
      data: "{{ paperless_secret_key }}"
  tags:
    - paperless

# Django-allauth's SOCIALACCOUNT_PROVIDERS config carries the OIDC
# client secret inline; render it to a podman secret so it's mounted
# as a file under /run/secrets/ instead of landing in `podman inspect`
# (paperless-ngx reads any PAPERLESS_* env via _FILE if pointed at a
# path -- see CLAUDE.md "Container Secrets" #1).
- name: Compose paperless OIDC providers config
  set_fact:
    paperless_socialaccount_providers:
      openid_connect:
        APPS:
          - provider_id: authelia
            name: Authelia
            client_id: paperless
            secret: "{{ paperless_oidc_client_secret }}"
            settings:
              server_url: "https://auth.{{ authelia_cookie_domain }}/.well-known/openid-configuration"
  tags:
    - paperless

- name: Create paperless OIDC providers secret
  import_role:
    name: podman_secret
    tasks_from: secret
  vars:
    podman_secret_args:
      name: paperless_socialaccount_providers
      data: "{{ paperless_socialaccount_providers | to_json }}"
  tags:
    - paperless

- name: Install paperless service
  import_role:
    name: systemd_unit
    tasks_from: install
  vars:
    systemd_unit_args:
      src: paperless.service.j2
      condition: "{{ not (ansible_check_mode and paperless_user.changed) }}"
  tags:
    - paperless

- name: Enable paperless service
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: paperless
      condition: "{{ not (ansible_check_mode and (paperless_service_result.changed or paperless_user.changed)) }}"
      restart: "{{ paperless_service_result.changed or paperless_secret_key_rotated or paperless_socialaccount_providers_rotated }}"
  tags:
    - paperless

# Paperless-ngx (Django) has no env var for SQLite PRAGMA. Without
# this, db.sqlite3 stays in rollback-journal mode and document ingest
# (write-heavy) takes a per-commit fsync hit. WAL is persisted in the
# DB header so the convert is one-shot.
#
# Read + write both go through the paperless container's bundled
# libsqlite. Host Jammy sqlite3 (3.37) cannot prepare the schema
# paperless 2.20 / Django 5.x writes -- documents_customfieldinstance
# uses generated columns with non-deterministic functions, allowed
# since libsqlite 3.38. The Trixie-based container ships 3.46.
#
# Stop the service across the PRAGMA write: journal_mode=WAL needs an
# exclusive lock; if Django is holding the DB the PRAGMA silently
# returns the current mode without converting, leaving the operator
# in rollback-journal mode without a failure signal. The
# symlink+ownership guard prevents in-container-root (which maps to
# host uid `paperless` via uidmap) from swapping db.sqlite3 for a
# symlink to a root-owned target before the PRAGMA fires.
#
# First-install two-pass: the DB doesn't exist until Django creates
# it on first start, so the block skips. The next play run sees the
# DB, stops the service briefly, converts, and restarts.
- name: Detect paperless unit image
  when: not ansible_check_mode
  extract_podman_image:
    name: paperless
  register: paperless_unit_image
  become: true
  tags:
    - paperless

- name: Stat paperless sqlite DB
  stat:
    path: /mnt/services/sqlite/paperless/db.sqlite3
    follow: false
  register: paperless_sqlite_stat
  become: true
  tags:
    - paperless

- name: Read paperless sqlite journal mode
  command:
    argv:
      - podman
      - exec
      - paperless
      - python3
      - -c
      - 'import sqlite3; print(sqlite3.connect("/usr/src/paperless/data/db.sqlite3").execute("PRAGMA journal_mode").fetchone()[0])'
  register: paperless_sqlite_pragma
  changed_when: false
  when:
    - not ansible_check_mode
    - paperless_sqlite_stat.stat.exists
  become: true
  tags:
    - paperless

- name: Convert paperless sqlite to WAL
  when:
    - not ansible_check_mode
    - paperless_sqlite_stat.stat.exists
    - paperless_sqlite_pragma.stdout | default('') | trim != 'wal'
  become: true
  tags:
    - paperless
  block:
    - name: Assert paperless sqlite DB is a regular file owned by paperless
      assert:
        that:
          - paperless_sqlite_stat.stat.isreg
          - paperless_sqlite_stat.stat.pw_name == 'paperless'
        fail_msg: >-
          /mnt/services/sqlite/paperless/db.sqlite3 is a symlink or
          owned by another user; refusing to PRAGMA since WAL/SHM
          sidecars would land at an attacker-controlled path.

    - name: Stop paperless service for WAL conversion
      systemd:
        name: paperless
        state: stopped

    - name: Set paperless sqlite to WAL
      command:
        argv:
          - podman
          - run
          - --rm
          - --user
          - "{{ paperless_user.uid }}:{{ paperless_user.group }}"
          - --volume
          - /mnt/services/sqlite/paperless:/data
          - --entrypoint
          - /usr/local/bin/python3
          - "{{ paperless_unit_image.images[0] }}"
          - -c
          - 'import sqlite3; print(sqlite3.connect("/data/db.sqlite3").execute("PRAGMA journal_mode=WAL").fetchone()[0])'
      register: paperless_sqlite_wal
      changed_when: paperless_sqlite_wal.stdout | trim == 'wal'
      failed_when: paperless_sqlite_wal.stdout | trim != 'wal'

    - name: Start paperless service after WAL conversion
      systemd:
        name: paperless
        state: started

- name: Configure nginx
  import_role:
    name: nginx
    tasks_from: site
  vars:
    nginx_site_args:
      subdomain: paperless
      proxy_pass: http://127.0.0.1:8001/
  tags:
    - paperless
