# Join the redis-owned network so paperless can resolve `redis` via
# aardvark-dns and connect to the redis container on the same bridge.
# Idempotent: redis role creates this too in prod; ensures the
# network exists when paperless is tested standalone.
- name: Create redis podman network
  when: not ansible_check_mode
  containers.podman.podman_network:
    name: redis
    disable_dns: false
    state: present
  become: true
  tags:
    - paperless

- name: Add paperless group
  group:
    name: paperless
    system: true
  become: true
  tags:
    - paperless

- name: Add paperless user
  user:
    name: paperless
    group: paperless
    createhome: false
    system: true
    shell: /usr/sbin/nologin
    home: /nonexistent
  become: true
  register: paperless_user
  tags:
    - paperless

- name: Create configuration directory
  when: not (ansible_check_mode and paperless_user.changed)
  file:
    dest: /mnt/services/paperless
    state: directory
    owner: paperless
    group: paperless
    mode: "0700"
  become: true
  tags:
    - paperless

- name: Create configuration directory
  when: not (ansible_check_mode and paperless_user.changed)
  file:
    dest: /mnt/services/paperless/{{ item }}
    state: directory
    owner: paperless
    group: paperless
    mode: "0700"
  with_items:
    - data
    - media
    - consume
    - export
  become: true
  tags:
    - paperless

# Paperless mixes its SQLite DBs with the Whoosh index, classifier model,
# and logs in the same data/ dir. Whoosh and the model files don't want
# 4K records; only the two .db files belong on the sqlite dataset.
# Symlink them in place (matching-path bind so the host-side symlink
# resolves identically inside the container).
- name: Create sqlite directory
  when: not (ansible_check_mode and paperless_user.changed)
  file:
    dest: /mnt/services/sqlite/paperless
    state: directory
    owner: paperless
    group: paperless
    mode: "0700"
  become: true
  tags:
    - paperless

- name: Symlink paperless SQLite DBs onto sqlite dataset
  when: not (ansible_check_mode and paperless_user.changed)
  file:
    src: "/mnt/services/sqlite/paperless/{{ item }}"
    dest: "/mnt/services/paperless/data/{{ item }}"
    state: link
    force: true
    owner: paperless
    group: paperless
    follow: false
  become: true
  loop:
    - db.sqlite3
    - celerybeat-schedule.db
  tags:
    - paperless

- name: Create paperless secret key
  import_role:
    name: podman_secret
    tasks_from: secret
  vars:
    podman_secret_name: paperless_secret_key
    podman_secret_data: "{{ paperless_secret_key }}"
  tags:
    - paperless

- name: Install paperless service
  import_role:
    name: systemd_unit
    tasks_from: template
  vars:
    systemd_unit_src: paperless.service
    systemd_unit_condition: "{{ not (ansible_check_mode and paperless_user.changed) }}"
  tags:
    - paperless

- name: Enable paperless service
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_src: paperless
    systemd_unit_condition: "{{ not (ansible_check_mode and (systemd_unit.changed or paperless_user.changed)) }}"
    systemd_unit_restart: "{{ systemd_unit.changed or paperless_secret_key_rotated }}"
  tags:
    - paperless

- name: Configure nginx
  import_role:
    name: nginx
    tasks_from: site
  vars:
    nginx_subdomain: paperless
    nginx_proxy_pass: http://localhost:8001/
  tags:
    - paperless
