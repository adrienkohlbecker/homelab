# Required inputs live in group_vars/{prod,test}.yml. Assert them
# non-empty: an empty paperless_secret_key boots Django with a blank
# signing key (CSRF/session breakage) and an empty OIDC secret yields a
# login page that passes the _verify markers yet fails every real
# Authelia handshake -- both reach `active` with no failure signal.
- name: Assert required paperless inputs are set
  assert:
    that:
      - paperless_secret_key | default('') | length > 0
      - paperless_oidc_client_secret | default('') | length > 0
    fail_msg: >-
      paperless_secret_key and paperless_oidc_client_secret must be set
      (group_vars/{prod,test}.yml).
  tags:
    - paperless

# Join the redis-owned network so paperless can resolve `redis` via
# aardvark-dns and connect to the redis container on the same bridge.
# Both producer (redis) and consumer (paperless) create this network
# independently -- it's idempotent, so each role stays self-contained.
- name: Create redis podman network
  when: not ansible_check_mode
  containers.podman.podman_network:
    name: redis
    disable_dns: false
    state: present
  become: true
  tags:
    - paperless

- name: Set up paperless system user, group, and config dir
  import_role:
    name: service_user
    tasks_from: user
  vars:
    service_user_args:
      name: paperless
  tags:
    - paperless

- name: Create configuration directory
  when: not (ansible_check_mode and paperless_user.changed)
  file:
    dest: /mnt/services/paperless/{{ item }}
    state: directory
    owner: paperless
    group: paperless
    mode: "0700"
  with_items:
    - data
    - media
    - consume
    - export
  become: true
  tags:
    - paperless

# sqlite3 CLI pre-creates the WAL-mode DB below host-side. An empty DB
# has no schema, so host sqlite3 (3.37 on jammy) handles it even though
# it can't prepare paperless's populated generated-column schema.
# libsqlite3-0 is pulled transitively but the CLI is not.
- name: Install sqlite3 CLI
  apt:
    pkg: sqlite3
    cache_valid_time: 3600
  become: true
  tags:
    - paperless

# Paperless keeps db.sqlite3 in the same data/ dir as the Whoosh index,
# classifier model, and logs. Whoosh and the model files don't want 4K
# records, so only the hot SQLite DB rides the sqlite dataset (symlinked
# below). The celery beat schedule (celerybeat-schedule.db) stays in
# data/: it's a regenerable shelve the container rewrites in place, which
# would fight a host-side symlink, and as a small cache it gains nothing
# from the 4K dataset.
- name: Create sqlite directory
  when: not (ansible_check_mode and paperless_user.changed)
  file:
    dest: /mnt/services/sqlite/paperless
    state: directory
    owner: paperless
    group: paperless
    mode: "0700"
  become: true
  tags:
    - paperless

# Pre-create db.sqlite3 in WAL journal mode so Django inherits it on its
# first connection -- journal_mode is persisted in the SQLite header and
# survives `migrate`. Without WAL, write-heavy document ingest takes a
# per-commit fsync hit on the 4K-recordsize dataset. The alternative --
# letting Django create the DB in rollback-journal mode then stopping the
# service to PRAGMA-convert -- needed a two-pass deploy (WAL only landed
# on the second converge) and a TOCTOU-prone host-side write against a
# file the container could rename out from under us.
#
# Run as root, then chown to paperless so the container's USERMAP_UID can
# open it RW: a become_user pre-create can't reach the file when the
# sqlite-dataset mount is absent (test fixtures), since the auto-created
# parent dir isn't traversable by the unprivileged user. In prod the
# dataset mountpoint is 0755, but root works in both cases.
- name: Pre-create paperless sqlite DB in WAL mode
  when: not (ansible_check_mode and paperless_user.changed)
  command:
    cmd: sqlite3 /mnt/services/sqlite/paperless/db.sqlite3 'PRAGMA journal_mode=WAL;'
    creates: /mnt/services/sqlite/paperless/db.sqlite3
  become: true
  tags:
    - paperless

# Re-assert ownership on every converge, not just when the pre-create ran:
# the creates: guard above skips the pre-create once the DB exists, so gating
# this on its changed flag would never re-correct a DB that ended up
# root-owned (interrupted first converge, snapshot restore) -- the container's
# USERMAP_UID could then no longer open it RW. The file module no-ops when
# ownership is already correct, so this stays idempotent.
- name: Own the pre-created paperless sqlite DB
  when: not (ansible_check_mode and paperless_user.changed)
  file:
    path: /mnt/services/sqlite/paperless/db.sqlite3
    owner: paperless
    group: paperless
    mode: "0600"
  become: true
  tags:
    - paperless

# Symlink db.sqlite3 from data/ onto the sqlite dataset (matching-path
# bind so the host-side symlink resolves identically inside the
# container). The WAL DB was pre-created above, so state=link just plants
# the symlink; no force, which keeps the snapshot-restore safety -- a
# real DB already at the dest is never clobbered into a symlink.
- name: Symlink paperless DB onto the sqlite dataset
  import_role:
    name: sqlite_dataset
    tasks_from: dataset
  vars:
    sqlite_dataset_args:
      name: paperless
      owner: paperless
      group: paperless
      mode: "0700"
      condition: "{{ not (ansible_check_mode and paperless_user.changed) }}"
      links:
        - /mnt/services/paperless/data/db.sqlite3
  tags:
    - paperless

- name: Create paperless secret key
  import_role:
    name: podman_secret
    tasks_from: secret
  vars:
    podman_secret_args:
      name: paperless_secret_key
      data: "{{ paperless_secret_key }}"
  tags:
    - paperless

# Django-allauth's SOCIALACCOUNT_PROVIDERS config carries the OIDC
# client secret inline; render it to a podman secret so it's mounted
# as a file under /run/secrets/ instead of landing in `podman inspect`
# (paperless-ngx reads any PAPERLESS_* env via _FILE if pointed at a
# path -- see CLAUDE.md "Secrets" #1).
- name: Compose paperless OIDC providers config
  set_fact:
    paperless_socialaccount_providers:
      openid_connect:
        APPS:
          - provider_id: authelia
            name: Authelia
            client_id: paperless
            secret: "{{ paperless_oidc_client_secret }}"
            settings:
              server_url: "https://auth.{{ authelia_cookie_domain }}/.well-known/openid-configuration"
  tags:
    - paperless

- name: Create paperless OIDC providers secret
  import_role:
    name: podman_secret
    tasks_from: secret
  vars:
    podman_secret_args:
      name: paperless_socialaccount_providers
      data: "{{ paperless_socialaccount_providers | to_json }}"
  tags:
    - paperless

- name: Install paperless service
  import_role:
    name: systemd_unit
    tasks_from: install
  vars:
    systemd_unit_args:
      src: paperless.service.j2
      condition: "{{ not (ansible_check_mode and paperless_user.changed) }}"
  tags:
    - paperless

- name: Enable paperless service
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: paperless
      condition: "{{ not (ansible_check_mode and (paperless_service_result.changed or paperless_user.changed)) }}"
      restart: "{{ paperless_service_result.changed or paperless_secret_key_rotated or paperless_socialaccount_providers_rotated }}"
  tags:
    - paperless

- name: Configure nginx
  import_role:
    name: nginx
    tasks_from: site
  vars:
    nginx_site_args:
      subdomain: paperless
      proxy_pass: http://127.0.0.1:{{ service_ports.paperless }}/
      # Default 16M is small for bulk / multi-page scans uploaded via the UI.
      client_max_body_size: 100m
      # paperless drives its own OIDC SSO redirect (PAPERLESS_DISABLE_REGULAR_LOGIN
      # + REDIRECT_LOGIN_TO_SSO), but upstream notes that leaves Django's /admin
      # and local-credential login reachable. Block /admin at the proxy so the
      # operator-gated SSO (Authelia operator_only policy) is the only door in.
      server_conf: |
        location /admin {
          return 404;
        }
  tags:
    - paperless
