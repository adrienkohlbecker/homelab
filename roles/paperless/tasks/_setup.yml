- name: _setup | Install podman
  import_role:
    name: podman
    tasks_from: install

- name: _setup Install nginx
  import_role:
    name: test
    tasks_from: nginx

# Run the actual redis role so paperless connects to a real
# containerised redis on the shared "redis" network via aardvark-dns.
# Replaces the previous apt-package redis on the host bound to
# 0.0.0.0:6379, which only worked because containers reached it via
# 10.88.0.1 (the bridge gateway) -- broken on resolute/netavark.
- name: _setup | Install redis (containerised)
  import_role:
    name: redis
