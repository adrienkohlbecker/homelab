# Loopback probe -- the container healthcheck already gates the unit's
# --sdnotify=healthy, but a fresh /accounts/login/ hit at end of
# converge catches the case where the unit reports active but Django
# is wedged behind a misconfigured allauth (e.g. malformed JSON in the
# SOCIALACCOUNT_PROVIDERS secret). paperless's / always redirects, so
# the login route is what actually exercises the auth surface.
- name: _verify | Paperless answers on its loopback port
  uri:
    url: http://localhost:{{ service_ports.paperless }}/accounts/login/
    status_code: 200
  register: paperless_verify_loopback
  retries: 30
  delay: 2
  until: paperless_verify_loopback.status == 200
  become: true

# The role pre-creates db.sqlite3 in WAL mode so Django inherits it on
# first migrate; assert it actually stuck (a regression in the pre-create
# would silently fall back to rollback-journal, the exact failure the WAL
# placement exists to avoid). Read via the container's bundled sqlite
# (3.46): opening the populated DB parses paperless's generated-column
# schema (documents_customfieldinstance), which host sqlite3 (3.37) on
# jammy can't prepare.
- name: _verify | Paperless sqlite DB is in WAL mode
  command:
    argv:
      - podman
      - exec
      - paperless
      - python3
      - -c
      - 'import sqlite3; print(sqlite3.connect("/usr/src/paperless/data/db.sqlite3").execute("PRAGMA journal_mode").fetchone()[0])'
  register: paperless_verify_wal
  changed_when: false
  failed_when: paperless_verify_wal.stdout | trim != 'wal'
  become: true

# db.sqlite3 must stay a symlink onto the sqlite dataset (the 4K-recordsize
# placement the role pre-creates). The WAL probe above reads the in-container
# path, which resolves identically whether or not the symlink exists -- so a
# regression that drops it (Django then writes a real DB into data/ on the
# services dataset, defeating the placement) stays invisible to every HTTP and
# WAL probe. Assert the symlink host-side to catch it.
- name: _verify | Paperless DB is symlinked onto the sqlite dataset
  stat:
    path: /mnt/services/paperless/data/db.sqlite3
    follow: false
  register: paperless_verify_dblink
  changed_when: false
  failed_when: >-
    not paperless_verify_dblink.stat.islnk
    or paperless_verify_dblink.stat.lnk_target | default('') != '/mnt/services/sqlite/paperless/db.sqlite3'
  become: true

# The HTTP probes prove the web tier is up, but paperless's actual job --
# document ingest -- runs through Celery on the redis broker. A mis-wired
# PAPERLESS_REDIS or a dead worker leaves the unit active and the UI serving
# while ingest silently stalls; `celery inspect ping` round-trips the broker
# and at least one worker to catch that.
- name: _verify | Paperless Celery worker answers over the redis broker
  command:
    argv:
      - podman
      - exec
      - paperless
      - celery
      - -A
      - paperless
      - inspect
      - ping
      - -t
      - "10"
  register: paperless_verify_celery
  changed_when: false
  failed_when: paperless_verify_celery.rc != 0 or 'pong' not in paperless_verify_celery.stdout
  become: true

# Celery ping proves a worker is reachable; this proves it can do its job.
# Drop a tiny document into consume/ (owned by paperless so the
# USERMAP_UID-mapped container can read it) and poll the ORM until it
# lands -- exercising consume -> worker -> media write -> DB row end to
# end. A USERMAP ownership drift or a wedged consumer leaves every probe
# above green while ingest silently stalls; only a real round-trip catches
# it. paperless_text consumes text/plain natively, so no OCR sidecar is
# needed to make the document appear. manage.py shell prints a shell_plus
# auto-import banner on stdout before our output, so read the count off the
# last line rather than parsing the whole buffer.
- name: _verify | Seed a document into the consume dir
  copy:
    content: "paperless ingest smoke test\n"
    dest: /mnt/services/paperless/consume/_verify_ingest.txt
    owner: paperless
    group: paperless
    mode: "0644"
  become: true

- name: _verify | Paperless ingests the seeded document
  command:
    argv:
      - podman
      - exec
      - paperless
      - python3
      - manage.py
      - shell
      - -c
      - 'from documents.models import Document; print(Document.objects.count())'
  register: paperless_verify_ingest
  changed_when: false
  retries: 30
  delay: 5
  until: >-
    paperless_verify_ingest.stdout_lines | length > 0
    and (paperless_verify_ingest.stdout_lines | last | trim | int) >= 1
  become: true

# nginx proxy chain. The host header swap exercises the same path
# external clients take.
- name: _verify | Paperless reachable through nginx
  uri:
    url: https://localhost/
    headers:
      Host: paperless.{{ inventory_hostname }}.{{ domain }}
    validate_certs: false
    status_code: 200
  become: true

# /admin is the Django admin + local-credential login surface that
# PAPERLESS_DISABLE_REGULAR_LOGIN leaves reachable; the nginx server_conf
# returns 404 for it so operator-gated SSO is the only door. Assert the
# block holds end-to-end (a regression that drops the location would proxy
# through to paperless and answer 200/302 instead).
- name: _verify | Paperless /admin is blocked at the proxy
  uri:
    url: https://localhost/admin/
    headers:
      Host: paperless.{{ inventory_hostname }}.{{ domain }}
    validate_certs: false
    status_code: 404
  become: true

# OIDC config landed. paperless-ngx renders /accounts/login/ as 200 in
# all cases -- the auto-redirect under PAPERLESS_REDIRECT_LOGIN_TO_SSO
# is a client-side <script> that submits the social-login form, not a
# server-side 302 (see src/documents/templates/account/login.html in
# paperless-ngx 2.20.15). So we probe the HTML body for two markers:
#   1. The social-login <form action="/accounts/oidc/authelia/login/">
#      -- proves PAPERLESS_APPS appended openid_connect to
#      INSTALLED_APPS and the SOCIALACCOUNT_PROVIDERS _FILE secret
#      parsed with the right provider_id.
#   2. The id="social-login" + form.submit() snippet that
#      REDIRECT_LOGIN_TO_SSO emits -- proves the setting reached
#      Django (a typo'd env name renders the same login form sans
#      the auto-submit JS).
# Doesn't require a live Authelia -- the markers are paperless-internal.
- name: _verify | Paperless login page wires the OIDC entrypoint + auto-redirect
  uri:
    url: https://localhost/accounts/login/
    headers:
      Host: paperless.{{ inventory_hostname }}.{{ domain }}
    validate_certs: false
    return_content: true
    status_code: 200
  register: paperless_verify_sso_html
  failed_when: >-
    paperless_verify_sso_html.status != 200
    or 'action="/accounts/oidc/authelia/login/' not in paperless_verify_sso_html.content
    or "getElementById('social-login')" not in paperless_verify_sso_html.content
  become: true

# End-to-end OIDC handshake (paperless → Authelia /authorize → callback
# → cookie set → /api/documents/ authenticated) is verified manually
# on prod. Bringing it under _verify would need real Authelia in
# _setup + a TLS-trusted auth.box.mhaf.fr -- same trade-off the minio
# role documents. The HTML-marker probe above is the cheapest
# assertion that the env-var + secret wiring landed.
