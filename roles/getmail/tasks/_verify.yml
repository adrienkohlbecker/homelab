# Best-effort functional check: --dump parses the rcfile AND exercises the
# same --getmaildir / --rcfile arg shape the timer uses, so a typo in the
# unit's ExecStart, a vault-substitution bug in the template, or a
# permissions regression on the maildir surface here. We can't safely
# exercise the live IMAP fetch path from the harness (no Gmail creds in
# test/, no outbound), so this is the state-only fallback per CLAUDE.md.
# no_log: true because --dump echoes the parsed config to stdout
# including `password = <gmail_app_password>`; the captured register is
# still usable by downstream asserts in-memory.
- name: _verify | Getmailrc parses and arg shape is valid
  command: >-
    getmail --dump
    --rcfile /mnt/services/getmail/getmailrc
    --getmaildir /mnt/services/getmail
  register: _getmail_verify
  changed_when: false
  no_log: true

# Convert the no_log'd dump output into boolean facts so the
# assertion task can reference safe values; on assertion failure
# only the expression and the booleans are displayed, never the
# raw dump (which contains the password line). The substring checks
# are intentionally not pinned to getmail's --dump format style
# (could be `key=val` or `key="val"` depending on version).
- name: _verify | Extract assertion booleans from dump
  set_fact:
    _getmail_dump_has_username: "{{ root_email in _getmail_verify.stdout }}"
    _getmail_dump_has_destination: "{{ '/mnt/services/getmail' in _getmail_verify.stdout }}"
    _getmail_dump_has_mailbox: "{{ '[Gmail]/All Mail' in _getmail_verify.stdout }}"
    _getmail_password_var_nonempty: "{{ gmail_app_password | length > 0 }}"
  no_log: true

# Replaces a prior tautological `'imap.gmail.com' in stdout` check
# (imap.gmail.com is a literal in the template; that check passes
# even with empty vault values). The four assertions exercise
# vault substitution for root_email, the Maildir destination, the
# folder-name selection, and a non-empty gmail_app_password
# (getmail --dump returns 0 even for an empty password line).
- name: _verify | Dump output reflects template-derived values
  assert:
    that:
      - _getmail_dump_has_username
      - _getmail_dump_has_destination
      - _getmail_dump_has_mailbox
      - _getmail_password_var_nonempty

# ---- Webmail archive viewer (tasks/webmail.yml) ----

# Plant a known message straight into the Maildir's new/. The operator owns
# the Maildir, so this host-side write is the only way to seed test mail (the
# container mounts it read-only) -- and it sets up the read-only proof below:
# serving this message must never migrate it out of new/.
- name: _verify | Plant a test message in the archive Maildir
  copy:
    dest: /mnt/services/getmail/new/1700000000.getmailverify.box
    owner: "{{ ansible_user_id }}"
    group: "{{ ansible_user_id }}"
    mode: "0600"
    content: |
      From: Test Sender <sender@example.com>
      To: {{ root_email }}
      Subject: Getmail Webmail Verify
      Date: Tue, 14 Nov 2023 22:13:20 +0000
      Message-ID: <getmailverify@example.com>

      Archive viewer verification body.
  become: true

# Roundcube's --sdnotify=healthy gates `active` on its own HTTP healthcheck,
# so HTTP is up by the time _verify runs; the short retry covers the active-
# transition race. amd64-only: Roundcube ships no arm64 image, so the
# container isn't started on the arm64 test VM (see tasks/webmail.yml).
- name: _verify | Roundcube answers on its loopback port
  when: ansible_architecture == 'x86_64'
  uri:
    url: http://localhost:{{ service_ports.roundcube }}/
    status_code: 200
  register: _getmail_rc_loopback
  retries: 10
  delay: 2
  until: _getmail_rc_loopback.status == 200
  become: true

# auth: required -- a cookieless GET / must land on the Authelia 302 redirect
# chain (stub is in gate mode). Validates the auth_request wiring and the
# proxy_pass port together; the loopback probe above already proved Roundcube
# itself serves.
- name: _verify | Roundcube vhost gate redirects unauthenticated to Authelia
  uri:
    url: https://localhost/
    headers:
      Host: mail.{{ inventory_hostname }}.{{ domain }}
    validate_certs: false
    follow_redirects: none
    status_code: 302
  register: _getmail_rc_gate
  failed_when: >-
    _getmail_rc_gate.status != 302
    or 'auth.' not in (_getmail_rc_gate.location | default(''))
  become: true

# Functional IMAP probe: doveadm search forces Dovecot to scan new/ and serve
# the planted message over the real passdb→userdb→Maildir path. Non-empty
# stdout (one `<guid> <uid>` line per match) means the message is reachable --
# the load-bearing "can I actually browse the archive" assertion.
- name: _verify | Dovecot serves the planted message over IMAP
  command:
    argv:
      - podman
      - exec
      - dovecot
      - doveadm
      - search
      - -u
      - archive
      - mailbox
      - INBOX
      - subject
      - Getmail Webmail Verify
  register: _getmail_doveadm
  changed_when: false
  retries: 10
  delay: 2
  until: _getmail_doveadm.rc == 0 and (_getmail_doveadm.stdout | trim | length > 0)
  become: true

# Read-only guarantee, three ways. (1) The planted message stays in new/:
# Dovecot couldn't migrate it to cur/ because the mount is read-only.
- name: _verify | Planted message stays in new/ (Maildir never mutated)
  stat:
    path: /mnt/services/getmail/new/1700000000.getmailverify.box
  register: _getmail_newfile
  failed_when: not _getmail_newfile.stat.exists
  become: true

# (2) No Dovecot index/uidlist files leaked into the Maildir -- proves the
# INDEX/CONTROL redirect in mail_location is in effect, not silently ignored.
- name: _verify | No dovecot index/uidlist files leaked into the read-only Maildir
  find:
    paths: /mnt/services/getmail
    patterns:
      - "dovecot.index*"
      - "dovecot-uidlist*"
      - "dovecot.list.index*"
    recurse: true
  register: _getmail_no_index_in_maildir
  failed_when: _getmail_no_index_in_maildir.matched > 0
  become: true

# (3) ...and they landed on the writable volume instead.
- name: _verify | Dovecot index/control landed on the writable volume
  find:
    paths: /mnt/services/getmail_webmail/dovecot
    recurse: true
  register: _getmail_index_redirected
  failed_when: _getmail_index_redirected.matched == 0
  become: true
