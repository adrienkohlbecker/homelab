- name: Install getmail
  apt:
    package:
      - getmail6
    cache_valid_time: 3600
  become: true
  tags:
    - getmail

- name: Create getmail config directory
  file:
    dest: "{{ ansible_user_dir }}/.config/getmail"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0755"
  tags:
    - getmail

- name: Create getmail data directory
  file:
    dest: /mnt/services/getmail
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0755"
  become: true
  tags:
    - getmail

- name: Create getmail data directory
  file:
    dest: "{{ item }}"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0775"
  become: true
  loop:
    - /mnt/services/getmail/cur
    - /mnt/services/getmail/new
    - /mnt/services/getmail/tmp
  tags:
    - getmail

- name: Configure getmail
  template:
    src: getmailrc.j2
    dest: "{{ ansible_user_dir }}/.config/getmail/getmailrc"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0600"
    backup: true
    validate: getmail --dump --rcfile %s
  register: getmail_cfg
  tags:
    - getmail

- name: Schedule the getmail timer
  import_role:
    name: systemd_timer
    tasks_from: install
  vars:
    systemd_timer_args:
      name: getmail
      description: Fetch mail via getmail
      on_calendar: "*-*-* 00:24:00"
      exec_start: /usr/local/bin/run_job daily getmail su {{ ansible_user }} -c getmail
  tags:
    - getmail
