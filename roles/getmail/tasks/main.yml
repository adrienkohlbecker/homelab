# Runtime identity is ansible_user — the human reading the mail — rather
# than a dedicated service_user. The maildir is meant to be browsed directly
# by the operator; a system user would just add a sudo step.
- name: Install getmail
  apt:
    package:
      - getmail6
    cache_valid_time: 3600
  become: true
  tags:
    - getmail

# roles/user already lingers ansible_user on prod, but the harness may
# run getmail alone — the linger helper is idempotent so the prod
# double-call is a no-op. The helper also ensures user@<uid>.service is
# up before the systemd_timer helper drives `systemctl --user enable`.
- name: Ensure linger + user manager are up for ansible_user
  import_role:
    name: linger
    tasks_from: linger
  vars:
    linger_args:
      name: "{{ ansible_user }}"
      uid: "{{ ansible_user_uid }}"
  tags:
    - getmail

# getmail6 expects cur/new/tmp to already exist (is_maildir() in
# getmailcore/utilities.py refuses to deliver otherwise) so we create
# all four explicitly. Mode 0700 — only the owner reads fetched mail.
- name: Create getmail maildir
  file:
    dest: "{{ item }}"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0700"
  become: true
  loop:
    - /mnt/services/getmail
    - /mnt/services/getmail/cur
    - /mnt/services/getmail/new
    - /mnt/services/getmail/tmp
  tags:
    - getmail

# getmail creates messages.log on first run under whatever umask the
# user manager has (typically 0644). Pre-create it 0600 so even if
# the parent dir's 0700 ever drifts, the per-message metadata
# (msgid / sender / recipient / size) is still owner-only. The
# preserve flags keep the task idempotent on re-runs.
- name: Pre-create messages.log
  file:
    path: /mnt/services/getmail/messages.log
    state: touch
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0600"
    modification_time: preserve
    access_time: preserve
  become: true
  tags:
    - getmail

# no_log: true keeps the rendered diff (which includes the Gmail app
# password line) out of stdout/journald when ansible.cfg's [diff]
# always = True fires on rotation.
- name: Configure getmail
  template:
    src: getmailrc.j2
    dest: /mnt/services/getmail/getmailrc
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0600"
    backup: true
    # Real parser (semantic shape, not just INI well-formedness) and
    # removes the apostrophe-quoting hazard of the prior inline
    # python3 -c '…' validator. getmail is installed by the first
    # task in this file and the maildir is created by the task
    # immediately above, so both prereqs are present by the time the
    # template task fires.
    validate: /usr/bin/getmail --dump --rcfile %s --getmaildir /mnt/services/getmail
  no_log: true
  tags:
    - getmail

- name: Schedule the getmail timer
  import_role:
    name: systemd_timer
    tasks_from: install
  vars:
    systemd_timer_args:
      name: getmail
      description: Fetch mail via getmail
      frequency: daily
      on_calendar: "*-*-* 00:24:00"
      # --getmaildir co-locates oldmail-* state next to the maildir so a
      # $HOME reset doesn't trigger a re-fetch of years of archive.
      # OPERATOR NOTE: when invoking getmail manually from a shell for
      # debugging, always pass --getmaildir /mnt/services/getmail too.
      # `getmail --rcfile /mnt/services/getmail/getmailrc` alone writes
      # oldmail-* to ~/.getmail/ (the default), splitting dedup state
      # across two paths and triggering a partial re-fetch of the
      # archive on first such run.
      exec_start: >-
        /usr/bin/getmail
        --rcfile /mnt/services/getmail/getmailrc
        --getmaildir /mnt/services/getmail
      user: "{{ ansible_user }}"
      timeout_start_sec: 15m
  tags:
    - getmail
