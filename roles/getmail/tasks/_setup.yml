# Pre-role harness fixture: systemd_timer's install task writes a
# metadata file owned by netdata:netdata. On the box VM netdata isn't
# preinstalled. Create the user directly (lighter than importing the
# netdata role, which has its own ssl-cert/certbot prereq). On prod
# hosts site.yml runs the real netdata role first, so this never fires.
- name: _setup | Create netdata user (test fixture for systemd_timer)
  user:
    name: netdata
    system: true
    create_home: false
    shell: /usr/sbin/nologin
  become: true
