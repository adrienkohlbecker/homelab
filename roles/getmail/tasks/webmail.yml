# Read-only web interface for the getmail archive: Dovecot (IMAP over the
# Maildir) behind Roundcube (webmail), fronted by nginx + Authelia. Design and
# the read-only rationale: notes/getmail_webmail_design.md.

- name: Create getmail_webmail podman network
  when: not ansible_check_mode
  containers.podman.podman_network:
    name: getmail_webmail
    disable_dns: false
    state: present
  become: true
  tags:
    - getmail

# Registered so the unit install/enable tasks below can gate on
# `not (ansible_check_mode and _getmail_webmail_dir.changed)` — the
# fresh-host check-mode guard. On a fresh host in check mode this dir
# would-change, so the systemd-analyze validate (which needs the unit file
# actually on disk) and `systemctl enable` (which needs the unit known to
# systemd) are skipped; on a converged host it's unchanged and they run.
# This role creates no service user, so the base dir stands in for the
# `<svc>_user.changed` signal other podman roles use.
- name: Create webmail base directory
  file:
    dest: /mnt/services/getmail_webmail
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true
  register: _getmail_webmail_dir
  tags:
    - getmail

# Dovecot writes its index + control files here (redirected out of the
# read-only Maildir). Owned by the operator because the IMAP process runs as
# the operator uid (static userdb in dovecot.conf).
- name: Create dovecot index/control directory
  file:
    dest: /mnt/services/getmail_webmail/dovecot
    state: directory
    owner: "{{ ansible_user_id }}"
    group: "{{ ansible_user_id }}"
    mode: "0700"
  become: true
  tags:
    - getmail

# Roundcube's apache image chowns its mounted dirs to in-container www-data at
# startup, so root-owned 0755 host dirs are fine. config rides the services
# dataset; the sqlite DB goes on the dedicated 4K-recordsize sqlite dataset
# below.
- name: Create roundcube config directory
  file:
    dest: /mnt/services/getmail_webmail/roundcube/config
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true
  tags:
    - getmail

# Roundcube's sqlite DB on the dedicated sqlite dataset (4K recordsize, matches
# kuma/paperless). The unit mounts this dir as ROUNDCUBEMAIL_DB_DIR directly
# (no symlink) and the image creates sqlite.db in it on first boot. Intermediate
# /mnt/services/sqlite is created here too on the test box; on prod it's the
# sqlite dataset mountpoint.
- name: Create roundcube sqlite directory
  file:
    dest: /mnt/services/sqlite/roundcube
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true
  tags:
    - getmail

# No validate: there's no dovecot binary on the host to parse-check against,
# and faking one would violate the "real parser or none" rule. Config errors
# surface at container start and fail the doveadm healthcheck (so the unit
# never reaches active).
- name: Configure dovecot
  template:
    src: dovecot.conf.j2
    dest: /mnt/services/getmail_webmail/dovecot.conf
    owner: root
    group: root
    mode: "0644"
    backup: true
  become: true
  register: _getmail_dovecot_conf
  tags:
    - getmail

- name: Install dovecot service
  import_role:
    name: systemd_unit
    tasks_from: install
  vars:
    systemd_unit_args:
      src: dovecot.service.j2
      condition: "{{ not (ansible_check_mode and _getmail_webmail_dir.changed) }}"
  tags:
    - getmail

- name: Enable dovecot service
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: dovecot
      condition: "{{ not (ansible_check_mode and (dovecot_service_result.changed or _getmail_webmail_dir.changed)) }}"
      restart: "{{ dovecot_service_result.changed or _getmail_dovecot_conf.changed }}"
  tags:
    - getmail

# Roundcube ships no arm64 image (only the unpinned latest-fpm-alpine is
# multi-arch). Every prod host is amd64, so the gate is a no-op there and in
# CI (amd64 runners); it only skips the Roundcube container on the operator's
# local arm64 test VM. Dovecot (multi-arch 2.4.4) still runs and is fully
# exercised on arm64, so the IMAP/archive path is verified everywhere — only
# the Roundcube UI is amd64-only. See notes/getmail_webmail_design.md.
- name: Install roundcube service
  import_role:
    name: systemd_unit
    tasks_from: install
  vars:
    systemd_unit_args:
      src: roundcube.service.j2
      condition: "{{ ansible_architecture == 'x86_64' and not (ansible_check_mode and _getmail_webmail_dir.changed) }}"
  tags:
    - getmail

- name: Enable roundcube service
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: roundcube
      condition: "{{ ansible_architecture == 'x86_64' and not (ansible_check_mode and (roundcube_service_result.changed or _getmail_webmail_dir.changed)) }}"
      restart: "{{ roundcube_service_result.changed }}"
  tags:
    - getmail

- name: Configure nginx
  import_role:
    name: nginx
    tasks_from: site
  vars:
    nginx_site_args:
      subdomain: mail
      proxy_pass: http://127.0.0.1:{{ service_ports.roundcube }}/
      # Authelia is the sole gate: Roundcube's own login uses a fixed
      # non-secret IMAP credential (see notes/getmail_webmail_design.md), so
      # this forward-auth is what actually protects the archive.
      auth: required
  tags:
    - getmail
