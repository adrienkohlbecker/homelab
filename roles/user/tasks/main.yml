- name: Install gpg
  apt:
    pkg: gpg
    cache_valid_time: 3600
  become: true
  register: user_apt_gpg
  tags:
    - user

- name: Install packages
  apt:
    pkg:
      - attr
      - ccze
      - curl
      - fdupes
      - git
      - git-lfs
      - gparted
      - htop
      - iotop
      - iperf3
      - jq
      - lsof
      - make
      - man-db
      - moreutils
      - mosh
      - ncdu
      - nmon
      - nnn
      - nvme-cli
      - pandoc
      - pass
      - progress
      - rsync
      - screen
      - socat
      - strace
      - stress
      - sysstat
      - telnet
      - tig
      - tmux
      - tree
      - usbutils
      - vim
      - zsh
    cache_valid_time: 3600
  become: true
  tags:
    - user

- name: Set shell to zsh
  user:
    name: "{{ ansible_user_id }}"
    shell: /bin/zsh
  become: true
  tags:
    - user

# adm owns most of /var/log (syslog, auth.log, journal via systemd-journal),
# so membership lets the operator tail logs over SSH without sudo -- the
# diagnostic reads CLAUDE.md treats as pre-authorized. append is load-bearing:
# without it `groups:` replaces the supplementary set and would strip sudo.
- name: Add the operator to the adm group (read /var/log without sudo)
  user:
    name: "{{ ansible_user_id }}"
    groups: adm
    append: true
  become: true
  tags:
    - user

# The operator connects from Ghostty (TERM=xterm-ghostty); a host that
# doesn't ship that terminfo entry leaves zsh's zle without capability
# lookups, which manifests as doubled keystrokes and runaway line redraw
# over SSH. Install system-wide so sudo/root shells inherit it too.
- name: Install Ghostty terminfo source
  copy:
    src: xterm-ghostty.terminfo
    dest: /etc/terminfo/xterm-ghostty.terminfo
    owner: root
    group: root
    mode: "0644"
    backup: true
  become: true
  register: user_ghostty_terminfo
  tags:
    - user

# Gate the compile on the source copy so an updated terminfo recompiles,
# but skip the check-mode fresh-box case where the copy only reports the
# change without writing the file tic would read.
- name: Compile Ghostty terminfo
  when: user_ghostty_terminfo.changed and not ansible_check_mode
  command: tic -x -o /etc/terminfo /etc/terminfo/xterm-ghostty.terminfo
  changed_when: true
  become: true
  tags:
    - user

- name: Sudo without password
  when: ansible_user_id != "root"
  copy:
    dest: /etc/sudoers.d/{{ ansible_user_id }}
    content: "{{ ansible_user_id }} ALL=(ALL) NOPASSWD:ALL\n"
    validate: visudo -cf %s
    backup: true
    owner: root
    group: root
    mode: "0440"
  become: true
  tags:
    - user

- name: Cleanup sudoers added by cloud-init
  file:
    path: /etc/sudoers.d/90-cloud-init-users
    state: absent
  become: true
  tags:
    - user

# Linger keeps {{ ansible_user_id }}'s user manager up across SSH sessions so
# user-scope timers (e.g. podman-prune.timer) fire on schedule instead of
# only when someone happens to be logged in. Cost: a persistent
# `systemd --user` process and any backgrounded ssh/tmux processes survive
# logout instead of being reaped by KillUserProcesses.
- name: Turn on linger
  import_role:
    name: linger
    tasks_from: linger
  vars:
    linger_args:
      name: "{{ ansible_user_id }}"
      uid: "{{ ansible_user_uid }}"
  tags:
    - user

- name: Add authorized keys
  authorized_key:
    user: "{{ ansible_user_id }}"
    key: "{{( ssh_public_keys + '\n' + (ssh_public_keys_additional | default(''))) | trim }}"
    exclusive: true
  tags:
    - user

- name: Configure git
  template:
    src: gitconfig.j2
    dest: "{{ ansible_user_dir }}/.gitconfig.local"
    mode: "0644"
    owner: "{{ ansible_user_id }}"
    group: "{{ ansible_user_id }}"
    backup: true
  tags:
    - user

- name: Get public key
  when: not (ansible_check_mode and user_apt_gpg.changed)
  command: gpg --keyserver keyserver.ubuntu.com --recv-keys C248DE6357445D6302F9A62E74BFD03C20CC21AF
  args:
    creates: "{{ ansible_user_dir }}/.gnupg/pubring.kbx"
  tags:
    - user

- name: Install dotfiles repo  # noqa: command-instead-of-module
  command: git clone --bare https://github.com/adrienkohlbecker/dotfiles.git .dotfiles
  args:
    chdir: "{{ ansible_user_dir }}"
    creates: "{{ ansible_user_dir }}/.dotfiles"
  tags:
    - user

- name: Install dotfiles  # noqa: command-instead-of-module
  command: git --git-dir={{ ansible_user_dir }}/.dotfiles --work-tree={{ ansible_user_dir }} reset --hard
  args:
    chdir: "{{ ansible_user_dir }}"
    creates: "{{ ansible_user_dir }}/.zshrc"
  register: user_dotfiles_reset
  tags:
    - user

# jammy ships git 2.34, which doesn't know the zdiff3 merge strategy
# (added in 2.35); the dotfiles' .gitconfig sets it, so on jammy we
# downgrade to diff3 in place. `replace` reports unchanged once
# zdiff3 isn't there anymore, so the task no-ops on subsequent runs.
# Gate on the reset-hard above: it's the task that materializes
# .gitconfig from the bare clone, so in check mode on a fresh box
# the file doesn't exist yet and replace would fail "Path ... does
# not exist".
- name: Fix git config
  when:
    - ansible_distribution_version == "22.04"
    - not (ansible_check_mode and user_dotfiles_reset.changed)
  replace:
    path: "{{ ansible_user_dir }}/.gitconfig"
    regexp: zdiff3
    replace: diff3
  tags:
    - user

- name: Install dotfiles submodules  # noqa: command-instead-of-module
  command: git --git-dir={{ ansible_user_dir }}/.dotfiles --work-tree={{ ansible_user_dir }} submodule update --init --recursive
  args:
    chdir: "{{ ansible_user_dir }}"
    creates: "{{ ansible_user_dir }}/.zsh/pure/readme.md"
  tags:
    - user

- name: Check installed mise version
  command: "{{ ansible_user_dir }}/.local/share/mise/bin/mise --version"
  register: user_mise_check
  failed_when: false
  changed_when: false
  check_mode: false
  tags:
    - user

- name: Create mise parent directory
  when: user_mise_version not in user_mise_check.stdout
  file:
    path: "{{ ansible_user_dir }}/.local/share"
    state: directory
    owner: "{{ ansible_user_id }}"
    group: "{{ ansible_user_id }}"
    mode: "0755"
  register: user_mise_dir
  tags:
    - user

- name: Download mise archive
  when: user_mise_version not in user_mise_check.stdout
  check_mode: false
  get_url:
    url: "{{ user_mise_release[ansible_architecture].url }}"
    checksum: "sha256:{{ user_mise_release[ansible_architecture].sha256 }}"
    dest: /tmp/mise-{{ user_mise_version }}.tar.gz
    mode: "0644"
  tags:
    - user

- name: Install mise binary
  when: not (ansible_check_mode and user_mise_dir.changed) and user_mise_version not in user_mise_check.stdout
  unarchive:
    src: /tmp/mise-{{ user_mise_version }}.tar.gz
    remote_src: true
    dest: "{{ ansible_user_dir }}/.local/share"
    owner: "{{ ansible_user_id }}"
    group: "{{ ansible_user_id }}"
  tags:
    - user

- name: Create ~/.local/bin directory
  file:
    path: "{{ ansible_user_dir }}/.local/bin"
    state: directory
    owner: "{{ ansible_user_id }}"
    group: "{{ ansible_user_id }}"
    mode: "0755"
  tags:
    - user

- name: Symlink mise binary into ~/.local/bin
  when: not (ansible_check_mode and user_mise_dir.changed)
  file:
    src: "{{ ansible_user_dir }}/.local/share/mise/bin/mise"
    dest: "{{ ansible_user_dir }}/.local/bin/mise"
    state: link
    owner: "{{ ansible_user_id }}"
    group: "{{ ansible_user_id }}"
  tags:
    - user

- name: Create mise completions directory
  when: user_mise_version not in user_mise_check.stdout
  file:
    path: "{{ ansible_user_dir }}/.local/share/mise/completions"
    state: directory
    owner: "{{ ansible_user_id }}"
    group: "{{ ansible_user_id }}"
    mode: "0755"
  tags:
    - user

- name: Generate mise zsh completions
  when: user_mise_version not in user_mise_check.stdout
  shell: |
    set -euo pipefail
    {{ ansible_user_dir }}/.local/share/mise/bin/mise completion zsh > {{ ansible_user_dir }}/.local/share/mise/completions/_mise
  args:
    executable: /bin/bash
  changed_when: true
  tags:
    - user

- name: Delete mise archive
  when: user_mise_version not in user_mise_check.stdout
  file:
    path: /tmp/mise-{{ user_mise_version }}.tar.gz
    state: absent
  tags:
    - user

# Repository setup forks on Ubuntu major version because apt-key was
# removed from the default install in resolute (26.04). See netdata
# install.yml for the same idiom.
- name: Add 1password repository key
  when:
    - ansible_distribution_major_version | int < 26
    - not (ansible_check_mode and user_apt_gpg.changed)
  apt_key:
    id: AC2D62742012EA22
    url: https://downloads.1password.com/linux/keys/1password.asc
    keyring: /etc/apt/trusted.gpg.d/1password.gpg
  become: true
  tags:
    - user

- name: Add 1password repository
  when: ansible_distribution_major_version | int < 26
  apt_repository:
    repo: deb [arch={{ (ansible_architecture == "aarch64") | ternary('arm64', 'amd64') }} signed-by=/etc/apt/trusted.gpg.d/1password.gpg] {{ mirror_apt_1password }} stable main
  become: true
  register: user_apt_repo_1password_legacy
  tags:
    - user

# Pre-warm /var/lib/apt/lists/ so the python3-debian install below
# works in check mode. Packer ships an empty cache and the apt
# module's update_cache is a no-op under --check. See
# roles/apt/tasks/install.yml for the full rationale.
- name: Pre-warm apt cache (real fetch even in --check)  # noqa: command-instead-of-module
  when: ansible_distribution_major_version | int >= 26
  ansible.builtin.command: apt-get update
  changed_when: false
  check_mode: false
  become: true
  tags:
    - user

# deb822_repository requires python3-debian even in check mode. See
# netdata install.yml for the gate idiom.
- name: Install python3-debian
  when: ansible_distribution_major_version | int >= 26
  apt:
    pkg: python3-debian
    cache_valid_time: 3600
  become: true
  register: user_apt_python3_debian
  tags:
    - user

- name: Add 1password repository (deb822)
  when:
    - ansible_distribution_major_version | int >= 26
    - not (ansible_check_mode and user_apt_python3_debian.changed)
  ansible.builtin.deb822_repository:
    name: 1password
    types: deb
    uris: "{{ mirror_apt_1password }}"
    suites: stable
    components: main
    architectures: "{{ (ansible_architecture == 'aarch64') | ternary('arm64', 'amd64') }}"
    signed_by: https://downloads.1password.com/linux/keys/1password.asc
  register: user_apt_repo_1password_deb822
  become: true
  tags:
    - user

- name: Track 1password repository changes
  set_fact:
    user_apt_repo_1password:
      changed: "{{ user_apt_repo_1password_legacy is changed or user_apt_repo_1password_deb822 is changed or user_apt_python3_debian is changed }}"
  tags:
    - user

- name: Install packages
  when: not (ansible_check_mode and user_apt_repo_1password.changed)
  apt:
    pkg:
      - 1password-cli
    cache_valid_time: 3600
  become: true
  tags:
    - user
