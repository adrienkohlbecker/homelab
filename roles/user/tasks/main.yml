- name: Install gpg
  apt:
    pkg: gpg
    cache_valid_time: 3600
  become: true
  register: apt_install_gpg
  tags:
    - user

- name: Install packages
  apt:
    pkg:
      - attr
      - ccze
      - curl
      - fdupes
      - git
      - git-lfs
      - gparted
      - htop
      - iotop
      - iperf3
      - jq
      - lsof
      - make
      - man-db
      - moreutils
      - mosh
      - ncdu
      - nmon
      - nnn
      - nvme-cli
      - pandoc
      - pass
      - progress
      - rsync
      - screen
      - socat
      - strace
      - stress
      - sysstat
      - telnet
      - tig
      - tmux
      - tree
      - usbutils
      - vim
      - zsh
    cache_valid_time: 3600
  become: true
  tags:
    - user

- name: Set shell to zsh
  user:
    name: "{{ ansible_user }}"
    shell: /bin/zsh
  become: true
  tags:
    - user

- name: Sudo without password
  copy:
    dest: /etc/sudoers.d/{{ ansible_user }}
    content: "{{ ansible_user }} ALL=(ALL) NOPASSWD:ALL\n"
    validate: visudo -cf %s
    backup: true
    owner: root
    group: root
    mode: "0440"
  become: true
  tags:
    - user

- name: Cleanup sudoers added by cloud-init
  file:
    path: /etc/sudoers.d/90-cloud-init-users
    state: absent
  become: true
  tags:
    - user

- name: Add authorized keys
  authorized_key:
    user: "{{ ansible_user }}"
    key: "{{( ssh_public_keys + '\n' + (ssh_public_keys_additional | default(''))) | trim }}"
    exclusive: true
  tags:
    - user

- name: Configure git
  template:
    src: gitconfig.j2
    dest: "{{ ansible_user_dir }}/.gitconfig.local"
    mode: "0644"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    backup: true
  tags:
    - user

- name: Get public key
  when: not (ansible_check_mode and apt_install_gpg.changed)
  command: gpg --keyserver {{ mirror_keyserver_ubuntu }} --recv-keys C248DE6357445D6302F9A62E74BFD03C20CC21AF
  args:
    creates: "{{ ansible_user_dir }}/.gnupg/pubring.kbx"
  tags:
    - user

- name: Install dotfiles repo
  command: git clone --bare https://github.com/adrienkohlbecker/dotfiles.git .dotfiles
  args:
    chdir: "{{ ansible_user_dir }}"
    creates: "{{ ansible_user_dir }}/.dotfiles"
  tags:
    - user

- name: Install dotfiles
  command: git --git-dir={{ ansible_user_dir }}/.dotfiles --work-tree={{ ansible_user_dir }} reset --hard
  args:
    chdir: "{{ ansible_user_dir }}"
    creates: "{{ ansible_user_dir }}/.zshrc"
  tags:
    - user

- name: Fix git config
  when: ansible_distribution_version == "22.04"
  command: sed -i 's/zdiff3/diff3/' .gitconfig
  args:
    chdir: "{{ ansible_user_dir }}"
  tags:
    - user

- name: Install dotfiles submodules
  command: git --git-dir={{ ansible_user_dir }}/.dotfiles --work-tree={{ ansible_user_dir }} submodule update --init --recursive
  args:
    chdir: "{{ ansible_user_dir }}"
    creates: "{{ ansible_user_dir }}/.zsh/pure/readme.md"
  tags:
    - user

- name: Check installed mise version
  command: "{{ ansible_user_dir }}/.local/share/mise/bin/mise --version"
  register: mise_check
  failed_when: false
  changed_when: false
  check_mode: false
  tags:
    - user

- name: Create mise parent directory
  when: mise_version not in mise_check.stdout
  file:
    path: "{{ ansible_user_dir }}/.local/share"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0755"
  register: directory_mise
  tags:
    - user

- name: Download mise archive
  when: mise_version not in mise_check.stdout
  check_mode: false
  get_url:
    url: "{{ mise_release[ansible_architecture].url }}"
    checksum: "sha256:{{ mise_release[ansible_architecture].sha256 }}"
    dest: /tmp/mise-{{ mise_version }}.tar.gz
    mode: "0644"
  tags:
    - user

- name: Install mise binary
  when: not (ansible_check_mode and directory_mise.changed) and mise_version not in mise_check.stdout
  unarchive:
    src: /tmp/mise-{{ mise_version }}.tar.gz
    remote_src: true
    dest: "{{ ansible_user_dir }}/.local/share"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
  tags:
    - user

- name: Create ~/.local/bin directory
  file:
    path: "{{ ansible_user_dir }}/.local/bin"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0755"
  tags:
    - user

- name: Symlink mise binary into ~/.local/bin
  when: not (ansible_check_mode and directory_mise.changed)
  file:
    src: "{{ ansible_user_dir }}/.local/share/mise/bin/mise"
    dest: "{{ ansible_user_dir }}/.local/bin/mise"
    state: link
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
  tags:
    - user

- name: Create mise completions directory
  when: mise_version not in mise_check.stdout
  file:
    path: "{{ ansible_user_dir }}/.local/share/mise/completions"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0755"
  tags:
    - user

- name: Generate mise zsh completions
  when: mise_version not in mise_check.stdout
  shell: "{{ ansible_user_dir }}/.local/share/mise/bin/mise completion zsh > {{ ansible_user_dir }}/.local/share/mise/completions/_mise"
  tags:
    - user

- name: Delete mise archive
  when: mise_version not in mise_check.stdout
  file:
    path: /tmp/mise-{{ mise_version }}.tar.gz
    state: absent
  tags:
    - user

- name: Add 1password repository key
  when: not (ansible_check_mode and apt_install_gpg.changed)
  apt_key:
    id: AC2D62742012EA22
    url: https://downloads.1password.com/linux/keys/1password.asc
    keyring: /etc/apt/trusted.gpg.d/1password.gpg
  become: true
  tags:
    - user

- name: Add 1password repository
  apt_repository:
    repo: deb [arch={{ (ansible_architecture == "aarch64") | ternary('arm64', 'amd64') }} signed-by=/etc/apt/trusted.gpg.d/1password.gpg] {{ mirror_apt_1password }} stable main
  become: true
  register: apt_repository_1password
  tags:
    - user

- name: Install packages
  when: not (ansible_check_mode and apt_repository_1password.changed)
  apt:
    pkg:
      - 1password-cli
    cache_valid_time: 3600
  become: true
  tags:
    - user
