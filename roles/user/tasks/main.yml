- name: Validate required inputs
  assert:
    that:
      - ssh_public_keys is defined and ssh_public_keys | length > 0
      - root_email is defined and root_email | length > 0
    fail_msg: >-
      ssh_public_keys and root_email must be set in host_vars/group_vars.
  tags:
    - user

- name: Install packages
  apt:
    pkg:
      - attr
      - btop
      - ccze
      - cloud-image-utils
      - curl
      - dnsutils
      - edac-utils
      - fatrace
      - fdupes
      - git
      - git-lfs
      - gpg
      - gparted
      - htop
      - iotop
      - iperf3
      - iputils-arping
      - jq
      - lsof
      - make
      - man-db
      - mitmproxy
      - moreutils
      - mosh
      - mutt
      - ncdu
      - nmon
      - nnn
      - nvme-cli
      - pandoc
      - parallel
      - parted
      - pass
      - progress
      - psmisc
      - rsync
      - screen
      - socat
      - strace
      - stress
      - sysstat
      - tcpdump
      - telnet
      - tig
      - tmux
      - tree
      - usbutils
      - vim
      - zsh
    cache_valid_time: 3600
  become: true
  register: user_apt_packages
  tags:
    - user

- name: Install amd64-only packages
  when: ansible_architecture == "x86_64"
  apt:
    pkg:
      - i7z
    cache_valid_time: 3600
  become: true
  tags:
    - user

# adm owns most of /var/log (syslog, auth.log, journal via systemd-journal),
# so membership lets the operator tail logs over SSH without sudo -- the
# diagnostic reads CLAUDE.md treats as pre-authorized. kvm owns /dev/kvm,
# so membership lets the operator boot qemu VMs (test harness, ad-hoc libvirt)
# without sudo. append is load-bearing: without it `groups:` replaces the
# supplementary set and would strip sudo.
- name: Set login shell and supplementary groups
  user:
    name: "{{ ansible_user_id }}"
    shell: /bin/zsh
    groups: [adm, kvm]
    append: true
  become: true
  tags:
    - user

# The operator connects from Ghostty (TERM=xterm-ghostty); a host that
# doesn't ship that terminfo entry leaves zsh's zle without capability
# lookups, which manifests as doubled keystrokes and runaway line redraw
# over SSH. Install system-wide so sudo/root shells inherit it too.
- name: Install Ghostty terminfo source
  copy:
    src: xterm-ghostty.terminfo
    dest: /etc/terminfo/xterm-ghostty.terminfo
    owner: root
    group: root
    mode: "0644"
    backup: true
  become: true
  register: user_ghostty_terminfo
  tags:
    - user

# Gate the compile on the source copy so an updated terminfo recompiles,
# but skip the check-mode fresh-box case where the copy only reports the
# change without writing the file tic would read.
- name: Compile Ghostty terminfo
  when: user_ghostty_terminfo.changed and not ansible_check_mode
  command: tic -x -o /etc/terminfo /etc/terminfo/xterm-ghostty.terminfo
  changed_when: true
  become: true
  tags:
    - user

- name: Sudo without password
  when: ansible_user_id != "root"
  copy:
    dest: /etc/sudoers.d/{{ ansible_user_id }}
    content: "{{ ansible_user_id }} ALL=(ALL) NOPASSWD:ALL\n"
    validate: visudo -cf %s
    backup: true
    owner: root
    group: root
    mode: "0440"
  become: true
  tags:
    - user

- name: Cleanup sudoers added by cloud-init
  file:
    path: /etc/sudoers.d/90-cloud-init-users
    state: absent
  become: true
  tags:
    - user

# Linger keeps {{ ansible_user_id }}'s user manager up across SSH sessions so
# user-scope timers (e.g. podman_prune.timer) fire on schedule instead of
# only when someone happens to be logged in. Cost: a persistent
# `systemd --user` process and any backgrounded ssh/tmux processes survive
# logout instead of being reaped by KillUserProcesses.
- name: Turn on linger
  import_role:
    name: linger
    tasks_from: linger
  vars:
    linger_args:
      name: "{{ ansible_user_id }}"
      uid: "{{ ansible_user_uid }}"
  tags:
    - user

- name: Add authorized keys
  authorized_key:
    user: "{{ ansible_user_id }}"
    key: "{{( ssh_public_keys + '\n' + (ssh_public_keys_additional | default(''))) | trim }}"
    exclusive: true
  tags:
    - user

- name: Configure git
  template:
    src: gitconfig.j2
    dest: "{{ ansible_user_dir }}/.gitconfig.local"
    mode: "0644"
    owner: "{{ ansible_user_id }}"
    group: "{{ ansible_user_id }}"
    backup: true
    validate: git config --file %s --list
  tags:
    - user

- name: Check for the commit-signing GPG key
  command: gpg --list-keys C248DE6357445D6302F9A62E74BFD03C20CC21AF
  register: user_gpg_check
  failed_when: false
  changed_when: false
  check_mode: false
  tags:
    - user

# Fetch over HTTPS rather than gpg --keyserver: bare HKP is port 11371
# (widely firewalled), and dirmngr hard-fails when keyserver.ubuntu.com
# resolves to an AAAA the host can't route (the qemu test net has no IPv6
# route) instead of falling back. curl rides 443 and happy-eyeballs to IPv4.
- name: Import the commit-signing public key
  when:
    - user_gpg_check.rc != 0
    - not (ansible_check_mode and user_apt_packages.changed)
  shell: |
    set -euo pipefail
    curl -fsSL "https://keyserver.ubuntu.com/pks/lookup?op=get&search=0xC248DE6357445D6302F9A62E74BFD03C20CC21AF" | gpg --batch --import
  args:
    executable: /bin/bash
  changed_when: true
  register: user_gpg_import
  until: user_gpg_import.rc == 0
  retries: 3
  delay: 5
  tags:
    - user

# GNU stow symlinks the dotfiles into $HOME. The repo is a normal clone
# at ~/.dotfiles on the fleet.
- name: Install GNU stow
  apt:
    name: stow
    state: present
  become: true
  tags:
    - user

# Skip in check mode when git was only would-be-installed above: the git
# module shells out to the binary even to read status, so it hard-fails on a
# fresh host where the apt task above merely *reported* the install. Lets the
# operator dry-run the role with --check before a prod apply.
- name: Clone dotfiles repo  # noqa: latest[git]
  when: not (ansible_check_mode and user_apt_packages.changed)
  git:
    repo: "{{ mirror_github }}/adrienkohlbecker/dotfiles.git"
    dest: "{{ ansible_user_dir }}/.dotfiles"
    update: false
  register: user_dotfiles_clone
  until: user_dotfiles_clone is not failed
  retries: 3
  delay: 5
  tags:
    - user

- name: Check installed mise version
  command: "{{ ansible_user_dir }}/.local/share/mise/bin/mise --version"
  register: user_mise_check
  failed_when: false
  changed_when: false
  check_mode: false
  tags:
    - user

# The pin is authoritative: any drift from user_mise_version -- including a
# mise that self-updated past it -- flags a reinstall to restore the pinned
# version, so the comparison is exact-match, not upgrade-only.
- name: Set mise upgrade flag
  set_fact:
    user_mise_needs_upgrade: "{{ user_mise_check.stdout is not defined or (user_mise_check.stdout.split()[0] | default('')) != user_mise_version }}"
  tags:
    - user

- name: Create mise directories
  when: user_mise_needs_upgrade
  file:
    path: "{{ item }}"
    state: directory
    owner: "{{ ansible_user_id }}"
    group: "{{ ansible_user_id }}"
    mode: "0755"
  loop:
    - "{{ ansible_user_dir }}/.cache"
    - "{{ ansible_user_dir }}/.local/share"
    - "{{ ansible_user_dir }}/.local/bin"
    - "{{ ansible_user_dir }}/.local/share/mise/completions"
  register: user_mise_dirs
  tags:
    - user

# Stage in the operator-owned ~/.cache rather than world-writable /tmp -- a
# fixed /tmp/mise-<ver>.tar.gz name is a symlink/TOCTOU target on a multi-user
# host (get_url's checksum catches a tampered payload, but not a hijacked dest).
- name: Download mise archive
  when: user_mise_needs_upgrade
  check_mode: false
  get_url:
    url: "{{ user_mise_release[ansible_architecture].url }}"
    checksum: "sha256:{{ user_mise_release[ansible_architecture].sha256 }}"
    dest: "{{ ansible_user_dir }}/.cache/mise-{{ user_mise_version }}.tar.gz"
    mode: "0644"
  register: user_mise_download
  until: user_mise_download is not failed
  retries: 3
  delay: 5
  tags:
    - user

- name: Install mise binary
  when: user_mise_needs_upgrade and not (ansible_check_mode and user_mise_dirs.changed)
  unarchive:
    src: "{{ ansible_user_dir }}/.cache/mise-{{ user_mise_version }}.tar.gz"
    remote_src: true
    dest: "{{ ansible_user_dir }}/.local/share"
    owner: "{{ ansible_user_id }}"
    group: "{{ ansible_user_id }}"
    list_files: true
  register: user_mise_unarchive
  tags:
    - user

# Fail loud if an upstream tarball-layout change drops mise/bin/mise: otherwise
# the version check below keeps reporting needs_upgrade and re-extracts every
# converge while the binary stays absent.
- name: Assert the mise binary extracted
  when: user_mise_needs_upgrade and not ansible_check_mode
  assert:
    that:
      - "'mise/bin/mise' in (user_mise_unarchive.files | default([]))"
    fail_msg: >-
      mise tarball layout changed: expected mise/bin/mise,
      got {{ user_mise_unarchive.files | default([]) }}
  tags:
    - user

- name: Symlink mise binary into ~/.local/bin
  when: not (ansible_check_mode and user_mise_dirs.changed)
  file:
    src: "{{ ansible_user_dir }}/.local/share/mise/bin/mise"
    dest: "{{ ansible_user_dir }}/.local/bin/mise"
    state: link
    owner: "{{ ansible_user_id }}"
    group: "{{ ansible_user_id }}"
  tags:
    - user

- name: Generate mise zsh completions
  when: user_mise_needs_upgrade
  shell: |
    set -euo pipefail
    {{ ansible_user_dir }}/.local/share/mise/bin/mise completion zsh > {{ ansible_user_dir }}/.local/share/mise/completions/_mise
  args:
    executable: /bin/bash
  changed_when: true
  tags:
    - user

- name: Delete mise archive
  when: user_mise_needs_upgrade
  file:
    path: "{{ ansible_user_dir }}/.cache/mise-{{ user_mise_version }}.tar.gz"
    state: absent
  tags:
    - user

# Deploy the dotfiles via the repo's own `stow` mise task — single source of
# truth for the stow flags/package set (see mise.toml in the dotfiles repo)
# instead of duplicating them here. Runs from ~/.dotfiles so mise finds the
# repo's task; `mise trust` accepts the freshly cloned project config. Ordered
# after the mise binary install (needs it) and before the tool install below
# (which needs the ~/.config/mise symlink this lays down, along with every other
# dotfile symlink). creates: makes it a one-time deploy.
#
# Skip in check mode whenever the clone above didn't materialize ~/.dotfiles --
# skipped (fresh host, git not really installed) or would-change -- since this
# shell chdirs into it and would hard-fail. A real run, or a check run against
# an already-cloned host, still deploys/previews.
- name: Deploy dotfiles into $HOME (mise stow task)
  when: not (ansible_check_mode and (user_dotfiles_clone is skipped or user_dotfiles_clone.changed))
  shell: |
    set -euo pipefail
    mise="{{ ansible_user_dir }}/.local/share/mise/bin/mise"
    "$mise" trust
    "$mise" run stow
  args:
    executable: /bin/bash
    chdir: "{{ ansible_user_dir }}/.dotfiles"
    # Sentinel on the ~/.config/mise symlink the next task depends on, not
    # ~/.zshrc -- a stow that half-failed before laying that link down re-runs
    # instead of staying wedged behind an already-present .zshrc.
    creates: "{{ ansible_user_dir }}/.config/mise"
  environment:
    MISE_YES: "1"
  tags:
    - user

# Install whatever the dotfiles' mise config declares — single-sourced there
# rather than duplicated as a list here. On the fleet that's the cross-platform
# CLI utilities in ~/.config/mise/config.toml (fd, bat, zoxide, atuin, delta,
# eza); the language runtimes live in the mac-only config.mac.toml (MISE_ENV=mac,
# unset here) so a bare `mise install` never tries to compile ruby on a server.
# zoxide and atuin are eval'd unconditionally in .zshrc, so this also stops fleet
# shells from erroring on a missing binary. changed_when compares the installed-
# tool set before/after, so a re-run where everything is present reports ok.
- name: Install mise-managed tools
  shell: |
    set -euo pipefail
    mise="{{ ansible_user_dir }}/.local/share/mise/bin/mise"
    before="$("$mise" ls --installed 2>/dev/null || true)"
    "$mise" install
    after="$("$mise" ls --installed 2>/dev/null || true)"
    [ "$before" = "$after" ] || echo CHANGED
  args:
    executable: /bin/bash
    chdir: "{{ ansible_user_dir }}"
  # aqua (mise's tool backend) authenticates its api.github.com calls with
  # GITHUB_TOKEN, lifting the 60/hr anon rate limit to 5000/hr. Sourced from
  # the controller's env (CI sets it from the MISE_GITHUB_TOKEN secret); empty
  # on an operator workstation, where mise stays anon -- fine at single-host
  # volume. Reading via lookup keeps the token out of argv.
  environment:
    GITHUB_TOKEN: "{{ lookup('env', 'GITHUB_TOKEN') | default('', true) }}"
    MISE_YES: "1"
  register: user_mise_tools
  changed_when: "'CHANGED' in user_mise_tools.stdout"
  until: user_mise_tools is not failed
  retries: 3
  delay: 5
  tags:
    - user

- name: Configure 1Password apt repository
  import_role:
    name: apt_source
    tasks_from: configure
  vars:
    apt_source_args:
      name: 1password
      key_id: 3FEF9748469ADBE15DA7CA80AC2D62742012EA22
      key_url: https://downloads.1password.com/linux/keys/1password.asc
      uris: "{{ mirror_apt_1password }}"
      suites: stable
      components: main
  tags:
    - user

- name: Install 1Password CLI
  when: not (ansible_check_mode and apt_source_1password_changed)
  apt:
    pkg:
      - 1password-cli
    cache_valid_time: 3600
  become: true
  tags:
    - user
