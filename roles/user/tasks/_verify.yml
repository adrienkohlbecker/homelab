- name: _verify | Read login shell for {{ ansible_user_id }}
  command: getent passwd {{ ansible_user_id }}
  changed_when: false
  register: _user_getent

- name: _verify | Login shell is zsh
  assert:
    that:
      - _user_getent.stdout.endswith('/zsh')
    fail_msg: >-
      Expected login shell /bin/zsh,
      got {{ _user_getent.stdout.split(':')[-1] | default('') }}

- name: _verify | Read supplementary groups
  command: id -nG {{ ansible_user_id }}
  changed_when: false
  register: _user_groups

- name: _verify | Member of adm and kvm groups
  assert:
    that:
      - "'adm' in _user_groups.stdout.split()"
      - "'kvm' in _user_groups.stdout.split()"
    fail_msg: >-
      Expected adm and kvm in supplementary groups,
      got {{ _user_groups.stdout | default('') }}

- name: _verify | Ghostty terminfo is compiled
  command: infocmp xterm-ghostty
  changed_when: false

- name: _verify | Passwordless sudo works
  command: sudo -n true
  changed_when: false

- name: _verify | Mise binary runs
  command: "{{ ansible_user_dir }}/.local/share/mise/bin/mise --version"
  changed_when: false
  register: _user_mise_version

- name: _verify | Mise version matches pin
  assert:
    that:
      - user_mise_version in _user_mise_version.stdout
    fail_msg: >-
      Expected mise {{ user_mise_version }},
      got {{ _user_mise_version.stdout | default('') }}

- name: _verify | Mise-managed tools are installed
  command: "{{ ansible_user_dir }}/.local/share/mise/bin/mise ls --installed"
  environment:
    HOME: "{{ ansible_user_dir }}"
  changed_when: false
  register: _user_mise_tools

- name: _verify | At least one mise tool installed
  assert:
    that:
      - _user_mise_tools.stdout | length > 0
    fail_msg: >-
      mise ls --installed returned no tools -- mise install did not run

- name: _verify | Dotfiles deployed (zshrc is a symlink)
  stat:
    path: "{{ ansible_user_dir }}/.zshrc"
  register: _user_zshrc

- name: _verify | .zshrc is a symlink from stow
  assert:
    that:
      - _user_zshrc.stat.exists
      - _user_zshrc.stat.islnk
    fail_msg: >-
      Expected ~/.zshrc to be a symlink (stow deploy),
      got exists={{ _user_zshrc.stat.exists | default(false) }}
      islnk={{ _user_zshrc.stat.islnk | default(false) }}

# Read through the full git config stack (the stowed ~/.gitconfig and its
# [include] of ~/.gitconfig.local) rather than the fragment directly, so a
# dotfiles .gitconfig that ever drops the include is caught here.
- name: _verify | Gitconfig email resolves through the include chain  # noqa: command-instead-of-module
  command: git config --global user.email
  environment:
    HOME: "{{ ansible_user_dir }}"
  changed_when: false
  register: _user_git_email

- name: _verify | Gitconfig email matches root_email
  assert:
    that:
      - _user_git_email.stdout == root_email
    fail_msg: >-
      Expected git user.email={{ root_email }},
      got {{ _user_git_email.stdout | default('') }}

- name: _verify | 1Password CLI is installed
  command: op --version
  changed_when: false
  register: _user_op_version

- name: _verify | Op version is non-empty
  assert:
    that:
      - _user_op_version.stdout | length > 0
    fail_msg: >-
      op --version produced no output

# minimal exists in meta/test.yml specifically to exercise this cleanup: the
# vanilla cloud image ships /etc/sudoers.d/90-cloud-init-users, box does not.
- name: _verify | Cloud-init sudoers drop-in is removed
  stat:
    path: /etc/sudoers.d/90-cloud-init-users
  # /etc/sudoers.d is 0750 root -- the operator can't traverse it unprivileged.
  become: true
  register: _user_cloudinit_sudoers

- name: _verify | No cloud-init sudoers residue
  assert:
    that:
      - not _user_cloudinit_sudoers.stat.exists
    fail_msg: /etc/sudoers.d/90-cloud-init-users should have been removed

- name: _verify | Linger marker is present
  stat:
    path: /var/lib/systemd/linger/{{ ansible_user_id }}
  register: _user_linger

- name: _verify | Linger is enabled
  assert:
    that:
      - _user_linger.stat.exists
    fail_msg: >-
      Expected linger enabled
      (/var/lib/systemd/linger/{{ ansible_user_id }} missing)

- name: _verify | Commit-signing GPG key is imported
  command: gpg --with-colons --list-keys C248DE6357445D6302F9A62E74BFD03C20CC21AF
  changed_when: false

- name: _verify | Read authorized_keys
  slurp:
    path: "{{ ansible_user_dir }}/.ssh/authorized_keys"
  register: _user_authkeys

# exclusive: true must leave nothing but the configured keys -- compare the
# count of real key lines on disk to the configured set so a stray key fails.
- name: _verify | Authorized keys are exactly the configured set
  vars:
    _configured: "{{ ((ssh_public_keys ~ '\n' ~ (ssh_public_keys_additional | default(''))) | trim).split('\n') | select('match', '^(ssh-|ecdsa-|sk-)') | list }}"
    _present: "{{ (_user_authkeys.content | b64decode).split('\n') | select('match', '^(ssh-|ecdsa-|sk-)') | list }}"
  assert:
    that:
      - _present | length == _configured | length
    fail_msg: >-
      Expected {{ _configured | length }} authorized keys (exclusive: true),
      got {{ _present | length }}
