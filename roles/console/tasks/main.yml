- name: Assert grub_bootloader is set
  assert:
    that: grub_bootloader is defined
    fail_msg: console requires grub_bootloader (bool) in host/group vars.
  tags:
    - console

- name: Assert zfs_root is set on ZBM hosts
  when: not grub_bootloader
  assert:
    that: zfs_root is defined
    fail_msg: ZBM console hosts (grub_bootloader=false) require zfs_root for the cmdline property write.
  tags:
    - console

- name: Install console-setup + keyboard-configuration
  apt:
    pkg:
      - initramfs-tools
      - console-setup
      - keyboard-configuration
    cache_valid_time: 3600
  become: true
  register: console_apt
  tags:
    - console

- name: Configure console-setup
  copy:
    src: console-setup
    dest: /etc/default/console-setup
    owner: root
    group: root
    mode: "0644"
    backup: true
    validate: sh -n %s
  register: console_cfg
  become: true
  tags:
    - console

- name: Configure keyboard
  copy:
    src: keyboard
    dest: /etc/default/keyboard
    owner: root
    group: root
    mode: "0644"
    backup: true
    validate: sh -n %s
  register: console_keyboard_cfg
  become: true
  tags:
    - console

# setupcon --save reads both /etc/default/console-setup and
# /etc/default/keyboard, so a single invocation covers both changes.
# No --force (intentionally dropped): setupcon then fails loudly on a bad
# config rather than forcing it onto the live VTs, and --force can trigger
# a hard reboot when X holds the console. The live VTs pick up the new
# config at the next boot (reboot-required is touched below).
- name: Apply console-setup + keyboard to live ttys
  when: (console_cfg.changed or console_keyboard_cfg.changed) and not ansible_check_mode
  command: setupcon --save
  changed_when: true
  become: true
  tags:
    - console

- name: Update initramfs
  when:
    - console_cfg.changed or console_keyboard_cfg.changed
    - not (ansible_check_mode and console_apt.changed)
  command: update-initramfs -u -k all
  changed_when: true
  become: true
  tags:
    - console

# Disabling console blanking has two halves that don't overlap:
#
#   1. consoleblank=0 on the kernel cmdline (below) — disables the VT
#      idle-blank timer from before userspace exists, so an early-boot
#      panic stays on screen instead of blanking 10 minutes later.
#   2. console_noblank.service (above) — runs `setterm --powersave off
#      --powerdown 0` to disable DPMS, which is monitor-side state the
#      kernel cmdline can't reach.
#
# Both matter for walk-up/KVM-IP debugging: (1) handles the kernel
# timer, (2) keeps the monitor from sleeping on top of that.
- name: Remove legacy console-noblank.service (renamed to console_noblank)
  import_role:
    name: systemd_unit
    tasks_from: remove
  vars:
    systemd_unit_args:
      dest: console-noblank.service
  tags:
    - console

- name: Install console_noblank.service
  import_role:
    name: systemd_unit
    tasks_from: install
  vars:
    systemd_unit_args:
      src: console_noblank.service
  tags:
    - console

- name: Enable console_noblank.service
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: console_noblank.service
      condition: "{{ not (ansible_check_mode and console_noblank_service_result.changed) }}"
      restart: "{{ console_noblank_service_result.changed }}"
  tags:
    - console

- name: Create /etc/default/grub.d directory
  when: grub_bootloader
  file:
    dest: /etc/default/grub.d
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true
  tags:
    - console

- name: Set GRUB cmdline (consoleblank=0)
  when: grub_bootloader
  copy:
    dest: /etc/default/grub.d/99-console.cfg
    # GRUB_CMDLINE_LINUX (not _DEFAULT) so the recovery menuentry also
    # carries consoleblank=0 — recovery boot is exactly the walk-up
    # debug case where a blanking timer is most unwelcome.
    content: "GRUB_CMDLINE_LINUX=\"$GRUB_CMDLINE_LINUX consoleblank=0\"\n"
    backup: true
    owner: root
    group: root
    mode: "0644"
  register: console_grub_cfg
  become: true
  tags:
    - console

- name: Remove legacy ZBM cmdline file (renamed to `consoleblank`)
  when: not grub_bootloader
  file:
    path: /etc/zfsbootmenu/console
    state: absent
  become: true
  tags:
    - console

- name: Set ZBM cmdline (consoleblank=0)
  when: not grub_bootloader
  import_role:
    name: zfsbootmenu
    tasks_from: cmdline
  vars:
    zfsbootmenu_cmdline_file: consoleblank
    zfsbootmenu_cmdline_contents: consoleblank=0
  tags:
    - console

- name: Update grub
  when: grub_bootloader and console_grub_cfg.changed
  command: update-grub
  changed_when: true
  become: true
  tags:
    - console

# The ZBM-cmdline path touches /var/run/reboot-required inside
# roles/zfsbootmenu/tasks/cmdline.yml; this task covers the other
# three change sources locally.
- name: Ask to reboot
  when: >-
    console_cfg.changed or console_keyboard_cfg.changed
    or (grub_bootloader and console_grub_cfg.changed)
  file:
    path: /var/run/reboot-required
    state: touch
    owner: root
    group: root
    mode: "0644"
  become: true
  tags:
    - console
