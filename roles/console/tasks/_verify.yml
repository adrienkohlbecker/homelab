# Functional checks for the console role. The converge proves apt +
# copy + update-initramfs exit-coded cleanly; these checks verify that
# (a) the initramfs picked up both /etc/default/console-setup and
# /etc/default/keyboard -- i.e. the console_setup initramfs hook fired
# and bundled both configs into the initrd, and (b) the running kernel
# actually applied consoleblank=0 from whichever cmdline mechanism (ZBM
# property / GRUB grub.d) the host uses. Live tty glyph output isn't
# observable in a headless QEMU run, so the noblank service is checked
# via exit-code only.
#
# We reboot at the top of the verify so the running kernel reflects
# the cmdline we just wrote -- without that, /sys/module/kernel/
# parameters/consoleblank shows the pre-role value (ZBM/GRUB apply at
# next boot), and `active` on the noblank oneshot would only prove it
# ran at the *previous* boot. Costs one extra ~30s boot per test run;
# in exchange every downstream check tests post-reboot reality rather
# than next-boot intent.

# Aarch64 boxes (packer-built on arm Macs) bypass ZBM entirely:
# chroot.sh registers a direct EFI-stub Boot#### entry whose
# kernel cmdline is set once at image-build time. So the ZBM
# commandline property write the role just made wouldn't affect
# a post-reboot kernel here, and on top of that EDK2 aarch64 has
# a known reboot bug on this image (refind UEFI firmware crashes
# trying to load an X64 image after the kernel triggers reset).
# Skip the reboot + the post-reboot sysfs check on aarch64; the
# ZBM property / GRUB cfg + config + initrd + service assertions
# below still prove the role wrote the next-boot config correctly,
# which is the load-bearing contract on x86_64 prod hosts.
- name: _verify | Reboot to apply role changes
  when: ansible_architecture != 'aarch64'
  reboot:
    reboot_timeout: 120
  become: true

- name: _verify | Read console-setup config
  slurp:
    src: /etc/default/console-setup
  register: _console_content
  become: true

- name: _verify | Config carries expected directives
  vars:
    _content: "{{ _console_content.content | b64decode }}"
  assert:
    that:
      # Exactly one un-commented line starts with `KEY=`, and it
      # matches the expected literal — catches both missing directives
      # and contradicting duplicates appended below (last-assignment
      # wins on shell-source).
      - _content | regex_findall('^' ~ item.split('=')[0] ~ '=.*$', multiline=True) | length == 1
      - item in (_content | regex_findall('^' ~ item.split('=')[0] ~ '=.*$', multiline=True))
    fail_msg: "console-setup directive missing or duplicated: {{ item }}"
  loop:
    - 'CHARMAP="UTF-8"'
    - 'CODESET="Lat15"'
    - 'FONTFACE="Fixed"'
    - 'FONTSIZE="8x16"'
    - 'ACTIVE_CONSOLES="/dev/tty[1-6]"'

- name: _verify | Read keyboard config
  slurp:
    src: /etc/default/keyboard
  register: _console_keyboard_content
  become: true

- name: _verify | Keyboard config carries expected directives
  vars:
    _content: "{{ _console_keyboard_content.content | b64decode }}"
  assert:
    that:
      - _content | regex_findall('^' ~ item.split('=')[0] ~ '=.*$', multiline=True) | length == 1
      - item in (_content | regex_findall('^' ~ item.split('=')[0] ~ '=.*$', multiline=True))
    fail_msg: "keyboard config directive missing or duplicated: {{ item }}"
  loop:
    - 'XKBMODEL="pc105"'
    - 'XKBLAYOUT="fr"'
    - 'XKBVARIANT=""'
    - 'XKBOPTIONS="terminate:ctrl_alt_bksp"'

# Live-VT probe: the disk-config + initrd checks above only prove
# next-boot config. dumpkeys reads the kernel VT's current keymap
# via KDGKBENT on /dev/tty0, so it doesn't depend on a controlling
# terminal and works fine from ansible's ssh session.
- name: _verify | Read live VT keymap
  command: dumpkeys
  register: _console_dumpkeys
  changed_when: false
  become: true

- name: _verify | Live VT keymap is French AZERTY
  assert:
    # AZERTY maps keycode 16 to 'a' (QWERTY would map it to 'q'). The `\s*$`
    # end-anchor stands in for a `\b`: under ansible-core 2.20 a `\b` in a
    # quoted regex evaluated inside a `that:` conditional is mangled into a
    # backspace escape and never matches. regex_findall | length mirrors the
    # config-directive checks above.
    that:
      - _console_dumpkeys.stdout | regex_findall('^\s*keycode\s+16\s*=\s*\+?a\s*$', multiline=True) | length > 0
    fail_msg: >-
      Live VT keymap doesn't look like French AZERTY:
      keycode 16 did not map to 'a'.

# The console_setup initramfs hook
# (/usr/share/initramfs-tools/hooks/console_setup, shipped by the
# keyboard-configuration package, not console-setup) copies both
# /etc/default/console-setup and /etc/default/keyboard into the initrd
# at the same paths. If the hook didn't fire (package change, hook
# disabled, update-initramfs no-op), either path is absent and this
# fails.
#
# Skipped on cloud images that don't ship per-kernel initrds in /boot
# (Ubuntu's "minimal" cloud images boot a pre-baked initrd packed
# elsewhere and `update-initramfs -u -k all` reports "Nothing to do").
# The check is only meaningful on hosts whose kernel package layout
# manages /boot/initrd.img-<ver> -- i.e. every prod host shape we care
# about; the minimal variant is test scaffolding, not a deployment
# target.
- name: _verify | Stat current kernel's initrd
  stat:
    path: /boot/initrd.img-{{ ansible_kernel }}
  register: _console_initrd_stat
  become: true

- name: _verify | List current kernel's initrd contents
  when: _console_initrd_stat.stat.exists
  command: lsinitramfs /boot/initrd.img-{{ ansible_kernel }}
  register: _console_initrd
  changed_when: false
  become: true

- name: _verify | Initrd bundles console-setup + keyboard configs
  when: _console_initrd_stat.stat.exists
  assert:
    that: item in _console_initrd.stdout_lines
    fail_msg: "initrd missing: {{ item }}"
  loop:
    - etc/default/console-setup
    - etc/default/keyboard

# console_noblank.service is Type=oneshot RemainAfterExit=true, so
# `active` after the start means setterm's ExecStart returned 0 — the
# escape sequence was written to /dev/tty0 successfully. The VT
# blanking/powersave state itself isn't exposed via sysfs (the
# consoleblank module-parameter file shows the boot value, not the
# runtime VT state), so an exit-code check is the strongest functional
# probe available from a headless test.
- name: _verify | Console_noblank.service is enabled  # noqa: command-instead-of-module
  command: systemctl is-enabled console_noblank.service
  register: _console_noblank_enabled
  changed_when: false
  failed_when:
    - _console_noblank_enabled.rc != 0 or _console_noblank_enabled.stdout not in ['enabled', 'static']
  become: true

- name: _verify | Console_noblank.service is active  # noqa: command-instead-of-module
  command: systemctl is-active console_noblank.service
  register: _console_noblank_active
  changed_when: false
  failed_when: _console_noblank_active.stdout | trim != 'active'
  become: true

# Persistent-config checks: confirm the next-boot cmdline source
# carries consoleblank=0 (so a future reboot keeps the setting). The
# runtime probe below proves the *current* boot picked it up.
- name: _verify | ZBM commandline includes consoleblank=0
  when: not grub_bootloader
  command: zfs get -H -o value org.zfsbootmenu:commandline rpool/ROOT
  register: _console_zbm_cmdline
  changed_when: false
  failed_when: "'consoleblank=0' not in _console_zbm_cmdline.stdout"
  become: true

- name: _verify | GRUB cmdline file includes consoleblank=0
  when: grub_bootloader
  slurp:
    src: /etc/default/grub.d/99-console.cfg
  register: _console_grub_cfg
  failed_when: "'consoleblank=0' not in (_console_grub_cfg.content | b64decode)"
  become: true

- name: _verify | Read rendered /boot/grub/grub.cfg
  when: grub_bootloader
  slurp:
    src: /boot/grub/grub.cfg
  register: _console_grub_rendered
  become: true

- name: _verify | Every grub.cfg linux entry includes consoleblank=0
  when: grub_bootloader
  vars:
    _grub: "{{ _console_grub_rendered.content | b64decode }}"
    _all_linux: "{{ _grub | regex_findall('^\\s*linux\\s.*$', multiline=True) }}"
    _with_blank: "{{ _grub | regex_findall('^\\s*linux\\s.*consoleblank=0.*$', multiline=True) }}"
  assert:
    that:
      # Catches an update-grub no-op or a later grub.d snippet resetting
      # the var. Recovery entry must also carry it (see GRUB_CMDLINE_LINUX
      # choice in tasks/main.yml).
      - _all_linux | length > 0
      - _all_linux | length == _with_blank | length
    fail_msg: >-
      grub.cfg has {{ _all_linux | length }} linux entries but only
      {{ _with_blank | length }} carry consoleblank=0

# /sys/module/kernel/parameters/consoleblank exposes the value the
# running kernel parsed from the cmdline at boot. Post-reboot this is
# the strongest functional check: it proves the cmdline source above
# actually propagated through to the kernel, not just that the file/
# property is set correctly. Skipped on aarch64 — the reboot above is
# also skipped, so the running kernel reflects the pre-role cmdline
# (which the EFI-stub entry baked in at image build) and this would
# fail unconditionally.
- name: _verify | Running kernel applied consoleblank=0
  when: ansible_architecture != 'aarch64'
  slurp:
    src: /sys/module/kernel/parameters/consoleblank
  register: _console_consoleblank
  failed_when: (_console_consoleblank.content | b64decode | trim) != '0'
  become: true
