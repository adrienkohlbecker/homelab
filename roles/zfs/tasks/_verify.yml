# ZFS role _verify: assert the role's converged state is live.
# testrole.py / testall.py only (qemu); never site.yml or --tags zfs against prod.

# --- Pool properties ---

- name: _verify | Read managed pool properties
  command: zpool get -H -o value {{ item.name }} {{ item.pool }}
  loop: "{{ zfs_pool_properties }}"
  loop_control:
    label: "{{ item.pool }} {{ item.name }}"
  changed_when: false
  register: _zfs_verify_props
  become: true

- name: _verify | Managed pool properties are applied
  assert:
    that: item.stdout | trim == item.item.value
    fail_msg: >-
      {{ item.item.pool }} {{ item.item.name }} is
      {{ item.stdout | trim }}, expected {{ item.item.value }}.
  loop: "{{ _zfs_verify_props.results }}"
  loop_control:
    label: "{{ item.item.pool }} {{ item.item.name }}"

# --- Root dataset autobackup property ---

- name: _verify | Read autobackup:bak on root dataset
  when: zfs_root
  command: zfs get -H -o value autobackup:bak rpool/ROOT/{{ ansible_distribution_release }}
  register: _zfs_verify_autobackup
  changed_when: false
  become: true

- name: _verify | Root dataset autobackup:bak is set
  when: zfs_root
  assert:
    that: _zfs_verify_autobackup.stdout | trim == "true"
    fail_msg: >-
      autobackup:bak on rpool/ROOT/{{ ansible_distribution_release }} is
      {{ _zfs_verify_autobackup.stdout | trim }}, expected true.

# --- Zed service ---

- name: _verify | Query zed unit state
  when: zfs_root
  systemd:
    name: zfs-zed
  register: _zfs_verify_zed
  become: true

- name: _verify | Zed is active and enabled
  when: zfs_root
  assert:
    that:
      - _zfs_verify_zed.status.ActiveState == 'active'
      - _zfs_verify_zed.status.UnitFileState == 'enabled'

- name: _verify | Read zed.rc notification config
  when: zfs_root
  command: grep -E '^ZED_EMAIL_ADDR=' /etc/zfs/zed.d/zed.rc
  register: _zfs_verify_zedrc
  changed_when: false
  failed_when: false
  become: true

- name: _verify | Zed email notifications point at root
  when: zfs_root
  assert:
    that: _zfs_verify_zedrc.stdout == 'ZED_EMAIL_ADDR="root"'
    fail_msg: >-
      zed.rc ZED_EMAIL_ADDR is {{ _zfs_verify_zedrc.stdout | default('<unset>') }},
      expected ZED_EMAIL_ADDR="root".

# --- Core ZFS boot services ---

- name: _verify | Query boot service state
  when: zfs_root
  systemd:
    name: "{{ item }}"
  loop:
    - zfs.target
    - zfs-import.target
    - zfs-import-cache
    - zfs-mount
  register: _zfs_verify_boot_services
  become: true

- name: _verify | Boot services are enabled
  when: zfs_root
  assert:
    that: item.status.UnitFileState in ['enabled', 'static', 'enabled-runtime']
    fail_msg: >-
      {{ item.item }} UnitFileState is {{ item.status.UnitFileState }},
      expected enabled/static.
  loop: "{{ _zfs_verify_boot_services.results }}"
  loop_control:
    label: "{{ item.item }}"

# --- Health timer ---
# (script deployment is covered functionally by the live zfs_health run at the
# end of this file, and by `validate: bash -n` at copy time -- no stat needed.)

- name: _verify | Read health timer state  # noqa: command-instead-of-module
  command: systemctl show -p ActiveState,UnitFileState --value zfs_health.timer
  register: _zfs_verify_health_timer
  changed_when: false
  become: true

- name: _verify | Health timer is active and enabled
  assert:
    that:
      - _zfs_verify_health_timer.stdout_lines[0] == 'active'
      - _zfs_verify_health_timer.stdout_lines[1] == 'enabled'

# --- Trim timers (lab only; box has zfs_trim_pools=[]) ---

- name: _verify | Read trim timer state  # noqa: command-instead-of-module
  when: zfs_trim_pools | length > 0
  command: systemctl show -p ActiveState,UnitFileState --value zfs_trim_{{ item }}.timer
  loop: "{{ zfs_trim_pools }}"
  register: _zfs_verify_trim_timers
  changed_when: false
  become: true

- name: _verify | Trim timers are active and enabled
  when: zfs_trim_pools | length > 0
  assert:
    that:
      - item.stdout_lines[0] == 'active'
      - item.stdout_lines[1] == 'enabled'
    fail_msg: >-
      zfs_trim_{{ item.item }}.timer is not active+enabled:
      {{ item.stdout_lines }}.
  loop: "{{ _zfs_verify_trim_timers.results }}"
  loop_control:
    label: "{{ item.item }}"

# --- Mount generator (lab only; box has zfs_mount_cache_datasets=[]) ---

- name: _verify | Mount cache directory exists
  stat:
    path: /etc/zfs/zfs-list.cache
  register: _zfs_verify_cache_dir
  become: true

- name: _verify | Assert mount cache directory exists
  assert:
    that: _zfs_verify_cache_dir.stat.exists

- name: _verify | Read mount cache content for each pool
  when: zfs_mount_cache_datasets | length > 0
  command: cat /etc/zfs/zfs-list.cache/{{ item.split('/')[0] }}
  loop: "{{ zfs_mount_cache_datasets }}"
  register: _zfs_verify_cache_files
  changed_when: false
  become: true

- name: _verify | Mount cache lists its configured dataset
  when: zfs_mount_cache_datasets | length > 0
  assert:
    that: item.item in item.stdout
    fail_msg: >-
      /etc/zfs/zfs-list.cache/{{ item.item.split('/')[0] }} does not list
      dataset {{ item.item }} -- the zed cacher did not populate it.
  loop: "{{ _zfs_verify_cache_files.results }}"
  loop_control:
    label: "{{ item.item }}"

- name: _verify | Zed cacher symlink exists
  stat:
    path: /etc/zfs/zed.d/history_event-zfs-list-cacher.sh
  register: _zfs_verify_cacher_link
  become: true

- name: _verify | Assert zed cacher symlink
  assert:
    that:
      - _zfs_verify_cacher_link.stat.exists
      - _zfs_verify_cacher_link.stat.islnk

# --- Dry-run health script ---

- name: _verify | Health script runs without error
  command: /usr/local/bin/zfs_health
  changed_when: false
  become: true

# --- dataset.yml round-trip ---
# Functionally exercise the role's most-consumed export. dataset.yml is imported
# by ~6 other roles and its load-bearing `^tank/` -> zfs_tank_filesystem rewrite
# is untested anywhere else. Create a throwaway dataset through it, assert it
# resolved + mounted at the right path, then tear everything down. The probe
# name `tank/_verify_probe` is safe on every fixture because zfs_tank_filesystem
# always points at an existing pool (tank/ -> rpool/ on box, tank/ -> tank/ on lab),
# so this also covers the rewrite itself on box.
- name: _verify | Exercise dataset.yml with a throwaway probe
  when: zfs_root
  vars:
    zfs_dataset_args:
      dataset: tank/_verify_probe
      mountpoint: /mnt/_verify_probe
  import_tasks: dataset.yml

# A wrong rewrite would resolve to a non-existent dataset and these gets would
# fail loudly -- so dataset existence is itself the rewrite assertion.
- name: _verify | Read probe dataset mountpoint
  when: zfs_root
  command: zfs get -H -o value mountpoint {{ zfs_tank_filesystem | default('tank') }}/_verify_probe
  register: _zfs_verify_probe_mp
  changed_when: false
  become: true

- name: _verify | Read probe dataset mounted state
  when: zfs_root
  command: zfs get -H -o value mounted {{ zfs_tank_filesystem | default('tank') }}/_verify_probe
  register: _zfs_verify_probe_mounted
  changed_when: false
  become: true

- name: _verify | Probe dataset resolved, mounted at the right path
  when: zfs_root
  assert:
    that:
      - _zfs_verify_probe_mp.stdout | trim == '/mnt/_verify_probe'
      - _zfs_verify_probe_mounted.stdout | trim == 'yes'
    fail_msg: >-
      dataset.yml probe mountpoint={{ _zfs_verify_probe_mp.stdout | trim }}
      mounted={{ _zfs_verify_probe_mounted.stdout | trim }}; expected
      /mnt/_verify_probe + yes.

# Tear down the probe: remove the mount unit dataset.yml created, destroy the
# dataset, drop the mountpoint dir.
- name: _verify | Remove probe mount unit
  when: zfs_root
  import_role:
    name: systemd_unit
    tasks_from: remove
  vars:
    systemd_unit_args:
      dest: zfs_mount_mnt__verify_probe.service

- name: _verify | Destroy probe dataset
  when: zfs_root
  command: zfs destroy -r {{ zfs_tank_filesystem | default('tank') }}/_verify_probe
  changed_when: true
  become: true

- name: _verify | Remove probe mountpoint
  when: zfs_root
  file:
    path: /mnt/_verify_probe
    state: absent
  become: true
