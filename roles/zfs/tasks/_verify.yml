# ZFS role _verify: assert the role's converged state is live.
# testrole.py / testall.py only (qemu); never site.yml or --tags zfs against prod.

# --- Pool properties ---

- name: _verify | Read managed pool properties
  command: zpool get -H -o value {{ item.name }} {{ item.pool }}
  loop: "{{ zfs_pool_properties }}"
  loop_control:
    label: "{{ item.pool }} {{ item.name }}"
  changed_when: false
  register: _zfs_verify_props
  become: true

- name: _verify | Managed pool properties are applied
  assert:
    that: item.stdout | trim == item.item.value
    fail_msg: >-
      {{ item.item.pool }} {{ item.item.name }} is
      {{ item.stdout | trim }}, expected {{ item.item.value }}.
  loop: "{{ _zfs_verify_props.results }}"
  loop_control:
    label: "{{ item.item.pool }} {{ item.item.name }}"

# --- Root dataset autobackup property ---

- name: _verify | Read autobackup:bak on root dataset
  when: zfs_root
  command: zfs get -H -o value autobackup:bak rpool/ROOT/{{ ansible_distribution_release }}
  register: _zfs_verify_autobackup
  changed_when: false
  become: true

- name: _verify | Root dataset autobackup:bak is set
  when: zfs_root
  assert:
    that: _zfs_verify_autobackup.stdout | trim == "true"
    fail_msg: >-
      autobackup:bak on rpool/ROOT/{{ ansible_distribution_release }} is
      {{ _zfs_verify_autobackup.stdout | trim }}, expected true.

# --- Zed service ---

- name: _verify | Query zed unit state
  when: zfs_root
  systemd:
    name: zfs-zed
  register: _zfs_verify_zed
  become: true

- name: _verify | Zed is active and enabled
  when: zfs_root
  assert:
    that:
      - _zfs_verify_zed.status.ActiveState == 'active'
      - _zfs_verify_zed.status.UnitFileState == 'enabled'

- name: _verify | Read zed.rc notification config
  when: zfs_root
  command: grep -E '^ZED_EMAIL_ADDR=' /etc/zfs/zed.d/zed.rc
  register: _zfs_verify_zedrc
  changed_when: false
  failed_when: false
  become: true

- name: _verify | Zed email notifications point at root
  when: zfs_root
  assert:
    that: _zfs_verify_zedrc.stdout == 'ZED_EMAIL_ADDR="root"'
    fail_msg: >-
      zed.rc ZED_EMAIL_ADDR is {{ _zfs_verify_zedrc.stdout | default('<unset>') }},
      expected ZED_EMAIL_ADDR="root".

# --- Core ZFS boot services ---

- name: _verify | Query boot service state
  when: zfs_root
  systemd:
    name: "{{ item }}"
  loop:
    - zfs.target
    - zfs-import.target
    - zfs-import-cache
    - zfs-mount
  register: _zfs_verify_boot_services
  become: true

- name: _verify | Boot services are enabled
  when: zfs_root
  assert:
    that: item.status.UnitFileState in ['enabled', 'static', 'enabled-runtime']
    fail_msg: >-
      {{ item.item }} UnitFileState is {{ item.status.UnitFileState }},
      expected enabled/static.
  loop: "{{ _zfs_verify_boot_services.results }}"
  loop_control:
    label: "{{ item.item }}"

# --- Health timer ---
# (script deployment is covered functionally by the live zfs_health run at the
# end of this file, and by `validate: bash -n` at copy time -- no stat needed.)

- name: _verify | Read health timer state  # noqa: command-instead-of-module
  command: systemctl show -p ActiveState,UnitFileState --value zfs_health.timer
  register: _zfs_verify_health_timer
  changed_when: false
  become: true

- name: _verify | Health timer is active and enabled
  assert:
    that:
      - _zfs_verify_health_timer.stdout_lines[0] == 'active'
      - _zfs_verify_health_timer.stdout_lines[1] == 'enabled'

# --- Trim timers (lab only; box has zfs_trim_pools=[]) ---

- name: _verify | Read trim timer state  # noqa: command-instead-of-module
  when: zfs_trim_pools | length > 0
  command: systemctl show -p ActiveState,UnitFileState --value zfs_trim_{{ item }}.timer
  loop: "{{ zfs_trim_pools }}"
  register: _zfs_verify_trim_timers
  changed_when: false
  become: true

- name: _verify | Trim timers are active and enabled
  when: zfs_trim_pools | length > 0
  assert:
    that:
      - item.stdout_lines[0] == 'active'
      - item.stdout_lines[1] == 'enabled'
    fail_msg: >-
      zfs_trim_{{ item.item }}.timer is not active+enabled:
      {{ item.stdout_lines }}.
  loop: "{{ _zfs_verify_trim_timers.results }}"
  loop_control:
    label: "{{ item.item }}"

# --- Scrub timer + distro scheduler takeover ---

- name: _verify | Read scrub timer state  # noqa: command-instead-of-module
  command: systemctl show -p ActiveState,UnitFileState --value zfs_scrub.timer
  register: _zfs_verify_scrub_timer
  changed_when: false
  become: true

- name: _verify | Scrub timer is active and enabled
  assert:
    that:
      - _zfs_verify_scrub_timer.stdout_lines[0] == 'active'
      - _zfs_verify_scrub_timer.stdout_lines[1] == 'enabled'
    fail_msg: "zfs_scrub.timer is not active+enabled: {{ _zfs_verify_scrub_timer.stdout_lines }}."

- name: _verify | The scrub script kicks off without error
  command: /usr/local/bin/zfs_scrub
  changed_when: false
  become: true

- name: _verify | Distro zfs cron is diverted aside
  command: dpkg-divert --list /etc/cron.d/zfsutils-linux
  register: _zfs_verify_cron_divert
  changed_when: false
  become: true

- name: _verify | Assert distro zfs cron diversion is active
  assert:
    that: "'/etc/cron.d/zfsutils-linux.disabled' in _zfs_verify_cron_divert.stdout"
    fail_msg: >-
      dpkg-divert not active for /etc/cron.d/zfsutils-linux:
      {{ _zfs_verify_cron_divert.stdout }}

- name: _verify | Read distro scrub/trim timer enablement  # noqa: command-instead-of-module
  command: systemctl is-enabled {{ item }}
  loop:
    - zfs-scrub-monthly@.timer
    - zfs-scrub-weekly@.timer
    - zfs-trim-monthly@.timer
    - zfs-trim-weekly@.timer
  register: _zfs_verify_distro_timers
  changed_when: false
  failed_when: false
  become: true

- name: _verify | Distro scrub/trim timers are masked
  assert:
    that: item.stdout | trim == 'masked'
    fail_msg: "{{ item.item }} is {{ item.stdout | trim }}, expected masked."
  loop: "{{ _zfs_verify_distro_timers.results }}"
  loop_control:
    label: "{{ item.item }}"

# --- Mount generator (lab only; box has zfs_mount_cache_datasets=[]) ---

- name: _verify | Mount cache directory exists
  stat:
    path: /etc/zfs/zfs-list.cache
  register: _zfs_verify_cache_dir
  become: true

- name: _verify | Assert mount cache directory exists
  assert:
    that: _zfs_verify_cache_dir.stat.exists

- name: _verify | Read mount cache content for each pool
  when: zfs_mount_cache_datasets | length > 0
  command: cat /etc/zfs/zfs-list.cache/{{ item.split('/')[0] }}
  loop: "{{ zfs_mount_cache_datasets }}"
  register: _zfs_verify_cache_files
  changed_when: false
  become: true

- name: _verify | Mount cache lists its configured dataset
  when: zfs_mount_cache_datasets | length > 0
  assert:
    that: item.item in item.stdout
    fail_msg: >-
      /etc/zfs/zfs-list.cache/{{ item.item.split('/')[0] }} does not list
      dataset {{ item.item }} -- the zed cacher did not populate it.
  loop: "{{ _zfs_verify_cache_files.results }}"
  loop_control:
    label: "{{ item.item }}"

- name: _verify | Zed cacher symlink exists
  stat:
    path: /etc/zfs/zed.d/history_event-zfs-list-cacher.sh
  register: _zfs_verify_cacher_link
  become: true

- name: _verify | Assert zed cacher symlink
  assert:
    that:
      - _zfs_verify_cacher_link.stat.exists
      - _zfs_verify_cacher_link.stat.islnk

# --- Dry-run health script ---

- name: _verify | Health script runs without error
  command: /usr/local/bin/zfs_health
  changed_when: false
  become: true

# --- dataset.yml round-trip ---
# Functionally exercise the role's most-consumed export. dataset.yml is imported
# by ~6 other roles and its load-bearing `^tank/` -> zfs_tank_filesystem rewrite
# is untested anywhere else. Create a throwaway dataset through it, assert it
# resolved + mounted at the right path, then tear everything down. The probe
# name `tank/_verify_probe` is safe on every fixture because zfs_tank_filesystem
# always points at an existing pool (tank/ -> rpool/ on box, tank/ -> tank/ on lab),
# so this also covers the rewrite itself on box.
- name: _verify | Exercise dataset.yml with a throwaway probe
  when: zfs_root
  vars:
    zfs_dataset_args:
      dataset: tank/_verify_probe
      mountpoint: /mnt/_verify_probe
  import_tasks: dataset.yml

# A wrong rewrite would resolve to a non-existent dataset and these gets would
# fail loudly -- so dataset existence is itself the rewrite assertion.
- name: _verify | Read probe dataset mountpoint
  when: zfs_root
  command: zfs get -H -o value mountpoint {{ zfs_tank_filesystem }}/_verify_probe
  register: _zfs_verify_probe_mp
  changed_when: false
  become: true

- name: _verify | Read probe dataset mounted state
  when: zfs_root
  command: zfs get -H -o value mounted {{ zfs_tank_filesystem }}/_verify_probe
  register: _zfs_verify_probe_mounted
  changed_when: false
  become: true

- name: _verify | Probe dataset resolved, mounted at the right path
  when: zfs_root
  assert:
    that:
      - _zfs_verify_probe_mp.stdout | trim == '/mnt/_verify_probe'
      - _zfs_verify_probe_mounted.stdout | trim == 'yes'
    fail_msg: >-
      dataset.yml probe mountpoint={{ _zfs_verify_probe_mp.stdout | trim }}
      mounted={{ _zfs_verify_probe_mounted.stdout | trim }}; expected
      /mnt/_verify_probe + yes.

# Tear down the probe: remove the mount unit dataset.yml created, destroy the
# dataset, drop the mountpoint dir.
- name: _verify | Remove probe mount unit
  when: zfs_root
  import_role:
    name: systemd_unit
    tasks_from: remove
  vars:
    systemd_unit_args:
      dest: zfs_mount_mnt__verify_probe.service

- name: _verify | Destroy probe dataset
  when: zfs_root
  command: zfs destroy -r {{ zfs_tank_filesystem }}/_verify_probe
  changed_when: true
  become: true

- name: _verify | Remove probe mountpoint
  when: zfs_root
  file:
    path: /mnt/_verify_probe
    state: absent
  become: true

# --- Health script fault detection (functional) ---
# zfs_health's checks only mean something if they actually fire on a damaged
# pool -- asserting the script merely "ran" proves nothing, and is exactly how
# the `zpool status -e` regression hid: the drive-error check silently never
# executed yet the script still exited 0. Build a throwaway mirror over two
# backing files, corrupt one leg's data region underneath ZFS, scrub to surface
# the checksum errors, and assert the script flags them via the drive-error
# branch. A mirror self-heals, so `zpool status -x` still reports the pool
# healthy -- this deliberately isolates the READ/WRITE/CKSUM counter check (the
# one that regressed) from the pool-state check. qemu-only (gated on zfs_root,
# which the harness sets on box/lab/pug but not the poolless minimal fixture);
# never prod, and fully torn down at the end of the block.
- name: _verify | Health fault detection
  when: zfs_root
  become: true
  block:
    - name: _verify | Health fault | Create backing files for a throwaway pool
      command: truncate -s 64M /var/tmp/zfs_health_test_{{ item }}.img
      loop: [0, 1]
      changed_when: true

    - name: _verify | Health fault | Create a mirror pool over the files
      command: >-
        zpool create -f zfs_health_test mirror
        /var/tmp/zfs_health_test_0.img /var/tmp/zfs_health_test_1.img
      changed_when: true

    - name: _verify | Health fault | Write incompressible data into the pool
      command: dd if=/dev/urandom of=/zfs_health_test/payload bs=1M count=16 conv=fsync
      changed_when: true

    # Overwrite the data region of one leg (4-60 MiB) with random bytes, leaving
    # the four vdev labels (first/last ~512 KiB) intact so the leg stays ONLINE
    # and the damage surfaces as checksum errors rather than a missing device.
    - name: _verify | Health fault | Corrupt one mirror leg underneath ZFS
      command: >-
        dd if=/dev/urandom of=/var/tmp/zfs_health_test_0.img
        bs=1M seek=4 count=56 conv=notrunc
      changed_when: true

    - name: _verify | Health fault | Flush the corruption to disk
      command: sync
      changed_when: false

    - name: _verify | Health fault | Scrub to surface the checksum errors
      command: zpool scrub zfs_health_test
      changed_when: true

    - name: _verify | Health fault | Wait for the scrub to finish
      command: zpool status zfs_health_test
      register: _zfs_health_scrub
      until: "'scrub in progress' not in _zfs_health_scrub.stdout"
      retries: 30
      delay: 2
      changed_when: false

    - name: _verify | Health fault | Run the health script against the damaged pool
      command: /usr/local/bin/zfs_health
      register: _zfs_health_damaged
      changed_when: false
      failed_when: false

    - name: _verify | Health fault | Script flags the drive errors and exits non-zero
      assert:
        that:
          - _zfs_health_damaged.rc != 0
          - "'Detected drive errors (READ/WRITE/CKSUM)' in _zfs_health_damaged.stderr"
        fail_msg: >-
          zfs_health did not flag the corrupted pool via the drive-error check.
          rc={{ _zfs_health_damaged.rc }} stderr={{ _zfs_health_damaged.stderr }}

  always:
    # Teardown runs even if an assertion above fails, so a red test leaves no
    # stray pool/files behind for a re-run on the same (kept) VM.
    - name: _verify | Health fault | Destroy the throwaway pool
      command: zpool destroy zfs_health_test
      changed_when: true
      failed_when: false

    - name: _verify | Health fault | Remove backing files and mountpoint
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - /var/tmp/zfs_health_test_0.img
        - /var/tmp/zfs_health_test_1.img
        - /zfs_health_test
