# Generic zfs dataset creator. Inputs:
#   zfs_dataset:                  dataset path; a leading 'tank/' is rewritten
#                                 to '{{ zfs_tank_filesystem }}/' so callers can
#                                 stay literal and avoid host-var templating in
#                                 caller-side import_role vars (e.g. tank/brumath)
#   zfs_dataset_mountpoint:       mountpoint (e.g. /mnt/brumath)
#   zfs_dataset_extra_properties: dict of extra zfs properties to set
#   zfs_dataset_owner:            mountpoint dir owner (default: ansible_user)
#   zfs_dataset_group:            mountpoint dir group (default: ansible_user)
#   zfs_dataset_mode:             mountpoint dir mode  (default: "0755")

- block:
    - name: Create zfs filesystem {{ zfs_dataset_resolved }}
      when: zfs_root
      zfs:
        name: '{{ zfs_dataset_resolved }}'
        state: present
        extra_zfs_properties: "{{ (zfs_dataset_extra_properties | default({})) | combine({'mountpoint': zfs_dataset_mountpoint}) }}"
      become: true

    - name: Create mount point {{ zfs_dataset_mountpoint }}
      file:
        dest: '{{ zfs_dataset_mountpoint }}'
        state: directory
        owner: "{{ zfs_dataset_owner | default(ansible_user) }}"
        group: "{{ zfs_dataset_group | default(ansible_user) }}"
        mode: "{{ zfs_dataset_mode | default('0755') }}"
      become: true

    - name: Set up mount service for {{ zfs_dataset_resolved }}
      when: zfs_root
      import_role:
        name: zfs_mount
        tasks_from: unit
      vars:
        zfs_mount_dataset: '{{ zfs_dataset_resolved }}'
        zfs_mount_mountpoint: '{{ zfs_dataset_mountpoint }}'

    # Reset caller-input vars to defaults so they don't leak into a
    # sibling call later in the play. See roles/systemd_unit/tasks/
    # install.yml for the full background on the import_role + vars:
    # leak. owner/group default to ansible_user dynamically; keep that
    # by re-evaluating the same expression at reset time.
    - name: Reset caller-input vars to defaults
      set_fact:
        zfs_dataset_extra_properties: {}
        zfs_dataset_owner: "{{ ansible_user }}"
        zfs_dataset_group: "{{ ansible_user }}"
        zfs_dataset_mode: "0755"
  vars:
    zfs_dataset_resolved: "{{ zfs_dataset | regex_replace('^tank/', (zfs_tank_filesystem | default('tank')) ~ '/') }}"
