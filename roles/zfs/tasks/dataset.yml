# Generic zfs dataset creator. Inputs: caller passes a single dict
# `zfs_dataset_args` with keys:
#   dataset             dataset path; a leading 'tank/' is rewritten to
#                       '{{ zfs_tank_filesystem }}/' so callers can stay
#                       literal and avoid host-var templating in caller-side
#                       import_role vars (e.g. tank/brumath)
#   mountpoint          mountpoint (e.g. /mnt/brumath)
#   extra_properties    optional dict of extra zfs properties to set
#   owner               optional mountpoint dir owner (default: ansible_user_id)
#   group               optional mountpoint dir group (default: ansible_user_id)
#   mode                optional mountpoint dir mode (default: "0755")
#
# The dict form prevents inter-call leakage at play-vars scope: each
# import_role pass replaces the whole `zfs_dataset_args` value, so a
# previous caller's mode/group/etc. can't bleed into the next caller
# that doesn't explicitly override.
#
# When `zfs_root` is false (non-ZFS host, e.g. the `minimal` fixture) the
# dataset and its mount unit are skipped, but the mountpoint directory is
# still created unconditionally: consumer roles bind-mount or write into that
# path and expect it to exist regardless of the storage backend, so a plain
# directory is the correct degraded behavior rather than a hard failure.

# Inner task `name:` strings are static -- no `{{ _zfs_dataset_resolved }}`
# or `{{ zfs_dataset_args.* }}` interpolation. Ansible renders `name:` at
# parse time, but callers that bind `zfs_dataset_args` via `set_fact` (see
# roles/data/tasks/_dataset.yml) only populate it at runtime, so a parse-
# time render would fail with "zfs_dataset_args is undefined". Per-iteration
# context comes from the caller's loop_control.label.
- name: Create and mount zfs dataset
  vars:
    _zfs_dataset_resolved: "{{ zfs_dataset_args.dataset | regex_replace('^tank/', (zfs_tank_filesystem | default('tank')) ~ '/') }}"
  block:
    - name: Assert required dataset inputs
      assert:
        that:
          - zfs_dataset_args.dataset is defined
          - zfs_dataset_args.mountpoint is defined
        fail_msg: >-
          zfs_dataset_args must include 'dataset' and 'mountpoint' keys.

    - name: Reject mountpoint inside extra_properties
      assert:
        that: "'mountpoint' not in (zfs_dataset_args.extra_properties | default({}))"
        fail_msg: >-
          zfs_dataset_args.extra_properties.mountpoint silently loses to the
          top-level zfs_dataset_args.mountpoint -- the helper does
          `combine({'mountpoint': zfs_dataset_args.mountpoint})` and Jinja's
          combine is right-key-wins. Pass mountpoint only as the top-level
          key, not inside extra_properties.

    - name: Create zfs filesystem
      when: zfs_root
      community.general.zfs:
        name: '{{ _zfs_dataset_resolved }}'
        state: present
        extra_zfs_properties: "{{ (zfs_dataset_args.extra_properties | default({})) | combine({'mountpoint': zfs_dataset_args.mountpoint}) }}"
      become: true

    - name: Create mount point
      file:
        dest: '{{ zfs_dataset_args.mountpoint }}'
        state: directory
        owner: "{{ zfs_dataset_args.owner | default(ansible_user_id) }}"
        group: "{{ zfs_dataset_args.group | default(ansible_user_id) }}"
        mode: "{{ zfs_dataset_args.mode | default('0755') }}"
      become: true

    - name: Set up mount service
      when: zfs_root
      import_role:
        name: zfs_mount
        tasks_from: unit
      vars:
        zfs_mount_args:
          dataset: '{{ _zfs_dataset_resolved }}'
          mountpoint: '{{ zfs_dataset_args.mountpoint }}'
