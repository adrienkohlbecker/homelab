# jammy ships zfs 2.1.x; the homelab tracks 2.2.x for the autotrim and
# encryption fixes that landed there. Pin zfsutils-linux + libs to noble
# (priority 991) and route apt at noble's repos so the package upgrade
# resolves cleanly. backports-zfs lists every transitive dep that has to
# come from noble alongside the userspace tools — the catch-all jammy
# pin (500) and Ubuntu reject (-10) keep everything else on jammy.
- name: install | Pin zfs packages to noble (jammy)
  when: ansible_distribution_major_version == "22"
  copy:
    src: backports-zfs
    dest: /etc/apt/preferences.d/backports-zfs
    owner: root
    group: root
    mode: "0644"
    backup: true
  become: true
  register: zfs_pin
  tags:
    - zfs

- name: install | Add noble apt sources (jammy)
  when: ansible_distribution_major_version == "22"
  apt_repository:
    repo: "{{ item }}"
  become: true
  register: zfs_noble_sources
  loop:
    - 'deb {{ ubuntu_mirror }} noble main restricted universe multiverse # For zfsutils-linux userspace tools'
    - 'deb {{ ubuntu_mirror }} noble-updates main restricted universe multiverse # For zfsutils-linux userspace tools'
    - 'deb {{ ubuntu_mirror }} noble-backports main restricted universe multiverse # For zfsutils-linux userspace tools'
    - 'deb {{ ubuntu_mirror_security }} noble-security main restricted universe multiverse # For zfsutils-linux userspace tools'
  tags:
    - zfs

- name: install | Refresh apt cache after noble setup
  when: zfs_pin.changed or zfs_noble_sources.changed
  apt:
    update_cache: true
  become: true
  tags:
    - zfs

# state: latest on jammy so a fresh pin file actually pulls noble's
# version on the first apply (the package may already be installed at
# jammy's version). On noble we just want it present.
- name: install | Install ZoL
  apt:
    package:
      - zfsutils-linux
      - zfs-initramfs
      - zfs-zed
      - cron # for cron module
    state: '{{ "latest" if ansible_distribution_major_version == "22" else "present" }}'
    cache_valid_time: 3600
  register: zfs_apt
  become: true
  tags:
    - zfs
