# jammy ships zfs 2.1.x; the homelab tracks 2.2.x for the autotrim and
# encryption fixes that landed there. The full pin list lives in
# zfs_backport_packages — including libssl3t64, locales, chrony, etc.
# that aren't hard deps of zfsutils-linux but ship as noble-only and
# need explicit upgrade. The role exports zfs_backports_updated
# (derived from backports_name), consumed by main.yml's `Start zed`
# task to flip state=started→restarted when the binary actually
# rolled forward.
- name: install | Apply zfs backports pin + upgrade (jammy)
  import_role:
    name: backports
    tasks_from: pin
  vars:
    backports_name: zfs
    backports_packages: '{{ zfs_backport_packages }}'
  tags:
    - zfs

- name: install | Install ZoL
  apt:
    package:
      - zfsutils-linux
      - zfs-initramfs
      - zfs-zed
    cache_valid_time: 3600
  register: zfs_apt
  become: true
  tags:
    - zfs
