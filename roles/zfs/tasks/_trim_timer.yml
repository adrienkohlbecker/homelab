# Per-pool wrapper for the include_tasks loop in main.yml. import_role
# works here (not at the top level) because include_tasks re-parses
# this file per iteration with `item` already in scope, so the
# import_role's vars: get a fresh systemd_timer_args each pool.
- name: _trim_timer | Install zfs_trim timer for {{ item }}
  import_role:
    name: systemd_timer
    tasks_from: install
  vars:
    systemd_timer_args:
      name: zfs_trim_{{ item }}
      description: Weekly ZFS trim for {{ item }}
      on_calendar: "Thu *-*-* 00:05:00"
      exec_start: /usr/local/bin/run_job weekly zfs_trim_{{ item }} /sbin/zpool trim {{ item }}
