# Per-pool wrapper for the include_tasks loop in main.yml. Two
# unfixable-with-the-obvious-shape constraints meet here:
#
#  - include_role (not import_role): systemd_timer/install.yml templates
#    inner task names from systemd_timer_args.name; with import_role
#    those names expand before `item` is bound for the iteration.
#  - set_fact materializes systemd_timer_args directly (not via an
#    intermediate name + task-level `vars:` on the include_role). A
#    task-level `vars:` dict containing `{{ item }}` triggers a noisy
#    parse-time templating warning (item is loop-only); set_fact's RHS
#    evaluates per task-run so item is in scope. Going through a
#    second name + `vars: { systemd_timer_args: "{{ _other }}" }` also
#    fails -- the include_role's vars scope doesn't pick up the host
#    fact from the prior task, so the inner role sees the indirect
#    name undefined. Set the role's own input fact name directly.
# noqa: var-naming[no-role-prefix] -- systemd_timer_args is the
# consumed role's required input name, not a zfs role-internal var.
- name: _trim_timer | Build systemd_timer_args
  set_fact:
    systemd_timer_args:  # noqa: var-naming[no-role-prefix]
      name: "zfs_trim_{{ item }}"
      description: "Weekly ZFS trim for {{ item }}"
      frequency: weekly
      on_calendar: "Thu *-*-* 00:05:00"
      exec_start: "/sbin/zpool trim {{ item }}"

- name: _trim_timer | Install zfs_trim timer
  include_role:
    name: systemd_timer
    tasks_from: install
