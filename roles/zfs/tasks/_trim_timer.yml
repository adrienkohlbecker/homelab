# Per-pool wrapper for the include_tasks loop in main.yml. Uses
# import_role + inline `vars:` (not include_role + set_fact) so the
# systemd_timer_args dict is bound at task scope and doesn't leak
# across role boundaries.
#
# The leak it avoids: under ansible 2.20 + mitogen, `set_fact:
# systemd_timer_args:` or `include_role` with `vars: { systemd_timer_args:
# ... }` leaves the value visible to later tasks in the play -- including
# inside a sibling role's `import_role: name: systemd_timer` even when
# that import explicitly passes its own `vars: { systemd_timer_args: ... }`.
# The leftover value (always the LAST trim iteration -- tank on lab,
# rpool on pug) silently retargets later systemd_timer calls. Most
# visibly: zfs_autobackup/dest.yml's "Remove the zfs_autosync timer"
# task (idempotent no-op on hosts where the timer was never installed)
# ends up removing zfs_trim_<last-pool> instead, and main.yml's
# "Schedule the zfs_autosnapshot timer" reinstalls the same name --
# flapping the per-pool trim timer on every apply.
#
# import_role-with-inline-vars is safe here only because
# systemd_timer/install.yml's nested task names are static: a templated
# `{{ systemd_timer_args.name }}` on those tasks would resolve at parse
# time, before `item` is bound, and warn. Keep them static (see
# roles/systemd_timer/tasks/install.yml).
- name: _trim_timer | Install zfs_trim timer for {{ item }}
  import_role:
    name: systemd_timer
    tasks_from: install
  vars:
    systemd_timer_args:
      name: "zfs_trim_{{ item }}"
      description: "Weekly ZFS trim for {{ item }}"
      on_calendar: "Thu *-*-* 00:05:00"
      persistent: false
      exec_start: "/sbin/zpool trim {{ item }}"
