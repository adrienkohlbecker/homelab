# Per-pool include_role wrapper. include_tasks re-evaluates `vars:` on
# each iteration (include_role + loop binds vars once on the include
# task, so every iteration ends up with the same systemd_timer_args).
# Caller passes the pool name as `item`.
- name: _trim_timer | Install zfs_trim timer for {{ item }}
  include_role:
    name: systemd_timer
    tasks_from: install
  vars:
    systemd_timer_args:
      name: zfs_trim_{{ item }}
      description: Weekly ZFS trim for {{ item }}
      on_calendar: "Thu *-*-* 00:05:00"
      exec_start: /usr/local/bin/run_job weekly zfs_trim_{{ item }} /sbin/zpool trim {{ item }}
