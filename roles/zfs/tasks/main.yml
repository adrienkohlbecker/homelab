- name: Install ZoL
  import_tasks: install.yml
  tags:
    - zfs

# Catches divergence between the userspace zfsutils and the loaded
# zfs.ko. Ubuntu ships the kernel module bundled inside
# linux-modules-*-generic, so its version tracks whichever release the
# HWE kernel was rebased from — independent of what `apt install
# zfsutils-linux` installed on top. Prod jammy hosts paper over this
# by combining hwe_kernel (donor: noble → ZFS 2.2.x kmod) with the
# noble-backports zfsutils pin (2.2.x userspace); the assert is what
# catches a broken combination (HWE missing, backports off, donor
# release advanced past the pinned userspace) before zfs commands
# start failing in confusing ways.
#
# Gates — the assert is only meaningful in a settled state:
#   - zfs_apt.changed: just upgraded userspace; the loaded kmod won't
#     refresh until reboot, mismatch is expected for the rest of this
#     play.
#   - reboot-required: a kernel upgrade is pending elsewhere (e.g.
#     hwe_kernel earlier in site.yml), so the loaded kmod is stale by
#     definition and the comparison would false-positive.
#   - jammy without HWE: known-divergent config that only shows up in
#     the test harness — testrole.py runs roles in isolation and never
#     applies hwe_kernel, leaving jammy GA kmod (2.1.x) beside the
#     backported userspace (2.2.x). In prod hwe_kernel always runs
#     before zfs, so this branch is for tests only.
- name: Detect HWE kernel meta package
  command: dpkg-query -W -f='${Status}' linux-generic-hwe-{{ ansible_distribution_version }}
  register: zfs_hwe_status
  changed_when: false
  failed_when: false
  check_mode: false
  tags:
    - zfs

- name: Stat /var/run/reboot-required
  stat:
    path: /var/run/reboot-required
  register: zfs_reboot_required
  tags:
    - zfs

- name: Read zfs userspace + kmod versions
  command: zfs --version
  register: zfs_version_out
  changed_when: false
  check_mode: false
  tags:
    - zfs

- name: Assert userspace and kmod ZFS versions match
  when:
    - not zfs_apt.changed
    - not zfs_reboot_required.stat.exists
    - ansible_distribution_release != "jammy" or "install ok installed" in zfs_hwe_status.stdout
  assert:
    that:
      - (zfs_version_out.stdout_lines[0] | regex_replace('^zfs-', '')) == (zfs_version_out.stdout_lines[1] | regex_replace('^zfs-kmod-', ''))
    fail_msg: |-
      ZFS userspace and kernel-module versions disagree:
      {{ zfs_version_out.stdout }}
  tags:
    - zfs

- name: Create /etc/default/grub.d directory
  when: grub_bootloader
  file:
    dest: /etc/default/grub.d
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true
  tags:
    - zfs

- name: Disable init_on_alloc
  when: grub_bootloader
  copy:
    dest: /etc/default/grub.d/99-zfs.cfg
    content: "GRUB_CMDLINE_LINUX_DEFAULT=\"$GRUB_CMDLINE_LINUX_DEFAULT init_on_alloc=0\"\n"
    backup: true
    owner: root
    group: root
    mode: "0644"
  register: grub_cfg
  become: true
  tags:
    - zfs

- name: Disable init_on_alloc
  when: not grub_bootloader
  import_role:
    name: zfsbootmenu
    tasks_from: cmdline
  vars:
    zfsbootmenu_cmdline_file: zfs
    zfsbootmenu_cmdline_contents: init_on_alloc=0
  tags:
    - zfs

- name: Update grub
  when: grub_bootloader and grub_cfg.changed
  command: update-grub
  changed_when: true
  become: true
  tags:
    - zfs

- name: Configure ARC
  template:
    src: zfs.conf.j2
    dest: /etc/modprobe.d/zfs.conf
    mode: "0644"
    owner: root
    group: root
    backup: true
  register: zfs_module_conf
  become: true
  tags:
    - zfs

- name: Update initramfs
  when: zfs_module_conf.changed
  command: update-initramfs -u -k all
  become: true
  changed_when: true
  tags:
    - zfs

- name: Ask to reboot
  when: zfs_module_conf.changed
  file:
    path: /var/run/reboot-required
    state: touch
    owner: root
    group: root
    mode: "0644"
  become: true
  tags:
    - zfs

- name: Copy the cull script
  copy:
    src: zfs_cull.sh
    dest: /usr/local/bin/zfs_cull
    mode: "0755"
    owner: root
    group: root
    backup: true
    validate: bash -n %s
  become: true
  tags:
    - zfs

- name: Copy the health script
  copy:
    src: zfs_health.sh
    dest: /usr/local/bin/zfs_health
    mode: "0755"
    owner: root
    group: root
    backup: true
    validate: bash -n %s
  become: true
  tags:
    - zfs

- name: Schedule the health script
  when: not (ansible_check_mode and zfs_apt.changed)
  cron:
    name: zfs_health
    minute: 55
    hour: 0
    job: /usr/local/bin/run_job daily zfs_health /usr/local/bin/zfs_health
    user: root
    cron_file: ansible_zfs_health
    backup: true
  become: true
  tags:
    - zfs

- name: Monitor health script
  import_role:
    name: cron
    tasks_from: monitor
  vars:
    cron_entry: zfs_health
  tags:
    - zfs

- name: Schedule the trim script
  when: not (ansible_check_mode and zfs_apt.changed)
  cron:
    name: zfs_trim_{{ item }}
    weekday: 4
    hour: 0
    minute: 5
    job: /usr/local/bin/run_job weekly zfs_trim_{{ item }} /sbin/zpool trim {{ item }}
    user: root
    cron_file: ansible_zfs_trim
    backup: true
  loop: "{{ zfs_trim_pools }}"
  become: true
  tags:
    - zfs

- name: Monitor trim scripts
  import_role:
    name: cron
    tasks_from: monitor
  vars:
    cron_entry: "{{ ['zfs_trim_'] | product(zfs_trim_pools) | map('join') | list }}"
  tags:
    - zfs

