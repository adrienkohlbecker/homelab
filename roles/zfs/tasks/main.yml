- name: Install ZoL
  import_tasks: install.yml
  tags:
    - zfs

- name: Assert required inputs
  assert:
    that:
      - zfs_root is defined
      - zfs_root is boolean or zfs_root in [true, false]
      - zfs_trim_pools is defined
      - zfs_trim_pools is not string
      - zfs_trim_pools is iterable
      - zfs_mount_cache_datasets is defined
      - zfs_mount_cache_datasets is not string
      - zfs_mount_cache_datasets is iterable
    fail_msg: >-
      zfs_root (bool), zfs_trim_pools (list), and
      zfs_mount_cache_datasets (list) must be set in host/group vars.
  tags:
    - zfs

- name: Assert pool/dataset list shapes
  assert:
    that:
      - zfs_trim_pools | select('search', '/') | list | length == 0
      - zfs_mount_cache_datasets | reject('search', '/') | list | length == 0
    fail_msg: >-
      zfs_trim_pools entries must be bare pool names (no '/'): each becomes a
      zfs_trim_<pool> unit name and a `zpool trim <pool>` argument. Each
      zfs_mount_cache_datasets entry must be a 'pool/dataset' path -- its pool
      component (split('/')[0]) names the per-pool mount-cache file.
  tags:
    - zfs

# Catches divergence between the userspace zfsutils and the loaded
# zfs.ko. Ubuntu ships the kernel module bundled inside
# linux-modules-*-generic, so its version tracks whichever release the
# HWE kernel was rebased from — independent of what `apt install
# zfsutils-linux` installed on top. Prod jammy hosts paper over this
# by combining hwe_kernel (donor: noble → ZFS 2.2.x kmod) with the
# noble-backports zfsutils pin (2.2.x userspace); the assert is what
# catches a broken combination (HWE missing, backports off, donor
# release advanced past the pinned userspace) before zfs commands
# start failing in confusing ways.
#
# Gates — the assert is only meaningful in a settled state:
#   - zfs_apt.changed: just upgraded userspace; the loaded kmod won't
#     refresh until reboot, mismatch is expected for the rest of this
#     play.
#   - reboot-required: a kernel upgrade is pending elsewhere (e.g.
#     hwe_kernel earlier in site.yml), so the loaded kmod is stale by
#     definition and the comparison would false-positive.
#   - jammy without HWE: known-divergent config that only shows up in
#     the test harness — testrole.py runs roles in isolation and never
#     applies hwe_kernel, leaving jammy GA kmod (2.1.x) beside the
#     backported userspace (2.2.x). In prod hwe_kernel always runs
#     before zfs, so this branch is for tests only.
- name: Detect HWE kernel meta package
  command: dpkg-query -W -f='${Status}' linux-generic-hwe-{{ ansible_distribution_version }}
  register: zfs_hwe_status
  changed_when: false
  failed_when: false
  check_mode: false
  tags:
    - zfs

- name: Stat /var/run/reboot-required
  stat:
    path: /var/run/reboot-required
  register: zfs_reboot_required
  tags:
    - zfs

- name: Read zfs userspace + kmod versions
  command: zfs --version
  register: zfs_version_out
  changed_when: false
  check_mode: false
  tags:
    - zfs

- name: Assert userspace and kmod ZFS versions match
  when:
    - not zfs_apt.changed
    - not zfs_reboot_required.stat.exists
    - ansible_distribution_release != "jammy" or "install ok installed" in zfs_hwe_status.stdout
  assert:
    that:
      # Length guard first: a kmod that is not loaded yet makes `zfs --version`
      # emit only the userspace line, so an unguarded [1] would IndexError with
      # an opaque template error instead of this diagnostic. The second clause
      # short-circuits (Jinja `or`) when length < 2, so it never indexes [1]
      # past the end.
      - zfs_version_out.stdout_lines | length >= 2
      - (zfs_version_out.stdout_lines | length < 2) or ((zfs_version_out.stdout_lines[0] | regex_replace('^zfs-', '')) == (zfs_version_out.stdout_lines[1] | regex_replace('^zfs-kmod-', '')))
    fail_msg: |-
      ZFS version check failed (expected two lines -- zfs-<ver> userspace and
      zfs-kmod-<ver> module -- that agree):
      {{ zfs_version_out.stdout }}
  tags:
    - zfs

# init_on_alloc=0 — the kernel's page-zeroing-on-alloc default taxes ZFS's
# alloc-heavy ARC. The boot cmdline engine threads it into grub.d
# (GRUB_CMDLINE_LINUX_DEFAULT) or the ZBM property per the host's bootloader.
- name: Disable init_on_alloc
  import_role:
    name: boot
    tasks_from: cmdline
  vars:
    boot_cmdline_args:
      name: zfs
      contents: init_on_alloc=0
      grub_scope: default
  tags:
    - zfs

- name: Configure ARC
  template:
    src: zfs.conf.j2
    dest: /etc/modprobe.d/zfs.conf
    mode: "0644"
    owner: root
    group: root
    backup: true
    validate: grep -qE '^options[[:space:]]+zfs[[:space:]]+' %s
  register: zfs_module_conf
  become: true
  tags:
    - zfs

- name: Update initramfs
  when: zfs_module_conf.changed
  command: update-initramfs -u -k all
  become: true
  changed_when: true
  tags:
    - zfs

- name: Ask to reboot
  when: zfs_module_conf.changed
  file:
    path: /var/run/reboot-required
    state: touch
    owner: root
    group: root
    mode: "0644"
  become: true
  tags:
    - zfs

- name: Copy the cull script
  copy:
    src: zfs_cull.sh
    dest: /usr/local/bin/zfs_cull
    mode: "0755"
    owner: root
    group: root
    backup: true
    validate: bash -n %s
  become: true
  tags:
    - zfs

- name: Copy the health script
  copy:
    src: zfs_health.sh
    dest: /usr/local/bin/zfs_health
    mode: "0755"
    owner: root
    group: root
    backup: true
    validate: bash -n %s
  become: true
  tags:
    - zfs

- name: Copy the scrub script
  copy:
    src: zfs_scrub.sh
    dest: /usr/local/bin/zfs_scrub
    mode: "0755"
    owner: root
    group: root
    backup: true
    validate: bash -n %s
  become: true
  tags:
    - zfs

- name: Schedule the zfs_health timer
  import_role:
    name: systemd_timer
    tasks_from: install
  vars:
    systemd_timer_args:
      name: zfs_health
      description: Daily ZFS health check
      # 00:06, early in the compact small-job cluster. zpool status is a
      # local-only read with no fleet-shared resource, so no randomized spread is
      # needed -- pinning it keeps the schedule deterministic.
      on_calendar: "*-*-* 00:06:00"
      exec_start: /usr/local/bin/zfs_health
  tags:
    - zfs

# include_tasks wrapper rather than include_role-with-loop: the latter
# binds `vars:` once on the include task so every iteration ends up
# with the same systemd_timer_args. include_tasks re-evaluates per
# iteration, so the wrapper file's own include_role gets a fresh dict
# each pool. `apply.tags` propagates the outer tag set into the
# included tasks — unlike import_*, include_* does NOT inherit tags
# automatically, so without this the wrapper loads but its
# include_role gets tag-filtered to a no-op when --tags zfs runs.
- name: Schedule a zfs_trim timer
  include_tasks:
    file: _trim_timer.yml
    apply:
      tags:
        - zfs
  loop: "{{ zfs_trim_pools }}"
  loop_control:
    label: "{{ item }}"
  tags:
    - zfs

# Own the scrub schedule rather than leaving it to the distro's
# /etc/cron.d/zfsutils-linux (second Sunday, 00:24) -- a single scheduler is
# easier to reason about, and self-owned timing lets zfs_autosnapshot pause an
# in-progress scrub during the nightly backup window. Second Sunday preserves
# the distro's monthly cadence; fixed_random_delay spreads the fleet's scrubs
# over half an hour while pinning each host to a stable offset. The script kicks
# the scrub off and returns (no -w), so the default 1h TimeoutStartSec is ample;
# zfs_health + ZED's scrub_finish zedlet are the outcome watchdogs.
#
# Fire at 01:00 (+0..30min), ahead of the 02:00 zfs_autosnapshot run on the same
# clock. That run pauses scrubs *once*, at its start; a scrub that began later
# would miss the pass and contend with the multi-hour replication. Starting the
# scrub first guarantees it is already "in progress" when the pause pass sweeps,
# so it is paused for the window and resumed afterwards. The 30min margin covers
# the randomized spread without colliding with the early small-job cluster.
- name: Schedule the zfs_scrub timer
  import_role:
    name: systemd_timer
    tasks_from: install
  vars:
    systemd_timer_args:
      name: zfs_scrub
      description: Monthly ZFS scrub
      on_calendar: "Sun *-*-08..14 01:00:00"
      exec_start: /usr/local/bin/zfs_scrub
      randomized_delay_sec: 1800
      fixed_random_delay: true
  tags:
    - zfs

# Neutralise the distro's own ZFS scrub/trim schedulers so zfs_scrub and the
# zfs_trim_* timers are the single source of truth. Two delivery mechanisms ship
# on these hosts, both handled here:
#   - the legacy /etc/cron.d/zfsutils-linux (the *active* one -- it ran the
#     monthly scrub), diverted aside via dpkg so a package upgrade can't restore
#     it; the .disabled suffix also makes cron ignore the file (cron skips
#     names containing a dot) even before the next upgrade rewrites the conffile.
#   - the zfs-{scrub,trim}-{monthly,weekly}@.timer templates (currently shipped
#     disabled, masked here defensively so a future preset change can't enable
#     them).
- name: Disable distro ZFS scrub/trim cron
  community.general.dpkg_divert:
    path: /etc/cron.d/zfsutils-linux
    divert: /etc/cron.d/zfsutils-linux.disabled
    rename: true
  become: true
  tags:
    - zfs

- name: Mask distro ZFS scrub/trim systemd timers
  systemd:
    name: "{{ item }}"
    masked: true
  loop:
    - zfs-scrub-monthly@.timer
    - zfs-scrub-weekly@.timer
    - zfs-trim-monthly@.timer
    - zfs-trim-weekly@.timer
  become: true
  tags:
    - zfs

# ZED is enabled for its cache-rebuild zedlet regardless, but with
# ZED_EMAIL_ADDR unset (the package default) it mails nothing. Pointing it at
# root lights up the stock statechange-notify / data-notify / scrub_finish
# zedlets, which deliver event-driven fault + checksum + scrub-error mail within
# seconds — the real-time complement to zfs_health's nightly poll backstop
# (which still owns the capacity-free signals ZED structurally can't: a scrub
# that *didn't* happen). ZED_NOTIFY_VERBOSE stays at its 0 default so clean
# scrub completions don't mail; only faults and errored scrubs do.
- name: Configure ZED email notifications
  when: not (ansible_check_mode and zfs_apt.changed)
  lineinfile:
    path: /etc/zfs/zed.d/zed.rc
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
    backup: true
    validate: bash -n %s
  loop:
    - regexp: '^#?ZED_EMAIL_ADDR='
      line: 'ZED_EMAIL_ADDR="root"'
    # Deliberate non-default: a resilver only verifies the replaced device, so
    # auto-scrub the whole pool afterwards to confirm end-to-end integrity on
    # the multi-disk pools after a disk swap.
    - regexp: '^#?ZED_SCRUB_AFTER_RESILVER='
      line: ZED_SCRUB_AFTER_RESILVER=1
  loop_control:
    label: "{{ item.line }}"
  register: zfs_zedrc
  become: true
  tags:
    - zfs

- name: Enable zed
  when: not (ansible_check_mode and zfs_apt.changed)
  systemd:
    name: zfs-zed
    enabled: true
  become: true
  tags:
    - zfs

# Restart on a backports upgrade so the running zed picks up the
# noble binary after a jammy→noble flip, or when zed.rc changed so the
# notification config takes effect; otherwise just ensure it's started
# (and leave a healthy daemon undisturbed).
- name: Start zed
  when: not (ansible_check_mode and zfs_apt.changed)
  systemd:
    name: zfs-zed
    state: '{{ "restarted" if (zfs_backports_updated | default(false) or zfs_zedrc.changed) else "started" }}'
  become: true
  tags:
    - zfs

# The core ZFS boot services come enabled via the package's systemd preset on
# any root-on-ZFS host (it wouldn't boot otherwise) — enable them explicitly so
# an ansible-from-stock-Ubuntu host owns the state rather than inheriting it.
- name: Enable core ZFS boot services
  when:
    - zfs_root
    - not (ansible_check_mode and zfs_apt.changed)
  systemd:
    name: "{{ item }}"
    enabled: true
  loop:
    - zfs.target
    - zfs-import.target
    - zfs-import-cache
    - zfs-mount
  become: true
  tags:
    - zfs

# Assert the pool-level properties the install set at creation (autotrim=on on
# the SSD-backed pools; autoexpand=on on a grow-on-first-boot Hetzner rpool) so
# an ansible-from-stock-Ubuntu host owns them rather than inheriting them from
# the bootstrap scripts. Read-then-set via `zpool get`/`set` rather than
# community.general.zpool: that module can create AND destroy pools -- too sharp
# an edge to point at the prod pools holding every household dataset. `zpool set`
# can only change a property (it cannot lose a pool), and the get-guard gives
# correct idempotence without it.
- name: Read current pool properties
  when: zfs_root
  command: zpool get -H -o value {{ item.name }} {{ item.pool }}
  loop: "{{ zfs_pool_properties }}"
  loop_control:
    label: "{{ item.pool }} {{ item.name }}"
  register: zfs_pool_prop_current
  changed_when: false
  check_mode: false
  become: true
  tags:
    - zfs

- name: Set pool properties
  when:
    - zfs_root
    - item.stdout | trim != item.item.value
  command: zpool set {{ item.item.name }}={{ item.item.value }} {{ item.item.pool }}
  loop: "{{ zfs_pool_prop_current.results | default([]) }}"
  loop_control:
    label: "{{ item.item.pool }} {{ item.item.name }}={{ item.item.value }}"
  changed_when: true
  become: true
  tags:
    - zfs

# Dataset properties go through community.general.zfs: it is idempotent and,
# unlike the zpool module, cannot destroy a pool -- so the get-then-set command
# dance above is reserved for pool-level properties where that destroy edge is
# the concern. dataset.yml uses this same module for consumer datasets.
- name: Set properties on root dataset
  when: zfs_root
  community.general.zfs:
    name: rpool/ROOT/{{ ansible_distribution_release }}
    state: present
    extra_zfs_properties:
      'autobackup:bak': 'true'
  register: zfs_root_properties
  become: true
  tags:
    - zfs

# community.general.zfs no-ops a property whose value already matches even when
# its source is `received` -- so a root restored via `zfs recv` (a disaster
# recovery from lab's tank/<host>/rpool/ROOT replica) would keep autobackup:bak
# at source=received, and zfs-autobackup's `-s local` picker would silently drop
# the root from every snapshot. The consumer-dataset helper (dataset.yml) guards
# the same trap; the root takes the direct module above, so guard it here too.
- name: Read autobackup:bak source on the root dataset
  when: zfs_root
  command: zfs get -H -o source autobackup:bak rpool/ROOT/{{ ansible_distribution_release }}
  register: zfs_root_autobackup_source
  changed_when: false
  become: true
  tags:
    - zfs

- name: Force autobackup:bak local on the root dataset when a restore left it received
  when:
    - zfs_root
    - zfs_root_autobackup_source.stdout | trim != 'local'
  command: zfs set autobackup:bak=true rpool/ROOT/{{ ansible_distribution_release }}
  changed_when: true
  become: true
  tags:
    - zfs

- name: Setup mount generator
  import_tasks: mount_generator.yml
