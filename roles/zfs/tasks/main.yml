- name: Enable zed
  when: not (ansible_check_mode and zfs_apt.changed)
  systemd:
    name: zfs-zed
    enabled: true
  become: true
  tags:
    - zfs

# Restart on a backports upgrade so the running zed picks up the
# noble binary after a jammy→noble flip; otherwise just ensure it's
# started (and leave a healthy daemon undisturbed).
- name: Start zed
  when: not (ansible_check_mode and zfs_apt.changed)
  systemd:
    name: zfs-zed
    state: '{{ "restarted" if (zfs_backports_updated | default(false)) else "started" }}'
  become: true
  tags:
    - zfs

- name: Set properties on root dataset
  when: zfs_root
  community.general.zfs:
    name: rpool/ROOT/jammy
    state: present
    extra_zfs_properties:
      'autobackup:bak': 'true'
  register: zfs_root_properties
  become: true
  tags:
    - zfs

- name: Setup mount generator
  import_tasks: mount_generator.yml
