# box has two pools (rpool + the flat zee pool from packer provision.sh), so it
# exercises multi-pool trim-timer creation and mount-cache generation -- the
# functional coverage the lab AMI used to carry. lab's prod-faithful
# mirror/raidz geometry is asserted by no role.
machines:
  box:
  lab:
# Release-divergent: jammy combines hwe_kernel (noble 6.8 kmod) with the
# noble-backports zfsutils pin and asserts the HWE userspace is installed;
# noble+ uses the native zfs stack. The noble cell exercises the non-jammy
# branch (resolute takes the same native path).
ubuntu:
  - noble
