# zfs_trim_pools is [] on box (no pools to trim) and zfs_mount_cache_datasets
# is [] (no mount-generator entries). Both loops are completely skipped. The
# lab fixture has 3 real pools (rpool/dozer/tank) exercising multi-pool trim
# timer creation and mount-cache generation.
machines:
  box:
  lab:
# Release-divergent: jammy combines hwe_kernel (noble 6.8 kmod) with the
# noble-backports zfsutils pin and asserts the HWE userspace is installed;
# noble+ uses the native zfs stack. The noble cell exercises the non-jammy
# branch (resolute takes the same native path).
ubuntu:
  - noble
