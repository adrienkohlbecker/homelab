# Swap role _verify: assert the live swap topology matches what the role
# configured -- zram active and primary (highest priority), the disk/zvol
# overflow coexisting below it, and swappiness tuned. testrole.py /
# testall.py only (qemu); never site.yml. See notes/swap_strategy.md.

- name: _verify | Read active swap devices with priorities and sizes
  command: swapon --show=NAME,PRIO,SIZE --noheadings --bytes --raw
  changed_when: false
  become: true
  register: _swap_verify_swapon

# The role gates zram on the kernel module being present (the arm64 cloud kernel
# on the local fixtures ships none). Re-probe here -- _verify is a separate
# ansible run, so converge's register isn't in scope -- and skip the zram
# assertions where the module, and therefore the zram swap device, is absent.
- name: _verify | Probe for the zram kernel module
  when: (swap_zram | default(none)) is not none
  command: modinfo -k {{ ansible_kernel }} zram
  changed_when: false
  failed_when: false
  register: _swap_verify_zram_module

- name: _verify | Zram swap active at the configured (primary) priority
  when:
    - (swap_zram | default(none)) is not none
    - _swap_verify_zram_module.rc == 0
  vars:
    _zram_lines: "{{ _swap_verify_swapon.stdout_lines | select('search', 'zram') | list }}"
  assert:
    that:
      - _zram_lines | length == 1
      - _zram_lines[0].split()[1] | int == swap_zram.priority | default(100) | int
    fail_msg: >-
      zram swap missing or not at the configured priority (expected
      {{ swap_zram.priority | default(100) }}, disk/zvol swap sits at
      priority 10 so this is primary): {{ _swap_verify_swapon.stdout }}
  become: true

# Catches the generator silently falling back to its default size (e.g. a
# size key the installed version doesn't honor). Expected = min(configured,
# MemTotal); zram rounds down by a page, so allow a small band.
# SIZE (field 3, bytes) comes directly from swapon --show --bytes; no slurp needed.
- name: _verify | Zram device sized per config (capped at RAM)
  when:
    - (swap_zram | default(none)) is not none
    - _swap_verify_zram_module.rc == 0
  vars:
    _zram_line: "{{ _swap_verify_swapon.stdout_lines | select('search', 'zram') | first | default('') }}"
    _expected_mb: "{{ [(swap_zram.size | human_to_bytes) // 1048576, ansible_memtotal_mb] | min }}"
    _actual_mb: "{{ ((_zram_line.split()[2] | default('0')) | int) // 1048576 }}"
  assert:
    that:
      - _actual_mb | int >= (_expected_mb | float * 0.95) | int
      - _actual_mb | int <= (_expected_mb | float * 1.05) | int
    fail_msg: >-
      zram0 is {{ _actual_mb }} MB, expected ~{{ _expected_mb }} MB (min of
      configured {{ swap_zram.size }} and MemTotal {{ ansible_memtotal_mb }} MB)
      -- check zram-fraction/max-zram-size in zram-generator.conf.
  become: true

- name: _verify | Resolve zvol device path
  when: (swap_zvol | default(none)) is not none
  command: readlink -f /dev/zvol/{{ swap_zvol.dataset }}
  changed_when: false
  become: true
  register: _swap_verify_zvol_dev

- name: _verify | Zvol swap device is active
  when: (swap_zvol | default(none)) is not none
  vars:
    _names: "{{ _swap_verify_swapon.stdout_lines | map('split') | map('first') | list }}"
  assert:
    that:
      - (_swap_verify_zvol_dev.stdout | trim) in _names
    fail_msg: >-
      zvol swap device {{ _swap_verify_zvol_dev.stdout | trim }} (for
      {{ swap_zvol.dataset }}) not active: {{ _swap_verify_swapon.stdout }}
  become: true

- name: _verify | Zvol swap is not selected for initramfs resume
  when: (swap_zvol | default(none)) is not none and zfs_root
  slurp:
    src: /etc/initramfs-tools/conf.d/resume
  become: true
  register: _swap_verify_resume_conf
  failed_when: (_swap_verify_resume_conf.content | b64decode | trim) != 'RESUME=none'

- name: _verify | Resolve partition device path
  when: (swap_partition | default(none)) is not none
  command: readlink -f {{ swap_partition.device }}
  changed_when: false
  become: true
  register: _swap_verify_partition_dev

- name: _verify | Partition swap device is active
  when: (swap_partition | default(none)) is not none
  vars:
    _names: "{{ _swap_verify_swapon.stdout_lines | map('split') | map('first') | list }}"
  assert:
    that:
      - (_swap_verify_partition_dev.stdout | trim) in _names
    fail_msg: >-
      partition swap device {{ _swap_verify_partition_dev.stdout | trim }}
      (for {{ swap_partition.device }}) not active: {{ _swap_verify_swapon.stdout }}
  become: true

- name: _verify | Overflow swap priority is below zram
  when:
    - (swap_zram | default(none)) is not none
    - _swap_verify_zram_module.rc == 0
    - (swap_zvol | default(none)) is not none or (swap_partition | default(none)) is not none
  vars:
    _overflow_lines: "{{ _swap_verify_swapon.stdout_lines | reject('search', 'zram') | list }}"
    _zram_prio: "{{ swap_zram.priority | default(100) | int }}"
  assert:
    that:
      - _overflow_lines | length >= 1
      - _overflow_lines | map('split') | map(attribute='1') | map('int') | max < _zram_prio | int
    fail_msg: >-
      Overflow swap priority must be below zram ({{ _zram_prio }}), got:
      {{ _swap_verify_swapon.stdout }}
  become: true

- name: _verify | Read vm.swappiness
  when:
    - (swap_zram | default(none)) is not none or (swap_zvol | default(none)) is not none or (swap_partition | default(none)) is not none
    - _swap_verify_zram_module.rc == 0
  slurp:
    src: /proc/sys/vm/swappiness
  become: true
  register: _swap_verify_swappiness

- name: _verify | Swappiness tuned to the configured value
  when:
    - (swap_zram | default(none)) is not none or (swap_zvol | default(none)) is not none or (swap_partition | default(none)) is not none
    - _swap_verify_zram_module.rc == 0
  assert:
    that:
      - (_swap_verify_swappiness.content | b64decode | trim | int) == (swap_swappiness | int)
    fail_msg: >-
      vm.swappiness is {{ _swap_verify_swappiness.content | b64decode | trim }},
      expected {{ swap_swappiness }}.
  become: true
