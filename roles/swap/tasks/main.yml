# Manage swap. Two independent declarations, each optional:
#
#   swap_zvol:
#     dataset: rpool/swap
#     size: 16G
#     opts: ...   # optional; default below
#
#   swap_partition:
#     device: /dev/disk/by-uuid/00b9e215-...
#     opts: discard   # optional; default below
#
# A host can have either, both, or neither. Zvol gets the conservative
# properties recommended for ZFS swap: primarycache=metadata +
# secondarycache=none keep the page cache from also caching pages that
# are themselves cache eviction targets; logbias=throughput +
# sync=always avoids losing in-flight writes if the host crashes while
# paging out; com.sun:auto-snapshot=false because snapshotting churning
# swap blocks is pointless and pins free space. compression=zle (not
# zstd) because anonymous pages reaching swap are already incompressible
# from the kernel's POV — zle only collapses runs of zeros (cheap, no
# CPU cost on the hot paging path) which is the only win available.
#
# Raw partitions are taken as-is — the role never reformats a device
# that already carries a swap signature, so pre-existing installer
# UUIDs survive untouched.
#
# Activation goes through `swapon` and tolerates the "already active"
# error rather than chasing systemd unit names or canonicalising paths.
# systemd-fstab-generator's unit naming is sensitive to symlink rules
# and not always what `systemd-escape` produces; canonicalising via
# readlink fails on hosts where /dev/zvol/ symlinks aren't udev-
# populated even when the zvol itself works. Treating the "Device or
# resource busy" stderr as success makes the task idempotent without
# either of those moving parts. The fstab entry still ensures
# activation at next boot via the generator.

#######################################################################
# Input validation
#######################################################################
- name: Validate swap input schema
  assert:
    that:
      - swap_zvol is not defined or (swap_zvol.dataset is defined and swap_zvol.size is defined)
      - swap_partition is not defined or swap_partition.device is defined
      - swap_zram is not defined or swap_zram.size is defined
    fail_msg: >-
      Missing required keys -- swap_zvol needs .dataset + .size,
      swap_partition needs .device, swap_zram needs .size.
  tags:
    - swap

#######################################################################
# Zvol-backed swap
#######################################################################
- name: Read current swap zvol size
  when: swap_zvol is defined and zfs_root
  command: zfs get -Hp -o value volsize {{ swap_zvol.dataset }}
  register: swap_zvol_current
  changed_when: false
  failed_when: false
  check_mode: false
  become: true
  tags:
    - swap

# Skip the shrink guard only when the zvol genuinely doesn't exist yet
# (fresh host: rc=1 "dataset does not exist"). Any *other* `zfs get` failure
# must halt rather than silently bypass the shrink guard and the swapoff-
# before-reformat-on-grow below -- both gate on rc == 0.
- name: Assert the zvol size probe did not error unexpectedly
  when:
    - swap_zvol is defined and zfs_root
    - swap_zvol_current.rc != 0
  assert:
    that: "'does not exist' in swap_zvol_current.stderr"
    fail_msg: >-
      `zfs get volsize {{ swap_zvol.dataset }}` failed unexpectedly
      (rc={{ swap_zvol_current.rc }}): {{ swap_zvol_current.stderr | trim }}.
      Refusing to proceed -- cannot verify the current size for the shrink
      guard or the swapoff-before-reformat-on-grow.
  tags:
    - swap

# zfs accepts any volsize change including a shrink. Pages residing in
# the discarded sector range vanish on the spot, and the next paging
# access panics the host. Safe shrink path: swapoff, resize, mkswap,
# swapon.
- name: Refuse to shrink swap zvol
  when:
    - swap_zvol is defined and zfs_root
    - swap_zvol_current.rc == 0
  assert:
    that: (swap_zvol.size | human_to_bytes) >= (swap_zvol_current.stdout | int)
    fail_msg: >-
      Refusing to shrink {{ swap_zvol.dataset }} from {{ swap_zvol_current.stdout }}
      to {{ swap_zvol.size | human_to_bytes }} bytes -- would corrupt live swap.
      Safe path: swapoff {{ swap_zvol.dataset }}, shrink, mkswap, swapon.
  tags:
    - swap

- name: Create swap zvol
  when: swap_zvol is defined and zfs_root
  community.general.zfs:
    name: "{{ swap_zvol.dataset }}"
    state: present
    extra_zfs_properties:
      volsize: "{{ swap_zvol.size | human_to_bytes | string }}"
      volblocksize: "4096"
      compression: zle
      logbias: throughput
      sync: always
      primarycache: metadata
      secondarycache: none
      com.sun:auto-snapshot: "false"
  register: swap_zvol_created
  become: true
  tags:
    - swap

# community.general.zfs creates/grows the zvol, but udev populates the
# /dev/zvol/<dataset> symlink asynchronously; wait for it so the canonical
# path can be resolved below. A node that never appears (broken zvol)
# surfaces here as a bounded, named failure instead of a cryptic mkswap error.
- name: Wait for the zvol device node
  when: swap_zvol is defined and zfs_root and not (ansible_check_mode and swap_zvol_current.rc != 0)
  wait_for:
    path: /dev/zvol/{{ swap_zvol.dataset }}
    timeout: 30
  become: true
  tags:
    - swap

# Resolve the canonical block device once; all subsequent tasks (swapoff,
# blkid, mkswap, swapon) use the result so they address the same underlying
# node regardless of symlink state.  Falls back to the symlink path when the
# zvol does not yet exist (check mode on a fresh host).
- name: Resolve canonical zvol device path
  when: swap_zvol is defined and zfs_root
  command: readlink -f /dev/zvol/{{ swap_zvol.dataset }}
  register: _swap_zvol_dev
  changed_when: false
  failed_when: false
  check_mode: false
  become: true
  tags:
    - swap

# After a zvol grow the old swap header still encodes the original size;
# swapon would silently use only the old capacity. Deactivate first so
# mkswap can re-stamp the full volume.
- name: Deactivate swap before zvol re-format on grow
  when:
    - swap_zvol is defined and zfs_root
    - swap_zvol_created.changed
    - swap_zvol_current.rc == 0
  vars:
    _zvol_dev: "{{ (_swap_zvol_dev.stdout | default('') | trim) or '/dev/zvol/' + swap_zvol.dataset }}"
  command: swapoff {{ _zvol_dev }}
  register: swap_zvol_swapoff
  changed_when: swap_zvol_swapoff.rc == 0
  failed_when:
    - swap_zvol_swapoff.rc != 0
    - "'No such file or directory' not in swap_zvol_swapoff.stderr"
    - "'Invalid argument' not in swap_zvol_swapoff.stderr"
  become: true
  tags:
    - swap

# blkid exits 2 with no signature; treat that as "needs mkswap".
- name: Detect swap signature on zvol
  when: swap_zvol is defined and zfs_root
  vars:
    _zvol_dev: "{{ (_swap_zvol_dev.stdout | default('') | trim) or '/dev/zvol/' + swap_zvol.dataset }}"
  command: blkid -p --usages other -s TYPE -o value {{ _zvol_dev }}
  register: swap_zvol_blkid
  changed_when: false
  failed_when: false
  check_mode: false
  become: true
  tags:
    - swap

- name: Format swap on zvol
  when:
    - swap_zvol is defined and zfs_root
    - swap_zvol_blkid.stdout | default('') != 'swap' or swap_zvol_created.changed
  vars:
    _zvol_dev: "{{ (_swap_zvol_dev.stdout | default('') | trim) or '/dev/zvol/' + swap_zvol.dataset }}"
    _zvol_label: "swap-{{ swap_zvol.dataset | replace('/', '-') }}"
  command: mkswap -f -L {{ _zvol_label }} {{ _zvol_dev }}
  changed_when: true
  become: true
  tags:
    - swap

# LABEL= lets systemd-fstab-generator resolve the device via libblkid
# without depending on the /dev/zvol/ udev symlink appearing in time.
# x-systemd.requires=zfs-volumes.target makes the auto-generated .swap
# unit wait for ZFS to finish importing pools and exposing zvols at boot.
- name: Add zvol swap to /etc/fstab
  when: swap_zvol is defined and zfs_root
  mount:
    path: none
    src: "LABEL=swap-{{ swap_zvol.dataset | replace('/', '-') }}"
    fstype: swap
    opts: "{{ swap_zvol.opts | default('defaults,nofail,pri=10,x-systemd.requires=zfs-volumes.target') }}"
    state: present
    backup: true
  become: true
  tags:
    - swap

- name: Activate zvol swap
  when: swap_zvol is defined and zfs_root
  vars:
    _zvol_opts: "{{ swap_zvol.opts | default('defaults,nofail,pri=10,x-systemd.requires=zfs-volumes.target') }}"
    _zvol_dev: "{{ (_swap_zvol_dev.stdout | default('') | trim) or '/dev/zvol/' + swap_zvol.dataset }}"
    _zvol_pri: "{{ _zvol_opts | regex_search('(?:^|,)pri=(\\d+)', '\\1') | first | default('10') }}"
  command: swapon -p {{ _zvol_pri }} {{ _zvol_dev }}
  register: swap_zvol_swapon
  changed_when: swap_zvol_swapon.rc == 0
  failed_when:
    - swap_zvol_swapon.rc != 0
    - "'Device or resource busy' not in swap_zvol_swapon.stderr"
  become: true
  tags:
    - swap

#######################################################################
# Raw-partition swap (no formatting; takes the device as-is)
#######################################################################
- name: Verify partition carries a swap signature
  when: swap_partition is defined
  command: blkid -p --usages other -s TYPE -o value {{ swap_partition.device }}
  register: swap_partition_blkid
  changed_when: false
  check_mode: false
  failed_when: false # evaluated by the assert below so rc==8 gets a real message
  become: true
  tags:
    - swap

- name: Assert the partition carries a clean swap signature
  when: swap_partition is defined
  assert:
    that: swap_partition_blkid.stdout | default('') == 'swap'
    fail_msg: >-
      {{ swap_partition.device }} is not a clean swap device (blkid
      TYPE={{ swap_partition_blkid.stdout | default('<none>') }},
      rc={{ swap_partition_blkid.rc }}).
      {{ 'rc=8 means ambivalent/multiple on-disk signatures -- wipefs the device first.'
         if swap_partition_blkid.rc == 8
         else 'The role never reformats a partition; it must already carry a swap signature.' }}
  tags:
    - swap

- name: Add partition swap to /etc/fstab
  when: swap_partition is defined
  mount:
    path: none
    src: "{{ swap_partition.device }}"
    fstype: swap
    # opts replaces the default wholesale (not merged): a host overriding it
    # must re-include nofail + pri=10, or boot blocks on a missing device and
    # the overflow priority drifts. Same applies to swap_zvol.opts above.
    opts: "{{ swap_partition.opts | default('defaults,nofail,discard=once,pri=10') }}"
    state: present
    backup: true
  become: true
  tags:
    - swap

- name: Activate partition swap
  when: swap_partition is defined
  vars:
    _opts: "{{ swap_partition.opts | default('defaults,nofail,discard=once,pri=10') }}"
    _pri: "{{ _opts | regex_search('(?:^|,)pri=(\\d+)', '\\1') | first | default('10') }}"
  # Forward the priority and discard policy from fstab opts to the live
  # activation so the device state matches next-boot immediately.
  # discard=once trims the swap area once at swapon (preferred for SSDs);
  # bare discard also enables per-page TRIM which adds latency on page reuse.
  # NOTE: only pri= and discard are forwarded here; any other custom opts
  # (e.g. x-systemd.*) reach fstab but take effect only at next boot.
  command: swapon -p {{ _pri }} {{ '--discard=once' if 'discard=once' in _opts else ('--discard' if ',discard,' in (',' + _opts + ',') else '') }} {{ swap_partition.device }}
  register: swap_partition_swapon
  changed_when: swap_partition_swapon.rc == 0
  failed_when:
    - swap_partition_swapon.rc != 0
    - "'Device or resource busy' not in swap_partition_swapon.stderr"
  become: true
  tags:
    - swap

#######################################################################
# zram-backed swap (primary, high-priority)
#######################################################################
# Compressed-RAM swap fronting the disk/zvol overflow above. swap-priority
# 100 (set in the generator config) sits above the disk/zvol swap, which
# the role places at priority 10, so routine paging
# compresses into RAM and the disk/zvol is reached only under genuine
# exhaustion. zram is deadlock-free (no ZFS allocation on the page-out
# path), which is what keeps the zvol cold on the mirror hosts.
#
# zram ships in the base kernel-modules package on amd64 (every prod host + the
# x86 CI fixtures), but the trimmed arm64 cloud kernel on the local minimal/box
# test VMs carries no zram.ko -- the generator then can't create dev-zram0 and
# the activation below times out waiting for the device. Probe for the module
# and gate the zram tasks on it: present everywhere it matters, skipped only on
# the arm64 fixtures that physically lack it. check_mode:false so the probe runs
# (and registers) during the harness's dry-run pass too.
- name: Probe for the zram kernel module
  when: swap_zram is defined
  command: modinfo -k {{ ansible_kernel }} zram
  changed_when: false
  failed_when: false
  check_mode: false
  register: swap_zram_module
  become: true
  tags:
    - swap

- name: Install systemd-zram-generator
  when:
    - swap_zram is defined
    - swap_zram_module.rc == 0
  apt:
    name: systemd-zram-generator
    state: present
    cache_valid_time: 3600
  register: swap_zram_installed
  become: true
  tags:
    - swap

- name: Configure zram swap device
  when:
    - swap_zram is defined
    - swap_zram_module.rc == 0
  template:
    src: zram-generator.conf.j2
    dest: /etc/systemd/zram-generator.conf
    owner: root
    group: root
    mode: "0644"
    backup: true
    validate: python3 -c 'import configparser,sys; configparser.ConfigParser(strict=False,delimiters=("=",)).read(sys.argv[1])' "%s"
  register: swap_zram_conf
  become: true
  tags:
    - swap

# zram-generator is a systemd generator: daemon-reload re-runs it to
# (re)build the dev-zram0.swap + systemd-zram-setup@zram0 units from the
# config. Starting dev-zram0.swap pulls in the setup service (Requires=),
# which sizes /dev/zram0 and swaps it on. Restart on config change so a
# resize takes effect.
#
# Skipped in check mode when the package install or config write is only
# simulated: the generator hasn't run, so dev-zram0.swap doesn't exist
# yet and the systemd module would fail looking for it.
- name: Activate zram swap device
  when:
    - swap_zram is defined
    - swap_zram_module.rc == 0
    - not (ansible_check_mode and (swap_zram_installed.changed or swap_zram_conf.changed))
  systemd:
    name: dev-zram0.swap
    state: "{{ 'restarted' if swap_zram_conf.changed else 'started' }}"
    daemon_reload: "{{ swap_zram_conf.changed }}"
  become: true
  tags:
    - swap

# vm.swappiness default 100 suits the zram-primary hosts (paging into
# compressed RAM is cheap, unlike the disk-tuned kernel default of 60). Runs
# for any swap-carrying host so swap_swappiness isn't silently inert on a
# zvol/partition-only host (such a host should set a lower value explicitly).
- name: Tune vm.swappiness
  when:
    - swap_zram is defined or swap_zvol is defined or swap_partition is defined
    - swap_zram_module.rc == 0
  ansible.posix.sysctl:
    name: vm.swappiness
    value: "{{ swap_swappiness | string }}"
    sysctl_file: /etc/sysctl.d/30-swap.conf
    state: present
    reload: true
  become: true
  tags:
    - swap

# vm.page-cluster controls how many contiguous swap pages are read ahead per
# fault (2^N pages; default 3 = 8 pages). Disk swap benefits from readahead
# to amortise seek cost; zram has no seek penalty so each speculative page only
# costs a decompression cycle. Setting to 0 (1 page per fault) removes that
# waste on zram-primary hosts.
- name: Tune vm.page-cluster for zram hosts
  when: swap_zram is defined
  ansible.posix.sysctl:
    name: vm.page-cluster
    value: "0"
    sysctl_file: /etc/sysctl.d/30-swap.conf
    state: present
    reload: true
  become: true
  tags:
    - swap
