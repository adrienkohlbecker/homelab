# The packer image bakes a swap fstab entry (single-disk layouts by partition
# UUID; mirror layouts the raid1 /dev/md/swap). When swap_partition is set with
# a DIFFERENT device path (by-partlabel on pug-qemu, /dev/md/swap on lab-qemu),
# the role's mount task would add a second fstab line for the same block device.
# Clean the packer entry so the role exercises its fstab-write + swapon path
# cleanly.
- name: _setup | Deactivate packer-baked swap
  when: (swap_partition | default(none)) is not none
  command: swapoff -a
  changed_when: false
  become: true

- name: _setup | Remove packer-baked swap fstab entry
  when: (swap_partition | default(none)) is not none
  lineinfile:
    path: /etc/fstab
    regexp: '\sswap\s'
    state: absent
  become: true
