# sshd -T (effective-config dump) exercises the whole Include chain:
# /etc/ssh/sshd_config → sshd_config.d/00-hardening.conf. Reading the
# drop-in alone would pass even if the Include were missing.

# Query both units so the check holds whether sshd runs as the long-lived
# ssh.service (jammy) or the socket-activated ssh.socket + ssh@N-.service
# (a release that defaults to socket activation). is-active prints one state
# line per unit; passing requires at least one to be 'active'.
- name: _verify | Sshd is active  # noqa: command-instead-of-module -- is-active query, not a state change
  command: systemctl is-active ssh.socket ssh.service
  register: ssh_verify_active
  changed_when: false
  failed_when: "'active' not in ssh_verify_active.stdout_lines"
  become: true

- name: _verify | Read effective sshd config
  command: sshd -T
  changed_when: false
  become: true
  register: ssh_verify_effective

- name: _verify | Hardening directives are active
  assert:
    that:
      - ssh_verify_effective.stdout is search('(?m)^passwordauthentication no$')
      - ssh_verify_effective.stdout is search('(?m)^permitrootlogin no$')
      - ssh_verify_effective.stdout is search('(?m)^authenticationmethods publickey$')
      - ssh_verify_effective.stdout is search('(?m)^loglevel VERBOSE$')
      - ssh_verify_effective.stdout is search('(?m)^kbdinteractiveauthentication no$')
      - ssh_verify_effective.stdout is search('(?m)^streamlocalbindunlink yes$')
    fail_msg: >-
      sshd effective config is missing expected hardening directives —
      00-hardening.conf may not have landed, or /etc/ssh/sshd_config
      no longer Includes sshd_config.d.

- name: _verify | Subsystem sftp uses internal-sftp
  assert:
    that:
      - ssh_verify_effective.stdout is search('(?m)^subsystem\s+sftp\s+internal-sftp')
    fail_msg: >-
      sshd effective config does not show internal-sftp as the sftp
      subsystem — the drop-in's Subsystem directive may be shadowed.

- name: _verify | Only EtM MACs are enabled
  vars:
    _ssh_verify_macs: >-
      {{ ssh_verify_effective.stdout_lines
         | select('match', '^macs\s+')
         | first
         | regex_replace('^macs\s+', '') }}
  assert:
    that:
      # Every enabled MAC must be an EtM variant. Assert the invariant
      # positively (no token lacks -etm@) rather than blocklisting specific
      # non-EtM names — a blocklist passes a plain hmac-sha2-256 that simply
      # lacks the substring being excluded.
      - _ssh_verify_macs.split(',') | reject('search', '-etm@') | list | length == 0
    fail_msg: >-
      Non-EtM MACs are still present in the effective config:
      {{ _ssh_verify_macs }}

- name: _verify | Stock sftp Subsystem is commented out
  command: grep -c '^Subsystem' /etc/ssh/sshd_config
  register: ssh_verify_stock_subsystem
  changed_when: false
  failed_when: ssh_verify_stock_subsystem.stdout | int > 0
  become: true

