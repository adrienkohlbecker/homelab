- name: Install openssh-server
  apt:
    pkg:
      - openssh-server
    cache_valid_time: 3600
    policy_rc_d: 101
  register: ssh_apt
  become: true
  tags:
    - ssh

- name: Remove legacy drop-in path
  file:
    path: /etc/ssh/sshd_config.d/config.conf
    state: absent
  register: ssh_sshd_legacy
  become: true
  tags:
    - ssh

- name: Remove packer bootstrap drop-in
  file:
    path: /etc/ssh/sshd_config.d/00-no-password-auth.conf
    state: absent
  become: true
  tags:
    - ssh

- name: Configure sshd
  copy:
    src: 00-hardening.conf
    dest: /etc/ssh/sshd_config.d/00-hardening.conf
    owner: root
    group: root
    mode: "0644"
    backup: true
    # Parse the staged file before it lands, catching a syntax error in the
    # drop-in on write. This validates the drop-in in isolation; the merged
    # Include-chain check is the separate `sshd -t` task below.
    validate: sshd -t -f %s
  when: not (ansible_check_mode and ssh_apt.changed)
  register: ssh_sshd_config
  become: true
  tags:
    - ssh

# RequiredRSASize is not understood by OpenSSH 8.9 (jammy); sshd -t -f would
# reject the drop-in there. Only deploy on noble+ (Ubuntu 24.04 ships 9.6).
- name: Configure sshd — noble+ directives
  copy:
    src: 02-noble-plus.conf
    dest: /etc/ssh/sshd_config.d/02-noble-plus.conf
    owner: root
    group: root
    mode: "0644"
    backup: true
    validate: sshd -t -f %s
  when:
    - not (ansible_check_mode and ssh_apt.changed)
    - ansible_distribution_major_version | int >= 24
  register: ssh_sshd_config_noble
  become: true
  tags:
    - ssh

# X11 forwarding drop-in: deployed only on hosts with ssh_x11_forwarding: true
# (today: lab). Uses a Match User block so only the operator user gets it;
# other accounts are unaffected even when they SSH into the same host.
- name: Configure sshd — X11 forwarding for {{ operator_user }}
  template:
    src: 10-x11-forwarding.conf.j2
    dest: /etc/ssh/sshd_config.d/10-x11-forwarding.conf
    owner: root
    group: root
    mode: "0644"
    backup: true
    validate: sshd -t -f %s
  when:
    - ssh_x11_forwarding | default(false)
    - not (ansible_check_mode and ssh_apt.changed)
  register: ssh_sshd_config_x11
  become: true
  tags:
    - ssh

- name: Remove sshd X11 forwarding drop-in
  file:
    path: /etc/ssh/sshd_config.d/10-x11-forwarding.conf
    state: absent
  when: not (ssh_x11_forwarding | default(false))
  register: ssh_sshd_config_x11_remove
  become: true
  tags:
    - ssh

# On OpenSSH <= 9.4 (jammy 8.9), duplicate Subsystem sftp is fatal — sshd
# refuses to start. The drop-in declares our audited Subsystem, so the stock
# line must be commented out. Noble (9.6+) tolerates duplicates via
# first-match-wins, but the comment-out is harmless there.
- name: Comment out stock sftp Subsystem to avoid duplicate on jammy
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^([#\s]*)Subsystem(\s+)sftp(\s+)(.*)$'
    line: '# Subsystem\2sftp\3\4'
    backrefs: true
    backup: true
  register: ssh_sshd_config_sftp
  become: true
  tags:
    - ssh

# `sshd -t` (no -f) re-validates the *merged* live config: the whole Include
# chain plus the base-file Subsystem edit above. The copy's validate: only
# sees the drop-in in isolation, so it can't catch the duplicate Subsystem
# that is fatal on jammy. Keep both — per-file gate on write, merged-config
# gate before reload.
- name: Validate sshd config before reload
  when:
    - not (ansible_check_mode and ssh_apt.changed)
    - >-
      ssh_sshd_config.changed or ssh_sshd_config_sftp.changed or ssh_sshd_legacy.changed or ssh_sshd_config_noble.changed
      or (ssh_sshd_config_x11 is defined and ssh_sshd_config_x11 is changed)
      or (ssh_sshd_config_x11_remove is defined and ssh_sshd_config_x11_remove is changed)
  command: sshd -t
  changed_when: false
  become: true
  tags:
    - ssh

- name: Enable and reload sshd
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: ssh
      condition: "{{ not (ansible_check_mode and ssh_apt.changed) }}"
      reload: >-
        {{ ssh_sshd_config.changed or ssh_sshd_config_sftp.changed or ssh_sshd_legacy.changed or ssh_sshd_config_noble.changed
           or (ssh_sshd_config_x11 is defined and ssh_sshd_config_x11 is changed)
           or (ssh_sshd_config_x11_remove is defined and ssh_sshd_config_x11_remove is changed) }}
  tags:
    - ssh
