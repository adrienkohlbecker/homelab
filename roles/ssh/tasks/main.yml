- name: Install openssh-server
  apt:
    package:
      - openssh-server
    cache_valid_time: 3600
  register: ssh_apt
  become: true
  tags:
    - ssh

- name: Remove legacy drop-in path
  file:
    path: /etc/ssh/sshd_config.d/config.conf
    state: absent
  become: true
  tags:
    - ssh

- name: Configure sshd
  copy:
    src: 01-hardening.conf
    dest: /etc/ssh/sshd_config.d/01-hardening.conf
    owner: root
    group: root
    mode: "0644"
    backup: true
  register: ssh_sshd_config
  become: true
  tags:
    - ssh

- name: Setup sftp
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^(#? ?)Subsystem(\s+)sftp(\s+)(.*)$'
    line: '# Subsystem\2sftp\3\4'
    backrefs: true
    backup: true
  register: ssh_sshd_config_sftp
  become: true
  tags:
    - ssh

- name: Restart ssh
  when: ssh_sshd_config.changed or ssh_sshd_config_sftp.changed
  systemd:
    name: ssh
    state: restarted
  become: true
  tags:
    - ssh
