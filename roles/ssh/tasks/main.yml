- name: Install openssh-server
  apt:
    package:
      - openssh-server
    cache_valid_time: 3600
  register: ssh_apt
  become: true
  tags:
    - ssh

- name: Remove legacy drop-in path
  file:
    path: /etc/ssh/sshd_config.d/config.conf
    state: absent
  become: true
  tags:
    - ssh

- name: Remove packer bootstrap drop-in
  file:
    path: /etc/ssh/sshd_config.d/00-no-password-auth.conf
    state: absent
  become: true
  tags:
    - ssh

- name: Configure sshd
  copy:
    src: 00-hardening.conf
    dest: /etc/ssh/sshd_config.d/00-hardening.conf
    owner: root
    group: root
    mode: "0644"
    backup: true
    # Parse the staged file before it lands, catching a syntax error in the
    # drop-in on write. This validates the drop-in in isolation; the merged
    # Include-chain check is the separate `sshd -t` task below.
    validate: sshd -t -f %s
  register: ssh_sshd_config
  become: true
  tags:
    - ssh

# On OpenSSH <= 9.4 (jammy 8.9), duplicate Subsystem sftp is fatal — sshd
# refuses to start. The drop-in declares our audited Subsystem, so the stock
# line must be commented out. Noble (9.6+) tolerates duplicates via
# first-match-wins, but the comment-out is harmless there.
- name: Comment out stock sftp Subsystem to avoid duplicate on jammy
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^([#\s]*)Subsystem(\s+)sftp(\s+)(.*)$'
    line: '# Subsystem\2sftp\3\4'
    backrefs: true
    backup: true
  register: ssh_sshd_config_sftp
  become: true
  tags:
    - ssh

# `sshd -t` (no -f) re-validates the *merged* live config: the whole Include
# chain plus the base-file Subsystem edit above. The copy's validate: only
# sees the drop-in in isolation, so it can't catch the duplicate Subsystem
# that is fatal on jammy. Keep both — per-file gate on write, merged-config
# gate before reload.
- name: Validate sshd config before reload
  when:
    - not (ansible_check_mode and ssh_apt.changed)
    - ssh_sshd_config.changed or ssh_sshd_config_sftp.changed
  command: sshd -t
  changed_when: false
  become: true
  tags:
    - ssh

- name: Enable and reload sshd
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: ssh
      condition: "{{ not (ansible_check_mode and ssh_apt.changed) }}"
      reload: "{{ ssh_sshd_config.changed or ssh_sshd_config_sftp.changed }}"
  tags:
    - ssh
