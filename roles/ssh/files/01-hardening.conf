# Supported HostKey algorithms by order of preference.
HostKey /etc/ssh/ssh_host_ed25519_key
HostKey /etc/ssh/ssh_host_rsa_key
HostKey /etc/ssh/ssh_host_ecdsa_key

KexAlgorithms curve25519-sha256,curve25519-sha256@libssh.org,ecdh-sha2-nistp521,ecdh-sha2-nistp384,ecdh-sha2-nistp256,diffie-hellman-group-exchange-sha256
Ciphers chacha20-poly1305@openssh.com,aes256-gcm@openssh.com,aes128-gcm@openssh.com,aes256-ctr,aes192-ctr,aes128-ctr
MACs hmac-sha2-512-etm@openssh.com,hmac-sha2-256-etm@openssh.com,umac-128-etm@openssh.com

# Password based logins are disabled - only public key based logins are allowed.
# PubkeyAuthentication is enabled explicitly: AuthenticationMethods controls
# which methods are *required*, not which are offered, so the publickey
# mandate below relies on this being on (it is the upstream default).
PubkeyAuthentication yes
AuthenticationMethods publickey

# LogLevel VERBOSE logs user's key fingerprint on login. Needed to have a clear audit track of which key was using to log in.
LogLevel VERBOSE

# Log sftp level file access (read/write/etc.) that would not be easily logged otherwise.
Subsystem sftp  internal-sftp -f AUTHPRIV -l INFO

# Root login is not allowed for auditing reasons. This is because it's difficult to track which process belongs to which root user:
#
# On Linux, user sessions are tracking using a kernel-side session id, however, this session id is not recorded by OpenSSH.
# Additionally, only tools such as systemd and auditd record the process session id.
# On other OSes, the user session id is not necessarily recorded at all kernel-side.
# Using regular users in combination with /bin/su or /usr/bin/sudo ensure a clear audit track.
PermitRootLogin no

# To disable tunneled clear text passwords, change to no here!
PasswordAuthentication no
KbdInteractiveAuthentication no

# Bound the unauthenticated login window. With pubkey-only auth there is no
# password to type, so 30s is ample and shrinks the pre-auth connection-slot
# window an attacker can hold open.
LoginGraceTime 30

# Reap dead sessions: probe every 5 min over the encrypted channel and
# disconnect after 3 missed replies (~15 min). The client transport answers
# these regardless of app activity, so active X11/TCP/agent/gpg forwarding
# stays up; only a vanished client (slept laptop, dropped link) is reaped,
# freeing its connection slot and any forwarded sockets.
ClientAliveInterval 300
ClientAliveCountMax 3

# Remove sockets before connecting (used for RemoteForward in gpg forwarding)
StreamLocalBindUnlink yes
