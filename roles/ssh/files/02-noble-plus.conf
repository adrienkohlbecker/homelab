# RequiredRSASize rejects user RSA keys shorter than the threshold at
# authentication time, enforcing the NIST SP 800-57 minimum automatically.
# Available since OpenSSH 9.1; deployed only on noble+ (Ubuntu 24.04 ships 9.6)
# since jammy's 8.9 would reject the directive as unknown during validate:.
RequiredRSASize 3072
