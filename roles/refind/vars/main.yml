---
# Theme artifact: refind-theme-regular, pinned to an upstream commit.
# Arch-independent (PNG icons + bitmap fonts), so no ansible_architecture keying.
refind_theme_version: 26a82c33c67bbcaf1498a3c2e4d314b7cbe6cf50
refind_theme_artifact:
  url: "{{ mirror_github }}/bobafetthotmail/refind-theme-regular/archive/{{ refind_theme_version }}.tar.gz"
  sha256: 4f4cf0a496d26c6da73299320ae9a3f00dd32be916b6abfd35dfab2d62368f5a

# rEFInd EFI binary + firmware-fallback names, keyed by arch. The refind package
# ships both under /usr/share/refind/; x64 on Intel/AMD, aa64 on arm64 (test box).
refind_efi_binary: "{{ 'refind_aa64.efi' if ansible_architecture == 'aarch64' else 'refind_x64.efi' }}"
refind_fallback_binary: "{{ 'BOOTAA64.EFI' if ansible_architecture == 'aarch64' else 'BOOTX64.EFI' }}"
