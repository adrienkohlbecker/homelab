# This role maintains rEFInd's on-ESP config + theme. It runs after the
# zfsbootmenu role (site.yml order), which downloads /EFI/ZBM/VMLINUZ.EFI — the
# image the menuentry below boots. The assert makes that ordering dependency
# fail loud rather than writing a config that points at a missing loader.
- name: Install refind
  apt:
    package:
      - efibootmgr
      - mdadm
      - refind
    cache_valid_time: 3600
  register: refind_apt
  become: true
  tags:
    - refind

- name: Stat the ZFSBootMenu loader
  when: not ansible_check_mode
  stat:
    path: /boot/efi/EFI/ZBM/VMLINUZ.EFI
  register: refind_zbm_loader
  become: true
  tags:
    - refind

- name: ZFSBootMenu must run before refind
  when: not ansible_check_mode
  assert:
    that: refind_zbm_loader.stat.exists
    fail_msg: >-
      /boot/efi/EFI/ZBM/VMLINUZ.EFI is missing — the zfsbootmenu role must run
      before refind; it provides the image this role's menuentry boots.
  tags:
    - refind

- name: Create the rEFInd + firmware-fallback directories on the ESP
  when: not (ansible_check_mode and refind_apt.changed)
  file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - /boot/efi/EFI/refind
    - /boot/efi/EFI/BOOT
  become: true
  tags:
    - refind

# Own the rEFInd binary on the ESP. We copy it straight from the package's
# /usr/share/refind/refind/ (the nested dir refind-install reads via
# RefindDir="$ThisDir/refind") rather than run refind-install, which would also
# register an NVRAM boot entry — boot order / per-disk entries are managed by
# hand at bootstrap, not by this role. The second copy lands at the firmware
# fallback path \EFI\BOOT\BOOT<arch>.EFI so a host whose NVRAM was wiped (CMOS
# clear, BIOS update, "Restore Defaults") still boots rEFInd off the ESP. No
# backup: true — /boot/efi is vfat and backup_local's ownership-preserving chown
# fails on FAT.
#
# Runs on both arches: the package ships refind_x64.efi on x86 and refind_aa64.efi
# on arm64 under the same path. Prod is all-x86 and boots rEFInd → ZBM; the arm64
# test box boots the EFI-stub path (the excluded arm64 branch) and never loads
# this binary, but the role still owns it there so the converge is exercised on
# both arches.
- name: Install the rEFInd binary on the ESP  # noqa: require-backup
  when: not (ansible_check_mode and refind_apt.changed)
  copy:
    src: "/usr/share/refind/refind/{{ refind_efi_binary }}"
    dest: "/boot/efi/EFI/refind/{{ refind_efi_binary }}"
    remote_src: true
    owner: root
    group: root
    mode: "0644"
  become: true
  tags:
    - refind

- name: Install the firmware-fallback rEFInd binary  # noqa: require-backup
  when: not (ansible_check_mode and refind_apt.changed)
  copy:
    src: "/usr/share/refind/refind/{{ refind_efi_binary }}"
    dest: "/boot/efi/EFI/BOOT/{{ refind_fallback_binary }}"
    remote_src: true
    owner: root
    group: root
    mode: "0644"
  become: true
  tags:
    - refind

- name: Remove default config
  file:
    path: /boot/refind_linux.conf
    state: absent
  become: true
  tags:
    - refind

- name: Create theme directory
  file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - /boot/efi/EFI/refind/themes
    - /boot/efi/EFI/refind/themes/refind-theme-regular
  become: true
  register: refind_theme_dir
  tags:
    - refind

- name: Download refind theme
  get_url:
    url: "{{ refind_theme_artifact.url }}"
    checksum: "sha256:{{ refind_theme_artifact.sha256 }}"
    # Download cache: persists deliberately. get_url re-verifies the sha256 and
    # skips the fetch when the file already matches, so this is the idempotence
    # mechanism — deleting it would force a re-download on every converge.
    dest: /var/cache/refind-theme.tar.gz
    owner: root
    group: root
    mode: "0644"
  become: true
  register: refind_theme_download
  retries: 3
  delay: 2
  until: refind_theme_download is succeeded
  tags:
    - refind

# Allowlist (not denylist) what lands on the ESP: extract only the icon/font
# assets the theme.conf references plus LICENSE. A future pinned-commit bump
# then cannot smuggle an active file (.efi/.conf/script) onto the boot
# partition, regardless of what the upstream tree adds.
- name: Unpack refind theme
  when: not (ansible_check_mode and refind_theme_dir.changed)
  unarchive:
    src: /var/cache/refind-theme.tar.gz
    dest: /boot/efi/EFI/refind/themes/refind-theme-regular
    remote_src: true
    extra_opts:
      - --strip-components=1
      - --wildcards
      - "*/icons"
      - "*/fonts"
      - "*/LICENSE"
    creates: "/boot/efi/EFI/refind/themes/refind-theme-regular/.installed-{{ refind_theme_version }}"
  become: true
  register: refind_theme_unpack
  tags:
    - refind

- name: Stamp installed theme version
  when:
    - not (ansible_check_mode and refind_theme_dir.changed)
    - refind_theme_unpack is changed
  file:
    path: "/boot/efi/EFI/refind/themes/refind-theme-regular/.installed-{{ refind_theme_version }}"
    state: touch
    owner: root
    group: root
    mode: "0644"
  become: true
  tags:
    - refind

# No backup: true on these two — /boot/efi is vfat, and backup_local's chown
# to preserve ownership fails on FAT, so a backup can't be written on the ESP.
- name: Configure refind  # noqa: require-backup
  copy:
    src: refind.conf
    dest: /boot/efi/EFI/refind/refind.conf
    owner: root
    group: root
    mode: "0644"
  become: true
  register: refind_conf
  tags:
    - refind

- name: Configure refind theme  # noqa: require-backup
  copy:
    src: theme.conf
    dest: /boot/efi/EFI/refind/themes/refind-theme-regular/theme.conf
    owner: root
    group: root
    mode: "0644"
  become: true
  register: refind_theme_conf
  tags:
    - refind

# Only the boot config warrants a reboot. rEFInd re-reads the theme + its
# theme.conf fresh from the ESP at every boot, so a theme change takes effect
# at the next natural boot without forcing one.
- name: Ask to reboot
  when: refind_conf.changed
  file:
    path: /var/run/reboot-required
    state: touch
    owner: root
    group: root
    mode: "0644"
  become: true
  tags:
    - refind
