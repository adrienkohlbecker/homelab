# This role maintains rEFInd's on-ESP binaries, config, theme, and aarch64
# Linux EFI-stub staging hook. It runs after zfsbootmenu, which installs the
# ZBM artifacts referenced by the menuentries.
- name: Install refind
  apt:
    package:
      - efibootmgr
      - mdadm
      - refind
    cache_valid_time: 3600
  register: refind_apt
  become: true
  tags:
    - refind

- name: Stat the ZFSBootMenu loader
  when: not ansible_check_mode
  stat:
    path: /boot/efi/EFI/ZBM/VMLINUZ.EFI
  register: refind_zbm_loader
  become: true
  tags:
    - refind

- name: ZFSBootMenu must run before refind
  when: not ansible_check_mode
  assert:
    that: refind_zbm_loader.stat.exists
    fail_msg: >-
      /boot/efi/EFI/ZBM/VMLINUZ.EFI is missing — the zfsbootmenu role must run
      before refind; it provides the image this role's menuentry boots.
  tags:
    - refind

- name: Create the rEFInd + firmware-fallback directories on the ESP
  file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - /boot/efi/EFI/refind
    - /boot/efi/EFI/refind/drivers_{{ refind_azerty_keymap_arch }}
    - /boot/efi/EFI/BOOT
  become: true
  register: refind_esp_dirs
  tags:
    - refind

# Own the rEFInd binary on the ESP. We copy it straight from the package's
# /usr/share/refind/refind/ (the nested dir refind-install reads via
# RefindDir="$ThisDir/refind") rather than run refind-install, which would also
# register an NVRAM boot entry — boot order / per-disk entries are managed by
# hand at bootstrap, not by this role. The second copy lands at the firmware
# fallback path \EFI\BOOT\BOOT<arch>.EFI so a host whose NVRAM was wiped (CMOS
# clear, BIOS update, "Restore Defaults") still boots rEFInd off the ESP. No
# backup: true — /boot/efi is vfat and backup_local's ownership-preserving chown
# fails on FAT.
#
# Runs on both arches: the package ships refind_x64.efi on x86 and
# refind_aa64.efi on arm64 under the same path.
- name: Install the rEFInd binary on the ESP  # noqa: require-backup
  when: not (ansible_check_mode and refind_apt.changed)
  copy:
    src: "/usr/share/refind/refind/{{ refind_efi_binary }}"
    dest: "/boot/efi/EFI/refind/{{ refind_efi_binary }}"
    remote_src: true
    owner: root
    group: root
    mode: "0644"
  become: true
  tags:
    - refind

- name: Install the firmware-fallback rEFInd binary  # noqa: require-backup
  when: not (ansible_check_mode and refind_apt.changed)
  copy:
    src: "/usr/share/refind/refind/{{ refind_efi_binary }}"
    dest: "/boot/efi/EFI/BOOT/{{ refind_fallback_binary }}"
    remote_src: true
    owner: root
    group: root
    mode: "0644"
  become: true
  tags:
    - refind

# No backup: true — /boot/efi is vfat, and backup_local's ownership-preserving
# chown fails on FAT. rEFInd automatically scans drivers_<arch> in its own
# directory before presenting the menu.
- name: Install rEFInd AZERTY keymap driver on the ESP  # noqa: require-backup
  when: not (ansible_check_mode and refind_esp_dirs.changed)
  copy:
    src: "{{ refind_azerty_keymap_file }}"
    dest: "/boot/efi/EFI/refind/drivers_{{ refind_azerty_keymap_arch }}/{{ refind_azerty_keymap_file }}"
    owner: root
    group: root
    mode: "0644"
  become: true
  register: refind_azerty_keymap_driver
  tags:
    - refind

- name: Remove default config
  file:
    path: /boot/refind_linux.conf
    state: absent
  become: true
  tags:
    - refind

- name: Install aarch64 Linux EFI-stub staging hook
  when: ansible_architecture == "aarch64"
  copy:
    src: zz-stage-efi-stub
    dest: /etc/kernel/postinst.d/zz-stage-efi-stub
    owner: root
    group: root
    mode: "0755"
    backup: true
  become: true
  register: refind_efi_stub_hook
  tags:
    - refind

- name: Create aarch64 Linux EFI-stub hook directories
  when: ansible_architecture == "aarch64"
  file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - /etc/kernel/postrm.d
    - /etc/initramfs/post-update.d
  become: true
  tags:
    - refind

- name: Link aarch64 Linux EFI-stub hook into kernel lifecycle
  when: ansible_architecture == "aarch64"
  file:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    state: link
    force: true
    owner: root
    group: root
  loop:
    - src: ../postinst.d/zz-stage-efi-stub
      dest: /etc/kernel/postrm.d/zz-stage-efi-stub
    - src: /etc/kernel/postinst.d/zz-stage-efi-stub
      dest: /etc/initramfs/post-update.d/zz-stage-efi-stub
  loop_control:
    label: "{{ item.dest }}"
  become: true
  tags:
    - refind

- name: Stage aarch64 Linux EFI-stub kernel and initrd
  when:
    - ansible_architecture == "aarch64"
    - not ansible_check_mode
  command: /etc/kernel/postinst.d/zz-stage-efi-stub
  changed_when: refind_efi_stub_hook is changed
  become: true
  tags:
    - refind

- name: Create theme directory
  file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - /boot/efi/EFI/refind/themes
    - /boot/efi/EFI/refind/themes/refind-theme-regular
  become: true
  register: refind_theme_dir
  tags:
    - refind

- name: Download refind theme
  get_url:
    url: "{{ refind_theme_artifact.url }}"
    checksum: "sha256:{{ refind_theme_artifact.sha256 }}"
    # Download cache: persists deliberately. get_url re-verifies the sha256 and
    # skips the fetch when the file already matches, so this is the idempotence
    # mechanism — deleting it would force a re-download on every converge.
    dest: /var/cache/refind-theme.tar.gz
    owner: root
    group: root
    mode: "0644"
  become: true
  register: refind_theme_download
  retries: 3
  delay: 2
  until: refind_theme_download is succeeded
  tags:
    - refind

# Allowlist (not denylist) what lands on the ESP: extract only the PNG icon/
# font assets theme.conf references, plus LICENSE. Matching by *.png extension
# (not by directory) is load-bearing — it means a future pinned-commit bump
# cannot smuggle an active file (.efi/.conf/script) onto the boot partition,
# whatever the upstream tree adds under icons/ or fonts/. --wildcards-match-slash
# lets the globs reach the nested size dirs (icons/128-48/, ...).
- name: Unpack refind theme
  when: not (ansible_check_mode and refind_theme_dir.changed)
  unarchive:
    src: /var/cache/refind-theme.tar.gz
    dest: /boot/efi/EFI/refind/themes/refind-theme-regular
    remote_src: true
    extra_opts:
      - --strip-components=1
      - --wildcards
      - --wildcards-match-slash
      - "*/icons/*.png"
      - "*/fonts/*.png"
      - "*/LICENSE"
    creates: "/boot/efi/EFI/refind/themes/refind-theme-regular/.installed-{{ refind_theme_artifact.sha256 }}"
  become: true
  register: refind_theme_unpack
  tags:
    - refind

- name: Stamp installed theme checksum
  when:
    - not (ansible_check_mode and refind_theme_dir.changed)
    - refind_theme_unpack is changed
  file:
    path: "/boot/efi/EFI/refind/themes/refind-theme-regular/.installed-{{ refind_theme_artifact.sha256 }}"
    state: touch
    owner: root
    group: root
    mode: "0644"
  become: true
  tags:
    - refind

- name: Find stale theme sentinels
  when: not (ansible_check_mode and refind_theme_dir.changed)
  find:
    paths: /boot/efi/EFI/refind/themes/refind-theme-regular
    patterns: ".installed-*"
    hidden: true
    excludes:
      - ".installed-{{ refind_theme_artifact.sha256 }}"
  become: true
  register: refind_stale_sentinels
  tags:
    - refind

- name: Remove stale theme sentinels
  when: not (ansible_check_mode and refind_theme_dir.changed)
  file:
    path: "{{ item.path }}"
    state: absent
  loop: "{{ refind_stale_sentinels.files }}"
  loop_control:
    label: "{{ item.path | basename }}"
  become: true
  tags:
    - refind

- name: Read ZBM cmdline for refind entries
  slurp:
    src: /boot/efi/EFI/ZBM/cmdline
  register: refind_zbm_cmdline_content
  become: true
  tags:
    - refind

- name: Set ZBM cmdline fact for refind entries
  set_fact:
    refind_zbm_cmdline: "{{ refind_zbm_cmdline_content | slurp_text | trim }}"
  tags:
    - refind

- name: Read pool cmdline for aarch64 Linux EFI-stub entry
  when: ansible_architecture == "aarch64"
  command: zfs get -H -o value org.zfsbootmenu:commandline rpool/ROOT
  changed_when: false
  register: refind_pool_cmdline
  become: true
  tags:
    - refind

# No backup: true on these two — /boot/efi is vfat, and backup_local's chown
# to preserve ownership fails on FAT, so a backup can't be written on the ESP.
- name: Configure refind  # noqa: require-backup
  template:
    src: refind.conf.j2
    dest: /boot/efi/EFI/refind/refind.conf
    owner: root
    group: root
    mode: "0644"
  become: true
  register: refind_conf
  tags:
    - refind

# Mirror the config next to the firmware-fallback binary. rEFInd only reads
# refind.conf from its own directory, so the fallback copy at \EFI\BOOT
# otherwise boots config-less — 20s default countdown, then the first
# auto-scanned loader (the ZBM image) with empty load options: no zbm.skip
# and no serial console args. With the mirror, an NVRAM-wipe recovery boot
# (and every boot on EC2 test cells, whose NVRAM starts empty) behaves
# exactly like the normal NVRAM-entry path, minus theme and keymap driver
# (both resolve relative to rEFInd's own directory; rEFInd skips a missing
# include and falls back to text mode).
- name: Mirror refind.conf to the firmware-fallback directory  # noqa: require-backup
  when: not (ansible_check_mode and refind_conf.changed)
  copy:
    src: /boot/efi/EFI/refind/refind.conf
    dest: /boot/efi/EFI/BOOT/refind.conf
    remote_src: true
    owner: root
    group: root
    mode: "0644"
  become: true
  tags:
    - refind

- name: Configure refind theme  # noqa: require-backup
  copy:
    src: theme.conf
    dest: /boot/efi/EFI/refind/themes/refind-theme-regular/theme.conf
    owner: root
    group: root
    mode: "0644"
  become: true
  tags:
    - refind

# Only the boot config warrants a reboot. rEFInd re-reads the theme + its
# theme.conf fresh from the ESP at every boot, so a theme change takes effect
# at the next natural boot without forcing one.
- name: Ask to reboot
  when: refind_conf.changed or refind_azerty_keymap_driver.changed
  file:
    path: /var/run/reboot-required
    state: touch
    owner: root
    group: root
    mode: "0644"
  become: true
  tags:
    - refind
