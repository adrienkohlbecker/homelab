# refind boots the single-file /EFI/ZBM/VMLINUZ.EFI that the zfsbootmenu role
# downloads (site.yml runs zfsbootmenu first). The box image ships only the
# Components-mode vmlinuz-bootmenu, so bring the loader up here to mirror the
# prod ordering and satisfy the role's loader assert when refind is tested
# in isolation.
- name: _setup | Provide the ZFSBootMenu loader refind depends on
  import_role:
    name: zfsbootmenu
