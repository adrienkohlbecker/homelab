# No reboot here, unlike the console/zfsbootmenu _verify which reboot to observe
# next-boot state: rEFInd re-parses refind.conf + theme.conf off the ESP fresh
# at every boot, so the on-disk files this role writes ARE the observable
# end-state — there is no next-boot transform to test.
- name: _verify | Stat installed theme files
  stat:
    path: "/boot/efi/EFI/refind/themes/refind-theme-regular/{{ item }}"
  loop:
    - LICENSE
    - theme.conf
    - icons/128-48/os_ubuntu.png
    - ".installed-{{ refind_theme_artifact.sha256 }}"
  register: _refind_verify_present
  become: true

- name: _verify | Theme files were installed
  assert:
    that: item.stat.exists
    fail_msg: "expected theme file missing: {{ item.item }}"
  loop: "{{ _refind_verify_present.results }}"
  loop_control:
    label: "{{ item.item }}"

- name: _verify | Stat excluded dev files
  stat:
    path: "/boot/efi/EFI/refind/themes/refind-theme-regular/{{ item }}"
  loop:
    - src
    - .devcontainer
    - .gitignore
    - install.sh
  register: _refind_verify_excluded
  become: true

- name: _verify | Excluded dev files are absent from the ESP
  assert:
    that: not item.stat.exists
    fail_msg: "excluded file should not be on the ESP: {{ item.item }}"
  loop: "{{ _refind_verify_excluded.results }}"
  loop_control:
    label: "{{ item.item }}"

- name: _verify | Read refind.conf
  slurp:
    src: /boot/efi/EFI/refind/refind.conf
  register: _refind_verify_conf
  become: true

- name: _verify | Validate refind.conf boot config
  vars:
    _conf: "{{ _refind_verify_conf.content | b64decode }}"
    _expected_default_selection: "{{ 'Ubuntu (Linux EFI Stub)' if ansible_architecture == 'aarch64' else 'Ubuntu (ZBM)' }}"
    _expected_dont_scan_dirs: "{{ 'dont_scan_dirs EFI:/EFI/ZBM,EFI:/EFI/Linux' if ansible_architecture == 'aarch64' else 'dont_scan_dirs EFI:/EFI/ZBM' }}"
  assert:
    that:
      - "'timeout 3' in _conf"
      - "'default_selection \"' ~ _expected_default_selection ~ '\"' in _conf"
      - _expected_dont_scan_dirs in _conf
      - "'loader /EFI/ZBM/VMLINUZ.EFI' in _conf"
      - ansible_architecture != "aarch64" or 'menuentry "Ubuntu (Linux EFI Stub)"' in _conf
      - ansible_architecture != "aarch64" or 'loader /EFI/Linux/vmlinuz.efi' in _conf
      - ansible_architecture != "aarch64" or 'initrd /EFI/Linux/initrd' in _conf
      - "'include themes/refind-theme-regular/theme.conf' in _conf"
    fail_msg: "refind.conf missing expected boot directives"

- name: _verify | Stat the loader referenced by the menuentry
  stat:
    path: /boot/efi/EFI/ZBM/VMLINUZ.EFI
  register: _refind_verify_loader
  become: true

- name: _verify | Menuentry loader exists on the ESP
  assert:
    that: _refind_verify_loader.stat.exists
    fail_msg: >-
      refind.conf boots /EFI/ZBM/VMLINUZ.EFI but it is absent from the ESP —
      the zfsbootmenu role must run before refind.

- name: _verify | Stat aarch64 Linux EFI-stub files
  when: ansible_architecture == "aarch64"
  stat:
    path: "/boot/efi/EFI/Linux/{{ item }}"
  loop:
    - vmlinuz.efi
    - initrd
  register: _refind_verify_linux_stub
  become: true

- name: _verify | Aarch64 Linux EFI-stub files are present
  when: ansible_architecture == "aarch64"
  assert:
    that:
      - item.stat.exists
      - item.stat.size > 0
    fail_msg: "aarch64 Linux EFI-stub file missing or empty: {{ item.item }}"
  loop: "{{ _refind_verify_linux_stub.results }}"
  loop_control:
    label: "{{ item.item }}"

# Both arches: the role owns the binary on x86 (refind_x64.efi) and arm64
# (refind_aa64.efi) alike, so assert it on whichever arch the fixture is.
- name: _verify | Stat the rEFInd binary + firmware fallback on the ESP
  stat:
    path: "/boot/efi/EFI/{{ item }}"
  loop:
    - "refind/{{ refind_efi_binary }}"
    - "BOOT/{{ refind_fallback_binary }}"
  register: _refind_verify_binaries
  become: true

- name: _verify | ESP carries the rEFInd binary + firmware fallback
  assert:
    that: item.stat.exists
    fail_msg: "rEFInd binary/fallback missing on the ESP: EFI/{{ item.item }}"
  loop: "{{ _refind_verify_binaries.results }}"
  loop_control:
    label: "{{ item.item }}"

- name: _verify | Stat the rEFInd AZERTY keymap driver on the ESP
  stat:
    path: "/boot/efi/EFI/refind/drivers_{{ refind_azerty_keymap_arch }}/{{ refind_azerty_keymap_url | basename }}"
  register: _refind_verify_azerty_keymap_driver
  become: true

- name: _verify | ESP carries the rEFInd AZERTY keymap driver
  assert:
    that:
      - _refind_verify_azerty_keymap_driver.stat.exists
      - _refind_verify_azerty_keymap_driver.stat.size > 0
    fail_msg: >-
      rEFInd AZERTY keymap driver missing or empty on the ESP:
      EFI/refind/drivers_{{ refind_azerty_keymap_arch }}/{{ refind_azerty_keymap_url | basename }}

- name: _verify | Stat distro default config
  stat:
    path: /boot/refind_linux.conf
  register: _refind_verify_default_conf
  become: true

- name: _verify | Distro default config is absent
  assert:
    that: not _refind_verify_default_conf.stat.exists
    fail_msg: >-
      /boot/refind_linux.conf is present; rEFInd may auto-add unwanted Linux
      entries.
