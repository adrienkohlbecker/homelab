# _setup imports the full keepalived role, so the fragment is actually
# loaded by a running daemon here. The vmac child existing is the live
# proof of `use_vmac` + `vmac_xmit_base`: without them the VIP would ride
# eth0's primary MAC and UniFi's per-MAC client tracker would flip the
# host's client entry to the DNS VIP on prod.
- name: _verify | Keepalived raised the dedicated VRRP vmac interface
  command: ip -o link show vrrp.{{ dns_keepalived_vrid }}
  register: adguard_verify_vmac
  changed_when: false
  retries: 30
  delay: 2
  until: adguard_verify_vmac.rc == 0
  become: true

- name: _verify | Container reports healthy
  command: /usr/bin/podman healthcheck run adguard
  register: adguard_verify_health
  changed_when: false
  retries: 30
  delay: 2
  until: adguard_verify_health.rc == 0
  become: true

- name: _verify | Keepalived healthcheck script reports healthy
  command: /usr/local/bin/adguard_healthcheck
  register: adguard_verify_hc_script
  changed_when: false
  retries: 30
  delay: 2
  until: adguard_verify_hc_script.rc == 0
  become: true

- name: _verify | Split-horizon override resolves
  command: /usr/bin/podman exec adguard nslookup box.{{ domain }} 127.0.0.1
  register: adguard_verify_splithorizon
  changed_when: false
  failed_when: external_ips.box not in adguard_verify_splithorizon.stdout
  become: true

# Recursive resolution through the DoH upstream chain -- every other dig
# here hits a local rewrite, so without this a broken upstream config
# (bad DoH URL, bootstrap failure) would pass _verify while real client
# queries fail. With use_http3_upstreams the first attempts ride QUIC
# over UDP/443, which qemu SLIRP drops under load; the retries budget
# absorbs that until the HTTP/2-over-TCP fallback answers.
- name: _verify | Upstream resolution answers through DoH
  command: dig +short +timeout=2 +tries=2 @{{ ansible_facts.default_ipv4.address }} example.com A
  register: adguard_verify_upstream
  changed_when: false
  failed_when: adguard_verify_upstream.stdout_lines | length == 0
  retries: 30
  delay: 2
  until: adguard_verify_upstream.stdout_lines | length > 0

# Blocking is enforced, not just configured: doubleclick.net is an exact
# entry in the test adlist (group_vars/test.yml), so the filtering engine
# must report it filtered. The API check is robust against blocking_mode
# answer-shape changes.
- name: _verify | Filtering engine blocks a listed domain
  uri:
    url: http://127.0.0.1:{{ service_ports.adguard }}/control/filtering/check_host?name=doubleclick.net
    return_content: true
    status_code: 200
  register: adguard_verify_blocked
  retries: 30
  delay: 2
  until: (adguard_verify_blocked.json | default({})).reason | default('') is match('Filtered')

# Real TLS handshake against the VIP publish (dig +tls skips CA
# validation without +tls-ca, so the snakeoil fixture cert passes), and
# the answer proves the dns.<domain> rewrite Private-DNS clients rely on.
# This is also the only probe on the VIP socket itself -- the others all
# target the host address.
- name: _verify | DoT on the VIP answers with the rewrite
  command: dig +short +tls +timeout=3 +tries=2 @{{ network.virtual_ips.dns }} dns.{{ domain }} A
  register: adguard_verify_dot
  changed_when: false
  retries: 30
  delay: 2
  until: network.virtual_ips.dns in adguard_verify_dot.stdout_lines

# The user_rules undelegated-suffix guard answers NXDOMAIN locally
# instead of leaking the query upstream.
- name: _verify | Undelegated suffix is answered NXDOMAIN locally
  command: dig +timeout=2 +tries=2 @{{ ansible_facts.default_ipv4.address }} printer.lan A
  register: adguard_verify_undelegated
  changed_when: false
  failed_when: "'status: NXDOMAIN' not in adguard_verify_undelegated.stdout"

# AdGuard checks HTTPS-record ipv6hints as hostnames against the filters
# (filterSVCBHint), so an over-broad rule swallows every type-65 answer
# that carries one. cloudflare-dns.com reliably publishes such a record.
- name: _verify | HTTPS-type answers survive response filtering
  command: dig +short +timeout=2 +tries=2 @{{ ansible_facts.default_ipv4.address }} cloudflare-dns.com HTTPS
  register: adguard_verify_https_rr
  changed_when: false
  retries: 30
  delay: 2
  until: adguard_verify_https_rr.stdout_lines | length > 0

- name: _verify | Compatibility rewrite pi.hole answers loopback
  command: dig +short +timeout=2 +tries=2 @{{ ansible_facts.default_ipv4.address }} pi.hole A
  register: adguard_verify_pihole
  changed_when: false
  failed_when: "'127.0.0.1' not in adguard_verify_pihole.stdout_lines"

- name: _verify | AdGuard filter lists are populated
  uri:
    url: http://127.0.0.1:{{ service_ports.adguard }}/control/filtering/status
    return_content: true
    status_code: 200
  register: adguard_verify_filtering
  retries: 30
  delay: 2
  until: >-
    ((adguard_verify_filtering.json | default({})).filters | default([])
     | selectattr('enabled')
     | map(attribute='rules_count')
     | map('int')
     | sum) > 0

# Map the vhost FQDN to loopback so SNI matches the served certificate.
# Probing https://localhost with a Host: header leaves SNI=localhost, which
# OpenSSL 3.x (noble/resolute) rejects as a fatal unrecognized_name alert
# (status -1); hitting the FQDN directly keeps SNI correct on every release.
- name: _verify | Map the adguard vhost FQDN to loopback for SNI-correct probing
  lineinfile:
    path: /etc/hosts
    line: "127.0.0.1 adguard.{{ inventory_hostname }}.{{ domain }}"
    state: present
  become: true

- name: _verify | Admin UI gate redirects unauthenticated to Authelia
  uri:
    url: https://adguard.{{ inventory_hostname }}.{{ domain }}/
    validate_certs: false
    follow_redirects: none
    status_code: 302
  register: adguard_verify_admin_gate
  failed_when: adguard_verify_admin_gate is not authelia_redirects_to('adguard', inventory_hostname, domain)
  become: true

- name: _verify | Reboot guard service is active
  systemd:
    name: adguard_reboot_guard.service
  register: _adguard_verify_reboot_guard
  failed_when: _adguard_verify_reboot_guard.status.ActiveState != 'active'
  become: true

# Plain grep (not -q): it consumes all input so systemd-inhibit never
# takes a SIGPIPE under pipefail, and the matching line lands in the
# task output for debugging.
- name: _verify | Reboot guard holds the inhibitor lock
  shell:
    cmd: >-
      set -euo pipefail;
      systemd-inhibit --list --no-legend | grep adguard_reboot_guard
    executable: /bin/bash
  register: _adguard_verify_inhibitor
  changed_when: false
  retries: 6
  delay: 5
  until: _adguard_verify_inhibitor.rc == 0
  become: true
