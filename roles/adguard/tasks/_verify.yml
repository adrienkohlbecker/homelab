- name: _verify | Slurp rendered keepalived conf
  slurp:
    src: /etc/keepalived/conf.d/adguard.conf
  register: adguard_keepalived_rendered
  become: true

- name: _verify | Keepalived conf opts the VIP onto a dedicated VRRP vmac
  assert:
    that:
      - "'use_vmac' in (adguard_keepalived_rendered.content | b64decode)"
      - "'vmac_xmit_base' in (adguard_keepalived_rendered.content | b64decode)"

- name: _verify | Container reports healthy
  command: /usr/bin/podman healthcheck run adguard
  register: adguard_verify_health
  changed_when: false
  retries: 30
  delay: 2
  until: adguard_verify_health.rc == 0
  become: true

- name: _verify | Keepalived healthcheck script reports healthy
  command: /usr/local/bin/adguard_healthcheck
  register: adguard_verify_hc_script
  changed_when: false
  retries: 30
  delay: 2
  until: adguard_verify_hc_script.rc == 0
  become: true

- name: _verify | DNS healthcheck name resolves locally
  command: /usr/bin/podman exec adguard getent hosts adguard.home
  register: adguard_verify_local
  changed_when: false
  retries: 30
  delay: 2
  until: adguard_verify_local.rc == 0
  become: true

- name: _verify | Split-horizon override resolves
  command: /usr/bin/podman exec adguard getent hosts box.fahm.fr
  register: adguard_verify_splithorizon
  changed_when: false
  failed_when: external_ips.box not in adguard_verify_splithorizon.stdout
  become: true

- name: _verify | Admin UI answers on the loopback publish
  uri:
    url: http://127.0.0.1:{{ service_ports.adguard }}/
    status_code: [ 200, 301, 302 ]
  register: adguard_verify_admin
  retries: 30
  delay: 2
  until: adguard_verify_admin.status in [200, 301, 302]

- name: _verify | Admin UI gate redirects unauthenticated to Authelia
  uri:
    url: https://localhost/
    headers:
      Host: adguard.{{ inventory_hostname }}.{{ domain }}
    validate_certs: false
    follow_redirects: none
    status_code: 302
  register: adguard_verify_admin_gate
  failed_when: >-
    adguard_verify_admin_gate.status != 302
    or 'auth.' not in (adguard_verify_admin_gate.location | default(''))
  become: true

- name: _verify | Reboot guard service is active
  systemd:
    name: adguard_reboot_guard.service
  register: _adguard_verify_reboot_guard
  failed_when: _adguard_verify_reboot_guard.status.ActiveState != 'active'
  become: true

- name: _verify | Reboot guard holds the inhibitor lock
  shell:
    cmd: >-
      set -euo pipefail;
      systemd-inhibit --list --no-legend 2>/dev/null | grep -c adguard_reboot_guard || echo 0
    executable: /bin/bash
  register: _adguard_verify_inhibitor
  changed_when: false
  retries: 6
  delay: 5
  until: (_adguard_verify_inhibitor.stdout | trim | int) > 0
  become: true
