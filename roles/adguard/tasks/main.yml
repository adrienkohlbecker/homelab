- name: Assert required adguard inputs are set
  assert:
    that:
      # Each condition is boolean and safe to evaluate when the var is
      # unset (filters carry a default) -- ansible 2.20 rejects a
      # non-boolean conditional result, and `is defined` doesn't
      # short-circuit a sibling `that:` item.
      - dns_keepalived_ip is defined
      # The service unit publishes :53 on this address; a malformed value
      # must fail here, not render a unit that silently skips the VIP.
      - (dns_keepalived_ip | default('') | ansible.utils.ipaddr('address')) is string
      - dns_keepalived_vrid is defined
      - dns_keepalived_priority is defined
      - (dns_keepalived_priority | default(0) | int) > 0
      - (dns_keepalived_priority | default(0) | int) <= 255
      - dns_keepalived_peers is defined
      - dns_keepalived_peers | length > 0
      - inventory_hostname in external_ips
      - adguard_adlists is defined
      - adguard_whitelists is defined
      - (adguard_adlists | default([]) | select('search', '\s') | list | length) == 0
      - (adguard_whitelists | default([]) | select('search', '\s') | list | length) == 0
    fail_msg: >-
      adguard requires the DNS VIP inputs dns_keepalived_{ip,vrid,priority,peers}
      (priority 1-255, set per-host in host_vars; ip must be a valid
      address -- the service unit publishes :53 on it), an external_ips
      entry for this host, and the adguard_adlists / adguard_whitelists
      lists with no whitespace in any URL.
  tags:
    - adguard

- name: Set up adguard system user, group, and config dir
  import_role:
    name: service_user
    tasks_from: user
  vars:
    service_user_args:
      name: adguard
  tags:
    - adguard

- name: Create adguard directories
  when: not (ansible_check_mode and adguard_user.changed)
  file:
    dest: "{{ item.path }}"
    state: directory
    owner: "{{ adguard_user.uid }}"
    group: "{{ adguard_user.group }}"
    mode: "{{ item.mode }}"
  loop:
    - path: /mnt/services/adguard/conf
      mode: "0755"
    - path: /mnt/services/adguard/work
      mode: "0700"
  become: true
  tags:
    - adguard

- name: Configure adguard
  when: not (ansible_check_mode and adguard_user.changed)
  template:
    src: AdGuardHome.yaml.j2
    dest: /mnt/services/adguard/conf/AdGuardHome.yaml
    owner: "{{ adguard_user.uid }}"
    group: "{{ adguard_user.group }}"
    mode: "0600"
    backup: true
    validate: >-
      /usr/bin/podman run --rm
      --volume %s:/tmp/AdGuardHome.yaml:ro
      {{ adguard_image }}
      --no-check-update
      --no-permcheck
      --check-config
      --config /tmp/AdGuardHome.yaml
      --work-dir /tmp
  register: adguard_config
  become: true
  tags:
    - adguard

- name: Configure health script
  template:
    src: adguard_healthcheck.sh.j2
    dest: /usr/local/bin/adguard_healthcheck
    owner: root
    group: root
    mode: "0755"
    backup: true
    validate: bash -n %s
  register: adguard_health_script
  become: true
  tags:
    - adguard

- name: Install adguard service
  import_role:
    name: systemd_unit
    tasks_from: install
  vars:
    systemd_unit_args:
      src: adguard.service.j2
      condition: "{{ not (ansible_check_mode and adguard_user.changed) }}"
  tags:
    - adguard

- name: Enable adguard service
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: adguard
      condition: "{{ not (ansible_check_mode and (adguard_service_result.changed or adguard_user.changed)) }}"
      restart: "{{ adguard_service_result.changed or adguard_config.changed }}"
      throttle: 1
  tags:
    - adguard

- name: Configure nginx
  import_role:
    name: nginx
    tasks_from: site
  vars:
    nginx_site_args:
      subdomain: adguard
      proxy_pass: http://127.0.0.1:{{ service_ports.adguard }}/
      auth: required
  tags:
    - adguard

- name: Render the DNS keepalived fragment
  template:
    src: keepalived.conf.j2
    dest: /etc/keepalived/conf.d/adguard.conf
    owner: root
    group: root
    mode: "0640"
    backup: true
  register: adguard_keepalived_cfg
  become: true
  tags:
    - adguard

# SIGHUP-reload (hitless) for the common edits: priority, VIP, peers,
# healthcheck params, notify hooks. Structural changes (interface, VRID)
# need a manual `systemctl restart keepalived`. throttle: 1 serializes
# across dns_keepalived_peers so that even on the rare manual restart,
# only one peer is unavailable at a time.
#
# enabled: true is load-bearing on a fresh host. The keepalived role
# runs before adguard and, finding conf.d empty, disables the unit; once
# we drop our fragment it must be enabled again or a reboot before the
# next converge (which re-enables it) silently loses the VIP. On an
# inactive unit `state: reloaded` also starts it, so this brings the VIP
# up on the first converge.
#
# No fragment-restore rescue (unlike roles/keepalived's base-conf block):
# roles/keepalived's ExecReload drop-in runs `keepalived -t` before the
# SIGHUP, so a malformed fragment fails this task with the live daemon
# untouched, and the same validate on ExecStartPre refuses to boot on it
# -- the VIP stays with the throttled-out peer while the operator fixes
# the template, with the previous rendering preserved by backup: true.
- name: Reload keepalived
  when: adguard_keepalived_cfg.changed
  systemd:
    name: keepalived
    state: reloaded
    enabled: true
  become: true
  throttle: 1
  tags:
    - adguard

- name: Create logind conf.d directory
  file:
    dest: /etc/systemd/logind.conf.d
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true
  tags:
    - adguard

- name: Extend logind inhibitor delay for the reboot guard
  copy:
    content: |
      [Login]
      InhibitDelayMaxSec=300
    dest: /etc/systemd/logind.conf.d/adguard_reboot_guard.conf
    owner: root
    group: root
    mode: "0644"
    backup: true
  become: true
  tags:
    - adguard

- name: Install DNS reboot guard script
  template:
    src: adguard_reboot_guard.j2
    dest: /usr/local/sbin/adguard_reboot_guard
    owner: root
    group: root
    mode: "0755"
    backup: true
    validate: bash -n %s
  register: adguard_reboot_guard_script
  become: true
  tags:
    - adguard

- name: Install DNS reboot guard service
  import_role:
    name: systemd_unit
    tasks_from: install
  vars:
    systemd_unit_args:
      src: adguard_reboot_guard.service.j2
  tags:
    - adguard

- name: Enable DNS reboot guard
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: adguard_reboot_guard
      restart: "{{ adguard_reboot_guard_service_result.changed or adguard_reboot_guard_script.changed }}"
  tags:
    - adguard
