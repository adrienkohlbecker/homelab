- name: _setup | Install nginx
  import_role:
    name: test
    tasks_from: nginx

- name: _setup | Install authelia stub in gate mode
  import_role:
    name: test
    tasks_from: authelia_stub
  vars:
    test_authelia_stub_args:
      mode: gate

- name: _setup | Install podman
  import_role:
    name: podman
    tasks_from: install

- name: _setup | Install bash functions
  import_role:
    name: bash

- name: _setup | Install dependencies
  apt:
    pkg:
      - dnsutils
    install_recommends: false
    cache_valid_time: 3600
  become: true

# The real keepalived role (not just the package): it supplies the base
# conf whose `include conf.d/*.conf` actually loads the fragment this role
# renders, the ExecStartPre/ExecReload `keepalived -t` validate gates, and
# the ip_nonlocal_bind sysctl that lets the service unit publish the VIP
# sockets on a host that doesn't hold the address. With those in place the
# role's "Reload keepalived" task starts the daemon for real and _verify
# can probe the live VRRP vmac instead of grepping the rendered fragment.
- name: _setup | Install keepalived
  import_role:
    name: keepalived

- name: _setup | Configure resolved
  shell: |
    set -euo pipefail

    systemctl disable systemd-resolved.service
    systemctl stop systemd-resolved
    {
    {% for resolver in bootstrap_dns_resolver %}
      echo "nameserver {{ resolver }}"
    {% endfor %}
    } > /etc/resolv.conf
  args:
    executable: /bin/bash
    removes: '{{ "/etc/systemd/system/sysinit.target.wants/systemd-resolved.service" if ansible_distribution_major_version != "22" else "/etc/systemd/system/multi-user.target.wants/systemd-resolved.service" }}'
  become: true
