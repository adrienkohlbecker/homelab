# _verify is test-only (CLAUDE.md) and runs against the box qemu VM. It
# exercises virsh_backup end-to-end -- something site.yml never does,
# since a fresh host has zero domains and the backup loop is a no-op.
# Defining a throwaway TCG domain (type='qemu', so no nested KVM needed)
# and dumping it proves the script's real behavior, not just that the
# file landed on disk.

- name: _verify | Gather default network state
  command: virsh net-info default
  register: _libvirt_verify_net
  changed_when: false
  become: true

- name: _verify | Default network is active and autostarted
  assert:
    that:
      - _libvirt_verify_net.stdout is search('Active:\s+yes')
      - _libvirt_verify_net.stdout is search('Autostart:\s+yes')
    fail_msg: "default network not active+autostart:\n{{ _libvirt_verify_net.stdout }}"

- name: _verify | Gather default storage pool state
  command: virsh pool-info default
  register: _libvirt_verify_pool
  changed_when: false
  become: true

- name: _verify | Default storage pool is running and autostarted
  assert:
    that:
      - _libvirt_verify_pool.stdout is search('State:\s+running')
      - _libvirt_verify_pool.stdout is search('Autostart:\s+yes')
    fail_msg: "default pool not running+autostart:\n{{ _libvirt_verify_pool.stdout }}"

# Exercise virsh_backup's NVRAM-copy branch: give the throwaway domain a
# pflash loader + nvram pointing at files we pre-create under
# /var/lib/libvirt/ (which also satisfies the script's realpath allowlist).
# A sentinel byte-string in the varstore lets us assert the copy is
# faithful, not just present. define records the paths without needing
# real OVMF firmware; the domain is never started, so libvirt never
# rewrites the varstore from a template.
- name: _verify | Ensure the libvirt nvram directory exists
  file:
    path: /var/lib/libvirt/qemu/nvram
    state: directory
    mode: "0700"
  become: true

- name: _verify | Stage a dummy pflash loader
  copy:
    dest: /var/lib/libvirt/qemu/nvram/virsh_backup_verify_CODE.fd
    mode: "0600"
    content: "virsh_backup verify loader\n"
  become: true

- name: _verify | Stage a sentinel nvram varstore
  copy:
    dest: /var/lib/libvirt/qemu/nvram/virsh_backup_verify_VARS.fd
    mode: "0600"
    content: "virsh_backup verify nvram sentinel\n"
  become: true

# The domain name carries spaces so the dump lands at the sanitized path
# dom_virsh_backup_verify.xml -- exercising virsh_backup's safe_name() tr
# transform, which every real VM name with a space or slash relies on.
- name: _verify | Stage a throwaway domain definition
  copy:
    dest: /tmp/virsh_backup_verify.xml
    mode: "0644"
    content: |
      <domain type='qemu'>
        <name>virsh backup verify</name>
        <memory unit='MiB'>64</memory>
        <vcpu>1</vcpu>
        <os>
          <type arch='x86_64' machine='q35'>hvm</type>
          <loader readonly='yes' type='pflash'>/var/lib/libvirt/qemu/nvram/virsh_backup_verify_CODE.fd</loader>
          <nvram>/var/lib/libvirt/qemu/nvram/virsh_backup_verify_VARS.fd</nvram>
        </os>
        <features>
          <acpi/>
        </features>
        <devices>
          <emulator>/usr/bin/qemu-system-x86_64</emulator>
        </devices>
      </domain>

- name: _verify | Define the throwaway domain
  command: virsh define /tmp/virsh_backup_verify.xml
  changed_when: true
  become: true

- name: _verify | Run the backup script
  command: /usr/local/bin/virsh_backup
  changed_when: false
  become: true

- name: _verify | Stat the domain, network, pool and nvram dumps
  stat:
    path: "{{ item }}"
  loop:
    - /var/lib/libvirt/images/dom_virsh_backup_verify.xml
    - /var/lib/libvirt/images/dom_virsh_backup_verify_VARS.fd
    - /var/lib/libvirt/images/net_default.xml
    - /var/lib/libvirt/images/pool_default.xml
  register: _libvirt_verify_dumps
  become: true

- name: _verify | All expected dumps exist
  assert:
    that:
      - (_libvirt_verify_dumps.results | rejectattr('stat.exists') | list | length) == 0
    fail_msg: >-
      virsh_backup missing dumps:
      {{ _libvirt_verify_dumps.results | rejectattr('stat.exists')
         | map(attribute='item') | list }}

# The dumps can hold secrets (the varstore, and dumpxml --security-info
# un-redacts <graphics passwd>), so the script's umask 077 + explicit
# chmod 0600 must actually land -- a dropped chmod would otherwise pass the
# existence + content checks unnoticed.
- name: _verify | Dumps are root-owned and mode 0600
  assert:
    that:
      - (_libvirt_verify_dumps.results | rejectattr('stat.mode', 'eq', '0600') | list | length) == 0
      - (_libvirt_verify_dumps.results | rejectattr('stat.pw_name', 'eq', 'root') | list | length) == 0
    fail_msg: >-
      virsh_backup dumps not root:0600:
      {{ _libvirt_verify_dumps.results | rejectattr('stat.mode', 'eq', '0600')
         | map(attribute='item') | list }}

# cmp (not just stat) so a truncated or wrong-source varstore copy fails --
# this is the NVRAM-copy branch the BIOS-only domain never exercised.
- name: _verify | Dumped NVRAM varstore byte-matches the source
  command: cmp -s /var/lib/libvirt/qemu/nvram/virsh_backup_verify_VARS.fd /var/lib/libvirt/images/dom_virsh_backup_verify_VARS.fd
  changed_when: false
  become: true

# Parse (not just read) every dump to catch a truncated/partial write, then
# confirm the domain dump is the one we defined rather than an empty stub.
- name: _verify | Every dumped XML is well-formed
  command: python3 -c "import sys, xml.dom.minidom as m; m.parse(sys.argv[1])" "{{ item }}"
  loop:
    - /var/lib/libvirt/images/dom_virsh_backup_verify.xml
    - /var/lib/libvirt/images/net_default.xml
    - /var/lib/libvirt/images/pool_default.xml
  changed_when: false
  become: true

- name: _verify | Dumped domain XML carries the throwaway domain's real name
  command: grep -qF "virsh backup verify" /var/lib/libvirt/images/dom_virsh_backup_verify.xml
  changed_when: false
  become: true

# Exercise the security guard + failure-exit contract the happy path never
# touches: a domain whose <nvram> resolves outside libvirt's varstore dir
# must be refused (no _VARS.fd written) and must drive a non-zero exit so
# the timer's unit goes failed and the systemdunits collector notices.
- name: _verify | Stage an out-of-tree nvram file
  copy:
    dest: /tmp/virsh_backup_evil_VARS.fd
    mode: "0600"
    content: "out-of-tree nvram must be refused\n"
  become: true

- name: _verify | Stage a domain pointing nvram outside the varstore tree
  copy:
    dest: /tmp/virsh_backup_evil.xml
    mode: "0644"
    content: |
      <domain type='qemu'>
        <name>virsh_backup_evil</name>
        <memory unit='MiB'>64</memory>
        <vcpu>1</vcpu>
        <os>
          <type arch='x86_64' machine='q35'>hvm</type>
          <loader readonly='yes' type='pflash'>/var/lib/libvirt/qemu/nvram/virsh_backup_verify_CODE.fd</loader>
          <nvram>/tmp/virsh_backup_evil_VARS.fd</nvram>
        </os>
        <features>
          <acpi/>
        </features>
        <devices>
          <emulator>/usr/bin/qemu-system-x86_64</emulator>
        </devices>
      </domain>

- name: _verify | Define the out-of-tree-nvram domain
  command: virsh define /tmp/virsh_backup_evil.xml
  changed_when: true
  become: true

- name: _verify | Re-run the backup with the out-of-tree-nvram domain present
  command: /usr/local/bin/virsh_backup
  register: _libvirt_verify_evil_run
  changed_when: false
  failed_when: false
  become: true

- name: _verify | Stat the would-be out-of-tree varstore copy
  stat:
    path: /var/lib/libvirt/images/dom_virsh_backup_evil_VARS.fd
  register: _libvirt_verify_evil_vars
  become: true

- name: _verify | Out-of-tree nvram refused and failure propagated
  assert:
    that:
      - _libvirt_verify_evil_run.rc != 0
      - not _libvirt_verify_evil_vars.stat.exists
    fail_msg: >-
      virsh_backup did not refuse the out-of-tree nvram
      (rc={{ _libvirt_verify_evil_run.rc }},
      vars_copied={{ _libvirt_verify_evil_vars.stat.exists }})

- name: _verify | Undefine the out-of-tree-nvram domain
  command: virsh undefine --keep-nvram virsh_backup_evil
  changed_when: true
  become: true

# --nvram: a domain with a varstore refuses a plain undefine; this also
# removes the staged nvram file, so the cleanup below doesn't list it.
- name: _verify | Undefine the throwaway domain
  command: virsh undefine --nvram "virsh backup verify"
  changed_when: true
  become: true

- name: _verify | Remove backup artifacts and staged definition
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - /var/lib/libvirt/images/dom_virsh_backup_verify.xml
    - /var/lib/libvirt/images/dom_virsh_backup_verify_VARS.fd
    - /var/lib/libvirt/images/net_default.xml
    - /var/lib/libvirt/images/pool_default.xml
    - /var/lib/libvirt/images/dom_virsh_backup_evil.xml
    - /var/lib/libvirt/images/dom_virsh_backup_evil_VARS.fd
    - /tmp/virsh_backup_verify.xml
    - /tmp/virsh_backup_evil.xml
    - /tmp/virsh_backup_evil_VARS.fd
    - /var/lib/libvirt/qemu/nvram/virsh_backup_verify_CODE.fd
  become: true
