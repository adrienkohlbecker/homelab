- name: Install virtualization tools
  apt:
    pkg:
      # qemu-kvm was a transitional metapackage in jammy/noble; resolute
      # (26.04) dropped it. qemu-system is the modern replacement (pulls
      # qemu-system-x86 / qemu-system-arm transitively via qemu-system-*).
      - "{{ 'qemu-kvm' if ansible_distribution_major_version | int < 26 else 'qemu-system' }}"
      - libvirt-clients
      - libvirt-daemon
      - libvirt-daemon-system
      # Tooling to define/edit/clone guests (virt-install, virt-xml,
      # virt-clone) on a host whose whole job is running VMs.
      - virtinst
      - ovmf
      # TPM 2.0 backend for UEFI guests that need a vTPM (e.g. Windows 11);
      # pairs with the ovmf firmware above.
      - swtpm
      - swtpm-tools
      - libhugetlbfs-bin
    cache_valid_time: 3600
  become: true
  register: libvirt_apt
  tags:
    - libvirt

- name: Install ansible dependencies to run libvirt module
  apt:
    name:
      - python3-libvirt
      - python3-lxml
    cache_valid_time: 3600
  become: true
  register: libvirt_apt_python
  tags:
    - libvirt

- name: Create zfs filesystem
  when: zfs_root
  zfs:
    name: rpool/libvirt
    state: present
    extra_zfs_properties:
      mountpoint: /var/lib/libvirt/images
      # 64K matches qemu's default qcow2 cluster_size: a guest write lands
      # in one record instead of straddling many. (The prior '4096' was
      # copy-pasted from the SQLite datasets and maximized metadata +
      # write amplification for multi-GB images.) Only governs newly
      # written files. compression is left inherited (zstd from rpool).
      recordsize: '65536'
      # Guests cache their own pages; keep them out of the host ARC, which
      # lab deliberately squeezes for VM RAM (host_vars/lab.yml).
      primarycache: metadata
      # Keep atime accounting (inherited on) but cap its write cost with
      # relatime -- updated at most once a day or when mtime/ctime change
      # -- instead of the write-per-read of full atime on an image store.
      relatime: 'on'
      # VM images are not replicated today and the daily virsh_backup
      # config dump rides this dataset. Tag explicitly (not inherited) so
      # the choice is visible and zfs-autobackup's `-s local` picker
      # doesn't silently skip it. See notes/SOMEDAY.md "Back up libvirt
      # VMs and their definitions".
      'autobackup:bak': 'false'
  become: true
  tags:
    - libvirt

- name: Create mount point
  file:
    dest: /var/lib/libvirt/images
    state: directory
    owner: root
    group: root
    mode: "0711"
  become: true
  tags:
    - libvirt

- name: Install zfs mount service
  when: zfs_root
  import_role:
    name: zfs_mount
    tasks_from: unit
  vars:
    zfs_mount_dataset: rpool/libvirt
    zfs_mount_mountpoint: /var/lib/libvirt/images
  tags:
    - libvirt

- name: Add current user to virtualization groups
  import_role:
    name: usergroup_immediate
    tasks_from: user
  when: not (ansible_check_mode and libvirt_apt.changed)
  vars:
    usergroup_immediate_group:
      - libvirt
      - kvm
  tags:
    - libvirt

# libvirt 10.4+ supports a native nftables firewall backend. Jammy
# (10.0) and noble (10.0) lack the driver; resolute (11.x) and any
# future release have it. The setting moves LIBVIRT_INP / LIBVIRT_FWX
# / LIBVIRT_PRT chains out of `ip filter`/`ip nat` and into
# `inet libvirt_*` tables. systemd_unit_restart below picks up the
# change so libvirtd re-reads network.conf; the network-reload block
# at the end re-creates rules under the new backend.
- name: Configure libvirt to use native nftables firewall backend
  when: ansible_distribution_release not in ["jammy", "noble"]
  lineinfile:
    path: /etc/libvirt/network.conf
    regexp: '^#?\s*firewall_backend\s*='
    line: 'firewall_backend = "nftables"'
    create: true
    backup: true
    owner: root
    group: root
    mode: "0644"
  register: libvirt_firewall_backend
  become: true
  tags:
    - libvirt

- name: Enable libvirtd service
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: libvirtd
      condition: "{{ not (ansible_check_mode and libvirt_apt.changed) }}"
      restart: "{{ libvirt_firewall_backend.changed | default(false) }}"
  tags:
    - libvirt

# `systemd_unit` registers the libvirtd start-result as the play var
# `systemd_unit_started`, but a later systemd_unit caller (the virsh_backup
# timer below) overwrites it. Capture it under a role-local name now,
# while it still reflects libvirtd, so the check-mode gates on the
# network/pool tasks can't silently rebind to a different unit's result if
# one is ever inserted between here and there.
- name: Record libvirtd start result
  set_fact:
    _libvirt_started: "{{ systemd_unit_started }}"
  tags:
    - libvirt

- name: Check the default network is defined
  when: not (ansible_check_mode and (libvirt_apt.changed or libvirt_apt_python.changed or systemd_unit_started.changed or _libvirt_started.changed))
  command: virsh net-info default
  register: libvirt_default_net
  changed_when: false
  failed_when: false
  become: true
  tags:
    - libvirt

- name: Assert the default network exists
  when: not (libvirt_default_net is skipped)
  assert:
    that: libvirt_default_net.rc == 0
    fail_msg: >-
      libvirt's `default` network is not defined. It ships with
      libvirt-daemon-system; re-create it with
      `virsh net-define /usr/share/libvirt/networks/default.xml`
      (or restore your bridge config) before re-running.
  tags:
    - libvirt

# The check-mode gate reads `_libvirt_started` (captured right after the
# libvirtd enable above) rather than the raw `systemd_unit_started` play var, so
# it can't rebind to a later systemd_unit caller's result.
# The whole condition skips the network calls in check mode on a fresh
# host where libvirtd / python3-libvirt aren't really installed yet.
# virt_net's core() returns from its `state:` branch before it reaches the
# `autostart` block, so a single call carrying both silently drops the
# autostart half -- split into two calls (same reason the pool dance below
# needs three). state: active first, then autostart on a stateless call.
- name: Start default network
  when: not (ansible_check_mode and (libvirt_apt.changed or libvirt_apt_python.changed or systemd_unit_started.changed or _libvirt_started.changed))
  community.libvirt.virt_net:
    name: default
    state: active
  become: true
  tags:
    - libvirt

- name: Autostart default network
  when: not (ansible_check_mode and (libvirt_apt.changed or libvirt_apt_python.changed or systemd_unit_started.changed or _libvirt_started.changed))
  community.libvirt.virt_net:
    name: default
    autostart: true
  become: true
  tags:
    - libvirt

# Existing networks keep their old firewall rules until destroyed and
# started — restarting libvirtd doesn't re-install per-network rules.
# Cycle the default network so it picks up the new firewall_backend.
# ~1s connectivity blip for any guest attached; guests don't reboot.
- name: Cycle default network for firewall backend change
  when: libvirt_firewall_backend.changed | default(false) and not ansible_check_mode
  community.libvirt.virt_net:
    name: default
    state: "{{ item }}"
  loop:
    - inactive
    - active
  become: true
  tags:
    - libvirt

# Declare the default dir storage pool in the repo rather than relying on
# whatever a given host happens to have (libvirt-daemon-system ships the
# default network but not always the default pool). Three steps for the
# same module short-circuit reason as the network split above;
# `state: present` defines only when absent, so an existing pool is left
# untouched. virsh_backup's pool-dumpxml captures the definition.
- name: Declare the default storage pool
  when: not (ansible_check_mode and (libvirt_apt.changed or libvirt_apt_python.changed or systemd_unit_started.changed or _libvirt_started.changed))
  become: true
  tags:
    - libvirt
  block:
    - name: Define the default storage pool
      community.libvirt.virt_pool:
        name: default
        state: present
        xml: |
          <pool type='dir'>
            <name>default</name>
            <target><path>/var/lib/libvirt/images</path></target>
          </pool>

    - name: Activate the default storage pool
      community.libvirt.virt_pool:
        name: default
        state: active

    - name: Autostart the default storage pool
      community.libvirt.virt_pool:
        name: default
        autostart: true

- name: Create libvirt backup executable
  copy:
    src: virsh_backup.sh
    dest: /usr/local/bin/virsh_backup
    owner: root
    group: root
    mode: "0755"
    backup: true
  become: true
  tags:
    - libvirt

- name: Schedule the virsh_backup timer
  import_role:
    name: systemd_timer
    tasks_from: install
  vars:
    systemd_timer_args:
      name: virsh_backup
      description: Daily libvirt domain backup
      on_calendar: "*-*-* 00:05:00"
      persistent: false
      exec_start: /usr/local/bin/virsh_backup
  tags:
    - libvirt
