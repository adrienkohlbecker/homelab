- name: Install virtualization tools
  apt:
    pkg:
      # qemu-kvm was a transitional metapackage in jammy/noble; resolute
      # (26.04) dropped it. qemu-system is the modern replacement (pulls
      # qemu-system-x86 / qemu-system-arm transitively via qemu-system-*).
      - "{{ 'qemu-kvm' if ansible_distribution_major_version | int < 26 else 'qemu-system' }}"
      - libvirt-clients
      - libvirt-daemon
      - libvirt-daemon-system
      - ovmf
      - libhugetlbfs-bin
    cache_valid_time: 3600
  become: true
  register: apt_install_libvirt
  tags:
    - libvirt

- name: Install ansible dependencies to run libvirt module
  apt:
    name:
      - python3-libvirt
      - python3-lxml
    cache_valid_time: 3600
  become: true
  register: apt_install_python_libvirt
  tags:
    - libvirt

- name: Create zfs filesystem
  when: zfs_root
  zfs:
    name: rpool/libvirt
    state: present
    extra_zfs_properties:
      mountpoint: /var/lib/libvirt/images
      recordsize: '4096'
  become: true
  tags:
    - libvirt

- name: Create mount point
  file:
    dest: /var/lib/libvirt/images
    state: directory
    owner: root
    group: root
    mode: "0711"
  become: true
  tags:
    - libvirt

- name: Install zfs mount service
  when: zfs_root
  import_role:
    name: zfs_mount
    tasks_from: unit
  vars:
    zfs_mount_dataset: rpool/libvirt
    zfs_mount_mountpoint: /var/lib/libvirt/images
  tags:
    - libvirt

- name: Add current user to virtualization groups
  import_role:
    name: usergroup_immediate
    tasks_from: user
  when: not (ansible_check_mode and apt_install_libvirt.changed)
  vars:
    usergroup_immediate_group:
      - libvirt
      - kvm
  tags:
    - libvirt

# libvirt 10.4+ supports a native nftables firewall backend. Jammy
# (10.0) and noble (10.0) lack the driver; resolute (11.x) and any
# future release have it. The setting moves LIBVIRT_INP / LIBVIRT_FWX
# / LIBVIRT_PRT chains out of `ip filter`/`ip nat` and into
# `inet libvirt_*` tables. systemd_unit_restart below picks up the
# change so libvirtd re-reads network.conf; the network-reload block
# at the end re-creates rules under the new backend.
- name: Configure libvirt to use native nftables firewall backend
  when: ansible_distribution_release not in ["jammy", "noble"]
  lineinfile:
    path: /etc/libvirt/network.conf
    regexp: '^#?\s*firewall_backend\s*='
    line: 'firewall_backend = "nftables"'
    create: true
    backup: true
    owner: root
    group: root
    mode: "0644"
  register: libvirt_firewall_backend
  become: true
  tags:
    - libvirt

- name: Enable libvirtd service
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: libvirtd
      condition: "{{ not (ansible_check_mode and apt_install_libvirt.changed) }}"
      restart: "{{ libvirt_firewall_backend.changed | default(false) }}"
  tags:
    - libvirt

- name: Compute network values
  set_fact:
    libvirt_network_mac: "{{ '52:54:00' | random_mac(seed=inventory_hostname) }}"
    libvirt_network_gateway: "{{ libvirt_default_network | ansible.utils.ipaddr('subnet') | ansible.utils.next_nth_usable(1) }}"
    libvirt_network_netmask: "{{ libvirt_default_network | ansible.utils.ipaddr('subnet') | ansible.utils.ipaddr('netmask') }}"
    libvirt_network_dhcp_start: "{{ libvirt_default_network | ansible.utils.ipaddr('subnet') | ansible.utils.next_nth_usable(2) }}"
    libvirt_network_dhcp_end: "{{ libvirt_default_network | ansible.utils.ipaddr('subnet') | ansible.utils.ipaddr('last_usable') }}"
  tags:
    - libvirt

- name: Check ip math is valid
  assert:
    that:
      - libvirt_network_gateway and libvirt_network_gateway != ""
      - libvirt_network_netmask and libvirt_network_netmask != ""
      - libvirt_network_dhcp_start and libvirt_network_dhcp_start != ""
      - libvirt_network_dhcp_end and libvirt_network_dhcp_end != ""
  tags:
    - libvirt

- name: Get network facts
  when: not (ansible_check_mode and (apt_install_libvirt.changed or apt_install_python_libvirt.changed or systemd_started.changed))
  virt_net:
    command: facts
    name: default
  register: virt_net
  failed_when: virt_net.msg is defined and virt_net.msg != "network default not found"
  become: true
  tags:
    - libvirt

# assuming the random mac is not the same as libvirt initially generated at install...
- name: Configure default network
  when: not (ansible_check_mode and (apt_install_libvirt.changed or apt_install_python_libvirt.changed or systemd_started.changed)) and (ansible_libvirt_networks is undefined or (ansible_libvirt_networks['default'] and ansible_libvirt_networks['default'].macaddress != libvirt_network_mac))
  block:

    - name: Remove default network
      community.libvirt.virt_net:
        name: default
        state: absent
      become: true
      tags:
        - libvirt

    - name: Define default network
      community.libvirt.virt_net:
        name: default
        command: define
        xml: '{{ lookup("template", "default_network.xml.j2") }}'
      become: true
      tags:
        - libvirt

- name: Start default network
  when: not (ansible_check_mode and (apt_install_libvirt.changed or apt_install_python_libvirt.changed or systemd_started.changed))
  community.libvirt.virt_net:
    name: default
    state: active
  become: true
  tags:
    - libvirt

- name: Autostart default network
  when: not (ansible_check_mode and (apt_install_libvirt.changed or apt_install_python_libvirt.changed or systemd_started.changed))
  community.libvirt.virt_net:
    name: default
    autostart: true
  become: true
  tags:
    - libvirt

# Existing networks keep their old firewall rules until destroyed and
# started — restarting libvirtd doesn't re-install per-network rules.
# Cycle the default network so it picks up the new firewall_backend.
# ~1s connectivity blip for any guest attached; guests don't reboot.
- name: Cycle default network for firewall backend change (deactivate)
  when: libvirt_firewall_backend.changed | default(false) and not ansible_check_mode
  community.libvirt.virt_net:
    name: default
    state: inactive
  become: true
  tags:
    - libvirt

- name: Cycle default network for firewall backend change (reactivate)
  when: libvirt_firewall_backend.changed | default(false) and not ansible_check_mode
  community.libvirt.virt_net:
    name: default
    state: active
  become: true
  tags:
    - libvirt

- name: Create libvirt backup executable
  copy:
    src: virsh_backup.sh
    dest: /usr/local/bin/virsh_backup
    owner: root
    group: root
    mode: "0755"
    backup: true
  become: true
  tags:
    - libvirt

- name: Schedule the virsh_backup timer
  import_role:
    name: systemd_timer
  vars:
    systemd_timer_args:
      name: virsh_backup
      description: Daily libvirt domain backup
      on_calendar: "*-*-* 00:05:00"
      exec_start: /usr/local/bin/run_job daily virsh_backup /usr/local/bin/virsh_backup
  tags:
    - libvirt
