---
# JVM sizing for the Nexus container, passed through INSTALL4J_ADD_VM_PARAMS.
# Optional + host-overridable (test fixtures shrink it via group_vars/test.yml);
# the prod lab host uses this default. 2G heap: at 1G the JVM ran pinned at
# 82-93% Old Gen and logged MemoryMonitor High/CRITICAL every ~30s; lab has
# ample RAM (30Gi, no container memory cap) so the larger heap removes the GC
# pressure. -XX:+ExitOnOutOfMemoryError makes a heap-exhausted JVM exit so
# Restart=always recovers it, instead of limping while status/writable still
# returns 200.
nexus_jvm_params: -Xms2G -Xmx2G -XX:MaxDirectMemorySize=512m -XX:+ExitOnOutOfMemoryError
