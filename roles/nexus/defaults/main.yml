---
# JVM sizing for the Nexus container, passed through INSTALL4J_ADD_VM_PARAMS.
# Optional + host-overridable (test fixtures shrink it via group_vars/test.yml);
# the prod lab host uses this default. -XX:+ExitOnOutOfMemoryError makes a
# heap-exhausted JVM exit so Restart=always recovers it, instead of limping
# while status/writable still returns 200.
nexus_jvm_params: -Xms1G -Xmx1G -XX:MaxDirectMemorySize=512m -XX:+ExitOnOutOfMemoryError
