- name: Require nexus encryption secrets to be set
  assert:
    that:
      - nexus_encryption_key is defined and nexus_encryption_key | length > 0
      - nexus_encryption_salt is defined and nexus_encryption_salt | length > 0
      - nexus_encryption_iv is defined and nexus_encryption_iv | length > 0
    fail_msg: >-
      nexus_encryption_{key,salt,iv} must be set in group_vars/prod.yml
      (vaulted with --encrypt-vault-id prod) or group_vars/test.yml. They
      seed Nexus's at-rest secret encryption; see
      roles/nexus/templates/encryption.json.j2.
  tags:
    - nexus

- name: Set up nexus system user and group
  import_role:
    name: service_user
    tasks_from: user
  vars:
    service_user_args:
      name: nexus
  tags:
    - nexus

- name: Create configuration sub-directories
  when: not (ansible_check_mode and nexus_user.changed)
  file:
    dest: "{{ item }}"
    state: directory
    owner: nexus
    group: nexus
    mode: "0755"
  become: true
  with_items:
    - /mnt/services/nexus/data
    - /mnt/services/nexus/user
  tags:
    - nexus

- name: Create default blob store directory on /mnt/scratch
  when: not (ansible_check_mode and nexus_user.changed)
  file:
    dest: /mnt/scratch/nexus
    state: directory
    owner: nexus
    group: nexus
    mode: "0755"
  become: true
  tags:
    - nexus

- name: Check for an existing nexus encryption key
  stat:
    path: /mnt/services/nexus/user/encryption.json
  register: nexus_encryption_pre
  become: true
  tags:
    - nexus

- name: Configure nexus encryption
  template:
    src: encryption.json.j2
    dest: /mnt/services/nexus/user/encryption.json
    owner: nexus
    group: nexus
    mode: "0600"
    backup: true
    validate: python3 -c 'import json,sys; json.load(open(sys.argv[1]))' "%s"
  register: nexus_encryption_json
  become: true
  tags:
    - nexus

# Nexus reads NEXUS_SECRETS_KEY_FILE once at JVM start, and re-encrypting
# the at-rest secrets it already wrote is a manual procedure -- so a key
# that changes after first provisioning can't be applied by a restart and
# would break decryption of existing secrets. Refuse to continue rather
# than silently leave the running container on the old key. First converge
# writes the file before the unit ever starts, so creation is fine; only an
# in-place change is the footgun.
- name: Fail if the nexus encryption key changed in place
  when:
    - not ansible_check_mode
    - nexus_encryption_pre.stat.exists
    - nexus_encryption_json.changed
  fail:
    msg: >-
      encryption.json changed on an already-provisioned host. Rotating
      nexus_encryption_{key,salt,iv} in place breaks decryption of Nexus's
      existing at-rest secrets and the running container was NOT restarted
      onto the new key. Follow Sonatype's re-encryption procedure instead.
  tags:
    - nexus

- name: Install nexus service
  import_role:
    name: systemd_unit
    tasks_from: install
  vars:
    systemd_unit_args:
      src: nexus.service.j2
      condition: "{{ not (ansible_check_mode and nexus_user.changed) }}"
  tags:
    - nexus

# Pre-stage chown'd layers so the unit's `systemctl start` doesn't blow
# through TimeoutSec doing the per-file ID-mapped copy on first
# extraction. The +200:N:1 uidmap-override pattern (nexus runs as uid
# 200 in the container) doesn't compose with idmapped mounts, so
# podman falls back to a copy regardless of kernel support; we just
# move the cost out of the deadline. Image name is read back from the
# just-installed unit so it stays in sync with the template.
- name: Detect nexus unit image
  when: not ansible_check_mode
  extract_podman_image:
    name: nexus
  register: nexus_unit_image
  become: true
  tags:
    - nexus

- name: Pre-pull nexus image
  when: not ansible_check_mode
  containers.podman.podman_image:
    name: "{{ nexus_unit_image.images[0] }}"
  register: nexus_image_pull
  become: true
  tags:
    - nexus

- name: Pre-stage nexus chown'd layers
  when:
    - not ansible_check_mode
    - nexus_image_pull.changed
  shell: |
    set -euo pipefail
    podman create --replace --name nexus-prestage \
      --uidmap=0:0:65536 \
      --uidmap=+200:{{ nexus_user.uid }}:1 \
      --gidmap=0:0:65536 \
      --gidmap=+200:{{ nexus_user.group }}:1 \
      {{ nexus_unit_image.images[0] }} true
    podman rm nexus-prestage
  args:
    executable: /bin/bash
  changed_when: true
  become: true
  tags:
    - nexus

- name: Enable nexus service
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: nexus
      condition: "{{ not (ansible_check_mode and (nexus_service_result.changed or nexus_user.changed or nexus_encryption_json.changed)) }}"
      restart: "{{ nexus_service_result.changed }}"
  tags:
    - nexus

- name: Configure nginx
  import_role:
    name: nginx
    tasks_from: site
  vars:
    nginx_site_args:
      subdomain: nexus
      proxy_pass: http://127.0.0.1:{{ service_ports.nexus }}/
      enable_http: true
      # Stream large artifact transfers (Ubuntu ISOs, cloud images, docker
      # layers) without nginx buffering to disk or capping the body. Cold-
      # cache fetches of upstream proxies (e.g. cdimage.ubuntu.com) can
      # take minutes; the default 60s read timeout cuts them off mid-pull.
      proxy_buffering: "off"
      proxy_request_buffering: "off"
      client_max_body_size: "0"
      proxy_read_timeout: 3600s
      proxy_send_timeout: 3600s
      # Rewrite docker registry v2 URLs from the shape podman generates
      # (/v2/<repo-prefix-as-image-namespace>/...) to Nexus's actual path
      # (/repository/<repo>/v2/...). With this, a single nexus.lab.fahm.fr
      # serves as a docker mirror for any number of nexus_repository_docker_proxy
      # repos. Without it, podman's mirror config is incompatible with
      # Nexus's path-based v2 API: podman bakes the location's path into
      # the image namespace and emits /v2/<path>/<image>/manifests/...
      # while Nexus expects /repository/<repo>/v2/<image>/manifests/...
      # The matching mirror config is in roles/_test/tasks/mirrors.yml.
      #
      # Hosted-docker push (compta, homelab/ci) uses Nexus's native
      # path-based routing instead and lands at /v2/<repo>/<image>/...
      # straight through nginx's default location -- Nexus handles the
      # routing internally based on the first path segment after /v2/.
      # The block below applies only to proxies still consumed via the
      # legacy /repository/<repo>/ URL shape.
      server_conf: |
        location ~ ^/v2/repository/([^/]+)/(.*)$ {
          rewrite ^/v2/repository/([^/]+)/(.*)$ /repository/$1/v2/$2 break;
          proxy_pass http://127.0.0.1:{{ service_ports.nexus }};
          proxy_http_version 1.1;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
          proxy_redirect ~^https?://[^/]+/repository/([^/]+)/v2/(.*)$ https://$host/v2/repository/$1/$2;
          # Repeated from the nginx_site_args above: the helper renders these
          # streaming knobs inside `location /`, and nginx locations don't
          # inherit directives from sibling locations, so this docker-mirror
          # location needs its own copy.
          proxy_buffering off;
          proxy_request_buffering off;
          client_max_body_size 0;
          proxy_read_timeout 3600s;
          proxy_send_timeout 3600s;
        }
  tags:
    - nexus
