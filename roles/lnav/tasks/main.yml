- name: Validate architecture is supported
  assert:
    that: ansible_architecture in lnav_artifacts
    fail_msg: "lnav only supports {{ lnav_artifacts.keys() | join(', ') }}, got {{ ansible_architecture }}"
  tags:
    - lnav

- name: Install unzip (required to extract lnav release)
  apt:
    pkg: unzip
    install_recommends: false
    cache_valid_time: 3600
  become: true
  tags:
    - lnav

- name: Download lnav release zip
  get_url:
    url: "{{ lnav_artifacts[ansible_architecture].url }}"
    dest: "/var/cache/lnav-{{ lnav_version }}-{{ ansible_architecture }}.zip"
    checksum: "sha256:{{ lnav_artifacts[ansible_architecture].sha256 }}"
    owner: root
    group: root
    mode: "0644"
  become: true
  register: lnav_zip_download
  retries: 3
  delay: 5
  until: lnav_zip_download is succeeded
  tags:
    - lnav

- name: Check installed lnav version
  command: /usr/local/bin/lnav -V
  register: lnav_installed_version
  failed_when: false
  changed_when: false
  tags:
    - lnav

# unarchive extra_opts inserts args before the zipfile path, making unzip
# treat the file filter as the archive name. Use command: with explicit argv
# to control argument order. Skipped in check mode (zip not yet present).
- name: Extract lnav binary
  command:
    argv:
      - unzip
      - -o
      - -j
      - "/var/cache/lnav-{{ lnav_version }}-{{ ansible_architecture }}.zip"
      - "lnav-{{ lnav_version }}/lnav"
      - -d
      - /usr/local/bin
  become: true
  when: >-
    not ansible_check_mode and (
      lnav_zip_download is changed or
      lnav_installed_version.rc != 0 or
      lnav_version not in (lnav_installed_version.stdout | default(''))
    )
  changed_when: true
  tags:
    - lnav

- name: Set lnav binary permissions
  file:
    path: /usr/local/bin/lnav
    owner: root
    group: root
    mode: "0755"
  become: true
  when: not ansible_check_mode
  tags:
    - lnav

- name: Create lnav formats directory
  file:
    path: /etc/lnav/formats/homelab
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true
  tags:
    - lnav

- name: Deploy lnav format files
  copy:
    src: "formats/{{ item }}"
    dest: "/etc/lnav/formats/homelab/{{ item }}"
    owner: root
    group: root
    mode: "0644"
    backup: true
    validate: python3 -m json.tool %s
  loop: "{{ lnav_format_files }}"
  become: true
  tags:
    - lnav

# The copy loop above only adds/updates managed formats; it never removes one
# dropped from lnav_format_files. Without this prune, a retired format (e.g. a
# parser for a decommissioned service) lingers on disk and warns at lnav
# startup. The dir is created and owned solely by this role, so anything here
# not in the managed list is an orphan. Backups (*.json.<pid>.<ts>~) end in ~,
# so the *.json pattern leaves them for the cleanup role to prune.
- name: Enumerate installed lnav format files
  find:
    paths: /etc/lnav/formats/homelab
    patterns: "*.json"
  register: lnav_installed_formats
  become: true
  tags:
    - lnav

- name: Remove orphaned lnav format files
  file:
    path: "{{ item.path }}"
    state: absent
  loop: "{{ lnav_installed_formats.files }}"
  loop_control:
    label: "{{ item.path | basename }}"
  when: item.path | basename not in lnav_format_files
  become: true
  tags:
    - lnav

- name: Deploy lnav-journal wrapper
  copy:
    src: lnav-journal
    dest: /usr/local/bin/lnav-journal
    owner: root
    group: root
    mode: "0755"
    backup: true
    validate: bash -n %s
  become: true
  tags:
    - lnav
