- name: Install tzdata
  apt:
    pkg:
      - tzdata
    cache_valid_time: 3600
  become: true
  register: timezone_apt
  tags:
    - timezone

- name: Configure timezone
  when: not (ansible_check_mode and timezone_apt.changed)
  community.general.timezone:
    name: Etc/UTC
    # Tell systemd the RTC is in UTC (timedatectl set-local-rtc 0) so the kernel
    # applies no local-time offset -- explicit rather than relying on the
    # installer default. On the RTC-less qemu/VPS guests this is just the systemd
    # flag, with no hardware clock to write.
    hwclock: UTC
  become: true
  tags:
    - timezone
