- name: Ensure grub-common is installed
  # packer/scripts/chroot.sh holds 'grub*' to keep linux-generic (and
  # later linux-generic-hwe via roles/hwe_kernel) from pulling in a
  # bootloader that fights ZFSBootMenu. grub-common/grub2-common are
  # caught by that glob, but they're just utilities (grub-script-check
  # is what we need for the validate: below), so allow installing past
  # the hold. The bootloader packages stay held.
  apt:
    pkg:
      - grub-common
      - grub2-common
    cache_valid_time: 3600
    allow_change_held_packages: true
  become: true
  tags:
    - grub

- name: Create /boot/grub directory
  file:
    dest: /boot/grub
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true
  tags:
    - grub

- name: Create /etc/default/grub.d directory
  file:
    dest: /etc/default/grub.d
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true
  tags:
    - grub

- name: Configure grub
  copy:
    src: 90-custom.cfg
    dest: /etc/default/grub.d/90-custom.cfg
    validate: grub-script-check %s
    backup: true
    owner: root
    group: root
    mode: "0644"
  register: grub_cfg
  become: true
  tags:
    - grub

- name: Update grub
  when: grub_bootloader and grub_cfg.changed
  command: update-grub
  changed_when: true
  become: true
  tags:
    - grub

- name: Ask to reboot
  when: grub_cfg.changed
  file:
    path: /var/run/reboot-required
    state: touch
    owner: root
    group: root
    mode: "0644"
  become: true
  tags:
    - grub
