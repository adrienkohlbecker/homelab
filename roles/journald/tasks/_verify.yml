# Sentinel roundtrip: emit a unique log line via logger(1) and read it
# back via journalctl. Confirms the daemon is alive, accepting writes on
# /dev/log, indexing them, and serving queries — the full function chain
# this role exists to enable. Tighter than a state check ("file present,
# unit active") which passes on broken-but-wired builds.
#
# Why not assert against /var/log/journal/<machine-id>/ existence: the
# directory is created lazily on first persistent write but never torn
# down on a mode flip, so its presence is uncorrelated with the *current*
# Storage= mode (box's packer image keeps it from an earlier build).

- name: _verify | Emit sentinel log line
  command: logger -t journald_verify -- {{ _journald_verify_token | quote }}
  vars:
    _journald_verify_token: "verify-{{ ansible_date_time.epoch }}-{{ 999999 | random }}"
  register: journald_verify_emit
  changed_when: false
  become: true
  tags:
    - journald

# --sync blocks until journald has flushed buffered records to backing
# storage; deterministic alternative to polling the read with retries.
- name: _verify | Force journal sync before sentinel read
  command: journalctl --sync
  changed_when: false
  become: true
  tags:
    - journald

- name: _verify | Read sentinel back through journalctl
  command: journalctl --identifier=journald_verify --output=cat --no-pager
  register: journald_verify_read
  changed_when: false
  failed_when: journald_verify_emit.cmd[-1] not in journald_verify_read.stdout
  become: true
  tags:
    - journald

# ReadKMsg=yes opts journald in to the kernel ring buffer; assert the
# kernel transport has at least one record since boot (every Linux boot
# emits hundreds within the first second). Without ReadKMsg, _TRANSPORT=
# kernel returns empty and this fails. Passive — no trigger needed.
- name: _verify | Confirm kernel transport is populated (ReadKMsg=yes)
  command: journalctl _TRANSPORT=kernel --since=-5m --output=cat --no-pager --lines=1
  register: journald_verify_kmsg
  changed_when: false
  failed_when: journald_verify_kmsg.stdout == ''
  become: true
  tags:
    - journald

# Audit=no in journald.conf means systemd-journald-audit.socket stays
# disabled and the kernel audit netlink fd never reaches journald. The
# auditd file (/var/log/audit/audit.log) is the sole sink; fluent-bit
# tails it separately. Invert the previous "audit reaches journald"
# verify into two complementary checks:
#   1. Socket is disabled.
#   2. A synthetic audit sentinel lands in audit.log and does NOT
#      land in journald _TRANSPORT=audit.
# Test-only — _verify never runs against prod.

- name: _verify | systemd-journald-audit.socket is masked + inactive
  systemd:
    name: systemd-journald-audit.socket
  register: journald_verify_audit_socket
  failed_when: >-
    journald_verify_audit_socket.status.LoadState != "masked"
    or journald_verify_audit_socket.status.ActiveState == "active"
  become: true
  tags:
    - journald

- name: _verify | Install auditd (sole writer of /var/log/audit/audit.log)
  apt:
    name: auditd
    state: present
    install_recommends: false
    update_cache: true
    cache_valid_time: 3600
  become: true
  tags:
    - journald

- name: _verify | Enable kernel audit subsystem
  command: auditctl -e 1
  changed_when: false
  become: true
  tags:
    - journald

- name: _verify | Emit synthetic audit sentinel
  command: auditctl -m audit-verify-{{ _journald_audit_token }}
  vars:
    _journald_audit_token: "{{ ansible_date_time.epoch }}-{{ 999999 | random }}"
  register: journald_verify_audit_emit
  changed_when: false
  become: true
  tags:
    - journald

- name: _verify | Force journal flush before reads
  command: journalctl --sync
  changed_when: false
  become: true
  tags:
    - journald

# `auditctl -m` is synchronous to the kernel netlink, but auditd's
# disk write is async-incremental (default flush mode). Retry the
# grep a few times to absorb that small window without explicitly
# rotating the file (which would move the sentinel into audit.log.1
# before we read it).
- name: _verify | Sentinel lands in /var/log/audit/audit.log
  command: grep -F {{ journald_verify_audit_emit.cmd[-1] | quote }} /var/log/audit/audit.log
  changed_when: false
  register: journald_verify_audit_grep
  retries: 5
  delay: 1
  until: journald_verify_audit_grep.rc == 0
  become: true
  tags:
    - journald

- name: _verify | Sentinel does NOT land in journald _TRANSPORT=audit
  command: journalctl _TRANSPORT=audit --output=cat --no-pager
  register: journald_verify_audit_absent
  changed_when: false
  failed_when: journald_verify_audit_emit.cmd[-1] in journald_verify_audit_absent.stdout
  become: true
  tags:
    - journald
