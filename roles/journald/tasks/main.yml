- name: Validate journald_storage is volatile or persistent
  assert:
    quiet: true
    that:
      - journald_storage in ['volatile', 'persistent']
    fail_msg: >-
      journald_storage={{ journald_storage | default('<undefined>') }}
      is not one of: volatile, persistent. Define it in
      group_vars/all/ (or override per host in
      host_vars/{{ inventory_hostname }}.yml).
  tags:
    - journald

# Helper writes /etc/systemd/journald.conf.d/10-custom.conf via the
# absolute-mode dropin path (sibling of journald.conf, not under
# systemd-journald.service.d/). Helper does: dir creation, backup,
# write, systemd-analyze verify systemd-journald.service, daemon-
# reload. The rendered content has tightly constrained Jinja inputs
# (journald_storage in [volatile, persistent], zfs_root bool) so a
# format-level validate is redundant. Restart gate downstream reads
# the per-unit result fact journald_conf_d_10_custom_conf_result.
- name: Render journald.conf.d/10-custom.conf
  import_role:
    name: systemd_unit
    tasks_from: dropin
  vars:
    systemd_unit_args:
      for: systemd-journald.service
      dest_abs: /etc/systemd/journald.conf.d/10-custom.conf
      src: 10-custom.conf.j2
  tags:
    - journald

# Audit=yes in journald.conf is a silent no-op unless systemd-journald-
# audit.socket is active — that socket binds the kernel audit netlink
# and passes the fd to journald via socket activation. Ubuntu's cloud-
# image variants ship the socket preset-disabled; opt in explicitly so
# the directive works on every host this role runs against.
- name: Enable systemd-journald-audit.socket
  systemd:
    name: systemd-journald-audit.socket
    enabled: true
  become: true
  register: journald_audit_socket
  tags:
    - journald

# systemctl refuses to start the audit socket while journald.service is
# already active ("Socket service ... already active, refusing"). On the
# first apply per host (or whenever the rendered conf changed) we stop
# journald so the socket can claim the netlink fd cleanly; on steady-
# state re-applies both registers report unchanged and journald is not
# touched.
- name: Stop systemd-journald to release sockets
  when: journald_conf_d_10_custom_conf_result.changed or journald_audit_socket.changed
  systemd:
    name: systemd-journald.service
    state: stopped
  become: true
  tags:
    - journald

- name: Start systemd-journald-audit.socket
  systemd:
    name: systemd-journald-audit.socket
    state: started
  become: true
  tags:
    - journald

# /var/log/journal/<machine-id>/ persists across a Storage= flip — journald
# creates it lazily on the first persistent write but never tears it down
# when the operator switches back to volatile. Reap it loudly so a
# persistent→volatile rollback doesn't leave multi-GiB orphans on the pool
# (and so box's pre-baked dir from an earlier image generation gets cleaned
# up on first apply).
- name: Remove orphaned persistent journal directory on volatile hosts
  when: journald_storage == 'volatile'
  file:
    path: /var/log/journal
    state: absent
  become: true
  tags:
    - journald

# state=started is idempotent (no-op when active) and fails loudly if the
# unit can't start. Doubles as the post-conf liveness assertion: without
# journald running, container --log-driver=journald, every systemd unit,
# and kuma's systemdunits collector silently degrade until next reboot.
# Also inherits the audit netlink fd from systemd-journald-audit.socket
# above when journald is brought back up after a stop.
- name: Start systemd-journald.service
  systemd:
    name: systemd-journald.service
    state: started
  become: true
  tags:
    - journald
