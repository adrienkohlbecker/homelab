- name: Validate journald_storage is volatile or persistent
  assert:
    quiet: true
    that:
      - journald_storage in ['volatile', 'persistent']
    fail_msg: >-
      journald_storage={{ journald_storage | default('<undefined>') }}
      is not one of: volatile, persistent. Define it in
      host_vars/{{ inventory_hostname }}.yml or group_vars/.
  tags:
    - journald

- name: Create /etc/systemd/journald.conf.d directory
  file:
    dest: /etc/systemd/journald.conf.d
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true
  tags:
    - journald

- name: Render /etc/systemd/journald.conf.d/10-custom.conf
  template:
    src: 10-custom.conf.j2
    dest: /etc/systemd/journald.conf.d/10-custom.conf
    owner: root
    group: root
    mode: "0644"
    backup: true
    validate: python3 -c 'import configparser; configparser.ConfigParser(allow_no_value=True).read("%s")'
  become: true
  register: journald_conf
  tags:
    - journald

- name: Restart systemd-journald
  when: journald_conf.changed
  systemd:
    name: systemd-journald
    state: restarted
  become: true
  tags:
    - journald

# /var/log/journal/<machine-id>/ persists across a Storage= flip — journald
# creates it lazily on the first persistent write but never tears it down
# when the operator switches back to volatile. Reap it loudly so a
# persistent→volatile rollback doesn't leave multi-GiB orphans on the pool
# (and so box's pre-baked dir from an earlier image generation gets cleaned
# up on first apply).
- name: Remove orphaned persistent journal directory on volatile hosts
  when: journald_storage == 'volatile'
  file:
    path: /var/log/journal
    state: absent
  become: true
  tags:
    - journald

# Loud failure if the restart left the daemon in a non-active state — without
# journald running, container --log-driver=journald, every systemd unit, and
# kuma's systemdunits collector silently degrade until next reboot. systemd:
# state=started is idempotent: no-op when already active, starts if not, and
# fails the task (with the unit's own error) if the unit can't start.
- name: Ensure systemd-journald is active after configuration
  systemd:
    name: systemd-journald
    state: started
  become: true
  tags:
    - journald
