# amd64 takes the upstream prebuilt tarball; aarch64 builds from source
# (no upstream aarch64 binary) with a pinned Go toolchain because jammy's
# apt golang is 1.18, below upstream's go.mod floor of 1.21. The Go pin
# mirrors roles/fan2go so /opt/go-<ver>/ is shared on hosts that run both.

keepalived_exporter_version: "0.7.0"
keepalived_exporter_artifacts:
  x86_64:
    url: "{{ mirror_github }}/gen2brain/keepalived_exporter/releases/download/v{{ keepalived_exporter_version }}/keepalived_exporter-{{ keepalived_exporter_version }}-amd64.tar.gz"
    sha256: "83098655dc26e58fb0b9a1fd04d5e96301cb687876e6d70a99eddd23533d987b"
  aarch64:
    url: "{{ mirror_github }}/gen2brain/keepalived_exporter/archive/refs/tags/v{{ keepalived_exporter_version }}.tar.gz"
    sha256: "bb9e3111ca1e47bf03ed0e3780c37414688ec58b384feb721705c704d0d76cd5"

keepalived_exporter_go_version: "1.26.3"
keepalived_exporter_go_artifact:
  url: "https://go.dev/dl/go{{ keepalived_exporter_go_version }}.linux-arm64.tar.gz"
  sha256: "9d89a3ea57d141c2b22d70083f2c8459ba3890f2d9e818e7e933b75614936565"
