- name: install_arm64 | Install build dependencies
  apt:
    pkg:
      - golang
    cache_valid_time: 3600
  register: apt_keepalived_exporter
  become: true

- name: install_arm64 | Create source dir
  ansible.builtin.file:
    path: /opt/keepalived_exporter
    state: directory
    mode: "0755"
  become: true

- name: install_arm64 | Read installed keepalived_exporter version
  ansible.builtin.slurp:
    src: /opt/keepalived_exporter/.version
  register: keepalived_exporter_installed
  failed_when: false
  changed_when: false

- name: install_arm64 | Download keepalived_exporter
  when:
    - not (ansible_check_mode and apt_keepalived_exporter.changed)
    - (keepalived_exporter_installed.content | default('') | b64decode | trim) != 'v0.7.0'
  ansible.builtin.unarchive:
    src: "{{ mirror_github }}/gen2brain/keepalived_exporter/archive/refs/tags/v0.7.0.tar.gz"
    dest: /opt/keepalived_exporter
    remote_src: true
    extra_opts:
      - --strip-components=1
  register: git_keepalived_exporter
  become: true

- name: install_arm64 | Write keepalived_exporter version stamp
  when:
    - not (ansible_check_mode and apt_keepalived_exporter.changed)
    - git_keepalived_exporter.changed
  ansible.builtin.copy:
    content: "v0.7.0"
    dest: /opt/keepalived_exporter/.version
    mode: "0644"
  become: true

- name: install_arm64 | Compile source
  when: not (ansible_check_mode and (apt_keepalived_exporter.changed or git_keepalived_exporter.changed)) and git_keepalived_exporter.changed
  command: go build -o /usr/local/bin/keepalived_exporter main.go
  args:
    chdir: /opt/keepalived_exporter
  changed_when: true
  become: true
