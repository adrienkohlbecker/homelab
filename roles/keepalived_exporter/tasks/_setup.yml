- name: _setup | Install nginx
  import_role:
    name: _test
    tasks_from: nginx

- name: _setup | Install authelia stub for auth=required tests
  import_role:
    name: _test
    tasks_from: authelia_stub

# Bring up keepalived itself: the exporter signals it (SIGRTMIN+4) and
# parses /tmp/keepalived.json on each scrape; without a live daemon
# /metrics carries only `keepalived_up 0` and no per-instance series,
# leaving _verify with nothing meaningful to assert.
- name: _setup | Ensure keepalived conf.d exists
  file:
    dest: /etc/keepalived/conf.d
    state: directory
    owner: root
    group: root
    mode: "0750"
  become: true

# Minimal vrrp_instance is enough: keepalived's Type=notify only sends
# READY=1 once it has at least one instance. Link-local VIP keeps the
# fixture self-contained -- no peer, no external bind, no firewall hop.
- name: _setup | Drop minimal vrrp_instance for the exporter to read
  copy:
    dest: /etc/keepalived/conf.d/_test.conf
    content: |
      vrrp_instance vi_test {
        state MASTER
        interface {{ ansible_default_ipv4.interface }}
        virtual_router_id 99
        priority 100
        advert_int 1
        virtual_ipaddress {
          169.254.99.99/32
        }
      }
    owner: root
    group: root
    mode: "0640"
    backup: true
  become: true

- name: _setup | Apply keepalived role to bring up the daemon
  import_role:
    name: keepalived
