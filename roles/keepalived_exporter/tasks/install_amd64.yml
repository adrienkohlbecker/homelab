- name: install_amd64 | Download keepalived_exporter
  check_mode: false
  become: true
  get_url:
    url: "{{ keepalived_exporter_artifacts[ansible_architecture].url }}"
    checksum: "sha256:{{ keepalived_exporter_artifacts[ansible_architecture].sha256 }}"
    dest: /tmp/keepalived_exporter.tar.gz
    mode: "0644"
    owner: root
    group: root

- name: install_amd64 | Install keepalived_exporter
  unarchive:
    src: /tmp/keepalived_exporter.tar.gz
    remote_src: true
    dest: /usr/local/bin
    mode: "0755"
    owner: root
    group: root
    include: [ "keepalived_exporter-{{ keepalived_exporter_version }}-amd64/keepalived_exporter" ]
    list_files: true
    extra_opts: [ --strip-components=1 ]
  become: true
  register: keepalived_exporter_binary_download

- name: install_amd64 | Delete tar file
  file:
    path: /tmp/keepalived_exporter.tar.gz
    state: absent
  become: true
