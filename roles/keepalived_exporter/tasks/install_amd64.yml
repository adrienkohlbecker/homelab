- name: install_amd64 | Download keepalived_exporter
  become: true
  get_url:
    url: "{{ keepalived_exporter_artifacts[ansible_architecture].url }}"
    checksum: "sha256:{{ keepalived_exporter_artifacts[ansible_architecture].sha256 }}"
    dest: "/var/cache/keepalived_exporter-{{ keepalived_exporter_version }}.amd64.tar.gz"
    mode: "0644"
    owner: root
    group: root
  register: keepalived_exporter_tarball

# Check-mode gate (mirrors install_source.yml's build/install steps): under
# --check the download above only reports "would fetch" and the tarball stays
# absent, so unarchive would die on a missing src. Skip cleanly instead.
- name: install_amd64 | Install keepalived_exporter
  when: not (ansible_check_mode and keepalived_exporter_tarball.changed)
  unarchive:
    src: "/var/cache/keepalived_exporter-{{ keepalived_exporter_version }}.amd64.tar.gz"
    remote_src: true
    dest: /usr/local/bin
    mode: "0755"
    owner: root
    group: root
    include: [ "keepalived_exporter-{{ keepalived_exporter_version }}-amd64/keepalived_exporter" ]
    list_files: true
    extra_opts: [ --strip-components=1, --no-same-owner ]
  become: true
  register: keepalived_exporter_binary_download
  # An upstream rename of the tarball top-dir would make `include:` match
  # nothing and unarchive return changed=false with no binary written --
  # the `-version` gate above would then re-fire on every play. Fail loud.
  failed_when: keepalived_exporter_binary_download.files | default([]) | length == 0
