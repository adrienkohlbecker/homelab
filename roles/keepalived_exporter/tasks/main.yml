# `check_mode: false`: read-only probe used by the install gate below.
- name: Check if keepalived_exporter is installed
  command: keepalived_exporter -version
  register: keepalived_exporter_check
  failed_when: false
  changed_when: false
  check_mode: false
  tags:
    - keepalived_exporter

- name: Install keepalived_exporter from amd64 prebuilt
  when:
    - keepalived_exporter_version not in keepalived_exporter_check.stderr
    - ansible_architecture == "x86_64"
  import_tasks:
    file: install_amd64.yml
  tags:
    - keepalived_exporter

- name: Install keepalived_exporter from source
  when:
    - keepalived_exporter_version not in keepalived_exporter_check.stderr
    - ansible_architecture != "x86_64"
  import_tasks:
    file: install_source.yml
  tags:
    - keepalived_exporter

- name: Install keepalived_exporter service
  import_role:
    name: systemd_unit
    tasks_from: install
  vars:
    systemd_unit_args:
      src: keepalived_exporter.service.j2
  tags:
    - keepalived_exporter

- name: Enable keepalived_exporter service
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: keepalived_exporter
      condition: "{{ not (ansible_check_mode and keepalived_exporter_service_result.changed) }}"
      restart: >-
        {{ keepalived_exporter_service_result.changed
           or keepalived_exporter_binary_download.changed | default(false)
           or keepalived_exporter_binary_build.changed | default(false) }}
  tags:
    - keepalived_exporter

- name: Configure nginx
  import_role:
    name: nginx
    tasks_from: site
  vars:
    nginx_site_args:
      subdomain: keepalived-exporter
      proxy_pass: http://localhost:{{ service_ports.keepalived_exporter }}/
      auth: required
      server_conf: |
        location = / {
          return 301 /metrics;
        }
  tags:
    - keepalived_exporter
