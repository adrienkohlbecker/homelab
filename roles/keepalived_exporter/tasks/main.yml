- name: Check if keepalived_exporter is installed
  command: keepalived_exporter -version
  register: keepalived_exporter_check
  failed_when: false
  changed_when: false
  check_mode: false
  become: true
  tags:
    - keepalived_exporter

- name: Install keepalived_exporter if needed
  when: '"0.7.0" not in keepalived_exporter_check.stderr and ansible_architecture == "x86_64"'
  tags:
    - keepalived_exporter
  block:
    - name: Install for amd64
      import_tasks:
        file: install_amd64.yml

- name: Install keepalived_exporter if needed
  when: '"0.7.0" not in keepalived_exporter_check.stderr and ansible_architecture != "x86_64"'
  tags:
    - keepalived_exporter
  block:
    - name: Install for non amd64
      import_tasks:
        file: install_arm64.yml

- name: Install keepalived_exporter service
  import_role:
    name: systemd_unit
    tasks_from: install
  vars:
    systemd_unit_args:
      src: keepalived_exporter.service
  tags:
    - keepalived_exporter

- name: Enable keepalived_exporter service
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: keepalived_exporter
      condition: "{{ not (ansible_check_mode and systemd_unit.changed) }}"
      restart: "{{ systemd_unit.changed }}"
  tags:
    - keepalived_exporter

- name: Configure nginx
  import_role:
    name: nginx
    tasks_from: site
  vars:
    nginx_site_args:
      subdomain: keepalived-exporter
      proxy_pass: http://localhost:9650/
      server_conf: |
        location = / {
          return 301 /metrics;
        }
  tags:
    - keepalived_exporter
