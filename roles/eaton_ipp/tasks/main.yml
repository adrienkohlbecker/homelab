- name: Gather package facts
  package_facts:
    manager: apt
  no_log: true
  check_mode: false
  tags:
    - eaton_ipp

# `default([{}])` catches the package-missing case so we don't trip on
# undefined attribute; `default('')` catches the no-version case so the
# comparison always has a string. Same idiom as roles/backports/_verify.
- name: Install eaton ipp if needed
  when:
    - ansible_architecture == "x86_64"
    - (ansible_facts.packages["ipp-linux"] | default([{}]))[0].version | default('') != eaton_ipp_version
  become: true
  tags:
    - eaton_ipp
  block:

    - name: Download ipp-linux deb
      check_mode: false
      get_url:
        url: "{{ eaton_ipp_release[ansible_architecture].url }}"
        dest: /tmp/ipp-linux.deb
        mode: '0644'
        owner: root
        group: root
        checksum: "sha256:{{ eaton_ipp_release[ansible_architecture].sha256 }}"
        timeout: 30
      register: ipp_linux_download
      retries: 3
      delay: 5
      until: ipp_linux_download is succeeded

    - name: Install ipp-linux
      apt:
        deb: /tmp/ipp-linux.deb
      register: ipp_linux_installed

  always:

    # Cleanup pairs with the check_mode: false download above so /tmp
    # doesn't carry the deb past a --check run.
    - name: Delete deb file
      check_mode: false
      file:
        path: /tmp/ipp-linux.deb
        state: absent

- name: Enable eaton-ipp service
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: eaton-ipp
      condition: '{{ not (ansible_check_mode and (ipp_linux_installed.changed | default(false))) and ansible_architecture == "x86_64" }}'
      restart: '{{ ipp_linux_installed.changed | default(false) }}'
  tags:
    - eaton_ipp

# The eaton-ipp daemon binds 0.0.0.0:4679 (HTTP) and 0.0.0.0:4680
# (HTTPS) — config.js's "httpServers" block is not configurable down
# to loopback. External access is dropped by roles/firewall's
# default-drop input chain (nothing in nftables.conf.j2 accepts those
# ports), and confirmed by a probe: external TCP gets a RST while
# nginx reaches the UI via iif lo accept. Default admin/admin login
# is therefore only reachable via the nginx subdomain (which fronts a
# real TLS cert and could later carry CSP/auth) or via host-local
# processes, not from the broader LAN.
#
# Eaton's own ports table: TCP 4679 = "Eaton Supervision" (HTTP UI),
# TCP 4680 = "Eaton SSL Supervision" (HTTPS UI). UDP 4679/4680 are
# "Eaton Notification/Alarms Broadcast"; IPP polls the UPS over SNMP
# (UDP 161/162), so the UDP-4679-IN broadcast path isn't load-bearing
# here.
- name: Configure nginx
  import_role:
    name: nginx
    tasks_from: site
  vars:
    nginx_site_args:
      condition: '{{ ansible_architecture == "x86_64" }}'
      subdomain: ipp
      # Vendor binary has a hard-coded `admin/admin` default only
      # changeable in the IPP UI itself; Authelia gates the perimeter,
      # vendor login stays as the second wall (accept the double click).
      auth: required
      # The HTTP listener on 4679 unconditionally 301-redirects to
      # https://<host>:4680/, so proxying through it just bounces every
      # request back at the browser. Front the HTTPS listener directly;
      # the self-signed loopback cert is fine since we're on lo and the
      # site-template's proxy_ssl_server_name handles SNI.
      proxy_pass: https://localhost:{{ service_ports.eaton_ipp }}/
      location_conf: |
        # By default the header name is lowercase, and this app expects it in capitalized form, otherwise we can't login.
        proxy_set_header Content-Type      $content_type;
        proxy_set_header Cookie            $http_cookie;
  tags:
    - eaton_ipp
