- name: Gather package facts
  package_facts:
    manager: apt
  no_log: true
  check_mode: false
  tags:
    - eaton_ipp

# `default([{}])` catches the package-missing case so we don't trip on
# undefined attribute; `default('')` catches the no-version case so the
# comparison always has a string. Same idiom as roles/backports/_verify.
- name: Install eaton ipp if needed
  when:
    - ansible_architecture == "x86_64"
    - (ansible_facts.packages["ipp-linux"] | default([{}]))[0].version | default('') != eaton_ipp_version
  become: true
  tags:
    - eaton_ipp
  block:

    - name: Download ipp-linux deb
      check_mode: false
      get_url:
        url: "{{ eaton_ipp_release[ansible_architecture].url }}"
        dest: /tmp/ipp-linux.deb
        mode: '0644'
        owner: root
        group: root
        checksum: "sha256:{{ eaton_ipp_release[ansible_architecture].sha256 }}"
        timeout: 30
      register: ipp_linux_download
      retries: 3
      delay: 5
      until: ipp_linux_download is succeeded

    - name: Install ipp-linux
      apt:
        deb: /tmp/ipp-linux.deb
      register: ipp_linux_installed

  always:

    - name: Delete deb file
      check_mode: false
      file:
        path: /tmp/ipp-linux.deb
        state: absent

- name: Enable eaton-ipp service
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: eaton-ipp
      condition: '{{ not (ansible_check_mode and (ipp_linux_installed.changed | default(false))) and ansible_architecture == "x86_64" }}'
      restart: '{{ ipp_linux_installed.changed | default(false) }}'
  tags:
    - eaton_ipp

- name: Configure nginx
  import_role:
    name: nginx
    tasks_from: site
  vars:
    nginx_site_args:
      condition: '{{ ansible_architecture == "x86_64" }}'
      subdomain: ipp
      proxy_pass: https://localhost:4680/
      location_conf: |
        # By default the header name is lowercase, and this app expects it in capitalized form, otherwise we can't login.
        proxy_set_header Content-Type      $content_type;
        proxy_set_header Cookie            $http_cookie;
  tags:
    - eaton_ipp
