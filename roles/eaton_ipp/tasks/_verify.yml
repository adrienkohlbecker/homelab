# Eaton IPP is x86_64-only — the install block in main.yml is gated
# to that arch, so there's nothing to verify on aarch64.
- name: _verify | IPP install and reachability
  when: ansible_architecture == "x86_64"
  block:

    # IPP's actual function is SNMP-polling a UPS and triggering a host
    # shutdown on AC loss. The harness has no UPS attached, so we can't
    # exercise the polling path or the shutdown trigger here. Verify
    # the management UI is reachable (loopback + nginx route); the
    # SNMP/shutdown path is exercised in production by the absence of
    # spurious shutdowns, not by this verify file.

    # IPP's HTTP listener on 4679 unconditionally 301s to https://
    # 4680/, so the real UI only lives on the HTTPS socket. Self-
    # signed cert on the daemon; we're on loopback so there's no
    # TLS-trust guarantee to verify. Index typically redirects to a
    # login page on a fresh install — accept any reasonable
    # 2xx/3xx/4xx so the probe doesn't pin a specific UI flow. We
    # want to catch 5xx / connection failures (daemon bound but not
    # actually serving).
    - name: _verify | IPP serves HTTPS on 4680
      uri:
        url: https://localhost:{{ service_ports.eaton_ipp }}/
        validate_certs: false
        status_code: [ 200, 301, 302, 303, 401, 403 ]
      register: _verify_http_direct
      retries: 15
      delay: 2
      until: _verify_http_direct is succeeded

    # Hit the nginx route via Host header so DNS isn't required.
    # Snakeoil certs in test → validate_certs: false.
    - name: _verify | IPP reachable through nginx subdomain
      uri:
        url: https://localhost/
        headers:
          Host: "ipp.{{ inventory_hostname }}.{{ domain }}"
        validate_certs: false
        status_code: [ 200, 301, 302, 303, 401, 403 ]
      register: _verify_http_nginx
      retries: 5
      delay: 2
      until: _verify_http_nginx is succeeded
