- name: Install compta dependencies
  apt:
    package:
      - git
    cache_valid_time: 3600
  register: compta_apt_deps
  become: true
  tags:
    - compta

# compta is stateless: no config files, no on-host data. Skip the
# /mnt/services/compta dir the helper creates by default; the unit
# runs the image as compta:compta and bind-mounts nothing.
- name: Set up compta system user and group
  import_role:
    name: service_user
    tasks_from: user
  vars:
    service_user_args:
      name: compta
      config_dir: false
  tags:
    - compta

# Pin SSH_AUTH_SOCK into the git task's env; mitogen's reused interpreter
# has dropped the forwarded socket on us before. printenv exits 1 when
# the var is unset, so the default non-zero-rc failure suffices -- no
# explicit failed_when needed.
# check_mode: false because the `command` module is skipped in check mode
# by default, which leaves compta_ssh_auth_sock.stdout undefined and
# blows up the git task's environment lookup on any second-pass check
# run (apt unchanged, gate True, env eval misses .stdout).
- name: Read forwarded SSH_AUTH_SOCK
  when: not (ansible_check_mode and compta_apt_deps.changed)
  command: printenv SSH_AUTH_SOCK
  changed_when: false
  check_mode: false
  register: compta_ssh_auth_sock
  tags:
    - compta

- name: Download compta
  when: not (ansible_check_mode and compta_apt_deps.changed)
  git:
    repo: git@github.com:adrienkohlbecker/compta.git
    dest: "{{ ansible_user_dir }}/compta"
    version: master
    depth: 1
    single_branch: true
    force: true
    accept_newhostkey: true
  environment:
    SSH_AUTH_SOCK: "{{ compta_ssh_auth_sock.stdout }}"
  register: compta_git
  tags:
    - compta

- name: Build a podman image
  containers.podman.podman_image:
    name: compta:latest
    path: "{{ ansible_user_dir }}/compta"
    build:
      format: oci
    state: build
    force: "{{ compta_git.changed }}"
  register: compta_podman
  become: true
  tags:
    - compta

- name: Install compta service
  import_role:
    name: systemd_unit
    tasks_from: install
  vars:
    systemd_unit_args:
      src: compta.service.j2
      condition: "{{ not (ansible_check_mode and compta_user.changed) }}"
  tags:
    - compta

- name: Enable compta service
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: compta
      condition: "{{ not (ansible_check_mode and (compta_user.changed or compta_service_result.changed)) }}"
      restart: "{{ compta_service_result.changed or compta_podman.changed }}"
  tags:
    - compta

- name: Configure nginx
  import_role:
    name: nginx
    tasks_from: site
  vars:
    nginx_site_args:
      subdomain: compta
      proxy_pass: http://localhost:{{ service_ports.compta }}/
  tags:
    - compta
