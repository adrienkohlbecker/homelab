- name: Install dependencies
  apt:
    package:
      - git
    cache_valid_time: 3600
  register: compta_apt_deps
  become: true
  tags:
    - compta

- name: Add compta group
  group:
    name: compta
    system: true
  become: true
  tags:
    - compta

- name: Add compta user
  user:
    name: compta
    group: compta
    createhome: false
    system: true
    shell: /usr/sbin/nologin
    home: /nonexistent
  become: true
  register: compta_user
  tags:
    - compta

# Pin SSH_AUTH_SOCK into the git task's env; mitogen's reused interpreter
# has dropped the forwarded socket on us before. Fail-fast if unset.
# check_mode: false because the `command` module is skipped in check mode
# by default, which leaves compta_ssh_auth_sock.stdout undefined and
# blows up the git task's environment lookup on any second-pass check
# run (apt unchanged, gate True, env eval misses .stdout).
- name: Read forwarded SSH_AUTH_SOCK
  when: not (ansible_check_mode and compta_apt_deps.changed)
  command: printenv SSH_AUTH_SOCK
  changed_when: false
  check_mode: false
  failed_when: compta_ssh_auth_sock.rc != 0 or not compta_ssh_auth_sock.stdout
  register: compta_ssh_auth_sock
  tags:
    - compta

- name: Download compta
  when: not (ansible_check_mode and compta_apt_deps.changed)
  git:
    repo: git@github.com:adrienkohlbecker/compta.git
    dest: "{{ ansible_user_dir }}/compta"
    version: master
    force: true
    accept_newhostkey: true
  environment:
    SSH_AUTH_SOCK: "{{ compta_ssh_auth_sock.stdout }}"
  register: compta_git
  tags:
    - compta

- name: Build a podman image
  containers.podman.podman_image:
    name: compta:latest
    path: "{{ ansible_user_dir }}/compta"
    build:
      format: oci
    state: build
    force: "{{ compta_git.changed }}"
  register: compta_podman
  become: true
  tags:
    - compta

- name: Install compta service
  import_role:
    name: systemd_unit
    tasks_from: install
  vars:
    systemd_unit_src: compta.service.j2
    systemd_unit_condition: "{{ not (ansible_check_mode and compta_user.changed) }}"
  tags:
    - compta

- name: Enable compta service
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_src: compta
    systemd_unit_condition: "{{ not (ansible_check_mode and (compta_user.changed or systemd_unit.changed)) }}"
    systemd_unit_restart: "{{ systemd_unit.changed or compta_podman.changed }}"
  tags:
    - compta

- name: Configure nginx
  import_role:
    name: nginx
    tasks_from: site
  vars:
    nginx_subdomain: compta
    nginx_proxy_pass: http://localhost:{{ service_ports.compta }}/
  tags:
    - compta
