# compta is stateless: no config files, no on-host data. Skip the
# /mnt/services/compta dir the helper creates by default; the unit
# runs the image as compta:compta and bind-mounts nothing.
- name: Set up compta system user and group
  import_role:
    name: service_user
    tasks_from: user
  vars:
    service_user_args:
      name: compta
      config_dir: false
  tags:
    - compta

# Pull the latest compta image up front so the unit's restart trigger
# below catches a digest change. systemd_unit/service helper also pre-
# pulls images but doesn't expose a single .changed signal across its
# loop; pulling explicitly here gives us compta_image_pull.changed.
# Image is built + pushed by the workflow in adrienkohlbecker/compta
# against nexus.lab.fahm.fr/repository/compta (see terraform/nexus.tf).
- name: Pull compta image
  when: not ansible_check_mode
  containers.podman.podman_image:
    name: nexus.lab.fahm.fr/repository/compta/compta:latest
  register: compta_image_pull
  become: true
  tags:
    - compta

- name: Install compta service
  import_role:
    name: systemd_unit
    tasks_from: install
  vars:
    systemd_unit_args:
      src: compta.service.j2
      condition: "{{ not (ansible_check_mode and compta_user.changed) }}"
  tags:
    - compta

- name: Enable compta service
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: compta
      condition: "{{ not (ansible_check_mode and (compta_user.changed or compta_service_result.changed)) }}"
      restart: "{{ compta_service_result.changed or compta_image_pull.changed }}"
  tags:
    - compta

- name: Configure nginx
  import_role:
    name: nginx
    tasks_from: site
  vars:
    nginx_site_args:
      subdomain: compta
      proxy_pass: http://localhost:{{ service_ports.compta }}/
  tags:
    - compta
