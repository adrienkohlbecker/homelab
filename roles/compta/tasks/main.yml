# compta is stateless: no config files, no on-host data. Skip the
# /mnt/services/compta dir the helper creates by default; the unit
# runs the image as compta:compta and bind-mounts nothing.
- name: Set up compta system user and group
  import_role:
    name: service_user
    tasks_from: user
  vars:
    service_user_args:
      name: compta
      config_dir: false
  tags:
    - compta

# Pull the latest compta image up front so the unit's restart trigger
# below catches a digest change. systemd_unit/service helper also pre-
# pulls images but doesn't expose a single .changed signal across its
# loop; pulling explicitly here gives us compta_image_pull.changed.
# Image is built + pushed by the workflow in adrienkohlbecker/compta
# against nexus.lab.fahm.fr/compta (see terraform/nexus.tf). x86_64-
# only -- the image has no arm64 variant, so the arm64 multi-arch
# manifest falls back to the x86 layer and starting the unit fails
# with "ERROR (catatonit:2): failed to exec pid1: Exec format error".
# Skip the pull on arm so the harness on Mac doesn't waste a minute
# downloading an unrunnable image; the service-enable gate below
# also skips the start.
- name: Pull compta image
  when:
    - not ansible_check_mode
    - ansible_architecture == "x86_64"
  containers.podman.podman_image:
    name: nexus.lab.fahm.fr/compta/compta:latest
  register: compta_image_pull
  become: true
  tags:
    - compta

- name: Install compta service
  import_role:
    name: systemd_unit
    tasks_from: install
  vars:
    systemd_unit_args:
      src: compta.service.j2
      condition: "{{ not (ansible_check_mode and compta_user.changed) }}"
  tags:
    - compta

- name: Enable compta service
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: compta
      # arm64 hosts can install + validate the unit file (Install
      # compta service above runs on all arches so systemd-analyze
      # verifies the template), but the actual start would hammer
      # the restart-limit on a broken-architecture image. See the
      # Pull task above for the image-arch background.
      condition: >-
        {{ ansible_architecture == 'x86_64'
           and not (ansible_check_mode
                    and (compta_user.changed or compta_service_result.changed)) }}
      restart: "{{ compta_service_result.changed or (compta_image_pull.changed | default(false)) }}"
  tags:
    - compta

- name: Configure nginx
  import_role:
    name: nginx
    tasks_from: site
  vars:
    nginx_site_args:
      subdomain: compta
      proxy_pass: http://localhost:{{ service_ports.compta }}/
  tags:
    - compta
