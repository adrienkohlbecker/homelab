- name: _setup | Install podman
  import_role:
    name: podman
    tasks_from: install

- name: _setup | Install nginx
  import_role:
    name: _test
    tasks_from: nginx

# compta uses nginx_site_args.auth=required + bypass_query_param.
# Without an Authelia listener at 127.0.0.1:{{ service_ports.authelia }}
# the auth_request subrequest gets connect-refused -> 502 -> 500 to
# parent, even on a bypass-token request (the bypass `if` returns 204
# BEFORE proxy_pass to upstream, but a 500 from the wiring itself when
# Authelia is absent would mask any bypass-logic regression). Gate-mode
# stub: 401 unauthenticated so the no-token / wrong-token _verify
# probes see 302 from the parent's error_page mapping, while the
# token-bypass probe still gets 200 (stub never consulted).
- name: _setup | Install authelia stub in gate mode
  import_role:
    name: _test
    tasks_from: authelia_stub
  vars:
    _compta_authelia_stub_mode: gate
