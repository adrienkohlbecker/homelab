# Read-only Docker-API proxy fronting the rootful podman socket, so netdata's
# docker collector can read container metrics over tcp loopback without the
# host-root-equivalent podman-socket group membership. See the .service.j2
# header for the trust rationale. Deployed wherever podman + netdata co-locate
# (site.yml), ordered before netdata so its docker collector finds the proxy.
- name: Install socket_proxy service
  import_role:
    name: systemd_unit
    tasks_from: install
  vars:
    systemd_unit_args:
      src: socket_proxy.service.j2
  tags:
    - socket_proxy

- name: Pull socket_proxy image
  containers.podman.podman_image:
    name: "{{ socket_proxy_image }}"
  register: socket_proxy_image_pull
  retries: 3
  delay: 10
  until: socket_proxy_image_pull is not failed
  become: true
  tags:
    - socket_proxy

- name: Create socket_proxy podman network
  when: not ansible_check_mode
  containers.podman.podman_network:
    name: socket_proxy
    disable_dns: false
    state: present
  register: socket_proxy_network
  become: true
  tags:
    - socket_proxy

- name: Enable socket_proxy service
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: socket_proxy
      condition: "{{ not (ansible_check_mode and socket_proxy_service_result.changed) }}"
      restart: "{{ socket_proxy_service_result.changed or socket_proxy_network.changed }}"
  tags:
    - socket_proxy
