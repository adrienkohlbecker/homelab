- name: Assert seerr secrets are provided
  assert:
    # `| string` before `| length`: some of these vault to bare numbers
    # (e.g. a numeric sessionSecret/clientId), and `| length` raises on an int.
    that:
      - seerr_api_key is defined
      - (seerr_api_key | default('') | string) | length > 0
      - seerr_session_secret is defined
      - (seerr_session_secret | default('') | string) | length > 0
      - seerr_vapid_private is defined
      - (seerr_vapid_private | default('') | string) | length > 0
      - seerr_vapid_public is defined
      - (seerr_vapid_public | default('') | string) | length > 0
      - seerr_client_id is defined
      - (seerr_client_id | default('') | string) | length > 0
    fail_msg: >-
      seerr_api_key / seerr_session_secret / seerr_vapid_private /
      seerr_vapid_public / seerr_client_id are all required (vaulted in
      group_vars/{prod,test}.yml). Without any of them settings.json renders the
      key empty, overwriting what seerr self-generates on first boot on every
      converge: an empty apiKey breaks API clients, an empty sessionSecret/vapid
      pair invalidates every logged-in session and push subscription.
  tags:
    - seerr

- name: Set up seerr system user, group, and config dir
  import_role:
    name: service_user
    tasks_from: user
  vars:
    service_user_args:
      name: seerr
      # settings.json holds many secrets (apiKey, sessionSecret, vapidPrivate,
      # SMTP password, telegram token, *arr/plex/tautulli keys) at mode 0644
      # (matching seerr's own umask, to avoid a mode-flip restart loop). The
      # parent dir is the real access gate, so tighten it from the 0755 default.
      config_dir_mode: "0750"
  tags:
    - seerr

# seerr's DB path is a whole directory (/app/config/db), so we bind-mount this
# dir straight onto the sqlite dataset in the unit -- not the sqlite_dataset
# helper, which symlinks a single fixed DB *file* (radarr's /config/*.db) and
# refuses a dangling-symlink cold start. A directory mountpoint sidesteps that.
- name: Create sqlite directory
  when: not (ansible_check_mode and seerr_user.changed)
  file:
    dest: /mnt/services/sqlite/seerr
    state: directory
    owner: seerr
    group: seerr
    mode: "0750"
  become: true
  tags:
    - seerr

# settings.json is rendered as the full canonical post-merge shape seerr
# writes on disk -- every key seerr's defaults emit, in seerr's canonical
# top-level order, with our wired values overriding the bare-defaults
# where we configure them (plex/radarr/sonarr/tautulli/notifications/
# network). Without this exact-shape match, seerr re-normalizes on every
# startup (adds ~20 default keys: sessionSecret, hideBlocklisted, jellyfin
# block, ntfy, metadataSettings, network.dnsCache, embedPoster per agent,
# migrations[]; splits our region into discoverRegion/streamingRegion)
# and ansible would diff-churn forever. Slurp + json_query preserves
# plex.libraries[].lastScan timestamps across deploys (seerr updates them
# on each scan; first run defaults to 0 via json_query-on-empty).
- name: Load existing settings.json
  slurp:
    src: /mnt/services/seerr/settings.json
  register: _seerr_settings_b64
  failed_when: false
  become: true
  tags:
    - seerr

# `failed_when: false` on the slurp handles a *missing* file (fresh host); a
# *corrupt* one (truncated/partial write from a crashed daemon) still parses to
# an exception in from_json and would wedge every future converge. Treat an
# unparseable file as fresh ({}) so the render rewrites it from canonical shape,
# rather than aborting the host's whole converge until manual repair.
- name: Parse existing settings.json
  tags:
    - seerr
  block:
    - name: Parse existing settings.json
      set_fact:
        seerr_settings_json: "{{ _seerr_settings_b64['content'] | default('e30=') | b64decode | from_json }}"
  rescue:
    - name: Treat corrupt settings.json as fresh
      set_fact:
        seerr_settings_json: {}

- name: Render settings.json
  copy:
    # JSON.stringify(_, null, 1) writes no trailing newline; the template
    # file does. Strip ours so the bytes match what seerr persists.
    content: "{{ lookup('template', 'settings.json.j2') | regex_replace('\\n+$', '') }}"
    dest: /mnt/services/seerr/settings.json
    owner: seerr
    group: seerr
    # Mode matches what seerr writes on every save (container umask 0022).
    # Enforcing 0600 here would create a mode-flip → restart loop on every
    # converge. Effective access control is the parent dir (seerr:seerr 0750,
    # set via service_user config_dir_mode above), which blocks other-read of
    # this secret-bearing file; single-tenant homelab threat model.
    mode: "0644"
    backup: true
    validate: python3 -c 'import json,sys; json.load(open(sys.argv[1]))' "%s"
  register: seerr_settings_result
  become: true
  # On a fresh-host --check run seerr_user + its config dir are only reported
  # (their creating tasks are guarded), so an unguarded copy with owner=seerr
  # would fail resolving the not-yet-created user/dir.
  when: not (ansible_check_mode and seerr_user.changed)
  tags:
    - seerr

- name: Install seerr service
  import_role:
    name: systemd_unit
    tasks_from: install
  vars:
    systemd_unit_args:
      src: seerr.service.j2
      condition: "{{ not (ansible_check_mode and seerr_user.changed) }}"
  tags:
    - seerr

- name: Pull seerr image
  containers.podman.podman_image:
    name: "{{ seerr_image }}"
  register: seerr_image_pull
  retries: 3
  delay: 10
  until: seerr_image_pull is not failed
  become: true
  tags:
    - seerr

- name: Enable seerr service
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: seerr
      condition: "{{ not (ansible_check_mode and (seerr_service_result.changed or seerr_user.changed)) }}"
      restart: "{{ seerr_service_result.changed or seerr_settings_result.changed or seerr_user.changed }}"
  tags:
    - seerr

- name: Configure nginx
  import_role:
    name: nginx
    tasks_from: site
  vars:
    nginx_site_args:
      subdomain: seerr
      # No auth: -- seerr does its own Plex/Jellyfin SSO + local login, so an
      # nginx forward-auth gate would double-prompt end users (mirrors jellyfin).
      proxy_pass: http://127.0.0.1:{{ service_ports.seerr }}/
      csp_default_src: plex.tv *.plex.tv
      csp_additional: img-src plex.tv *.plex.tv *.gravatar.com *.tmdb.org {{ nginx_csp_default }}; font-src plex.tv *.plex.tv fonts.gstatic.com {{ nginx_csp_default }}
  tags:
    - seerr
