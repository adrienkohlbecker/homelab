- name: Assert required service ports are defined
  assert:
    that:
      - service_ports.prometheus is defined
      - not (minio_enabled | default(false)) or service_ports.minio_api is defined
    fail_msg: >-
      service_ports.prometheus (and service_ports.minio_api when minio_enabled)
      must be set; an undefined port renders an empty scrape target that
      prometheus silently accepts and ignores.
  tags:
    - prometheus

- name: Install prometheus
  apt:
    pkg:
      - prometheus
    policy_rc_d: 101
    install_recommends: false
    cache_valid_time: 3600
  register: prometheus_apt
  become: true
  tags:
    - prometheus

# TSDB state lives under /mnt/services so it rides the ZFS snapshots
# like other service state (the distro default /var/lib/prometheus is
# not snapshotted). The prometheus user is created by the apt package
# above; in check mode on a fresh host that's only reported, not done,
# so gate the chown on the same condition.
- name: Create prometheus data directory
  when: not (ansible_check_mode and prometheus_apt.changed)
  file:
    path: /mnt/services/prometheus
    state: directory
    owner: prometheus
    group: prometheus
    mode: "0750"
  become: true
  tags:
    - prometheus

# The packaged unit runs `/usr/bin/prometheus $ARGS`, sourcing ARGS from
# this file via EnvironmentFile= (which overrides a drop-in Environment=,
# so this is the right knob). Explicit flags override the Debian-patched
# compiled defaults for those keys; console paths etc. stay at package
# defaults. Time-based retention stays at the upstream 15d default -- the
# TSDB is tiny and low-cardinality, so pinning a default-equal value is churn.
#   --web.listen-address  loopback only; nginx is the sole ingress and
#                         the host firewall is the only other guard
#   --storage.tsdb.path   relocate the TSDB onto the snapshotted dataset
#   --storage.tsdb.retention.size  cap TSDB bytes so a runaway-cardinality
#                         exporter can't bloat the ZFS snapshots unbounded --
#                         the only thing on this dataset with no other ceiling
#   --web.external-url    correct self-links generated behind the proxy
#   --log.format          json, matching the fleet's structured journald logs
- name: Configure prometheus server arguments
  when: not (ansible_check_mode and prometheus_apt.changed)
  lineinfile:
    path: /etc/default/prometheus
    regexp: '^ARGS='
    line: >-
      ARGS="--web.listen-address=127.0.0.1:{{ service_ports.prometheus }}
      --storage.tsdb.path=/mnt/services/prometheus
      --storage.tsdb.retention.size=2GB
      --web.external-url=https://prometheus.{{ inventory_hostname }}.{{ domain }}/
      --log.format=json"
    backup: true
    # /etc/default/prometheus is shell-sourced by the unit's EnvironmentFile=,
    # so parse-check the rendered file: a quoting/jinja typo in ARGS fails the
    # converge here instead of crash-looping prometheus on the next restart.
    validate: sh -n %s
  register: prometheus_args
  become: true
  tags:
    - prometheus

- name: Copy the configuration
  when: not (ansible_check_mode and prometheus_apt.changed)
  template:
    src: prometheus.yml.j2
    dest: /etc/prometheus/prometheus.yml
    mode: "0644"
    owner: root
    group: root
    backup: true
    validate: promtool check config %s
  register: prometheus_conf
  become: true
  tags:
    - prometheus

# The packaged unit orders only on network-online.target, but the TSDB
# now lives under /mnt/services (a ZFS dataset on zfs_root hosts). Order
# after the mount so prometheus can't open the TSDB before the dataset
# is mounted (else it writes into the underlying root dir, shadowed once
# ZFS mounts over it), and join zfs_autosnapshot.target so it's quiesced
# around the nightly snapshot -- matching every other /mnt/services
# consumer (roles/redis, minio, mosquitto, ...). An ordering-only change
# is picked up by the helper's daemon-reload, so it doesn't feed restart:.
- name: Install prometheus service override
  import_role:
    name: systemd_unit
    tasks_from: dropin
  vars:
    systemd_unit_args:
      src: override_service.conf.j2
      for: prometheus.service
      condition: "{{ zfs_root }}"
  tags:
    - prometheus

- name: Enable prometheus service
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: prometheus
      condition: "{{ not (ansible_check_mode and prometheus_apt.changed) }}"
      # A binary upgrade or an $ARGS change (listen-address, storage path,
      # external-url) needs a full restart; a config-file-only change is
      # picked up hitlessly via SIGHUP (ExecReload), so reload then.
      restart: "{{ prometheus_apt.changed or prometheus_args.changed }}"
      reload: "{{ prometheus_conf.changed and not (prometheus_apt.changed or prometheus_args.changed) }}"
  tags:
    - prometheus

- name: Configure nginx
  import_role:
    name: nginx
    tasks_from: site
  vars:
    nginx_site_args:
      subdomain: prometheus
      proxy_pass: http://127.0.0.1:{{ service_ports.prometheus }}/
      auth: required
  tags:
    - prometheus
