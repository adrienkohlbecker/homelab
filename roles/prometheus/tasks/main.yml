- name: Install prometheus
  import_role:
    name: apt_no_autostart
    tasks_from: apt
  vars:
    apt_no_autostart_pkg: prometheus
    apt_no_autostart_unit: prometheus.service
    apt_no_autostart_install_recommends: false
  tags:
    - prometheus

- name: Copy the configuration
  template:
    src: prometheus.yml.j2
    dest: /etc/prometheus/prometheus.yml
    mode: "0644"
    owner: root
    group: root
    backup: true
  register: prometheus_conf
  become: true
  tags:
    - prometheus

- name: Enable prometheus service
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_src: prometheus
    systemd_unit_condition: "{{ not (ansible_check_mode and apt_no_autostart.changed) }}"
    systemd_unit_restart: "{{ apt_no_autostart.changed or prometheus_conf.changed }}"
  tags:
    - prometheus

- name: Configure nginx
  import_role:
    name: nginx
    tasks_from: site
  vars:
    nginx_subdomain: prometheus
    nginx_proxy_pass: http://127.0.0.1:9090/
  tags:
    - prometheus
