- name: Install prometheus
  apt:
    pkg:
      - prometheus
    policy_rc_d: 101
    install_recommends: false
    cache_valid_time: 3600
  register: prometheus_apt
  become: true
  tags:
    - prometheus

- name: Copy the configuration
  template:
    src: prometheus.yml.j2
    dest: /etc/prometheus/prometheus.yml
    mode: "0644"
    owner: root
    group: root
    backup: true
  register: prometheus_conf
  become: true
  tags:
    - prometheus

- name: Enable prometheus service
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: prometheus
      condition: "{{ not (ansible_check_mode and prometheus_apt.changed) }}"
      restart: "{{ prometheus_apt.changed or prometheus_conf.changed }}"
  tags:
    - prometheus

- name: Configure nginx
  import_role:
    name: nginx
    tasks_from: site
  vars:
    nginx_site_args:
      subdomain: prometheus
      proxy_pass: http://127.0.0.1:9090/
  tags:
    - prometheus
