# Loopback readiness probe -- /-/ready flips to 200 once the server has
# loaded its config and opened the TSDB. Retries cover cold start.
- name: _verify | Prometheus /-/ready on loopback port
  uri:
    url: http://127.0.0.1:{{ service_ports.prometheus }}/-/ready
  register: _verify_ready
  retries: 30
  delay: 2
  until: _verify_ready.status == 200
  become: true

# Self-scrape target must report healthy -- proves the rendered config
# parsed and the scrape loop is actually running, not just that the
# process is alive. The target starts 'unknown' and flips to 'up' after
# the first scrape (one scrape_interval), so retry until it does.
- name: _verify | Self-scrape target reports healthy
  uri:
    url: http://127.0.0.1:{{ service_ports.prometheus }}/api/v1/targets?state=active
    return_content: true
  register: _verify_targets
  retries: 30
  delay: 2
  until:
    - _verify_targets.status == 200
    - >-
      _verify_targets.json.data.activeTargets
      | selectattr('labels.job', 'eq', 'prometheus')
      | selectattr('health', 'eq', 'up')
      | list | length > 0
  become: true

# When minio is enabled the rendered config adds a second scrape job; assert
# it actually registered as an active target with the right metrics path.
# A configured target is "active" before its first scrape, and the fixture
# has no live MinIO, so assert presence + scrape-URL shape, not health 'up'.
- name: _verify | MinIO scrape target is registered
  when: minio_enabled | default(false)
  vars:
    _verify_minio_targets: >-
      {{ _verify_targets.json.data.activeTargets
         | selectattr('labels.job', 'eq', 'minio')
         | selectattr('scrapeUrl', 'search', '/minio/v2/metrics/cluster$')
         | list }}
  assert:
    that:
      - _verify_minio_targets | length > 0
    fail_msg: >-
      expected an active scrape target job=minio hitting
      /minio/v2/metrics/cluster; active scrape URLs:
      {{ _verify_targets.json.data.activeTargets | map(attribute='scrapeUrl') | list }}
  become: true

# Listen-address must be loopback-only (the service_ports contract + the
# auth model assume nginx is the only ingress). Inspect the actual bind
# rather than probing the routable IP, which the host firewall would
# refuse regardless of bind address -- a false-confidence tautology.
- name: _verify | Capture listening sockets
  command: ss -Htln
  register: _verify_bind
  changed_when: false
  become: true

- name: _verify | Prometheus listens on loopback only
  vars:
    # Local Address:Port is the 4th `ss -Htln` column. Pull every address
    # bound to the prometheus port and assert the only one is loopback --
    # a positive whitelist catches *:PORT / [::]:PORT / a bare :PORT typo
    # that blacklisting just 0.0.0.0:PORT would wave through. The regex is
    # backslash-free on purpose (ansible re-processes \-escapes inside
    # conditionals); [^ ] stands in for \S, the trailing space/end alt for \b.
    _verify_port_addrs: >-
      {{ _verify_bind.stdout
         | regex_findall('([^ ]+):' ~ service_ports.prometheus ~ '(?: |$)')
         | unique | sort }}
  assert:
    that:
      - _verify_port_addrs == ['127.0.0.1']
    fail_msg: >-
      prometheus must listen on 127.0.0.1:{{ service_ports.prometheus }} only;
      addresses bound to the port: {{ _verify_port_addrs }};
      ss reported: {{ _verify_bind.stdout }}
  become: true

# The role's reload: path (SIGHUP via the packaged unit's ExecReload) is the
# one operationally-distinct behavior here -- a config-only change must be
# picked up hitlessly, not restart the process. Exercise it: capture the PID,
# reload (fails loudly if the unit ever loses ExecReload), and assert the
# process survived and the config reloaded cleanly.
- name: _verify | Capture prometheus status before reload
  systemd:
    name: prometheus
  register: _verify_svc_before
  become: true

- name: _verify | Reload prometheus (SIGHUP via ExecReload)
  systemd:
    name: prometheus
    state: reloaded
  register: _verify_svc_after
  become: true

- name: _verify | Query config-reload metric
  uri:
    url: http://127.0.0.1:{{ service_ports.prometheus }}/api/v1/query?query=prometheus_config_last_reload_successful
    return_content: true
  register: _verify_reload_metric
  become: true

- name: _verify | Config reloaded hitlessly (same PID, reload succeeded)
  assert:
    that:
      - _verify_svc_before.status.MainPID | int > 0
      - _verify_svc_after.status.MainPID == _verify_svc_before.status.MainPID
      - _verify_reload_metric.json.data.result[0].value[1] == "1"
    fail_msg: >-
      expected a hitless SIGHUP reload: MainPID before={{ _verify_svc_before.status.MainPID | default('?') }}
      after={{ _verify_svc_after.status.MainPID | default('?') }},
      prometheus_config_last_reload_successful={{ _verify_reload_metric.json.data.result[0].value[1] | default('?') }}
  become: true

# auth:required puts Authelia in front; a cookie-less GET / must land on
# the stub's 302 redirect chain rather than reaching prometheus. Without
# the gate the request would proxy through and return prometheus' 200.
- name: _verify | Authelia gate redirects unauthenticated request
  uri:
    url: https://localhost/
    headers:
      Host: prometheus.{{ inventory_hostname }}.{{ domain }}
    validate_certs: false
    follow_redirects: none
    status_code: 302
  register: _verify_gate
  # Pin the redirect to the Authelia portal host and require the returnUrl
  # to route back to the prometheus vhost -- a bare 'auth.' substring would
  # also accept an unrelated 302 to any URL that merely contains it.
  failed_when: >-
    _verify_gate.status != 302
    or not (_verify_gate.location | default('')).startswith('https://auth.' ~ authelia_cookie_domain ~ '/')
    or ('rd=https://prometheus.' ~ inventory_hostname ~ '.' ~ domain) not in (_verify_gate.location | default(''))
  become: true
