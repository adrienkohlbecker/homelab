- name: _setup | Install podman
  import_role:
    name: podman
    tasks_from: install

- name: _setup | Install nginx
  import_role:
    name: test
    tasks_from: nginx

- name: _setup | Install authelia stub in gate mode for auth=required tests
  import_role:
    name: test
    tasks_from: authelia_stub
  vars:
    test_authelia_stub_args:
      mode: gate

- name: _setup | Create the services dataset mountpoint
  file:
    path: /mnt/services
    state: directory
    mode: "0755"
  become: true
