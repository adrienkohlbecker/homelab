# Join the mosquitto-owned network so z2m can resolve `mosquitto` via
# aardvark-dns. See paperless/tasks/main.yml for the rationale.
- name: Create mosquitto podman network
  when: not ansible_check_mode
  containers.podman.podman_network:
    name: mosquitto
    disable_dns: false
    state: present
  become: true
  tags:
    - z2m

- name: Add z2m group
  group:
    name: z2m
    system: true
  become: true
  tags:
    - z2m

- name: Add z2m user
  user:
    name: z2m
    group: z2m
    createhome: false
    system: true
    shell: /usr/sbin/nologin
    home: /nonexistent
  become: true
  register: z2m_user
  tags:
    - z2m

- name: Create configuration directory
  when: not (ansible_check_mode and z2m_user.changed)
  file:
    dest: /mnt/services/z2m
    state: directory
    owner: z2m
    group: z2m
    mode: "0755"
  become: true
  tags:
    - z2m

- name: Configure z2m
  template:
    src: configuration_generated.yaml.j2
    dest: /mnt/services/z2m/configuration.yaml
    owner: z2m
    group: z2m
    mode: "0644"
    backup: true
  register: z2m_conf
  become: true
  tags:
    - z2m

- name: Check if devices.yaml exists
  stat:
    path: /mnt/services/z2m/devices.yaml
  register: z2m_devices_check
  become: true
  tags:
    - z2m

- name: Configure z2m devices
  when: not z2m_devices_check.stat.exists
  copy:
    src: devices.yaml
    dest: /mnt/services/z2m/devices.yaml
    owner: z2m
    group: z2m
    mode: "0644"
    backup: true
  register: z2m_devices
  become: true
  tags:
    - z2m

# Per-device tilt-null override for covers. See patch_cover_tilt.py for
# why the global `device_options.homeassistant.cover` block in
# configuration.yaml is not enough.
- name: Patch cover devices to suppress phantom tilt_* in HA discovery
  ansible.builtin.script:
    cmd: patch_cover_tilt.py '{{ z2m_cover_friendly_name_pattern }}' /mnt/services/z2m/devices.yaml
  register: z2m_cover_patch
  changed_when: "'CHANGED' in z2m_cover_patch.stdout"
  become: true
  tags:
    - z2m

# Converge devices.yaml ownership — z2m writes back to it at runtime and
# any prior root-owned state (e.g. from the first patch_cover_tilt run
# before it preserved uid/gid) would break container startup with EACCES.
- name: Ensure devices.yaml ownership
  file:
    path: /mnt/services/z2m/devices.yaml
    owner: z2m
    group: z2m
    mode: "0644"
  register: z2m_devices_perms
  become: true
  tags:
    - z2m

- name: Check if groups.yaml exists
  stat:
    path: /mnt/services/z2m/groups.yaml
  register: z2m_groups_check
  become: true
  tags:
    - z2m

- name: Configure z2m groups
  when: not z2m_groups_check.stat.exists
  copy:
    src: groups.yaml
    dest: /mnt/services/z2m/groups.yaml
    owner: z2m
    group: z2m
    mode: "0644"
    backup: true
  register: z2m_groups
  become: true
  tags:
    - z2m

- name: Configure z2m secrets
  template:
    src: secret.yaml.j2
    dest: /mnt/services/z2m/secret.yaml
    owner: z2m
    group: z2m
    mode: "0600"
    backup: true
  register: z2m_secret
  become: true
  tags:
    - z2m

- name: Install z2m service
  import_role:
    name: systemd_unit
    tasks_from: install
  vars:
    systemd_unit_args:
      src: z2m.service.j2
      condition: "{{ not (ansible_check_mode and z2m_user.changed) }}"
  tags:
    - z2m

- name: Enable z2m service
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: z2m
      condition: "{{ not (ansible_check_mode and (systemd_unit.changed or z2m_user.changed)) }}"
      restart: "{{ systemd_unit.changed or z2m_conf.changed or z2m_secret.changed or z2m_devices.changed or z2m_cover_patch.changed or z2m_devices_perms.changed or z2m_groups.changed }}"
      start: "{{ z2m_start_service }}"
  tags:
    - z2m

- name: Configure nginx
  import_role:
    name: nginx
    tasks_from: site
  vars:
    nginx_site_args:
      subdomain: z2m
      proxy_pass: http://localhost:8081/
      auth: required
  tags:
    - z2m
