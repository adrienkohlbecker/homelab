- name: Assert required z2m inputs
  assert:
    that:
      - z2m_network_key is defined
      - z2m_network_key | length > 0
      - mosquitto_accounts.z2m.password is defined
      - external_ips.tubeszb is defined
    fail_msg: >-
      z2m requires z2m_network_key, mosquitto_accounts.z2m.password,
      and external_ips.tubeszb.
  tags:
    - z2m

- name: Compute whether z2m can start on this host
  set_fact:
    z2m_should_start: "{{ (z2m_start_service | bool) and not (qemu_test | bool) }}"
  tags:
    - z2m

# Join the mosquitto-owned network so z2m can resolve `mosquitto.dns.podman`
# via aardvark-dns. See mosquitto/tasks/main.yml for the rationale.
- name: Create mosquitto podman network
  when: not ansible_check_mode
  containers.podman.podman_network:
    name: mosquitto
    disable_dns: false
    state: present
  become: true
  tags:
    - z2m

- name: Set up z2m system user, group, and config dir
  import_role:
    name: service_user
    tasks_from: user
  vars:
    service_user_args:
      name: z2m
  tags:
    - z2m

- name: Configure z2m
  template:
    src: configuration_generated.yaml.j2
    dest: /mnt/services/z2m/configuration.yaml
    owner: z2m
    group: z2m
    mode: "0644"
    backup: true
    # The generated config round-trips through to_nice_yaml + a list re-indent
    # regex; parse the rendered file so a quoting/indent break fails the
    # converge instead of surfacing as a failed container start. The multi-
    # constructor swallows z2m's `!secret.yaml` tags (resolved at runtime).
    validate: >-
      python3 -c 'import yaml,sys;
      yaml.add_multi_constructor("!", lambda l,s,n: None, yaml.SafeLoader);
      yaml.safe_load(open(sys.argv[1]))' %s
  register: z2m_conf
  become: true
  tags:
    - z2m

- name: Seed z2m devices
  copy:
    src: devices.yaml
    dest: /mnt/services/z2m/devices.yaml
    owner: z2m
    group: z2m
    mode: "0644"
    force: false
    backup: true
  register: z2m_devices
  become: true
  tags:
    - z2m

# Per-device tilt-null override for covers. See patch_cover_tilt.py for
# why the global `device_options.homeassistant.cover` block in
# configuration.yaml is not enough.
- name: Patch cover devices to suppress phantom tilt_* in HA discovery
  ansible.builtin.script:
    cmd: patch_cover_tilt.py '{{ z2m_cover_friendly_name_pattern }}' /mnt/services/z2m/devices.yaml
  register: z2m_cover_patch
  changed_when: "'CHANGED' in z2m_cover_patch.stdout"
  become: true
  tags:
    - z2m

# Converge devices.yaml ownership — z2m writes back to it at runtime and
# any prior root-owned state (e.g. from the first patch_cover_tilt run
# before it preserved uid/gid) would break container startup with EACCES.
# In check mode where the seed copy above didn't actually write the
# file, the file: state: file probe complains "file is absent" -- skip
# in that bootstrap window. Real applies hit the file by the time we
# get here.
- name: Ensure devices.yaml ownership
  when: not (ansible_check_mode and z2m_devices.changed)
  file:
    path: /mnt/services/z2m/devices.yaml
    owner: z2m
    group: z2m
    mode: "0644"
  register: z2m_devices_perms
  become: true
  tags:
    - z2m

- name: Configure z2m secrets
  template:
    src: secret.yaml.j2
    dest: /mnt/services/z2m/secret.yaml
    owner: z2m
    group: z2m
    mode: "0600"
    backup: true
    validate: python3 -c 'import yaml,sys; yaml.safe_load(open(sys.argv[1]))' %s
  register: z2m_secret
  become: true
  tags:
    - z2m

- name: Install z2m service
  import_role:
    name: systemd_unit
    tasks_from: install
  vars:
    systemd_unit_args:
      src: z2m.service.j2
      condition: "{{ not (ansible_check_mode and z2m_user.changed) }}"
  tags:
    - z2m

- name: Pull z2m image
  containers.podman.podman_image:
    name: "{{ z2m_image }}"
  register: z2m_image_pull
  retries: 3
  delay: 10
  until: z2m_image_pull is not failed
  become: true
  tags:
    - z2m

# z2m_devices.changed only fires on the first converge (the seed copy is
# force: false; z2m owns devices.yaml at runtime thereafter), so a later
# operator edit to devices.yaml does NOT bounce the mesh -- runtime content
# changes flow through z2m_cover_patch / z2m_devices_perms instead.
- name: Enable z2m service
  import_role:
    name: systemd_unit
    tasks_from: service
  vars:
    systemd_unit_args:
      src: z2m
      condition: "{{ not (ansible_check_mode and (z2m_service_result.changed or z2m_user.changed)) }}"
      restart: "{{ z2m_service_result.changed or z2m_conf.changed or z2m_secret.changed or z2m_devices.changed or z2m_cover_patch.changed or z2m_devices_perms.changed }}"
      start: "{{ z2m_should_start }}"
  tags:
    - z2m

- name: Configure nginx
  import_role:
    name: nginx
    tasks_from: site
  vars:
    nginx_site_args:
      subdomain: z2m
      proxy_pass: http://127.0.0.1:{{ service_ports.z2m }}/
      auth: required
      # The WindFront UI pulls device images from zigbee2mqtt.io and device
      # docs (markdown) from raw.githubusercontent.com; widen img-src/connect-src
      # past default-src so the browser does not block them.
      csp_additional: >-
        img-src https://www.zigbee2mqtt.io {{ nginx_csp_default }};
        connect-src https://raw.githubusercontent.com {{ nginx_csp_default }}
  tags:
    - z2m
