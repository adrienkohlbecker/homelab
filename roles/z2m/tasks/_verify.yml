- name: _verify | Config directory exists with correct ownership
  stat:
    path: /mnt/services/z2m
  register: z2m_verify_dir
  become: true
  failed_when: >-
    not z2m_verify_dir.stat.exists
    or not z2m_verify_dir.stat.isdir
    or z2m_verify_dir.stat.pw_name != 'z2m'
    or z2m_verify_dir.stat.gr_name != 'z2m'

- name: _verify | Config file is valid YAML with expected keys
  shell: |
    set -euo pipefail
    python3 -c '
    import yaml, sys
    yaml.add_multi_constructor("!", lambda l,s,n: None, Loader=yaml.SafeLoader)
    d = yaml.safe_load(open(sys.argv[1]))
    for k in ("homeassistant", "frontend", "mqtt", "serial", "advanced"):
        assert k in d, f"missing top-level key: {k}"
    assert d["advanced"].get("enable_external_js") is False, "enable_external_js must be false"
    ' /mnt/services/z2m/configuration.yaml
  args:
    executable: /bin/bash
  become: true
  changed_when: false

- name: _verify | Secret file exists with restrictive permissions
  stat:
    path: /mnt/services/z2m/secret.yaml
  register: z2m_verify_secret
  become: true
  failed_when: >-
    not z2m_verify_secret.stat.exists
    or z2m_verify_secret.stat.mode != '0600'
    or z2m_verify_secret.stat.pw_name != 'z2m'

- name: _verify | Secret file contains required keys
  shell: |
    set -euo pipefail
    python3 -c '
    import yaml, sys
    d = yaml.safe_load(open(sys.argv[1]))
    for k in ("network_key", "mqtt_user", "mqtt_password"):
        assert k in d, f"missing secret key: {k}"
    ' /mnt/services/z2m/secret.yaml
  args:
    executable: /bin/bash
  become: true
  changed_when: false

- name: _verify | Devices file is valid YAML owned by z2m
  stat:
    path: /mnt/services/z2m/devices.yaml
  register: z2m_verify_devices
  become: true
  failed_when: >-
    not z2m_verify_devices.stat.exists
    or z2m_verify_devices.stat.pw_name != 'z2m'

# patch_cover_tilt.py is the role's one piece of real logic and the live
# frontend probes that would exercise covers are gated off in CI -- so prove
# the patcher itself here against a throwaway fixture (a cover whose
# friendly_name matches the role's real pattern). Asserts it injects the
# tilt-null override on the first pass and is a no-op on the second.
- name: _verify | Seed a fixture cover device for the tilt patcher
  copy:
    dest: /tmp/z2m_patch_fixture.yaml
    content: |
      "0x00124b00ffffffff":
        friendly_name: testroom/shutter
    mode: "0644"
  become: true

- name: _verify | Run the cover patch on the fixture (first pass mutates)
  script:
    cmd: patch_cover_tilt.py '{{ z2m_cover_friendly_name_pattern }}' /tmp/z2m_patch_fixture.yaml
  register: z2m_verify_patch
  changed_when: false
  become: true

- name: _verify | Run the cover patch again (second pass is idempotent)
  script:
    cmd: patch_cover_tilt.py '{{ z2m_cover_friendly_name_pattern }}' /tmp/z2m_patch_fixture.yaml
  register: z2m_verify_patch_again
  changed_when: false
  become: true

- name: _verify | Tilt-null override landed in the patched fixture
  shell: |
    set -euo pipefail
    python3 -c '
    import yaml, sys
    cov = yaml.safe_load(open(sys.argv[1]))["0x00124b00ffffffff"]["homeassistant"]["cover"]
    for k in ("tilt_status_topic", "tilt_status_template", "tilt_command_topic"):
        assert k in cov and cov[k] is None, f"{k} not null: {cov.get(k)!r}"
    ' /tmp/z2m_patch_fixture.yaml
  args:
    executable: /bin/bash
  changed_when: false
  become: true

- name: _verify | Patcher reported mutate-then-idempotent
  assert:
    that:
      - "'CHANGED' in z2m_verify_patch.stdout"
      - "'OK' in z2m_verify_patch_again.stdout"
    fail_msg: >-
      patch_cover_tilt.py did not report CHANGED on the first pass then OK on
      the second (got {{ z2m_verify_patch.stdout | trim }} /
      {{ z2m_verify_patch_again.stdout | trim }}).

- name: _verify | Remove the tilt-patcher fixture
  file:
    path: /tmp/z2m_patch_fixture.yaml
    state: absent
  become: true

- name: _verify | Service unit is installed and enabled
  systemd:
    name: z2m
  register: z2m_verify_unit
  become: true
  failed_when: >-
    z2m_verify_unit.status.UnitFileState != 'enabled'

- name: _verify | Nginx vhost is installed
  stat:
    path: /etc/nginx/sites-enabled/z2m
  register: z2m_verify_vhost
  become: true
  failed_when: not z2m_verify_vhost.stat.exists

# SNI follows the URL host, not the Host header, so probing https://localhost/
# with a Host: override trips TLSV1_UNRECOGNIZED_NAME on openssl 3.x. Map the
# vhost FQDN to loopback and probe it directly so SNI and Host both carry z2m's
# server_name.
- name: _verify | Map the z2m vhost to loopback for SNI-correct probing
  lineinfile:
    path: /etc/hosts
    line: "127.0.0.1 z2m.{{ inventory_hostname }}.{{ domain }}"
    state: present
  become: true

# The vhost is `auth: required`, so the browser path goes through Authelia.
# A cookieless GET must redirect to the portal -- the only probe that fails if
# `auth: required` is dropped from nginx_site_args. The returnUrl (rd=) echoing
# z2m's own URL proves the request routed to z2m's server_name, not the default
# vhost.
- name: _verify | Z2M UI gate redirects unauthenticated requests to Authelia
  uri:
    url: https://z2m.{{ inventory_hostname }}.{{ domain }}/
    validate_certs: false
    follow_redirects: none
    status_code: 302
  register: z2m_verify_gate
  failed_when: >-
    z2m_verify_gate.status != 302
    or 'auth.' not in (z2m_verify_gate.location | default(''))
    or ('rd=https://z2m.' ~ inventory_hostname ~ '.' ~ domain) not in (z2m_verify_gate.location | default(''))

# These two only run on a host with a real Zigbee coordinator: z2m serves the
# frontend only after the serial adapter connects, so it can't reach `healthy`
# under qemu. They stay gated and skip in CI; the config/unit/nginx/auth checks
# above are the coverage there.
- name: _verify | Z2M is active and healthy
  when: (z2m_start_service | bool) and not (qemu_test | bool)
  shell: |
    set -euo pipefail
    systemctl is-active z2m
  args:
    executable: /bin/bash
  become: true
  register: z2m_verify_active
  retries: 30
  delay: 2
  until: z2m_verify_active.rc == 0
  changed_when: false

- name: _verify | Z2M frontend responds on loopback
  when: (z2m_start_service | bool) and not (qemu_test | bool)
  uri:
    url: http://localhost:{{ service_ports.z2m }}/
    status_code: 200
  register: z2m_verify_http
  retries: 30
  delay: 2
  until: z2m_verify_http.status == 200
  become: true
