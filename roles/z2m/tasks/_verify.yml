- name: _verify | Config directory exists with correct ownership
  stat:
    path: /mnt/services/z2m
  register: z2m_verify_dir
  become: true
  failed_when: >-
    not z2m_verify_dir.stat.exists
    or not z2m_verify_dir.stat.isdir
    or z2m_verify_dir.stat.pw_name != 'z2m'
    or z2m_verify_dir.stat.gr_name != 'z2m'

- name: _verify | Config file is valid YAML with expected keys
  shell: |
    set -euo pipefail
    python3 -c '
    import yaml, sys
    yaml.add_multi_constructor("!", lambda l,s,n: None, Loader=yaml.SafeLoader)
    d = yaml.safe_load(open(sys.argv[1]))
    for k in ("homeassistant", "frontend", "mqtt", "serial", "advanced"):
        assert k in d, f"missing top-level key: {k}"
    assert d["advanced"].get("enable_external_js") is False, "enable_external_js must be false"
    ' /mnt/services/z2m/configuration.yaml
  args:
    executable: /bin/bash
  become: true
  changed_when: false

- name: _verify | Secret file exists with restrictive permissions
  stat:
    path: /mnt/services/z2m/secret.yaml
  register: z2m_verify_secret
  become: true
  failed_when: >-
    not z2m_verify_secret.stat.exists
    or z2m_verify_secret.stat.mode != '0600'
    or z2m_verify_secret.stat.pw_name != 'z2m'

- name: _verify | Secret file contains required keys
  shell: |
    set -euo pipefail
    python3 -c '
    import yaml, sys
    d = yaml.safe_load(open(sys.argv[1]))
    for k in ("network_key", "mqtt_user", "mqtt_password", "pan_id", "ext_pan_id"):
        assert k in d, f"missing secret key: {k}"
    ' /mnt/services/z2m/secret.yaml
  args:
    executable: /bin/bash
  become: true
  changed_when: false

- name: _verify | Devices file is valid YAML owned by z2m
  stat:
    path: /mnt/services/z2m/devices.yaml
  register: z2m_verify_devices
  become: true
  failed_when: >-
    not z2m_verify_devices.stat.exists
    or z2m_verify_devices.stat.pw_name != 'z2m'

- name: _verify | Groups file is valid YAML owned by z2m
  stat:
    path: /mnt/services/z2m/groups.yaml
  register: z2m_verify_groups
  become: true
  failed_when: >-
    not z2m_verify_groups.stat.exists
    or z2m_verify_groups.stat.pw_name != 'z2m'

- name: _verify | Service unit is installed and enabled
  systemd:
    name: z2m
  register: z2m_verify_unit
  become: true
  failed_when: >-
    z2m_verify_unit.status.UnitFileState != 'enabled'

- name: _verify | Nginx vhost is installed
  stat:
    path: /etc/nginx/sites-enabled/z2m
  register: z2m_verify_vhost
  become: true
  failed_when: not z2m_verify_vhost.stat.exists

# SNI follows the URL host, not the Host header, so probing https://localhost/
# with a Host: override trips TLSV1_UNRECOGNIZED_NAME on openssl 3.x. Map the
# vhost FQDN to loopback and probe it directly so SNI and Host both carry z2m's
# server_name.
- name: _verify | Map the z2m vhost to loopback for SNI-correct probing
  lineinfile:
    path: /etc/hosts
    line: "127.0.0.1 z2m.{{ inventory_hostname }}.{{ domain }}"
    state: present
  become: true

# The vhost is `auth: required`, so the browser path goes through Authelia.
# A cookieless GET must redirect to the portal -- the only probe that fails if
# `auth: required` is dropped from nginx_site_args. The returnUrl (rd=) echoing
# z2m's own URL proves the request routed to z2m's server_name, not the default
# vhost.
- name: _verify | Z2M UI gate redirects unauthenticated requests to Authelia
  uri:
    url: https://z2m.{{ inventory_hostname }}.{{ domain }}/
    validate_certs: false
    follow_redirects: none
    status_code: 302
  register: z2m_verify_gate
  failed_when: >-
    z2m_verify_gate.status != 302
    or 'auth.' not in (z2m_verify_gate.location | default(''))
    or ('rd=https://z2m.' ~ inventory_hostname ~ '.' ~ domain) not in (z2m_verify_gate.location | default(''))

# These two only run on a host with a real Zigbee coordinator (z2m_start_service
# true): z2m serves the frontend only after the serial adapter connects, so it
# can't reach `healthy` under qemu. They stay gated and skip in CI -- the
# config/unit/nginx/auth checks above are the coverage there.
- name: _verify | Z2M is active and healthy
  when: z2m_start_service
  shell: |
    set -euo pipefail
    systemctl is-active z2m
  args:
    executable: /bin/bash
  become: true
  register: z2m_verify_active
  retries: 30
  delay: 2
  until: z2m_verify_active.rc == 0
  changed_when: false

- name: _verify | Z2M frontend responds on loopback
  when: z2m_start_service
  uri:
    url: http://localhost:{{ service_ports.z2m }}/
    status_code: 200
  register: z2m_verify_http
  retries: 30
  delay: 2
  until: z2m_verify_http.status == 200
  become: true
