[env]
CLOUDFLARE_API_TOKEN = "op://Lab/seckvi7vjb6ahgtt7w4l3r73zq/password"
NEXUS_USERNAME = "op://Lab/u2lem3tvichptsn37new73ftv4/username"
NEXUS_PASSWORD = "op://Lab/u2lem3tvichptsn37new73ftv4/password"
# MinIO creds for the tofu s3 backend (state in bucket "terraform" on minio-api.lab.fahm.fr).
AWS_ACCESS_KEY_ID     = "op://Lab/iiis755ps5mhhlpmcv25lrctgu/username"
AWS_SECRET_ACCESS_KEY = "op://Lab/iiis755ps5mhhlpmcv25lrctgu/password"
# Tofu client-side state encryption: feeds var.state_passphrase in main.tf
# via the standard TF_VAR_<name> env mechanism. op run substitutes the
# op:// reference at exec time, so the passphrase only ever materializes
# inside the wrapped tofu process.
TF_VAR_state_passphrase = "op://Lab/vztgbtb2i3nlgrift46fc7r4f4/password"
# Expose [vars] entries as env so file-based mise-tasks/ scripts can read
# them (mise vars are tera-expanded into toml `run` strings only). Toml
# tasks still reference `{{vars.X}}`; both forms resolve to the same value.
QEMU_DIR = '{{vars.qemu_dir}}'
ZBM_VERSION = "3.1.0"

[tools]
opentofu = "1.11.6"
packer = "1.15.3"
python = "3.14"
uv = "0.9.26"
shellcheck = "0.11.0"
shfmt = "3.13.1"
tflint = "0.62.0"
typos = "1.46.0"

[settings]
python.uv_venv_auto = "create|source"

[tasks."packer:init"]
description = "packer init (forwards args)"
dir = "{{config_root}}/packer"
run = 'packer init "$@" .'

[tasks."packer:clean"]
description = "Remove leftover tmpdirs from failed packer builds and test-harness runs"
run = 'rm -rf "{{vars.qemu_dir}}"/.build-* "{{vars.qemu_dir}}"/tmp*'

[tasks.lint]
description = "Run all linters"
depends = [
  "lint:ansible",
  "lint:terraform",
  "lint:tflint",
  "lint:packer",
  "lint:packer-validate",
  "lint:python",
  "lint:ruff",
  "lint:yaml",
  "lint:shell",
  "lint:shfmt",
  "lint:typos",
  "ci:lint-test-matrix",
]

[tasks."lint:ansible"]
description = "Run ansible-lint"
run = "ansible-lint"

[tasks."lint:terraform"]
description = "Check Terraform formatting"
run = "tofu fmt -check -recursive terraform"

[tasks."lint:tflint"]
description = "Run tflint static analysis"
dir = "{{config_root}}/terraform"
run = "tflint"

[tasks."lint:packer"]
description = "Check Packer formatting"
run = "packer fmt -check -recursive packer"

[tasks."lint:packer-validate"]
description = "Validate Packer template syntax"
dir = "{{config_root}}/packer"
run = "packer validate -syntax-only ."

[tasks."lint:python"]
description = "Check Python formatting (black)"
run = "black --check ."

[tasks."lint:ruff"]
description = "Run ruff Python linter"
run = "ruff check ."

[tasks."lint:yaml"]
description = "Run yamllint on tracked YAML files"
run = "git ls-files -z '*.yml' '*.yaml' | xargs -0 yamllint"

[tasks."lint:shell"]
description = "Run shellcheck on tracked shell scripts"
run = "git ls-files -z '*.sh' 'mise-tasks/**' | xargs -0 shellcheck"

[tasks."lint:shfmt"]
description = "Check shell script formatting (shfmt)"
run = "git ls-files -z '*.sh' 'mise-tasks/**' | xargs -0 shfmt -i 2 -d"

[tasks."lint:typos"]
description = "Run typos checker"
run = "typos"

[tasks.test]
description = "Run Python unit tests (pytest)"
run = "uv run pytest"

[tasks.fmt]
description = "Apply all formatters"
depends = [
  "fmt:ansible",
  "fmt:terraform",
  "fmt:packer",
  "fmt:python",
  "fmt:mise",
  "fmt:shfmt",
]

[tasks."fmt:ansible"]
description = "Apply ansible-lint fixes"
run = "ansible-lint --fix"

[tasks."fmt:terraform"]
description = "Format Terraform files"
run = "tofu fmt -recursive terraform"

[tasks."fmt:packer"]
description = "Format Packer files"
run = "packer fmt -recursive packer"

[tasks."fmt:python"]
description = "Format Python files (black)"
run = "black ."

[tasks."fmt:mise"]
description = "Format mise.toml"
run = "mise fmt"

[tasks."fmt:shfmt"]
description = "Format shell scripts (shfmt)"
run = "git ls-files -z '*.sh' 'mise-tasks/**' | xargs -0 shfmt -i 2 -w"

[tasks."tf"]
description = "tofu (forwards subcommand + args)"
dir = "{{config_root}}/terraform"
run = 'op run -- tofu "$@"'

[tasks."ansible"]
description = "ansible-playbook against site.yml (forwards args)"
run = 'ansible-playbook site.yml "$@"'

# mise's inline `run` doesn't bind positional args to $1/$@ — it appends
# them as literal text to the script's last line. Declare `usage` so args
# come through as $usage_<name> env vars (same mechanism as file-based
# tasks with #USAGE).
#
# The populate step (packer/artifacts symlink + .worktreeinclude copies +
# mise trust) is factored into mise-tasks/worktree/populate so the same
# logic runs from Claude Code's WorktreeCreate hook (.claude/settings.json).
[tasks."worktree:add"]
description = "Create .worktrees/<name>, populate shared state, mise trust, open VS Code"
usage = '''
arg "<name>" help="Branch and worktree name"
arg "[base]" default="HEAD" help="Base commit-ish"
'''
run = '''
set -euo pipefail
repo=$(git -C "{{config_root}}" worktree list --porcelain | awk '/^worktree / {print $2; exit}')
wt="$repo/.worktrees/$usage_name"
git -C "$repo" worktree add -b "$usage_name" "$wt" "$usage_base"
"$repo/mise-tasks/worktree/populate" "$wt"
code --new-window "$wt"
'''

[tasks."worktree:rm"]
description = "Remove a worktree and delete its branch"
usage = 'arg "<name>" help="Branch and worktree name"'
run = '''
set -euo pipefail
repo=$(git -C "{{config_root}}" worktree list --porcelain | awk '/^worktree / {print $2; exit}')
git -C "$repo" worktree remove "$repo/.worktrees/$usage_name"
git -C "$repo" branch -D "$usage_name" 2>/dev/null || true
'''

# Rebases <name> onto master first so the FF-only merge succeeds even if
# master has moved since the worktree was branched. Conflicts halt the
# script with set -e — the worktree is left in mid-rebase for resolution,
# rm doesn't run. Operates from the main worktree so that worktree:rm
# removing the caller's cwd (if invoked from inside the worktree being
# merged) doesn't strand the rest of the script.
[tasks."worktree:merge"]
description = "Rebase <name> onto master, fast-forward master, then worktree:rm <name>"
usage = 'arg "<name>" help="Branch and worktree name"'
run = '''
set -euo pipefail
repo=$(git -C "{{config_root}}" worktree list --porcelain | awk '/^worktree / {print $2; exit}')
cd "$repo"
wt=".worktrees/$usage_name"
[ -d "$wt" ] || { echo "worktree:merge: $wt not found" >&2; exit 1; }
main_branch=$(git rev-parse --abbrev-ref HEAD)
[ "$main_branch" = "master" ] || { echo "worktree:merge: main worktree on '$main_branch', expected master" >&2; exit 1; }
git -C "$wt" rebase master
git merge --ff-only "$usage_name"
mise run worktree:rm "$usage_name"
'''

[tasks."worktree:ls"]
description = "List active git worktrees"
run = "git worktree list"
