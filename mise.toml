[vars]
qemu_dir = '{% if os() == "macos" %}{{config_root}}/packer/artifacts{% else %}/mnt/scratch/qemu{% endif %}'

[env]
CLOUDFLARE_API_TOKEN = "op://Lab/seckvi7vjb6ahgtt7w4l3r73zq/password"
NEXUS_USERNAME = "op://Lab/u2lem3tvichptsn37new73ftv4/username"
NEXUS_PASSWORD = "op://Lab/u2lem3tvichptsn37new73ftv4/password"
# MinIO creds for the tofu s3 backend (state in bucket "terraform" on minio-api.lab.fahm.fr).
AWS_ACCESS_KEY_ID     = "op://Lab/iiis755ps5mhhlpmcv25lrctgu/username"
AWS_SECRET_ACCESS_KEY = "op://Lab/iiis755ps5mhhlpmcv25lrctgu/password"
# Tofu client-side state encryption: feeds var.state_passphrase in main.tf
# via the standard TF_VAR_<name> env mechanism. op run substitutes the
# op:// reference at exec time, so the passphrase only ever materializes
# inside the wrapped tofu process.
TF_VAR_state_passphrase = "op://Lab/vztgbtb2i3nlgrift46fc7r4f4/password"
# Dedicated fine-grained GitHub PAT (no scopes) pushed by terraform to
# the MISE_GITHUB_TOKEN repo secret -- raises mise's anon 60/hr API
# rate limit during the ci-image workflow's `mise install`
# step. See terraform/github.tf for the rotation path.
TF_VAR_mise_github_token = "op://Lab/zs75mteaj6dk422zta2zpbuaki/password"
TF_VAR_google_idp_client_id = "op://Lab/7vvqblbfyep2yb7lxi544dy22a/username"
TF_VAR_google_idp_client_secret = "op://Lab/7vvqblbfyep2yb7lxi544dy22a/password"
# Gandi Personal Access Token -- minted in Gandi UI under Account >
# Personal Access Tokens, scoped to the organization owning fahm.fr /
# mhaf.fr / adrienkohlbecker.com. The old Gandi API key was retired
# in 2024 so PAT is the only auth path.
TF_VAR_gandi_pat = "op://Lab/s5a2q2hlq5vudnvhydhcbmb3da/password"
# Mailgun Private API key -- minted in the Mailgun UI under Send >
# Sending > Domain settings > API Keys (account-scoped, not per-domain).
# Used by the mailgun provider for domain + per-key management; never
# exposed to CI (the CI sending key is minted as a separate mailgun_api_key
# resource, see terraform/mailgun.tf). Create the 1P item once
# (item: "Mailgun API", field "password") then update the item-id below.
TF_VAR_mailgun_api_key = "op://Lab/j6iayri7rcsq27nym5z7u37jgu/password"
# Expose [vars] entries as env so file-based mise-tasks/ scripts can read
# them (mise vars are tera-expanded into toml `run` strings only). Toml
# tasks still reference `{{vars.X}}`; both forms resolve to the same value.
QEMU_DIR = '{{vars.qemu_dir}}'
ZBM_VERSION = "3.1.0"
# Home Assistant long-lived access token -- consumed by mise-tasks/ha/sync
# to call /api/services/<domain>/reload after pushing the GUI YAML. Minted
# in HA UI under Profile > Security > Long-Lived Access Tokens. The
# script re-execs under `op run --` to substitute the op:// reference;
# without that wrapping mise would export the literal string and HA
# would reject it as a bad bearer.
HA_API_TOKEN = "op://Lab/pfcoggyhvncfnr6rt6p5zbnuja/password"

[tools]
opentofu = "1.11.6"
packer = "1.15.3"
python = "3.14"
uv = "0.9.26"
shellcheck = "0.11.0"
shfmt = "3.13.1"
tflint = "0.62.0"
typos = "1.46.0"

[settings]
python.uv_venv_auto = "create|source"

[tasks."packer:init"]
description = "packer init (forwards args)"
dir = "{{config_root}}/packer"
run = 'packer init "$@" .'

[tasks."packer:clean"]
description = "Remove leftover tmpdirs from failed packer builds and test-harness runs"
run = 'rm -rf "{{vars.qemu_dir}}"/.build-* "{{vars.qemu_dir}}"/tmp*'

[tasks.lint]
description = "Run all linters"
depends = [
  "lint:ansible",
  "lint:terraform",
  "lint:tflint",
  "lint:packer",
  "lint:packer-validate",
  "lint:python",
  "lint:ruff",
  "lint:yaml",
  "lint:shell",
  "lint:shfmt",
  "lint:typos",
  "lint:test-meta",
  "lint:topology",
]

[tasks."lint:ansible"]
description = "Run ansible-lint"
run = "ansible-lint"

[tasks."lint:terraform"]
description = "Check Terraform formatting"
run = "tofu fmt -check -recursive terraform"

[tasks."lint:tflint"]
description = "Run tflint static analysis"
dir = "{{config_root}}/terraform"
run = "tflint"

[tasks."lint:packer"]
description = "Check Packer formatting"
run = "packer fmt -check -recursive packer"

[tasks."lint:packer-validate"]
description = "Validate Packer template syntax"
dir = "{{config_root}}/packer"
run = "packer validate -syntax-only ."

[tasks."lint:python"]
description = "Check Python formatting (black)"
run = "black --check ."

[tasks."lint:ruff"]
description = "Run ruff Python linter"
run = "ruff check ."

[tasks."lint:yaml"]
description = "Run yamllint on tracked YAML files"
run = "git ls-files -z '*.yml' '*.yaml' | xargs -0 yamllint"

[tasks."lint:shell"]
description = "Run shellcheck on tracked shell scripts"
run = "git ls-files -z '*.sh' 'mise-tasks/**' | xargs -0 shellcheck"

[tasks."lint:shfmt"]
description = "Check shell script formatting (shfmt)"
run = "git ls-files -z '*.sh' 'mise-tasks/**' | xargs -0 shfmt -i 2 -d"

[tasks."lint:typos"]
description = "Run typos checker"
run = "typos"

[tasks."lint:topology"]
description = "Validate data/network_topology.yml against its JSON Schema"
run = "uvx check-jsonschema --schemafile data/network_topology.schema.json data/network_topology.yml"

[tasks.test]
description = "Run Python unit tests (pytest)"
run = "uv run pytest"

[tasks.fmt]
description = "Apply all formatters"
depends = [
  "fmt:ansible",
  "fmt:terraform",
  "fmt:packer",
  "fmt:python",
  "fmt:mise",
  "fmt:shfmt",
]

[tasks."fmt:ansible"]
description = "Apply ansible-lint fixes"
run = "ansible-lint --fix"

[tasks."fmt:terraform"]
description = "Format Terraform files"
run = "tofu fmt -recursive terraform"

[tasks."fmt:packer"]
description = "Format Packer files"
run = "packer fmt -recursive packer"

[tasks."fmt:python"]
description = "Format Python files (black)"
run = "black ."

[tasks."fmt:mise"]
description = "Format mise.toml"
run = "mise fmt"

[tasks."fmt:shfmt"]
description = "Format shell scripts (shfmt)"
run = "git ls-files -z '*.sh' 'mise-tasks/**' | xargs -0 shfmt -i 2 -w"

[tasks."tf"]
description = "tofu (forwards subcommand + args)"
dir = "{{config_root}}/terraform"
run = 'op run -- tofu "$@"'

[tasks."ansible"]
description = "ansible-playbook against site.yml (forwards args)"
run = 'ansible-playbook site.yml "$@"'

[tasks."ansible:wireguard"]
description = "ansible-playbook against wireguard.yml (forwards args)"
run = 'ansible-playbook wireguard.yml "$@"'

[tasks."ansible:bunk"]
description = "ansible-playbook against bunk.yml (forwards args)"
run = 'ansible-playbook bunk.yml "$@"'

# worktree:add / worktree:rm / worktree:merge live under mise-tasks/worktree/
# so shellcheck and shfmt cover them. The populate helper is factored out
# separately so Claude Code's WorktreeCreate hook can call it directly.

[tasks."worktree:ls"]
description = "List active git worktrees"
alias = "wt:ls"
run = "git worktree list"
