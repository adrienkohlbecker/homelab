[vars]
packer_flags = "-timestamp-ui -warn-on-undeclared-var --on-error=ask"

[env]
CLOUDFLARE_EMAIL="op://Lab/seckvi7vjb6ahgtt7w4l3r73zq/username"
CLOUDFLARE_API_KEY="op://Lab/seckvi7vjb6ahgtt7w4l3r73zq/password"
NEXUS_USERNAME="op://Lab/u2lem3tvichptsn37new73ftv4/username"
NEXUS_PASSWORD="op://Lab/u2lem3tvichptsn37new73ftv4/password"

[tools]
terraform = "1.11.4"
python = "3.14"

[settings]
python.uv_venv_auto = "create|source"

[tasks."packer:build"]
description = "Build a packer image variant"
usage = '''
arg "<variant>" help="Variant: base, box, lab, or pug"
flag "--ubuntu <name>" help="Ubuntu release codename" default="jammy"
'''
run = [
    'rm -rf "/mnt/qemu/${usage_ubuntu}/ubuntu-${usage_variant}.new"',
    'packer build {{vars.packer_flags}} -var ubuntu_name="${usage_ubuntu}" -var output_directory="/mnt/qemu/${usage_ubuntu}" -only=qemu.ubuntu-${usage_variant} packer',
]

[tasks."packer:all"]
description = "Build ubuntu-base, then ubuntu-box/lab/pug in parallel"
usage = '''
flag "--ubuntu <name>" help="Ubuntu release codename" default="jammy"
'''
run = [
    'mise run packer:build base --ubuntu "${usage_ubuntu}"',
    'mise run packer:build box --ubuntu "${usage_ubuntu}" ::: packer:build lab --ubuntu "${usage_ubuntu}" ::: packer:build pug --ubuntu "${usage_ubuntu}"',
]

[tasks."packer:clean"]
description = "Remove .new build artifacts"
usage = '''
flag "--ubuntu <name>" help="Ubuntu release codename" default="jammy"
'''
run = 'rm -rf "/mnt/qemu/${usage_ubuntu}"/*.new'
