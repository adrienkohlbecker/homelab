homelab_ci_dir = '{% if os() == "macos" %}{{config_root}}/packer/artifacts{% else %}/mnt/scratch/homelab_ci{% endif %}'

[env]
CLOUDFLARE_API_TOKEN = "op://Lab/seckvi7vjb6ahgtt7w4l3r73zq/password"
NEXUS_USERNAME = "op://Lab/u2lem3tvichptsn37new73ftv4/username"
NEXUS_PASSWORD = "op://Lab/u2lem3tvichptsn37new73ftv4/password"
# MinIO creds for the tofu s3 backend (state in bucket "terraform" on
# minio-api.lab.fahm.fr) are NOT set here: they flow through [profile minio]
# (minio-credential-process) referenced by the backend block in main.tf. Keeping
# them off AWS_* leaves the default credential chain free for the real
# `provider "aws"` (account 000390721279) -- see terraform/aws.tf.
# Tofu client-side state encryption: feeds var.state_passphrase in main.tf
# via the standard TF_VAR_<name> env mechanism. op run substitutes the
# op:// reference at exec time, so the passphrase only ever materializes
# inside the wrapped tofu process.
TF_VAR_state_passphrase = "op://Lab/vztgbtb2i3nlgrift46fc7r4f4/password"
# Home WAN IP + spouse email -- PII kept out of this public repo, sourced from
# a single 1Password item (fields "Home IP" / "Spouse Email"). Feed
# var.home_wan_ip (main.tf, fox SSH firewall + home.fahm.fr A) and
# var.spouse_email (email.tf, Cloudflare email routing).
TF_VAR_home_wan_ip = "op://Lab/5f2xqajiofg6eyqazndtpcldkm/Home IP"
TF_VAR_spouse_email = "op://Lab/5f2xqajiofg6eyqazndtpcldkm/Spouse Email"
TF_VAR_spouse_initials = "op://Lab/5f2xqajiofg6eyqazndtpcldkm/Spouse Initials"
TF_VAR_couple_alias = "op://Lab/5f2xqajiofg6eyqazndtpcldkm/Couple Alias"
# Dedicated fine-grained GitHub PAT (no scopes) pushed by terraform to
