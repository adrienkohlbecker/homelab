[vars]
packer_flags = "-timestamp-ui -warn-on-undeclared-var --on-error=ask"
qemu_dir = '{% if os() == "macos" %}{{config_root}}/packer/artifacts{% else %}/mnt/qemu{% endif %}'
zbm_version = "3.1.0"

[env]
CLOUDFLARE_EMAIL = "op://Lab/seckvi7vjb6ahgtt7w4l3r73zq/username"
CLOUDFLARE_API_KEY = "op://Lab/seckvi7vjb6ahgtt7w4l3r73zq/password"
NEXUS_USERNAME = "op://Lab/u2lem3tvichptsn37new73ftv4/username"
NEXUS_PASSWORD = "op://Lab/u2lem3tvichptsn37new73ftv4/password"

[tools]
terraform = "1.11.4"
packer = "1.15.3"
python = "3.14"
uv = "0.9.26"
shellcheck = "0.11.0"
shfmt = "3.13.1"
tflint = "0.62.0"
typos = "1.46.0"

[settings]
python.uv_venv_auto = "create|source"

[tasks."packer:init"]
description = "packer init (forwards args)"
dir = "{{config_root}}/packer"
run = 'packer init "$@" .'

[tasks."packer:build"]
description = "Build a packer image variant"
interactive = true
usage = '''
arg "<variant>" help="Variant: base, zfs, or zfs-lab"
flag "--ubuntu <name>" help="Ubuntu release codename" default="jammy"
flag "--upstream" help="Pull apt packages from upstream Ubuntu mirrors during the build instead of via the lab Nexus proxy. The shipped image always points at upstream regardless."
'''
run = [
  'rm -rf "{{vars.qemu_dir}}/${usage_ubuntu}/ubuntu-${usage_variant}.new"',
  'arch=$(uname -m | sed s/arm64/aarch64/); packer build {{vars.packer_flags}} -var ubuntu_name="${usage_ubuntu}" -var arch="$arch" -var upstream_mirrors="${usage_upstream:-false}" -var output_directory="{{vars.qemu_dir}}/${usage_ubuntu}" -only=qemu.ubuntu-${usage_variant} packer',
]

[tasks."packer:all"]
description = "Build ubuntu-base, then ubuntu-zfs and ubuntu-zfs-lab in parallel"
usage = '''
flag "--ubuntu <name>" help="Ubuntu release codename" default="jammy"
flag "--upstream" help="Forwarded to packer:build for each sub-build."
'''
run = [
  'mise run packer:build base --ubuntu "${usage_ubuntu}" $([ "${usage_upstream:-false}" = "true" ] && echo --upstream)',
  'flag=$([ "${usage_upstream:-false}" = "true" ] && echo --upstream); mise run packer:build zfs --ubuntu "${usage_ubuntu}" $flag ::: packer:build zfs-lab --ubuntu "${usage_ubuntu}" $flag',
]

[tasks."packer:clean"]
description = "Remove .new build artifacts"
usage = '''
flag "--ubuntu <name>" help="Ubuntu release codename" default="jammy"
'''
run = 'rm -rf "{{vars.qemu_dir}}/${usage_ubuntu}"/*.new'

[tasks."zbm:builder-image"]
description = "Build the zbm-builder container image locally for the host arch"
# Clones zfsbootmenu at the pinned tag, then builds zbm/Dockerfile
# (a podman-compatible vendored copy of upstream's
# releng/docker/Dockerfile) against the upstream releng/docker context
# so build-init.sh remains COPYable. The image always targets the host
# arch (no cross-build): run on Mac arm for an aarch64 image, on the
# Linux x86_64 dev host for an amd64 image. Tagged
# localhost/zbm-builder:<version>-<arch>. Re-run when zbm_version
# changes.
#
# --security-opt seccomp=unconfined is needed because xbps-install
# sets file capabilities/xattrs on extracted files (e.g. libelf.so.1)
# via syscalls that the default rootless seccomp profile blocks,
# yielding "Operation not permitted" on unpack. The relaxation
# applies to the build process only; the resulting image runs with
# the default profile.
#
# XBPS_REPOS points at the Void Linux Frankfurt mirror because the
# upstream-default Fastly CDN throttles to <100 kB/s from this ISP,
# making the xbps-install layer painfully slow. Frankfurt is a Tier 1
# mirror with EU-local capacity. Per Void docs, glibc x86_64 lives at
# `/current` and aarch64 (still glibc) at `/current/aarch64` — pick the
# subpath that matches the host arch.
run = '''
set -eu
arch="$(uname -m | sed -e s/arm64/aarch64/ -e s/amd64/x86_64/)"
case "$arch" in
  x86_64) xbps_repo=https://repo-de.voidlinux.org/current ;;
  aarch64) xbps_repo=https://repo-de.voidlinux.org/current/aarch64 ;;
  *) echo "unsupported host arch: $arch" >&2; exit 1 ;;
esac
src_dir="{{config_root}}/zbm-build/src"
rm -rf "$src_dir"
mkdir -p "$(dirname "$src_dir")"
git clone --depth 1 --branch v{{vars.zbm_version}} https://github.com/zbm-dev/zfsbootmenu.git "$src_dir"
podman build --security-opt seccomp=unconfined --build-arg "XBPS_REPOS=${xbps_repo}" --tag "localhost/zbm-builder:v{{vars.zbm_version}}-${arch}" -f "{{config_root}}/zbm/Dockerfile" "$src_dir/releng/docker"
'''

[tasks."zbm:build"]
description = "Build a ZFSBootMenu kernel + initrd tarball via the local builder container"
# Runs localhost/zbm-builder:<version>-<arch> with zbm/ bind-mounted at
# /build (config.yaml + dracut.conf.d live there, read-only) and
# zbm-build/<arch>/ at /output. Components mode: the container emits
# vmlinuz-bootmenu (or vmlinux-bootmenu on aarch64) + initramfs-bootmenu.img
# rather than a unified .EFI. We tarball both into a single artifact
# suitable for upload to Gitea releases. (The systemd-boot UKI stub
# silently fails to invoke the kernel under EDK2/aarch64 on QEMU virt;
# letting rEFInd do the handoff via loader/initrd directives works on
# both arches.)
run = '''
set -eu
arch="$(uname -m | sed -e s/arm64/aarch64/ -e s/amd64/x86_64/)"
out_dir="{{config_root}}/zbm-build/${arch}"
mkdir -p "$out_dir"
rm -f "$out_dir"/*-bootmenu "$out_dir"/*-bootmenu.img "$out_dir"/zfsbootmenu-v*-${arch}.tar.gz "$out_dir"/zfsbootmenu-v*-${arch}.tar.gz.sha256sum "$out_dir"/*.EFI
podman run --rm -v "{{config_root}}/zbm:/build:ro" -v "$out_dir:/output" "localhost/zbm-builder:v{{vars.zbm_version}}-${arch}" -o /output -t v{{vars.zbm_version}}
# Components mode emits vmlin{u,uz}-bootmenu + initramfs-bootmenu.img;
# tar them together preserving upstream names so chroot.sh can glob.
# --owner=0/--group=0 bake root:0 into the archive metadata so extracting
# in a chroot or onto FAT32 doesn't trip "Cannot change ownership"
# from the container's build-user uids leaking into the archive.
( cd "$out_dir" && tar --owner=0 --group=0 -czf "zfsbootmenu-v{{vars.zbm_version}}-${arch}.tar.gz" vmlin*-bootmenu initramfs-bootmenu.img )
sha256sum "$out_dir/zfsbootmenu-v{{vars.zbm_version}}-${arch}.tar.gz"
'''

[tasks."zbm:upload"]
description = "Upload the built ZFSBootMenu tarball + checksum to Gitea generic packages"
# Generates a .sha256sum sidecar next to the .tar.gz, then PUTs both to
# gitea.lab.fahm.fr's generic package repo at
# adrienkohlbecker/zfsbootmenu/<zbm_version>/<file>-<UTC timestamp>.tar.gz.
# The package version stays at zbm_version (one Gitea package per ZBM
# release, accumulating timestamped builds inside) and each upload
# becomes a new file in that package — no 409s, no overwrites, full
# history of every build. chroot.sh / roles/zfsbootmenu must be pointed
# at the new file (per-arch ZBM_VERSION + ZBM_TIMESTAMP — the timestamp
# typically differs per arch since each arch is uploaded separately).
# The printed URL at the end of this task is the one to copy in. Token
# is read from 1Password at runtime.
run = '''
set -eu
arch="$(uname -m | sed -e s/arm64/aarch64/ -e s/amd64/x86_64/)"
out_dir="{{config_root}}/zbm-build/${arch}"
local_name="zfsbootmenu-v{{vars.zbm_version}}-${arch}.tar.gz"
timestamp="$(date -u +%Y%m%d-%H%M%S)"
remote_name="zfsbootmenu-v{{vars.zbm_version}}-${arch}-${timestamp}.tar.gz"
sum_name="${remote_name}.sha256sum"
# Compute the sha256 against the local file but record it under the remote
# name, so the sidecar's content matches what chroot.sh will sha256sum -c.
( cd "$out_dir" && sha256sum "$local_name" | sed "s|${local_name}|${remote_name}|" ) \
  > "${out_dir}/${sum_name}"
username="$(op read 'op://Lab/Gitea package upload token/username')"
token="$(op read 'op://Lab/Gitea package upload token/password')"
base_url="https://gitea.lab.fahm.fr/api/packages/adrienkohlbecker/generic/zfsbootmenu/{{vars.zbm_version}}"
curl --fail-with-body --user "${username}:${token}" --upload-file "${out_dir}/${local_name}" "${base_url}/${remote_name}"
echo "${remote_name}: uploaded to ${base_url}/${remote_name}"
curl --fail-with-body --user "${username}:${token}" --upload-file "${out_dir}/${sum_name}" "${base_url}/${sum_name}"
echo "${sum_name}: uploaded to ${base_url}/${sum_name}"
echo
echo "Update chroot.sh ZBM_TIMESTAMP (and ZBM_VERSION if it changed) to:"
echo "  ZBM_VERSION=\"{{vars.zbm_version}}\""
echo "  ZBM_TIMESTAMP=\"${timestamp}\""
'''

[tasks."zbm:test"]
description = "Boot the most recent ZBM build against the box variant's packer qcow2"
# Iterate on zbm/config.yaml + zbm/dracut.conf.d/* without re-running packer
# end-to-end: edit, `mise run zbm:build`, then `mise run zbm:test`. Picks the
# newest zfsbootmenu-v*-<arch>.tar.gz under zbm-build/<arch>/, extracts it
# into a temp dir, and direct-boots the kernel + initrd via test/launch.py
# in --foreground mode (mon:stdio, QMP socket, 9p share, EDK2 pflash). Quit
# with Ctrl-A,x or HMP `quit`.
run = '''
set -eu
arch="$(uname -m | sed -e s/arm64/aarch64/ -e s/amd64/x86_64/)"
tarball=$(ls -t {{config_root}}/zbm-build/${arch}/zfsbootmenu-v*-${arch}.tar.gz | head -1)
tmp=$(mktemp -d -t zbm-test)
trap 'rm -rf "$tmp"' EXIT INT TERM
tar -xzf "$tarball" -C "$tmp" --no-same-owner
mkdir -p /tmp/zbm-extract
{{config_root}}/test/launch.py \
    --machine box \
    --kernel "$tmp/vmlin"*-bootmenu \
    --initrd "$tmp/initramfs-bootmenu.img" \
    --append 'loglevel=7 zbm.show' \
    --mem 8192 \
    --with-pflash \
    --virtfs /tmp/zbm-extract:share \
    --qmp /tmp/qmp.sock \
    --foreground \
    --no-ssh-wait
'''

[tasks.lint]
description = "Run all linters"
depends = [
  "lint:ansible",
  "lint:syntax",
  "lint:terraform",
  "lint:tflint",
  "lint:packer",
  "lint:packer-validate",
  "lint:python",
  "lint:ruff",
  "lint:yaml",
  "lint:shell",
  "lint:shfmt",
  "lint:typos",
]

[tasks."lint:ansible"]
description = "Run ansible-lint"
run = "ansible-lint"

[tasks."lint:syntax"]
description = "Check Ansible playbook syntax"
run = "ansible-playbook --syntax-check site.yml"

[tasks."lint:terraform"]
description = "Check Terraform formatting"
run = "terraform fmt -check -recursive terraform"

[tasks."lint:tflint"]
description = "Run tflint static analysis"
dir = "{{config_root}}/terraform"
run = "tflint"

[tasks."lint:packer"]
description = "Check Packer formatting"
run = "packer fmt -check -recursive packer"

[tasks."lint:packer-validate"]
description = "Validate Packer template syntax"
dir = "{{config_root}}/packer"
run = "packer validate -syntax-only ."

[tasks."lint:python"]
description = "Check Python formatting (black)"
run = "black --check ."

[tasks."lint:ruff"]
description = "Run ruff Python linter"
run = "ruff check ."

[tasks."lint:yaml"]
description = "Run yamllint on tracked YAML files"
run = "git ls-files -z '*.yml' '*.yaml' | xargs -0 yamllint"

[tasks."lint:shell"]
description = "Run shellcheck on tracked shell scripts"
run = "git ls-files -z '*.sh' | xargs -0 shellcheck"

[tasks."lint:shfmt"]
description = "Check shell script formatting (shfmt)"
run = "git ls-files -z '*.sh' | xargs -0 shfmt -i 2 -d"

[tasks."lint:typos"]
description = "Run typos checker"
run = "typos"

[tasks.fmt]
description = "Apply all formatters"
depends = [
  "fmt:ansible",
  "fmt:terraform",
  "fmt:packer",
  "fmt:python",
  "fmt:mise",
  "fmt:shfmt",
]

[tasks."fmt:ansible"]
description = "Apply ansible-lint fixes"
run = "ansible-lint --fix"

[tasks."fmt:terraform"]
description = "Format Terraform files"
run = "terraform fmt -recursive terraform"

[tasks."fmt:packer"]
description = "Format Packer files"
run = "packer fmt -recursive packer"

[tasks."fmt:python"]
description = "Format Python files (black)"
run = "black ."

[tasks."fmt:mise"]
description = "Format mise.toml"
run = "mise fmt"

[tasks."fmt:shfmt"]
description = "Format shell scripts (shfmt)"
run = "git ls-files -z '*.sh' | xargs -0 shfmt -i 2 -w"

[tasks."tf:init"]
description = "terraform init (forwards args)"
dir = "{{config_root}}/terraform"
run = 'op run -- terraform init "$@"'

[tasks."tf:plan"]
description = "terraform plan (forwards args)"
dir = "{{config_root}}/terraform"
run = 'op run -- terraform plan "$@"'

[tasks."tf:apply"]
description = "terraform apply (forwards args)"
dir = "{{config_root}}/terraform"
run = 'op run -- terraform apply "$@"'

[tasks."tf:validate"]
description = "terraform validate (forwards args)"
dir = "{{config_root}}/terraform"
run = 'op run -- terraform validate "$@"'
