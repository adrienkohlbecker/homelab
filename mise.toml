[vars]
packer_flags = "-timestamp-ui -warn-on-undeclared-var --on-error=ask"
qemu_dir = '{% if os() == "macos" %}{{config_root}}/packer/artifacts{% else %}/mnt/qemu{% endif %}'
zbm_version = "v3.1.0"

[env]
CLOUDFLARE_EMAIL = "op://Lab/seckvi7vjb6ahgtt7w4l3r73zq/username"
CLOUDFLARE_API_KEY = "op://Lab/seckvi7vjb6ahgtt7w4l3r73zq/password"
NEXUS_USERNAME = "op://Lab/u2lem3tvichptsn37new73ftv4/username"
NEXUS_PASSWORD = "op://Lab/u2lem3tvichptsn37new73ftv4/password"

[tools]
terraform = "1.11.4"
packer = "1.15.3"
python = "3.14"
uv = "0.9.26"
shellcheck = "0.11.0"
shfmt = "3.13.1"
tflint = "0.62.0"
typos = "1.46.0"

[settings]
python.uv_venv_auto = "create|source"

[tasks."packer:init"]
description = "packer init (forwards args)"
dir = "{{config_root}}/packer"
run = 'packer init "$@" .'

[tasks."packer:build"]
description = "Build a packer image variant"
interactive = true
usage = '''
arg "<variant>" help="Variant: base, zfs, or zfs-lab"
flag "--ubuntu <name>" help="Ubuntu release codename" default="jammy"
'''
run = [
  'rm -rf "{{vars.qemu_dir}}/${usage_ubuntu}/ubuntu-${usage_variant}.new"',
  'arch=$(uname -m | sed s/arm64/aarch64/); packer build {{vars.packer_flags}} -var ubuntu_name="${usage_ubuntu}" -var arch="$arch" -var output_directory="{{vars.qemu_dir}}/${usage_ubuntu}" -only=qemu.ubuntu-${usage_variant} packer',
]

[tasks."packer:all"]
description = "Build ubuntu-base, then ubuntu-zfs and ubuntu-zfs-lab in parallel"
usage = '''
flag "--ubuntu <name>" help="Ubuntu release codename" default="jammy"
'''
run = [
  'mise run packer:build base --ubuntu "${usage_ubuntu}"',
  'mise run packer:build zfs --ubuntu "${usage_ubuntu}" ::: packer:build zfs-lab --ubuntu "${usage_ubuntu}"',
]

[tasks."packer:clean"]
description = "Remove .new build artifacts"
usage = '''
flag "--ubuntu <name>" help="Ubuntu release codename" default="jammy"
'''
run = 'rm -rf "{{vars.qemu_dir}}/${usage_ubuntu}"/*.new'

[tasks."zbm:builder-image"]
description = "Build the zbm-builder container image locally for the target arch"
usage = '''
flag "--arch <name>" help="Target arch: x86_64 or aarch64" default="x86_64"
'''
# Clones zfsbootmenu at the pinned tag, builds upstream's
# releng/docker/Dockerfile with --platform set per-arch, tags as
# localhost/zbm-builder:<version>-<arch>. Re-run when zbm_version changes.
run = [
  'set -eu',
  'arch="${usage_arch}"',
  'case "$arch" in x86_64) platform=linux/amd64 ;; aarch64) platform=linux/arm64 ;; *) echo "unknown arch: $arch" >&2; exit 1 ;; esac',
  'src_dir="{{config_root}}/zbm-build/src"',
  'rm -rf "$src_dir"',
  'mkdir -p "$(dirname "$src_dir")"',
  'git clone --depth 1 --branch {{vars.zbm_version}} https://github.com/zbm-dev/zfsbootmenu.git "$src_dir"',
  'podman build --platform="$platform" --tag "localhost/zbm-builder:{{vars.zbm_version}}-${arch}" "$src_dir/releng/docker"',
]

[tasks."zbm:build"]
description = "Build a ZFSBootMenu UEFI binary via the local builder container"
usage = '''
flag "--arch <name>" help="Target arch: x86_64 or aarch64" default="x86_64"
'''
# Runs localhost/zbm-builder:<version>-<arch> with zbm/ bind-mounted at
# /build (config.yaml lives there, read-only) and zbm-build/<arch>/ at
# /output. The container's build-init.sh fetches zfsbootmenu at -t and
# emits zfsbootmenu.EFI; we rename to a versioned, arch-tagged filename
# suitable for upload to Gitea releases.
run = [
  'set -eu',
  'arch="${usage_arch}"',
  'case "$arch" in x86_64) platform=linux/amd64 ;; aarch64) platform=linux/arm64 ;; *) echo "unknown arch: $arch" >&2; exit 1 ;; esac',
  'out_dir="{{config_root}}/zbm-build/${arch}"',
  'mkdir -p "$out_dir"',
  'rm -f "$out_dir"/*.EFI',
  'podman run --rm --platform="$platform" -v "{{config_root}}/zbm:/build:ro" -v "$out_dir:/output" "localhost/zbm-builder:{{vars.zbm_version}}-${arch}" -o /output -t {{vars.zbm_version}}',
  'mv "$out_dir/vmlinuz.EFI" "$out_dir/zfsbootmenu-{{vars.zbm_version}}-${arch}.EFI"',
  'sha256sum "$out_dir/zfsbootmenu-{{vars.zbm_version}}-${arch}.EFI"',
]

[tasks.lint]
description = "Run all linters"
depends = [
  "lint:ansible",
  "lint:syntax",
  "lint:terraform",
  "lint:tflint",
  "lint:packer",
  "lint:packer-validate",
  "lint:python",
  "lint:ruff",
  "lint:yaml",
  "lint:shell",
  "lint:shfmt",
  "lint:typos",
]

[tasks."lint:ansible"]
description = "Run ansible-lint"
run = "ansible-lint"

[tasks."lint:syntax"]
description = "Check Ansible playbook syntax"
run = "ansible-playbook --syntax-check site.yml"

[tasks."lint:terraform"]
description = "Check Terraform formatting"
run = "terraform fmt -check -recursive terraform"

[tasks."lint:tflint"]
description = "Run tflint static analysis"
dir = "{{config_root}}/terraform"
run = "tflint"

[tasks."lint:packer"]
description = "Check Packer formatting"
run = "packer fmt -check -recursive packer"

[tasks."lint:packer-validate"]
description = "Validate Packer template syntax"
dir = "{{config_root}}/packer"
run = "packer validate -syntax-only ."

[tasks."lint:python"]
description = "Check Python formatting (black)"
run = "black --check ."

[tasks."lint:ruff"]
description = "Run ruff Python linter"
run = "ruff check ."

[tasks."lint:yaml"]
description = "Run yamllint on tracked YAML files"
run = "git ls-files -z '*.yml' '*.yaml' | xargs -0 yamllint"

[tasks."lint:shell"]
description = "Run shellcheck on tracked shell scripts"
run = "git ls-files -z '*.sh' | xargs -0 shellcheck"

[tasks."lint:shfmt"]
description = "Check shell script formatting (shfmt)"
run = "git ls-files -z '*.sh' | xargs -0 shfmt -i 2 -d"

[tasks."lint:typos"]
description = "Run typos checker"
run = "typos"

[tasks.fmt]
description = "Apply all formatters"
depends = [
  "fmt:ansible",
  "fmt:terraform",
  "fmt:packer",
  "fmt:python",
  "fmt:mise",
  "fmt:shfmt",
]

[tasks."fmt:ansible"]
description = "Apply ansible-lint fixes"
run = "ansible-lint --fix"

[tasks."fmt:terraform"]
description = "Format Terraform files"
run = "terraform fmt -recursive terraform"

[tasks."fmt:packer"]
description = "Format Packer files"
run = "packer fmt -recursive packer"

[tasks."fmt:python"]
description = "Format Python files (black)"
run = "black ."

[tasks."fmt:mise"]
description = "Format mise.toml"
run = "mise fmt"

[tasks."fmt:shfmt"]
description = "Format shell scripts (shfmt)"
run = "git ls-files -z '*.sh' | xargs -0 shfmt -i 2 -w"

[tasks."tf:init"]
description = "terraform init (forwards args)"
dir = "{{config_root}}/terraform"
run = 'terraform init "$@"'

[tasks."tf:plan"]
description = "terraform plan (forwards args)"
dir = "{{config_root}}/terraform"
run = 'terraform plan "$@"'

[tasks."tf:apply"]
description = "terraform apply (forwards args)"
dir = "{{config_root}}/terraform"
run = 'terraform apply "$@"'

[tasks."tf:validate"]
description = "terraform validate (forwards args)"
dir = "{{config_root}}/terraform"
run = 'terraform validate "$@"'
