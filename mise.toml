# (item: "Mailgun API", field "password") then update the item-id below.
TF_VAR_mailgun_api_key = "op://Lab/j6iayri7rcsq27nym5z7u37jgu/password"
# Hetzner Cloud API token (terraform/hetzner.tf, packer hetzner upload).
# Named _OP so it doesn't collide with the HCLOUD_TOKEN env var that hcloud
# tooling actually reads -- otherwise every `mise run` clobbers a previously
# resolved token with the literal op:// ref. Consumers resolve it themselves:
# - `mise run tf` runs under `op run --` which maps _OP → HCLOUD_TOKEN.
# - packer scripts source _hcloud_token.sh (CI token or op run re-exec).
HCLOUD_TOKEN_OP = "op://Lab/fsqg4d3rwrfjzoycq6yu73ayce/password"
# Expose [vars] entries as env so file-based mise-tasks/ scripts can read
# them (mise vars are tera-expanded into toml `run` strings only). Toml
# tasks still reference `{{vars.X}}`; both forms resolve to the same value.
HOMELAB_CI_DIR = '{{vars.homelab_ci_dir}}'
ZBM_VERSION = "3.0.1"
# Kernel minor version baked into the builder image (KERNELS=linux<ver> build
# arg) and embedded in the tarball name. Single kernel in the image means
# generate-zbm picks it up automatically; no Kernel.Version needed in config.yaml.
ZBM_KERNEL_VERSION = "6.1"
# Home Assistant long-lived access token -- consumed by mise-tasks/ha/sync.py
# to call /api/services/<domain>/reload after pushing the GUI YAML. Minted
# in HA UI under Profile > Security > Long-Lived Access Tokens. The
# script re-execs under `op run --` to substitute the op:// reference;
# without that wrapping mise would export the literal string and HA
# would reject it as a bad bearer.
HA_API_TOKEN = "op://Lab/pfcoggyhvncfnr6rt6p5zbnuja/password"
# Suppress the HashiCorp checkpoint phone-home (update check) on every
# packer build/init and tofu plan/apply — latency + privacy on CI workers.
CHECKPOINT_DISABLE = "1"

[tools]
# The test harness's EC2 backend (test/machine.py) shells out to the aws CLI
# for every cell operation — deliberately no boto3 in uv.lock
# (notes/ci_aws_test_cells.md, "Shape").
awscli = "2.35.2"
opentofu = "1.11.6"
packer = "1.15.3"
python = "3.14"
uv = "0.9.26"
shellcheck = "0.11.0"
shfmt = "3.13.1"
stylua = "2.5.2"
# selene (Lua linter) has no short registry name; pin the aqua backend.
"aqua:Kampfkarren/selene" = "0.31.0"
tflint = "0.62.0"
node = "24"
markdownlint-cli2 = "0.22.1"
taplo = "0.10.0"
glab = "1.102.0"

[hooks]
enter = "test -x \"$(git rev-parse --git-path hooks/pre-commit)\" || mise generate git-pre-commit --write 2>/dev/null"

[settings]
python.uv_venv_auto = "create|source"

[tasks."packer:init"]
description = "packer init (forwards args)"
dir = "{{config_root}}/packer"
run = ['packer init "$@" .', 'packer init "$@" aws']

[tasks."packer:clean"]
description = "Remove leftover tmpdirs from failed packer builds and test-harness runs"
run = 'rm -rf "{{vars.homelab_ci_dir}}"/.build-* "{{vars.homelab_ci_dir}}"/tmp*'

[tasks."packer:deregister-ami"]
description = "Deregister an AMI and delete its backing snapshots (eu-central-1). Usage: mise run packer:deregister-ami -- ami-xxxx"
run = 'ami="${1:?usage: mise run packer:deregister-ami -- <ami-id>}"; snaps=$(aws --region eu-central-1 ec2 describe-images --image-ids "$ami" --query "Images[0].BlockDeviceMappings[?Ebs].Ebs.SnapshotId" --output text) && aws --region eu-central-1 ec2 deregister-image --image-id "$ami" && for s in $snaps; do aws --region eu-central-1 ec2 delete-snapshot --snapshot-id "$s"; done'

[tasks.lint]
description = "Run all linters"
depends = [
  "lint:ansible",
  "lint:terraform",
  "lint:tflint",
  "lint:packer",
  "lint:packer-validate",
  "lint:python",
  "lint:ruff",
  "lint:yaml",
  "lint:shell",
  "lint:shfmt",
  "lint:lua",
  "lint:test-meta",
  "lint:topology",
  "lint:markdown",
  "lint:md-links",
  "lint:notes",
  "lint:toml",
  "lint:gitlab-ci",
]

[tasks."lint:ansible"]
description = "Run ansible-lint"
# Silence ansible-core's own to_bytes/to_native deprecation spam (collection-internal
# imports, not our code) during lint. Scoped here, not in ansible.cfg, so real
# playbook runs still surface deprecations. Mirrored in mise-tasks/lint/ansible-changed.sh.
env = { ANSIBLE_DEPRECATION_WARNINGS = "False" }
run = "ansible-lint"

[tasks."lint:terraform"]
description = "Check Terraform formatting"
run = "tofu fmt -check -recursive terraform"

[tasks."lint:tflint"]
description = "Run tflint static analysis"
dir = "{{config_root}}/terraform"
run = "tflint"

[tasks."lint:packer"]
description = "Check Packer formatting"
run = "packer fmt -check -recursive packer"

[tasks."lint:packer-validate"]
description = "Validate Packer template syntax"
dir = "{{config_root}}/packer"
# aws/ is its own packer configuration (shares variable names with
# qemu.pkr.hcl, so it can't sit in the same directory-mode namespace);
# directory-mode validate doesn't recurse, so list it explicitly.
run = ["packer validate -syntax-only .", "packer validate -syntax-only aws"]

[tasks."lint:python"]
description = "Check Python formatting (black)"
run = "black --check ."

[tasks."lint:ruff"]
description = "Run ruff Python linter"
run = "ruff check ."

[tasks."lint:yaml"]
description = "Run yamllint on tracked YAML files"
run = "lint/git_ls_existing.sh '*.yml' '*.yaml' | xargs -0 yamllint"

[tasks."lint:shell"]
description = "Run shellcheck on tracked shell scripts"
run = "lint/git_ls_existing.sh '*.sh' | xargs -0 shellcheck"

[tasks."lint:shfmt"]
description = "Check shell script formatting (shfmt)"
run = "lint/git_ls_existing.sh '*.sh' | xargs -0 shfmt -i 2 -d"

[tasks."lint:lua"]
description = "Lint Lua filters (stylua --check + selene)"
run = [
  "lint/git_ls_existing.sh '*.lua' | xargs -0 stylua --config-path lint/stylua.toml --check",
  "lint/git_ls_existing.sh '*.lua' | xargs -0 selene --config lint/selene.toml",
]

[tasks."lint:topology"]
description = "Validate data/network_topology.yml against its JSON Schema"
# check-jsonschema is a project dep (not `uvx`-fetched) so `uv sync`
# installs it from the warm /opt/uv-cache; uvx would re-resolve and
# download it from the index on every CI run.
run = "check-jsonschema --schemafile data/network_topology.schema.json data/network_topology.yml"

[tasks."lint:markdown"]
description = "Lint Markdown files (CLAUDE.md + README.md)"
run = "markdownlint-cli2 'CLAUDE.md' 'README.md'"

[tasks."lint:notes"]
description = "Lint the notes/ clone if present (delegates to its own mise lint; skipped when absent, e.g. CI)"
# notes/ is a private repo cloned in-place + gitignored, absent in CI and any
# checkout that didn't populate it. Guard on the clone existing so the public
# repo's lint never depends on the private one -- notes self-lints via its own mise.
run = "if [ -d notes/.git ]; then cd notes && mise run lint; else echo 'lint:notes: notes/ clone absent, skipping'; fi"

[tasks."lint:toml"]
description = "Check TOML formatting (taplo)"
run = "lint/git_ls_existing.sh '*.toml' | xargs -0 taplo fmt --check"

[tasks.test]
description = "Run Python unit tests (pytest)"
run = "uv run pytest"

[tasks.fmt]
description = "Apply all formatters"
depends = [
  "fmt:ansible",
  "fmt:terraform",
  "fmt:packer",
  "fmt:python",
  "fmt:mise",
  "fmt:shfmt",
  "fmt:lua",
  "fmt:markdown",
  "fmt:notes",
  "fmt:toml",
]

[tasks."fmt:ansible"]
description = "Apply ansible-lint fixes"
run = "ansible-lint --fix"

[tasks."fmt:terraform"]
description = "Format Terraform files"
run = "tofu fmt -recursive terraform"

[tasks."fmt:packer"]
description = "Format Packer files"
run = "packer fmt -recursive packer"

[tasks."fmt:python"]
description = "Format Python files (black)"
run = "black ."

[tasks."fmt:mise"]
description = "Format mise.toml"
run = "mise fmt"

[tasks."fmt:shfmt"]
description = "Format shell scripts (shfmt)"
run = "lint/git_ls_existing.sh '*.sh' | xargs -0 shfmt -i 2 -w"

[tasks."fmt:lua"]
description = "Format Lua filters (stylua)"
run = "lint/git_ls_existing.sh '*.lua' | xargs -0 stylua --config-path lint/stylua.toml"

[tasks."fmt:markdown"]
description = "Fix Markdown formatting (CLAUDE.md + README.md)"
run = "markdownlint-cli2 --fix 'CLAUDE.md' 'README.md'"

[tasks."fmt:notes"]
description = "Fix Markdown formatting in the notes/ clone if present (skipped when absent)"
run = "if [ -d notes/.git ]; then cd notes && mise run fmt; else echo 'fmt:notes: notes/ clone absent, skipping'; fi"

[tasks."fmt:toml"]
description = "Format TOML files (taplo)"
run = "lint/git_ls_existing.sh '*.toml' | xargs -0 taplo fmt"

[tasks."tf"]
description = "tofu (forwards subcommand + args)"
dir = "{{config_root}}/terraform"
run = 'HCLOUD_TOKEN="$HCLOUD_TOKEN_OP" op run -- tofu "$@"'

[tasks."ansible"]
description = "ansible-playbook against site.yml (forwards args)"
run = 'ansible-playbook site.yml "$@"'

[tasks."ansible:bunk"]
description = "ansible-playbook against bunk.yml (forwards args)"
run = 'ansible-playbook bunk.yml "$@"'

# worktree:add / worktree:rm / worktree:merge / worktree:update live under
# mise-tasks/worktree/ so shellcheck and shfmt cover them. The populate helper
# is factored out separately so Claude Code's WorktreeCreate hook can call it
# directly.

[tasks."worktree:ls"]
description = "List active git worktrees"
alias = "wt:ls"
run = "git worktree list"
