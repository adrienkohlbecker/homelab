  philips_ac0850_kid1:     { ip: 10.123.4.17, site: home, vlan: iot }
  philips_ac0850_kid2:     { ip: 10.123.4.18, site: home, vlan: iot }
  philips_ac0850_master:   { ip: 10.123.4.19, site: home, vlan: iot }
  philips_ac0850_spouse:   { ip: 10.123.4.20, site: home, vlan: iot }
