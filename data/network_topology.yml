  philips_ac0850_living:   { ip: 10.123.4.22, site: home, vlan: iot }
  venta_lw74:              { ip: 10.123.4.23, site: home, vlan: iot }
  daikin_kid1:             { ip: 10.123.4.24, site: home, vlan: iot }
