name: test-spike
on:
  workflow_dispatch:

defaults:
  run:
    shell: bash

jobs:
  caller:
    runs-on: lab-runtime
    outputs:
      cells: ${{ steps.gen.outputs.cells }}
    steps:
      - id: gen
        run: echo 'cells=["alpha:box","beta:lab","gamma:box"]' >> "$GITHUB_OUTPUT"

  fanout:
    needs: caller
    uses: ./.gitea/workflows/test-spike-cell.yml
    with:
      cells: ${{ needs.caller.outputs.cells }}
