name: packer-build
on:
  workflow_dispatch:
    inputs:
      sources:
        description: 'packer sources to build (e.g. "zfs zfs-lab"). Empty = all.'
        required: false
        default: ''
      ubuntu:
        description: 'Ubuntu codename'
        required: false
        default: noble
  push:
    paths:
      - 'packer/**'
      - 'mise-tasks/packer/**'

# Shared with test.yml and test-nightly.yml so packer can't rewrite the
# qcow2 tree mid-test. Packer-build is the ONLY workflow that mounts the
# qemu volume rw.
concurrency:
  group: lab-qemu-artifacts
  cancel-in-progress: false

jobs:
  build:
    runs-on: lab-runtime
    container:
      options: >-
        --device /dev/kvm
        --group-add keep-groups
        --volume /mnt/scratch/qemu:/mnt/scratch/qemu:rw
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - run: uv sync
      - name: Build
        run: |
          set -euo pipefail
          args=""
          if [ -n "${{ inputs.sources }}" ]; then
            args="${{ inputs.sources }}"
          fi
          if [ -n "${{ inputs.ubuntu }}" ]; then
            args="$args --ubuntu ${{ inputs.ubuntu }}"
          fi
          mise run packer:build $args
