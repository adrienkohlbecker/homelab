name: packer-build
on:
  workflow_dispatch:
    inputs:
      sources:
        description: 'packer sources to build (e.g. "zfs zfs-lab"). Empty = all.'
        required: false
        default: ''
      ubuntu:
        description: 'Ubuntu codename'
        required: false
        default: noble
  push:
    paths:
      - 'packer/**'
      - 'mise-tasks/packer/**'

# Shared with test.yml and test-nightly.yml so packer can't rewrite the
# qcow2 tree mid-test. Packer-build is the ONLY workflow that mounts the
# qemu volume rw.
concurrency:
  group: lab-qemu-artifacts
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: lab-runtime
    container:
      # The runs-on label resolves to lab-runtime:latest already, but
      # GitHub Actions' schema (and most editors) require image: when a
      # container: block is present.
      image: lab-runtime:latest
      # kvm gid is supplied by act_runner's container.options default;
      # see test.yml for the rationale. rw because packer-build is the
      # only writer of the qcow2 tree.
      options: >-
        --device /dev/kvm
        --volume /mnt/scratch/qemu:/mnt/scratch/qemu:rw
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - run: uv sync
      - name: Build
        # Pass dispatch inputs through env vars rather than substituting
        # them straight into the shell command -- otherwise a misbehaving
        # input could break out of the args list. Single-quoting in the
        # mise run line keeps shell word-splitting predictable.
        env:
          PACKER_SOURCES: ${{ inputs.sources }}
          PACKER_UBUNTU: ${{ inputs.ubuntu }}
        run: |
          set -euo pipefail
          args=()
          if [ -n "$PACKER_SOURCES" ]; then
            # shellcheck disable=SC2206  # sources is whitespace-separated, intentional
            args+=($PACKER_SOURCES)
          fi
          if [ -n "$PACKER_UBUNTU" ]; then
            args+=(--ubuntu "$PACKER_UBUNTU")
          fi
          mise run packer:build "${args[@]}"
