name: test
on: [ push ]
# TODO: workflow_dispatch with inputs.roles deferred; Gitea 1.21.11 wasn't
# firing the workflow on push when the workflow_dispatch block was present.
# Re-add once we've isolated which sub-element of the dispatch block was
# the trigger.

# Shared with test-nightly.yml and packer-build.yml so reads/writes against
# /mnt/scratch/qemu serialise. The harness writes per-run workdirs there
# (under --workdir-parent /tmp/lab-runtime-workdir these days, but the
# artifact tree itself is bind-mounted ro into test cells), and packer-build
# rewrites the qcow2s. cancel-in-progress: false because every push gets
# its own clean run with its own commit history.
concurrency:
  group: lab-qemu-artifacts
  cancel-in-progress: false

# Force bash for all run: steps. Gitea Actions defaults to `sh` (dash)
# in some configurations, which doesn't support `set -o pipefail` or
# bash parameter expansion like ${var%%:*} that the parse step uses.
defaults:
  run:
    shell: bash

jobs:
  detect:
    runs-on: lab-runtime
    outputs:
      matrix: ${{ steps.detect.outputs.matrix }}
      cross_cut: ${{ steps.detect.outputs.cross_cut }}
    steps:
      - uses: actions/checkout@v4
        # 50 commits is enough for HEAD~1 plus a typical session of pushes;
        # detect-roles only ever looks at HEAD..HEAD~1 anyway.
        with: { fetch-depth: 50 }
      - id: detect
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          INPUTS_ROLES: ${{ inputs.roles }}
        run: mise run ci:detect-roles

  notify-cross-cut:
    needs: detect
    if: needs.detect.outputs.cross_cut == 'true'
    runs-on: lab-runtime
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 50 }
      - run: mise run ci:mail-cross-cut
        env:
          MAILGUN_API_KEY: ${{ secrets.MAILGUN_API_KEY }}
          MAILGUN_DOMAIN: ${{ secrets.MAILGUN_DOMAIN }}

  test-role:
    needs: detect
    if: needs.detect.outputs.matrix != '[]' && needs.detect.outputs.matrix != ''
    runs-on: lab-runtime
    container:
      # The runs-on label resolves to lab-runtime:latest already, but
      # GitHub Actions' schema (and most editors) require image: when a
      # container: block is present.
      image: lab-runtime:latest
      # /dev/kvm via --device for qemu acceleration; --group-add <gid>
      # passes the host kvm gid through (rootless userns doesn't map it
      # by default). 109 is lab's kvm gid (`getent group kvm` on the
      # host). NOT --group-add keep-groups: that's a podman-CLI-only
      # feature, but act_runner talks to podman through the docker API
      # socket which doesn't translate it. The qcow2 tree is :ro
      # because the harness writes per-run scratch under
      # /tmp/lab-runtime-workdir (--workdir-parent on testrole.py).
      options: >-
        --device /dev/kvm
        --group-add 109
        --volume /mnt/scratch/qemu:/mnt/scratch/qemu:ro
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        # Flat "role:variant" strings; Gitea 1.21.11 doesn't expand
        # `${{ matrix.<obj>.<field> }}` for fromJson-derived objects,
        # so the matrix entries are strings and we shell-parse them
        # into $GITHUB_ENV in the first step.
        spec: ${{ fromJson(needs.detect.outputs.matrix) }}
    name: ${{ matrix.spec }}
    timeout-minutes: 30
    steps:
      - name: Parse role:variant
        run: |
          set -euo pipefail
          spec='${{ matrix.spec }}'
          echo "TEST_ROLE=${spec%%:*}" >>"$GITHUB_ENV"
          echo "TEST_VARIANT=${spec##*:}" >>"$GITHUB_ENV"
      - uses: actions/checkout@v4
      - run: uv sync
      - run: test/testrole.py "$TEST_ROLE" --machine "$TEST_VARIANT" --timeout 1500 --workdir-parent /tmp/lab-runtime-workdir
      - name: Upload harness output on failure
        if: failure()
        uses: actions/upload-artifact@v3
        with:
          name: testout-${{ env.TEST_ROLE }}-${{ env.TEST_VARIANT }}
          path: |
            test/out/${{ env.TEST_VARIANT }}.${{ env.TEST_ROLE }}.*
            /tmp/lab-runtime-workdir/**
          retention-days: 14
          if-no-files-found: warn
