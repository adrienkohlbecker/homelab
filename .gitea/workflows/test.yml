name: test
on:
  push:
  workflow_dispatch:
    inputs:
      roles:
        description: 'Comma-separated role names (or role:variant). `ALL` = every role. Empty = use git diff.'
        required: false
        default: ''

# Shared with test-nightly.yml and packer-build.yml so reads/writes against
# /mnt/scratch/qemu serialise. The harness writes per-run workdirs to a
# host-mounted dir (--workdir-parent /lab-runtime-workdir, mapped to
# /mnt/scratch/act_runner/lab-runtime-workdir on the host so qcow2
# overlays + role copies have real disk space and don't ENOSPC the
# container's writable overlay). The qcow2 artifact tree itself is
# bind-mounted ro into test cells, and packer-build rewrites the qcow2s.
# cancel-in-progress: false because every push gets its own clean run
# with its own commit history.
concurrency:
  group: lab-qemu-artifacts
  cancel-in-progress: false

# Force bash for all run: steps. Gitea Actions defaults to `sh` (dash)
# in some configurations, which doesn't support `set -o pipefail` or
# bash parameter expansion like ${var%%:*} that the spec parsing uses.
defaults:
  run:
    shell: bash

jobs:
  detect:
    runs-on: lab-runtime
    outputs:
      matrix: ${{ steps.detect.outputs.matrix }}
      cross_cut: ${{ steps.detect.outputs.cross_cut }}
    steps:
      - uses: actions/checkout@v4
        # 50 commits is enough for HEAD~1 plus a typical session of pushes;
        # detect-roles only ever looks at HEAD..HEAD~1 anyway.
        with: { fetch-depth: 50 }
      - id: detect
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          INPUTS_ROLES: ${{ inputs.roles }}
        run: mise run ci:detect-roles

  notify-cross-cut:
    needs: detect
    if: needs.detect.outputs.cross_cut == 'true'
    runs-on: lab-runtime
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 50 }
      - run: mise run ci:mail-cross-cut
        env:
          MAILGUN_API_KEY: ${{ secrets.MAILGUN_API_KEY }}
          MAILGUN_DOMAIN: ${{ secrets.MAILGUN_DOMAIN }}

  test-role:
    needs: detect
    # Per-cell server-side filter. Gitea materialises the job DAG before
    # any job runs, so a `strategy.matrix.include: ${{ fromJson(needs...) }}`
    # form can't reach detect's output (matrix expansion happens too
    # early). The workaround: a static superset matrix listing every
    # role:variant the universe could produce, plus this `if:` to skip
    # cells that aren't in the dynamic detect output. Gitea evaluates
    # job-level if: at dispatch using the resolved needs.outputs context,
    # so skipped cells cost ~zero (no runner cycle, no container start).
    # Keep the matrix in sync with `mise run ci:gen-test-matrix`;
    # ci:lint-test-matrix flags drift in lint.
    if: contains(fromJSON(needs.detect.outputs.matrix), matrix.spec)
    runs-on: lab-runtime
    container:
      # The runs-on label resolves to lab-runtime:latest already, but
      # GitHub Actions' schema (and most editors) require image: when a
      # container: block is present.
      image: lab-runtime:latest
      # /dev/kvm via --device for qemu acceleration. `--group-add 1`
      # (container-side gid that maps to host kvm via /etc/subgid +
      # the rootless gidmap; see roles/act_runner/templates/config.yml.j2
      # for the why) is supplied by act_runner's container.options
      # default, keeping this workflow free of host-specific gids.
      #
      # lab-runtime-workdir is bind-mounted per-cell. The host path
      # embeds run_id + job-index so two concurrent test cells never
      # share a workdir parent -- without this, a sibling cell's startup
      # sweep (or any other reaper running in its container, where ps
      # can't see this cell's qemu) could reap files mid-run. Cleanup
      # of old per-cell dirs lives in the act_runner role's tmpfiles.d
      # entry (Age=1d).
      options: >-
        --device /dev/kvm
        --volume /mnt/scratch/qemu:/mnt/scratch/qemu:ro
        --volume /mnt/scratch/act_runner/lab-runtime-workdir/${{ github.run_id }}-${{ strategy.job-index }}:/lab-runtime-workdir:rw
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        # BEGIN AUTO-GENERATED MATRIX -- run `mise run ci:gen-test-matrix` to update
        spec:
          - "_packer:box"
          - "_test:box"
          - "act_runner:box"
          - "apt:box"
          - "avahi:box"
          - "backports:box"
          - "bash:box"
          - "bazarr:box"
          - "certbot:box"
          - "cleanup:box"
          - "compta:box"
          - "console:box"
          - "cron:box"
          - "csplogger:box"
          - "custom_exporter:box"
          - "data:box"
          - "dnscrypt_proxy:box"
          - "docker_client:box"
          - "eaton_ipp:box"
          - "fail2ban:box"
          - "fancontrol:box"
          - "filebrowser:box"
          - "firewall:box"
          - "getmail:box"
          - "gitea:box"
          - "hd_idle:box"
          - "hdparm:box"
          - "headphones:box"
          - "healthchecks:box"
          - "homeassistant:box"
          - "homepage:box"
          - "hostname:box"
          - "hwe_kernel:box"
          - "influxdb:box"
          - "jellyfin:box"
          - "journald:box"
          - "journald_exporter:box"
          - "kdump:box"
          - "keepalived:box"
          - "keepalived_exporter:box"
          - "keyboard:box"
          - "kuma:box"
          - "libvirt:box"
          - "lm_sensors:box"
          - "locale:box"
          - "logrotate:box"
          - "macos_vm:box"
          - "macvlan:box"
          - "marie:box"
          - "media:box"
          - "minio:box"
          - "mosquitto:box"
          - "netdata:box"
          - "netplan:box"
          - "nexus:box"
          - "nginx:box"
          - "nodejs:box"
          - "ntp:box"
          - "nut_monitor:box"
          - "nut_server:box"
          - "openproject:box"
          - "overseerr:box"
          - "paperless:box"
          - "pihole:box"
          - "plex:box"
          - "podman:box"
          - "podman_secret:box"
          - "postfix:box"
          - "powertop:box"
          - "profilarr:box"
          - "prometheus:box"
          - "radarr:box"
          - "redis:box"
          - "refind:box"
          - "resolved:box"
          - "sabnzbd:box"
          - "samba:box"
          - "scratch:box"
          - "service_user:box"
          - "services:box"
          - "smart:box"
          - "sonarr:box"
          - "sort_ini:box"
          - "speedtest:box"
          - "ssh:box"
          - "ssh_root:box"
          - "subid:box"
          - "swap:box"
          - "systemd_unit:box"
          - "tautulli:box"
          - "timezone:box"
          - "transmission:box"
          - "unattended_upgrades:box"
          - "user:box"
          - "wireguard:box"
          - "wolweb:box"
          - "z2m:box"
          - "zfs:box"
          - "zfs_autobackup:box"
          - "zfs_mount:box"
          - "zfsbootmenu:box"
          - "zfsbootmenu:lab"
        # END AUTO-GENERATED MATRIX
    name: ${{ matrix.spec }}
    timeout-minutes: 30
    env:
      # vault-client.sh picks this up for vault-id `test` and skips the
      # keychain/file lookup. Prod vault entries can't be decrypted in
      # CI by design -- the test harness only loads test vars.
      HOMELAB_VAULT_PASSWORD_TEST: ${{ secrets.HOMELAB_VAULT_PASSWORD_TEST }}
      # Restrict ansible to the test identity only; without this ansible
      # would still invoke vault-client.sh for prod per ansible.cfg's
      # vault_identity_list, log a benign warning, and continue -- but
      # the noise is confusing. This also makes prod-encrypted entries
      # fail loudly (not silently) if they're ever loaded.
      ANSIBLE_VAULT_IDENTITY_LIST: test@vault-client.sh
    steps:
      - uses: actions/checkout@v4
      - run: uv sync
      - name: Run test cell
        env:
          SPEC: ${{ matrix.spec }}
        run: |
          set -euo pipefail
          role=${SPEC%%:*}
          variant=${SPEC##*:}
          # Persist for the on-failure artifact step. $GITHUB_ENV is
          # read between steps regardless of this step's exit status,
          # so a test failure still gives the artifact step a name.
          {
            echo "ROLE=$role"
            echo "VARIANT=$variant"
          } >>"$GITHUB_ENV"
          test/testrole.py "$role" --machine "$variant" --timeout 1500 --workdir-parent /lab-runtime-workdir
      - name: Upload harness output on failure
        if: failure()
        uses: actions/upload-artifact@v3
        # actions/upload-artifact@v3 rejects ':' in artifact names; ROLE
        # + VARIANT come from the parsed SPEC so the resulting name is
        # plain alnum/underscores/hyphens.
        with:
          name: testout-${{ env.ROLE }}-${{ env.VARIANT }}
          path: |
            test/out/${{ env.VARIANT }}.${{ env.ROLE }}.*
            /lab-runtime-workdir/**
          retention-days: 14
          if-no-files-found: warn
