name: test
on:
  push:
  workflow_dispatch:
    inputs:
      roles:
        description: 'Comma-separated role names (or role:variant). `ALL` = every role. Empty = use git diff.'
        required: false
        default: ''

# Shared with test-nightly.yml and packer-build.yml so reads/writes against
# /mnt/scratch/qemu serialise. The harness writes per-run workdirs there
# (under --workdir-parent /tmp/lab-runtime-workdir these days, but the
# artifact tree itself is bind-mounted ro into test cells), and packer-build
# rewrites the qcow2s. cancel-in-progress: false because every push gets
# its own clean run with its own commit history.
concurrency:
  group: lab-qemu-artifacts
  cancel-in-progress: false

# Force bash for all run: steps. Gitea Actions defaults to `sh` (dash)
# in some configurations, which doesn't support `set -o pipefail` or
# bash parameter expansion like ${var%%:*} that the parse step uses.
defaults:
  run:
    shell: bash

jobs:
  detect:
    runs-on: lab-runtime
    outputs:
      matrix: ${{ steps.detect.outputs.matrix }}
      cross_cut: ${{ steps.detect.outputs.cross_cut }}
    steps:
      - uses: actions/checkout@v4
        # 50 commits is enough for HEAD~1 plus a typical session of pushes;
        # detect-roles only ever looks at HEAD..HEAD~1 anyway.
        with: { fetch-depth: 50 }
      - id: detect
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          INPUTS_ROLES: ${{ inputs.roles }}
        run: mise run ci:detect-roles

  notify-cross-cut:
    needs: detect
    if: needs.detect.outputs.cross_cut == 'true'
    runs-on: lab-runtime
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 50 }
      - run: mise run ci:mail-cross-cut
        env:
          MAILGUN_API_KEY: ${{ secrets.MAILGUN_API_KEY }}
          MAILGUN_DOMAIN: ${{ secrets.MAILGUN_DOMAIN }}

  test-role:
    needs: detect
    if: needs.detect.outputs.matrix != '[]' && needs.detect.outputs.matrix != ''
    runs-on: lab-runtime
    container:
      # The runs-on label resolves to lab-runtime:latest already, but
      # GitHub Actions' schema (and most editors) require image: when a
      # container: block is present.
      image: lab-runtime:latest
      # /dev/kvm via --device for qemu acceleration. The host kvm gid
      # is supplied automatically by act_runner's container.options
      # default (--group-add gid resolved via getent at role-apply
      # time), so this workflow stays free of host-specific gids.
      options: >-
        --device /dev/kvm
        --volume /mnt/scratch/qemu:/mnt/scratch/qemu:ro
    timeout-minutes: 600
    steps:
      - uses: actions/checkout@v4
      - run: uv sync
      - name: Run matrix cells with bounded parallelism
        # Why a shell loop instead of strategy.matrix: even on Gitea
        # 1.26.1 with act_runner 0.6.1, dynamic matrix dimensions built
        # from `${{ fromJson(needs.<job>.outputs.<x>) }}` don't get
        # their values bound at cell-runtime -- ${{ matrix.<key> }}
        # ends up as the literal template in the cell's name and
        # commands. xargs -P sidesteps Gitea's matrix machinery
        # entirely: one job, one big shell loop, bash-managed
        # parallelism.
        env:
          MATRIX: ${{ needs.detect.outputs.matrix }}
          MAX_PARALLEL: '2'
        run: |
          set -euo pipefail
          echo "$MATRIX" | jq -r '.[]' \
            | xargs -I{} -n1 -P "$MAX_PARALLEL" bash -c '
                spec=$1
                role=${spec%%:*}
                variant=${spec##*:}
                echo "::group::$spec"
                if test/testrole.py "$role" --machine "$variant" --timeout 1500 --workdir-parent /tmp/lab-runtime-workdir; then
                  echo "::endgroup::"
                  echo "PASS: $spec"
                else
                  rc=$?
                  echo "::endgroup::"
                  echo "FAIL($rc): $spec"
                  exit $rc
                fi
              ' _ {}
      - name: Upload harness output on failure
        if: failure()
        uses: actions/upload-artifact@v3
        with:
          name: testout
          path: |
            test/out/
            /tmp/lab-runtime-workdir/**
          retention-days: 14
          if-no-files-found: warn
