name: test-nightly
on:
  schedule:
    # 02:00 UTC daily. Activity-gated below: skips when no commits landed
    # in the last 25h (25, not 24, so a same-second cron jitter doesn't
    # mis-fire a false-negative skip).
    - cron: '0 2 * * *'
  workflow_dispatch:

# Shared with test.yml and packer-build.yml so the artifact tree under
# /mnt/scratch/qemu can't be rewritten by packer-build mid-test.
concurrency:
  group: lab-qemu-artifacts
  cancel-in-progress: false

# bash for all run: steps -- Gitea Actions defaults to dash, which
# doesn't support `set -o pipefail` or bash parameter expansion.
defaults:
  run:
    shell: bash

jobs:
  gate:
    runs-on: lab-runtime
    outputs:
      matrix: ${{ steps.gate.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
        # Full history so `git log --since='25 hours ago'` actually has
        # the timestamps to walk; the default fetch-depth of 1 only has
        # HEAD's commit metadata.
        with: { fetch-depth: 0 }
      - id: gate
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "schedule" ]; then
            count=$(git log --since='25 hours ago' --oneline | wc -l)
            if [ "$count" -eq 0 ]; then
              echo "no commits in the last 25h -- skipping nightly"
              echo "matrix=[]" >>"$GITHUB_OUTPUT"
              exit 0
            fi
          fi
          mise run ci:detect-roles --all

  test-role:
    needs: gate
    # Per-cell server-side filter, identical to test.yml. See that file
    # for why we use a static superset matrix + `if:` rather than a
    # dynamic matrix from the gate job's output. Empty gate output (no
    # commits in the last 25h) skips every cell at zero cost.
    if: contains(fromJSON(needs.gate.outputs.matrix), matrix.spec)
    runs-on: lab-runtime
    container:
      image: lab-runtime:latest
      # --group-add 1 is supplied by act_runner's container.options
      # default; see test.yml for the rationale.
      options: >-
        --device /dev/kvm
        --volume /mnt/scratch/qemu:/mnt/scratch/qemu:ro
        --volume /mnt/scratch/act_runner/lab-runtime-workdir:/lab-runtime-workdir:rw
    strategy:
      fail-fast: false
      # Nightly runs unattended; saturate runner capacity (vs 2 on the
      # push test workflow which leaves headroom for lint/dispatch).
      max-parallel: 4
      matrix:
        # BEGIN AUTO-GENERATED MATRIX -- run `mise run ci:gen-test-matrix` to update
        spec:
          - "_packer:box"
          - "_test:box"
          - "act_runner:box"
          - "apt:box"
          - "avahi:box"
          - "backports:box"
          - "bash:box"
          - "bazarr:box"
          - "certbot:box"
          - "cleanup:box"
          - "compta:box"
          - "console:box"
          - "cron:box"
          - "csplogger:box"
          - "custom_exporter:box"
          - "data:box"
          - "dnscrypt_proxy:box"
          - "docker_client:box"
          - "eaton_ipp:box"
          - "fail2ban:box"
          - "fancontrol:box"
          - "filebrowser:box"
          - "firewall:box"
          - "getmail:box"
          - "gitea:box"
          - "hd_idle:box"
          - "hdparm:box"
          - "headphones:box"
          - "healthchecks:box"
          - "homeassistant:box"
          - "homepage:box"
          - "hostname:box"
          - "hwe_kernel:box"
          - "influxdb:box"
          - "jellyfin:box"
          - "journald:box"
          - "journald_exporter:box"
          - "kdump:box"
          - "keepalived:box"
          - "keepalived_exporter:box"
          - "keyboard:box"
          - "kuma:box"
          - "libvirt:box"
          - "lm_sensors:box"
          - "locale:box"
          - "logrotate:box"
          - "macos_vm:box"
          - "macvlan:box"
          - "marie:box"
          - "media:box"
          - "minio:box"
          - "mosquitto:box"
          - "netdata:box"
          - "netplan:box"
          - "nexus:box"
          - "nginx:box"
          - "nodejs:box"
          - "ntp:box"
          - "nut_monitor:box"
          - "nut_server:box"
          - "openproject:box"
          - "overseerr:box"
          - "paperless:box"
          - "pihole:box"
          - "plex:box"
          - "podman:box"
          - "podman_secret:box"
          - "postfix:box"
          - "powertop:box"
          - "profilarr:box"
          - "prometheus:box"
          - "radarr:box"
          - "redis:box"
          - "refind:box"
          - "resolved:box"
          - "sabnzbd:box"
          - "samba:box"
          - "scratch:box"
          - "service_user:box"
          - "services:box"
          - "smart:box"
          - "sonarr:box"
          - "sort_ini:box"
          - "speedtest:box"
          - "ssh:box"
          - "ssh_root:box"
          - "subid:box"
          - "swap:box"
          - "systemd_unit:box"
          - "tautulli:box"
          - "timezone:box"
          - "transmission:box"
          - "unattended_upgrades:box"
          - "user:box"
          - "wireguard:box"
          - "wolweb:box"
          - "z2m:box"
          - "zfs:box"
          - "zfs_autobackup:box"
          - "zfs_mount:box"
          - "zfsbootmenu:box"
          - "zfsbootmenu:lab"
        # END AUTO-GENERATED MATRIX
    name: ${{ matrix.spec }}
    timeout-minutes: 30
    env:
      HOMELAB_VAULT_PASSWORD_TEST: ${{ secrets.HOMELAB_VAULT_PASSWORD_TEST }}
      ANSIBLE_VAULT_IDENTITY_LIST: test@vault-client.sh
    steps:
      - uses: actions/checkout@v4
      - run: uv sync
      - name: Run test cell
        env:
          SPEC: ${{ matrix.spec }}
        run: |
          set -euo pipefail
          role=${SPEC%%:*}
          variant=${SPEC##*:}
          {
            echo "ROLE=$role"
            echo "VARIANT=$variant"
          } >>"$GITHUB_ENV"
          test/testrole.py "$role" --machine "$variant" --timeout 1500 --workdir-parent /lab-runtime-workdir
      - name: Upload harness output on failure
        if: failure()
        uses: actions/upload-artifact@v3
        with:
          name: testout-${{ env.ROLE }}-${{ env.VARIANT }}
          path: |
            test/out/${{ env.VARIANT }}.${{ env.ROLE }}.*
            /lab-runtime-workdir/**
          retention-days: 30
          if-no-files-found: warn

  notify:
    needs: test-role
    if: failure()
    runs-on: lab-runtime
    steps:
      - uses: actions/checkout@v4
      - run: mise run ci:mail-failures
        env:
          NEEDS_RESULT: ${{ toJson(needs.test-role.result) }}
          MAILGUN_API_KEY: ${{ secrets.MAILGUN_API_KEY }}
          MAILGUN_DOMAIN: ${{ secrets.MAILGUN_DOMAIN }}
