name: test-nightly
on:
  schedule:
    # 02:00 UTC daily. Activity-gated below: skips when no commits landed
    # in the last 25h (25, not 24, so a same-second cron jitter doesn't
    # mis-fire a false-negative skip).
    - cron: '0 2 * * *'
  workflow_dispatch:

# Shared with test.yml and packer-build.yml so the artifact tree under
# /mnt/scratch/qemu can't be rewritten by packer-build mid-test.
concurrency:
  group: lab-qemu-artifacts
  cancel-in-progress: false

# bash for all run: steps -- Gitea Actions defaults to dash, which
# doesn't support `set -o pipefail` or bash parameter expansion.
defaults:
  run:
    shell: bash

jobs:
  gate:
    runs-on: lab-runtime
    outputs:
      matrix: ${{ steps.gate.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
        # Full history so `git log --since='25 hours ago'` actually has
        # the timestamps to walk; the default fetch-depth of 1 only has
        # HEAD's commit metadata.
        with: { fetch-depth: 0 }
      - id: gate
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "schedule" ]; then
            count=$(git log --since='25 hours ago' --oneline | wc -l)
            if [ "$count" -eq 0 ]; then
              echo "no commits in the last 25h -- skipping nightly"
              echo "matrix=[]" >>"$GITHUB_OUTPUT"
              exit 0
            fi
          fi
          mise run ci:detect-roles --all

  test-role:
    needs: gate
    if: needs.gate.outputs.matrix != '[]' && needs.gate.outputs.matrix != ''
    runs-on: lab-runtime
    container:
      image: lab-runtime:latest
      # --group-add 1 is supplied by act_runner's container.options
      # default; see test.yml for the rationale.
      options: >-
        --device /dev/kvm
        --volume /mnt/scratch/qemu:/mnt/scratch/qemu:ro
    timeout-minutes: 600
    steps:
      - uses: actions/checkout@v4
      - run: uv sync
      - name: Run matrix cells with bounded parallelism
        # See test.yml for why we use a shell loop instead of
        # strategy.matrix. MAX_PARALLEL: 4 here vs 2 on the push test
        # workflow -- nightly runs unattended.
        env:
          MATRIX: ${{ needs.gate.outputs.matrix }}
          MAX_PARALLEL: '4'
        run: |
          set -euo pipefail
          echo "$MATRIX" | jq -r '.[]' \
            | xargs -I{} -n1 -P "$MAX_PARALLEL" bash -c '
                spec=$1
                role=${spec%%:*}
                variant=${spec##*:}
                echo "::group::$spec"
                if test/testrole.py "$role" --machine "$variant" --timeout 1500 --workdir-parent /tmp/lab-runtime-workdir; then
                  echo "::endgroup::"
                  echo "PASS: $spec"
                else
                  rc=$?
                  echo "::endgroup::"
                  echo "FAIL($rc): $spec"
                  exit $rc
                fi
              ' _ {}
      - if: failure()
        uses: actions/upload-artifact@v3
        with:
          name: testout
          path: |
            test/out/
            /tmp/lab-runtime-workdir/**
          retention-days: 30
          if-no-files-found: warn

  notify:
    needs: test-role
    if: failure()
    runs-on: lab-runtime
    steps:
      - uses: actions/checkout@v4
      - run: mise run ci:mail-failures
        env:
          NEEDS_RESULT: ${{ toJson(needs.test-role.result) }}
          MAILGUN_API_KEY: ${{ secrets.MAILGUN_API_KEY }}
          MAILGUN_DOMAIN: ${{ secrets.MAILGUN_DOMAIN }}
