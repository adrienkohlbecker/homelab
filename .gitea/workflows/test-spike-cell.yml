name: test-spike-cell
on:
  workflow_call:
    inputs:
      cells:
        type: string
        required: true

defaults:
  run:
    shell: bash

jobs:
  cell:
    runs-on: lab-runtime
    strategy:
      fail-fast: false
      matrix:
        spec: ${{ fromJSON(inputs.cells) }}
    name: cell-${{ matrix.spec }}
    steps:
      - name: Print spec three ways
        env:
          SPEC: ${{ matrix.spec }}
        run: |
          echo "name-binding cell: ${{ matrix.spec }}"
          echo "run-literal:      ${{ matrix.spec }}"
          echo "via-env:          $SPEC"
